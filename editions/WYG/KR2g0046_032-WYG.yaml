body:
  text: 明儒學案卷三十二餘姚黄宗羲撰泰州學案陽明先生之學有泰州龍溪而風行天下亦因泰州龍溪而漸失其傳泰州龍溪時時不滿其師説益啓瞿曇之祕而歸之師蓋躋陽明而為禪矣然龍溪之後力量無過於龍溪者又得江右為之救正故不至十分決裂泰州之後其人多能赤手以摶龍蛇傳至顔山農何心隱一派遂復非名敎之所能羈絡矣顧端文曰心隱輩坐在利欲膠漆盆中所以能鼓動得人只緣他一種聰明亦自有不可到處羲以為非其聰明正其學術之所謂祖師禪者以作用見性諸公掀翻天地前不見有古人後不見有來者釋氏一棒一喝當機横行放下拄杖便如愚人一般諸公赤身擔當無有放下時節故其害如是今之言諸公者大概本弇州之國朝叢記弇州蓋因當時爰書節略之豈可為信羲攷其派下之著者列於下方顔鈞字山農吉安人也嘗師事劉師泉無所得乃從徐波石學得泰州之傳其學以人心妙萬物而不測者也性如明珠原無塵染有何覩聞著何戒懼平時只是率性所行純任自然便謂之道及時有放逸然後戒慎恐懼以修之凡儒先見聞道理格式皆足以障道此大㫖也嘗曰吾門人中與羅汝芳言從性與陳一泉言從心餘子所言只從情耳山農游俠好急人之難趙大洲赴貶所山農偕之行大洲感之徐波石戰没元江府山農尋其骸骨歸葬頗欲有為於世以寄民胞物與之志嘗寄周恭節詩云䝉䝉烟雨鎖江垓江上漁人争釣臺夜静得魚呼酒肆湍流和月掇將來若得春風遍九垓世間那有三歸臺君仁臣義民安堵雉兎芻蕘去復來然世人見其張皇無賢不肖皆惡之以他事下南京獄必欲殺之近溪為之營救不赴廷對者六年近溪謂周恭節曰山農與相處餘三十年其心髓精微决難詐飾不肖敢謂其學直接孔孟俟諸後聖斷斷不惑不肖菲劣已䝉門下知遇又敢竊謂門下雖知百近溪不如今日一察山農子也山農以戍岀年八十餘梁汝元字夫山其後改姓名為何心隱吉州永豐人少補諸生從學於山農與聞心齋立本之㫖時吉州三四大老方以學顯心隱恃其知見輒狎侮之謂大學先齊家乃搆萃和堂以合族身理一族之政冠婚喪祭賦役一切通其有無行之有成㑹邑令有賦外之征心隱貽書以誚之令怒誣之當道下獄中孝感程後臺在胡總制幕府檄江撫出之總制得心隱語人曰斯人無所用在左右能令人神王耳已同後臺入京師與羅近溪耿天臺游一日遇江陵於僧舍江陵時為司業心隱率爾曰公居太學知大學道乎江陵為勿聞也者目攝之曰爾意時時欲飛却飛不起也江陵去心隱舍然若喪曰夫夫也異日必當國異日必殺我心隱在京師闢各門會館招來四方之士方技雜流無不從之是時政由嚴氏忠臣坐死者相望卒莫能動有藍道行者以乩術幸上心隱授以密計偵知嵩有揭帖乩神降語今日當有一奸臣言事上方遲之而嵩揭至上由此疑嵩御史鄒應龍因論嵩敗之然上猶不忘嵩尋死道行於獄心隱踉蹌南過金陵謁何司冦司冦者故為江撫脱心隱於獄者也然而嚴黨遂為嚴氏仇心隱心隱逸去從此踪跡不常所游半天下江陵當國御史傅應禎劉臺連疏攻之皆吉安人也江陵因仇吉安人而心隱故嘗以術去宰相江陵不能無心動心隱方在孝感聚徒講學遂令楚撫陳瑞捕之未獲而瑞去王之垣代之卒致之心隱曰公安敢殺我亦安能殺我殺我者張居正也遂死獄中心隱之學不墮影響有是理則實有是事無聲無臭事藏於理有象有形理顯於事故曰無極者流之無君父者也必皇建其有極乃有君而有父也必㑹極必歸極乃有敬敬以君君也乃有親親以父父也又必易有太極乃不墮於弑君弑父乃不流於無君無父乃乾坤其君臣也乃乾坤其父子也又曰孔孟之言無欲非濂溪之言無欲也欲惟寡則心存而心不能以無欲也欲魚欲熊掌欲也舎魚而取熊掌欲之寡也欲生欲義欲也舎生而取義欲之寡也欲仁非欲乎得仁而不貪非寡欲乎從心所欲非欲乎欲不踰矩非寡欲乎此即釋氏所謂妙有也蓋一變而為儀秦之學矣鄧豁渠初名鶴號太湖蜀之内江人為諸生時不説學趙大洲為諸生談聖學於東壁渠為諸生講舉業於西序朝夕聲相聞未嘗過而問焉已漸有入卒摳衣為弟子一旦棄家出遊遍訪知學者以為性命甚重非拖泥帯水可以成就遂落髪為僧訪李中溪元陽於大理訪鄒東廓劉獅泉於江右訪王東崖於泰州訪蔣道林於武陵訪耿楚倥於黄安與大洲不相聞者數十年大洲起官過衛輝渠適在焉出迎郊外大洲望見驚異下車執手徒行十數里彼此澘然流涕大洲曰誤子者余也徃余言學過高致子於此吾罪業重矣向以子為死罪惡莫贖今尚在亟歸廬而父墓側終身可也吾割田租百石贍子因書劵給之時有大洲問學者大洲乃令渠答之大洲聽其議論大恚曰吾藉是以試子近詣乃荒謬至此大洲入京渠復遊齊魯間初無歸志大洲入相乃來京候謁大洲拒不見屬宦蜀者㩦之歸至􅃰州死野寺中渠自序為學云已亥禮師聞良知之學不解入青城山叅禪十年至戊申入雞足山悟人情事變外有個擬議不得妙理當時不遇明師指㸃不能豁然通曉癸丑扺天池禮月泉陳雞足所悟泉曰第二機即第一機渠遂認現前昭昭靈靈的百姓日用不知渠知之也甲寅廬山禮性空戊午居澧州八年每覺無日新之益入黄安居楚倥茅屋始達父母未生前的先天地生的水窮山盡的百尺竿頭外的所謂不屬有無不屬真妄不屬生滅不屬言語常住真心與後天事不相聯屬向日雞足所叅人情事變的豁然通曉被月泉所誤二十餘年丙寅以後渠之學日漸幽深𤣥逺如今也没有我也没有道泛泛然如虛舟飄瓦而無著落脱胎換骨實在於此渠學之誤只主見性不拘戒律先天是先天後天是後天第一義是第一義第二義是第二義身之與性截然分為二事言在世界外行在世界内人但議其縱情不知其所謂先天第一義者亦只得完一個無字而已嗟乎是豈渠一人之誤哉方與時字湛一黄陂人也弱冠為諸生一旦棄而之太和山習攝心術靜久生明又得黄白術於方外乃去而從荆山遊因得遇龍溪念庵皆目之為竒士車轍所至縉紳倒屣老師上卿皆拜下風然尚𤣥虛侈談論耿楚倥初出其門久而知其偽去之一日謂念菴曰吾儕方外學亦有祕訣待人而傳談聖學何容易耶念菴然之湛一即迎至其里道明山中短榻夜坐久之無所得而返後臺心隱大㑹礦山車騎雍容湛一以兩僮舁一籃輿往甫揖心隱把臂謂曰假我百金湛一唯唯即千金唯命已入京師欲俠術以干九重江陵聞之曰方生此鼓從此撾破矣無何嚴世蕃聞其爐火而艶之湛一避歸胡廬山督楚學以其昔嘗誑念菴也檄有司捕治湛一乃跳而入新鄭之幕新鄭敗走匿太和山病瘵死程學顔字二蒲號後臺孝感人也官至太僕寺丞自以此學不進背地號泣其篤志如此心隱死其弟學博曰梁先生以友為命友中透於學者錢同文外獨吾兄耳先生魂魄應不去吾兄左右乃開後臺墓合葬焉錢同文字懷蘇福之興化人知祁門縣入為刑部主事累轉至郡守與心隱友善懷蘇嘗言學道人堆堆只在兄弟欵中未見有掙上父母欵者管志道字登之號東溟蘇之太倉人隆慶辛未進士除南京兵部主事改刑部江陵秉政東溟上疏條九事以譏切時政無非欲奪其威福歸之人主其中有憲綱一條則言兩司與廵方抗禮國初制也今之所行非是江陵即岀之為廣東僉事以難之使之為法自敝也果未幾御史龔懋賢劾之謫鹽課司提舉明年外計以老疾致仕萬厯戊申卒年七十三東溟受業於耿天臺著書數十萬言大抵鳩合儒釋浩汗而不可方物謂乾元無首之㫖與華嚴性海渾無差别易道與天地準故不期與佛老之祖合而自合孔敎與二敎峙故不期佛老之徒争而自争敎理不得不圓敎體不得不方以仲尼之圓圓宋儒之方而使儒不礙釋釋不礙儒以仲尼之方方近儒之圓而使儒不濫釋釋不濫儒唐宋以來儒者不主孔奴釋則崇釋卑孔皆於乾元性海中自起藩籬故以乾元統天一案兩破之也其為孔子闡幽十事言孔子任文統不任道統一也居臣道不居師道二也刪述六經從遊七十二子非孔子定局三也與夷惠易地則為夷惠四也孔子知天命不專以理兼通氣運五也一貫尚屬悟門實之必以行門六也敦化通於性海川流通於行海七也孔子曽師老聃八也孔子從先進是黄帝以上九也孔子得位必用桓文做法十也按東溟所言亦只是三敎膚廓之論平生尤喜談鬼神夢寐其學不見道可知泰州張皇見龍東溟闢之然決儒釋之波瀾終是其派下人也處士王心齋先生艮處士王東崖先生襞附樵夫陶匠田夫方伯徐波石先生樾敎諭王一菴先生棟文選林東城先生春文肅趙大洲先生貞吉叅政羅近溪先生汝芳侍郎楊復所先生起元恭簡耿天臺先生定向處士耿楚倥先生定理文端焦澹園先生竑尚寳潘雪松先生士藻明經方本菴先生學漸郎中何克齋先生祥給事祝無功先生世祿尚寳周海門先生汝登文簡陶石簣先生望齡太學劉冲倩先生塙泰州學案一處士王心齋先生艮王艮字汝止號心齋泰州之安豐場人七歲受書鄉塾貧不能竟學從父商於山東常携孝經論語大學袖中逢人質難久而信口談解如或啓之其父受役天寒起盥冷水先生見之痛哭曰為人子而令親如此尚得為人乎於是有事則身代之先生雖不得專功於學然黙黙叅究以經證悟以悟釋經歴有年所人莫能窺其際也一夕夢天墮壓身萬人奔號求救先生舉臂起之視其日月星辰失次復手整之覺而汗溢如雨心體洞徹記曰正德六年間居仁三月半自此行住語黙皆在覺中乃按禮經製五常冠深衣大帯笏板服之曰言堯之言行堯之行而不服堯之服可乎時陽明廵撫江西講良知之學大江之南學者翕然從信顧先生僻處未之聞也有黄文剛者吉安人而寓泰州聞先生論詫曰此絶類王廵撫之談學也先生喜曰有是哉雖然王公論良知艮談格物如其同也是天以王公與天下後世也如其異也是天以艮與王公也即日啓行以古服進見至中門舉笏而立陽明出迎於門外始入先生據上坐辯難久之稍心折移其坐於側論畢乃歎曰簡易直截艮不及也下拜自稱弟子退而繹所聞間有不合悔曰吾輕易矣明日入見且告之悔陽明曰善哉子之不輕信從也先生復上坐辯難久之始大服遂為弟子如初陽明謂門人曰向者吾擒宸濠一無所動今却為斯人動矣陽明歸越先生從之來學者多從先生指授已而歎曰千載絶學天啓吾師可使天下有不及聞者乎因問陽明以孔子轍環車制陽明笑而不答歸家遂自創蒲輪招摇道路將至都下有老叟夢黄龍無首行雨至崇文門變為人立晨起徃候而先生適至當是時陽明之學謗議䗬起而先生冠服言動不與人同都人以恠魁目之同門之在京者勸之歸陽明亦移書責之先生始還會稽陽明以先生意氣太高行事太竒痛加裁抑及門三日不得見陽明送客出門先生長跪道旁曰艮知過矣陽明不顧而入先生隨至庭下厲聲曰仲尼不為己甚陽明方揖之起陽明卒於師先生迎哭至桐廬經紀其家而後返開門授徒逺近皆至同門會講者必請先生主席陽明而下以辯才推龍溪然有信有不信唯先生於眉睫之間省覺人最多謂百姓日用即道雖僮僕徃來動作處指其不假安排者以示之聞者爽然御史吳疏山悌上疏薦舉不報嘉靖十九年十二月八日卒年五十八先生以格物即物有本末之物身與天下國家一物也格知身之為本而家國天下之為末行有不得者皆反求諸己反已是格物底工夫故欲齊治平在於安身易曰身安而天下國家可保也身未安本不立也知安身者則必愛身敬身愛身敬身者必不敢不愛人不敬人能愛人敬人則人必愛我敬我而我身安矣一家愛我敬我則家齊一國愛我敬我則國治天下愛我敬我則天下平故人不愛我非特人之不仁已之不仁可知矣人不敬我非特人之不敬己之不敬可知矣此所謂淮南格物也劉夫子曰後儒格物之説當以淮南為正第少一註脚格知誠意之為本而正修治平之為末則備矣然所謂安身者亦是安其心耳非區區保此形骸之為安也彼居危邦入亂邦見幾不作者身不安而心固不安也不得己而殺身以成仁文王之羑里夷齊之餓心安則身亦未嘗不安也乃先生又曰安其身而安其心者上也不安其身而安其心者次之不安其身又不安其心斯為下矣而以緡蠻為安身之法無乃開一臨難茍免之隙乎先生以九二見龍為正位孔子修身講學以見於世未嘗一日隱也故有以伊傅稱先生者先生曰伊傅之事我不能伊傅之學我不由伊傅得君可謂竒遇如其不遇終身獨善而已孔子則不然也此終蒲輪轍環意見陽明之所欲裁抑者熱處難忘也於遯世不見知而不悔之學終隔一塵先生曰聖人以道濟天下是至尊者道也人能𢎞道是至尊者身也道尊則身尊身尊則道尊故學也者所以學為師也學為長也學為君也以天地萬物依於身不以身依於天地萬物舍此皆妾婦之道聖人復起不易斯言心齋語錄問止至善之㫖曰明明德以立體親民以達用體用一致先師辨之悉矣但謂至善為心之本體却與明德無别恐非本㫖堯舜執中之傳以至孔子無非明明德親民之學獨未知安身一義乃未有能止至善者故孔子透悟此理却於明明德親民中立起一個極來又説個在止於至善止至善者安身也安身者立天下之大本也本治而末治正已而物正也大人之學也是故身也者天地萬物之本也天地萬物末也知身之為本是以明明德而親民也身未安本不立也本亂而末治者否矣本亂末治末愈亂也故易曰身安而天下國家可保也不知安身則明明德親民却不曽立得天下國家的本是故不能主宰天地斡旋造化立敎如此故自生民以來未有盛於孔子者也問止至善為安身亦何所據乎曰以經而知安身之為止至善也大學説個止至善便只在止至善上發揮知止知安身也定靜安慮得安身而止至善也物有本末故物物而後知本也知本知之至也知至知止也自天子至此謂知之至也乃是釋格物致知之義身與天下國家一物也惟一物而有本末之謂格絜度也絜度於本末之間而知本亂而末治者否矣此格物也物格知本也知本知之至也故曰自天子以至於庶人壹是皆以修身為本也修身立本也立本安身也引詩釋止至善曰緡蠻黄鳥止於丘隅知所以安身也孔子歎曰於止知其所止可以人而不如鳥乎要在知安身也易曰君子安其身而後動又曰利用安身又曰身安而天下國家可保也孟子曰守孰為大守身為大失其身而能事其親者吾未之聞同一㫖也問格字之義曰格如格式之格即絜矩之謂吾身是個矩天下國家是個方絜矩則知方之不正由矩之不正也是以只去正矩却不在方上求矩正則方正矣方正則成格矣故曰物格吾身對上下前後左右是物絜矩是格也其本亂而末治者否矣便見絜度格字之義格物知本也立本安身也安身以安家而家齊安身以安國而國治安身以安天下而天下平也故曰修已以安人修已以安百姓修其身而天下平不知安身便去幹天下國家事是之為失本就此失脚將烹身割股餓死結纓且執以為是矣不知身不能保又何以保天下國家哉知本知止也如是而不求於末定也如是而天地萬物不能撓已靜也如是而首出庶物至尊至貴安也如是而知幾先見精義入神仕止久􅄩變通趨時慮也如是而身安如黄鳥色斯舉矣翔而後集無不得所止矣止至善也問反已是格物否曰物格知至知本也誠意正心修身立本也本末一貫是致愛人治人禮人也格物也不親不治不答是謂行有不得於心然後反已也格物然後知反己反已是格物的工夫反之如何正己而已矣反其仁治敬正己也其身正而天下歸之此正己而物正也然後身安也有疑安身之説者曰夷齊雖不安其身然而安其心矣曰安其身而安其心者上也不安其身而安其心者次之不安其身又不安其心斯為下矣危其身於天地萬物者謂之失本潔其身於天地萬物者為之遺末知得身是天下國家之本則以天地萬物依於己不以已依於天地萬物見龍可得而見之謂也潛龍則不可得而見矣惟人皆可得而見故利見大人聖人雖時乘六龍然必當以見龍為家舍顔子有不善未嘗不知常知故也知之未嘗復行常行故也體用不一只是功夫生人之天分有不同論學則不必論天分聖人之道無異於百姓日用凡有異者皆謂之異端天性之體本自活潑鳶飛魚躍便是此體愛人直到人亦愛敬人直到人亦敬信人直到人亦信方是學無止法有以伊傅稱先生者先生曰伊傅之事我不能伊傅之學我不由曰何謂也曰伊傅得君設其不遇則終身獨善而已孔子則不然也天下之學惟有聖人之學好學不費些子氣力有無邊快樂若費些子氣力便不是聖人之學便不樂不亦説乎説是心之本體孔子雖天生聖人亦必學詩學禮學易逐段研磨乃得明徹之至舜於瞽瞍命也舜盡性而瞽瞍底豫是故君子不謂命也孔子不遇命也而明道以淑斯人不謂命也若天民則聽命矣大人造命一友持功太嚴先生覺之曰是學為子累矣因指斵木者示之曰彼却不曽用功然亦何嘗廢事戒慎恐懼莫離却不覩不聞不然便入於有所戒慎有所恐懼矣故曰人性上不可添一物天理者天然自有之理也纔欲安排如何便是人欲百姓日用條理處即是聖人之條理處聖人知便不失百姓不知便為失有心於輕功名富貴者其流弊至於無父無君有心於重功名富貴者其流弊至於弑父與君即事是學即事是道人有困於貧而凍餒其身者則亦失其本而非學也學者問放心難求先生呼之即應先生曰爾心見在更何求乎學者初見先生嘗指之曰爾此時何等戒懼私欲從何處入常常如此便是允執厥中有疑出必為帝者師處必為天下萬世師者曰禮不云乎學也者學為人師也學不足以為人師皆茍道也故必以修身為本然後師道立身在一家必修身立本以為一家之法是為一家之師矣身在一國必修身立本以為一國之法是為一國之師矣身在天下必修身立本以為天下之法是為天下之師矣是故出不為帝者師是漫然茍出反累其身則失其本矣處不為天下萬世師是獨善其身而不講明此學於天下則遺其末矣皆非也皆小成也明哲者良知也明哲保身者良知良能也知保身者則必愛身能愛身則不敢不愛人能愛人則人必愛我人愛我則吾身保矣能愛身者則必敬身能敬身則不敢不敬人能敬人則人必敬我人敬我則吾身保矣故一家愛我則吾身保吾身保然後能保一家一國愛我則吾身保吾身保然後能保一國天下愛我則吾身保吾身保然後能保天下知保身而不知愛人必至於適已自便利己害人人將報我則吾身不能保矣吾身不能保又何以保天下國家哉知愛人而不知愛身必至於烹身割股舎生殺身則吾身不能保矣吾身不能保又何以保君父哉明哲保身論夫仁者愛人信者信人此合内外之道也於此觀之不愛人已不仁可知矣不信人已不信可知矣夫愛人者人恒愛之信人者人恒信之此感應之道也於此觀之人不愛我非特人之不仁已之不仁可知矣人不信我非特人之不信已之不信可知矣勉仁方徐子直問曰何哉夫子之所謂尊身也曰身與道原是一件至尊者此道至尊者此身尊身不尊道不謂之尊身尊道不尊身不謂之尊道須道尊身尊纔是至善故曰天下有道以道徇身天下無道以身徇道必不以道狥乎人有王者必來取法學焉而後臣之然後不勞而王如或不可則去仕止久􅄩精義入神見機而作避世避地避言避色如神龍變化莫之能測若以道從人妾婦之道也己不能尊信又豈能使人尊信哉問莊敬持養工夫曰道一而已矣中也良知也性也一也識得此理則現現成成自自在在即此不失便是莊敬即此常存便是持養真不須防檢不識此理莊敬未免著意纔著意便是私心問常恐失却本體即是戒慎恐懼否曰且道失到那裏去子謂王子敬近日工夫如何對曰善念動則充之妄念動則去之問善念不動惡念不動又如何不能對曰此却是中却是性戒慎恐懼此而已矣常是此中則善念動自知妄念動自知善念自充妄念自去如此慎獨便是知立大本程子云善固性也惡亦不可不謂之性清固水也濁亦不可不謂之水此語恐誤後學孟子則説性善蓋善固性也惡非性也氣質也變其氣質則性善矣清固水也濁非水也泥沙也去其泥沙則水清矣故言學不言氣質以學能變化氣質也明得盡渣滓便渾化張子云形而後有氣質之性善反之則天地之性存焉氣質之性君子有弗性者焉此語亦要善看謂氣質雜性故曰氣質之性只心有所向便是欲有所見便是妄既無所向又無所見便是無極而太極良知一㸃分分明明停停當當不用安排思索聖神之所以經綸變化而位育參贊者皆本諸此也與俞純夫只當在簡易慎獨上用功當行而行當止而止此是集義又何遇境動搖閒思妄念之有哉若只要遇境不動搖無閒思妄念此便是告子先我不動心不知集義者也毫釐之差不可不辨答劉子中來書即事是心更無心矣即知是事更無事矣即見用功精密子直良知原自無不真實而真實者未必合良知之妙也故程子謂人性上不容添一物答林子仁先生問在坐曰天下之學無窮惟何學可以時習之江西涂從國對曰惟天命之性可以時習也童子周涖對曰天下之學雖無窮皆可以時習也先生曰如以讀書為學有時作文有時學武如以事親為學有時又事君如以有事為學有時又無事烏在可以時習乎童子曰天命之性即天德良知也如讀書時也依此良知學作文時也依此良知學事親事君有事無事無不依此良知學乃所謂皆可時習也先生喟然嘆曰信予者從國也始可與言專一矣啓予者童子也始可與言一貫矣人心本自樂自將私欲縳私欲一萌時良知還自覺一覺便消除人心依舊樂樂是樂此學學是學此樂不樂不是學不學不是樂樂便然後學學便然後樂樂是學學是樂嗚呼天下之樂何如此學天下之學何如此樂樂學歌人心本無事有事心不樂有事行無事多事亦不錯示學者知得良知却是誰良知原有不須知而今只有良知在没有良知之外知次先師先生擬上世廟書數千言僉言孝弟也江陵閲其遺稿謂人曰世多稱王心齋此書數千言單言孝弟何迂濶也羅近溪曰嘻孝弟可謂迂濶乎處士王東崖先生襞附樵夫朱恕夫陶匠韓樂吾田夏叟王襞字宗順號東崖泰州人心齋之仲子也九歲隨父至㑹稽每遇講㑹先生以童子歌詩聲中金石陽明問之知為心齋子曰吾固疑其非越中兒也令其師事龍溪緒山先後留越中幾二十年心齋開講淮南先生又相之心齋没遂繼父講席徃來各郡主其敎事歸則扁舟於村落之間歌聲振乎林木怳然有舞雩氣象萬厯十五年十月十一日卒年七十七先生之學以不犯手為妙鳥啼花落山峙川流饑食渇飲夏葛冬裘至道無餘藴矣充拓得開則天地變化草木蕃充拓不去則天地閉賢人隱今人纔提學字便起幾層意思將議論講説之間䂓矩戒嚴之際工焉而心日勞勤焉而動日拙忍欲希名而誇好善持念藏穢而謂改過心神震動血氣靡寧不知原無一物原自見成但不礙其流行之體真樂自見學者所以全其樂也不樂則非學矣此雖本於心齋樂學之歌而龍溪之授受亦不可誣也白沙云色色信他本來何用爾脚勞手攘舞雩三三兩兩正在勿忘勿助之間曽㸃些兒活計被孟子打併出來便都是鳶飛魚躍若無孟子工夫驟而語之以曽㸃見趨一似説夢蓋自夫子川上一歎已將天理流行之體一日併出曽㸃見之而為暮春康節見之而為元㑹運世故言學不至於樂不可謂之學至明而為白沙之藤蓑心齋父子之提唱是皆有味乎其言之然而此處最難理㑹稍差便入狂蕩一路所以朱子言曽㸃不可學明道説康節豪傑之士根本不貼地白沙亦有説夢之戒細詳先生之學未免猶在光景作活計也朱恕字光信泰州草􅅯塲人樵薪養母一日過心齋講堂歌曰離山十里薪在家裡離山一里薪在山裡心齋聞之謂門弟子曰小子聽之道病不求耳求則不難不求無易樵聽心齋語浸浸有味於是每樵必造階下聽之饑則向都養乞漿解裹飯以食聽畢則浩歌負薪而去門弟子覸其然轉相驚異有宗姓者招而謂之曰吾以數十金貸汝别尋活計庻免作苦且可日夕與吾輩遊也樵得金俯而思繼而大恚曰子非愛我我自憧憧然經營念起斷送一生矣遂擲還之胡廬山為學使召之不徃以事役之短衣徒跣入見廬山與之成禮而退韓貞字以中號樂吾興化人以陶瓦為業慕朱樵而從學之後乃卒業於東崖麄識文字有茅屋三間以之償債遂處窑中自味曰三間茅屋歸新主一片烟霞是故人年逾三紀未娶東崖弟子醵金為之完姻久之覺有所得遂以化俗為任隨機指㸃農工商賈從之遊者千餘秋成農隙則聚徒談學一村既畢又之一村前歌後答絃誦之聲洋洋然也縣令聞而嘉之遺米二石金一鍰樂吾受米返金令問政對曰儂窶人無能補於左右第凡與儂居者幸無訟牒煩公府此儂之所以報明府也耿天臺行部泰州大㑹心齋祠偶及故相喜怒失常樂吾拊床呌曰安能如儂識此些子意耶天臺笑曰窮居而意氣有加亦損也東崖曰韓生識之大行窮居一視焉可也樂吾每遇會講有譚世事者輒大噪曰光隂有幾乃作此閒談耶或尋章摘句則大恚曰舍却當下不理會搬弄陳言此豈學究講肆耶在座為之警省夏廷美繁昌田夫也一日聽張甑山講學謂為學學為人也為人須求為真人毋為假人叟撫然曰吾平日為人得毋未真耶乃之楚訪天臺天臺謂汝鄉焦弱侯可師也歸從弱侯游得自然㫖趣弱侯曰要自然便不自然可將汝自然抛去叟聞而有省叟故未嘗讀書弱侯命之讀四書樂誦久之喟然曰吾閲集註不能了了以本文反身體貼如思知人不可不知天竊謂仁者人也人原是天人不知天便不是人如何能事親稱孝子論語所謂異端者謂其端異也吾人須研究自己為學初念其發端果是為何乃為正學今人讀孔孟書祇為榮肥計便是異端如何又闢異端又曰吾人須是自心作得主宰凡事只依本心而行便是大丈夫若為世味牽引依違從物皆妾婦道也又曰天理人欲誰氏作此分别儂反身細求只在迷悟間悟則人欲即天理迷則天理亦人欲也李士龍為講經社供奉一僧叟至㑹拂衣而出謂士龍子曰汝父以學術殺人奈何不諍又謂人曰都㑹講學乃擁一死和尚講佛經乎作此勾當成何世界㑹中有言良知非究竟宗㫖更有向上一著無聲無臭是也叟瞿然起立抗聲曰良知曽有聲有臭耶東崖語錄學者自學而已吾性分之外無容學者也萬物皆備於我而仁義禮智之性果有外乎率性而自知自能天下之能事畢矣性之靈明曰良知良知自能應感自能約心思而酬酢萬變知之為知之不知為不知一毫不勞勉强扭揑而用智者自多事也纔提起一個學字却似便要起幾層意思不知原無一物原自現成順明覺自然之應而已自朝至暮動作施為何者非道更要如何便是與蛇畫足意思悠逺襟懷洒落興趣深長非有得於養心之學未或能然道本無言因言而生解執解以為道轉轉分明翻成迷念良知之靈本然之體也純粹至精雜纎毫意見不得若立意要在天地間出頭做件好事亦是為此心之障王介甫豈不是要做好事只立意堅持愈執愈壞了鳥啼花落山峙川流饑食渴飲夏葛冬裘至道無餘藴矣充拓得開則天地變化草木蕃充拓不去則天地閉賢人隱人之性天命是已視聽言動初無一毫計度而自無不知不能者是曰天聽明於兹不能自得自昩其日用流行之真是謂不智而不巧則其學不過出於念慮億度展轉相尋之私而已矣豈天命之謂乎將議論講説之間䂓矩戒嚴之際工焉而心日勞勤焉而動日拙忍欲希名而誇好善持念藏穢而謂改過據此為學百慮交錮血氣靡寧孟子曰我固有之也非由外鑠我也今皆以鑠我者自學固有者為不足何其背哉天地以大其量山岳以聳其志冰霜以嚴其操春陽以和其氣大凡學者用處皆是而見處又有未融及至見處似是而用處似若不及何也皆坐見之為病也定與勘破竊以舜之事親孔之曲當一皆出於自心之妙用耳與饑來喫飯倦來眠同一妙用也人無二心故無二妙用其不及舜孔之妙用者特心不空而存見以障之耳不務徹其心之障而徒以聖人圓神之效畢竭精神恐其不似也是有影響之似之説問學何以乎曰樂再問之則曰樂者心之本體也有不樂焉非心之初也吾求以復其初而已矣然則必如何而後樂乎曰本體未嘗不樂今曰必如何而後能是欲有加於本體之外也然則遂無事於學乎曰何為其然也莫非學也而皆所以求此樂也樂者樂此學學者學此樂吾先子蓋嘗言之也如是則樂亦有辨乎曰有有所倚而後樂者樂以人者也一失其所倚則慊然若不足也無所倚而自樂者樂以天者也舒慘欣戚榮悴得喪無適而不可也既無所倚則樂者果何物乎道乎心乎曰無物故樂有物則否矣且樂即道樂即心也而曰所樂者心是牀上之牀也學止於是而已乎曰昔孔子之稱顔囘但曰不改其樂而其自名也亦曰樂在其中其所以喟然而與㸃者亦以此也二程夫子之聞學於茂叔也於此蓋終身焉而豈復有所加也曰孔顔之樂未易識也吾欲始之以憂而終之以樂可乎曰孔顔之樂愚夫愚婦之所同然也何以曰未易識也且樂者心之體也憂者心之障也欲識其樂而先之以憂是欲全其體而故障之也然則何以曰憂道何以曰君子有終身之憂乎曰所謂憂者非如世之膠膠然役役然以外物為戚戚者也所憂者道也其憂道者憂其不得乎樂也舜自耕稼陶漁以至為帝無徃不樂而吾獨否也是故君子終身憂之也是其憂也乃所以為樂其樂也則自無庸於憂耳人人本有不假外求故曰易簡非言語之能述非思慮之能及故曰黙識本自見成在我何須擔荷本無逺不至何須充拓㑹此言下便即了了斯道流布何物非真眼前即是何必等待略著些意便是障礙諸公今日之學不在世界一切上不在書册道理上不在言語思量上直從這裡轉機向自已没緣没故如何能施為作用穿衣喫飯接人待物分青理白項項不昧的叅來叅去自有個入處此非異學語蓋是爾本有具足的良知也先生在慿虛閣㑹講論一貫人各出見先生不應隨因某語觸發閧堂一笑先生曰此却是一貫布政徐波石先生樾徐樾字子直號波石貴溪人嘉靖十一年進士歴官部郎出仕臬藩三十一年陞雲南左布政使元江府土舍那鑑弑其知府那憲攻刼州縣朝議討之總兵沭朝弼廵撫石簡㑹師分五哨進𠞰那鑑遣經歴張惟至監軍僉事王養浩偽降養浩疑不敢徃先生以督餉至軍慨然請行至元江府南門外鑑不出迎先生呵問伏兵起而害之姚安土官高鵠力救亦戰没我兵連歲攻之不克㑹鑑死諸酋願納象贖罪世宗厭兵遂允之時人為之語曰可憐二品承宣使只值元江象八條傷罪人之不得也先生少與夏相才名相亞得事陽明繼而卒業心齋之門先生操存過苦常與心齋步月下刻刻簡黙心齋厲聲曰天地不交否又一夕至小渠心齋躍過顧謂先生曰何多擬議也先生過渠頓然若失既而歎曰從前孤負此翁為某費却許多氣力先生謂六合也者心之郛廓四海也者心之邊際萬物也者心之形色徃古來今惟有此心浩浩淵淵不可得而窮測也此心自朝至暮能聞能見能孝能弟無間晝夜不須計度自然明覺與天同流一入聲臭即是意念是己私也人之日用起居食息誰非天者即此是真知真識又從而知識之是二知識也人心之痛癢視聽無不覺者此覺之外更有覺乎愚不肖者未嘗離此為體奚謂不知不自知其用處是性故曰蠢動是以動處是覺覺處亦昏昧也此即現成良知之言以不犯做手為妙訣者也心齋嘗謂先生曰何謂至善曰至善即性善曰性即道乎曰然曰道與身孰尊身與道何異曰一也曰今子之身能尊乎否歟先生避席請問曰何哉夫子之所謂尊身也心齋曰身與道原是一件至尊者此道至尊者此身尊身不尊道不謂之尊身尊道不尊身不謂之尊道道尊身尊纔是至善故曰天下有道以道徇身天下無道以身徇道若以道徇人妾婦之道也已不能尊信又豈能使彼尊信哉先生拜而謝曰某甚慚於夫子之敎今以受降一事論之先生職主督餉受降非其分内冐昧一徃即不敢以喜功議先生其於尊身之道得有間矣波石語錄天命一也自道體之大而無外曰天自道體之運而無息曰命憲天者不違帝則知命者自率性真一盡其道者也不能自盡其道則是人也具形體而已矣是以有天人之分也天也命也豈别為一體吾可得追慕而企及之耶不過自求自得而已矣既自求自得而天也命也又果何所指耶神之無方可擬不曰天乎誠之無間可息不曰命乎是曰天命之謂性知者心之靈也自知之主宰言心自知之無息言誠自知之定理言性自知之不二言敬自知之莫測言神自知之渾然言天自知之寂然言隱自知之徧覆言費自知之不昧言學是故紀綱宇宙者知也知知者學也故曰致知焉徃古來今上天下地統名曰道是道在人統名曰心故曰人者天地之心既曰天地之心以言乎天地之間則備矣而何我何萬物乎哉二之則有外有外則非一不一則私矣非道也不道一則非人矣不知一則非道矣不志一則非學矣孟子曰不慮而知夫曰不慮而知若固物然匪一也而能若是乎神哉陽明先生曰致良知者此知即一此知本神知之不昧是曰致矣噫先生之言至矣哉道也者性也非率性則道其所道者也先儒輩出皆知宗性學矣而知性者或寡矣則其用工不能自得其天命之真亦性其所性者也若夫豪傑則立志直希孔孟何暇竊似弄影於依稀假借之地以聞見推測為知念慮追責為學䂓矩模倣為習是皆外襲者非性也孟軻氏没而知學者鮮矣聖賢敎來學率性而己人之動靜食息仁義禮智靈明之德感通皆以時出而名立焉無有不感通無有不停當自晝而暮自少而老者也此天命之性如此是智之事智譬則巧而不能使人者須自得也自得之學於良知之自朝而暮能聞能見能孝能弟無間晝夜不須計度自然明覺是與天同流者非天命而何能自信天命之真而自安其日用之常是則渾然與天地合德矣是謂喜怒哀樂未發之中而允執之矣顔子之學盡是矣周子所謂一為要程明道所謂廓然大公物來順應不須防檢不須思索孟子曰性善者皆是也如此則曰知止而後有定夫六合也者心之郛廓四海也者心之邊際萬物也者心之形色徃古來今惟有此心浩浩淵淵不可得而窮測也而曰誠神幾曰性道敎如此曰知止此知之體冲虛無朕曰中感應中節曰和知則率性而已豈不至易良能而已豈不至簡聖人不得而見之有志者蓋寡矣聖學惟無欺天性聰明學者率其性而行之是不自欺也率性者率此明德而已父慈子孝耳聰目明天然良知不待思慮以養之是明其明德一入思擬一落意必則即非本然矣是曰自欺也先師陽明先生只提致良知為古今叅同蓋以此也先生深於自得者也自信此知即性也曰知者自靈明言曰性者自不息言妙用無端條理密察曰理靈明者此覺也聲臭俱無神聖莫測曰明曰誠體以知名有知無體理本用顯仁義由名故曰為能聰明睿知則溥博淵泉而時出之寛裕温柔齊莊中正時出而名之者也語其體固聰明睿知是已疑吾道特足以經政撫時而不知其定性立命之奧將謂二氏有密敎也而不知人者天地之心得其心則天地與我同流混闢之化相與終始亦何以惑死生乎易曰原始返終故知死生之説其説也謂形有始終耳而性即命也何始終乎故君子盡性則至命矣不知求作聖之學何以望此道之明而自立人極也哉人之所以為貴者此性之靈而已矣惟靈也故能聰能明能幾能神能謙能益能剛能柔卷舒變化溥博高明出入乎富貴貧賤之境參酌乎徃來消息之時安然於飲食居處怡然於孝悌忠信伊尹以天民之先覺而覺天下者覺此靈明之性而已必自覺矣而始可以語得也孟子指怵惕之心於乍見入井之頃即伊尹覺天下之心也孔孟之學堯舜之治舉求諸心焉而已心外無事矣求事也者或逐事而二心求心也者以言乎天地之間則備矣是心也即萬物化也自聖人以至愚夫一者也知天下國家皆我也是曰知心知天地萬物皆心也是曰知學盡心則萬物備我我者萬物之體萬物者我之散殊一物不得其所則將誰委乎曰我不能則自欺其知曰物難盡則自離其體是皆自私自是者之見不責躬而責人不求諸心而求諸事非盡心之謂也告子固有義外之非矣伊川曰在物為理何以異於義外哉子莫固有執中之陋矣伊川曰堂之中為中國之中為中何以異於執一哉信理在外也何以曰感而遂通天下之故信中可擬而明也何以曰故神無方而易無體學所以明道也道者率性而已耳目之無不覩聞者聰明則然也父子之無不愛親者慈孝則然也是固若大路然而民生日用不能不由之者也然道即聰明慈孝也顔子之仰鑽瞻忽何為而歎其難道信高矣美矣孟子曰徐行後長何為而指其近問以堯舜事業為一㸃浮雲只是所性不存之意曰浮雲語適然也做到時雍風動處聖人皆順應而我無與此正是允執厥中問氣清則通清極則神恐神不可以言氣也何如曰運動者曰氣虛靈者曰神皆擬而名之者也不神則無物矣誰其運動學而未至無欲則思雜雜則不清雜則不神非二也問朱子謂朝廷若要恢復中原須要罷了三十年科舉此説如何曰謂須得真才可圖恢復必須學術中來今日卓越之資皆溺習於科舉而不知返噫弊而害也久矣誠正之學不講如人才何問知涵養而不務講求將認欲作理則如之何曰如認欲作理則涵養箇甚講求正精察乎理欲而存乎此心者也這學問中自不能缺一的莫認講求作談天説地也問五行之生也各一其性似指氣質之性而言何如曰五行隂陽一太極也一而未嘗不殊殊而未嘗不一也猶人也耳目口鼻未嘗可同見聞覺知未嘗有二心也質者性之器氣者性之運孰得而二之而離之者哉若曰天地之性又曰有氣質之性則誤矣百姓日用莫非天命之流行但無妄即誠也知此則入道有門矣問銓司選官避嫌者皆是私心若係其親子弟如何不避嫌得曰人心虛靈别嫌明微乃時措妙用若此等商量自著不得此皆有欲之心從格套中商量而求其可豈義之與比若此等心避不避皆私也問理性命章萬一各正如何謂之各正曰各賦此理而生蠢動與人靈性各具是天命無二也品物之殊曰萬均得所賦曰各正敎諭王一菴先生棟王棟字隆吉號一菴泰州人從事心齋嘉靖戊午由歲貢授南城訓導轉泰安陞南豐敎諭所至以講學為事先生之學其大端有二一則稟師門格物之㫖而洗發之言格物乃所以致知平居未與物接只自安正其身便是格其物之本格其物之本便即是未應時之良知至於事至物來推吾身之矩而順事恕施便是格其物之末格其物之末便即是既應時之良知故致知格物不可分析一則不以意為心之所發謂自身之主宰而言謂之心自心之主宰而言謂之意心則虛靈而善應意有定向而中涵自心虛靈之中確然有主者名之曰意耳昔者先師蕺山曰人心徑寸耳而空中四達有太虛之象虛故生靈靈生覺覺有主是曰意故以意為心之所發為非是而門下亦且齗齗而不信於是有答董標心意十問答史孝服商疑逮夢奠之後惲日初為劉子節要尚將先師言意所在節去之真索解人而不得豈知一菴先生所論若合符節先生曰不以意為心之所發雖自家體驗見得如此然頗自信心同理同可以質諸千古而不惑顧當時亦無不疑之然其久於門下者不能以釋然下士聞道而笑豈不然乎周海門作聖學宗傳多將先儒宗㫖凑合己意埋没一菴又不必論也王一菴先生語錄陽明先生提掇良知二字為學者用功口訣真聖學要㫖也今人只以知是知非為良知此猶未悟良知自是人心寂然不動不慮而知之靈體其知是知非則其生化於感通者耳良知無時而昧不必加知即明德無時而昏不必加明也大學所謂在明明德只是要人明識此體非刮去其昏如後人磨鏡之喻夫鏡物也心神也物滯於有迹神妙於無方何可論比故學者之於良知亦只要識認此體端的便了不消更著致字先師云明翁初講致良知後來只説良知傳之者自不察耳先師以安身釋止至善謂天下國家之本在身必知止吾身於至善之地然後身安而天下國家可保故止至善者安其身之謂也欲安其身則不得不自正其身其有未正又不容不反求諸身能反身則身無不正身無不正則處無不安而至善在我矣古今有志於明德親民而出處失道身且不保者不明止至善之學故也先師之學主於格物故其言曰格物是止至善工夫格字不單訓正格如格式有比則推度之義物之所取正者也物即物有本末之物謂吾身與天下國家之人格物云者以身為格而格度天下國家之人則所以處之之道反諸吾身而自足矣舊謂意者心之所發敎人審幾於動念之初竊疑念既動矣誠之奚及蓋自身之主宰而言謂之心自心之主宰而言謂之意心則虛靈而善應意有定向而中涵非謂心無主宰頼意主之自心虛靈之中確然有主者而名之曰意耳大抵心之精神無時不動故其生機不息妙應無方然必有所以主宰乎其中而寂然不動者所謂意也猶俗言主意之意故意字從心從立中間象形太極圈中㸃以主宰乎其間不著四邊不頼倚靠人心所以能應萬變而不失者只縁立得這主宰於心上自能不慮而知不然孰主張是孰綱維是聖狂之所以分只争這主宰誠不誠耳若以意為心之發動情念一動便屬流行而曰及其乍動未顯之初用功防慎則恐怳忽之際物化神馳雖有敏者莫措其手聖門誠意之學先天易簡之訣安有此作用哉誠意工夫在慎獨獨即意之别名慎即誠之用力者耳意是心之主宰以其寂然不動之處單單有個不慮而知之靈體自做主張自裁生化故舉而名之曰獨少間攙以見聞才識之能情感利害之便則是有所商量倚靠不得謂之獨矣世云獨知此中固是離知不得然謂此個獨處自然有知則可謂獨我自知而人不及知則獨字虛而知字實恐非聖賢立言之精意也知誠意之為慎獨則知用力於動念之後者悉無及矣故獨在中庸謂之不覩不聞慎在中庸謂之戒慎恐懼慎本嚴敬而不怠之謂非察私而防雜者也慎獨註云謹之於此以審其幾後儒因謂審察心中幾動辯其善惡而克遏之如此用功真難凑泊易大傳曰君子上交不諂下交不凟其知幾乎幾者動之微吉之先見者也則幾字是交際事幾上見非心體上有幾動也心體上有幾動則是動於念楊慈湖所以謂之起意而非大學中庸所謂獨也大傳又曰夫易聖人所以極深而研幾也朱子解云所以極深者至精也所以研幾者至變也以變釋幾非事幾乎後又謂於心幾動處省檢而精察之以是為研謬亦甚矣問遺錄一詩言念頭動處須當謹似亦以意為心之所發如何曰謹念是戒其莫動妄念非於動後察善惡也亦是立定主意再不忘動之義且予所謂意有主意非自泛然各立一意便可言誠蓋自物格知至而來乃決定是修身立本之主意也中庸即曰誠身孟子即曰反身而誠不本諸身便是妄了不以意為心之所發雖是自家體驗見得如此然頗自信心同理同可以質諸千古而不惑豈以未嘗聞之先師而避諱之哉象山謂在人情事變上用功正孟子必有事焉之意必有事焉非謂必以集義為事言吾人無一時一處而非事則亦無一時一處而非心無一時一處而非心則亦無一時一處而非學故凡日用動静云為一切人情事變孰非吾心性中所有之事孰非職分内當為之事故謂之必有事焉猶言須臾離事不得件件隨知順應而不失其宜是則所謂集義者也故孟子以後能切實用功而不渉於虛想虛見虛坐虛談者無如象山明翁初講致良知曰致者至也如云喪致乎哀之致其解物格知至曰物格則良知之所知者無有虧缺障蔽而得以極其至矣觀此則所謂致良知者謂致極吾心之知俾不欠其本初純粹之體非於良知上復加致也後因學者中徃徃不明致字之義謂是依著良知推致於事誤分良知為知致知為行而失知行合一之㫖故後只説良知更不復言致字今明翁去久一時親承面命諸大名賢皆相繼逝海内論學者靡所稽慿故有虛空冐認良知以為易簡超脫直指知覺凡情為性混入告子釋氏而不自知則不言致字誤之也二者之間善學者須㑹取或疑心翁以格物為反身之學用於應事接物時甚好但若平居未與物接只好説個良知更有何物可格曰格物原是致知工夫作兩件拆開不得故明翁曰致知實在於格物格物乃所以致知可謂明矣且先師説物有本末言吾身是本天下國家為末可見平居未與物接只自安正其身便是格其物之本格其物之本便即是未應時之良知至於事至物來推吾身之矩而順事恕施便是格其物之末格其物之末便即是既應時之良知致知格物可分拆乎况先師原初主張格物宗㫖只是要人知得吾身是本專務修身立本而不責人之意非專零零碎碎於事物上作商量也夫何疑哉問前輩多言敬則中心有主今曰誠意則心有主將主敬不如主誠乎曰不然誠與敬俱是虛字吾非謂誠能有主謂誠此修身立本之意乃有主也誠字虛意字實譬如方士説丹意是鉛永丹頭誠則所謂文武火候而已又通考之北宮黝之有主是主必勝孟施舍之有主是主無懼曾子聞大勇於夫子是主自反而縮孟子之異於告子是主行慊於心皆必有一件物事主宰於中乃有把柄今只徒言敬則中心有主不知主箇甚麽將以為主箇敬字畢竟懸空無附著何以應變而不動心乎吾輩今日格物之學分明是主修身之立本誠意是所以立之之功不須説敬而敬在其中蓋自其真實不妄之謂誠自其戒慎不怠之謂敬誠則敬敬則誠其功一也又程子嘗言學者先須識仁識得此理以誠敬存之而已這便是以仁為主誠敬是所以存之之功究竟來孔之言縮孟之言慊程之言仁皆與大學修身為本統脈相承若合符節思之當自躍然學者一得良知透露時時處處昭朗光耀諸所動作皆在知中故曰蓋有不知而作者我無是也茍此天性真知不能徹底皎潔而藉見聞為知則不過知之次者耳聖人原不藉見聞為知故其敎人也雖鄙夫有問皆可叩兩端而竭焉先儒發變化氣質之論於學者極有益但若直從氣質偏處矯之則用功無本終難責效故只反身格物以自認良知尋樂養心而充滿氣和則自然剛暴者温柔懦者立驕矜者㢲簡傲者謙鄙吝者寛惰慢者敬諸所偏重咸近於中矣以是知學必涵養性源為諸本而以氣質變化為徵驗自責自修學之至要今人詳於責人只為見其有不是處不知為子而見父母不是子職必不共為臣而見君上不是臣職必不盡他如處兄弟交朋友畜妻子茍徒見其不是則自治已疎動氣作疑自生障礙幾何不同歸於不是哉有志於為已者一切不見人之不是然後能成就一個自家是子貢謂夫子之言性與天道不可得而聞蓋夫子敎人只在言動事為上從實理㑹而性天之妙自在其中故曰下學而上達更不懸空説個性與天道使人求高求逺學者理㑹得時則夫子之文章何者不是性天之流行外文章而别求性天則妄矣吾人今日何可汲汲於談天説性而失孔門敎化之常問如何是安靜以養微陽曰詩云小心翼翼昭事上帝只時謹慎保守此個靈根常是閒閒静静欣欣融融便是得其所養今人只要向外馳騁安得陽長隂消且如人一時収攝精神略見虛明光景便將平日才智襯貼起來多聞見者馳騁於聞見能立事功者馳騁於事功善作詩者馳騁於詩㑹寫字者馳騁於字以至要立門户要取功名等等恢宏皆作勞攘精神逐外白日鬼迷當如陽復何哉楊墨之差易見故自孟子一辨之後無人復入其門鄉愿媚世盜名雖間有人效之然亦自省有愧高明有志之士自不屑為獨告子之學近似率真坑陷多少有志好學人豪鶻鶻􅋓􅋓撞入其門恬不為怪此其為害特深至今不息也凡今之不肯精細入思從容中道而但任氣作用率意徑情且侈號於人曰吾自良知妙用矣管甚人是人非吾自性天流行矣管甚無破無綻少循規矩則謂之拘執道理少盡報施則謂之陪奉世界凡若此者謂非告子不求於心不求於氣之學乎嗚呼安得起孟子於九原而辨正之也一友聞格物之説喜曰看來格物二字只是個致知底致字曰然曰學既明白如此須作第一事榦庶不虛負所聞曰作第一事還有第二第三須是看得事即學學即事日用間一切動静云為總只是這一個學方是無間斷無歇手處友乃躍然庸德庸言是小小尋常言行無甚關係時節今人之所忽處正古人之所謹處故學必於微小去處不少放過方始入精一友好直己之是語之曰是非之在人心自明自辨何須自家理直子直其是誰肯認非此余少時害過切骨病痛曽記與林東城論一事於舟中余明辨自已之是東城則渾厚莫辨謂辨得自已極是不難為了别人予執滯不能服時李天泉在坐兩解之曰二公皆是也渾厚則仁之意多辨明則義之意多予曰巧哉仁可以該義義不可以該仁吾二人之優劣既較然矣何得謂皆是乎東城大笑曰公依舊又在這裏辨個優劣要做甚麽公可謂只是生薑樹上生但自此吾當進於明辨公亦當進於渾厚則彼此俱有益耳予於是始大悟其差亟起謝敎自是悔改數十年來不敢不渾厚也易傳曰天下何思何慮非敎人一切不思慮也學而不思則罔心之官則思慎思研慮皆學者用功所在安得糊塗易傳之意蓋言天下之理同歸而塗自殊一致而慮自百我這裡真是廓然大公則自然物來順應我這裡真是寂然不動則自然感而遂通更有何事可思何物可慮而有待於計較安排者耶今不玩本章全文而截其何思何慮四字欲人槁木死灰其心於一切無所思慮之地豈理也哉或云此是聖人地位亦伊川發得太早之説也㑹得時何思何慮正吾人為學切近工夫蓋必實見得天性良知果是自能感通自能順應果是無絲毫巧智復有待於計較安排此方是真機妙用真性流行而内外兩忘澄然無事矣不然終日應酬都只是憧憧徃來自私用智何足以言學乎不識不知然後能順帝之則今人只要多増聞見以廣知識攙雜虛靈真體如何順帝則乎蓋人有知識則必添却安排擺布用智自私不能行其所無事矣故曰所惡於智者為其鑿也程子曰明得盡渣滓便渾化此格言也然不必質美者能之良知本體人人具足不論資質高下亦不論知識淺深信得及悟得入則亦明得盡矣有不能者百倍其功終有明盡時節到得明盡便亦都無渣滓所謂明則誠也學者但當盡力此明不必更求其次只緣當時説箇其次惟莊敬以持養之遂使無限英雄不敢自任質美從事於渾化之功但擇取其所謂次者而終身用力焉所謂明盡只是認得良知的確無遮蔽處耳聖人神化之精不出於上交不諂下交不凟之兩言吾先師論明哲保身亦不出於愛敬之一道若他人論幾論哲必著𤣥微奧妙之辭愈深逺而愈不實矣或問本體曰體用原不可分良知善應處便是本體孔門論學多就用處言之故皆中正平實後儒病求之者逐事支離不得其要從而指示本體立論始微而高虛𤣥逺之蔽所自起矣由仁義行自是良知天性生機流出不假聞見安排行仁義者遵依仁義道理而行不由心生者也一是生息於中一是襲取於外二者王覇聖凡之别非安勉生熟之分也聖人所不知不能即愚夫愚婦與知能行之事心不在焉須知不在何處人言心要在腔子裏心茍在腔子裏面則凡腔子之外可盡無心耶夫心之本體静虛無物則為不放失無在而無不在也若或一有所著馳於彼則不存於此有所在則有所不在矣此之謂不在古人好善惡惡皆在已身上做工夫今人好善惡惡皆在人心作障礙程子每見人静坐便道善學善字當玩如云魯男善學柳下惠一般學本不必静坐在始學麄心浮氣用以定氣凝神可也周子主静之説只指無欲而言非静坐也今人謬以静坐養心失之逺矣問欲致良知必須精察此心有無色貨名利之私夾雜方是源頭潔浄曰此是以良知為未足而以察私補之也良知有潔浄而無私不必加察俱要認得良知真爾不認良知而務察其私其究能使色貨名利之私一切禁遏而不得肆乎安望廓清之有日哉問閒思襍慮何以却之曰聖人之聖不必論此心之生機頃刻不息所謂出入無時莫知其鄉是其神明不測自合如此若一槩盡欲無之必求至於杳然無念非惟勢有不能即能之正所謂槁木死灰自絶其生生不息之機而可乎但不必思閒慮襍徒自勞攘耳一友覓有過言愧悔不樂曰莫煩惱前頭失處且喜樂今日覺處此方是見在真工夫煩惱前頭失處尚在毁譽上支持未復本體喜樂見在覺處則所過者化而真體已呈露矣二者相去不亦逺乎自古農工商賈業雖不同然人人皆可共學孔門弟子三千而身通六藝者纔七十二其餘則皆無知鄙夫耳至秦滅學漢興惟記誦古人遺經者起為經師更相授受於是指此學獨為經生文士之業而千古聖人與人人共明共成之學遂冺没而不傳矣天生我師崛起海濱慨然獨悟真宗孔孟直指人心然後愚夫俗子不識一字之人皆知自性自靈自完自足不假聞見不煩口耳而二千年不傳之消息一朝復明矣誠意問答歲在庚午春王正月芝蘭獨茂苔草争妍梴偶侍側一菴夫子起而歎曰格物之學已信於人人矣誠意以心之主宰言不猶有疑之者乎梴曰豈特他人疑之雖以梴之乆於門下者亦不能以釋然蓋以意為心之所發則未發為心之本體心意有所分别而後誠正不容混也先儒謂心如榖種意其所發之萌芽矣乎師曰子知榖之萌芽已發者為意而不知未發之中生生不息機莫容遏者獨不可謂之意乎梴曰己發之和即有未發之中者在亦嘗聞之矣然大學一書專在情上理㑹故好惡足以括之意之所在非好則惡意不近於情耶師曰意近乎志即經文之所謂有定也行者之北之南必須先有定主意定而後静且安則修身矣梴曰嘗與呉友三江論人之視聽言動莫非吾意之所運視聽言動必以禮則亦莫非吾誠之所在也故大學誠意即中庸誠身似於師説近之乎然以意近乎志古者十五志於大學豈待格物之後而志始立耶師曰志意原不相逺語錄嘗言之矣惟學貴知本誠身誠意固一也然不知誠意以修身為國家天下之本則則身不止於至善而每蹈於危險之地矣身且不保而况於保家保國保天下乎今人知格物反己之學而猶不免於動氣責人者只為修身主意不誠如果真誠懇惻凡有逆境惟知責己而不知責人是於感應不息上用工不然斷港絶河棄交息逰而非聖人運世學矣梴曰言之至此心體洞然自知格致處事議事頗有究竟而不容少有所混然以之處人亦然今聞師訓庶有所悔而改乎但感應不息上用功吾儒之所以異於二氏者正在於此却當於心體上著力豈宜於效驗上較之耶師曰心迹一而後知吾儒之妙非二氏可及也若人情有感必應則恒人皆能處之矣惟感之而不應而吾之所以感之者惟知自盡其分而不暇於責人望人而後謂之學無止法為人父止於慈不當因其子之賢愚而異愛為人子止於孝不當因其父之寛嚴而異敬君臣朋友皆然一求諸身而無責人之妄念是之謂反身而誠樂莫大焉蓋反身則此心一而不二不二非誠乎樂即此之謂自謙也梴曰用力之方指示下愚當何所先乎師曰誠意工夫全在慎獨獨即意也此惟吾心一㸃生機而無一毫見聞情識利害所混故曰獨即中庸之所謂不覩不聞也慎即戒謹恐懼梴曰誠意之後正心之功亦大段著力不得譬之行者之南立定主意必期至南而止更無一毫牽引此誠也然至中途或有君上之召或有父兄之命則又當變通而不容泥滯落於有所正心之功其不滯而已乎師曰不滯亦是但能決定以修身立本為主意則自無念不必察私防欲心次自然廣大傳曰心廣體胖其㫖深哉茍不由誠意自慊而專務強正其心則是告子之學也烏足以語此梴曰論至於此學問雖有所受而體認則存乎人何前之苦析經文而不求實用哉梴之所以疑而信信而疑者蓋以世之主講者輒好異説以新聞見况朱子之學猶未可以輕議也常讀章句因其所發釋明德實其所發釋誠意又考諸小註意是主張恁也然則朱子皆非歟師曰朱子所註未為不是但後之學者遂分所發有善惡二端殊不知格致之後有善而無惡若惡念己發而後著力則猶恐有不及者矣梴曰禁於未發之謂豫發而後禁則扞格而不勝用力於未發者集義之君子自慊者也用力於已發者襲取之小人見君子而後厭然之類也吾人今日願為君子耶為小人耶當知所以自辯也但意之所主果屬將發未發之間乎未發則不得謂意矣師曰未發已發不以時言且人心之靈原無發之時當其發也必有寂然不動者以為之主乃意也此我所以以意為心之主宰心為身之主宰也子姑無言語求之久之自當有得門人李梴記銓部林東城先生春林春字子仁號東城泰州人家貧童子時傭於王氏王氏見其慧使與子共學刻苦自勵嘉靖壬辰舉㑹試第一除户部主事改禮部又改吏部請告歸起補郎中辛丑卒官年四十四先生師心齋而友龍溪當其始學日以朱墨㸃記其動念臧否醇雜久之乃悟曰此治病於標者也盍反其本乎自束髪至蓋棺未嘗一日不講學雖在吏部不以熱官避嫌襆被宿寺觀與同志終夜刺刺不休荆川曰子仁學幾二十年其膠解凍釋未知如何然自同志中語質行者必歸之羲觀其論學工夫綿密不渉安排不落睹聞明道之行所無事慈湖之不起意庶幾近之心齋之門未之或先也林東城集自驗接人雖寛大不忙而中心亦自有梗自省雖不敢隨俗計較而功名之念又不能忘故平時包裹之喻至此乃見其真近覺精神泄漏夢寐不清作事應物時有氣不順暢辭不合序人有受之不堪我亦悔之無及固知平時工夫不能實際以至如此然少知檢察則又矜持不泰無與物同春之意於心不化已亦不能容矣心齋先生語鄙人云當官以來子以為順事乎蓋未嘗自以為過也予曰然識有未盡勢有未能此則鄙人之過也夫子曰非是之謂也即舉乾卦六爻譬作六臣鄙人者屬九四躍龍云也龍而躍求自試者也故有許多責備之意形見之機若非自以為過而善補之鮮有不得其禍者予曰兢兢業業不敢放過惟以正自守不求人知不徇人意以正事之而已僅足支持夫子言之於吾心有戚戚也夫子曰是亦足矣未知合易而坦然行也使能知合易道不以為盡心不以為難處實實落落以為補過更覺精神予豁然有悟乃知從仕之難今始見其易易也為己之學不相假借無俟旁求饑食渴飲由我而已何嘗與於人知不知哉惟其為己之間又知已非我所得私亦有私之不可得者如善與人同舍己從人之類乃為真切何計人已之分耶道理無窮工夫不息望道未見聖人之心其道體本如是也使真有所得而守之將無所事於守矣惟聖人無所事守吾人尚有待於守也所謂不俟造作不必假借者如目自能視視之而已豈待加視而後明耳自能聽聽之而已豈待加聽而後聰心自能思思之而已豈待加思而後睿哉神明無待於外求直養自復其本體通乎晝夜之道而知者也近世學者不信本心具足惟於心外尋求聰明自用者失其本心修補粧綴者滯其實用久而忘返習以為常反曰學專在是真有孤聖門精一之㫖矣靜中體認吾人日用間意念起時無纎毫私見便是静便是制外也未發氣象此亦可觀非養至冥冥寞寞始可言静明覺即戒懼亦是工夫亦是本體初無所異必戒懼而後明覺則明覺時誰明覺也環溪主静静而無静可也否則打帖久而氣魄弱某人主動動而無動可也否則發散久而神識淺人心平日固有紛擾習染時心少不省察則逐逐相隨牽引無已或茫茫蕩蕩不知所極惟著察此念虛明在中舉無所著及事一觸從而應之不見其有不以為功久則自以為是者或自見其非假之外者亦自得於内真如冲漠無朕萬象森然文王望道未見此正心無私處茍有見而為之不免比合牽引落於聞見雖公亦私也所謂當理者心外無理理外無事事外無仁即心是理即理是事即事是仁一而已矣故仁者以天地萬物為一體既為一體則物之是非善惡如體之疾痛疴癢無不自知何理可當何心可私一見決矣近見此心無一物可見亦無工夫可著只如此平等做去一歩一歩一事一事自有條理自有不容己處無許多智識計較如天之廣大高明其間之生生化化者自不費手段也心果無事百體自舒雖造次顚沛亦自裕如不見有事如此則神完知藏自能應事亦自無不照者故真學不於照上論真惟於無照上致決果是無照即是真體耳自能聽目自能明心自能照何假纎毫氣力哉今為學者但於事事物物上起念如何作用乃是工夫據其自信亦曰用功証之於易亦曰研幾即是致知即是聖人矣不知此正生死之關誠偽之辨不可不察道無方體亦何形象故曰上天之載無聲無臭至矣此便是道便是工夫有不待人之用心而始凑合以此加彼云也求仁之功非認意見以為是則從遷就以為宜恐無思無為之體未能合一惟於一體求之果無見於人過而恐我愛之未深果無見於己是而恐躬行之未當兢兢業業日改月化以求一體之無私不計衆心之何若如此而己日來工夫惟於平等上實際做去更不加減分毫著纎毫氣力使精藏氣定智發心安若無所事事者蓋無道之可見亦無學之可名不求見解只依本色人雖不知吾自知之人雖不信吾自信之而已自心自信當下即得清明隨事自能泛應故曰清明在躬志氣如神言本心俱足萬化流行也後世學術只為自信不及苦心小而事大幾微之善不足以應之取益於傳記之言比擬於變通之跡事有近似者引之而强合道無方體者執之而等倫縱能凑合成章不免神氣消索物既不親我亦不化終與道為二也人心無迹何處著念感而遂通此乃真念故曰不必動念也使有念可動則未應之先念在何處既應之後念又何生寂然不動而已矣學者習染之深以著意為真切不知自喪其真以比擬為用功不知自迷其性道本無體亦不可見茍以有心而求終是有生有死有起有滅惟悟本來原無一物凡今日之聞見聰明皆障蔽之實況於世情物欲又其甚者乎明儒學案卷三十二
