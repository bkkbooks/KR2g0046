body:
  text: 明儒學案卷二十八餘姚黄宗羲撰楚中相傳學案楚學之盛惟耿天臺一派自泰州流入當陽明在時其信從者尚少道林闇齋劉觀時出自武陵故武陵之及門獨冠全楚觀徐曰仁同遊德山詩王文鳴應奎胡珊鳴玉劉瓛德重楊初介誠何鳳韶汝諧唐演汝淵龍起霄正之尚可攷也然道林實得陽明之傳天臺之派雖盛反多破壞良知學脈惡可較哉僉憲蔣道林先生信孝亷冀闇齋先生元亨楚中相傳學案僉憲蔣道林先生信蔣信字鄉實號道林楚之常德人少而端嚴盛暑未嘗袒裼不信形家術母歿自擇高爽之地以葬登嘉靖十一年進士第授户部主事轉兵部員外郎出為四川僉事興利除害若嗜欲有道士以妖術禁人先生召之術不復驗寘之於法陞貴州提學副使建書院二所曰正學曰文明擇士之秀出者養之於中而示以趨向使不汩沒於流俗龍塲有陽明祠置祭田以永其香火湖廣清浪五衛諸生鄉試去省險遠多不能達乃增貴州解額使之附試尋告病歸御史以擅離職守劾之削籍後奉恩例冠帶閒住先生築精舍於桃花岡學徒雲集遠方來者即以精舍學田廩之先生危坐其中絃歌不輟惟家祭始一入城間或出遊則所至迎請開講三十八年十二月庚子卒年七十七屬纊時作詩曰吾儒傳性即傳神豈向風塵滯此身分付萬桃岡上月要須今夜一齊明先生初無所師授與冀闇齋考索於書本之間先生謂大學知止當是識仁體闇齋躍然曰如此則定靜安慮即是以誠敬存之陽明在龍塲見先生之詩而稱之先生遂與闇齋師事焉已應貢入京師師事甘泉及甘泉在南雍及其門者甚衆則令先生分教之先生棄官歸甘泉遊南嶽先生從之彌月後四年入廣東省甘泉又八年甘泉再遊南嶽先生又從之是故先生之學得於甘泉者為多也先生初看論語與定性西銘領得萬物一體是聖學立根處三十二三時病肺至道林寺靜坐久之并怕死與念母之心俱斷一日忽覺洞然宇宙渾屬一身乃信明道廓然大公無内外是如此自身與萬物平等看是如此始知向來領會元是思索去黙識尚遠向來靜坐雖有湛然時節亦只是光景先生自此一悟於理氣心性人我貫通無二以為六經具在何嘗言有個氣又有個理凡言命言道言誠言太極言仁皆是指氣而言宇宙渾是一塊氣氣自於穆自無妄自中正純粹精自生生不息只就自心體認心是氣生生之心便是所言天命之性豈有箇心又有箇性此氣充塞無絲毫空缺一寒一暑風雨露雷凡人物耳目口鼻四肢百骸與一片精靈知覺總是此生生變化如何分得人我又曰宇宙只是一氣渾是一團太和中間清濁剛柔多少參差不齊故自形生形發五性感動後觀之知愚賢不肖剛柔善惡中自有許多不同既同出一個太和則智的是性愚者豈不是性善者是性惡者豈不是性孟子却又何故獨言性善此處非功夫與天命合一不能知也動而無動靜而無靜一動一靜之間是天命本體造化所以神者在此故功夫到得勿忘勿助即便是此體那純粹至善的頭􅆕便現出來便知性知天知柔知剛惻隱羞惡辭讓是非便隨感而應孟子言性善正是於此處見得又曰二五之精即是理無極之真原是氣無極之流行變易便為二五之精二五之精妙合而凝便乾道成男坤道成女化生萬物知二氣五行與男女萬物本自無而有則知中正仁義之極由靜而立先生既從一動一靜之間握此頭腦謂動而未形有無之間所謂㡬者聖賢戒慎恐懼正是於此精一用處即是體和處即是未發之中夫周子之所謂動者從無為中指其不冺滅者而言此生生不已天地之心也誠神幾名異而實同以其無謂之誠以其無而實有謂之㡬以其不落於有無謂之神先生以念起處為㡬念起則形而為有矣有起則有滅縱極力體當只在分殊邊事非先生約歸理一之㫖也先生之論理氣心性可謂獨得其要而工夫下手反遠之何也桃岡日録人除却血肉只有這一片精靈喚做心一動一靜之間正是這精靈元氣本體故心也者無知而無不知無為而無不為不當於心外更求知得此心者又是何物只須在天命上立根久則氣質自會融化天命上立根時時約氣質歸於一動一靜之間即氣質便是剛中柔中無聲無臭㡬矣若只就氣質上强治何時得他融化心亦是氣虚靈知覺乃氣之至精者耳心纔喜容色便喜纔怒容色便怒此便見心與氣貫通在未嘗二也浩然之氣與夜氣平旦之氣同乃指精靈之心而言智崇是心體高明處禮卑是應用中庸處智崇是理一處透徹禮卑是分殊處停當如釋氏見得本來是空亦是智崇却外人倫日用何處得禮卑古今賢者非無人倫日用處用功有個禮卑却於大本處未能見得便不是智崇合智禮乃是性之中正處中正乃可言天地合德要之聖學與釋氏智原是不同釋氏只要見一個空聖人却是於空處見萬物一體自身與萬物一例所以此心便無所不貫人倫日用何處容增減一毫故萬物一體之學即智崇便已天下歸仁即禮卑便是智之流行處非有二也聖賢之學全在好惡取舍上用力隨所好惡取舍此心皆不失其正便是存養盈天地間有形之物皆同此氣此性生生之機無物不可見子思獨舉鳶魚以生生之機即其飛躍尤易見也只順這生生之機日用百為無非天聰明用事明道語游楊二子曰且靜坐三字極有斟酌葢謂初學之心平日未嘗収拾譬如震盪之水未有寧時不教他黙坐何縁認得此心元來清淨湛一能為萬化根本認出來時自家已信得了方好教他就動處調習非是教人屏日用離事物做工夫乃是為初學開方便法門也赤子之心便是聖胎如何得不失須是戒慎恐懼知戒慎恐懼防非窒慾保守得這赤子時愛親敬長一㸃真切的心長在便自會生聰明睿智日漸純熟便自會由善信而美大美大而聖神充到萬物一體之極如堯舜光被四表亦只是元初愛親敬長真切的心非有别心譬如果核一㸃生意投之地便會長出根苖來這根苖便如赤子之心切不要傷害著他須是十分愛䕶這根苖便自會生榦生枝生葉生花實及長到參天蔽日千花萬實總只是元初根苖一㸃生意非别有生意曰赤子之心即可云未發之中否曰未發之中便已是寂然不動赤子如何説得寂然不動須是不失赤子之心則便是未發之中曰工夫全在不失上否曰不失即是知戒慎恐懼時時在幾上覺不然縁何會上逹曰朱傳似謂不失了此心然後能擴充以至於大如何曰擴充二字本出孟子只不失赤子之心便是擴充四端便是致曲便是慎獨孔孟之學至易至簡横渠言形而後有氣質之性須要善看葢其意謂剛柔合德者乃天命之性偏剛偏柔之性乃其形而後有者也善反之則剛中柔中之性存焉其曰氣質之性曰天命之性乃其言欠瑩處故不可不善看也後之儒者但泥其立言之失而不究其本㫖一誤百和遂以為真有天命之性有氣質之性若然則氣質者果非太和之用而天命者果超然於二氣五行之外乎凡看聖賢論學論義理處須是優柔厭飫久之乃能忽然覺悟到忽然覺悟却全不假思索安排矣强探力索即是邪思何縁有見惟用而不用乃是正思也虚無寂滅與權謀伯術皆是墮在一邊知有夜不知有晝知有晝不知有夜聖人從中道上行故終日有事實無一事終日有為實未嘗為情順萬事而無情此便是通乎晝夜之道而知忠恕是體用合一的心聖人言心皆是合體用處皆要學者於㡬上認心即用即體心是人之神氣之精靈知覺者也命之曰心本取主宰之義心之活潑潑處是性故性字從心從生指生生之心而言者也博文約禮不是兩段工夫總於念纔起動而未形處惟精惟一則二者一齊俱致矣禮是心之本體文是感通燦然處心元是純粹至善大學云止至善其實只在人止之耳失其止便如純陽之氣變而為陰了此便是惡故周子揭無欲二字為聖功之要非収拾此心到得動而無動靜而無靜處不得言無欲非無欲却何從見得性善宇宙只是一氣渾是一個太和中間清濁剛柔多少參差不齊故自形生神發五性感動後觀之知愚賢不肖剛柔善惡中如臯陶論九德孔子所言柴參師由偏處自有許多不同既同出一個太和則知的是性愚者豈不是性善者是性惡者豈不是性孟子却又何故獨言性善此處非功夫與天命合一不能知也動而無動靜而無靜一動一靜之間是天命本體造化所以神者在此故工夫到得勿忘勿助之間即便是此體那純粹至善的頭靣即便現出來便知性知天知柔知剛惻隱羞惡辭讓是非便隨感而應孟子言性善正於此處見得荀韓諸子不知性正由不知此一段學問工夫如今只須用功不須想像他如何工夫到得真黙處即識之矣蓋氣一分殊即分殊約歸動靜之間便是本體先儒却以善惡不齊為氣質性是理理無不善是氣質外别尋理矣言忠信便該了靈明言靈明豈能該得忠信今人喜説靈明把忠信只當死殺格子忠信是甚麽譬之水無絲毫泥滓十分澄澈便喚做忠信世間伶俐的人却將泥滓的水一切認作靈明六經具在何嘗言有個氣又有個理凡言命言道言誠言太極言仁皆是指氣而言宇宙渾是一塊氣氣自於穆自无妄自中正純粹精自生生不息謂之命謂之道謂之誠謂之太極總是這一個神理只就自心體認便見心是氣生生之心便是天命之性豈有個心又有個性問所當然所以然之説如何曰只一個心千事萬事總皆變化又何顯何微只形色便是天性心無時不動獨正是動而未形有無之間所謂㡬是也聖賢戒慎恐懼正是於此處精一此處精一即用處就是體和處就是未發之中六經並不曾空空説聖人之心如何様子都在事上見他心上面蒼然下面塊然中間萬象森然我此身却在空處立著這空處是甚麽都是氣充塞在無絲毫空缺這個便是天更向何處説天知眼前這空是天便知極四方上下往古來今渾是這一個空一個天無中邊無遠近亦便知眼前一寒一暑風雨露雷我此身耳目口鼻四肢百骸與一片精靈知覺總是這一個空生生變化世人隔形骸分爾汝隔藩墻分比鄰見得時便是剖破藩籬即大家已登堯舜孔子禹臯顔孟路上行矣何由見得収拾此心到黙處即是天聰明便照破矣故曰盡其心則知性知天磨礱細一番乃見得一番前日不認得是過處今日却認得是過見得理一又須理會分殊不獨理會分殊非聖門之㫖見得理一一言亦恐未盡學者若真實黙識得此體只要存更無事一片廣大的心自然做出無限精微四時行百物生萬古是如此這便是於穆不已即萬物觀之發生一番便又収歛収歛一番便又發生何曾一暫止息這於穆不已是甚麽是元氣如此故元氣者天之神理先儒謂陰陽是氣所以然者是理陰陽形而下太極形而上謂有氣别有理二之矣問何以五性感動遂有善惡曰人生而靜以上純粹至善觀四時行百物生豈容更説形生神發五性感動便已非動而無動靜而無靜神理本體便隨所禀剛柔不齊分數發出來所以有慈祥㢲順懦弱無斷邪佞嚴毅正固猛隘强梁許多不同故程子曰善惡皆天理謂之惡者本非惡然神理本體元只是無而已善學者約其情以復於靜則剛柔之氣皆變而復於中聰明睿智中正仁義出矣無欲即是盡心盡心是謂心無虧欠心無虧欠方説得心在二五之精即是理無極之真元是氣無極之真流行變易便為二五之精二五之精妙合而凝便乾道成男坤道成女化生萬物知二氣五行與男女萬物本自無而有則知中正仁義之極由靜而立此圖書言不盡言之深意有問動靜皆寂恐落空者曰似賢輩且落空亦不妨戒慎恐懼之念時時不息不待言行事見而後有謂之前定定即誠也戒慎恐懼乃是定時一㸃真念所謂主宰者便是孝亷冀闇齋先生元亨冀元亨字惟乾號闇齋楚之武陵人陽明謫龍塲先生與蔣道林往師焉從之廬陵踰年而歸正德十一年湖廣鄉試有司以格物致知發䇿先生不從朱註以所聞於陽明者為對主司奇而録之陽明在贑先生又從之主教濓溪書院宸濠致書問學陽明使先生往答之濠談王覇之略先生昧昧第與之論學而已濠拊掌謂人曰人癡一至是耶一日講西銘先生反復陳君臣之義本於一體以動濠濠大詫之先生從容復理前語濠曰此生大有膽氣遂遣歸濠敗忌陽明者欲借先生以陷之逮至京師榜掠不服科道交章頌寃出獄五日而卒在獄與諸囚講説使囚能忘其苦先生嘗謂道林曰贑中諸子頗能靜坐茍無見於仁體槁坐何益觀其不挫志於艱危信所言之非虛也癸未南宮發策以心學為譏餘姚有徐珊者亦陽明之門人不對而出先生之對與徐珊之不對一時兩高之而珊為辰州同知侵餉縊死時人為之語曰君子學道則害人小人學道則縊死人羞稱之所謂蓋棺論定者非耶明儒學案卷二十八
