body:
  text: 明儒學案卷四餘姚黃宗羲撰崇仁學案康齋倡道小陂一稟宋人成説言心則以知覺與理爲二言工夫則靜時存養動時省察故敬義夾持明誠兩進而後爲學問之全功其相傳一派雖一齋莊渠稍爲轉手終不離此矩矱也白沙岀其門然自叙所得不關聘君當爲别派於戲椎輪爲大輅之始層氷爲積水所成微康齋焉得有後時之盛哉聘君吳康齋先生與弼文敬胡敬齋先生居仁教諭婁一齋先生諒謝西山先生復鄭敬齋先生伉胡鳯儀先生九韶太常魏莊渠先生校侍郎余訒齋先生祐太僕夏東巖先生尚朴敎諭潘玉齋先生潤崇仁學案一聘君吳康齋先生與弼吳與弼字子傅號康齋撫州之崇仁人也父國子司業溥先生生時祖夢有藤繞其先墓一老人指為扳轅藤故初名夢祥八九歲已負氣岸十九歲永樂己丑覲親於京師金陵從洗馬楊文定溥學讀伊洛淵源錄慨然有志於道謂程伯淳見獵心喜乃知聖賢猶夫人也孰云不可學而至哉遂棄舉子業謝人事獨處小樓玩四書五經諸儒語錄體貼於身心不下樓者二年氣質偏於剛忿至是覺之隨下克之之功辛卯父命還鄉授室長江遇風舟將覆先生正襟危坐事定問之曰守正以俟耳旣婚不入室復命於京師而後歸先生往來粗衣敝履人不知其為司成之子也居鄉躬耕食力弟子從遊者甚衆先生謂婁諒確實楊傑淳雅周文勇邁雨中被簑笠負耒耜與諸生並耕談乾坤及坎離艮震兌㢲於所耕之耒耜可見歸則觧犂飯糲蔬豆共食陳白沙自廣來學晨光纔辨先生手自簸榖白沙未起先生大聲曰秀才若為懶惰即他日何從到伊川門下又何從到孟子門下一日刈禾鐮傷厥指先生負痛曰何可為物所勝竟刈如初嘗歎箋註之繁無益有害故不輕著述省郡交薦之不赴太息曰宦官釋氏不除而欲天下之治難矣吾庸出為天順初忠國公石亨汰甚知為上所疑門客謝昭效張觷之告蔡京徴先生以收人望亨謀之李文逹文逹為草疏上之上問文逹曰與弼何如人對曰與弼儒者髙蹈古昔明王莫不好賢下士皇上聘與弼即聖朝盛事遂遣行人曹隆至崇仁聘之先生應召將至上喜甚問文逹曰當以何官官與弼文逹曰今東宮講學需老成儒者司其輔導宜莫如與弼上可諭德召對文華殿上曰聞髙義久矣特聘卿來煩輔東宮對曰臣少賤多病杜迹山林本無髙行徒以聲聞過情誤塵薦牘聖明過聽束帛丘園臣實内愧力疾謝命不能供職上曰宮僚優閒不必固辭賜文幣酒牢命侍人牛玉送之舘次上顧文逹曰人言此老迂不迂也時文逹首以賓師禮遇之公卿大夫士承其聲名欵門求見而流俗多怪謗議蠭起中官見先生操古禮屹屹則羣聚而笑之或以為言者文逹為之觧曰凡為此者所以勵風俗使奔競干求乞哀之徒觀之而有愧也先生三辭不得命稱病篤不起上諭文逹曰與弼不受官者何故必欲歸需秋凉而遣之祿之終身顧不可乎文逹傳諭先生辭益堅上曰果爾亦難留乃允之先生因上十事上復召對賜璽書銀幣遣行人王惟善送歸命有司月廩之葢先生知石亨必敗故潔然髙蹈其南還也人問其故苐曰欲保性命而已己卯九月遣門生進謝表辛巳冬適楚拜楊文定之墓壬午春適閩問考亭以申願學之志己丑十月十七日卒年七十有九先生上無所傳而聞道最早身體力驗只在走趨語黙之間出作入息刻刻不忘乆之自成片叚所謂敬義夾持誠明兩進者也一切𤣥逺之言絶口不道學者依之真有途轍可循臨川章袞謂其日錄為一人之史皆自言已事非若他人以已意附成說以成說附已意泛言廣論者比顧涇陽言先生一團元氣可追太古之樸而世之議先生者多端以為先生之不受職因勅書以伊傅之禮聘之至而授以諭德失其所望故不受夫舜且厯試諸艱而後納於百揆則伊傅亦豈初命為相即世俗妄人無如此校量官爵之法而况於先生乎此陳建通記拾世俗無根之謗耳而薛方山憲章錄復仍其謬又謂與弟訟田裭冠蓬首短衣束裾跪訟府庭張廷祥有上告素王正名討罪豈容久竊虛名之書劉先生言予於本朝極服康齋先生其弟不簡私鬻祭田先生訟之遂囚服以質絶無矯餙之意非名譽心淨盡曷克至此然考之楊端潔傳易考先生自辭宮諭歸絶不言官以民服力田撫守張璝番禺人因先生拒而不見璝知京貴有忌先生者尹直之流欲壞其節行令人訟之久之無應者璝以嚴法令他人代弟訟之牒入即遣𨽻執牒拘之門人胡居仁等勸以官服往先生服民服從拘者至庭璝加慢侮方以禮遣先生無愠色亦心諒非弟意相好如初璝以此得内貴心張廷祥元禎始亦信之後乃釋然此為實錄也又謂跋石亨族譜自稱門下士顧涇凡允成論之曰此好事者為之也先生樂道安貧曠然自足真如鳯凰翔於千仞之上下視塵世曾不足過而覽焉區區總戎一薦何關重輕乃遂不勝私門桃李之感而事之以世俗所事座主舉主之禮乎且總戎之汰甚矣行路之人皆知其必敗而况於先生先生所為堅辭諭德之命意葢若將凂焉惟恐其去之不􅄩也况肯褰裳而赴自附於匪人之黨乎此以知其必不然也吳康齋先生語人須整理心下使敎瑩淨常惺惺地方好此敬以直内工夫也嗟夫不敬則不直不直便昬昬倒了萬事從此隳可不懼哉食後坐東窓四體舒泰神氣清朗讀書愈有進益數日趣同此必又透一關矣聖賢所言無非存天理去人欲聖賢所行亦然學聖賢者舎是何以哉日夜痛自㸃檢且不暇豈有工夫㸃檢他人邪責人密自治疎矣可不戒哉明德新民雖無二致然已德未明遽欲新民不惟失本末先後之序豈能有新民之效乎徒爾勞攘成私意也貧困中事務紛至兼以病瘡不免時有憤躁徐整衣冠讀書便覺意思通暢古人云不遇盤根錯節無以别利器又云若要熟也須從這裏過然誠難能只得小心寧耐做將去朱子云終不成處不去便放下㫖哉言也文公先生謂延平先生終日無疾言遽色與弼常歎何修而至此又自分雖終身不能學也文公先生又云李先生初間也是豪邁底人後來也是琢磨之功觀此則李先生豈是生來便如此蓋學力所致也然下愚末學苦不能克去血氣之剛平居則慕心平氣和與物皆春少不如意躁急之態形焉因思延平先生所與處者豈皆聖賢而能無疾言遽色者豈非成湯與人不求備檢身若不及之功效歟而今而後吾知聖賢之必可學而學之必可至人性之本善而氣質之可化也的然矣下學之功此去何如哉夜病卧思家務不免有所計慮心緒便亂氣即不清徐思可以力致者德而已此外非所知也吾何求哉求厚吾德耳心於是乎定氣於是乎清明日書以自勉南軒讀孟子甚樂湛然虛明平旦之氣略無所撓綠陰清晝薰風徐來而山林閴寂天地自濶日月自長邵子所謂心靜方能知白日眼明始㑹識青天於斯可驗與弼氣質偏於剛忿永樂庚寅年二十從洗馬楊先生學方始覺之春季歸自先生官舎紆道訪故人李原道於秦淮客舘相與㩦手淮畔共談日新與弼深以剛忿為言始欲下克之之功原道尋以告吾父母二親為之大喜原道吉安廬陵人吾母姨夫中允公從子也厥後克之之功雖時有之其如鹵莾滅裂何十五六年之間猖狂自恣良心一發憤恨無所容身去冬今春用功甚力而日用之間覺得愈加辛苦疑下愚終不可以希聖賢之萬一而小人之歸無由可免矣五六月來覺氣象漸好於是益加苦功遂日有進心氣稍稍和平雖時當逆境不免少動於中尋即排遣而終無大害也二十日又一逆事排遣不下心愈不悦葢平日但制而不行未有抜去病根之意反覆觀之而後知吾近日之病在於欲得心氣和平而惡夫外物之逆以害吾中此非也心本太虛七情不可有所放物之相接甘辛鹹苦萬有不齊而吾惡其逆我者可乎但當於萬有不齊之中詳審其理以應之則善矣於是中心灑然此殆克己復禮之一端乎蓋制而不行者硬苦以理處之則順暢因思心氣和平非絶無於往日但未如此八九日之無間斷又往日家和平多無事之時今乃能於逆境擺脫懼學之不繼也故特書於册冀日新又新讀書窮理從事於敬恕之間漸進於克已復禮之地此吾志也效之遅􅄩非所敢知澹如秋水貧中味和似春風靜後功力除閒氣固守清貧病體衰憊家務相纒不得專心致志於聖經賢傳中心益以鄙詐而無以致其知外貎益以㬥慢而何以力於行乎歲月如流豈勝痛悼如何如何數日家務相因憂親不置書程間斷胸次鄙吝甚可愧耻竊思聖賢吉㓙禍福一聽於天必不少動於中吾之所以不能如聖賢而未免動揺於區區利害之間者察理不精躬行不熟故也吾之所為者惠廸而已吉㐫禍福吾安得與於其間哉大凡處順不可喜喜心之生驕侈之所由起也處逆不可厭厭心之生怨尤之所由起也一喜一厭皆為動其中也其中不可動也聖賢之心如止水或順或逆處以理耳豈以自外至者為憂樂哉嗟乎吾安得而臻兹也勉㫋毋忽屢有逆境皆順而處枕上思在京時晝夜讀書不間而精神無恙後十餘年疾病相因少能如昔精進不勝痛悼然無如之何兼貧乏無藥調䕶只得放寛懷抱毋使剛氣得撓愛養精神以圖少長噫世之年壯氣盛者豈少不過悠悠度日誠可惜哉一事少含容則一事差當痛加克己復禮之功務使此心湛然虛明則應事可以無失靜時㴠養動時省察不可須􅁷忽也茍本心為事物所撓無澄清之功則心愈亂氣愈濁梏之反覆失愈逺矣觀近思錄覺得精神收斂身心檢束有歉然不敢少恣之意有悚然奮㧞向前之意晁公武謂康節先生隱居博學尤精於易世謂其能窮作易之本原前知來物其始學之時睡不施枕者三十年嗟乎先哲苦心如此吾輩將何如哉一日以事㬥怒即止數日事不順未免胸臆時生磊塊然此氣稟之偏學問之疵頓無亦難只得漸次消磨之終日無疾言遽色豈朝夕之力邪勉之無怠枕上思近來心中閒思甚少亦一進也寢起讀書柳陰及東窓皆有妙趣晚二次事逆雖動於中隨即消釋怒意未形逐漸如此楷磨則善矣大抵學者踐履工夫從至難至危處試驗過方始無往不利若舎至難至危其他踐履不足道也枕上黙誦中庸至大德必受命惕然而思舜有大德既受命矣夫子之德雖未受命却為萬世帝王師是亦同矣嗟乎知有德者之應則宜知無德者之應矣何修而可厚吾德哉上不怨天下不尤人君子居易以俟命小人行險以僥倖燈下讀中庸書此不肖恆服有效之藥也緩歩途間省察四端身心自然約束此又靜時敬也因㬥怒徐思之以責人無恕故也欲責人須思吾能此事否苟能之又思曰吾學聖賢方能此安可遽責彼未嘗用功與用功未深者乎况責人此理吾未必皆能乎此也以此度之平生責人謬妄多矣信哉躬自厚而薄責於人則逺怨以責人之心責已則盡道也因事知貧難處思之不得付之無奈孔子曰志士不忘在溝壑未易能也又曰貧而樂未易及也然古人恐未必如吾輩之貧夜讀子思子素位不願乎外及游呂之言微有得游氏居易未必不得窮通皆好行險未必常得窮通皆醜非實經厯不知此味誠吾百世之師也又曰要當篤信之而已從今安敢不篤信之也以事難處夜與九韶論到極處須是力消閒氣純乎道德可也倘常情一動則去道逺矣枕上熟思出處進退惟學聖賢為無弊若夫窮通得䘮付之天命可也然此心必半毫無愧自處必盡其分方可歸之於天欲大書何者謂聖賢何者謂小人以自警自今須純然粹然卑以自牧和順道德方可庶幾嗟乎人生茍得至此雖寒饑死刑戮死何害為大丈夫哉茍不能然雖極富貴極夀考不免為小人可不思以自處乎凡事誠有所不堪君子處之無所不可以此知君子之難能也胡生談及人生立世難作好人僕深味之嗟夫見人之善惡無不反諸已可也途間與九韶談及立身處世向時自分不敢希及中庸數日熟思須是以中庸自任方可無忝此生只是難能然不可畏難而苟安直下承當可也讀罷思債負難還生理蹇澀未免起計較之心徐覺計較之心起則為學之志不能專一矣平生經營今日不過如此况血氣日衰一日若冄茍且因循則學何可向上此生將何堪於是大書隨分讀書於壁以自警窮通得䘮死生憂樂一聽於天此心須澹然一毫無動於中可也倦臥夢寐中時時警恐為過時不能學也近晚往鄰倉借榖因思舊債未還新債又重此生將何如也徐又思之須素位而行不必計較富貴不淫貧賤樂男兒到此是豪雄然此心極難不敢不勉貧賤能樂則富貴不淫矣貧賤富貴樂與不淫宜常加警束古今幾人臻斯境也早枕思處世不活須以天地之量為量聖人之德為德方得恰好嗟夫安得同志共勉此事早枕思當以天地聖人為之凖則因悟子思作中庸論其極致亦舉天地之道以聖人配之葢如此也嗟夫未至於天道未至於聖人不可謂之成人此古昔英豪所以孜孜翼翼終身也人生但能不負神明則窮通死生皆不足惜矣欲求如是其惟慎獨乎董子云人之所為其美惡之極乃與天地流通往來相應噫天人相與之際可畏哉凡事須斷以義計較利害便非人須於貧賤患難上立得脚住克治麤㬥使心性純然上不怨天下不尤人物我兩忘惟知有理而已今日覺得貧困上稍有益看來人不於貧困上著力終不濟事終是脆愞熟思平生厯試不堪囘首間閱舊藁深恨學不向前身心荒怠可憂可愧今日所當為者夙興盥櫛家廟禮畢正襟端坐讀聖賢書收斂此心不為外物所汩夜倦而寢此外非所當計窮通夀夭自有命焉宜篤信之心是活物涵養不熟不免揺動只常常安頓在書上庶不為外物所勝應事後即須看書不使此心頃刻走作數日養得精神差好須節節接續去莫令間斷精白一心對越神明苟一毫不盡其道即是自絶於天夜大雨屋漏無乾處吾意泰然涵飬本源工夫日用間大得夜觀晦菴文集累夜乏油貧婦燒薪為光誦讀甚好為諸生授孟子卒章不勝感激臨寢猶諷詠明道先生行狀久之頑鈍之資為之惕然興起中堂讀倦遊後園歸絲桐三弄心地悠然日明風靜天壤之間不知復有何樂早枕痛悔剛惡偶得二句豈伊人之難化信吾德之不競遇逆境㬥怒再三以理遣葢平日自己無德難於專一責人况化人亦當以漸又一時過差人所不免嗚呼難矣哉中庸之道也枕上思晦菴文集及中庸皆反諸身心性情頗有意味昨日欲書戒語云温厚和平之氣有以勝夫㬥戾逼窄之心則吾學庶幾少有進耳今日續之云欲進乎此舎持敬窮理之功則吾不知其方矣蓋日來甚覺此二節工夫之切而於文集中玩此話頭益有意味也七月初五日臨鍾帖明窓淨几意思甚佳平生但親筆硯及聖賢圖籍則不知貧賤患難之在身也人之遇患難須平心易氣以處之厭心一生必至於怨天尤人此乃見學力不可不勉貧困中事事纒人雖則如此然不可不勉一邊處困一邊進學凡百皆當責已昨晚以貧病交攻不得專一於書未免心中不寧熟思之須於此處做工夫敎心中泰然一味隨分進學方是不然則有打不過處矣君子無入而不自得然是難事於此可以見聖愚之分可不勉哉凡怨天尤人皆是此闗不透耳先哲云身心須有安頓處葢身心無安頓處則日間擾擾於利害之中而已此亦非言可盡黙而識之可也晴窓親筆硯心下清凉之甚忘却一身如是之窘也康節云雖貧無害日髙眠月下詠詩獨歩綠陰時倚脩竹好風徐來人境寂然心甚平澹無康節所謂攻心之事昨日於文集中又得處困之方夜枕細思不從這裏過真也做人不得增益其所不能豈虛語哉日來甚悟中字之好只是工夫難也然不可不勉康節詩云拔山蓋世稱才力到此分毫强得乎處困之時所得為者言忠信行篤敬而已寄身於從容無競之境遊心於恬澹不撓之鄊日以聖賢嘉言善行沃潤之則庶幾其有進乎人之病痛不知則已知而克治不勇使其勢日甚可乎哉志之不立古人之深戒也男兒須挺然生世間夜坐思一身一家茍得平安深以為幸雖貧窶太甚亦得隨分耳夫子曰不知命無以為君子也先儒云道理平鋪在信乎斯言也急不得慢不得平鋪之云豈不是如此近來時時見得如此是以此心較之往年亦稍稍向定但眼痛廢書一年餘為可歎耳處大事者須深沉詳察看言行錄龜山論東坡云君子之所養要令㬥慢邪僻之氣不設於身體大有所省然志不能帥氣工夫間斷甚矣聖賢之難能也累日看遺書甚好因思二程先生之言真得聖人之傳也何也以其說道理不髙不低不急不緩温乎其夫子之言也讀之自然令人心平氣和萬慮俱消涵養此心不為事物所勝甚切日用工夫看朱子六十後長進不多之語怳然自失嗚呼日月逝矣不可得而追矣十一月單衾徹夜寒甚腹痛以夏布帳加覆略無厭貧之意閒遊門外而歸程子云和樂只是心中無事誠哉是言也近來身心稍靜又似進一歩近日多四五更夢醒痛省身心精察物理世間可喜可怒之事自家著一分陪奉他可謂勞矣誠哉是言也先哲云大輅與柴車較逐鸞鳯與鴟梟爭食連城與瓦礫相觸君子與小人鬭力不惟不能勝兼亦不可勝也學易稍有進但恨精力減而歲月無多矣即得隨分用工以畢餘齡焉耳讀奏議一篇令人悚然噫清議不可犯也今日思得隨遇而安之理一息尚存此志不容少懈豈以老大之故而厭於事也累日思平生架空過了時日與學者話久大概勉以栽培自已根本一毫利心不可萌也三綱五常天下元氣一家亦然一身亦然動靜語黙無非自己工夫看漚田晚歸大雨中途雨止月白衣服皆濕貧賤之分當然也靜坐獨處不難居廣居應天下為難事往往急便壊了胡文定公云世事當如行雲流水隨所遇而安可也毋以妄想􅆷真心客氣傷元氣請看風急天寒夜誰是當門定脚人看史數日愈覺收斂為至要人生須自重閒卧新齋西日明窓意思好道理平鋪在著些意不得彼以慳吝狡偽之心待我吾以正大光明之體待之詩云戰戰兢兢如臨深淵如履薄氷七十二歲方知此味信乎希賢之不易也夜靜卧閣上深悟靜虛動直之㫖但動時工夫尤不易云程子云五倫多少不盡分處至哉言也學至於不尤人學之至也吾聞其語矣未見其人也午後看陸宣公集及遺書易一親聖賢之言則心便一但得此身粗安頃刻不可離也憇亭子看收菜卧久見静中意思此涵養工夫也夜卧閣思朱子云閒散不是真樂因悟程子云人於天地間並無窒礙處大小咸快活乃真樂也無時無處不是工夫年老厭煩非理也朱子云一日未死一日要是當於事厭倦皆是無誠雖萬變之紛紜而應之各有定理明儒學案卷四
