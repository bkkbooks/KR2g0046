body:
  text: 明儒學案卷三十一餘姚黄宗羲撰止修學案見羅從學於鄒東廓固亦王門以下一人也而别立宗㫖不得不别為一案今講止修之學者興起未艾其以救良知之弊則亦王門之孝子也止修學案中丞李見羅先生材李材字孟誠别號見羅豐城人南京兵部尚書諡襄敏遂之子登嘉靖壬戌進士第授刑部主事厯官至雲南按察使金騰故患緬而孟養蠻莫兩土司介其間叛服不常先生用以蠻攻蠻之法遣使入蠻莫誘令合孟養襲迤西殺緬之心膂大朗長緬酋遂攻迤西孟養告急先生命将士犄角之土司大破緬於遮浪之上叩闕謝恩貢象二以功陞撫治鄖陽右僉都御史先生與諸生講學諸生因形家言請改叅将公署為書院遷公署於舊學許之事已定叅将米萬春始至萬春政府門生也嗾士卒為亂先生方視事擁入逼之守備王鳴鶴持刀向萬春厲聲曰汝殺李都爺我殺汝乃得免事聞先生閒住而萬春視事如故明年萬厯戊子雲南廵按蘇瓚逢政府之意劾先生破緬之役攘冐蠻功首級多偽有㫖逮問上必欲殺之刑部初擬徒再擬戍皆不聽言者強諍上持愈堅法吏皆震怖刑部郎中髙從禮曰明主可以理奪乃操筆為奏曰材用蠻敗緬不無闢地之功據掲申文自抵罔上之罪臣子報功失實死有餘辜君父宥罪矜疑人将効命天子視奏頗為色動長繋十餘年發戍閩中遂終於林下先生初學於鄒文荘學致良知之學己稍變其說謂致知者致其知體良知者發而不加其本體之知非知體也已變為性覺之說乆之喟然曰總是䑕遷穴中未離窠臼也於是拈止修兩字以為得孔曾之真傳止修者謂性自人生而静以上此至善也發之而為惻隠四端有善便有不善知便是流動之物都向已發邊去以此為致則日逺於人生而静以上之體攝知歸止止於人生而静以上之體也然天命之真即在人視聽言動之間即所謂身也若刻刻能止則視聽言動各當其則不言修而修在其中矣使稍有出入不過一㸃簡提撕修之工夫使之常歸於止而已故謂格致誠正四者平鋪四者何病何所容修茍病其一隨病隨修著書數十萬言大指不越於此夫大學修身為本而修身之法到歸於格致則下手之在格致明矣故以天下國家而言則身為本以修身而言則格致又其本矣先生欲到歸於修身以知本之本與修身為本之本合而為一終覺齟齬而不安也性情二字原是分析不開故易言利貞者性情也無情何以覓性孟子言惻隠羞惡辭讓是非即是仁義禮智非惻隠羞惡辭讓是非之上又有一層仁義禮智也虞廷之言道心即中也道心豈中之所發乎此在前賢不能無差先生析之又加甚耳即如先生之所謂修亦豈能舍此惻隠羞惡辭讓是非之可以為主宰者而求之杳㝠不可知者乎上天之載無聲無臭至矣此四端者亦曽有聲臭乎無聲無臭猶不足以當性體乎猶非人生而静以上乎然則必如釋氏之所謂語言道斷父母未生前而後可以言性也止修兩挈東瞻西顧畢竟多了頭而若單以知止為宗則攝知歸止與聶雙江之歸寂一也先生恐其隣於禪寂故實之以修身若單以修身為宗則形色天性先生恐其出於義襲故主之以知止其實先生之學以止為存養修為省察不過换一名目與宋儒大段無異反多一張皇耳許敬菴曰見羅謂道心人心總皆屬用心意與知總非指體此等立言不免主張太過中固是性之至徳舍道心之㣲更從何處覓中善固是道之止宿離心意與知却從何處明善性無内外心亦無内外體用何從而分乎髙忠憲曰大學格致即中庸明善所以使學者辨志定業分剖為己為人之界精研義利是非之極要使此心光明洞逹無毫髪含糊疑似於隠㣲之地以為自欺之主不然非不欲止欲修而氣禀物欲拘蔽萬端皆緣知之不至也工夫喫𦂳沉著豈可平鋪放在說得都無氣力兩公所論皆深中其病有言先生出獄戍閩仍用督府威儀敬菴撫閩城外迎之勞問垂涕頃之正色曰䝉聖恩得出猶是罪人當貶損思過奈何一路震耀豈待罪之體先生艴然曰迂濶盖先生以師道自任不因患難而改不知者謂其不忘開府門面則失之矣論學書百歩激於寸括燕粤判於庭除未有種桃李而得松柏之實者毫釐千里此學之宗趣所以必謹其初也大學之所以先知止程門之所以先識仁者其意亦由此也乎故嘗以為合下的工夫即是到底的學問到底的學問只了結得合下的工夫自昔聖賢懇懇諄諄分漏分更辨析研窮者豈有他事只是辨此毫釐耳上徐存齋捉定修身為本將一副當精神儘力倒歸自己凝然如有持屹然如有立恍然常若有見翼翼小心昭事上帝上帝臨女母貳爾心視聽言動之間時切簡照提撕管歸於則自然嗜欲不得干狂浪不得奪常止常修漸近道理切不可將本之一字又作懸空之想啟卜度支離之證於坦平地無端横起風波躭延歳月所云月在澄潭花存明鏡急切撈摸不著者正坐此病也答弟孟乾精神兩字去本體尚隔一層心之精神謂之聖先輩謂非孔子之語今人動欲辨體只為一向以知為體故槩以游揚活潑者當之此程伯子所以謂認得時活潑潑地認不得時只是弄精魂也答朱汝欽挈出修身為本齊家不作家想治國不作國想平天下不作天下想自然意念不分漸近本地答丁重甫大率一到發靈後終日終夜只是向外馳走聞聲隨聲見色隨色即無聲色在前亦只一味思前忖後所以去性轉逺故就性一步則無非善者無非正者離性一歩反是答李汝潜六經無口訣每謂只有艮其背一句其實即是知止但大學說止善似止無定方易說艮背似止有定所以背為頑然不動之物如宋儒之說未足以盡艮背之妙因而指曰隂方名曰北極如世所云又不免落於虚元之見予嘗看剝復兩卦同為五隂一陽但陽在内能為主則隂無不從陽者故為復陽在外不能為主則隂無不消陽者故為剝如隂陽内外之辨而知止之妙可得識剝復消長之機而艮背之理可求艮背者非專向後只是一個復暫復為復常復為艮晦翁云自有人生来此心常發無刻無時不是向外馳走非知止如何收拾得非艮其背如何止宿得不獲其身不見其人内外兩忘渾然執中氣象此艮背所以為千聖祕宻也知止執中盖是一脈相傳故程伯子以謂與其是内而非外不若内外之兩忘内外兩忘不專形容未感時氣象無我無人廓然而大公物来而順應心溥萬物而無心矣常止矣仁敬孝慈信隨感流行自然發皆中節真所謂不識不知順帝之則也人豈有二心人知之知其無二心而虞廷授受何以有人心道心之别須知有二者心無二者性有二者用無二者體此堯之命舜所以只說允執厥中也危㣲者以言乎其幾也道心人心者以言乎其辨也惟精者何正有見於道心人心之不一而恐其或二於中也惟一者何正有慮於道心人心之不一而欲其常一於中也常一常精厥中允執乃無適而非道心之流行而中常用事矣中庸曰率性之謂道故道心者中之用事也劉子所謂人受天地之中以生湯亦曰維皇上帝降衷於下民若有恒性民之中天之命也故子思直以喜怒哀樂之未發者當之從古言中未有若此之端的者大學直將心意知物列在目中歸本修身歸止至善意亦如此獨所云道心人心者似正審幾之要大學不及之耳不知心何為而用正為其有不正而正之也意何為而用誠為其有不誠而誠之也知物皆然正而誠者即所謂道心也不正不誠者即所謂人心也但虞廷之所言者畧而大學之所列者詳頭面稍不同致讀者未解耳執字昭然與止不異盖皆不是影響卜度轉換遷移之法答陳汝脩知即是行行只是知此知行所以本来合體也知到極處只體當得所以行行到極處只了當得所以知此知行所以本来同用也陽明以命世之才有度越千古之見諸所論著者無一非學聖之真工而獨其所提掲者以救弊補偏乃未惬孔曽之矩要今致知二字雖並列於八目之中而知本知止乃特掲於八目之外以致知為知本於理固所不通謂知止即致知於用亦有未協必欲畧知本而掲致知五尺童子知其不可孔子之所以開宗立教者舍知本之外别何所宗曽氏所以獨得其宗者舍知本之外别何所學三省則修之矩矱一貫則止之淵源世之學致知者既不肯認多識之科而知上立家其致則一失在於習陽明之熟而不覺其信之深於孔曽反入之淺也答董蓉山二十年前曽見一先輩謂乾知即良知不覺失􅀏乾主始物坤主成物知者主也昔賢之解不謬就令作知字看亦如知府知州之類謂乾知此事即乾管此事也豈得截斷乾知謂天壤間信有乾知與良知作證印乎果然則坤作成物又將何以截之何以解之此真可謂欲明良知而不復究事理之實且不察文理矣乾陽物也坤隂物也程子曰乾者天之性情乾坤兩字已是無名之名而又謂乾有知杜撰無端可為滋甚曰然則如子所云乾知既無良知亦無有乎曰非然也知一也不可以體用分然慮不慮判矣則良不良之所由分譬之情一也亦不可以體用分然有為無為判矣則善不善之所由别情固性之用知亦心之發也鄙所謂分别為知者是也雖良知亦分别也孩提之愛敬非良知乎知親知長知愛知敬分别也乍見之怵惕惻隠非良知乎知孺子之入井知可矜憐分别也故知為分别無分於知之良與不良也若以良知為體又曰良知即是天之明命則大學一經之内於致知之外又掲至善又㸃知本則所謂本與善者又將安所屬乎若云知即是本大學只合說知知又安得說知本若云知即是善大學只合說知止又安得說止善易曰一隂一陽之謂道繼之者善也成之者性也性亦何名只合說善故孟子道性善大學說至善中庸要明善以謂不明乎善則不能誠乎身也正是不知止於至善則不能修乎身也豈可强心之用為體抑天之命為知困知記曰天吾未見其有良知也地吾未見其有良知也日月星辰吾未見其有良知也山川草木吾未見其有良知也求其良知而不得安得不置天地萬物於度外乎其言似朴其理郤是大率與萬物同體者乃能同萬物之體與萬物作對者即不能同萬物之體知親知長畢竟愛行於親而敬行於長也有分别即有彼此非所謂與萬物作對者乎而欲持之以同萬物之體以是為大人之學所以立教開宗復命歸根之宗窽也可乎不可乎曰然則如子所云知果無分於良與不良則將任其知之良不良而亦無貴於良知矣乎恐於理不盡也曰不然孟子曰人之所不慮而知者其良知也良知之名雖云起自孟子而指㸃良知之親切者亦莫過於孟子世之學者但漫曰良知良知曽不思知之之所以良者自何而良所以不良者自何而不良知知之所以良者自於不慮則學之在我者亦當反之於不慮而後可以致知之必良乃直於知上立家用上磨擦分别上求討是欲以求不慮之名而先求之以有慮之實也而可乎孔子曰吾有知乎哉無知也又曰盖有不知而作之者我無是也以知為體孔子不聞知及者當求其所及之事而知非體也仁守者當求其所守之事而仁非體也此等仁知又就用之徳看盖指能擇者為知而能守者為仁也不可便執為實體也智譬則巧亦同此類若必執智為體則所謂聖與仁者又將安所屬乎譬之大學言知本矣又言知止矣孟子言知性矣又言知天矣若脫却止本而直謂大學以知立教以知為體遺去性天而直謂孟子以知立教以知為體不幾於不揣其本而齊其末按圖之似而直指之為駿也乎故大學未嘗廢知也只不以知為體盖知本非體也大學未嘗不致知只不掲知為宗盖知本用不可為宗也惓惓善誘一篇經文定萬古立命之宗總千聖淵源之的只是教人知本只是教人知止身心意知並列於八目之中特掲脩身不復及心意知也此豈無謂而然無所見而為是說乎此其中真有千聖不傳之祕而非豪傑之士必欲繼往聖開来學為天地立心為生民立命者不足以與聞乎斯義也從古立教未有以知為體者明道先生曰心之體則性也伊川先生曰心如榖種仁則其生之理也横渠先生曰合性與知覺有心之名亦是性為心體之見晦菴先生曰仁者必覺而覺不可以名仁知果心之體也謂知即性可乎仁為生理生理即性也覺不可以名仁知獨可以名仁乎知不可以名仁又可以為心之體乎釋氏本心聖人本天盖伊川先生理到之語古有以公私辨儒釋者有以義利辨儒釋者分界雖清卒未若本心本天之論為覆海翻蒼根極於要領也故其斥釋氏也專以知覺運動言性謂之不曽知性此固章句士所熟聞而熟講者乃獨於學問之際欲悉掃成言以附一家之說盡違儒訓以狥釋學之宗恐少有仁心者有所不忍也吾儒惟本天也故於性上只是道得一個善字就於發用之際覘其善之條理於惻隠也而名其仁於羞惡也而名其義於辭讓也而名其禮於是非也而名其智亦總之只是一個善而巳未嘗云有善無不善將善與不善對說也有仁無不仁將仁與不仁對說也義禮智亦凖此後儒則曰無善無惡者心之體此無他則以其就知上看體知固有良亦有不良夫安得不以無善無惡者為心之體乎今有玉焉本無瑕也只合道得一個白字不可云有白而無黒也有水焉本無汙也只合道得一個清字不可云有清而無濁也清濁對說必自混後言之善惡對說必由動後有之告子學問非淺只為他見性一差遂至以義為外何以明之公都子曰告子曰性無善無不善也以無善無不善為性正後儒之以無善無惡為心之體也在告子則闢之在後儒則宗之在釋氏則謂之異端在後儒則宗為教本唯鄙之論似頗稍公而友朋之間又玩而不信也公者何即所云諸所論著者無一而非聖學之真功而獨其所提掲者以救弊補偏乃未惬孔曽之心要吾輩善學先儒者有志聖學者學其諸所論著學聖之真功可也而必併其所提掲者不諒其救弊補偏之原有不得已也而直據以為不易之定論也可乎心齋非陽明之徒乎其聖學之真功心齋不易也未聞併其所提掲者而宗之不易也雙江非陽明之徒乎其聖學之真功雙江不易也亦未聞併其所提掲者而宗之不易也今而敢廢陽明先生學聖之真功則友朋間宜羣訾而議之矣茍未廢學聖之真功而獨議其所提掲也則心齋雙江兩先生固己先言之矣歸寂非雙江㫖乎而修身為本則非鄙人所獨倡也常有言匹夫無罪懐璧其罪貧子說金人誰肯信僕今日之謂也僕少有識知亦何者而非陽明先生之教之也念在學問之際不為其私所謂學公學公言之而已矣求之心而不得雖其言之出於孔子未敢信也亦陽明先生之教也上天之載無聲無臭戒慎恐懼要歸不睹不聞昭昭靈靈者斷不是體然除却昭昭靈靈亦無别可用以入止地之法門矣攝知歸止原是不得已而形容之語易詞言之即是個攝靈歸虚攝情歸性也但不可如此道耳悟得此則兩者俱是工夫悟不得則兩者俱成病痛答朱鳴洪知常止自能慮不必更添覺字本常立即是敬不必更添敬字答賴維新本末始終括盡吉凶趨避之理三百八十四爻其所判吉凶趨避有一不是此知所先後者乎知所先後則步步皆吉倒亂了本末始終之序則步步皆凶所謂幾者動之㣲吉之先見者也渾是一個止法此其所以能定能静能安著吉先從本立宗不至流到末上只一到末上即神聖工巧亦無有善著矣答友一歩離身即走向玉皇上帝邉去亦非是盖以我對上帝則上帝亦末也答凃清甫學問只有工夫雖主意亦工夫也但有自歸宿言者有自條理言者自歸宿上說工夫恰好是個主意自條理上做主意恰好說是工夫此止為主意脩為工夫原非二事也譬之作文未有無主意而可落筆亦未有非落筆修詞順理成章而可以了却主意者也意到然後詞到詞順然後理明不可將主意視作深修詞視作淺又不可謂修詞有可下手而主意則無可用工夫也至於無工夫處是工夫又自是止之深處修之妙手所謂不識不知順帝之則者也答李汝潜丁巳秋侍東廓老師於清原㑹上時講不善非才之罪廓翁命某某曰世間事但屬伎倆知解者信乎有能有不能此所以可諉罪於才若夫為子而不孝為臣而不忠是所謂為不善也豈亦可云才不能孝才不能忠而直以不善之罪諉之於才乎靈之體雖本虚而靈之用必乗氣發竅之後後天之分數居多故任靈則必至從質從質則其流必至滅天除却返本還源歸性攝知别無可收拾之處學問之講只在辨宗之難宗在致知則雖說知本說知止一切以知為體宗在知本則雖用致知用格物一切以止為歸主致知是直以有睹聞者為本體矣以有睹聞者為體而欲希不覩聞之用恐本體工夫未易合一也答詹養澹自有天地以來此氣常運自有人生以來此心常發晦翁此言僕竊以為至到之語未有孤坐兀兀寂然如枯木倚寒巖無一生發者也書云惟天生民無主乃亂彼言雖為命世者發吾徒學問之方豈不如是此大學所以必先知止也知得止則不論動静閒忙自然常有事幹翼翼小心昭事上帝不顯亦臨無射亦保矣從古立教未有以知為體者余二十年前即不信之矣故有致知者致其知體之說良知者發而不加其本體之知者也非知體也辛酉之歳又覺其非復為性覺之說今思之總是䑕遷穴中未離窠臼陽明先生曰良知即是未發之中即是寂然不動廓然而大公的本體儘力推向體邉其實良知畢竟是用豈可移易大率救敝補偏陽明先生盖是不得已而為說己大有功於當世矣今亦何煩更論只學者入頭本領處不得不當下討明白耳間復書存翁有云先儒曰乃若致知則存乎心悟致知焉盡矣鄙人則曰乃若知本則存乎心悟知本焉至矣盖在致知則以知為體在知本則以知為用以致知為宗則所喫𦂳者要在求知以知本為宗則所喫𦂳者又當明本矣肯信此學直截從止上求竅本地歸宗無端更􅑋牀上之牀架屋下之屋則所云籠内之光籠外之光知覺之知徳性之知與夫或以獨知為良知或以獨之一字為良知總屬閒談俱可暫停髙閣倘猶未信斯言則烟波萬頃滅没由君附贅懸疣疑團正結真令千佛禁口七聖皆迷豈予末學區區立語斯須所能判决舊答敬菴有云昔之支離者不過支離於訓解今之支離者乃至支離於心體夫支離於訓解昔賢猶且憂之而况支離於心體乎此語真可為痛傷者也儒者之論學事事歸實釋氏之論學事事歸空事事歸實盖直從立教開宗合下見性處便實直說到無聲無臭不覩不聞至隠至㣲處亦無往而非實也故善所必有豈可言無惡所本無又不待說無善則仁義禮智從何植種惻隠羞惡辭讓是非從何發苗無善無惡既均則作善作惡亦等盖總之非吾性之固有也見性一差弊盖至此推原其故則以其只就用上看體直於知覺運動之中認其發機之良者據之以為天命之體豈知天之發露固有人之作用亦多不然則何以同一心也端緒之危㣲稍分而道心人心截然若兩敵者乎即此而觀則知知覺運動不可言性儒者之學斷須本天程朱之論固自有理之到處者也答凃清甫纔說知本便將本渉虚𤣥纔說知止便爾止歸空寂纔說脩身為本却又不免守局拘方狥生執有此學所以悟之難也答李思忠體則萬物皆備用則一物當幾格物者格其一物當幾之物也鄙人誠有是說亦因學不明本者故將格物懸空講之無有事實有不得已而為之言其實合家國天下通為一身自是萬物皆備固無煩於解說在家脩之家在國脩之國在天下脩之天下亦自是一物當幾何所容其擬議云然者若有似於言之近工描畫支離亦恐漸逺本實落舊見解此鄙人所以不甚道也只實實落落與他挈出知本為歸宗知止為入竅使人隨事隨物而實止之實修之即所云格致誠正者一切並是實事實工豈不痛快簡易心無不正不必更動正的手脚有不正焉而修之即止之矣意無不誠不必更動誠的手脚有不誠焉而修之即止之矣知無不致不必更動致的手脚有不致焉而修之即止之矣物無不格不必更動格的手脚有不格焉而修之即止之矣是皆所謂格物也致知也然齊家也齊其固有之家治國也治其固有之國平天下也平其固有之天下非因齊治均平之事至而後有是家國天下也此吾所以謂之體則萬物皆備也然當其齊家也不可二之國矣當其治國也不可二之天下矣雖均平齊治之事交至於吾前而吾所以應之者其當幾之際畢竟只是一物而已雖誠正格致之用屢遷變動不居若甚無有典要而究其當幾之際吾所以格之者亦畢竟只是一物而已此無所以謂之用則一物當幾也格物者格其一物當幾之物也可謂理不然乎答李汝潜癸亥前曽因讀易偶有觸於本末始終之序於時全學未明知止之法亦所未悟只以易語强自支撑謂安其身而後動其身未安寧可不動易其心而後語其心未易寧可不語彷彿十年來乃近止地止地稍固作用處乃漸見輕省也大率同一格物以知本之㫖用之則一切皆已分事以應務之心用之則一切盡人分事聖人之知要從止岀故必定靜安而後貴其能慮後世之學先從慮上下手知上充拓此實本末始終之辨予學三十年矣自省已躬絶無有悟願從予學者學予之不悟可也切不可虛誇作慕大希高之想也答友人誰能不用靈明但用之以向外馳走則為衆人之任情滅天用之以反躬歸復則為君子之立極定命由仁義而行者即是本天路徑由仁義而襲者即是本心路徑知有良不良總是一知决不可以駐脚本天而動則知自良本知而求良一切皆慮後事而知不可云良矣須思命􅎃只是一個善訣竅只是一個止如何反反覆覆必要説歸脩身為本必要揭出脩身為本必悟此而後止真有入竅善真有諦當乃不為墮於邊見也不然無寂感無内外無動靜豈不𤣥妙少失分毫便落捕風鏤塵弄影舞像之中依舊是辨體的家風也答龔葛山夫天載實體也無聲無臭贊語也後之專言無聲無臭者皆是道贊語而遺其實體者也故談至善而專指為無聲無臭者亦猶是也允執之中不是專主流行而隨時處中之中自備其内至善之善亦不專主流行而隨感而應之善自存其中以致知為主腦者是知有流行而不知有歸宿者也恐至命一脉遂截然斷路不復有歸復之期矣答董蓉山先儒謂不得以天地萬物撓己巳立後自能了當得天地萬物者亦是喫𦂳為人之意要在善看不然天地萬物果撓已者乎等待已立乃了天地萬物乎㤀本逐末者狥人者也誠不可為知本知有已不知有人了已者自了者也亦不得謂之知本已欲立而立人已欲達而達人是説仁者之體非説仁者之造認得是體即所謂認得為已何所不至認得為造己未立何暇立人己未達何時達人即所謂若不為已自與己不相干名曰求仁去仁逺矣知本兩字即是求仁但稍換却頭面故不但知本者不可狥人即求仁者亦决無有狥人之理摩頂放踵病此兆矣不但求仁者不可守株即知本者亦决無有守株之理抜一毛而利天下不為弊有由矣答詹世輯有疑止脩兩挈為多了頭面者不知全經總是發明止於至善婉婉轉轉直説到修身為本乃為大歸結實下手此吾所以專揭修身為本其實正是實做止於至善故曰知修身為本而止之是也答蔣崇父一個念頭稍渉虛𤣥便流意見一句話頭稍欠填實便托空詮已之自進工夫由此固疎人之觀視察安亦即便分誠偽矣答董蓉山雷陽一夕透體通融獨來獨徃得無呈礙答滕少崧自悟徹知本後學得凑手乃知從前説者作者大抵偽也説本體固恍恍惚惚認似作真説工夫亦恍恍惚惚將無作有或認靜邊有者透不到事上或認見地明者合不到身上大率皆是意可揣得口可説得而實在落手做不得也此其所以為偽也答從弟孟育有友主保守靈明之説者予曰兄旣主靈明必令無時不明無事不靈未論爪生髪長筋轉脈揺為兄不明兄純孝人也即兄母死初哀一段果祇激於一慟而不容自己乎將主以靈明而必為之加減劑量使之適協乎若不照則是靈有不保若必照則恐孝有未至人未有自致者也必也親䘮乎是兄用情反恒人之情之不若矣其友為之蹙然請質予曰兄母訝亦毋驚此蓋孔聖人之所不能與以知者也而兄必欲與之此其所以異於孔子之學其友曰然則將奈何予曰顔淵死子哭之慟矣孔子全然不知因人喚醒恰好回頭照出自中之則乃曰有慟乎非夫人之慟而誰為惟不識知乃能順則若必識知去則逺矣其友為之豁然乃盡棄從前之學答周三泉孔子以知止入門而後之儒者却先格物不知止不知則身心尚無歸宿而所謂格物者安得不病於支離本不悟則意緒尚不免於二三而所謂致知者安得不流為意見與張洪陽止此則自虛然却不肯揭虛為本修此則自寂然却不可執寂為宗答涂清浦學之以修身為本也尚矣復以為必先知本者豈修身為本之外又别有所謂知本乎曰非然也蓋必知本而後有以知家國天下之舉非身外物也知均平齊治之舉非修外事也知本者知修身為本也非知修身為本之外又别有所謂知本也答李汝潜知本一脉當官尤為日著之效只一㸃念頭上向監司處迎揣下向百姓處猜防自謂之用明即所謂能疑為明何啻千里矣與本風光毫髪不相蒙渉端拱垂裳豈無照智只其所注宿者不於人必於己耳答劉良弼大學約言大學首節何謂也以揭言學之大綱也蓋三者備而後學之道全也而即倒歸於知止謂定靜安慮之必自於知止何謂也以申言止之為要也繼之曰物有本末云云者何謂也以敎人知止之法也經世之人無一刻離得物如何止經世之人無一刻離得事如何止蓋物雖有萬矣本末分焉事雖有萬矣始終判焉知本始在所當先即當下可討歸宿直於攘攘紛紛之中示以歸宿至止之竅故曰是敎人以知止之法也古之欲明明德至修身為本何謂也蓋詳數事物各分先後而本歸修身也本在此止在此矣豈有更别求之理其本亂至未之有也蓋决言之也結歸知本若曰知修身為本斯知本矣知修身為本斯知至矣至善其體而明徳其用也止至善其歸宿而明親其流行也定而後能靜非靜生於定也靜而後能安非安生於靜也要以見必自知止始也舊有語定靜安總是止但漸入佳境耳最得立言之意非止則如人之未有家非止則如種之未得地而慮烏從出乎止為主意修為工夫身外無有家國天下修外無有格致誠正均平齊治但一事而不本諸身者即是五霸功利之學格致誠正但一念而不本諸身者即是佛老虛𤣥之學故身即本也即始也即所當先者也知修身為本即知本也知止也知所當先者也精神凝聚意端融結一毫熒惑不及其他浩然一身通乎天地萬物直與上下同流而通體渾然一至善矣故止於至善者命脉也修身為本者歸宿也家此齊焉國此治焉天下此平焉所謂篤恭而平垂衣而理無為而治者用此道也知本義善一也有自主宰言者有自流行言者故止一也有自歸宿言者有自應感言者君臣父子朋友之交所謂止之應感者也故仁敬孝慈信所謂善之流行者也歸宿不明而直於應感之上討止猶主宰不悟而直於流行之際看善也止將得乎聽訟云云則正所謂止之歸宿者也止有歸宿隨其身之所接於為君也而止仁於為臣也而止敬於為子也而止孝於為父也而止慈於與國人交也而止信則無適而非止也舊答某人書謂隨事討止正與後人隨事求中意同未必非中只恐非允執厥中之消息也至善兩字蓋孔子摹性本色就虞淵底揭出示人猶恐杳杳㝠㝠無可據以循入故又就經事宰物中分别本末始終先後指定修身為本使人當地有可歸宿故止於至善者命脉也修身為本者訣竅也知本乎身即知止乎善僣謂學急明宗不在辨體宗者何則㫖意之所歸宿者是也從古論學必以格致為先即陽明天啓聰明亦祗以致知為奥大學之㫖意歸宿果在知乎止於至善恐不可以知名之也不可以知名善則止之主意不以知為歸宿也决矣故曰知止而後有定蓋是要將知歸於止不是直以止歸於知此宗之辨也此攝知歸止鄙人之所以敢力提撕也至善兩字原是直挈性命之宗止於至善者如根之必歸土如水之必濬源極則者何嘗不是善是就流行言也極致者何嘗不是善是以造詣言也落根有地而後可以取勘於流行造詣有基而後可以要歸於極致後之學者大率知有流行而不知有歸復圖為造極而不知有歸宿之根源者也學先知止蓋斬關第一義也每謂修身為本之學允執厥中之學也非知本固不可以執中而非厥中允執亦未可以言知本也左之非左右之非右前之非前後之非後停停當當直上直下乃成位其中天下之大本立矣格致誠正不過就其中缺漏處檢㸃提撕使之常止於中耳常止即常修心常正意常誠知常致而物自格矣止不得者只是不知本知修身為本斯止矣其本亂而末治者否矣豈有更别馳求之理故止不得者病在本也友朋中有苦知本難者予曰本即至善有何形聲故聖人只以修身為本不肯懸空説本正恐世人遺落尋常揣之不可測知之地以致虛縻意解躭誤光隂只揭出修身為本使人實止實修止得深一分則本之見處透一分止得深兩分則本之見處深兩分定則本有立而不揺靜則本體虛而能固安則本境融而常寂只是一個止的做手隨止淺深本地風光自漸見佳境也切不可懸空撈摸作空頭想也故本不知又是病在止也此予所謂交互法也其實知本者知修身為本而本之也知止者知修身為本而止之也總是一事有何交互之有但因病立方不得不如此提撕令人有做手耳換作法不換主腦且不因藥發病也齊家不是㨮攬家蓋在家身家即是修之事矣治國不是㨮攬國蓋在國身國即是修之事矣平天下不是㨮攬天下蓋在天下身天下即是修之事矣故家國天下者分量也齊治均平者事緒也余嘗云家國天下者修身地頭也此所以天子與庻人一也説到性分上所以學無等差説到性分上如何分得物我真所謂天之生物也使之一本矣無二本也或問致知格物學問之功莫要於此也獨無傳者何與曰知非他也即意之分别者是也物非他也即知之感觸者是也除却家國天下身心意知無别有物矣除却格致誠正修齊治平無别有知矣故格致無傳者一部之全書即所以傳格致也如傳誠意則意物也而所以誠之者即知也傳正心則心物也而所以正之者即知也傳修身則身物也而所以修之者即知也傳齊家傳治國平天下則家國天下者物也而所以齊之治之平之者即知也則格致奚庸傳哉曰然則所以格之致之者何如以用其力耶曰此不攷於經者之過也如戒自欺求自慊慎其獨必其意之所發如好好色如惡惡臭而無有不誠而所以格誠意之物而致其知者可知也身之有所忿􅓰四者所以使心之失其正者此也心不在焉所以使身之失其修者此也而所以格修正之物而致其知者可知也之其所而辟焉身之所以不修者此也家之所以不齊者此也而必由其好惡之正而所以格修齊之物而致其知者可知也正其身以刑家不出家而成敎於國而所以格齊治之物而致其知者可知也絜矩以同好惡而所以格治平之物而致其知者可知也故曰不攷於經者之過也格致義安其身而後動易其心而後語定其交而後求易言之矣故灼然本末始終之序而學者不悟也只於此不能知所先後即步步離根到處無可着脚直以其身為萬物之役如馬牛然聽其駈策而馳走矣故就一事一物言固自有個本末終始總事物言又只有個本末終始下條備舉事物各分先後斷以修身為本正為此也悟得此真如走盤之珠到處圓成無有定體亦無定方而本常在我此其所以為經世之竅即悟不徹只捉定修身為本如立表建極相似亦自隨事隨物就此取衷而本常保其不亂未嘗不是逐事逐件著功而運量精神只是常在一處未嘗不是要得檢束此身俾無敗缺而主腦皈依只是收拾一副當精神使其返本還元無有滲漏此其所以為盡性之學修身為本只有一個本隨身所接無非末者延平曰事雖紛紜還須我處置畢竟宰天宰地宰人宰物運轉樞機皆是於我離身之外無别有本雖天地君親師亦末也問致知兩字不但陽明挈之有宋諸儒無不以為學之始事先生獨以為必先知止者何也曰至小經綸也須定個主意豈有歸宿茫然可望集事之理運斤者操柄測景者取中若無知止這一步真所謂無主意的文章正誠格致將一切渙而無統矣更有一説心有不正故用正之之功意有不誠故用誠之之功知有不致物有不格故用致之格之之功今此一時耳試反觀覺心尚有不正否曰無有意有不誠否曰無有知有不致物有不格否曰此中抵對歴歴分明亦似無有不致不格曰如此則學問工夫一時間便為空缺矣問者躍然有悟曰允若先生之言復命歸根全在一止格致誠正不過就其中缺漏處檢照提撕使之常歸於止耳必有以信身外之無有家國天下也而後本體一必有以信修外之無有格致誠正也而後工夫一本體一則精神不至外有滲漏工夫一則意念不復他有馳求而知止矣道性善編孟子説個入井又説個孺子入井又説個乍見入井蓋入井者事之最可矜憐者也孺子於人最無寃親者也而又得於乍見是又最不容於打㸃者也不知不覺發出怵惕惻隱苦口苦心只要形容一個順字蓋不順則外面的便有打㸃粧飾不與裏面的相為對證矣此正所謂以故言性也以利為本也以見非如此不容打㸃則情之所發便未必能順豈可便道情善故信得性而後學有歸宿若以為道情善直於情上歸宗則有惻隱者亦容有不惻隱者矣有羞惡者亦容有不羞惡者矣善不善襍出敎人如何駐脚性有定體故言性者無不是體情意知能有定用故言情意知能者無不是用惟心為不然以心統性情者也故程子曰心一也有指體而言者有指用而言者指體而言者孰為之體性其體也指用而言者孰為之用情意知能其用也虞廷所謂人心惟危道心惟微人豈有二心此亦所謂指用而言者也孔子操則存舍則亾出入無時莫知其鄉惟心之謂與心豈有出入此亦所謂指用而言者也孟子曰仁人心也此則所謂指體而言者也而用在其中矣他章之言仁必以屬性惟此章之言仁直以屬心求放心人只漫説畢竟向何方求前念不管後念後念不續前念陽明先生為轉一語甚好曰學問之道無他求仁而已矣亦是見得放之不可為方所也求之無可為依據也惟仁可求惟仁可求者則性之有常善也所謂夫道一而已矣不就一上認取何處歸宗性者生之理也知生之為性而不知所以生者非知性者也易有太極是生兩儀謂兩儀外别有太極固不可指兩儀而即謂之曰太極亦未可故中庸只説隱微只説未發只説不可覩聞大率顯見覩聞皆所謂發也正告子之所謂生者也凡有知覺運動者孰非生乎若不本其生之由而惟據其迹之所可見則知禮知義者固知覺也而知食知色亦知覺也以至於知有食色而不知有禮義亦知覺也同一知覺同一運動可云何者非生生既是同可云何者非性噫孟子之不以生之謂性則知孟子之以利求故而必本其善之所自來矣乃若其情則可以為善矣乃所謂善也孟子認定了性善故情可以為善若夫為不善非才之罪也孟子認定了情善故才無不善只怕人不信得性善無地歸宗故又以知能之良者表之知能之良者則正所謂情之可以為善者也才之無有不善者也孩提之童無不知愛其親者孰為之也及其長也無不知敬其兄也又孰為之也故曰親親仁也即所謂惻隱之心仁之端者是也性中若無仁孩提之童如何知愛親敬長義也即所謂羞惡之心義之端者是也性中若無義孩提之童如何知敬長達之二字義尤明白只是一個順所謂火然泉達充之足以保四海者是也然充者非是尋取既徃之怵惕惻隱來充達者不是尋取孩提之愛敬來達信其性之本善而知所歸宗達其性之本善而知能之用莫非良矣知本同參視聽言動四字雖若有形之實跡而勿之一字則實動而未形之真心也故體認得真視聽言動之非理即在不覩不聞中而勿之一念即戒慎恐懼之心也此下皆興古疑問未發之前以理言之則為有以象言之則為無所云看者亦於其中而黙探其理之何似耳豈真以象求哉吾嘗於靜中以一真惺惺者而黙與之㑹久之若見其中之盎然而無所間隔者焉若見其中之肅然而無所偏倚者焉又若見其中之特然而無所依隨者焉又若見其中之瑩然而無所遮蔽者焉即其盎然者看作寛裕温柔之氣象可乎即其肅然者看作齋莊中正之氣象可乎即其特然者看作發强剛毅之氣象可乎即其瑩然者看作文理密察之氣象可乎此亦心靈與性真黙㑹若見其似則然耳而豈實有氣象之可見耶本一也為君在君為臣在臣為父在父為子在子與國人交在交國人若是其無定方也然為君為臣此身為父為子此身與國人交此身實非有二身也何嘗無定分乎故善一也君曰止仁臣曰止敬子曰止孝父曰止慈與國人交曰止信若是其無定名也然仁孝吾身之善敬慈吾身之善信亦吾身之善實非有他善也何嘗無定體乎所以歸本之學隨所處而地異地異而修同隨所遇而時異時異而止同雖日錯綜於人倫事物之交亦日歸宿於根元命脉之處歸宿處雖妙入無聲無臭之微錯綜處實曲盡至賾至動之變可見修法原非粗迹不待兼止言而後知止法原非空寂不待兼修言而後知此經世之實學而盡性至命之正宗也問乍見孺子入井必有怵惕惻隱之心此良知也擴而充之足以保四海致良知也如何不以致良知為是曰擴充之説原從性根上擴充若見入井而有惻隱之心孟子所謂仁之端倪張子所謂天理發見自然之苖裔必欲從端倪上苖裔上擴充充不去矣曰何為充不去曰事物之感於我者何常而善端之發見於感應者非一乍見孺子入井勃然惻隱良矣是心之發石火電光一過即化豈復留滯記憶以為後來張本耶繼此而有王公高軒之過蓋敬之心生矣當是時非可哀也豈容復擴充惻隱以待此大賓耶已而王公以嘑蹴之食加我羞惡之心生矣當是時亦非可哀也豈容復充擴惻隱以應此可羞之感耶藉令見聾瞽吾哀其不成人見孤獨吾哀其無告雖與入井之哀同一機括畢竟是隨感而見前念後念不相照應豈嘗思曰吾前日哀入井矣今當擴充入井之哀以哀此輩􅁘必擴充入井之哀而後能哀後來之可哀勞甚矣狹亦甚矣性體發用不如是矣此下皆崇聞録四端之發固自有性根在也吾養吾性隨在皆至善之流行矣曰然則性何如而養乎曰孟子道性善指天命之體言也天命之性無聲無臭從何處下手只用得一個養字即止至善之止字即成性存存之存字是也養而無害順性而動達之天下見可哀而惻隱見可恥而羞惡見長上而恭敬見賢否而是是非非毫髮不爽所謂從上發慮無徃而非不慮之良知矣良知上豈容更加擴充加擴充便是慮而後知知非良矣天地人物原是一個主腦生來原是一體而分故曰天地人物皆已也人已如何分析得是故立不獨立與人俱立達不獨達與人皆達視人猶已視己猶人渾然一個仁體程子所謂認得為己何所不至是也若曰已立已達後方能了得天地萬物吾未立何暇立人吾未達何暇達人即此便是自私自利隔藩籬而分爾我與天地萬物間隔不相關接矣便不仁矣所謂若不為己自與己不相干是也黙識正識認之識仲弓問仁夫子告之以已所不欲勿施於仁義備矣又必曰出門如見大賓使民如承大祭本無賓本無祭如見如承者何事子張問行夫子告之以言忠信行䔍敬雖蠻貃其可行矣又必曰立則見其參於前也在輿則見其倚於衡也無言無行忠信䔍敬亦何有此正所謂黙而識之的消息也止於至善之脉絡也學問有這一步纔入微纔知本纔上達天德陽明先生見山中一老叟自云做言忠信行䔍敬工夫三十九年此其人亦可尚矣只此黙識一步未之知耳問致中和致字曰天命之性不可覩聞此喜怒哀樂之所以為根者也本自未發渾然至善故謂之中君子於此乎戒慎恐懼工夫都從性根上用是曰致中喜怒哀樂發皆中節此順性而動其流行恰當主腦適相脗合而無所乖戾故謂之和君子亦順性之自然率之而已矣率之則道在矣是曰致和致字須如此看若從念上與事為上去致恐去天命之性尚逺心者性之發靈是活物是用神帝王用之以保民桀紂用之以縱欲宿儒用之以博聞强記舉子用之以弄巧趨新儀秦用之縱横捭闔仙家用之呼吸長生佛氏用之灰心槁性農工醫卜各有所用大學敎人收攝此心歸止至善亦臨亦保如見如承直用他歸根復命庻源潔而流自清根深而葉自茂德無不明民無不親天德王道一以貫之此復性之宗泉翁云物至而後義生義生而後知有所措夫知有所措而後格之則未履其物不必豫格之也與吾師所格只當機之物頗合此下皆井天萃測俗儒求知於外者也文成求知於内者也學不同而所主在知則同也見羅先生之學攝知歸止故其言曰用知以入止則所云知者原是止之用神主知以求致則所云致者恐非善之歸宿是以止自淺而入深則有定靜安慮之異修由内而及外則有格致誠正修齊治平之分意為心之運用則統之於心尚未發之於情緒山謂知為意之體者亦謂意為已發故不得不以知為體所以未妥唐仁卿信石經大學謂置知止能得於格物之前似乎先深而後淺殆不知聖學之止為入竅修為工夫也謂儒者學問思辨之功無所容於八目之内殆不知止惟一法修有多方萬物皆備格其當機之㫖也謂物有本末一條次致知在格物之下以釋格物殆不知此條敎人以知止之法是混止而為修也近代之流弊既專於知覺上用功而不知以知歸止仁卿之矯偏又專於法象上安命而不知以止求修此學未嘗不貴虛未嘗不貴寂只以修身為本一切皆為實體未嘗不致知未嘗不格物只以修身為本一切皆為實功知本不言内外自是内外合一之體知止不言動靜自有動靜合一之妙談止修之法為異説之防莫過於此善一而已有自主宰言者有自流行言者緝熙敬止所謂善之主宰止之歸宿而仁敬孝慈信則善之流行止之應感者也道有㫖歸原不向逐事精察學有要領只在一處歸宗此孔門之止修博約正一貫之真傳也此下皆日新蠡測聖人常止賢人知止果在一㸃靈光着力乎抑在未發之中下手乎戒懼必於不睹不聞天載自然無聲無臭皆不可以知名也故曰聖人無知大學專敎知止而修之工夫不過一㸃檢提撕使之常歸於止耳自古聖賢常見自己不是常知自己不足時時刻刻用省身克已工夫故聖如孔子且以不善不改為憂無大過自歉此豈謙詞真見得渾身皆性命之流行通體皆至善之充用也歸宗處豈不直透性根落手處斷然修身為本行之用深於解矣乃問畢竟是理如何窮性如何悟先生曰只須從末上去求本從用上去尋體豈恐人求之杳杳㝠㝠故為此切實之詞抑人生而靜以上不容説即不可求乎某謂不容説者其體之無聲無臭而無聲無臭正吾人所當理㑹故論明德親民必歸宗止善蓋至善其體明德其用止至善其歸宿明親其流行如濓溪既云定之以中正仁義又云主靜立人極夫中正仁義有何不了而必申之主靜豈非靜體未窺則所云仁義中正者終在情識上揀别而非真性命用事乎既云靜久能自悟又云窮理斯悟不一靜不足盡理必假探索乎曰靜未嘗不盡理特恐認得不真耳果知天性本靜而時時收拾精神管束於此則本根既植條理自生不必屑屑焉攷之經傳而念頭動處概與經傳合即時取經傳發吾知見而經傳所言總與吾心印此之謂一得萬畢此之謂齋戒神明而非别有一段窮索工夫與主靜作對也即如程子所言涵養須用敬進學在致知亦須問所養所學者何物則養即是學敬即是知用工即是進步不然則敬之為言僅空空兀坐而知之為説須物物討求末學支離從此起矣論心者不根極於心所自來則欲與理襍出而難據攝心修身為本即是止於至善踐形乃所以盡善形神俱妙莫備於此止到穩時渾身皆善又何心術人品之足言修到極處通體皆仁又奚久暫窮通之足慮一止一修即一約一博互用而不偏人性上雖不容添一物然一墮形骸便不若天之行所無事故堯曰執中孔曰擇善固執子思慎獨孟子直養無害周子主靜立極皆就太虛中黙黙保任謂其有曾不着相謂其無曾不落空真宰天地人物之根源世儒云一着工夫便乖本體大扺認性命一物無有理窮無理性盡無性理性俱盡方至於命某則謂性命雖無聲臭而其顯於喜怒哀樂人倫日用實有自然之條理從條理處究極源委到得色色完滿無有缺欠則性命即此貫串工夫實與本體合而豈一切掃除也乎此下皆敬學錄王塘南先生曰聖賢千言萬語無非欲人識其性之本體學問千頭萬緒亦只求復其性之本體斯言甚確但性非情識之謂喜怒哀樂隨感隨發而此體凝然不動曰中曰未發聖賢指㸃甚微其工夫亦從微處黙黙體認故塘翁云本性以之情云必從無思無為而入云學者奈何役役於隂陽五行而不㑹太極之原旣㑹太極何患無隂陽五行不培養於心所自來則遏欲與存理勤苦而難成心所自來者性也性所自來者天也天性在人不離於喜怒哀樂而實不著於喜怒哀樂渾然不覩不聞之體所謂人生而靜是也何道何人何微何危自靜者不能不感感者不能不動於是有欲之名焉則所性自然之用也心也非即為私欲也顧有從性而出者有不從性而出者從性而出曰道心即蔽錮之極而終有不可冺滅者在故曰微不從性而出曰人心即禁制之密而常有逐物而流者在故曰危此危微間不可為歸宿地也舎此善而求正心心未有能正者也其正也不必從事於矯就性之無偏倚處即正也舍養性而求盡心心未有能盡者也其盡也不必從事於擴就性之無虧欠處即盡也當知感物動念之時兩者似乎相對而反之天性本然之體豈惟無人即所謂道者亦渾淪而不可窺豈惟不危即所謂微者亦渺茫而不可執是誠生天地人物之大原為入聖之真竅也格致誠正豈無事實齊治均平豈無規為唯一切以修身為本則規畫注厝一有不當喜怒哀樂一不中節只當責本地上欠清楚非可隨事補苴抵塞罅漏已也此下皆明宗錄人處世中只有自已脚下這一片地光光浄浄可稱坦途離此一步不免荆棘便是險境故已分上謂之素謂之易人分上謂之外謂之險身是善體無動無靜而無不修即無動無靜而無非止倘若懸空説一止其墮於空虛與馳於汗漫等耳易之窮理是盡性工夫必其所窮者為此性也書之惟精是惟一工夫必其所精者為此一也博文是約禮工夫必其求禮於文者也道學問是尊德性工夫必其以德性為學者也不然主意不先定一切工夫隨之而轉必執曰修處無非止也則義襲者亦謂之率性矣大學從本立宗一切格致只從裏面究竟而愈入愈微後儒從知立宗一有知覺便向外邊探討而轉致轉離止善之學性學也反本則與性漸近離本則去性漸遠所以知本為知之至也人心既喪曷為有平旦之氣乎則仁義之本有為之也君子察此可以知性矣氣之清明曷為必於平旦乎則日夜之息為之也君子察此可以知養矣復之為言徃而返也譬之人各有家迷復者徃而不返喪其家者也頻復者日用一至暫回家者也不逺之復則一向住在家中偶出門去便即回來未嘗移徙故曰不遷未有别處故曰不貳以此見顔子之學常止之學也鳶之飛魚之躍便是率性不可復問何以飛躍曰率性飛者自飛不知其所以飛躍者自躍不知其所以躍可見者物不可見者性也不但鳶魚爾也此之謂不覩不聞及其至而聖人不知不能者也見此者謂之見性慎此者謂之慎獨先生云以我觀書在在得益以書博我釋卷茫然即讀書一端觀之而謂學不歸本可乎謂本不於身可乎後儒將止至善做明明德親民到極處屬末一段事審爾則顔曽並未出仕親民止至善終無分矣此下皆證學記至善兩字形容不得説虛字亦近之然聖人只説至善不説虛正為至善是虛而實的又是實而虛的言善則虛在其中言虛則兼不得實也程子云人生而靜以上不容説才説性時便已不是性也如云可説即是情不是性矣既不可説故透性只是止今日學人所以難入門者只為宋儒將居敬窮理分作兩事分作兩時先要究窮物理講得處處明了方來躬行與孔子之敎真是天淵若真正入聖門頭便將平時習氣虛知虛見許多妄想各様才智伎倆盡數掃蕩一絲不掛内不着念外不着相四方上下一切俱無倚靠當時自有滋味可見由此併精直入更不回頭再不用東愁西愁東想西想即外邊事物雖或不能盡知然大本已立將來自有通貫時節吾儒盡性即是超生死生死氣也非性也性也者命也不因生而生不因死而死原與太虛同體儒學入門即知止知止即知性知性而盡性達天德矣超而上之矣人自有身以來百骸九竅五臟六腑七情六欲皆生死之根富貴貧賤患難聲色貨利是非毁譽作止語嘿進退行藏辭受取與皆生死之境若逐境留情迷真滯有便是在生死的緣業若順事無情攝末歸本一而不二凝而不流即是出生死的法門蓋真性本寂聲臭俱無更有何物受彼生死聖學身心本無分别形色即是天性不可謂身乾淨不是心乾淨心乾淨不是身乾淨孔子皜皜肫肫全在仕止久􅄩上見今人但在天下國家上理㑹自身却在一邊打叠靜坐取靜為行可以言靜境未可以言靜體人生而靜之靜直言靜體故止地可依不對動靜之靜而言近來談止修之學者有重止者則略言修遂搆荒唐入禪之誚有重修者則輕言止至騰切實近裏之聲其實於透底一着不能無失夫止修非二體論歸宿工夫不得不判分兩挈究血脉消息却自渾合不離未有不止而能修亦未有不修而能止者第止之歸宿直本修身透體歸根畢竟不落流行之用而誠正格致則有若網之在綱者是則直下真消息也吾儕止未得力畢竟修的工夫還用得較多且重然究竟徹底一著總屬止的隄防此下皆崇行錄只反身一步便是歸根復命便有寂感之妙只離本一步便跟着心意知物走便逐在家國天下去精神分散徃而無歸無復有善着矣只歸到已分上便是惠廸便吉一走向人分上便是從逆便凶幾微之差霄壤相判只落了心意知物便有後天流行之用便是可覩可聞有聲有臭的恁是刻苦下工存理遏欲畢竟是用上著脚去先天真體逺矣故聖人之學直從止竅入微後儒之工只向修法下手以此而欲上達聖人心傳不得其門而入者也性情才三字孟子特地拈出三個眼目一屬情與才便有利有不利敎人只從利上認取性體告子生之謂性分明是指才為性到才上看性性安得有全善者乎問初學纔要止又覺當修纔去修又便不止未知下手處曰非禮勿視聽言動是止不是止曰是止曰即此是修不是修曰是修曰然則何時何地不是下手處雖然夫子先説個復禮以顔子之聰明不得不復問子一㸃岀視聽言動四字始信是下手妙訣矣此下皆天中習錄視聽言動形而下者孰主宰是孰隆施是便是形而上者豈是懸空另有個形上的道理唯形上即在形下之中故曰修身為本性學也物雖紛紜豈不各有個天然的本末事雖雜冗莫不各有自然的始終人惟臨局當機莫知所先則精神無處湊泊譬之奕然畫東指西茫無下手只緣認不得那一著該先耳夫既認定一個本始當先而先之則當下便自歸止此固未嘗不用知然却不在知上落脚故曰攝知歸止本體粹然何所可戒而亦何以可求故其功在止止即戒慎恐懼之謂心是把捉不得的活物必須止止得住方可言存養蓋形生神發後這靈明只向外走就是睡著時他也還在夢裏走滚故這靈明上無可做手但要識得這靈明從何處發竅便從那發處去止故者以利為本所謂故之利者即惻隱四端之心也容有不惻隱之心矣而豈有不仁義禮智之性哉此心性之辨也此下皆時習錄修身為本之宗須實以身體勘以身體勘必查來歴源頭何如做手訣竅何如將來受用何如以來歴源頭言之將人生而靜以上者為始乎人生而靜以下者為始乎心意知為人生而靜以上者乎蓋人生而靜以下者乎則止至善之為入門第一義也决矣以做手訣法言之至善杳㝠欲止而無據而經世之人日以其心意知與天下國家相搆又頃刻不能止者非從事物上稱量本末始終討岀修身為本至善於何握著而止於何入竅乎則做手訣法之莫有妙於修身為本也信矣以將來受用言之離本立宗離止發慮者之能為天地萬物宗主乎從本立宗從止發慮者之能為天地萬物宗主乎則其受用之莫有大也信矣然則此學信乎其可以定千世不易之宗也明儒學案卷三十一
