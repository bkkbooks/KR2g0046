body:
  text: 明儒學案卷四十六餘姚黄宗羲撰諸儒學案上四布衣陳剰夫先生真晟陳真晟字剰夫初字晦夫其後以布衣自號福之鎮海衛人年十七八即能自拔於俗入長泰山中從進士唐泰治舉子業業成薦於有司至福州聞防察過嚴無待士禮乃辭歸自是不復以科舉為事務為聖賢踐履之學初讀中庸做存飬省察工夫覺無統緒繼讀大學始知為學次第以朱子所謂敬者乃大學之基本也乃求其所以為敬見程子以主一釋敬以無適釋一始於敬字見得親切乃實下工夫推尋此心之動静而務主於一静而主於一則静有所飬而妄念不復作矣動而主於一則動有所持而外誘不能奪矣甞語人曰大學誠意章為鐡門關難過主一二字乃其玉鑰匙也葢意有善惡若發於善而一以守之則其所謂惡退而聼命矣又甞語人曰人於此學若真知之則行在其中矣葢以知之真則處善安循理樂其行甚順然而氣質有偏勝嗜欲有偏重二者用事其順而易者反逆而難矣此聖門論學以博學審問慎思明辨之後又加以篤行也天順三年用伊川故事詣闕上程朱正學纂要其書首採程氏學制次採朱氏論説補正學工夫次作二圖一著聖人心與天同運次著學者心法天之運次乃言立明師補正學輔皇儲隆敎本數事以終上文圖説書未上先上疏乞召見而陳其説不報及書上奉㫖禮部㸔了來說署部事侍郎鄒榦寢其事繼而家居讀提學頒行勅諭敎條有合於程朱敎法喜曰此學校正敎也然科舉不定正考雖有正敎不行也因採勅諭中要語叅以程氏學制吕氏郷約朱氏貢舉私議作正敎正考會通定考徳為六等考文為三等以告當路當路亦不省凡先生學有所得者至是皆無所遇聞臨川呉聘君名欲徃質之乃貨其家具得五金兄子從行謂之曰死則𦵏我於道題曰閩布衣陳某墓足矣行至南昌張東白止之宿扣其所學大加稱許曰禎敢僭謂自程朱以來惟先生得其真呉許二子不足多也如聘君者不可見亦不必見耳遂還鎮海先生生於鎮海遷於龍岩晚定居於漳之玉淵成化十年卒年六十有四先生學無師承獨得於遺經之中自以僻處海濵出而訪求當世學者百尺竿頭豈無進歩奈何東白以得真一言遂為金柅康齋白沙終成欠事然先生之學於康齋似近於白沙差逺而白沙言聞其學術專一敎人静坐此尋向上人也蕺山劉先生曰一者誠也主一敬也主一即慎獨之説誠由敬入也剰夫恐人不識慎獨義故以主一二字代之此老學有本領故立言諦當如此是故東白得真之言亦定論也心學圖其一為天地聖人之圖大書一心字以上一㸃規而大之中虛曰太極太極左曰静右曰動太極前倒書一復字静作黒十六㸃動作白十六㸃葢太極生兩儀也十六㸃之外毎㸃各作十㸃如旋螺彎而向左十㸃之外又各作十六黒白㸃共三十二㸃大於前之三百二十㸃也毎一大㸃包二卦葢自二而四自四而八自八而十六自十六而三十二自三十二而六十四即邵子先天圖也坤復在下書冬至乾姤在上書夏至升訟為義曰立秋咸遯曰秋分否謙為正曰立冬明夷無妄為仁曰立春臨同人曰春分履泰為中曰立夏葢兼太極而一之也其一為君子法天之圖大書一心字其上一㸃規而大之視前圖差小中虛曰敬敬左曰静右曰動前一字向上曰復静之左中分其圈而為黒黒外為白白外復為黒動之右中分其圈而為白白外為黒黒外復為白即太極圖之隂陽動静也然白黒皆互圓相入與太極稍異上曰乾下曰坤左曰坎右曰離坎之左曰静主動離之右曰動主静乾之上書聖要四説曰主一無適曰整齊嚴肅曰常惺惺法曰其心收斂不容一物葢採朱子之説亦合先天太極為一者也右圖二一著天心動静之本然是性之原也一著君子法天之當然是性之復也聖人亦天心之自然者也君子豈可以不學乎然復性之説經傳詳矣而未有如此後一圖義之要而盡者也惟君子知之又能主敬以體之以盡其法天之功效也而有序焉葢始則主敬使一動一静互為其根即致知誠意之事是始學之要也固不外此一圈終則敬立而動静相根明通公溥即知至意誠之事是聖功之成也亦不外此一圈而自始至終則皆不離乎敬焉如是則法天之功至與前一大圈同一渾然燦然而無間矣一敬之功用如此豈不大哉三代學校之所以敎者惟此而已此豈後世記誦俗學之所能與耶自伏羲畫卦示精之後即復卦堯以是欽𫝊之舜舜以是恭傳之禹禹以是精一傳之湯湯以是日躋傳之文緝熙武戒周公待旦孔子孔子傳之顏心齋曾一貫思尊徳性孟求放心及孟氏沒而遂失其傳者此也寥寥千餘載至周程張朱氏出然後此學大明及朱氏沒而復晦者只由宋元學校雖皆用程朱之書而取士又仍隋唐科舉是以士視此心學為無用故多不求遂又多失其真傳焉學校考徳等第式上上等即能主敬窮理修己者上中等即能求以主敬窮理修己者中上等性行端潔居家孝弟亷恥禮遜見善必行聞過必改中中等通明學業曉達治道下上等能習經書下中等惟記誦舊文務口耳之學考文等第式上等考徳名在下之中則考文雖上亦降如此則王拱辰夏竦不魁矣中等考徳名在上之中中之上考文雖中亦取考徳名在上之上則考文雖下必取如此則程正叔不報罷矣考徳名在中之中下之上者則專考其文然亦不得魁選如此則王佐不狀元矣答書所論欲搜剔聖賢微言緒論而紬繹之以庶幾深乎道殆是也葢搜繹亦窮理之事大學之要莫先於窮理豈不信然然以程朱之學揆之要必先求其所以能紬繹之者以為之本然後可也若無其本則雖欲勉强以紬繹之亦不可得也葢義理之聚於物猶蠶絲之聚於繭至精深微密者也今欲紬繹之於繭為易葢引其緒以出於外者也於物理為難實遊其心以入於内者也故茍非先飬其心使有剛鋭精明純一之氣則安能入其微歩其精以詣其極随其表裏精麄之處無不到而脱然盡得其妙於吾胸中乎妙有不盡得則雖曰紬繹猶未紬繹也如一物有十分道理已繹到八九分則一二分繹不得此一二分正其所謂精妙者也精妙者既不能繹則其所繹者八九分皆其麄者耳得其麄昧其精雖謂之全未紬繹亦可也且但一物不能繹則物物皆不能繹譬如印板但印出一張糊糢則張張皆糊糢心麄之病何以異此茍如此而欲望深於道殆難矣矧道不惟精深實且廣大葢合衆精深而為一廣大者也故既不能析之極其精則必不能合之盡其大所謂物有未格則知有未至者此也然所以合之者又須此心先有廣大之量然後能也故先儒曰入道莫如敬未有能致知而不在敬者又曰涵飬須用敬進學在致知所謂敬者豈非涵飬此心使動而窮夫理則有剛鋭精明純一之氣静而合夫理又有髙明廣大之量者乎凡此皆有真實工夫做到至處所謂聖學也程朱之學入道有門進道有階升堂觀奥皆有明轍惟此最為要法誠不可不先講而力求者也荅周公載夫學一也豈有道俗之分所以分者在乎心而已矣故志乎義則道心也志乎利則俗心也以道心而為俗學則俗學即道學以利心而為道學則道學即俗學只在義利之間而已矣惟在朝廷則不然朝廷風化攸繫故以道學鼓天下則天下皆道學而義風盛以俗學鼓天下則天下皆俗學而利習熾此程朱所以皆欲朝廷革俗習而崇義方有以也若君子自學茍立志有定則無不可者也何俗為同上今之學者皆言居敬多只是泛泛焉若存若亡而無主一無適之確則是未甞居程子之敬也皆言窮理亦只是泛泛焉務多讀書而無即事窮理之精則是未甞窮程子之理也荅何椒丘蔡九峯之學未得為淳只觀其自序乃以窮神知化與獨立物表者並言亦可見矣若物之表果有一個獨立者則是莊列之𤣥虛康節謂老子得易之體正亦同此是皆於體用一原顯微無間之㫖見得不透徹故也同上世人言執古貫乎通今執古而不通今猶執一也此言不然夫所謂古者即先王之制著於禮經者是也所謂今者何禮也豈非流俗之弊習於性成者乎姑以喪禮言之古者以不飲酒食肉為禮今人必以飲酒食肉為禮如執古則不能以通今通今則非所謂執古豈一人真有兩個口其一則執古又其一則通今乎抑只是一個口但遇酒食則通今及醉飽之後則執古斯謂可貴乎執古辨布政張古城先生吉張吉字克修别號古城江西餘干人成化辛丑進士授工部主事以劾左道李孜省妖僧繼曉謪判景東以詩書變其俗土官陶氏遣子從學即能以禮自處歴肇慶同知梧州知府轉廣西按察副使備兵府江搜賊勦平之正徳初進正使轉布政使歴山東廣西忤逆瑾降兩浙鹽運使瑾誅更河南廣西叅政至貴州左布政使以疾歸十三年九月卒年六十八初從郷先生學見諸生簡擇經傳以資㨗徑謂士當兼治五經今業一經而所遺如此豈聖人之言亦當有去取耶遂屏絶人事窮諸經及宋儒之書久之見其大意歎曰道在是矣語學者曰不讀五經遇事便覺窒礙先生在嶺外訪白沙問學白沙以詩示之滄溟㡬萬里山泉未盈尺到海觀會同乾坤誰眼碧先生不契也終以象山為禪作陸學訂疑葢居業錄之餘論也方伯周翠渠先生瑛周瑛字梁石别號翠渠福之莆田人成化己丑進士授廣徳知州歴南京禮部郎中知撫州鎮逺至四川右布政使先生以民惑鬼神著祠山雜辨又以緩𦵏溺女著敎民雜錄又著經世管鑰律吕管鑰字書管鑰固以博為事也蚤年即有求道之志與白沙醫閭為友與醫閭詩云黄門􅋖客歸遼左少室山人憶嶺南我亦塵埃難乆住木蘭溪上浣青衫然先生以居敬窮理為鵠白沙之學有所不契寓書李大厓以辯之曰聖人静有以立天下之大本動有以行天下之達道求諸萬殊而後一本可得葢始學之要以收放心為先務收放心居敬是也居敬則心存聰明睿智皆由此出然後可以窮理所謂窮理者非謂静守此心而理自見也葢亦推之以及其至焉耳積累既多自然融會貫通而於一本者自得之矣一本如榖種雖自塊然而根苗花實皆聚於此又如雞卵雖自渾然而羽毛嘴距皆具於此及其發見於行事在聖人體用一貫在學者未免差誤葢在己者有所拘蔽故所發不無偏重之殊在外者有所搖奪故所施不無遷就之意然而既復本源則於處善亦安循理亦樂至於患難事變雖以死易生亦甘心為之此聖學之大略也今乃塊然静坐求畢體用之學是釋氏之虛空也司成蔡虛齋先生清蔡清字介夫號虛齋福之晉江人孱脆骨立而警悟絶人總髪盡屈其師裹糧數百里從三山林玭學易得其肎綮成化丁酉郷書第一又三年登進士第授禮部主事王端毅為冢宰改吏部丁母憂服除還禮部轉南京文選司郎中以終飬歸起為江西提學副使為寧庶人所不喜終不肎輕屈疏乞致仕逆瑾亂政倣蔡京召龜山故事起南京祭酒而先生已卒正徳三年十二月也年五十六先生平生精力盡用之易四書䝉引蠒絲牛毛不足喻其細也葢從訓詁而窺見大體其言曰反覆體驗止是虛而已葢居常一念及静字猶覺有待於掃去煩囂之意唯念個虛字則自覺安便目前縱有許多勞擾而裏面條路元自分明無用多費力而亦自不至懈惰也觀於此言知不為訓詁支離所域矣其易説不與本義同者如卜筮不專在龜筮取卜相筮占決疑為徴又辯七占古法皆佳論也羅整菴曰蔡介夫中庸䝉引論鬼神數段極精其一生做窮理工夫且能力行所學葢儒林中之極出者先生極重白沙而以新學小生自處讀其終飬疏謂鈔讀之餘揭蓬一視惟北有斗其光爛然可仰而不可近也其敬信可謂至矣而論象山則猶謂未免偏安之業恐亦未能真知白沙也傳其學者有同邑陳琛同安林希元其釋經書至今人奉之如金科玉律此猶無與於學問之事者也語要四肢百體身之膚殻也愚惡者所均有也心術言行身之精也思齊賢者所致力也於此而不致其力焉是無身也所存者膚殻焉而已矣多言何為人之真常見於飲食言語之末因仍造次之間故君子慎獨除邪之根也不然畢露矣虛而一盡矣最要静愈静愈靈天地所以長久者以其氣運於内而不洩耳故仁者静而夀天下事斷非浮躁者所能完也分隂不惜學力不充當事臨疑口耳無所歸手足無所措前輩云臯䕫稷契何書可讀葢此數公者雖未甞讀書亦未甞不窮理也窮理力行以致用學之為道何以加此吾甞見有胸富萬卷筆下如流而實於其身不得幾字受用者則學其可不擇術哉使臯契生今世吾知其自不能已於讀書但讀之得其術耳毎讀書時輒有欲取而用之之心則亦何必多為也然既有是心則又自不容不多矣天地人物欛柄皆在静上心當静極天機見氣到完時鬼力隨凡能為百姓立久大之利者𩔖非作色於旦夕者所能也静之一字更須於動中驗之動而不失其静乃為得力反覆體驗又止是虛而已葢居甞一念及静字猶覺有待於掃去煩囂之意唯念個虛字則自覺便安目前縱有許多勞擾而裏面條路元自分明無用多費力而亦自不至懈惰也且静亦須虛方是静本色不然形静而心騖於外或入於禪者何限人心本是萬理之府惟虛則無障礙學問工夫大抵只是要去其障礙而已此言吾未能盡行之但彷彿似有一二時襲得此光景者或非意之來應之若頗閒暇至寤寐之際亦覺有甜趣故吾妄意虛之一字就是聖賢成終成始之道某今乞終飬者心有所不安也凡心之所不安便是天理之所不許不若聼命於理圖得心安之為利也昔人所謂樂志云者疑亦文過之辭耳愚意但自身處置得是即是為親也來書以有道二字相稱為之駭懼或有誤以此二字加某者雖其人甚的某謝書亦不敢以此復之先正甞謂願士大夫有此名節不願士大夫立此門户今襃名飾字以相為重便是標門標户矣心固主思然思之太迫促亦反為逆其心天之本然而不免迷墜瞀於眼前矣天下未有無根之木無源之水未有無祖宗父母之人人身不能頃刻而離乎祖宗父母人心不可頃刻而忘乎祖宗父母心而忘乎祖宗父母是木之斷其根水之絶其源者也縱不旦夕死滅亦禽獸中之頑賊者矣天下未有忘祖宗父母而能趨生路者也未有不忘祖宗父母而肯置其身不善者也宋理學大明至朱子與陸子俱祖孔孟而其門户乃不盡同先生之學則出自慈湖而宗陸氏者也其議論有曰毫分縷析較便宜若個便宜總不知總是自家家裏事十分明白十分疑此先生之學也正所謂徳性工夫居多者也其論詩曰詩成正是不因題㸔取風人發興時語到口頭無可奈未須搜擾苦吟詩則先生之詩可知其髙矣其論文曰不為世態酣濡不受古人繩束卷舒出沒如朝霏暮雲始筆下有自然風味則先生之文可知其髙矣葢其在萬山中玩心髙明有日是以其言論概以六經為吾心註脚每有引而不發之意軒然霄漢之上俯視萬有無一足嬰其懐者此可見陸學未盡符於大中至正之矩使當日得究其用恐於開物成務之實終必有疎處茍其踈也則其所自受用亦恐其不覺而近於佛老噫千聖相傳家法𩔖皆自博至約而一敬以成其終始陸學固不可謂不主敬者而稍墜於徑約既失之徑約則其心宜不周於細微而其弊容可遏乎自古髙明之士徃徃有此在孔門則曾㸃之徒是已集中屢屢以夫子欲無言為説因子貢之多言愚以為安知非發於子貢多學而識之之後學將有得之日乎故甞謂自其次致曲以下無仰鑽曕忽之勞則卓爾之見或非真無隨事精察力行之功則一貫之命必不泛及夫道也者平平正正使髙明者不得以獨騖其下者可以企及然後為中庸而可以主張乎皇極詎容一毫有我於其間哉此正統所以獨歸朱子而陸氏所就猶未免為偏安之業也讀蜀阜存藁私記省身法風光月霽其心胸海濶天髙其器宇鳳毛麟趾其威儀玉振金聲其辭語勸君莫著半㸃私終無人不知勸君莫用半㸃術終無人不識君不見巍巍溫公律身巖與人忠赤心質神明素行孚狡童聖賢雖無心占便宜終則盡天下便宜事都歸聖賢做了彼凡計較目前便宜者究竟都不得便宜矣噫向使王莽而間為周公曹操而間為文王亦孰得而禦之然惡木在先除根彼其素所畜者危矣噫徳之威人也重矣哉誠之鑑物也豫矣哉是皆不勞而得者也故君子貴知務必使小人不忍以其所為而疑我之為之也乃為信於人母徒嘐嘐然曰古之人古之人也只似爾七八尺之身即此目前一啓齒一蹂足皆道所存程先生毎敎人静坐李先生亦敎人静坐以驗夫喜怒哀樂之未發時氣衆為何如此法可以飬心可以飬氣可以照萬物而處之各得其宜實得造化之機培夜氣引旦氣善用其氣造化在我而已矣莫虛勞著歩莫虛放出聲久之自閒適蕩蕩復平平宇宙之間三不朽身心之外悉皆虛言出於爾爾忘之乎爾今年幾何矣程子曰君子之志所慮豈止在一身直慮及天下千萬世小人之慮一朝之忿曾不遑恤其身噫清不肖親甞為小人之事矣程子斯言可念也樂莫樂於日休憂莫憂於多求古之人雖疾雷破山而不震雖貨以萬乗而不酬惟胸中一㸃堂堂者常有以砥柱於中流胡五峯云知人之道驗之以事而觀其辭氣從人反躬者鮮不為君子任已葢非者鮮不為小人噫爾尚敬爾心術慎爾行事而和厚爾辭氣檢㸃之功有一之未至將不逃人於明目之一照而為逺近之所嗤議而况人心有神雖非明者亦未易欺器量要宏識見要精趣味要清服食常溫一體皆春心氣常順百病自遯周子之機超凡之梯張子之豫作聖之㨿程朱之敬立身之命敬以立身實地斯存豫以作聖吾計如定幾以超凡一躍入關名三實一静虛動直山居不欠薪舟行不欠水更有便於是人心不欠理吁嗟人心兮不欠理我欲仁斯仁至惜也早不知滋味逮血氣之力衰而義理之念回兮年將暮矣不及今而畜三年之艾兮七年之病竟何時而起矣戒爾重其言言欲亮而貞出於我不重則人之聼之也輕惟古之聖賢兮率然隻語逹天聲垂之後世而為經善言者自簡善應者自定君不見鐘不扣則不鳴水不止則不瑩長注念於逺大而實地則在乎目前夫惟能踐實地於目前是以垂聲光於綿綿而可以上報乎君親師與夫先聖先賢有道徳者必不多言有信義者必不多言有才謀者必不多言惟見夫細人狂人佞人乃多言耳夫未有多言而不妄者也澄其心於淵瑩之天奉其身於光明之地言則無一字之遺而亦無一字之贅動則如萬鈞之弩一發便中其機會此葢古之人也以篤實信天下以大節竦天下以器量包天下以學識周天下以規模駕天下以實才猷實事業副天下嗚呼豈不真烈烈然大丈夫哉若是真學問文章須見於威儀之際與夫日用之常若是真道徳性命須見於治家之法與夫當官之政不然徒皇皇於多故而在身無受用之實在心無洒落之趣真是博學之小人而詞章之兒豎爾危哉格天之功興於袵席溺身之悔誤於詞章若能做好人仇家不得嗔不能做好人朱均無至親太常潘南山先生府潘府號南山浙之上虞人𢎞治辛丑進士累官至提學副使終飬不出後以薦陞太僕寺少卿改太常寺致仕嘉靖五年六月癸酉卒先生性至孝甞疏請行三年之䘮又上聖學淵源中興治要諸疏故事四品有祭無𦵏上以其孝行特給之蕺山先師議以先生配享尹和靖按先生正當文成講學之時當有徃來問難而今不可攷見矣南山素言人得天地正氣以生直飬之曰正學順行之曰正道飬之弗直行之弗順者邪也君子誦聖人之言愛之如父母敬之如后王好人譽已而忌稱人之善惡人毁已而樂道人之惡民俗斯下矣古之言也心之聲今之言也口之聲古之文也言之文今之文也文之文今之心亦果有異於古之心乎飲食男女入道之門也故君子謹微務禮義以飬心者積久而身潤務㫖甘以飬口者過則疾病生焉聖人之道盈天地皆是也學者反諸身而求之可見矣吾身一天道也薦賢惟恐後論功惟恐先古之道也耽淫樂者必耽色好善人者必好學邪正各以類動也天下之人凡孔子所不與者皆異端也鄙夫佞人郷愿是也伊川之學而有魏公之量荆公之時亦可以舉禮樂矣明道善處荆公伊川不善處蘇公亦可以觀二子矣范仲淹司馬光李綱胡寅文天祥此五人者三代以下豪傑之才也充其識量皆可以與諸葛亮並立矣治家亦欲嚴嚴然後和和然後久邵堯夫蔡元定皆有廣易自得氣象葢務精義之學故爾冠婚䘮祭家法之本也好聞過不若好改過俗吏聖門蠧家之賊也腐儒聖門敗家之子也經筵得真儒人主無非心朝廷得賢相人主無過舉君子與時進退故終身無咎心内也言動衣冠外也内外交正然後謂之君子君子處事過緩則怠過速則踈其損一也聖人吾不得見矣吾見六經矣因語以求其心聖人亦可見矣無實之名禍之門也無名之實福之基也居官之本有三薄奉飬亷之本也逺聲色勤之本也去䜛私明之本也民生不可一日無榖帛尤不可斯須無禮義學者有繼聖之心匹夫有顯君之志皆分内事耳學然後知過學之篤然後能改過古者文以載道宋景濓得其華方正學得其大五經皆史也易之史奥書之史實詩之史婉禮之史詳春秋之史嚴其義則一而已士而樂放佚者漸與無忌憚近矣叅政羅東川先生僑羅僑字惟升别號東川豫之吉水人從學於張東白登𢎞治己未進士第授新會知縣表白沙言行令邑人誦法之除大理評事時逆瑾擅政劉大夏論戍先生上言非勸大臣之道免官歸瑾誅復官又以病歸文成起兵討宸濠請先生居守吉安事平擢知台州府禮布衣張尺問民疾苦治行第一陞廣東左叅政上疏乞骸骨嘉靖甲午九月卒先生所學是静存動察切實工夫未必有自得處但砥礪頗密不失儒先軌範在東白之門可謂克家矣潛心語録凡細微曲折之不能謹惰慢放逸之不能除只是心生飬不熟持敬工夫尚欠耳每於暗室中静坐久亦自生明觸目光輝豈有此心静久而不生明者乎人心有明暗何也明者是原來天理暗者是後來私欲用心專一便是敬平日有矜持之工夫則隨寓有安舒之氣象欲求道者必於心上理會欲求心者必於性情上理會欲求性情者必於事物上理會心正則性情正性情正則事物當而近道矣欲㸔動時無差須在静時無欠欲㸔行時無差須在知處無欠學者工夫不過謹於性情心術念慮之微喜怒憂懼愛惡嗜慾視聼言動衣冠寢興食息辭受取予出處進退窮達患難死生之際涵飬於平時察識於方動審決於臨事則無適非道而效驗隨之矣身在此心即在此事在此心即在此精神專一莫非天理流行即敬也愈嚴愈密是之謂篤恭事如是心亦如是表如是裏亦如是純粹真實莫非天理周匝即誠也積中布外是之謂王道然敬則誠矣誠則敬矣心不能無感未發時寂然為静然不妄動亦是静感而遂通為動動而内照深沈存神黙運於其間亦是静所得多在静中動時所得皆受用乎静中也而動静一矣所行多出所知行處有得皆受用乎所知也而知行一矣當知動中有静静中有動動静互見不可截然分先後未發是静已發是動然静已涵動之機到已發必以静為之根所存主處便是静所發現處便是動動中有静也故曰聖人定之以中正仁義而主静立人極焉凡事循理即是敬天葢天即理也凡一言一動一語一黙一出一處一取一與皆須有當然之則明儒學案卷四十六
