body:
  text: 明儒學案卷四十三餘姚黃宗羲撰諸儒學案上諸儒學案者或無所師承得之於遺經者或朋友夾持之力不令放倒而又不可系之朋友之下者或當時有所興起而後之學者無待者俱列於此上卷則國初為多宋人規範猶在中卷則皆驟聞陽明之學而駭之有此辨難愈足以發明陽明之學所謂他山之石可以攻玉也下卷多同時之人半歸忠義所以證明此學也否則為偽而已文正方正學先生孝孺􅌦山趙考古先生謙學正曹月川先生端僉憲黃南山先生潤玉文毅羅一峰先生倫文懿章楓山先生懋郎中莊定山先生㫤侍郎張東白先生元禎方伯陳克菴先生選布衣陳剰夫先生真晟方伯張古城先生吉方伯周翠渠先生瑛司成蔡虚齋先生清太常潘南山先生府㕘政羅東川先生僑諸儒學案上一文正方正學先生孝孺方孝孺字希直台之寧海人自㓜精敏絶倫八嵗而讀書十五而學文輒為交友所稱二十遊京師從學於太史宋濂濂以為遊吾門者多矣未有若方生者也濂返金華先生復從之先後凡六嵗盡傳其學兩應召命授漢中教授蜀獻王聘為世子師獻王甚賢之名其讀書之堂曰正學建文帝召為翰林博士進侍講學士帝有疑問不時宣召君臣之間同於師友金川失守先生斬衰哭不絶聲文皇召之不至使其門人廖鏞徃先生曰汝讀㡬年書還不識個是字於是繫獄時當世文章共推先生為第一故姚廣孝嘗囑文皇曰孝孺必不降不可殺之殺之天下讀書種子絶矣文皇既慚徳此舉欲令先生草詔以塞天下之人心先生以周公之説窮之文皇亦降志乞草先生怒罵不已磔之聚寳門外年四十六坐死者凡八百四十七人南渡諡文正先生直以聖賢自任一切世俗之事皆不闗懐朋友以文辭相問者必告之以道謂文不足為也入道之路莫切於公私義利之辨念慮之興當静以察之舎此不治是猶縱盗於家其餘無可為力矣其言周子之主静主於仁義中正則未有不静非强制其本心如木石然而不能應物也故聖人未嘗不動謂聖功始於小學作幼儀二十首謂化民必自正家始作宗儀九篇謂王治尚徳而緩刑作深慮論十篇謂道體事而無不在列雜誡以自警持守之嚴剛大之氣與紫陽真相伯仲固為有明之學祖也先生之學雖出自景濂氏然得之家庭者居多其父克勤嘗尋討鄉先逹授受源委寢食為之㡬廢者也故景濂氏出入於二氏先生以叛道者莫過於二氏而釋氏尤甚不憚放言驅斥一時僧徒俱恨之庸人之論先生者有二以先生得君而無救於其亡夫分封太過七國之反漢髙祖釀之成祖之天下髙皇帝授之一成一敗成祖之智勇十倍吳王濞此不可以成敗而譽咎王室也况先生未嘗當國恵宗徒以經史見契耳又以先生激烈已甚致十族之酷夫成祖天性刻薄先生為天下屬望不得其草則怨毒倒行何所不至不闗先生之甚不甚也不觀先生而外其受禍如先生者寧皆已甚之所致乎此但可委之無妄之運數耳蔡虚齋曰如遜志者葢千載一人也天地幸生斯人而乃不終祐之使斯人得竟為人世用天地果有知乎哉痛言及此使人直有追憾天地之心也乃知先正固是有定論也雜誡人孰為重身為重身孰為大學為大天命之全天爵之貴備乎心身不亦重乎不學則同乎物學則可以守身可以治民可以立教學不亦大乎學者聖人所以助乎天也天設其倫非學莫能敦人有恒紀非學莫能序故賢者由學以明不賢者廢學以昏大匠成室材木盈前程度去取沛然不亂者繩墨素定也君子臨事而不眩制變而不擾者非學安能定其心哉學者君子之繩墨也治天下如一室發於心見於事出而不匱煩而不紊不學者其猶盲乎手揣足行物至而莫之應治人之身不若治其心使人畏威不若使人畏義治身則畏威治心則畏義畏義者於不善不禁而不能為畏威者禁之而不敢為不敢與不能何啻陵谷養身莫先於飲食養心莫要於禮樂人未嘗一日舎飲食何獨禮樂而棄之尊所賤卑所貴失莫甚焉古之仕者及物今之仕者適已及物而仕樂也適已而棄民恥也與其貴而恥孰若賤而樂故君子難仕古之治具五政也教也禮也樂也刑罰也今亡其四而存其末欲治功之逮古其能乎哉不復古之道而望古之治猶陶瓦而望其成鼎也三代之化民也周而神後世之禁民也嚴而拙不知其拙也而以古為迂孰迂也哉化於未萌之謂神止於未為之謂萌禁於已著之謂察亂而後制之謂瞽秦漢之治其瞽也與不師古而瞽之師孰謂之非瞽也古禮之亡也人不知事親之道今䘮禮朝夕奠之儀其事生之常禮乎孔子曰至於犬馬皆能有養不敬何以别乎噫行者鮮矣為子孫者欲其慤不欲其浮欲其循循然不欲其頟頟然循循者善之徒頟頟者惡之符一年之勞為數十年之利十年之勞為數百年之利者君子為之君子之為利利人小人之為利利已待人而知者非自得也待物而貴者非至貴也不怍於心合乎天足乎已及乎人而無容心焉惟君子哉君子有四貴學貴要慮貴逺信貴篤行貴果好義如飲食畏利如蛇虺居官如居家愛民如愛身者其惟貞恵公乎釋書而為治而政無不習也去位而野處而色未嘗異也是以不以才自名而才者莫能及不以道自任而君子推焉世俗之學豈足以窺之乎學術之微四蠧害之也文姦言摭近事窺伺時勢趨便投隙以貴富為志此謂利禄之蠧耳剽口􅃷詭色滛辭非聖賢而自立果敢大言以髙人而不顧理之是非是謂務名之蠧鉤摭成説務合上古毁訾先儒以謂莫我及也更為異義以惑學者是謂訓詁之蠧不知道徳之㫖雕飾綴緝以為新竒鉗齒刺舌以為簡古於世無所加益是謂文辭之蠧四者交作而聖人之學亡矣必也本諸身見諸政教可以成物者其惟聖人之學乎去聖道而不循而惟蠧之歸甚哉其惑也為政有三曰知體稽古審時缺一焉非政也何謂知體自大臣至胥吏皆有體違之則為罔先王之治法詳矣不稽其得失而肆行之則為野時相逺也事相懸也不審其當而惟古之拘則為固惟豪傑之士智周乎人情才逹乎事為故行而不罔不野不固定天下之争者其惟井田乎弭天下之暴者其惟比閭族黨之法乎有恒分而知恒道奚由亂貧國有四而凶荒不與焉聚斂之臣貴則國貧勲戚任子則國貧上好征伐則國貧賄賂行於下則國貧富國有四而理財不與焉政平刑簡也民樂地闢也上下相親也昭儉而尚徳也此富國之本也國不患乎無積而患無政家不患乎不富而患無禮政以節民民和則親上而國用足矣禮以正倫倫序得則衆志一家合為一而不富者未之有也學古而不逹當世之事鄙木之士也通乎事變而不本於道術權詐之士也鄙木者不足用權詐者不可用而善悦人及其失也木愈於詐聞以權詐亡國矣未聞鄙木者之僨事也故君子尚朴而不尚華與其詐也寧木仕之道三誠以相君正以持身仁以恤民而不以利禄撓乎中一存乎利禄則凡所為者皆徇乎人徇人者失其天失天而得人愈貴而猶賤也柔仁者有後剛暴者難繼仁者陽之屬天之道也生之𩔖也暴者隂之屬地之道也殺之𩔖也好生者祥好殺者殃天行也為家以正倫理别内外為本以尊祖睦族為先以勉學修身為教以樹藝蓄牧為常守以節儉行以慈讓足已而濟人習禮而畏法亦可以寡過矣禮本於人情以制人情泥則拘越則肆折衷焉斯可已古之庶人祭不及祖漢以下及三世非越也人情所不能已也古過於薄今過於厚則從於厚今過於薄不若古之美則惟古是從禮近於厚雖非古猶古也三年之䘮自中出者也非强乎人也因其心之不安莞簟也故枕凷寢苫因其心之不甘於肥厚也故啜粟飲水因其心之不忍於佚樂也故居外次不聞樂豈制於禮而不為哉情之不能止也今世之能䘮者寡矣飲食居處如平時談笑容服無所更變古之戮民與欲正天下之俗非始諸此夫安始君子事親以誠縁情以禮知其無益而偽為之非誠也惑異教而冀冥福者非偽乎聖賢所不言而不合乎道者非禮也化乎異端而奉其教者豈禮也哉事不由禮者夷也夷者夷之死不祔乎祖廟孝子之愛親無所不至也生欲其夀凡可以養生者皆盡心焉死欲其傳凡可以昭揚後世者復不敢忽焉養有不及謂之死其親没而不傳道謂之物其親斯二者罪也物之尤罪也是以孝子修徳修行以令聞加乎祖考守職立功以顯號遺乎祖考稱其善屬諸人而薦譽之俾久而不忘逺而有光今之人不然豐於無用乏費而嗇於顯親之禮以忘自誑而不以學自勉不孝莫大焉國之本臣是也家之本子孫是也忠信禮讓根於性化於習欲其子孫之善而不知教自棄其家也士不可以不知命人之所志無窮而所得有涯者命也使智而可得富貴則孔孟南面矣使徳而可以致福逺禍則羑里匡人之戹無從至矣使君子必為人所尊則賢者無不遇矣命不與人謀也久矣安之故常有餘違之故常不足處俗而不忤者其和乎其弊也流而無立持身而不撓者其介乎其弊也厲而多過介以植其内和以應乎外斯庶矣乎非義之利腊毒可喜之事藏悔易悦之人難近萬全之舉多怨君子知其然功茍可成不沮於怨也人果不可近不受其悦也事之適意必思其艱利之可取先慮其患故名立而身完也儒者之學其至聖人也其用王道也周公没而其用不行世主視儒也藝之而已矣嗚呼孰謂文武周公而不若商君乎人或可以不食也而不可以不學也不食則死死則已不學而生則入於禽獸而不知也與其禽獸也寧死尚鬼之國多病好利之國多貧禍不可避也利不可求也有心於避禍者禍之所趨嗜利無厭者害必從之故君子信道而安命人之不幸莫過於自足恒若不足故足自以為足故不足甕盎易盈以其挾而拒也江海之深以其虚而受也虚已者進徳之基政之弊也使天下尚法學之弊也使學者尚文國無善法世無聖賢二者害之也何尤乎人愛其子而不教猶為不愛也教而不以善猶為不教也有善言而不能行雖善無益也故語人以善者非難聞善而不懈者為難金玉犀貝非産於一國而聚於一家者以好而集也人誠好善善出天下皆將為吾用奚必盡出於已哉智而自用不若聞善而服之懿也才而自為不若任賢之速也瓊山趙考古先生謙趙謙字撝謙初名古則餘姚人也秦王廷美之後降為農家就外傅於崇山寺逹旦忘寐年十七八東遊受業天台鄭四表之門四表學於張以忠以忠學於王伯武伯武胡雲峯之髙第弟子也洪武十二年徴修正韻已别用為中都國子典簿然以其説授之門人宋燧者多採入於正韻在中都又以同官不合而罷歸築考古臺讀書其上謂六經子史厯代闡發有人惟音韻之學世久不明乃著聲音文字通一百卷六書本義十二卷二十二年召為􅌦山教諭黎蛋之人皆知向化稱為海南夫子二十八年十一月一日卒於廣城年四十五先生清苦自立雖盛暑祁寒躡蹻走百餘里徃來問學嘗雪夜與門人柴廣敬劇談既乏酒飲又無火炙映雪危坐以為清供其著述甚多而為學之要則在造化經綸一圖謂其門人王仲廸曰寡欲以養其心觀止以明其理調息以養其氣讀書以驗其誠聖賢之域不難到又讀武王戒書而􅅥然有感以徃古之聖猶儆戒若是之至後世𦕈末小子其敢事事不求之心哉既以古篆隨物而書又銘無所用噐物之未有銘者以見道之無乎不在也其時方希直氏亦補註戒書以為其言之善者與詩書要義何以異焉葢從來學聖之的以主敬為第一義先生固與希直善其講之必有素矣廬陵解縉嘗銘先生之墓謂其力學主敬信不誣也今大紳文集既失此文而先生著述亦多散逸萬厯間焦弱侯所表章者僅先生字學之書其幸得此於其後人故載之於右造化經綸圖周子曰無極而太極太極動而生陽乾道成矣静而生隂坤道成矣陽變隂合五行順布四時行焉一皆自然之天也邵子心為太極葢造化之一氣即聖人之一心造化之氣本於發生而聖人之心亦將以濟世矣故不免由静以之動自無而入有使萬物得以遂其身安其業然人不見其迹者以造化之氣與聖人之心雖動而不離静雖有而不舎無彼萬物與萬民齊見役説戰勞於其間而不自覺故曰帝出乎震成乎艮帝者豈非造化之氣與聖人之心乎夫三聖巍巍繼天立極相與傳授獨辨此心欲學聖賢者舍此心將何所用力哉葢人有情有性而心則統性情者也性者仁義禮智是也情者喜怒哀樂是也心得其養則以性御情而五常百行由此而正心失其養則以情蕩性而五常百行由此而隳此心之所主顧不重乎學者誠能時時省察念念不忘而使道心常為之主人心毎聽命焉則寂然不動之時當與造化同其體及感而遂通自然與造化同其用斯其所以為三極之道三極者三才各一太極也洪武甲戍秋七月既望餘姚趙謙謹識仁愛理得之於天具之於心元孝存則承顔養志愛敬不忘没則慎終追逺繼志述事慎行其身不敢以遺體行殆將為善思貽父母令名必果將為不善思貽父母羞辱必不果公老老幼幼舉斯加彼物我不分窮逹一視克伐怨欲不行意必固我不立恕已所不欲勿施於人不以所長者病人不以所能者愧人不念舊惡慈少者懐之不獨子其子愛矜孤恤貧隨力濟物寛納汚藏疾犯而不校厚徳必報怨不讐故舊不遺篤序姻親成人美揜人過不仁險設機穽包禍心陷人不義中人凶禍忍害物傷人幸災樂禍忌聞人才美而媢疾見人富貴而熱中凡以勝已為不滿者皆忌也刻督責太苛自忍中來掊克無艾自貪中來念怨不忘敗人之善成人之惡薄喜聞人過好言人短忘恩負徳得新棄舊輕訾毁好攻訐克多尚人不遜善事功欲自己出議論專好已勝躁不耐激觸不能容忍自褊中來私立物我分町畦凡事只求自利褊氣宇狹隘不能容物􅍊任情恣横挾勢馮陵義宜理得之於天具之於心利直志義不屈不撓詞色不佞不䛕弟敬兄友弟恭老尚年正任理而行不為阿比安命守分不肯茍求凡出處語黙進退屈伸剛柔寛嚴好惡取舎從違避就貴審其宜而不失自反愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸已剛乾健篤實不為物撓富貴貧賤不滛不移威武不能屈介確然有守不為俗變廉見得思義分無求多勇見善必為知過必改不義貪貨殖玩物貪名逐禄不務自守動輒有求吝不濟人之才當予者不予但有刓忍戀惜之意不教人以善所有則隐蔽惟恐他人知之憂患貧畏禍昔人謂禍患之求只有個處置若過於憂是無義無命也佞脅肩諂笑巧言飾語擎跪曲拳凡冀以逢迎投合人意向者皆是欲耳於聲目於色口於味鼻於臭四肢於安佚懦柔而無立隨俗浮沉自守不堅屈於威勢偏不求中正好惡任情鄙計瑣屑甘猥賤自吝中來悖執已自是違衆從欲比不顧是非徇情黨物怨不安義命不務反躬一切歸咎於天人禮恭理得之於天具之於心亨敬正名辨分敬老崇賢居處恭執事敬内則攝思慮去執固凝然主一而無適外則正衣冠尊瞻視儼然莊重而不慢謹不侈然自放不軒然自得言不輕發事不輕舉不出位而思不怨天不尤人不居下訕上務隐惡揚善避嫌疑審去就不訐以為直不徼以為知讓辭尊居卑推多取少慮以下人善則稱人謙有若無實若虚以能問於不能以多問於寡無禮驕挾富貴以自恣恃才美以為髙常有欲自表意見便有伐在其中常有陵壓人意便有傲在其中侈大室廬華衣服盛車馬美飲食麗噐用越制度不安分誕無而為有虚而為盈約而為泰粗厲氣象兀突難親簡接物不委曲與人無恩義敖簡賢徳侮老成自處放肆待物輕率智别理得之於天具之於心貞窮理博覽以致廣大窮究以盡精微凡大而天地之理微而事物之故明而禮樂之文幽而鬼神之情狀近而人物賢否邪正之分逺而古今興衰治亂之迹無一不當致知疑事毎質知之為知之不知為不知待人不逆詐不億不信又當先覺不可受人之欺見賢思齊見不賢而内自省親賢人逺小人知人識别邪正愛而知其惡憎而知其善處事别是非辯可否審利害計始終義以為質禮以行之遜以出之信以成之知言真偽忠佞貴於辨察知命貧富貴賤甘於自然明不讀非僻之書不為非禮之視聰不受浸潤之譖樂聞讜直之言無智昏於事不審是非可否於人不識誠偽善惡逺賢人交小人淺以小小得䘮為利害以小小毁譽為榮辱以小小逆順為恩怨固拘方泥曲執滯不通陋安於卑陋不務廣覽博取以長見識滿噐識褊狹不能自居矜驕傲世侮慢才徳巧好穿鑿徼以為智不明溺亂色觀非僻之書視非禮之物不聰諱聞過喜䛕佞惡正直輕事不詳審而妄為言不詳審而妄發浮不敦篤信存心真實無妄盡已言顧行行顧言盡人循物無違極誠為人謀而忠與人有終始體道無虚偽不信詐虚言罔人匿行炫燿欺食言偽言大言行事不確實為人不親切有失自葢藏矯心迹不相副沽徼以求名譎多機闗挾術數務詭隨易反覆已上諸條原在圖内今另書於外以便觀者考古續戒書有攸為罔稽乎得失有攸行罔覺乎吉凶惟爾徳之至神惟爾道之至一凡民有疑惟爾質蓍銘徳惟一動則吉行靡中動乃凶神之敬之伊泰筮之庸著格銘馨爾徳容以塞薉斯革香鼎山爾立匪岌岌爾余習筆架昏明之異爾用爾棄永昭爾之徳予夜無寐書燈窈而深藏乃密廓有容隨所出書院正其心艮其背畏無聞慎無視允守兹哲可企室銘大哉聖謨於爾儲奠之之匪他圖書厨抒厥衷善則紀秉有恒致敬此笏銘安毋忘危樂毋忘悲毋曰無知天監於兹毋自欺榻銘齋爾宿慎爾獨毋安爾寢縱爾欲枕銘錦爛如災厥軀綈疏温安以存衾銘簞食豆羮莫之與争羞珍食玉其或顛覆鼎銘戒爾盈盈易傾守爾中中有容水注爾之則符心徳長短不齊惟所適度銘毋苟入毋茍出括汝口時無失囊銘待時而動隨時而静動静惟其時孰執其柄扇銘利若純剛而巽惟所致曷有困錐銘上無諂下無凟慎所與乃無辱名刺諧爾鳴宣乃情永協韶之成毋為鄭之聲琴銘溫而潤惟爾徳之蘊端而方惟爾徳之臧虚而質是以容斯實硯匣黑所致白亦緇欲有所染其慎之墨銘榘而敦質而文紀厥善余所遵圖書方而式廉而直覆渠循常契余徳界方藏厥機勿妄開彼其不齊爾乃裁書剪不偏倚惟爾徳之宜正直如矢隨所之筆式仰彼則重俯此則輕俯仰咸匪常惟執厥中乃爾程權銘或欹或盈罔攸式裒多益寡爾作極量銘安爾蓄爾質的然於外寧藏於宻笥銘坦而夷無欹無危習於兹敬而勿馳簡版疑所决庸而瀎永丹厥心毋為紫奪朱合晨而興謹斯櫛毋以養望為爾逸櫛銘勿為所染而自緇日新又新當自治墨池毋茍汙難復去㸃子匪欲其華匪逞其奢欲觀古像致厥家書义彼有所染庸爾革陂而不塋庸爾澤革如澤如爾之徳砑蠃夫惟静動罔不正夫惟重無怠無縱静兮重兮敬徳日躋壓石懸爾形著厥名永綱紀吾聖經書籖執斯匕毋忘秉耒饘鬻於是以寧余餧匕銘操斯柄亂斯正䯤銘纍寸成尺如彼積徳巾銘觀爾和豫範我規矩趨行抑揚於是度佩銘山削爾形惟亂風是屏毋蔽厥明屏風視彼壺庶乎屢空視兹矢庶乎直躬心端體正遐不中壺矢用則張舍則藏用張舎藏諒比隂陽葢銘毋曰内可闚乎外毋曰外不見其内繄内外無二惟明徳之大簾銘柔而平方而正是藉是凭以彰我名印蓐孑爾形燭聖經學欲緝熈遵爾髙明燭檠去兹塵如垢去身如惡去心其日新尾拂折旋中矩處彼得所印范齒易雪心難潔痛刮䃺厲工毋歇牙刷太剛則缺太鋭則折知爾剛鋭以解余結䥴銘明儒學案卷四十三
