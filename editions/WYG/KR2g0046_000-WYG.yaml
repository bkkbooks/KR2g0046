body:
  text: 明儒學案傳記𩔖三總録之屬提要臣等謹案明儒學案六十二卷國朝黄宗羲撰初周汝登作聖學宗傳孫奇逄又作理學宗傳宗羲以其書未粹且多所缺遺因搜採明一代講學諸人文集語録辨别宗派輯為此書凡河東學案二卷列薛瑄以下凡十五人三原學案一卷列王恕以下凡六人崇仁學案四卷列吳與弼以下凡十人白沙學案二卷列陳獻章以下十二人姚江學案一卷列王守仁一人附録二人浙中相傳學案五卷列徐愛以下十八人江右相傳學案九卷列鄒守益以下二十七人附録六人南中相傳學案三卷列黄省曾以下十一人楚中學案一卷列蔣信等二人北方相傳學案一卷列穆孔暉以下七人閩越相傳學案一卷列薛侃等二人止修學案一卷列李材一人泰州學案五卷列王艮以下十八人甘泉學案六卷列湛若水以下十一人諸儒學案上四卷列方孝孺以下十五人諸儒學案中七卷列羅欽順以下十人諸儒學案下五卷列李中以下十八人東林學案四卷列顧憲成以下十七人蕺山學案一卷列劉宗周一人而以師説一首冠之卷端列方孝孺以下十七人大抵朱陸分門以後至明而朱之傳流為河東陸之傳流為姚江其餘或出或入總往來於二派之間宗羲生於姚江欲抑王尊薛則不甘欲抑薛尊王則不敢故於薛之徒陽為推重而隂致㣲詞于王之徒外示擊排而中存調䕶夫二家之學各有得失及其末流之弊議論多而是非起是非起而朋黨立恩讐轇轕毁譽糾紛正嘉以還賢者不免蔓延及于明季而其禍遂中於國家講學諸儒寔不能辭其責宗羲此書猶勝國門户之餘風非専為講學設也然於諸儒源流分合之故敘述頗詳猶可考見其得失知當時黨禍所由來是亦千古之炯鑑矣卷端仇兆鼇序及賈潤所評皆持論得平不阿所好併録存之以備考鏡焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀明儒學案原序盈天地間皆心也人與天地萬物為一體故窮天地萬物之理即在吾心之中後之學者錯㑹前賢之意以為此理懸空於天地萬物之間吾從而窮之不幾於義外乎此處一差則萬殊不能歸一夫茍工夫着到不離此心則萬殊總為一致學術之不同正以見道體之無盡也奈何今之君子必欲出於一途勦其成説以衡量古今稍有異同即詆之為離經畔道時風衆勢不免為黃芽白葦之歸耳夫道猶海也江淮河漢以至涇渭蹄涔莫不晝夜曲折以趨之其各自為水者至於海而為一水矣使為海若者汰然自喜曰咨爾諸水導源而來不有緩急平險清濁遠近之殊乎不可謂盡吾之族𩔖也盍各返爾故處如是則不待尾閭之洩而蓬萊有清淺之患矣今之好同惡異者何以異是有明事功文章未必能越前代至於講學余妄謂過之諸先生學不一途師門宗㫖或析之為數家終身學術毎久之而一變二氏之學程朱闢之未必廓如而明儒身入其中軒豁呈露用毉家倒倉之法二氏之葛藤無乃為焦芽乎諸先生不肯以朦精神冐人糟粕雖淺深詳畧之不同要不可謂無見於道者也余於是分其宗㫖别其源流與同門姜定庵董無休操其大要以著於篇聴學者從而自擇中衢之罇持瓦甌樿杓而往無不滿腹而去者湯潛庵曰學案宗㫖雜越茍善讀之未始非一貫也陳介睂曰學案如王㑹圖洞心駭目始見天王之大總括宇宙書成於丙辰之後許酉山刻數卷而止萬貞一又刻之而未畢壬申七月余病幾革文字因緣一切屏除仇滄柱都中寓書言北地賈若水見學案而嘆曰此明室數百歲之書也可聴之埋沒乎亡何賈君亡其子醇庵承遺命刻之嗟乎余於賈君邈不相聞而精神所感不異同室把臂余則何能顧賈君之所以續慧命者其功偉矣黃宗羲序明儒學案發凡從來理學之書前有周海門聖學宗傳近有孫鍾元理學宗傳諸儒之説頗備然陶石簣與焦弱侯書云海門意謂身居山澤見聞狹陋嘗願博求文獻廣所未備非敢便稱定本也且各家自有宗㫖而海門主張禪學擾金銀銅鐵為一器是海門一人之宗㫖非各家之宗㫖也鍾元襍収不復甄别其批註所及未必得其要領而其聞見亦猶之海門也學者觀羲是書而後知兩家之疎略大凡學有宗㫖是其人之得力處亦是學者之入門處天下之義理無窮苟非定以一二字如何約之使其在我故講學而無宗㫖即有嘉言是無頭緒之亂絲也學者而不能得其人之宗㫖即讀其書亦猶張騫初至大夏不能得月氐要領也是編分别宗㫖如燈取影杜牧之曰丸之走盤横斜圓直不可盡知其必可知者是知丸不能出於盤也夫宗㫖亦若是而已矣嘗謂有明文章事功皆不及前代獨於理學前代之所不及也牛毛蠒絲無不辨晰眞能發先儒之所未發程朱之闢釋氏其説雖繁總是只在迹上其彌近理而亂眞者終是指他不出明儒於毫釐之際使無遁影陶石簣亦曰若以見解論當代諸公儘有高過者與羲言不期而合毎見鈔先儒語錄者薈撮數條不知去取之意謂何其人一生之精神未嘗透露如何見其學術是編皆從全集纂要鈎元未嘗襲前人之舊本也儒者之學不同釋氏之五宗必要貫串到青源南嶽夫子既焉不學濂溪無待而興象山不聞所受然其間程子之至何王金許數百年之後猶用高曾之規矩非如釋氏之附會源流而已故此編以有所授受者分為各案其特起者後之學者不甚著名總列諸儒之案學問之道以各人自用得著者為眞凡倚門傍户依様葫蘆者非流俗之士則經生之業也此編所列有一偏之見有相反之論學者於其不同處正宜著眼理㑹所謂一本而萬殊也以水濟水豈是學問胡季隨從學晦翁晦翁使讀孟子他日問季隨至於心獨無所同然乎季隨以所見解晦翁以為非且謂其讀書鹵莽不思季隨思之既苦因以致疾晦翁始言之古人之於學者其不輕授如此葢欲其自得之也即釋氏亦最忌道破人便作光影玩弄耳此書未免風光狼籍學者徒增見解不作切實工夫則羲反以此書得罪於天下矣是書搜羅頗廣然一人之聞見有限尚容陸續訪求即羲所見而復失去者如朱布衣語錄韓苑洛南瑞泉穆𤣥菴范栗齊諸公集皆不曾採入海内有斯文之責者其不吝教我此非末學一人之事也師説方正學孝孺神聖既逺禍亂相尋學士大夫有以生民為慮王道為心者絶少宋沒益不可問先生稟絶世之資慨焉以斯文自任會有明啓運千載一時深維上天所以生我之意與古聖賢之所講求直欲排洪荒而開二帝去雜霸而見三王又推其餘以淑來禩伊周孔孟合為一人將旦暮遇之此非學而有以見性分之大全不能也既而時命不偶遂以九死成就一個是完天下萬世之責其扶持世教信乎不愧千秋正學者也考先生在當時已稱程朱復出後之人反以一死抹過先生一生苦心謂節義與理學是兩事出此者入彼至不得與揚雄呉草廬論次並稱於是成仁取義之訓為世大禁而亂臣賊子將接踵於天下矣悲夫或言先生之忠至矣而十族與殉無乃傷於激乎余曰先生只自辦一死其激而及十族十族各辦其一死耳普天之下莫非王土十族衆乎而不當死乎惟先生平日學問斷斷乎臣盡忠子盡孝一本於良心之所固有者率天下而趨之至數十年之久幾於風移世變一日乃得透此一段精光不可掩遏葢至誠形著動變之理宜然而非人力之所幾及也雖謂先生為中庸之道可也曹月川端先生之學不由師𫝊特從古册中翻出古人公案深有悟於造化之理而以月川體其撰反而求之吾心即心是極即心之動静是隂陽即心之日用酬酢是五行變合而一以事心為入道之路故其見雖徹而不𤣥學愈精而不襍雖謂先生為今之濂溪可也乃先生自譜其於斯道至四十而猶不勝其渺茫浩瀚之苦又十年怳然一悟始知天下無性外之物而性無不在焉所謂太極之理即此而是葢見道之難如此學者愼毋輕言悟也哉按先生門人彭大司馬澤嘗稱我朝一代文明之盛經濟之學莫盛於劉誠意宋學士至道統之傳則斷自澠池曹先生始上章請從祀孔子廟庭事在正徳中愚謂方正學而後斯道之絶而復續者實賴有先生一人薛文清亦聞先生之風而起者薛敬軒瑄愚按前輩論一代理學之儒惟先生無間言非以實踐之儒歟然先生為御史在宣正兩朝未嘗錚錚一論事景皇易儲先生時為大理亦無言或云先生方轉餉貴州及于肅愍之獄係當朝第一案功罪是非而先生僅請從末減坐視忠良之死而不之救則將焉用彼相矣就事相提前日之不諫是則今日之諫非兩者必居一於此而先生亦已憴不自得乞身去矣然先生於道於古人全體大用儘多缺陷特其始終進退之節有足稱者則亦成其為文清而已閲先生讀書錄多兢兢檢㸃言行間所謂學貴踐履意葢如此或曰七十六年無一事此心惟覺性天通先生晚年聞道未可量也呉康齋與弼愚按先生所不滿於當時者大抵在訟弟一事及為石亨跋族譜稱門士而已張東白聞之有上告素王正名討罪無得久竊虚名之語一時名流盡譁恐未免為羽毛起見者予則謂先生之過不特在訟弟之時而尤在不能喻弟於道之日特其不能喻弟於道而遂至於官且不難以囚服見有司絶無矯飾此則先生之過所謂揭日月而共見者也若族譜之跋自署門下士亦或宜然徐孺子於諸公推轂雖不應命及䘚必千里赴吊先生之意其猶行古之道乎後人以成敗論人見亨他日以反誅便謂先生不當與作緣豈知先生之不與作緣已在應聘辭官之日矣不此之求而屑屑於稱謂語言文字之間甚矣責人之無已也先生之學刻苦奮勵多從五更枕上汗流淚下得來及夫得之而有以自樂則又不知足之蹈之手之舞之葢七十年如一日憤樂相生可謂獨得聖人之心精者至於學之之道大要在涵養性情而以克已安貧為實地此正孔顔尋向上工夫故不事著述而契道眞言動之間悉歸平澹晚年出處一節卓然世道羽儀而處之恬然圭角不露非有得於道其能如是記云澹如秋水貧中味和似春風静後功可為先生冩照充其所詣庶幾依乎中庸遯世不見知而不悔氣象余嘗僭評一時諸公薛文清多困於流俗陳白沙猶激於聲名惟先生醇乎醇云陳剰夫眞晟先生學方胡敬齋而涵養不逮氣質用事晚年静坐一機疑是進步惜未窺先生全書周小泉蕙愚按非聖勿學惟聖斯學二語可謂直指心源段容思先生堅訓小泉先生語而兩人亦獨超語言問答之外其學至乎聖人一日千里無疑也夫聖人之道反身而具足焉不假外求學之即是故先生亦止言學聖段先生云何為有大如天地湏信無窮自古今意先生已信及此非阿所好者是時關中之學皆自河東派來而一變至道陳白沙獻章愚按前輩之論先生備矣今請再訂之學術疑似之際先生學宗自然而要歸於自得自得故資深逢源與鳶魚同一活潑而還以握造化之樞機可謂獨開門户超然不凡至問所謂得則曰静中養出端倪向求之典册累年無所得而一朝以静坐得之似與古人之言自得異孟子曰君子深造之以道欲其自得之也不聞其以自然得也静坐一機無乃淺嘗而捷取之乎自然而得者不思而得不勉而中從容中道聖人也不聞其以静坐得也先生葢亦得其所得而已矣道本自然人不可以智力與纔欲自然便不自然故曰會得的活潑潑地不㑹得的只是弄精魂静中養出端倪不知果是何物端倪云者心可得而擬口不可得而言畢竟不離精魄者近是今考先生証學諸語大都説一段自然工夫髙妙處不容湊泊終是精魂作弄處葢先生設趣近濂溪而窮理不逮學術𩔖康節而受用太早質之聖門難免欲速見小之病者也似禪非禪不必論矣陳克菴選愚按先生躬行粹潔卓然聖人之徒無疑其平生學力盡見於張聚一疏至誠而不動者未之有也通紀評理學未必盡當而推許先生也至矣文肅好古信道眞不愧先生友者文肅先生郷友謝公鐸鳴治羅一峯倫愚按一峯嘗自言予性剛見剛者好之若饑渴之於飲食不能自喻於口者也求之不可得則尚友其人於古相與論其世如侍几杖而聆謦欬也而欷嘘企羨至為泣下予之好剛葢天性然也孔子曰吾未見剛者孟子曰我善養吾浩然之氣至大至剛以塞乎天地之間富貴不能淫貧賤不能移威武不能屈此眞至剛至大丈夫哉孔孟之所謂剛予之所好者也此可為先生實錄先生之學剛而正或擬之孔融非是又傳先生既謫官過崇仁求謁康齋康齋不見意待再三而後見之先生怒投一詩去康齋之不見所以進先生之意深矣惜先生不悟也又當時張廷祥獨不喜康齋故先生亦不喜之然康齋終不可及也蔡虚齋清先生闇修篤行不聚徒不講學不由師承崛起希曠之後一以六經為入門四子為標準而反身用力本之静虚之地所謂眞道徳性命端向此中有得焉久之涵養深至日改而月以化庶幾慥慥君子前輩稱月湖過先生殊未然月湖之視先生猶子夏之於曾子玉夫清修勁力差可伯仲惜未底於成又先生嘗友林見素考見素立朝卓然名徳又累疏薦羅整菴王陽明呂涇野陳白沙則其聲氣所感通可知俟再考以入月湖楊廉號玉夫丁幾字王陽明守仁先生承絶學於詞章訓詁之後一反求諸心而得其所性之覺曰良知因示人以求端用力之要曰致良知良知為知見知不囿於聞見致良知為行見行不滯於方隅即知即行即心即物即動即静即體即用即工夫即本體即下即上無之不一以救學者支離眩騖務華而絶根之病可謂震霆啓寐烈耀破迷自孔孟以來未有若此之深切著明者也特其與朱子之説不無牴牾而所極力表章者乃在陸象山遂疑其或出於禪禪則先生固嘗迯之後乃覓其非而去之矣夫一者誠也天之道也誠之者明也人之道也致良知是也因明至誠以人合天之謂聖禪有乎哉即象山本心之説疑其為良知之所自來而求本心於良知指㸃更為親切合致知於格物工夫確有循持較之象山混人道一心即本心而求悟者不猶有毫釐之辨乎先生之言曰良知只是獨知時本非元妙後人强作元妙觀故近禪殊非先生本㫖至其與朱子牴牾處總在大學一書朱子之解大學也先格致而後授之以誠意先生之解大學也即格致為誠意其於工夫似有分合之不同然詳二先生所最喫𦂳處皆不越慎獨一關則所謂因明至誠以進於聖人之道一也故先生又有朱子晚年定論之説夫大學之教一先一後階級較然而實無先後之可言故八目總是一事先生命世人豪龍塲一悟得之天啓亦自謂從五經印證過來其為廓然聖路無疑特其急於明道往往將向上一幾輕於指㸃啓後學獵等之弊有之天假之年盡融其高明踔絶之見而底於實地安知不更有晚年定論出於其間而先生且遂以優入聖域則範圍朱陸而進退之又不待言矣先生屬纊時嘗自言曰我平生學問纔做得數分惜不得與吾黨共成之此數分者當是善信以上人明道而後未見其比先生門人徧天下自東廓先生而外諸君子其最著與然而源淵分合之故亦略可覩云鄒東廓守益按鄧文潔公稱陽明必為聖學無疑及門之士概多矛盾其説而獨有取於念菴然何獨近遺東廓耶東廓以獨知為良知以戒懼謹獨為致良知之功此是師門本㫖而學焉者失之浸流入猖狂一路惟東廓斤斤以自體之便將此意做實落工夫卓然守聖矩無少畔援諸所論著皆不落他人訓詁良知窠臼先生之教率賴以不敝可謂有功師門矣後來念菴収攝保聚之説實遡諸此王龍溪畿愚按四句教法考之陽明集中並不經見其説乃出於龍溪則陽明未定之見平日間嘗有是言而未敢筆之於書以滋學者之惑至龍溪先生始云四有之説猥犯支離勢必進之四無而後快既無善惡又何有心意知物終必進之無心無意無知無物而後𤣥如此則致良知三字著在何處先生獨悟其所謂無者以為教外之别傳而實亦併無是無有無不立善惡雙冺任一㸃虚靈知覺之氣從横自在頭頭明顯不離著於一處幾何而不蹈佛氏之坑塹也哉夫佛氏遺世累專理會生死一事無惡可去并無善可為止餘真空性地以顯真覺從此悟入是為宗門若吾儒日在世法中求性命吾慾薰染頭出頭没於是而言無善惡適為濟惡之津梁耳先生孜孜學道八十年猶未討歸宿不免沿門持缽習心習境密制其命此時是善是惡只口中勞勞行脚仍不脱在家窠臼孤負一生無處根基惜哉王門有心齋龍溪學皆尊悟世稱二王心齋言悟雖超曠不離師門宗㫖至龍溪直把良知作佛性看懸空期個悟終成玩弄光景雖謂之操戈入室可也羅整菴欽順愚按先生之學始由禪入從庭前柏樹子話頭得悟一夕披衣通身汗下自怪其所得之易反而求之儒不合也始知佛氏以覺為性以心為本非吾儒窮理盡性至命之㫖乃本程朱格致之説而求之積二十年久始有見於所謂性與天道之端一口打并則曰性命之妙理一分殊而已矣又申言之曰此理在心目間由本而知末萬象紛紜而不亂自末而歸本一眞湛寂而無餘因以自附於卓如之見如此亦可謂苦且難矣竊思先生所謂心目之間者不知實在處而其本之末末歸本者又孰從而之之歸之乎理之分殊即孔子一貫之㫖其要不離忠恕者是則道之不逺於人心亦從可決矣乃先生方斷斷以心性辨儒釋直以求心一路歸之禪門故寜舍置其心以言性而判然二之處理於不外不内之間另呈一心目之象終是泛觀物理如此而所云之之歸之者亦是聴其自知之而自歸之於我無與焉則亦不自覺其墮於怳惚之見矣考先生所最得力處乃在以道心為性指未發而言人心為情指已發而言自謂獨異於宋儒之見且云於此見得分明則無往而不合試以先生之言思之心與性情原只是一人不應危是心而微者非心止緣先生認定佛氏以覺為性謂覺屬已發是情不是性即本之心亦只是惟危之心而無惟微之心遂以其微者拒之於心外而求之天地萬物之表謂天下無性外之物格物致知本末一貫而後授之誠正以立天下之大本若是則幾以性為外矣我故曰先生未嘗見性以其外之也夫性果在外乎心果在内乎心性之名其不可混者猶之理與氣而其終不可得而分者亦猶之乎理與氣也先生既不與宋儒天命氣質之説而蔽以理一分殊之一言謂理即是氣之理是矣獨不曰性即是心之性乎心即氣之聚於人者而性即理之聚於人者理氣是一則心性不得是二心性是一性情又不得是二使三者於一分一合之間終有二焉則理氣是何物心與性情又是何物天地間既有箇合氣之理又有箇離氣之理既有箇離心之性又有箇離性之情又烏在其為一本也乎吾儒本天釋氏本心自是古人鐵案先生娓娓之言可為大有功於聖門要之善言天者正不妨其合於人善言心者自不至流而為釋先生不免操因噎廢食之見截得界限分明雖足以洞彼家之弊而實不免抛自身之藏考先生於格物一節幾用却二三十年工夫迨其後即説心説性説理氣一字不錯亦只是説得是形容得著於坐下毫無受用若先生莊一静正徳行如渾金璞玉不愧聖人之徒自是生質之美非關學力先生嘗與陽明先生書云如必以學不資於外求但當反觀内省以為務則誠意正心四字亦何不盡之有何必於入門之際便困以格物一段工夫嗚呼如先生者眞所謂困以格物一段工夫不特在入門且在終身者也不然以先生之質早尋向上而進之宜其優入聖域而惜也僅止於是雖其始之易悟者不免有毫釐之差而終之苦難一生擾擾到底者幾乎千里之謬葢至是而程朱之學亦弊矣由其説將使學者終其身無入道之日困之以二三十年工夫而後得而得已無幾視聖學幾為絶徳此陽明氏所以作也呂涇野柟愚按關學世有淵源皆以躬行禮教為本而涇野先生實集其大成觀其出處言動無一不規於道極之心術隠微無毫髪可疑卓然閔冉之徒無疑也異時陽明先生講良知之學本以重躬行而學者誤之反遺行而言知得先生尚行之㫖以救之可謂一髪千鈞時先生講席幾與陽明氏中分其盛一時篤行自好之士多出先生之門孟雲浦化鯉孟我彊秋張陽和元忭愚按二先生如冰壺秋水兩相輝映以紹家傳於不墜可稱北地聨璧吾鄉文恭張先生則所謂附驥尾而名益彰者乎讀二孟行張文恭作可信也文恭又嘗有壯哉行贈鄒進士遣戍貴陽其為臭味如此君子哉若人於今吾不得而見之矣文恭與同鄉羅文懿為筆硯友其後文懿為㑹試舉主文恭自追友誼如昔亦不署門生文懿每憾之文恭不顧廷對係髙中元讀卷後相見亦不署門生其矯矯自立如此文恭又與鄧文潔交莫逆及其沒也文潔祭以文稱其好善若渴以天下為已任云羅念菴洪先趙大洲貞吉王塘南時槐鄧定宇以讚按王門惟心齋氏盛傳其説從不學不慮之㫖轉而標之曰自然曰學樂末流衍蔓浸為小人之無忌憚羅先生後起有憂之特拈収攝保聚四字為致良知符決故其學專求之未發一機以主静無欲為宗㫖可為衛道苦心矣或曰先生之主静不疑禪歟曰古人主教皆權法王先生之後不可無先生吾取其足以扶持斯道於不墜而已况先生已洞其似是而出入之逃楊歸儒視無忌憚者不猶近乎趙王鄧三先生其猶先生之意歟鄧先生精密尤甚其人品可伯仲先生羅近溪汝芳鄧先生當土苴六經之後獨發好古精心考先聖人之遺經稍稍補綴之端委纚然挽學者師心誣古之弊其功可謂大矣乃其學實本之東廓獨聞戒懼謹獨之㫖則雖謂先生為王門嫡傳可也余嘗聞江西諸名宿言先生學本修羅先生本悟兩人齗齗争可否及晚年先生竟大服羅先生不覺席之前也考其祭羅先生文略見一班則羅先生之所養葢亦有大過人者余故擇其喫𦂳眞切者載於篇令後之學莽蕩者無得藉口羅先生也李見羅材文成而後李先生又自出手眼諄諄以止修二字壓倒良知亦自謂考孔曾俟後聖抗顔師席率天下而從之與文成同昔人謂良知醒而蕩似不若止修二字有根據實也然亦只是尋將好題目做文章與坐下無與吾人若理會坐下更何良知止修分别之有先生氣魄大以經世為學酷意學文成故所至以功名自喜微叩其歸宿往往落求可求成一路何敢望文成後塵大學一書程朱説誠正陽明説致知心齊説格物盱江説明明徳釗江説修身至此其無餘藴乎許敬菴孚逺余嘗親受業許師見師端凝敦大言動兢兢儼然儒矩其密繕身心纖悉不肯放過於天理人欲之辨三致意焉嘗深夜與門人子弟輩窅然静坐輒追數平生酒色財氣分數消長以自證其所學篤實如此
