body:
  text: 明儒學案卷十七餘姚黄宗羲撰江右相𫝊學案二文莊歐陽南野先生徳歐陽徳字崇一號南野江南泰和人甫冠舉鄉試從學王文成於䖍臺不赴春官者二科文成呼為小秀才登嘉靖二年進士第知六安州遷刑部員外郎改翰林院編修踰年遷南京國子司業南京尚寳司卿轉太僕寺少卿尋出為南京鴻臚寺卿丁父憂服除起原官疏乞終養不許遷南京太常寺卿尋召為太常卿掌祭酒事陞禮部左侍郎改吏部兼翰林院學士掌詹事府事母卒廬墓服未闋召拜禮部尚書兼翰林院學士直無逸殿三十三年三月二十一日卒於官年五十九贈太子少保諡文莊先生立朝大節在國本尤偉彼時上諱忌儲貳之事蓋中妖人陶仲文二龍不相見之説故自莊敬太子既薨不欲舉行册立二子並封為王先生起宗伯即以為言不報㑹詔二王婚於外府先生言昔太祖以父婚子諸王皆處禁中孝宗以兄婚弟諸王始皆出府今事與太祖同宜如初制行之上不可令二王出居外府先生又言㑹典醮詞主器則曰承宗分藩則曰承家今其何所適從上不悦曰既云王禮自有典制可遵如若所言則何不竟行册立也先生即具冊立東宫儀注以上上大怒二王行禮訖無軒輊穆宗之母康妃死先生上喪禮儀注一依成化中紀淑妃故事紀淑妃者孝宗之母也上亦不以為然以諸妃禮葬之先生據禮守義不奪於上之喜怒如此宗藩典禮一裁以義又其小小者爾先生以講學為事當是時士咸知誦致良知之説而稱南野門人者半天下癸丑甲寅間京師靈濟宫之會先生與徐少湖聶雙江程松溪為主盟學徒雲集至千人其盛為數百年所未有羅整菴不契良知之㫖謂佛氏有見於心無見於性故以知覺為性今言吾心之良知即是天理亦是以知覺為性矣先生申之曰知覺與良知名同而實異凡知視知聴知言知動皆知覺也而未必其皆善良知者知惻隱知羞惡知恭敬知是非所謂本然之善也本然之善以知為體不能離知而别有體盖天性之真明覺自然隨感而通自有條理是以謂之良知亦謂之天理天理者良知之條理良知者天理之靈明知覺不足以言之也整菴難人之知識不容有二孟子但以不慮而知者名之曰良非謂别有一知也今以知惻隱羞惡恭敬是非為良知知視聴言動為知覺殆如楞伽所謂真識及分别事識者先生申之曰非謂知識有二也惻隱羞惡恭敬是非之知不離乎視聴言動而視聴言動未必皆得其惻隱羞惡之本然者故就視聴言動而言統謂之知覺就其惻隱羞惡而言乃見其所謂良者知覺未可謂之性未可謂之理知之良者乃所謂天之理也猶之道心人心非有二心天命氣質非有二性也整菴難誤認良知為天理則於天地萬物之理一切置之度外更不復講無以達夫一貫之妙先生申之曰良知必發於視聴思慮視聴思慮必交於天地人物天地人物無窮視聴思慮亦無窮故良知亦無窮離却天地人物亦無所謂良知矣然先生之所謂良知以知是知非之獨知為據其體無時不發非未感以前别有未發之時所謂未發者盖即喜怒哀樂之發而指其有未發者是已發未發與費隠㣲顯通為一義當時同門之言良知者雖有淺深詳略之不同而緒山龍溪東廓洛村明水皆守已發未發非有二候致和即所謂致中獨聶雙江以歸寂為宗工夫在於致中而和即應之故同門環起難端雙江往復良苦後遇念菴則雙江不自傷其孤孑矣盖致良知宗㫖陽明發於晚年未及與學者深究然觀𫝊習録云吾昔居滁時見諸生多務知解無益於得姑教之静坐一時窺見光景頗収近效久之漸有喜静厭動流入枯槁之病故邇來只説致良知良知明白隨你去静處體悟也好隨你去事上磨鍊也好良知本體原是無動無静的此便是學問頭腦其大意亦可見矣後來學者只知在事上磨鍊勢不得不以知識為良知隂流密陷於義襲助長之病其害更甚於喜静厭動葢不從良知用功只在動静上用功而又只在動上用功於陽明所言分明倒却一邊矣雙江與先生議論雖未歸一雙江之歸寂何嘗枯槁先生之格物不墮支離發明陽明宗㫖始無遺憾兩不相妨也南野論學書静而循其良知也謂之致中中非静也動而循其良知也謂之致和和非動也葢良知妙用有常而本體不息不息故常動有常故常静常動常静故動而無動静而無静答陳盤溪來教若只説致知而不説勿忘勿助則恐學者只在動處用功夫知忘助者良知也勿忘助者致良知也夫用功即用也用即動也故不動而敬不言而信亦動也雖至澄然無際亦莫非動也動而不動於欲則得其本體之静非外動而别有静也古人之學只在善利之間後來學者不知分善利於其心而計較揣量於形迹文為之麄紛紛擾擾泛而無歸故宋儒主静之論使人反求而得其本心今既知得良知更不須論動静矣夫知者心之神明知是知非而不可欺者也君子恒知其是非而不自欺致知也故無感自虚有感自直所謂有為為應迹明覺為自然也是之謂静若有意於静其流将有是内非外喜静厭擾如横渠所謂累於外物者矣見聞知識真妄錯雜者誤認以為良知而疑其有所未盡不知吾心不學而能不慮而知之本體非見聞知識之可混而見聞知識莫非妙用非有真妄之可言而真妄是非輕重厚薄莫非有自然之知也夫良知不學而能不慮而知故雖小人閒居為不善無所不至者其見君子而厭然亦不可不謂之良知雖常人恕已則昏者其責人則明亦不可不謂之良知茍能不欺其知去其不善者以歸於善勿以所惡於人者施之於人則亦是致知誠意之功即此一念可以不異於聖人答劉道夫來教謂動中求静順應不擾殆有見於動中之静求不擾於應酬之中而未究夫無動無静之良知也夫良知無動無静故時動時静而不倚於動静君子之學循其良知故雖疲形餓體而非勞也精思熟慮而非煩也問察辨説而非聒也清静虚澹而非寂也何往而不心逸何往而不日休故學貴循其良知而動静兩忘然後為得答周陸田記中反覆於心性之辨謂佛氏有見於心無見於性故以知覺為性又舉𫝊習録云吾心之良知即所謂天理也此言亦以知覺為性者某常聞知覺與良知名同而實異凡知視知聴知言知動皆知覺也而未必其皆善良知者知惻隱知羞惡知恭敬知是非所謂本然之善也本然之善以知為體不能離知而别有體盖天性之真明覺自然隨感而通自有條理者也是以謂之良知亦謂之天理天理者良知之條理良知者天理之靈明知覺不足以言之也辨整菴困知説謂人之知識不容有二孟子但以不慮而知者名之曰良非謂别有一知也今以知惻隱羞惡恭敬是非為良知知視聴言動為知覺殆如楞伽所謂真識及分别事識者某之所聞非謂知識有二也惻隱羞惡恭敬是非之知不離乎視聴言動而視聴言動未必皆得其惻隱羞惡之本然者故就視聴言動而言統謂之知覺就其惻隱羞惡而言乃見其所謂良者知覺未可謂之性未可謂之理知之良者盖天性之真明覺自然隨感而通自有條理乃所謂天之理也猶之道心人心非有二心天命氣質非有二性源頭支流非有二水先儒所謂視聴思慮動作皆天也人但於其中要識得真與妄耳良字之義正孟子性善之㫖人生而静以上不容説纔説性時便有知覺運動性非知則無以為體知非良則無以見性性本善非由外鑠故知本良不待安排曰不慮而知者其良知猶之曰不待安排者其良心擴而充之以達之天下則仁義不可勝行楞伽之真識宜不得比而同之矣謂有物必有則故學必先於格物今以良知為天理乃欲致吾心之良知於事物則道理全是人安排出事物無復有本然之則矣某竊意有耳目則有聰明之徳有父子則有慈孝之心所謂良知也天然自有之則也視聴而不以私意蔽其聰明是謂致良知於耳目之間父子而不以私意奪其慈孝是謂致良知於父子之間是乃循其天然之則所謂格物致知也舍此則無所據而不免於安排布置逺人以為道矣意與知有辨意者心之意念良知者心之明覺意有妄意有私意有意見所謂㡬善惡者也良知不覩不聞莫見莫顯純粹無疵所謂誠無為者也學者但從意念認取未免善惡混淆漫淫失真誠知所謂良知而致之母自欺而求自慊則真妄公私昭昭不昧何至於誤認意見任意所適也哉答徐少湖良知上用功則動静自一若動静上用功則見良知為二不能合一矣答問格致誠正即是養孟子言養氣亦只在慊於心上用功慊於心即是致良知後世所謂養却只守得個虚静習得從容與聖賢作用處天懸地隔良知乃本心之真誠惻怛人為私意所雜不能念念皆此真誠惻怛故須用致知之功致知云者去其私意之雜使念念皆真誠惻怛而無有虧欠耳孟子言孩提知愛知敬亦是指本心真誠惻怛自然發見者使人達此於天下念念真誠惻怛即是念念致其良知矣故某嘗言一切應物處事只要是良知盖一念不是良知即不是致知矣答胡仰齋理一分殊渾融之中燦然者在親疎内外皆具於天地萬物一體之心其有親疎内外之分即本體之條理天理之流行吾心實未嘗有親疎内外之分也苟分别彼此則同體之心未免有間而其分之殊者皆非其本然之分矣答王克齋兄謂近時學者往往言良知本體流行無所用力遂至認氣習為本性不若説致知功夫不生弊端鄙意則謂今之認氣習為本性者正由不知良知之本體不知良知之本體則致知之功未有靠實可據者故欲救其弊須是直指良知本體之自然流行而無用力者使人知所以循之然後為能實用其力實致其知不然却恐其以良知為所至之域以致知為所入之途未免岐而二之不得入門内也如好善惡惡亦是徹上徹下語循其本體之謂善背其本體之謂惡故好善惡惡亦只是本體工夫本體流行只是好善惡惡答陳明水學者誠不失其良心則雖種種異説紛紛緒言譬之吴楚閩粤方言各出而所同者義茍失其良心則雖字字句句無二無别於古聖猶之孩童玩戲粧飾老態語笑步趨色色近似去之益逺答馬問菴覺則無病可去患在於不覺耳常覺則常無病常存無病之心是真能常以去病之心為心者矣答髙公敬中離懲忿窒慾為第二義亦是為志未徹底徒用力於忿慾者而發人心無聲無臭一旦不可得而見豈有二義三義也來教謂人心自静自明自能變化自有條理原非可商量者不待著一毫力又謂百姓日用不起一念不作一善何嘗鶻突無道理來又謂今世為學用功者茍非得見真體要皆助長必不得已不如萬縁放下隨縁順應又謂人志茍真必不至為惡不勞過為猜防皆日新之語答王士官大學言知止止者心之本體亦即是工夫茍非一切止息何縁得定静安固便將見前酬應百慮認作天機活潑何啻千里寄雙江大抵學不必過求精㣲但麄重私意斷除不浄真心未得透露種種妙談皆違心之言事事周密皆拂性之行向後無真實根脚可劄定得安望其有成也寄横溪弟好惡與人相近言羞惡是非之知不容泯滅後世舍獨知而求之虚明湛一却恐茫然無著落矣答朱芝山自謂寛裕温柔焉知非優游怠忽自謂發强剛毅焉知非躁妄激作忿戾近齋莊瑣細近密察矯似正流似和毫釐不辨離真逾逺然非實致其精一之功消其功利之萌亦豈容以知見情識而能明辨之寄敖純之先師謂致知存乎心悟若認知識為良知正是麄看了未見所謂不學不慮不係於人者然非情無以見性非知識意念則亦無以見良知周子謂誠無為神發知知神之為知方知得致知知誠之無為方知得誠意來書啟教甚明知此即知未發之中矣格物二字先師以為致知之實盖性無體以知為體知無實事物乃其實地離事物則無知可致亦無所用其致之之功猶之曰形色乃天性之實無形色則無性可盡惟踐形然後可以盡性云爾大抵㑹得時道器隱顯有無本末一致㑹未得則滯有淪虚皆足為病答陳明水人心生意流行而變化無方所謂意也忽焉而紛紜者意之動忽焉而専一者意之静静非無意而動非始有盖紛紜専一相形而互異所謂易也寂然者言其體之不動於欲感通者言其用之不礙於私體用一原顯微無間非時寂時感而有未感以前别有未發之時盖雖諸念悉泯而兢業中存即懼意也即發也雖憂患不作而恬静自如即樂意也即發也喜怒哀樂之未發謂之中盖即喜怒哀樂之發而指其有未發者猶之曰視聴之未發謂之聰明聰明豈與視聴為對而各一其時乎聖人之情順萬事而無情是常有意而常無意也常有意者變化無方而流行不息故無始常無意者流行變化而未嘗遲留重滯故無所答王堣齋夫人神發為知五性感動而萬事出物也者視聽言動喜怒哀樂之𩔖身之所有知之所出者也視聽喜怒之𩔖有禮有非禮有中節有不中節茍密察其心之不可欺者則莫不自知之故知也者事物之則有條有理無過不及者也物出於知知在於物故致知之功亦惟在於格物而已夫隠顯動靜通貫一理特所從名言之異耳故中也和也中節也其名則二其實一獨知也故是是非非者獨知感應之節為天下之逹道其知則所謂貞静隠微未發之中天下之大本也就是是非非之知而言其至費而隠無少偏倚故謂之未發之中就知之是是非非而言其至微而顯無少乖戾故謂之中節之和非離乎動用顯見别有貞静隠微之體不可以知是知非言者也程子謂言和則中在其中言中則涵喜怒哀樂在其中答蘇季明之問謂知即是已發已發但可謂之和不可謂之中文謂既有知覺却是動怎生言靜者蓋為季明欲求中於喜怒哀樂未發之前則二之矣故反其詞以詰之使驗諸其心未有絶無知覺之時則無時不發無時不發則安得有所謂未發之前而已發又不可謂之中則中之為道與所謂未發者斷可識矣又安得前乎未發而求其所謂中者也既而季明自悟其㫖曰莫是於動上求静否程子始是其説而猶未深然之恐其端倪微差而毫釐之間猶未免於二之也寄雙江来教云虚靈是體知覺是用必虚而後靈無欲則静虚静虚則明無事則虚虚則明此是周程正法眼藏可容以所知所覺混能知能覺耶夫知覺一而已欲動而知覺始失其虚靈虚靈有時失而知覺未嘗無似不可混而一然未有無知覺之虚靈茍不虚不靈亦未足以言覺故不可岐而二然此亦為後儒有此四字而為之分疏云爾若求其實則知之一字足矣不必言虚與靈而虚靈在其中虚之一字足矣不必言靈言知而靈與知在其中蓋心惟一知知惟一念一念之知徹首徹尾常動常静本無内外本無彼此來教以能知覺為良則格物自是功效以所知覺為良是宜以格物為工夫恐未然也夫知以事為體事以知為則事不能皆循其知則知不能皆極其至故致知在格物格物在致知然後為全功後世以格物為功者既入於揣摩義襲而不知有致知之初以致知為功者又近於圓覺真空而不知有格物之知去道愈逺矣夫心知覺運動而已事者知覺之運動照者運動之知覺無内外動静而渾然一體者也答王新甫夫身必有心心必有意意必有知知必有事若有無事之時則亦當有無心無意無知之時耶身心意知物未始湏臾無則格致誠正之功亦不可湏臾離又焉有未感之前又焉有還湏用功之疑耶答陳履旋格物致知後世學者以知識為知以凡有聲色象貌於天地間者為物失却大學本㫖先師謂知是獨知致知是不欺其獨知物是身心上意之所用之事如視聽言動喜怒哀樂之𩔖詩所謂有物有則孟子萬物皆備於我是也格物是就視聽喜怒諸事慎其獨知而格之循其本然之則以自慊其知答馮守立心之始不見有時之順逆事之煩簡地之險易人之難處易處惟見吾心是非善惡從之如不及去之如探湯者方為格物茍分别種種順逆難易如彼如此則既有所擇取而順逆難易之心為之主矣順逆難易之心為之主則雖有時主宰不亂精神凝定猶不足謂之格物何者從其好惡順逆之心也而况遇逆且難支吾牽強意興沮撓尚何格物之可言乎答沈思畏良知無方無體變動不居故有昨以為是而今覺其非有己以為是而因人覺其為非亦有自見未當必考証講求而後停妥皆良知自然如此故致知亦當如此然一念良知徹頭徹尾本無今昨人已内外之分也道塞乎天地之間所謂陰陽不測之神也神凝而成形神發而為知知感動而萬事出焉萬事出於知故曰皆備於我而知又萬事之取正焉者故曰有物有則知也者神之所為也神無方無體其在人為視聽為言動為喜怒哀樂其在天地萬物則發育峻極者即人之視聽言動喜怒哀樂者也鳶之飛魚之躍以至山川之流峙草木之生生化化者亦即人之視聽言動喜怒哀樂者也故人之喜怒哀樂視聽言動與天地萬物周流貫徹作則俱作息則俱息而無彼此之間神無方體故也故格吾視聽言動喜怒哀樂之物則範圍天地之化而不過曲成萬物而不遺神無方體故也視聽喜怒之外更有何物蓋古之言視聽喜怒者有見於神通天地萬物而為言後之言視聽喜怒者有見於形對天地萬物而為言通則一對則二不可不察也答項甌東源委與體用稍異謂源者委所從出可也謂非委則無以見源源豈待委而後見乎蓋源與委猶二也若夫知之感應變化則體之用感應變化之知則用之體猶水之流流之水水外無流流外無水非若源之委委之源源外無委委外無源首尾相資而非體用無間者也答雙江無一刻無性則無一刻無情無一刻非發雖思慮不作閒静虚融俗語謂之自在則亦樂之發也閒静虚融不得為未發則又焉有未發者在閒静虚融之先乎故未發言其體已發言其用其實一知也人心常知而知之一動一静莫非應感雜念不作閒静虚融者知之静蓋感於静境而静應也思慮變化紛紜交錯者知之動蓋感於動境而動應也動則五官俱用是為動之物静則五官俱不用是為静之物動静皆物也閒静虚融五官不用而此知精明不欺不減於紛紜交錯之時也紛紜交錯五官並用而此知精明不欺無加於閒静虚融之時也動静皆知也良知本虚致知即是致虚真實而無一毫邪妄者本虚之體也物物慎其獨知而格之不以邪妄自欺者致虚之功也若有見於虚而求之恐或離却事物安排一個虚的本體以為良知本來如是事事物物皆從此中流出習乆得效反成障蔽答賀龍岡凡兩念相牽即是自欺根本如此不了卒歸於隨逐而已答鄭元徤性無不善故良知無不中正學者能依著見成良知即無過中失正茍過中失正即是不曽依著見成良知若謂依著見成良知而未免過中失正是人性本不中正矣有是理乎答董兆時良知固能知古今事變然非必知古今事變而後謂之良知生而知之者非能生而知古今事變者也生而無私意不蔽其良知而已然則學知困知亦惟去其私意不蔽其良知而已良知誠不蔽於私則其知古今事變莫非良知茍有私意之蔽則其知古今事變莫非私意體用一原者也貞襄聶雙江先生豹聶豹字文蔚號雙江永豐人也正德十二年進士知華亭縣清乾没一萬八千金以補逋賦修水利興學校識徐存齋於諸生中召入為御史劾奏大奄及柄臣有能諌名出為蘇州知府丁内外艱家居十年以薦起知平陽府修闗練卒先事以待敵至不敢入世宗聞之顧謂侍臣曰豹何狀乃能爾陞陜西按察司副使為輔臣夏貴溪所惡罷歸尋復逮之先生方與學人講中庸校突至械繫之先生繫畢復與學人終前説而去既入詔獄而貴溪亦至先生無怨色貴溪大慚踰年得出嘉靖二二十九年京師戒嚴存齋為宗伯因薦先生召為廵撫薊州右僉都御史轉兵部侍郎協理京營戎政仇鸞請調宣大兵入衞先生不可而止尋陞尚書累以邊功加至太子少傅東南倭亂趙文華請視師朱龍禧請差田賦開市舶輔臣嚴嵩主之先生皆以為不可降俸二級遂以老疾致仕四十二年十一月四日卒年七十七隆慶元年贈少保諡貞襄陽明在越先生以御史按閩過武林欲渡江見之人言力阻先生不聴及見而大悦曰君子所為衆人固不識也猶疑接人太濫上書言之陽明答曰吾之講學非以靳人之信己也行吾不得已之心耳若畏人之不信必擇人而與之是自喪其心也先生為之惕然陽明征思田先生問勿忘勿助之功陽明答書此間只説必有事焉不説勿忘勿助專言勿忘勿助是空鍋而爨也陽明既沒先生時官蘇州曰昔之未稱門生者冀再見耳今不可得矣於是設位北面再拜始稱門生以錢緒山為證刻兩書於石以識之先生之學獄中閒乆静極忽見此心真體光明瑩徹萬物見備乃喜曰此未發之中也守是不失天下之理皆從此出矣乃出與來學立静坐法使之歸寂以通感執體以應用是時同門為良知之學者以為未發即在已發之中蓋發而未嘗發故未發之功却在發上用先天之功却在後天上用其疑先生之説者有三其一謂道不可須臾離也今曰動處無功是離之也其一謂道無分於動静也今曰工夫只是主静是二之也其一謂心事合一心體事而無不在今曰感應流行著不得力是脱略事為𩔖於禅悟也王龍溪黄洛村陳明水鄒東廓劉兩峯各致難端先生一一申之唯羅念菴深相契合謂雙江所言真是霹靈手段許多英雄瞞昧被他一口道著如康莊大道更無可疑兩峯晚乃信之曰雙江之言是也夫心體流行不息静而動動而静未發静也已發動也發上用功固為徇動未發用功亦為徇静皆䧟於一偏而中庸以大本歸之未發者蓋心體即天體也周天三百六十五度四分度之一而其中為天樞天無一息不運至其樞紐處實萬古常止要不可不歸之静故心之主宰雖不可以動静言而唯静為能存之此濂溪以主静立人極龜山門下以體夫喜怒哀樂未發前氣象為相傳口訣也先生所以自别於非禅者謂歸寂以通天下之感不似釋氏以感應為塵煩一切斷除而寂滅之則是看釋氏尚未透夫釋氏以作用為性其所惡言者體也其曰父母未生前曰先天曰主中主皆指此流行者言但此流行不著於事為知覺者也其曰後天曰大用現前曰賓則指流行中之事為知覺也其實體當處皆在動一邊故曰無所住而生其心正與存心養性相反蓋心體原是流行而流行不失其則者則終古如斯乃所謂静也寂也儒者存養之力歸於此處始不同夫釋氏耳若區區以感應有無别之彼釋氏又何嘗廢感應耶陽明自江右以後始拈良知其在南中以黙坐澄心為學的收斂為主發散是不已有未發之中始能有中節之和其後學者有喜静厭動之弊故以致良知救之而曰良知是未發之中則猶之乎前説也先生亦何背乎師門乃當時羣起而難之哉徐學謨識餘録言楊忠愍劾嚴嵩假冐邉功下部查覆世蕃自草覆稿送部先生即依稿具題按識小編先生勸嵩自辭軍賞而覆疏竟不上但以之歸功張時徹然則依稿具題之誣不辨而自明矣雙江論學書謂心無定體其於心體疑失之逺矣炯然在中寂然不動而萬化攸基此定體也與歐陽南野良知本寂感於物而後有知知其發也不可遂以知發為良知而忘其發之所自也心主乎内應於外而後有外外其影也不可以其外應者為心而遂求心於外也故學者求道自其主乎内之寂然者求之使之寂而常定原泉者江淮河漢之所從出也然非江淮河漢則亦無以見所謂原泉者故濬原者濬其江淮河漢所從出之原非江淮河漢為原而濬之也根本者枝葉花實之所從出也培根者培其枝葉花實所從出之根非以枝葉花實為根而培之也今不致感應變化所從出之知而即感應變化之知而致之是求日月於容光必照之處而遺其懸象著明之大也本原之地要不外乎不睹不聞之寂體也不睹不聞之寂體若因感應變化而後有即感應變化而致之是也實則所以主宰乎感應變化而感應變化乃吾寂體之標末耳相尋於吾者無窮而吾不能一其無窮者而貞之於一則吾寂然之體不㡬於憧憧矣乎寂體不勝其憧憧而後忿則奪矣欲則流矣善日以泯過日以長即使懲之窒之遷之改之已不免義襲於外其於涵養本原之功疑若無與也所貴乎本體之知吾之動無不善也動有不善而後知之已落二義矣以獨為知以知為知覺遂使聖人洗心密藏一段反本工夫潛引而襲之於外縱使良知念念精明亦只於發處理㑹得一個善惡而去取之其於未發之中純粹至善之體更無歸復之期心無定體之説謂心不在内也百體皆心也萬感皆心也亦嘗以是説而求之譬之追風逐電瞬息萬變􅃼然無所措手徒以亂吾之衷也體得未發氣象便是識取本來面目敬以持之常存而不失到此地位一些子習氣意見著不得胸次灑然可以概見又何待遇事窮理而後然耶即反覆推究亦只推究乎此心之存否聖人過多賢人過少愚人無過蓋過必學而後見也不學者冥行妄作以為常不復知過答許玉林知者心之體虚靈不昧即明德也致者充滿其虚靈之本體江漢濯之秋陽㬥之致知即致中也寂然不動先天而天弗違者也格物者致知之功用物各付物感而遂通天下之故何思何慮後天而奉天時也如好好色惡惡臭之𩔖是也此予之説也格其不正以歸於正乃是先師為下學反正之漸故為是不得已之詞所謂不正者亦指夫意之所及者言非本體有所不正也不善體者徃徃賺入襲取窠臼無故為伯者立一赤幟此予之所憂也答亢子益夫無時不寂無時不感者心之體也感惟其時而主之以寂者學問之功也故謂寂感有二時者非也謂工夫無分於寂感而不知歸寂以主夫感者又豈得為是哉答東廓疑予説者大略有三其一謂道不可須臾離也今曰動處無功是離之也其一謂道無分於動静也今曰工夫只是主静是二之也其一謂心事合一仁體事而無不在今曰感應流行著不得力是得略事為𩔖於禅悟也夫禅之異於儒者以感應為塵煩一切斷除而寂滅之今乃歸寂以通天下之感致虚以立天下之有主静以該天下之動又何嫌於禅哉自有人生以來此心常發如目之視也耳之聴也鼻臭口味心之思慮營欲也雖禁之而使不發不可得也乃謂發處亦自有功将助而使之發乎抑懼其發之過禁而使之不發也且将抑其過引其不及使之發而中節乎夫節者心之則也不識不知順帝之則惟養之豫者能之豈能使之發而中乎使之發而中者宋人助長之故智也後世所謂隨事精察而不知其密䧟於憧憧卜度之私禁之而使不發者是又逆其生生之機助而使之發者長慾恣情蹈於水火焚溺而不顧又其下者也良知二字始於孟子孩提之童不學不慮知愛知敬真純湛一由仁義行大人者不失其赤子之心亦以其心之真純湛一即赤子也然則致良知者将於其愛與敬而致之乎抑求其真純湛一之體而致之也若以虚靈本體而言之純粹至善原無惡對若於念慮事為之著於所謂善惡者而致吾之知縱使知之其與義襲何異故致知者必充滿其虚靈本體之量以立天下之大本使之發無不良是謂貫顯微内外而一之也虚明者鑑之體也照則虚明之發也知覺猶之照也即知覺而求寂體其與即照而求虚明者何以異盍觀孩提之愛敬平旦之好惡乎明覺自然一念不起誠寂矣然謂之為寂體則未也今不求寂體於孩提夜氣之先而謂即愛敬好惡而寂之則寂矣然乎不然乎蓋孩提之愛敬純一未發為之也平旦之好惡夜氣之虚明為之也寄王龍溪逹夫早年之學病在於求脱化融釋之太速也夫脱化融釋原非工夫字眼乃工夫熟後景界也而速於求之故遂為慈湖之説所入以見在為具足以知覺為良知以不起意為工夫樂超頓而鄙艱苦崇虚見而略實功自謂撒手懸崖徧地黄金而於六經四書未嘗有一字當意玩弄精魂謂為自得如是者十年矣至於盤錯顛沛則茫然無據不能不動朱公之哭也已而怳然自悟考之詩書乃知學有本原心主乎内寂以通感也止以發慮也無所不在而所以存之養之者止其所而不動也動其影也照也發也發有動静而寂無動静也於是一以洗心退藏為主虚寂未發為要刋落究竟日見天精不屬覩聞此其近時歸根復命煞喫辛苦處亦庶㡬乎知微知彰之學乃其自性自度非不肖有所禆益也今之為良知之學者於傳習録前篇所記真切處俱略之乃駕空立籠罩語似切近而實𣺌􅃼終日逐外而自以為得手也寄劉兩峯良知非大學之明徳乎明徳足矣何又言乎至善至善者言乎心之體也知止者止於是也知止於是而後能定静安慮慮非格物乎感而遂通天下之故是也故致知便是知止今必曰格物是致知之功則能慮亦可謂知止之功乎答黄洛村試以諸公之所以疑於僕者請之有曰喜怒哀樂無未發之時其曰未發特指其不動者言誠如所論則發而中節一句無乃贅乎大本逹道又當何所分屬乎不曰道之未發而曰喜怒哀樂之未發此又一説也蓋情之中節者為道道無未發又曰無時無喜怒哀樂安得有未發之時此與無時無感之語相𩔖然則夜氣之所息指何者為息乎旦晝之所為非指喜怒哀樂之發者言之乎虚寂二字夫子於咸卦特地提出以立感應之體非以寂與感對而言之也今曰寂本無歸即感是寂是為真寂夫寂性也感情也若曰性本無歸即情是性乃為真性恐不免語病也性具於心心主乎内艮其止止其所也於止知其所止是謂天下同歸而曰寂本無歸性本無歸將由外鑠我其能免於逐物而襲取乎或又曰性體本寂不應又加一寂字反為寂體之累此告子勿求之見也操之則存舍之則亡夫子固欲以此困人乎同上子思以後無人識中字隨事隨時討求是當謂是為中而執之何啻千里明道云不覩不便是未發之中不聞曰隠不覩曰微隠微曰獨獨也者天地之根人之命也學問只有此處人生只有這件故曰天下之大本也慎獨便是致中中立而和生焉天下之能事畢矣乃曰求之於慎獨之前是誠失之荒唐也答應容菴誠意章註其入門下手全在實用其力而禁止其自欺十字夫使好好色惡惡臭亦須實用其力而其中亦有欺之可禁則為不謬世顧有見好色而不好而好之不真者乎有聞惡臭而不惡而惡之不真者乎絶無一毫人力動以天也故曰誠者天之道也又曰誠無為又曰誠者自然而然稍涉人為便是作好作惡一有所作便是自欺其去自慊逺矣故誠意之功全在致知致知云者充極吾虚靈本體之知而不以一毫意欲自蔽是謂先天之畫未發之中一毫人力不得與一毫人力不與是意而無意也今不養善根而求好色之好不拔惡根而求惡臭之惡可謂茍且徇外而為人也而可謂之誠乎意者隨感出現因應變遷萬起萬滅其端無窮乃欲一一制之以人力去其欺而反其慊是使初學之士終身不復見定静安慮境界勞而無功祇自疲以速化耳答緒山感上求寂和上求中事上求止萬上求一只因格物之誤蔓延至此答鄒西渠思慮營欲心之變化然無物以主之皆能累心惟主静則氣定氣定則澄然無事此便是未發本然非一蹴可至須存優游不管紛擾與否常覺此中定静積乆當有效答戴伯常心要在腔子裏腔子是未發之中氣有盛衰而靈無老少隨盛衰為昏明者不學而局於氣也心豈有出入出入無時者放也學問之道無他求其放心而已矣動而不失其本然之静志之正也自世之學者不求濬其萬物一體之原使之肫肫淵淵生意流通乃懸空杜撰儱侗籠罩之説謂是為學問大頭腦究其至與墨子兼愛鄉愿媚世又隔㡬重公案所貴乎良知者誠以其無所不知而謂之良哉亦以其知之至誠惻怛莫非天理之著見者而後謂之良也答董明建困辨録辨中不睹不聞便是未發之中常存此體便是戒懼去耳目支離之用全虚圓不測之神覩聞何有哉過與不及皆惡也中也者和也言中即和也致中而和出焉故曰至其中而已矣又曰中焉止矣龜山一派毎言静中體認又言平日涵養只此四字便見吾儒真下手處考亭之悔以誤認此心作已發尤明白直指程子曰有天徳便可語王道其要只在謹獨中是天徳和是王道故曰茍非至徳至道不凝戒慎不覩恐懼不聞修德之功也性體本自戒懼才頽惰便失性體或問未發之中為静乎蓋静而常主夫動也戒慎恐懼為動乎蓋動而常求夫静也凡用功似屬乎動而用功之主腦却是静根感應神化才涉思議便是憧憧如憧憧則入於私意其去未發之中何啻千里人自嬰兒以至老死雖有動静語黙之不同然其大體莫非已發氣主之也而立人極者常主乎静或問周子言静而程子多言敬有以異乎曰均之為寡欲也周曰無欲故静程曰主一之謂敬一者無欲也然由敬而入者有所持循乆則内外齋莊自無不静若入頭便主静惟上根者能之蓋天資明徤合下便見本體亦甚省力而其弊也或至厭棄事物賺入别様蹊徑是在學者顧其天資力量而慎擇所由也近世學者猖狂自恣徃徃以主静為禪學主敬為迂學哀哉問情順萬事而無情曰聖人以天地萬物為一體疾痛疴癢皆切於身一隨其感應自然之機而順應之其曰無情特言其所過者化無所凝滯留礙云爾若枯忍無情斯逆矣謂順應可乎辨易至静之時雖無所知所覺之事而能知能覺者自在是即純坤不為無陽之象星家以五行絶處便是胎元亦此意若論復卦則宜以有所知覺者當之蓋已涉於事矣邵子詩曰冬至子之半天心無改移一陽初動處萬物未生時夫天心無改移未發者未嘗發也一陽而動乃平旦之好惡太羮之酒淡而和也未發氣象猶可想見静中養出端倪冷灰中迸出火熖非坤之静翕歸藏育而養之則不食之果可復種而生哉知復之由於坤則知善端之萌未有不由於静養也寂然不動中涵太虚先天也千變萬化皆由此出可以合德合明合序合吉㐫故曰天弗違觸之而動感而後應後天也何思何慮遂通而順應之故曰奉天時言人力一毫不與也一念之微炯然在中百體從令小而辨也止於至善寂然不動千變萬化皆由此出井養而不窮也易以道義配隂陽故凡言吉㐫悔吝皆主理欲存亡淑慝消長處為言世之所云禍福亦不外是戰戰兢兢臨深履薄曽子之震也震莫大於生死之際起而易簀曰吾得正而斃焉而今而後吾知免夫可謂不失其所主之常不喪匕鬯也辨心寡欲之學不善體貼将與克伐怨欲不行同病知意必固我聲臭覩聞皆是欲而後可以識寡欲之學一毫矜持把捉便是逆天自得者得其本體而自慊也工夫不合本體非助則忘忘助皆非道集猶歛集也退藏於密以敦萬化之原由是感而遂通沛然莫之能禦猶草木之有生意也故曰生則惡可已矣襲而取之者義自外至也集義所生者義由中出也自三代而下渾是一個助的學問故曰天下之不助苖長者寡矣與其得助農不若得惰農惰則苗不長而生意猶存若助則機心生而道心忘矣鳶飛魚躍渾是率性全無一毫意必程子謂活潑潑地與必有事焉而勿正心勿忘同意才離本體便是逺復不逺云者猶云不離乎此也其曰不善恐於本體尚有未融化處而不免有矜持意未嘗不知明鏡纎塵未嘗復行洪爐㸃雪少有凝滯而融化不速便已屬行辨素素者本吾性所固有而豫養於己者也位之所值雖有富貴貧賤夷狄患難之不同然不以富貴處富貴而素乎富貴不以貧賤處貧賤而素乎貧賤大行不加窮居不損而富貴貧賤夷狄患難處之如一則無入而不自得得者得其素也佛氏云悟人在處一般又云隨所住處常安樂頗得此意辨過才覺無過便是包藏禍心故時時見過時時改過便是江漢以濯秋陽以暴夫子只要改過鄉愿只要無過機械變詐之巧蓋其機心滑熟乆而安之其始也生於一念之無耻其安也習而熟之充然無復廉耻之色放僻邪侈無所不為無所用其耻也天地以生物為心人得之而為人之心生生不已故感於父子則為慈孝感於昆弟則為友恭故凡修道一涉於營欲謀為而不出於生生自然之機者皆不可以言仁不可以言仁則襲也襲而取之則身與道二不可以言合也辨仁先有個必有所主之心曰適先有個必無所主之心曰莫無所主而無所不主無所不主而先無所主曰義不見所欲惡而寂然不動者中也欲惡不欺其本心者忠也非中也然於中為近欲惡之發不待推而自然中節者和也推欲惡以公於人者恕也非和也然於和為近忠恕是學者求復其本體一段切近工夫辨神心之生生不己者易也即神也未發之中太極也未發無動静而主乎動静者未發也非此則心之生道或㡬乎息而何動静之有哉有動静兩儀而後有仁義禮智之四端有四端而後有徤順動止入䧟麗説之八德德有動有静也故徤順動止而不失乎本然之則者吉以之生蓋得其本體發而中節也入䧟麗説静而反累於動者㐫以之生蓋失其本體發而不中也能説諸心能研諸慮舉而措之天下而大業生焉辨誠子莫執中蓋欲擇為我兼愛之中而執之故不合於權耳不知中無定體惟權是體權無定用惟道是用權也者吾心天然自有之則惟戒慎不覩恐懼不聞然後能發無不中變易從道莫非自然之用不然則以中而賊道者何限自堯舜之學不明徃徃以中涉事為若将隨事隨處精察而固執之以求所謂當然之節而不知瞬息萬變一毫思慮營欲著不得是謂後天而奉天時也若臨事而擇已不勝其憧憧非惟日不足顧其端無窮膠凝固滯停閣廢棄中亦襲也況未必中乎問閒思雜慮祛除不得如何曰習心滑熟故也習心滑熟客慮只從滑熟路上徃還非一朝一夕之故也若欲逐之而使去禁之而使不生隳突衝決反為本體之累故欲去客慮者先須求復本體本體復得一分客慮減去一分然本體非敬不復敬以持之以作吾心體之徤心體徤而後能廓清掃蕩以収定静之功蓋盜賊無主勢必解散然非責效於旦夕用意於皮膚者可㡬及也問良知之學何如曰此是王門相傳指訣先師以世之學者率以無所不知無所不能為聖人以有所不知不能為儒者所深耻一切入手便從多學而識考索記誦上鑽研勞苦纒絆擔擱了天下無限好資質的人乃謂良知自知致而養之不待學慮千變萬化皆由此出孟子所謂不學不慮愛親敬長蓋指良知之發用流行切近精實處而不悟者遂以愛敬為良知著在枝節上求雖極髙手不免賺入邪魔蹊徑到底只從伯學裡改換頭目出來蓋孩提之愛敬即道心也一本其純一未發自然流行而纎毫思慮營欲不與故致良知者只養這個純一未發的本體本體復則萬物備所謂立天下之大本先師云良知是未發之中廓然大公的本體便自能感而遂通便自能物來順應此是傳習録中正法眼藏而誤以知覺為良知無故為霸學張一赤幟與邊見外修何異而自畔其師説逺矣問隨處體認天理何如曰此甘泉揭以教人之㫖甘泉得之羅豫章曰為學不在多言但黙坐澄心體認天理若見天理則人欲便自退聴由此持守庶㡬漸明講學始有得力處又云學者之病在於無凍解冰釋處雖用力持守不過茍免形顯過尤無足道也究其㫖意全在天理二字所謂見天理者非聞見之見明道曰吾學雖有所受然天理二字却是自家體貼出來而世之揣摩測度依􅅖假借謂體認而反害之者多矣天理是本體自然流行知平旦之好惡孩提之愛敬孺子入井之怵惕惻隠不假些子幇助學者體認到此方是動以天動以天方可見天理方是人欲退聴凍解冰釋處也此等學問非實見得未發之中道心惟微者不能及問今之學者何如曰今世之學其上焉者則有三障一曰道理障一曰格式障一曰知識障講求義理模倣古人行事之迹多聞見博學動有所引證是障雖有三然道理格式又俱從知識入均之為知識障也三家之學不足以言豫責之以變易從道皆不免有跲疚困窮之患蓋義理隨事變以適用非講求所能備事變因時勢而順應非格式所能擬義理事變有聖人所不知不能處非一人所能周故曰障然尚是儒者家法可以維持世教而無所謂敗常亂俗也此外又有氣節文章二家氣節多得之天性可以勵世磨鈍廉頑立懦文章又有古文時文亦是學者二魔魔則病心障是障於道故先儒常曰聖賢既逺道學不明士大夫不知用心於内以立其本而徒以其意氣之盛以有為於世者多矣彼詞令之美聞見之博議論之韙節概之髙自其外而觀之誠有以過乎人者然探其中而責其實要其久而持其歸求其充然有以慰滿人望而無一瑕之可疵者千百中未見一二可數也明儒學案卷十七
