body:
  text: 明儒學案卷十六餘姚黄宗羲撰江右相傳學案姚江之學惟江右為得其傳東廓念菴兩峯雙江其選也再傳而為塘南思黙皆能推原陽明未盡之意是時越中流弊錯出挾師説以杜學者之口而江右獨能破之陽明之道賴以不墜蓋陽明一生精神俱在江右亦其感應之理宜也文莊鄒東廓先生守益附子善孫徳涵徳溥徳泳文莊歐陽南野先生徳貞襄聶雙江先生豹文恭羅念菴先生洪先處士劉兩峯先生文敏同知劉師泉先生邦采御史劉三五先生陽附劉印山王柳川縣令劉梅源先生暁員外劉晴川先生魁主事黄洛村先生𢎞綱主事何善山先生廷仁郎中陳明水先生九川太常魏水洲先生良弼解元魏師伊先生良政處士魏藥湖先生良器太常王塘南先生時槐文潔鄧定宇先生以瓚叅政陳䝉山先生嘉謨徴君劉瀘瀟先生元卿學憲萬思黙先生廷言臬長胡廬山先生直忠介鄒南臯先生元標給諫羅匡湖先生大紘中丞宋望之先生儀望徴君鄧潛谷先生元錫徴君章本清先生潢僉憲馮慕岡先生應京江右相傳學案一文莊東廓先生守益鄒守益字謙之號東廓江西安福人九歲從父宦於南都羅文莊欽順見而竒之正徳六年㑹試第一廷試第三授翰林編修踰年丁憂宸濠反從文成建義嘉靖改元起用大禮議起上疏忤㫖下詔獄謫判廣徳州毁淫祠建復初書院講學擢南京主客郎中任滿告歸起南考功㝷還翰林司經局洗馬上聖功圖世宗猶以議禮前疏弗悦也下禮部叅勘而止遷太常少卿兼侍讀學士掌南院陞南京國子祭酒九廟災有㫖大臣自陳大臣皆惶恐引罪先生上疏獨言君臣交儆之義遂落職閒住四十一年卒年七十二隆慶元年贈禮部右侍郎諡文莊初見文成於䖍臺求表父墓殊無意於學也文成顧日夕談學先生忽有省曰徃吾疑程朱補大學先格物窮理而中庸首慎獨兩不相蒙今釋然格致之即慎獨也遂稱弟子又見文成於越留月餘既别而文成念之曰以能問於不能謙之近之矣又自廣徳至越文成歎其不以遷謫為意先生曰一官應迹優人随遇為故事耳文成黙然良乆曰書稱允恭克讓謙之信恭讓矣自省允克何如先生欿然始悟平日之恭讓不免於玩世也先生之學得力於敬敬也者良知之精明而不雜以塵俗者也吾性體行於日用倫物之中不分動靜不舍晝夜無有停機流行之合宜處謂之善其障蔽而壅塞處謂之不善蓋一忘戒懼則障蔽而壅塞矣但令無徃非戒懼之流行即是性體之流行矣離却戒慎恐懼無從覓性離却性亦無從覔日用倫物也故其言道器無二性在氣質皆是此意其時雙江從寂處體處用工夫以感應用處為效騐先生言其倚於内是裂心體而二之也彭山惡自然而標警惕先生言其滯而不化非行所無事也夫子之後源逺而流分陽明之沒不失其傳者不得不以先生為宗子也夫流行之為性體釋氏亦能見之苐其捍禦外物是非善惡一歸之空以無礙我之流行蓋有得於渾然一片者而日用倫物之間條理脈絡不能分明矣麄而不精此學者所當論也先生青原贈處記陽明赴兩廣錢王二子各言所學緒山曰至善無惡者心有善有惡者意知善知惡是良知為善去惡是格物龍溪曰心無善而無惡意無善而無惡知無善而無惡物無善而無惡陽明笑曰洪甫湏識汝中本體汝中須識洪甫工夫此與龍溪天泉證道記同一事而言之不同如此蕺山先師嘗疑陽明天泉之言與平時不同平時每言至善是心之本體又曰至善只是盡乎天理之極而無一毫人欲之私又曰良知即天理錄中言天理二字不一而足有時説無善無惡者理之靜亦未嘗徑説無善無惡是心體今觀先生所記而四有之論仍是以至善無惡為心即四有四句亦是緒山之言非陽明立以為教法也今據天泉所記以無善無惡議陽明者盍亦有攷於先生之記乎子善孫徳涵徳溥徳泳善字某號穎泉嘉靖丙辰進士由比部郎藩臬使歷官至太常寺卿徳涵字汝海號聚所隆慶辛未進士從祀議起上疏極言文成應祀授刑部主事江陵當國方嚴學禁而先生求友愈急傅慎所劉畏所先後詆江陵皆先生之邑人遂疑先生為一黨以河南僉事出之御史承江陵意疏論鐫秩而歸未㡬卒年五十六先生受學於耿天臺鄉舉後卒業太學天臺謂公子寒士一望而知居之移氣若此獨汝海不可辨其為何如人問學於耿楚倥楚倥不答先生憤然曰吾獨不能自叅而向人求乎反閉一室攻苦至忘寢食形軀減削出而與楊道南焦弱侯討論乆之一旦霅然忽若天牖洞徹本真象山所謂此理已顯也然穎泉論學於文莊之教無所走作入妙通𤣥都成幻障而先生以悟為入門於家學又一轉手矣徳溥字汝光號四山舉進士官至太子洗馬所解春秋逄掖之士多宗之更揜關宴居覃思名理著為易㑹自叙非四聖之易而霄壤自然之易又非霄壤之易而心之易其於易道多所發明先生浸浸向用忽而中廢其京師邸寓為霍文炳之故居文炳奄人張誠之奴也以罪籍沒有埋金在屋先生之家人發之不以聞官事覺罪坐先生革職追贓門生為之以償穎泉素嚴聞之甚怒先生不敢歸者乆之徳泳號瀘水萬厯丙戍進士授行人轉雲南道御史壬辰正月禮科都給事中李獻可公疏請皇長子豫教上怒革獻可為民先生救獻可亦遂革職累疏薦不起先生既承家學守致良知之宗而於格物則别有㴱悟論者謂淮南之格物出陽明之上以先生之言較之則淮南未為定論也東廓論學書向來起滅之意尚是就事上體認非本體流行吾心本體精明靈覺浩浩乎日月之常照淵淵乎江河之常流其有所障蔽有所滯礙掃而決之復見本體古人所以造次於是顛沛於是正欲完此常照常明之體耳與君亮伯光良知之教乃從天命之性指其精神靈覺而言惻隱羞惡辭讓是非無徃而非良知之運用故戒懼以致中和則可以位育擴充四端則可以保四海初無不足之患所患者未能明耳好問好察以用中也誦詩讀書以尚友也前言徃行以畜徳也皆求明之功也及其明也只是原初明也非合天下古今之明而增益之也世之沒溺於聞見勤苦於記誦正坐以良知為不足而求諸外以増益之故比擬愈宻揣摩愈巧而本體障蔽愈甚博文格物即戒懼擴充一個工夫非有二也果以為有二者則子思開卷之首得無舍其門而驟語其堂乎復夏榖夫越中之論誠有過髙者忘言絶意之辨向亦駭之及臥病江上獲從緒山龍溪切磋漸以平實其明透警發處受教甚多夫乾乾不息於誠所以致良知也懲忿窒慾遷善改過皆致良知之條目也若以懲忿之功為第二義則所謂如好好色如惡惡臭已百已千者皆為剩語矣源泉混混以放乎四海性之本體也有所壅蔽則決而排之未嘗以人力加損故曰行所無事若忿慾之壅不加懲窒而曰本體原自流行是不決不排而望放乎海也茍認定懲窒為治性之功而不察流行之體原不可以人力加損則亦非行所無事之㫖矣答聶雙江明徳之明人人完足遇親而孝遇長而弟遇君而忠遇夫婦而别遇朋友而信無徃非明徳之流行流行之合宜處謂之善其障蔽而壅塞處謂之不善學問之道無他也去其不善以歸於善而已矣與鮑復之古人理㑹利害便是義理今人理㑹義理猶是利害答甘泉良知精明處自有天然一定之則可行則行可止則止真是鳶飛魚躍天機活潑初無妨礙初無揀擇所患者好名好利之私一障其精明則糠粃迷目天地為之易位矣答周順之果能實見敬字面目則即是性分即是禮文又何偏内偏外之患乎若岐性分禮文而二之則已不識敬何以語聖學之中正乎與方時勉聖門要㫖只在修已以敬敬也者良知之精明而不雜以塵俗也戒慎恐懼常精常明則出門如賔承事如祭故道千乘之國直以敬事為綱領信也者敬之不息者也非敬之外復有信也節用愛人使民以時即敬之流行於政者也先儒謂未及為政得無以修已安百姓為二乎與胡鹿厓遷善改過即致良知之條目也果能戒慎恐懼常精常明不為物欲所障蔽則即此是善更何所遷即此非過更無所改一有障蔽便與掃除雷厲風行復見本體其謂落在下乘者只是就事上㸃檢則有起有滅非本體之流行耳答徐子弼是非逆順景界猶時有礙乃知聲臭未冺還是形而下學問薛中離語自其精明之無障謂之智及自其精明之無間斷謂之仁守答徐波石敬也者良知之精明而不雜以私欲也故出門使民造次顛沛叅前倚衡無徃非戒懼之流行方是須臾不離與吕涇野天理人欲同行異情此正毫釐千里之㡬從良知精明流行則文武之好勇公劉太王之好貨色皆是天理若雜之以私欲則桓文之救魯救衛攘夷安夏皆是人欲先師所謂須從根上求生死莫向支流論濁清有疑聖人之功異於始學者曰王逸少所冩上大人與填硃模者一㸃一直不能一毫加損小人之起私意昏迷放逸作好作惡至於穿窬剽刼何徃非心特非心之本體耳水之過顙在山至於淊天襄陵何徃非水然非水之本體矣戒懼以不失其本體禹之所以行水也隄而遏之與聴其壅横而不決不排二者胥失之矣答曾𢎞之世俗通病只認得個有才能有勲業有著述的聖人不認得個無技能無勲業無著述的聖人與洪峻之近有友人相語曰君子處世只顧得是非不須更顧利害僕答之曰天下真利害便是天下真是非即如舍生取義殺身成仁安得為害而墦肉乞飽壟上罔斷安得為利若論世情利害亦自有世情是非矣與師泉吾輩病痛尚是對景時放過故辨究精博終受用不得須如象山所云關津路口一人不許放過方是須臾不離之學與周順之云商量家事矛盾則有我合同則留情自是對景增減又安能與千聖同堂天地並位誠然誠然至以貨色名利比諸霧靄魑魅則有所未穩形色天性初非嗜慾惟聖踐形只是大公順應之無徃非日月無徃非郊野鸞凰若一有增減則妻子家事猶為霧靄魑魅心體之損益其能免乎凡人與聖人對景一也無增減是本體有增減是病症今日亦無别法去病症以復本體而已矣與師泉兩城有數條相問大意主於収視斂聴一塵不攖一波不興為未發之時當此不攖不興意尚未動吾儒謂之存存存存則意發即誠僕答之曰収視是誰収斂聴是誰聴即是戒懼工課天徳王道只是此一脈所謂去耳目支離之用全圓融不測之神神果何在不睹不聞無形與聲而昭昭靈靈體物不遺寂感無時體用無界苐從四時常行百物常生處體當天心自得無極之真與雙江天命之性純粹至善昭昭靈靈瞞昩不得而無形與聲不可覩聞學者於此無從體認徃徃以强索懸悟自增障蔽此學不受世態㸃汚不賴博聞充拓不須億中測度不可意氣承擔不在枝節㸃檢亦不藉著述繼徃開來凡有倚著便渉聲臭與郭平泉世之論者謂曾子得之以魯子貢失之於敏果若而言則敏劣於魯矣古人學術須到氣質脱化處方是歸根復命億則屢中是不免挨傍氣習猶有倚著而戰戰兢兢任重道逺豈魯者所能了故嘗謂曾子能脱化得魯故卒傳其宗子貢不能脱化得敏故終止於器與劉兩江指其明體之大公而無偏也命之曰中指其明體之順應而無所乖也命之曰和一物而二稱世之以中和二致者是靜存動省之説誤之矣以性上不可添戒懼者是猖狂而蹈大方之説誤之也答高仰之近來講學多是意興於戒懼實功全不著力便以為妨礙自然本體故精神浮汎全無歸根立命處間有肯用戒懼之功者止是㸃簡於事為照管於念慮不曾從不覩不聞上入微與余柳溪寂感無二時體用無二界如稱名與字然稱名而字在其中稱字而名在其中故中和有二稱而慎獨無二功今執事毅然自信從寂處體處用工夫而以感應運用處為效驗無所用其力環起而議之無一言當意者竊恐有隱然意見黙制其中而不自覺此於未發之中得無已有倚乎倚於感則為逐外倚於寂則為專内雖髙下殊科其病於本性均也來教謂良知是人生一個真種子本無是非可否相對而言是非可否相對此知之屬氣者不知精明貞純無非無否處將不屬氣否答雙江過去未來之思皆是失却見在工夫不免借此以繫其心縁平日戒懼功疎此心無安頓處佛家謂之胡孫失樹更無伎倆若是視於無形聴於無聲洞洞屬屬精神見在兢業不暇那有閒功夫思量過去理㑹未來故憧憧徃來朋從爾思此是將迎病症思曰睿睿作聖此是見在本體工程毫釐千里答濮致昭陽明夫子之平兩廣也錢王二子送於富陽夫子曰予别矣盍各言所學徳洪對曰至善無惡者心有善有惡者意知善知惡是良知為善去惡是格物畿對曰心無善而無惡意無善而無惡知無善而無惡意無善而無惡夫子笑曰洪甫須識汝中本體汝中須識洪甫工夫二子打併為一不失吾傳矣青原贈處聖門志學便是志不踰矩之學吾儕講學以修徳而日用踰矩處乃以小過安之何以協一胸中一有所不安自戒自懼正是時時下學時時上達準四海俟百聖合徳合明只是一矩東廓語録問性固善也惡亦不可不謂之性曰以目言之明固目也昏亦不可不謂之目當其昏也非目之本體矣吾人以心體得失為吉㐫今人以外物得失為吉㐫作徳日休作偽日拙方見影響不爽奉身之物争事整飾而自家身心先就破蕩不祥莫大焉性字從心從生這心之生理精明真純是發育峻極的根本戒慎恐懼養此生理從君臣父子交接處周貫充出無須臾虧損便是禮儀三百威儀三千古人發育峻極只在三千三百充拓不是懸空擔當三千三百只從戒懼真體流出不是枝節檢㸃自天子至於庻人皆有中和位育中和不在戒懼外只是喜怒哀樂大公順應處位育不在中和外只是大公順應與君臣父子交接處人倫庻物日與吾相接無一刻離得故庸徳之行庸言之謹兢業不肯放過如織絲者絲絲入簆無一絲可斷乃是經綸大經問諸生平旦之氣奚若曰覺得清明覺得無好惡曰清明者心也而無好惡則有心而無意清明者知也而無好惡則有知而無物二三子試思之果有無意之心無物之知乎曰平旦之氣湛然虚明杲日當空一物不留曰一物不留却是萬物畢照一物不留是常寂之體萬物畢照是常感之用濂溪主靜之靜不待動而言恐人誤認故自註無欲此靜字是指人生而靜真體常主宰綱維萬化者在天機名之曰無聲無臭故揭無極二字在聖學名之曰不睹不聞故揭無欲二字天心無言而元亨利貞無停機故百物生聖心無欲而仁義中正無停機故萬物成知太極本無極則識天道之妙知仁義中正而主靜則識聖學之全戒慎恐懼之功命名雖同而血脈各異戒懼於事識事而不識念戒懼於念識念而不識本體本體戒懼不睹不聞常規常矩常虚常靈則沖漠無朕未應非先萬象森然已應非後念慮事為一以貫之是為全生全歸仁孝之極問天下事變必須講求曰聖門講求只在䂓矩䂓矩誠立千方萬圓自運用無窮平天下之要不外絜矩直至瓊臺方補出許多節目豈是曾子比丘氏踈略欠缺問格致曰心不離意知不離物而今却分知為内物為外知為寂物為感故動靜有二時體用有二界分明是破裂心體是以有事為㸃簡而良知却藏伏病痛有超脱事為而自謂良知瑩徹均之為害道徐少初謂真性超脱之幾須從無極太極悟入曰某近始悟得此意然只在二氣五行流運中故從四時常行百物常生處見太極禮儀三百威儀三千處見真性方是一滚出來若隱隱見得真性本體而日用應酬凑泊不得猶是有縫隙在先師有云不離日用常行内直造先天未畫前了此便是下學上達之㫖問博約曰聖門之學只從日用人倫庻物兢兢理㑹自家真性常令精明流行從精明識得流行實際三千三百彌綸六合便是博文從流行識得精明主宰無形無聲退藏於密便是約禮故亦臨亦保昭事上帝不怨不尤知我其天初無二塗轍問不覩不聞曰汝信得良知否曰良知精明真是瞞昩不得曰精明有形乎曰無形曰有聲乎曰無聲曰無形與聲便是不覩不聞瞞昩不得便是莫見莫顯問戒懼曰諸君試騐心體是放縱的是不放縱的若是放縱的添個戒懼却是加了一物若是不放縱的則戒懼是復還本體年來一種高妙開口談不思不勉從容中道精藴却怕戒懼拘束如流落三家村裡争描畫宗廟之美百官之富於自家受用無絲毫干渉有若閒思雜念者詰之曰汝自思閒却惡門思汝自念雜却惡雜念譬諸汝自醉酒却惡酒醉果能戒懼一念須臾不離如何有工去夫浮思錢緒山論意見之弊謂良知本體著以意見猶規矩上著以方圓方圓不可得而䂓矩先裂矣曰此病猶是認得良知麄了良知精明肫肫皜皜不粘帶一物意即良知之運行見即良知之發越若倚於意便為意障倚於見便為見障如秤天平者手勢稍重便是弊端王泉石云古人開物成務實用須講求得定庻當局時不失著曰某常㸔棋譜局局皆竒只是印我心體之變動不居若執定成局亦受用不得緣下了二三十年棋不曾遇得一局棋譜不如專心致志勿思鴻鵠勿援弓矢盡自家精神随機應變方是權度在我運用不窮龍溪曰不落意見不渉言詮如何曰何謂意見曰隱隱見得自家本體而日用湊泊不得是本體與我終為二物曰何謂言詮曰凡問答時言語有起頭處末稍有結束處中間有説不了處皆是言詮所縛曰融此二證如何曰只方是肫肫皜皜實際程門所云善惡皆天理只過不及處便是惡正欲學者察見天則不容一毫加損雖一毫終不免踰矩此正研幾脈絡大學言好惡中庸言喜怒哀樂論語言悦樂不愠舍自家性情更無用功處順逆境界只是晴雨出處節度只是語黙此中潔浄無徃不潔浄此中粘帶無徃不粘帶問道器之别曰盈天地皆形色也就其不可覩不可聞超然聲臭處指為道就其可覩可聞體物不遺指為器非二物也今人却以無形為道有形為器便是裂了宗㫖喜怒哀樂即形色也就其未發渾然不可覩聞指為中就其發而中節燦然可覩聞指為和今人却以無喜怒哀樂為中有喜怒哀樂為和如何得合人若無喜怒哀樂則無情除非是槁木死灰天性與氣質更無二件人此身都是氣質用事目之能視耳之能聴口之能言手足之能持行皆是氣質天性從此處流行先師有曰惻隱之心氣質之性也正與孟子形色天性同㫖其謂浩然之氣塞天地配道義氣質與天性一滚出來如何説得論性不論氣後儒説兩件反更不明除却氣質何處求天地之性良知虛靈晝夜不息與天同運與川同流故必有事焉無分於動静若分動静而學則交換時須有接續雖妙手不能措巧元公謂静而無静動而無動其善發良知之神乎穎泉先生學者真有必求為聖人之心則即此必求一念是作聖之基也和靖謂敬有甚形影只収斂身心便是主一如人到神祠中致敬時其心収斂更著不得毫髪事非主一而何此最得濂洛一脈學莫要於識仁仁人心也吾人天與之初純是一團天理後來種種嗜慾種種思慮雜而壊之須是黙坐澄心乆乆體認方能自見頭面子曰黙而識之識是識何物謂之黙則不靠聞見不倚知識不藉講論不渉想像方是孔門宗㫖方能不厭不倦是故必識此體而後操存涵養始有著落學莫切於敦行仁豈是一個虚理禮儀三百威儀三千無一而非仁也知事外無仁仁體時時流貫則日用之間大而人倫不敢以不察小而庻物不敢以不明人何嘗一息離却倫物則安可一息離却體仁之功一息離便非仁便不可以語人矣顔子視聴言動一毫不雜以非禮正是時時敦行時時善事吾心先儒謂學成於静此因人馳於紛擾而欲其収斂之意若究其極則所謂不覩不聞主静之静乃吾心之真本不對動而言也即周子所謂一程子所謂定時有動静而心無動静乃真静也若時而静存時而動察乃後儒分析之説細玩子在川上章可自見矣孔子謂苟志於仁無惡也若非有此真志則終日縈縈皆是私意安可以言過李卓吾倡為異説破除名行楚人從者甚衆風習為之一變劉元卿問於先生曰何近日從卓吾者之多也曰人心誰不欲為聖賢顧無柰聖賢礙手耳今渠謂酒色財氣一切不礙菩提路有此便宜事誰不從之夫子謂能見其過而内自訟者為鮮蓋真能見過則即能見吾原無過處真能自訟則常如對讞獄吏句句必求以自勝矣但人情物理不逺於吾身茍能反身求之又何齟齬困衡之多蓋已所不欲勿施於人則人我無間其順物之來而毋以逆應之則物理有不隨我而當者乎格致之功乃曾子發明一貫之傳天下萬事萬物莫不原於吾之一心此處停妥不致叅差即是大公之體以此隨事應之無所增損起滅即是順應之流行矣動容貌出辭氣正顔色莫非以此貫之所諭應事接物惟求本心安妥便行否雖違衆勿恤學能常常如是本心時時用事久之可造於誠世有真實見美者吾因之以加勉有以迂濶見誚者吾不因之而稍改何也學所以求自信而已非為人也然所謂本心安妥更亦當有辨真無私心真無世界心乃為本心從此安妥乃為真安妥不然恐夾帶世情夾帶習見未可以語本心安妥也夫為吾一身之主為天地萬物之主孰有外於心所以握其主以主天地萬物孰有過於存心非我公反身體貼安能言之親切若此苐存心莫先於識心識心莫先於静所謂心固不出乎腔子裏然退藏於密者此也彌滿於六合者亦此也所謂識固始於反觀黙認然浄掃其塵念而自識其靈明之體可也識此靈明之呈露而不極深研窮以得其全體不可也所謂存固始於静時凝結然屋漏此操存之功也友君子亦此操存之功也所謂静亦有二有以時言者則動亦定静亦定之動静是也有以體言者則不對動説寂以宰感翕聚以宰發散無時不礙結亦無時融釋所謂無欲故静即程門之定是也若曰有嗜静處則能必其無厭動處也若曰常在裏面停停當當則方其在外時又何者在裏面耶心者天下至神至靈者也存心者握其至神至靈以應天下之感者也茍認定吾靈明之相而未盡吾真體之全即不能免在内在外之疑茍分存心與應務為二時即不能免静時凝結動時費力之疑願公不以其所已得為極至而深識此心之全體盡得存心之全功則自有渙然氷釋者矣學不明諸心則行為支明不見諸行則明為虛明者明其所行也行者行其所明也故欲明吾孝徳非超悟乎孝之理已也真竭吾之所以事父者而後孝之徳以明欲明弟徳非超悟乎弟之理已也真盡吾之所以事兄者而後弟之徳以明舜為古今大聖亦唯曰明於庻物察於人倫舍人倫庻物無所用其明察矣若本吾之真心以陳説經史即此陳説即行其所明也安可以為逐物本吾之真心以習禮講小學即此講習即行其所明也安可以為末藝然今世所謂明心者不過悟其影響解其字義耳果超果神者誰與若能神解超識則自不離日用常行矣故下學上達原非二時分之即不可語達即不可以語學故曰吾無行而不與二三子者是丘也作與語固為行止為黙亦為行人一日何時可離行耶行本重然實不在明之外也所謂將來學問只須慎獨不須防檢而既徃愆尤習心未退當何以處之夫吾之獨處純然至一無可對待識得此獨而時時慎之又何愆尤能入習心可發耶但吾輩習心有二有未能斷絶其根而目前暫却者此病尚在獨處獨處受病又何慎之可言有既與之斷絶而舊日熟境不覺竊發者於此處覺悟即為之掃蕩為之廓清亦莫非慎之之功譬之醫家急治其標亦所以調攝元氣譬之治水雖加䟽鑿決排亦莫非順水之性見獵有喜心正見程子用功密處非習心之不去也人一能之已百之人十能之已千之此正是困勉之功安可以為著意但在本體上用雖困且苦亦不以言防檢今世之防檢者亦有熟時不可以其熟時為得操存之要何如何如程門慎獨之㫖發於川上正是不舍晝夜之幾非禮勿視聽言動時時在禮上用力即慎獨也時時是禮時時無非禮安論境界試淺言之雖響晦宴息吾心亦烱然不昩吾耳目身口亦不能離亦安有無視聽言動之時雖在夢中有呼即醒何嘗俱入於滅易所謂寂者指吾心之本體不動者言也非指閒静之時也工夫只是一個故曰通乎晝夜之道而知在知處討分暁不在境上生分别承示元城之學力行七年而後成上蔡别程子數年始去一矜字何其難子曰欲仁斯仁至又何其易切問也夫仁何物也心也心安在乎吾一時無心不可以為人則心在吾與生俱生者也求吾之與生俱生者安可以時日限試自騐之吾一念真切惟求復吾之真體則此欲仁一念已渾然仁體矣何有於妄何處覓矜無妄無矜非仁體而何至於力行之熟消融之盡則不能不假以歲月耳今高明既信我夫子欲仁仁至之語則即此處求之足矣不必更於古人身上生疑斯善求仁矣聚所先生今人只説我未嘗有大惡的事未嘗有大惡的念頭如此為人也過得不知日間昏昏懵懵如醉如夢便是大惡了天地生我為人豈徒昏懵天地間與蟲蟻並活已耶諸生夜侍劉思徴問曰尭舜之心至今在其説如何先生曰汝知得尭舜是聖人否曰知之曰即此便是尭舜之心在時李肖岑大行在坐謂諸生曰尭舜之道孝弟而已矣人孰不暁得父母當孝兄弟當弟這㸃心即盜蹠亦是有的但人都是為氣欲蔽了不能依著這心行去先生謂諸生曰汝信得及否諸生對曰信得先生曰這個心是人人都有的是人人都做得尭舜的世人却以尭舜的心去做盜蹠的事圖小小利欲是猶以千金之璧而易壺飡也可惜李如真述前年至楚侗先生家與其弟楚悾同寢九日數叩之不語及將行時楚悾乃問曰論語上不曰如之何如之何汝平日如何解如真對以為我今日不逺千里特來究證亦可謂如之何如之何矣子全無一言相教耶楚悾曰汝到不去如之何如之何又教我如之何先生甚歎其妙凡至㑹者輒以此語之一友云若行得路正他如之何如之何便好若路不正就是如之何如之何也無用先生笑曰只是不曰如之何如之何若曰如之何如之何路道是不㑹差了一友呈其見解之先生曰解得不中用只是要如之何如之何就是問自立自達曰自立是卓然自立於天地間再無些倚靠人推倒他不得如太山之立於天地間任他風雷俱不能動這方是自立既自立了便能自達再不假些幇助停滯他不得如黄河之決一㵼千里任是甚麽不能沮他這方是自達若如今人靠著聞見的聞見不及處便被他推倒了沮滯了小兒行路須是倚墻靠壁若是大人須是自行凡工夫有間只是志未立得起然志不是凡志須是必為聖人之志若不是必為聖人之志亦不是立志若是必為聖人之志則凡行得一件好事做得一上好工夫也不把他算數一友言已教姪在聲色上放輕些先生曰我則異於是我只勸他立志向學若勸得他向學之志重了他於聲色上便自輕不待我勸昔孟子與齊王好樂而曰好樂甚則齊其庻幾乎於好勇則曰請好大勇曰好貨就曰好貨也好只要如公劉之好貨曰好色曰好色也好只要如太王之好色今人若聽見説好貨好色便就説得好貨色甚不好了更轉他不得今人只説孟子是不得已遷就的話其實不如孟子先生謂康曰為學只要信得人皆可以為尭舜一句康曰近來亦信得及只是無長進曰試言信處何如康曰只一念善處便是尭舜曰如此却是信不及矣一日之中善念有幾却有許多時不是尭舜了只無不善處便是尭舜康曰見在有不善處何以是尭舜曰只暁得不善處非尭舜而何先生問康曰近日用功何如康曰静存曰如何静存康曰時時想著個天理曰此是人理不是天理天理天然自有之理容一毫思想不得所以陽明先生説良知是不慮而知的易曰何思何慮顔淵曰如有所立卓爾説如有非真有一件物在前本無方體如何可以方體求得倒是如今不曽讀書人有人指㸃與他他肯做還易得縁他止有一個欲障讀書的人又添了一個理障更難擺脱你只静坐把念頭一齊放下如青天一般絶無一㸃雲霧作障方有㑹悟處若一心想個天理便受他纒縳非唯無益而反害之書曰人心唯危道心唯微你今想個天理反添了這個人心自家常是不安的若無道心無聲無臭容意想測度不得容意想測度又不微了中庸曰喜怒哀樂之未發謂之中怒而無有作惡喜而無有作好所謂情順萬事而無情心普萬物而無心無動無静方是工夫的當處譬之鏡然本體光明妍來妍照媸來媸照鏡裏原是空的沒有妍媸你今如此就謂之作好康曰如此莫落空否曰不要怕空果能空得自然有會悟處康曰如此恐流於佛學也曰空亦不同有一等閒人的空他的空是昏昏懵懵胸中全沒主宰纔遇事來便被推倒如醉如夢虚度一生有異教家的空是有心去做空事物之來都是礙他空的一切置此心於空虚無用之地有吾儒之空如太虚一般日月風雷山川民物凡有形色象貌俱在太虚中發用流行千變萬化主宰常定都礙他不得的即無即有即虚即實不與二者相似康曰康初亦從空上用功只縁不識空有三等之異多了這個意見便添一個理障今已省得此意當下却空不來曰這等工夫原急不得今日減得些明日又減得些漸漸減得去自有私意浄盡必如太虚日子忙不得如此又是助長又是前病復發了康問孟子云必有事焉須時時去為善方是即平常無善念時無惡念時恐也􅈫不得有事否先生曰既無惡念便是善念更又何善念却又多了這分意思康曰亦有惡念發而不自知者先生曰這㸃良知徹頭徹尾無始無終更無有惡念發而不自知者今人錯解良知作善念不知知此念善是良知知此念惡亦是良知知此無善念無惡念也是良知常知便是必有事焉其不知者非是你良知不知却是你志氣昏惰了古人言曰清明在躬志氣如神豈有不自知的只縁清明不在躬耳你只去責志如一毫私欲之萌只責此志不立則私欲便退聽所以陽明先生責志之説最妙先生謂康曰人之有是四端猶其有是四體信得及否康對曰康今説信得只是口裏信得不是心裏信得縁未思量一番未敢便謂信得先生曰倒不要思量大抵世學之病都是揣摩影響如猜拳一般聖門若顔子便是開拳見子箇數分明且汝今要囘須要討個分明半明半暗不濟得事康黙自省有覺因對曰只因老師之問未實體認得便在這裏痛恐便是惻隱之心愧其不知恐便是羞惡之心心中肅然恐便是恭敬之心心中辨決有無當否恐便是是非之心即此一問四端盡露直如人之有四體一般但平日未之察耳先生喜曰這便是信得及了康又曰四端總是一端全在是非之心上惻隱知其為惻隱羞惡知其為羞惡恭敬知其為恭敬若沒是非之心何由認得亦何由信得此便是良知擴而充之則致矣先生曰㑹得時止説惻隱亦可説羞惡亦可説恭敬亦可仁者見之謂之仁智者見之謂之智有所見便不是道百姓之愚沒有這見却常用著他只不知是道所以夫子曰中庸不可能也中是無所倚著庸是平常的道理故孟子言孝未嘗以割股廬墓底却曰孩提之童無不知愛其親言弟則曰徐行後長者謂之弟今人要做忠臣的只倚著在忠上便不中了為此驚世駭俗之事便不庸了自聖人㸔來他還是索隱行怪縱後世有述聖人必不肯為徃年有一友問心齋先生云如何是無思而無不通先生呼其僕即應命之取茶即捧茶至其友復問先生曰才此僕未嘗先有期我呼他的心我一呼之便應這便是無思無不通是友曰如此則滿天下都是聖人了先生曰却是日用而不知有時懶困著了或作詐不應便不是此時的心陽明先生一日與門人講大公順應不悟忽同門人遊田間見耕者之妻送飯其夫受之食食畢與之持去先生曰這便是大公順應門人疑之先生曰他却是日用不知的若有事惱起來便失這心體所以大人者不失其赤子之心赤子是個真聖人真正大公順應與天地合徳日月合明四時合序鬼神合吉㐫底一友謂知人最難先生劈畫一仁字且曰這個仁難知須是知得這個仁才知得那個人是友駭問先生曰惟仁人能好人能惡人是友悚然有問仁體最大近已識得此體但静時與動時不同似不能不息曰爾所見者妄也所謂仁者非仁也似此懸想乃背於聖門黙識之㫖雖勞苦終身不能彀一日不息夫識仁者識吾身本有之仁故曰仁者人也今爾所見是仁自仁而人自人想時方有不想即無静時方明纔動即昏豈有仁而可離者哉豈有可離而謂之仁哉故不假想像而自見者仁也必俟想像而後見者非仁矣不待安排佈置而自定者仁也必俟安排佈置而後定者非仁矣無所為而為者仁也有所為而為者非仁矣不知為不知者仁也强不知以為知者非仁矣與吾身不能離者仁也可合可離非仁矣不妨職業而可為者仁也必棄職業而後可為者非仁矣時時不可息者仁也有一刻可息非仁矣處處皆可體者仁也有一處不可體者非仁矣人皆可能者仁也有一人不可能者非仁矣孔子曰道二仁與不仁而已矣出乎此則入乎彼一日不識仁便是一日之不仁一時不識仁便是一時之不仁不仁則非人矣仁則不外於人矣識仁者毋求其有相之物惟反求其無相者而識之斯可矣先生曰言思忠事思敬只此便是學一友曰還要本體曰又有甚麽本體忠敬便是本體若無忠敬本體在何處見得吾輩學問只要𦂳切空空説個本體有何用所以孟子曰無為其所不為無欲其所不欲如此而已矣更有甚麽人人有個不為不欲的人只要㝷究自家那件是不為不欲的不為不欲他便了學而不思則罔思而不學則殆人只行些好事而不思索其理則習矣而不察終是昏昏懵懵全無一毫自得意思做成一個㝠行的人人只思索其理而不著實去行懸空思索終是無有真見不過窺得些影響做成一個妄想底人所以知行要合一㸔人太俗是學者病痛問如何是本心曰即此便是又問如何存養曰常如此便是有疑於當下便是之説者乃舉孟子之擴充為問先生曰千年萬年只是一個當下信得此個當下便信得千個萬個常如此際有何不仁不義無禮無智之失孟子所謂擴充即子思致中和之致乃是無時不然不可須臾離意思非是從本心外要加添些子加些子便非本心恐不免有畵蛇添足之病實踐非他解悟是已解悟非他實踐是已外解悟無實踐外實踐無解悟外解悟言實踐者知識也外實踐言解悟者亦知識也均非帝之則均非戒慎之㫖四山論學今世覓解脱者宗自然語及問學輙曰此為法縳耳顧不識人世種種規矩範圍有欲離之而不能安者此從何來愚以為離却戒慎恐懼而言性者非率性之㫖也今世慕歸根者守空寂語及倫物輙曰此謂義襲耳顧不識吾人能視能聽能歡能戚者又是何物愚以為離却喜怒哀樂而言性者非率性之㫖也今世取自成者務獨學語及經世輒曰此逐情緣耳顧不識吾人覩一民之傷一物之毁惻然必有動乎中此又孰使之者愚以為離却天地萬物而言性者非率性之㫖也瀘水先生思成求正草君子之於人也虛心而照平情而應使其可容者自容不可容者自不能容不以察與焉而已若作意以含容為量則恐打入世情隊裡膠結不解吾將不為君子所容矣天地鬼神遇事警畏然恐在禍福利害上著脚終渉疎淺古人亦臨亦保若淵若氷不論有事無事一是恂慄本來作主古人以天地合徳為志故直從本體亦臨亦保不使一毫自私用智沾帶掛根今人以世情調適為志故止從事為安排佈置終不能於不覩不聞上開眼立身總之一達而上下分途君子只憑最初一念自中天則若就中又起一念搬弄伎倆即無破綻終與大道不符今世學者登壇坫但曰黙識曰信曰聞曰叅以為不了義諦夫叅之為言從二氏而後有不必言也顧為識為信為聞就而質之究竟不過叅之之義吾以為總以人情世變毫無著落此等論且放下須近裡著已求之中庸以未發之中言性而必冠之以喜怒哀樂孟子言性善而必發於惻隱羞惡四端則知曰性曰情雖各立名而無分段故知莫見莫顯亦無非不覩不聞而慎獨之功即從戒懼抽出言之蓋未有獨處致慎而不為戒慎恐懼者此聖學所以為實也陽明洞見此者特提致知而又恐人以意識為知又㸃出一良字蓋以性為統理而知則其靈明發端處從良覓知則知不離根從致完良則功不後時此正慎獨關鍵吾人但當依此用功喜怒哀樂歸於中節而不任已惻隱四端一任初心而不轉念則一鍼一血入聖更復何疑公以求仁為宗㫖而云無事不學無學不證諸孔氏苐不知無所事之時何所為學而應務酬酢之繁又不妨一一證諸孔氏而學之躊躇倉皇反覺為適為固起念不化此將何以正之與徐魯源明儒學案卷十六
