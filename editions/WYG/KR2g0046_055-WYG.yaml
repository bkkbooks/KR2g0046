body:
  text: 明儒學案卷五十五餘姚黄宗羲撰諸儒學案下三給事郝楚望先生敬郝敬字仲輿號楚望楚之京山人萬厯己丑進士知縉雲縣調永嘉入為禮科給事中改户科上開礦税奄人陳増陷益都知縣吳宗堯逮問先生劾増申救宗堯税奄魯保李道請節制地方有司先生言地方有司皇上所設以牧民者也中使皇上所遣以取民者也今既不能使牧民者禁禦其取民者已為厲矣而更使取民者箝制其牧民者豈非縱虎狼入牢而恣其摶噬哉又劾輔臣趙志臯力主封貢事敗而不坐䑕首觀望謀國不忠於是内外皆怨己亥大訃京朝官以浮躁降宜興縣丞量移江隂知縣不為要人所喜考下下再降遂挂冠而歸築園著書不通賓客五經之外儀禮周禮論孟各著為解疏通澄明一洗訓詁之氣明代窮經之士先生實為巨擘先生以淳于髠先名實者為人是墨氏兼愛之言後名實者自為是楊氏為我之言戰國儀秦鬼谷凡言功利者皆不出此二途楊墨是其發源處故孟子言天下之言不歸揚則歸墨所以遂成戰國之亂不得不拒之若二子徒有空言無闗世道孟子亦不如此之深切也此論實發先儒所未發然以某論之楊墨之道至今未熄程子曰楊墨之害甚於申韓佛老之害甚於楊墨佛老其言近理又非楊墨之比夫無所為而為之之為仁義佛老從死生起念只是一個自為其發願度衆生亦只是一個為人恁他説元説妙究竟不出此二途其所謂如來禪者單守一㸃精魂豈不是自為其所謂祖師禪者純任作用豈不是為人故佛氏者楊墨而深焉者也何曽離得楊墨窠臼豈惟佛氏自科舉之學興儒門那一件不是自為為人仁義之道所以滅盡某以為自古至今只有楊墨之害更無他害楊子雲謂古者楊墨塞路孟子辭而闢之廓如也豈非夢語今人不識佛氏底藴將楊墨置之不道故其闢佛氏亦無闗治亂之數但從門面起見耳彼單守精魂者不過深山之木石大澤之龍蛇無容闢之其純任作用一切流為機械變詐者方正彌天漫地楊墨之道方張而未艾也嗚呼先生之學以下學上逹為的行之而後著習矣而後察真能行習未有不著察者也下學者行也上逹者知也故於宋儒主静窮理之學皆以為懸空著想與佛氏之虚無其間不能以寸然按先生之下學即先生所言之格物也而先生於格物之前又有一叚知止功夫亦只在念頭上未著於事為此處如何下學不得不謂之支離矣知言學以性善為宗以養氣為入門以不動心為實地以時中為妙用性即至善不待養而其體常定不定者氣動之也故其要只在養氣性者静也無為之先本無不善桀紂幽厲有為之後也氣習勝也天道於穆本無不善災疹乖戾毒草猛獸有為之後也氣化勝也志氣之帥也此乃天然妙用人心起一念氣即隨念而動真宰凝定氣自蟄伏中心坦坦氣自舒暢所以養氣又在調心浩然之氣與呼吸之氣只是一氣一㸃虚靈内照自然渣滓銷鎔以是益信人性本善若非性善何以性現衆欲便消今人疑性有不善葢認情識為元神耳不是性之本體何怪乎不善一㸃靈知時時刻刻事事物物寂然不昧便是有事的的真功行時知行坐時知坐呼吸語嘿細㣲無不了了自知自然性常見而氣聽命此謂性善此謂知止此謂止於至善日間寧静時多則性見閙攘時多則氣雜要之塵勞喧譁中自有安身立命處氣常運性常定何動不静本戅人念頭常方方硬硬以此認不動非也念頭若不圓活觸着便惱磕着便揺湏放教平和滿腔春意則氣不調而自調心不定而自定習氣用事徔有生來已慣拂意則怒順意則喜志得則揚志阻則餒七情交逞此心何時安寧湏猛力斡轉習氣勿任自便機括只在念頭上挽囘假如怒時覺心為怒動即返觀自性覔取未怒時景象湏臾性現怒氣自平喜時覺心為喜動即返觀自性覓取未喜時景象湏臾性現喜氣自平七情之發皆以此制之雖不如慎之未萌省力然既到急流中只得如此挽囘喜怒雖大賢亦不免但能不過其則耳若順亦不喜拂亦不怒則是性死情灰感之不應觸之不動木石墻壁皆聖賢矣有事只是一個乾知心所以大者以其虚也若滯在一處只與司視司聽者無别有礙則小無礙則大但得閒時則正襟嘿坐體取未發氣象事至物來從容順應塵勞旁午心氣愈加和平不必臨事另覓主宰但能平心定慮從容順應即凡順應者即是主宰多一層計較多一畨勞擾性體至静而明静故寂寂明故生生顯㣲無間仁智一體動静一源此天命之本然也天命不已處即是於穆處盈兩間四時日月寒暑晝夜來而往往而來草木苗而秀秀而實人物㓜而壯壯而老刻刻流行時時變易俄頃停滯即不成造化矣人性若斷滅枯稿豈是天命之本然故曰離動非性厭動非學無事端嘿凝神内外根境一齊放下有事儘去思量儘去動作只要傀儡一線不放根蒂在手手舞足蹈何處不是性天約禮只是主敬以敬履事之謂禮以禮操心之謂敬儒道宗㫖就世間綱紀倫物上著脚故由禮入最為切近其實欛柄只一㸃靈性惺惺歴歴便私欲浄盡天理流行日用倫物盡是真詮但聖人下學上逹不如此説得元虚子思後來提出未發之中教人戒懼慎獨直徔無始窟中倒底打迸出來刀刀見血矣乾元資始萬物化育流行窮厯不變只緣太虚中有一個貞觀作主自屈自伸自往自來無心而成化故曰乾以易知曰健曰專曰直皆易知之妙用也人心一念虚靈惺惺内照自與天道同運並行今人念頭無主膠膠擾擾精明日消乃禽乃獸是謂背天論語思無邪禮記儼若思二語為聖功之本不思之思為儼若思不偏之思為正思孟子曰心之官則思先立乎其大者一片虚靈静而常照與宇宙同體萬象森羅故曰大非計較分别之思謂之大也計較分别之思皆謂之邪一有所著即非中體非必放縱而後謂之邪也不學則殆之思終日終夜無益之思皆是揣摩妄想非儼若無邪之本體者是真思即是真學豈得殆而無益養心先要識心體孟子曰茍得其養無物不長先儒謂先有個物方去養方為長白沙詩云存心先要識端倪此之謂也吾儒謂喜怒哀樂未發時氣象禪門謂之本來面目元門謂之五行不到處白沙詩湏臾身境俱忘却一片圓融大可知即此境界是萬物皆備仁之全體也便是端倪識此方去日用上䕶持工夫纔有下落先輩謂如雞伏卵如龍養珠先要有珠有卵方去抱養非茫茫泛用其心也日用感遇情識牽纒千頭萬緒如理亂絲昔人有環中弄丸之喻胸次何灑然也環中者於此去彼來交繼之間圓轉平等無牽强凑合之迹也弄丸者因一彼一此各正之理隨物應允無凝滯畱難之苦也上士以應用為樂下學以酬酢為苦但十分苦中得一二分輕省即是討著把柄直到無意必固我從心所欲發而中節地位方是最上頭為仁在養氣心氣和平自然與萬物相親今人血氣運動即謂之生都不知自已性命安頓何處故云百姓日用而不知天道只一個乾知作主更無第二知所以亘元會運世時行物生貞常不變若有第二知便費搬弄安排必然生出許多怪異時序都要顛倒錯亂人心多一個念頭便多一畨經營大道不分體用治人即是修已士君子待人接物處事一有差謬即是心性上欠圓融試隨處返照自當承認萬物若非一體天下無感應矣為人子弟日用問安視饍温凊定省唯諾進趨隅坐徐行奉杖進履種種小節在家庭父母兄長之前行之絲絲都是性命精髓流洩出來所以為至徳要道有目能見無目即無見有耳能聞無耳即無聞有血肉軀便有我無血肉軀即無我有計較思量便有心無計較思量即無心此凡夫局於形氣所謂顛倒迷惑沉淪生死為可悲憫者也悟中人湏不假五官四肢閉明塞聰兀然枯朽而光瑩朗鑑到處空明冲漠無朕之中萬象森羅方為知者形氣有生死性無生死性自太虚來與太虚同體附形氣而為性形從太虚中結聚故不離太虚之本然譬如氷從水生所以性體與虚合也形毁氣㪚之後一㸃虚明不被情識牽纒復還太虚去若被情識牽纒展轉汩没依舊化形化氣少不得太虚本然仍在如金雜銅中百刼不壞直待銅質銷盡金體復現今人病痛只為心不在軀殻内所以形空氣㪚日趨朽敗若心在身中食知食視知視聼知聼一切運動喘息無不了了自知則神常凝氣常聚精常固昔賢所以言心要在腔子内也天地元氣只在兩間内運用保合不泄所以天長地久日月只在兩間内代明所以久照今人精氣神識渾在外面發洩無餘安得不敗漏銷竭以至死亡老子曰載營魄抱一能無離乎營義訓明亦訓動即魂也動而明者為魂淮南子曰火氣為魂地氣為魄註曰魂人陽神也魄人隂神也魂魄具而成人二者相守魂日也魄月也天道日月相推而明生人身魂魄相守而靈發月附日而生光魄附魂而生靈晝陽勝白日動作魂用事也魄即伏其間隂不離陽也夜隂勝向晦宴息魄用事也魂即守其宅陽不離隂也魄精重濁離魂則沉在夜則為厭寐在晝則為昏惰頑冥一切貪著不仁之患魂神輕清離魄則浮在晝則為㪚亂馳逐在夜則為驚悸狂呼展轉不寧之患故攝生者以魂為主魂勝而魄受制則志氣清明神宇光朗為賢為聖魄勝而魂受制則私欲横行邪暗蔽塞為狂為愚魂不守魄則官曠宅空神外馳而形無檢破耗銷竭為病為死故曰載營魄抱一載者並畜同處之意抱一者渾合不離之法也四書攝提凡事君者盡忠謀國以求必濟不可輕棄其身處困者畏天凝命以求遂志不可輕棄其命如是則君事無不終而已志無不遂至於萬不可已舍身殞命良非得已豈謂凡事君者先意其必亡遂委身棄之乎世儒不逹於為臣輒云不有其身於處困輒云不有其命但求塞責不顧委托無濟困之才適以自喪其軀豈聖人教人之本意哉夫道貴通變易戒用剛儒者固執用剛舉天下國家之重祗以供吾身之一擲經術不明身世兩誤可不慎歟不求安飽朱註志有在而不暇及所以敏於事其實飲食居處亦便是事恒情食輒求飽居輒求安所謂有事而正也見小欲速傖父習氣學道者逞一毫習氣不得著一毫私意不得穿衣喫飯都是事博士家終日尋行數墨靈知䝉閉没齒無聞皆沿習格物窮理先知後行捕風捉影空談無實學者求真知湏躬行實體行之而後著習矣而後察向日用常行處參證自然契合人情所謂好惡者好他人惡他人耳聖人所謂好仁惡不仁者自好自惡也世所謂好仁惡不仁見可好之在仁可惡之在不仁耳聖人所謂好仁即是為仁所謂惡不仁即是去不仁論語無空虚之談無隠僻之教言性即言習言命即言生死與廢言天即言時行物生言仁即言工夫效騐言學即言請事條目意不離物心不離境理不離事學不離文道不離世天不離人性天不離文章故曰下學而上逹髙卑一也逺邇一也道器一也形性一也理氣博約知行皆一也一即貫貫即一故曰一以貫之後儒事事物物分作兩叚及其蔽也遂認指為月畫地為餅蹠虚為實貴無而賤有離象而索意厭動而貪静逺人而為道絶俗以求真清虚寂滅之教盛而規矩名法蕩然矣人性雖善必學習而後成聖賢赤子雖良養之四壁中長大不能名六畜雖有忠信之資不學不成令器荀卿疑人性為惡以此夫性本虚靈人之生理何有不善如五榖果實待人栽培委之閒曠其究腐敗耳可謂五榖果實本無生理乎浮屠稱無學以求見性所以荒宕馳騁敗常亂俗也聖人於道但教人行不急責人知禮儀三百威儀三千使民由之而已知則存乎賢者縱不知能由亦有所範圍而不及於亂如天下仁人孝子少養生喪祭之禮不廢即賊子亦少必若責養生者以深愛和氣責居喪者以三年不言責祭祀者以七日戒三日齋洋洋如在不惟孝子慈孫不多得將并奉養衰麻祭享以為難行故聖人制禮因人情而節文小大由之正以此二氏執途之人責以明心見性致虚守静未可得反使世人迷謬不知所趨故道者卑近平常人情而已道不離宇宙民物二氏言道出宇宙民物之外理學言道蔵宇宙民物之中聖人禮樂即道四科即學二氏以民物為幻以空寂為真故道出於世外理學以有形為氣以無形為理故道蔵於世中二氏不足論儒者學為聖人分理氣為二舍徳行言語政事文學别求主静窮理豈下學而上逹之本教養身者將天地萬物無邉光彩一齊収攝向身來醖釀停毓然後發生有身而後有天地萬物無已是無天地萬物也故已重於天地萬物尋常行處常知有已即是放其心而知求下學而上逹一語為學的世儒與二氏教人先知聖人教人先行故學習為開卷第一義學習即行也悦則自然上逹悦即知知即好且樂故悦葢由之而後知之也孟子謂行不著習不察者彼為終身由之而不知者發也終身由之而不知猶然不行不習不由也真能行習未有不著察者也故道以行為本聖人教諸子不過尋常踐履躬行實地其所謂正心誠意盡性知命者已即在其中矣知與識異知者太虚之元神即明徳之真體太極初分陽明為知隂暗為識暗中亦有明浮屠謂之陰識在天日為陽魂猶知也月為隂魄猶識也在人旦晝魂用事為知昏夜魄用事為識識附知生還能蔽知知縁識掩還以宰識故旦晝亦不能離識夢寐亦不能離知知為主勿為識奪即知即止也知不能為主隨識轉移雖知不能自止學者但使明徳常主便是知止自欺最是雜念妄想為甚未有可好可惡之物空想過去未來此是念頭上虚妄未見施行不為欺人祗自欺也及事物到前䝉蔽茍且不能致知及物惡惡不能如惡臭好善不能如好色自家本念終成欠缺是謂不自慊較自欺加顯矣自欺在未有好惡前不止不定不静不安不可與慮而戒之之法全在知止自慊在既有好惡後能絜矩能忠信加諸家國天下身心無欺而求慊之功在致知格物故中庸言誠必兼物我始終純一乃為至誠與大學誠意在致知格物正同大抵恒人意不誠由妄念多所以勿自欺為始始於知止有定也欲誠意必待擴充所以自慊為終終於物格知至也宇宙間惟物與我意在我物在天下往來應感交涉之端在知致吾知往及物謂之格格至也推吾之知至彼物邉攝天下之物歸吾意邉故曰致知在格物意惟惡念知其非而任之是自欺若善念何嫌往來禪家并善念掃除乃至夢寐亦欲自主與覺時同如夢覺可一則晝夜亦可一生死亦可一其實晝夜生死焉可一惟生順死安便是生死一晝作夜息便是晝夜一善則思行惡則思止便是行止一意茍無邪便是有意無意一勿自欺者不專在止念在知是知非知其所當止而止之止固不自欺也知其所不必止而不止不止亦非自欺也葢思者心之官聖功之本禪家必以不起念為無礙儒者襲其㫖刻厲操心乃至旋操旋舍忽存忽亡反以知止為難失之逺矣禪寂無念但念起不分善惡皆自欺聖教善是善惡是惡覺是覺夢是夢茍夢覺不一在人即為自欺將晝夜不同在天地亦是自欺乎不通之論也近代致良知之學祗為救窮理支離之病然矯枉過直欲逃墨而反歸楊孟子言良知謂性善耳是非之心人皆有之然自明自誠先知先覺者少若不從意上尋討擇善固執但渾淪致良知突然從正心起則誠意一闗虚設矣致知者致意中之知無意則知為虚影而所致無把柄湏意萌然後知可致人莫不有良心邪動膠擾於自欺必先知止定静禁止其妄念以逹於好惡然後物可格知可致意可誠若不徔知止勿自欺起胡亂教人致良知妄念未除自欺不止鶻突做起即禪家不起念無縁之知隨感敵應不管好醜一超直入與中庸擇執正相反既有誠意工夫何湏另外致良知不先知止勿自欺以求定静安慮那得良知呈現致之以格物乎中之一字自堯舜開之曰允執厥中然未明言其所謂中也夫子始言中庸中即庸也庸之言用也百姓日用即中也大舜執其兩端用其中於民執兩端即執中也易曰一隂一陽之謂道即兩端也孟子云執中無權猶執一也權即兩端兩端者執而無執是謂允執後儒以不偏不倚無過不及之間為中是執一也中有過時自有不及時過與不及皆有中在如冬有大寒亦有熱夏有大暑亦有凉不可以其不及而謂之非冬夏不可以其太過而謂之非寒暑也中即性也性含舒慘喜怒哀樂未發混同所以為不測之神發皆中節植本於此若但有喜樂無哀怒有哀怒無喜樂則偏方一隅不活潑必以中節為和者中不可見聞和即可見聞之中中無思為和即思為之中無和則中為浮屠之空寂耳聖人言中向用處顯所以為中庸教人下學而上逹㣲之顯隠之見誠之為貴也未發在未有物之先所謂一也神也形而上也無過不及在既有為之後器也形而下也無過不及者形象之迹未發者不暏聞之神不可相擬有圓融不測之神而後可損益變通以用中未用只是兩端兩端者無在無不在所謂圓神也一而非一二而非二故曰兩端合虚實有無而一不論已發未發但氣質不用事都是未發之中知行合一離行言知知即記聞離知言行行皆習氣道由路也共由為路日用常行實在現成無論㣲顯内外但切身心人物事理可通行者皆道是謂之誠無當於身心人物事理雖元妙無用不可行皆是虚浮不可以為道即切身心事物人茍昏迷放佚氣質用事離實亦虚也故聖人教人擇善固執只在人倫庶物間神明失照則荆棘迷路神明作主則到處亨通舍此談元説妙捕風捉影盡屬虚浮故曰明則誠矣誠則明矣著實便是誠惺覺便是明誠明而能事畢矣問天地不二不測曰太極未判渾渾沌沌太極初判一生兩分兩抱一立以為一而兩已形以為兩而一方函不可謂一不可謂二苐曰不二不二者非一非二之名陽動隂静翕闢相禪一以貫之是曰不測在人心推已發之和與未發之中交致而萬感萬應所謂一而二二而一譬如作樂樂器是一中間容戞擊搏拊連器成兩音是一中間有輕重緩急曲折空歇處連音成兩此一隂一陽之道參天兩地之數事物巨細皆然是謂不測朱子以存心為尊徳性以致知為道問學存心者操存静養之謂致知者格物窮理之謂本程子涵養湏用敬進學在致知來徳性原不主空寂今以存心當尊徳性則墮空寂矣問學原不止窮理今以致知當道問學則遺躬行矣徳性實落全仗問學離問學而尊徳性明心見性為浮屠耳離徳性而道問學尋枝摘葉為技藝耳除却人倫日用别無徳性一味致知窮理不是實學學效也其要在篤行道由也道問學者率由之非記聞之也夫無思無為寂然不動徳性之虚體也感而遂通天下之故問學之實地也論感應之迹人心一日之間無思無為者不能斯湏而論存主之神自㓜至老其寂然不動者百年常住故曰不睹不聞莫見莫顯豈徒操存静養無思無為謂之尊徳性乎哉若是則所謂道問學者亦風影耳身無邪動即心正心無欺詐即意誠意無曖昧即知至事事物物知明處當即物格世教衰道術裂日事浮華粉飾鋪張不識道體本初故子思㣲顯闡幽示人以不睹不聞無聲無臭之真使人斂華就實返本歸元非專教人遺事物静坐觀空如禪寂也且如論語言敬只是謹慎無敢慢之意不外修已事上而理學家必曰主一無適乃為敬使學人終日正襟危坐束縳桎梏胸臆以為操心曰戒慎不睹恐懼不聞君子慎獨當如此畢竟張皇棿杌如捕風繋影徒費商量終無所得何如即事就境隨處隨時恂恂規矩從容和順自然内外渾融矣禮曰體魄則降知氣在上知與氣非二知即氣也無氣即無知太虚渾是氣所以能神氣即理之實處剛大充塞者氣之分量所以稱浩然者也要其養氣不在剛大充塞處只在幾㣲存主中集義自然氣和心廣體胖上下同流世儒錯向剛大充塞處求謂易道貴剛與時中妙用迥隔大抵氣質不用事即是養氣徳性常主即是集義學養氣即氣是事但不可著於氣平常執事凡事皆事但不可著於事著事便是勿求於心事在即心在心為主事不得為正便是心勿忘心勿忘則即事是心不必更於事外求心如心土添心即是助長體用一原顯㣲無間事理圓通心境不二求放心之要領也養氣是徹上下合内外之道天地時行物生人身動作威儀皆氣也天命無聲無臭於四時百物上調停人心不睹不聞於動作威儀上培養偏外則支離偏内則空寂聖學所以養未發之中於已發之和也儀禮親喪三日成服杖拜君命及衆賓不拜棺中之賜禮凡尊者有賜厥明日必往拜惟喪禮孝子不忍死其親棺中之賜衣衾含襚之𩔖拜於既葬之後孟子為齊卿母卒王以卿禮賻之臧倉所謂後喪踰前喪衣衾棺槨之美皆王之賜路中論棺槨之美其故可知反於齊拜王賜也止於嬴止境上不入國也衰絰不入公門大夫去國於境為壇位而哭親至齊境拜賜即返魯終喪也俗儒譏孟子不終母喪不考禮文之故也道之大原出於天假使人性本無此道雖學亦不能洪荒至今不知幾億萬載習俗縁染斧斤戕伐此理常新茍非性善絶學無傳久矣豈書册所得而留哉由學而能者萬不敵天生之一由不學而壞者一喪其天生之萬故學為要七篇大抵與楊墨辯然七國時二子死久矣當世為害者非盡楊墨二子亦未嘗教人無父無君也要之楊子為我墨子為人當時遊士無父無君皆起於自為為人故曰天下之言不歸楊則歸墨淳于髠曰先名實者為人此墨氏兼愛之言也後名實者自為此楊氏為我之言也千萬世功利之媒不出此兩途皆是無君父害仁義者也仁義者立人之道人知孟子為楊墨辯不知為當世不仁不義者辯也孔子之道時中而已隨處適中包三才貫古今化育所以流行人物所以生成千變萬化所謂滄海之濶日月之光觀波瀾浩蕩然後知天下莫大於水觀光輝普照然後知明莫大於日月若但窮源於山下涓涓耳仰觀懸象規規耳求本於聖心幾希耳故善觀水者於波瀾洶湧處善觀日月者於光明普照處善觀聖道者於萬象森羅處説者顧謂觀瀾知水之本觀容光知明之本夫水之本天一也日月之本二氣也觀者不於實而於虚不於顯而於㣲不於費而於隠何以觀何以見大觀天載於無聲無臭不於時行物生觀聖人於不睹不聞不於經綸變化所以世之學道者澄心嘿坐不於人倫庶物躬行實踐則二氏之觀空無相為無量大千者而已以此言道豈孔子下學上逹之㫖諌議吳朗公先生執御吳執御字朗公台州人也崇禎間由進士擢刑科給事中初入考選宜興令其私人李元功邀致之先生不往御史袁𢎞勲金吾張道濬搏擊善𩔖太宰王永光主之先生劾其誨貪崇墨宜避賢路永光尋罷上憂兵餉缺額先生言今日言餉不在創法而在擇人誠令北直山西陜西凡近邉州縣罷去遢葺之輩勅吏部精擇進士盡行改選畀以本地錢糧便宜行事各隨所長撫吾民練土兵餉不取償於司農兵不借援於戍卒計無便於此不聼又劾宜興塘報奏章一字涉盜賊一字涉邉防輒借軍機宻封下部明畏廷臣摘其短長他日敗可以捷聞功可以罪按也詞臣黄道周清亷不阿欲借試録處之未遂其私則遷怒儀部黄景昉楚録箴砭異同必欲斥之李元功蔣福昌等夙夜入幕私人如市此豈大臣壁立千仭不邇羣小之所為哉奏上上切責之先生再劾三劾俱留中凡先生所言皆時局小人之深忌已而先生奏薦劉忠端曹于汴并及御史遲大成所舉之姜曰廣文震孟中允倪元璐所舉之黄道周上責其狥濫御史吳彦芳言正人蠖伏尚多邪𩔖鵷班半據薦曹于汴李邦華李瑾劾呂純如章光岳上以朋比下先生與彦芳於刑部坐奏事上書詐不以實律杖徒三年兵部員外郎華允誠劾温體仁與閔洪學同邑相依驅除異已而吳執御之處分遂不可解矣未幾先生亦卒有江廬獨講一編其學大都以立誠為本而以坤二爻為入門因合之乾三爻深佩宋儒居敬窮理之説至海門言求已處亦篤信不疑故於克已閑邪謂不當作去私説雖未洞見道體獨契往聖而一種擔當近理之識卓然躬行君子也江廬獨講克已工夫是一了百當其餘出門使民都是逐件做工夫假如出門時聚起精神這出門時便是仁使民時聚起精神這使民時便是仁劉夫子曰精神只是一個這能出門的精神便是能使民的精神此理月落萬川不分江河沼沚只人所見有不同然此語自是從親切體貼來者祭祀感格乃生者之氣非死者之氣朱子人死未盡㪚之説尚徔佛學來然難説只是生者之氣氣本無間屈伸有無皆氣也雖㪚而盡仍是死者之氣故曰反而歸者為鬼天無時不動而天樞則不動劉夫子曰是動静判然二物也天樞之動甚㣲如紡車筦一線極渺忽起其動安可見故謂之居其所其實一線之㣲與四面車輪同一運轉無一息之停故曰維天之命於穆不已此可以悟心體之妙故曰幾者動之㣲吉之先見者也此學不明遂令聖真千載沉錮而二氏之説得以亂之兩間可求惟已七尺可問惟心喜怒哀樂稍有盈溢便是氣常存此心不為氣動即是無終日之間違仁明儒學案卷五十五
