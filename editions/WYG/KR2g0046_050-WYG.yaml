body:
  text: 明儒學案卷五十餘姚黄宗羲撰諸儒學案中四肅敏王浚川先生廷相王廷相字子衡號浚川河南儀封人𢎞治壬戌進士改庶吉士授兵科給事中正徳戊辰謫為州判稍遷知縣復召為御史出按陜西鎮守奄人廖鵬虐民先生繩之以法鵬大恨已而視學北畿有兩奄干請先生焚其書兩奄亦恨未有以發也鵬因上書搆之兩奄從中主其奏逮入詔獄又謫為縣丞稍遷知縣同知擢四川僉事山東副使皆視學政嘉靖初歴湖廣按察使山東左右布政使以右副都御史巡撫四川入為兵部左右侍郎轉南京兵部尚書召為左都御史進兵部尚書兼掌院事加太子太保辛丑罷又三年而卒年七十一隆慶初贈少保諡肅敏先生主張横渠之論理氣以為氣外無性此定論也但因此而遂言性有善有不善并不信孟子之性善則先生仍未知性也葢天地之氣有過有不及而有愆陽伏隂豈可遂疑天地之氣有不善乎夫其一時雖有過不及而萬古之中氣自如也此即理之不易者人之氣禀雖有清濁强弱之不齊而滿腔惻隱之心觸之發露者則人人所同也此所謂性即在清濁强弱之中豈可謂不善乎若執清濁强弱遂謂性有善有不善是但見一時之愆陽伏隂不識萬古常存之中氣也先生受病之原在理字不甚分明但知無氣外之理以為氣一則理一氣萬則理萬氣聚則理聚氣散則理散畢竟視理若一物與氣相附為有無不知天地之間只有氣更無理所謂理者以氣自有條理故立此名耳亦以人之氣本善故加以性之名耳如人有惻隱之心亦只是氣因其善也而謂之性人死則其氣散更何性之可言然天下之人各有惻隱氣雖不同而理則一也故氣有萬氣理只一理以理本無物也宋儒言理能生氣亦只誤認理為一物先生非之乃仍踏其失乎雅述學者始而用功必須主敬存誠以持其志而後有進久而純熟動靜與道為一則誠敬不待養而自存志不待持而自定矣程子論持志曰只此便是私此言亦過高儒者遂以主敬存誠以持志為有意而不務殊失下學上達之意近禪氏之虛靜矣冲漠無眹萬象森然已具此靜而未感也人心與造化之體皆然使無外感何有於動故動者緣外而起者也應在靜也機在外也已應矣靜自如故謂動以擾靜則可謂動生於靜則不可而况靜生於動乎四時行百物生可以觀天動作行事可以觀聖人内蘊不可知而發外者可以槪覩天除却四時百物聖人除却動作行事則其道隱矣將何以為知天知聖之具儒者好高乃謂以動作言語求聖人為末過矣推此意也直欲枯禪白坐以見性乎世變有漸若寒暑然非寒而突暑暑而突寒也聖人拯變於未然在平其勢而已矣平其𫝑在理其人情而已矣故將怨者則徳之將渙者則萃之將昻者則抑之此聖人先㡬之神也悠悠坐視養亂焉耳矣天地之先元氣而已矣元氣之上無物故元氣為道之本薛文清云中庸言明善不言明性善即性也愚謂性道有善有不善故用明使皆善而無惡何用明為聖人又何用强為修道以立教哉自世之人觀之善者常一二不善者常千百行事合道者常一二不合者常千百昭昭雖勉於徳行而惰於冥冥者不可勝計猶頼讀書以維持之故謂人心皆善者非聖人大觀真實之論也聖賢之所以為知者不過思慮見聞之會而已世之儒者乃曰思慮見聞為有知不足為知之至别出徳性之知為無知以為大知嗟乎其禪乎不思甚矣殊不知思與見聞必由於吾心之神此内外相須之自然也嬰兒在胞中自能飲食出胞時便能視聽此天性之知神化之不容已者自餘因習而知因悟而知因過而知因疑而知皆人道之知也父母兄弟之親亦積習稔熟然耳何以故使父母生之孩提而乞諸他人養之長而惟知所養者為親耳塗而遇諸父母視之則常人焉耳此可謂天性之知乎由父子之親觀之則凡萬物萬事之知皆因習因悟因過因疑而然人也非天也近儒好髙之論别出徳性之知以為知之至而卑學問思辨之知為不足而不至聖人雖生知惟性善達道二者而已其因習因悟因過因疑之知與人大同況禮樂名物古今事變必待學而後知者哉博麄而約精博無定而約執其要博有過不及而約適中也此為學心法世儒乃曰在約而不在博嗟乎博惡乎雜者斯可矣約不自博而出則單寡而不能以折中執一而不能以時措其不逺於聖者幾希性生於氣萬物皆然宋儒只為强成孟子性善之說故離氣而論性使性之實不明於後世明道曰性即氣氣即性生之謂也又曰論性不論氣不備論氣不論性不明二之便不是又曰惡亦不可不謂之性此三言者於性極為明盡後之學者梏於朱子本然氣質二性之説而不致思悲哉諸儒於體魄魂氣皆云兩物又謂魄附於體魂附於氣此即氣外有神氣外有性之説殊不然體魄魂氣一貫之道也體之靈為魄氣之靈為魂有體即有魄有氣即有魂非氣體之外别有魂魄來附之也氣在則生而有神故體之魄亦靈氣散則神去體雖在而魄亦不靈矣是神氣者又體魄之主豈非一貫之道乎知魂魄之道則神與性可知矣格物之訓程朱皆訓至字程子則曰格物而至於物此重叠不成文義朱子則曰窮至事物之理是至字上又添出一窮字聖人之言直截決不如此不如訓以正字直截明當義亦疏通天之氣有善有惡觀四時風雲霾霧霜雹之會與夫寒暑毒癘瘴疫之偏可覩矣况人之生本於父母精血之湊與天地之氣又隔一層世儒曰人禀天氣故有善而無惡近於不知本始老莊謂道生天地宋儒謂天地之先只有此理此乃改易面目立論耳與老莊之㫖何殊愚謂天地未生只有元氣元氣具則造化人物之道理即此而在故元氣之上無物無道無理易雖有數聖人不論數而論理要諸盡人事耳故曰得其義則象數在其中自邵子以數論天地人物之變棄人為而尚定命以故後學論數紛紜廢置人事别為異端害道甚矣靜寂而未感也動感而遂通也皆性之體也聖人養靜以虛故中心無物聖人慎動以直故順理而應此皆性學之不得已者後儒獨言主靜以立本而略於慎動遂使克已復禮之學不行而後生小子以靜為性真動為性妄流於禪靜空虛矣人之生也使無聖人修道之教君子變質之學而惟循其性焉則禮樂之節無聞倫義之宜罔知雖禀上智之資亦寡陋而無能矣況其下者乎文中子曰性者五常之本蓋性一也因感而動為五是五常皆性為之也若曰性即是理則無感無動無應一死局耳文中子之見為優荀悦曰情意心志皆性動之别名言動則性有機發之義若曰理安能動乎或謂氣有變道一而不變是道自道氣自氣岐然二物非一貫之妙也道莫大於天地之化日月星辰有薄食彗孛雷霆風雨有震撃飄忽山川海瀆有崩虧竭溢草木昆蟲有榮枯生化羣然變而不常矣况人事之盛衰得喪杳無定端乃謂道一而不變得乎氣有常有不常則道有變有不變一而不變不足以該之也孟子之言性善乃性之正者也而不正之性未嘗不在其言口目耳鼻四肢之欲性也有命焉君子不謂性也豈非不正之性乎是性之善與不善人皆具之矣宋儒乃直以性善立論而遺其所謂不正者豈非惑乎朱子答蔡季通云人之有生性與氣合而已即其已合而析言之則性主於理而無形氣主於形而有質即此數言猶是二之也夫人具形氣而後性出焉今曰性與氣合是性别是一物不從氣出有生之後相來附合耳此理然乎人有生氣則性存無生氣則性滅不可離而論者也如耳之能聽目之能視心之能思皆耳目心之固有者無耳目心則視聽與思尚能存乎聖人之性亦自形氣而出但以聖人之形氣純粹故其性無不善衆人形氣駁雜故其性多不善耳人生而靜天之性也感於物而動性之欲也此非聖人語靜屬天性動亦天性但常人之性動以物者多不能盡皆天耳性者合内外而一之道也動以天理者靜必有理以主之動以人欲者靜必有欲以基之靜為天性而動即逐於人欲是内外心迹不相合一矣佛氏教人任持自性持自性者執自己之本性也言一切衆生皆有本覺謂本性之靈覺處雖流轉六道受種種身而此覺性不曾失滅故以此為真性儒者不達性氣一貫之道無不浸浸然入於其中朱子謂本然之性超乎形氣之外其實自佛氏本性靈覺而來謂非依傍異端得乎大抵性生氣離而二之必不可得佛氏養修真氣雖離形而不散故其性亦離形而不滅以有氣即有性耳佛氏既不達此儒者遂以性氣分而為二誤後世之學甚矣慎言有形亦是氣無形亦是氣道寓其中矣有形生氣也無形元氣也元氣無息故道亦無息是故無形者道之柢也有形者道之顯也天内外皆氣地中亦氣物虛實皆氣通極上下造化之實體也是故虛受乎氣非能生氣也理載於氣非能始氣也世儒謂理能生氣即老氏道生天地矣謂理可離氣而論是形性不相待而立即佛氏以山河大地為病而别有所謂真性矣可乎不可子萬物巨細柔剛各異其材聲色臭味各殊其性閲千古而不變者氣種之有定也人不肖其父則肖其母數世之後必有與祖同其體貎者氣種之復其本也横渠理氣辨張子曰太虛不能無氣氣不能不聚而為萬物萬物不能不散而為太虚循是出入皆不得已而然也氣之為物散入無形適得吾體聚而有象不失吾常聚亦吾體散亦吾體知死之不亡者可與言性矣横渠此論闡造化之祕明人性之源開示後學之功大矣而朱子獨不以為然乃論而非之今請辯其惑朱子曰性者理而已矣不可以聚散言其聚而生散而死者氣而已矣所謂精神魂魄有知有覺者皆氣所為也故聚則有散則無若理則初不為聚散而有無也由是言之則性與氣原是二物氣雖有存亡而性之在氣外者卓然自立不以氣之聚散而為存亡也嗟乎其不然也甚矣且夫仁義禮智儒者之所謂性也自今論之如出於心之愛為仁出於心之宜為義出於心之敬為禮出於心之知為智皆人之知覺運動為之而後成也茍無人焉則無心矣無心則仁義禮智出於何所乎故有生則有性可言無生則性滅矣安得取而言之是性之有無縁於氣之聚散若曰超然於形氣之外不以聚散而為有無即佛氏所謂四大之外别有真性矣豈非謬幽之論乎此不待智者而後知也精神魂魄氣也人之生也仁義禮智性也生之理也知覺運動靈也性之才也三物者一貫之道也故論性也不可以離氣論氣也不得以遺性此仲尼相近習逺之大㫖也又曰氣之已散者既散而無有矣其根於理而日生者則固浩然而無窮吁此言也窺測造化之不盡者矣何以言之氣游於虛者也理生於氣者也氣雖有散仍在兩間不能滅也故曰萬物不能不散而為太虛理根於氣不能獨存也故曰神與性皆氣所固有若曰氣根於理而生不知理是何物有何種子便能生氣不然不幾於談虛駕空之論乎今為之改曰氣之已散者既歸於太虛之體矣其氤氲相感而日生者則固浩然而無窮張子所謂死而不亡者如此造化之生息人性之有無又何以外於是而他求也哉性辨性之體何如王子曰靈而覺性之始也能而成性之終也皆人心主之形諸所見根諸所不可見者合内外而一之道也氣質之性本然之性何不同若是乎曰此儒者之大惑也吾惡能辯之雖然嘗試論之矣人有生斯有性可言無生則性滅矣惡乎取而言之故離氣言性則性無處所與虛同歸離性論氣則氣非生動與死同塗是性之與氣可以相有而不可相離之道也是故天下之性莫不於氣焉載之今夫性之盡善者莫有過於聖人也聖人之性皆此心虛靈所具而為七情所自發則聖人之性亦不離乎氣而已性至聖人而極聖人之性既不出乎氣質况餘人乎所謂超然形氣之外復有所謂本然之性者支離虛無之見與佛氏均也可乎哉敢問何謂人性皆善曰善固性也惡亦人心所出非有二本善者足以治世惡者足以亂世聖人懼世紀弛而民循其惡也乃取其性之足以治世者而定之曰仁義中正而立教焉使天下後世由是而行則為善畔於此則為惡出乎心而發乎情其道一而已矣荅薛君采論性書君采之談性也一惟主於伊川豈以先生之論盡合道妙皆當守而信之乎愚則反求吾心實有一二不可强同者故别加論列以求吾道之是伊川曰陰陽者氣也所以隂陽者道也未嘗即以理為氣嗟乎此大節之不合者也余嘗以為元氣之上無物有元氣即有元神有元神即能運行而為隂陽有隂陽則天地萬物之性理備矣非元氣之外又有物以主宰之也今曰所以隂陽者道也夫道也者空虛無著之名也何以能動静而為隂陽又曰氣化終古不忒必有主宰其間者不知所謂主宰者是何物事有形色耶有機軸耶抑緯書所云十二神人弄九耶不然幾於談虛駕空無著之論矣老子曰道生天地亦同此論皆過矣皆過矣又曰生之謂性程子取之蓋指氣禀而言耳其推本天命之性則卒歸於孟子性善之説嗟乎人有二性此宋儒之大惑也夫性生之理也明道先生亦有定性之㫖矣葢謂心性靜定而後能應事耳若只以理為性則謂之定理矣可乎哉余以為人物之性無非氣質所為者離氣言性則性無處所與虛同歸離性言氣則氣非生動與死同途是性與氣相資而有不得相離者也但主於氣質則性必有惡而孟子性善之説不通矣故又强出本然之性之論超乎形氣之外而不雜以傅會於性善之㫖使孔子之論反為下乗可乎哉不思性之善者莫有過於聖人而其性亦惟具於氣質之中但其氣之所禀清明淳粹與衆人異故其性之所成純善而無惡耳又何有所超出也哉聖人之性既不離乎氣質衆人可知矣氣有清濁粹駁則性安得無善惡之雜故曰惟上智與下愚不移是性也者乃氣之生理一本之道也信如諸儒之論則氣自為氣性自為性形性二本不相待而立矣韓子所謂今之言性者雜佛老而言者是也程子以性為理余思之累年不相契入故嘗以大易窮理盡性證性理之不可以為一孝經毁不滅性以見古人論性𩔖出於氣固不敢以已私意自别於先儒矣嘗試擬議言性不得離氣言善惡不得離道故曰性與道合則為善性與道乖則為惡性出乎氣而主乎氣道出於性而約乎性此余自以為的然之理也仲尼曰成性存存道義之門伊尹曰兹乃不義習與性成是善惡皆性為之矣古聖會通之見自是至理矣明儒學案卷五十
