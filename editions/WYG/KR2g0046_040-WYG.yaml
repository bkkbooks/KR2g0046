body:
  text: 明儒學案卷四十餘姚黄宗羲撰甘泉學案四主政唐一菴先生樞唐樞字惟中號一菴湖之歸安人嘉靖丙戍進士除刑部主事疏論李福逹罷歸講學著書垂四十年先生初舉於鄉入南雍師事甘泉其後慕陽明之學而不及見也故於甘泉之隨處體認天理陽明之致良知兩存而精究之卒標討真心三字為的夫曰真心者即虞廷之所謂道心也曰討者學問思辨行之功即虞廷之所謂精一也隨處體認天理其㫖該矣而學者或昧於反身尋討致良知其幾約矣而學者或失於直任靈明此討真心之言不得已而立茍明得真心在我不二不雜王湛兩家之學俱無弊矣然真心即良知也討即致也於王學尤近苐良知為自然之體從其自然者而致之則工夫在本體之後猶程子之以誠敬存之也真心蔽於物欲見聞之中從而討之則工夫在本體之先猶程子之識仁也陽明常教人於静中搜尋病根蓋為學者胸中有所藏躱而為此言以藥之欲令徹底掃浄然後可以致此良知云爾則討真心陽明已言之矣在先生不為創也禮元剰語天地從空中生故生而不有其生其為物不貳則其生物不測夫太虛者致一之道故曰不貳人亦從空中生非天地所生大哉乾元至哉坤元亦致一之道天地包褁其中空為萬靈聚所人氣質包褁空藏於心亦為萬靈聚所屈伸闔闢化機牽擾而其靈未嘗滅牽擾者生於有其生未嘗滅者乃乾元坤元太虛之真生有其生亦生於真生初無相别要之萬靈一真一事靈則萬事靈一也有致一之靈有只靈於一事以分合為真假以存逐為空塞空則不塞不塞則萬物皆備故盡萬物而無邊際則空落一念著一物則靈為一隅所覆是以牽擾之生即其所在雖未嘗不生而終死於其生乃非所以生生故曰非真生古謂無思無為不識不知即真生之無生又謂心之官則思思者聖功之本即真生之自然生無生者無逐物之生自然生者生虛空之生世人之思患在離虛而逐物迷中起悟則有轉向入身来感應之理外悦受而内止這止處乃成始成終元機命之流行而不已也此實不變真體故以不變者為主則隨應曲當諸假只是我一事孔子謂吾道一以貫之是一所貫滿不是一以貫萬理氣無彼此無異同無偏全總是太虛影子虛之極則能生故流行而為氣虛之極則不滯故靈通而為理不滯則所以為生生則得於有生所以為生立有生之機有生負終匱之化然有生之機即假終匱之化而見氣外别無情理處漢宋諸儒分理氣作二種不知性即理性亦即是氣故曰仁者人也形色天性也性中無五德五德所發見處都是性氣亦無二氣五氣只有元氣流行隨在變化這裡有所存主便謂之德各中時措之宜便有五者名目若在五者上覓性則非德矣天地有人如人腹内有心人為萬物之靈於理氣不容毫髪分别雖禽獸草木誰或出此氣各有偏塞理亦即此而在蓋理無定體可通處即是若必以能言能行衣冠禮樂為理即是泥於人相不曽推見至理茍泥於人相雖天地亦喚不得作全理風雨露雷山河大地俱不是神物若能超於人物相外則禽獸之生化草木之榮瘁何等聲名文物各擅通處若真論到極全大備天地之道人猶有所憾只有人者天地之心聖人成能知天地之化育中間純駁去處復有册頭可㨿㸃化有恃也浩浩太虛無有際住處中間靈通神妙徹宇徹宙亦不見從何處舉起向何處引著人氣質之凝似有住際然神通在心故其氣也無涯其有涯惟有生耳舎其有生而能自主其所為氣總是浩浩一物乗不間之體而尸本全之化初未嘗毫髪添助亦未嘗毫髪假借界隔塵根妄施好惡遂使靈氣墮於有涯而太虛真機時每流行而不息乃舎此而他求學問之功其荒矣哉性無有無空實幻從空化迷由無墮幻則隨處妄有迷則隨處滯實性者得於天之生理有無空實之境物而不神舎生而就死一隂一陽之謂道隂陽是氣道亦即是氣隂陽所以能繼乃善之所在這是命之流行然非命在於善隂陽所以各成乃性之所在這是心之流行然非心著於成性根為天地萬物之主天地萬物有變性根不變在人則寄含心中一竅是為心地此生天生地生人生物元機豈容著得些子纔著些子便是不能繼不能成的病根故以善惡體性即落意見以善惡觀心即落情欲情欲從性外覓心意見從命外覓性皆是縁物而起皆為有倚之學自生身以来通髓徹骨都是習心運用俗人有俗人之習學者有學者之習古今有世習四方有土習真與習化機成天作每向自己方便中窩頓凡日用覩記討論只培溉得此習中間有新得竒悟濶趨峻立總不脱此習上發基方且自認從學術起家誤矣本性各各具足只被信心擔閣一返即得一主即張一現前即意流千古一對境即智周萬物若不返不主一任觀察天地博通今古口中厯厯意中了了總是傀儡在塲上迷中忽悟此意算得如此容易亦被如此錯過則到這裡不覺甘心捨放矣三一測陽明勝則德性用隂濁勝則物欲行陽之為明也隂之為濁也未始異為兩物其以互見而察之者也顧其勝不勝以别物欲德性從此則名此從彼則名彼或得乎全或據其偏之不同耳坤之先迷迷於陽也是以謂之隂乾之知始始乎隂也是以謂之陽惟其迷則一切皆迷其後之所得得其所就之偏而已惟其知則一切皆知雖未嘗無所被寓莫非全體之為用也故轉識成智在致其思焉思之思之鬼神将通之隂識七情陽也注而縁物陽自外流而内隂滯矣雲行雨施春舒夏假陽注而其虛不損太虛者無所有無所有則無所雜故不損此以逐彼有縁之情敝於無本所謂無本敝於其本之有物聖門立方不治病治受病之源君子之過如日月之食人見人仰猶天之恒燠恒寒陽九百六立見不逺之復不變乎其本則然耳不然天下之情如水能塞其委流不能保汩汩乎源之不已也七情乾道變化各正性命以其偏者付物而物束於命物無立命之性性無致命之才氣無造命之具人則異是雖緼搆滓駁愚能明柔能强故氣不歉於自立其大敝焉於習乃資其明用為姦資其強用為暴蓋不善用性也物氣偏氣非虛不生命非氣不行性非命不始虛非性不終天者虛之所在而命之所出也太虛不得不生氣有無相入空實相含於是盪冲漠而滋消息其為物無妄則其生生也不匱故氣與命一物也氣不二於命又何性之二耶横渠曰合虛與氣有性之名辭雖析意實相銜不得已之言也善反之則天地之性存反之云者復其初也能為反者氣之終不能勝者也不能勝者氣之自具其美不澌滅也明道曰二之則不是所謂論不論亦不得已之言也伊川曰形易則性易性非易也氣使之然也濓溪性剛柔善惡中謂至其中為性真若五性雜感則善惡分也夫氣質之性之説發於四先正然而其指有在非致疑性善孔子以性為相近子思子三知三行得四先正所同然其近也非所以為兼也兼則二之矣其三也畢可以歸一也不能歸則二之矣性無不善合古今而同之有所病於氣而氣負能反之具則近之者於善之中相近未全墮於惡也有所别於今而氣負能進之機則三之者乃追責其本未便定其品也蓋論性而及氣質推其用之所至自其感物之動而追原本始性固未嘗敝也故勇不决於力者非才之罪也辨不定於志者非明之短也德不長於事者非理之衰也性一真談真心圖説云外一圈元氣之謂也次中一圈人身之謂也最中一圈人心之謂也元氣即太極也可見者為天地人受天地之中以生而心具中理天地無不包故居外萬物各得其偏惟至真至精者為人故居天地之正中維皇降衷無少偏倚退藏於宻心之為心也故居最中夫中無所著無所著則虛虛而生靈靈能通天地包萬物心該天地是故人為萬物貴得天地之中也人為萬物靈心具天地之中也人即天天即心心無弗有無弗能宰制萬物放諸四海而準與天地參不容偽者也著一物為塞為偏為私為軀殻之身是謂失其真心真心是人實有之心實有之心乃天地生人之根柢亘古今不變不著一物是謂中者天下大本人孰無心只因隨情逐物生心非天地大中之本心不得為事物之主必尋討精詳辨其真而用之不幇補外求亦不索之元妙無影自然舉念天則擬議以成變化其怠緩於過錯假為真便一齊倒塌醉生夢死此討之之功所以不可廢也今三尺童子知事由心作小生初學知道自心傳則認心不真縱而不檢者以為隨俗任情不礙立身自昧其神明之靈䙝天違天淺識者以見聞所習信而為當然執以運用戾人罔人不力考而深思之何以迸出原生本體天之生人原是無所不知無所不能人之為心亦是不學而知不慮而能其所為知所為能又却停停當當増不得一些徹古徹今隨愚隨聖無二道無兩心私欲起知能為物念所蔽於是昏明強弱低昂淺深雜出然原生之知能與既壊之知能總是一知一能原生者全體定而正用由此而發既壊者偏於所便安而用不得其正全體定是謂良知良能偏於所便安是謂識神小有才識神與良知小有才與良能茍不自為主深加精别則妄與真混不有命則無以主其生不有氣則無以為生其為生心也而主之者其真心也於其生而思所以主之者是討也心無兩心立乎其心之大耳目口鼻四肢百骸從其所令則為真心以耳目口鼻四肢百骸之所被以生心則心非其心矣宇宙真光景自古流傳迄今風日雨雷山川草木今猶古也文物聲名衣冠居處今猶古也只一念朕兆乍呈乍滅歘作歘改而不著不察乃其病根故有初發念本是真機外感乗之而變竟迷故歩以至愈感愈離忘其所起亦有隨常應變原無關轄而中靈偶啓秉彛勃然肇不知其所因冺不知其所尼事非降心内非襲外其必賦畀有係於天而梏蔽亦别於人故也天理不架漏過時人心豈牽補度日能一致留神則㸃而化在當下為之者已真心即是良知良知是活機活機性之欲也惟陽能活惟隂能機陽者虛之流行而不滯隂者物之關轄而成運合而發之是為天靈妄以為動謂之變詐此處毫釐千里學者不致辨其間總非活潑真體所以一動便渉私利善學者須懲根器所限又念末俗頽習加心於貨利之交嚴决取􅃕這關隘一透然後隨所舉動容易措手足云命從愛生愛因欲有此亦就所生所化而言正是機之關轄而成運者若追求天命原始則生生化化流行不滯之妙只在真實一念上辨别此一念倘轉動不来永被穢濁牽縛及至生盡化還方信無益其真心一也曷言乎真之與假也心得其心之體為真有所因而動則受病而為假體病則用必不當然而從其中以令五官百骸其為心則未始不為心也醫家十二經其一則心包絡又名心主經少隂為真心經心包絡乃真心之别脈不與真心同經真心為君火心主為相火二者其脈雖殊均為之心君火為火之全體相火一時用事之火一時用事雖未嘗離體而有顧未盡其體耳真心不病病者心包絡與三焦相表裏三焦氣之父心包血之母君火不能自盈之神明之舎凝命而立則三焦之運如度而心包善輔否則火不炎則鬰病由以生此賔主之義而養生繕性當各圖其本也或謂性本至虛執心而以討為務不幾於雜乎曰性立天下之有其有也以其無所著也故謂之虛易有太極書建其有極詩有物有則莫不有歸的故初學至聖人皆不可忘學或又謂道妙萬物泥討而盤桓於心不幾於廢乎曰萬物皆備於我以方寸管攝物理約而精之其道光明不能外也或又謂德以自然為宗庸心以為討不幾於擾乎曰討者天功也非有加於人力必因天機之動而别其敝於人者不盡人聰明則天聰明莫能全察其幾已矣景行館論性無本然氣質之别天地之性即在形而後有之中天之所賦元是純粹至善氣質有清濁純駁不同其清與純本然不壊雖濁者駁者而清純之體未嘗全變其未全變處便是本性存焉此是能善反的丹頭論性凡人一言一行外面可見之迹都是糟粕彼我相通之機只在㝠㝠中不可得見這㸃意思今人只怪人不應我正不是反已之學直做到與物大同七尺之軀與千人萬人打做得一片纔是心體逼真處一有礙置便是工夫未了當也論感功夫就是本體不容添得一些尋見本體不走作纔是真功夫若以去人欲做存天理工夫便如捕賊保家所謂克己復禮惟其禮故已克所謂閑邪存誠惟其誠故邪閑故存天理是去人欲的下手處荀卿性惡之説不曽教人從惡只要人反轉克治這便矯枉過正不在本體上做工夫却從外邊討取不自信将誰以為據乎論工夫陽明先生教致良知學者昧於致之之義妄詆良知不足倚靠錯認工夫為太容易殊不知人人自知乃實有的心雖被外面見聞牽引實有的心常在這裡這便是良知即此真察而真行之便是致若謂人無實有的心則非所以為人若謂實有的心不足用便是獵等妄想若謂實有的心棄而不用是不尋討之罪也論教聖人有心法無事法人見聖人亦曽指一事褒貶遂不免加情於人所見之地便泥著格套要知聖人先得其心然後因其麄而論之故能脱然毁譽境外纔可馳驟世途雖波濤擾攘中常得透出頭来有本故也論應事易不外象占聖人因人事幾之動而象其理象乃吾心中之象占是心占之擬議以成其變化作易者無中立有學易者動裡索静畫以立之占以索之論易詩之為經聖人專形容人本等性情學詩之法當想像詩人情性何等氣象務得其天生之本然論詩春秋是非之書不是賞罸之書聖人不專意褒貶人欲直指人心是非之實以詔於世恐懸空話頭人不解悟故借魯史所載發明某是某非則天理之正人心之安綱常倫理於是取衷非則人欲之私人之所惡綱常倫理於是滅絶聖學王猷皆不外衆人能知能行之本在察其真而已論春秋禮不取儀禮周禮為經而以禮記者何經主發明義禮禮記是推出所以為禮之意論禮書亦是各代故實其以為經乃二帝三皇順時為治精要處其規模之大節目之詳整然包括宇宙氣象法在則道在論書天之生人萬理畢備故萬化從出足周所用有耳可聞有目可視有口可言有手可持有足可行豈有不能自養之理只被人自墮落無所用心五官四肢失其職業乃歸咎天命不知此命自我心中渙汗論養雜著崔後渠曰道一不可以二求意有不可以無求理之極不可以形氣求曰至一不二真有歸無極理不外氣翁謂圓徹靈覺神明居之則雖欲二而有所不能岐也翁謂康欽齋作赫赫穆穆同體則意意不落意乃其為未嘗有也翁謂能通者神所通者理隂陽不測之謂神神理曽有異義乎渠曰虛之所包無窮形之所納有限道與性與理生於虛心與精與神生於形胡為乎弗異之曰圜中竅外而為心以其虛也虛而生神生精圓徹靈明之所具乎謂其方盈寸取其所涵不即其血肉故心無心心之所以為心命於性性無性性之所以為性現於心心命於性則清通而為神機不容以自滯性現於心則密察而為精理不能以自昧背性而馳心暴氣之徒也以是小其心可乎楊子折衷序天地間只一氣氣得其平之謂虛平昭其序之謂理理當其施之謂道能主其施之謂心能發其昭之謂性五者皆天也明州與王同野談人之所以為人主之以心而本之於性故性是心之所以為心性之本體自然而無聲無臭者天也性之生生而不容自己者道也故自性也無所有而立天下之有惟無所有是為無極之真視不見聴不聞廓然寂然故曰太虛惟立天下之有是謂本然之則絪緼屈伸摩盪兼制日運而不滯故曰氣化温縣講章天者性之本道者性之體心者性之郛廓天命之謂性言其本也率性之謂道言其體也修道而戒懼慎獨言其守郛廓之功也同上謂良知有聖愚古今固不敢謂良知下手即了手亦不敢問有幇補不曰無幇補有造就無作為有體認不惟自信以致之又須好學以致之蓋良知只是個丹頭真須㸃化始得紀客談一菴語録性者萬物之一源求盡人物之性纔是盡已性之實問知行何以合一曰主宰處是知發用處是行知即乾知大始行即坤作成物未有離乾以為坤亦未有離坤以為乾者獨陽舎坤是落空想像孤隂舎乾則不知而作皆非真乾真坤故以考索記問為知者遂為知先而行後其知非允廸之明以襲取强為為行者遂謂行實而知虛其行非由衷而出兩者如形影除一個不得儒者之學只在感應能将心性感處研窮事理的當以應之是為用世後世學問多端不向事物上馳逐遂其利欲之私即落枯寂以求心性却将天地生生之機滅減分數良知一拈萬到本末具舉致之之功所宜勉力知最活凝於德則為真知逐於物則為識神故工夫在於止齊治平乃修身之所在心則身之主宰然心太虛不能施力則感應處可以表見是為意這感應從何来心虛則生靈曰知有物一觸其靈畢照於是因其物感以此靈照而應之則格致之功盡感應實得其理而主宰者是正矣悟與見毫釐千里悟從全體上呈露見却透得一路即此一路已謂通髓徹骨但非寂然本體與觀㑹大法所以不能遂通不能行其典禮推原病根畢竟是心不虛認得虛為悟體乃不落揣摩又或於悟起病以儱侗標認大意於條理處不照顧終墮潦草并無見解之用故悟亦靠不得學然後知不足是認虛之學方可得真悟問理一分殊曰一是理真真是一條路無雜二三所以分定不得不殊豈容假借増損若以私智穿鑿不立純體便厚薄髙下大小倒置隨在不停當有謂理雖一而分實殊者專重分上将何處作把柄去殊得有謂理則一分則殊者是兩重臨境當感如何互相下手有謂分雖殊而理惟一者專重理上或墮儱侗虛見聖人心體純粹至善所以其幾之動隨處以時出之盖形見處是分殊主宰處是理一兩者當時同有問合著本體方是工夫做得工夫方識本體如何曰兩言亦須善體天生人心性有善無惡乃其大槩中間見在分量器局又各各不同能進而求之日新深造所以本等體段原無一物可見只從實踐徹悟處便是若不用功本體即不呈露若踐不實悟不徹雖有浪講虛解本然之體亦漫乎無具故即人工夫所在這些纔可名本體這些豈得先有本體将工夫去合又先有工夫復去見著一個本體問不忍不為逹之所忍所為何如逹曰學者實落下手若待推而逹之不幾於勞擾而綴憑之乎善學之法須直截發動真機就事運誠隨事正感豈可因我明處豫先作念推到不明上或因不明處追考原初明的来作様子此是孟子指㸃人身真機處處完具只被私欲間隔有能有不能若能處處不為私欲間隔如明處作為無有不能為者非謂必待比擬推廣然後可能倭患亟會城集議先生曰今日所以乆無成功者只少一段事衆問云何曰只有不殺倭子的心便可萬全衆笑其迂曰此却是實理人生作事直須從造化算来今日種種設計都是無頭勾當初啓釁端原因國家德脈不貫通迄今出戰亦須潔浄打疊心地一片不忍生民之意以為取勝根基纔不破綻若惟以殺為事乃是倚靠宇宙間戾氣縱一時得勝亦非仁義之師况不可必乎即如天之雷霆豈脱了大造生生做出来先生之姪欲為賈困於無資先生令其訪衆賈能自具本者幾何姪復命曰十無二三先生曰富者藉人以為賈其求賈也甚於賈者之求資也而賈者每不稱富者之求以無信也子不必憂資憂不能信耳凡人日用云為未必無知做出来只是習熟見聞之知非德性之知畢竟為不知而作從早至晚如作揖喫飯著衣七八都由罔昧舉動若真真肚子裡陶鑄無幾及干渉重務雖或經心一番却又從聞見之知上打發将平昔與友朋深考力辨的放在一邊如此學問雖萬千也無用道理平平妥妥可知可行至簡至易中庸其至矣乎只是日用常行中而庸者便為極至道理人却不肯知不肯行看做天来大海様深的殊不知這個天則昭然自在乃因驕性起便飛揚而上吝心起便卑墮而下躁心起便縱放而前怠心起便廓落而後侵心起便攘攘而右怯心起便委順而左竒心起便索隐行怪巧心起便機械變詐所以中庸不可能若種種心俱冺即是平平妥妥的即是察乎天地耳目口鼻四肢為形視聴言動持行為氣聰明睿知恭重為神所以運聰明睿知恭重為魂所以定視聴言動持行為魄魂屬陽魄屬隂孤隂易敝有陽魂以載隂魄然後能勝於用常人只是魄来載魂非魂之載魄也道理難以名状不得已而強名曰太極然而未嘗言理為太極也亦未嘗言道為太極也則所謂太極者果何物哉即兩儀四象男女事物之𩔖之謂也真至之理皆著見於日用之間惟在人自悟人之所以能悟者其最靈之為恃乎以下太極枝辭氣只有一氣陽氣是也陽息為隂故隂者陽之所不足也女者男之所不足也惡者善之所不足也惡亞心也謂之失其本心造化凝締之機所以流行宇宙者五行實無後先多寡之異其各附之以五而後其資始全五非土也即指五行而言之也謂雖分定而不離乎本體也總非截然有此位次皆借是數以明其意耳太極生生之機無一息不流行無一息不停止流行者造化發育之妙停止者實體常住之真流行而不止息是動而無静止息而不流行是静而無動動静一時俱有合而言之也問幾為聖人所有如何又有惡幾曰惡豈有幾如弩然機發便其直如矢自然旁行不得又問如何為幾分善惡曰此對誠無為而言謂幾分善惡蓋有善而無惡也以下宋學商求易一隂一陽之謂道兩一字以言乎等均者也時陽而陽之時隂而隂之不失其太虛之本則道之所在也愆陽伏隂横於流行而無所主得為道耶不愆不伏不横於流行則為時陽時隂隂陽時則和而無戾是横渠之所謂道也故氣得其正之謂道不必氣外别尋道道所運化之為氣不必道上更生氣問陳龍川論漢唐之治如何曰此是論道體逝者如斯夫意思渠謂天下大物不是本領宏大開廣却擔當不去蓋雖智力欺假一時亦不旋踵而定豈能勉強得三四百年来這誠有協於人心可包裹許多品彚處纔能安於自享中間偏全純駁髙下淺深即在三代其遞世傳業猶有不能盡齊者若謂架漏牽補度時日豈惟漢祖唐宗縱到嬴隋操莽固未嘗澌滅龍川不是論人品亦不是論治道乃直指化機流行大塊滿眼皆本相呈露惟其知之便能體惟其體之便是道至其出入大小生熟以分人品賢愚而别治道隆汚則三代漢唐不待智者而後以為異同也侍郎蔡白石先生汝楠蔡汝楠字子木號白石西浙之德清人八歲侍父聽講於甘泉座下輒有解悟年十八舉進士授行人轉南京刑部員外郎守歸德衡州厯江西叅政山東按察使江西布政使陞右副都御史廵撫河南召為戎政兵部侍郎改南京工部卒官先生初汎濫於詞章所至與友朋登臨唱和為樂衡州始與諸生窮經於石鼓書院而趙大洲来遊又為之開拓其識見江西以後親証之東廓念菴於是平生所授於甘泉隨處體認天理之學始有著落蓋先生師則甘泉而友則皆陽明之門下也端居寤言舉天下講理講學俱不甚謬聖人並無以異人只到實體之際便生出支節有可講者即如敬為聖學之要内史過亦知敬是德之輿若道如何是敬便有宻宻工夫一日之中是敬不是敬感應之際有将迎無将迎都不知覺則只原是認得光影未曽知得真切聖賢終身學問只是知之真體之宻耳從頭學聖人之志道則問禮問官不妨漸學從頭便學問禮問官恐搜索講求别成伎倆貌言視聽思天之所以與人者恭從明聰睿人之所以體天者若必以為根塵則天何為與此垢累以戚人心乎象山先生曰儒者經世釋者出世公私之辨也言者人之發聲行者人之應迹聲從何處發迹從何處應知得去處下得擬議工夫方能成得變化知誘物化之後又騖於口耳光影之學承虛接響的然日亡亦是斧斤伐之牛羊又從而牧之纔於人所不見處収攝凝定忽然不及湊泊不倚記誦天理是爾呈露便是日夜生息雨露滋順也今人於事變順逆亦每每委之天命只是朦朧不明知不分曉強将此言聊自支撑其中實自搖惑聖人知命直是洞徹源頭賢人却知有義便於命上自能分曉都不是影響説命也或疑程子取谷神不死之語予舉張横渠曰太虛無動搖故為至實然則儒老之辨曰其言雖合其發言之意則殊老氏從自已軀殻中發此意儒者從天地太虛中發此意孟子辨告子闢楊墨卑管晏斥鄉愿只因孟子見聖賢一端的確分明故灼然知異於聖賢之學今聖賢一端正未理㑹却㨿前賢見成言語附和末響不如且尋求自已做聖賢一端之正此一端既精異端自不能雜復何難闢之有學問各有一處老氏一此謙柔心佛氏一此空寂心楊氏一此為我心墨氏一此兼愛心彭籛一此養生心只是不明乎善不知所止做入他岐而為二三天地以生物為心而不能必物之成花之千葉者不實其最先發者早萎亦天地自然之力量也老子退一著亦識得如此但質之聖學知天地之化與時消息而無容心其間則老子毫釐千里之謬矣故知天理者能善用易不獨老子有合於易叅同隂符時契造化之機其用處便私已程子曰雖公天下之理以私心為之便是私問比物聨𩔖之學或有不得而湊泊者則如之何曰正不欲其聯比湊泊也天髙地下萬物散殊散殊之中必欲聨比湊泊是雕刻之化矣只流而不息合同而化是謂大同聖人千言萬語天地千變萬化異者必不盡同只要知同歸一致之處聖賢地位非可想像只聖賢事合下做得洒掃應對可精義入神文章功名聞見知解皆足羈縻豪傑故銷市井富貴之習心易銷文章功名之習心難銷文章功名之習心易銷聞見知解之習心難聖人精進凡物不能羈絆只是能放下一切好地位都住不得也老氏以物為外故有芻狗之喻聖人合内外以成仁本無憧憧之心實有肫肫之仁何嘗如此荘子将感應為託不得已以養自然豈若将感應為自不能已而任自然故老荘以為自然者聖人謂之矯強方今人良知天理之學似説得太易故人往往作口耳知解全無實得聖人發蒙在亨行時中要之良知天理可亨之道也必須童䝉求我初筮方告謂之時中不然非惟無益於人抑且有乖於道程子曰坐忘便是坐馳所以坐馳者因荘生不知學問其言本出於老子杳冥怳忽之意所謂心齋乃齋其蕩然無主之心非明善之誠知止之定坐而入忘蓋茫然而不自知耳五福六極氣之不齊也隂陽變化其機莫測聖人之心真知隂陽消長之故謂之知命命不離乎氣也胡五峯曰居敬所以精義朱子晚年深取其言可見朱子居敬窮理之説未嘗分為二也孔門以主敬為求仁五峯又以居敬為精義要之一敬立而四德備矣象山先生毎令學者戒勝心最切病痛鵞湖之辨勝心又不知不覺發見出来後乃每歎鵞湖之失因思天下學者種種病痛各各自明只從知見得及工夫未懇到處罅縫中不知不覺而發平居既自知發後又能悔何故正當其時忽然發露若用功懇到雖未渾化念頭動處自如紅爐㸃雪象山勝心之戒及發而復悔學者俱宜細看庶有得力工夫蓋象山當時想亦如此用功也古人聲律非止發之詠歌被之管絃虛明之體合乎元聲凡言皆中律言也六經之言雝雝鏘鏘諸子百家則沾滯散亂之音作矣故孟子知言非知言也知心聲也問樂者心之本體恐懼悲哀相妨累否曰樂者非踴躍歡喜之謂無不樂之謂也肫肫皜皜為懼為哀皆真機也初非一朝之患加得分毫何妨累之有若以物欲之憂為憂威武之懼為懼及當懼當憂凝滯留著則不特哀懼妨累而肆樂沉湎流而不節亦甚悖馳君子之樂矣安土敦仁中心安仁也故感發處無非愛人退之博愛謂仁止道其用古人舉先民詢於芻蕘蓋天下只有一個是更不可増有一個是便有一個非消滅不得芻蕘之言是聖人從而是之聖人之言非朦瞽庶人得而非之若一有勝心則不特芻蕘必増聖人已是之言一有狥心則不特聖人必狥偏智一隅之見自此本然是非之度幾於凌夷而學問家因之多事矣謝上蔡以覺言仁未為不是朱子病其説又言敬則自能覺愚意敬即覺也但敬覺工夫最精上蔡言儒之仁佛之覺則非人性全而物性偏人心智無涯故反危殆物心智有限故反近自然人要持危而入於自然只在存之而已本體常存私制無自而生私智不生便不害性不害性是養性也神發智智之鑿處為知誘人生而静不容説正感發時常覺得便是主静路上工夫天德天道天道無期必期必便是計功謀利尹和靖曰如潦則止如霽則行何期必之有明儒學案卷四十
