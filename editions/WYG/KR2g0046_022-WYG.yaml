body:
  text: 明儒學案卷二十二餘姚黃宗義撰江右相傳學案七臬長胡廬山先生直胡直字正甫號廬山吉之泰和人嘉靖丙辰進士初授比部主事出為湖廣僉事領湖北道晉四川㕘議尋以副使督其學政請告歸詔起湖廣督學移廣西㕘政廣東按察使疏乞終養起福建按察使萬厯乙酉五月卒官年六十九先生少駘蕩好攻古文詞年二十六始從歐陽文莊問學即語以道藝之辨先生疾惡甚嚴文莊曰人孰不好惡人胡以能好能惡歸之仁者蓋不得其本心則好惡反為所累一切忿忿不平是先已失仁體而堕於惡矣先生聞之憮然汗背年三十復從學羅文恭文恭教以靜坐及其入蜀文恭謂之曰正甫所言者見也非實也自朝至暮不漫不執無一刻之暇而時時覿體是之謂實知有餘而行不足常若有歉於中而絲毫不盡是之謂見歸蜀以後先生之淺深文恭不及見矣先生著書專明學的大意以理在心不在天地萬物疏通文成之㫖夫所謂理者氣之流行而不失其則者也太虛中無處非氣則亦無處非理孟子言萬物皆備於我言我與天地萬物一氣流通無有礙隔故人心之理即天地萬物之理非二也若有我之私未去堕落形骸則不能備萬物矣不能備萬物而徒向萬物求理與我了無干涉故曰理在心不在天地萬物非謂天地萬物竟無理也先生謂吾心者所以造天地萬物者也匪是則黝沒荒忽而天地萬物熄矣故鳶之飛魚之躍雖曰無心然不過為形氣駈之使然非鳶魚能一一循乎道也此與文成一氣相通之㫖不能相似矣先生之㫖旣與釋氏所稱三界惟心山河大地為妙明心中物不遠其言與釋氏異者釋氏雖知天地萬物不外乎心而主在出世故其學止於明心明則雖照乎天地萬物而終歸於無有吾儒主在經世故其學盡心盡心則能察乎天地萬物而常處之有只在盡心與不盡心之分羲則以為不然釋氏正認理在天地萬物非吾之所得有故以理為障而去之其謂山河大地為心者不見有山河大地山河大地無礙於其所為空則山河大地為妙明心中物矣故世儒之求理與釋氏之不求理學術雖殊其視理在天地萬物則一也胡子衡齊理問旣曰在物為理又曰處物為義謂義非理也可乎旣曰在物為理又曰性即理也謂性為在物可乎理之説曷始乎詩曰我疆我理釋者曰理定其溝塗也謂人定之也非謂溝塗自定也然則謂理在溝塗可乎書曰燮理陰陽釋者曰燮理和調之也謂人調之也非謂陰陽之自調也然則謂理在陰陽可乎夫子贊易曰黃中通理言至正至中而理通焉未聞中正之在物也曰易簡而天下之理得言易知簡能而理得焉未聞知能之在物也曰聖人作易將以順性命之理夫子固明言性命之理而世必以為在物何哉虛實世儒以萬理為實天地實天地萬物實萬物君臣父子皆然唯其實而後天下不以幻視若惟求理於心則將幻天地萬物於無何有矣又何有於父子君臣哉胡子曰夫萬物之實豈端在物哉其謂實理即實心是也孟子曰萬物皆備於我即繼之曰反身而誠樂莫大焉若實理皆在於物則萬物奚與於我又奚能反身以求誠哉何則人心惟誠則其視天地也實天地視萬物也實萬物父子之親君臣之義不可解於心者皆實理也若人心一偽彼且視父子君臣浮浮然也烏覩父子君臣之為實理哉彼其視天地萬物夢夢然也烏覩天地萬物之為實理哉故曰不誠無物者此也世儒自幻視其本實之心而反瞿瞿焉索物以求理認外以為實所謂以幻求幻其幻不可究竟矣天人程叔子言聖人本天釋氏本心本天者以為道之大原出於天故天叙天秩天命天討天工天官咸自天定之非人心所得增損者也聖人本之故其求諸物理者將求出於天者以為定也而人心之私不與焉彼釋氏三界惟心山河大地皆妙明心中物是獨以心法起滅乎天地視三界山河大地不足為有無非本心者之誤歟胡子曰當皇降之衷天命之性固已在人心久矣聖人本天舍人心又孰為本哉非心之外别有天也茍一私意奸於其間雖自悍夫行之必有厭然而不中慊雖自愚夫當之必有咈然而不中甘彼悍夫愚夫豈嘗考物理哉則心天者為之也審如叔子之言則天之生物莫不有理而人心獨無理乎凡本心者即有釋氏之失則此心固為人之大祟乎所謂皇極帝則明命天理皆當刳心剔性别有一物以索諸棼棼芸芸而後為得也孟子謂仁義禮智根心愛親敬長為良知皆非也夫茍不能自信其心為天索諸棼棼芸芸以求之吾見其劈積磔裂膠固紛披不勝推測不勝安排窮搜愈精比擬愈似而天者愈離吾未見其能本也心性曰先儒以為心者止於知覺而知覺所具之理為性故其言曰能覺者心所覺者理覺虛而理實心虛而性實心性雖不可離尤不可混曰以知覺為心以實理為性固可謂之不混矣然以理為在物則性亦當為在物是性雖不與心混而不免與物淆矣其可通乎曰先儒有言性者心之理又曰心統性情則未嘗不以性具於心者也獨未認知覺為性耳曰若是則先儒之語理與性也一以為在物一以為在心是在物在心其各居半焉已矣又可通乎嘗試譬之心猶之火性猶之明明不在火之表性猶火之明情猶明之光光不在明之後故謂火明光三者異號則可謂為異物則不可也謂心性情三者異文則可謂為異體則不可也性之文從心從生夫人心惟覺則生弗覺則弗生惟生則理弗生則弗理假令捧土揭木儼若人形而告之曰是為父子之親君臣之義蓋塊如也何者以土木無覺故也是以舍人心之覺則無性矣又焉有理哉是故仁義禮智非有物焉以分貯於中也則覺為之宰也亦非有物焉以分布於外也則覺為之運也方其宰也而無不運雖天下之至虛而無不實也方其運也而無不宰雖天下之至實而無不虛也故覺即性非覺之外有性也性即理非性之外有理也然則所覺者即能覺者為之也問無能覺者則非捧土揭木而已爾亦烏有夫所覺者哉曰先儒又言覺於理則為道心覺於欲則為人心以覺語性安知其不覺於欲而為人心歟曰若是烏足以言覺醫書以手足痿痺為不仁言弗覺也誠覺則痛癢流行而仁理在其中矣豈覺之外而别有痛癢别有仁理哉是故覺即道心亦非覺之外而别有道心也人惟蔽其本覺而後為多欲為人心當其為多欲為人心則雖有聞見知識辨别物理亦均為痿痺而已而奚其覺然則謂覺為覺於欲者非也曰釋氏以作用為性若是則胡以異也曰吾儒之語性有專以體言者記所為生而靜者是也有專以用言者所謂惻隠羞惡辭讓是非是也若獨以作用罪釋氏則孟子亦失矣夫覺性者儒釋一理也而所以異者則盡與未盡由分也體用曰道有體有用未有有體而無用有用而無體者也今子辨理以察而語性以覺無乃溺於用而遺於體歟曰古之君子語體而用無不存語用而體無不存以其心無不貫也豈若世儒語體則截然曰是不可為用語用則截然曰是不可為體語物語理必應體用而成四片不知文義愈析論辨愈執而道僉不謀矣循序曰古之小學學於詩書禮樂未有先從事心性者也今子嘐嘐然惟心性之務先靈覺之獨切無乃紊先後之序乎曰古人以先本後末先始後終為序未聞先末與終之為序也種樹必先植其根治水必先濬其源心性者學之根與源也世儒反以先本為非必欲窮索物理而豫求於末終是不為紊也哉自天子至於庶人壹是皆以修身為本若以理為在物從物物而索之則上必不能通於天子下必不能通於庶人又奚足以言理格物曰東越訓格物曰正其不正以歸於正初學猝難了也曰致知在格物者蓋言古人之致其良知雖曰循吾覺性無感不應而猶懼其泛也則恆在於通物之本末而無以末先其本夫是則知本即格物而致知之功不襍施矣其下文曰此謂知本此謂知之至也更不添一物字則格物之為知本明矣夫子曰反求諸其身孟子曰反求諸己又曰萬物皆備反身而誠皆格物疏義也括而言之知本而已夫致知非遺本也而求其端用力孜孜反顧尤在於本而後能不泛也曰格物則然窮理何居曰窮之義盡也極也非謂窮索也窮理者即極夫天理之謂也誠極夫天理則人欲滅矣博辨問博文約禮曰文者學之事也至不一者故稱博莫非文也則莫不有吾心不可損益之靈則以行乎其間者禮是已禮至一者也故稱約茍不約禮則文失其則雖博而非學矣是故散之視聽言動者博文也存之勿非禮視聽言動者約禮也明中語其藏則渾渾淵淵空空一者不得其一非必合之而後一也語其放則井井斤斤暌暌殊者不得不殊非必析之而後殊也吾惟虞人之不理一也奚虞分之不殊哉又寧先析之為殊後合之為一哉茍無分殊則不得謂理一無理一又孰為理之使分殊也何則理者吾心之燦燦者也以其至一理至不一者也非謂漫漶而靡所區分之為物也徴孔儒者必曰先知後行夫子十五而學三十而立則為先行四十不惑則為後知其與先知後行之訓又自悖矣儒者以窮至物理為入門所謂窮其當然與其所以然皆始學事也今訓不惑則謂知其所當然訓知天命則謂知其所以然是孔子以四五十之年乃得為始學之事則在學者為過早而在孔子為過晚矣不又悖之甚乎續問氣有陰陽五行糅雜不一者也二五之氣成質為形而性宅焉性者即維天之命所以宰陰陽五行者也在天為命在人為性而統於心故言心即言性猶言水即言泉也泉無弗清後雖汩於泥淖澄之則清復矣性無弗善後雖汩於氣質存之則善復矣由是觀之性是性氣質是氣質又烏有氣質之性哉且古未聞有兩性也性之文從心從生今夫物斃矣其質猶存而生奚在人之初死其氣猶存而生奚在然則謂氣質有性者贅也亦舛也合吾之本心即為無私即為合天問龍溪有真達性真惡名埋沒一世弗恤之語然否曰君子復其性真固不知前有譽而趨之後有毁而避之若欲冒毁以達性真是前後皆意之矣非真體也君子即有不得已䝉世之大詬固皆付之無意而天下後世亦未嘗不終諒其心精也何者以人心至神故也問學以聚之曰聚即凝聚之謂非劈積而聚之之謂也問獨知曰夫獨知者宰夫念慮而不以念慮著貫乎動靜而不以動靜殊也慎之義猶慎固封守之謂功在幾先於時􅍖之者是也若曰必待動念於善惡而後慎之則不慎多矣門人問曰先生奚學曰吾學以盡性至命為宗以存神過化為功性也者神也神不可以意念滯故常化程伯子所謂明覺自然言存神也所謂有為應跡言過化也今之語盡性者失之則意念累之也曰請下之曰以仁為宗以覺為功以萬物各得其所為量以通晝夜忘物我為驗以無聲無臭為至曰復請下之曰以一體為宗以獨知為體以戒懼不昧為功以恭忠敬為日履以無欲達於靈明為至曰若是則敢請事矣曰是與性命神化豈有二哉第見有遲速故功有難易習有生熟要之皆非可以意念滯也申言蓋嘗觀之盈天地間升降闔闢凡有聚有散者疇非氣也而孰宰之則帝天為之宰焉者是命也即理也故詩稱維天之命於穆不已者是也人生天地間呼吸作止凡有聚有散者疇非氣也而孰宰之則心覺為之宰焉者是性也即理也故書稱維皇上帝降衷下民若有恆性者是也故理之在人也宰之一心而達之天下不期而準主之一時而施之千萬世不約而協是我之知覺本通乎人之知覺本通於天下後世之知覺本非有我之所得私所謂以我為主以覺為性者本未為非亦未為私也覺即理也然至於無準與權者則所謂感物而動失其本知本覺者也失其本知本覺而本知本覺之體固未亡也故精者此精也準與權者此為之也思未起而覺不昧即喜怒哀樂未發之中生平忿慾矜名諸病反觀尚未盡瘳所以然者猶是依違在形骸上取滋味而不信有不依形之天味也向世界上爭勝負而不信有不著世之天勝也困學記予童頗質任嘗聞先府君論學而不知從事年十七遊學邑城讀書學舍遂致駘蕩喜放是嵗臘先府君卒愈自放然慕奇名好談孔文舉郭元振李太白蘇子瞻文信國之為人如文舉太白夢寐見之酷嗜詞章時傳李何詩文輒自倣效又多忿慾躁動不知檢嘗著格物論駁陽明先生之説年十九與歐陽文朝同硯席最契時或覺非忽自奮為學要文朝諱昌號蜀南庠生南野先生族孫共為之勉修一二月不知方遂仍墮舊習嘉靖壬寅予年二十六方買居白鶴觀下適歐陽南野先生諱徳字祟一號南野仕至禮部尚書諡文莊為陽明先生高弟子自鄉出邑城會友講學傾城士友往會而予獨否旣數日文朝則語予曰汝獨不可行造訪禮耶予乃随文朝往訪先生於普覺寺先生一見輒呼予舊字曰宜舉來何晚又問齒對若干先生曰以汝齒當坐某人下予時見先生辭禮簡當不為時態遽歸心焉先生因講惟仁者能好人一章言惟仁者有生生之心故見人有善若己有之而未嘗有作好之意故能好人見人有惡若瘝厥躬而未嘗有作惡之意故能惡人今之人作好作惡則多為好惡累未可謂能好惡也予素有疾惡之病聞其言撫然若為予設者已乃走拜先生家從遊海智寺月餘自憂好放之習何能入道一日先生語以立志曰明明徳於天下是吾人立志處而其功在致吾之良知又曰唯志真則吾良知自無蔽虧語若有契一日先生歌文公款乃聲中萬古心之句予一時豁然若覺平日習氣可除始定嚮往真意次年癸夘春為小試之迫此意雖未寢而志則馳矣秋舉於鄉歸見先生又北行赴辭而先生屬望殷甚予亦頗承當及甲辰會試下第歸途與同侶者撓亂既歸雖復見先生然屢興屢仆第其中耿耿有不甘自己之念乙巳秋丁祖母承重憂丙午復同文朝及羅日表讀書龍洲名鵬癸夘同鄉舉因與康東沔公倡和諱恕字求仁縣令自遣而嚮學功愈弛至丁未為先祖母卜兆致訟適先生起少宗伯予送至省城既歸復畢訟事自覺學無力因悔時日之過大病在好詞章又多忿慾三者交剚於胸中雖時有戰勝不能持久此於志不立之罪無可言也時年已三十一矣丁未冬予忽有飄然遐舉離世之興及就友人王有訓語名託號未菴一號石壁病農有訓曰遐舉不如力學因偕予往訪羅念菴先生諱洪先字達夫吉水人官贊善諡文恭居石蓮洞既一月日聞先生語感發乃北面稟學焉先生初不甚喜良知亦不盡信陽明先生之學訓吾黨專在主靜無欲予雖未甚契然日承無欲之訓熟矣其精神日履因是知嚴取與之義戊申春予遊韶太守陳公諱大論南寧人仕至太守闢明經書院延教六邑諸俊又先延鄉搢紳鄧純峯居書院中為侣諱魯樂昌人官學正陳公嘗從陽明先生學後專意元門予少病肺咳血怔忡夜多不寐則就拜陳公學元未有入鈍峯始為魏莊渠公諱校官至祭酒崑山人弟子亦遊南野先生門後專意禪宗予亦就鈍峯問禪鈍峯曰汝病乃火症當以禪治每日見予與諸生講業畢則要共坐或踞牀或席地常坐夜分少就寢雞鳴復坐其功以休心無雜念為主其究在見性予以奔馳之久初坐至一二月寤寐間見諸異相鈍峯曰是二氏家所謂魔境者也汝平日忿慾利名種種念慮變為茲相易所為遊魂為變是也汝勿異功久當自息四五月果漸息至六月遂寂然一日心忽開悟自無雜念洞見天地萬物皆吾心體喟然歎曰予乃知天地萬物非外也自是事至亦不甚起念似稍能順應四體咸鬯泰而十餘年之火症嚮愈夜寢能寐予心竊喜以告鈍峯鈍峯曰子之性露矣久之雖寐猶覺凡寐時聞人一語一步皆了了鈍峯曰是乃通晝夜之漸也子勉進之可以出死生矣予乃問出死生何謂也鈍峯言不出死生則前病猶在予因是從鈍峯究出死生之㫖若日有所悟又偕遊曹溪瞻六祖塔感異夢遂又有忘世意至秋越錢緒山公至韶陳公延留書院中名徳洪餘姚人陽明先生弟子予甚喜請益然見錢公以憂制未大祥遽遠遊又乗青幃張皂蓋前呼導予心私計曰予雖學出世事亦未敢謂然也亡何冬盡予方圖歸因起念遂失初悟忽若痞悶雖極尋繹宿見意象俱似而真體昏塞甚不自得述其故質於錢公錢公發明頗詳迄不當予意一日同諸君遊九成臺坐地方欠身起忽復悟天地萬物果非在外印諸子思上下察孟子萬物皆備程明道渾然與物同體陸子宇宙即是吾心靡不合㫖觀前所見灑然徹矣因自審曰吾幸減宿障從此了事又何可更纒世網從事殘蠧致汩吾真耶既歸見先君方待吉淺土卜𦵏不果此中不自安又家人輩不善事老母致有不懌意予衷亦常怏怏無以遣已隠隠有儒釋㫖歸之辨而猶未決也己酉家居因結邑中曾思徤諱于乾號月塘羅東之諱潮俱庠生蕭天寵名隆佑吏員官縣丞及王有訓歐文朝為會頗有興發至冬予赴會試與王武陽諱翥有訓叔教諭同舟昕夕唯論學方浮彭蠡值風濤夜作不能泊岸舟顛幾覆數矣同舟人士皆號達旦予獨命酒痛飲浩歌熟寢天明風稍定始醒同侶有詈予不情者予自若也庚戌落第後舍南翁先生宅一日以舟顛熟寢事請正先生曰此固甚難然謂仁體未也予曰仁體當何如曰臨危不動心而又能措畫救援乃仁體也予雖聆服然未繹其㫖仲夏李石鹿公名春芳字子實興化人官元輔延予過其家訓諸子因盡聞王心齋公之學諱艮字汝止安豐塲人陽明先生高弟誠一時傑出獨其徒傳失真往往放達自恣興化士以是不信學久之熟予履乃偕來問學立會冬杪予歸自儀真發舟三日皆遇劇盜以風猛得脱同舟亦有泣者予獨計寇入則當倒槖輸他無虞也以是亦不為動辛亥予挈家歸義和滄洲故居獨學寡侣力有少弛又明年壬子館䖍舊習大作幾自堕至冬同歐陽曰穡赴會試諱紹慶號乾江南野先生仲子官工部主事時曰穡延思徤赴京訓諸子亦在舟雖日常切琢而予放未瘳癸丑落第初擬就選學職至期悔止友人周仲含名賢宣號洞岩萬安人官至右布政使及思徤曰穡咸勸予選而思徤至拍案作色奮曰子母老不及時祿養非孝予勉從謁選得教句容旣至方牽業舉日課諸士文而自以出世之學難語人又負高氣處上下多窒每自疚已乃疑曰豈吾昔所悟者有未盡耶時甲寅二月聞南野先生訃已為位痛哭因念師資旣遠學業無就始自悔數年弛放自負生平又負師門為痛恨尋因作博文約禮題遂舍而思曰孔顏授受莫此為切故必出此乃為聖人之學而非此必非聖人之學者也於是反覆而思之平心而求之不敢徇近儒亦不敢㕘己見久之於先儒終不能强合其疑有四於近儒亦不能盡合其疑有三蓋先儒以窮理訓博文其説要推極吾心之知窮至事物之理予所最不能無疑者以先儒語理專在物而不在人蓋理莫大乎五常之性曰仁義禮智信是也今以理為在物而窮之此則五常之性亦在物不在人矣是人皆為虛器無一理之相屬恐必不然此一疑也先儒訓復禮之禮曰人事之儀則天理之節文不知此天理仍在物耶抑在身耶如其在身則是先窮在物之理後復在身之理是果有二理矣恐亦不然此二疑也大學之道貴知本故曰知所先後則近道矣今語大學則反後身心而先物理竊恐聖門格物之㫖易傳窮理之義不如此且此學通天子庶人若必欲窮盡物理吾恐天子一日二日萬幾庶人耕田鑿井皆有所不暇故孔子又曰周其所察聖人病諸孔子恆教弟子先孝弟行有餘力則以學文未聞先教人以窮盡物理者也此三疑也先儒所謂窮理則專以多聞多見為事以讀書為功然孔子則嘗以多聞多見為知之次今乃獨舉其次者語顔子而其所語曾子子貢一貫之㫖顔子不得與焉何其厚曾子子貢而薄顔子也恐亦不然況其對哀公並不言顔子聞見之多讀書之富唯獨稱曰不遷怒不貳過以此為好學之實而已則顔子之所學者可知而博文亦必有在矣此四疑也凡此四疑予未敢一徇人已但反諸心誠有不能解者至若近儒訓致吾心良知於事事物物之間此雖孔曾復生無以易也但訓致格物曰物者意之物格者正也正其不正以歸其正則似與正心之義微有相涉惟達者用功知所歸一若初學未達者用之恐不免增繳繞之病此一疑也嘗觀先儒言事事物物皆有至當不易之理先儒豈敢謾哉彼見學者多太過不及之弊故必求至當天則所在是欲為堯舜之中箕子之極文王之則孔子之矩曾子之至善子思之中庸程伯子之停停當當者是也是其所疑者未可非但不知此至當此中此則此極此矩此至善中庸此停停當當者固出於心而通於物也非物有之也出於心者一致而百慮亦非必能應一物而膠定一則也此先儒之未達也今近儒懲而過之第云致其良知而未言良知之有天則以故承學之士惟求良知之變化圓通不可為典要者而不復知有至當中極則矩至善中庸停停當當之所歸一切太過不及皆抹殺而不顧以致出處取予多不中節一種猖狂自恣妨人病物視先儒質行反有不逮可見近儒之訓亦不能無弊竊意顔子之約禮者必約諸此心之天則而非止變化圓融已耳此二疑也近儒又曰文者禮之見於外者也禮者文之存於中者也予則以文不專在外禮不專在中專以文在外則舍吾心又焉有天地萬物專以禮在中則舍天地萬物又焉有吾心是文與禮均不可内外言也今之語良知者皆不免涉於重内輕外其言亦專在内不知夫子言禮而不言理者正恐人專求之内耳是近儒之訓亦似於孔顔宗㫖未悉此三疑也予旣有是疑因日夜嘿求孔顔宗㫖麄若有明蓋夫子因顔子求之高堅前後不免探索測度而無所歸著不知日用應酬即文也文至不一者也而學之事在焉故博之以文俾知日用應酬可見之行者皆所學之事而不必探索於高深日用應酬準諸吾心之天則者禮也禮至一者也而學之功在焉故約之以禮俾知日用應酬必準諸吾心之天則而不可損益者乃為學之功而不必測度於渺茫是無往非文則無往非禮無地可間而未可以内外言也無往非博則無往非約無時可息而未可以先後言也夫子教之如此故顔子學之亦無地可間無時可息無有内外先後其為功非不欲罷不可得而罷也已而旣竭吾才所立卓爾此天則者昭然常存不復有探索測度之勞至是顔子之學始有歸著則凡學孔顔者舍此必非正脈予又悟克己復禮章即博文約禮之實何則夫子教顔子從事於視聽言動即博文也勿非禮視聽言動即約禮也視聽言動不在禮之外勿非禮不在視聽言動之後是可見先儒言内外先後者固非而近儒涉於重内輕外者亦未盡乃若出世之學一切在内則尤非也繇是用功似不落空日用應酬似稍得其理處上下亦似稍安浸悟南野先生所論仁體之㫖始嘗出赴南都會友與何吉陽諱遷徳安人官至刑部侍郎譚二華名綸宜黄人今大司馬二公遊又因唐荆川公諱順之武進人官都御史念菴先生執友枉顧衙舍遂偕晤趙大洲公名貞吉内江人官至大學士時見諸公論學似於博學之㫖多有異同予雖未敢辨難然因是自信者多矣又二年丙辰予登第始得盡友海内諸學士相與劘切商訂要不能外此天則而迄不可以内外先後言之得此則顔氏之卓爾在我矣茍非此而謂之孔門正脈恐俱北轍而南轅也異時歸以質諸念菴先生先生初恐予求諸意象則詰之曰今滿眼是事則滿眼是天則可乎予未敢悉也又數嵗壬戌予在楚先生則移書示曰吾於執事博約之説洞然無疑斯學其有興乎已而再歸再請質於先生先生曰所貴足目俱耳蓋恐予堕目長足短之弊也予旣自蜀乞休三年復起督楚學遷西粤又東粤二十年間儵忽老矣尚自慚未有真得豈亦終墮足短之弊也與於今萬厯癸酉復乞休為養益懼悠悠以為古今莫予困也予曰及其知之一也及其成功一也則果何時也遂記以自飭與唐仁卿書去冬承寄白沙先生文編因思足下素不喜言心學今一旦取白沙文表章之豈非學漸歸源不欲以一善名其志力不大且遠哉不穀昔嘗相期至再三之凟者固知有今日也甚慰甚賀第令其間不共相究竟則徒負平日蓋先此有覩見是編者謂此書題評雖揚白沙其實抑陽明即語不干處心宛轉詆及陽明近於文致不穀不肯信已而將來編讀之良然如云近儒疑先生引進後學頗不惓惓嘗適觀陽明語意並無是説不知足下何從得之夫陽明不語及白沙亦猶白沙不語及薛敬軒此在二先生自知之而吾輩未臻其地未可代為之説又代為之爭勝負則鑿矣歴觀其評中似不免為白沙立赤幟恐亦非白沙之心也古人之學皆求以復性非欲以習聞虛見立言相雄長故必從自身磨練虛心㕘究由壯逮老不知用多少功力寔有諸已然敢自信以號於人是之謂言行相顧而道可明若周子則從無欲以入明道則從識仁以入旣咸有得而後出之孟子亦在不動心以後乃筆之書白沙先生一坐碧玉樓十二年久之有得始主張致虛立本之學一毫不徇於聞見彼豈謾而云哉陽明先生抱命世之才挺致身之節亦可以自樹矣然不肯已亦其天性嚮道故也過嶽麓時謁紫陽祠賦詩景仰豈有意於異同及至龍塲處困動忍刮磨已乃豁然悟道原本不在外物而在吾心始與紫陽傳註稍異及居滌陽多教學者靜坐要在存天理去人欲至䖍臺始提致良知一體為訓其意以大學致知乃致吾良知非窮索諸物也良知者乃吾性靈之出於天也有天然之條理焉是即明徳即天理蓋其學三變而教亦三變則其平日良工心苦可從知矣亦豈謾而云哉不穀輩非私陽明也亦嘗平心較之矣曾聞陽明居龍塲時歴試諸艱惟死生心未了遂製石棺臥以自鍊既歸遭謗則以其語置諸中庸中和章並觀以克化之今之學者非不有美行也其處困亨毁譽之間有是乎不穀有一族祖贛歸者每歸語陽明事頗悉今不暇細但言渠童時赴塾學見軍門輿從至咸奔避軍門即令吏呼無奔教俱乂手旁立有酒徒唱於市肆則貸其朴令教從徒者習歌詩卒為善士又有啞子叩之則書字為訓亦令有省今之學者非不有美政也其都尊位能勤勤於童子於市人於啞子有是乎夜分方與諸士講論少入噓噏間即遣將出征已行復出氣色如常坐者不知其發兵也方督征濠也日坐中堂開門延士友講學無異平時有言伍公焚鬚小却暫如側席遣牌取伍首座中惴惴而先生略不見顔色後聞濠就擒詢實給賞還坐徐曰聞濠已擒當不偽第傷死者多爾已而武皇遣威武大將軍牌追取濠先生不肯出迎且曰此父母亂命忍從臾乎其後江彬等讒以大逆事叵測先生特為老親加念其他迄不動心異時又與張忠輩爭席卒不為屈未嘗一動氣臨終家人問後事不答門人周積問遺言微哂曰此心光明亦復何言今之學者平居非不侃侃其臨艱大之境處非常之變每不動心有是乎若非真能致其良知而有萬物一體之實者未易臻也先師羅文恭至晚年始歎服先生雖未聖而其學聖學也然則陽明不為充實光輝之大賢矣乎獨當時桂文襄以私憾謗之又有以紫陽異同且不襲後儒硬格故致多口迄無証據識者寃之昔在大舜尚有臣父之譏伊尹亦有要君之誚李大伯詆孟子之欲為佐命大聖賢則有大謗議蓋自古已然矣足下豈亦縁是遂詆之耶抑未以身體而㕘究之故耶夫吾黨虛心求道則雖一畸士未忍以無影相加而況於大賢乎恐明眼者不議陽明而反議議者也編中云良知醒而蕩夫醒則無蕩蕩則非醒謂醒而蕩恐未見良知真面目也又詆其張皇一體吾人分也觀今學者只見爾我籓籬一語不合輒起戈矛幾曾有真見一體而肯張皇示人者哉斯語寧無亦自左耶雖然足下今之高明者也昔不喜心學今表章之安知異日不并契陽明將如文恭之晚年篤信耶近百年内海内得此學表表裨於世者不鮮屢當權奸亦惟知此學者能自屹立今居然可數矣其間雖有靜言庸違者此在孔門程門亦有之於斯學何貶焉不穀辱公提擕斯道如疇昔小有過誤相咎不言今闗學術不小曷忍嘿嘿固知希聖者舍已從人又安知不如往昔不假言而自易耶且知足下必從事致虛立本是日新得仍冀指示益隆久要豈謂唐突耶又前論白沙文編嚽答想未達復承石經大學刻本之寄讀刻後考辯諸篇知足下論議勤矣締觀之嘻其甚矣僕本欲忘言猶不忍於坐視聊復言其槪夫考辯諸作類以經語剪綴頓挫鼓舞見於筆端其大略曰修身為本格物為知本曰崇禮曰謹獨若亦可以不畔矣及竟其終篇繹其㫖歸則與孔子孟子之學一何其霄淵相絶也夫大學修身為本格物為知本足下雖能言之然止求之動作威儀之間則皆末而已矣夫修身者非修其血肉之軀亦非血肉能自修也故正心誠意致知乃所以修動作威儀之身而立家國天下之本也格物者正在於知此本而不泛求於末也今足下必欲截去正心誠意致知以言修身抹殺定靜安慮而飭末節則是以血肉修血肉而卒何以為之修哉譬之瞽者以暮夜行於岐路鮮有不顛蹶而迷繆者是足下未始在修身亦未始知本也孟氏所謂行之不著習矣不察終身由之而不知道者正謂此耳將謂足下真能從事大學可乎禮也者雖修身之事然禮有本有文此合内外之道蓋孔子言之也今足下言禮乃專在於動作威儀之間凡涉威儀則諄切而不已一及心性則裁削而不録獨詳其文而重違其本乃不知無本不可以成文姑不他言即孔子論孝曰不敬何以别乎曰色難豈非有吾心之敬而後有能養之文不敬則近獸畜有吾心之愛吾後有媮婉之文不愛則為貌敬若足下所言似但取於手足貌敬而不顧中心敬愛何如也此可為孝亦可為禮乎易繋言美在其中而後能暢於四肢孟氏言所性根心而後能睟面盎背今足下但知詳於威儀而不知威儀從出者由美在其中所性根心也大學言恂慄威儀蓋由恂慄而後有威儀威儀豈可以聲音笑貌為哉足下又曰言語必信容貌必莊論必準諸古者不論所得淺深而皆謂之誠若是則後世之不侵然諾與夫色莊象恭之徒皆可為誠矣又如王莽厚履高冠色厲言方恭儉下士曲有禮意及其居位一令一政皆準諸虞典周禮據其文未可謂非古也其如心之不古何哉此亦可為誠耶況今昔之語心學者以僕所事所與言語曷嘗不信容貌曷嘗不莊動止曷嘗不準諸古且見其中美外暢根心生色優優乎有道氣象曷嘗不可畏可象而足下必欲以無禮坐誣之僕誠不知足下之所謂禮也記曰君子撙節退讓以明禮傳曰讓者禮之實今豈以攘臂作色詆訶他人者遂為禮耶慎獨者慎其獨知朱子固言之矣惟出於獨知始有十目所視十手所指之嚴始有莫見乎隠莫顯乎微之幾夫是以不得不慎也今足下必以獨處訓之吾恐獨處之時雖或能禁伏麄跡然此中之憧憧朋從且有徤於詛盟􅃤於劒鋩者矣足下又不知何以用其功也蓋足下惟恐其近於心不知慎之字義從心從真非心則又誰獨而誰慎耶末又言聖人諱言心甚哉始言之敢也夫堯舜始言道心此不假論至伊尹言一哉王心周公言殫厥心書又曰雖收放心閑之惟艱曰乃心罔不在王室曰不二心之臣孔子則明指曰心之精神是謂聖此皆非聖人之言乎夫聖人語心若是詳也而足下獨謂之諱言是固謂有稽乎無稽乎於聖言為侮乎非侮乎且曾孟語心亦不假論即論語一書其言悦樂言主忠信言仁言敬恕言内省不疚言忠信篤敬㕘前倚衡疇非心乎聖人之語心恐非足下一手能盡掩也又謂聖人不語心不得已言思思果非心乎此猶知人之數二五而不知二五即十也約禮之約本對博而言乃不謂之要約而謂之約束先立其大本對小體而言乃不謂之立心而謂之强立則欲必異於孔孟也是皆有稽乎無稽乎於聖人為侮乎非侮乎又以求放心立其大見大心泰内重外輕皆非下學者事天下學子十五入大學凡皆責之以明徳親民正心誠意致知之事寧有旣登仕籍臨民久矣而猶謂不當求放心立大者聖門有是訓乎且今不教學者以見大重内則當教之以見小重外可乎此皆僕未之前聞也竊詳足下著書㫖歸專在尊稱韓愈闖予諸儒之上故首序中屢屢見之夫韓之文詞氣節及其功在潮非不偉也至其言道以為孟軻揚雄之道又以臧孫辰與孟子並稱及登華嶽則震悼呼號若嬰兒狀淹潮陽則疏請封禪甘為相如良由未有心性存養之功故致然耳安得謂之知道賈逵以獻頌為郎附會圖讖遂致貴顯徐榦為魏曹氏賓客名在七子之列二子尤可以言道足下悦其外便其文以為是亦足儒矣則其視存養自得掘井及泉者寧不迂而笑之且拒之矣乃不知飾土偶獵馬捶者正中足下之説足下亦何樂以是導天下而禍之也且夫古今學者不出於心性而獨逞其意見如荀卿好言禮乃非及子思孟子詆子張子夏為飲食賤儒況其他乎近時舒梓溪賢士也亦疑白沙之學將為王莽為馮道以今觀之白沙果可以是疑乎皆意見過也聞足下近上當路書極訾陽明加以醜詆又詆先師羅文恭以為雜於新學是皆可忍乎僕不能不自疚心以曩日精誠不足回足下之左轅故也雖然猶幸人心之良知雖萬世不可殄滅子思孟子之道終不以荀氏貶至白沙陽明乃蒙聖天子昭察如日月之明豈非天定終能勝人也哉矧天下學者其日見之行存養自得者不鮮而在足下旣負高明自不當操戈以阻善自當虛已求相益為當也僕不難於黙然心實不忍一恃疇昔之誼一恐真阻天下之善故不辭多言亦自旣厥心爾程子有言若不能存養終是説話今望足下姑自養積而後章審而後發有言逆心必求諸道僕自是言不再明儒學案卷二十二
