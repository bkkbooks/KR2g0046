body:
  text: 明儒學案卷五十六餘姚黄宗羲撰諸儒學案下四忠烈黄石齋先生道周黄道周字㓜元號石齋福之鎮海衛人家貧時時挾策遠遊讀書羅浮山山水暴漲墮澗中溯流而入得遇異人授以讀書之法過目不忘登天啟壬戍進士第選庶吉士㪚館補編脩即以終養歸尋丁内艱負土築墓終喪丙舍崇禎庚午起原官小人恨錢龍錫之定逆案借袁崇煥邉事以陷之下獄論死先生抗疏頌寃詔鎸三級陛辭因言易數皇上御極之元當師卦上九開國承家小人勿用以諷首輔温體仁削籍為民丙子起右中允上言慎喜怒省刑罰即如鄭鄤杖母之獄事屬曖昧法不宜坐奉㫖切責丁丑進左春坊左諭徳大學士張至發選東宮官屬不及先生楊廷麟等之直講讀者以讓先生至發曰道周意見不無少偏近日䟽三罪四恥七不如有不如鄭鄤之語蔑倫杖母明㫖煌煌鄤何如人而自謂不如是可為元良輔導乎給事中馮元飈言道周忠足以動聖鑒而不能得執政之心恐天下後世有以議閣臣之得失也戊寅進少詹事兼翰林院侍講學士上御經筵問保舉考選孰為得人先生對樹人如樹木湏養之數十年始堪任用近來人才遠不及古况摧殘之後必湏深加培養上又問對曰立朝之才存乎心術治邉之才存乎形勢先年督撫未講形勢要害浪言鎮撫徒事矜張事既不效輒謂兵餉不足其實新舊餉約千二百萬可養四十萬之師今寧錦三協兵僅十六萬似不煩别求供戰伐之用也未幾楊嗣昌奪情入閣陳新甲奪情起宣大總督方一藻以遼撫議和先生具三䟽一劾嗣昌一劾新甲一劾一藻七月己巳上召先生至平臺問曰朕自經筵畧知學問無所為而為之謂天理有所為而為之謂人欲爾疏適當枚卜之後果無所為乎對曰臣無所私上曰前月二十八日推陳新甲何不拜疏對曰御史林蘭友給事何楷皆有劾疏以同鄉恐涉嫌疑耳上曰今遂無嫌乎曰天下綱常邉疆大計失今不言後將無及矣臣所惜者綱常名義非私也上曰知爾素有清名清雖美徳不可傲物遂非惟伯夷為聖之清若小亷曲謹不受餽遺此可為亷未可為清也對曰伯夷全忠孝之節孔子遂許其仁上以為强説嗣昌出辯曰臣不生於空桑豈遂不知父母臣常再辭而明㫖敦廹甚至臣父而在且不敢自有其身况敢有其子乎道周學行人宗臣實仰企之今乃謂不如鄭鄤臣始太息絶望鄤之杖母行同梟獍道周又不如鄤何言綱常耶先生曰臣言文章不如鄭鄤上責其朋比對曰衆惡必察豈得為比先生又曰古人對仗讀彈文嗣昌身為大臣理宜待罪豈得出而角口於是嗣昌引退上曰爾不宜誹謗大臣對曰臣與嗣昌比肩事主何嫌何忌而不盡言上曰孔子誅少正卯當時亦稱聞人唯以心逆而險行僻而堅言偽而辯順非而澤記醜而博不免孔子之誅今之人率多𩔖此對曰少正卯心在欺世盗名臣之心在明倫篤行上以褊激恣口叱之去先生曰臣今日不盡言則臣負陛下陛下今日殺臣則陛下負臣上曰爾讀書有年祗成佞口先生又為上辯忠佞者久之上怒甚然亦奪於公議止謫江西布政司知事葢上素知先生清苦無私第三疏在枚卜之後小人中之者謂當枚卜之時隠忍不言睥睨宣麻宣麻不得由是發憤耳上入此間亦遂疑先生平生言行之出於偽也先是五月間先生草劾一藻新甲二疏俾長班投會極門長班恐疏上必敗枚卜乃駕言會極門中官索錢先生無以應至會推㫖下長班絶望始並投三疏故小人有此揣摩彼小人之識見亦猶夫長班之識見也庚辰江西廵撫解學龍疏薦地方人才謂先生堪任輔導上怒其朋比逮先生及解撫廷杖之下刑部獄户部主事葉廷秀太學生凃仲吉上書頌先生皆廷杖先生在獄中同獄者多來問學偵事者上聞詞連黄文煥陳天定文震亨孫嘉績楊廷麟劉履丁董養河田詔上使鎮撫司雜治之連及者既不承至有㦸手而詈者諸人皆返刑部而先生改下北寺當是時告訐公行小人創為福黨之説以激上怒必欲殺先生而後已司㓂劉澤深擬烟瘴遣戍再奏不允宜興出山天下皇皇以出先生望之辛巳十二月戊辰州衞一日上御經筵嘆講官不學宜興進曰惟黄道周識雖偏而學則長次輔蔣入公因言道周貧且病乞移近戍宜興曰皇上無我之心有同天地既道周有學便可徑用何言移戍上笑而不言既退即御書原官起用未上而京師陷福王起禮部尚書掌詹事府事尋以祭告禹陵出棲遲浙水國亡之後奉唐王入福遂首政府是時政由鄭氏祭則寡人賜宴大臣鄭氏欲居第一先生謂祖制武􅕄無班文官右者相與爭執鄭氏辭屈嫌隙遂成先生視鄭氏殊無經畧之志自請出闗然不能發其一甲轉其斗粟徒以忠義激發句月之間掲竿雲集先生親書告身奬語給為公賞得之者榮於誥敕從廣信抵衢州為其門人所紿至􅄔源明堂里見執繫尚膳監絶粒十四日不死引决又不殊丙戍三月七日兵解年六十二先生深辯宋儒氣質之性之非氣有清濁質有敏鈍自是氣質何闗性上事性則通天徹地只此一物於動極處見不動於不睹不聞處見睹聞著不得纎毫氣質宋儒雖言氣質之性君子有弗性焉畢竟從夾雜中辨别精㣲早已拖泥帶水去也故知先生之説為長然離心之知覺無所為性離氣質亦無所為知覺如此以求盡性未免易落懸想有先生之學則可無先生之學尚湏商量也榕壇問業千古聖賢學問只是致知此知字只是知止試問止字的是何物象山諸家説向空去從不聞空中有個止宿考亭諸家説逐物去從不見即事即物止宿得來此止字只是至善至善説不得物畢竟在人身中然繼天成性包裹天下共明共性不説物不得此物粹精周流時乗在吾身中獨覺獨知是心是意在吾身對照過共知共覺是家國天下世人只於此處不明看得吾身内外有幾種事物著有著無愈去愈逺聖人看得世上只是一物極明極親無一毫障礙以此心意澈地光明纔有動處更無邪曲如日月一般故曰明明徳於天下學問到此處天地皇王都於此處受名受象不消走作亦更無復走作那移去處故謂之止自宇宙内外有聲有形至聲臭斷處都是此物貫澈如南北極作定盤釙不由人安排得往繼之成之誠之明之擇之執之都是此物指明出來則直曰性細貼出來則為心為意為才為情從未有此物不明可經理世界可通透照耀試問諸賢家國天下與吾一身可是一物可是兩物又問吾身有心有意有知夢覺形神可是一物兩物自然谺然摸索未明只此是萬物同原推格不透處格得透時麟鳯蟲魚一齊拜舞格不透時四面墻壁無處蔵身此是古今第一本義舍是本義更無要説亦更不消讀書做文章也問前説萬物一體未免是儱統説話周程説敬延平説静唐虞説中此中皆不著一事一物如要静觀未發氣象乂放不得胞與念頭某云賢説極好未發前不看得天地萬物已發後必為天地萬物所倒此處格透縱有蔽虧是天地萬物影光相射問時時守中與時措之宜是一是二某云聖門喫𦂳入手處只在慎獨自不睹聞自未發以至已發隠㣲顯見何時離得中字何時分破得中字聖門不把和字硬對正是聖門明眼明手如小人便要通方隨時變化以此於中庸上看粗了大抵戒慎則時時做得不戒慎則時時做不得擇乎中庸不能期月者畢竟於隠微去處工夫不到隨他説時中變化我只管是刻刻獨知再勿隨他横生手脚人心頭學地湏積精而成如一片日頭晃赤赤無一㸃昏昧團團天中只一片日子日北則晝長氣熱萬物皆生日南則晝短氣寒萬物皆死觸鹵而出則為雷霆廹氣而行則為風雨餘光所照以為星辰餘威所薄以為潮水爆石為文融金為液出入頂踵照於心繫如此世間無一物一事不是日頭串透人生學問精誠常如此日然後能貫串六虚透徹上下千里萬里無有障隔如便到十世百世更無芥礙稍不如此雖杵針鐵線穿鑽不來何况鋼城千室内外問上下四方覆仰圓成如何説一矩字既是矩字如何貫去某云此事只有管仲曉得曽參用得管子云大圓生大方大方生規規生矩矩自四方從大圓中五變出來生人生物生四肢百節禮樂疇象無人曉得顔子問目夫子把四勿與他版版整齊他人一毫用不得曽子以忠恕兩字代之漢初儒者把大學中庸置禮書中是聖門奥義今人抽出以為心學如一方甎磨作圓錢又於矩中再變囘去是樂律中自黄鍾子聲五變之後再起清音也古人為學立一字有千種奥義追尋將來所以發憤為得不厭今人為學極好是賣弄得去所以自家亦厭薄了今如賢看到矩字此是管子所謂大圓初生時如一印璽千聖相傳尚有手法孟子所謂巧力一聖難傳譬如一物渾圓勾而股之此之謂絜絜是絜而使方一物四方率而圓之此之謂率率是率而得圓一物方圓徑而通之此之謂貫貫是貫而得一聖人只此三法提挈天地裁成萬物舉其形迹似云凖繩規矩推其巧力便是捖摶兩造創立精光三千年來無人解得但恐言之又生許多口涎費人砭剝不如溷溷大家看四書去也問性體穆然無思無為中庸便説戒慎恐懼此是後天存省之功是先天流行之體某云人湏曉得人不是天性不是道人若是天便亦蒼蒼茫茫逺無紀極性若是道便亦隨人函裏𢎞闡不來所賴聖人居敬存誠時時看得人即是天性即是道所以禮樂文章節次生來成個變化昭明外道大錯只説天字更不看地看人更不知天上日月星辰如何安頓天上有個日月星辰人面上有個耳目口鼻只此便湏戒慎豈得無思無為如是未生以前何消探討程伯子所云極上更不湏説也成周盛時公卿士夫個個知學如頌云維天之命於穆不已雅云天生蒸民有物有則夫子乃云乾道變化各正性命保合太和乃利貞吾儒著眼只在各正不已中間未到於穆變化上去切勿云毛髪骨節俱是虚空也問中庸以性明道掲一誠字即如老氏所謂其中有物者􅆼㝠之内信有此物則元素所求差别不逺如何刋落兩家且如所論退蔵寂感何思何慮難道無存省流行之别某云洗心退蔵此中更為何物寂感遂通此外亦有何物只如憧憧往來此時戒懼已為晚矣人身自牀几上下何處不空頂踵􅆆來何處不實空實兩事切不湏説只看日方出地上萬象昭明雷在澤中萬物宴息泛泛説虚中寳蔵猶入古廟中見鳴蛙以為精怪也如是至誠人只管肅衣冠一揖而退耳讀書人莫苦紛囂莫喜空寂只是不驕不諂不淫不濫如駕安車導坎過橋常覺六轡在手雞犬放時亦在家園何湏建鼓問聖門之學不過博文約禮如是三千三百之禮包舉詩書夫子自少到老定奪不盡如是無文之禮此是入手便當尋求豈容留為後著某云覽看一部禮記纔信得儼若思抑先信得儼若思然後去看一部禮記耶真讀書人目光常出紙背往復循環都有放光所在若初入手便求要約如行道人不睹宮墻妄意室中是亦穿窬之𩔖也聖門體道在鄙夫面前説孝説弟説敬説誠説仁説義得了一個個個貫得只是學便不同也如要學孝學弟學敬學誠學仁學義亦何處貫串不得試問諸賢周公仰思待旦夫子發憤忘食此豈謂恕字擬議不透耶讀書人再不要傍聲起影如夢蕉鹿無一是處問一是何物多是何物多一相生又是何物易曰動貞夫一此一字與貞觀貞明何處貫串某云凡天地貞觀此是氣象凝成在學識中做體幹自在日月貞明此是精神所結在學識中做意思囘環有此兩様理氣萬千費千古聖賢多少言論唯曉得兩極貫串貞一而動天地日月東西循環總此一條走閃不得四顧星河烟雲草木都是性道都是文章至此便是要約問如此體會猶在太虚空際如何探討自家消息如要事事物物求個太極雖舌敝齒落做不得學識漢子如何會到一貫田地某云賢看兩極果落空虚天地日月何由不能傾倒湏信兩極只是一條控持天地轆轤日月觀是此觀明是此明不湏就他顯求形象細認聲香問如此看一貫到有一物貫串中間如轂之與輻四旁中央等是一物何由能得終古無敝萬物同原某云吾生在天地中間盡天地中事何湏怪天地有物也問隂陽變化離不得多二五絪緼説不得一生初既不湏説復命又不容談何苦於一多上往反辨折譬如西銘數行該括許大曉得此意亦省多少言語豈有聖門諸賢當日未解西銘意思也某云西銘極好然如一詩六義春秋三㣲禮樂五處中間變現千億無涯如何包裹得住籠統話再勿説如且學識看他後來終是緩綆穿石如要把柄體會詩書終是傀儡線子也問此道只湏静觀久當自徹古人常説外照終年不見一身内照移時能見天下聖人學問只是致知致知前頭又要格物如看萬物果是萬物此與未嘗格物有何分别如看萬物不殊一物此知豈復萬物所量譬如鏡子十分光明自然老來老照少來少照豈必豫先料理面孔耶某云從來論説唯有此徹聖人一貫只是養得靈湛看得無限名象從此歸游首尾中間同是此路如信得盤古世界便有詩書亦信得周公制作初無文字也只為此處浩瀚落空要原本擇執與人持循便説天下言無多子行無多子使天下文人回頭捫心與初讀書人了無分别耳問學識原頭果是格物此物條貫初甚分明聖人教人先知後慮如此知字定是不慮之知若知便有慮便膠擾一畨何由静定得來想此止字即是静定本領知字即是静定法門静定生安靈晃自出百千學識俱從此處發亮銷光也某云累日來説此唯此説得透一貫如大發樹萬葉千枝不離此樹學識如花葉隨風映日不離初根即此是本末條貫不為鳥語蟬啼所亂問此一貫處初不説出本末既有本末是一樹身如何貫得萬樹且如格物物格可是就身心意知看出家國天下纔有下手抑是把情性形體與飛走草木揉做一團纔有識路也某云只要知至知至者物不役心知不至者以心役物貫不貫在此問教即學識性即一貫教不過明性學識亦不過明一貫而已中庸稱誠明合體此明字與博聞强記殊科何不直就誠處教人下手翻説學識令人終身在言語文字上推求某云不説言語文字安得到無言語文字上去譬如一性便有二五氤氲健順保合千聖萬賢詮譯不透莫説無妄兩字空空貫串便與天命相通也某少時初到郡中在張汰沃齋頭蔣先輩以册使抵家一日過訪便問山下有天取象大畜如何講論某時空疎但以臆對云山下有天想是空洞如乾與咸合成元谷以此興得寳蔵應出神聲如是實然亦生成一物不來把前言往行蔵在何處先生亦謂有理及後歸家見輔嗣舊説云天降時雨山川出雲此便是大畜之象為此慙懊至於累日今見人講論輒想此語見有學問處便想此事如精氣自是山川游魂自是雲雨山川不變雲雨時興人與鬼神同是一物夢寐云為同是一變遡他原頭精游之際學識同歸若條段看去精氣亦貫得游魂也易説尺蠖龍蛇同是精義莫於此處分人分鬼曹秋水説鬼神聼人猶人聼鳥只此兩語十倍分明吾人本來是本精㣲而來不是本混沌而來如本混沌而來只是一塊血肉豈有聰明官竅如本精㣲而來任是死去生還也要窮理讀書夫子自家説發憤忘食樂以忘憂又説不知老之將至一語下頭有此三轉如是為人自然要盡人道如是好學自然要盡學理孟子説盡其心者只是此心難盡每事只領三分知不到好好不到樂雖有十分意量亦只是二三分精神精神不到滿天明月亦是襆被身意量欲窮四處雷霆自有一天風雨切勿説雲㪚家家春來樹樹也性道與仁如何言説鼓舞不倦只是文章孟子亦説樂善不倦古今多少聖賢不敢於江漢源頭酣歌鼓掌柰何動指蚤虱以為車輪也諸賢都問生而知之者好古敏以求之者中間實指何物某亦未嘗分註子貢有言夫子之言性與天道不可得而聞也既有好古敏求四字豈患空岐錯下心目問孔顔得力發憤忘食是何事欲罷不能又是何事不過此一㸃知光包天括地自家本性與萬物相盪併力趕上教休不休工夫淨時覺日朗天空任飛任躍無論敏求博約俱著不得自有一叚活潑的地孟子説萬物皆備反身而誠正是知至的光景今人不識致知入門空把孔顔樂處虚貼商量無論拾級循途不得即兀坐静叅不得也某云如賢説都不是疑難昔湖州問程叔子直以誠正立論於此知字尚隔一層伯子見濓溪重證所學亦未嘗一口道破今日説是性光無量與萬物相映從此更尋實義不落慧空始信曲肱蔬食不是黄薤數根弄風吟月亦不在頭巾話下也天命兩字如何是命之於天率性兩字如何是率之於人天人中間承接一路有覺有知果是何物從此推求覺造化之跡二氣良能皆是誤認了問齋明盛服算得未發大本抑看作已發逹道耶某云此處喜怒哀樂都無著處直是捖搏天地屈伸萬物宇宙形聲一出一歸了無竟處算作陰陽頭腦極處蔵身上知下愚俱是積習所成積習既成遷改不動如他性初何曽有上知下愚之别問致知格物物不曲不直易稱龍蛇之屈精義入神禮稱物曲本天殽地鬼神體物聖人曲成正在此勾萌處實實致力此處隠㣲未顯未見然到顯見却無復致力之處正在獨知處衷曲自語事事見得自已不是有一兩處鬱崒未逹盡力托出便是誠明路頭克治與存養非有兩様工夫此道初無繆巧但就日用平實細心今看夫子言終日言造次顛沛富貴貧賤是何等平實何等綿細更要想他前頭便是懸空理會也問陽明先生云致知各隨分量所及如樹有些小萌芽只把些水灌溉不要浸壊了他論此良知根芽與草樹不同落地光明貫天徹地聖愚之分只有保喪而無増減豈有只此端倪怕人浸灌的道理某云説則如此説何嘗見有良知落地光明陀陀爍爍也學者如提燈燈亮時自謂眼力甚明燈滅時雖一身手足亦不能自信也要湏學得此光與日月同體低頭内照不失眉毛賁者仁之色素者仁之地也有此素地隨他繪出富貴貧賤患難造次顛沛如一大副山川草木鳥獸蟲魚屈折動靜恣態横生只見可樂不見離異耳學人無此素心便每每出位出位者如借人倩盻作我笑目纔動此想便是哇淫問性從心生中庸言性不言心此何以故人身中靈覺便是天又説知性了纔知天此中豈有分别乎某云盡處則無分别若不盡者勺水海性隙照天光終難説得分明也有意思人再勿傍影起形牽扯字義問紫陽云知性即窮理之事窮理便向外去知性抵中尋此理如何理會某云紫陽學問得力在此自濂溪以來都説性是虚空人受以生耳紫陽始於此處討出二五合撰事事物物皆從此出如曉得事事物物皆禀於天自然盡得心量盡得心量自然性靈無遺問天性在人猶水性之在氷此語如何某云横渠不作此説作此説者猶程門氣質之論耳横渠云氣質之性君子不謂性也又云海結為氷氷㪚為水氷泡聚㪚而海不與焉此處説氷才水性亦猶外道説鐵火電光非實論才性也又問五行於陰陽各有偏屬則禀受不同自有善惡何謂無耶某云如此五吏之才何闗帝天之命問如文箕之蒙難孔顔之阨窮似皆理不勝數不知兩者孰為有權抑豈並行不得軒輊與某云凶吉生大業隂陽竒隅窮逹夀夭總是徳業必經之路如使聖賢都要富貴都要夀考則爻象無隂蓍莢無竒也夷齊顔冉龍比由賜八人生死天下窮竒然無八人盗跖彭籛比屋而是也吾門以數明理以理明數除却理數性地自明不干管郭之事約到不二約到不遷便把一生博文工夫納於無文上去吾輩過失不多只在浩博一路収拾不下如實見不二不遷卓可蔵神立命雖百國寳書九千絃誦何能滓人見聞顔子屢空又問為邦直是何物不知夫子説出夏時四事淫佞二端直是何故以此認聖賢實有不空不竭所在纔有學誨黙識來往路頭譬如虚寂不動感而遂通又有應問如響叠叠變化豈可説天生神物亦有虚閒不干人事耶易本虚寂説出吉凶同患孔顔禹稷本是空洞説出飢溺由已此是空中所蔵竭復歸空某少時初讀論語問先生云頭一頁書孔子只教人讀書有子如何教人孝弟孔子只教人老實曽子如何教人省事聞者大笑某今老來所見第一件猶是讀書第二件猶是老實凡人人自是聖賢自有意思只要致思學者如鑿井美泉難遇見人讀書長年啖土若不致思泉脉何來命中不著一物本來自足初無空殖可言無空殖故無得失無得失故無億無忘只是清虚淡薄則與命較親卜度經營則與貨較親耳世人言命都在得失一邉所以有殖有億有氣數人事之差哲人言命在清虚一邉所以無殖無億無得失當否之慮日往月來寒往暑來明推嵗成此即見天之命受天之命便有心有性有意有知有物難格有知難至物理未窮性知難致定後之慮去億一丈去空一尺空是物格無物天命以前上事億是因意生知人生以後下事屢空是天人隔照之間屢中是物理隔照之間譬如一事當前有是有非有得有失屢空人只説我生以來與物平等初無是非初無得失屢中人便説某處是非某處得失至人看來安慮之中萬物畢現空亦不空中有不中是非得失如天命然一絲一毫洞見難逃如此便説屢字不得説無不中不得無不空不得所以説空問先正嘗言道如覆盂本空無有射者即言無有未嘗不中然却多一射某云此言近似却不是也豈是顔子射覆自一至十常説出空子貢射覆自二至一常無不中耶道該萬有還未嘗有空者得他還元一路十中八九億者得他發生一路十中二三子貢於萬有路上見得七八只是格物物還未格顔子於元無路上見行八九已是物格與知至為隣耳他們常説世儒只曉得格物不曉得物格正是此様又問億為格物空為物格則格物物格中間亦距千里耶某云箭開時萬里同觀箭到時只一鏃地巧箭莫射髙棊莫著射是巧力所生億是明聰隙現難道静觀動照不是一様神靈只是静觀無礙動照易窮耳命之有理與氣如人之有形與神合下併受無有分層順則都順逆則都逆善作家人説他餓死他亦要仰拾俯掇善讀書人縱是頑鈍他亦要旁稽博覽有此一途纔見工夫為道教之本如論天命原始則只是饑食渇飲不學不慮清明在躬志氣若神人如看得名利亦淡才情亦淡自是理氣兩路俱清如看得名利亦不淡才情亦不淡自是理氣兩路俱濁也人生只此精神先要拿得堅定在堅定裏充拓得鬆便是得力受用只是㸃㸃滴滴在聖賢理路辨其生熟耳一日之間心眼拿定不走錯路不放工夫不趕枝葉又不枯寂作事使他精神在在灌注隨其所見在在會心便是絶大成就人有已便不仁有已便傲傲便無禮無禮便與天下間隔無已便細細便盡禮盡禮便與天下通克巳者只把已聰明才智一一竭盡精神力量一一抖擻要到極細極㣲所在事事物物俱從理路錬得清明視聼言動無一是我自家氣質如此便是格物物格致知知至耳所以天下更無間隔更無人説我無禮便是天下歸仁天下事物稍稍著色便行不去只是白地受采受采如水一般色味聲文一毫不著隨地行去無復險阻江河之礙富貴貧賤患難一毫著心便是不素便行不去素字只是平常戒慎恐懼喜怒哀樂一切安和常有處淡處簡之意凡意不誠總由他不格物不格物所以不格理謂萬物可以意造萬理可以知破如到不造不破去處生成一個龍蟠虎踞不得支離漸漸自露性地所以説是物格知至濓溪云動而無静静而無動物也動而無動静而無静神也物則不通神妙萬物如濓溪此語猶是未嘗格物天下無無動無静之物有常動常静之神中庸一部説天地夫婦鬼神通是此物知獨者該萬知萬者還獨知一者該兩知兩者還一如是格物工夫只從兩端細别立剛與柔立仁與義原始要終知終知至只此知能便是聖人之所斂袵鬼神之所彈指矣性涵動静只是中和任他萬物無情無識有氣有知都是中和生聚得來蕃變得去中和蔵處只是一獨如萬物歸根蟄伏時候個個有戒慎恐懼的意思中和顯處只是一節如萬物旉條生育時候個個有議度數制徳行的意思無過不及不驚不怪雖虎兕龍蛇蜂薑鬼蜮於君子性上有何隔礙此理極是尋常只自家性地看不明白耳自家性地看得明白比人照物動静一般自然喜怒不傷哀樂得度萬物伏蔵與他共獨萬物蕃變與他同節雖有氣質情識種種不齊都為性光収攝得盡作用是性光包羅是性體如説中和則無復體用分處問萬物看來只是好生惡死天地亦是生物之性孟子説盡心知性想此好生之心充拓得盡便是性體與天地一般某云此處極是但有不同凡物有性有情有命好生惡死是萬物之情方生方死是萬物之命或得偏而生或得偏而死是萬物之性虎豹之有慈仁蜂蟻之有禮義魚鼈草木之有信智具種種性與人一般只是包羅充拓全藉吾人大壯説天地之情無妄説萬物之性天地乗時無一非禮之動萬物純質無一詐偽之萌人能盡此兩端便是參贊手叚情是性之所分性是情之所合情自歸萬性自歸一古今唯有周孔思孟識性字楊荀周程只識得質字告子亦錯認質字耳易云繼之者善成之者性善繼天地性成萬物繼天立極是性根上事範圍曲成是性量上事善是萬物所得以生性是萬物所得以成猿静狙躁貓義䑕貪豸直羔馴雁序雉介此皆是質上事不闗性事如性者自是伊得以生伊得以成入水入林能飛能躍的道理此是天地主張不闗品彚能盡得天地主張道理何患萬物陶鑄不成問未發以前性在天地之心已發以後性在萬物身上自家胸中有何生成安頓天地萬物去處某云未發前性亦不落天地已發後性亦不落萬物只是自家看得天地缺陷萬物顛踣便惕然如墜性傷生一様此是我自家繼成本色問如此則是心也云何是性某云若無心如何認性得出問性得天地之始不假思慮纔會中和如心動便著物便費操存猶之分畫便有陰陽如何更以太極陶鑄萬象某云意自分陰陽心以包太極情是爻象全圖從心起手從意分義耳身心原無兩物著物便是妄意意之與識識之與情情之與欲此𩔖皆附身而起誤認為心則心無正面亦無正位都為意識情欲誘向外去若論格致源頭要曉得意識情欲俱是物上精魄不是性地靈光也天備二氣五行留不得一㸃雲霧雲霧盡淨經緯盡呈纔見天之正面風雨晦冥日光常在入夷出晉明體自存此便是盡存正在的消息人曉得天之與日纔曉得性之與心曉得盡存正在纔曉得本體工夫不已無息格得此物十倍分明始信得意識情欲是心邉物初不是心風雨雲雷是日邉物初不是日性之與天皆備萬物不著一物心之與日不著一物乃照萬物只此兩物原無二物知此一事更無他知必有事焉而勿正正字説文反正為乏篆書正與已相近當是乏與已之誤也有事勿乏如不乏祀之乏有事勿已如純亦不已之已則義暢而語順矣問忿􅓰等項皆由身起則是正心又先要脩身了如何是正心要著某云如從心起則是要著如從身起則是後著也知見覺聞皆從心起情欲畏惡皆從身起人從此處看不分明所以顛倒如看得分明則腑臓官骸個個是性光所攝身心修正豈有兩路工夫人從身上求心如向國中覔王終為權貴所亂從心上求身如坐王位覔國只覺殿宇隨身忿􅓰等項所不得其正者只是覔心脩簡不上戒慎恐懼所能得其正者只是從心覔身隠顯分明也外道七處徴心只説得意邉諸路未曽就心中看得入夷出晉赫赫如常湏就夢寐中間認出神之非形情之非識情形動處其實非心神識静中未必是性再破神識以納心端重合形情以歸性始如此十年洞見天地日月星辰纔有定静田地聖人仰觀俯察逺近𩔖物都是坤道所以必用坤道者人生托足便在裏面開口便是學習只有敬義直方不消學習亦要從静辨中來不從静辨中來便有無數風霧遮葢上面氷霜之禍都由學者自為豪傑處心不學積漸所成有此不屑下學一念直至亂臣賊子亦做得去有此專意下學一念直至天地變化草木蕃亦做得去草木托根於地一曲一直禽鳥孚化於鷇載飛載翔當其用力只是本色一日變化皆不自知江水就下河源出山匹夫厲志星蜺變天此事豈人思想所到釋老只是不學無尊道工夫便使後來譸張為幻如當時肯學踐迹入室豈能貽害至於今日問不知人在敦化中間抑在川流裏去某云如此問亦希竒察天察地不礙飛躍是敦化上事鳥以空為實魚以水為空是川流上事也聖人以天地觀身以事業觀天地作用凡世間有形象者都是吾身文字有文字者都是吾身文字註脚過此以往只是魚鳥事業太極與隂陽總是一個動極處正是不動所在曉得此理所以隨寓能安入羣不亂不要光光在静坐處尋起生義問人不能如仲尼都在小徳中沿流赴海而已西漢以來文章人才各不相似恐别有氣化在裏面吾輩囿之而不知耳某云氣化山川皆能囿人只有心思通徹天地仲尼在未學前只是忠信美質加五十年學問便在堯舜文武前頭只恐忠信無基為有無約泰盈虚所蕩耳問認得初體分明只一主静便了如何又著敬字某云純公亦言静坐獨處不難居廣居應天下為難人都於静處著動天都於動處見静除是木石纔得以静為體問若看誠字直於静中看得分明某云不是敬了那看得出上下鳥獸蟲魚草木個個是誠個個與鬼神同體要就静中看他根胎只得百分之一問如是敬者却把上下鳥獸蟲魚草木都作天地鬼神看耶某云自然是如此問釋家可有此意思否某云他看作石火電光那得有此意思鬼神兩字只是不睹不聞中有睹聞只此便是致知便是格物却借祭祀來説耳大學首傳便説此謂誠於中形於外這個鬼神去剔小人之肺肝中庸下叚又説誠則形形則著這個鬼神去贊聖賢之功徳世間只此兩種鬼神皆在不睹不聞有共睹共聞之妙在與知與能有不可知不可能之祕算來只是人心實有此理動而為意此意不誠便有許多邪魔隂慝變現手目此意一誠便有許多神明聖賢當身顯現知之者以為天命人性不知者以為精氣游魂問中庸不於君臣父子夫婦昆弟朋友言誠不於天地鳶魚言誠獨於鬼神言誠果如程子所謂天地功用造化之迹乎某云程張所説鬼神是天地以上事中庸所説鬼神是人身以上事心如火也火輒有影天地以生物為心生便有屈伸人身以交物為心物交便有隠見都是實形取影或正或倒或逺或近在天為災祥在人為寤寐在日用為聼睹形聲極竒極怪極平極常心力大者看鬼神亦大心力小者看鬼神亦小精者看精粗者看粗善言鬼神者莫過於易括之一言曰以齋戒神明其徳其實只是誠字不誠的人看子臣弟友天地鳶魚亦無一物誠者看天下無形無聲無手目無肺肝所在個個是我心光所照所以能酬酢一世變化天下問如此看來祭祀之鬼神是為人心冩照卜蓍之鬼神是為人心傳響有形寫照者見之於祭祀有聲傳響者見之於蓍龜何處是性命所在某云此無形聲者便是性命所在問若此者都是意意生想想生妄如何得到至誠所在某云如此纔要誠誠意只是慎獨慎獨者自一物看到百萬物現有承受只如好色惡臭感目觸鼻自然曉會不假推求所謂知至知至便是明誠問易稱何思何慮聖人不慮而知要此能慮何用某云極星不動處纔能轉為它能轉使天下星辰河嶽都有奠麗如不能轉日月經緯如發車釘何處得明亮來人都説獨中無物曽子説獨中有十目十手人都説皮面相覷夫子獨説肺肝如見以此見肚皮葢屋都是晶亮東西容隠不得一物半物好色惡臭自是人間第一大件物知相觸萬法縁由俱從此起人如曉得䘒血交心聞香捫鼻便曉得四體百骸個個有知不從物來不從意起如曉得屋漏透光肝腸掛面便曉得瓦礫皮膚更無一物細不能掩大不能蔵只此誠意一章更無餘義氣有清濁質有敏鈍自是氣質何闗性上事如火以炎上為性光者是氣其麗於木而有明暗有青赤有燥濕是質豈是性水以潤下為性流者是氣其麗於土而有輕重有晶淖有甘苦是質豈是性天地之大徳曰生生是天地之性亦就理上看來故曰天生蒸民有物冇則民之秉彜好是懿徳不曽以二氣交感者稱性也就形色看出天性是聖人盡性之妙看天下山川草木飛潜動植無一不與吾身相似此從窮理格物來問天之有氣數亦猶人之有氣質性無所麗麗於氣質命無可見見於氣數故言氣質而心性即在其中言氣數而天命即在其中不可分天命為理氣數為數猶不可分性為理氣質為質也某云説合一處何嘗不合説精㣲處自然要條段分明説氣數則有災沴之不同説天命則以各正為體説氣質則有智愚之異等説人性則以至善為宗氣數猶五行之吏分布九野與晝夜循環猶人身之有脉絡消息天命猶不動之極向離出治不與斗柄俱旋即人身之心性是也心性不與四肢分咎天命不與氣數分功天有福善禍淫人有好善惡惡中間寂然感而遂通再著不得一毫氣質氣數不睹不聞無聲無臭只是性命宅子於不睹聞處見睹聞於無聲臭處斷聲臭纔是宅子上認著主翁凡説性命只要盡心者不欺本心事事物物當空照過撞破琉璃與天同道四圍萬里不見浮雲萬物都有個真源知所由起知所由止知擴知充此一路火光如從電來則是隔山雷影不是本光如從燈來則是竈下吹灰不成獨照只此一物通透萬物要在意識情欲邉頭認它如借電燈以凖刻漏也天下只是一物更無兩物日月四時鬼神天地亦只是一物更無兩物説是兩物者人所不知龜亦不知蓍亦不知了説是一物者何以人所不知龜又能知蓍又能知只是人多思慮如泛海洋泛看流星無復南北到有一定東西範圍不過曲成不遺兩膝貼地一日一夜周行十三萬里若竟此言只恐世人吐舌也要知天地只是殻子日徃月來寒徃暑來只是脉絡周行大數無數聖賢只為天地療得心痛問物來觸心知以虚應知往接物意縁觸生虚觸之間依然無物豈應心裏有物蔵知某云如此則天地間盡數是物何獨爾心無意無知湏知爾身的有自來又知爾心的有自受止涵萬物動發萬知函葢之間若無此物日月星辰一齊墜落譬如泓水仰照碧落上面亦有星光下面亦有星光照爾眼中亦有星光若無此心伊誰别察又如璇臺四臨曠野中置安牀日起此亦不起月落此亦不落漢轉斗廻此不轉廻依然自在打破大地二萬一千里這個心血正在中間為他發光浮在地面要與山川動植日月星辰思量正法也此處看不明白禮樂詩書都不消説知意心身生千萬物此千萬物各印爾知此是博約路頭通天徹地月自不殊因眼異色既有異眼亦生異舌孟子説不動心告子亦説不動心同一輪車有生有死詩説皇皇后帝佛説衆鬼夜乂同一空中有精有怪吾儒戒懼只是仁人孝子事親事天之常如無此心只是鬼奴風犢之具畏敬有所恐懼正是明淨天中辨出雷根雹子如是無風無雨何人不説天晴或問云虞廷説人心道心已犯兩路何處是太極定針某云人心道心猶之天道人道天道極㣲難得不思不勉只要人涵養漸到徔容田地使㣲者自𢎞人道極危難得便精便一只要人擇執漸到誠明去處使危者自平不是此一心便有理欲善惡俱出性地也或問云如此中原無兩路何為又著擇執費許多圖維某云都是向善一路但湏擇執乃中中乃精精乃一如不到精一執中猶近逺路頭如何立命立教或問云如夫子説性相近便還有周程意思某云不然譬如桀紂無羣小青藍其初亦近於堯舜此處便是性善决説不得堯舜無禹臯䕶持必至於桀紂也繼善成性是天命合人的道理繼志述事是人道合天的道理譬如祖父遺下産業此都是極好意思到其間田土佳惡物産精粗便是肥磽氣質上事如何説祖父意有善惡也大滌問業下叚同劉器之嘗説格物反覆其手曰只是此處看不透故湏格物此是從克巳處入手於形色看到天性上是直捷路頭邵伯温亦説格物云先子内外篇只是萬物皆備於我學者格物只看易詩書春秋此是從博文處入手於理義看到至命上是漸次路頭古今學者只是此兩路顔子喟然之時才情未竭夫子誘他於文禮上作工夫及至才情竭後鑽仰莫從仁義禮樂漸成墮黜看一身聰明都無著處此是復見天心時候學者湏兼此兩路工夫莫作南頓北漸誤墮禪門也明儒學案卷五十六
