body:
  text: 明儒學案卷十餘姚黄宗羲撰姚江學案有明學術白沙開其端至姚江而始大明蓋從前習熟先儒之成説未嘗反身理會推見至隱所謂此亦一述朱耳彼亦一述朱耳高忠憲云薛文清呂涇野語録中皆無甚透悟亦為是也自姚江指㸃出良知人人現在一返觀而自得便人人有個作聖之路故無姚江則古來之學脈絶矣然致良知一語發自晚年未及與學者深究其旨後來門下各以意見攙和說𤣥說妙幾同射覆非復立言之本意矣先生之格物謂致吾心良知之天理於事事物物則事事物物皆得其理以聖人教人只是一個行如博學審問愼思明辨皆是行也篤行之者行此數者不已是也先生致之於事物致字即是行字以救空空窮理只在知上討個分曉之非乃後之學者測度想像求見本體只在知識上立家儅以為良知則先生何不仍窮理格物之訓先知後行而必欲自為一說邪天泉問答無善無惡者心之體有善有惡者意之動知善知惡是良知為善去惡是格物今之解者曰心體無善無惡是性由是而發之為有善有惡之意由是而有分别其善惡之知由是而有為善去惡之格物層層自内而之外一切皆是粗機則良知己落後著非不慮之本然故鄧定宇以為權論也其實無善無惡者無善念惡念耳非謂性無善無惡也下句意之有善有惡亦是有善念惡念耳兩句只完得動靜二字他日語薛侃曰無善無惡者理之靜有善有惡者氣之動即此兩句也所謂知善知惡者非意動於善惡從而分别之為知知亦只是誠意中之好惡好必於善惡必於惡無是無非而不容已者虛靈不昧之性體也為善去惡只是率性而行自然無善惡之夾雜先生所謂致吾心之良知於事事物物也四句本是無病學者錯㑹反致彼以無善無惡言性者謂無善無惡斯為至善善一也而有有善之善有無善之善無乃斷滅性種乎彼在發用處求良知者認已發作未發教人在致知上著力是指月者不指天上之月而指地上之光愈求愈遠矣得羲說而存之而後知先生之無弊也浙中十七人江右二十七人南中九人楚中二人北方七人粵閩二人姚江學案文成王陽明先生守仁附許半圭王司輿王守仁字伯安學者稱為陽明先生餘姚人也父華成化辛丑進士第一人仕至南京吏部尚書先生娠十四月而生祖母岑夫人夢神人送兒自雲中至因命名為雲五歲不能言有異僧過之曰可惜道破始改今名豪邁不覊十五歲縱觀塞外經月始返十八歲過廣信謁婁一齋慨然以聖人可學而至登𢎞治己未進士第授刑部主事改兵部逆瑾矯旨逮南京科道官先生抗疏救之下詔獄廷杖四十謫貴州龍塲驛丞瑾遣人跡而加害先生託投水脫去得至龍塲瑾誅知廬陵縣歴吏部主事員外郎郎中陞南京太僕寺少卿鴻臚寺卿時䖍閩不靖兵部尚書王瓊特舉先生以左僉都御史巡撫南贑未幾遂平漳南橫水桶岡大㡌浰頭諸冦己卯六月奉勅勘處福建叛軍至豐城而聞宸濠反遂返吉安起兵討之宸濠方圍安慶先生破南昌濠返兵自救遇於樵舍三戰俘濠武宗率師親征羣小張忠許泰欲縱濠鄱湖待武宗接戰而後奏凱先生不聽乘夜過玉山集浙江三司以濠付太監張永張永者為武宗親信羣小之所憚也命兼江西巡撫又明年陞南京兵部尚書封新建伯嘉靖壬午丁冢宰憂丁亥原官兼左都御史起征思田思田平以歸師襲八寨斷藤峽破之先生幼夢謁馬伏波廟題詩於壁至是道出祠下恍如夢中時先生已病疏請告至南安門人周積侍病問遺言先生曰此心光明亦復何言頃之而逝七年戊子十一月二十九日也年五十七先生之學始泛濫於詞章繼而徧讀考亭之書循序格物顧物理吾心終判為二無所得入於是出入於佛老者久之及至居夷處困動心忍性因念聖人處此更有何道忽悟格物致知之㫖聖人之道吾性自足不假外求其學凡三變而始得其門自此之後盡去枝葉一意本原以黙坐澄心為學的有未發之中始能有發而中節之和道德言動大率以收斂為主發散是不得已江右以後專提致良知三字黙不假坐心不待澄不習不慮出之自有天則蓋良知即是未發之中此知之前更無未發良知即是中節之和此知之後更無已發此知自能收斂不須更主於收斂此知自能發散不須更期於發散收斂者感之體靜而動也發散者寂之用動而靜也知之眞切篤實處即是行行之明覺精察處即是知無有二也居越以後所操益熟所得益化時時知是知非時時無是無非開口即得本心更無假借凑泊如赤日當空而萬象畢照是學成之後又有此三變也先生憫宋儒之後學者以知識為知謂人心之所有者不過明覺而理為天地萬物之所公共故必窮盡天地萬物之理然後吾心之明覺與之渾合而無間說是無内外其實全靠外來聞見以塡補其靈明者也先生以聖人之學心學也心即理也故於致知格物之訓不得不言致吾心之天理於事事物物以知識為知則輕浮而不實故必以力行為工夫良知感應神速無有等待本心之明即知不欺本心之明即行也不得不言知行合一此其立言之大㫖不出於是而或者以釋氏本心之說頗近於心學不知儒釋界限只一理字釋氏於天地萬物之理一切置之度外更不復講而止守此明覺世儒則不恃此明覺而求理於天地萬物之間所謂絶異然其歸理於天地萬物歸明覺於吾心則一也向外尋理終是無源之水無根之木縱使合得本體上已費轉手故沿門乞火與合眼見暗相去不遠㸃出心之所以為心不在明覺而在天理金鏡已墜而復收遂使儒釋疆界𣺌若山河此有目者所覩也試以孔孟之言證之致吾良知於事物事物皆得其理非所謂人能𢎞道乎若理在事物則是道能𢎞人矣告子之外義豈滅義而不顧乎亦於事物之間求其義而合之正如世儒之所謂窮理也孟子何以不許之而四端必歸之心哉嗟乎糠粃眯目四方易位而後先生可疑也隆慶初贈新建侯諡文成萬厯中從祀孔子廟庭許半圭先生璋璋字半圭越之上虞人淳質苦行潛心性命之學白袍草屨挾一衾而出欲訪白沙於嶺南王司輿送之詩云去歲逢黃石今年訪白沙至楚見白沙之門人李承箕畱大崖山中者三時質疑問難大崖語之以靜坐觀心曰拘拘陳編曰居敬窮理者予不然嘐嘐虛跡曰傍花隨柳者予不然罔象無形求長生不死之根者予不然先生亦不至嶺南而返陽明養病洞中惟先生與司輿數人相對危坐忘言冥契陽明自江右歸越每訪先生菜羮麥飯信宿不厭先生殁陽明題其墓曰處士許璋之墓先生於天文地理壬遁孫吳之術靡不究心正德中嘗指乾象謂陽明曰帝星今在楚矣已而世宗起於興邸其占之奇中如此王黃舉先生文轅文轅字司輿號黃轝子越之山隂人七歲時拾遺金一鐉坐待失者歸之既長多病遂習靜隱居勵志力行鄉人咸樂親之讀書多自得不牽章句嘗曰朱子註說多不得經意聞者怪之惟陽明與之友莫逆也陽明將之南贑先生語其門人曰陽明此行必立事功問其故曰吾觸之不動矣其後先生殁陽明方講良知之學時多訕之者歎曰安得起王司輿於九原乎語錄志道懇切固是誠意然急迫求之則反為私已不可不察也日用間何莫非天理流行但此心常存而不放則義理自熟孟子所謂勿忘勿助深造自得者矣答徐成之聖人之心纖翳自無所容不消磨刮若常人之心如斑垢駁雜之鏡須痛加刮磨一番盡去其駁蝕然後纖塵即見纔拂便去亦自不消費力到此已是識得仁體矣若駁雜未去其間固自有一㸃明處塵埃之落固亦見得亦纔拂便去至堆積於駁蝕之上終弗能見也此學利困勉之所由異弗以為煩難而疑之也凡人情好易而惡難其間亦自有私意氣習纒蔽在識破後自然不見其難矣向時未見得向裏意思此工夫自無可講處今已見此一層却恐好易惡難便流入禪釋去也昨論儒釋之異明道所謂敬以直内則有之義以方外則未畢竟連敬以直内亦不是者已說到八九分矣答黃宗賢應原忠之已見後方知難正為此鏡子時時不廢拂拭在儒釋辨明道尚泛調停至先生始一刀截斷僕近時與友朋論學惟說立誠二字吾人為學當從心髓入微處用力自然篤實光輝雖私欲之萌眞是紅爐㸃雪天下之大本立矣若就標末粧綴比擬凡平日所謂學問思辨者適足以為長倣遂非之資自以為進於高明廣大而不知陷於狼戾險嫉亦誠可哀也已與黄宗賢謂誠無為便是心髓入微處良知即從此發竅者故之立天下之大本看來良知猶是第二義也吾輩通患正如池面浮萍隨開隨蔽未論江海但在活水浮萍即不能蔽何者活水有源池水無源有源者由已無源者從物故凡不息者有源作輟者皆無源故耳變化氣質居常無所見惟當利害經變故遭屈辱平時憤怒者到此能不憤怒憂惶失措者到此能不憂惶失措始是得力處亦便是用力處天下事雖萬變吾所以應之不出乎喜怒哀樂四者此為學之要而為政亦在其中矣與王純甫在物為理處物為義在性為善因所指而異其名實皆吾之心也心外無物心外無事心外無理心外無義心外無善吾心之處事物純乎理而無人偽之雜謂之善非在事物有定所可求也處物為義是吾心之得其宜也義非在外可襲而取也格者格此也致者致此也必曰事事物物上求個至善是離而二之也伊川所云纔明彼即曉此是猶謂之二性無彼此理無彼此善無彼此也先生恢復心體一齊俱了眞大有功於聖門與孟子性善之說同大學之所謂誠意即中庸之所謂誠身也大學之所謂格物致知即中庸之所謂明善也博學審問愼思明辨篤行皆所以明善而為誠身之功也非明善之外别有所謂誠身之功也格物致知之外又豈别有所謂誠意之功乎書之所謂精一語之所謂博文約禮中庸之所謂尊德性而道問學皆若此而已矣答王某格先生既言致即中庸明善之功不離學問思辨行則與朱子之說何異乃又曰格其物之不正以歸於正則未免自相齟齬未知孰是學絶道䘮俗之陷溺如人在大海波濤中且須援之登岸然後可授之衣而與之食若以衣食投之波濤中是適重其溺彼將不以為德而反以為尤矣故凡居今之時且須隨機導引因事啟沃俟其感發興起而後開之以其說則為力易而收效溥使在我無功利之心雖錢榖兵甲搬柴運水何往而非實學何事而非天理况子史詩文之𩔖乎使在我尚有功利之心則雖日談道德仁義亦只是功利之事況子史詩文之𩔖乎一切屏絶之說猶是泥於舊聞平日用功未有得力處與陸元靜數年切磋只得立志辨義利若於此未有得力處却是平日所講盡成虛話平日所見皆非實得義利二字是學問大關鍵亦即是儒釋分途處經一蹶者長一智今日之失未必不為後日之得但已落第二義須從第一義上著力一眞一切眞與薛尚亷過識得第一義即遷善改皆第一義理無内外性無内外故學無内外講習討論未嘗非内也反觀内省未嘗遺外也夫為學必資於外求是以已性為有外也是義外也用智者也謂返觀内省為求之於内是以已性為有内也是有我也自私者也是皆不知性之無内外也故曰精義入神以致用也利用安身以崇德也性之德也合内外之道也此可以知格物之學矣格物者大學之實下手處徹首徹尾自始學至聖人只此工夫而已非但入門之際有此一叚也夫正心誠意致知格物皆所以修身而格物者其所以用力日可見之地故格物者格其心之物也格其意之物也格其知之物也正心者正其物之心也誠意者誠其物之意也致知者致其物之知也此豈有内外彼此之分哉答羅整庵生整庵有答先書云前三物為物三後三物為物一自相矛盾要之物一也而不能不散而為兩散而為萬先生之言自是八面玲瓏夫子謂子貢曰賜也汝以予為多學而識之者與對曰然非與子曰非也予一以貫之然則聖人之學不有要乎彼釋氏之外人倫遺物理而墮於空寂者固不得謂之明其心矣若世儒之外務講求考索而不知本諸心者其亦可以窮理乎與夏敦夫子洙泗淵源原是如此得曾發明更是朴實頭地曾子就誠處指㸃先生就明處指㸃一而已矣心無動靜者也其靜也者以言其體也其動也者以言其用也故君子之學無間於動靜其靜也常覺而未嘗無也故常應其動也常定而未嘗有也故常寂常應常寂動靜皆有事也是之謂集義集義故能無祗悔所謂動亦定靜亦定者也心一而已靜其體也而復求靜根焉是撓其體也動其用也而懼其易動焉是廢其用也故求靜之心即動也惡動之心非靜也是之謂動亦動靜亦動將迎起伏相尋於無窮矣故循理之謂靜從欲之謂動欲也者非必聲色貨利外誘也有心之私皆欲也故循理焉雖酬酢萬變皆靜也濂溪所謂主靜無欲之謂也是謂集義者也從欲焉雖心齋坐忘亦動也告子之强制正助之謂也是外義者也答倫彥式表與定性書相為裡且以所見者實體諸心必將有疑果無疑必將有得果無得又必有見答方叔賢孟子云是非之心智也是非之心人皆有之即所謂良知也孰無是良知乎但不能致之耳易曰知至至之知至者知也至之者致知也此知行之所以一也與陸元靜良知之智實自惻隱之仁來妄心者動也照心非動也恆照則恆動恆靜天地之所以恆久而不已也照心固照也妄心亦照也其為物不貳則其生物不息有刻暫停則息矣非至誠無息之學也照心非動者以其發於本體明覺之自然而未嘗有所動也有所動則妄矣妄心亦照者以其本體明覺之自然者未嘗不存於其中但有所動耳無所動即照矣無妄無照非以妄為照以照為妄也照心為照妄心為妄是猶有妄有照也有妄有照則猶二也貳則息矣無妄無照則不貳不貳則不息矣心之本體無起無不起雖妄念之發而良知未嘗不在但人不知存則有時而或放耳雖昏塞之極而良知未嘗不明但人不知察則有時而或蔽耳雖有時而或放其體實未嘗不在也存之而已耳雖有時而或蔽其體實未嘗不明也察之而已耳理無動者也常知常存常主於理即不睹不聞無思無為之謂也不睹不聞無思無為非槁木死灰之謂睹聞思為一於理而未嘗有所睹聞思為即是動而未嘗動也未發之中即良知也無前後内外而渾然一體者也有事無事可以言動靜而良知無分於有事無事也寂然感通可以言動靜而良知無分於寂然感通也動靜者所遇之時心之本體固無分於動靜也能戒愼恐懼者是良知必欲此心純乎天理而無一毫人欲之私此作聖之功也然欲為此者非防於未萌之先而克於方萌之際不能也此正中庸戒愼恐懼大學致知格物之功舍此之外無别功矣不思善不思惡時認本來面目此佛氏為未識本來面目者設此方便本來面目即吾聖門所謂良知今既認得良知明白已不消如此說矣隨物而格是致知之功即佛氏之常惺惺亦是常存他本來面目耳體叚工夫大略相似但佛氏有個自私自利之心所以便不同病瘧之人瘧雖未發而病根自在則亦安可以其未發而遂忘服藥調理之功乎若必待瘧發而後服藥調理則既晚矣君子之所謂敬畏者非恐懼憂患也乃戒懼不睹恐懼不聞之謂耳君子之所謂樂者非曠蕩放逸縱情肆意也乃其心體不累於欲無入而不自得之謂耳夫心之本體即天理也天理之昭明靈覺所為良知也君子之戒愼恐懼惟恐其昭明靈覺者或有所昏昧放逸流於非僻邪妄而失其本體之正耳戒愼恐懼之功無時或間則天理常存而其昭明靈覺之本體無所虧蔽無所牽擾無所恐懼憂患無所好樂忿􅓰無所意必固我無所歉餒愧怍和融瑩徹充塞流行動容周旋而中禮從心所欲而不踰斯乃所謂眞樂矣是樂生於天理又當存天理常存生於戒愼恐懼之無間孰謂敬畏之增反為樂之累耶最是發明宋儒主敬之說與舒國用繫言何思何慮是言所思所慮只是一個天理更無别思别慮耳非謂無思無慮也故曰同歸而殊途一致而百慮天下何思何慮云殊途云百慮則豈謂無思無慮耶心之本體即是天理則是一個更何思慮得天理原是寂然不動原是感而遂通學者用功雖千思萬慮只是要復他本來體用而已不是以私意去安排思索出來故明道云君子之學莫若廓然而大公物來而順應若以私意安排思索便是用智自私矣何思何慮正是工夫在聖人分上便是自然的在學者分上便是勉然的如此方與不思善惡之說逈異答周道通性善之端須在氣上始見得若無氣亦無可見矣惻隱羞惡辭讓是非即是氣程子謂論性不論氣不備論氣不論性不明亦是為學者各執一邊只得如此說若見得自性明白時氣即是性性即是氣原無性氣之可分也先生之見已到八九分但云性即是氣氣即是性則合更有商量在謹獨即是致良知與黄勉之凡謂之行者只是著實去做這件事若著實做學問思辨工夫則學問思辨亦便是行矣學是學做這件事問是問做這件事思辨是思辨做這件事則行亦便是學問思辨矣若謂學問思辨之然後去行却如何懸空先去學問思辨得行時又如何去得個學問思辨的事行之明覺精察處便是知知之眞切篤實處便是行若行而不能明覺精察便是冥行便是學而不思則罔所以必須說個知知而不能眞切篤實便是妄想便是思而不學則殆所以必須說個行原來只是一個工夫凡古人說知行皆是就一個工夫上補偏救弊說不似今人截然分作兩件事做如今說知行合一雖亦是就今時補偏救弊說然知行體叚亦本來如是知行原是兩個字說一個工夫這一個工夫須著此兩個字方說得完全無弊病若頭腦處見得分明見得原是一個頭腦則雖把知行分作兩個說畢竟將來做那一個工夫則始或未便融㑹終所謂百慮而一致矣若頭腦見得不分明原看做兩個了則雖把知行合作一個說亦恐終未有湊泊處況又分作兩截去做則是從頭至尾更没討下落處也所謂頭腦是良知二字夫物理不外吾心外吾心而求物理無物理矣遺物理而求吾心吾心又何物耶心之體性也性即理也故有孝親之心即有孝之理無孝親之心即無孝之理矣有忠君之心即有忠之理無忠君之心即無忠之理矣理豈外於吾心耶晦菴謂人之所以為學者心與理而已心雖主乎一身而實管乎天下之理理雖散乎萬事而實不外乎一人之心是其一分一合之間而未免已啓學者心理為二之弊明道云只窮理便盡性至命故必仁極仁而後謂之能窮仁之理義極義而後謂之能窮義之理仁極仁則盡仁之性義極義則盡義之性矣學至於窮理至矣而尚未措之於行天下寧有是耶是故知不行之不可以為學則知不行之不可以為窮理矣知不行之不可以為窮理則知知行之合一並進而不可以分為兩節事矣夫萬事萬物之理不外於吾心而必曰窮天下之理是殆以吾心之良知為未足而必外求於天下之廣以裨補增益之是猶析心與理而為二也夫學問思辨篤行之功雖其困勉至於人一已百而擴充之極至於盡性知天亦不過致吾心之良知而已良知之外豈復有加於毫末乎今必曰窮天下之理而不知反求諸其心則凡所謂善惡之幾眞妄之辨者舍吾心之良知亦將何以致其體察乎夫良知之於節目事變猶規矩尺度之於方圓長短也節目事變之不可預定猶方圓長短之不可勝窮也故規矩誠立則不可欺以方圓而天下之方圓不可勝用矣尺度誠陳則不可欺以長短而天下之長短不可勝用矣良知誠致則不可欺以節目事變而天下之節目事變不可勝應矣毫釐千里之謬不於吾心良知一念之微而察之亦將何所用其學乎是不以規矩而欲定天下之方圓不以尺度而欲定天下之長短吾見其乖張謬戾日勞而無成也已吾子謂語孝於温凊定省孰不知之然而能致其知者鮮矣若謂粗知温凊定省之儀節而遂謂之能致其知者凡知君之當仁者皆可謂之能致其仁之知知臣之當忠者皆可謂之能致其忠之知則天下孰非致知者耶以是而言可以知致知之必在於行而不行之不可以為致知也明矣知行合一之體不益較然矣乎夫舜之不告而娶豈舜之前已有不告而娶者為之凖則故舜得以考之何典問諸何人而為此耶抑亦求諸其心一念之良知權輕重之宜不得已而為此耶武之不葬而興師豈武之前已有不葬而興師者為之準則故武得以考之何典問諸何人而為此耶抑亦求諸其心一念之良知權輕重之宜不得已而為此耶使舜之心而非誠於為無後武之心而非誠於為救民則其不告而娶與不葬而興師乃不孝不忠之大者而後之人不務其良知以精察義理於此心感通酬酢之間顧欲懸空討論此等變常之事執之以為制事之本以求臨事之無失其亦遠矣良知之說只說得個即心即理即知即行更無别法天下古今之人其情一而已矣先王制禮皆因人情而為之節文是以行之萬世而皆準其或反之吾心而有所未安者非其傳記之訛缺則必古今風氣習俗之異宜者矣此雖先王未之有亦可以義起三王之所以不相襲禮也若徒拘泥於古不得於心而𡨕行焉是乃非禮之禮行不著而習不察者矣一部禮經皆如此看學絶道䘮之餘茍有興起向慕於學者皆可以為同志不必銖稱寸度而求其盡合於此以之待人可也若在我之所以為造端立命者則不容有毫髪之或爽矣道一而已仁者見仁知者見知釋氏之所以為釋老氏之所以為老百姓日用而不知皆是道也寧有二乎今古學術之誠偽邪正何啻碔砆美玉有眩惑終身而不能辨者正以此道之無二而其變動不拘充塞無間縱横顚倒皆可推之而通世之儒者各就其一偏之見而又飾之以比擬倣像之功文之以章句假借之訓其為習熟既足以自信而條目又足以自安此其所以誑已誑人終身没溺而不悟焉耳然其毫釐之差而乃致千里之謬非誠有求為聖人之志而從事於惟精惟一之學者莫能得其受病之源而發其神奸之所由伏也若仁之不肖蓋亦常陷溺於其間者幾年倀倀然既自以為是矣賴天之靈偶有悟於良知之學然後悔其向之所為者固包藏禍機作偽於外而勞心日拙者也十餘年來雖痛自洗剔創艾而病根深痼萌蘖時生所幸良知在我操得其要譬猶舟之得舵雖驚風巨浪顚沛流離尚猶得免於傾覆者也夫舊習之溺人雖已覺悔悟而其克治之功尚且其難若此又况溺而不悟日益以深者亦將何所抵極乎只一偽字是神奸攸伏處以先生之善變也經如許煆鍊而渣滓未盡猶然不廢力如此人者天地萬物之心也心者天地萬物之生也心即天言心則天地萬物皆舉之矣答季明德大抵學問工夫只要主意頭腦的當若主意頭腦專以致良知為事則凡多聞多見莫非致良知之功蓋日用之間見聞酬酢雖千頭萬緖莫非良知之發用流行除却見聞酬酢亦無良知可致矣答歐陽崇一學者往往說勿忘勿助工夫甚難才著意便是助才不著意便是忘問之云忘是忘個甚麽助是助個甚麽其人黙然無對因與說我此間講學却只說個必有事焉不說勿忘勿助必有事焉者只是時時去集義若時時去用必有事的工夫而或有時間斷此便是忘了即須勿忘時時去用必有事的工夫而或有時欲速求效此便是助了即須勿助工夫全在必有事上勿忘勿助只就其間提撕警覺而已若工夫原不間斷不須更說勿忘原不欲速求效不須更說勿助今却不去必有事上用工而乃懸空守著一個勿忘勿助如此燒鍋煮飯鍋内不曾漬水下米而乃專去添柴放火吾恐火侯未及調停而鍋先破裂矣所謂時時去集義者只是致良知說集義則一時未見頭腦說致良知當下便有用功實地答聶文蔚存致良知只是天理之本然良知只是一個隨他發見流行處當下具足更無去來不須假借然其發見流行處却自有輕重厚薄毫髮不容増減者所謂天然自有之中也雖則輕重厚薄毫髪不容增減而原來只是一個明道云吾學雖有所受然天理二字却是自家體認出來良知即是天理體認者實有諸已之謂耳與馬子華派此是先生的明道處凡人言語正到快意時便截然能忍黙得意氣正到發揚時便翕然能收斂得憤怒嗜欲正到騰沸時便廓然能消化得此非天下之大勇不能也然見得良知親切時其工夫又自不難與宗賢象山文集所載未嘗不教其從讀書窮理而自謂理㑹文字頗與人異者則其意實欲體之於身其亟所稱述以誨人者曰居處恭執事敬與人忠曰克已復禮曰萬物皆備於我反身而誠樂莫大焉曰學問之道無他求其放心而已曰先立乎其大者而小者不能奪是數言者孔孟之言也惡在其為空虛者乎獨其易簡覺悟之說頗為當時所疑然易簡之說出於繫辭覺悟之說雖有同於釋氏然釋氏之說亦自有同於吾儒而不害其為異者惟在於幾微毫髪之間而已晦庵之言曰居敬窮理曰非存心無以致知曰君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離於須臾之頃也是其為言雖未嘗瑩亦何嘗不以尊德性為事而又惡在其為支離者乎獨其平日汲汲於訓解雖韓文楚辭隂符叅同之屬又必與之註釋考辨而論者遂疑其玩物又其心慮學者之躐等而或失之於妄作使必先之以格物而無不明然後有以實之於誠正而無所謬世之學者掛一漏萬求之愈繁而失之愈遠至有疲力終身苦其難而卒無所入則遂議其支離不知此乃後世學者之弊當時晦庵之自為亦豈至是乎僕嘗以為晦庵之與象山雖其所為學者若有不同而要皆不失為聖人之徒今晦庵之學天下之人童而習之既已入人之深有不容於論辨者獨象山之學以其與晦庵之言有牴牾而遂藩籬之使若由賜之殊科焉則可矣乃擯放廢斥若碔砆之與美玉則豈不過甚矣乎夫晦庵折衷羣儒之說以發明六經語孟之旨於天下其嘉惠後學之心眞有不可得而議者而象山辨義利之分立大本求放心以示後學篤實為已之道其功亦寧可得而盡誣之而世之儒者附和雷同不究其實而概目之以禪學則誠可寃也已答徐成之凡工夫只是要簡易眞切愈眞切愈簡易愈簡易愈眞切寄安福諸同志作簡易眞切是良知二字手法傳習錄愛問知止而后有定朱子以為事事物物皆有定理似與先生之說相戾曰於事事物物上求至善是義外也至善是心之本體只是明明德到至精至一處便是然亦未嘗離却事物本註所謂盡夫天理之極而無一毫人欲之私者得之徐愛記印天理人欲四字是朱王合處奚必晚年定論愛問至善只求諸心恐於天下事理有不能盡曰心即理也此心無私欲之蔽即是天理不須外面添一分以此純乎天理之心發之事父便是孝發之事君便是忠發之交友治民便是信與仁只在此心去人欲存天理上用功便是愛曰如事父一事其間温凊定省之𩔖有許多節目亦須講求否曰如何不講求只是有個頭腦只就此心去人欲存天理上講求如講求冬温也只是要盡此心之孝恐怕有一毫人欲間雜講求夏凊也只是要盡此心之孝恐怕有一毫人欲間雜此心若無人欲純是天理是個誠於孝親之心冬時自然思量父母寒自去求温的道理夏時自然思量父母熱自去求凊的道理譬之樹木這誠孝的心便是根許多條件便是枝葉須先有根然後有枝葉不是先尋了枝葉然後去種根禮記孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容便是如此至善本在吾心賴先生恢復愛問今人儘有知父當孝兄當弟者却不能孝不能弟知行分明是兩件曰此已被私欲間斷不是知行本體未有知而不行者知而不行只是不知聖賢教人知行正是要復那本體故大學指個眞知行與人看說如好好色如惡惡臭見好色屬知好好色屬行只見好色時已自好了不是見後又立個心去好聞惡臭屬知惡惡臭屬行只聞惡臭時已自惡了不是聞後别立個心去惡愛曰古人分知行為兩亦是要人見得分曉一行工夫做知一行工夫做行則工夫始有下落曰此却失了古人宗旨仁嘗說知是行的主意行是知的工夫知是行之始行是知之成若㑹得時只說一個知己自有行在只說一個行己自有知在古人所以既說知又說行者只為世間有一種人懵懵懂懂任意去做便不解思維省察只是個冥行妄作所以必說個知方纔行得是又有一種人茫茫蕩蕩懸空去思索全不肎著實躬行只是個揣摩影響所以必說一個行方纔知得眞此是古人不得已補偏救弊的說話今若知得宗旨即說兩個亦不妨亦只是一個若不㑹宗旨便說一個亦濟得甚事只是間說話只見那好色時已自好了不是見了後又立個心去好只聞那惡臭時己自惡了不是聞了後又立個心去惡此是先生洞見心體處既不是又立個心去好惡則決不是起個意去好惡可知固知意不可以起㓕言也愛問格物物字即是事字皆從心上說曰然身之主宰便是心心之所發便是意意之本體便是知意之所在便是物如意在於事親即事親便是一物意在於事君即事君便是一物意在於仁民愛物即仁民愛物便是一物意在於視聽言動即視聽言動便是一物所以說無心外之理無心外之物中庸言不誠無物大學明明德之功只是個誠意誠意之功只是個格物以心之所發言意意之所在言物則心有未發之時却如何格物即請以前好惡之說叅之知是心之本體心自然會知見父自然知孝見兄自然知弟見孺子入井自然知惻隱此便是良知不假外求若良知之發更無私意障礙即所謂充其惻隱之心而仁不可勝用矣常人不能無私意所以須用致知格物之功勝私復禮良知更無障礙得以充塞流行便是致其知知致則意誠既云至善是心之本體又云知是心之本體蓋知只是知善知惡知善知惡正是心之至善處既謂之良知決然私意障礙不得常人亦與聖人同問博約曰禮字即是理字理之發見可見者謂之文文之隱微不可見者謂之理只是一物約禮只是要此心純是一個天理要此心純是天理須就理之發見處用功如發見於事親時就在事親上學存此天理發見於事君時就在事君上學存此天理至於作止語黙無處不然這便是博學於文便是約禮的工夫博文即是惟精約禮即是惟一愛問道心常為一身之主而人心每聽命以先生精一之訓推之此語似有弊曰然心一也未雜於人謂之道心雜以人偽謂之人心人心之得其正者即道心道心之失其正者即人心初非有二心也程子謂人心即人欲道心即天理語若分析而意實得之今曰道心為主而人心聽命是二心也天理人欲不並立安有天理為主人欲又從而聽命者愛因舊說汩沒始聞先生之教駭愕不定無入頭處其後聞之既熟反身實踐始信先生之學為孔門嫡傳舍是皆旁蹊小徑斷港絶河矣如說格物是誠意工夫明善是誠身工夫窮理是盡性工夫道問學是尊德性工夫博文是約禮工夫惟精是惟一工夫此𩔖始皆落落難合久之不覺手舞足蹈愚按曰仁為先生入室弟子所記語錄其言去人欲存天理者不一而足又曰至善是心之本體然未嘗離事物又曰即盡乎天理之極處則先生心宗教法居然只是宋儒矩矱但先生提得頭腦清楚耳澄問主一之功如讀書則一心在讀書上接客則一心在接客上可以為主一乎曰好色則一心在好色上好貨則一心在好貨上可以為主一乎主一是專主一個天理陸澄記孟源有自是好名之病先生喻之曰此是汝一生大病根譬如方丈地内種此一大樹雨露之滋土脈之力只滋養得這個大根四旁縱要種些嘉穀上被此樹遮覆下被此樹盤結如何生長得成須是伐去此樹纖根勿畱方可種植嘉種不然任汝耕耘培壅只滋養得此根問靜時亦覺意思好才遇事便不同如何曰是徒知養靜而不用克己工夫也人須在事上磨鍊方立得住方能靜亦定動亦定先生又說個克已即存理去欲之别名問上達工夫曰後儒教人纔陟精微便謂上達未當學且說下學是分下學上達為二也夫目可得見耳可得聞口可得言心可得思者皆下學也目不可得見耳不可得聞口不可得言心不可得思者上達也如木之栽培灌溉是下學也至於日夜之滋長條達暢茂乃是上達人安能與其力哉凡聖人所說雖極精微俱是下學學者只從下學裡用功自然上達去不必别尋上達工夫問寧靜存心時可為未發之中否曰今人存心只定得氣當其寧靜時亦只是氣寧靜不可以為未發之中曰未便是中莫亦是求中工夫曰只要去人欲存天理方是工夫靜時念念去欲存理動時念念去欲存理不管寧靜不寧靜若靠著寧靜不惟有喜靜厭動之弊中間許多病痛只是潛伏在終不能絶去遇事依舊滋長以循理為主何嘗不寧靜以寧靜為主未必能循理省察是有事時存養存養是無事時省察定者心之本體天理也動靜所遇之時也唐詡問立志是常存個善念要為善去惡否曰善念存時即是天理此念即善更思何善此念非惡更去何惡此念如樹之根芽立志者長立此善念而已從心所欲不踰矩只是志到熟處許魯齋謂儒者以治生為先之說亦誤人喜怒哀樂本體自是中和的纔自家著些意思便過不及便是私問知至然後可以言意誠今天理人欲知之未盡如何用得克己工夫曰人若眞實切已用功不已則於此心天理之精微日見一日私欲之細微亦日見一日若不用克己工夫天理私欲終不自見如走路一般走得一叚方認得一叚走到岐路處有疑便問問了又走方纔能到今於已知之天理不肎存已知之人欲不肎去只管愁不能盡知間講何益且待克得自己無私可克方愁不能盡知亦未遲在問伊川謂不當於喜怒哀樂未發之前求中延平却教學者看未發以前氣象何如曰皆是也伊川恐人於未發前討個中把中作一物看如吾向所謂認氣定時做中故令只於涵養省察上用功延平恐人未便有下手處故令人時時刻刻求未發前氣象使人正目而視惟此傾耳而聽惟此即是戒愼不睹恐懼不聞的工夫皆古人不得已誘人之言也只為本無前後際故也先生頗主程子說澄於中字之義尚未明曰此須自心體認出來非言語所能喻中只是天理曰天理何以謂之中曰無所偏倚曰無所偏倚何等氣象曰如明鏡全體瑩徹無纖塵㸃染曰當其已發或著在好色好利好名上方見偏倚若未發時何以知其有所偏倚曰平日美色名利之心原未嘗無病根不除則暫時潛伏偏倚仍在須是平日私心蕩除潔淨廓然純乎天理方可謂中言語無序亦足以見心之不存問格物於動處用功否曰格物無間動靜靜亦物也孟子謂必有事焉是動靜皆有事此是先生定論先生他日每言意在於事親即事親為一物云云余竊轉一語曰意不在於事親時是恁物先生又曰工夫難處全在格物致知上此即誠意之事意既誠大段心亦自正身亦自修但正心修身工夫亦各有用力處修身是已發邊正心是未發邊心正則中修身則和云云先生既以良知二字冐天下之道安得有正修工夫只因將意字看作已發故工夫不盡又要正心又要修身意是已發心是未發身又是已發先生每譏宋儒支離而躬蹈之千載而下每欲起先生於九原質之而無從也問程子云仁者以天地萬物為一體何墨氏兼愛反不得謂之仁曰仁是造化生生不息之理雖彌漫周遍無處不是然其流行發生亦自有漸惟其有漸所以必有發端處惟有發端處所以生生不息譬之於木其始抽芽便是生意發端處然後有榦有枝葉父子兄弟之愛是人心生意發端處如木之抽芽自此而仁民而愛物如木之有幹有枝葉也墨氏將父子兄弟與途人一例便没了發端處安能生生安能謂之仁只此便可勘佛氏之學問延平云當理而無私心當理與無私心如何分别曰心即理也無私心即是當理未當理便是私心若析心與理言之恐亦未善又問釋氏於世間情欲之私不染似無私心外棄人倫却似未當理曰亦只是一統事成就他一個私已的心聖人之所以為聖只是此心純乎天理而無人欲之雜猶精金之所以為精但以其成色足而無銅鉛之雜也人到純乎天理方是聖金到足色方是精然聖人之才力亦有大小不同猶金之分兩有輕重所以為金精者在足色而不在分兩所以為聖者在純乎天理而不在才力也學者學聖人不過是去人欲而存天理猶鍊金而求其足色耳後世不知作聖之本却專去知識才能上求聖人疲精竭力從册子上鑚研名物上考索形迹上比擬知識愈廣而人欲愈滋才力愈多而天理愈蔽正如見人有萬鎰精金不務煆鍊成色而乃妄希分兩錫鉛銅銕雜然投之分兩愈增而成色愈下及其稍末無復有金矣薛侃記侃去花間草曰天地間何善難培惡難去先生曰此等看善惡皆從軀殻起念天地生意花草一般何曾有善惡之分子欲看花則以花為善以草為惡如欲用草時復以草為善矣曰然則無善無惡乎曰無善無惡者理之靜有善有惡者氣之動不動於氣即無善無惡是謂至善曰佛氏亦無善無惡何以異曰佛氏著在無上便一切不管聖人無善無惡只是無有作好無有作惡此之謂不動於氣曰草既非惡是草不宜去矣曰如此却是佛者意見草若有礙理亦宜去矣曰如此又是作惡作好曰不作好惡非是全無好惡只是好惡一循於理不去著一分意思即是不曾好惡一般曰然則善惡全不在物曰只在汝心循理便是善動氣便是惡曰畢竟物無善惡曰在心如此在物亦然世儒惟不知此舍心逐物將格物之學錯看了先生之言自是端的與天泉証道之說逈異為學須得個頭腦工夫方有著落縱未能無間如舟之有舵一提便醒不然雖從事於學只做個義襲而取非大本達道也侃問先儒以心之靜為體心之動為用何如曰不可以動靜為體用動靜時也即體而言用在體即用而言體在用是謂體用一源若說靜可以見其體動可見其用却不妨心并無動靜可言必不得已可說動可以見體靜可以見用梁日孚問主一曰一者天理主一是一心在天理上若只知主一不知一即是理有事時便逐物無事時便是著空惟其有事無事一心皆在天理上用功所以居敬亦即是窮理就窮理專一處說便謂之居敬就居敬精宻處說便謂之窮理不是居敬了别有個心窮理窮理時别有個心居敬名雖不同工夫只是一事正之問戒懼是已所不知時工夫愼獨是已所獨知時工夫曰只是一個工夫無事之時固是獨知有事時亦是獨知於此用功便是端本澄源便是立誠若只在人所共知處用功便是作偽今若又分戒懼為已所不知工夫便支離既戒懼即是知己曰獨知之地更無無念時耶曰戒懼之念無時可忽若戒懼之心稍有不存不是昏瞶便已流入惡念戒懼不是念可言是思思只在思誠思是心之本官思而動於欲為念故念當除而思不可除後人專喜言無思至於念則以為是心之妙用不可除是倒說了他只要除理障耳蔡希淵問大學新本先格致而後誠意工夫似與首章次第相合若先生從舊本誠意反在格致之前矣曰大學工夫即是明明德明明德即是個誠意誠意工夫只在格致若以誠意為主去用格致工夫工夫始有下落即為善去惡無非是誠意的事如新本先去窮格事物之理即茫茫蕩蕩都無著落處須添個敬字方才牽扯得身心上來終沒根源且既須敬字縁何孔門倒將最要𦂳的落了直待千餘年後人添補正謂以誠意為主即不須添敬字此學問大頭腦於此不察眞是千里之謬大抵中庸工夫只是誠身誠身之極便是至誠大學工夫只是誠意誠意之極便是至善總是一般先生疏大學惟此段最端的無病明明德只是個誠意若意字看得分曉不必說正心更有工夫矣九川問靜坐用功頗覺此心收歛遇事又斷了旋起個念頭去事上省察事過又尋舊功覺内外打不成一片曰心何嘗有内外即如惟濬今在此講論又豈有一心在内照管這講說時專一即是那靜坐時心工夫一貫何須更起念頭須在事上磨鍊工夫得力若只好靜遇事便亂那靜時工夫亦差似收斂而實放溺也何須更起念頭是聖學入微眞消息他日却曰實無無念時只是要正念如講論時便起不得在内照管的念則講論時不知又可起得個事親的意否問近來工夫稍知頭腦然難尋個穩當處曰只是致知曰如何致曰一㸃良知是爾自家的凖則你意念著處他是便知是非便知非更瞞他一些不得爾只不要欺他實實落落依著他做去善便存惡便去何等穩當此便是致知的實功先生每以念字與意字合說恐念與意終有别崇一曰先生致知之㫖發盡精藴看來這裡再去不得曰何言之易也再用功半年看如何又用功一年看如何功夫愈久愈覺不同知來本無知覺來本無覺然不知則遂埋没此是獨體正當處被先生一口打并出黃以方問先生格致之說隨時格物以致其知則知是一節之知非全體之知也何以到得溥博如天淵泉如淵地位曰心之本體無所不該原是一個天只為私欲障礙則天之本體失了心之理無窮盡原是一個淵只為私欲窒塞則淵之本體失了如念念致良知將此障礙窒塞一齊去盡則本體己復便是天淵了因指天以示之曰如面前所見是昭昭之天四外所見亦只是昭昭之天只為許多牆壁遮蔽不見天之全體若撤去牆壁總是一個天矣於此便見一節之知即全體之知全體之知即一節之知總是一個本體黄直記聖賢非無功業氣節但其循著天理則便是道不可以事功氣節名矣我輩致知只是各隨分量所及今日良知見在如此則隨今日所知擴充到底明日良知又有開悟便隨明日所知擴充到底如此方是精一工夫此是先生漸教頓不廢漸問知行合一曰此須識我立言宗旨今人學問只因知行分作兩件故有一念發動雖是不善然却未曾行便不去禁止我今說個知行合一正要人曉得一念發動處便即是行了發動處有不善就將這不善的念克倒了須要徹根徹底不使那一念不善潛伏在胸中此是我立言宗旨如此說知行合一眞是絲絲見血先生之學眞切乃爾後人何曾㑹得聖人無所不知只是知個天理無所不能只是能個天理聖人本體明白故事事知個天理所在便去盡個天理不是本體明後却於天下事物都便知得便做得來也天下事物如名物度數草木鳥獸之𩔖不勝其煩雖是本體明了亦何縁能盡知得但不必知的聖人自不消求知其所當知者聖人自能問人如子入太廟每事問先儒謂雖知亦問敬謹之至此說不可通聖人於禮樂名物不必盡知然他知得一個天理便自有許多節文度數出來不知能問亦即是天理節文所在說名物象數也拈出天理二字先生之學自是勺水不漏問儒者夜氣胸中思慮空空靜靜與釋氏之靜却一般此時何所分别曰動靜只是一個那夜氣空空靜靜天理在中即是應事接物的心應事接物的心亦是循天理便是夜氣空空靜靜的心故動靜分别不得知得動靜合一釋氏毫釐差處亦是莫掩矣天理二字是儒門得分家儅釋氏空之雖靜時也做不得主文公格物之說只是少頭腦如所謂察之於念慮之微此一句不該與求之文字之中騐之事為之著索之講論之際混作一例看是無輕重也佛氏不著相其實著相吾儒著相其實不著相佛怕父子累却迯了父子怕君臣累却迯了君臣怕夫婦累却迯了夫婦都是著相便須迯避吾儒有個父子還他以仁有個君臣還他以義有個夫婦還他以别何曾著父子君臣夫婦的相先生於佛氏一言而内外夾攻更無剰義問讀書所以調攝此心但一種科目意思牽引而來何以免此曰只要良知眞切雖做舉業不為心累且如讀書時知得强記之心不是即克去之有誇多鬭靡之心不是即克去之如此亦只是終日與聖賢印對是個純乎天理之心任他讀書亦只是調攝此心而已何累之有又舉天理二字如此方眞是讀書亦便是眞格物處朱子以讀書為格物窮理之要與先生語不無差别諸君功夫最不可助長上智絶少學者無超入聖人之理一起一伏一進一退自是功夫節次不可以我前日曾用功夫今却不濟便要矯强做出一個破綻的模様便是助長連前些子功夫都壞了只要常常做個遯世無悶不見是而無悶之心依此良知忍耐做去不管毁譽榮辱久久自然有得力處言立志曰眞有聖人之志良知上更無不盡良知上留得些子别念掛帶便非必為聖人之志矣錢德洪記吾昔居滁時見諸生多務知解無益於得姑教之靜坐一時窺見光景頗收近效久之漸有喜靜厭動流入枯槁之病故邇來只說致良知良知明白隨你去靜處體悟也好隨你去事上磨鍊也好良知本體原是無動無靜的此便是學問頭腦良知在夜氣發的方是本體以其無物欲之雜也學者要使事物紛擾之時常如夜氣一般就是通乎晝夜之道而知此語端的良知常發而常斂便是獨體眞消息若一向在發用處求良知便入情識窠臼去然先生指㸃人處都在發用上說只要人知是知非上轉個為善去惡路頭正是良工苦心也仙家說到虛聖人豈能虛上加得一毫實佛氏說到無聖人豈能無上加得一毫有但仙家說虚從養生上來佛氏說無從出離生死上來却於本體上加却這些子意思在便不是虛無的本色便於本體有障礙聖人只是還他良知的本色更不著些子意在良知之虛便是天之太虛良知之無便是太虛之無形日月風雷山川民物凡有貌象形色皆在太虚無形中發用流行未嘗作得天的障礙聖人只是順其良知之發用天地萬物俱在我良知發用流行中何嘗又有一物超於良知之外能作得障礙是辨三教異同大頭腦處可見惟吾儒方擔得虛無二字起二氏不與也問釋氏亦務養心然不可以治天下何也曰吾儒養心未嘗離却事物只順其天則自然就是工夫釋氏却要盡絶事物把心看作幻相與世間無些子交渉所以不可治天下世間豈有離事之心佛氏一差故百差今謂佛氏心不差而事差便是調停之說問異端曰與愚夫愚婦同的是謂同德與愚夫愚婦異的是謂異端孟子不動心與告子不動心所異已在毫釐間告子只在不動心上著功孟子便直從此心原不動處分曉心之本體原是不動的只為所有行不合義便動了孟子不論心之動與不動只是集義所行無不是義此心自然無可動處告子只要此心不動處便是把捉此心將他生生不息之根反阻撓了問人有虛靈方有良知若草木瓦石之𩔖亦有良知否曰人的良知就是草木瓦石的良知萬物與人原是一體其發竅之最精處是人心一㸃靈明故五穀禽獸之𩔖皆可以養人藥石之𩔖皆可以療疾只為同此一氣故能相通耳只為性體原是萬物一源故如人參温能補人便是遇父子而知親大黄苦能㵼人便是遇君臣而知義如何無良知又如人參能退邪火便是遇君臣而知義大黄能順隂氣便是遇父子而知親問人與物同體如何大學又說個厚薄曰道理自有厚薄比如身是一體把手足捍頭目豈是薄手足其道理合如此禽獸與草木同是愛的把草木去養禽獸又忍得人與禽獸同是愛的宰禽獸以養親供祭祀燕賔客心又忍得至親與路人同是愛的顚沛患難之際不能兩全寧救至親不救路人心又忍得這是道理合該如此及至吾身與至親更不得分彼此厚薄蓋以仁民愛物皆從此出此處可忍更無所不忍矣大學所謂厚薄是良知上自然的條理便謂之義順這個條理便謂之禮知此條理便謂之智終始這條理便謂之信既是自然的條理則不如此便自勉然的更何條理所以佛氏一切胡亂只得粉碎虛空歸之儱侗目無體以萬物之色為體耳無體以萬物之聲為體鼻無體以萬物之臭為體口無體以萬物之味為體心無體以天地萬物感應之是非為體無知無不知本體原是如此譬如日未嘗有心照物而自無物不照無照無不照原是日之本體良知本無知今却要有知本無不知今却疑有不知只是信不及耳獨知原是如此先天而天弗違天即良知也後天而奉天時良知即天也大徹大悟䝉又為先生轉一語曰先生言致良知以格物便是先天而天弗違先生言格物以致其良知便是後天而奉天時良知只是個是非之心是非只是個好惡只好惡就盡了是非只是非就盡了萬事萬變又曰是非兩字是個大規矩巧處則存乎其人問知譬日欲譬雲雲雖能蔽日亦是天之一氣合有的欲亦莫非人心合有否曰喜怒哀懼愛惡欲謂之七情七者俱是人心合有的但要認得良知明白比如日光雖雲霧四塞太虛中色象可辨亦是日光不滅處不可以雲能蔽日教天不要生雲七情順其自然之流行皆是良知之用但不可有所著七情有著俱謂之欲然纔有著時良知亦自㑹覺覺即蔽去復其體矣此處能勘得破方是簡易透徹工夫人生一時離不得七情七情即良知之魄若謂良知在七情之外則七情又從何處來人有過多於過上用功就是補甑其流必歸於文過直須向前一歩琴瑟簡編學者不可無蓋有業以居之心就不放問良知原是中和的如何却有過不及曰知得過不及處就是中和良知無過不及知得過不及的是良知慈湖不為無見又著在無聲無臭見上了門人歎先生自征寧藩以來天下謗議益衆先生曰我在南都以前尚有些子鄉愿意思在今信得這良知眞是眞非信手行去更不著些覆藏纔做得個狂者胸次故人都說我行不揜言也讀此方知先生晚年眞面目我輩如何容易打過關捩子也然向後正大有事在所謂人所不知而已獨知者此正是吾心良知處有言童子不能格物只教以洒掃應對曰洒掃應對就是物童子良知只到此只教去洒掃應對便是致他這一㸃良知又如童子知畏先生長者此亦是他良知處故雖遨嬉見了先生長者便去作揖恭敬是他能格物以致敬師長之良知我這裡格物自童子以至聖人皆是此等工夫但聖人格物便更熟得些子不消費力問程子云在物為理如何云心即理曰在物爲理在字上當添一心字此心在物則為理如此心在事父則為孝在事君則為忠之𩔖是也諸君要識得我立言宗旨我如今說個心即理只為世人分心與理為二便有許多病痛如五伯攘夷狄尊周室都是一個私心便不當理人却說他做得當理只心有未純往往慕悅其所為要求外面做得好看却與心全不相干分心與理為二其流於伯道之偽而不自知故我說個心即理要使知心理是一個便來心上做工夫不去襲取於義便是王道之眞夫子說性相近即孟子說性善不可專在氣質上說若說氣質如剛與柔對如何相近得惟性善則同耳人性初時善原是同的但剛者習於善則為剛善習於惡則為剛惡柔者習於善則為柔善習於惡則為柔惡便日相遠了黄以方記善此是先生道性處丁亥年九月先生起征思田德洪與汝中論學德洪舉先生教言曰無善無惡心之體有善有惡意之動知善知惡是良知為善去惡是格物汝中曰此恐未是究竟話頭若說心體是無善無惡意亦是無善無惡知亦是無善無惡物亦是無善無惡矣若說意有善惡畢竟心體還有善惡在德洪曰心體是天命之性原無善惡但人有習於心意念上見有善惡在格致誠正修此是復性體功夫若原無善惡功夫亦不消說矣是夕坐天泉橋各舉請正先生曰二君之見正好相資不可各執一邊我這裡接人原有二種利根之人直從本源上悟入人心本體原是明瑩無滯原是個未發之中利根之人一悟本體即是功夫人已内外一齊俱透其次不免有習心在本體受蔽故且教在意念上實落為善去惡功夫熟後渣滓去盡本體亦明淨了汝中之見是我接利根人的德洪之見是我為其次立法的相取為用則巾人上下皆可引入於道既而曰已後講學不可失了我的宗旨無善無惡心之體有善有惡意之動知善知惡是良知為善去惡是格物這話頭隨人指㸃自沒病痛原是徹上徹下功夫利根之人世亦難遇人有習心不教他在良知上實用為善去惡工夫只去懸空想個本體一切事為俱不著實不過養成一個虛寂病痛不是小小不可不早說破王畿天泉證道記善先生每言至善是心之本體又曰至只是盡乎天理之極而無一毫人欲之私又曰良知即天理録中言天理二字不一而足有時說無善無惡者理之靜亦未嘗徑說無善無惡是心體若心體果是無善無惡則有善有惡之意又從何處來知善知惡之知又從何處來為善去惡之功又從何處起無乃語語斷流絶港乎快哉四無之論先生當於何處作答却又有上根下根之說謂教上根人只在心上用功夫下根人只在意上用功夫又豈大學八目一貫之旨又曰其次且教在意念上著實用為善去惡工夫久之心體自明䝉謂纔著念時便非本體人若只在念起念滅上用功夫一世合不上本體所謂南轅而北轍也先生解大學於意字原看不清楚所以於四條目處未免架屋疊床至此及門之士一再摹之益失本色矣先生他日有言曰心意知物只是一事此是定論既是一事決不是一事皆無䝉因為龍谿易一字曰心是有善無惡之心則意亦是有善無惡之意知亦是有善無惡之知物亦是有善無惡之物不知先生首肎否明儒學案卷十
