body:
  text: 明儒學案卷一餘姚黃宗羲撰河東學案河東之學悃愊無華恪守宋人矩矱故數傳之後其議論設施不問而知其出於河東也若陽明門下親炙弟子往往背其師說亦以其言之過髙也然河東有未見性之譏所謂此心始覺性天通者定非欺人語可見無事張皇耳文清薛敬軒先生瑄御史閻子與先生禹錫侍郎張自在先生鼎郡守段容思先生堅廣文張默齊先生傑文莊王凝齊先生鴻儒布衣周小泉先生蕙郡丞薛思菴先生敬之郡丞李介菴先生錦文簡呂涇野先生柟司務呂愧軒先生潛張石谷先生節李正立先生挺郡守郭䝉泉先生郛舉人楊天游先生應詔河東學案一文清薛敬軒先生瑄薛瑄字德溫號敬軒山西河津人母夢紫衣人入謁而生膚理如水晶五臟皆見家人怪之祖聞其啼聲曰非常兒也自幼書史過目成誦父貞為滎陽教諭聞魏范二先生深於理學魏純字希文山東高密人范俟考俾先生與之遊處講習濂洛諸書嘆曰此問學正路也因盡棄其舊學父移教鄢陵先生補鄢陵諸生中河南永樂庚子鄉試第一明年登進士第宣德初授監察御史三楊欲識其面令人要之先生辭曰職司彈事豈敢私謁公卿三楊嗟歎焉差監湖廣銀場手録性理大全通宵不寐遇有所得即便劄記正統改元出為山東提學僉事先力行而後文藝人稱為薛夫子時中官王振用事問三楊吾鄉誰可大用者皆以先生對召為大理寺正卿三楊欲先生詣振謝不可又令李文達傳語先生曰德逺亦為是言乎拜爵公朝謝恩私室某所不能為也已遇振於東閣百官皆跪先生長揖不拜振大恨之會有獄夫病死妾欲出嫁妻弗聽妾遂謂夫之死妻有力焉先生發其誣都御史王文承振意劾為故出先生廷折文文言囚不服訊繫獄論死先生讀易不輟覆奏將決振有老僕者山西人也泣於竈下振怪問之曰聞薛夫子將刑故泣耳振問若何以知有薛夫子曰鄉人也具言其平生狀振惘然立傳旨戍邊尋放還家景泰初起南京大理寺卿蘇松饑民貸粟不得火有粟者之廬王文坐以謀叛先生抗疏辨之文謂人曰此老崛强猶昔中官金英奉使道出南京公卿餞於江上先生獨不往英至京言於衆曰南京好官唯薛卿耳壬申秋以原官召入英廟復辟遷禮部右侍郎兼翰林學士入內閣于忠肅王宮保就刑先生謂同列曰此事人所共知各有子孫石亨奮然曰事已定不必多言上召閣臣入議先生言陛下復登寶位天也今三陽發生不可用重刑同列皆無言詔減一等先生退而歎曰殺人以為功仁者不為也一日召對便殿上衣冠未肅先生凝立不入上知之即改衣冠先生乃入上惡石亨專徐天全李文達許道中退朝謂耿都御史令御史劾之先生謂諸公曰易戒不密春秋譏漏言禍從此始矣未幾諸公皆下詔獄上以先生學行老成甚重之一日奏對誤稱學生眷注遂衰先生亦知曹石用事非行道之時遂乞致仕臨行嶽季方請教先生曰英氣太露最害事後季方敗憶先生之言曰正乃先生之罪人也居家八年從學者甚衆天順八年甲申六月十五日卒年七十有六留詩有七十六年無一事此心始覺性天通先生以復性為宗濂洛為鵠所著讀書録大概為太極圖說西銘正蒙之義疏然多重復雜出未經删削蓋惟體驗身心非欲成書也其謂理氣無先後無無氣之理亦無無理之氣不可易矣又言氣有聚散理無聚散以日光飛鳥喻之理如日光氣如飛鳥理乘氣機而動如日光載鳥背而飛鳥飛而日光雖不離其背實未嘗與之俱往而有間斷之處亦猶氣動而理雖未嘗與之暫離實未嘗與之俱盡而有滅息之時羲竊謂理為氣之理無氣則無理若無飛鳥而有日光亦可無日光而有飛鳥不可為喻蓋以大德敦化者言之氣無窮盡理無窮盡不特理無聚散氣亦無聚散也以小德川流者言之日新不已不以已往之氣為方來之氣亦不以已往之理為方來之理不特氣有聚散理亦有聚散也先生謂水清則見毫毛心清則見天理喻理如物心如鏡鏡明則物無遁形心明則理無蔽迹羲竊謂仁人心也心之所以不得為理者由於昏也若反其清明之體即是理矣心清而見則猶二之也此是先生所言本領安得起而質之乎崔後渠言先生之佐大理王振引之也當時若辭而不往豈不愈於抗而得禍與于忠肅有社稷之功其受害也先生固爭之矣爭不得即以此事而去尤為光明俊偉正統四年南安知府林竿言比者提學薛瑄以生員有疾罷斥者追所給廩米臣以為不幸有疾罷之可也至於廩給糜費於纍歲而追索於一朝固已難矣父兄不能保子弟之無疾今懲償納之苦孰肯令其就學上是之先生出處大節豈後學所敢輕議而盡美不能盡善所云連得間矣成化初諡文清隆慶五年詔從祀孔子廟庭稱先儒薛子讀書録統體一太極即萬殊之一本各具一太極即一本之萬殊統體者即大德之敦化各具者即小德之川流太極不可以動靜言然舍動靜亦無太極人心有一息之怠便與天地之化不相似為學之要莫切於動靜動靜合宜者便是天理不合宜者便是人欲人心一息之頃不在天理便在人欲未有不在天理人欲而中立者也易傳曰易變易也變易以從道也如人之一動一靜皆變易也而動靜之合乎理者即道也所以隂陽變易者固理之所為而理則一定而不易所謂恆也少欲覺身輕心中無一物其大浩然無涯先儒曰在物為理處物為義如君之仁臣之敬父之慈子之孝之類皆在物之理也於此處各得其宜乃處物之義也每日所行之事必體認某事為仁某事為義某事為禮某事為智庶幾久則見道分明為政以法律為師亦名言也既知律已又可治人二十年治一怒字尚未消磨得盡以是知克已最難性非特具於心者為是凡耳目口鼻手足動靜之理皆是也非特耳目口鼻手足動靜之理為是凡天地萬物之理皆是也故曰天下無性外之物而性無不在凡聖賢之書所載者皆道理之名也至於天地萬物所具者皆道理之實也書之所謂某道某理猶人之某名某姓也有是人之姓名則必實有是人有是道理之名則必有是道理之實學者當㑹於言意之表湖南靖州讀論語坐久假寐既覺神氣清甚心體浩然若天地之廣大蓋欲少則氣定心清理明其妙難以語人無形而有理所謂無極而太極有理而無形所謂太極本無極形雖無而理則有理雖有而形則無此純以理言故曰有無為一老氏謂無能生有則無以理言有以氣言以無形之理生有形之氣截有無為兩段故曰有無為二天下無性外之物而性無不在君臣父子夫婦長幼朋友皆物也而其人倫之理即性也佛氏之學曰明心見性者彼既舉人倫而外之矣安在其能明心見性乎若果明心見性則必知天下無性外之物而性無不在必不舉人倫而外之也今既如此則偏於空寂而不能真知心性體用之全審矣盡心工夫全在知性知天上蓋性即理而天即理之所從出人能知性知天則天下之理無不明而此心之理無不貫茍不知性知天則一理不通而心即有礙又何以極其廣大無窮之量乎是以知盡心工夫全在知性知天上博文是明此理約禮是行此理無欲非道入道自無欲始舉目而物存物存而道在所謂形而下形而上是也誠不能動人當責諸已不能感人皆誠之未至太極一圈中虛無物蓋有此理而實無形也常沈靜則含畜義理而應事有力少言沈默最妙厚重靜定寬緩進德之基無欲則所行自簡敬則中虛無物處人之難處者正不必厲聲色與之辨是非較短長才舒放即當收斂才言語便思簡默事已往不追最妙人能於言動事為之間不敢輕忽而事事處置合宜則浩然之氣自生矣主靜以立其本愼動以審其幾心常主靜物來應之費是隱之流行處隱是費之存主處體用一源顯微無間如隂陽五行流行發生萬物費也而其所以化生之機不可見者隱也矯輕警惰只當於心志言動上用力須是盡去舊習從新做起張子曰濯去舊見以來新意余在辰州府五更忽念已德所以不大進者正為舊習纒繞未能掉脫故為善而善未純去惡而惡未盡自今當一刮舊習一言一行求合於道否則匪人矣若胸中無物殊覺寬平快樂一念之非即遏之一動之妄即改之心虛有內外合一之氣象俯仰天地無窮知斯道之大覺四海之小矣工夫切要在夙夜飲食男女衣服動靜語默應事接物之間於此事事皆合天則則道不外是矣凡大小有形之物皆自理氣至微至妙中生出來以至於成形而著張子曰其來也幾微易簡其至也廣大堅固一念之差心即放才覺其差而心即正水清則見毫毛心清則見天理人性分而言之有五合而言之則一一不可見而五則因發見者可默識也須知已與物皆從隂陽造化中來則知天地萬物為一體矣夫子所謂一即統體之太極也夫子之所為貫即各具之太極也主一則氣象清明二三則昏昧矣將聖賢言語作一場話說學者之通患志動氣多為理氣動志多為欲學至於心中無一物則有得矣言不謹者心不存也心存則言謹矣余於坐立方向器用安頓之類稍有不正即不樂必正而後已非作意為之亦其性然言動舉止至微至粗之事皆當合理一事不可苟先儒謂一事苟其餘皆苟矣觀太極中無一物則性善可知有不善者皆隂陽雜糅之渣滓也天之氣一著地之氣即成形如雪霜雨露天氣也得地氣即成形矣才敬便渣滓融化而不勝其大不敬則鄙吝即萌不勝其小矣知止所包者廣就身言之如心之止德目之止明耳之止聰手之止恭足之止重之類皆是就物言之如子之止孝父之止慈君之止仁臣之止敬兄之止友弟之止恭之類皆是蓋止者止於事物當然之則則即至善之所在知止則靜安慮得相次而見矣不能知止則耳目無所加手足無所措猶迷方之人搖搖而莫知所之也知止則動靜各當乎理大事謹而小事不謹則天理即有缺缺間斷程子性即理也之一言足以定千古論性之疑人惻然慈良之心即天地藹然生物之心覺人詐而不形於言有餘味心一操而羣邪退聽一放而群邪並興才收斂身心便是居敬才尋思義理便是窮理二者交資而不可缺一也居敬有力則窮理愈精窮理有得則居敬愈固初學時見居敬窮理為二事為學之久則見得居敬時敬以存此理窮理時敬以察此理雖若二事而實則一矣人不持敬則心無頓放處人不主敬則此心一息之間馳騖出入莫知所止也不能克已者志不勝氣也讀書以防簡此心猶服藥以消磨此病病雖未除常使藥力勝則病自衰心雖未定常得書味深則心自熟久則衰者盡而熟者化矣處事了不形之於言尤妙廣大虛明氣象無欲則見之當事務叢雜之中吾心當自有所主不可因彼之擾擾而遷易也心細密則見道心粗則行不著習不察學不進率由於因循事事不放過而皆欲合理則積久而業廣矣究竟無言處方知是一源不識理名難識理須知識理本無名為學時時處處是做工夫處雖至陋至鄙處皆當存謹畏之心而不可忽且如就枕時手足不敢妄動心不敢亂想這便是睡時做工夫以至無時無事不然工夫緊貼在身心做不可斯須外離心一放即悠悠蕩蕩無所歸著讀前句如無後句讀此書如無他書心乃有入下學學人事上達達天理也人事如父子君臣夫婦長幼之類是也天理在人如仁義禮智之性在天如元亨利貞之命是也只是合當如是便是理理只在氣中決不可分先後如太極動而生陽動前便是靜靜便是氣豈可說理先而氣後也心一收而萬理咸至至非是外來也蓋常在是而心存有以識其妙耳心一放而萬理咸失失非向外馳也蓋雖在是而心亡無以察其妙耳朱子曰聚散者氣也若理只泊在氣上初不是凝結自為一物但人分上合當然者便是理不可以聚散言也理既無形安得有盡有形者可以聚散言無形者不可以聚散言石壁上草木最可見生物自虛中來虛中則實氣是也一切有形之物皆呈露出無形之理來所謂無非至教也人心皆有所安有所不安安者義理也不安者人欲也然私意勝而不能自克則以不安者為安矣心存則因器以識道看來學者不止應事處有差只小小言動之間差者多矣心無所止則一日之間四方上下安往而不至哉理如物心如鏡鏡明則物無遁形心明則理無蔽迹昏則反是釋子不問賢愚善惡只順已者便是理如日光氣如飛鳥理乘氣機而動如日光載鳥背而飛鳥飛而日光雖不離其背實未嘗與之俱往而有間斷之處亦猶氣動而理雖未嘗與之暫離實未嘗與之俱盡而有滅息之時氣有聚散理無聚散於此可見理如日月之光小大之物各得其光之一分物在則光在物物盡則光在光三代之治本諸道漢唐之治詳於法細看植物亦似有心但主宰乎是使之展葉開花結實者即其心也略有與人計較短長意即是渣滓消融未盡人只於身內求道殊不知身外皆道渾合無間初無內外也不可將身外地面作虛空看蓋身外無非真實之理與身內之理渾合無間也聖人應物雖以此理應之其實理只在彼物上彼此元不移也聖人治人不是將自己道理分散與人只是物各付物只主於敬才有卓立不然東倒西歪卒無可立之地此理真實無妄如天地日月風雲雨露草木昆蟲隂陽五行萬物萬事皆有常形定則亘古今而不易若非實理為之主則歲改而月不同矣方為一事即欲人知淺之尤者理明則心定順理都無一事理明後見天地萬物截然各安其分知言者書無不通理無不明之謂學至於約則有得矣天下無無理之物無無物之理凡所為當下即求合理勿曰今日姑如此明日改之一事苟其餘無不苟矣心有毫髮所繫即不得其平氣無涯而形有限故天大地小必使一言不妄發則庶乎寡過矣人只為耳目口鼻四肢百骸做得不是壞了仁義禮智信若耳目口鼻四肢百骸做得是便是仁義禮智信之性詩所謂有物有則孟子所謂踐形者是也仁是嫩物譬如草木嫩則生老則枯知至至之窮理也知終終之盡性以至於命也博文知崇也約禮禮卑也分外之事一毫不可與言要緩行要徐手要恭立要端以至作事有節皆不暴其氣之事怒至於過喜至於流皆暴其氣也大而人倫小而言動皆理之當然才有有為之心雖所行合理亦是人欲絶謀利計功之念其心超然無係立得腳定却須寬和以處之習於見聞之久則事之雖非者亦莫覺其非矣非禮勿視聽言動便是克已視聽言動之合禮處便是復禮知覺不可訓仁所以能知覺者仁也教人言理太高使人無可依據四方上下往來古今實理實氣無絲毫之空隙無一息之間斷為學不實無可據之地人於實之一字當念念不忘隨事隨處省察於言動居處應事接物之間必使一念一事皆出於實斯有進德之地心虛能涵萬理繼之者善化育之始流行而未已陽也成之者性人物稟受一定而不易隂也靜坐中覺有雜念者不誠之本也惟聖人之心自然真一虛靜無一毫之雜念循理即率性也自一身之耳目口鼻手足百體各順其則以至人倫庶事各得其宜皆循理也順理心安身亦安矣事來則順應之不可無故而先生事端常存心於義理久久漸明存心於間事即於義理日昧矣凡涉於有為者皆氣其無為者道體也心常存即默識道理無物不有無時不然心苟不存茫無所識其所識者不過萬物形體而已冲漠無朕而萬象昭然已具蓋才有理即有象初非懸空之理與象分而為二也學問實自靜中有得不靜則心既雜亂何由有得篤志力行而不知道終是淺涵飬省察雖是動靜交致其力然必靜中涵養之功多則動時省察之功易也在一心之理與在萬事之理本無二致惟聖人一心之理能通萬事之理者以其純乎天理之公也名節至大不可妄交非類以壞名節艮其背不獲其身行其庭不見其人只是動靜各止於理而不知有人我也物格是知逐事逐物各為一理知至是知萬物萬事通為一理孟子之知言即大學之物格知至也孟子之知性即大學之物格盡心即知至也道無處不在故當無處不謹天道流行命也命賦於人性也性與心俱生者也性體無為人心有覺故心統性情不責人即心無凝冰焦火之纍天地間理無縫隙實不可分元者善之長亨利貞皆善也仁為善之長禮義智皆善也性命一理也有善而無惡也明矣中庸言明善不言明性善即性也雜慮少則漸近道心每有妄發以經書聖賢之言制之一息之運與古今之運同一塵之土與天地之土同一夫之心與億兆之心同致知格物於讀書得之者多論性不論氣不備有二說專論性不論氣則性亦無安泊處此不備也専論性不論氣則雖知性之本善而不知氣質有清濁之殊此不備也論氣不論性不明亦有二說如告子以知覺運動之氣為性而不知性之為理此不明也如論氣質有清濁之殊而不知性之本善此不明也二之則不是蓋理氣雖不相雜亦不相離天下無無氣之理亦無無理之氣氣外無性性外無氣是不可二之也若分而二是有無氣之性無性之氣矣故曰二之則不是程子曰四端不言信者既有誠心為四端則信在其中矣愚謂若無誠心則四端亦無矣故學道以誠心為本鬼神者天地隂陽之靈魂魄者人身隂陽之靈御史閻子與先生禹錫閻禹錫字子與洛陽人年十九舉正統甲子鄉試明年授昌黎訓導母喪廬墓詔旌於門聞薛文清講學往從之遊補開州訓導遂以所受於文清者授其弟子人多化之李文達薦為國子學正轉監丞干謁不行謫徽州府經歷尋復南京國子助教監丞超升御史提督畿內學政勵士以原本之學講明太極圖說通書使文清之學不失其傳者先生之力也成化丙申卒所著有自信集或問先生與白良輔於文清文清曰洛陽似此兩人也難得但恐後來立腳不定往别處走觀先生所立雖未知所得深淺亦不負文清之所戒矣侍郎張自在先生鼎張鼎字大器陜之咸寧人成化丙戍進士授刑部主事遷員外郎出知太原府晉山西參政仍署府事轉河南按察使𢎞治改元擢右僉都御史巡撫保定等府入為户部右侍郎乙卯卒於家年六十五先生少從父之任蒲州得及薛文清之門終身恪守師說不敢少有踰越文清歿後其文集散漫不傳先生搜輯較正凡數年始得成書郡守段容思先生堅段堅字可久號容思蘭州人也年十四為諸生見陳緱山明倫堂上銘群居愼口獨坐防心慨然有學聖之志於是動作不苟正統甲子領鄉薦己巳英宗北狩應詔詣闕上書不報自齊魯以至吳越尋訪學問之人得閻禹錫白良輔以泝文清之㫖踰年而歸學益有得登景泰甲戍進士第歸而讀書越五年出知福山縣以絃誦變其風俗謂天下無不可化之人無不可變之俗六載而治行鬱然可觀李文達薦之擢知萊州府以憂去補南陽府建志學書院與人士講習濂洛之書其童䝉則授以小學家禮祀烈女迸巫尼凡風教之事無不盡心八年而後歸成化甲辰卒年六十六嘗言學者主敬以致知格物知吾之心即天地之心吾之理即天地之理吾身可以參贊者在此其形於自得者詩云風清雲淨雨初晴南畝東阡䇿杖行幽鳥似知行樂意緑楊烟外兩三聲先生雖未嘗及文清之門而郡人陳祥贊之曰文清之統惟公是廓則固私淑而有得者也廣文張默齊先生傑張傑字立夫號默齊陜之鳯翔人正統辛酉鄉薦授趙城訓導以講學為事文清過趙城先生以所得質之文清為之證明由是其學益深丁外艱服闋遂以養母不出母喪畢為責躬詩曰年紀四十四此理未真知晝夜不勤勉遷延到幾時無復有仕進意其工夫以涵養須用敬進學在致知二語為的用五經教授名重一時當道聘攝固城學事先生以鄉黨從遊頗衆不能遠及他方辭之段容思贈詩聖賢心學真堪學何用奔馳此外尋先生答詩亦有今宵忘寢論收心之句學者爭傳誦焉有勸先生著書者曰吾年未艾猶可進也俟有所得為之未晚成化壬辰十月卒年五十二文莊王凝齊先生鴻儒王鴻儒字懋學號凝齊河南南陽人成化丁未進士授南户部主事出為山西提學僉事進副使孝宗與劉大夏論人才曰藩臬中如王鴻儒他日可大用大夏對曰此人才學不易得誠如聖諭正德初致仕己巳起國子祭酒不數月憂去服除改南户部侍郎召入吏部時冡宰為陸完喜權術先生諷之曰惟誠與直能濟國事趨名者亦趨利於社稷生民無益也未幾完果敗辛酉升南户部尚書宸濠反武宗南巡勤勞王事疽發背卒先生書法端徑少未為人知里人有為府史者嘗以其書置府中知府段堅偶見而竒之史對曰里中王生書也堅即召見曰子風神清徹豈塵埃人物遂收之門下故先生之學本之段氏凝齊筆語乾道變化者五月一隂生乾道變矣六月二隂生乾道再變矣至十月則乾道變極陽盡而純隂以成坤卦所謂化也此正秋冬之時百穀草木各正性命保合太和乾之利貞也大明終始六位時成時乘六龍以御天六位六虛位自子至已也六龍六陽爻自初九至上九也聖人大明乾道之終始則見陽之六位以時而成自十一月一陽生則畫一剛於初位是乘以一龍也十二月二陽生則畫一剛於二位是乘以二龍也餘四位四畫凖此乘乃加乘之乘猶加載也天之六陽時序如此聖人加畫乾卦亦如此所以御天也大哉乾乎剛健中正純粹精也此以七者贊乾之德剛言其不屈健言其不息中言其無過不及正言其不偏不倚純言其不二粹言其不雜精則進乎粹矣純粹精譬如粳米中無粟米便是純也粳米雖純矣若顆粒有大小便是不粹一一勻稱便是粹矣米雖勻稱炊飯有不香者便是不精炊飯又香乃是精也愚嘗以為剛健中正純粹精七者皆是贊乾乾初九文言曰確乎其不可拔潛龍也此言初九君子固守不屈之節然也拔者掣而出之如蛇龍屬也蛇入穴人見其尾雖拔之幾斷亦不肯出此亦可以證潛龍之確乎不拔也陽主笑隂主哭故同人號咷指六二笑指九五也撝謙行之謙也鳴謙言之謙也觀雷出地奮豫則雷在地中可推矣不事王侯高尚其事蠱而治矣奉身而隱也澤中有雷雷之蟄也故君子體之嚮晦入宴息噬嗑震下離上彖曰雷電合而章始以雷電為一物謂電即雷之光也及觀厯候八月雷始收聲十月亡電則相去兩月乃知非一物矣雷得電而聲愈震電得雷而光愈熠故曰雷電合而章君子得輿小人剝廬陽為君子隂為小人皆就在上一位而言君子居之則為得輿上九之陽不動衆隂共載一陽也小人居之則為剝廬上九亦變而為隂羣隂失庇也五隂如輿一陽如廬大過彖棟橈本末弱也先儒所謂人主之職在論一相者信哉六十四卦者八卦之藴也八卦者兩儀之藴也兩儀者太極之藴也男女有别然後父子親萬世格言也下武自三后言之也三后在天武王在下故曰下武衛武公諸侯也其詩乃見於雅蓋為王卿士時也載色載笑色怒也載色以怒而復載笑非怒也乃教也匪怒應載色伊教應載笑虞夏雍州貢道浮于積石至于龍門西河自今日觀之則漕運當由北中行者千里由是知唐虞北邊疆境尚逺在河外也左氏隱三年四月鄭祭足帥師取溫之麥按夏四月正麥熟之時故曰取溫之麥若依趙氏謂時月皆改則此當為夏之二月豈可取麥者乎周之郊祀亦有迎尸以為迎后稷之尸也然據禮家說祭山川皆有尸則恐祭天亦有尸也或問周禮祀天神地示人鬼之樂何以無商音文公先生曰五音無一則不成樂非是無商音只是無商調先儒謂商調是殺聲鬼神畏商調罍尊陽也在阼犧尊隂也在西堂上以陽為主也縣鼓陽也在西應鼓隂也在東堂下以隂為主也魏主嗣常密問崔浩曰屬者日食趙代之分朕疾彌年不愈恐一旦不諱此以左氏載日食曰魯衛當之者同是日食之災誠有分野史彌逺雖非賢相猶置人才簿書賢士大夫姓名以待用今有若人乎宜賢才之日遺也見方虛谷撰呂午家傳大學在親民程子曰親當作新愚按親新古字通用觀左氏石碏之言新間舊作親間舊此可見矣孔子之謂集大成樂一變為一成尚非大成九成皆畢然後謂之大成孟子之學明在於事親事長而幽極於知性知天上下本末一以貫之此所以為醇乎醇之儒也彼莊老者幽明二致首尾衡決世儒方且尊以為聖哲豈知道之論乎顔氏家訓曰夫遙大之物寧可度量日為陽精月為隂精星為萬物之精儒家所安也星墜為石精若是石不得有光性又質重何所繫焉星與日月形色同爾日月又當是石也石既牢密烏焉容石在氣中豈能獨運日月星辰若皆是氣氣體輕浮當與天合往來環轉不得錯違其間遲疾理宜一等何故日月五星二十八宿各有度數移動不均致堂辨曰考之六經惟春秋書隕石於宋不言星墜為石也既以星為石此皆推臆之說非聖人之言也愚謂日月星辰皆氣之精而麗於天體如火光不能搏執其隕而為石者以得地氣故耳非在天即石也有隕未至地而光氣遂散者亦不為石也布衣周小泉先生蕙周蕙字廷芳號小泉山丹衛人徙居秦州年二十聽講大學首章奮然感動始知讀書問字為蘭州戍卒聞段容思講學時往聽之久之諸儒令坐聽既而與之坐講容思曰非聖弗學先生曰惟聖斯學於是篤信力行以程朱自任又受學於安邑李昶李昶者景泰丙子舉人授清水教諭文清之門人也恭順侯吳瑾總兵於陜聘為子師先生固辭或問故先生曰總兵役某則某軍士也召之不敢不往若使教子則某師也召之豈敢往哉瑾遂親送二子於其家先生始納贄焉肅藩樂人鄭安鄭寧皆乞除樂籍從周先生讀書其感人如此成化戊子容思至小泉訪之不遇留詩而去小泉泉水隔烟蘿一濯冠纓一浩歌細細靜涵洙泗􅎃源源動鼓洛川波風埃些子無由入寒玉一泓清更多老我未除塵俗病欲煩洗雪起沈疴白雲封鎖萬山林卜築幽居深更深養道不干軒冕貴讀書探取聖賢心何為有大如天地須信無窮自古今欲鼓遺音絃絶後關閩濂洛待君尋先生以父遊江南久之不返追尋江湖間至揚子而溺天下莫不悲之門人最著者渭南薛敬之秦州王爵敬之自有傳爵字錫之以操存為學仕至保安州判同知薛思庵先生敬之薛敬之字顯思號思庵陜之渭南人生而姿容秀美左膊有文字黑入膚內五歲即喜讀書居止不同流俗鄉人以道學呼之成化丙戍貢入太學時白沙亦在太學一時相與並稱丙午謁選山西應州知州不三四歲積粟四萬餘石年饑民免流亡逋而歸者三百餘家南山有虎患倣昌黎之鰐魚為文祭之旬日間虎死蕭家寨平地暴水湧出幾至沈陷亦為文祭告水即下泄聲如雷鳴奏課為天下第一升華府同知居二年致仕正德戊辰卒年七十四先生從周小泉學常雞鳴而起候門開灑掃設坐至則跪以請教故謂其弟子曰周先生躬行孝弟其學近於伊洛吾以為師陜州陳雲逵忠信狷介凡事皆持敬吾以為友吾所以有今日者多此二人力也先生之論特詳於理氣其言未有無氣質之性是矣而云一身皆是氣惟心無氣氣中靈底便是心則又岐理氣而二之也氣未有不靈者氣之行處皆是心不僅腔子內始是心也即腔子內亦未始不是氣耳思庵野録心乘氣以管攝萬物而自為氣之主猶天地乘氣以生養萬物而亦自為氣之主一身皆是氣惟心無氣隨氣而為浮沈出入者是心也人皆是氣氣中靈底便是心故朱子曰心者氣之精爽心本是個虛靈明透底物事所以都照管得到一有私欲便却昏蔽了連本體亦是昧塞如何能照管得物學者始學切須要識得此心是何物此氣是何物心主得氣是如何氣役動心是如何方好著力進裡面去千古聖賢非是天生底只是明得此心分曉天地間凡有盛衰强弱者皆氣也而理無盛衰强弱之異先儒謂至誠貫金石則理足以馭氣矣德無個大小且指一物始根便是大德發生條達千枝萬柯都是那根上出來便是小德接事多自能令氣觸動心敬則不能為之纍否則鮮不為之纍心之存如海水之不波不存如沙苑之揚漢仁則是心求仁非一方也但心有所存主處便是求仁觀諸孔門問答可見師之教弟子之學都只是尋討個正當底心心外無餘事太極圖明此性之全體西銘狀此性之大用寂然不動感而遂通天下之故標貼出個心之體用來程子因而就說個體用一源顯微無間包括這兩句有朋自逺方來與天下歸仁之㫖同活潑潑地只是活動指鳶魚也便見得理氣說得面前活動如顔子卓爾孟子躍如模樣天地無萬物非天地也人心無萬事非人心也天地無物而自不能不物物人心無事而自不能事事而今天下只是一個名利關住扎了壅住多少俊才可勝歎哉氣化然也氣化人事不可岐而二之須相參而究之然後可以知天道消息世道隆替因天地而定乾坤因卑高而位貴賤因動靜而斷剛柔因方類物羣而生吉凶因天象地形而見變化此聖人原易之張本以示人故曰易與天地凖太極圖雖說理亦不曾離了氣先儒解太極二字最好謂象數未形而其理已具之稱形器已具而其理無朕之目象數未形一句說了理形器已具一句却是說了氣恁看理氣何曾斷隔了雨暘燠寒風之有無見得天無心處風雷變化氣使然也天本無心以人為心聖人本無心以天處心其未至於聖人者可不盡希天之學乎何謂希天曰自敬始凡所作為動心只是操存之心未篤篤則心定外物不能奪雖有所為亦不能動此不易之理也在天之風霜雨露者陰陽之質也在地之草木水石者剛柔之質也在人之父子君臣者仁義之質也陰陽一剛柔也剛柔一仁義也隂陽氣也離那質不得剛柔質也離那氣不得仁義性也離那氣質不得未有無氣之質未有無質之氣亦未有無氣質之性偶觀杏實㑹得一本萬殊道理當時種得只是一本如今結了百千萬個不亦殊乎一本萬殊萬殊一本有甚時了期就見得天命不已氣象出來古來用智莫過大禹觀治水一事只把一江一河便分割天地堯舜之世以德相尚故無讖緯術數之可言漢唐以下僞學日滋故有讖緯術數之事古人之論處家有曰義有曰忍蓋忍字無涯涘義字有正救獨用忍不得獨用義亦不得上下名分不得不用義出入日用不得不用忍義與忍相濟而後處家之道備矣孔門優游涵泳只是調護個德性好凡問政問仁問士問禮與行不過令氣質不走作掘得活水出來夜氣與浩然之氣不同彼以全體言此以生息言但浩然章主於氣牛山章主於性學者互相考之有以知性氣之不相離也天高地下萬物流行分明個禮樂自然郡丞李介庵先生錦李錦字在中號介庵陜之咸寧人受學於周小泉天順壬午舉於鄉入太學司成邢讓深器之讓坐事下獄先生率六館之士伏闕訟寃由是名動京師以主敬窮理為學故然諾辭受之間皆不敢茍居憂時巡撫余肅敏請教其子先生以齊衰不入公門固辭肅敏聞其喪不能舉賻以二槨先生郤其一曰不可因喪為利也郡大夫賻米以狀無俸字辭之成化甲辰謁選松江府同知後二年卒年五十一明儒學案卷一
