body:
  text: 明儒學案卷十九餘姚黃宗羲撰江右相傳學案四處士劉兩峰先生文敏劉文敏字宜充號兩峰吉之安福人自幼朴實不知有機械事年二十三與師泉共學思所以自立於天地間者每夜分不能寢謂師泉田學茍小成猶不學也已讀傳習録好之反躬實踐惟覺動靜未融曰此非師承不可乃入越而禀學焉自此一以致良知為鵠操存克治瞬不少懈毋談髙逺而行遺卑近及門之士不戒而孚道存目繫外艱除不應科目華亭為學使以貢士徴之不起雙江主於歸寂同門辨說動盈卷軸而先生言發與未發本無二致戒懼慎獨本無二事若云未發不足以兼已發致中之外别有一段致和之功是不知順其自然之體以學而能以慮而知者也又言事上用功雖愈於事上講求道理均之無益於得也涵養本原愈精愈一愈一愈精始是心事合一又言默坐澄心反觀內照庶幾外好日少知慧日著生理亦生生不已所謂集義也又言吾心之體本止本寂參之以意念飾之以道理侑之以聞見遂以感通為心之體而不知吾心雖千酬萬應紛紜變化之無已而其體本自常止常寂彼以靜病云者似涉靜景非為物不二生物不測之體之靜也凡此所言與雙江相視莫逆故人謂雙江得先生而不傷孤另者非虛言也然先生謂吾性本自常生本自常止往來起伏非常生也專寂凝固非常止也生而不逐是謂常止止而不住是謂常生主宰即流行之主宰流行即主宰之流行其於師門之㫖未必盡同於雙江蓋雙江以未發屬性已發屬情光生則以喜怒哀樂情也情之得其正者性也年八十猶陟三峯之顚靜坐百餘日謂其門人王時槐陳嘉謨賀涇曰知體本虛虛乃生生虛者天地萬物之原也吾道以虛為宗汝曹念哉與後學言即塗轍不一愼勿違吾宗可耳隆慶六年五月卒年八十有三張子曰若謂虛能生氣則虛無窮氣有限體用殊絶入老氏有生於無自然之論先生所謂知體本虛虛乃生生將無同乎蓋老氏之虛墮於斷滅其生氣也如空谷之聲槖籥之風虛與氣為二也先生之虛乃常止之真明即所謂良知也其常止之體即是主宰其常止之照即是流行為物不二者也故言虛同而為虛實異依然張子之學也論學要語學力歸一則卓爾之地方有可幾先師謂學者看致字太輕故多不得力聖賢千言萬語皆從致字上發揮工夫條理非能於良知之體增益毫末也生學困勉皆致字工夫等級非良知少有異焉者也格致非判然兩事蓋事事物物殊塗百慮初不外於吾心之良知故萬物皆僃於我若以物為外是析心與理為二將以何者為僃於我乎是故致吾心是是非非善善惡惡之良知於事事物物之間而莫非順帝之則是之謂物格知致有物有則則者天然自有之中也隨感而通天則流行纖毫智力無所安排則良知益著益察虛靈洞逹竭盡而無遺矣心意知物即不覩不聞之體格致誠正即不覩不聞之功了此即逹天德便是齊家治國平天下而與佛老異蓋吾儒齊治均平勳塞宇宙而格致誠正無所加也雖窮約終身一行未見而心意知物無所損也故佛老之無思議無善惡超入精微者吾儒皆足以貫之而格致誠正便了齊治均平者佛老未之逮也吾性本自常生本自常止往來起伏非常生也專寂凝固非常止也生而不逐是謂常止止而不住是謂常生無住無放常感常寂纖毫人力不與焉是謂天然自有之則故生生之謂易而仁敬慈孝信之皆止者聖德也順乎其性者也聖學不離於言行而亦豈著於言行不外於事物而亦豈泥於事物以為學故曰性無內外學無內外性命之不易者為體體之不滯者為用融化廓寂無所倚著至一而不可少間焉者也用因萬事萬物而顯真體非因萬事萬物而有是故體物而不可遺體事而無不在日與斯世酬酢變通不窮而吾之真體未嘗起滅加損也雖無起滅加損而天下之道無不原於此知此者謂之知性知性則吾無始功利氣習日昭晰而無所藏伏學此者謂之學道學道則吾無始功利氣習日融化而未嘗復行如此方是戒愼恐懼朴實工夫所謂動靜無間體用一原庶乎會通之矣自信本心而一切經綸宰制由之此聖學也幹好事衆皆悅之求之此心茫然不知所在此鄉原之徒孔子之所惡也吾心之體本止本寂參之以意念飾之以道理侑之以聞見遂以感通為心之體而不知吾心雖千酬萬應紛紜變化之無已而其體本自常止常寂故言行之著若可覩聞而謹之信之則不覩不聞也故有餘不足必知之知之必不敢不勉不敢盡而其不敢不然者亦不覩不聞也人之心天之一也俯仰兩間左右民物共感應之形著因時順變以行其典禮者雖千變萬化不可窮詰孰非吾心之一之所運耶不識萬化之根源則自淪於機巧習染之中一切天下事作千樣萬樣看故精神眩惑終身勞苦屢省穿衣喫飯猶有許多未中節處此聖人於庸言庸行一毫不敢自恕學以靜入亦以靜病云者似涉靜景而非為物不二生物不測之體之靜也蓋吾心之體本不可須臾離無人我遠近古今於此透悟便可與天地同量堯舜為徒所謂曲肱飲水金革百萬樂在其中飯糗茹草有天下而不與此皆性體之自然未嘗致纖毫之力乃天下之至靜也是故烟雲泉石案牘瑣屑外境雖異而吾良知之運無更局乃可謂夫焉有所倚也學者無必為聖人之志故染逐隨時變態自為障礙猛省洗滌直從志上著人一已百人十已千工夫則染處漸消逐時漸寡渣滓渾化則主宰即流行之主宰流行即主宰之流行安有許多分别疑慮學術同異皆起於意根未離尚落氣質故意必固我皆所以害我若中涵太虛順吾自然之條理則易簡理得時措適宜往聖精神心術皆潛孚而默會之究事之利害而不求心之安否是以禍亂至於相尋惟中流砥柱動必求諸心以復天地萬物一體之量一切世情不使得以隱伏則義精獨愼天下之能事畢矣遷善改過之功無時可已若謂吾性一見病症自去如太陽一出魍魎自消此則玩光景逐影響欲速助長之為害也須力究而精辨之始可透利害生死關方是學之得力處若風吹草動便生疑惑學在何處用知命者士人之素節吾未見隨分自靜者而困乏不能存也吾未見廣於干求工於貪取者而有知足之時也大丈夫進可以仕退可以藏常綽綽有餘裕則此身常大常貴而天下之物不足以尚之不然則物大我小小大之相形而攻取怨尤之念多矣友朋中有志者不少而不能大成者只緣世情窠臼難超脫耳須是吾心自作主宰一切利害榮辱不能淆吾見而奪吾守方是希聖之志始有大成之望也人心本自太和其不和者狹隘頽墮乖戾煩惱以為之梗除却此病則本心冲淡和粹之體復矣以之養生何有遇事不放過固好然須先有一定之志而後隨事隨時省察其是此志與否則步步皆實地處處皆實事乃真不放過也欲富貴而惡貧賤吾獨無是情哉吾性不與物作對天地之用皆我之用欲惡不與存焉心即所謂把柄也生化不測皆把柄中自然之條理一以貫之成性存而道義出也聖人養民教民無一事不至非為人也自盡其心自滿其量不忍小視其身也凡器不可互用局於形也人為萬物之主心為萬物之靈常存此心性靈日著則萬物之命自我立矣其處一身之吉凶悔吝何有本然者良知也於此兢業存存乃所謂致良知也良知能開天下之物能成天下之務所謂莫顯莫見也致知之功能一動靜有事無事一以貫之則一時雖未成章夫固成章之漸也一時雖未凝然不動夫固凝然不動之基也蓋學問頭腦既當自將日新不已舍此而别趨路徑皆安排意必也事上用功雖愈於事上講求道理均之無益於得也涵養本原愈精愈一愈一愈精始是心事合一千事萬事只是一事故古人精神不妄用惟在志上磨礪隨分自竭其力當下具足當下受用過去未來何益於思徒得罪於天爾上天之載以無聲無臭為至君子之學以不覩不聞為功知體常虛則真明常止千念萬念總是無念生生化化自協天則故先天而天弗違後天而奉天時知無起滅物無去來雖擬言議動同歸於成變化復其不覩聞之體天地萬物生於虛而虛亦非出於天地萬物之外耳目口鼻皆以虛為用况心為統攝衆形之本宰制萬靈之根而可壅之以私乎古人從心體㸃檢故事事詣其極今人從支派處照管雖時有暗合終不得力此人才風俗之異於古也吾道無絶續歷千萬世如一日但人自不著不察耳精神不可閒用須常理會本分事本分事雖一物不染却萬物畢僃意根風波一塵蔽天豪傑之士往往為其所誤故學在於致虛以澄其源當急遽時能不急遽當怠緩時能不怠緩當震驚失措時能不震驚失措方是回天易命之學喜怒哀樂情也情之得其正者性也發與未發本無二致戒懼愼獨本無二事若云未發不足以兼已發而致中之外别有一段致和之功是不知順其自然之體而加損焉所謂以學而能以慮而知無忌憚以亂天之定命也先師云心體上著不得一念留滯能悟本體即是功夫人已內外一齊俱透功利之習淪肌浹髓茍非鞭辟近裡之學常見無動之過則一時感發之明不足以勝隱微湥痼之蔽故雖高明率喜頓悟而厭積漸任超脫而畏檢束談元妙而鄙淺近肆然無忌而猶以為無可無不可任情恣意遂以去病為第二義不知自家身心尚蕩然無所歸也引佛老之言以證其說借修煉之術以祕其養皆非卓然以聖為歸者也聖學一正百正一了百了不落影響不靠幫助變通宜民真性自然流貫古聖兢兢業業好古敏求精神命脈惟在一處用幾微少忽即屬異端可不謹乎同知劉師泉先生邦采劉邦采字君亮號師泉吉之安福人初為邑諸生即以希聖為志曰學在求諸心科舉非吾事也偕兩峯入越謁陽明稱弟子陽明契之曰君亮會得容易先生資既穎悟而行復峻拔丁外艱蔬水廬墓服闋不復應試士論益歸嘉靖七年秋當鄉試督學趙淵下教屬邑迫之上道先生入見淵未離席即郤立不前淵亟起迎之先生以棘闈故事諸生必免冠袒裼而入失待士禮不願入御史儲良材令十三郡諸生竝得以常服入闈免其簡察揭㮄先生得中式已授夀寧教諭升嘉興府同知尋棄官歸年八十六卒陽明亡後學者承襲口吻浸失其真以揣摩為妙悟縱恣為樂地情愛為仁體因循為自然渾同為歸一先生惄然憂之謂夫人之生有性有命性妙於無為命雜於有質故必兼修而後可以為學蓋吾心主宰謂之性性無為者也故須首出庶物以立其體吾心流行謂之命命有質者也故須隨時運化以致其用常知不落念是吾立體之功常過不成念是吾致用之功二者不可相雜常知常止而念常微也是說也吾為見在良知所誤極探而得之龍溪問見在良知與聖人同異先生曰不同赤子之心孩提之知愚夫婦之知能如頑礦未經煆煉不可名金其視無聲無臭自然之明覺何啻千里是何也為其純隂無真陽也復真陽者更須開天闢地鼎立乾坤乃能得之以見在良知為主決無入道之期矣龍溪曰以一隙之光謂非照臨四表之光不可今日之日非本不光雲氣掩之耳以愚夫愚婦為純隂者何以異此念菴曰聖賢只要人從見在尋源頭不是别將一心換却此心師泉欲創業不享見在豈是懸空做得亦只是時時收攝此見在者使之凝一耳先生著為易藴無非此意所謂性命兼修立體之功即宋儒之涵養致用之功即宋儒之省察涵養即是致中省察即是致和立本致用特異其名耳然工夫終是兩用兩用則支離未免有顧彼失此之病非純一之學也總緣認理氣為二造化只有一氣流行流行之不失其則者即為主宰非有一物以主宰夫流行然流行無可用功體當其不失則者而已矣乃先生之言心意知物較四有四無之說最為諦當謂有感無動無感無靜心也常感而通常應而順意也常往而來常化而生物也常定而明常運而照知也見聞之知其糟粕也象著之物其凝漚也念慮之意其流澌也動靜之心其游塵也心不失無體之心則心正矣意不失無欲之意則意誠矣物不失無住之物則物格矣知不失無動之知則知致矣夫心無體意無欲知無動物無住則皆是有善無惡矣劉念臺夫子欲於龍溪之四無易一字心是有善無惡之心意亦是有善無惡之意知亦是有善無惡之知物亦是有善無惡之物何其相符合也念菴言師泉素持元虛即今肯向裡著已收攝性命正是好消息雙江言師泉力大而說辨排闥之嚴四座咸屈人皆避席而讓舍莫敢攖其鋒疾亟門人朱調問先生此視平時何如答曰夫形豈纍性哉今吾不動者自若也苐形如槁木耳遂卒先生之得力如此劉師泉易藴夫學何為者也悟性修命知天地之化育者也往來交錯庶物露生寂者無失其一也冲廓無為淵穆其容賾者無失其精也惟悟也故能成天地之大惟修也故能體天地之塞悟實者非修性陽而弗駁也修逹者非悟命陰而弗窒也性隱於命精儲於魄是故命也有性焉君子不淆諸命也性也有命焉君子不伏諸性也原始反終知之至也有感無動無感無靜心也常感而通常應而順意也常往而來常化而生物也常定而明常運而照知也見聞之知其糟粕也象著之物其凝漚也念慮之意其流澌也動靜之心其游塵也心不失無體之心則心正矣意不失無欲之意則意誠矣物不失無住之物則物格矣知不失無動之知則知致矣身心意知物者工夫所用之條理格致誠正修者條理所用之工夫知所先後者始條理也天序也忘其所有事者昏索其所無事者紛昏不勝紛者雜紛不勝昏者塞紛猶夢也昏猶醉也醒醉遣夢者惺惺也瞬有存息有養前無迎後無將何病乎塞何憂乎雜德非潛不光心非淡不體識恆斂曰潛欲恆釋曰淡淡以平感物而動之情潛以立人生而靜之本是故清明在躬志氣如神潛且淡者與己者命之所稟禮者性之所具人之生也性一而命殊故人之過也各於其黨虞仲之放伯夷之隘栁下之不恭子貢之逹子路之勇原憲之狷曾㸃之狂子張之堂堂皆已也雖痛克之猶恐守己者固而從人者輕也惟堯舜為能舍非竭才力不能克是故能見無動之過通乎微矣能淨無垢之塵可與幾矣草昧之險無動之過也野馬之運無垢之塵也故聖人洗心退藏於密神武而不殺也夫依然氣質之性之論能心忘則心謙勝心忘則心平侈心忘則心淡躁心忘則心泰嫉心忘則心和謙以受益平以稱施淡以發智泰以明威和以通知成性存存九德咸事心之為體也虛其為用也實義質禮行遜出信成致其實也無意無必無固無我致其虛也虛以通天下之志實以成天下之務虛實相生則德不孤是故常無我以觀其體心普萬物而無心也常無欲以觀其用情順萬事而無情也見元而不影響者鮮矣務博而不支離者鮮矣見過以致元元而質也務約以致博博而寂也高明效天博厚法地澄心渺慮之學也感應而無起滅太虛之流行優優生化之學也著察而落感應照心之為用憧憧往來之私也優優則時止時行擬議以成變化改過遷善同歸於不識不知而已伯玉不以昭昭申節冥冥墮行感應之著察者也原憲之克伐怨欲不行著察之感應者也念念謹念其知也遷念念一念其知也凝顏子不善未嘗不知知之未嘗復行主宰流行明照俱至猶之赤日當空照四方而不落萬象矣曰明道之獵心復萌何也曰斯固顏子之學過而不成念者也未嘗嬰明體而起知端曰然則曾子之易簀得於童子之執燭非嬰明體而起端乎曰猶之日月雲滃空照一也蓋良知流行變通有定徙而無典常曾子之以虛受人又非過焉改焉者可論也曰其謂得正而斃焉何也曰正無定體唯意所安是故學莫踰於致知訣莫要於知止多聞不畜聞無聞也多見不宿見無見也獨聞者塞獨見者執小成而已矣君子多識前言往行以畜其德大畜也九容不修是無身也九思不愼是無心也九疇不敘是無天下國家也修容以立人道愼思以達天德敘疇以順帝則君子理此三者故全也建極在君修極在公卿遵極在守令徵極在庶民父慈子孝兄友弟恭庶民徵矣省刑平稅敬老慈幼守令遵矣尊賢任能謹度宣化公卿修矣敬天勤民禮敘樂和皇極建矣惟皇作極惟帝時克一哉王心協哉衆志元氣充塞太和保合人感天應雨暘時若寒暑不侵治之極也間嘗著察而感應者本體也不起不滅隨感應而著察者念也憧憧往來此蓋有主宰與無主宰之别曰固然矣此有說焉感應從心不從意聖人之事也未至於聖則亦不可無誠意之功至論主宰有從乎意見者有從乎義理者有從乎義理而未得乎本體發育之學者從乎意見者有適有莫執乎已從乎義理者知適知莫成乎已從乎本體者無適無莫達乎己執乎己者病物成乎己者公物達乎己者仁物故曰欲誠其意者先致其知知則物格而與天地萬物流通矣故為仁是故主宰著察者求仁也夫子曰可以為難矣仁則吾不知也謂此也御史劉三五先生陽附劉印山王栁川劉陽字一舒號三五安福縣人少受業於彭石屋劉梅源見陽明語録而好之遂如䖍問學泊舟野水風雪清苦不以為惡陽明見之顧謂諸生曰此生清福人也於是語先生苟不能甘至貧至賤不可以為聖人嘉靖四年舉鄉試任碭山知縣邑多盜治以沈命之法盜為衰止旋示以禮教變其風俗入拜福建道御史世宗改建萬夀宫為永禧仙宫百官表賀御史以先生為首先生曰此當諫不當賀在廷以危言動之卒不可中官持章奏至故事南面立各衙門北面受之受畢復如前對揖先生以為北面者重章奏非重中官也章奏脫手安得復如前哉改揖為東向無以難也相嵩欲親之先生竟引疾歸徐文貞當國陪推光祿寺少卿不起築雲霞洞於三峯與士子談學兩峯過之蕭然如在世外先生曰境寂我寂已落一層兩峯曰此徹骨語也自東廓沒江右學者皆以先生為歸東至岱宗南至祝融夜半登山頂而觀日焉殘冰剩雪柱杖鏗爾陽明所謂清福者懸記之矣先生於師門之㫖身體精研曰中知之不倚於覩聞也敬知之無怠者也誠知之無妄者也靜知之無欲者也寂知之無思為者也仁知之生生與物同體者也各指所之而皆指夫知之良也致知焉盡矣由先生言之則陽明之學仍是不異於宋儒也故先生之傳兩峯也謂宋學門戶謹守繩墨兩峯有之其一時講席之盛皆非先生所深契嘗謂師泉曰海內講學而實踐者有人足為人師者有人而求得先師之學未一人見蓋意在斯乎意在斯乎劉秉監字遵教號印山三五同邑人也父宣工部尚書先生登正德戊辰進士第歷刑部主事署員外郎出為河南僉事遷大名兵僃副使以忤巨奄逮繫詔獄得不死謫判韶州量移二潮州知臨安府未至而卒河南之俗惑鬼多淫祠先生為文諭之曰災祥在德淫鬼焉能禍福於是毁境內淫祠以千數已而就逮寓書其僚長曰淫祠傷害民俗風教者之責監以禍行奸人惑衆必為報應之說非明府力持鮮不動搖其守正不撓如此事兄甚謹俸入不私於室先生初學於甘泉而尤篤志於陽明講學之㑹匹馬奚童往來山谷之間儉約如寒士母夫人勞之曰兒孝且弟何必講學先生對曰人見其外未見其內將求吾真不敢不學歿時年未五十劉三五評之曰先輩有言名節一變而至道印山早勵名節烈烈不挫至臨死生靡惑宜其變而至道無難也王釗字子懋號栁川安成人始受學梅源東廓既學於文成嘗為諸生棄之栖栖於山顚水涯寂莫之鄉以求所謂身心性命蓋三十年未嘗不一日勤懇於心善不善之在友朋無異於己逆耳之言時施於廣座人但見其惻怛不以為怨皆曰今之講學不空談者栁川也時有康南村者性耿介善善惡惡與人不諱嘗酌古禮為圖托善行為規嵗時柱杖造諸大家之門家家倒屣以迎先生視南村如一人南村貧先生亦貧敝衣糲食終其身非矯也三五先生洞語清明在躬知之至也養知莫善於寡欲有生之變有死之變人知死之變而不知生之變也魂遊變也孰主張是孔子曰合鬼與神教之至也學者不察率因其質以滋長而自易其惡之功蓋寡善學者不易其惡不已也衆人囿於數君子治則防亂則修易以知來有變易之道聽其自完自裂一歸之數已哉天下有難處之事乎利害之計也難道義之從也無難義不甘於食粟則有死餒而已矣天下之不為利害計者寡矣故戚戚者多君子以歲月為貴譬如為山德日崇也茍為罔修奚貴焉況積過者耶惟待其身者小故可茍惟自任者不重故逸古人求治於身後人求治於天下休天下而不煩身求者也擾天下而不恤求之天下者也是故執周官而不能執好惡之矩者不可以治天下水之激失水之真矣情之激失情之真矣君子之情不激也故不激其言不善之聞懲創之益少而潛損者多故言人不善自損也又聽者損動有掩護非德之宜好名者也故好名者心勞獨行君子出於實心而於聖人之誠有辨焉孝弟通神明而於聖人之察倫有辨焉志於開來者不足以盡性命志於性命者足以開來賢哉未信者之自信也雖聖人弗之信而信其自知者焉其自知不惑其自求不小德者得也無得於己而言之耻也無得於己而言之不信乎人矣惟虛故神惟敬乃虛知幾而後能知言知己之言而後能知人之言動出於至誠惻怛為王道動責之我為大人之業知者心之神明也知善知不善知好善知惡不善知必為善知必不為不善是至善也是人之明德也天之明命也故曰良致言學也致者力而後天者全曰明明德曰顧諟天之明命舉致之之謂也五常百行明焉察焉神明充周是謂能致其知古聖人莫如堯􅐌曰欽明非知之至而何中知之不倚於覩聞者也敬知之無怠者也誠知之無妄者也靜知之無欲者也寂知之無思為者也仁知之生生與物同體者也各指所之而皆指夫知之良也故曰致知焉盡矣獨知之明大明懸象照臨天下者似之蓋觀於晉人有失則者明入於地矣有邪僻之見者入左腹矣蓋觀於明夷著焉察焉無或遺焉者聖人之無不知踐焉履焉無不勝焉者聖人之無不能洽聞亦知多藝亦能暗於其大者矣至健者知之健至順者知之順唯健也不可險之而知險唯順也不可阻之而知阻人心惟危險阻之謂也健順精一之至也君子蓋無時而不懼夫危也置我身於人人之中而非之是之惡之愛之奪之豫之者夫然後可與無我物不可厭厭物者不能格物晚程記齒髮衰不可返己志氣衰奚有不可返者哉日三牲日袒割無關志氣日孜孜斃而後己善自養老者乎剛健中正純粹精無一毫髮歉而後無一毫髮非乾體境寂我寂已落一層閲時事而傷神徐自察之嫉之也非矜之也矜之仁嫉之偏潛谷鄧子儒釋之辨數千言諸友有求其說者豫謂之曰只格物致知日以身辨之矣海內講學而實踐者有人足為人師者有人而求得先師之學者未一人見有不善未嘗不知是致知知之未嘗復行是格物縣令劉梅源先生曉劉曉字伯光號梅源安福人鄉舉為新寧令見陽明於南京遂稟受焉陽明贈詩謾道六經皆注腳還誰一語悟真機歸集同志為惜陰會吉安之多學者先生為之五丁也先生下語無有枝葉嘗誦少陵語不驚人死不休之句歎曰可惜枉費心力不當云學不驚人死不休耶學者舉質鬼神無疑先生曰人可欺鬼神不可欺今世可欺後聖有作真僞不可欺員外劉晴川先生魁劉魁字煥吾號晴川泰和人由鄉舉嘉靖間判寶慶五年守鈞州七年二潮州六年升工部員外郎上安攘十事皆為要務詔徙雷殿禁中先生上疏請緩雷殿工作以成廟建足邊僃上怒杖四十入獄創甚百戶戴經藥之得不死與楊斛山周訥溪講學不輟自壬寅至乙巳凡四年秋八月上齊醮神降於箕為先生三人頌寃釋之未抵家而復逮十月還獄又二年丁未十一月五日夜高元殿火上恍忽聞火中呼先生三人名氏赦還家先生受學於陽明卒業東廓以直節著名而陶融於學問李脈泉言在鈞州與先生同僚一年未嘗見其疾言遽色鄉人飲酒令之唱曲先生歌詩抑揚可聽門人尤熙問為學之要曰在立誠每舉陽明遺事以淑門人言陽明轉人輕快一友與人訟來問是非陽明曰待汝數日後心平氣和當為汝說後數日其人曰弟子此時心平氣和願賜教陽明曰既是心平氣和了又教甚麼朋友在書院投壺陽明過之呼曰休離了根問陽明言動氣象先生曰只是常人黃德良說陽明學問初亦未成片段因從遊者衆夾持起歇不得所以成就如此有舉似先生者曰也是如此朋友之益甚大主事黃洛村先生𢎞綱黃𢎞綱字正之號洛村江西雩縣人舉正德十一年鄉試從陽明於䖍臺陽明教法士子初至者先令高第弟子教之而後與之語先生列於髙第陽明歸越先生不離者四五年陽明卒居守其家又三年嘉靖二十三年始任為汀州府推官升刑部主事時塞上多故將校下獄者吏率刻深以逢上意先生按法不輕上下以故不為人所喜遂請致仕歸與東廓雙江念菴講學流連旬月士子有所請質先生不遽發言瞪視注聽待其意盡詞畢徐以一二言中其窽會莫不融然四十年五月二十八日卒年七十先生之學再變始者持守甚堅其後以不致纖毫之力一順自然為主其生平厚於自信而薄迎合長於持重而短機械蓋望而知其為有道者也陽明之良知原即周子誠一無僞之本體然其與學者言多在發用上要人從知是知非處轉個路頭此方便法門也而及門之承其說者遂以意念之善者為良知先生曰以意念之善為良知終非天然自有之良知為有意之知覺為有意之覺胎骨未淨卒成凡體於是而知陽明有善有惡之意知善知惡之知皆非定本意既有善有惡則知不得不逐於善惡只在念起念滅上工夫一世合不上本體矣四句教法先生所不用也雙江歸寂先生曰寂與感不可一例觀也有得其本體者有失其本體者自得其本體之寂者言之雖存之彌久涵之彌深而淵微之精未嘗無也自得其本體之感者言之雖紛然而至㳫然而來而應用之妙未嘗有也未嘗有則感也寂在其中矣未嘗無則寂也感在其中矣不覩不聞其體也戒愼恐懼其功也皆合寂感而言之者也按雙江之寂即先生之所謂本體也知主靜非動靜之靜則歸寂非寂感之寂矣然其間正自有說自來儒者以未發為性已發為情其實性情二字無處可容分析性之於情猶理之於氣非情亦何從見性故喜怒哀樂情也中和性也於未發言喜怒哀樂是明明言未發有情矣奈何分析性情則求性者必求之未發此歸寂之宗所由立也一時同門與雙江辨者皆從已發見未發亦仍是析情於發析性於未發其情性不能歸一同也洛村語録自先師提揭良知莫不知有良知之說亦莫不以意念之善者為良知以意念之善為良知終非天然自有之良知為有意之知覺為有意之覺胎骨未淨卒成凡體治病之藥利在去病茍無病臭腐神奇同為元氣本領既是知覺意念莫非良知更無二本喜怒哀樂之未發且不論其有時與否但子思子云喜怒哀樂之未發謂之中中也者天下之大本也曾謂天下之大本可以時言乎未發非時則體道之功似不專於歸寂而已也故子思子曰致中和蓋合寂感以為功者也或疑慈湖之學只道一光明境界而已稍涉用力則為著意恐未盡慈湖精於用力者莫慈湖若也所謂不起意者其用力處也絶四記中云云慈湖之用力精且密矣明道云必有事焉而勿正勿忘勿助長未嘗致纖毫之力此其存之之道善用其力者固若是慈湖千言萬語只從至靈至明廣大聖知之性不假外求不由外得自本自根自神自明中提掇出來使人於此有省不患其無用力處不患不能善用其力矣徒見其喋喋於此也遂謂其未嘗用力焉恐未盡慈湖意也存主之明何嘗離照流行之照何嘗離明是則天然良知無體用先後內外深淺精粗上下一以貫之者也人心只此獨知出乎身而加乎民者只此視聽喜怒諸物舍此更别無著力處矣謂天下之物觸於前者有正有不正又謂知意心身無能離天下國家之物而獨立是以物為身之所接而非所謂僃於我者雖視聽喜怒未嘗不在其中而本末賔主則大有間後世格物之學所以異於聖人者正惟差認此一物字故格物致知之功不容不差亦不容不補主敬存養以攝歸身心而內外動靜不得不為二矣往歲讀先師書有惑而未通處即反求自心密察精進便見自己惑所從來或是礙著舊聞或是自己工夫猶未免在事迹上揣量文義上比擬與後儒作用處相似是以有惑細玩先師之言真是直從本心上發出非徒聞見知識輪轉所謂百世以俟聖人而不惑者乃知篤信聖人者必反求諸己反求諸己然後能篤信聖人故道必深造自得乃能決古訓之是非以解蔽辨惑不然則相與滋惑也已謂謝子曰太古無為中古無私太古至道中古至德吾將與子由至德而觀至道由無私而遊無為乎謝子曰古道遼矣孰從而觀之孰從而遊之曰子不見耳目口鼻視聽言臭乎今之人耳目口鼻之於視聽言臭也猶古之人耳目口鼻之於視聽言臭也吾何疑焉則吾心之於是非誠僞無古今之殊也又何疑焉日往而月來寒往而暑來今之日月寒暑猶古之日月寒暑也則又何爽焉吾心至德吾心至道吾心無私吾心無為而奚觀乎而奚遊乎茍有志於希古者反而求之吾心將無往而非古也己先師之學雖頓悟於居常之日而厯艱僃險動心忍性積之歲月驗諸事履乃始脫然有悟於良知雖至易至簡而心則獨苦矣何學者聞之之易而信之之難耶有遷官而較遠近勞逸者曰不然責望於人者謂之遠求盡於己者謂之近較計於遠近者謂之勞相忘於遠近之外者謂之逸茍有以盡吾心遠近勞逸吾何擇焉吾惟盡吾之心而已矣主事何善山先生廷仁何廷仁字性之號善山初名秦江西雩縣人舉嘉靖元年鄉試至二十年始謁選知新會縣喜曰吾雖不及白沙之門幸在其鄉敢以俗吏臨其子弟耶釋菜於祠而後視事遷南京工部主事滿考致仕三十年卒年六十六初聞陽明講學慨然曰吾恨不得為白沙弟子今又可失之耶相見陽明於南康當是時學人聚㑹南贑而陽明師旅㫄午希臨講席先生即與中離藥湖諸子接引來學先生心誠氣和不厭縷覼由是學者益親己從陽明至越先生接引越中一如南贑陽明歿後與同志㑹於南都諸生往來者恆數百人故一時為之語曰浙有錢王江有何黃指緒山龍溪洛村與先生也先生論學務為平實使學者有所持循嘗曰吾人須從起端發念處察識於此有得思過半矣又曰知過即是良知改過即是本體又曰聖人所謂無意無情者非真無也不起私意自無留意留情耳若果無意孰從而誠若果無情孰從而精或謂求之於心全無所得日用云為茫無定守先生曰夫良知在人為易曉誠不在於過求也如知無所得無所定守即良知也就於知無所得者安心以為無得知無定守者安心以守之斯豈非入門下手之實功乎況心性既無形聲何從而得既無定體何從而守但知無所得即有所悟矣知無定守即有定主矣其言不為過髙如此故聞談學稍涉𤣥遠輒搖手戒曰先生之言無是無是南都一時之論謂工夫只在心上用才涉意便已落第二義故為善去惡工夫非師門最上乘之教也先生曰師稱無善無惡者指心之應感無迹過而不留天然至善之體也心之應感謂之意有善有惡物而不化著於有矣故曰意之動若以心為無以意為有是分心意為二見離用以求體非合內外之道矣乃作格物說以示來學使之為善去惡實地用功斯之謂致良知也細詳先生之言蓋難四無而伸四有也謂無善無惡是應感無迹則心體非無善無惡明矣謂著於有為意之動則有善有惡是意之病也若心既無善無惡此意知物之善惡從何而來不相貫通意既雜於善惡雖極力為善去惡源頭終不清楚故龍溪得以四無之說勝之心意知物俱無善惡苐心上用功一切俱了為善去惡無所事事矣佛家之立躋聖位是也由先生言之心既至善意本澄然無動意之靈即是知意之照即是物為善去惡固是意上工夫也然則陽明之四有豈為下根人說教哉善山語録聖人所謂無意無情者非真無也不起私意自無留意留情耳若果無意孰從而誠若果無情孰從而精是堯舜不必惟精孔子不必徙義改過矣吾故曰學務無情斷滅天性學務有情緣情起釁不識本心二者皆病有意固謂之意見而必欲求為無意是亦不可謂非意見也是故論學不必太髙但須識本領耳茍識本領雖曰用意自無留情茍不識本領雖曰欲無意只是影響或謂求之於心全無所得日用云為茫無定守夫良知在人為易曉誠不在於過求也如知無所得無所定守即良知也就於知無所得者安心以為無得知無定守者安心以守之斯豈非入門下手之實功乎況心性既無形聲何從而得既無定體何從而守但知無所得即有所悟矣豈真無所得耶知無定守即有定主矣豈真無定守耶後世儒者不能至於聖人其毫釐之差只不信此使果真知即刻一了百當自是了得終身見在此心合一圓成合下具足更有何意可起何理可思茍有所思慮蓋不過殊塗同歸一致百慮而已有欲絶感以求靜者曰非也君子亦惟致其良知而已矣知至則視無不眀聽無不聰言無不中動無不敬是知應物之心非動也有欲故謂之動耳絶感之心非靜也無欲故謂之靜耳茍有欲焉雖閉關習靜心齊坐忘而其心未嘗不動也茍無欲焉雖紛華雜擾酬酢萬變而其心未嘗不靜也動而無欲故動而無動而其動也自定靜而無欲故靜而無靜而其靜也常精動定靜定庶矣所諭個中擬議差毫髮就裡光明障幾重肯信良知無適莫何須事後費磨礲即此知直造先天夫本來面目豈特無容擬議雖光明亦何所有誠知本體無容用其力則凡從前著意尋求要皆􅒱門瓦礫耳門開則瓦礫誠無所施雖太虛中何物不有門戶瓦礫色色具列而不能染於太虛思而無思擬議而無擬議道本如是耳是故戒愼恐懼格物致知雖為衆人設法在聖人惟精亦不廢不然孔子嘗謂吾有知乎哉無知也而又憂聞義不能徙不善不能改是以上逹不離下學中得之則磨礲改過正見聖人潔淨精微天下之事原無善惡學者不可揀擇去取只要自審主意若主意是個真心隨所處皆是矣若主意是個私心縱揀好事為之却皆非矣譬如戲謔是不好事但本根是個與人為善之心雖說幾句笑話動人機括自揣也是真心但本根是個好名之心則雖孝親敬長溫凊定省自揣還是欺心此學是日用尋常事自知自足無事㫄求習之則悅順之則裕真天下之至樂也今之同志負高明之志者嘉虛元之說厲敦確之行者樂繩墨之趨意各有所用而不能忘所見此君子之道所以為鮮致中和天地位萬物育者如或動於客氣梏於物欲覺得胸中勞耗錯亂天地即已翻覆親而父子兄弟近而童僕遠而天下之人皆見得不好至於山川草木雞犬椅桌若無相干也自不好天下雖大我自不得其平矣少即平其心易其氣良知精察無有私意便覺與天地相似矣不惟父子兄弟童僕自無不好而天下之人亦無不好以至雞犬椅桌山川草木亦無不好真見萬物皆有春意至於中間有不得其所者自惻然相關必思處之而後安故盡天下之性只是自盡其性位育之理確然天地萬物與吾原同一體知吾與天地萬物既同一體則知人情物理要皆良知之用也故除却人情物理則良知無從可致矣是知人情物理雖曰常感要之感而順應者皆為應迹實則感而無感良知無欲雖曰常寂要之原無聲臭者恆神應無方實則寂而無寂此致知所以在於格物而格物乃所以實致其良知也明道以窮理盡性至命一下便了於此可見象山云老夫無所能只是識病可見聖賢不貴無病而貴知病不貴無過而貴改過今之學者乃不慮知病即改却只慮有病豈知今之學者要皆半路修行者也習染既深焉能無病況有病何傷過而能改雖曰有病皆是本來不染而工夫亦為精一實學耳今日論學只當辨良知本領果與愼獨工夫同與不同不當論其行事標末律之古人出處異與不異使其本領既同而行事或過自可速改而進誠明之域使其本領已失而操履無過雖賢如諸葛韓范明道尚惜其不著不察而有未聞道之歎謂近來勉强體究凡動私意一覺便欲放下如此豈不是切實工夫但說得似易恐放下甚難若私意已嘗掛根雖欲放下却不能矣須有好仁無以尚之之心然後私意始不掛根如此一覺放下便就是潔淨精微之學郎中陳明水先生九川陳九川字惟濬號明水臨川人也母夢吞星而娠年十九為李空同所知正德甲戍進士請告三年授太常博士武宗欲南巡先生與舒芬夏良勝萬潮連疏諫止午門荷校五日杖五十除名世宗即位起原官進禮部員外郎郎中以主客裁革妄費羣小恨之張桂與鉛山有隙誣先生以貢玉餽宏使通事胡士紳訟之下詔獄搒掠謫鎮海衛已遇恩詔復官致仕周流講學名山如台宕羅浮九華匡廬無不至也晚而失聽書扎論學不休一時講學諸公謂明水辨駁甚嚴令人無躲避處嘉靖四十一年八月卒年六十九先生自請告入虔師陽明即自焚其著書後凡再見竟所未聞陽明歿往拜其墓復經理其家先生自敘謂自服先師致知之訓中間凡三起意見三易工夫而莫得其宗始從念慮上長善消惡以視求之於事物者要矣久之自謂瀹注支流輪回善惡復從無善無惡處認取本性以為不落念慮真悟本體矣既已復覺其空倚見悟未化渣滓復就中恆致廓清之功使善惡俱化無一毫將迎意必之翳若見全體炯然炳於幾先千思百慮皆從此出即意無不誠發無不中才是無善無惡實功從大本上致知乃是知幾之學自謂此是聖門絶四正派應悟入先師致知宗㫖矣及後入越就正龍溪始覺見悟成象恍然自失歸而求之畢見差謬却將誠意看作效驗與格物分作兩截反若欲誠其意者在先正其心與師訓聖經矛盾倒亂應酬知解兩不湊泊始自愧心汗背盡掃平日一種精思妙解之見從獨知幾微處嚴謹緝熙工夫才得實落於應感處若得個真幾即遷善改過俱入精微方見得良知體物而不可遺格物是致知之實日用之間都是此體充塞貫通無有間礙致字工夫儘無窮盡即無善無惡非虛也遷善改過非粗也始信致知二字即此立本即此達用即此川流即此敦化即此成務即此入神更無本末精粗內外先後之間證之古本序中句句吻合而今而後庶幾可以弗畔矣按陽明以致良知為宗旨門人漸失其傳總以未發之中認作已發之和故工夫只在致知上甚之而輕浮淺露待其善惡之形而為克治之事已不勝其艱難雜糅矣故雙江念菴以歸寂救之自是延平一路上人先生則合寂感為一寂在感中即感之本體感在寂中即寂之妙用陽明所謂未發時驚天動地已發時寂天寞地其義一也故其謂雙江曰吾丈胸次廣大蕩蕩淵淵十年之前却為蟄龍屈蠖二蟲在中作祟久欲竊效砭針愧非國手今賴吾丈精采仙方密鍊丹餌將使凡胎盡化二蟲不知所之矣是先生與偏力於致知者大相徑庭顧念菴銘其墓猶云良知即未發之中無分於動靜者也指感應於酬酢之跡而不於未發之中恐於致良知微有未盡是未契先生之宗旨也明水論學書古之學者為已天下之事盡矣堯舜之治天下亦盡其性充其君道而已何嘗有人已先後於其間哉後儒不知性情之學始有為國為民不為身謀以為公者此賢豪之士所以自别於流俗而其運動設施不合於中道不可語天德王道也與聶雙江便安氣習往往認作自然要識勉强亦是天命用功修治莫非勉强人力然皆天命自然合如此者以下與董兆明近年體驗此學始得真機腳跟下方是實地步有不容自己者從前見悟轉換自謂超脫而於此真體若存若亡則知凡倚知解者其擔閣支吾虛度不少矣日用應酬信手從心未嘗加意間亦有稍經思慮區畫者自以為良知變化原合如此然皆不免袛悔及反觀之信有未盡未當處豈所謂認得良知不真耶與王龍溪下皆同夫逐事省克而不灼見本體流行之自然則雖飭身勵行不足以言天德固矣然遂以窒欲懲忿為下乘遷善改過為妄萌使初學之士驟窺影響者皆欲言下了當自立無過之境乃徒安其偏質便其故習而自以為率性從心却使良知之精微緊切知是知非所藉以明而誠之者反蔑視不足輕重而遂非長過蕩然忘返其流弊豈但如舊時支離之習哉本體至善不敢以善念為善也若以善念為善則惡念起時善固滅矣惡在其為至善天命不已者耶戒懼兢惕工夫即是天機不息之誠非因此為入道復性之功也不當以知覺為良知固矣然乃良知之發用不容有二先師云除却見聞無知可致況知覺乎故知覺廢則良知或幾乎息矣近諸公只說本體自然流行不容人力似若超悟真性恐實未見性也緣私意一萌即本體已蔽蝕阻滯無復流行光照之本然也故必決去之而後其流行照臨之體得以充達此良知之所以必致而後德明身修也心齊晚年所言多欲自出機軸殊失先生宗㫖豈亦微有門戶在耶慨惟先師患難困衡之餘磨礲此志直得千聖之祕發明良知之學而流傳未逺諸賢各以意見攙和其間精一之義無由睹矣先師所以悟入聖域實得於大學之書而有功於天下後世在於古本之復雖直揭良知之宗而指其實下手處在於格物古本序中及傳習録所載詳矣豈有入門下手處猶略而未言直待心齊言之耶惟其已有成訓以物知意身心為一事格致誠正修為一工故作聖者有實地可據而又别立說以為教茍非門戶之私則亦未免意見之殊耳誠意之學却在意上用不得工夫直須良知全體洞徹普照㫄燭無纖毫翳障即百慮萬幾皆從此出方是知幾其神乃所謂誠其意也若俟意之不善倚一念之覺即已非誠意落第二義矣却似正心别是上面一層功夫故竊謂炳於幾先方是誠意之學先師云致知者誠意之本也若謂誠意之功則非矣格物却是誠意之功故曰致知在格物夫知之所以不致者物未格耳物雖意之所在然不化則物矣誠能萬感俱化胸中無一物矣夫然後本體擴然與天地同體即意無不誠矣象山人情事變上用工是於事變間尊其德性也性無外也事外無道也動而無動者也白沙靜中養出端倪是磨錬於妄念朋思之間體貼天理出來性無內也道外無事也靜而無靜者也是謂同歸一致夫收視返聽於中有個出頭此對精神浮動務外逐末者言良為對病之藥然於大道却恐有妨正為不識心體故耳心無定體感無停機凡可以致思著力者俱謂之感其所以出思發知者不可得而指也故欲於感前求寂是謂畫蛇添足欲於感中求寂是謂騎驢覓驢夫學至於研幾神矣然易曰幾者動之微周子曰動而未形有無之間者幾也既謂之動則不可言靜矣感斯動矣聖人知幾故動無不善學聖者舍是無所致其力過此以往則失幾不可以言聖學矣心本寂而恆感者也寂在感中即感之本體若復於感中求寂辟之謂騎驢覓驢非謂無寂也感在寂中即寂之妙用若復於感前求寂辟之謂畫蛇添足非謂未感時也易以寂感為神非感則寂不可得而見矣念菴謂感有時而變易而寂然者未嘗變易感有萬殊而寂然者惟一先生言念已形而寂然者未嘗不存豈感前復有寂乎雙江雖在寂上用功然寂感不分時則寂亦感也念菴則分時與雙江之意又微異矣夫寂即未發之中即良知即是至善先儒謂未發二字費多少分疏竟不明白只為認有未發時故耳惟周子洞見心體直曰中也者和也中節也天下之達道也去却大本一邊彼豈不知未發之中者哉正恐認作兩截故合一言之慮至深也而晦翁復以己意釋之則周子之意荒矣有友人問川曰涵養於未發之前是致中工夫川答曰此處下不得前字喜怒哀樂如春夏秋冬有前乎未發之中是太和元氣亦有未發為四序之時者乎只緣今人看粗了喜怒哀樂故添許多意見耳先師云良知者未發之中天下之大本致之便是天下之達道則行天下之達道乃實致良知也實致良知乃立大本也非立大本後乃推而為達道也近時學者不知心意知物是一件格致誠正是一功以心應物即心物為二矣心者意之體意者心之動也知者意之靈物者意之實也知意為心而不知物之為知則致知之功即無下落故未免欲先澄其心以為應物之則所以似精專而實支離也兄不知以何者為感若以流動為感則寂感異象微波即蕩感皆為寂纍固不待梏之反覆而後失其湛然虛明之體矣若以鑑物為感則終日鑑固無傷於止也止與鑑未始相離亦不得言有止而不鑑時也若患體之不止故鑑之不明亦當即鑑時定之不當離鑑以求止也何者其本體恆鑑不可得而離也吾丈近年宗㫖謂不當以知覺為良知却不知將發用知覺竟作何觀若本體自然之明覺即良知也若夫私智小慧緣情流轉是乃聲聞緣入憶度成性即非夲體之靈覺矣故知覺二字義涵虛實顧所指用何如如曰正知正覺即屬實作體觀恆知恆覺即屬虛作用觀然恆知即正知無倚處恆覺即正覺無障處無生發無間離也非别有一段光照從此脫胎著於境物也奈何其欲二之耶今夫聲有起滅而聞性無起滅也色有明暗而見性無明暗見聞性即知覺性也若離知覺於本體是從聲色有無處認見聞即知覺有起滅反失却恆見恆聞之本體矣與聶雙江下同昔晦翁以戒懼為涵養本原為未發為致中以謹獨為察識端倪為已發為致和兼修交飬似若精密而强析動靜作兩項工夫不歸精一今吾丈以察識端倪為第二義獨取其涵養本原之說已掃支離之弊但吾丈又將感應發用另作一層在後面看若從此發生流出者則所謂毫釐之差爾夫不睹不聞之獨即莫見莫顯乃本體自然之明覺發而未發動而無動者也以為未發之中可也既曰戒慎曰恐懼於是乎致力用功矣而猶謂之未感未發可乎哉夫屈伸翕闢互為其根復奮潛飛後先異候欲其恆復而終潛與竝行而同出即永劫不可得其與主靜藏密感應流行無時可息者不可同象而例觀亦較然明矣弟觀至顯於至微公言由微以之顯所見在毫釐之隔耳物者意之實也知者物之則也故只在發見幾微處用功致謹焉即是達用即是立本若欲涵養本原停當而後待其發而中節此延平以來相沿之學雖若精微恐非孔門宗㫖矣太常魏水洲先生良弼解元魏師伊先生良政處士魏藥湖先生良器魏良弼字師說號水洲南昌新建人嘉靖癸未進士知松陽縣入為給事中纍遷禮科都給事中十年召王瓊為冢宰南京御史馬揚等劾之下詔獄先生疏救亦下獄拷訊尋復職明年彗見東方先生以為應在張孚敬孚敬疏辨先生受杖於殿廷死而復蘇孚敬亦自陳致仕彗果滅越月改汪鋐為吏部尚書先生又劾之又明年副都御史王應鵬上疏失書職名下獄先生以為細故當原又下獄拷訊先生纍遭廷杖膚盡而骨不續言之愈激上訝其不死收之輒赦或且遷官不欲其去永嘉復位始以京察罷先生居鄉情味真至鄉人見先生有所告誡退輒稱其說以教家人其偶然者流為方語而深切者垂為法言曰魏水洲云云不可易也疾痛則問藥旱潦則問救先生因而付之各畢所願閭里頓化爭訟亦息人有夜夢先生者明旦得嘉客生兒者夢先生過其家則里中相賀以為瑞稻初登果未落家有老人不敢嘗必以奉先生其為鄉里所親敬如此先生兄弟皆於陽明撫豫時受學故以致良知自明而誠知微以顯天地萬物之情與我之情自相應照能使天回象君父易慮士大夫永思至愚夫孺子亦徵於寤寐何者不慮之知達之天下智愚疏戚萬有不同孰無良焉此所以不戒而孚也歿之日詔其子孫曰豫平生仗忠信皇天鑒不得已之言后土憐欲速朽之骨陵谷有變人心無改不必銘志隆慶改元晉太常少卿致仕萬厯乙亥卒年八十有四弟良政良器良政字師伊燕居無墮容嘗曰學問頭腦既明惟專一得之氣專則精精專則明神專則靈又曰不尤人何人不可處不纍事何事不可為舉鄉試第一尋卒水洲言吾夢中見師伊輒流汗浹背其方嚴如此良器字師顏號藥湖洪都從學之後隨陽明至越時龍溪為諸生落魄不羈每見方巾中衣往來講學者竊罵之居與陽明鄰不見也先生多方誘之一日先生與同門友投壺雅歌龍溪過而見之曰腐儒亦為是耶先生答曰吾等為學未嘗擔板汝自不知耳龍溪於是稍相嬺就已而有味乎其言遂北面陽明緒山臨事多滯則戒之曰心何不灑脫龍溪工夫懶散則戒之曰心何不嚴栗其不為姑息如此嘗與龍溪同行遇雨先生手蓋龍溪不得已亦手蓋而有怍容顧先生自如乃始惕然陽明有內喪先生龍溪司庫不厭煩縟陽明曰二子可謂執事敬矣歸主白鹿洞生徒數百人皆知宗王門之學疽發背醫欲割去腐肉不可卒年四十二先生云理無定在心之所安即是理孝無定法親之所安即是孝龍溪與先生最稱莫逆然龍溪之𤣥逺不如先生之淺近也水洲先生集道無動靜性無內外故言動亦定靜亦定又曰未感不是先已應不是後近論多於觸處動念處體認良知不於一定處下著故不免支離之病答鄒東廓先師謂良知存乎心悟悟由心得信非講求得來用志不分乃凝於神神凝知自致耳要得神凝須絶外誘固非頑空打坐亦非歌舞講求要自有悟處答羅念菴操與致自是有辨致是全功操特始事致可包操而操未可以言致復會中諸子已所不欲吾心之知也勿施於人致吾心之良知也誠勿施於人則已所不欲之物格矣所惡於下吾心之矩也毋以事上潔吾心之矩也誠毋以事上焉則吾心所惡於下之矩潔矣示諸生下同或問未發之中如何曰汝但戒慎不睹恐懼不聞養得此心純是天理便自然見聖人之學莫大於無我性之本體無我也梏形體而生私欲作聰明而生私智於是始有我爾去二者之纍無我之體復矣君子有諸己則得失不足易也故得之自是不得自是小人無諸己惟見於得失而已矣故患得患失無所不至君子以誠身為貴實有於身謂之誠身夫天下之物可以實有於身者惟善為然由其為固有之實理故可以實有焉耳彼取諸外者夫豈可得而有之耶良知之教不之學故以入井怵惕孩提愛敬平旦好惡為證然以三者皆一端之發見而未見乎全故言怵惕必以擴充繼之言好惡必以長養繼之言愛敬必以達之天下繼之問良知天理異同曰知之良處即是天理昧其知失其良則為人欲蓋自明覺而言謂之知自條理而言謂之理非二也由仁義行即根心生色睟面盎背之意行仁義非不是由此心也終是知得為好必如此做方好乃第二義便不是從中生故曰義外人本得天地之生意自能生但被習心遮蔽故不能生但去其蔽則本體自然呈露不須防檢不須窮索自然流出乃其生意也明儒學案卷十九
