body:
  text: 明儒學案卷四十一餘姚黃宗羲撰甘泉學案五侍郎許敬菴先生孚逺許孚逺字孟仲號敬菴湖之德清人嘉靖壬戍進士授南工部主事轉吏部尋調北大計與冢宰楊襄毅溥不合移病歸起考功主事髙文襄不説出為廣東僉事降海盜李茂許俊美移閩臬考功王篆修怨復中計典謫鹽運判官萬厯二年擢南太僕寺丞遷南文選郎中請告補車駕郎中謁江陵問及馬政先生倉卒置對甚詳江陵深契之欲大用而王篆自以為功出為建昌府給事中鄒南臯薦之遷陜西提學副使擢應天府丞以申救李見羅鐫級歸起廣東僉事轉廣西副使入為右通政以右僉都御史巡撫福建日本封貢事起先生疏言發兵擊之為上䇿禦之為中䇿封貢非䇿也其後朝廷卒用其中䇿召為南大理寺卿晉南兵部右侍郎而罷三十二年七月卒贈南工部尚書先生自少為諸生時竊慕古聖賢之為人羞與鄉黨之士相爭逐年二十四薦於鄉退而學於唐一菴之門年二十八釋褐為進士與四方知學者遊始以反身尋究為功居家三載困窮艱厄恍忽略有所悟南粵用兵拚舍身命畢盡心力怠墮躁妄之氣煎銷庶幾及過蘭溪徐魯源謂其言動尚有繁處這裡少凝重便與道不相應先生頂門受針指水自誓故先生之學以克已為要其訂正格物謂人有血氣心知便有聲色種種交害雖未至目前而病根尚在是物也故必常在根上著到方寸地灑灑不挂一塵方是格物夫子江漢以濯秋陽以暴此乃格物榜樣先生信良知而惡夫援良知以入佛者嘗規近溪公為後生標準令二三輕浮之徒恣為荒唐無忌憚之説以惑亂人聽聞使守正好修之士搖首閉目拒此學而不之信可不思其故耶南都講學先生與楊復所周海門為主盟周楊皆近溪之門人持論不同海門以無善無惡為宗先生作九諦以難之言文成宗旨元與聖門不異故云性無不善故知無不良良知即是未發之中此其立論至為明析無善無惡心之體一語蓋指其未發廓然寂然者而言之則形容得一靜字合下三言始為無病今以心意知物俱無善惡可言者非文成之正傳也時在萬歷二十年前後名公畢集講會甚盛兩家門下互有口語先生亦以是解官矣先生與見羅最善見羅下獄拯之無所不至及見羅戍閩道上仍用督撫威儀先生時為閩撫出城迓之相見勞苦涕泣已而正色曰公蒙恩得出猶是罪人當貶損思過而鼓吹出耀此豈待罪之體見羅艴然曰迂濶先生顔色愈和其交友真至如此原學天然自有之謂性效性而動之謂學性者萬物之一原學者惟人之能事故曰天地之性人為貴為其能學也學然後可以盡性盡已性以盡人物之性則可以贊天地之化育而與天地參而為三才故學之係於人者大也天聰天明非學不固威儀動止非學不端剛柔善惡之質非學不化仁義禮智信之德非學不完君臣父子夫婦昆弟朋友之倫非學不盡富貴貧賤夷狄患難之遇非學不逹學則智不學則愚學則治不學則亂自古聖賢盛德大業未有不由學而成者也故先師孔子特揭學之一言以詔來世而其自名惟曰學而不厭而已性之理無窮故學之道無盡學而不厭孔子之所以為孔子也然而三代以上道明而學醇三代以下道喪而學雜髙之淪於空虛卑之局於器數浸淫於聲利靡濫於詞章嗚呼學其所學而非孔子之所謂學也其卓然志於孔子之學不為他道所惑者寥寥數千載之間幾人而已乃其見有偏全言有離合行有至不至擇而取之則又存乎其人焉故學以盡性為極以孔子為宗若射之有的發而必中若川之歸海不至不已矣夫然後可以語學學之義大矣哉原學篇一學者既有志於孔子之學則必知夫求端用力之地孔子之學自虞廷精一執中而來其大旨在為仁其告顔子以克已復禮最為深切著明者也人心本來具此生理名之曰仁此禮不屬血氣不落形骸故直云克己己私一克天理具存視聽言動各有當然之則故云復禮一日克已復禮則無我無人平平蕩蕩萬物一體故曰天下歸仁已最難克仁最難言因循牽繫終身陷溺剛毅深潛一日可至故曰為仁由已而不由人出此入彼即在身心之間其機至嚴其用至博故曰非禮勿視聽言動此孔門學脈也他如言敬言恕言忠信言間邪存誠言洗心藏密言格物至知誠意正心無非此理無非此學神而明之存乎其人焉耳矣是故舍仁而不求者昧其本心不可立人道於天地之間不由克已復禮而言仁者道不勝欲公不勝私而徒以聞見湊泊氣魄承當無強至於仁之理知克已者一私不容氣質渾化故功利權謀之説非所可入知復禮者體用俱全萬理森著故虛無寂滅之教非所可同修此之謂天德逹此之謂王道此孔子之學自精一執中而來為萬世立人極者也學者於斯篤信不惑而行之不惰其庶幾乎可以語學也夫原學篇二學不貴談説而貴躬行不尚知解而尚體驗易曰默而誠之不言而信存乎德行孟子曰君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻此其説也是故性定者其言安以舒養深者其容靜以肅內直者其動簡德盛者其心下反之而躁妄輕浮繁擾驕汰生焉蓋理欲消長之機志氣清濁之辨見於動靜徵於應感如影隨形不可掩也昔者虞舜夔夔齊栗以格其親而好問好察善與人同乃見其精一之學文王在宫在廟雍雍肅肅而無然畔援無然歆羡乃見其敬止之功孔子溫良恭儉讓萃至德於其躬而意必固我至於盡忘乃其學而不厭之實凡古今聖賢所為師表人倫信今傳後者必以躬修道德而致之斷非聲音笑貌之所能為也故學者之學務實修而已矣珠藏而淵媚玉韞而山輝德聚於其中而發見於其外有不修修之未有無其驗者也不修而偽為於外與夫修之未至而欲速助長操上人之心者皆孟子所謂無源之水易盈易涸不可長久矣故曰君子之道暗然而日章小人之道的然而日亡言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉誠偽虛實判若霄壤其理甚明內辨諸身心外證諸家國學之終身不至不已斯學之道也論學書中庸所謂戒慎不覩恐懼不聞只在性體上覺照存養而已但人心道心元不相離善與不善禮與非禮其間不能以髮故間邪一著乃是聖學喫緊所在學者茍知得善處親切方知得不善處分明譬諸人有至寶於此愛而藏之所以防其隕害者是將無所不至又譬諸種植嘉禾無所容其助長之力惟有時加耘耔不為荑稗所傷而已答孟我疆白沙靜中養出端倪敬齋只説存養曷嘗有看見察見兩説抵牾蓋中庸首章言不覩不聞末章言無聲無臭分明天命之性不可覩聞不涉聲臭而夫子告子張曰立則見其參於前在輿則見其倚於衡顔淵自敘如有所立卓爾又却是有所見有所立此兩者要須默識而神明之道之在人非優遊散漫者所可入必是凝精聚神念念不忘若有參前倚衡之見及其與道契會處原來聲臭俱無若存知見便非道體答陸以建聲色臭味安佚自是天性之所不能無不離乎氣質者也第是數者為性之欲必其順乎天理之當然性通極於命而後性不蔽於欲故曰君子不謂性也仁之於父子等事而謂之命者何言君臣父子賔主賢否之際遭遇不齊天道之升降否泰消息盈虛雖聖人有所不能必是以謂之命也然仁義禮智其性在我隨其時勢所值而皆有可以有盡之道命責成於性而後命不違乎天故曰君子不謂命也究而言之命無二性亦無二但人於聲色臭味之欲恆謂之性生於君臣父子所處難易順逆之間多諉之天命故孟子特伸此抑彼使學者知所重輕云爾答朱用韜所謂天則超絶聲臭不涉思慮安排然只在日用動靜之間默識可見此心一違天則便有不安加之於人便有不合惟其當作而作當止而止當語而語當默而默一不違於天則而後協乎人心之同然知此則性之面目可得而言矣答沈實卿所謂透性與未透性云者不知從何處分别為是見解虛實耶為是躬行離合耶為是身心枯潤耶為是論説髙卑耶易言美在其中而暢於四肢發於事業孟子言根心生色睟面盎背四體不言而喻者此真透性之學若以知解伶俐談説髙妙為透性某方恥之而不敢翁更何以教之簡羅近溪老丈以毋意為宗使人人皆由毋意之學得無所謂欲速則不逹者耶大學欲正其心者先誠其意所謂誠其意者只在毋自欺而求自慊此下學之功也顔子有不善未嘗不知知之未嘗復行亦誠吾意而已吾儕之學焉可以躐等乎此理才有悟處便覺鳶飛魚躍觸處流行而不須一毫安排強索之力然到得與自己身心湊泊髙逺孟子曰反身而誠樂莫大焉程子曰識得此理以誠敬存之而已識者默而識之也識得便須存得方為已有時時默識時時存養真令血氣之私銷鑠殆盡而此理盎然而流行乃是反身而誠與鳶飛魚躍同意不然饒説得活潑潑地亦無益也學者認得容易翻令心中浮泛不得貼實此即誠與不誠之介不可不察也凡吾儕平日覺有胸次灑落時感應順適時正是誠意端倪要須存養擴充得去若作毋意見解則精神便都散漫矣與李同野吾儕學問見處俱不相逺只是實有諸已為難能於日用工夫更不踈放真真切切實實平平不容意見盤桓則此理漸有諸已矣此學無內外相人已相打得過處方是德性流行打不過時終屬私已猶為氣質用事吾輩進修得失涵養淺深亦只驗諸此而已與萬思默人事自為簡省未嘗不可若不得省處即順以應之洗滌精神灑灑落落無揀擇相更覺平鋪實在操舍存亡昏明迷覺總在心而不在覺與鄧定宇自心妙用即是涓涓之流亦即是汪洋浩大之海鄙意則謂須有鑿山濬川掘井九仞而必及泉之功涓流浩海乃其自然不容人力也昔人學問失之廣逺故儒者反而約之於此心其實要反約又須博學詳説而得之非謂直信此心便可了當是事也與王東崖知止致知俱出大學首尾血脈原是相因致得良知徹透時即知是止討得至善分明處即止是知初非有本體工夫亦非有偏全先後之别古今儒者悟入門路容有不同隨時立教因病制方各有攸當政不必以此病彼也答胡體仲格物之説彼謂待有物而後格恐未格時便以離根者此其論似髙而實非也若得常在根上著到方寸地灑灑不挂一塵乃是格物真際人有血氣心知便有聲色種種交害雖未至目前而病根常在所以誠意工夫透底是一格物孔子江漢以濯秋陽以暴胸中一毫查滓無存隂邪俱盡故能毋意毋必毋固毋我此非聖人不足以當格物之至與蔡見麓鄙意格物以為神明之地必不纍於一物而後可以合道格致誠正與戒懼慎獨克復敬恕斷無殊旨與鄧定宇博文約禮道之散見於人倫庶物之間者文也其本於吾心天然之則者禮也隨事而學習之謂博隨學而反已之謂約禮即在於文之內約即在於博之時博而約之所以為精也精則一一則忠與胡廬山先生論心性書間中披誦明公與李見羅所論心性兩書見我公誠心直道無少迂曲而見羅丈雄才卓見確有主張此皆斯文之所倚賴書中大意公則謂靈覺即是恆性不可殄滅見羅則謂靈覺是心性非靈覺從古以來知性者少識性者多二公論旨不合只在於此夫心性之難言久矣混而一之則其義不明離而二之則其體難析譬諸燈然心猶火也性則是火之光明又譬諸江河然心猶水也性則是水之濕潤然火有體而光明無體水有質而濕潤無質火有體故有柔猛而光明無柔猛水有質故有清濁而濕潤無清濁火之明水之濕非一非二此心性之喻也夫率性之為名自天之降衷不雜乎形氣者而言而心之為名合靈與氣而言之者也性只是一個天命之本體故為帝則為明命為明德為至善為中為仁種種皆性之别名也此未嘗有外於心之靈覺而靈覺似不足以盡之心者至虛而靈天性存焉然而不免有形氣之雜故虞廷别之曰人心道心後儒亦每稱曰真心妄心公心私心其曰道心真心公心則順性而動者也心即性也其曰人心妄心私心則雜乎形氣而出者也心不可謂之性也君子之學能存其心便能復其性蓋心而歸道是人而還天也即靈覺即天則豈有二耶夫性之在人原來是不識不知亦原來是常明常覺即寂而照即照而寂初非有內外先後之可言若以虛寂為性體而明覺為心用是判心性為二物斷知其有不然也見羅兄又謂虞廷之相傳者在中道心人心總皆屬用大學之歸宗者在善心意與知總非指體此等立言俱不免主張大過中固是性之至德舍道心之微更從何處覓中善固是道之止宿離心意與知却從何處明善性無內外心亦無內外體用何從而分乎尊教有云指體而言則不識不知指用而言則常明常覺此語猶似未瑩蓋常明常覺即是不識不知本然明覺不落識知一有識知即非明覺有明覺之體斯有明覺之用恐又不得以不識不知為體而以常明常覺為用也萬古此心萬古此性理有固然不可增減經傳之中或言性而不言心或言心而不言性或心與性並舉而言究其指歸各有攸當混之則兩字不立析之則本體不二要在學者善自反求知所用力能存其心能復其性而已矣斯道無人我無先後轍因二公所論一究言之惟願髙明更賜裁正若尊刻衡齊所辨宋儒物理之説其説頗長姑俟他日面教盡所欲請也恭定馮少墟先生從吾馮從吾字仲好號少墟陜之長安人萬厯己丑進士選庶吉士改御史疏請朝講上怒欲杖之以長秋節得免請告歸尋起原官又削籍歸家居講學者十餘年天啓初起大理寺少卿與定熊王之獄擢副都御史時掌院為鄒南臯先生風期相許立首善書院於京師倡明正學南臯主解悟先生重工夫相為鹽梅可否而給事朱童蒙郭允厚不説學上疏論之先生言宋不競以禁講之故非以講之故也我二祖表章六經天子經筵講學皇太子出閣講學講學為令甲周家以農事開國國朝以理學開國也臣子望其君以講學而自己不講是欺也倘皇上問講官曰諸臣望朕以講學不知諸臣亦講學否講官亦何以置對乎先臣王守仁當兵戈倥􅘓之際不廢講學卒能成功此臣等所以不恤毁譽不恤得失而為此也遂屢疏乞休又二年即家拜工部尚書尋遭削奪逆黨王紹徽修怨於先生及為冢宰使喬應甲撫秦以殺之先生不勝挫辱而卒崇禎改元追復原官諡恭定先生受學於許敬菴故其為學全要在本原處透徹未發處得力而於日用常行却要事事點簡以求合其本體此與靜而存養動而省察之説無有二也其儒佛之辨以為佛氏所見之性在知覺運動之靈明處是氣質之性吾儒之所謂性在知覺運動靈明中之恰好處方是義理之性其論似是而有病夫耳目口體質也視聽言動氣也視聽言動流行而不失其則者性也流行而不能無過不及則氣質之偏也非但不可言性并不可言氣質也蓋氣質之偏大略從習來非氣質之本然矣先生之意以喜怒哀樂視聽言動為虛位以道心行之則義理之性在其中以人心行之則氣質之性在其中若真有兩性對峙者反將孟子性善之論墮於人為一邊先生救世苦心大將氣質説壞耳蓋氣質即是情才孟子云乃若其情則可以為善矣若夫為不善非才之罪也由情才之善而因見性善也若氣質不善便是情才不善情才不善則荀子性惡不可謂非矣辨學録人心至虛衆理咸備丢過理説心便是人心惟危之心即有知覺是告子知覺運動之覺佛氏圓覺大覺之覺非吾儒先知先覺之覺也覺之一字亦不可不辨知覺的是天理便是道心知覺的是人欲便是人心非概以知覺為天理為道心也若丢過理字説心説知便是異端吾儒曰喻利之心不可有異端曰喻義之心不可有吾儒曰為惡之心不可有異端曰為善之心不可有或詰之曰喻義之心不可有喻利之心可有乎為善之心不可有為惡之心可有乎彼則曰喻義之心且不可有况喻利乎為善之心且不可有况為惡乎如此為言雖中人亦知其非彼又恐人之非之也復倡為一切總歸於無心之説以為人之心體本空無利無義無善無惡者其本體也必也無喻利心併無喻義心併無無喻義心無為惡心併無為善心併無無為善心一切總歸於無心方合本體耳説至此雖髙明莫知其非矣不知正是發明喻義之心不可有為善之心不可有處奈何不察而誤信之耶且義原非外性原是善心之本體原是有善無惡的可見必有喻義為善之心而後為合本體也今欲一切總歸於無心安在其為合本體耶况人心易放而難收儘去喻義猶恐喻利儘去為善猶恐為惡今欲一切總歸於無心竊恐義無而利未必無善無而惡未必無反為本體之纍不小也又况義利只有兩途人心原無二用出於義即入於利出於善即入於惡豈有無義無利無善無惡一切總歸於無心之理乎大抵義原非外特自有其義之心不可有而喻義之心必不可無性原是善特自有其善之心不可有而無善之心必不可無總是喻之又喻以至於化為之又為以至於忘造到上天之載無聲無臭處只好説有喻義之心而至於化有為善之心而至於忘有喻義為善之心而無聲臭之可擬亦説不得喻義之心不可有為善之心不可有今云云者所謂小人而無忌憚者也問天命之性無聲無臭原著不得善字曰天命之性就是命之以善何消再著得故曰性善不然所命者為何物耶孟子道性善正直指天命之初而言耳又問無聲無臭何也曰善曾有聲有臭耶天性之性如一陽來復造化生意雖未宣泄而凡宇宙間形形色色萬紫千紅無一不胚胎完具於其內故曰天命之謂性此自是實在道理原不落空若曰天命之性渺渺冥冥一切俱無如此不知天命的是個甚麼便於天命二字説不去矣問人心一概説不得有無此是論工夫若論本體則無善無惡全説不得有矣無心之説蓋指本體也曰不然論工夫心原一概説不得有無還有不可不有者不可不無者若論本體則全説不得無矣故孟子曰無惻隱之心非人也云云曰無曰非何等明白又曰惻隱之心人皆有之至我固有之也曰皆有曰固有又何等明白而曰本體無善無惡異端無心之説專指本體而言誤矣問善之善對惡而言也無善之善指繼善之初不對惡而言也惡如彗孛妖氛善如景星卿雲無善之善如太虛惡如木石屑善如金玉屑無善之善如目中不容一屑如何曰吾儒之旨只在善之一字佛氏之旨却在無善二字近日學者既惑於佛氏無善之説而又不敢抹殺吾儒善字於是不得已又有無善之善之説耳不知吾儒之所謂善就指太虛本體而言就指目中之不容一屑而言非專指景星慶雲金玉屑而言也善字就是太虛非太虛為無善之善也乃若其情則可以為善矣乃所謂善也由可以為善之善才見得乃所謂善之善兩個善字原只是一個豈有可以為善之善乃與惡對之善乃所謂善之善乃無善之善之理哉一有其善便是不善故曰喪厥善一有意為善便不是為善故曰雖善亦私至於喪至於私則善於何有如此是其病正在無善也山下出泉本源原清此性之説也漸流漸逺有清有濁清者勿使之濁濁者復澄之清此學之説也三品之説是徒知漸流漸逺有清有濁未嘗不是而不知山下出泉本源原清澄濁求清非義外也慈湖之説是徒知山下出泉本源原清亦未嘗不是而不知漸流漸逺有清有濁則澄濁求清非揠苗也嗚呼不知本體者疑性之或惡而既以學為義外知本體者信心之即道而又以學為揠苗學果何日而明哉有意為善有所為而為如以為利之心為善為名之心為善以以善服人之心為善之類非以安而行之為無意為無所為利而行之勉強而行之為有意為有所為也今人見人孳孳為善而概曰有意曰有所為則阻人為善之路矣夫有太極而無思為有物則而無聲臭乃吾儒正大道理正大議論佛氏丢過太極專講無思無為丢過物則專講無聲無臭是無思為而併無太極無聲臭而併無物則有是理乎知覺運動視聽飲食一切情欲之類原是天生來自然的原無思無為寂然不動感而遂通何思何慮佛氏窺見這些子遂以此為真性把吾儒這個理字以為出於有思有為出於偽如告子以人性為仁義莊子以仁義為殘生傷性之類不是天生來自然的故孟子不得已指點出個見孺子而怵惕覩親骸而顙泚不忍觳觫之牛不屑呼蹴之食之類見得這個理字也是天生來自然的無思無為寂然不動感而遂通何思何慮非以人性為仁義而殘生傷性也縱是説出多少工夫説思説為只是教人思這個無思的道理為這個無為的道理非義外非揠苗非強世也吾儒宗旨與佛老全不相干後世講學不精誤混為一以上逹歸佛以下學歸儒以頓悟歸佛以漸修歸儒以明心見性歸佛以經世宰物歸儒諸如此類名為闢佛適以崇佛名為崇儒適以小儒何也佛氏上逹吾儒下學佛氏得上一截少下一截工夫如此是夫子下學儒而上逹佛也是佛反出其上可乎修而不悟豈曰真修十五志學七十從心漸也以十五而即知志學非頓乎學而不厭修也默而識之非悟乎此吾儒頓悟漸修之説也經世宰物而不出於心性安所稱王道先明諸心知所往然後力行以求至非吾儒之言乎今以上以悟以心性歸佛氏以下以修以事物歸吾儒是佛氏居其精而吾儒居其粗也有是理哉不知佛氏之失正在論心論性處與吾儒異不專在舍經世宰物而言心性正在所悟所逹處與吾儒異不專在舍漸修而言頓悟舍下學而言上逹也或曰吾道至大二氏之學雖甚髙逺總不出吾道之範圍故二氏偏不能兼吾儒吾儒全可以兼二氏曰不然儒佛既混談儒者稍求精便誤入於佛氏闢佛者稍欠精反操戈於吾儒是其貽禍者一儒佛既渾詆儒者摘一二誤佛氏之語以為非毁攻擊之話柄談佛者借一二吾儒精微之語以為惑世誣民之蒿矢是其貽禍者二向使佛自佛儒自儒不混為一豈有是哉且吾道本大何必兼二氏而後見其大若必待兼二氏以為大則又安所稱大耶况吾儒正道也異端邪説也邪固不能兼正正豈可以兼邪若正可以兼邪又惡在其為正耶吾儒之學以理為宗佛氏之學以了生死為宗如人生則能知覺運動死則血肉之軀還在便不能知覺運動可見人之生死的是血肉之軀這能知覺運動的一點靈明真性原未嘗死所謂本來面目萬劫不磨者此也悟得這個便是超悟便知無死無生所謂出離生死見性成佛者此也其悟入處不由積纍不由聞見不可言説不可思議只在當下一覺一覺便了更有何事雖中間説得千變萬化其實宗旨則是如是與吾儒論心性處全不相干蓋性者心之生理吾儒所謂性亦不由積纍不由聞見以理言非專以能知覺運動的這個言故彼所云性乃氣質之性生之謂性之性吾所云性乃義理之性性善之性彼所云一點靈明指人心人欲説與吾儒所云一點靈明所云良知指道心天理説全然不同雖理不離氣而舍理言氣便是人欲天理人欲之辨乃儒佛心性之分此宗旨處不可不辨也吾儒曰未發目雖無覩而天命真覩之理已具耳雖無聞而天命真聞之理已具心雖無知覺而天命真知真覺之理已具即發而皆中即覩以天下而無不明而所以能明的真覩之理亦不可得而覩聞以天下而無不聰而所以能聰的真聞之理亦不可得而聞知覺以天下而無不睿知而所以能睿能知的真知真覺之理亦不可得而知不可得而覺故曰上天之載無聲無臭沖漠無朕即萬象森羅萬象森羅亦沖漠無朕未發不為無已發不為有渾然一理種種道理自天命之初已備後來多少工夫多少事業都只是率性之道耳佛氏覺性本空以為這一點靈明作用的性本來原是空的目惟無覩故能覩耳惟無聞故能聞心惟無知覺故能知覺目雖能覩而所以能覩的真空之性原不可得而覩耳雖能聞而所以能聞的真空之性原不可得而聞心雖能知覺而所以能知能覺的真空之性原不可得而知不可得而覺故曰覺性本空不生不滅若與未發之中相似而不知實有大不同者或曰性只是一個性那裡又是兩個以義理氣質分儒佛余曰人得天地之理以為生此所謂義理之性也而氣質乃所以載此理豈舍氣質而於别處討義理哉性原只是一個但言義理則該氣質言氣質則遺義理故曰氣質之性君子有弗性焉此闢佛之説也且子既知性只是一個性何不一之於性善之性而獨一之於生之謂性之性耶今欲一之於生之謂性而不一之於性善此三品之説所由起也是子自二之三之以至於倍蓰而無算也性豈有二焉孟子道性善故曰夫道一而已矣此儒者之旨也吾儒説去欲佛氏却説欲是去不得的吾儒説存理佛氏却説理是不消存的甚且併天理人欲四字都要抹殺中間雖説欲障其實是説理障的客語畢竟要回護這個欲字病痛全在誤認生之謂性一句知覺運動是氣是欲而知覺運動之恰好處是理佛氏原認欲字為性不曾論理安得不抹殺理字回護欲字問仁者人也目能視耳能聽口能言身能動人也即仁也何如曰此惑於佛氏之説也視聽言動是氣不是理如何説是仁視聽言動之自然恰好合禮處才是仁耳目口體為形視聽言動為色視聽言動之自然恰好處為天性理不離氣天性不離形色視聽言動之禮不離耳目口體故曰仁者人也非便以能視能聽能言能動為仁也若不論禮不禮勿不勿而惟以視聽言動為仁是直把氣質作義理墮於情欲矣昔人謂佛氏得吾儒之體只是無用又謂佛學有得於形而上者而但不可以治世不知佛氏所以為異端者正在不得吾儒之體正在誤認形而下者為形而上者端猶端倪發端之端異端云者謂其發端處與吾儒異也若不窮究其發端而徒辨别其流弊彼將曰其所以破佛者乃佛書自不以為然者也問人心至虛不容一物理在何處安得不説理障曰人心至虛不容一物處就是理異端之所謂理誤指物而言吾儒之所謂理正指不容一物者而言耳人心之初惟有此理故見孺子入井皆有怵惕惻隱之心此時固容不得一毫殘忍刻薄之念亦容不得一毫納交要譽之念殘忍刻薄納交要譽雖不同同謂之欲故謂心之本體容不得一毫欲則可謂容不得一毫理則不可蓋人心之初惟有此理豈可説容不得或問如何是理曰即所謂怵惕惻隱之心是也疑思録格物即是講學不可談玄説空自慊二字甚有味見君子而厭然正自小人自家不慊意處安得心廣體胖故曰行有不慊於心則餒矣君子慎獨只是討得自家心上慊意自慊便是意誠便是浩然之氣塞於天地之間問天命之性曰如孩提知愛是誰命他愛稍長知敬是誰命他敬這都是自然而然的故曰天命又問此率性之道非天命之性也如何是天命之性曰孩提如何便知愛稍長如何便知敬這必有所以知愛敬者在此蓋是父母初生時天已命之矣豈待孩提稍長後才有此愛敬哉知此則知天命之性外省不疚不過無惡於人內省不疚才能無惡於志無惡於人到底只做成個鄉願無惡於志才是個真君子論語一書論工夫不論本體論現在不論源頭蓋欲學者由工夫以悟本體由見在以覓源頭耳中庸則直指本體源頭以泄孔子之祕如論語論夫子之道曰忠恕而已矣而中庸則曰忠恕違道不逺蓋論語之論道指其見在可道者言中庸之論道直指天命率性之初而言也不然忠恕即一貫之道而曰違道不逺何哉論語論德曰據於德中庸則曰不顯惟德百辟其刑之蓋論語之論德指見在可據者言中庸之論德直合於天載之初而言也不然暗然知幾即君子之德而曰可與入德何哉如水一也論語指其見在如江河如池沼皆水也中庸則直指山下出泉原泉混混而言矣大庭廣衆中如一人稱人善一人稱人惡則稱人善者為君子而稱人惡者為小人一人稱人善一人和之一人阻之則和者為君子而阻者為小人一人稱人惡一人和之一人不答則不答者為君子而和者為小人以此觀人百不失一從心所欲便不踰矩從耳目口體所欲便踰矩矣孔門以博約立教是論工夫非論本體學者不逹遂以聞見擇識為知故夫子不得已又曰知之為知之不知為不知是知也直就人心一點靈明處點破知字此千古聖學之原若聞見擇識不過致知工夫非便以聞見擇識為知也故曰知之次知其知知其不知是本體擇其善者而從之多見而識之是工夫辟之鏡本明而拂拭所以求明非便以拂拭為明也以拂拭為明固不是謂鏡本明不必拂拭亦不是故聖人説出本體正見得工夫原非義外耳仲尼顔子之樂乃所以樂道非懸空去别有個樂也禪學盛行將此道字掃而去之只懸空以求此樂其弊至於猖狂自恣而不可救孟子曰理義之説我心猶芻豢之悅我口分明説破道之可樂如此不得於言勿求於心不得於心勿求於氣是人性皆善而告子強制之使惡也人心之靈莫不有知不得於言不得於心心上自是不安自是過不去自不容不求於心自不容不求於氣此正是真心不容已處所謂性善所謂良知也如此真心正當操存而培養之乃反強制之豈不謬哉不得於言要求於心就求於心不得於心要求於氣就求於氣不必去勿此之謂率性故曰無為其所不為無欲其所不欲如此而已矣人心虛靈是非可否一毫瞞昧不過凡該行該止此中自有權衡若肯憑著本心行去使件件慊於心便是集義便是自反而縮此正孟子得統於曾子處已溺已飢若過於自任不知此一念就是乍見孺子入井怵惕惻隱之一念人人都是有的如不敢承當已溺已飢之心難道亦不敢承當惻隱之心問心一耳以心求心豈心之外復有心耶兩物對則計校生兩念橫則意見生求之為言不幾於憧憧往來耶曰不然心非物也以心求心非兩念也能求之心即是存不能求之心即是放求之云者不過自有而自照之耳非心之外復有心也洗心正心存心養心皆是此意若以求心為兩念則心誰去洗誰去存養亦不幾於兩念耶如此必舍置其心任其憧憧往來而後為何思何慮矣有是理哉問操則存似涉於有舍則亡似淪於無其失一也不操不舍之間有妙存焉何如曰不操便是舍不舍便是操勢無兩立豈有不操不舍之理此便是要舍的説話問操似助舍似忘不操不舍之間才是勿忘勿助曰勿忘勿助都是在操字上説有事是操處勿忘勿助是操之妙處有夭有夀是常事而人多以夭為變以夀為常有毁有譽是常事而人多以毁為變以譽為常有得有失是常事而人多以失為變以得為常以至貧富榮辱皆然常者一也分常變而二之則二矣故人生終日營營逐逐有多少畔援欣羡處那一件不從二字上生來若能勘得破夭夀乃人生常事何有於毁譽得失貧富榮辱乎便是不二便是修身以俟之語録日用間富貴貧賤時時是有的如食求飽居求安便是欲富貴心惡惡衣惡食便是惡貧賤心故今人凡念頭起處都是富貴貧賤所在念及於此此心真是一時放下不得問先知後行知行合一曰昔涇野與東廓同遊一寺涇野與東廓曰不知此寺何以能至此寺東廓曰不至此寺何以能知此寺之妙二公相視而笑可見二説都是不可執一也凡人視所當視不視所不當視便是眸子瞭焉神精而明若不視所當視而反視所不當視便是眸子眊焉神散而昏吾儒事業不外齊治均平若以家道富厚為齊天下富強為平此五霸之治平非帝王之治平也惟是入其家見其父慈子孝兄友弟恭夫和婦順方是家齊景象而家之貧富不與焉推而一國必一國興仁興讓而始謂之治又推而天下必人人親親長長而天下始平不在國之富不富兵之強不強也以富強為治平此千載不破之障問參前倚衡曰只如此時眼前師友相對大家精神收斂寧一便是參前倚衡真境苐恐過此時不能如此時耳張輝問性有率有不率故聖人修道以立之教曰性無有不率者人皆率性而盡性者寡耳性即良知良知無人不有率性無時不然孩提而知愛稍長而知敬率性也乍見而惻隱起呼蹴而羞惡生率性也率則心有所不及思明有所不及用即率之人不知也人惟見其方然而復不然則以為此率而彼不率矣然而實非也如小人間居為不善夫為不善可矣如何必於間居間居為不善可矣如何又厭然於見君子不但誤為處必有羞慚即故為處亦必有遮掩一語窮而舌遁一揖失而面赤一存注之不良而轉睛顧盻之不能隱是誰致之而然也人性本善則有不善者自無所容自為之而自惡之人亦何時而不率性哉聖賢學問全在知性有義理之性有氣質之性如以義理之性為主源頭一是則無所不是情也是好的故曰乃若其情則可以為善矣才也是好的故曰若夫為不善非才之罪也若以氣質之之性為主源頭一差則無所不差情也是不好的為恣意縱欲之情才也是不好的為恃才妄作之才今不在性體源頭上辨别而或曰性是善的情是不善的又或曰情是善的才是不善的皆末流之論也動心忍性之性與性也有命之性是氣質之性人與禽獸同若教他忍教他不謂則禽獸不能矣禽獸不能而人能之正吾人有此一點義理之性耳故曰人之所以異於禽獸者幾希乾以大生坤以廣生天無不覆地無不載此天地之性善也若論氣質則天一屬氣便不免有旱潦地一屬質便不免有肥磽然則天地亦有善不善矣惟不言氣質而言義理則為物不二生物不測天地之德孰大於此又何旱潦肥磽之足言也孟子以情善言性善辟之石中有火擊之乃見則知火在石中雖不擊亦有洪鐘有聲叩之始鳴則知聲在鐘中雖不叩非無知擊之有火叩之有聲則知情知不擊之火不叩之聲則知性矣問見孺子而怵惕見觳觫而不忍此固以情之自然善者驗性之善如見美食而思嗜見美色而思好彼亦以情之自然不善者驗性之不善而孟子專言性善何也曰有二人於此一人見孺子而怵惕見觳觫而不忍見美食而不思嗜見美色而不思好一人見美食而思嗜見美色而思好見孺子而不怵惕見觳觫而不不忍則謂性有善有不善則可今以怵惕不忍之人一旦見食色而思嗜之好之以此驗人性之有不善似是不知思嗜思好之人一旦見孺子見觳觫亦未有不怵惕惻隱者以此驗人性之皆善又何疑焉孟子以氣質中之義理斷人性之皆善而告子以氣質中之氣質斷人性之有不善是告子徒知氣質之性而不知義理之性也問變化氣質就不好一邊説所謂氣質之用小學問之功大就好一邊説不知好一邊便是義理矣如何尚謂之氣質曰此處最微妙如見孺子而怵惕此義理之性也若不識其端而擴充之則怵惕亦氣質耳息夜氣而幾希此義理之性也若不識其機而培養之則幾希亦氣質耳知愛知敬此義理之性也若不乘此天真而加以入孝出弟之功則愛敬亦氣質耳蓋義理之性乘氣質以發露而不由學問之功是靠天而不靠人恐在人之工夫踈併在天之端倪亦不可保也喜怒哀樂未發之中此千古聖學之原故豫章延平靜中看喜怒哀樂未發氣象伊洛真傳也而佞佛者妄肆譏評曰未發是一念不起時也以一念不起之中忽起一看氣象之念便是起念便是發且既云未發矣氣象在何處既有氣象矣又何云未發令學者茫然無以應不知如可喜可怒可哀可樂之事一時未感我安得無故起念就此一時喜怒哀樂之念未起故謂之未發耳非一概無念一毫工夫無所用而後謂之未發也試看此未發時氣象何等湛然虛明是湛然虛明正未發之氣象也安得説未發矣而氣象在何處以一念不起之中縱忽起一看氣象之念不謂之發何也謂所起者戒慎恐懼之念而非喜怒哀樂之念也安得説既有氣象矣又何云未發未發工夫不是面壁絶念求之虛無寂滅之域只凡是在平常無事時預先將性命道理講究體認戒慎不覩恐懼不聞只在性體上做工夫使心常惺惺念常亹亹時時討得湛然虛明氣象便是未發用力處亦便是未發得力處如此有不發發皆中節矣非以一概無念為未發以靜中看未發氣象為起念為發也未發是一念不起時也若起一用功之念便是發信斯言也則未發時一毫工夫無處用矣未發則功夫無處用已發則工夫又不及用如此將工夫一切抹殺只憑他氣質做去喜怒哀樂如何能中節目之知視耳之知聽飢渴之知飲食人與禽獸何異惟是視之能明聽之能聰飲食之能知味人始異於禽獸耳異端言性指人與禽獸同處言吾儒言性指人與禽獸異處言異處只是些子故故曰幾希幾希云者危之也異端言性亦不曾直以目之知視耳之知聽飢渴之知飲食為性而以目之所以知視耳之所以知聽飢渴之所以知飲食的這個言性吾儒亦不曾直以視之能明聽之能聰飲食之能知味為性而以視之所以能明聽之所以能聰飲食之所以能知味的這個言性所以能明能聰能知味的這個性體原是無聲無臭不覩不聞的所謂道心所謂至善所謂未發之中此理之根也所以能視能聽能飲食的這個性體亦是無聲無臭不覩不聞的在老氏為天地根在佛氏為有物先天地此欲之根也何以為欲之根曰只推究所以能視聽飲食的源頭而不推究其所以能明能聰該視不該視該聽不該聽的源頭如此則任視聽縱耳縱目適已自便何所不為故曰此欲之根也人心一念發動處有善念有惡念有善念亦自有好善之念有惡念亦自有惡惡之念皆一時並起善念與惡念對言好善之念與惡惡之念不對言何也好善之念固善念惡惡之念亦善念總一念也如起一善念即當為善却又不肯為是初念是而轉念非也如起一惡念復起一惡不當為之念遂不為是初念非而轉念是也此就平常論意者言也若誠意章却置過善念惡念兩者對言的只專以好善之念惡惡之念就好念頭一邊説所以意都是該誠的不比平常轉念起念之有互易也至於如惡惡臭如好好色則萬念總歸於一念而其念不棼末念止還其初念而其念不轉無為其所不為無欲其所不欲為其所為欲其所欲又何不自慊之有如此則心本一而意亦復還於一又何至於支離而去哉心一也自心之發動處謂之意自心之靈明處謂之知意與知同念並起無等待無先後一念發動有善有惡而自家就知孰是善念孰是惡念一毫不爽可見意有善惡而知純是善意本自誠心本自正是本體意本自誠却要還他個誠心本自正却要還他個正誠意正心是工夫觀意本自誠心本自正可見正心誠意不是以人性為仁義意本自誠却要還他個誠此誠字就念起之後言也若念未起之前不前定乎誠則人性雖善而牿之反覆竊恐一日之間善念少而惡念多久之純是惡念矣又將何以誠之哉故曰靜中養出端倪方有商量處可見古人不惟誠此念於既始有念之後抑且誠此念於未始有念之先人心道心不容並立如綱常倫理能盡道便是道心不能盡道便是人心喜怒哀樂中節便是道心不中節便是人心視聽言動合禮便是道心不合禮便是人心極容易辨非以喜怒哀樂視聽言動為人心以中節合禮為道心也在人之人心去之惟恐不盡而以喜怒哀樂視聽言動為人心此數者豈可去乎大學因虞廷言人心道心恐人無處覓心故説出個意字見此心一念發動才有人與道之異不然一念未起鬼神莫知從何分辨學問之道全要在本原處透徹未發處得力則發皆中節取之左右自逄其原諸凡事為自是停當不然縱事事簡點終有不湊泊處此吾儒提綱挈領之學自合如此非謂日用常行一切俱是末節可以任意不必簡點也先立乎其大不是懸空在心上求正是在喜怒哀樂視聽言動間辨别人心道心精之一之務使道心為主而人心盡化討得此中湛然虛明此之謂先立乎其大而耳目口體小者自不能奪也孩提知愛稍長知敬見孺子而惻隱此良知也率性也飢之知食渴之知飲若曰亦良知也亦率性也便説不得矣一邊屬理一邊屬欲兩項朦朧合説則君子以循理為率性小人亦以縱欲為率性耳論學書率性是本體盡性是工夫率性衆人與聖人同盡性聖人與衆人異如見孺子入井而怵惕此率性也衆人與聖人同至於擴充以保四海此盡性也聖人便與衆人異矣知愛知敬為率性逹之天下為盡性不忍觳觫為率性愛百姓為盡性皆是也率性無工夫盡性有工夫盡性者即盡其所率之性由工夫必合本體者也惻隱之心仁之端也惻隱乃率性之道而仁乃天命之性天命之性不可見而於惻隱見其端由其端以窺其體而本體之善可知故曰性善得其體則其用自然得力但不言用則其體又不可見其諄諄言用者欲人由用以識體耳既由用以見其體又何用之非體性體原不覩不聞然必不覩不聞之時乃見性體如見孺子入井見牛觳觫此時固有怵惕惻隱之心矣然未見之前豈遂無是心乎未見之前之心不覩不聞正以體言正以天命之性言既見之後之心有覩有聞便以用言便以率性之道言矣故於不覩不聞之時然後識性體果不落於覩聞也若謂共覩共聞之時而不覩不聞者自在雖已發而根柢者固未發也又何必論時不知不覩不聞之時而共覩共聞者亦自在雖未發而活潑者固常發也又何為專以不覩不聞為性體乎未見入井而胸中已涵孺子未見觳觫而胞內已具全牛先天脈理旁皇周浹故曰至善不覩不聞莫見莫顯原就時言而道即在其中彼丢過時而專以不覩不聞為道體則可覩可聞鳶飛魚躍獨非道體耶若是則工夫專在於寂動處感處可以任意縱有差錯無妨矣近世學術多岐議論不一起於本體工夫辨之不甚清楚如論本體則天命之性率性之道衆人與聖人同論工夫則至誠盡性其次致曲聖賢與衆人異論本體則人性皆善不借聞見不假思議不費纖毫功力當下便是此天命率性自然而然者也論工夫則不惟其次致曲廢聞見思議功夫不得即至誠盡性亦廢聞見思議功力不能此戒慎恐懼不得不然者也如以不借聞見不假思議不費纖毫功力為聖人事不知見孺子入井孩提知愛稍長知敬亦借聞見假思議費功力乎可見論本體即無思無為何思何慮非玄語也衆人之所以與聖人同者此也若論工夫則惟精惟一好問好察博文約禮忘食忘憂即聖人且不能廢矧學者哉若不分析本體工夫明白而混然講説曰聖學不借聞見不假思議不費纖毫功力雖講的未嘗不是却誤人不淺矣必講究得清楚明白從此體驗愈體驗愈渾融造到無寂無感無安無勉地位才與自然而然不費纖毫功力之本體合此聖賢相傳之正脈也若論工夫而不合本體則泛然用功必失之支離纒繞論本體而不用工夫則懸空談體必失之捷徑猖狂其於聖學終隔燕越矣吾儒之學以至善為本體以知止為工夫而曰致知在格物可見必格物而後能知止也格物乃知止以前工夫丢過物格而别求知止之方此異端懸空頓悟之學非吾儒之旨也善利圖説或問孔子論人有聖人君子善人有恆之别而孟子獨以善利一念分舜跖兩途何也曰孔子列為四等所以示入聖之階基世之學者徒知以舜跖分究竟不知以善利分舜跖不知發端之初一念而善便是舜一念而利便是跖出此入彼間不容髮非舜與跖之間復有此三條路也君子善人有恆造詣雖殊總之是孳孳為善大舜路上人孟子以善利分舜跖自發端之初論也孔子以聖人君子善人有恆分造詣自孳孳為善之後論也且為善為舜則為人為利為跖則為禽獸舜跖之分人與禽獸之分也學者縱可諉之曰我不為聖亦可諉之曰我不為人哉或曰學者不幸分辨不早誤置足於跖利之途將遂甘心已乎曰不然人性皆善雖當戕賊之後而萌蘖尚在養此幾希之萌蘖尚可為堯舜一時之錯不能限我也或曰學者既在舜路亦可以自恃乎曰不然一念而善是平地而方覆一簣也一念而自以為善是為山而未成一簣也未成一簣總謂之半途而廢耳便是無恆也或曰世之聰明之士非乏也功名文學之士又不少也豈見不及此乎曰舜跖路頭容易差錯此處不差則聰明用於正路愈聰明愈好而文章功名益成其美此處一差則聰明用於邪路愈聰明愈差而文學功名益濟其惡故不可不慎也明儒學案卷四十一
