body:
  text: 明儒學案卷八餘姚黄宗羲撰白沙學案有明之學至白沙始入精㣲其喫𦂳工夫全在涵飬喜怒未發而非空萬感交集而不動至陽明而後大兩先生之學最近陽明後來從不説起何也薛中離陽明之髙第弟子也正徳十四年上疏請白沙從祀孔廟是必有以知師門之學同矣羅一峰曰白沙觀天人之微究聖賢之藴充道以富崇徳以貴天下之物可愛可求漠然無動於中故出其門者多清苦自立不以富貴為意髙風之所激逺矣簡討陳白沙先生獻章尚書湛甘泉先生若水别見舉人李大崖先生承箕通政張東所先生詡給事賀醫閭先生欽吏目鄒立齋先生智御史陳時周先生茂烈長史林緝熙先生光州同陳秉常先生庸布衣李抱真先生孔修處士謝天錫先生祐文學何時振先生廷矩運使史惺堂先生桂芳白沙學案一文恭陳白沙先生獻章陳獻章字公甫新會之白沙里人身長八尺目光如星右臉有七黑子如北斗狀自㓜警悟絶人讀書一覽輒記常謂孟子所謂天民者慨然曰為人必當如此夢拊石琴其音泠泠然一人謂之曰八音中惟石難諧子能諧此異日其得道乎因别號石齋正統十二年舉廣東鄉試明年會試中乙榜入國子監讀書已至崇仁受學於康齋先生歸即絶意科舉築春陽臺静坐其中不出閾外者數年尋遭家難成化二年復遊太學祭酒邢讓試和楊龜山此日不再得詩見先生之作驚曰即龜山不如也颺言於朝以為真儒復出由是名動京師羅一峰章楓山莊定山賀醫閭皆恨相見之晚醫閭且稟學焉歸而門人益進十八年布政使彭韶都御史朱英交薦言國以仁賢為寶臣自度才德不及獻章萬萬臣冐髙位而令獻章老丘壑恐坐失社稷之寶召至京閣大臣尼之令就試吏部辭疾不赴疏乞終養授翰林院檢討而歸有言其出處與康齋異者先生曰先師為石亨所薦所以不受職某以聽選監生始終願仕故不敢偽辭以釣虛譽或受或不受各有攸宜自後屢薦不起𢎞治十三年二月十日卒年七十有三先生疾革知縣左某以醫來門人進曰疾不可為也先生曰須盡朋友之情飲一匙而遣之先生之學以虛為基本以靜為門户以四方上下往古來今穿紐凑合為匡郭以日用常行分殊為功用以勿忘助之間為體認之則以未嘗致力而應用不遺為實得逺之則為曾㸃近之則為堯夫此可無疑者也故有明儒者不失其矩矱者亦多有之而作聖之功至先生而始明至文成而始大向使先生與文成不作則濓洛之精藴同之者固推見其至隱異之者亦疎通其流别未能如今日也或者謂其近禪蓋亦有二聖學久湮共趨事為之末有動察而無靜存一及人生而靜以上便鄰於外氏此庸人之論不足辨也羅文莊言近世道學之昌白沙不為無力而學術之誤亦恐自白沙始至無而動至近而神此白沙自得之妙也彼徒見夫至神者遂以為道在是矣而深之不能極幾之不能研其病在此緣文莊終身認心性為二遂謂先生明心而不見性此文莊之失不關先生也先生自序為學云僕年二十七始發憤從吳聘君學其於古聖賢垂訓之書蓋無所不講然未知入處比歸白沙杜門不出專求所以用力之方既無師友指引日靠書册尋之忘寐忘食如是者累年而卒未有得所謂未得謂吾此心與此理未有凑泊脗合處也於是舎彼之繁求吾之約惟在靜坐久之然後見吾此心之體隱然呈露常若有物日用間種種應酬隨吾所欲如馬之御御勒也體認物理稽諸聖訓各有頭緖來厯如水之有源委也於是渙然自信曰作聖之功其在兹乎張東所叙先生為學云自見聘君歸後靜坐一室雖家人罕見其靣數年未之有得於是迅掃夙習或浩歌長林或孤嘯絶島或弄艇投竿於溪涯海曲捐耳目去心智久之然後有得焉蓋主靜而見大矣由斯致力遅遅至二十餘年之久乃大悟廣大髙明不離乎日用一真萬事本自圓成不假人力無動靜無内外大小精粗一以貫之先生之學自博而約由粗入細其與禪學不同如此尹直瑣綴錄謂先生初至京潛作十詩頌太監梁方方言於上乃得授職及請歸出城輒乘轎張蓋列槊開道無復故態丘文莊採入憲廟實錄可謂遺穢靑史憲章錄則謂採之實錄者張東白也按東白問學之書以義理須到融液操存須到灑落為言又令其門人餽遺先生深相敬慕寄詩疑其迯禪則有之以烏有之事闌入史編理之所無也文莊深刻喜進而惡退一見之於定山再見之於先生與尹直相去不逺矣萬厯十三年詔從祀孔廟稱先儒陳子諡文恭論學書復趙提學執事謂浙人以胡先生不敎人習四禮為疑僕因謂禮文雖不可不講然非所急正指四禮言耳非統體禮也禮無所不統有不可須臾離者克已復禮是也若橫渠以禮敎人蓋亦由事推之教事事入途轍去使有所據守耳若四禮則行之有時故其說可講而知之學者進德修業以造於聖人𦂳要却不在此也程子曰且省外事但明乎善惟進誠心外事與誠心對言正指文為度數若以其至論之文為度數亦道之形見非可少者但求道者有先後緩急之序故以且省為辭省之言略也謂姑略去不為害耳此蓋為初學未知立心者言之若以外事為外物累已而非此之謂則當絶去豈直省之云乎僕年二十七始發憤從呉聘君學其於古聖賢垂訓之書蓋無所不講然未知入處比歸白沙杜門不出專求所以用力之方旣無師友指引惟日靠書冊尋之忘寐忘食如是者亦累年而卒未得焉所謂未得謂吾此心與此理未有凑泊脗合處也於是舎彼之繁求吾之約惟在静坐久之然後見吾此心之體隱然呈露常若有物日用間種種應酬隨吾所欲如馬之御銜勒也體認物理稽諸聖訓各有頭緖來厯如水之有源委也於是渙然自信曰作聖之功其在兹乎有學於僕者輒敎之靜坐蓋以吾所經厯粗有實效者告之非務為髙虛以誤人也承諭有為毁僕者有曰自立門户者是流於禪學者甚者則曰妄人率人於偽者僕安敢與之强辯姑以迹之近似者言之孔子敎人文行忠信後之學孔氏者則曰一為要一者無欲也無欲則靜虛而動直然後聖可學而至矣所謂自立門户者非此𩔖歟佛氏教人曰靜坐吾亦曰靜坐曰惺惺吾亦曰惺惺調息近於數息定力有似禪定所謂流於禪學者非此類歟僕在京師適當應魁養病之初前此克恭亦以病去二公皆能審於進退者也其行止初無與於僕亦非僕所能與也不幸其迹偶與之同出京之時又同是以天下之責不仕者輒渉於僕其責取証於二公而僕自己丑得病五六年間自汗時發母氏年老是以不能出門耳凡責僕以不仕者遂不可解所謂妄人率人於偽者又非此類歟復林太守僕於送行之文間嘗一二為之而不以施於當道者一則嫌於上交一則恐其難繼守此戒來三十餘年茍不自量勇於承命後有求者將何辭以拒之與順德吳明府出處語黙咸率乎自然不受變於俗斯可矣復張東白夫學有由積累而至者有不由積累而至者有可以言傳者有不可以言傳者夫道至無而動至近而神故藏而後發形而斯存大抵由積累而至者可以言傳也不由積累而至者不可以言傳也知者能知至無於至近則無動而非神藏而後發明其幾矣形而斯存道在我矣是故善求道者求之易不善求道者求之難義理之融液未易言也操存之灑落未易言也夫動已形者也形斯實矣其未形者虛而已虛其本也致虛之所以立本也戒慎恐懼所以閑之而非以為害也然而世之學者不得其說而以用心失之者多矣斯理也宋儒言之備矣吾嘗惡其太嚴也使著於見聞者不睹其真而徒與我嘵嘵也是故道也者自我得之自我言之可也不然辭愈多而道愈窒徒以亂人也君子奚取焉與羅一峰聖賢處事毫無偏主惟視義如何隨而應之無往不中吾人學不到古人處每有一事來斟酌不安便多差却隨其氣質剛者偏於剛柔者偏於柔毎事要髙人一著做來畢竟未是蓋緣不是義理發源來只要髙去故差自常俗觀之故相雲泥若律以道均為未盡君子未嘗不欲人入於善茍有求於我者吾以告之可也强而語之必不能入則棄吾言於無用又安取之且衆人之情既不受人之言又必别生枝節以相矛盾吾猶不舎而責之益深取怨之道也伊川先生每見人静坐便歎其善學此一靜字自濓溪先生主靜發源後來程門諸公遞相傳授至於豫章延平尤專提此敎人學者亦以此得力晦翁恐人差入禪去故少說静只說敬如伊川晚年之訓此是防微慮逺之道然自學者須自量度如何若不至為禪所誘仍多著靜方有入處若平生忙者此尤為對証之藥學者先須理會氣象氣象好時百事自當此言最可玩味言語動靜使是理會氣象地頭變急為緩變激烈為和平則有大功亦逺禍之道也非但氣象好而已答張汝弼康齋以布衣為石亨所薦所以不受職而求觀祕書者冀得開悟主也惜乎宰相不悟以為實然言之上令就職然後觀書殊戾康齋意遂決去某以聼選監生薦又疏陳始終願仕故不敢偽辭以釣虛名或受或不受各有攸宜爾與林君學勞攘則無由見道故觀書博識不如靜坐與林緝熈終日乾乾只是收拾此心而已此理干渉至大無内外無終始無一處不到無一息不運會此則天地我立萬化我出而宇宙在我矣得此欛柄入手更有何事往古來今四方上下都一齊穿紐一齊収拾隨時隨處無不是這個充塞色色信他本來何用爾脚勞手攘舞雩三三兩兩正在勿忘勿助之間曾㸃些兒活計被孟子打併出來便都是鳶飛魚躍若無孟子工夫驟而語之以曾㸃見趣一似說夢會得雖堯舜事業只如一㸃浮雲過目安事推乎此理包羅上下貫徹終始滚作一片都無分别無盡藏故也自兹已往更有分殊處合要理會毫分縷析義理儘無窮工夫儘無窮書中所云乃其統體該括耳夫以無所著之心行於天下亦焉往而不得哉與賀克恭人要學聖賢畢竟要去學他若道只是個希慕之心却恐末梢未易凑泊卒至廢弛若道不希慕聖賢我還肎如此學否思量到此見得個不容已處雖使古無聖賢為之依歸我亦住不得如此方是自得之學心地要寛平識見要超卓規模要濶逺踐履要篤實能此四者可以言學矣接人接物不可揀擇殊甚賢愚善惡一切要包他到得物我兩忘渾然天地氣象方始是成就處為學須從静中坐養出個端倪來方有商量處與謝元吉人心上容留一物不得才著一物則有碍且如功業要做固是美事若心心念念只在功業上此心便不廣大便是有累之心是以聖賢之心廓然若無感而後應不感則不應又不特聖賢如此人心本體皆一般只要養之以靜便自開大與何時矩宇宙内更有何事天自信天地自信地吾自信吾自動自静自闔自闢自舒自卷甲不問乙供乙不待甲賜牛自為牛馬自為馬感於此應於彼發乎邇見乎逺故得之者天地與順日月與明鬼神與福萬民與誠百世與名而無一物奸於其間嗚呼大哉前輩云銖視軒冕塵視金玉此蓋略言之以諷始學者耳人争一個覺纔覺便我大而物小物盡而我無盡夫無盡者微塵六合瞬息千古生不知愛死不知惡尚奚暇銖軒冕而塵金玉耶禪家語初看亦甚可喜然實自儱侗與吾儒似同而異毫釐間便分霄壤此古人所以貴擇之精也如此辭所見大體處了了如此聞者安能不為之動但起脚一差立到前靣無歸宿無準的便日用間種種各别不可不勘破也與張廷實時矩語道而遺事秉常論事而不及道時矩如師也過秉常如商也不及胥失之矣道無往而不在仁無時而或息天下何思何慮如此乃至當之論也聖人立大中以敎萬世吾儕主張世道不可偏髙壞了人也詩直是難作其間起伏往來脈絡緩急浮沉當理會處一一要到非但直說出本意而已文字亦然古文字好者都不見安排之跡一似信口說出自然妙也其間體制非一然本於自然不安排者便覺好柳子厚比韓退之不及只為太安排也論詩文前輩謂學貴知疑小疑則小進大疑則大進疑者覺悟之機也一番覺悟一番長進更無别法也即此便是科級學者須循次而進漸到至處耳古之作者意鄭重而文不煩語曲折而理自到見子長寄定山先生詩可是率爾定山豈可輒寄以詩耶復李世卿君子以道交者也同明相照同類相求雲從龍風從虎聖人作而萬物覩已不遵道而好與人交惡在其能交也與崔楫棄禮從俗壊名教事賢者不為願更推廣此心於一切事不令放倒名節道之藩籬藩籬不守其中未有能獨存者也與李德孚大抵吾人所學正欲事事㸃簡今處一家之中尊卑老少咸在才㸃簡著便有不由已者抑之以義則咈和好之情於此處之必欲事理至當而又無所忤逆亦甚難矣如此積漸日久恐别生乖戾非細事也將求其病根所在而去之秪是無以供給其日用諸兒女婚嫁在眼不能不相責望在已既無可增益又一切裁之以義俾不得妄求此常情有所不堪亦乖戾所宜有也昔者羅先生勸僕賣文以自活當時甚卑其說據今時勢如此亦且不免食言但恐欲紓目前之急而此貨此時則未可售者不知何如可耳與湛氏澤承示近作頗見意思然不欲多作恐其滯也人與天地同體四時以行百物以生若滯在一處安能為造化之主耶古之善學者常令此心在無物處便運用得轉耳學者以自然為宗不可不著意理會自然之樂乃真樂也宇宙間復有何事飛雲之高幾千仞未若立本於空中與此山平置足其顛若履平地四顧脫然尤為竒絶此其人内忘其心外忘其形其氣浩然物莫能干神遊八極未足言也麽久處危地以老母在堂不自由耳近遣人往衡山問彼田里風俗尋胡致堂住處古人託居必有所見倘今日之圖可遂老脚一登祝融峰不復下矣是將託以畢吾生非事遊觀也三年之喪在人之情豈由外哉今之人大抵無識見便卑闒得甚愛人道好怕人道惡做出世事不得正坐此耳吾輩心事質諸鬼神焉往而不得泰然也耶學無難易在人自覺耳才覺退便是進也才覺病便自藥也日用間隨處體認天理著此一鞭何患不到古人佳處也示學者帖諸君或聞外人執異論非毁之言請勿相聞若事不得已言之亦須隱其姓名可也人氣稟習尚不同好惡亦隨而異是其是非其非使其見得是處決不至以是為非而毁他人此得失恆在毁人者之身而不在所毁之人言之何益且安知已之所執以為是者非出於氣稟習尚之偏亦如彼之所執以議我者乎茍未能如顏子之無我未免是已而非人則其失均矣况自古不能無毁盛德者猶不免焉今區區以不完之行而冒過情之譽毁者固其所也此宜篤於自修以求無毁之實不必以為異而欲聞之也語錄三代以降聖賢之人邪說並興道始為之不明七情交熾人欲橫流道始為之不行道不明雖日誦萬言博極群書不害為未學道不行雖普濟羣生一匡天下不害為私意為學莫先於為已為人之辨此是舉足第一歩疑而後問問而後知知之真則信矣故疑者進道之萌芽也信則有諸已矣論語曰古之學者為已夫道無動静也得之者動亦定靜亦定無將迎無内外茍欲靜即非靜矣故當隨動靜以施其功也善學者主於靜以觀動之所本察於用以觀體之所存治心之學不可把捉太𦂳失了元初體叚愈甚道理不出又不可太漫漫則流於汎濫而無所歸但得心存斯是敬莫於存外更加功大抵學者之病助長為多晦翁此詩其求藥者歟題跋書漫筆後文章功業氣節果皆自吾涵養中來三者皆實學也惟大本不立徒以三者自名所務者小所喪者大雖有聞於世亦其才之過人耳其志不足稱也學者能辨乎此使心常在内到見理明後自然成就得大次王半山韻跋作詩須將道理就自己性情上發出來不可作議論説去離了詩之本體便是宋頭巾也贈彭惠安别言忘我而我大不求勝物而物莫能撓孟子云我善養吾浩然之氣山林朝市一也死生常變一也富貴貧賤夷狄患難一也而無以動其心是名曰自得自得者不累於外物不累於耳目不累於造次顛沛鳶飛魚躍其機在我知此者謂之善學不知此者雖學無益也題采芳園記後天下未有不本於自然而徒以其智収顯名於當年精光射來世者也易曰天地變化草木蕃時也隨時絀信與道翺翔固吾儒事也著撰仁術論天道至無心比其著於兩間者干怪萬狀不復有可及至巧矣然皆一元之所為聖道至無意比其形於功業者神妙莫測不復有可加亦至巧矣然皆一心之所致心乎其此一元之所舎乎昔周公扶王室者也枑文亦扶王室者也然周公身致太平延被後世枑文戰争不息禍藏於身者枑文用意周公用心也是則至絀莫如意而至巧者莫踰於心矣安土敦乎仁論寓於此樂於此身於此聚精會神於此而不容或忽是謂之曰君子安土敦乎仁也比觀泰之序卦曰履而泰然後安又曰履得其所則舒泰泰則安矣夫泰通也泰然後安者通於此然後安於此也然九二曰包荒用馮河是何方泰而憂念即興也九三曰艱貞无咎則君子於是時愈益恐恐然如禍之至矣是則君子之安於其所豈直泰然而無所事哉葢將兢兢業業惟恐一息之或間一念之或差而不敢以自暇矣無後論君子一心足以開萬世小人百惑足以喪邦家何者心存與不存也夫此心存則一一則誠不存則惑惑則偽所以開萬世喪邦家者不在多誠偽之間而足矣夫天地之大萬物之富何以為之也一誠所為也蓋有此誠斯有此物則有此物必有此誠誠在人何所具於一心耳心之所有者此誠而為天地者此誠也天地之大此誠且可為而君子存之則何萬世之不足開哉作俑之人既惑而喪其誠矣夫既無其誠而何以有後耶或曰道可狀乎曰不可此理之妙不容言道至於可言則已涉乎粗迹矣何以知之曰以吾知之吾或有得焉心得而存之口不可得而言之比試言之則已非吾所存矣故凡有得而可言皆不足以得言曰道不可以言狀亦可以物乎曰不可物囿於形道通於物有目者不得見也何以言之曰天得之為天地得之為地人得之為人狀之以天則遺地狀之以地則遺人物不足狀也禽獸說人具七尺之軀除了此心此理便無可貴渾是一包膿血裹一大塊骨頭饑能食渴能飲能著衣服能行淫欲貧賤而思富貴富貴而貪權勢忿而爭憂而悲窮則濫樂則滛凡百所為一信氣血老死而後已則命之曰禽獸可也道學傳序學者不但求之書而求之吾心察於動静有無之機致養其在我者而勿以聞見亂之去耳目支離之用全虚圓不測之神一開卷盡得之矣非得之書也得自我者也贈容一之序恐游心太髙著蹟太奇將來成就結裹處既非尋常意料所及而予素蹇鈍胡能追攀逸駕仰視九霄之上何其茫茫生方鋭意以求自得亦將不屑就予又安知足履平地之果為何如也贈張廷實序廷實之學以自然為宗以忘已為大以無欲為至即心觀妙以揆聖人之用其觀於天地日月晦明山川流峙四時所以運行萬物所以化生無非在我之極而思握其樞機端其銜綏行乎日用事物之中以與之無窮城隍廟記神之在天下其間以至顯稱者非以其權歟夫聰明正直之謂神威福予奪之謂權人亦神也權之在人猶其在神也此二者有相消長盛衰之理焉人能致一郡之和下無干紀之民無所用權如或水旱相仍疫癘間作民日洶洶以干鬼神之譴怒權之用始不窮矣夫天下未有不須權以治者也神有禍福人有賞罰失於此得於彼神其無以禍福代賞罰哉鬼道顯人道晦古今有識所憂也雲潭記天地間一氣而已詘信相感其變無窮人自少而壯自壯而老其歡悲得喪出處語黙之變亦若是而已孰能乆而不變哉變之未形也以為不變既形也而謂之變非知變者也夫氣也者日夜相代乎前雖一息變也況於冬夏乎生於一息成於冬夏者也夫氣上蒸為雲下注為潭氣水之未變者也一為雲一為潭變之不一而成形也其必有將然而未形者乎黙而識之可與論易矣厓先生承箕將孝廉李大厓先生承箕李承箕字世卿號大厓楚之嘉魚人成化丙午舉人其文出入經史跌宕縱横聞白沙之學而慕之𢎞治戊申入南海而師焉白沙與之登臨弔古賦詩染翰投壺飲酒凡天地間耳目所聞見古今上下載籍所存無所不語所未語者此心通塞往來之機生生化化之妙欲先生深思而自得之不可以見聞承當也乆之而先生有所悟入歸築釣䑓於黄公山讀書静坐其中不復仕進自嘉魚至新㑹涉江浮海水陸萬里先生往見者四而白沙相憶之詩去嵗逢君笑一回經年笑口不曾開山中莫謂無人笑不是真情懶放懐又衡岳千尋雲萬尋丹青難冩夢中心人間鐵笛無吹處又向秋風寄此音真有相視而莫逆者蓋先生胸懐灑落白沙之門更無過之乙丑二月卒年五十四唐伯元謂其晚節大敗不知何指當俟細考文集詩雅頌各得其所而樂之本正可以興可以羣可以怨而詩之教明孔子之志其見於是乎先生詩曰從前欲洗安排障萬古斯文看日星其本乎一笑功名卑管晏六經仁義沛江河其用乎時當可出寧須我道不虚行只在人其出處乎所謂吟咏性情而不累於性情者乎先生不著書嘗曰六經而外散之諸子百家皆剩語也故其語曰他年得遂投閒計只對青山不著書又曰莫笑老慵無著述真儒不是鄭康成明儒學案卷八
