body:
  text: 明儒學案卷六十二餘姚黃宗羲撰蕺山學案今日之學者大概以髙劉二先生並稱為大儒可以無疑矣然當髙子遺書初出之時羲侍先生於舟中自禾水至省下盡日翻閲先師時摘其闌入釋氏者以示羲後讀先師論學書有答韓位者云古之有朱子今之有忠憲先生皆半雜禪門又讀忠憲三時記謂釋典與聖人所爭毫髮其精微處吾儒具有之總不出無極二字而已弊病處先儒具言之總不出無理二字而已其意似主於無此釋氏之所以為釋氏也即如忠憲正命之語本無生死亦是佛家語氣故先師急救正之曰先生心與道一盡其道而生盡其道而死是之謂無生死非佛氏所謂無生死也忠憲固非佛學然不能不出入其間所謂大醇而小疵者若吾先師則醇乎其醇矣後世必有能辨之者戊申嵗羲與惲日初同在越城半年日初先生高第弟子其時為劉子節要臨别拜於河滸日初執手謂羲曰知先師之學者今無人矣吾二人宗旨不可不同但於先師言意所在當稍渾融耳羲蓋未之答也及節要刻成緘書寄羲曰子知先師之學者不可不序嗟乎羲豈能知先師之學者然觀日初高劉兩先生正學説云忠憲得之悟其畢生黽勉祗重修持是以乾知統攝坤能先師得之修其末後歸趣亟稱解悟是以坤能證入乾知夫天氣之為乾地質之為坤氣不得不凝為質質不得不散為氣兩者同一物也乾知而無坤能則為狂慧坤能而無乾知則為肓修豈有先後彼徒見忠憲旅店之悟以為得之悟此是禪門路徑與聖學無當也先師之慎獨非性體分明慎是慎箇恁麼以此觀之日初亦便未知先師之學也使其知之則於先師言意所在迎刃而解矣此羲不序節要之意也惜當時不及細論負此良友今所録一依原書次第先師著述雖多其大槩具是學者可以無未見之恨矣忠端劉念臺先生宗周劉諱宗周字起東號念臺越之山陰人萬厯辛丑進士授行人上疏言國本言東林多君子不宜彈射請告歸起禮部主事劾奄人魏忠賢保姆客氏轉光祿寺丞尋升尚寶少卿太僕少卿疏辭不允告病回籍起右通政又固辭內批其矯情厭世革職為民崇禎己巳起順天府尹上方綜核名實羣臣救過不遑先生以為此刑名之術也不可以治天下而以仁義之説進上迂濶之京師戒嚴上疑廷臣謀國不忠稍稍親向奄人先生謂今日第一宜開示誠心為濟難之本皇上以親內臣之心親外臣以重武臣之心重文臣則太平之業一舉而定也當是時小人乘時欲翻逆案遂以失事者牽連入之東林先生曰自東林之以忠義著是非定矣奈何復起波瀾用賢之路從此而窮解嚴後上祈天永命疏上天重民命則刑罰宜省請除詔獄上天厚民生則賦斂宜緩請除新餉相臣勿興大獄勿贊富強與有祈天永命之責焉上詰以軍需所出先生對曰有原設之兵原設之餉在上終以為迂濶也請告歸上復思之因推閣員降詔召先生入對文華殿上問人才糧餉流冦三事對曰天下原未嘗乏才止因皇上求治太急進退天下士太輕所以有人而無人之用加派重而參罰嚴吏治日壞民生不得其所胥化為盜賊餉無從出矣流冦本朝廷赤子撫之有方盜賊還為吾民也上又問兵事對曰臣聞禦外亦以治內為本此干羽所以格有苗也皇上亦法堯舜而已矣上顧溫體仁曰迂哉劉某之言也用為工部左侍郎乃以近日弊政反覆言之謂皇上但下尺一之詔痛言前日所以致賊之由與今日不忍輕棄斯民之意遣廷臣賚內帑巡行郡國為招撫使以招其無罪而流亡者陳師險隘聽其窮而自解歸來誅渠之外猶可不殺一人而畢此役也上見之大怒久之而意解諭以大臣論事須體國度時不當效小臣圖占地步盡咎朝廷耳先生復言皇上已具堯舜之心惟是人心道心不能無倚伏之機出於人心而有過不及者授之政事之地即求治而過不免害治者有之惟皇上深致意焉三疏請告上允之行至德州上疏曰今日之禍己巳以來釀成之也後日之禍今日又釀之矣己巳之變受事者為執政之異已不難為法受惡槩置之重典丙子之變受事者為執政之私人不難上下蒙蔽使處分之頓異自古小人與中官氣誼一類故天下有比中官之小人必無合於君子之小人有用小人之君子終無黨比中官之君子八年之間誰秉國成臣不能為首輔溫體仁解矣有旨革職為民然上終不忘先生臨朝而歎謂大臣如劉宗周清執敢言廷臣莫及也壬午起吏部左侍郎先生以為天下浩亂決不能舍道而别有手援之法一涉功利皆為茍且途中上書以明聖學未至升左都御史召對上問職掌安在對曰都察院之職在於正己以正百僚必其存諸中者上可以對君父下可質天下士大夫而後百僚則而象之至於責成巡方其首務也巡方得人則吏治清吏治清則民生安矣已又戒嚴先生言皇上以一心為天地神人之主鎮靜以立本安詳以應變此第一義也其施行次第旌盧象升戮楊嗣昌上曰責重朕心是也請恤追戮何與兵機事召對中左門御史楊若僑言火器先生劾之曰御史之言非也邇來邊臣於安攘禦侮之策戰守屯戍之法槩置不講以火器為師命不恃人而恃器國威所以愈頓也上議督撫去留先生對請自督師范志完始志完身任三協平時無備聽其闌入今又借援南下為脫卸計從此關門無阻決裂至此上曰入援乃奉旨而行何云脫卸先生對十五年來皇上處分未當致有今日敗局乃不追原禍始更絃易輒欲以一切茍且之政牽補罅漏非長治之道也上變色曰從前已不可追今日事後之圖安在先生對今日第一義在皇上開誠布公先豁疑關公天下以為好惡則思過半矣上曰國家敗壞已極如何整頓先生對近來持論者但論才望不論操守不知天下真才望出於天下真操守自古未有操守不謹而遇事敢前者亦未有操守不謹而軍士畏威者上曰濟變之日先才而後守先生對以濟變言愈宜先守即如范志完操守不謹用賄補官所以三軍解體莫肯用命由此觀之豈不信以操守為主乎上始色解先生更端曰皇上方下詔求言而給事中薑埰行人司副熊開元以言得罪下之詔獄皇上度量卓越如臣某纍多狂妄幸寬斧鑕又如詞臣黃道周亦以戅直獲宥二臣何獨不蒙一體之仁乎上曰道周有學有守豈二臣可比先生對曰二臣誠不及道周然朝廷待言官有體即有應得之罪亦當敇下法司定之遽置詔獄終於國體有傷上怒曰朕處一二言官如何遂傷國體假有貪贓壞法欺君罔上俱可不問乎先生對即皇上欲問貪贓壞法欺君罔上者亦不可不付之法司也上大怒曰如此偏黨豈堪憲職候旨處分先生謝罪文武班行各申救遂革職歸南渡起原官先生上言今日宗社大計舍討賊復讐無以表陛下渡江之心非陛下決策親征亦何以作天下忠臣義士之氣江左非偏安之業請進圖江北鳯陽號稱中都東扼徐淮北控豫州西顧荆襄而南去金陵不逺親征之師駐蹕於此規模先立而後可言政事一時亂政先生無不危言閣臣則劾馬士英勳臣則劾劉孔昭四鎮則劾劉澤清高傑先生本無意於出謂中朝之黨論方興何暇圖河北之賊立國之本計已疏何以言匡攘之略當是時姦人雖不利先生然恥不能致先生反急先生之一出馬士英言先生負海內重名自稱草莽孤臣不書新命明示以不臣也朱統􅠳言先生請移蹕鳯陽鳯陽高牆之所蓋欲以罪宗處皇上四鎮皆言先生欲行定策之誅意在廢立先生在丹陽僧舍高傑劉澤清遣刺客數輩迹之先生危坐終日無惰容客亦心折而去詔書敦逼再三先生始受命尋以阮大鋮為兵部侍郎先生曰大鋮之進退江左之興衰繫焉內批是否確論先生再疏請告豫馳驛歸先生出國門黃童白叟聚觀嘆息知南都之不能久立也浙省降先生慟哭曰此余正命時也門人以文山疊山袁閬故事言者先生曰北都之變可以死可以無死以身在削籍也南都之變主上自棄其社稷仆在懸車尚曰可以死可以無死今吳越又降區區老臣尚何之乎若曰身不在位不當與城為存亡獨不當與土為存亡乎故相江萬里所以死也世無逃死之宰相亦豈有逃死之御史大夫乎君臣之義本以情決舍情而言義非義也父子之親固不可解於心君臣之義亦不可解於心今謂可以不死而死可以有待而死死為近名則隨地出脫終成一貪生畏死之徒而已矣絶食二十日卒乙酉閏六月八日戊子也年六十八先生起自孤童始從外祖章潁學長師許敬菴而砥礪性命之友則劉靜之丁長儒周寧宇應中先忠端公高忠憲晚雖與陶石梁同講席為證人之會而學不同石梁之門人皆學佛後且流於因果分會於白馬山羲嘗聽講石梁言一名臣轉身為馬引其疾姑證之羲甚不然其言退而與王業洵王育蓍推擇一輩時名之士四十餘人執贄先生門下此四十餘人者皆喜闢佛然而無有根柢於學問之事亦浮慕而已反資學佛者之口實先生有憂之兩者交譏故傳先生之學者未易一二也先生之學以慎獨為宗儒者人人言慎獨唯先生始得其真盈天地間皆氣也其在人心一氣之流行誠通誠復自然分為喜怒哀樂仁義禮智之名因此而起者也不待安排品節自能不過其則即中和也此生而有之人人如是所以謂之性善即不無過不及之差而性體原自周流不害其為中和之德學者但證得性體分明而以時保之即是慎矣慎之工夫只在主宰上覺有主是曰意離意根一步便是妄便非獨矣故愈收斂是愈推致然主宰亦非有一處停頓即在此流行之中故曰逝者如斯夫不舍晝夜蓋離氣無所為理離心無所為性佛者之言曰有物先天地無形本寂寥能為萬象主不逐四時凋此是他真贓實犯奈何儒者亦曰理生氣所謂毫釐之辨竟亦安在而徒以自私自利不可以治天下國家棄而君臣父子強生分别其不謂佛者之所笑乎先生如此指出真是南轅北轍界限清楚有宋以來所未有也識者謂五星聚奎濓洛關閩出焉五星聚室陽明子之説昌五星聚張子劉子之道通豈非天哉豈非天哉語録湛然寂靜中當見諸緣就攝諸事就理雖簿書鞅掌金革倥􅘓一齊俱了此靜中真消息若一事不理可知一心忙亂在用一心錯一心理一事壞一事即豎得許多功能亦是沙水不成團如喫飯穿衣有甚竒事才忙亂已從脊梁過學無本領漫言主靜總無益也以下庚申前録知行自有次第但知先而行即從之無間可截故云一後儒喜以覺言性謂一覺無餘事即知即行其要歸於無知知既不立一亦難言噫是率天下而禪也有不善未嘗不知是謂良知知之未嘗復行也是謂致知盈天地間皆道也學者須是擇乎中庸事之過不及處即為惡事則念之有倚著處即為惡念擇善非擇在事上直證本心始得識仁一篇總是狀仁體合下如此當下認取活潑地不須著纖毫氣力所謂我固有之也然誠敬為力乃是無著力處蓋把持之存終屬人偽誠敬之存乃為天理只是存得好便是存敬存正是防檢克己是也存正是窮索擇善是也若泥不須防檢窮索則誠敬之存當在何處未免滋高明之惑凡人一言過則終日言皆婉轉而文此一言之過一行過則終日行皆婉轉而文此一行之過蓋人情文過之態如此幾何而不墮禽獸也以下癸亥日用之間漫無事事或出入闈房或應接賓客或散步回廊或靜窺書册或談説無根或思想過去未來或料理藥餌或揀擇衣飲或詰童僕或量光鹽恁地捱排莫可適莫自謂頗無大過杜門守拙禍亦無生及夫時移境改一朝患作追尋來厯多坐前日無事甲裏如前日妄起一念此一念便下種子前日誤讀一册此一册便成附會推此以往不可勝數故君子不以間居而肆惡不以造次而違仁此心放逸已久才問內則苦而不甘忽復去之總之未得天理之所安耳心無內外其渾然不見內外處即天理也先生云心有所向便是欲向內向外皆欲也以下乙丑丙寅釋氏之學本心吾儒之學亦本心但吾儒自心而推之意與知其工夫實地却在格物所以心與天通釋氏言心便言覺合下遺却意無意則無知無知則無物其所謂覺亦只是虛空圓寂之覺與吾儒體物之知不同其所謂心亦只是虛空圓寂之心與吾儒盡物之心不同象山言心本未嘗差到慈湖言無意分明是禪家機軸一盤托出道本無一物可言若有一物可言便是礙膺之物學本無一事可著才有一事可著便是賊心之事如學仁便非仁學義便非義學中便非中學靜便非靜止有誠敬一門頗無破綻然認定誠敬執著不化則其謂不誠不敬也亦已多矣夫道即其人而已矣學如其心而已矣此心絶無湊泊處從前是過去向後是未來逐外是人分搜裏是鬼窟四路把絶就其中間不容髮處恰是此心真湊泊處此處理會得分明則大本達道皆從此出心無物纍便是道莫於此外更求道此外求道妄也見為妄見思為妄思有見與思即與消融去即此是善學延平教人看喜怒哀樂未發時作何氣象此學問第一義工夫未發時有何氣象可觀只是查檢自己病痛到極微密處方知時雖未發而倚著之私隱隱已伏才有倚著便來橫決若於此處查考分明如貫虱車輪更無躲閃則中體恍然在此而已發之後不待言矣此之為善觀氣象者以下戊辰問未發氣象從何處看入曰從發處看入如何用工夫曰其要只在慎獨問兼動靜否曰工夫只在靜故云主靜立人極非偏言之也然則何以從發處看入曰動中求靜是真靜之體靜中求動是真動之用體用一原動靜無端心體本是如此動中有靜靜中有動者天理之所以妙合而無間也靜以宰動動復歸靜者人心之所以有主而常一也故天理無動無靜而人心惟以靜為主以靜為主則時靜而靜時動而動即靜即動無靜無動君子盡性至命之極則也以下甲戌遊思妄想不必苦事禁遏大抵人心不能無所用但用之於學者既專則一起一倒都在這裏何暇及一切遊思妄想即這裏處不無間斷忽然走作吾立刻與之追救去亦不至大為擾擾矣此主客之勢也正諦當時切忌又起爐竈以下丙子京邸録無事時得一偷字有事時得一亂字程子曰無妄之謂誠無妄亦無誠心以物為體離物無知今欲離物以求知是張子所謂反鏡索照也然則物有時而離心乎曰無時非物心在外乎曰惟心無外獨字是虛位從性體看來則曰莫見莫顯是思慮未起鬼神莫知也從心體看來則曰十目十手是思慮既起吾心獨知時也然性體即在心體中看出心之官則思思曰睿睿作聖性之德曰誠誠者不勉而中不思而得從容中道聖人也此心性之辨也故學始於思達於不思而得又曰誠者天之道也思誠者人之道也致知在格物中庸明有疏義曰明善是也然中庸言五者之目而大學止言格致不言所以格且致者何也曰此五者之目已括大學二字內此直言其所謂道耳故曰如切如磋者道學也此格物之功也人心惟危道心惟微道心中即在人心中看出始見得心性一而二二而一然學者工夫不得不向危處做起是就至粗處求精至紛處求一至偏倚處求中也擇善固執正是從氣質上揀擇德性來所以至精才認已無不是處愈流愈下終成凡夫才認己有不是處愈達愈上便是聖人獨體只是箇微字慎獨之功亦只在於微處下一著子故曰道心惟微心一也合性而言則曰仁離性而言則曰覺覺則仁之親切痛癢處然不可以覺為仁正謂不可以心為性也又統而言之則曰心析而言之則曰天下國家身心意知物惟心精之合意知物粗之合天下國家與身而後成其為覺若單言心則心亦一物而已凡賢聖言心皆合八條目而言者也或止合意知物言惟大學列在八目之中而血脈仍是一貫正是此心之全譜又特表之曰明德大學之言心也曰忿懥恐懼好樂憂患而已此四者心之體也其言意也則曰好好色惡惡臭好惡者此心最初之機即四者之所自來故意蘊於心非心之所發也又就意中指出最初之機則僅有知善知惡之知而已此即意之不可欺者也故知藏於意非意之所起也又就知中指出最初之機則僅有體物不遺之物而已此所謂獨也故物即是知非知之所照也大學之教一層切一層真是水窮山盡學問原不以誠意為主以致良知為用神者有善有惡者心之動好善惡惡者意之靜知善知惡者是良知有善無惡者是物則一性也自理而言則曰仁義禮智自氣而言則曰喜怒哀樂一理也自性而言則曰仁義禮智自心而言則曰喜怒哀樂或曰君子既常戒懼於睹聞矣又必及其所不睹聞方是須臾不離道否曰如此則是判成兩片矣且人自朝至夕終無睹聞不著時即後世學者有一種瞑目杜聰工夫亦是禪門流弊聖學原無此教法無極而太極獨之體也動而生陽即喜怒哀樂未發謂之中靜而生陰即發而皆中節謂之和才動於中即發於外發於外則無事矣是謂動極復靜才發於外即止於中止於中則有本矣自謂靜極復動一動一靜互為其根分陰分陽兩儀立焉若謂有時而動因感乃生有時而靜與感俱滅則性有時而生滅矣蓋時位不能無動靜而性體不與時位為推遷故君子戒懼於不睹不聞何時位動靜之有問人心既無無喜怒哀樂時而藏發總一機矣若夫氣機之屈伸畢竟有寂感之時寂然之時四者終當冥於無端感通之時四者終當造於有象則又安得以未發為動而已發反為靜乎曰性無動靜者也而心有寂感當其寂然不動之時喜怒哀樂未始淪於無及其感而遂通之際喜怒哀樂未始滯於有以其未始淪於無故當其未發謂之陽之動動而無動故也以其未始滯於有故及其已發謂之陰之靜靜而無靜故也動而無動靜而無靜神也性之所以為性也動中有動靜中有靜物也心之所以為心也體認親切法身在天地萬物之中非有我之得私心在天地萬物之外非一膜之能囿通天地萬物為一心更無中外可言體天地萬物為一本更無本心可覔先生有詩云只卷圓相形容似才點些兒面目肥即此可以辨儒釋或曰慎獨是第二義學者須先識天命之性否曰不慎獨又如何識得天命之性以下丙子獨證編只此喜怒哀樂而達乎天地即天地之寒暑災祥達乎萬物即萬物之疾痛疴癢伊洛拈出敬字本中庸戒慎恐懼來然敬字只是死工力不若中庸説得有著落以戒慎屬不睹以恐懼屬不聞總只為這些子討消息胸中實無個敬字也故主靜立極之説最為無弊小人只是無忌憚便結果一生至大學止言間居為不善耳間居時有何不善可為只是一種懶散精神漫無著落處便是萬惡淵藪正是小人無忌憚處可畏哉陽明先生言良知即物以言知也若早知有格物義在即止言致知亦得朱子言獨知對睹聞以言獨也若早知有不睹不聞義在即止言慎獨亦得離獨一步便是人偽主靜之説大要主於循理然昔賢云道德言動皆翕聚為主發散是不得已事天地萬物皆然則亦意有專屬正黃葉止兒啼是方便法也喜怒哀樂雖錯綜其文實以氣序而言至殽而為七情曰喜怒哀樂懼愛惡欲是性情之變離乎天而出乎人者故紛然錯出而不齊所為感於物而動性之欲也七者合而言之皆欲也君子存理遏欲之功正用之於此若喜怒哀樂四者其發與未發更無人力可施也後人解中和誤認是七情故經旨晦至今古人恐懼二字嘗用在平康無事時及至利害當前無可回避只得赤體承當世人只是倒做了九容分明畫出有道形容氣象然學者一味學不得吾病其徇外而為人也本體只是這些子工夫只是這些子并這些子仍不得分此為本體彼為工夫既無本體工夫可分則亦并無這些子可指故曰上天之載無聲無臭至矣盈天地間一氣而已矣有氣斯有數有數斯有象有象斯有名有名斯有物有物斯有性有性斯有道故道其後起也而求道者輒求之未始有氣之先以為道生氣則道亦何物也而能遂生氣乎以下丁丑或曰虛生氣夫虛即氣也何生之有吾遡之未始有氣之先亦無往而非氣也當其屈也自無而之有有而未始有及其伸也自有而之無無而未始無也非有非無之間而即有即無是謂太虛是謂太極天者萬物之總名非與物為君也道者萬器之總名非與器為體也性者萬形之總名非與形為偶也一心也而在天謂之誠人之本也在人謂之明天之本也故人本天天亦本人離器而道不可見故道器可以上下言不可以先後言有物先天地異端千差萬錯從此句來一氣之變雜然流行類萬物而觀人亦物也而靈者不得不靈靈無以異於蠢也故靈含蠢蠢亦含靈類萬體而觀心亦體也而大者不得不大大無以分於小也故大統小小亦統大人心徑寸耳而空中四達有太虛之象虛故生靈靈生覺覺有主是曰意此天命之體而性道教所從出也覺有主是義創見天樞轉於於穆地軸亘於中央人心藏於獨覺理即是氣之理斷然不在氣先不在氣之外知此則知道心即人心之本心義理之性即氣質之本性千古支離之説可以盡掃而學者從事於入道之路高之不墮於虛無卑之不淪於象數道術始歸於一乎天命流行物與無妄言實有此流行之命而物物付畀之非流行之外另有個無妄之理乾坤合德而無為故曰一陰一陽之謂道非迭運之謂也至化育之功實始乎繼體之長子而長女配之成乎少男而少女配之故曰繼之者善也成之者性也今曰繼靜而動亦非也以斯知人心之獨體不可以動靜言而動靜者其所乘之位也分明是造化之理心無善惡而一點獨知知善知惡知善知惡之知即是好善惡惡之意好善惡惡之意即是無善無惡之體此之謂無極而太極意者心之所存非所發也或曰好善惡惡非所發乎曰意之好惡與起念之好惡不同意之好惡一機而互見起念之好惡兩在而異情以念為意何啻千里自濓溪有主靜立極之説傳之豫章延平遂以看喜怒哀樂未發以前氣象為單提口訣夫所謂未發以前氣象即是獨中真消息但説不得前後際耳蓋獨不離中和延平姑即中以求獨體而和在其中此慎獨真方便門也後儒不察謂未發以前專是靜寂一機直欲求之思慮未起之先而曰既思即是已發果然心行路絶語言道斷矣故朱子終不取延平之説遂專守程門主敬之法以教學者特其以獨為動念邉事不為無弊至湖南中和問答轉折發明內有以心為主則性情各有統理而敬之一字又所以流貫乎動靜之間庶幾不謬於慎獨之説最後更以察識端倪為第一義為誤而仍歸之涵養一路可為善學延平者然終未得中庸本旨陽明子言良知每謂個個人心有仲尼至於中和二字則反不能信謂必慎獨之後方有此氣象豈知中和若不是生而有之又如何養成得中只是四時之中氣和只是中氣流露處天若無中氣如何能以四時之氣相禪不窮人若無中氣如何能以四端之情相生不已故曰哀樂相生循環無端正目而視之不可得而見傾耳而聽之不可得而聞戒懼於所不睹聞其旨一也性情之德有即心而見者有離心而見者即心而言則寂然不動感而遂通當喜而喜當怒而怒哀樂亦然由中道和有前後際而實非判然分為二時離心而言則維天於穆一氣流行自喜而樂自樂而怒自怒而哀自哀而復喜由中道和有顯微際而亦非截然分為兩在然即心離心總見此心之妙而心之與性不可以分合言也故寂然不動之中四氣實相為循環而感而遂通之際四氣又迭以時出即喜怒哀樂之中各有喜怒哀樂焉如初喜屬喜喜之暢屬樂喜之斂屬怒喜之藏屬哀餘倣此是也又有逐感而見者如喜也而溢為好樂也而溢為樂怒也而積為忿􅓰一哀也而分為恐為懼為憂為患非樂而淫即哀而傷且陽德衰而陰慘用事喜與樂之分數減而忿􅓰恐懼憂患之分數居其偏勝則去天愈逺心非其心矣陽明子曰語言正到快意時便翕然能止截得意氣正到發揚時便肅然能收斂得嗜欲正到沸騰時便廓然能消化得此非天下之大勇不能然見得良知親切工夫亦自不難愚為語言既到快意時自能繼以止截意氣既到發揚時自能繼以收斂嗜欲既到沸騰時自能繼以消化此正一氣之自通自復分明喜怒哀樂相為循環之妙有不待品節限制而然即其間非無過不及之差而性體原自周流不害其為中和之德學者但證得性體分明而以時保之則雖日用動靜之間莫非天理流行之妙而於所謂良知之見亦莫親切於此矣若必借良知為監察官欲就其一往不返之勢皆一一逆收之以還之天理之正則心之與性先自相讐而杞柳杯棬之説有時而伸也必矣中庸言喜怒哀樂專指四德而言非以七情言也喜仁之德也怒義之德也樂禮之德也哀智之德也而其所謂中即信之德也故自四者之存諸中言謂之中不必其未發之前别有氣象也即天道之元亨利貞運於於穆者是也自四者之發於外言謂之和不必其已發之時又有氣象也即天道之元亨利貞呈於化育者是也惟存發總是一機故中和渾是一性如內有陽舒之心為喜為樂外即有陽舒之色動作態度無不陽舒者內有陰慘之心為怒為哀外即有陰慘之色動作態度無不陰慘者推之一動一靜一語一默莫不皆然此獨體之妙所以即微即顯即隱即見即慎獨之學即中和即位育此千聖學脈也心意知物是一路不知此外何以又容一念字今心為念蓋心之餘氣也餘氣也者動氣也動而逺乎天故念起念滅為厥心病還為意病為知病為物病故念有善惡而物即與之為善惡物本無善惡也念有昏明而知即與之為昏明知本無昏明也念有真妄而意即與之為真妄意本無真妄也念有起滅而心即與之為起滅心本無起滅也故聖人化念還心要於主靜心之官則思一息不思則官失其職故人心無思而無乎不思絶無所為思慮未起之時惟物感相乘而心為之動則思為物化一點精明之氣不能自主遂為憧憧往來之思矣如官犯贓乃溺職也思即是良知之柄知無不良只是獨知一點朱子以未發言性仍是逃空墮幻之見性者生而有之之理無處無之如心能思心之性也耳能聽耳之性也目能視目之性也未發謂之中未發之性也已發謂之和已發之性也搏而躍之可使過顙激而行之可使在山勢之性也程子曰惡亦不可不謂之性如麟鳯梟獍其性之仁暴皆生而有之假令易梟獍而仁易麟鳯而暴則非其性矣水清則明清之性也水濁則暗濁之性也千古性學不明則是將做一好題目看故或拘於一處或限於一時而不能相通以類萬物之情使性善之旨反晦性即理也理無定理理亦無理張子曰論性不論氣不備論氣不論性不明是性與氣分明兩事矣即程子之見亦近儱侗凡言性者皆指氣質而言也或曰有氣質之性有義理之性亦非也盈天地間止有氣質之性更無義理之性如曰氣質之理即是豈可曰義理之理乎周天三百六十五度四分度之一曰一嵗一周天而天以一氣進退平分四時溫涼寒燠不爽其則一嵗如此萬古如此即其間亦有愆陽伏陰釀為災祥之數而終不易造化之大常此所謂大哉乾乎剛健中正純粹精也鐘虛則鳴叩之以大則大鳴叩之以小則小鳴以為别有一物主所以鳴者非也盈天地間道理不過如此正為虛而能應之理物物皆然非鐘所得而私也此可以明性體矣古今性學不明只是將此理另作一物看大抵臧三耳之説佛氏曰性空也空與色對空一物也老氏曰性元也元與白對元一物也吾儒曰性理也理與氣對理一物也佛老叛理而吾儒障於理幾何而勝之朱子於獨字下補一知字可謂擴前聖所未發然專以屬之動念邊事何耶豈靜中無知乎使知有間於動靜則不得謂之知矣心無存亡但離獨位便是亡滿腔子皆惻隱之心以人身八萬四千毫竅在在靈通知痛癢也只此知痛癢心便是惻隱之心凡乍見孺子感動之心皆從知痛癢心一體分出來朱子云知痛是人心惻隱是道心太分析惻隱是知痛表德慈湖宗無意亦以念為意也只是死念法若意則何可無者無意則無心矣龍溪有無心之心則體寂無意之意則應元此的傳慈湖衣鉢也文成云慈湖不免著在無意上則龍溪之説非師門定本可知若夫子之毋意正可與誠意之説相發明誠意乃所以無意也毋意者毋自欺也子絶四毋意聖人心同太虛一疵不存了無端倪可窺即就其存主處亦化而不有大抵歸之神明不測而已自意而積成為我才説得是私意若竟以意為私是認念為意也日用之間動靜云為莫不各有自然之理茍能順以應之如飢食渴飲夏葛冬裘不起一見則亦無往而非道矣才起一見便屬我見強我合道動成兩胖以下戊寅格物是格其有善無惡之物存其心養其性存得恰好處便是養本是一個工夫却須兩句説正如宋儒言涵養須用敬進學則在致知己卯人心如穀種滿腔都是生意欲錮之而滯矣然而生意未嘗不在也疏之而已耳又如明鏡全體渾是光明習染薰之而暗矣然而明體未嘗不存也拂栻而已耳惟有內起之賊從意根受者不易除更加氣與之拘物與之蔽則表裏夾攻更無生意可留明體可覿矣是為喪心之人君子惓惓於謹獨以此以下庚辰省察二字正存養中喫緊工夫如一念於欲便就此念體察體得委是欲立與消融而後已聖人之所謂道者率性而已矣盈天地間皆性也性一命也命一天也天即心即理即事即物而渾然一致無有乎上下精粗之岐所以謂中庸之道也後之言道者妄意所謂形而上者而求之虛無既遁有而入無又遁無而入有有無兩遣善惡不立其究也歸之斷滅性種而猶謂之見性何哉身無妄動可乎曰無妄動易無妄念難無妄念可乎曰無妄念易無妄心難以下壬午淮上心是鑒察官謂之良知最有權觸著便碎人但隨俗習非因而行有不慊此時鑒察仍是井井却已做主不得鑒察無主則血氣用事何所不至一事不做主事事不做主隱隱一竅托在恍惚間擁虛器而已語次多詭隨亦見主心之不一小人間居為不善只為惹却些子聖人勘之曰無所不至主靜敬也若言主敬便贅此主字如在性情上理會但有過更無不及可商如出手太粗應手太急便是過不必到分數上爭饒減也然間有太軟太弱時總向廓然處討消息人心一氣而已矣而樞紐至微才入粗一二則樞紐之地霍然散矣散則浮有浮氣因以有浮質有浮質因以有浮性有浮性因以有浮想為此四浮合成妄根為此一妄種成萬惡嗟乎其所由來者漸矣本心湛然無思無為為天下主過此一步便為安排心有安排因以有倚著有倚著因以有方所有方所因以有去住有去住因以有轉換則機械變詐無所不至矣莫非命也順而受之正也莫之為而為莫之致而致如斯而已矣受制焉僥幸茍免焉一為桎梏一為巖牆矣莫非性也率而由之真也無為其所不為無欲其所不欲如斯而已矣安排焉知過造作焉一為湍水一為杞柳矣以下壬午京邸人有恆言曰性命由一念之起滅一息之呼吸一日之晝夜推之以至百年之生死時然而然不期然而然莫非性也則莫非命也今人專以生死言性命蓋指其盡處言也而漸易以七尺之成毁則性命之説有時而晦矣心放自多言始多言自言人短長始後之學者每於道理三分之推一分於在天以為天命之性推一分於萬物以為在物之理又推一分於古今典籍以為耳目之用神反而求之吾心如赤貧之子一無所有乃日夕乞哀於三者而幾幾乎其來舍焉客子之過逆旅止堪一宿所謂疏者續之不堅也當是時主人貧甚尚有一點靈明可恃為續命之膏又被佛氏先得之則益望望然恐曰我儒也何以佛為并其靈明而棄之於是天地萬物古今典籍皆闞亡而返求其一宿而不可得終望門持鉢以死寧為牛後無為雞口悲夫或問孰有以一念為萬年者乎曰無以為也往者過來者續今日之日豈非昨日之日乎學貴日新日日取生手一日剝換一日方不犯人間煙火氣大學首言明德又繼之曰止於至善蓋就明德中指出主宰有所謂至善者而求以止之止之所以明之也然則學問工夫固不止就一靈明處結果可知以下癸未名存疑雜著陽明先生曰無善無惡者理之靜有善有惡者氣之動理無動靜氣有寂感離氣無理動靜有無通一無二以理為靜以氣為動言有言無則善惡之辨轉展悠謬矣心且是無善無惡其如動而為好惡好必善惡必惡如火之熱如水之寒斷斷不爽乃見其所為善者孟子性善之説本此故曰平旦之氣其好惡與人相近者幾希此性善第一義也大學之好惡正指平旦之好惡而言故欺曰自欺慊曰自慊自之為言由也自之為言獨也朱子曰人心之靈莫不有知即所謂良知也但朱子則欲自此而一一致之於外陽明則欲自此而一一致之於中不是知處異乃是致處異大學言明德則不必更言良知知無不良即就明德中看出陽明特指點出來蓋就工夫參本體非全以本體言也又曰良知即天理即未發之中則全以本體言矣將置明德於何地至後人益張大之搬弄此二字愈晦原初立言之旨佛氏之學只主靈明而抹去善惡二義故曰不思善不思惡時見本來面目本來面目仍只是一點靈明而已後之言大學者本之豈大學之義乎胡敬齋曰心有專主之謂意朱子釋訓蒙詩曰意是情專所主時近之大學章句以心之所發言恐未然愚謂敬齋亦近之而未盡也心有專主蓋言有所專主也有所專主仍是逐物心即朱子情專所主之説然讀大學本傳如惡惡臭如好好色方見得他專主精神只是善也意本如是非誠之而後如是意還其意之謂誠乃知意者心之主宰非徒以專主言也天一也自其主宰而言謂之帝心一也自其主宰而言謂之意天有五常而分之為八節十二辰故曰帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮即主宰即流行也此正是體用一原顯微無間處今言意為心之所發亦無不可言所發而所存在其中終不可以心為所存意為所發意者心之所發發則有善有惡陽明之説有自來矣抑善惡者意乎好善惡惡者意乎若果以好善惡惡者為意則意之有善而無惡也明矣然則誠意一關其止至善之極則乎如惡惡臭如好好色蓋言獨體之好惡也元來只是自好自惡故欺曰自欺慊曰自慊既是自好自惡則好在善即是惡在不善惡在不善即是好在善故好惡雖兩意而一幾若以所感時言則感之以可好而好感之以可惡而惡方有分用之機然所好在此所惡在彼心體仍只是一個一者誠也意本一故以誠還之非意本有兩而吾以誠之者一之也古本聖經而後首傳誠意前不及先致知後不及欲正心直是單提直指以一義總攝諸義至末又云故君子必誠其意何等鄭重故陽明古本序曰大學之道誠意而已矣豈非言誠意而格致包舉其中言誠意而正心以下更無餘事乎乃陽明宛轉歸到致良知為大學中旨大抵以誠意為主意以致良知為工夫之則蓋曰誠意無工夫工夫只在致知以合於明善是誠身工夫博文是約禮工夫惟精是惟一工夫豈不直截簡要乃質之誠意本傳終不打合及考之修身章好而知其惡惡而知其美只此便是良知然則致知工夫不是另一項仍只就誠意中看出如離却意根一步亦更無知致可言余嘗謂好善惡惡是良知舍好善惡惡無所謂知善知惡者好即是知好惡即是知惡非謂既知了善方去好善既知了惡方去惡惡審如此亦安見所謂良者乃知知之與意只是一合相分不得精粗動靜且陽明既以誠意配誠身約禮惟一則莫一於意莫約於誠意一關今云有善有惡意之動善惡雜糅向何處討歸宿抑豈大學知本之謂乎如謂誠意即誠其有善有惡之意誠其有善因可斷然為君子誠其有惡豈有不斷然為小人吾不意為良知既致之後只落得做半個小人若云致知之始有善有惡致知之終無善無惡則云大學之道正心而已矣始得前之既欲提宗於致知後之又欲收功於正心視誠意之關直是過路斷橋使人放步不得主意在何處濓溪曰幾善惡即繼之曰德愛曰宜曰義通曰禮知曰智守曰信此所謂德幾也道心惟微也幾本善而善中有惡言仁義非出於中正即是幾之惡不謂忍與仁對乖與義分也先儒解幾善惡多誤有善有惡意之動知善知惡知之良二語決不能相入則知與意分明是兩事矣將意先動而知隨之耶抑知先主而意繼之耶如意先動而知隨之則知落後著不得謂良如知先主而意繼之則離照之下安得更留鬼魅若或驅意於心之外獨與知與心則法惟有除意不當誠意矣且自來經傳無有以意為心外者求其説而不得無乃即知即意乎果即知即意則知良意亦良更不待言幾者動之微不是前此有個靜地後此又有動之著在而幾則界乎動靜之間者審如此三截看則一心之中隨處是絶流斷港安得打合一貫余嘗謂周子誠神幾非三事總是指點語大學止辨公私義利而不分理欲天人中庸只指隱微顯見而不分前後動靜此是儒門極大公案後人憒憒千載於今如惡惡臭如好好色全是指點微體過此一關微而著矣好而流為好樂惡而流為忿􅓰又再流而為親愛之僻為賤惡之僻又再流而為民好之僻民惡之僻濫觴之弊一至於此總為不誠意故然則以正心章視誠意微著之辨彰彰而世儒反以意為粗根以心為妙體後儒格物之説當以淮南為正曰格知身之為本而家國天下之為末豫請申之曰格知誠意之為本而正修齊治平之為末陽明云意在於事親則致吾良知於事親之物只意在於事親便把個私意了當晨昏則定省當冬夏則溫清何處容得意在於事親耶朱子表章大學於格致之説最為喫緊而於誠意反草草平日不知作何解至易簀乃定為今章句曰實其心之所發不過是就事盟心伎倆於法已疏矣至慎獨二字明是盡性喫緊工夫與中庸無異旨而亦以心之所發言不更疏乎朱子一生學問半得力於主敬今不從慎獨二字認取而欲掇敬於格物之前真所謂握燈而索照也豫嘗謂學術不明只是大學之教不明大學之教不明不爭格致之辨而實在誠正之辨蓋良知與聞見之知總是一知良知何嘗離得聞見聞見何嘗遺得心靈水窮山盡都到這裏誠正之辨所關甚大辨意不清則以起滅為情緣辨心不清則以虛無落幻相兩者相為表裏言有言無不可方物即區區一點良知亦終日受其顛倒播弄而不自知適以為濟惡之具而已視聞見支離之病何啻霄壤一誠貫所性之全而工夫則自明而入故中庸曰誠身曰明善大學曰誠意曰致知其旨一也要之明善之善不外一誠明之所以誠之也致知之知不離此意致之所以誠之也本體工夫委是打合意根最微誠體本天本天者至善者也以其至善還之至微乃見其真止定靜安慮次第俱到以歸之得得無所得乃為真得禪家所謂向一毛孔立腳是也此處圓滿無處不圓滿此處虧欠無處不虧欠故君子起戒於微以克完其天心焉欺之為言欠也所自者欠也自處一動便有夾雜因無夾雜故無虧欠而端倪在好惡之地性光呈露善必好惡必惡彼此兩關乃呈至善故謂之如好好色如惡惡臭此時渾然天體用事不著人力絲毫於此尋個下手工夫惟有慎之一法乃得還他本位曰獨仍不許亂動手腳一毫所謂誠之者也此是堯舜以來相傳心法學者勿得草草放過心體本無動靜心體亦無動靜以未發為性已發為情尤屬後人附會喜怒哀樂人心之全體自其所存者謂之未發自其形之外者謂之已發寂然之時亦有未發已發感通之時亦有未發已發中外一機中和一理也若徒以七情言如笑啼怒罵之類畢竟有喜時有不喜時有怒時有不怒時以是分配性情勢不得不以斷滅者為性種而以紛然雜出者為情緣分明有動有靜矣周子主靜之靜與動靜之靜逈然不同蓋動靜生陰陽兩者缺一不得若於其中偏處一焉則將何以為生生化化之本乎然則周子何以又下個靜字曰只為主宰處著不得注腳只得就流行處討消息亦以見動靜只是一理而陰陽太極只是一事也先儒之解大學者以意為心之所發而以所發先所存故於中庸亦有致和以致中等語近時鄒吉水有曰舍已發之和而欲求未發之中雖孔子不能總為不能出脫一意字故其説種種悠謬信如此只合和為天下之大本矣問雖不見聞亦不敢忽如何曰此除是閉耳合眼也心不在焉始有視而不見聽而不聞時若靜中工夫愈得力則耳目聰明亦愈加分曉可見人一并無不睹不聞時也若謂戒懼工夫不向睹聞處著力則可知在善不善之先故能使善端充長而惡自不起若知在善不善之後無論知不善無救於短長勢必至遂非文過即知善反多此一知雖善亦惡今人非全不知只是稍後耳視聖人霄壤知只是良知而先後之間所爭致與不致也起一善念吾從而知之知之之後如何頓放此念若頓放不妥吾慮其剜肉成瘡起一惡念吾從而知之知之之後如何消化此念若消化不去吾恐其養虎遺患總為多此一起才有起處雖善亦惡轉為多此一念才屬念緣無滅非起今人言致良知者如是國家將興必有禎祥國家將亡必有妖孽此興亡之先兆也蓋人心亦有兆焉方一念未起之先而時操之以戒懼即與之一立立定不至有岐路相疑之地則此心有善而無惡即有介不善於善中而吾且擇之精而守之一若明鏡當空不能眩我以妍媸此所謂善必先知之不善必先知之吾之言致知之學者如是就性情上理會則曰涵養就念慮上提撕則曰省察就氣質上消鎔則曰克治省克得輕安即是涵養涵養得分明即是省克其實一也皆不是落後著事知無先後但自誠而明便占先手故曰至誠之道可以前知若自明而誠尚得急著離誠言明終落後著即明盡天下之理都收拾不到這裏來總屬狂慧天命之性不可得而見即就喜怒哀樂言之猶以為粗幾不足據也故又就喜怒哀樂一氣流行之間而誠通誠復有所謂鬼神之德者言之德即人心之德即天命之性故不睹不聞之中而莫見莫顯者存焉是以君子之戒慎恐懼真若或使之如所謂小心翼翼昭事上帝上帝臨汝無二爾心者故特以祭法推明之一切工夫總是一誠乃信陽明先生戒慎恐懼是本體之説非虛語也本體此誠工夫亦此誠相逼成象洋洋復洋洋凡以見鬼神之為德如此本心之學聖學也而佛氏張大之諱虛而言空空故無所不攝攝一切有無而皆空一切有無不受也又離一切有無而不空其所空自在也看來只是弄精魄語下而遺上者歟誠者不思而得良知不慮而知良知一誠也致知誠之者也此文成祕旨太極本無極是直截語如後人參解乃曰太極本於無極耳信如此豈不加一重障礙宜象山之聽聽而訟也孟子曰乃若其情則可以為善矣何故避性字不言只為性不可指言也蓋曰吾就性中之情藴而言分明見得是善今即如此解尚失孟子本色况可云以情驗性乎何言乎情之善也孟子言這惻隱心就是仁何善如之仁義禮智皆生而有之所謂性也乃所以為善也指情言性非因情言性也即心言性非離心言善也後之解者曰因所發之情而見所存之性因所情之善而見所性之善豈不毫釐而千里乎凡所云性只是心之性決不得心與性對所云情可云性之情決不得性與情對惻隱之心仁也又曰惻隱之心仁之端也説者以為端緒見外耳此中仍自不出來與仁也語意稍傷不知人皆有不忍人之心只説得仁的一端因就仁推義禮智去故曰四端如四體判下一般説得最分明後人錯看了又以誣仁也因以孟子誣中庸未發為性已發為情雖喙長三尺向誰説口之於味一章最費解説今略為拈出蓋曰耳目口鼻之欲雖生而有之之性乎然獨無所以宰制之乎是即所謂命也故君子言命不言性以致遏欲存理之功綱常倫物之則有至有不至雖生而若限之命乎然孰非心之所固有乎是則所謂性也故君子言性不言命以致盡人達天之學蓋性命本無定名合而言之皆心也自其權籍而言則曰命故嘗能為耳目口鼻君自其體蘊而言則曰性故可合天人齊聖凡而歸於一總許人在心上用功就氣中參出理來故兩下分疏如此若謂命有不齊惟聖人全處其豐豈耳目口鼻之欲聖人亦處其豐乎性有不一惟聖人全出乎理豈耳目口鼻之性獨非天道之流行乎審若此既有二性又有二命矣惟提起心字則性命各有條理令人一一推諉不得此孟子道性善本旨也後之言性者離心而言之離之弗能離則曰一而二二而一愈元愈逺離性言命亦然羲以為性命之辨莫明於此耳目口鼻是氣之流行者離氣無所為理故曰性也然即謂是為性則理氣渾矣乃就氣中指出其主宰之命這方是性故於耳目口鼻之流行者不竟謂之為性也綱常倫物之則世人以此為天地萬物公共之理用之範圍世教故曰命也所以後之儒者窮理之學必從公共處窮之而我之所有者唯知覺耳孟子言此理自人所固有指出性真不向天地萬物上求故不謂之命也宋儒以上段是氣質之性下段是義理之性豈不誤哉勿忘勿助間適合其宜便是義非必别尋一勿忘勿助去集那義也如此正是義襲了知言之學只是從未發之中看得透故早破了偏見此處差之毫釐氣便於此而受過過則暴也此孟子得統於子思處主一之謂敬心本有主主還其主便是主一今日乃打破敬字濓溪以中言性而本之剛柔善惡剛柔二字即喜怒哀樂之别名剛善則怒中有喜惡則只是偏於剛一味肅殺之氣矣柔善則喜中有怒惡則只是偏於柔一味優柔之氣矣中便是善言於剛柔之間認個中非是於善惡之間認個中又非是於剛善柔善之外另認個中也此中字分明是喜怒哀樂未發之謂中故即承之曰中也者和也中節也天下之達道也聖人之立極是也圖説言仁義中正仁義即剛柔之别名中正即中和之别解皆為中庸注疏後人不解中庸并不解圖説通書矣周子思之功全向幾處用幾者動之微吉之先見者也知幾故通微通微故無不通故可以盡神可以通誠故曰思者聖功之本而吉凶之機也吉凶之機言善惡由此而出非幾中本有善惡也幾動誠動言幾中之善惡方動於彼而為善去惡之實功已先動於思所以謂之見幾而作不俟終日所以謂之知幾其神機非幾也言發動所由也善不善之幾中於感應者止有過不及之差而乘於念慮者則謂之惡然過而不已念慮乘之亦鮮不為大惡矣君子知機端在感應上控持得力若念慮之惡君子早已絶之矣程子以水喻性其初皆清也而其後漸流而至於濁則受水之地異也如此分義理與氣質似甚明但易稱各正性命乃利貞又稱成之者性也亦以誠復言則古人言性皆主後天而至於人生而靜以上所謂不容説者也即繼之者善已落一班畢竟離氣質無所謂性者生而濁則濁生而清則清非水本清而受制於質故濁也如此則水與受水者終是兩事性與心可分兩事乎余謂水心也而清者其性也有時而濁未離乎清也相近者也其終錮於濁則習之罪也性本虛位心有定理敬齋云敬無間斷便是誠豫謂心有間斷只為不敬故若敬則自無間斷敬則所以誠之也此所謂自明而誠也非敬即是誠敬齋尚未及和靖敬齋只持守可觀而和靖於涵養分上大是得力會語問未發之中難以摸索曰中體瑩然何勞摸索才摸索便不是中為學莫先於辨誠偽茍不於誠上立腳千修萬修只做得禽獸路上人祁世培問人於生死關頭不破恐於義利尚有未淨處曰若從生死破生死如何破得只從義利辨得清認得真有何生死可言義當生自生義當死自死眼前正見一義不見有生死在問生死陶石梁以臘月三十日言之先生曰臘月三十日謂一年之事以此日終而一年之事不自此日始須從正月初一日做起也問格物當主何説有言聖賢道理圓通門門可入不必限定一路先生曰畢竟只有慎獨二字足以蔽之别無門路多端可放步也問三教同源否曰莫懸虛勘三教異同且當下辨人禽兩路古人成説如琴譜要拍須自家彈靜坐是養氣工夫可以變化氣質陶石梁每提識認二字果未經識如何討下手乃門下便欲識認個甚麼轉落影響邊事愈求愈逺墮入坑塹中庸言道不逺人其要歸之子臣弟友學者乃欲逺人以為道乎世人無日不在禽獸中生活彼不自覺不堪當道眼觀并不堪當冷眼觀今以市井人觀市井人彼此不覺耳問先生教某靜坐坐時愈覺妄念紛擾奈何曰待他供狀自招也好不然且無從見矣此有根株在如何一旦去得不靜坐他何嘗無只是不覺耳吾輩心不能靜只為有根在假如科舉的人只著在科舉上仕途的人只著在仕途上即不專為此總是此傍枝生來所以濓溪教的人只把無欲兩字作丹頭先生嘆曰人謂為人不如為已故不忠看來忠於已謀者亦少如機變如蠢息如欺世盜名日日戕賊此身誤認是占便宜事有友問三代之下惟恐不好名名字恐未可抹壞王金如云這是先儒有激之言若論一名字貽禍不是小小友謂即如今日之會與來聽者亦為有好名之心耳即此一念便亦足取先生曰此語尤有病這會若為名而起是率天下而為亂臣賊子皆吾輩倡之也諸友裹足而不可入斯門矣友又謂大抵聖賢學問從自己起見豪傑建立事業則從勳名起見無名心恐事業亦不成先生曰不要錯看了豪傑古人一言一動凡可信之當時傳之後世者莫不有一段真至精神在內此一段精神所謂誠也惟誠故能建立故足不朽稍涉名心便是虛假便是不誠不誠則無物何從生出事業來問無欲而後可言良知否曰只一致知便了若言致知又言無欲則致知之上又須添一頭腦所謂無欲只是此心之明所言有欲只是此心之昧有欲無欲止爭明昧相去不逺但能嘗明不必更言無欲習染日降而人心萬古如一日敬則心中無一事舉飯蔬章先生曰浮雲不礙太虛聖人之心亦然直是空洞無一物今且問如何是太虛之體或曰一念不起時先生曰心無時而不起試看天行健何嘗一息之停所謂不起念只是不起妄念耳性無性道無道理無理何也蓋有心而後有性有氣而後有道有事而後有理故性者心之性道者氣之道理者事之理也無形之名從有形而起如曰性曰仁義禮智信皆無形之名也然必有心而後有性之名有父子而後有仁之名有君臣而後有義之名推之禮智信皆然故曰形色天性也惟聖人然後可以踐形先生警諸生曰吾輩習俗既深平日所為皆惡也非過也學者只有去惡可言改過工夫且用不著又曰為不善却自恕為無害不知宇宙儘寬萬物可容容我一人不得吾輩偶呈一過人以為無傷不知從此過而勘之先尚有幾十層從此過而究之後尚有幾十層故過而不已必惡謂其出有源其流無窮也茍志於仁矣無惡也然後有改過工夫可言寧學聖人而未至無以一善成名者士君子立志之説也寧以一善成名無學聖人而未至者士君子返躬之義也如為子死孝為臣死忠古今之常理乃舍見在之當為而曰吾不欲以一善成名是又與於不仁之甚者也學者或云於靜中見得道理如此而動時又復忙亂或云於動時頗近於道而靜中又復紛擾症雖二見其實一病也動靜二字不能打合如何言學陽明在軍中一面講學一面應酬軍務纖毫不亂此時動靜是一是二有讀人譜疑無善二字者先生曰人心止有好惡一機好便好善惡便惡不善正見人性之善若説心有個善吾從而好之有個不善吾從而惡之則千頭萬緒其為矯揉也多矣且謂好惡者心乎善惡者心乎識者當辨之人譜謂無善而至善心之體也與陽明先生無善無惡者心之體不同陽明但言寂然不動之時故下即言有善有惡意之動矣先生此語即周子無極而太極也以至善換太極二字更覺親切人心無善正言至善之不落迹象無聲無臭也先生從至善看到無善善為主也周海門言無善無惡斯為至善從無強名之善無為主也儒釋分途於此大學所謂格物孟子所謂集義一事也不放過一時也不放鬆無事時惺惺不寐有事時一真自如不動此子無事時只居處恭便了天理一點微妙處提醒工夫在有意無意之間省察是存養之精明處靜中養出端倪端倪即意即獨即天佛氏心無其心不得不以天地萬物為心物無其物不得不以心為天地萬物正如鏡中花用無其用體非其體性即理也理無往而不在則性亦無往而不在心中無一事浩然與天地同流觀春夏秋冬而知天之一元生意周流而無問觀喜怒哀樂而知人之一元生意周流而無間為學亦養此一元生生之氣而已或曰未免間斷耳先生曰有三説足以盡之一本來原無間斷二知間斷即禪續三此間斷又從何來學者但從第三句做工夫方有進步學不外日用動靜之間但辨真與妄耳或問如何為真先生曰對妻子如此説對外人却不如此説對同輩如此説對僕𨽻却不如此説即所謂不誠無物不可以言學世之逺人以為道者以道為一物必用吾力以求之故愈求愈逺其實揖讓進退之間作止語默之際無非道體之流行反之即是又多乎哉問所存自謂不差而發之不能無過何也曰仍是靜存之中差耳此中先有罅隙而後發之日用之間始有過不及之事事豈離心而造者故學者不必求之行事之著而止求之念慮之微一言以蔽之曰誠而已矣心只有人心而道心者人之所以為心也性只有氣質之性而義理之性者氣質之所以為性也問萬物皆備之義曰才見得有個萬物便不親切須知盈天地間無所謂萬物者萬物皆因我而名如父便是我之父君便是我之君類之五倫以往莫不皆然然必實有孝父之心而後成其為我之父實有忠君之心而後成其為我之君此所謂反身而誠至此才見得萬物非萬物我非我渾然一體此身在天地間無少欠缺何樂如之羲問孔明敬輿希文君實其立心制行儒者未必能過之今一切溝而出之於外無乃隘乎先生曰千聖相傳止此一線學者視此一線為離合所謂道心惟微也如諸公豈非千古豪傑但於此一線不能無出入於此而放一頭地則雜矣與其雜也寧隘先生題魏忠節公主羲侍先生於舟中陳幾亭以與紹守書呈先生先生覽畢付羲其大意謂天下之治亂在六部六部之胥吏盡紹興胥吏在京師其父兄子弟盡在紹興為太守者茍能化其父兄子弟則胥吏亦從之而化矣故紹興者天下治亂之根本也羲一笑而置之曰迂腐先生久之曰天下誰肯為迂腐者羲惕然無以自容心須樂而行惟苦學問中人無不從苦處打出道非有一物可名只在行處圓滿張二無從事主靜之學請正先生曰心無分於動靜故學亦無分於動靜若專求靜便坐喜靜惡動之病非體用一原之學也二無曰讀先生人譜而知損益二卦學者終身用之不盡先生曰不然要識乾元不識乾元則心無主宰即懲窒遷改未免以後起為功豈能直達本原乎二無竦然曰此元公以後久默之旨祝淵苦遊思雜念先生曰學者養心之法必先養氣養氣之功莫如集義自今以往只事事求慊於心凡間勾當間話説槩與截斷歸併一路遊思雜念何處可容今人讀書只為句句明白所以無法可處若有不明白處便好商量也然徐而叩之其實字字不明白世言上等資質人宜從陸子之學下等資質人宜從朱子之學吾謂不然惟上等資質然後可學朱子以其胸中已有個本領去做零碎工夫條分縷析亦自無礙若下等資質必須識得道在吾心不假外求有了本領方去為學不然只是向外馳求誤却一生矣祝淵言立志之難先生曰人之於道猶魚之於水魚終日在水忽然念曰吾當入水躍起就水勢必反在水外今人何嘗不在道中更要立志往那處求道若便如此知得連立志二字也是贅先生語葉敦艮曰學者立身不可自放一毫出路問改過先改心過否曰心安得有過心有過便是惡也吾人只率初念去便是孟子所以言本心也初念如此當轉念時復轉一念仍與初念合是非之心仍在也若轉轉不已必至遂其私而後已便不可救藥知行兩字總是此心中做手名目學以求此心更無知行可説先生謂祝淵曰人生末後一著極是要緊儘有平日高談性命臨岐往往失之其受病有二一是偽學飾名欺世原無必為聖賢之志利害當前全體盡露又有一種是禪學禪家以無善無惡為宗旨凡綱常名教忠孝節義都屬善一邊指為事障理障一切掃除而歸之空故惑世害道莫甚於禪昔人云能盡飲食之道即能盡生死之道驗之日用之間順逆之來夢寐之際此心屹然不動自然不為利害所奪矣惟其平日無終日之間違仁故能造次必於是顛沛必於是工夫全在平日不可不兢兢也易簀語為學之要一誠盡之矣而主敬其功也敬則誠誠則天若良知之説鮮有不流於禪者常將此心放在寬蕩蕩地則天理自存人欲自去矣日來靜坐小菴胸中渾無一事浩然與天地同流不覺精神困憊蓋本來原無一事凡有事皆人欲也若能行所無事則人而天矣王育之侍先生曰吾今日自處無錯誤否對曰雖聖賢處此不過如是先生曰吾豈敢望聖賢哉求不為亂臣賊子而已矣來學問答王嗣奭問晦菴亦從禪學勘過來其精處未嘗不採取而不講故妙所謂知者不言也象山陽明不出其範圍晚年定論可見曰宋儒自程門而後遊楊之徒浸深禪趣朱子豈能不惑其説故其言曰佛法煞有高處而第謂可以治心不可以治天下國家遂辭而闢之將吾道中靜定虛無之説一併歸之禪門惟恐一托足焉因讀大學而有得謂必於天下事物之理件件格過以幾一旦豁然貫通之地而求之誠正故一面有存心之説一面有致知之説又曰非存心無以致知而存心者不可以不致知兩事遞相君臣迄無一手握定把柄之勢既以失之支離矣至於存心之中分為兩條曰靜而存養動而省察致知之中又復岐為兩途曰生而知之者義理耳若夫禮樂名物亦必待學而後有以驗其是非之實安往而不支離也蓋亦禪學有以誤之也象山直信本心謂一心可以了當天下國家庶幾提綱挈領之見而猶未知心之所以為心也故其於窮理一路姑置第二義雖嘗議朱子之支離而亦不非朱子之格致格致自格致耳惟其學不本於窮理而驟言本心是以知有本心不知有習心即古人正心洗心皆信不過窺其意旨屢犯朱子心行路絶語言道斷之譏文成篤信象山又於本中指出良知二字謂為千聖滴骨血亦既知心之所以為心矣天下無心外之理故無心外之知而其教人惓惓於去人欲存天理以為致良知之實功凡以發明象山未盡之意特其説得良知高妙有妄心亦照無照無妄等語頗近於不思善不思惡之語畢竟以自私自利為彼家斷案可為卓見矣合而觀之朱子惑於禪而闢禪故其失也文陸子出入於禪而避禪故其失也粗文成似禪而非禪故不妨用禪其失也元問下學而上達自在聖人不言待人自悟曰形而上者謂之道形而下者謂之器上下原不相離故學即是學其所達達即是達其所學若不學其所達幾一朝之達其道無由譬之適京師者起腳便是長安道不必到長安方是長安不然南轅而北轍矣悟此之謂自悟言此之謂不言之言答王嗣奭字右仲四明人葉廷秀問董子曰道之大原出於天乃天命謂性説者以孔孟之後道不明只是性不明愚意性本從心學者不先治心是起念已差路頭才欲治心又墮於虛寂無用之歸今欲講心學其何道之從曰學莫先於知性只為天命之謂性一句早已看錯了天人杳不相屬性命仍是二理今曰天命謂性而不曰天命以之性斷然是一不是二然則天豈外人乎而命豈外於吾心乎故曰盡其心者知其性也知其性則知天矣中庸無聲無臭正不諱言空寂也而學者以為佛氏也者而去之曰吾欲舍是而求心焉何異舍京師别求長安斷無適從之路矣問某嘗謂明體適用如車二輪鳥二翼必不可離者也然於道理重一分定於功名輕一分何况世路齟齬一甘遁世大川曷濟其何道之從曰大學言明德親民其要歸於止至善善即天命之性是也陽明先生曰明德以親民而親民以明其明德原來體用只是一個一者何也即至善之所在也學不見性徒求之一體一用之間曰車兩輪鳥雙翼不問所以轉是輪鼓是翼者將身世內外判然兩途既宜此又欲宜彼不亦顧此而失彼乎所以然者止因見得學問一事是義理路頭用世一事是功名路頭觭輕觭重世無此等性命僕請更其辭曰於明德明一分自於親民親一分所謂至善之止亦不外此而得之矣問竊以讀書窮理乃俗學對證之藥而辨義利尤為藥中針石不從此處理會恐腳根不定未有不東西易向者曰學者須向暗然處做工夫起從此浸假而上倫類聲塵俱無托足方與天體相當此之謂無欲故靜靜中自有一團生意不容已處即仁體也窮此之謂窮理而書非理也集此之謂集義而義非外也今但以辨晰義理為燕越分途而又必假讀書以致其知安知不墮於義外乎答葉廷秀戰國諸子紛紛言性人置一喙而孟子一言斷之曰性善豈徒曰可以為善而已乎又曰天下之言性也則故而已矣故者以利為本可見此性見見成成停停當當不煩一毫安排造作這便是天命流行物與無妄之本體亦即此是無聲無臭渾然至善之極則非無善無惡也告子專在無處立腳與天命之性尚隔幾重公案孟子故不與之深言而急急以惻隱羞惡辭讓是非指出個善字猶然落在第二義耳性既落於四端則義理之外便有氣質紛紜雜糅時與物搆而善不善之差數覯故宋儒氣質之説亦義理之説有以啓之也要而論之氣質之性即義理之性義理之性即天命之性善則俱善子思曰喜怒哀樂之未發謂之中非氣質之粹然者乎其有不善者不過只是樂而淫哀而傷其間差之毫釐與差之尋丈同是一個過不及則皆自善而流者也惟是既有過不及之分數則積此以往容有十百千萬倍蓰而無算者此則習之為害而非其性之罪也故曰性相近習相逺故性無不善而心則可以為善可以為不善即心亦本無不善而習則有善有不善種種對待之相總從後天而起諸子不察而槩坐之以性不已寃乎為善為不善只為處便非性有善有不善只有處便非性合虛與氣有性之名氣本是虛其初誰為合他來五行不到處父母未生前彼家亦恐人逐在二五形氣上討頭面故發此論後人死在言下又舍已生後分外求個未生前不免當面蹉過總之太極陰陽只是一個但不指點頭腦則來路不清故中庸亦每言前定前知前處正是無聲無臭一路消息學者從此做工夫方是真為為善去惡希聖達天庶幾在此盈天地間只是此理無我無物此理只是一個我立而物備物立而我備恁天地間一物為主我與天地萬物皆備其中故言萬物則天地在其中天亦一物也西銘之意就本身推到父母又由父母以推到兄弟方見得同體氣象早已是肝膽楚越矣陶先生謂我所自有不受於天只恐靈明者亦是一物而更有不物於物者以為之主物無不壞而不物於物者終不壞鄙意與陶先生不無異同耳禪家以了生死為第一義故自私自利留住靈明不還造化看來只是弄精魂伎倆吾儒既云萬物皆備於我如何自私自利得生既私不得死如何私得夕死可矣分明放下了也答王嗣奭昨言學當求之於靜其説終謬道無分於動靜心無分於動靜則學亦無分於動靜可知所云造化人事皆以收斂為主發散是不得已事正指獨體邊事天向一中分造化人從心上起經綸是也非以收斂為靜發散為動也一斂一發自是造化流行不息之氣機而必有所以樞紐乎是運旋乎是則所謂天樞也即所謂獨體也今若以獨為至靜之體又將以何者為動用乎藏而後發白沙有是言其始學亦誤也其後自知其非又隨動靜以施其功亦誤也總在二五邊生話故耳故曰君子之學慎獨而已矣無事此慎獨即是存養之要有事此慎獨即是省察之功獨外無理窮此之謂窮理而讀書以體驗之獨外無身修此之為修身而言行以踐履之其實一事而已知乎此者謂復性之學答門人獨體即大體常人之心其動也衆欲交馳其止也物而不化合之日昏昧放逸周天三百六十五度四分度之一而其中為天樞天無一息之不運至其樞紐處實萬古常止却無一隙縫子是其止處其下一圈便是小人間居之象靜存動察之象靜存動察之誠看未發氣象之説仁者以天地萬物為一體此一語須看得破乃是人以天地萬物為一體非仁者以天地萬物為一體也若人與天地萬物本是二體却借個仁者意思打合著天地萬物與之為一體早已成隔膜之見矣人合天地萬物以為人猶之心合耳目口鼻四肢以為心今人以七尺言人而遺其天地萬物皆備之人者即不知人者也今人以一膜言心而遺其耳目口鼻四肢皆備之心者不知心者也證人之意其在斯乎學者若於此信得及見得破天地萬物本無間隔即欲容其自私自利之見以自絶於天而不可得也不須推致不須比擬自然親親而仁民仁民而愛物義理智信一齊俱到此所以為性學也然識破此理亦不容易誠敬存之一語直是徹首徹尾工夫若不用誠敬存之之功又如何能識破至此以為既識破後又須誠敬工夫作兩截見者亦非也大要只是慎獨慎獨即是致中和致中和即是位育此是仁者一體實落處不是懸空識想也所列廣利濟一格此意甚害道百善五十善書之無消煞處紀過則無善可稱無過即是善若雙行便有不通處愚意但欲以改過為善而置之焚香靜坐下頗為有見今善惡並出但凖多少以為銷折則過終無改時而善之所列亦與過同歸而已有過非過也過而不改是謂過矣有善非善也有意為善亦過也此處路頭不清未有不入於邪者至於過之分數亦屬穿鑿理無大小多寡故也今但除入刑者不載則過端皆可前除但有過而不改轉入於文直須紀千萬過耳諸君平日所講專要無善至此又説為善册以勸人落在公利一路若為下下人説法尤不宜如此僕以為論本體決其有善無惡論工夫則先事後得無善有惡可也答秦洪祐學者只有工夫可説其本體處直是著不得一語才著一語便是工夫邊事然言工夫而本體在其中矣大抵學者肯用工夫處即是本體流露處其善用工夫處即是本體正當處非工夫之外别有本體可以兩相湊泊也若謂兩相湊泊則亦外物而非道矣董黃庭言為善去惡未嘗不是工夫陶先生切切以本體救之謂黃庭身上本是聖人何善可為何惡可去然終不能無疑於此也既無善可為則亦無所事於為善矣無惡可去則亦無所事於去惡矣既無本體并無工夫將率天下為猖狂自恣流於佛老矣故某於此只喝知善知惡是良知一語就良知言本體則本體絶非虛無就良知言工夫則工夫絶非枝葉庶幾去短取長之意昔者季路一日有事鬼神之問不得於鬼神又有知死之問總向無處立腳若於此進一解便是無善無惡一路夫子一則曰未能事人焉能事鬼一則曰未知生焉知死一一從有處轉之乃知孔門授受只在彜倫日用討歸宿絶不於此外空談本體滋高明之惑只此是性學所云知生便是知性處所云事人便是盡性處孟子言良知只從知愛知敬處指點亦是此意知愛知敬正是本體流露正當處從此為善方是真為善從此去惡方是真去惡則無善無惡之體不必言矣今人喜言性學只説得無善無惡心之體不免犯却季路兩問之意浸淫不已遂有四無之説於良知字全沒交涉其為壞師門教法當何如者同上聖誠而已學以至乎聖人之道者思誠而已矣思之思之鬼神通之所以精義也思慮未起鬼神莫知不由乎我更由乎誰所以立命也心之官思也而曰未起無起而無不起也隨用而見非待用而起也有用有不用有起有不起者非思也念也以念為思是認賊做子也人以無念為思是認子作賊也蓋念之有起有滅者動靜所乘之幾而心官之無起無不起者太極本然之妙也此可以觀思誠之説矣謂思即誠可謂誠即思亦可故曰誠之又曰何思至哉元公之學乎答文德翼學問者致知之路也心外無知故曰良知知外無學故曰致知又曰思則得之即致知之别名元來即本體即工夫也又曰慎思懼其放也又曰近思懼其放而外也古人立言字字鞭入底裏其要歸於知止耳知逐於事物落於想像則不止不止即放所謂思則得之也性者心之理也心以氣言而性其條理也離心無性離氣無理雖謂氣即性性即氣猶二之也惻隱羞惡辭讓是非皆指一氣流行之機呈於有知有覺之頃其理有如此而非於所知覺之外另有四端名色也即謂知此理覺此理猶二知也良知無知而無乎不知致知無思而無乎不思不可以內外言不可以寂感界收動歸靜取物證我猶二之也告子不得於心不致知故也故孟子反之以知言不求於氣不識性故也故孟子反之以養氣養氣即養其性之别名總之一心耳心一知耳許多名色皆隨指而異只一言以蔽之曰求其放心而已矣答沈中柱陽明先生於知止一關全未勘入只教人在念起念滅時用個為善去惡之力終非究竟一著所謂只於根本求生死莫向支流辨濁清不免自相矛盾故其答門人有即用求體之説又有致和乃以致中之説何其與龜山門下一派相背馳乎然則陽明之學謂其失之粗淺不見道則有之未可病其為禪也陽明而禪何以處豫章延平乎只為後人將無善無惡四字播弄得天花亂墜一頓扯入禪乘於平日所謂良知即天理良知即至善等處全然抹煞安得不起後日之惑乎陽明不幸而有龍溪猶之象山不幸而有慈湖皆斯文之厄也大抵讀古人書全在以意逆志披牝牡驪黃而直窺其神駿則其分合異同之際無不足以備尚論之資而一脈大中至正純粹不離之聖真必有恍然自得於深造之餘者若或界限太嚴拘泥太甚至於因噎而廢食則斯道終無可明之日矣僕願參夫且擴開心胸高擡眼鏡上下今古一齊貫穿真勘到此心此理吾性吾命才無躲閃處必有進步也總之禪之一字中人日久以故逃之者既明以佛氏之説納之吾儒之中而攻之者轉又明以聖人之精微處推而讓之佛氏之地亦安見其有以相勝古之有朱子今之有忠憲先生皆半雜禪門故其説往往支離或深奧又向何處開攻禪之口乎嗚呼吾道日晦矣答韓位盈天地間凡道理皆從形器而立絶不是理生氣也於人身何獨不然大易形上形下之説截得理氣最分明而解者往往失之後儒專喜言形而土者作推高一層之見而於其所謂形而下者忽一忽萬兩無依據轉為釋氏所藉口真開門而揖盜也答劉鱗長葉廷秀問體用一原曰體用一原之説乃先儒卓見道體而後有是言只今以讀書為一項事做官為一項事豈得成體用更復何一何原須知此理流行心目之前無用非體無體非用蓋自其可見者而言則謂之用自其不可見者而言則謂之體非截然有兩事也日用之間持而循之便是下學反身之地默而成之即是悟機此所謂即學即達非别有一不可思議之境界也故知道者疏水曲肱與金革百萬用則同是用體則同是體也善乎知止之説其入道之門乎艮其止止其所也止其所者心膂之間天理正當之位也此位運量無方一掬不謂小上天下地往古來今不為大又何有於外境乎知乎此者謂之知微惟其無微非顯是以無體非用惟其顯微無間是以體用一原然則吾儕學道只從微字討消息可乎問意者心之所發注蓋因誠意傳中有好惡字面當屬動一邊若以謂心之所存豈即未發之中乎格物所以致知此本末一貫學問先生以為向末一邊而必歸之所存博約互用歟此不得不再請益也曰意為心之所存正從中庸以未發為天下之大本不聞以發為本也大學之教只是知本身既本於心心安得不本於意乃先儒既以意為心之所發矣而陽明又有正心之説曰知此則知未發之中觀此則欲正其未發之心在先誠其已發之意矣通乎不通乎然則好惡者正指心之所存言也此心之存主原有善而無惡何以見其必有善而無惡也以好必於善惡必於惡好必於善如好好色斷斷乎必於此惡必於惡如惡惡臭斷斷乎必不於彼必如此而必不於彼正見其存主之誠處故好惡相反而相成雖兩用而止一幾所謂幾者動之微吉之先見者盡此之好惡原不到作用上看雖能好能惡民好民惡總向此中流出而但就意中則只指其必於此必不於彼者七情之好惡也意字看得清則幾字才分曉幾字看得清則獨字才分曉孟子曰其好惡與人相近也者幾希正此之謂也難道平旦之時未與物接便是好人惡人民好民惡之謂乎大學以好惡解誠意分明是微幾以忿懥憂患恐懼好樂解正心分明是發幾故也即以誠正二字言之誠之理微無思為是也正之理著有倫有脊之謂也此可以得誠意正心先後本末之辨也陽明先生惟於錯解所以只得提出良知二字為主柄以壓倒前人至解中庸亦有致和以致中等語兩相遷就以晦經旨而聖學不明於天下矣數年來每於朋友聚訟不已僕反復之而終不能強從相沿之説門下姑留此一段話柄徐而思之他日有以解我之固見乎至於本末一貫之説先儒謂本末只是一物蓋言物只無所不該盈天地間惟萬物而必有一者以為之主故格物之始在萬上用功而格物之極在一上得力所謂即博即約者也博而反約則知本矣本者止之地知本則知至而知止故授之以意誠意誠則心之主宰處止於至善而不遷矣故意以所存言非以所發言也止善之量雖通乎心身家國天下而根抵處只主在意上知此則動而省察之説可廢矣非敢謂學問真可廢省察正為省察只是存養中最得力處不省不察安得所為常惺惺者存又存個恁養又養個恁今專以存養屬之靜一邊安得不流而為禪又以省察屬之動一邊安得不流而為偽又於二者之間方動未動之際求其所為幾者而謹之安得不流而為雜二之已不是况又分為三乎率天下之人而禍仁義者必此其歸也然則學問之要只是靜而存養乎曰道著靜便不是曰不睹不聞非乎曰先儒以不睹不聞為已所不睹不聞果如此除是死時方有此耳然則幾者動之微何以有動有動則必有靜矣曰此之謂動非以動靜之動言也復其見天地之心是也心只是一個心常惺而常覺不可以動靜言動靜者時位也以時位為本體傳注之訛也惟易有寂然不動之説然却以感而遂通作一句看非截然兩事也雖然陰陽動靜無處無之時位有動靜則心體與之俱動靜矣但事心之功動也是常惺惺此時不增一些子增一些子則物於動矣靜也是常惺惺此時不減一些子減一些子則物於靜矣此心極之妙所以無方無體而慎獨之功必於斯而為至也答葉廷秀董標心問有意之意與無意之意同否曰人心之有意也即虞廷所謂道心惟微也惟微云者有而未始滯於有無而未始淪於無蓋妙於有無之間而不可以有無言者也以為無則墮於空寂以為有則流於智故又何以語心體之本然乎則是同是别之疑可釋也已問有意之時與無意之時礙否曰意既不可以有無言則併不可以有無之時言矣有時而有則有時而無有無既判為兩意有無又分為兩時甚矣其支也時乎時乎造物所謂逝者如斯乎而何獨疑於人心乎問心有無意時否曰意者心之所以為心也止言心則心只是徑寸虛體耳著個意字方見下了定盤針有子午可指然定盤針與盤子終是兩物意之於心只是虛體中一點精神仍只是一個心本非滯於有也安得云無問意與心分本體流行否曰來教是疑心為體意為流行愚則以為意是心之體而流行其用也但不可以意為體心為用耳程子曰凡言心者皆指已發而言既而自謂不然愚謂此説雖非通論實亦有見蓋心雖不可以已發言而大學之言心也則多從已發不觀正心章專以忿懥好樂恐懼憂患言乎分明從發見處指點耳且正之為義如云方方正正有倫有脊之謂易所謂效法之謂坤也與誠意字不同誠以體言正以用言故正心先誠意由末以之本也中庸言中和中即誠和即正中為天下之大本誠為正本也凡書之言心也皆合意知而言者也獨大學分意知而言之一節推進一節故即謂心為用意為體亦得問意屬已發心屬未發否曰人心之體存發一機也心無存發意無存發也盡此心中一點虛靈不昧之主宰常常存亦常常發問一念不起時意在何處曰一念不起時意恰在正當處也念有起滅意無起滅也今人鮮不以念為意者道之所以常不明也問事過應寂後意歸何處曰意淵然在中動而未嘗動所以靜而未嘗靜也本無來處亦無歸處問百姓日用不知之意與聖人不思勉之意有分别否曰百姓日用而不知惟其定盤針時時做得主所以日用得著不知之知恍然誠體流露聖人知之而與百姓同日用則意於是乎誠矣誠無為才著思勉則不誠不誠便非意之本體矣觀誠之為義益知意為心之主宰不屬動念矣問學問思辨工夫與從容中道之天道是一是二曰學問思辨而不本之從容中道則事事入於人偽學不是學問不是問思不是思辨不是辨行不是行故曰思誠者人之道也誠意云者即思誠一點歸宿精神所謂知至而後意誠也問從心不踰此時屬心用事還屬意用事曰此個機緣正是意中真消息如定盤針在盤子中隨盤子東西南北此針子只是向南也聖人學問到此得淨淨地并將盤子打碎針子拋棄所以平日用毋意工夫方是至誠如神也無聲無臭至矣哉此個主宰要他有又要他無惟聖人為能有亦惟聖人為能無惟從有處無所以無處有有而無無而有方見人心至妙至妙處答董標心十問史孝復疑大學於誠意後復推先致知一著而實其功於格物者誠恐拋却良知單提誠意必有誠非所誠者涑水元城只作得九分人物以此曰格致是誠意工夫明善是誠身工夫其旨一也蓋以誠意為主意格致為工夫工夫結在主意中并無先後可言若不提起主意而漫言工夫將必有知非所知之病矣疑妙於有無之間而不可以有無言者心也即道心惟微也而以意當之不啻霄壤矣曰心則是個渾然之體就中指出端倪來曰意即惟微之體也人心惟危心也而道心者心之所以為心也非以人欲為人心天理為道心也正心之心人心也而意者心之所以為心也非以所存為心所發謂意也微之為言幾也幾即意也疑怵惕惻隱之心未起是無意之時既起是有意之時納交要譽惡聲之心亦然曰怵惕惻隱之心隨感而見非因感始有當其未感之先一團生意原是活潑地至三者之心初來原不曾有亦可見意之有善而無惡矣不幸而夾帶三者之心正因此心無主不免轉念相生全坐不誠之病耳今以時起者為意又以轉念而起者為意豈意有時而怵惕惻隱有時而納交要譽惡聲善惡無常是不特無納交要譽惡聲之心并無怵惕惻隱之心宛轉歸到無善無惡心之體耶疑復之所謂意者蓋言知也心體渾然説個知字方見有定盤針若以意充之則適莫信果無所不至曰心體只是一個光明藏謂之明德就光明藏中討出個子午見此一點光明原不是蕩而無歸者愚獨以意字當之子午是活適莫適莫是死子午其實活者是意死者非意總之一心也賢以為知者即是意中之知而僕之以為意者即是知中之意也疑説文意志也增韻心所向也説文於志字下志意也又曰心之所之也未有以意為心者曰心所向曰意正是盤針之必向南也只向南非起身至南也凡言向者皆指定向而言離定字便無向字可下可知意為心之主宰矣心所之曰志如云志道志學皆言必為聖賢的心仍以主宰言也心所之與心所往異若以往而行路時訓之字則拋却腳根立定一步矣然説文之説尚有可商者按五臟心藏神脾藏意腎藏志肝藏魂肺藏魄合之皆心之神也而惟脾腎一直上中下通心為一體故意志字皆不離心字意者心之中氣志者心之根氣故宅中而有主曰意靜深而有本曰志今曰意志也志意也豈誠意之説即是立志持志之説乎夫志與意且不可相混况心與意又相混乎心自心意自意原不可以意為心但不可離意求心耳疑朱子以未發屬性已發屬情亦無甚謬曰古人言情者曰利貞者性情也即性言情也六爻發揮旁通情也乃若其情無情者不得盡其辭如得其情皆指情藴情實而言即情即性也並未嘗以已發為情與性字對也乃若其情者惻隱羞惡辭讓是非之心是也孟子言這惻隱心就是仁非因惻隱之發而見所存之仁也疑念無主意有主心有主而無主固不可以念為意尤不可以意為心曰心既有主而無主正是主宰之妙處決不是離却意之有主又有個心之有主而無主果有二主是有二心也疑大學誠意後尚有正心工夫曰誠意一關是學問立命靈符雖其間工夫有生熟然到頭只了得誠意本分故誠意之後更無正心工夫疑毋意解恐當從朱子説曰聖人毋意所謂有主而無主也朱子曰私意也必下個私字語意方完畢竟意中本非有私也有意而無意有主而無主也疑竊觀前後宗旨總不出以意為心之主宰然必舍良知而言意者緣陽明以後諸儒談良知之妙而考其致處全不相掩因疑良知終無慿據不如意字確有可依耳曰鄙意則謂良知原有依據依據處即是意故提起誠意而用致知工夫庶幾所知不至蕩而無歸也已上俱答史孝復古人學問全副向靜存處用更無一點在所發處用并無一點在將發處用蓋用在將發處便著後著也且將發又如何用功則必為將為迎為憧憧而後可耳若云慎於所發依舊是存處工夫答史孝咸三原盈天地間皆萬物也人其生而最靈者也生氣宅於虛故靈而心其統也生生之主也其常醒而不昧者思也心之官也致思而得者慮也慮之盡覺也思而有見焉識也注識而流想也因感而動念也動之微而有主者意也心官之真宅也主而不遷志也生機之自然而不容已者欲也欲而縱過也甚焉惡也而其無過不及者理也其理則謂之性謂之命謂之天也其著於欲者謂之情交而不可窮也其負情而出充周而不窮者才也或相十百氣與質也而其為虛而靈者萬古一日也效靈於氣者神也效靈於質者鬼也又合言之來而伸者神也往而屈者鬼也心主神其為是乎子曰鬼神之為德其盛矣乎此夫子統言心也而言豈一端已乎約言之則曰心之官則思也故善求心者莫先於識官官在則理明氣治而神乃尊自心學不明學者往往以想為思因以念為意及其變也以欲拒理以情偶性以性偶心以氣質之性分義理之性而方寸為之四裂審如是則心亦出入諸緣之幻物而已烏乎神物以相物烏乎人烏乎人原心告子曰性無善無不善也此言似之而非也夫性無性也况可以善惡言自學術不明戰國諸人始紛紛言性立一説復矯一説宜有當時三者之論故孟子不得已而標一善字以明宗後之人猶或不能無疑也於是又導而為荀楊韓下至宋儒之説益支然則性果無性乎夫性因心而名者也盈天地間一性也而在人則專以心言性者心之性也心之所同然者理也生而有此理之為性非性為心之理也如謂心但一物而已得性之理以貯之而後靈則心之與性斷然不能為一物矣盈天地間一氣而已矣氣聚而有形形載而有質質具而有體體列而有官官呈而性著焉於是有仁義禮智之名仁非他也即惻隱之心是義非他也即羞惡之心是禮非他也即辭讓之心是智非他也即是非之心是也是孟子明以心言性也而後之人必曰心是心性是性一之不可二之不得又展轉和會之不得無乃遁已乎至中庸則直以喜怒哀樂逗出中和之名言天命之性即此而在也此非有異指也惻隱之心喜之變也羞惡之心怒之變也辭讓之心樂之變也是非之心哀之變也是子思子又明以心之氣言性也子曰性相近也此其所本也而後之人必曰理自理氣自氣一之不可二之不得又展轉和會之不得無乃遁已乎嗚呼此性學之所以晦也然則尊心而賤性可乎夫心囿於形者也形而上者謂之道形而下者謂之器也上與下一體兩分而性若踞於形骸之表則已分有常尊矣故將自其分者而觀之燦然四端物物一太極又將自其合者而觀之渾然一理統體一太極此性之所以為上而心其形之者與即形而觀無不上也離心而觀上在何處懸想而已我故曰告子不知性以其外心也先儒之言曰孟子以後道不明只是性不明又曰明此性行此性夫性何物也而可以明之只恐明得盡時却已不是性矣為此説者皆外心言性者也外心言性非徒病在性并病在心心與性兩病而吾道始為天下裂子貢曰夫子之言性與天道不可得而聞也則謂之性本無性焉亦可雖然吾固將以存性也原性極天下之尊而無以尚享天下之潔淨精微純粹至善而一物莫之或攖者其惟人心乎向也委其道而去之歸之曰性人乃眩騖於性之説而倀倀以從事焉至畢世而不可遇終坐此不解之惑以死可不謂之大哀乎自良知之説倡而人皆知此心此理之可貴約言之曰天下無心外之理舉數千年以來晦昧之本心一朝而恢復之可謂取日虞淵洗光咸池然於性猶未辨也豫請一言以進之曰天下無心外之性惟天下無心外之性所以天下無心外之理也惟天下無心外之理所以天下無心外之學也而千古傳心之統可歸於一於是天下有還心之人矣向之妄意以為性者元來即此心是而其認定以為心者非心也氣血之屬也向也以氣血為心幾至仇視其心而不可邇今也以性為性又以非心者分之為氣血之屬而心之體乃見其至尊而無以尚且如是之潔淨精微純粹至善而一物莫之或攖也惟其至尊而無以尚故天高地下萬物散殊惟心之所位置而已矣惟其潔淨精微純粹至善而一物莫之或攖故大人與天地合德日月合明四時合序鬼神合吉凶惟心之所統體而已矣此良知之蘊也然而不能不囿於氣血之中而其為幾希之呈露有時而虧欠焉或相十百或相千萬或相倍蓰而無算不能致其知者也是以君子貴學也學維何亦曰與心以權而反之知則氣血不足治也於是順致之以治情而其為感應酬酢之交可得而順也於是逆致之以治欲而其為天人負勝之幾可得而決也於是精致之以治識而其為耳目見聞之地可得而清也於是雜致之以治形治器而其為吉凶修悖之途可得而凖也凡此皆氣血之屬而吾既事事有以治之則氣血皆化為性矣性化而知之良乃致心愈尊此學之所以為至也與孟子曰人之所不學而能者其良能也所不慮而知者其良知也古人全舉之而陽明子專舉之也原學證學雜解天命流行物與旡妄此所謂人生而靜以上不容説也此處并難著誠字或妄焉亦不容説妄者真之似者也古人惡似而非似者非之微者也道心惟微妄即依焉依真而立即托真而行官骸性命之地猶是人也而生意有弗貫焉者是人非人之間不可方物強名之曰妄有妄心斯有妄形因有妄解識妄名理妄言説妄事功以此造成妄世界一切妄也則亦謂之妄人已矣妄者亡也故曰罔之生也幸而免一生一死真妄乃見是故君子欲辨之早也一念未起之先生死關頭最為喫緊於此合下清楚則一真既立羣妄皆消即妄求真無妄非真以心還心以聰明還耳目以恭重還四體以道德性命還其固然以上天下地往古來今還宇宙而吾乃儼然人還其人自此一了百當日用間更有何事通身仍得個靜氣而已人心自妄根受病以來自微而著益增泄漏遂受之以欺欺與慊對言虧欠也大學首嚴自欺自欺猶云虧心心體本自圓滿忽有物以攖之便覺有虧欠處自欺之病如寸隙當堤江河可決故君子慎獨之功只向本心呈露時隨處體認去便得全體熒然與天地合德何慊如之慊則誠間居之小人掩不善而著善亦儘見苦心雖敗缺盡彰自供已確誠則從此便誠偽則從此滋偽凜乎凜乎復云不逺何祗於悔自欺受病已是出人入獸關頭更不加慎獨之功轉入人偽自此即見君子亦不復有厭然情狀一味挾智任術色取仁而行違心體至此百碎進之則為鄉原似忠信似亷潔欺天罔人無所不至猶宴然自以為是全不識人間有亷恥事充其類為王莽之謙恭馮道之亷謹弒父與君皆繇此出故欺與偽雖相去不逺而罪狀有淺深不可一律論近世士大夫受病皆坐一偽字後人呼之曰假道學求其止犯欺者已是好根器不可多得劉器之學立誠自不妄語始至七年乃成然則從前語亦妄不語亦妄即七年以後猶有不可問者不觀程伯子喜獵之説乎自非妄根一路火盡煙消安能并却喉子默默地不動一塵至於不得已而有言如洪鐘有扣大鳴小鳴適還本分此中仍是不出來也如同是一語多溢一字輕一字都是妄故云戲言出於思七年之功談何容易不妄語方不妄動凡口中道不出者足下自移不去故君子之學置力全是躬行而操心則在謹言上戒欺求慊之功於斯為要易曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎嗚呼善不善之辨微矣哉心者凡聖之合也而終不能無真妄之殊則或存或亡之辨耳存則聖亡則狂故曰克念作聖妄念作狂後儒喜言心學每深求一步遂有識心之説又曰人須自識其真心或駁之曰心能自識誰為識之者余謂心自能識而真處不易識真妄雜揉處尤不易識正須操而存之耳所云存久自明是也若存外求識當其識時而心已亡矣故識不待求反之即是孟子曰雖存乎人者豈無仁義之心哉人自放之耳乃夫子則曰操則存舍則亡出入無時莫知其鄉須知此心原自存操則存又何曾加存得些子存無可存故曰出入無時莫知其鄉至此方見此心之不易存所以孟子又言養心知存養之説者可與識心矣良心之放也亦既知所以求之矣初求之事物之交而得營搆心其為營與搆日不知凡幾繼求之應感之際而得緣著心其為緣與著日不知凡幾又求之念慮之隱而得起滅心其為起與滅日不知凡幾又進求之靈覺之地而得通塞心其通與塞日不知凡幾又求之虛空之元漠而得欣厭心欣與厭又日不知凡幾以是五者徴心了不可得吾將縱求之天地萬物而得心體焉其惟天理二字乎天理何理歸之日用日用何用歸之自然吾安得操功自然者而與之語心學也哉甚矣事心之難也間嘗求之一覺之頃而得湛然之道心焉然未可為據也俄而恍忽焉俄而紛紜焉俄而雜揉焉向之湛然覺者有時而迷矣請以覺覺之於是有喚醒法朱子所謂略綽提撕是也然已不勝其勞矣必也求之本覺乎本覺之覺無所緣而覺無所起而自覺要之不離獨位者近是故曰暗然而日章暗則通微通微則達性性則誠誠則真真則常故君子慎獨繇知覺有心之名心本不諱言覺但一忌莽蕩一忌籠統籠統則無體莽蕩則無用斯二者皆求覺於覺而未嘗好學以誠之容有或失之似者仍歸之不覺而已學以明禮而去其蔽則體物不遺物各付物物物得所有何二者之病故曰好智不好學其蔽也賊古人只言個學字又與思互言又與問並言又兼辨與行則曰五者廢其一非學也學者如此下工夫儘見精實徹內徹外無一毫滲漏陽明子云學便是行未有學而不行者如學書必須把筆伸紙學射必須操弓挾矢篤行之只是行之不已耳且知五者總是一個工夫然所謂學書學射亦不是恁地便了書云學於古訓乃有獲又曰學古入官故學必以古為程以前言往行為則而後求之在我則信諸心者斯篤乃臻覺地焉世未有懸空求覺之學凡言覺者皆是覺斯理學焉而不覺則問問焉而不覺則思思焉而不覺則辨辨焉而不覺則行凡以求覺斯理也形而下者謂之氣形而上者謂之性故曰性即氣氣即性人性上不可添一物學者姑就形下處討個主宰則形上之理即此而在孟夫子特鄭重言之曰善養浩然之氣是也然其工夫實從知言來知言知之至者也知至則心有所主而志常足以帥氣故道義配焉今之為暴氣者種種蹶趨之狀還中於心為妄念為朋思為任情為多欲總緣神明無主如御馬者失其銜轡馳驟四出非馬之罪也御馬者之罪也天道即積氣耳而樞紐之地乃在北辰故其運為一元之妙五行順布無愆陽伏陰以干之向微天樞不動者以為之主則滿虛空只是一團遊氣頃刻而散豈不人消物盡今學者動為暴氣所中苦無法以治之幾欲縳束其心一切歸之斷滅殊不知暴氣亦浩然之氣所化只爭有主無主間今若提起主人翁一一還他調理調理處便是義凡過處是助不及處是亡亡助兩捐一操一縱適當其宜義於我出萬理無不歸根生氣滿腔流露何不浩然夫浩然仍只是澄然湛然此中元不動些子是以謂之氣即性即此是盡性工夫更無餘事程子曰人無所謂惡者只有過不及此知道之言也中庸言喜怒哀樂之未發謂之中即此是天命之性故謂天下之大本才有過不及則偏至之氣獨陽不生獨陰不成性種遂已斷滅如喜之過便是淫又進之以樂而益淫淫之流為貪財為好色貪財好色不已又有無所不至者而天下之大惡歸焉怒之過便是傷又進之以哀而益傷傷之流為賊人為害物賊人害物不已又有無所不至者而天下之大惡歸焉周子曰性者剛柔善惡中而已矣兼以惡言始乎善常卒乎惡也易其惡而至於善歸之中焉則已矣如財色兩關是學人最峻絶處於此跌足更無進步可言然使一向在財色上止截反有不勝其扞格者以其未嘗非性也即使斷然止截得住才絶得淫心已中乖戾心便是傷學者誠欲拔去病根只教此心有主使一元生意周流而不息則偏至之氣自然消融隨其所感而順應之凡為人心之所有總是天理流行如此則一病除百病除除却貪財心便除却好色心除却貪財好色心便除却賊人害物心除其心而事自隨之即是不頓除已有日消日減之勢此是學者入細工夫非平日戒慎恐懼之極時時見吾未發之中者不足以語此然則為善去惡之説非乎孟子曰人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也子思子從喜怒哀樂之中和指點天命之性而率性之道即在其中分明天地一元流行氣象所謂不識不知順帝之則全不涉人分上此言性第一義也至孟子因當時言性紛紛不得不以善字標宗旨單向心地覺處指點出粹然至善之理曰惻隱羞惡辭讓是非全是人道邊事最有功於學者雖四者之心未始非喜怒哀樂所化然已落面目一班直指之為仁義禮智名色去人生而靜之體逺矣學者從孟子之教盡其心以知性而知天庶於未發時氣象少有承當今乃謂喜怒哀樂為粗幾而必求之義禮之性豈知性者乎孟子言養心又言養性又言養氣至程子又言養知又每謂學者曰且更涵養養之時義大矣哉故曰茍得其養無物不長茍失其養無物不消涵養之功只在日用動靜語默衣食之間就一動一靜一語一默一衣一飲理會則謂之養心就時動時靜時語時默時衣時飲理會則曰養氣就即動即靜即語即默即衣即飲理會則曰養性就知動知靜知語知默知衣知飲理會則曰養知其實一也就其中分個真與罔去其不善而之於善即是㗂察之説進學有程乎曰未事於學茫乎如泛海之舟不辨南北已事於學而涯涘見焉始學之汩汩流俗之中恍若有見焉得道之大端也以聖人為必可學而至也此立志之説也語曰志立而學半君子早已要厥終矣第慮其鋭而易挫也乃進而言所守擇地而蹈無尺寸或踰也守經而行無往來或叛也即有語之以圓通徑捷之説可一日而至千里弗屑也學至此有成行也乃進而程所安即事而理存外不膠於應也即心而理得內不執於解也以推之天地萬物無不凍解於春融而睫得於指掌也學至此有真悟也乃進而程所至優焉遊焉弗勞以擾也厭焉飫焉弗艱以苦也瞬存而息養人盡而天隨日有孶孶不知年嵗之不足也庶幾滿吾初志焉則學之成也流水之為物也盈科而後進折而愈東必放之海有本者如是立志要矣乎天地之大德曰生聖人而仁者曰壽然有生必有死仍是天地間生生不已之運即天地亦在囿而况於人乎人將此身放在天地間果能大小一例看則一身之成毁何啻草木之榮枯昆蟲之起蟄已乎而人每不勝自私之為見將生死二字看作極大却反其道而言之曰無生蓋曰以無生為生而後能以無死為死是謂空體不壞是謂常住真心然究竟去住不能自繇成毁依然任運徒作此可憐想且死則死耳却欲預先守住精魂使死後有知生則生耳又追數胞胎前事向無是公討來歷豈不擔誤一生未知生焉知死朝聞道夕死可矣聖人都教人在生處理會並未嘗㨮攬前後際而後人曲加附會以自伸其生死之説枉矣嗚呼豈徒知生而已乎生生焉可也吾學亦何為也哉天之生斯民也使先知覺後知使先覺覺後覺彼天民而先覺者其自任之重固已如此矣生斯世也為斯民也請學之為後覺也以覺先覺之所覺曰堯舜之道堯舜之心為之也堯舜之心即吾人之心同此心同此覺也吾亦覺其同者而已矣凡夫而立地聖域一時而逺契千秋同故也今之言覺者或異焉理不必分真妄而全遁於空事不必設取舍而冥求其照至曰空生大覺如海發漚安往而不異所惡於智者為其鑿也又曰學者之病莫大乎自私而用智今之言覺者鑿焉而已矣人之生也飢食而渴飲夏葛而冬裘夫人而知之也而其為飢渴寒暑之道又夫人而覺之也其有不知者非愚不肖之不及則賢智之過者也而過之害道彌甚彼以為道不在是也去飲衣而求口體之正去口體而求性命之常則亦豈有覺地乎嗟乎人心之晦也我思先覺其人者曰孔氏孔氏之言道也約其旨曰中庸人乃知隱怪者之非道而庸德之行一時弒父與君之禍息則吾道之一大覺也歷春秋而戰國楊墨橫議孟子起而言孔子之道以勝之約其旨曰性善人乃知惡者之非性而仁昭義立君父之倫益尊於天壤則吾道之一大覺也然自此言性者人置一喙而天下皆淫於名理遂有明心見性之説夫性可得而見乎又千餘載濓溪乃倡無極之説其大旨見於通書曰誠者聖人之本可謂重下注腳則吾道之一覺也嗣後便辨説日繁支離轉甚浸流而為詞章訓詁於是陽明子起而救之以良知一時喚醒沈迷如長夜之旦則吾道之又一覺也今天下爭言良知矣及其弊也猖狂者參之以情識而一是皆良超潔者蕩之以元虛而夷良於賊亦用知者之過也夫陽明之良知本以救晚近之支離姑借大學使大學之旨晦又借以通佛氏之元覺使陽明之旨復晦又何怪其説愈詳而言愈龎卒無以救詞章訓詁之錮習而反之正乎時節因緣司世教者又起而言誠意之學直以大學還大學耳爭之者曰意稗種也余曰嘉穀又曰意萌芽也余曰根荄是故知本所以知至也知至所以知止也知止之謂致良知則陽明之本旨也今之賊道者非不知之患而不致之患不失之情識則失之元虛皆坐不誠之病而求於意根者疏也故學以誠意為極則而不慮之良於此起照後覺之任其在斯乎孟子云我亦欲正人心辟邪説距陂行放淫詞以承三聖又曰能言拒楊墨者聖人之徒也余蓋有志焉而未之逮也諸説朱夫子答梁文叔書曰近看孟子道性善稱堯舜此是第一義若於此看得透信得及直下便是聖賢便無一毫人欲之私做得病痛若信不及孟子又説過第二節工夫又只引成覸顔淵公明儀三段説話教人如此發憤勇猛向前日用之間不得存留一毫人欲之私在這裡此外更無别法此朱子晚年見道語也學者須占定第一義做工夫方是有本領學問此後自然歇手不得如人行路起腳便是長安道不患不到京師然性善堯舜人人具有學者何故一向看不透信不及正為一點靈光都放在人欲之私上直是十分看透遂將本來面目盡成埋沒驟而語之以堯舜不覺驚天動地却從何處下手來學者只是克去人欲之私欲克去人欲之私且就靈光初放處討分曉果認得是人欲之私便即是克了陽明先生致良知三字正要此處用也孟子他日又説個道二仁與不仁不為堯舜則為桀紂中間更無一髮可容混處者學者上之不敢為堯舜下之不屑為桀紂却於兩下中擇個中庸自便之途以為至當豈知此身早已落桀紂一途矣故曰紂之不善不如是之甚也學者惟有中立病難醫凡一切悠悠忽忽不激不昻漫無長進者皆是看來全是一團人欲之私自封自固牢不可破今既捉住病根在便合信手下藥學者從成覸顔淵公明儀説話激發不起且急推向桀紂一路上果能自供自認否若供認時便瞑眩時若藥不瞑眩厥疾不瘳正為此等人説法倘下之茍不為桀紂上又安得不為堯舜第一義説程子曰心要在腔子裏此本孟子求放心而言然則人心果時放外耶即放外果在何處因讀孟子上文云仁人心也乃知心有不仁時便是放所謂曠安宅而不居也故陽明先生曰程子所謂腔子亦即是天理至哉言乎程子又曰吾學雖有所授然天理二字却自家體認出來夫既從自家體認而出則非由名相湊泊可知凡仁與義皆天理之名相而不可即以名相為天理謂其不屬自家故也試問學者何處是自家一路須切已反觀推究到至隱至微處方有著落此中無一切名相亦并無聲臭可窺只是箇維元維默而已雖維元維默而實無一物不體備其中所謂天也故理曰天理才著人分便落他家一屬他家便無歸宿仔細檢點或以思維放或以卜度放或以安排放或以智故放或以虛空放只此心動於中便是放所放甚微而人欲從此而橫流其究甚大蓋此心既離自家便有無所不至者心齋云凡有所向有所見皆是妄既無所向又無所見便是無極而太極無極而太極即自家真底蘊處學者只向自家尋底蘊常做個體認工夫放亦只放在這裡求亦只求在這裡豈不至易豈不至簡故求放心三字是學人單提口訣下士得之為入道之門上根得之即達天之路求放心説人生終日擾擾也一著歸根復命處乃在向晦時即天地萬物不外此理於此可悟學問宗旨只是主靜也此處工夫最難下手姑為學者設方便法且教之靜坐日用之間除應事接物外茍有餘刻且靜坐坐間本無一切事即以無事付之即無一切事亦無一切心無心之心正是本心瞥起則放下沾滯則掃除只與之常惺惺可也此時伎倆不合眼不掩耳不跌跏不數息不參話頭只在尋常日用中有時倦則起有時感則應行住坐卧都作坐觀食息起居都作靜會昔人所謂勿忘勿助間未嘗致纖毫之力此其真消息也故程子每見人靜坐便歎其善學善學云者只此是求放心親切工夫從此入門却從此究竟非徒小小方便而已會得時立地聖域不會得時終身只是狂馳了更無别法可入不會靜坐且學坐而已學坐不成更論恁學坐如尸坐時習學者且從整齊嚴肅入漸進於自然詩云相在爾室尚不愧於屋漏又曰神之格思不可度思矧可射思靜坐説學者靜中既得力又有一段讀書之功自然遇事能應若靜中不得力所讀之書又只是章句而已則且教之就事上磨練去自尋常衣食以外感應酬酢莫非事也其間千變萬化不可端倪而一一取裁於心如權度之待物然權度雖在我而輕重長短之形仍聽之於物我無與焉所以情順萬事而無情也故事無大小皆有理存劈頭判個是與非見得是處斷然如此雖鬼神不避見得非處斷然不如此雖千駟萬鍾不回又於其中條分縷析銖銖兩兩辨箇是中之非非中之是似是之非似非之是從此下手沛然不疑所行動有成績又凡事有先著當圖難於易為大於細有要著一著勝人千萬著失此不著滿盤敗局又有先後著如低棋以後著為先著多是見小欲速之病又有了著恐事至八九分便放手終成決裂也蓋見得是非後人當計成敗如此方是有用學問世有學人居恆談道理井井才與言世務便疏試之以事或一籌莫展這疏與拙正是此心受病處非關才具諺云經一跌長一識且須熟察此心受病之原果在何處因痛與之克治去從此再不犯跌庶有長進學者遇事不能應只有練心法更無練事法練心之法大要只是胸中無一事而已無一事乃能事事便是主靜工夫得力處又曰多事不如少事省事不如無事應事説應事接物相為表裏學者於天下不能遺一事便於天下不能遺一人自落地一聲此身已屬之父母及其稍長便有兄弟與之比肩長而有室又有妻子與之室家至於食毛踐土君臣之義無所不在惟朋友聯合於稠人廣衆之中似屬疏濶而人生實賴以有覺合之稱五倫人道之經綸管於此也然父子其本也人能孝於親未有不忠於事君與友於兄弟者信於朋友者宜於室家者夫妻一倫尤屬化原古來大聖大賢又多從此處發軔來故曰刑於寡妻至於兄弟以御於家邦蓋居室之間其事最微渺而易忽其惡為淫僻學者從此關打破便是真道德真性命真學問文章不然只是偽也自有五倫而舉天下之人皆經緯聯絡其中一盡一切盡一虧一切虧第一要時時體認出天地萬物一體氣象即遇惡人之見橫逆之來果能作如是觀否彼固一體中人耳才有絲毫隔絶便是斷滅性種至於知之之明與處之之當皆一體中自作用非關權術人第欲以術勝之未有不墮其彀中者然此際煞合理會陸象山先生曰除了人情事變無可做工夫要知做工夫處果是何事若不知此事只理會個人情事變仍不是工夫學者知之處人説今為學者下一頂門針即向外馳求四字便做成一生病痛吾儕試以之自反無不悚然汗浹者凡人自有生以後耳濡目染動與一切外物作緣以是營營逐逐將全副精神都用在外其來舊矣學者既有志於道且將從來一切向外精神盡與之反復身來此後方有下手工夫可説須知道不是外物反求即是故曰我欲仁斯仁至矣無奈積習既久如浪子亡家失其歸路即一面回頭一面仍住舊時緣終不知在我為何物又自以為我矣曰吾求之身矣不知其為軀殼也又自以為我矣曰吾求之心矣不知其為口耳也又自以為我矣曰吾求之性與命矣不知其為名物象數也求之於軀殼外矣求之於耳目愈外矣求之於名物象數外之外矣所為向外一路馳求也所向是外無往非外一起居焉外一飲食焉外一動靜語默焉外時而存養焉外時而省察焉外時而遷善改過焉外此又與於不學之甚者也是故讀書則以事科舉仕宦則以肥身家勳業則以望公卿氣節則以激聲譽文章則以諛聽聞何莫而非向外之病乎學者須發真實為我心每日孜孜急急只幹辨在我家當身是吾身非關軀殼心是我心非關口耳性命是我性命非關名物象數正目而視之不可得而見傾耳聽之不可得而聞非惟人不可得而見聞雖我亦不可得而見聞也於此體認親切自起居食息以往無非求在我者及其求之而得天地萬物無非我有絶不是功名富貴氣節文章所謂自得也總之道體本無內外而學者自以所向分內外所向在內愈尋求愈歸宿亦愈發皇故曰君子之道暗然而日章所向在外愈尋求愈決裂亦愈消亡故曰小人之道的然而日亡學者幸早辨諸向外馳求説朱夫子嘗言學者半日靜坐半日讀書如此三五年必有進步可觀今當取以為法然除却靜坐工夫亦無以為讀書地則其實亦非有兩程候也學者誠於靜坐得力時徐取古人書讀之便覺古人真在目前一切引翼提撕匡救之法皆能一一得之於我而其為讀書之益有不可勝言者矣昔賢詩云萬徑千蹊吾道害四書六籍聖賢心學者欲窺聖賢之心尊吾道之正舍四書六籍無由而入矣蓋聖賢之心即吾心也善讀書者第求之吾心而已矣舍吾心而求聖賢之心即千言萬語無有是處陽明先生不喜人讀書令學者直證本心正為不善讀書者舍吾心而求聖賢之心一似沿門持鉢無益貧兒非謂讀書果可廢也先生又謂博學只是學此理審問只是問此理慎思只是思此理明辨只是辨此理篤行只是行此理而曰心即理也若是乎此心此理之難明而必假途於學問思辨則又將何以學之問之思之辨之而且行之乎曰古人詔我矣讀書一事非其導師乎即世有不善讀書者舍吾心而求聖賢之心一似沿門持鉢而有得也亦何惜不為貧兒昔人云士大夫三日不讀書即覺面目可憎語言無味彼求之聞見者猶然况有進於此者乎惟為舉業而讀書不免病道然有志之士卒不能舍此以用世何可廢也吾更惡夫業舉子而不讀書者讀書説聖賢教人只指點上一截事而不及下截觀中庸一書可見蓋提起上截則其下者不勞而自理才説下截事如堂下人斷曲直莫適為主誰其信之形而上者謂之道形而下者為之器是也人生而有此形骸便有此氣質就中一點真性命是形而上者惟形上不離形下所以上下易混作一塊學者開口説變化氣質却從何處討主腦來通書曰性者剛柔善惡中而已矣中便是變化氣質之方而中庸曰喜怒哀樂未發謂之中却又無可著力處從無可著力處用得工夫正是性體流露時此時剛柔善惡果立在何處少間便是個中節之和這方是變化氣質工夫若已落在剛柔善惡上欲自剛而克柔自柔而克剛自惡而之於善已善而終不之於惡便落堂下人伎倆矣或問孟子説善養浩然之氣如何曰才提起浩然之氣便屬性命邊事若孟施舍北宫黝告子之徒只是養個蠢然之氣正是氣質用事處所以與孟子差别氣質説或有言學問之功在慎所習者豫曰何謂也曰人生而有習矣一語言焉習一嗜欲焉習一起居焉習一酬酢焉習有習境因有習聞有習聞因有習見有習見因有習心有習心因有習性故曰少成若性并其性而為習焉習可不慎乎習於善則善習於惡則惡猶生長於齊楚不能不齊楚也習可不慎乎曰審如是又誰為專習之權者而慎之其人不能答豫曰在復性不在慎習或曰何謂也豫乃告之曰人生而靜天之性也渾然至善者也感於物而動乃遷於習焉習於善則善習於惡則惡斯日逺於性矣無論習於惡者非性即習於善者亦豈性善之善乎故曰性相近也習相逺也蓋教人尊性也然學以復性也如之何曰性不假復也復性者復其權而已矣請即以習證習於善則善未有不知其為善者習於惡則惡未有不知其為惡者此知善而知惡者誰乎此性權也故易曰復以自知既已知其為善矣且得不為善乎既已知其為惡矣且得不去惡乎知其為善而為之為之也必盡則亦無善可習矣無善可習反之吾性之初本無善可習也知其為惡而去之去之也必盡則亦無惡可習矣無惡可習反之吾性之初本無惡可習也此之謂渾然至善依然人生之初而復性之能事畢矣然則習亦可廢乎曰何可廢也為之語言以習之則知其語言以慎之為之嗜欲以習之則知其嗜欲以慎之為之起居以習之則知其起居以慎之為之酬酢以習之則知其酬酢以慎之如是則即習即性矣凡境即是性境凡聞即是性聞凡見即是性見無心非性無性非習大抵不離獨知者近是知之為言也獨而無偶先天下而立定一尊而後起者稟焉是之謂性權或者恍然而解曰吾乃知慎習之功其在必慎其獨乎首肯之而去習説一此上九篇乃時作自聖學不明學者每從形器起見看得一身生死事極大將天地萬物都置之膜外此心生生之機早已斷滅種子了故其工夫顓究到無生一路只留個覺性不壞再做後來人依舊只是貪生怕死而已吾儒之學直從天地萬物一體處看出大身子天地萬物之始即吾之始天地萬物之終即吾之終終終始始無有窮盡只此是生死之説原來生死只是尋常事程伯子曰人將此身放在天地間大小一例看是甚快活豫謂生死之説正當放在天地間大小一例看也於此有知方是窮理盡性至命之學藉令區區執百年之內之生死而知之則知生之盡只是知個貪生之生知死之盡只是知個怕死之死而已然則百年生死不必知乎曰奚而不知也子曰朝聞道夕死可矣是也如何是聞道其要只在破除生死心此正不必逺求百年即一念之間一起一滅無非生死心造孽既無起滅自無生死又曰盡語默之道則可以盡去就之道盡去就之道則可以盡生死之道生死非大語默去就非小學者時時有生死關頭難過從此理會透天地萬物便是這裡方是聞道生死説獨之外别無本體慎獨之外别無工夫此所以為中庸之道也乃虞廷言心則曰人曰道而中庸直指率性之道無乃混人道而一之乎此言心言性之别也虞廷言心非分言之則不精不精無以為至一之地中庸言性性一而已何岐之有然性是一則心不得獨二夫天命之所在即人心之所在人心之所在即道心之所在此虞廷未發之旨也或曰有氣質之性有義理之性則性亦有二與為之説者本之人心道心而誤焉者也程子曰論性不論氣不備論氣不論性不明二之則不是若既有氣質之性又有義理之性將使學者任氣質而遺義理則可以為善可以為不善之説信矣又或遺氣質而求義理則無善無不善之説信矣又或衡氣質義理而並重則有性善有性不善之説信矣三者之説信而性善之旨復晦此孟氏之所憂也須知性只是氣質之性而義理者氣質之本然乃所以為性也性則是人心而道者人之所當然乃所以為心也人心道心只是一心氣質義理只是一性識得心一性一則工夫亦一靜存之外更無動察主敬之外更無窮理其究也工夫與本體亦一此慎獨之説也而後之解者往往失之昔周元公著太極圖説實本之中庸至主靜立人極一語尤為慎獨兩字傳神其後龜山門下一派羅李二先生相傳口訣專教人看喜怒哀樂未發時作何氣象朱子親授業於延平固嘗聞此而程子則以靜字稍偏不若專主於敬又以敬字未盡益之於窮理之説而曰涵養須用敬進學在致知朱子從而信之初學為之少變遂以之解大中謂慎獨之外另有窮理工夫以合於格致誠正之説仍以慎獨為動屬省察邊事前此另有一項靜存工夫近日陽明先生始目之為支離專提致良知三字為教法而曰良知只是獨之時又曰惟精是惟一工夫博文是約禮工夫致知是誠意工夫明善是誠身工夫可謂心學獨窺一源至他日答門人慎獨是致知工夫而以中庸本體無可著力此却疑是權教天下未有大本之不力而可為事於道生者工夫用到無可著力處方是真工夫故曰勿忘勿助未嘗致纖毫之力此非真用力於獨體者固不足以知之也大抵諸儒之見或同或異多係轉相偏矯因病立方盡是權教至於反身力踐之間未嘗不同歸一路不謬於慎獨之旨後之學者無從向語言文字生葛藤但反求之吾心果何處是根本一著從此得手方窺進步有欲罷不能者學不知本即動言本體終無著落學者但知即物窮理為支離而不知同一心耳舍淵淵靜深之地而從事思慮紛起之後泛應曲當之間正是尋枝摘葉之小者其為支離之病亦一而已將持此為學又何成乎又何成乎天命章説天命流行物與無妄人得之以為心是謂本心人心無一妄而已忽焉有妄希乎微乎其不得而端倪乎是謂微過獨主之有微過是以有隱過七情主之有隱過是以有顯過九容主之有顯過是以有大過五倫主之有大過是以有叢過百行主之總之妄也譬之木自本而根而幹而標水自源而及於流盈科而至於海故曰涓涓不息將成江河綿綿不絶將尋斧柯是以君子貴防之早也其惟慎獨乎慎獨則時時知改俄而授之隱過矣當念過便從當念改又授之顯過矣當身過便從當身改又授之大過矣當境過當境改又授之叢過矣隨事過隨事改改之則復於無過可喜也不改成過且得無改乎總之皆袪妄還真之學而工夫次第如此譬之擒賊者擒之於室甚善不於室而於堂不於堂而於外門於衢於境上必成擒而後已子絶四毋意毋必毋固毋我真能慎獨者也其次則克伐怨欲不行焉爾宋人之言曰獨行不愧影獨寢不愧衾獨而顯矣司馬溫公則云某平生無甚過人處但無一事不可對人言者庶幾免於大過乎若邢恕之一日三檢點則叢過對治法也真能慎獨者無之非獨即邢恕學問孔子亦用得著故曰不為酒困不然自原憲而下總是個間居小人為不善而已善學者須是學孔子之學只於意根上止截一下便千了百當總當必固我已漸成決裂幸於我處止截得猶不失為顔子克已過此無可商量矣落一格粗一格工夫轉愈難一格故曰可為難矣學者須是學孔子之易改過説下條同人之言曰有心為惡無心為過則過容有不及知者因有不及改過是大不然夫心不愛過者也才有一點過便屬礙膺之物必一決之而後快故人未有有過而不自知者則不肯自認為知爾然則過又安從生曰即不肯自認為知處其受蔽處良多以此造過遂多仍坐過不知而已孟子言君子之過如日月之食可見人心只是一團靈明而不能不受暗於過明處是心暗處是過明中有暗暗中有明明中之暗即是過暗中之明即是改手勢如此親切但常人之心忽明忽暗展轉出沒終不能還得明明之體不歸薄蝕何疑君子則以暗中之明用箇致曲工夫漸以與他恢擴去在論語則曰訟過如兩造當庭抵死仇對不至十分明白不已才明白便無事如一事有過直勘到事前之心果是如何一念有過直勘到念後之事更當如何如此反覆推勘更無躲閃雖一塵亦駐足不得此所謂致曲工夫也大易則言補過謂此心一經缺陷便立刻與之圓滿那靈明爾若只是小小補綴頭痛救頭腳痛救腳敗缺難掩而彌縫日甚謂之文過而已雖然人猶有有過而不自知者子路人告之以有過則喜子曰丘也幸茍有過人必知之然則學者虛心遜志時務察言觀色以輔所不逮有不容緩者陽明子言良知最有功於後學然只傳孟子教法於大學之説終有分合古本序曰大學之道誠意而已矣止至善之則致良知而已矣宛轉説來頗傷氣脈至龍溪所傳天泉問答則曰無善無惡者心之體有善有惡者意之動知善知惡是良知為善去惡是格物益增割裂矣即所云良知亦非究竟義也知善知惡與知愛知敬相似而實不同知愛知敬知在愛敬之中知善知惡知在善惡之外知在愛敬中更無不愛不敬者以參之是以謂之良知知在善惡外第取分别見謂之良知所發則可而已落第二義矣且所謂知善知惡蓋從有善有惡而言者也因有善有惡而後知善知惡是知為意奴也良在何處又反無善無惡而言者也本無善無惡而又知善知惡是知為心祟也良在何處且大學所謂致知亦只是致其知止之知知止之知即知先之知知先之知即是知本之知惟其知止知先知本也則謂之良知亦得知在止中良因止見故言知止則不必更言良知若曰以良知之知知止又以良知之知知先而知本豈不架屋疊牀之甚乎且大學明言止於至善矣則惡又從何處來心意知物總是至善中全副家當而必事事以善惡兩紏之若曰去其惡而善乃至姑為下根人設法如此則又不當有無善無惡之説矣有則一齊俱有既以惡而疑善無則一齊俱無且將以善而疑惡更從何處討知善知惡之分曉止因陽明將意字認壞故不得不進而求良於知仍將知字認粗又不得不退而求精於心種種矛盾固已不待龍溪駁正而知其非大學之本旨矣大學開口言明德因明起照良知自不待言而又曰良知即至善即未發之中亦既恍然有見於知之消息惜轉多此良字耳然則良知何知乎知愛敬而已矣知皆擴而充之達之天下而已矣格此之謂格物誠此之謂誠意正此之謂正心舉而措之謂之平天下陽明曰致知焉盡之矣余亦曰致知焉盡之矣良知説讀易圖説圖中有一點變化無窮子曰易有太極周子曰無極而太極淪於無矣解無極者曰無形有理益滯於無無矣今請為太極起廢而表是圖其為象曰有則未必周子之旨也抑亦孔門之説歟雖然滯於有矣夫圖其似之者也佛氏亦有此圖然其中一點仍作空解意實不同天有四時春夏為陽秋冬為陰中氣行焉地有四方南北為經東西為緯中央建焉人有四氣喜怒哀樂中和出焉其德則謂之仁義禮智信是也是故元亨利貞即春夏秋冬之表義非元亨利貞生春夏秋冬也左右前後即東西南北之表義非左右前後生東西南北也仁義禮智即喜怒哀樂之表義非仁義禮智生喜怒哀樂也又非仁義禮智為性喜怒哀樂為情也又非未發為性已發為情也後儒之言曰理生氣性生情又曰心統性情其然豈其然乎造化之理新新故故相推而不窮如草木之榮枯昆蟲之起蟄日月之晦明四時之盛衰氣運之往來陵谷之遷徙莫不皆然人囿於大化之中與萬物同體自一日以往自少而壯而老而死無不變也有之其惟積氣積習乎油入於麵不可復出此其不變者也孰知去滋逺反常滋甚乎君子仰觀於天而得先天之易也維天之命於穆不已蓋曰天之所以為天也是故君子戒懼於所不暏聞此慎獨之説也至哉獨乎微乎微乎穆穆乎不已者乎蓋曰心之所以為心也則心一天也獨體不息之中而一元常運喜怒哀樂四氣周流存此之謂中發此之謂和陰陽之象也四氣一陰陽也陰陽一獨也其為物不二則其生物不測也故其中為天下之大本而和為天下之達道及其至也察乎天地至隱至微至顯至見也故曰體用一原顯微無間君子所以必慎其獨也此性宗也君子俯察於地而得後天之易焉夫性本天者也心本人者也天非人不盡性非心不體也心也者覺而已矣覺故能照照心常寂而常感感之以可喜而喜感之以可怒而怒其大端也喜之變為欲為愛怒之變為惡為哀為懼則立於四者之中喜得之而不至於淫怒得之而不至於傷者合而觀之即人心之七政也七者皆照心所發也發則馳矣衆人溺焉惟君子時發而時止時返其照心而不逐於感得易之逆數焉此之謂後天而奉天時蓋慎獨之實功也聖學喫緊三關學莫先於問途則人已辨焉此處不差後來方有進步可觀不然只是終身擾擾而已為已為人只聞達之辨説得大槩已盡後儒又就聞中指出許多病痛往往不離功名富貴四字而蔽之以義利兩言除却利便是義除却功名富貴便是道此中是一是二辨之最微學者合下未開眼孔只為已不足故求助於人豈知愈求助於人愈不足於已乎已上人已關學以為已已以內又有已焉只此方寸之中作得主者是此所謂真已也必也敬乎敬肆關由主敬而入方能覿體承當其要歸於覺地故終言迷悟工夫却從存養中來非懸空揣控索之象罔者也故宋儒往往不喜頓悟之説或曰格物致知大學之始事今已悟為終事何也曰格致工夫自判斷人已一關時已用得著矣然必知止知至以後體之當身一一無礙方謂之了悟悟豈易言乎若僅取當下一點靈明瞥然有見時便謂之悟恐少間已不可復恃已上迷悟關大學雜辨夫大學之所謂主腦者止至善而已矣致知之功格物而已矣格物之要誠正以修身而矣盈天地間皆物也自其分者而觀之天地萬物各一物也自其合者而觀之天地萬物一物也一物本無物也無物者理之不物於物為至善之體而統於吾心者也雖不物於物而不能不顯於物耳得之而成聲目寓之而成色莫非物也則莫非心也耳能辨天下之聲而不可欺以清濁吾因而致焉并不可欺以一切清濁所以致吾心之聰也目能辨天下之色而不可欺以緇素吾因而致焉并不可欺以一切緇素所以致吾心之明也致吾心之聰明者致吾之良知也良知之於物如鑑之於妍􅑦衡之於高下而規矩之於方圓也鑑不離物而定妍􅑦衡不離物而取高下規矩不離物而辨是非一也故曰致知在格物然而致吾心之聰非無不聞之謂也聞吾至善而已矣致吾心之明非無不見之謂也見吾至善而已矣聞吾至善返於無聞矣見吾至善返於無見矣知無知矣中庸曰戒慎乎其所不覩恐懼乎其所不聞不動而敬不言而信其要歸於慎獨此格物真下手處故格物即格其反身之物不離修者是而致知即知其所性之知不離止者是孔門之學無往而不以格致為第一義博文約禮其定本也又曰多聞擇其善者而從之多見而識之知之次也心非內也耳目非外也物非粗也無物之物非精也即心即物非心非物此謂一以貫之自格致之旨晦而聖學淪於多岐滯耳目而言知者徇物者也離耳目而言知者遺物者也徇物者弊之於一草一木亦用却工夫而遺物求心又逃之無善無惡均失也格致君子之學先天下而本之國先國而本之家與身亦屬之已矣又自身而本之心本之意本之知本至此無可推求無可揣控而其為已也隱且微矣隱微之地是名曰獨其為何物乎本無一物之中而物物具焉此至善之所統會也致知在格物格此而已獨者物之本而慎獨者格物之始事也君子之為學也非能藏身而不動杜口而不言絶天下之耳目而不與交也終日言而其所以言者人不得而聞也自聞而已矣終日動而其所以動者人不得而見也自見而已矣自聞自見者自知者也吾求之自焉使此心常止而定靜安慮得慎之至也慎獨也者人以為誠意之功而不知即格致之功也大學之道一言以蔽之曰慎獨而已矣自虞廷執中以來無非此意故伊洛以一為入道之門朱子析之曰涵養須用敬進學則在致知故於大學分格致誠正為兩事至解慎獨又以為動而省察邊事先此更有一段靜存工夫則愈析而愈支矣陽明子反之曰慎獨即是致良知即知即行即動即靜庶幾心學獨窺一源總之獨無動靜也其有時而動靜焉動亦慎靜亦慎也而靜為主使非靜時做得主張則動而馳矣如挽逝波其可及乎動而常知常止焉則常靜矣周子曰主靜立人極是也慎獨天圓地方規矩之至也人心一天地也其體動而圓故資始不窮有天道焉其用靜而方故賦形有定有地道焉君子之學圓效天方法地也其獨知之地不可得而覩聞者效天者也由不覩而之於無所不覩由不聞而之於無所不聞地道之善承天也易曰君子敬以直內義以方外規矩之至也潔矩人心終日如馬足車輪奔馳無止果係何物受纍茍能去所纍心者而於止也幾矣知此之謂知止止此之謂至善問大學要義曰言本體喫緊得個善字言工夫喫緊得個止字言本體工夫一齊俱到處喫緊得知字言本體工夫一齊歸管處喫緊得個身字首章致知者致吾知止之知也收攝到極處即是推致到極處逮止於至善則知至矣至善格物不妨訓窮理只是反躬窮理則知本之意自在其中只是一個良知正須從意根查考心源體認身上檢點家庭印證國與天下推廣這便是格物工夫便是致知工夫朱子云格物須提起第一義便是極至道理如在朝便須進君子退小人決無小人可用之理這便是第一義若見不破便謂小人可用豫謂進君子退小人根吾好惡來其能好能惡是第一義好人惡人是第二義知進退人又是第三四義了知此方是知本知本矩是至善之式所以安頓此心恰好處夫子之不踰矩是也釋矩大學之道誠意而已矣誠意之功慎獨而已矣意也者至善歸宿之地其為物不二故曰獨其為物不二而生物不測所謂物有本末也格物致知總為誠意而設亦總為慎獨而設也非誠意之先又有所謂致知之功也故誠意者大學之專義也前此不必在格物後此不必在於正心也亦大學之了義也後此無正心之功并無修治平之功也後之解誠意者吾惑焉曰意者心之所發則誰為所存乎曰有善有惡者意之動則誰為好之惡之者乎誠意幾者動之微則前此更有靜者幾乎曰非然也動之微則動而無動矣動而無動所以靜而無靜也此心體主宰之妙也故名之曰意同上章句云實其心之所發不知實字代得誠字否又不知是發前求實抑是發後求實若是發前求實則工夫仍在所存時然章句又云皆務決去而求必得之似言凡於意之所發皆務求所以實之則誠之之功已落在意後矣落在意後則必就其事而實之而自欺仍只是自欺其意是看意字尚精而看誠字轉粗也所以轉下慎獨方打入裡面有審幾之説不免就誠意推先一層矣夫既以獨知為獨而以慎獨推先於意誠明是欲誠其意先致其知之注疏既有獨知之致知又有補傳窮理之致知頭緒何所適從乎同上聖學本心維心本天維元維默體乎太虛因所不見是名曰獨獨本無知因物有知物體於知好惡立焉好惡一機藏於至靜感物而動七情著焉自身而家自家而國國而天下慶賞刑威惟所措焉是為心量其大無外故名曰天天命何命即吾獨之一氣流行分陰分陽運為四氣性體乃朕率為五常殊為萬事反乎獨知獨知常之全體俱之本無明暗常止則明紛馳乃暗故曰暗然日章的然日亡君子知之凜乎淵冰於所不覩於所不聞日夕兢兢道念乃凝萬法歸一不盈此知配天塞地盡性至命此知無始是為原始此知無終是為反終死生之説晝夜之常吾生與生吾死與死視彼萬形非吾得私猥云不死狂馳何異獨針論語學案君子學以慎獨真從聲臭外立根基一切言動事為慶賞刑威無不日見於天下而問其所從出之地凝然不動些子只有一個淵然之象為天下立皇極而已衆星晝夜旋轉天樞不動其不動處是天星這便是道心惟微其運旋處便是人心惟危其常運而常靜處便是惟精惟一允執厥中天人之學也為政以德心之官則思思曰睿睿作聖思本無邪其卒流於邪者勿思耳以為思欲無邪非也思無邪者間邪之學也詩以理性情人心之情之正何邪之有詩三百孟武伯問孝是人子身上事父母惟其疾之憂是父母身上事問是孝答是慈有何關涉豈知人子於父其初只是一人之身父母的痛癢便是人子的痛癢若於此漠不相關更有何孝可言若於此認得親切亦更有何孝可言惟疾之憂非徒以慰親之為孝也知乎此者必能以其身為父母之身以其心為父母之心而終身孺慕之情有無所不至者矣孟武伯知則全體皆知不知則全體皆不知更無半明半暗分數但私意蔽錮亦有去來則有時而知有時而不知耳夫既有時而知有時而不知則并其知而非人能知已之不知正是無所不知的本體呈露時金針一撥宿障全消誨女知之信是本之真心而見之然諾之際者是身世作合關鍵猶車之輗軏然舉世尚狙詐人而無信一味心口相違千蹊萬徑用得熟時若以為非此不可持身不可御世豈知其斷斷乎不可者可不可只衡在是非上而行不行方格到利害上也無信君子之於仁惟有貧賤一途是終身得力地雖終食之頃未始無去處交乘之隙使終食而為貧賤之終食則蔬食飲水樂也極貧賤之途雖造次仁也顛沛仁也茍舍此而欲取以非道之富貴有斷斷乎不可者君子所以練此心之仁不容躲閃不容方便才是中心安仁也富與貴孔子圍匡七日子路曰吾聞仁者必容知者必用如此説則天下更無非道之貧賤可處豈知自人分上看貧賤則非道自君子身上看未嘗非道也世人只為見得有非道之貧賤所以怨天尤人無所不至同上盈天地間萬事萬物各有條理而其條理貫通處渾無內外人已感應之迹亦無精粗大小之殊所謂一以貫之也一本無體就至不一會得無二無雜之體從此手提線索一一貫通才有壅淤便與消融才有偏枯便與圓滿時時澄徹處處流行直將天地萬物之理打合一處亦更無以我合彼之勞方是聖學分量此孔門求仁之旨也聖人從自已身上言心無死地則曰貫無所不貫則曰一以貫之非以一貫萬也一以貫之還他天地自然本色一貫仁者渾然全體而無息就全體中露出個治賦為宰為擯相才具便是大海中一漚發見且有待而然有時竪起有時放下非不息之體故即三子之才而其未仁亦自可見可使治賦鄧定宇曰此非閔憲以下學問顔子心常止故不遷心常一故不二子謂心本常止而不能不動以怒故就怒時求止法曰不遷心本常一而不能不二於過故就過時求一法曰不二此正復性之功先得此心之止與一者以立本而後遇怒能不遷遇過能不二則是止者一心而不遷者又一心也一者一心而不二者又一心也將孔門一切懲忿窒欲遷善改過之學都無用處所謂復性之功者不幾求之虛無寂滅之歸乎不遷怒此道身有之則不言而信以歸於慥慥之地所謂躬行君子也故云默識識如字謂信諸心也默識之學精神毫不滲漏徹首徹尾以此學即以此教何厭倦之有自默字訛解而學者遂以言語道斷當之謂聖學入手只在妙悟學都從悟中來聖學豈有墮於杳冥元默之見乎默而識之世謂聞見之知與德性之知有二豫謂聰明睿知非恃乎睿知之體不能不竅於聰明而聞見啓焉性亦聞見也效性而動者學也今必以聞見為外而欲墮體黜聰求睿知并其睿知而稿矣是隳性於空而禪學之談柄也張子曰非天聰明不成其為人聖而天聰明其盡者耳天聰天明耳辨聞目辨見是天聰明之盡則夫子多聞擇其善者而從之多見而識之是也曰知次者人次於天以見天非人不盡也知之次常人之過人知處得九分已知處得一分聖人之過人知處得一分已知處得九分説聖人有過已是騃人今説聖人猶有不知之過至為人所知益竒此意最宜理會學者便當長一格陳司敗曾子學問都是軀殼上討得最有持循一則一二則二有疾古人濟大事全靠腳跟定只是不從身家名位起念便是凡可奪處皆是此等作祟也誠極則精精極則變一切作用皆從此出誠中之識見是大識見誠中之擔當是大擔當故君子非有才之難而誠之難可以託六尺人之氣質不失之高明則失之卑暗而氣質之性終不錮其義理之性狂者必直侗者必願悾悾者必信自習染勝而三者并漓人心之變可勝窮乎狂而不直天下一物也聖人視外物無大小都作等間看打過得簞食豆羮關便打得天下關舜禹之有天下子絶四聖人之心置在何處曰絶四之外更無心問意必固我與聲色貨利有淺深否曰看他四者之心從何處起子絶四顔子之學才動軔便可到頭為從文禮處得力來後人欲一齊放過謂文既足以溺心禮亦不免於執著絶意去智專用力於末由之境微者墮於空寂放者入於猖狂佛老之教行而聖道裂矣顔淵喟然權者道之體也道體千變萬化而不離於中非權而何易曰巽以行權言入道之微也權居無事因物付物而輕重準焉言天下之至靜而不可測也言天下之至動而不可離也權之理主常而準諸事主變理即事事即理其常也乃所以為變也漢儒反經合道之説誠非朱子謂權之與經亦須有辨亦非也天下有二道乎嫂溺援之以手者權也正是道理合當如此乃所為經也故權非反經而為言也然則經何辨乎曰經者權之體權者經之用合而言之道也禮儀三百威儀三千皆經也神而明之妙用出焉權也二而一者也未可與權吳康齋夜半思處之策至日中始決如此計較便是貨殖故魯齋治生之言亦病如􅍆一餓死更有甚計較然則聖學有死地乎曰義不食粟則亦有死而已故今處君臣之義皆然其嗟也可去其謝也可食倘終不謝便當一死聖人於辭受取與一斷以義無纖毫擬議方便法門貨殖道體大段易見得只是微處難窺才著小心便有湊泊處聞斯視聽言動一心也這點心不存則視聽言動到處受病皆妄矣若言視思明聽思聰言思忠動思敬猶近支離問仁是如何名狀曰先儒言公言覺言生言變亦僅舉其動機言尚遺却靜中體段故不若孟子曰仁者人也試觀人目何以能視耳何以能聽口何以能言四肢何以能動非仁而何易曰乾元統天蓋曰天之所以為天也仁者人也蓋曰人之所以為人也天地以生物為心仁也萬物資生人與萬物皆生於仁本是一體故人合下生來便能愛便是親親由親親而推之便能仁民便能愛物天地以生物為心人亦以生物為心本來之心便是仁本來的人便是仁故曰仁人心也又曰仁者人也問已如何克將去曰只是不從已起見便是克問克勝也是以仁勝不仁否非先有個仁去勝不仁只勝不仁處便是仁也曰畢竟有主人翁方勝盜賊曰頭上安頭之見也仁體湛然不容一物才有物不論善惡是非都是不仁為仁者正就此處銷鎔還他個湛然本體此克已正當時也若先據個主人在便是物欲所謂認賊作主也若主人常在則亦無盜賊可逐能逐盜賊便是主人不必另尋主人克復道體渾然無可持循故聖人就分見處示人以入德之地延平曰理一而分殊理不患不一所難者分之殊也聖人之言四勿言居處三者皆分殊以見理一也居處恭顔子有不善未嘗不知知之未嘗復行也亦不行也然顔子不善只是一念絶續之間就仁中揀出不仁來故謂不逺之復原憲不行則已成此四等症候旋潰旋制終不能奏廓如之效則不行之心猶然人偽而已於仁體何當豫始與陸以建論學謂克伐怨欲不行正是克已工夫子曰可以為難者欲其先難而後獲也以建甚不然之看來不行之心早是個已也然學者根器淺不恁地不得由此進之扶得個不行心常做主便是克已力量也克伐怨欲鄧定宇晚年學問有得其兄問之曰弟近日只查已過病革為子弟曰萬事萬念皆善都不算只一事一念不善便算寡過問出位之思曰孟子言思則得之不思則不得也出位非思也念也炯然有覺者思之體倏然無根者念之動思不出位問不億逆矣容有不先覺者否曰先覺非用察識之謂只良知不蔽而已如子産受欺於校人舜受欺於象正不失為先覺逆詐古來無偷情放逸的學問故下一敬字攝入諸義就中大題目是克已復禮忠恕一貫擇善固執慎獨求放心便是後儒將敬死看轉入注腳去便是矜持把摸反為道病修已春秋去先王之世未逺始生老氏為惑世誣民之祖當時一種好異之民起而應之如原壤者不少轉相祖述逾流逾逺一變而為楊墨再變而為申韓三變而為蘇張終變而為佛氏之學以返老氏清淨易簡之初旨嗣後士夫往往以佛氏之説文老氏之姦精者竊道德之唾餘以學佛粗者拾翕張之機鋒以學禪而楊墨申韓蘇張之學時時出沒其間終宇宙世界學道人只是此局原壤後儒之學多教人理會個一便未必多學聖門不如此以子貢之潁悟猶不輕示必俟其學有得方道破若先道破便無持循處不若且從多學而識自尋來路久之須有水窮山盡時所見無非一者是一乃從多處來故曰博我以文約我以禮聖門授受如印版顔曾賜皆一樣多學多學而識説者謂孔子言性只言近孟子方言善言一只為氣質之性義理之性分析後便令性學不明故説孔子言性是氣質之性孟子言性是義理之性愚謂氣質還他是氣質如何扯著性性是就氣質之中指點義理者非氣質即為性也清濁厚薄不同是氣質一定之分為習所從出者氣質就習上看不就性上看以氣質言性是以習言性也性相近鄙夫正後世所謂好人便是鄙夫心一也形而下者謂之人形而上者謂之道人心易溺故惟危道心難著故惟微道器原不相離危者合於微而危微者合於危而微兩物一體合人與道言心而心之妙始見其蘊始盡所以聖賢千言萬語闡發無盡事心之功亦無盡乃其要只在精與一精以析人心道心之幾而一則以致其精也兩心糅雜處正患不精不精便不一精而一之則人心道心妙合無間而心性流行之妙無往而非中矣堯曰明儒學案卷六十二
