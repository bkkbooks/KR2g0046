body:
  text: 明儒學案卷六十一餘姚黃宗羲撰東林學案四忠端黃白安先生尊素黃諱尊素字真長號白安越之餘姚人萬厯丙辰進士授寧國府推官強宗斂手避其風裁時崑宣之焰足以奔走天下先生未嘗稍假借也入為山東道御史神宗以來朝中分為兩黨君子小人遞為勝負無已時天啓初政小人之勢稍絀會奄人魏忠賢保姆客氏相結以制沖主盡收宫中之權思得外庭以助己小人亦欲乘此以一網天下之君子勢相求而未合也先生惕然謂同志曰兄弟鬩於牆外禦其侮吾儕其毋鬩牆以召外侮乎無何阮大鋮長吏垣與桐城嘉善不睦借一去以發難先生挽大鋮使毋去大鋮意亦稍轉而無奈桐城之疏彼也趙太宰不由咨訪改鄒新昌於銓部同鄉臺省起爭事權先生為之調停江右遂謂新昌之見知於太宰由先生二憾交作而給事中傅櫆故與逆奄養子傅應星稱兄弟私懼為清議所不容挺險者乃道之以首功借中書汪文言以劾桐城嘉善逆奄主之以興大獄先生授謀於鎮撫劉僑獄得解於是而有楊副院二十四大罪之疏疏之將上副院謂同志曰魏忠賢者小人之城社也塞穴薰鼠固不如墮城變社耳先生曰不然除君側者必有內援公有之乎一擊不中凶愎參會矣疏入副院既受詰責而且杖萬郎中杖林御史震恐廷臣先生謂副院曰公一日在朝則忠賢一日不安國事愈決裂矣不如去以少衰其禍副院以為然而遷延不能決也南樂由逆奄入相然惟恐人知使燕趙士大夫以魏氏為愧嘉善因其大享不至將糾之先生曰不可今大勢已去君子小人之名無徒過為分别則小人尚有牽顧猶有一二分之救也嘉善鋭意欲以擊外魏與楊副院擊內魏為對股文字不深維先生之言南樂喟然嘆曰諸公薄人於險吾能操刀而不割哉遂甲乙其姓名於宦籍之上惎其宗人魏忠賢曰此東林黨人皆與公為難者也逆奄奉為聖書終熹宗之世其竄殺不出於此晉人爭巡撫先生語太宰曰秦晉豫章同舟之人也用考功而豫章之人心變參恤典而關中之人心變再使晉人心變是一閧而散之局也陳御史果劾嘉善以會推徇其座主中旨一出在朝無留賢矣凡先生憂深慮逺彌縫於機失謀乖之際皆先事之左劵也先生三疏劾奄第一疏在副院之先第二疏繼副院而上第三疏萬郎中杖後清言徑論奄人髮指則曰此諫官職分事不以為名高也乙丑出都門曹欽程論之削籍其冬訛言繁興謂三吳諸君子謀翻局先生用李實為張永授以祕計逆奄聞之大懼刺事至江南四輩漫無影響沈司寇欲自以為功奏記逆奄曰事有迹矣逆奄使人日譙訶李實取其本去而七君子被逮蓋汪文言初番之獄羣邪定計即欲牽連左魏二公相隨入獄不意先生能使出之故於諸君子中意忌惟先生以為必為吾儕患訛言之興亦以是也丙寅閏六月朔賦詩而卒年四十三先生未嘗臨講席首善之會謂南臯曰賢姦雜沓未必有益於治道其風節相許者則蕺山忠憲忠節萬里投獄蕺山慟哭而送之先生猶以不能濟時為恨先生以開物成務為學視天下之安危為安危茍其人志不在洪濟艱難沾沾自顧揀擇題目以賣聲名則直鄙之為硜硜之小人耳其時朝士空疏以通記為粉本不復留心於經學章奏中有引繞朝之策者一名公指以為問先生曰此晉歸隨會事也凡五經中隨舉一言先生即口誦傳疏瀾倒水決類如此懷謝軒講義格物是格出至善所在若作名物象數則是借外以廓內知原是性中一點睿體但因格物而開拓融化無有纎毫遮塞處便是天豈有命生而炯炯不昧者是合下生來箇箇是聖賢再沒有命之以凡庸者從此率之不加不損只依他出來蓋天命之體貞而靜率者不起知故不生紛擾這便是貞靜之妙戒懼慎獨便著主靜率性之工夫也修者就自家做出來的將來做法程非另有修也未發之中渾淪無際停育無窮此即水涸木落無聲無臭之地神明變化都不外此槖籥已發者天下同此一性天下同此一率夫婦猶是聖人猶是更無俶詭變幻於間豈不謂達道中者未發之性和者已發之性性無動靜中和之名因動靜而分若言未發為性已發為情分明性有動靜矣世風日下如江河競注而自古至今此理猶在人心維天之命於穆不已蓋謂此也問天地位萬物育曰天地無日不位萬物無日不育只為人心失却中和之體天地雖大若容不得我萬物雖衆只覺多我一人知此則知位育不是欺人方是偽凡所行而胸中自不能妥貼人不見其破綻處豈不是偽一貫不必説得元逺淺言之如世之機械變詐亦有時節通行得去便有時節不可通行得去如何貫得是故一貫者其唯誠乎觀過知仁故知其不善所以明善孟子知言全將自己心源印證羣迷吾心止有一常人自去分門立户分蹊别徑都從常心中變出許多鬼魅魍魎相知言者但把常心照證變態無不剖露知得人心亦止知得自己心知得羣心之變亦止養得吾心之常心不受變而術則變如學術流為申韓此心不得不歸於慘酷治術流為雜伯此心不得不向於殺伐戰國時人學皆刑名治皆誅殺都被術所弄壞乃轉而歸咎仁之不若人故孟子特地拈出本來此心人人圓滿但是一日之造端便判終身之趨向即夫子習相逺之説也説個信果定是未言未行之先先著一番心了大人未言那見有當信之理未行那見有當果之事任他危言遜言旁行正行再沒有不中於則者義有準而心無著也感遇聚散佛氏視之皆太虛中浮氣紛擾與性體一毫不相妨礙儒者則皆是我本根發出枝葉無一件是假心體無盡凡天地間所有之事古今來所有之功聖賢接續盡之豈能盡得陽明先生答陸元靜無妄無照之論蓋本之佛書佛書言妄心即真心影像妄本無妄以有感故感亦無感以能照故若是則照妄之心即是無妄之心云何復得有妄心心本無妄以無照故謂之妄今指為真心之影像畢竟影是形生像隨鏡見推不得是鏡以外事今欲却妄而完真安得逃影而滅像乎佛氏言心無常為無所住而生其心念念生滅不停也此儒者之所謂妄心也而佛氏正以顯此心之性空妙理即謂之真如不動此蓋有見於流行無見於主宰以其常動而謂之不動非真不動也中庸曰茍不至德至道不凝焉佛氏所缺者至德也公都子所言性無善無不善性可以為善可以為不善有性善有性不善三説總是一説不觀之佛書云性無善惡能生善惡又云善惡同以心性為性若斷性惡則斷心性性不可斷故性善性惡皆不可斷既不可斷則是性有善惡也若云性本無性性亦非性畢竟有箇生善生惡者在則是可以為善可以為不善也佛法先要人信蓋佛法示人本是種種可疑於此教人盡行奪下整身跳入其中豈不立地成佛何須更加修為若吾儒亦是穿衣喫飯夏葛冬裘見成道理伸手便見率之即是體之即存故不必言信無疑非信不必言悟無修非悟釋氏言宗心言妄心謂常住不動之真心為宗緣者為妄其實所謂常住不動者空而已矣緣起而流行者天地萬物皆野馬塵埃也但不足以礙我空體與空體截然不相粘合吾儒則就此野馬塵埃之中流行而不失其則者乃見常住不動之真心故其名則同而所指實異也宗伯吳霞舟先生鍾巒吳鍾巒字巒稚號霞舟武進人也崇禎甲戌進士先生弱冠為諸生出入文社講會者四十餘年海內推為名宿以貢教諭光州學從河南鄉舉登第時年已五十八矣授長興知縣閹人崔嶙𣙜鹺以屬禮待郡縣先生不往降紹興照磨量移桂林推官南渡升禮部主事未上而國亡閩中以原官召之上書言國事時宰不悅先生曰今日何等時如某者更説一句不得耶出為廣東副使未行而國又亡遁迹海濱是時自浙至中左建國以一旅奉之二三人望皆觀望不出先生曰吾等之出未必有濟然因吾等之不出而人心解體何以見魯衛之士亦惟以死繼之而已起為通政使駕返浙海先生以禮部尚書扈蹕所至録其士之秀者為弟子員率之見於行朝僕僕拜起人笑其迂先生曰此與陸君實舟中講大學正心章一例耳駕在滃洲先生退處補陀及事亟先生曰昔者吾友李仲達死奄禍吾尚為諸生不得請死吾友馬君常死國難吾為逺臣不得從死閩事之壞吾已辭行在不得驟死吾老矣不及此時此土死得明白乾淨即一旦疾病死何以謝吾友見先帝於地下哉復渡海入滃洲辛卯八月末於聖廟右廡設高座積薪其下城破捧夫子神位登座危坐舉火而卒年七十五先生受業於涇陽而於景逸元室季思皆為深交所奉以為守身法者則淇澳困思抄也在長興五載以為差足自喜者三事一為劉夫子弔丁長儒至邑得侍杖履一為九日登烏膽山一為分房得錢希聲所謂道德文章山水兼而有之矣先生嘗選時文名士品擇一時之有品行者不滿二十人而羲與焉其後同處圍城執手慟哭羲别先生行三十里先生復掉三板追送其語疾痛薛諧孟傳先生所謂嗚咽而赴四明山中之招者此也嗚呼先生之知羲如此今鈔先生學案去之三十年嚴毅之氣尚浮動目中也霞舟隨筆人生只君親兩大本凡日用應酬宗族眷屬無不本於親本此之謂仁凡踐土食毛事上臨下無不本於君本此之謂義人只除了利根便為聖賢故喻利喻義分别君子小人小人所以喻利只為遂耳目口體物交物一班人渺乎小哉真蠛蠓一世矣有伊尹之志則可仕不則貪位慕祿之鄙夫而已矣不可與事君也有顔子之樂則可處不則飽食間居之小人而已矣未足與議道也士大夫為盜賊關説者是即盜賊為倡優關説者是即倡優或問當此之時何以自處答云見危臨難大節所在惟有一死其他隨緣俟命不榮通不醜窮常養喜神獨尋樂處天下自亂吾身自治履之九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也玩之可得守身法當此之時惟見危授命是天下第一等事不死以圖恢復成敗尚聽諸天非立命之學也當此之時避世深山亦天下第一等事徼幸以就功名禍福全聽諸人非保身之道也錢啓新先生云後生小子但有向上根器須忘年以交接引入道不必羅致門下張二無至京師宜興餽以人參不受宜興不悅二無告以籌邊禦冦宜興諧之曰但主心一轉天下自治他可置勿道也二無遂力求去顔壯其為孝亷時里人有跪訴者既去移晷追還為下一跪里人駭問何故曰頃汝下跪我立而扶之思此終覺不安故跪還汝耳友云求長生當除妄想曰求長生獨非妄想耶君子小人之辨在人臣當泯其圭角在人主當見得分明天地之間只有陰陽二氣動靜兩端循環不已更無餘事此之謂易天地間一切目可得見耳可得聞言可得傳躬可得行者皆道之用也皆象也數也故聖人立象以盡意極其數遂定天下之象然則聖人之意其不可見乎不可得而見者道之體也立象而意盡於其中故曰君子之道費而隱費者用也隱者體也聖人惟恐人索之於隱只言用不言體易之六爻皆用也故曰用九曰用六用九而六其體故曰見羣龍無首天德不可為首用六而九其體故曰利永貞以大終天地只有一乾伏羲原初只有一畫坤之偶即一畫而分之非另有第二畫也坤之中斷處正是坤之虛處所以順承天也乾貫乎中矣敬以直內義以方外一直撑天拄地一方周遍四隅中字從直從方口可兼內外二義他卦之上為極為變惟鼎與井終為成功井以養民鼎以養賢井以水鼎以火水火飲食之道也欲觀喜怒哀樂未發時氣象須將喜怒哀樂發而不中節處克盡才觀得子貢聞道顔子以下一人只文章性道二語括盡中庸費隱之旨問朝聞道所聞何道答云只看下句入道者當於天親一脈不可偽為處竭情此文介真實見道語人情之同處即本心人謂隨處體認天理愚謂隨處體貼人情靜虛二字上不容加一道字一念不起時一物不著處參得消息當是朝聞人身常定常靜常安氣息自調每有意調息反覺氣息轉粗可見正助之害見危授命不要害怕見利思義却要害羞事父母能竭其力一生之力無一毫不為父母用者而今而後吾知免夫此力才竭君子一生汲汲皇皇只這一件事故曰好學北辰是天之樞紐中間些子不動處仍不是不動只動處還在原處今日會講各人須細細密察為文學而來乎為理學而來乎為道學而來乎為文學來不過學業止討些悟頭這不中用為理學來研窮意義亦是訓詁學究伎倆也不中用為道學來實踐躬行才有中用這便是所安又為先生而來乎為聖賢而來乎為自己而來乎為先生而來先生有出山時節這靠不得為聖賢而來聖像有不懸時節聖人之書有不對面時節亦靠不得為自己而來立志在身心性命這才靠得這便是所安此是君子小人親筆供狀言顧行行顧言今人之言大抵勦襲之言今人之行大抵趨逐之行自己一毫不與其間此之謂不相顧知只在心地上明白不在義理見聞上誇張張二無云無諂無驕未必在境上打點自己未有實受用在一經夫子指點便覺本地風光時時見前非心地上打掃十分潔淨何以有此切磋琢磨正是樂與好禮得力處子貢見得此直能因苖辨種飲水知源三百篇皆無字之經矣故夫子許以言詩告往知來正與大易數往知來不隔一線二無云詩之為用自閨房靜好以至郊廟登歌其人自耕夫遊女以至藎臣哲后其事自櫽括蟲魚草木以至感格天地神明真是無隱不披無逺不屆却只人人一點不容已之思耳思起處原無邪緣染而後有邪只用此無緣染之思抽引不盡何止充天塞地心本是仁非是二物私欲引去心便違仁私欲既無心原是仁郎中華鳯超先生允誠華允誠字汝立别號鳯超無錫人天啓壬戌進士授工部主事告歸崇禎己巳補任轉員外郎調兵部上疏言國家罷設丞相用人之職吏部掌之閣臣不得侵焉今次輔溫體仁冢臣閔洪學同邑朋比驅除異已閣臣操吏部之權吏部阿閣臣之意庇同鄉則保舉逆案排正類則逼逐講官奉旨回話因極言其罪狀又言王化貞宜正法余大成在可矜上多用其言體仁洪學雖疏辨無以難也尋以終養歸南渡起補吏部署選司事隨謝去在朝不滿一月改革後杜門讀易戊子四月有告其違制者遂執至金陵不屈而死先生師事高忠憲忠憲殉節示先生以末後語云心如太虛本無生死故其師弟子之死止見一義不見有生死所以云本無生死若佛氏離義而言無生死則生也為罔生死也為徒死縱能坐脫立亡亦是弄精魂而已先生居恆未嘗作詩蒙難之春為二律云緬思古則企賢豪海外孤臣咽雪毛眼底兵戈方載路靜中消息不容毫默無一事陰逾惜愁有千端枕自高生色千秋青史在自餘誰數却勞勞振衣千仞碧雲端壽夭由來不二看日月光華宵又旦春秋遷革嵗方寒每爭毛髮留詩禮肯逐波流倒履冠應盡只今祈便盡不堪回首問長安是亦知死之一證也中書陳幾亭先生龍正陳龍正字惕龍號幾亭浙之嘉善人崇禎甲戍進士授中書舍人戊寅熒惑守心先生一言民間死罪細求疑情一言輔臣不專票擬居恆則位置六卿有事則謀定大將己卯十月彗星見先生進言曰事天以實不以文臣更進之曰事天以恆不以暫何為實今日求言恤刑之實是也何言恆自今以後弗忘此求言恤刑之心也其年十一月上將郊天先生請正郊期古帝王郊天不用至日家語孔子對定公曰周之始郊其月以日至其日以上辛郊特牲曰郊之用辛也周之始郊日以至王肅曰周之郊祭於建子之月也用辛日者以冬至陽氣新用事也臣謹按上辛謂日至之月第一辛日如冬至在十一月下旬則用仲辛冬至在十一月初旬本月無辛則用十月下旬如崇禎十二年十一月二十八日辛巳冬至宜十八日辛未郊也上命諸臣議先生又上郊祀考辨上從之以辛巳南郊明年乞休不允壬午上言勦寇不在兵多期於簡練殲渠非專恃勇藉於善謀所云招撫之道則更有説曰解散曰安插解散之法仍屬良將安插之法專委有司賊初淫殺小民苦賊而望兵兵既無力民反畏兵而從賊至於民之望賊而中原不可收拾矣及墾荒之議起先生曰金非財唯五穀為財興屯不足以生穀唯墾荒可以生穀起科不可以墾荒唯不起科可以墾荒五穀生則加派可罷加派罷然後民生可安上以先生疏付金之俊議之甲申正月左遷南京國子監丞國變後杜門著書未幾卒先生師事吳子往志逺高忠憲留心當世之務故以萬物一體為宗其後始湛心於性命然師門之旨又一轉矣學言最初最簡最盡一盡於太極再盡於陰陽三以下不能無遺矣羲畫最盡發揮其最初也後聖有言皆發揮於圖畫之後者也故曰言不盡意聖人欲使反其初觀其盡者又曰豫欲無言人心惟寂然不動斯太極矣乎寂無不藏感無不通彼空虛者其以為有不能生陰陽萬物之太極也質無常存氣無常分開非始有混非終無有無從不相離故不言二之是以言之有無二視天下之物無不二人我二矣心迹二矣體用二矣切而生死亦二浮而得喪毁譽亦二二之所從來逺矣日無定中月無定滿人無定強方至即行長極即消斯須不得留留則有息矣人形氣不得不衰也心不得不自強也形氣似月心似日天地自不滿生天地之中者疇能滿諸山川無全吉人形無全美世福無全享極之唐虞不能使朝無孔壬野無矜人古今亦無全治惟堯孔心德居其全爾不可全者物而衆求之可全者德而莫之求惑矣夫天授人性其有形以後天人疏而親隔而通之際乎天主上也人臣庶也性職事也奉職循理謂之忠良曠厥職而朝夕致禮焉明主聞之以為忠乎媚乎止者心之常艮背亦止行庭亦止靜者太極之常生陰亦靜生陽亦靜主靜者艮止之義乎心合於艮之謂太極矣心載性而宰身然性視心則心竒矣惟性最庸故學不從心而從性身視心則心微矣惟身斯顯故學不本正而本修其從性也照異端之病也其本修也坊百世之逃也返百慮於何慮學問之道不知其道反益其慮化有事為無事經濟之道不知其道反生其事聞道以無妄念為候妄念因於嗜欲嗜欲因於有身嗜欲無味無足想矣物物自然無容想矣忽若有見而念起不禁者悟與思誠者自反之謂也主於自得不期誠而誠主於得名不期偽而偽不信天則學無柄小毁小譽小得小失目前相遇莫不傍徨焉學至於唯有天知則陟降於帝庭與太極存矣功至於惟有天知則朝市屢變傳家之事不變矣一得焉恐人不知微勞焉恐人不感是誠何心哉凡人者自為一人而已矣仁人者天下之心心覺一身之疴癢仁人覺天下之疴癢覺之故安之未能安天下且安目前無安之之權且使有權者動念於求安安之心不可不自我存安之績不必自我成法今傳後其與人為善之心乎天下法之天下皆善人矣後世傳之後世皆善人矣舜之所樂其在兹乎我可法我可傳則品尊而名貴是雖有懿行猶己私也去鄉人幾何憂不如舜憂不能使天下後世同歸於善也詎憂無舜之令名司馬徽有言識時務者在乎俊傑天下先務時時各異孰為大本孰為大端遡觀往事人所既為我則瞭焉方當吾世從何入手而茫然不識者皆是也取四三年來之治機治今之天下未必合者而况逺昔哉成心之去難矣哉成心之害深矣哉一懷成心所觀得失皆不復中非必愛之憎之也力除愛憎設為虛衷而成心隱隱據其中而主之我自以不關成心也其實推之不能去也立言有六禁不本至誠勿言無益於世勿言損益相兼勿言後有流弊勿言往哲已言勿襲言非力所及勿輕言我與天下後世之感通猶兩人相覿爾我愛彼彼亦愛我否則覿面交疏我惟見有身天下亦烏知有我鄉人之所以草木同腐也我孜孜為後世計後世孰能忘之聖賢之所以長生於人心也有明之盛道至醇深者薛高二子而已薛子危而免高子遂及不以時耶不以爵耶宋六子其一不受爵其五不居高爵國朝人才自王文成而下無若楊忠愍養其身以有為六律可明可制問三楊曰文貞德業最盛孶孶為民無赫赫功是足貴也洪治三臣曰弇州記允矣周忠介曰介矣哉手綰銓衡居不蔽風雨田數十畝其死也則幾傷勇乎其有恥不與黨之心乎規免而忠介不免命也夫問楊忠烈曰烈矣哉然激寺禍者夫夫也自昔狐鼠以格主去以慧術去有一疏顯攻之而去者乎不去禍斯烈矣上士貞其身移風易俗中士自固焉而已下士每遇風俗則身為之移堯舜以來只説教字從不曾説著學至傅説乃極説箇學之益出來尼思以前只説性字從不曾説著理至孔子方言窮理孟子又云心所同然者理説箇理字出來此二字便為千萬世宗主言生生可以該沖漠無朕言沖漠無朕或反以晦生生儘有恬靜之士談及民生利病輒悄然不顧非惟不顧且將阻人蓋其恬靜中與世間痛癢全相隔斷豈知所謂沖漠無朕正欲於一相不立之處體認出萬物一體端倪耳若人我隔絶則其養高習靜反隱隱養成一段殺機古來那有此秦越學問今日言學只提箇生字學者須得為萬世開太平意思方是一體方是隱居工夫不然一生巖居川觀豈便無事可做但云獨善其身亦覺與世隔絶須識獨善中原有兼善事業但目前不甚著明只觀百世而下所法所傳總是堯舜仲尼意思大行窮居當時事業略有分别久久決無分别有分别之日短無分别之運長念頭從萬物一體處起工夫只在修身天地之大德曰生人皆有不忍人之心此二語是孔孟提出道學大原恐人不知如何用力所以又説明明德許多條目然只看欲明明德於天下一句已將念頭工夫合總説完後世學問不本諸好生之心許多清高靜寂長厚儉朴一切盛德芳名都只從一身上起總做得完完全全無些子破綻終非知道無他念頭起於自身工夫反在外面總只顛倒了一部論語皆説學問事惟是知也直指出心體來皆説做工夫事惟天何言哉直指出道體來皆説生前事惟朝聞夕死直指出到頭結果處來説心體明是不倚見聞矣終不教人廢學問説道體明是節節現成矣終不教人不做工夫説到頭結果明是心同太虛事業皆浮雲矣終不教人虛想像死後光景步步踏實乃得絶塵而奔斯人為徒乃得侔天而遊味此三則任是特地靈慧無礙辨才劈空提醒未有出於其外者也異端拈出神竒妙理在聖人止是平常異端喝出驚布大事在聖人止是作息故使驚者不解解者不驚在人身如何是天載曰不思而得不勉而中此人身中無聲無臭處也但於義理熟之莫從天載上虛想要犯好知不好學之蔽所性分定人人盡然仁義禮智根於心唯君子能之栽植非一日矣若以不加損獨歸君子便不識所性曾子傳一貫不言一貫而言潔矩其義一也在道則言一貫在天下則言潔矩此矩即從心所欲之矩聖人不必言潔潔之則是忠恕其於學者最有把捉湯武反之亦是潔矩道一而已矣中一而已矣中不可見見之於和自昔聖人之作用舉八元屏四凶皆和也何事是中惟和則發揮出中字來中無可言言之以庸自昔聖人之日用勉不足慎有餘皆庸也何物是中惟庸則形狀出中字來博厚高明結以天之所以為天不及地也溥博淵泉結以配天不及地也知化育結以浩浩其天不及地也無他天一而已矣地止是天中之凝聚處在彼則觀和與庸而中見在此則言天而地見指點之法相反而通大舜所至成都孔孟育英才太丘幼安之徒鄉里薰其德士善其身未有以獨善終者也對天下而云耳德不孤人必有以應我善無獨我必有以成人朱子知行並進何嘗不重覺悟只似多却推駁象山一番然非自為為後世也象山立身實無可議陽明大類之無忝躬行君子只多却推駁朱子一番顔曾木卜同在聖門親領德旨其用功得力處何嘗不小異使當時必欲相同亦成聚訟矣大抵學問只怕差不怕異入門不妨異朝聞夕可歸宿必同用力不妨異設誠致行起念必同問聖賢效法天地亦有時拗過天地否曰夷齊不食周粟當時天運悉已歸周兩人欲以雙身撑住乾坤元時上天命之入主天下而金華四子沒身泉壤一則拗之於天運之初遷一則拗之於天運之久定此太極之不隨陰陽者故人心為太極孔子憂學之不講不知是如何講法孟子直發揮出來有箇詳説有箇反説詳即如今辨論反則是體認天理躬行亦反説也默識亦反説也古人辨論惟恐體認或誤故須辨之今人雖反説到至精至微處只是説話然則且莫講學先體貼孔孟講説二字理欲並竅於人心飢食渴飲非其一端乎知味得正斯理矣甘而失正或醉飽溢量斯私欲矣一事一念莫不有利善介於其間危如之何凡言危者得失存亡之關也若以私欲為人心則已失已亡豈直危而已哉道心即人心之得其正者與不正止爭些子非必如一黑一白相反而易辨也故曰惟微明儒學案卷六十一
