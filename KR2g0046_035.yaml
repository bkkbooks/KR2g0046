body:
  text: 明儒學案卷三十五餘姚黃宗羲撰泰州學案四恭簡耿天臺先生定向耿定向字在倫號天臺楚之黃安人嘉靖丙辰進士擢監察御史以大理寺丞謫州判纍遷至太僕少卿僉都御史丁憂起巡撫福建又丁憂起僉都御史晉左副都轉刑部侍郎升南京右都御史以戶部尚書總督倉場告歸家居七年卒年七十三贈太子少保諡恭簡先生所厯首輔分宜華亭新鄭江陵吳縣皆不甚齟齬而江陵奪情先生致書比之伊尹之覺世以天下自任者不得不冒天下之非議諫奪情者此學不明故也意在少殺其禍然近於誦六藝以文姦言矣及掌留院以御史王藩臣參三中丞不送揭帖為蔑視堂官上疏糾之清議以為脅持言官逢時相之欲顧涇凡作客問質之先生無以難也先生之學不尚𤣥逺謂道之不可與愚夫愚婦知能不可以對造化通民物者不可以為道故費之即隱也常之即妙也粗淺之即精微也其說未嘗不是而不見本體不免打入世情隊中共行只是人間路得失誰知天壤之分此古人所以貴刀鋸鼎鑊學問也是故以中行為學稍一不徹骨髓其下場不及狂狷多矣先生因李卓吾鼓倡狂禪學者靡然從風故每每以實地為主苦口匡救然又拖泥帶水於佛學半信半不信終無以壓服卓吾乃卓吾之所以恨先生者何心隱之獄唯先生與江陵厚善且主殺心隱之李義河又先生之講學友也斯時救之不難先生不敢沾手恐以此犯江陵不說學之忌先生以不容己為宗斯其可已者耶先生謂學有三關一即心即道一即事即心一慎術慎術者以良知現現成成無人不具但用之於此則此用之於彼則彼故用在欲明明德於天下則不必别有制心之功未有不仁者矣夫良知即未發之中有善而無惡如水之必下針之必南欲明明德於天下而後謂之良知無待於用故凡可以之彼之此者皆情識之知不可為良先生之認良知尚未清楚雖然亦緣傳習後録記陽明之言者失真如云儀秦亦是窺見得良知妙用處但用之於不善耳先生為其所誤也天臺論學語孔孟之學真實費而隱宋學未脫二氏蹊徑者以其隱而隱也嘗謂惠能云本來無一物此是又有無一物者在如孔子云泛愛衆而親仁顔子若虛若無犯而不校如此方是無一物此類何等顯其實何等微宋儒多只說向入微處終是未脫見耳兄之文似輸却陽明一著陽明把筆時却是不曾要好兄尚有要好心在也遷史之文亦是無意要好班固便要好浸淫至於六朝只是要好極耳與胡廬山夫與百姓同然處吾黨何能加得些子惟是百姓日用不知耳日用處聖人原與百姓同其所用處聖人自與百姓異區區所謂擇術者非能有加於百姓日用之外也意於百姓日用者而辨所用耳世之言道譬之以管窺天者苐知一隙之為天不知觸處皆天也亦有知觸處之皆天者而耽虛執見不自反身理㑹視聽言動之皆天也或有知視聽言動之皆天者而乃鹵莾恣睢不知視聽言動之禮之為天則也與焦弱侯竊詳彼教大端以寂滅滅已處為宗吾孔孟之學惟以此不容已之仁根為宗耳聖人之尋常日用經世宰物何一非此不容已者為之乎然即此不容已之仁根莫致莫為原自虛無中來不容著見著見便自是兩截矣聖人以此立教使人由之不使知之如宰我短喪夫子第即其不安處省之墨氏薄葬孟子苐原其顙有泚處省之至其所以不安處其顙所以有泚處非不欲使知不可加知也同上聖人之道由無逹有聖人之教因粗顯精與周栁塘草年前曾解盡心章云學者須從心體盡頭處了徹使知性之真體原是無思無為便知上天之載原是無聲無臭渾然一貫矣所謂心體盡頭處者蓋昔人所謂思慮未起鬼神不知不覩不聞處也近來自省於人倫日用多少不盡分處乃語學者云吾人能於子臣弟友不輕放過務實盡其心者是其性真之不容自己也性真之不容自已原是天命之於穆不已非情緣也故實能盡心而知性知天一齊了徹矣近溪安身立命處是無念余所謂心體盡頭處是也其日用受享提掇人處只是自然生機余所謂心體不容自己處是也蓋無念之生機乃是天體天體之生機即是無念原是一貫說到此處難著言詮只好默契靈識耳橫渠曰聚亦吾體散亦吾體是生死無分别也明道曰萬物為一體是人我無分别也然夫子曰親親之殺尊賢之等禮所生也又曰非禮勿視聽言動孟子曰親其兄之子謂若鄰之赤子乎此則分别而實則不分别也何者此則自然之真機非緣名義道理而生分别者知是隨身貨知尤是行之妙栁塘云念之不動者為性蓋既云念矣而中又有不動者在疑二之矣來教云性無得失無是非誠然顧念之萌於欲也寧無邪正乎念之生於見也寧無偏全乎學者從念上研幾間邪袪偏亦是復性實功似未可破除如足下教㫖只從性上辨迷悟則誠為直截真詮得上乘矣與揚復所知至至之則不識不知無聲無臭者此其顯現知終終之則開物成務日用云為者此其真宰定宇云知是知非之知是以照為明誠然夫照從何生孟子曰日月有明容光必照因明生照由照探明原是一貫非判然兩截也今謂以照為明相去千里提掇似太重矣與龍溪余惟反之本心不容已者雖欲堅忍無為若有所使而不能反之本心不自安者雖欲任放敢為若有所制而不敢是則膚淺之綱領惟求其不失本心而已矣與李卓吾昔大洲云只要眼明不貴踐履余則曰眼孔易開骨根難換公所取人者眼孔余所取人者全在骨根學悟主腦則才識氣魄皆道之用主腦未徹則才識氣魄俱道之障也昔富鄭公中年居洛時為堯夫所激發所得益深曾有書云某不遇某不過一村漢耳念菴嘗對人言某四十年前蓋濫俗人鄭公初年立朝風節震耀一時而自謂一村漢則其所以求不村不俗者必有所在矣與胡杞泉此學只是自己大發願心真真切切肯求便日進而不自知矣蓋只此肯求便就是道了求得自己漸漸有些滋味自家放歇不下便是得了與周少魯今之學者談說在一處行事在一處本體工夫在一處天下國家民物在一處世道寥寥更無倚靠凡道之不可與愚夫愚婦知能不可以對造化通民物者皆邪說亂道也蓋費中隱常中妙粗淺中之精微本是孔孟萬古不易正脉但非實是撑天拄地棄身忘家逼真發學孔子之願者未易信此與喬户部三代以降學術分裂高者虛無卑者繁縟夫子出而單提為仁之宗仁者人也欲人反求而得其所以為人者戰國功利之習權謀術數孟子出而又提一義使知羞惡而有所不為六朝以下清虛任放决裂名教宋儒出而提掇主敬之㫖主敬禮也其後日趨於格式形迹真機埋沒陽明出而提掇良知之㫖良知智也由仁而義而禮而智各舉其重實則一貫也今為致知之學者又以意誠見解承當崇虛耽無思以救之宜莫如信引其影響歸之實地示諸生古聖賢之悟只悟得自已不足是故若無若虛子臣弟友悟得不能盡今世學者所悟只增得一畨虛知見添得一種浮氣耳大人通天下為一身吾人只若不識自家這個真身懵懵而生即令百嵗枉死耳聖人苦心破口說個格物格物即求仁之别名也仁者人也識人便是識得此身面目答唐元卿近溪一日立白下大中橋覩往過來續者􅟡􅟡侁侁因指示同志曰試觀此千百萬人者同此步趨同此來往細細觀之人人一步一趨無少差失個個分分明明未見跌撞性體如此廣大又如此精微可默識矣一友曰否否此情識也如此論性相隔逺矣有述以問余余曰亡者東走追者亦東走走者同而所以走則異也茲來往橋上者或訪友親師或貿遷交易或傍花隨栁或至淫蕩邪辟者漫謂一切皆是此則默識之未真也此原不論來往之人只是見吾性體無往不是若一分别便是情識如鳶飛魚躍亦可分别否與同志胡清虛浙之義烏人初為陳大參門子以惡瘡逐出倚一道人率之遊匡廬終南遂有所得浙中士紳翕然宗之陶念齊王龍溪俱納贄受教晚與近溪及其二子遊廣東曺溪至肇慶近溪長子病死次子痛其兄爇香掌上灼爛而死清虛亦死鄧豁渠言常住真心與後天不相聨屬此極邪之說近日談禪者百般病症皆由此蓋心事判內外岐孟子所云離明道所云兩截者是也與子健書以上皆心體廣大神妙豈可把捉幽囚於腔子方寸地其曰求即求以學也學覺也又曰學以聚之惟學則聚矣此心之放以昏昧而放也一覺焉則觸目而是何在非心此心之失以放逸而失也一覺焉則隨在皆心何有於放人心未交於感也湛然虛耳何俟於洗而亦何容於洗也自知識起而吉凶悔吝之感生是故憂患攻取憧憧往來而虛者汨矣聖人示之以卜筮之法使人之於感也知識不用歸於其天而憂悔攻取相忘於無眹之中其為洗心也不已妙歟吾人合下反身默識心是何心惟此視聽言動所以然處便是此心發竅處也此心發竅處便是天地之心之發竅處也知體透露出頭不為聲色臭味埋沒方能率令得耳目口鼻使視聽言動各循其則此即出世而後能經世也子游疑子夏只在儀節上教人不令識本體此初悟時語也子夏以本末原是一貫即草木之根與杪原非兩截故使從灑掃應對上收攝精神漸使自悟此悟後語也反身內觀一無所有唯此些子炯然在此始信人之所為人者唯此明哲體耳此體透徹此身乃為我有不然身且不得而有保此軀殼何用聖人一生汲汲皇皇惟求無忝所生不求出離生死楊太宰博謂余曰吾嘗接遇僚屬視其色若有隔礙然者反而自省曰是必吾中有閡而施之者倨也吾慮下之而色思溫焉彼觀彼色亦因以易而神情融洽矣由是以觀外者內之符而人者已之鑑孟子所以不動心者原所由之路徑與世人殊也使孟子所學在事功一路欲建王霸之業則須據卿相之位乃能操得致之權也顧心一繫於卿相之位則得失毁譽交戰於前雖欲強勉不動不亦難乎孟子生平惟學孔子一路則不藉名位不倚功能仕固可止亦可久固可速亦可譬之行者日緩步於康莊東西南北惟其所適即有颶風巨浪傾檣摧楫心何由動哉學有三關近世在聞識上研窮以為知在格式上修檢以為行此不知即心即道也反觀近裏者又多耽虛執見此不知即事即心也事故皆心也顧有大人之事有小人之事心剖判於此事亦剖判於此事剖判於此人亦剖判於此矣學孔子之學猶業巫函之術者也不必别為制心之功未有不仁者矣舍孔子之術以為學雖均之為仁有不容不墮於矢匠之術者矣故其究也慎術至善即本來無物處也知此乃能親民人之不親皆由中有物耳故先知止朝紳日趨闕下不勝疲苦問節勞之術於方士方士曰第時時默識已身如天大則自不勞矣魏中丞與余入朝余謂之曰常時入朝獨行則覺勞與友同行則勞頓減與同志同行則勞益減何以故中丞曰人已原是相通人而名之曰人以仁也人而去仁則耳目口鼻儼然人也而實非人矣惡乎成名謂其無以成人之名也溫故知新之故即孟子所云天下之言性則故而已之故也惻隱羞惡辭讓是非非外鑠我也我固有之也故曰故溫者反之本心而尋繹溫養之謂也夫一反之固有之性而求之即心有餘師獨夫夜行空谷中未免惴惴心動五尺童子隨其後則貼然厝一星於寒灰則滅羣火在盆中可以竟夜觀此則以友輔仁可識矣人為習氣所移多好放逸時一自警䇿便是禮人為情欲所牿多致抑鬱時一自舒暢便是樂自悟之根蒂而言原無聲臭者曰命自命之流行而言原自不已者曰性口味目色耳聲是人之生機使口不知味目不辨色耳不聞聲便是死人安得不謂之性然則窮到根蒂上此等俱從無生故立命處色聲臭味不能染著合命處方是真性也仁義禮智天道更何聲臭可言故謂之曰命然既著落父子君臣身上來便已降在衷了故忠孝之心自不容已非無形迹可見合性處方是命也今人乍見孺子入井怵惕惻隱之心動處即是天根歸原處即是月窟才參和納交要譽惡聲意思便是人根鬼窟矣吾人應用云為動作食息孰非此根此窟用事俗人懵懵日用不知而賢智者又添一畨意識見解起爐作竈千條萬緒頓令此根不得生生此窟不得潔净齷齪幽暗喫苦一生更無些子受用所以賢智之過與愚不肖等也人受天地之中以生生生之理原是如此即欲掙上尋空寂自是不容已如何上得去即欲退下恣情欲自是不自安如何下得來吾人於一日十二時中精神志意皆有安頓處方有進步處吾人真真切切為已雖僕厮𨽻胥皆有可取處皆有長益我處若放下自己只求别人賢人君子皆不免指摘不作好不作惡平平蕩蕩觸目皆是此吾人原來本體與百姓日用同然者也只此無聲無臭是為真常凡涉色象名號者卒歸消滅只此不為不欲是為本心凡務濶大放散者終墮坑塹天地間大之治亂興衰生死成敗小之稱􅏺贊毁升沉得喪皆相對待然有對之中故有無對者以主宰其上吾人若渾在有對中未免為造化輪轉人只是換這一副心腸人情事變原與俗人一樣以下皆劉調父述言今人到是不為學的處事到安妥反是一種為學的人才遇些小事便處得過當此何以故只是著了些意思不曉得堯舜與人同耳問有不善未嘗不知這不善處顔子與吾人還同否曰不同如鄉黨自好之人發言舉事一不當也㑹知得又如做官的人在上官處稍失禮亦㑹知得顔子要學舜有不如舜處即算做不善問夫子賢於堯舜曰試觀吾輩今日朋友還是享用孔子的還是享用堯舜的精一執中實是淺近道理堯舜一心在安天下如何粗得一些如何夾雜得一些此便是堯舜精一農夫一念在播種便是有農夫之精一啇賈一念在求利便是有商賈之精一但其精神安頓處不同治天下在用人然自己眼不明不㑹知人如何能用人一友問豫儘修行然畢竟不聞道曰修行矣更聞甚道孔子所求乎子臣弟友咸曰未能今子能之又更何學其友有省良知隨事皆然須用在欲明明德於天下上則知乃光大此誤認知識為良知也知即明德若言明德須用在明德上無乃牀上之牀乎吉水諸公之學大率不欲享用現成良知别尋主宰此亦懲冒認良知猖狂自恣者之過耳良知若非現成又豈有造作良知者乎豫嘗謂良知如靈魂然顧投胎何如如骨根不正至於猖狂自恣非良知之罪也亦如靈魂投胎時所遇則然耳泰和王篤菴問虛字難彀手曰吾二十年前曾作致虛工夫一起坐一語默無不放虛字在胸中自覺工夫不踈眼前見人皆散漫不用工頗有輕世自賢之心一日忽省曰此却是致實何曾致虛因悟顔子之問寡問不能舜之好問好察乃真虛也以下皆蘭舟雜述問明體難得到乎曰某為御史出巡值天暑一指揮扶轎見其不耐勞許之乘馬其後指揮隨他御史竟中暍而死即此一事觀之明體一存可以為人立命區區守明覺於一腔亦復何益問三自反之學臨境實難曰但看舜為法於天下可傳後世數語是何等志願所以肯自反今人身子願是鄉人所以要與鄉人相校陸五臺問三聖人同處孟子言之詳矣至孔子所以異處畢竟何在曰孔子只是見得已與聖人同處亦與凡人同故以此學即以此教要使人人皆如此耳處士耿楚倥先生定理耿定理字子庸號楚倥天臺之仲弟也少時讀書不成父督過之時時獨行空谷中憂憤不知所出問之則曰吾奈何不明白若有眼瞎子不知其所謂不明白者何也自是或靜坐一室終歲不出或求友訪道纍月忘歸其始事方湛一最後於鄧豁渠得一切平實之㫖能收視返聽於何心隱得黑漆無入無門之㫖充然自足有問之者曰聞子欲作神仙耶曰吾作天仙不作地仙人仙曰天仙云何曰直從太極入不落隂陽五行天臺聞而呵之曰學不向事親從兄實地理㑹乎曰學有原本堯舜相傳祗是一中子思為之注曰喜怒哀樂未發之謂中今人孰從未發前覷一目哉曰中庸亦只言庸言庸行逹道九經而已曰獨不觀其結語為無聲無臭耶先生論學不煩言說當機指㸃使人豁然卓吾好談說先生不發一言臨别謂之曰如何是自以為是不可入堯舜之道卓吾默然天臺携之見劉初泉先生云且勿言我二人是兄弟時初泉卧病天臺言吾與一醫者同來先生榻前數語初泉驚起已知為天臺之弟謂天臺曰慧能和尚乃是舂米漢哉大開眼人恐不可以弟畜之李士龍來訪先生未與一語及學士龍恚曰吾冒險千里來此踰月不聞一言見教何外我甚先生笑而不答瀕行送之河滸問曰孔子云不曰如之何如之何此作何解士龍舉朱注云云先生曰畢竟是不曰如之何如之何者士龍因有省京師大㑹舉中義相質在㑹各呈所見先生默不語忽從座中崛起拱立曰請諸君觀中因嘆曰舍當下言中沾沾於書本上覔中終主罔矣在㑹因有省者先生機鋒迅利如此耿楚倥論學語廬山駁天臺所性不存語謂當官盡職即為盡性不則為二心為妄念矣即孔子為委吏莫非性之所存楚倥曰孔子為委吏而夢周公却不為二心為妄念乎卓吾寓周柳塘湖上一日論學柳塘謂天臺重名教卓吾識真機楚倥誚栁塘曰拆籬放犬楚倥早嵗曾遇異人質之曰孔子問禮於老聃老聃不言禮而直曰良賈深藏若虛君子盛德容貌若愚何也曰若愚若虛此禮之真體也問伊尹先覺所覺何事曰伊尹之覺非聞見知解之覺也即其若撻之恥納溝之痛此其覺也胡廬山㑹天臺楚倥於漢江之滸相與訂學宗㫖天臺曰以常知為學廬山曰吾學以無念為宗楚倥曰吾學以不容已為宗不容已者從無聲無臭發根從庸言廣行證果禹稷之猶饑猶溺伊尹之若撻若溝視親骸而泚顙遇呼蹴而不屑見入井而怵惕原不知何來委不知何止天命之性如此也故曰於穆不已如摸擬孔氏之匡廓非此不容已者為之血脈則捧土揭木為偶而已孔氏之無聲無臭亦是有形有象孔氏之有形有象原自無聲無臭龍溪言顔子心常止故不遷心常一故不二先生曰否人試觀當怒時中更有個止體在當過時中更有個一體在是二本也即能之其怒其過非真機矣顔子所好唯學即生平之怒以學而怒學外無怒也生平之過以學而過學外無過也可見一生精神只是此學更無滲漏處也默識識天地之化育也夫囿於造化之中而不自識者凡夫也識之而出入造化者聖人也是故不藉名位不矜功能即學以誨即誨以學立已立人逹已逹人蓋贊天地之化育於無疆矣夫贊天地之化育者非獨上之君相賢聖即下之農工商賈細之聾瞽侏跛凡寓形宇內而含靈者皆有以贊天地之化育而不自識也克已者無我也無我則渾然天下一體矣故曰天下歸仁羲文周孔四聖人者之於易亦各言其已也道雖一致而時位不同故作用亦自不同隨時變易以從道俟之萬世而不惑不謬者其孔易乎孔子之於易也學焉耳試取大小象傳玩之卦卦學也爻爻學也學不厭教不倦立已立人逹已逹人易之生生也如是潜見惕躍飛亢自聖人一身觀之隨時變易時象之矣合千聖觀之與世推移各一象矣序卦周易也首乾坤終未濟即周事可覩矣雜卦序孔易也上經首乾坤次比師次臨觀而終之困下經首咸恆而終之夬何以明孔易也乾剛坤柔質弗齊也剛柔善惡均歸之中孔氏之教也比以類聚故樂師任裁成寧無憂乎或智臨於上或相觀以摩無行不與有求則應教乃知困也感之無心居之有恆終以剛决柔純乎乾矣是師道也亦君道也天臺因舉扇悟曰原來通體皆是良知曰通天徹地皆是良知天臺曰人言念菴靜坐曾見光景遂有所得曰只理㑹當下光景耳文端焦淡園先生竑焦竑字弱侯號淡園南京旗手衛人萬厯己丑進士第一人京兆欲為樹棹楔謝以賑饑原籍山東亦欲表於宅改置義田授翰林修撰癸已開史局南充意在先生先生條四議以進史事中止私成獻徴録百二十卷甲午簡為東宫講讀官嘗於講時有鳥飛鳴而過皇太子目之先生即輟講皇太子改容復聽然後開講取故事可為勸戒者繪圗上之名養正圗解丁酉主順天試先生以陪推㸃用素為新建所不喜原推者復搆之給事中項應祥曺大咸紏其所取險怪先生言分經校閲其所摘非臣所取謫福寧州同知移太僕寺丞後升南京司業而年已七十矣先生積書數萬卷覽之略遍金陵人士輻輳之地先生主持壇坫如水赴壑其以理學倡率王弇州所不如也泰昌元年卒年八十一贈諭德南渡時補諡文端先生師事耿天臺羅近溪而又篤信卓吾之學以為未必是聖人可肩一狂字坐聖門第二席故以佛學即為聖學而明道闢佛之語皆一一絀之明道闢佛之言雖有所未盡大槩不出其範圍如言佛氏直欲和這些秉彞都消煞得盡先生曰如此是二乘斷滅之見佛之所訶夫佛氏所云不斷滅者以天地萬物皆我心之所造故真空即妙有向若為天地萬物分疏便是我心之障何嘗不欲消煞得盡即如定性書情順萬事而無情一語亦須看得好孔子之哭顔淵堯舜之憂文王之怒所謂情順萬事也若是無情則內外兩截此正佛氏之消煞也明道言盡其心者知其性也佛所謂識心見性是也若存心養性則無矣先生曰真能知性知天更說甚存養一翳在眼空華亂墜夫存心養性正所以盡心之功識仁篇所言存久自明是也若未經存養其所謂知者想像焉而已石火電光而已終非我有存養其無翳之本體無翳乃可謂之存養安得以存養為翳乎明道言傳燈録千七百人無一人逹者臨死不能尋一尺布帛裹頭先生謂是異國土風是也然此千七百人者生於中國而習異國土風胡謂乎無乃服桀之服也先生又謂明道嘆釋氏三代威儀非不知其美而故為分異夫明道之嘆嘆儒者不能執禮而釋氏猶存其一二也豈以三代之禮樂歸之哉朱國禎曰弱侯自是真人獨其偏見不可開耿叔臺在南中謂其子曰世上有三個人說不聽難相處問為誰曰孫月峰李九我與汝父也焦弱侯論學語學期於上逹譬掘井期於及泉也泉之弗及掘井何為性命之不知學將安用為惡無礙也為善獨有礙乎為善懼有著心也為惡不懼有著心乎以彼所托意出禪宗禪宗無是也內典云無我無作無受者善惡之業亦不亡無作無受者言於有為之中識無為之本體云爾未嘗謂惡可為善可去也又云善能分别諸法相於第一義而不動言分别之中本無動搖云耳未嘗謂善與惡漫然無别也答耿師佛氏所言本來無物者即中庸未發之中之意也未發云者非撥去喜怒哀樂而後為未發當喜怒無喜怒當哀樂無哀樂之謂也故孔子論憧憧往來朋從爾思而曰天下何思何慮於憧憧往來之中而直指何思何慮之本體也伯淳斥佛其言雖多大扺謂出離生死為利心夫生死者所謂生滅心也起信論有真如生滅二門未逹真如之門則念念遷流終無了歇欲止其所不能已以出離生死為利心是易之止其所亦利心也然止亦非殄滅消煞之云也艮其背非無身也而不獲其身行其庭非無人也而不見其人不捐事以為空事即空滅情以求性情即性殄滅消煞則二乘之斷見矣同上吾人應事雖屬紛紜乃其樞紐之者却是一物所謂隨事體驗云者於紛紜中識取此一物而已得此入手如馬有銜勒即縱橫千里無不如意此顔子之所謂禮也工夫只是復禮能約於禮則視聽言動頭頭是道奚繁且勞之慮焉原憲不識源頭却以支派求之用力愈勤去之愈逺何者人之在道如魚之在水疑生智隔乃覺其離茍破疑城即登彼岸非無疑之外更有彼岸可登也答陳景湖仕而優即為學不必離仕求學也學而優即為仕不必離學求仕也優者無困於心而自得之之謂答人問人之不能治世者只為此心未得其理故私意糾棼觸逄成窒茍得於心矣雖無意求治天下而本立道生理所必然所謂正其本萬事理也藉令悟於心而不可以治天下則治天下果何以而良知為無用之物矣禮也者體也天則也是禮也能視聽能言動能孝弟能賢賢能事君能交友可以為堯舜可以通天地可以育萬物人人具足人人渾成所謂與天地萬物為一體者乃其體自如是非我强與之一也學者不知目之自視又為視以視之不知耳之自聽又為聽以聽之不知口之自言身之自動又為言動以言動之此所謂已也夫不識不知順帝之則苟率於已則知識耳矣意必固我耳矣何天則之能順乎人之性體自定自息大學之知止易之艮正論此理非強制其心之謂也不然既為神明不測之物則豈人力所能束縳之而茍其為束而縳之則亦不可言定不可言息矣問但盡凡情别無聖解乃日求聖解而凡情不盡奈何曰語非不佳苐所指凡情不同耳其人固問曰即聖解是也安於所傷則物不能傷物不能傷而物亦不傷之詩言遍為爾德在日用飲食日用飲食何人不爾而獨指之為德則悟不悟之謂耳在聖非豐在凡非嗇悟之非增迷不非損雖然未有不悟而道為我有者所以貴知味也性未易知不得不精思以求之非隨事體察之謂知性則人倫日用不必致力而自當若本之未立但逐事檢㸃自以為當只落世儒義襲窠臼而於道愈逺矣覺字最難說今人世情略能放下道理略能分疏便自謂覺此猶夢中語耳若是真覺無不了了如睡者醒眼一開萬象分明厯厯皆見何有漸次某往日看世人無一當意然只是自心未穩妥非干人事净名經云仁者心有髙下故見此土為不净耳若真能致中和者豈有不位之天地不育之萬物哉答友人問釋氏王伯安言佛氏言無吾儒豈能加個有且以出離生死為念則於無上不免加少意所以與吾聖人異曰出離者人法俱空能所雙遣何以言加古云黃老悲世人貪著以長生之說漸次引之入道余謂佛言出離生死亦猶此也蓋世人因貪生乃修𤣥𤣥修既徹即知我自長生因怖死乃學佛佛慧既成即知我本無死此生人之極情入道之徑路也儒者或謂出離生死為利心豈其絶無生死之念耶抑未隱諸心而漫言此以相欺耶使果毫無悅生惡死之念則釋氏之書政可束之髙閣苐恐未悟生死終不能不為死生所動雖曰不動直強言耳豈其情乎又當知超生死者在佛學特其餘事非以生死脅持人也周茂叔言看一部華嚴經不如看一艮卦如何曰此言是也學者茍能知艮卦何須佛典苟能知自性又何須艮卦程伯淳言釋氏說道如以管窺天祗是直上去如何曰否道無上下伯淳言佛氏直欲和這些秉彞都消煞得盡然以為道畢竟消煞不得如何曰安得此言如此是二乘斷滅之見正佛之所訶也伯淳言佛有個覺之理可謂敬以直內矣然無義以方外如何曰覺無內外伯淳言佛唯務上逹而無下學然則其逹豈有是也曰離下學無上逹佛說種種方便皆為未悟者設法此下學也從此得悟即名上逹學而求逹即掘井之求及泉也泉之弗及掘井奚為道之弗逹學將安用伯淳言盡其心者知其性也佛所謂識心見性是也若存心養性則無矣曰真能知性知天更說甚存養盡心知性所謂明得盡渣滓便渾化是也存心養性所謂其次莊敬以持養之是也即伯淳之言可以相證然釋氏亦有保任之說是否曰古語不云乎一翳在眼空華亂墜伯淳言傳燈千七百人無一人逹者不然何以削髮緇服而終曰削髮緇服此異國土風文中子所云軒車不可以適越冠冕不可以之夷者也然要知彼笑軒車冠冕不若我之笑削髮緇服者耶故老聃至西戎而效彼言禹入裸國欣然而解裳局曲之人蓋不可道此伯淳言佛窮神知化而不足以開物成務如何曰學不能開物成務則神化何為乎伯淳嘗見寺僧趨進甚恭嘆曰三代威儀盡在是矣又曰灑掃應對與佛家默然處合則非不知此理而必為分異如是皆慕攻異端之名而失之者也不知天下一家而顧遏糴曲防自處於偏狹固執之習蓋世儒牽於名而不造其實往往然矣乃以自私自利譏釋氏何其不自反也伯淳言釋氏之學若欲窮其說而去取之則其說未能窮固已化而為佛矣且於跡上攻之如何曰伯淳未究佛乘故其掊擊之言率揣摩而不得其當大似聽訟者兩造未具而臆决其是非贓證未形而懸擬其罪案誰則服之為士師者謂宜平反其獄以為古今之一快不當隨俗爾爾也尚寶潘雪松先生士藻潘士藻字去華號雪松徽之婺源人萬厯癸未進士司理溫州入為監察御史巡視北城有二奄闌出宮門調女婦執之羣奄奪去先生移文司禮監司禮以聞上怒曰東厰職何事而發自外廷耶命杖二奄一奄死奄人由是恨之因火灾陳言共摘疏中語為歸過賣直謫廣東照磨晉南京吏部主事改尚寶司丞升少卿卒年六十四先生學於天臺卓吾初至京師入講學之㑹如逺方人驟聽中華語錯愕不知所謂得友祝延之世祿時時為述所聞隨方開釋稍覺拘迫輒少寬之既覺心懈輒鞭䇿之久之轉展閉塞憤悶日甚延之曰經此一畨苦楚是一生得力顧却無可得說一日自西長安街馬上忽省曰原來只是如是何須更索馳質之延之延之曰近是曰戒慎恐懼如何用功曰識此渠自會戒慎自會恐懼相與撫掌已相戒曰此念最易墮落須時時提醒醖釀日深庶有進步出京别天臺天臺曰至淮謁王敬所入安豐訪王東崖此老頗竒即戲語亦須記過金陵再叩焦弱侯只此便是博學之先生一一如教始覺宇宙之無窮從前真陷井之蛙也潘去華雪松堂日録問何當使心在腔子裏不至出入無時耿師天臺曰心體原是活潑一出一入神觸神應生生之機至妙今欲其常入無出是死却生機矣耿師為教不事言詮只欲於尋常言動認出真性流行聚朋談究不為要眇之論要於當下便識本心自著自察便是下手用力處嘗謂朋友之益但當於其精神觸發與其用意懇至處得之只此便是真性顯行不在區區同異校勘也初謁卓吾質所見一切掃之他日友人發四勿之㫖卓吾曰只此便是非禮之言當時心殊不服後乃知學者非用倒藏法盡將宿聞宿見平生深閉牢據者痛加割剝不留一些在骨髓裏作梗殆未可與語至學問已見頭腦用過工夫依舊為我受用卓吾言讀書須以我觀之始得某曰正為今未有我在愚夫愚婦可知可能此皆不由學習任意觸發更無遮蓋矯強最可觀性只為尋常不著不察自己真性不顯此等皆蒙蔽了覺百千計較皆從此生須從大處悟入却細細從日用瑣屑一一不放過三千三百皆仁體也聖人所以下學而上逹默識二字終身味之不盡才涉擬議非默識才管形迹非默識才一放過非默識才動聲色非默識才以意氣承當非默識終日如愚參前倚衡如見如承亦臨亦保此默識景象也為善須要直截發揮得出只從心之不可忍處脫體做去不必瞻前顧後凡事無所為而為到底天自有安排恰好處所以君子修之吉此學有日新之機此機一息便非天命本體拈弄得熟此中如風火輪相似眼前不愜意處隨就銷鑠眼前可意處不當毫毛直是歇手不得困而不學民斯為下記云學然後知困今人尚未知困在不患無位患所以立立者四無倚附屹然是非毁譽之中所謂八風吹不動也非一㸃靈明自作主張鮮不仆矣仁不可見要觀其用處用之藏即仁也喜怒哀樂純是天機流行不著已不著人便是逹天德曰天德何處著得人為何處著得已見須是酬酢紛紜中常常提醒收拾久之自有不存之存人身常要𥪡立得起少有放鬆昏怠之氣隨之矣惟能常常挺然𥪡立不令放倒此凝神馭氣之要訣立身自有易簡之道切弗冀望只是聽命切勿觀望只是信心程子言敬是惺惺法惺惺是吾人性根無有泯昧時即天命之不已者也人從無始劫以來便受五濁六鑿之纍自性常埋沒不顯故須識此惺惺之體以惺惺不昧之功存之學者不知一念之差已為跖之徒也故視得志之人負於國家往往竊嘆之豈知已之汲汲營利是其植根而得志之時不過成就結裹之耳吾身喜幾動而一念和氣充襲於人人於我了無間隔覺有欣欣向榮之意此便堯舜帥天下以仁而民從之若值怒時眼前暴氣充塞父子兄弟情意阻間不通俱作惡念相向此便是桀紂帥天下以暴而民不從明經方本菴先生學漸方學漸字逹卿號本菴桐城人也少而嗜學長而彌敦老而不懈一言一動一切歸而證諸心為諸生祭酒二十餘年領歲薦棄去從事於講學見世之談心往往以無善無惡為宗有憂焉進而證之於古遡自唐虞及於近世摘其言之有關於心者各拈數語以見不覩不聞之中有莫見莫顯者以為萬象之主非空然無一物者也然先生之言煞是有病夫心體本空而其中有主宰乎是者乃天之降衷有無虛實通為一物者也渣滓盡化復其空體其為主宰者即此空體也若以為虛中有實岐虛實而二之豈心體之本然哉故先生以不學不慮理所固然欲亦有之但當求之於理不當求之於不學不慮不知良知良能之不學不慮此繼善之根也人欲之卒然而發者是習熟之心為之豈不學不慮乎先生欲辨無善無惡心之體而自墮於有善有惡心之體矣是皆求實於虛之過也先生受學於張甑山耿楚倥在泰州一派别出一機軸矣心學宗人心道心非謂心有二也危髙大也人心之量本自髙大其中道理則極精微心危而微故謂之中何以執之必也惟精乎精於求微乃充滿其惟危之量而道始歸於一一則中矣此允執厥中之㫖也談道之士慕髙大而忽精微必至於蕩而多岐矣此理在天為明命在人為明德顯然共見無所用隱也人自弗之顧耳文王敬止者非止以事止以心也一心發之為仁敬孝慈信是一止而衆止五者根於一止則衆止總一止矣理無上下學乎下所以逹乎上中人以上可以語上謂其悟上於下之內也中人以下不可以語上謂其慕上於下之外也隂陽以理言故謂之道此道生生毫無殺機故曰善得此而成性其善可知此君子之道也理寓於氣氣不能不殊得氣之偏者所見亦偏仁者以道為仁智者以道為智得氣之濁者日用乎道而不知其為道故性善之理不明於天下而知道者鮮矣知者德之知非見聞之知也物者吾心所接之物非泛言天下之物也格正也去不正以歸於正也致知者非可以空虛想像而致在正其所接之物使各當於理而得其宜焉則致知有實功矣上天之載大德敦化實有為之載者藏於無聲無臭之中非無聲無臭之為載也君子敬信篤恭實有是德涵於人所不見之中非徒不顯而已也孟子指理義根於心而後之人曰在物為理處物為義此異說所由起也或問物理者何曰物在外物之理在心提吾心則能物物是理在心而不在物也心出於理則放心入於理則存求放心者常存仁義而已心外無性心外無天一時盡心則一時見性天一事盡心則一事見性天無時無處不盡心則無時無處不見性天存之養之常盡心而已矣夭夀修身純於盡心而已矣此孔門之心法也仁義禮智根於心異端以心為空是無根也誠者善之本體幾者誠之發用本體既善發用亦善但既發則其善有過有不及就其過不及名之為惡是善本滴派惡乃孽支善其本來惡則半途而來非兩物相對而出也識仁則見本原然非一識之後别無工夫必勿忘勿助誠敬存之則識者永識實有諸身不然此心終奪於物欲雖一時有識祗為虛見而不能實有諸身矣灑掃應對是下灑掃應對之心是上心要在腔子裏腔子天理也根本是未發之枝葉枝葉是已發之根本但見冲漠無朕不見其中有萬象之根是謂根本無枝葉後來欲芟枝葉以還根本也可乎張子所謂大其心即孟子盡其心也大者非馳騖空虛但視天下無非我而已盡者非窮極分量但隨在不有我而已仲尼之道盡於忠恕忠恕則大其心矣盡其心矣與天地萬物相流通而性天現前矣性具於心謂之道心善學者求道於心不求道於事物善事心者日用事物皆心也此理涵於物先流於物後超於物外貫於物中自今求之其在物先物外者不可測而在物後物中者有可見因其可見求其不可測因物後以知物先因物中以知物外切實易簡所謂中庸之學也今之學者異於是以物後為迹而元想於物之先以物中為粗而馳騖於物之外見以為髙也而日用則疏矣主一者主於理也不主於理但空其心以事來不亂物去不留為心之妙境而揆事應物不免失則惡在為聖人之學乎慎獨者聖學之要當其燕居獨處之時內觀本體湛然惺然此天理也存理而欲自退是第一著工夫內觀此中稍有染著此人欲也檢察欲念從何起根掃而去之復見本體遏欲以還理是第二著工夫兩者交修乃慎獨之全功也流行者氣也主宰者理也知理之為主則知從事於氣者之非學矣未萌之先誰為防之方萌之際誰為克之唯天理為之主時時提醒則人欲自去中庸大學非有二功所謂格物者不過於應物時戒慎恐懼求當於天理而已矣虛靈中有理為事之根奈何以虛靈為無乎集注明德者人之所得乎天而虛靈不昧以具衆理而應萬事者也今學者刪之曰明德者虛靈不昧之德也刪去理字則無禮刪去事字則無用但云虛靈不昧則混於釋氏靈明之說而非大學之本㫖矣理無常形此心至當處即天理也然有欲中之理有理中之欲循理則苦心亦天然從欲則適情亦安排非致知者孰能識之良知純任天理世有真實而不盡合於天理者其真實所發祗成自私自利而非天命人心之本然若夫誠則明明則誠良知即真實真實即良知聖賢曰心異端亦曰心相似而難辨說者以為本體同而作用不同天下豈有一根而榖莠兩出者乎蓋心一而見殊學始岐於天下人之觀心猶觀天管窺則天管牖窺則天牖登泰山而後見天之大大不可測仰而睨之曰太清太虛不知清虛天之象也非天之所以為天也唯聖人獨觀清虛之宰而曰誠者天之道曰於穆不已曰大哉乾元夫不已之誠所稱繼善非乎是一元之理百物之所生也四時之所運也天之所以為天也唯心亦然觀心於一曲管牖之窺也其小者也八荒我闥泰山之眺乎眺而不得八荒之際還而內顧莫可端倪則以為不覩不聞至矣夫心之不可覩聞也從其觀於外也蓋有莫見莫顯者藏於不覩不聞之中所謂未發之中天下之大本是也從外而觀亦淺之乎其觀者烏覩心之所以為心哉彼異端者雖亦曰明心不明乎善而空之則見以為心者謬矣王龍溪天泉證道記以無善無惡心之體為陽明晚年之密𫝊陽明大賢也其於心體之善見之真論之確蓋已素矣何乃晚年臨别之頃頓易其素不顯示而密傳倘亦有所附㑹而失真歟桐川語録南臯輯宗儒語略欲學者由茲直證本心夫以諸儒之語證吾心不若以吾心證吾心之為證也以吾心之所發還而證吾心之所存以吾心之所存出而證吾心之所發乃所為真也執鄰之影索鄰之神則眩執吾之影索吾之神則亦眩况執鄰影證吾神而索之乎君子所以貴自得也孟子以不慮之知不學之能為良亦指不學不慮之最善者而言凡惻隱羞惡辭讓是非之心卒然而感自然而應皆不假於慮學從理根而發是良知良能愛親敬長乃其發見之真切者至於耳目口鼻四肢之欲亦非慮而知學而能但從欲根而發不得為良知良能凡言良者重於善非重於不慮不學即慮知學能而善亦謂之良可也知其所由由而能知乃為聖學若求知於所由之外則墮於虛見而非知行合一之知矣道形上器形下謂器不能該乎道者非也凡人所學總屬之下莫載莫破皆下也其理不可見聞則上也不徒曰上而曰形上形即器也安得求道於器之外乎天理人欲原無定名以其有條理謂之理條理之自然謂之天動於情識謂之欲情識感於物謂之人故天理而滯焉即理為欲人欲而安焉即欲為理凡欲能蔽其心而理則心之良也心者人之神居中應外至虛而至實者也楞嚴七徴歸於無著之地彼以空立教巧設辨難卒歸於空以為明心其實祗見一偏耳夫心無在而無不在唯無不在則七徴莫非心之所在惟無在則偏於無著之地亦非心之所在徐令問知行並進聖人之學也何獨重良知乎曰君侯稱知縣不稱行縣何也易曰乾以易知良知乾道也行特知之實事耳二氏皆言心也而所見於心者異皆言性也而所見於性者異皆一也而所見為一者異皆靜也而靜中所見者異人心合有無隱顯而一之儒者見心之全體故曰仁人心也又曰仁者人也釋氏見心之空不見空之所有故於人道一切掃而空之老氏見心之虛不見虛之所含故推天下國家而外之譬之天儒見天之全空虛是天四時百物皆是天釋老但知天為空虛遂以四時百物為幻妄所見固不同也性則心之所具之理儒言性善是見性之本原性本善故位育總歸於善釋以空為性雖謂山河大地皆佛性其意悉歸之空老氏鍊神還虛則又以氣之清虛者為性見益淺矣儒所謂一者理也釋所謂一者空也老氏守一則守中耳守一滯於氣歸一溺於空總著一偏孰若一理貫通萬事變化不測而無所偏乎陽明曰循理之謂靜從欲之謂動儒之靜主於理釋之靜則寂滅而枯槁老之靜則專氣致柔反矯天理而去之然則三家之言雖均之心性均之一均之靜而其㫖則霄壤矣郎中何克齊先生祥何祥號克齊四川內江人官至正郎初事南野於太學大洲謂之曰如南野汝當執贄專拜為師可也先生如其言南野笑曰豫官太學即師也何更以贄為先生謂太學生徒衆矣非此不足以見親切也南野乃受之凡南野大洲一言一動先生必籍記之以為學的京師講㑹有拈識仁定性者先生作為講義皆以良知之㫖通之大洲有詩贈之云君辭佳麗地來補昔巢居豫亦同方侶高懸合軼車已指角里訣新注紫陽書灼艾消殘病紉衣返太初忘形非避俗覿體即真如荷菂種已大杞苖耘正疏烟波用無盡棹笠溪有餘願附𤣥真子扁舟縱所如先生之學雖出於大洲而不失儒者矩矱耿定力曰大洲法語危言砭人沉痼先生溫辭粹論輔人參苓其使人反求而自得本心一也何克齊講學為學在求放心如思慮過去未來事都是放心但只存得此心常見在便是善學了人只是一個心心只是一個志此心推行得去便是盛德大業故自古上士不患不到聖賢患此心不存不患做不出功業患此心不見道耳人於良心上用則聰明日增於機心上用則聰明日減祥問南野師曰良知即是志若起心動念却是妄曰志不是起心動念志是明之果確處南野師謂祥曰謂一貫如繩引珠然繩自繩珠自珠是兩物不足以明一貫又謂以一貫萬然一與萬亦有對待不足以明一貫夫子蓋言吾道只是一件曾子以忠恕明之說者謂忠是一恕是貫非也忠恕只是一心如冬時思量父母寒便能度親之心去做溫的道理夏熱亦如是忠恕如何分得而已矣是貫字之義凡日用倫物皆此忠恕再無他道又謂曾子學久然後聞此亦不然史記曾子少孔子四十六嵗逮孔子卒時只二十七嵗耳則聞一貫方在年少之時蓋此道必體立而後用行未有學於用而得之者學者初學便當知此一貫學方得不差大洲先生出城過生舍家兄問養生先生笑曰莫怕死人之壽甚長時祥聞之知先生别有所指也問曰此道體不息也工夫如何用先生曰適見公聽得分明只此聽得明底便是工夫祥悟曰道不逺人聽聰者是工夫不用安排自然者是自此不復騎驢覔驢矣大洲先生曰學者先須識得良知本體又曰能居敬則舉動自不輕易而所行自簡矣通解論學書昨所解明道先生識仁書雖章意頗明然解中未及仁之源頭處蓋求仁雖識得源頭則發用流行處自昧不得所謂源頭先儒已明言之矣橫渠張子云虛者仁之源康節邵子云惻隱來何自虛明覺處真張子所謂虛邵子所謂虛明覺處乃仁之源頭也欲識此源頭須端坐澄心默察此心虛明本體識得虛明本體即是仁體即是未發之中矣所謂靜亦定者此也由此隨感而應疾痛之事感而惻隱生不義之事感而羞惡生交際感而恭敬生善惡感而是非生千變萬化莫非仁之用也故曰義禮智信皆仁也又曰經禮三百曲禮三千無一事非仁也然用未嘗離了虛明本體如明鑑之應物妍􅑦畢見空體自如此即動亦定也故程子謂體用一原顯微無間但於靜中識得個源頭動處方得不迷耳白沙先生云學者須於靜中養出個端倪方有商量處所謂端倪者非虛明之呈露乎然須識得心之本體原自虛明非是人為做出來的靜坐時只歇下雜念本體自見切莫將心作虛明想若將心作虛明想即此想念反障虛明矣程子因人思於喜怒哀樂未發之前求中答云既思即是已發矣正謂此也然欲歇妄念不可強制但只常常著精神不使昏沉妄念自歇何者真心是主妄念是客主常在客安能久停故妄念起時良知自覺一覺妄息當體虛明象山陸子云知非則本心自復又何用強制乎古云不怕念起惟恐覺遲朱子亦云警覺操存反其昏妄此則用工之要也然妄念既覺之時不當復計前妄若既覺而計妄則即此計念不離於妄是以妄追妄妄念愈不停矣古人譬之無風起波正謂此也夫既已息妄又不計妄此時之心靜定清明如太虛一般既無體質亦無邊際此則心之本體即當安汝止矣不當舍此更求真也若更起心求真即起求之心是又一妄矣無起求心當下虛明本體即得到此又不得著此虛明之意象也若著此意象亦屬妄想執此為工夫是認賊做子以病為藥何日得見本來面目乎透此一關漸識心體即此隨感而應莫非此體所謂一以貫之也然於妄念未免乘間而起比之靜時尤為心害何也靜坐之時妄念雖萌猶未臨境故雖起易滅應物之時念與境交易於染著故一起難滅於此尤當加研幾之功故忿心初起則必懲欲心初動則必窒見善則必遷有過則必改必如惡惡臭如好好色求自慊而後已如是則克已工夫無間於動靜妄念始不能為心害矣濂溪周子有云君子乾乾不息於誠然必懲忿窒欲遷善改過而後至至哉言也聖學工夫不越是矣舍是則虛談矣識之識之然此學人多不講縱講之亦不肯奮然向往以求自得蓋緣未辨世間真假故逐假迷真耳此正受病之原也吾將有以明之孟子不云乎君子所性雖大行不加焉窮居不損焉分定故也邵子亦云身在天地後心在天地先天地自我出自餘安足言是知心性也者體無加損為天地根非至真乎孟子又云人之所貴者非良貴也趙孟之所貴趙孟能賤之是知名利也者豫奪由人等於浮雲不亦假乎世人倒見認假為真决性命以赴之卒老不悔不知天下有至貴至富不加不損無豫無奪而異乎彼者顧舍之不求不亦可哀耶汝宜髙著明眼於此真假路頭明辨决斷一意為真是求不得不止則真假不惑念頭自清前之所謂妄念者漸消釋矣妄消真復便識得仁體反身可誠而樂莫大焉矣便能性定廓然大公物來順應而合天地之常矣至此則天下何以尚之不此之務乃悠悠而與世之無志者耽著眼前虛花便執以為究竟之事豈不可惜豈不可惜汝資禀篤實強毅辨此非難從此决志未晚也工夫依此做去當有悟處勉之勉之給事祝無功先生世祿祝世祿字延之號無功鄱陽人由進士萬厯乙未考選為南科給事中當緒山龍溪講學江右先生與其羣從祝以直惟敬祝介卿眉夀為文麓之㑹及天臺倡道東南海內雲附景從其最知名者則新安潘去華蕪隂王德孺與先生也去華初入京師雖親講㑹不知為學之方先生隨方開釋稍覺拘迫輒少寬之既覺心懈輒鞭䇿之終不為之道破使其自得先生謂吾人從有生來習染纒絆毛髮骨髓無不受病縱朋友善攻人過亦難枚舉惟是彼此互相虛下開一條受善之路此真洗滌腸胃良劑故終身不離講席天臺以不容已為宗先生從此得力身在心中一語實發先儒所未發至謂主在道義即蹈䇿士之機權亦為妙用此非儒者氣象乃釋氏作用見性之說也古今功業如天空鳥影以機權而幹當功業所謂以道殉人遍地皆糞土矣祝子小言學者不論造詣先定品格須有鳯凰翔於千仭氣象方可商求此一大事不然渾身落世情窠臼中而因人起名因名起義輒號於人曰學何異濁纓泥滓之渦振衣風塵之路冀還純白無有是處患莫患於不自振洪範六極弱居一焉一念精剛如弛忽張風飛雷動奮迅激昂羣疑以亡諸欲以降百行以昌更有何事世之溺人久矣吾之志所以度吾之身不與風波滅沒者也操舟者柁不使去手故士莫要於持志元來無窮上天下地往古來今總游我無窮之中目終日視萬色而視不匱耳終日聽萬聲而聽不匱口終日言萬緒而言不匱身終日動萬應而動不匱是何物者耶奈何立志不堅覿體不親將此無窮者以瓦礫委之歟故曰宇宙未嘗限隔人人自限隔宇宙學在知所以用力不見自心力將何用試觀不識一字凡夫臨不測之淵履欲墮之崖此時此心惺惺翼翼不著纎毫入聖微機政復如是不則逐名義而捉意會為力彌勞去道彌逺學人恆言用心用心實難祗用耳目爾日光萬古長圓月受日光三五缺焉心與耳目之用似之見人不是諸惡之根見已不是萬善之門儒者論是非不論利害此言非也是非利害自有真真是而真利應真非而真害應以此提衡古今如鼓答桴未有爽者人知縱欲之過不知執理之過執理是是非種子是非是利害種子理本虛圓執之太堅翻成理障不縱欲亦不執理恢恢乎虛已以游世世孰能戕之謬見流傳心在身中身中直一團心耳原來身在心中天包地外身地也心天也海起浮漚身漚也心海也未有此身先有此心幻身滅後妙明不滅所以孔子許朝聞而夕可莊生標薪盡而火傳天之運川之流木之華鳥之韻目之盻鼻之息疾痛之呻吟豈因名義為之自有不能已也吾志吾道乃因人為起滅不名為志問內持一念外修九容可以為學乎曰唯唯否否念不可持也容可修而不可修也仁守莊蒞知實先之弗然者妄持一念賈胡襲燕石之珍徒飭九容徘優作王公之狀為僞而已矣德輶如毛非以毛比德也知德不徹有這一絲在便損全力須是悟到無聲無臭處問所存者神曰情識不生如空如水問所過者化曰雁度長空影落寒水雁無留迹水無留影人必身與心相得而後身與世亦相得不然身與心為讐將舉身與世亦相讐得則俱得讐則俱讐讐苦之趣也得樂之符也學不二境乃見學力肅之乎賔友之念忽之乎衆庶之臨得之乎山水之間失之乎袵席之上吾甚恥之中庸非有二也識此理而保任之為戒慎恐懼之中庸識此理而玩弄之為無忌憚之中庸王新建在事業有佐命之功在學問有革命之功蓋支離之說漫灌入人心髓久矣非有開天闢地大神力大光明必不能為吾道輯此法輪大人無多伎倆只不失其赤子之心若曰擴而充之便蛇足矣然則本體外更無工夫乎曰大人原無本體赤子自有功夫石中有火擊之乃見乍見孺子入井莫不怵惕惻隱之心孟子特於石火見處㸃之欲人因擊之火悟火在石中不擊亦有夫擊之火火之可見者也不擊之火火之不可見者也見可見之火不過見火之形見不可見之火而後見火之性雲白山青川行石立花迎鳥笑谷答樵謳萬境自閒人心自閙恆言學問蓋有學必有問問由學生也每見友朋相聚不切身從自家神理不通功夫做不去處討求而低眉緘口乂手齊足壇場冷落於是或拈話柄或掉書囊設為問目其問不必關於學其答不必關於問浪問浪答徒長一畨游談惡習何益底裏事學者漫自隨人言句轉且只道本體是什麼物工夫是如何下原來本體自不容已不容已處是工夫若以工夫存本體是猶二之權勢之門其利害入幕之客不能見而千里之外見之仁義之門其是非摳衣之士不能定而百世之下定之作用須觀其所主所主在道義即蹈跡䇿士之機權亦為妙用所主在權利即依心聖人之名教祗為借資矣古人言句還之古人今人言句還之今人自家如何道道得出是名真信真信者無不信一信忽斷百疑道不出方發真疑真疑者無乎不疑百疑當得一信學莫病於認識作知知與識疑而致甚逺知從性生識從習起知渾識别知化識留嬰兒視色而不辨為何色聞聲而不辨為何聲夫知視知聽知也辨色辨聲識也非知也真知之體即能辨不加不能辨不損也明儒學案卷三十五
