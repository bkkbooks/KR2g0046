body:
  text: 明儒學案卷十三餘姚黃宗羲撰浙中相傳學案三知府季彭山先生本季本字明德號彭山越之㑹稽人正德十二年進士授建寧推官宸濠反先生守分水關遏其入閩之路御史以科場檄之入闈先生曰是之為不知務不應召召拜御史御史馬明衡朱浙爭昭聖皇太后孝宗后壽節不宜殺於興國太后下獄先生救之謫揭陽主簿遷知弋陽桂蕚入相道弋陽先生言文成功不可泯遂寢奪爵轉蘇州同知升南亰禮部郎中時鄒東廓官主客相聚講學東廓被黜連及先生謫判辰州尋同知吉安升長沙知府鋤擊豪强罷歸嘉靖四十二年卒年七十九少師王司輿名文轅後師事陽明先生之學貴主宰而惡自然謂理者陽之主宰乾道也氣者陰之流行坤道也流行則往而不返非有主於內則動靜皆失其則矣其議論大抵以此為指歸夫大化只此一氣氣之升為陽氣之降為隂以至於屈伸往來生死鬼神皆無二氣故隂陽皆氣也其斥而必降降而必升雖有參差過不及之殊而終必歸一是即理也今以理屬之陽氣屬之隂將可言一理一氣之為道乎先生於理氣非明睿所照從考索而得者言之終是鶻突苐其時同門諸君子單以流行為本體玩弄光影而其升其降之歸於畫一者無所事此則先生主宰一言其關係學術非輕也故先生最著者為龍惕一書謂今之論心者當以龍而不以鏡龍之為物以警惕而主變化者也理自內出鏡之照自外來無所裁制一歸自然自然是主宰之無滯曷常以此為先哉龍溪云學當以自然為宗警惕者自然之用戒愼恐懼未嘗致纖毫之力有所恐懼便不得其正矣東廓云警惕變化自然變化其旨初無不同者不警惕不足以言自然不自然不足以言警惕警惕而不自然其失也滯自然而不警惕其失也蕩先生終自信其說不為所動先生憫學者之空疏祇以講說為事故苦力窮經罷官以後載書寓居禪寺迄晝夜寒暑無間者二十餘年而又窮九邊考黃河故道索海運之舊跡别三代春秋列國之疆土川源涉淮泗歷齊魯登泰山踰江入閩而後歸凡欲以為致君有用之學所著有易學四同詩說解頥春秋私考四書私存說理會編讀禮疑圖孔孟圖譜廟制考義樂律纂要律呂别書蓍法别傳總百二十卷易學四同謂四聖皆同也朱邵分為羲皇之易文周之易孔子之易先生正之是也但辭變象占一切不言則過矣至大傳則以為秦漢而下學者之言祖歐陽氏之說也春秋私考則公穀之義例左氏之事實推破不遺餘力詩說解頥不免惑於子貢之僞傳如以定之方中為魯風謂春秋書城楚丘不言城衛以內詞書之蓋魯自城也故詩之秉心塞淵騋牝三千與駉篇恰合由是以三傳小序皆不足信蓍法用四十八䇿虛二以為隂陽之母分二掛一揲四歸奇三變皆同除掛一外左一則右必二左二則右必一左三則右必四左四則右必三既以大傳非孔子之言故不難改四十有九為四十八耳此皆先生信心好異之過也間有疑先生長沙之政及家居著禮書將以迎合時相則張陽和辨之矣說理㑹編理氣只於陽中隂隂中陽從微至著自有歸無者見之先儒謂隂陽者氣也所以一隂一陽者道也又曰不離乎隂陽而亦不雜乎隂陽則似隂陽之中自有一理也殊不知理者陽之主宰氣者隂之包含時乎陽也主宰彰焉然必得隂以包含於內而後氣不散時乎隂也包含密焉然必得陽以主宰於中而後理不昏此隂中有陽陽中有隂所謂道也通乎晝夜之道而知知即乾知大始之知正謂主宰晝之知主宰之應於外也雖當紛擾而貞一自如夜之知主宰之藏乎內也雖入杳冥而一警即覺此唯隂陽合德者能之知主宰之為知則知乾剛之為理矣知理則知陽知陽則知隂矣自然者順理之名也理非惕若何以能順舍惕若而言順則隨氣所動耳故惕若者自然之主宰也夫坤自然者也然以承乾為德則主乎坤者乾也命自然者也命曰天命則天為命主矣道自然者也道曰率性則性為道主矣和自然者也和曰中節則中為和主矣茍無主焉則命也道也和也皆過其則烏得謂之順哉故聖人言學不貴自然而貴於謹獨正恐一人自然則易流於欲耳自然者流行之勢也流行之勢屬於氣者也勢以漸而重重則不可反矣惟理可以反之故語自然者必以理為主宰可也謂天非虛不可然就以虛言天則恐著虛亦倚於氣而其動也為氣化如日月星辰水火土石風雨露雷鳥獸蟲魚之類有隨其所重而莫節其過者矣蓋虛貴有主有主之虛識存於中是為健德健則虛明感應因物曲成無有不得其所者是物之順也夫誠形而上者也物形而下者也形而下者主於形而上者則氣統於性矣茍無此誠其德不健則為著空之虛物無所主任其往來而已形而上者墮於形而下者則性命於氣矣人之性與天地之性一也故隂陽和風雨時鳥獸若草木裕惟健故能順也若夫日蝕星流山崩川竭歲歉年凶胎衄卵殰氣之不順是健德不為主也天之性豈有不健哉為氣所乘則雖天之大亦有時而可憾耳故所惡於虛者謂其體之非健也性不可見因生而可見仁義禮智本無名因見而有名程子曰人生而靜以上不容說謂性之本體無聲無臭不可以言語形容也又曰才說性時便已不是性也謂感物而動生意滋萌有惻隱之心可見而其名為仁矣有羞惡之心可見而其名為義矣仁義者由性而生相繼不絶善端之不能自己者也故曰繼之者善也自其成善之本而言則性矣故曰成之者性也聖門所謂道者自人率性而言以剛健而主宰乎氣化者也故其發也至精不雜謂之中節若不就主宰上說道則浮沉升降自去自來乃氣之動耳犬牛與人全無所異佛老之學於義不精隨氣所動惟任自然而不知其非者矣聖人以龍言心而不言鏡蓋心如明鏡之說本於釋氏照自外來無所裁制者也而龍則乾乾不息之誠理自內出變化在心者也豫力主此說而同輩尚多未然然此理發於孔子居敬而行簡是也敬則惕然有警乾道也簡則自然無為坤道也茍任自然而不以敬為主則志不帥氣而隨氣自動雖無所為不亦太簡乎孟子又分别甚明彼長而我長之非有長於我也猶彼白而我白之從其白於外也此即言鏡之義也行吾敬故謂之內也此即言龍之義也告子仁內義外之說正由不知此耳聖人之道不於用上求自然而於體上做工夫故雖至聖猶孜孜亹亹以自勉此工夫也工夫只在不覩不聞上做不覩不聞蓋人所知處最微之處也微則不為聞見所牽而反復入身其入身者即其本體之知也故知為獨知獨知處知謹則天理中存無有障礙流行之勢自然阻遏不住故自然者道之著於顯處以言用也然非本於微則所謂顯者乃在聞見而物失其則矣不可以言道凡言道而主於自然者以天道之不勉而中不思而得者觀之似亦由中流出不假人為然謂之中則即是勉謂之得則即是思而謹獨工夫在自然中所謂知微之顯者即此是矣舍謹獨而言自然則自然者氣化也必有忽於細微而愆於理義之正者其入於佛老無疑矣操則存存其心也茍得其養無物不長養其性也存養二字本於此夫心是仁義植根之處而聖則仁義所以能生生之理也理根於心心存則性得所養而生生之機不息故養性工夫惟在存心心為物牽不能自覺是不操也然後謂之不存自覺則物來能察一察即是操操者提醒此心即是愼獨豈有所著意操持哉一操心即存矣故省察之外無存養而省察之功即是立大本也在易之頤以養為義其卦震上艮下動而止也心動於欲則不止止則不動於欲所謂存也養道盡於此矣聖人之學只是謹獨獨處人所不見聞最為隱微而已之見顯莫過於此故獨為獨知蓋我所得於天之明命我自知之而非他人所能與者也若閒思妄想徇欲任情此却是外物蔽吾心之明不知所謹不可以言見顯矣少有覺焉而復容留將就即為自欺乃於人所見聞處掩不善而著其善雖㸃簡於言行之間一一合度不遐有愆亦屬作僞皆為自蔽其知也故欺人不見之知乃十目所視十手所指之處也不可以為獨知然則獨知者其源頭不雜之知乎源頭不雜之知心之官虛靈之常覺者也雜則著物雖知亦倚於一偏是為耳目之官不思而蔽於物矣豫嘗載酒從陽明先師遊於鑑湖之濵時黃石龍綰亦與焉因論戒愼不睹恐懼不聞之義先師舉手中筯示豫曰見否對曰見既而隱筯棹下又問曰見否對曰不見先師微哂豫私問之石龍石龍曰此謂常睹常聞也終不解其後思而得之蓋不睹中有常睹故能戒愼不睹不聞中有常聞故能恐懼不聞此天命之於穆不已也故當應而應不因聲色而後起念不當應而不應雖遇聲色而能忘情此心體所以為得正而不為聞見所牽也謹於獨知即致知也謹獨之功不已即力行也故獨知之外無知矣常知之外無行矣工夫何等簡易耶良知良能本一體也先師嘗曰知良能是良知能良知是良能此知行合一之本旨也但自發端而言則以明覺之幾為主故曰知者行之始自致極而言則以流行之勢為主故曰行者知之終雖若以知行分先後而知為行始行為知終則所知者即是行所行者即是知也道之顯者謂之文條理分明脈絡通貫無過不及之美名也禮即天理之節文也茍非嘉㑹合禮則妄行無序烏得為文故自本體而言則以達德行達道誠而明也自工夫而言則曰博學於文約之以禮明而誠也本體工夫初無二事蓋道之所顯者用也而工夫則歸於本體明明德工夫要於格物此是實踐處蓋外物而言德則德入於虛矣苐其所謂物者與萬物皆備於我之物同蓋吾心所見之實理也先師謂心之感應謂之物是也心未感時物皆已往一有感焉則物在我矣物之所感但見其象往過來續不滯於心則物謂之理滯而成形則為一物不可以理名矣易曰見乃謂之象形乃謂之器器則形而下之名也故物與理之分只在形而上下之間耳成形之後即為外物而吾心之所感者亦不過順應乎此而已正不當為其所滯也知此則物不違則而謂之格矣過是天理中流出順勢自然無樽節處勢重則偏勝即為黨矣故曰人之過也各於其黨然人之良知必能自覺覺處著一毫將就即自欺而為惡矣過之發端處藹然莫能遏即是仁之根也於過處觀之可以知仁欲人察識過是仁之流而不中節者也知其流而不中節則仁即此而在矣龍戰於野其血𤣥黃六隂晦極而陽未嘗亡猶人心昏蔽已甚而天理未泯也陽在隂中惺然復覺以為受侮於隂將自振焉故與之戰主於戰者陽也故以龍言而所戰之地在隂當隂陽有定位之時天𤣥地黃今隂陽相雜猶理欲未明也故曰其血𤣥黃良心在人無有死時此天命之本體聖人作易開之以吉凶悔吝使人自復其本心而已矣為善則吉吉者心之安處也為惡則凶凶者心之不安處也自凶而趨吉則悔悔者心有所悟而必欲改也自吉而向凶則吝吝者心有所羞而不欲為也此皆天命自動而不待外求者此心一覺豈復蹈禍幾耶尚書黃久庵先生綰黃綰字叔賢號久庵台之黃巖人以祖䕃入官授後軍都事告病歸家居十年以薦起南京都察院經歷同張璁桂蕚上疏主大禮升南京工部員外郎纍疏乞休尚書席書纂修明倫大典薦先生與之同事起光祿寺少卿轉大理寺改少詹事兼侍講學士充講官大典成升詹事兼侍讀學士出為南京禮部右侍郎轉禮部左侍郎雲中之變往撫平之知乙未貢舉丁憂服闋起禮部尚書兼翰林院學士充安南正使以遲緩不行閒住遷家翠屏山中寒暑未嘗釋卷享年七十有五先生初師謝文肅及官都事聞陽明講學請見陽明曰作何工夫對曰初有志功夫全未陽明曰人患無志不患無工夫可用復見甘泉相與矢志於學陽明歸越先生過之聞致良知之教曰簡易直截聖學無疑先生真吾師也尚可自處於友乎乃稱門弟子陽明既沒桂蕚齮齕之先生上疏言昔議大禮臣與蕚合臣遂直友以忠君今蕚毁臣師臣不敢阿友以背師又以女妻陽明之子正億攜之金陵銷其外侮先生立艮止為學的謂中涉世故初見不誠非理之異欲用其誠行其理而反羞之既不羞而任諸已則憤世疾邪有輕世肆志之意於是當毁譽機穽之交作鬱鬱困心無所自容乃始窮理盡性以求樂天知命庶幾可安矣久之自相凑泊則見理性天命皆在於我無所容其窮盡樂知也此之謂艮止其於五經皆有原古易以先天諸圖有圖無書為伏羲易彖辭為文王易爻辭為周公易彖傳小象傳繫辭傳文言說卦序卦雜卦為孔子易以大象傳為大象辭為孔子明先天易其卦次序亦依先天橫圖之先後又以孔子繫辭言神農黃帝堯舜周易之韞為明歷代易又以孔子始終萬物莫盛乎艮以闔戶之坤先闢戶之乾合先後天而推之以見夏商連山歸藏之次序詩以南雅頌合樂者次第於先退十三國於後去國風之名謂之列國魯之有頌僭也亦降之為歷國春秋則痛掃諸儒義例之鑒一皆以聖經明文為據禮經則以身事為三重凡言身者以身為類容貌之類凡言事者以事為類冠婚之類凡言世者以世為類朝聘之類書則正其錯簡而已此皆師心自用顚倒聖經而其尤害理者易與詩夫先後天圖說固康節一家之學也朱子置之别傳亦無不可今以先天諸圖即是伏羲手筆與三聖並列為經無乃以草竊者為正統乎大象傳之次第又復從之是使千年以上之聖人俯首而從後人也詩有南雅頌及列國之名而曰國風者非古也此說本於宋之程泰之泰之取左氏季札觀樂為證而於左氏所云風有采繁采蘋則又非之是豈可信然季札觀樂次第先二南即繼之以十三國而後雅頌今以南雅頌居先列國居後將復何所本乎此又泰之所不敢也識餘録言先生比羅一峯以傾邃菴高忠憲家譜言居鄉豪橫此因其附從張桂而起後人紛紛之議耳明儒學案卷十三
