body:
  text: 明儒學案卷四十四餘姚黄宗羲撰諸儒學案上二學正曹月川先生端曹端字正夫號月川河南澠池人自幼不妄言動年十七遍讀五經師事宜陽馬子才太原彭宗古永樂戊子舉於鄉明年登乙榜第一授山西霍州學正厯九年丁憂廬墓壬寅起補蒲州洪熈乙巳考績兩學諸生皆上章請復任霍州上遂許之又十年宣徳甲寅六月二日卒於霍州年五十九初先生得元人謝應芳辨惑編心悦而好之故於輪迴禍福巫覡風水時日世俗通行之説毅然不為所動父敬祖為善於鄉而勤行佛老之善以為善先生朝夕以聖賢崇正闢邪之論諷於左右父亦感悟樂聞先生條人倫日用之事可見之施行者為夜行燭一書言人處流俗中如夜行視此則燭引之於前矣里中有齋醮力不能止則上書鄉先生請勿赴又上書邑令請毁滛祠令以屬之先生毁者百餘惟存夏禹雷公二廟四時祈報則設社穀壇邢端修五嶽廟先生言其非禮同僚肅拜梓潼神先生以為諂僚曰斯文宗主也先生曰梓潼主斯文孔子更主何事門人有赴漢夀亭社㑹者先生愍痛以折之諸生有䘮則命知禮者相之有欲用浮屠者先生曰浮屠之教拯其父母出其地獄是不以親為君子而為積惡有罪之小人也其待親不亦刻薄乎其人曰舉世皆然否則笑隨之先生曰一鄉溺於流俗是不讀書的人子讀儒書明儒禮不以違禮為非而以違俗為非仍然是不讀書人也毎有修造不擇時日或以太歳土旺為言先生明其謬妄時人從而化之霍州樵者拾金釵以還其主人以為異樵曰第不欲愧曹郡博耳髙文質徃觀劇中途而返曰此行豈可使曹先生知也先生以力行為主守之甚確一事不容假借然非徒事於外者葢立基於敬體驗於無欲其言事事都於心上做工夫是入孔門之大路誠哉所謂有本之學也其辨太極朱子謂理之乗氣猶人之乗馬馬之一出一入而人亦與之一出一入若然則人為死人而不足以為萬物之靈理為死理而不足以為萬物之原今使活人騎馬則其出入行止疾徐一由乎人馭之如何爾活理亦然先生之辨雖為明晰然詳以理馭氣仍為二之氣必待馭於理則氣為死物抑知理氣之名由人而造自其浮沉升降者而言則謂之氣自其浮沉升降不失其則者而言則謂之理葢一物而兩名非兩物而一體也薛文清有日光飛鳥之喻一時之言理氣者大畧相同耳語録人之所以可與天地參為三才者惟在此心非是軀殻中一塊血氣心者神也神無方所視聽言動一切感應皆是事事都於心上做工夫是入孔門底大路看此語便見先生之學事心之學須在萌上著力所謂萌即易之㡬學庸之獨也學欲至乎聖人之道須從太極上立根脚與學聖之事主於一心參看天地間凡有形象聲氣方所者皆不甚大惟理則無形象之可見無聲氣之可聞無方所之可指而實充塞天地貫徹古今大孰加焉故周子言無極而太極做人須向志士勇士不忘上叅取若識得此意便得此心則自無入不自得人要為聖賢須是猛起如服瞑眩之藥以黜深痼之疾真是不可悠悠學者須要置身在法度之中一毫不可放肆故曰禮樂不可斯須去身先生為學嚴宻如此吾輩做事件件不離一敬字自無大差失一誠足以消萬偽一敬足以儆千邪所謂先立乎其大者莫切於此非禮勿視則心自静學者須要識得静字分曉不是不動便是静不妄動方是静故曰無欲而静到此地位静固静也動亦静也天理存亡只在一息之間生死路頭惟在順理與從欲能真知其義理之味之無窮則窮逹自不足以動念聖人之心一天地生物之心天地之心無一物不欲其生聖人之心無一人不欲其善聖人之所以為聖人只是這憂勤惕勵的心須臾毫忽不敢自逸理無定在惟勤則常存心本活物惟勤則不死常人不能憂勤惕勵故人欲肆而天理亡身雖存而心已死豈不大可哀哉人之為學須是務實乃能有進若這裡工夫欠了分毫定是要透過那裡不得學聖希賢惟在至誠則五常百行皆自然無不備也無欲便覺自在人只為有欲此心便千頭萬緒做事便有始無終小事尚不能成况可學聖人耶受道者以虚心為本有所挾則私意先横於中而不能入矣人能於天命順而不咈受而不拒便是處死生富貴之要直者生之道循理而行雖命之所遭有不齊而莫非生道得一善逞一善得一能逞一能是謂道聽塗説今人輕易言語是他此心不在奔馳四出了學者當自謹言語以操存此心修身見於世葢實之不可掩者非君子願乎其外而欲以自見也人性本善而感動處有中節不中節之分其中節者為善不中節者為惡知學則知中節而動無不善道無形體可見而聖人一身渾然此道故無形體之道皆於聖人身上形見出來人皆有之第日用不知不自作主宰耳非道逺人也為人之功用力特在勿與不勿之間而已自是而反則為天理自是而流則為人欲自是克念則為聖自是罔念則為狂特毫忽之間學者不可不謹孔顔之樂者仁也非是樂這仁仁中自有其樂耳且孔子安仁而樂在其中顔子不違仁而不改其樂安仁者天然自有之仁而樂在其中者天然自有之樂也不違仁者守之之仁而不改其樂者守之之樂也語曰仁者不憂不憂非樂而何周程朱子不直説破欲學者自得之人能恭敬則心便開明學到不怨不尤處胸中多少洒落明瑩真如光風霽月無一㸃私累六經四書聖人之糟粕也始當靠之以尋道終當棄之以尋真道真我所固有者先生此言欲母專泥書冊耳古人文人自是文人詩人自是詩人儒者自是儒者今人人欲兼之是以不能工也賢輩文無求竒詩無求巧以竒巧而為詩文則必穿鑿謬妄而有不得其實者多矣不若平實簡淡為可尚也人心本自虚靈知覺但事物纔觸即動而應初無縱跡可尋捉處太極圖説述解序略云孔子而後論太極者皆以氣言老子道生一而後乃生二莊子師之曰道在太極之先曰一曰太極皆指作天地人三者氣形已具而混淪未判之名道為一之母在太極之先而不知道即太極太極即道以通行而言則曰道以極致而言則曰極以不雜而言則曰一夫豈有二耶列子混淪之云漢志含三為一之説所指皆同微周子啟千載不傳之祕則孰知太極之為理而非氣也哉且理語不能顯黙不能隐固非圖之可形説之可狀只心㑹之何如耳二程得周子之圖之説而終身不以示人非祕之無可傳之人也是後有增周説首句曰自無極而為太極則亦老莊之流有謂太極上不當加無極二字者則又不知周子理不離乎隂陽不雜乎隂陽之㫖矣亦惟朱子克究厥㫖遂尊以為經而註解之真至當歸一之説也至於語錄或出講究未定之前或出應答倉卒之際百得之中不無一失非朱子之成書也近世儒者多不之講間有講焉非舎朱説而用他説則信語録而疑註解所謂棄良玉而取頑石掇碎鐵而擲成噐良可惜也太極圖説辨戾文畧云周子謂太極動而生陽静而生隂則隂陽之生由乎太極之動静而朱子之解極明備矣其曰有太極則一動一静而兩儀分有隂陽則一變一合而五行具亦不異焉又觀語録却謂太極不自㑹動静乗隂陽之動静而動静耳遂謂理之乗氣猶人之乗馬馬之一出一入而人亦與之一出一入以喻氣之一動一静而理亦與之一動一静若然則人為死人而不足以為萬物之靈理為死理而不足以為萬物之原理何足尚而人何足貴哉今使活人騎馬則其出入行止疾徐一由乎人馭之如何爾活理亦然不之察者信此則疑彼矣信彼則疑此矣經年累歲無所折衷故為辨戾以告夫同志君子明儒學案卷四十四
