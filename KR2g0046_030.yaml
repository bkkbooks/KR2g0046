body:
  text: 明儒學案卷三十餘姚黃宗羲撰粵閩相傳學案嶺海之士學於文成者自方西樵始及文成開府贑州從學者甚衆文成言潮在南海之涯一郡耳一郡之中有薛氏之兄弟子姪既足盛矣而又有楊氏之昆季其餘聰明特逹毅然任道之器以數十乃今之著者惟薛氏學耳西樵名獻夫字叔賢弱冠舉進士為吏部主事遷員外郎陽明起自謫所為主事官階亞於西樵一日與語西樵有當於心即進拜稱弟子未幾引疾歸將十餘年而大禮議起西樵自家上疏請追崇興獻帝后召入擢侍講學士至禮部尚書加太子太保復引疾歸起兼武英殿大學士未幾請歸歸十餘年卒贈太保諡文襄薛尚賢以學行著於鄉中離自虔歸述其所聞於陽明者尚賢説之遂稟學焉後官國子助教楊驥字仕德初從甘泉遊卒業於陽明陽明方征橫水謂之曰破山中賊易破心中賊難未幾卒甘泉謂其是內非外失本體之自然為文哀之皇明書言志墓非也楊仕鳴與兄同學初録所聞備載陽明之語陽明以為不得其意其後直書己意所得反印可之仕鳴求日用講求工夫只是各依自家良知所及自去其障擴充以盡其本體不可遷就氣習以趨時好又謂東廓曰公往治舉子業竭其才否東廓曰然曰今致良知亦竭其才否東廓曰未能也曰微竭才曷由見卓爾竭才二字希顔之的也東廓每舉斯語以告學者亦未幾卒梁焯字日孚南海人登進士第官至職方主事以諫南巡被杖武宗蓄外國人為駕下人日孚以法繩之不少貸日孚嘗過贑從陽明學辨問居敬窮理悚然有悟同門冀暗齋死詔獄日孚棺斂之鄭一初字朝朔揭陽人𢎞治乙丑進士居紫陌山閉門習靜召為御史陽明在吏部因陳世傑請受學聞其説以為昔多岐而今大道也時朝朔己病人勸其緩學曰死夕可矣卒於浙閩中自子莘以外無著者馬明衡字子莘莆人也父思聰死寧濠之亂子莘立志勇猛與鄭善夫為古文陽明曰草木之花千葉者無實其花繁者其實鮮嘉靖三年以御史諫上隆興國而薄昭聖為非禮下獄削籍歸行人薛中離先生侃縣令周謙齋先生坦粵閩相傳學案行人薛中離先生侃薛侃字尚謙號中離廣東揭陽人舉正德十二年進士疏乞歸養從學王文成於贑四年而後歸十六年授行人丁母憂服闋入京聞文成訃會同門南野諸子為位而哭使山東謁孔孟廟刻杏壇講授儀尋升司正張孚敬方用程篁墩舊議改孔廟從祀先生請增祀象山白沙允祀象山莊敬太子薨嗣位久虛先生私草一疏引祖制請於親藩中擇其親而賢者迎取一人入京為守城王以俟東宫生長出封大國初以示光祿卿黃宗明宗明勸勿上已示其同年太常卿彭澤澤傾險人也時張孚敬夏言交惡澤方附孚敬欲借此以中言即袖其疏私於孚敬曰儲事上所諱言而侃與言同年若指侃疏為言所為則罪不可解矣孚敬以為然先録其稿進之於上曰言與侃之謀如此姑勿發以待其疏入澤於是語先生曰張少傅見公疏甚喜可亟上先生遂上上大怒逮至午門會官鞫其主使先生不服澤微詞諷之使連染於言先生瞋目視澤曰汝謂張少傅有意余言趣我上之於言何與都御史汪鋐黨孚敬攘臂謂言實為之言拍案大罵幾欲毆鋐遂罷訊上復命武定侯郭勛大學士翟鑾司禮監官及九卿科道錦衣衛官用刑重鞫先生曰以皇上之明猶為彭澤所欺况愚昧如侃者乎上乃出孚敬二密疏以示羣臣斥其冒嫉著致仕去澤遣戍先生納贖為民行至潞河遇聖壽節參議項喬行禮舟中有報喬者曰小舟有服民服而具香案叩首者不知何等人也喬曰此必薛中離訪之果然先生歸田從遊者百餘人十五年遠遊江浙會念菴於青原書院已入羅浮講學於永福寺二十四年始還家門人記所聞曰研幾録周海門聖學宗傳云先生釋歸南過會稽見陽明陽明曰當是時吾子如何先生曰侃惟一良知而已炯然無物也陽明首肯之按先生釋歸在十年陽明之卒在七年安得歸而復見之也世疑陽明先生之學類禪者三曰廢書曰背考亭曰虛先生一一辨之然皆不足辨也此淺於疑陽明者也深於疑陽明者以為理在天地萬物吾亦萬物中之一物不得私理為己有陽明以理在乎心是遺棄天地萬物與釋氏識心無寸土之言相似不知陽明之理在乎心者以天地萬物之理具於一心循此一心即是循乎天地萬物若以理在天地萬物而循之是道能𢎞人非人能𢎞道也釋氏之所謂心以無心為心天地萬物之變化皆吾心之變化也譬之於水釋氏為橫流之水吾儒為源泉混混不舍晝夜之水也又其所疑者在無善無惡之一言考之傳習録因先生去花間草陽明言無善無惡者理之靜有善有惡者氣之動蓋言靜為無善無惡不言理為無善無惡理即是善也猶程子言人生而靜以上不容説周子太極而加之無極耳獨天泉證道記有無善無惡者心之體有善有惡者意之動之語夫心之體即理也心體無間於動靜若心體無善無惡則理是無善無惡陽明不當但指其靜時言之矣釋氏言無善無惡正言無理也善惡之名從理而立耳既已有理惡得言無善無惡乎就先生去草之言證之則知天泉之言未必出自陽明也二疑既釋而猶曰陽明類於禪學此無與於學問之事寧容與之辨乎語録語云朝聞道夕死可矣如何是聞道由知德者鮮矣如何是知德曾點漆雕開已見大意如何是見大意於此省悟一分是入頭學問省悟十分是到頭學問却去間理會何益文王於庶獄庶慎罔敢知知者何事孩提不學而知知從何來此可以見聖學矣殺身成仁舍生取義是忘軀求道之意後人不省指為仗節死義之事則疏矣治亂興亡是豈人人所遭者哉惟其重生則有欲舍生則無欲重生是養口體者也成仁取義是養大體者也道本家常茶飯無甚竒異好竒趨異反失之故賢智過求愚不肖不知求此道所以不明不行也聖人揭個人莫不飲食鮮能知味正是平平淡淡日用常事然能常知則心常在常明久而純即與天地合德日月合明四時合序鬼神合吉凶皆自目前進去非别有神通可歆慕者世人好怪忽近就遠舍易求難故君子之道鮮矣孟子只説是心足以王充之足以保四海不失赤子之心此之謂失其本心此乃天地易簡之理古今傳受之要加一些是世儒減一些是異學後儒謂釋空老無為異非也二姓之蔽在遺倫不在虛無著空淪無二氏且以為非以是罪之故弗服也聖人亦曰虛明曰虛以受人亦曰無極曰無聲無臭雖至元渺不外彜倫日用即聖學也安可以虛無二字歸之二氏以是歸之二氏則必落形器守方隅泥文義此聖學之所以不明也要知此理人人可為資質無有不可者但不肯耳精力無不足者只有漏耳本體無有不見在者只自蔽耳於此覸破信及真可一立便起一得永得高明博厚悠遠吾心之體本如是也有欲則昏下則淺狹則局促耳試於心平氣和以忿生欲發之時觀之自可見心平氣和萬境皆春忿生欲發一物難容此能覆載與不能之驗也問致中和如何位得天地育得萬物曰識得天地萬物便見位育曰天地萬物亦有不識乎曰人之所見己隔形氣天地自天地萬物自萬物故每每有此疑天地萬物本吾一體有形屬地無形屬天統言之曰天地分之曰萬物今除了山川土石何者為地除了日月星辰風雲雷雨寒暑何者為天除了吾心之靈惡知天地惡有萬物故天由心明地由心察物由心造五倫本乎一身庶徵應乎五事故曰萬物皆備於我反身而誠樂莫大焉曰能盡其性則能盡人之性能盡人之性則能盡物之性直甫問虛無乃老釋之非先生謂吾儒亦然終未安曰虛者太虛也太虛原無一物是虛無也天下萬物萬事豈能有外太虛者乎生生化化皆從此出為人子能虛以事親則孝為人臣能虛以事君則忠若實之以慕少艾私妻子懷寵計利則不能矣曰老釋之虛虛而虛吾儒之虛虛而實亦有辨曰如子之言是亦虛矣何謂不然且虛而虛虛而實之言亦未明須知離乎人倫物理而虛無者二氏之謬也不離人倫日用而虛無者吾儒之學也問古聖彚出後來成仙成佛者多成聖者寡何也曰此在教與學異也五三之世執中建極教簡而學專故人人君子後世中極之義不明孔子申一貫之旨一以上非顔不聞一以下遂分兩截尚謂且學貫未可學一其支離不經亦甚矣學者見在繁艱皆委心不能雖周程倡可學之要再傳復晦既不得其門而入而辭章功利之習又從而薰爍之奈何有成若佛以見性仙以超升學之者直欲作佛必求超升件件放下其道雖偏其教簡徑其學精專以此成就者衆今知其然盡洗世陋直以易簡為學以聖人為歸然而不成未之有也問聖愚一致始終本末同條共貫處何如曰孔子無言之教至精者也百姓日用飲食至粗者也然無言此虛明也日用飲食此虛明也故曰人莫不飲食鮮能知味也食能知味行能知步瞬能知存息能知養為子知孝為臣知忠至於知化知天一也儒學不明其障有五有文字之障有事業之障有聲華之障有格式之障有道義之障五障有一自蔽真體若至寶埋地誰知拾之間為異學竊柄誰復顧之曰五者皆理所有曷謂障曰惟其滯有故障良知自存自照渾無方體無涯限若著個良知亦是障或問聖可學與曰可或問聖不可學與曰不可然則何以自戾乎曰學其可學斯可學己學其不可學斯不可學己胡謂可曰求盡吾心而已矣胡謂不可曰求全其才而已矣夫求盡吾心者懲吾忿窒吾欲遷吾善改吾過窮吾之神知吾之化自有而自為之夫誰謂不能求諸易者也求全其才者天有所短地有所長智有所不及神有所不通九官弗兼其能堯舜其猶有病求諸難者也舍難就易可謂善學也已大遊問治世以何為要緊曰只有這件要緊世人事事緊要只為這件不要緊曰法度亦莫可廢曰徒善徒法有明訓矣然善無定善以不戾本然為善法無定法以遂善成物為法王道即是天德即是眼前學問廓然大公物來順應一言盡矣自其廓然名曰天德自其順應名曰王道非有甚高難行之事書曰無有作好遵王之道無有作惡遵王之路作是作意為之非廓然順應者也無作無偏是無意必將迎之私用舍舉措自得其宜此其性情用功豈人不能也不為耳後世將王道比作天上事看講來做去務求高出反致著善著法與此相背如何做得三代時事問理欲不明曰賊是人做的人是天生的未達曰自不欺心有甚欲不明自不違天有甚理不明無染則本體自淨無著則應用自通故經綸大經立大本知化育只在夫焉有所倚一倚便不能子思戒慎恐懼工夫聖人只道個敬顔子非禮勿視聽言動於乾卦只道個間禮經正目而視之無他見傾耳而聽之無他聞在成湯曰顧諟而已顧諟只是一照只是良知常在其功一也而照尤易曉一照體用為一無內外無動靜無久近始學下手此照也通乎晝夜知性知天此照也問顧諟何如緝熙曰顧諟亦即緝熙但顧諟照則明照上著力緝熙自明自照無二無息己得其本然者也故曰反觀內照曰大人以繼明照於四方所向有物即為物縛所存有善即為善纍不言而信信是何物不動而敬敬見何處吾心之本體即是誠即是忠信即是一此體常存便是主一便是思誠學不明世儒只在可見可聞有思有為上尋學舍之便昏憒無用力處問讀書之法曰程子謂求經義皆栽培之意栽培必先有根以根為主既栽既培自有生生之意是讀書時優遊諷詠得書之益不讀時體貼充養尤得書之益也今人讀書以書為主心為奴𨽻敝精務博反為心害釋卷則茫然均為亡羊皆非栽培之意也學未知頭腦不是認賊作子便是指玉為石後儒紛紛理氣之辨為理無不正而氣有不正不知以其條理謂之理以其運用謂之氣非可離而二也文章性與天道乃形而上下之意非有彼此非有先後淺深也但未悟者見其文章而已悟了莫非性也莫非天也更無差别以心安心即不安有心可安亦不安客有問知識不足故其心未明者先生曰去其知識則明矣子夏篤信聖人不如漆雕開之求自信冉有説夫子之道不如顔子於言無不説問學須博求乃能有見曰見個甚麼曰見道曰見道如見天或隔一紗或隔一紙或隔一壁或隔一垣明暗不同其蔽一也欲見須是闢開垣壁徹了紗紙便自見何須博求博求正為未闢未徹耳舍此而言博求是記醜而博者也非聖賢之學問喜怒哀樂未發氣象曰未發謂中中節為和一齊見在分析不得若以時地分得開便是體用二源形影為二物蓋和非順適人意之謂不戾本體之謂也過出無心聖賢不免後人看得太重反生文過遂非之惡曾子易簀古今稱美然易時是則用時非非過乎殛鯀為是則任鯀為非非過乎或問學莫先義利之辨曰古之所謂義與利者不可見也不可聞也子之所謂義與利者可見耳可聞耳夫自可見可聞而辨之則其所是者似是也非天下之真是也其所非者似非也非天下之真非也是故捧檄而喜喜可見也孝不可見也故雖張奉之賢不能不失之毛義其迹鄙也一物釋西伯物可見也忠不可見也故雖商紂之暴不能不轉移於閎夭其機微也是故見其可見聞其可聞則義可襲也過可文也聲音笑貌可以為於外也見所不見聞所不聞則莫見乎隱矣莫顯乎微矣誠之不可掩矣然則不可見不可聞者何也心體也可見可聞者何也事迹也心體是則事迹皆是矣心體非則事迹皆非矣故知堯然後知堯步知舜然後知舜趨知孔非以周流知顔非以簞瓢也以步學堯非堯矣以趨學舜非舜矣以周流學孔非孔矣以簞瓢學顔非顔矣曰夫然則自見自聞耳奚以見聞於人乎曰欲見於人欲聞於人此義利之所以弗明也夫義罔常在利罔常行尊周非義乎以其為己則霸矣好貨非利乎以其同民則王矣故古之君子戒慎不覩恐懼不聞未嘗求見求聞也而卒無弗見無弗聞今之君子修邊幅避形迹守信果墜適莫將以求見而卒無可見將以求聞而卒無可聞善乎先正之言曰無所為而為者義也有所為而為者利也此依心體與顧事迹之異也又曰有意於為公皆私也公私義利之辨明則聖學其庶幾乎或問陽明先生於侃曰其學類禪信有諸曰否禪之得罪聖人也有三省事則髠焉去欲則割愛焉厭世則遺倫焉三者禪有之而陽明亦有之乎曰弗有曰聖學之異於禪者亦有三焉以言乎靜無弗具也以言乎動無弗體也以言乎用之天下無弗能也是故一本立焉五倫備焉此陽明有之而禪亦有之乎曰弗有然則曷疑其為禪也乎曰以廢書以背朱以涉虛也曰噫子誤矣不然以告者過也先生奚廢書乎昔者郭善甫見先生於南臺善甫嗜書者也先生戒之曰子姑靜坐善甫坐月餘無所事復告之曰子姑讀書善甫憝而過我曰吾滋惑矣始也教慶以廢書而靜坐終也教慶廢坐而讀書吾將奚適矣侃告之曰是可思而入矣書果學乎孔子之謂子貢曰汝以豫為多學而識之者與非也豫一以貫之學果廢書乎孔子贊易曰君子多識前言往行以畜其德是可思而入矣故言之弗一教之因材而篤也先生奚廢書乎然則背朱則何居曰先生其遵之甚者爾豈曰背之云乎孟子曰王之好樂甚則齊其庶幾乎夫今之樂非古之樂也而孟子以為庶幾何也彼其於樂孰無好好之而已聽之而已稱美之而已好之弗甚者也若體其和推其意而得乎樂之本則必妙之乎聲容之外者矣先生於朱子亦若是焉爾惡在其為背也乎且朱子遵程者也其為本義多戾易傳孔子孟子述古者也其稱詩書多自為説先生之於朱亦若是焉爾惡在其為背也乎然則涉虛何謂也曰子以虛為非乎以偏於虛而後為非乎夫以虛為非則在天為太虛在人為虛明又曰有主則虛曰君子以虛受人曰聖人虛之至也今子以虛為禪而必以勿虛為學則糟粕足以醉人之魂而弗靈矣骨董足以膠人之柱而勿清矣藩籬格式足以掣人之肘而勿神矣曰若然則儒釋奚辨曰仙釋之虛遺世離倫虛者也聖賢之虛不外彜倫日用虛而實者也故沖漠無朕而曰萬象森然是故靜無勿具也視之不見聽之弗聞而曰體物不遺是故動無弗體也神無方而易無體而曰通乎晝夜而知斯良知也致之之極時靡勿存是故無方無體虛之至也至虛而後不器不器而後無弗能縣令周謙齋先生坦周坦號謙齋羅浮人也仕為縣令自幼有志聖賢之學從學於中離出遊湖湘維揚新泉天真天關以親講席衰老猶與徐魯源相往復其論學語云日之明也必照於物有不照者陰霾之蔽也心之知也必格乎物有不格者物欲之蔽也又云一陽生於下為復內陽外陰為泰於復則曰見天地之心於泰則曰內健而外順是可見學不遺乎外而內者其本也故曰復德之本也惟復則無妄而剛來主於內矣此內健之為泰也又云不可於無喜怒哀樂覔無聲無臭只喜怒哀樂中節處便是無聲無臭所在又曰瞑目靜坐此可暫為之心體原是活潑流行若長習瞑坐局守空寂則心體日就枯稿非聖人之心學也又云白沙之學以自然為宗至謂靜中須養出端倪吾人要識得靜中心體只是個澄然無事炯然不昧而已原無一物可著若謂靜中養出端倪則靜中又添出一端倪矣且道體本是自然但自然非意想可得心下要自然便不是自然也明儒學案卷三十
