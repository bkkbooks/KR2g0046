body:
  text: 明儒學案卷三十九餘姚黃宗羲撰甘泉學案三郡守洪覺山先生垣洪垣字峻之號覺山徽之婺源人嘉靖壬辰進士以永康知縣入為御史轉溫州知府間住歸凡四十六年而後卒年近九十先生為弟子時族叔熺從學文成歸而述所得先生頗致疑與精一博約之説不似其後執贄甘泉甘泉曰是可傳吾釣臺風月者丁未秋偕同邑方瓘卒業東廣甘泉建二妙樓居之庚申甘泉約遊武夷先生至南安聞甘泉訃走其家哭之越兩月而歸先生為體認天理是不離根之體認蓋以救師門隨處之失故其工夫全在幾上用幾有可見未幾則無見也以幾為有無接續之交此即不睹不聞為未動念時獨為初動念時之舊説也不知周子之所為幾者動而未形有無之間以其湛然無物故謂之無以其炯然不昧故謂之有是以有無合言不以有無分言也若自無而至有則仍是離根之體認矣先生調停王湛二家之學以隨處體認恐求理於善惡是非之端未免倚之於顯是矣以致良知似倚於微知以知此理以無心之知為真知不原先天不順帝則致此空知何用夫知主無心所謂不學不慮天載也帝則也以此知為不足恃將必求之學慮失却道心之微則倚之於顯者可謂得矣得無自相矛盾乎方瓘字時素號明谷初從甘泉於南都甘泉即令其為諸生向導甘泉北上及歸家皆從之而往以學為急遂不復仕覺山理學聞言學者覺也夷惠謂之心安則可謂之悅則不可蓋悅重知不重行知通乎行故悅行亦悅也行局乎知則雖知亦未免為障耳白沙之見端倪於悅近之父母根也根孝弟是不離根發生處故生生之謂仁舍此便是無根之學仁義禮樂何實之有君子去仁惡乎成名非成君子之名也古人名即是實仁是體名是事安仁利仁是體處約處樂是事萬殊一本是理理一分殊是功分殊即在理一中有感應無分合內外兼該是貫處蓋一則內外兼該也若云以一理貫萬事是二之矣忠是體恕是用否曰不分體用皆於感應上見之體則無可言有一言而可以終身行之者其恕乎行之即忠也天道無名而忠恕有路故曰違道不逺然於命脈則一爾居處恭執事敬與人忠心一也在居處為恭在執事為敬在與人為忠日用只此三者中間更無空間間斷便得仁體流通下學上逹至淡至簡豈人所可與知惟自知之惟天知之天知即於自知中見之天人二途中間更無别路去人所以還天人所不知者即天知也行不貫徹恐於事上著了腳故有礙子張問行子貢問行夫子惟告以忠信與忠恕忠恕流通即自無礙腳處設無此身何意之有為其有身也故人已形而好惡之意起焉是已與人流通之關鍵也通則格不通則不格通則格乎天地不通則否塞消亡知者察好惡而開意之金鑰也知則覺而軀殼忘矣故意有善惡知則惟有善而無惡知善知惡是知為善去惡是格物如何曰知善知惡真知也即真知一路致之以通格乎物若添為善去惡二字似又加一轉身致與格二矣慎獨誠意皆喜怒哀樂上消磨不落虛見戒慎不睹不聞須從大志願上未接物而本體自在已接物而本體自如不涉覩聞乃戒懼也戒懼不覩不聞猛然一爐真火自然點雪不容喜怒皆天性流行少離體便是遷便是出位遷對止而言觀於未發之中不但是怒時忘怒觀理從人欲上起念便踏危機從天理上起念便踏安機機動之初自以為細微可以僥幸無事故忽忽為之遂至於不可止不知害已在其中智者只觀理欲於毫芒而利害不與利害展轉則昏塞愈甚言顧行行顧言顧不在言行而在體認天理一顧俱得經綸大經其大不在功業而在此心心無私則日用細微皆大經也無惡於志譬如日月著不得纖翳故能無聲無臭志在幾先工夫則於幾時原非起念不能而教不言而信本體全功不分動靜孟子不動心在集義有事上告子不動心在不動心上不得勿求是欲效廓然而實私也歸之內焉耳矣彼長我長彼白我白是欲效順應而實逆也成之外焉耳矣是內便非外不得勿求便彼長彼白一病也勿求於氣是持志而志與氣二故曰志一則動氣氣一動即心動矣孟子之養氣是志至而氣與志一故曰持其志無暴其氣氣安即心安矣蓋心志皆氣之所萃故不動氣者是不動心之要訣也不得勿求似不動心而實病心似物各付物而實外物志氣一舟也志至氣次是有舵之舟運用伸縮只見舟不見有舵氣一動志斯無舵矣志一動氣執舵而用之者非其人也其為氣也配義與道於天地絪緼時觀之無理氣分合處孔孟言敬言集義言精一博約皆是渾流片段工夫不是逐事逐時照管有時事者感應耳常寂常感助者無根之謂集義工夫止於根上著力則雖奮迅勇果亦是生意震發槩謂之助不可乃若其情則可以為善此情字是繼之者善善字上來忽然之間真情發見即繼之之意若施之事為離幾已逺其情不可得而見矣平旦未與物接無好惡可見而何以曰與人相近只是其氣清明無所好惡便是相近舍生取義以生與義並論是不得已喚醒常人語若在賢者則真是生順死安論義理不論生死豈有身與義對者放者意也非心也求之者心也致知之事也故曰欲誠其意者先致其知以心使心非矣盡性無工夫工夫在盡心上吾人與萬物為體身之精靈萬物之根也反身而誠天機流行發育萬物故樂仁體也行之著是生機露習之察是生機精到神處楊氏為我人自為人物自為物牛自為牛馬自為馬而不以我與之是亦物各付物而實出於意見故無情子莫執中是事上求中事上豈能有中來嘗記吕涇野馬西田崔後渠過朝廷香案一曰下馬一曰虛位講論未定其一曰豫一腳下馬一腳不下如何可知執中自是無此理命之流行有剛柔純駁而生生之本未嘗不在故剛柔純駁可以言偏而不可以言惡道無不在隨位而在三百八十四爻總是一個思不出其位故曰位當位不當古人身無間也問定性曰率性之謂道率性而行便不消言定定亦率也非率而定雖定未免有病心不入細微還從聲色利名習見粗處蔽之分殊在理一上流行如水各滿其器然禁止矜持雖非善學然亦有可用之時與截瘧相似一截則元氣自復天地之塞吾其體無欠缺處即是塞知此則知帥矣不必更見有塞體段風波不起本體和平自在無知而無不知有無一體老子恃其所不知以為知其知猶有著處蓋退以為進也於寂體不似變化氣質亦須有造命手從天命上轉透思慮不定何在曰只為心中有物在爾吾人居常有思做盜者否以其無此念也須廓然坦然強把著不得問視聽為氣聰明為性何如曰視聽氣也亦性也視聽之聰明氣之粹而性之正者也以視聽為非性則形色天性非矣思從意起則滯思從心體則通萬物不能礙天之大萬事不能礙心之虛人處大運中吉凶悔吝無一息暫停聖人只隨地去看道理亦無停息所行有滯礙處必思有以通之其智益明若要撥開頭上路先須推到面前墻面前何墻墻在吾心耳心不蔽則家國天下皆在吾格致中矣故物格意誠而心廣體胖朱子謂儒以理為不生不滅釋氏以神識為不生不滅夫理因神識以發儒豈能外神識以自存者但我儒理與神識為一物而釋之神識恐理為之障耳理豈為障障之者意也體認天理是不離根之體認人只能一心一路如九河就道淹淹中行更無泛思雜念未應則此知渾然與物為體既應則此知粲然物各付物若云意之所在謂之物似有無知無物之時其為物不二與萬物載焉只是一物五行相資相濟一時具備所以純粹中和而能為四時之消息流行也有微著而無彼此有偏全而無欠缺若謂春夏秋冬各以一物自為生克勝負謬矣蓋消息即是生克也變化氣質不如致良知之直截何如曰是當下頓悟之説也人之生質各有偏重如造形之器亦有志至而氣未從者譬之六月之氷安得一照而遽融之五十以學易可以無大過夫子亦且不敢如此説故其變化直至七十不踰矩東廓嘗云古人惜隂一刻千金一年之間有許多金子既不賣人又不受用不知放在何處只是花費無存可惜婁一齋髙冠佩劍所至傾仰至姑蘇桑悅來訪引僻書相難一齋未答悅曰老先生德性工夫有之道問學則未也一齋遂不與語陽明嘗朗誦孟子終篇學者問之曰如今方會讀書一讀書去能不回頭尹先生曰耳順心得如誦已言吾人心地常使有餘格地步常使有餘間隨吾所往自然寬博有容平鋪自在事變之來是非亦可照察不可竭盡心力彼此俱迫迫窄窄無展布處大事小視之則可以見大變事常視之則可以處變若小而為大常而為變則不惟來叢脞之失而且有多事之害人之聰明各有所從發之竅精於此或暗於彼故聖學專從全體上不在聰明陽明云果是調美鼎鼐手段只將空手去應副鹽梅汁米之類不患其不備也聖人亦何嘗有過人的念慮有過人的事功自耕稼陶漁以至為帝滿眼生意竹頭木屑皆家計也被事占地步多只是心狹至善無形何物可止不動於欲天則自如止水無波是也不以軀殼起念即一念天下歸仁學者無天下之志即是無為已之志念從知轉則念正知從念轉則知忘明道獵心原不成念故謂之過吾人有過便連心撥動故謂之惡此心流行之精而有條理可見者為文威儀動作猶文之表末耳故惟精惟幾為博文先輩語言須虛心細玩不可輕忽置去一擔黃連通喫了方説甜語百姓與知何以謂之日用不知曰百姓之病無根之病百姓之善亦無根之善主宰未立學問未講故也有起念處即便有斷念時感應是有物時見不是有物時起起則有生滅矣真知脫悟自然必照日食之時以扇作圖圈承之其地影之圈亦隨日體盈虧以為偏全可知本體不足雖垂照廣遍終是偏也自私者必用智明道曰性靜者可以為學性靜便近本體非惡動也以公言仁不足以見仁體以惺與覺言仁不足以見仁之全體惟夫子以愛人言仁周子以愛言仁仁之實理自在不必更説是仁之用又添出一個心之德愛之理心之虛處是性否曰惟真虛斯能與天地萬物同流虛即性也然性無虛實天地無心却有主宰在牛生牛而不生馬桃生桃而不生李要亦天地生生變化只有此數而已真知流行即是知行並進幾乃生幾寂體之流行不已者感而遂通妙在遂字易之藏往知來俱在此中誠神幾也生幾須存誠為主工夫不難於有事無事而難於有無接續之交於中蓋有訣竅焉志在幾先功在幾時言志則不分有事無事而真機自貫如大學所為如好好色如惡惡臭皆真機也善幾著察有不善未嘗不知知之未嘗復行此顔子知幾先天之學今之學者止於意氣作為上論志不於天行乾乾主宰上論志非志則幾不神非志非幾而欲立未發之中於未應之先以為應事主而應之者無心焉非影響即虛見所謂體天理者豈是事物上推求豈是意念上展轉只從生機上時時照察幾是則通體皆是幾非則通體皆非蓋幾者性情之流行通乎知行而無息者也學者每言無知知是虛靈開天闢地生生不死底物事窮神知化過此以往未之或知是到無聲臭無可言處未至於此豈可便説無知恐不免於信心妄用耳天一生水地六成之之類天無偏而地氣有偏然天至於生時即已入地氣矣天氣須從未生時觀來人之過各於其黨黨生於性之偏豈惟食色雖佛老楊墨皆於吾人虛體仁義上偏重之亦不是性外突來物事無形安有影道在求自得爾靜體渾融虛通無間原不在喧寂上故有用博約如有所立者有用默坐澄心體認天理者各隨其資稟方便以入其言靜以養動者亦默坐澄心法也不善用之未免絶念滅性枯寂強制之弊故古來無此法門然則如之何道以自然為至知其自然動不以我斯無事矣故學在知止不在求靜慎獨是靜功是動功曰言靜言動又恐學者於動靜時便生起滅惟幾則無間一體故也問致知有起處如何曰知無不在致之之功則在於幾時蓋幾有可見未幾則無見也夫其所可見即其所未見者耳故致所見而其所未見者在矣動靜無有一體氣質變化有要否曰枯稿之發生以陽氣質之變化以知知透而行至渣滓融矣故曰陽明勝則德性用乾道也如雞抱卵亦然人之才智聰慧不同莫亦繼善原初帶來否曰非也猶之生物然濃淡華素色色各别者地氣耳天無形地氣有形人之質稟軀殼地氣也故學求端於天論學書精粗一理顯微無二故善學者從粗淺入細微不善學者從細漸成議論實用功者從日用察鳶魚不實用功者從鳶魚成虛見此中正之道所以難也答甘泉垣竊以為戒懼事迹之功易而戒懼念慮之功難戒懼念慮之功易而戒懼本體之功難夫戒懼乎本體者非志之主宰不能也此處果無隱處亦無懈時顧在人自作之耳近時謝惟仁有書論今人只於義理上論學不在合下工夫上論學只於學上論病痛不於已志真切上論病痛又竊以為今之學者止於意氣作為上論志不於天行乾乾主宰上論志所以終未有湊泊處柬鄒東廓竊念此生真惟有此一念可以對越上帝細細條飾猶是掩善著惡地面縱饒此身全無破綻畢竟於仁體乾體上無干也噫乾道之學如百年鮮有聞者自道丈發之而吾人猶以大人之體翻為童觀之窺乃遂謂之曰儒其自小也甚矣寄鄒東廓格物即精一工夫柬黃久菴心齋之學同志每以空疏為疑近得執事所論修道工夫小物必謹則發心齋之藴非執事而誰苐於不睹不聞另立見解尚與區區之意未合夫不睹不聞性之體也惟其不睹不聞故能體物不遺體物不遺即率性之道也人惟有此不睹不聞體物不遺之體而或不能不以忘助失之故戒謹恐懼所以存於此身猶之曰修身修心養性云耳非謂必有一物而後可存養也今曰性如明珠原無塵染有何睹聞著何戒懼故遂謂平時只是率性所行及時有放逸不睹不聞然後戒謹恐懼以修之夫既如明珠矣既無塵染矣不待戒懼矣其所謂放逸者又何從而有之而又知之所謂率者又何事守平時無事難以言功止合率性性本俱足不必語修則誠似矣然物交知誘非有戒懼存於其間則其所率所謂道者果知其為性道之本否乎果如此説非惟工夫間斷不續待放逸不睹不聞而後修其幾亦緩矣知及仁守莊蒞動禮此夫子自內逹外示人以性道全體合下便是合一用功非謂有知及仁守而又有莊蒞動禮也君子終日乾乾忠信進德修詞之誠聖賢以此之教吾人尚爾悠悠動輒見過若謂只任自然便謂之道恐終涉於百姓日用不知區區為此説者非謂率非自然也慎獨精一不容意見之為自然者自然之至也答顔釣戒懼不睹不聞只觀主宰不論體段只求致虛不論著力內省不疚無惡於志志者主宰也剛健純粹通一身動靜隱顯而運用之若云真有所見則影響其將不免矣炯炯靈靈中中正正之何物乎在目乎在念乎非目非念何見乎此恐未易言也答徐溫泉文清未感之先别無可言惟有一真志在耳故鄙人嘗謂志在幾先而功在幾時志從好學有之幾從好學得之故夫子獨稱顔子惟好學又曰知幾其神乎非志則幾不神也非志非幾而影立未發之中於未應之先以為應事主而應之者無心焉非影響即虛見與葛洞岡張連山鄭浣溪諸友善學者事從心生故天下之事從心轉不善學者心從事動故吾人之心從事換只在內外賔主之間非天然之勇不能也答謝特峰鉉非生機呈露條逹而據為之真志且曰是能立焉恐猶之意氣所發誠偽由分非可強者世緣仍仍機竅便熟道家所謂今之學道以天理為門庭以人影為行徑斯亦對證之劑如何答程介齋聖賢之怒從仁上發故善善惡惡皆仁之用吾人之怒從已意上發故忿􅓰賤惡皆氣之動此理欲所由分也今執事只當理會仁體理會自己分事則性靜感寂相去不逺若於怒時觀理蓋為未知用功者設此法門如知仁體則已不必言此矣答謝子録昨遽以甘泉翁集序上請蒙不見却復賜教云當知湛王二公之所以同又知其所以異吾人又當自知曽於二公異同處用功孰得孰失誠為確語愚固自審之矣慨自慎獨之旨不明於天下雖曽力行篤信師法古人猶謂有不得預聞於道者自二公以所不睹不聞性之體發之學者曉然知天德王道真從此心神化相生相感不復落於事功形迹之末其有功於後學不淺此非其所同乎雖然其所同在此而其所異與吾人用功之有得失者亦在此何者微之顯誠之不可掩聖人之學脈也於微顯處用功內省不疚無惡於志又進而敬信渾然至於上天之載無聲無臭以復此顯微之體此聖學工夫也夫方工夫本體講論大明之時而猶異同明晦終有未盡合者固由於學之不善其亦救偏補弊之過有以致之與陽明公之言曰獨知之知至靜而神無不良者吾人順其自然之知知善知惡為良知因其所知而為善以去惡為致良知是於行上有功而知上無功蓋其所謂知自夫先天不雜於欲時言之是矣至復語人以不識不知及楊慈湖之不起意為得聖學無聲臭命脈一時學者喜於徑便遂概以無心之知為真知不原先天不問順帝之則如尊教所為任性而非循性者是過懲意識之故也故嘗謂陽明公門弟之學似倚於微而無失之倚非良矣愚故尊之喜之取以為益雖嘗學焉而未得也甘泉公竊為此懼乃大揭堯舜授受執中心法惓惓補以中正之語故其言曰獨者本體也全體也非但獨知之知為知乃獨知之理也才知即有物物無內外知體乎物而不遺是之謂理即上文所不睹不聞之所下文未發已發之中和末章上天之載是也中庸不云或學而知之乎之者逹道也理也學者致良知也致知而學以求知此天理是乃致知在格物君子學以致其道之謂若謂學以致此良知斯無謂矣後來學者因有執中之説亦惑於感應之際舍初念而逐善惡是非之端以求所謂中正者恐未免涉於安排而非性體之自然故嘗謂甘泉公門弟之學似又倚於顯而有失之倚非中矣愚實尊之信之視以為法雖嘗學焉而未至也顯之失尚有規矩可循微之失則漸入於放而蕩矣雖然微之失未必無所由起而顯之失乃誠吾人之不善為擇也忘助俱無中斯見矣擇斯得矣夫忘助俱無者非心之規矩乎雖云正心本於誠意致知然良知不能為一身主宰其所以致知擇中而為一身主宰者在心故堯舜開心學之源曰人心道心夫子曰其心三月不違仁謂仁與良知天理非心不可然心者實天理良知之管攝也求之心則二公之異同亦可得其一二矣其可併以支離病哉乞訂證數言以俟百世答徐存齋閣老必於未感之先而求心事相關之處則已涉於起意未免反為心病明道曰廓然而大公物來而順應能順應處即相關處矣以心應事猶是心小答永嘉陳生旦危大也人心為形器為費道心為義理為隱答白齋弟圭時時未發時時已發之説似大儱侗不如還是未感寂然不動已感油然遂通寂然不動無時節內外感而遂通有時節而無內外無時節內外故流行昭著不已之本體不可見而有物所謂人生而靜天之性也有時節而無內外故流行昭著變化之妙用可見而無因所謂感物而動性之欲也答子明叔熺動靜體用緣只是本體流行如春夏秋冬非謂必以靜之體而致用也語默感應運而不已何者為先何者為後若謂之默以為語體當其默時復何用語當其語時於默何功惟不知周子之所謂主靜云者實因無極示人以無欲本體決不為妄動纍耳答葉生嘉泰泉翁嘗語僕云有聖學之省察有賢學之省察賢學省察猶去草於地無由乾淨聖學之省察如去草於田草去而苗物之生意暢然矣蓋有我與無我而路徑之有廣狹故也有我者意見也知識也如原憲由張之類是也其他私欲種種者不論矣然以有我之心而去其礙我者終是有有我在其為路也隘其轉動也難及其成也修念之學是已張子曰大其心則能體天下之物大心者見大也見大則全體之真志在而意見知識廓然矣日用酬應由真志不由有我其為路也廣其轉動也易此顔子所以為仁能由已聖學也復趙石梁云既知良知為入道端倪安得不歸之以寂似非陽明公本旨陽明云蓋謂此知本寂本感本密本神既天命之性所不覩聞之獨充塞宇宙上下古今橫飛直上入知出愚為道之全體不但端倪而已又何寂之歸乎總之子思只言知不言良孟子以後造端言良造詣言知今則自陽明公良知之説起好徑者不察而競趨之而後良知與知混雜而無用而知之德亡矣知亡而後修德凝道之學晦答張道亨先逹天理人欲從子思中庸看來只於中與太過不及别之中是此物過是此物不及亦是此物學者只致其中斯天理自存豈有中在是而又有太過不及二者退於兩旁之理故曰惡亦不可不謂性自天則謂之天命自人則為之修道戒慎恐懼即是真心即是天命本體流行而云戒懼以養不覩不聞之體自修道者言之義未盡也識得只消言修已以敬言戒慎恐懼識不得則雖云不覩不聞依舊是有覩聞之戒懼故修道原從天來答祝介卿箕子以天道五行之土屬心然即不言心而曰思曰睿意亦思類也如箕子列脾土當屬心而今論五行者乃不屬心而屬之於意脾土之生意周貫於視聽言動心身家國天下而自以快足於已其不亦睿作聖類乎蓋有官位有官職心官位也思意官之所以盡職也官職盡而猶復求官位之事斯亦無可求矣寄余孝甫純似夫文幾也當幾之來黜見聞忘資稟泯意識由乎天衷而不以有我之私小之是之謂博與溥博如天之博意同故知崇如天禮卑如地約禮即承幾之實禮見之於行者耳此區區博約之説也復汪子烈自有天地以來太極兩儀五行萬物一氣渾淪可以言有而不可以言無専言無生無滅則其無也謂之空因其有生有息而緣迹於無則其有也謂之虛虛者知之體仁之原也劉師泉七十夀序盈天地之間一氣也其為形色一體也一體渾然孰為之善孰為之惡自有善惡之説分而後去取之念起去取之念起而後天下之為學者日後事於刻核名實之辨軀殼一絲畦徑方丈忘則弗可見之矣贈余九陽夫禮固不在物矣宇宙渾淪無間可破吾渾而合之非物無以發吾心之精謂心之理不在於物不可也理固在於心矣虛靈洞徹無罅可乘吾類而彰之非物又無以見斯理之用謂物之理非吾心之理不可也斗山精舍記吾心之天本無不正是故有不正之動而無不正之知動而後有善惡而其幾之者皆善也幾而後有善惡而其所以能善於幾而不奪於惡者皆知也知則人不知則鬼人鬼之分一知而已石橋嚴天泉書院記因吾未形方形天然自有之幾審其止而出之勿失者其根本之學由善以為明者也心與事皆善矣外吾未形方形天然自有之幾審其旨於意見尺度而出之勿失者離根之學行善以為明者也其事似是而心則非矣是故猶之天體然苟得其明則衆心之燦皆天也苟得其善則萬事之察皆心也不爾將事事而比之隨吾子臣弟友之遇而求合以能至於道斯亦爝火之明耳明善堂記赤子之欲未成於意成意故惡未成意故善夫子之所謂習者習於意成於意耳所謂不移者其亦意之不肯移者耳故子斷以為惡起於意起於外而非起於心起於知也宇宙之內渾然粹然而已渾然粹然而猶有所不可入者人耳有人斯有已有已斯有意已與人對意與天地萬物對物感而意發焉各得其正無所著於念而率乎純粹之原者道也蓋格於物而誠焉者也是所謂道吾知於物者也各得其正而猶不免有所著焉不可以化於物者意也蓋誠在意而未格於物者也是所謂以意誠意其意小者也發焉既有所著著極而轉念焉乘之以貪戾驕泰不恕不仁而不可解者意之蔽也蓋塞於意而無物者也是所謂以意起意者也夫物非真無也知在物而物在焉物與知無不善者是故在致而格之其排決疏瀹而所謂咽喉者沛然矣夫排決疏瀹者水之汚而非水也去其不誠以歸於誠者物之意而非物也故入門之功其要在意其本在知其用力之總會在格物孟子曰人皆有所不忍逹之於其所忍充之足以保四海親親敬長逹之於天下皆言格也格則意化而仁如惡惡臭如好好色真心內徹而意不足言矣是即所謂萬物一體者也誠意説答俞仲立明儒學案卷三十九
