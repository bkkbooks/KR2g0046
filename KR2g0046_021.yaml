body:
  text: 明儒學案卷二十一餘姚黃宗羲撰江右相傳學案六文潔鄧定宇先生以讚鄧以讚字汝德號定宇南昌新建人隆慶辛未會試第一選庶吉士厯官編修右中允管國子監司業事南京祭酒至吏部侍郎入仕二十餘年受俸僅六年以國本兩上公疏先生澄神內照洞徹性靈與龍溪言學問須求自得天也不做他地也不做他聖人也不做他陽和謂所言駭世人之聽先生曰畢竟天地也多動了一下此是不向如來行處行手假而先生記中刪此數語亦慮其太露宗風乎謂陽明知是知非為良知特是權論夫知是知非不落於是非者也發而有是有非吾從而知之謂之照無是無非澄然在中而不可不謂之知是知非則是知之體也猶之好好色惡惡臭好惡之體何嘗落於色臭哉在陽明實非權論後來學者多在用處求辨之於有是有非之中多不得力先生墮其義不可謂非藥石也先生私淑陽明之門人龍溪陽和其最也定宇語録夫學之為心性也靜所以攝心而非心也所以求性而非性也夫是物也在目為視在耳為聽在手足為持行安往而不存焉惡在其必靜也故古之聖賢於惻隱而驗其端於知能而觀其良要以直參其體而已吾人耳目口鼻雖是個人還有個生意貫恰於其間仁乃人之生意有此生意人才成得如心不在視不見聽不聞食不知味則不成矣天地間皆易即所見天風木葉鳥聲無非易者吾人在此一動即落一爻道本至中稍有一毫倚著即是過處形色天性也天性原在形色之內如眼能視耳能聽手足能持行這是甚麼就有個天性在聖人之踐形全得這個視聽言動以理自然聲為律身為度耳成個耳目成個目手足成個手足賢智者知有天性而不知其在形色之內是知天而不知人愚不肖者徒知有形色而不知有天性是知人而不知天用之則行大行其道也舍之則藏退藏於密也夫子在魯國一用便幹出許大行事出來顔子居陋巷豈止藏他一身將生平所學盡是藏了故到今人只知他是個聖人即求他言語文字之粗了不可得何曾識得此中之深深此是聖人最妙處人之真心到鬼神前毋論好醜盡皆宣泄有是不能泯滅處制方以矩至極方處就是巧制圓以規至極圓處亦是巧方圓之上更復可加就非規矩學問從身心上尋求縱千差萬錯走來走去及至山窮水盡終要到這路上來人之生也直如日用之間人呼我應人施我答遇渴即飲遇饑即食便是若於此中起半㸃思維計較牽强裝飾即謂之罔人之氣不要他用事凡從性上發出的便中和從氣上起的便乖戾居家處事有不慊意處只求本體常真有一毫求人知意思就不是只以至誠相處不占而已占非是卜筮擬議在我吉凶亦在我易曰擬之而後言議之而後動凡舉動言語進退不妨慢些學問只在向內不論朝市山林皆須正己物正不然而徒陪奉世情愈周密愈散漫到頭終不得力老子曰恍忽有物窈冥有精即今如我身中所謂物與精者何也蓋嘗求之庶幾有似而近見則又異矣以為有聚則有散也有生則有滅也有天地則有混沌也故不欲别凡聖不欲揀是非不欲欣寂不欲厭動常自笑曰吾無聚胡散吾無生胡死吾無天地胡混沌然則此愈難矣論心者皆曰須識其本體余謂心之本體在順其初者也初者萬慮俱忘之時也突然感之卒然應之則純乎天者也意氣一動而二三之念則繼乎又其甚者此念方萌而二與三已並出其間繼與並皆非初也故親我愛也謂當愛而加之意則否長吾敬也謂當敬而加之意則否守死是也爭死未是專財非也散財亦非貴而益謙與傲同醉而益恭與亂同何也徇外之心為人之心也所謂繼與並者也此心之原不墮方體不落計較倐然而往倐然而來見其前而不見其後知其一而不知其兩如此而已矣此則所謂初者也心者天之所以與我何以與之人之異於禽獸者幾希何以異之胡為而能喜胡為而能怒其思也於何而起其寂也於何而斂人皆曰莫為而為莫致而致夫天地之運日夜不息豈誠無以主張是也論學書古之哲人置心一處然率以數十年而解其難也如是藉以生滅之心猥希妙悟誰誑乎與吳安節非悟無念則未知今念之多危非見天心則未知物則之有自源清而後流潔心寂而後感神與許敬菴陽明先生以知是知非為良知權論耳夫良知何是何非知者其照也今不直指人月與鏡而使觀其光愈求愈逺矣且及其是非並出而後致是大不致也秋遊記直心而動過也人皆見之更也人皆仰之不然猶藏也我輩擇地而蹈詎不自謂躬行豫嘗度之猶然在譽毁之間假饒一規一矩曾何當於本心參政陳䝉山先生嘉謨陳嘉謨字世顯號䝉山廬陵人嘉靖丁未進士授廬州推官召為户科給事中厯吏兵二科不為分宜所喜出任四川副使分巡上川南擒髙酋平白蓮教平鳯土官皆有功績丁憂歸萬厯甲戌起湖廣參政不赴以學未大明非息機忘世無以深造遂乞休癸卯年八十三卒少讀書西塔值劉兩峯在焉即師事之間以其說語塘南塘南心動亦往師之一時同志鄒光祖敖宗濓王時松劉爾松十有七人共學兩峯之門螺川人士始知有學先生倡之也歸田後為㑹青原與塘南相印正慨然士習之卑陋時舉江門名節藩籬之語以振作之凡來及門者先生曰學非一家之私也有塘南在賢輩盍往師之其忘人我如此䝉山論學語答友人書曰人之生而來也不曾帶得性命來其死而往也不曾帶得性命去以性命本無去來也乾性坤命之理合天地萬物為一體者也悟性修命之學還復其性命之本然通天地萬物為一貫者也孔子曰乾坤毁則無以見易易不可見則乾坤或幾乎息矣苦心哉聖言正以明乾坤無可毁之理此理萬古常然一瞬息未嘗不然有去來則有動搖有增損有方所惡得謂之一體惡得謂之一貫豫故曰性命本無去來也姑借譬之明月之夜兩人分路而行一人往南月隨之而南一人往北月隨之而北自一人以至千萬人自南北二路岐以至千萬路岐皆然謂月不隨人去來衆人疑之謂月隨人去來智者笑之然則月未嘗隨人去來也斷可知矣雖然懸象之月其體魄可指而見蓋形也而非形形者性命則形形者惟形形者而後能形天下之形天地萬物孰為之始咸資始於乾元乾元性也天地萬物孰為之生咸資生於坤元坤元命也天地萬物由性命而生猶之人子由父母而生不得不謂之一體也惟一體故稱一貫惟一貫故無去來後儒誤認錯解以為人生時全帶一副當性命來人死時全帶一副當性命去如此而後為之備道全美略無虧缺此言近理而易信不知其割裂支離其悖一貫之旨逺矣乾惕齊警語曰夫人一心之應感一身之勤動其事殊矣其在五倫上用心則一也於此盡道便是聖賢胚胎於此造業便是輪回種子於此一切置之不問便是釋氏作用所以吾徒與釋氏決分兩路決難合并釋氏之言與吾儒相近者間一借證以相發明使人易曉亦自無妨必欲一一效其所為則舛矣又曰天地絪緼即理即氣萬物化醇人一物也人在天地絪緼之中如魚在水中不可須臾離也魚不能離水而未嘗知水人不能須臾離道而未嘗知道故曰百姓日用而不知明道之責歸君子聖逺言湮各得其性之近莫知所取衷也故曰君子之道鮮矣又曰苦修後悟方是真悟了悟後修方是真修必有事焉而勿正心勿忘勿助長未嘗致纖毫之力此其存之之道此名徹悟亦名真修悟修並舉譬則學與思缺一不可而思最易混見故孔子謂思無益其教人曰慎思子夏亦曰切問近思又曰此學尋求到四面迫塞無路可行方漸漸有真實路頭出此路須是自己尋出不是自己尋出的譬如畫圖上看山川照他路徑行不得又曰學莫大於變化氣質而變化必本於乾道故曰乾道變化又曰知來者逆謂以乾道變化其氣而逆修之聖賢變化其氣質之偏長學者變化其氣質之偏蔽一本之乾道也既未濟兩言伐鬼方教學者變化其不美之質當如此一為氣質護短包藏禍心誤己誤人終身無出頭之日又曰此理非常目在之不能悟非常目在之不能守象山先生云人精神逐外到死也勞攘精神逐外不逐外只在阿堵中辨之修德者以此自辨取友者以此辨人又曰死心二字是學問斬關將身死易心死難自古慷慨殺身者身死矣心未可知也故曰身死易心死難天嘗以死心機會教人而人未易受一切危境危病及遭際人倫之變異常拂逆皆教人心死也甚哉天心之仁也世人福薄故未易受龍場驛萬死一生陽明先生福氣大故能受死盡世情心洞見萬物一體本原然後靜坐工夫可安而久久則用功愈密心量愈無窮際無終始見得一體愈親切有味此心與此理漸漸有湊泊時也一或不見己過一或執見解為實際精神便外照象山所謂到死也勞攘者假饒屏絶萬事趺坐深山積以嵗年何益乎又曰復見天地之心以人之心即天地之心一心之外無天地也這個天地之心便是學問大頭腦便是萬物一體大本原只因不復故不能見故曰復見天地之心又曰復而後有無妄學問未見頭腦時舉心動用無非妄也徴君劉瀘瀟先生元卿劉元卿字調父號瀘瀟吉之安福人鄉舉不仕徴為禮部主事有明江右之徴聘者吳康齊鄧潛谷章本清及先生為四君子初先生遊青原聞之輿人曰青原詩書之地也笙歌徹夜自兩鄒公子來此風遂絶兩公子者汝梅汝光也先生契其言兩鄒與之談學遂有憤悱之志歸而考索於先儒語録未之有得也乃禀學劉三五以科舉妨學萬厯甲戍不第遂謝公車遊學於蘭溪徐魯源黃安耿天臺聞天臺生生不容己之㫖欣然自信曰孟子不云乎四端充之足保四海吾方幸泉不流也而故遏之火不然也而故滅之彼滅與遏者二氏之流吾所不忍先生惡釋氏即平生所最信服者天臺塘南亦不輕相附和故言天地之間無往非神神凝則生雖形質藐然而其所以生者已具神盡則死雖形體如故而其所以生者已亡然而統體之神則萬古長存原不斷滅各具之殘魂舊魄竟歸烏有此即張橫渠冰漚聚散之說移而論之統體之神與各具之之神一而已矣舍各具之外無所謂統體也其生生不息自一本而萬殊者寧有聚散之可言夫苟了當其生生不息之原自然與乾元合體醉生夢死即其生時神已不存況死而能不散乎故佛氏之必有輪回與儒者之賢愚同盡皆不可言於天人之際者也劉調父論學語曰必明於行之原乃知所以修行若逐事簡㸃無事則離所謂可離非道也故行也者行乎其所不容不行則無往而非修行矣趙純父曰即今擁爐向火亦修行乎劉大冶曰向火能不放心即是學問調父曰即好色能不放心亦是學問乎劉任之曰恐是不著察調父曰只今孰不著察抑曽見有人置足爐中者乎周思極曰心體至大至妙當向火自向火當應對自應對當惻隱自惻隱當羞惡自羞惡舜之用中顔之擇乎中庸孔子之祖述憲章只是能全盡此向火之心體耳不放心者放失也不失此心體之全也著察者猶默識也默識此心體之全而存之也曰不放曰著察豈能於無思無為上加得一毫今之所謂不放心所謂著察皆有所造作於心之內矣復禮會語夫耳目口鼻形也而所以主夫耳目口鼻者性也或謂落形氣之性尚屬後天必求所謂未生以前者而完之夫曰未生矣則安用完之而又安所致力以是不得不托之想像想像則終非實見雖有呈露勢必難恆用功愈密入穴愈深夫耳之欲聲目之欲色無生之真機也然而視非禮之色聽非禮之聲則其中若有不自安者亦無生之真機也故君子之治性惟於吾心之所安者而必滿其量焉則凡欲聲欲色之欲無非真機之流動又焉往而不得性哉天地有德此性無窮彼外生生而求無生面目者轉瞬之際已不可持能不朽乎與王中石知味心也遇飲食則知味遇父知孝遇兄知悌遇孺子入井知怵惕窮天徹地無非此知體充塞故曰致知焉盡矣存心者能盡其心體之量者也盡其心體之量則知乃光大無逺不燭與章斗津聖人本吾不容己之真心撫世酬物以事處事何其空也天地有盡此不容己之心實無有盡何其不磨也與趙純父近溪羅先生會講有僧在座近溪問之曰儒者言心言性言念言意言慮言才紛若繭絲諸微細惑試一一為我破除僧久之謂近溪曰我今見近溪喚作近溪矣不知夫人作何稱謂曰稱相公曰父母云何曰稱行曰為諸生時廣文云何曰稱字僧大聲向近溪云汝乃有許多名色近溪恍然下拜丘汝止述之調父曰夫紛紛名號由人所稱信矣然令夫人喚先生名家公稱先生號先生能安之耶以斯知三千三百探之則漠然而無達之則森然而有强有其所無命之曰鑿强無其所有命之曰滅鑿與滅皆不可以為道論名理夫欲有二有不容不然之欲有心所沉溺之欲自不容不然者而言無論欲明明德之欲不可去即聲色臭味之欲何可一日無何也皆天也自心所沉溺而言無論聲色臭味之欲不可不去即行仁義之欲亦不可一日有何也皆障天者也去欲記去欲特學中之一事耳譬如人君統六官治四海孰非其事而專以捕盜為役一追胥之能耳何國之能為曰如子之說則心無事矣曰心自有事尋事持心障心實大如目之為用本無所不覩若注視棘猴將迷天地凝神吳馬或失輿薪舍去欲去念等事則宇宙內事無非事矣同上耿先生謂學有三關始見即心即道方有入頭又見即事即心方有進步又要分别大人之事與小人之事方有成就我安福彬彬多談學者或從性體造作以為明或從格式修撿以為行或從聞見知解以為得則於即心即道已逺又何論第二三關也復禮會語序告子曰性無善無不善見天而不見人或人性可以為善可以為不善見人而不見天或曰有性善有性不善則天與人互見其半惟孟子曰乃若其情可以為善則知天知人一以貫之同上學憲萬思默先生廷言萬廷言字以忠號思默南昌之東溪人父虞愷刑部侍郎受業於陽明先生登進士第厯禮部郎官出為提學僉事罷官歸杜門三十餘年匿迹韜光研幾極深念菴之學得先生而傳先生自敘為學云弱冠即知收拾此心甚苦思强難息一意靜坐稍覺此中恰好有個自歇處如猿猴得宿漸可柔馴頗為自喜一日讀易石蓮洞至艮思不出位恍有契證請於念菴師師甚肯之入仕後交遊頗廣聞見議論遂雜力淺心浮漸為搖眩商度於動靜寂感之間參訂於空覺有無之辨上下沉掉擬議安排幾二十年時有解悟見謂𢎞深反之自心終苦起滅未有寧帖處心源未淨一切皆浮幸得還山益復杜門靜攝默識自心久之一種浮妄熱閙習心忽爾銷落覺此中有個正思惟隱隱御吾形氣若思若無思洞徹淵澄廓然邊際敻與常念不同日用動靜初不相離自是精神歸併在此漸覺氣靜神恬耳目各歸其所頗有天清地寧冲然太和氣象化化生生機皆在我真如遊子還故鄉草樹風烟皆為佳境矣先生深於易三百八十四爻無非心體之流行不著爻象而又不離爻象自來說易者程傳而外未之或先也蓋深見乾元至善之體融結為孩提之愛敬若先生始可謂之知性矣萬思默約語人於事上應得去是才未必是學須應酬語默聲色形氣之外於自心有個見處時時向此凝攝常若無事然一切事從此應付一一合節始是學心者人之神明所以為天地萬物萬事之主雖無物未嘗一息不與物應酬故曰寂然不動感而遂通天下之故但其感處常寂至無而有甚微甚深不可測度必極潛極退藏庶其可見衆人心常浮動隨物祇在事上安泊舍事如胡孫失樹無時寧息以事實心蔽塞天竅何由得見此體是以雜念紛紛全無歸泊心源不淨一切皆浮雖向好事亦是意氣意見總屬才質耳與真正性命生幾感通流行了無相干安得為學自人生而靜以上至日用見前渾成一片無分天人坤者乾之用不坤則非乾故用九貴無首坤初惡堅冰夫資生之後形分神發類誘知開陽亢隂凝隨才各異不能皆順乾為用於是必有􅍖合太和之功蓋坤在人是意意動處必有物物必有類朋類相引意便有著重處便是隂凝是堅氷亦是有首失却乾陽本色所謂先迷失道也所以聖人於意動微處謹履霜之漸收斂精神時時退藏齊戒務以一陽為主消蝕意中一㸃隂凝習氣喪類從乾使合中和所謂後順得常也到德不孤不疑所行方是黃裳元吉堯舜兢業文王小心孔子一切有所不敢不如此則非乾乾所謂以誠敬存之也故學者先須識得乾元本體方有頭腦蓋坤以乾元為主元是生理須時時有天地變化草木蕃意思以此意自存始不失乾元大始氣象故曰直方大不習無不利夫不習即不學不慮是自然的如耳聰目明手持足行孩提啼笑愛敬何嘗習來自與天地變化同其妙用若待一一習得能做幾多事業動手便滯只區區形局中一物而已故說敬必如明道所謂勿忘勿助未嘗致纖毫之力方是合本體工夫不似後儒拘滯於形局也誠意工夫只好惡不自欺其知耳要不自欺其知依舊在知上討分曉故曰必慎其獨獨是知體靈然不昧處雖絶無聲臭然是非一些瞞他不得自寂然自照不與物對故謂之獨須此處奉為嚴君一好一惡皆敬依著他方是慎或謂致良知於事事物物就用說知止就是心止處說似有不同曰體用原是一心物我皆同此止未有心止物不得所止亦未有物得所止心不止者如處事一有不當則人情不安是物失所止自心亦便有悔吝不安處是吾心亦失所止須一一停當合天則人已俱安各得所止方謂之止非謂我一人能獨止也此正是致良知於事事物物也致良知於事事物物即所謂知止也故知止致知是一個工夫平天下平字最妙深味之令人當下恬然有與天地萬物同止其所氣象一道清泠萬古常寂學者須見此氣象格致誠正與修齊治皆行所無事不作頗僻不落有所人人孝弟慈使人人定靜安浪靜風恬廓然無事總一個至善境界所謂安止也何等太平蓋古之帝王起手皆是平的意思故結果還他一個天下平後世不然多屬意氣意見有作功能自己心浪未平安能使人心太平古人平的氣象未夢見在知之為知之不知為不知是知也知之不知之知是所知因感而有用之發也是知之知是能知不因感有常知而常無知體之微也此體是古今天地人物之靈根於穆中一㸃必不能自己之命脈夫子為天地立心生民立命全是發明此件聖門學者惟顔子在能知上用工終日如愚直要瑩徹心源透根安立其餘多在所知上用力子貢所謂文章可聞皆是所知惟性與天道不可聞者始是知體顔子資髙其初以為事物不必留心便要徑約直從形而上處究竟仰鑽瞻忽無有入處故夫子教他須一一從事物上理㑹由博文方有依據事物透徹方是形而上者顔子竭才做去久之豁然覺得何處有髙堅前後渾然只當然自己一個心視聽言動處處顯露不加減分毫上下亦無前後故曰如有立卓爾但顔子博約與後儒說者不同博便是博乃約的如處事必討自心一個分寸如讀書必本自心一個是非如聖賢格言至論一一消歸自心一切種種散見處皆見得從自心條理中出久之覺得只是自己一個心凡不遷不二不逺復皆在此一處分曉又何等約故自博而約語有次第博即是約理無先後同一時事若後儒所云博是從外面討分明作兩截做精神耗蝕何由得卓爾孔子一假生活意思惟顔子得之最深故於言而悅在陋巷而樂却以如愚守之其餘則多執滯若非曽㸃說此假光景孔子之意幾於莫傳以三子照看便見㸃意活三子意滯於此反照自身便知自己精神是處一切不應執著識此便是識仁蓋生活是仁體喜怒哀樂之未發謂之中不是推深說正要見性命之實在人尋常喜怒哀樂中其未發就是那能喜怒哀樂的常自然在也明其至近至易也聖人位育功化皆從平常自在中來無為而成不須造作所以謂之淡而不厭謂之中庸日間常令恬淡虛閒之意多便漸次見未發氣象費而隱正對索隱說言隱不必索就在面前用的便是日日用著他却又無些聲臭可覩聞得故曰費而隱也若費外有隱則須待索語大語小夫婦鳶魚何處不是費更有何空閒處可藏隱而待索耶性天皆心也只盡心便知性知天只存心便養性事天其實只一存字但存不容易須死生判斷始得故惟夭夀不二修身以俟命自我立一切自做主宰方是存的工夫常存便是盡故夭夀不二乃存心工夫極緊切真實耳存久自明性天在我非存外更有一個知天養性立命之功也孩提愛敬世儒看作形生以後最初一竅發念最好處却小看了乾坤只是一個生理一個太和元氣故愛敬是乾坤骨髓生人的命脈從這些子結聚方成人故生來便會愛敬不是生後始發此竅也不然既非學慮此念愛敬的從何處交割得來孟子深於易從資始處看透這消息故斷以性善若人深體此意則天地日月風雷山川鳥獸草木皆是此竅無物不是孩提無時不是孩提形色天性渾然平鋪故曰無他達之天下也日間嘗驗心有所可又隱然若有以為不可者有所不可又隱然若有以為可者依之則吉不則凶悔吝是常若有一物居無事而默默在中為酬應之主人僞多一毫移易他不得所謂未發之中道心惟微是也人豈有二心只精則一不精則二一則微二則危矣前有所可有所不可是多生習氣逐物慣習之心謂之人心胸中若有二物交搆相似故危後隱然以為不可又以為可是天則自然謂之道心萬事皆從此出而胸中常恬淡靜深無有一事故微要之人心是客感客形耳總只是個道心故用工全在惟精所謂精者非精察之精乃精專之精也暗然收斂屏浮僞雜駁之纍氣潛神凝胸中漸一一則微常微常顯是謂允執厥中所謂一念羲圖者如處一事斂念注思是坤思而得之泰然行去是復或遇事念中太鋭便挫斂是坤少間意氣和平做去是復懲忿窒欲皆然若能常自退藏則總是一個乾元自卷自舒自專自直先天在我心急操之則二有馳者有操之者蓋渾而存之則一是謂立誠有道者神常勝形形雖槁自有一種在形骸之外油然襲人愈久愈有味蓋得之涵養之素也學問養到氣下慮恬見前便覺宇宙間廓然無一絲間隔無一毫事受用不可言說日間涵養此言嘗有冲然恬愈和適不著物象之意始是自得所謂元吉者元是一團生生之意若常是這意流行無處不吉易以知險簡以知阻不是要知險阻是當險阻處一味易簡之理應之自不見險阻耳蓋聖人隨處總一個乾元世界六十四卦皆要見此意心體無量廣大不是一人一個心三才萬物亘古亘今總在裡許存得便首出庶物萬國咸寧是謂立人極詩稱文王之德必曰和敬和是敬之自然處敬便和也所謂自然亦非由勉心念雖紛雜天生有個恰好存處尋到恰好處自然一便是敬明道所謂勿忘勿助中間正當處也故存是合他自然恰好處非能强存若强存袛益紛擾即勉到至處亦是以敬直內或曰先生恆言存心以下然歟曰然惡其牽於物而浮以强故下之下則近乎潛矣又言以息然歟曰然惡其作於為而梏以亡故息之息則幾乎止矣曰抑之愈亢息之愈馳奈何曰抑之愈亢為以有下下之不知心體之自下也乾所以為潛也息之愈馳為以有息息之不知心體之本息也書所以稱止也潛則藏乎淵止則幾乎寂淵寂者天地之靈根學易之歸趣也然則兩者不一乎曰否息而後能下也是存之之妙旨也一且不可得而況不一乎嗟夫浮陽之亢緣慮之馳吾人習心流注久矣世方倚以立事而孰能息之孰能下之存久自明何待窮索窮索是意路名言與性命之理無干蓋明處即存處非存外别有理可明天地萬物古今萬事總自這裡來常存得便都在裡許志氣清明漸自顯露思不出位思是能止位是所止云不出是常行而常止也然思是活物位有何形總天則自然耳親切體此無如儼若思三字蓋思則非無儼若則非有有無之間神明之位昭然心目息止也生也才息便生平旦雨露潤澤萬物功德遍天下倐忽之間從何處生來妙不可測知道者默成而已周程後儒者少知此理向有作思維處理會功業終有方局為不從廣生大生中來也豫官祠部與寮友至一寺中友問篤恭天下平意旨豫未答時一僧端坐誦經誦畢起問訊就坐閒靜無一言目平視不瞬時又兩官人提熱柄者意氣偕來甚衆以語挑問之不答稍頃各默然又頃則皆有斂袵消歇意豫留坐終日則皆茫然自失豫因與友人言此便是篤恭天下平之理只患反已不深不造至處耳今人不說此理要以聲色動人即動亦淺然此理自周程後未有深信者使此僧當時答問往復這意思便都浮散了安能感人心火也性本躁動夙生又不知費多少薪槱藴積之故光明外鑠附物蔓延思慮煩而神氣竭如膏窮燼滅其生幾何古之善養心者必求一掬清淨定水旦夕澆浸之庶轉濁辱為清涼化强陽為和粹故大學定靜中庸淵泉孟子平旦之息大易艮背之旨洗心之密皆先此為務潤身潤家國天下一自此流出不然即見髙論徹終屬意氣是熱閙欲機人已閒恐增薪蘸耳但此水别有一竅發自天源洞無涯涘未可意取必暗然君子晦迹韜光抑氣沉心庶其冥會則天源濬發一㸃靈光孕育大淵之中清和渾合默收中和位育之效於眉睫閒肫肫浩浩淵淵造化在我蓋是資始以上生涯不作雲雨流行以後活計也忠恕盡乾坤之理喜怒哀樂之未發謂之中中是心體凡事只如這個心做去便是恕明道曰惟天之命於穆不己不其忠乎天地變化草木蕃不其恕乎語最徹其餘都說粗了豫學以收放心為主每少有馳散便攝歸正念不令逺去久之於心源一竅漸有窺測惟自覺反身默識一路滋味頗長耳欲立欲逹人有同情惟一向為己則為私積之則是天地閉賢人隱若能就將此欲譬諸人人不必更别起念只本念上不動絲毫當下人已渾然分願各足便是天地變化草木蕃也然此在一念微處轉移毫忽便有誠僞王霸之辨故學貴研幾誠無為幾則有善惡何者凡動便涉於為為便易逐於有逐有則雖善亦粗多流於惡故學問全要研幾研者磨研之謂研磨其逐有而粗的務到極深極微處常還他動而未形者有無之間的本色則無動非神故曰誠神幾曰聖人大學知是寂物是感意却是幾故必先誠意夫天地人總是個動幾自有天地此幾無一息不動一息不動則乾坤毁自有此人此意無一息不生不生則人心死但只要識得動而常寂之妙體耳非動外有寂即動是寂能動處不涉於為所動處不滯於迹便是真寂易所謂位是安頓自己身子處身子安頓停當事事停當故曰位正當又曰以剛中皆安其身而後動之意若自身安頓不停當事事不當故曰位不當可見士君子處天下國家無論窮達先要安頓此身或曰亂臣賊子已往安知懼曰此拘儒之見也萬古此君臣萬古此人心則亦萬古此一㸃懼心夫子視萬古如一息只剔得這㸃懼心昭然在天地間便自君臣上下各自悚懼各安其分各盡其職今亦猶古古亦猶今有何已往有何現在未來此皆世儒小見在形骸世界上分别與論遷固之史何異明儒學案卷二十一
