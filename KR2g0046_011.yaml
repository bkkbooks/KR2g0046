body:
  text: 明儒學案卷十一餘姚黄宗羲撰浙江相傳學案姚江之教自近而逺最初學者不過郡邑之士耳龍場而後四方君子益進焉郡邑以學鳴者亦僅僅緒山龍溪此外則推輪積水耳吾越尚講誦習禮樂絃歌之音不絶其儒者不能一二數若山陰范壦字廷潤號栗齋初師王司輿許半圭其後卒業於陽明博攷羣經怳然有悟以為孔孟的傳惟周程得之朱陸而下弗及也家貧不以關懐曰天下有至寳得而玩之可以忘貧作古詩二十章歴叙道統及太極之説其奥義未易測也餘姚管州字子行號石屛官兵部司務每當入直諷詠抑揚司馬怪之邊警至司馬章皇石屛曰古人度徳量力公自料才力有限何不引退以空賢路司馬謾為好語謝之以京察歸大洲有宿四祖山詩四子堂堂特地來謂蔡白石沈古林龍溪石屛也范引年號半野講學於青田從遊者頗衆夏淳字惟初號復吾以鄉舉卒官思明府同知魏莊渠主天根天機之說復吾曰指其靜為天根動為天機則可若以靜養天根動察天機是岐動靜而二之非所以語性也柴鳳字後愚主教天眞書院衢嚴之士多從之孫應奎字文卿號蒙泉歴官右副都御史以傳習錄為規範董天眞之後聞人銓字邦正號北江與緖山定文錄刻之行世即以寒宗而論黄驥字德良尤西川紀其言陽明事黄文煥號吳南開州學正陽明使其子受業有東閣私抄記其所聞黄嘉愛字懋仁號鶴溪正德戊辰進士官至欽州守黃元釡號丁山黃蘷字子韶號後川皆篤實光明墨守師說以此推之當時好修一世湮没者可勝道哉郎中徐橫山先生愛提學蔡我齋先生宗兖御史朱白浦先生節員外錢緖山先生德洪郎中王龍溪先生畿郡守季彭山先生本宗伯黃久庵先生綰布衣董蘿石先生澐附子穀主事陸元靜先生澄司冦顧箬溪先生應祥侍郎黃致齋先生宗明中丞張浮峯先生元冲侍郎程松溪先生文德太常徐魯源先生用檢大帥萬鹿園先生表侍郎王敬所先生宗沭侍讀張陽和先生元忭教諭胡今山先生瀚浙中相傳學案一郎中徐橫山先生愛徐愛字曰仁號橫山餘姚之馬堰人正德三年進士出知祁州陞南京兵部員外郎轉南京工部郎中十一年歸而省親明年五月十七日卒年三十一緒山傳云兵部及告疾歸皆非先生為海日公之壻於陽明内兄弟也陽明出獄而歸先生即北面稱弟子及門莫有先之者鄧元錫皇明書云自龍塲歸受學非其後與陽明同官南中朝夕不離學者在疑信之間先生為之騎郵以通彼我於是門人益親陽明曰曰仁吾之顏淵也先生嘗遊衡山夢老僧撫其背而歎曰子與顏子同德亦與顏子同壽覺而異之陽明在贑州聞訃哭之慟先生雖死陽明每在講席未嘗不念之酧答之頃機緣未契則曰是意也吾嘗與曰仁言之年來未易及也一日講畢環柱而走歎曰安得起曰仁於泉下而聞斯言乎乃率諸弟子之其墓所酬酒而告之先生始聞陽明之教與先儒相出入駭愕不定無入頭處聞之既熟反身實踐始信為孔門嫡傳舍是皆旁蹊小徑斷港絶河矣陽明自居夷以後其教再變南中之時大率以收斂為主發散是不得已故以黙坐澄心為學的江右以後則專提致良知三字先生記傳習初卷皆是南中所聞其於致良知之說固未之知也然錄中有云知是心之本體心自然為知見父自然知孝見兄自然知弟見孺子入井自然知惻隱此便是良知使此心之良知充塞流行便是致其知則三字之提不始於江右明矣但江右以後以此為宗旨耳是故陽明之學先生為得其眞聶雙江云今之為良知之學者於傳習錄前編所記眞切處俱略之乃駕空立籠罩語似切近而實𣺌茫終日逐外而自以為得手也蓋未嘗不太息於先生云文集吾師之教謂人之心有體有用猶之水木有根源有枝葉流派學則如培濬溉疏故木水在培溉其根濬疏其源根盛源深則枝流自然茂且長故學莫要於收放心涵養省察克治是也即培濬其根源也讀書玩理皆所以溉疏之也故心德者人之根源也而不可少緩文章名業者人之枝葉也而非所汲汲學者先須辨此即是辨義利之分既能知所決擇則在立志堅定以趨之而已答邵思抑學者大患在於好名今之稱好名者𩔖舉富貴誇耀以為言抑末矣凡其意有為而為雖其跡在孝弟忠信禮義猶其好名也猶其私也古之學者其立心之始即務去此而以全吾性命之理為心當其無事以勿忘勿助而養吾公平正大之體勿先事落此谿徑故謂之存養及其感應而察識其有無故謂之省察察知其有此而務決去之勿苦其難故謂之克治專事乎此而不以怠心間之故謂之不息去之盡而純故謂之天德推之純而達故謂之王道送甘欽來夫人所以不宜於物者私害之也是故吾之私得以加諸彼則忮心生焉忮心好勝之𩔖也凡天下計較忌妒驕淫狠傲攘奪暴戾之惡皆從之矣吾之私得以藉諸彼則求心生焉求心好屈之𩔖也凡天下阿比諂佞柔懦燕溺汚辱咒咀之惡皆從之矣二私交於中則我所以為應感之地者非公平正大之體矣以此之機而應物之感其有能宜乎否也宜齋序古人謂未知學須求有個用力處既用力須求有個得力處今以康齋之勇殷勤辛苦不替七十年然未見其大成則疑其於得力處有未至白沙之風使人有吾與㸃也之意然末流渉曠則疑其於用力處有缺夫有體斯有用有終必有始將以康齋之踐履為體為始耶將以白沙之造詣為用為終耶是體用始終岐為二也世固有謂某有體無用有用無體者僕竊不然必求二公之所以蔽者而㑹歸之此正關要所係必透此方有下手處也答王承吉巖形方外高幾百丈内石骨空虛圓洞徹天地端若立甑二洞門自東門入初見西露微光若觀月自朏生行漸入光漸長至門内限光半當上弦循至正中光乃圓月在望西出門光微以隱若月自望至晦巖以月名本此濂溪自幼日遊其間因悟太極之理月巖記予始學於先生惟循跡而行久而大疑且駭然不敢遽非必反而思之思之稍通復驗之身心既乃怳若有見已而大悟不知手之舞足之蹈曰此道體也此心也此學也人性本善也而邪惡者客感也感之在於一念去之在於一念無難事無多術且自恃稟性柔未能為大惡則以為如是終身可見矣而坦坦然適而蕩蕩然樂也孰知久則私與憂復作也通世之痼疾有二文字也功名也予始欲以為姑毋攻焉不以累於心可矣絶之無之不已甚乎孰知二者之賊素奪其宫姑之云者是假之也是故必絶之無之而後可以進於道否則終不免以虛見且自誣也贈薛尚謙提學蔡我齋先生宗兖御史朱白浦先生節正德丁卯徐横山蔡我齋朱白浦三先生舉於鄉别文成而北文成言徐曰仁之温恭蔡希淵之深潛朱守中之明敏皆予所不逮蓋三先生皆以丁卯來學文成之弟子未之或先者也癸酉三先生從文成遊四明山我齋自永樂寺返白浦自妲溪返橫山則同入雪竇春風沂水之樂眞一時之盛事也橫山為弟子之首遂以兩先生次之蔡宗兖字希淵號我齋山隂之白洋人鄉書十年而取進士畱為庶吉士不可以教授奉母孤介不為當道所喜輒棄去文成以為歸計良是而傷於急廹再過二三月托病行則形迹冺然獨為君子而人為小人亦非仁人忠恕之心也已教授莆田復不為當道所喜文成戒之曰區區徃謫龍塲横逆之加日至迄今思之正動心忍性砥礪切磋之地其時乃止搪塞排遣竟成空過惜也希淵省克精切其肎遂自以為忠乎移教南康入為太學助教南考功陞西川督學僉事林見素謂先生中有餘養祗見外者之輕故能壁立千仞朱節字守中號白浦亦白洋人舉進士官御史以天下為已任文成謂之曰德業外無事功不由天德而求騁事功則希高務外非業也巡按山東流賊之亂勤事而卒贈光祿少卿先生嘗言平生於愛衆親仁二語得力然親仁必從愛衆得來員外錢緒山先生德洪錢德洪字洪甫號緖山浙之餘姚人王文成平濠歸越先生與同邑范引年管州鄭寅柴鳳徐珊吳仁數十人㑹於中天閣同稟學焉明年舉於鄉時四方之士來學於越者甚衆先生與龍溪疎通其大旨而後卒業於文成一時稱為教授師嘉靖五年舉於南宫不廷試而歸文成征思田先生與龍溪居守越中書院七年奔文成之䘮至於貴溪問䘮服邵竹峯曰昔者孔子沒子貢若䘮父而無服禮也先生曰吾夫子没於道途無主䘮者弟子不可以無服然某也有父母在麻衣布絰弗敢有加焉築室於塲以終心制十一年始赴廷試出為蘇學教授丁内艱服闋補國子監丞尋陞刑部主事稍遷員外郎署陜西司事上夜遊西山召武定侯郭勛不至給事中高時劾之下勛錦衣獄轉送刑部勛驕恣不法舉朝恨之皆欲坐以不軌先生據法以違勅十罪論死再上不報舉朝以上之不報因按輕也劾先生不明律法上以先生為故入故不報遂因劾下先生於獄蓋上之寵勛未衰特因事稍折之與廷臣之意故相左也先生身嬰三木與侍御楊斛山都督趙白樓講易不輟勛死始得出獄九廟成詔復冠帶穆宗朝進階朝列大夫致仕萬厯初復進階一級在野三十年無日不講學江浙宣歙楚廣名區奧地皆有講舍先生與龍溪迭捧珠盤年七十作頤閒疏告四方始不出遊二年十月二十六日卒年七十九陽明致良知之學發於晚年其初以靜坐澄心訓學者學者多有喜靜惡動之弊知本流行故提掇未免過重然曰良知是未發之中又曰謹獨即是致良知則亦未嘗不以收斂為主也故鄒東廓之戒懼羅念庵之主靜此固陽明之眞傳也先生與龍溪親炙陽明最久習聞其過重之言龍溪謂寂者心之本體寂以照為用守其空知而遺照是乖其用也先生謂未發竟從何處覔離已發而求未發必不可得是兩先生之良知俱以見在知覺而言於聖賢凝聚處盡與掃除在師門之旨不能無毫釐之差龍溪從見在悟其變動不居之體先生只於事物上實心磨鍊故先生之徹悟不如龍溪龍溪之修持不如先生乃龍溪竟入於禪而先生不失儒者之矩矱何也龍溪懸崖撒手非師門宗旨所可繫縳先生則把纜放船雖無大得亦無大失耳念菴曰緖山之學數變其始也有見於為善去惡者以為致良知也已而曰良知者無善無惡者也吾安得執以為有而為之而又去之已又曰吾惡夫言之者之淆也無善無惡者見也非良知也吾惟即吾所知以為善者而行之以為惡者而去之此吾可能為者也其不出於此者非吾所得為也又曰向吾之言猶二也非一也夫子嘗有言矣曰至善者心之本體動而後有不善也吾不能必其無不善吾無動焉而已彼所謂意者動也非是之謂動也吾所謂動動於動焉者也吾惟無動則在吾者常一矣按先生之無動即慈湖之不起意也不起意非未發乎然則謂離已發而求未發必不可得者非先生之末後語矣會語天地間只此靈竅在造化統體而言謂之鬼神在人身而言謂之良知惟是靈竅至微不可見至著不可掩使此心積凝純固常如對越神明之時則眞機活潑上下昭格何可掩得若一念厭斁即怳惚散漫矣戒懼即是良知覺得多此戒懼只是工夫生久則本體工夫自能相忘不思而得不勉而中亦只一熟耳思慮是人心生機無一息可停但此心主宰常定思慮所發自有條理造化只是主宰常定故四時日月往來自不紛亂充塞天地間只有此知天只此知之虛明地只此知之凝聚鬼神只此知之妙用四時日月只此知之流行人與萬物只此知之合散而人只此知之精粹也知此運行萬古有定體故曰太極原無聲臭可即故曰無極太極之運無迹而隂陽之行有漸故自一生二生四生八以至庶物露生極其萬而無窮焉是順其往而數之故曰數往者順自萬物推本太極以至於無極逆其所從來而知之故曰知來者逆是故易逆數也蓋示人以無聲無臭之源也告子言性無善無不善與孟子言性善亦不甚遠告子只先見定一個性體元來不動有動處只在物感上彼長我長彼白我白隨手應去不失其宜便了於吾性體澹然無所關渉自謂既不失内又不失外已是聖門全體之學殊不知先著性體之見將心與言氣分作三路遂成内外二截微顯兩用而於一切感應俱入無情非徒無益反鑿其原矣孟子工夫不論心之動不動念念精義使動必以義無歉於心自然俯仰無虧充塞無間是之謂浩然之氣告子見性在内一切無動於外取效若速是以見為主終非不動之根孟子集義之久而後行無不得取效若遲乃直從原不動處用功不求不動而自然不動矣此心從無始中來原是止的雖千思百慮只是天機自然萬感萬應原來本體常寂只為吾人自有知識便功利嗜好技能聞見一切意必固我自作知見自作憧擾失却至善本體始不得止須將此等習心一切放下始信得本來自性原是如此聖人於紛紜交錯之中而指其不動之眞體良知是也是知也雖萬感紛紜而是非不昧雖衆欲交錯而清明在躬至變而無方至神而無迹者良知之體也太虛之中無物不有而無一物之住其有住則即為太虛之礙矣人心感應無時不有而無一時之住其有住則即為虛靈之障矣故忿􅓰好樂恐懼憂患一著於有心即不得其正矣故正心之功不在他求只在誠意之中體當本體明徹止於至善而已矣除却好惡更有甚心體除却元亨利貞更於何處覔太極平旦之氣好惡與人相近此便是良心未冺然其端甚微故謂之幾希今人認平旦之氣只認虛明光景所以無用功處認得時種種皆實際矣春夏秋冬在天道者無一刻停喜怒哀樂在人心者亦無一時息千感萬應莫知端倪此體寂然未嘗染著於物雖曰發而實無所發也所以既謂之中又謂之和實非有兩截事致中和工夫全在愼獨所謂隱微顯見已是指出中和本體故愼獨即是致中和只求不拂良知於人情自然通得若只求不拂人情便是徇人忘已問感人不動如何曰纔說感人便不是了聖賢只是正已而物自正譬如太陽無蔽容光自能照物非是屑屑尋物來照問戒懼之功不能無有事無事之分曰知得良知是一個頭腦雖在千百人中工夫只在一念微處雖獨居𡨕坐工夫亦只在一念微處眞性流行莫非自然稍一起意即如太虛中忽作雲翳此不起意之教不為不盡但質美者習累未深一與指示全體廓然習累既深之人不指誠意實功而一切禁其起意是又使人以意見承也久假不歸即認意見作本體欲根竊發復以意見蓋之終日兀兀守此虛見而於人情物理常若有二將流行活潑之眞機反養成一種不伶不俐之心也慈湖欲人領悟太速遂將洗心正心懲忿窒慾等語俱謂非聖人之言是特以宗廟百官為到家之人指說而不知在道之人尚渉程途也去惡必窮其根為善不居其有格物之則也然非究極本體止於至善之學也善惡之機縱其生滅相尋於無窮是藏其根而惡其萌蘖之生濁其源而辨其末流之清也是以知善知惡為知之極而不知良知之體本無善惡也有為有去之為功而不知究極本體施功於無為乃眞功也正念無念正念之念本體常寂纔渉私邪憧憧紛擾矣問胸中擾擾必猛加澄定方得漸清曰此是見上轉有事時此知著在事上事過此知又著在虛上動靜二見不得成片若透得此心徹底無欲雖終日應酬百務本體上如何加得一毫事了即休一過無迹本體上又何減得一毫問致知存乎心悟曰靈通妙覺不離於人倫事物之中在人實體而得之耳是之為心悟世之學者謂斯道神奇祕宻藏機隱竅使人𣺌茫怳惚無入頭處固非眞性之悟若一聞良知遂影響承受不思極深研幾以究透眞體是又得為心悟乎良知不假於見聞故致知之功從不睹不聞而入但纔說不睹不聞即著不睹不聞之見矣今只念念在良知上精察使是是非非無容毫髮欺蔽致知之功在究透全體不專在一念一事之間但除却一念一事又更無全體可透耳良知廣大高明原無妄念可去纔有妄念可去己自失却廣大高明之體矣今只提醒本體羣妄自消先師在越甘泉官畱都移書辨正良知天理同異先師不答曰此須合併數月無意中因事指發必有沛然融釋處耳若恃筆札徒起爭端先師起征思田沒於南安終不得對語以究大同之旨此亦千古遺恨也予於戊申年冬乞先君墓銘往見公於增城公曰良知不由學慮而能天然自有之知也今遊先生之門者皆曰良知無事學慮任其意智而為之其知已入不良莫之覺矣猶可謂之良知乎所謂致知者推極本然之知功至宻也今遊先生門者乃云只依良知無非至道而致之之功全不言及至有縱情恣肆尚自信為良知者立教本旨果如是乎予起而謝曰公之教是也公請予言予曰公勿助勿忘之訓可謂苦心曰云何苦心曰道體自然無容强索今欲矜持操執以求必得則本體之上無容有加加此一念病於助矣然欲全體放下若見自然久之則又疑於忘焉今之工夫既不助又不忘常見此體叅前倚衡活潑呈露此正天然自得之機也蓋欲揭此體以示人誠難著辭故曰苦心公乃瞿然顧予曰吾子相别十年猶如常聚一堂予又曰昔先師别公詩有無欲見眞體忘助皆非功之句當時疑之助可言功忘亦可言功乎及求見此體不得注目所視傾耳所聽心心相持不勝束縛或時少舒反覺視明聽聰中無罣礙乃疑忘可以得道及久之散漫無歸漸淪於不知矣是助固非功忘亦非功也始知只一無欲眞體乃見鳶飛魚躍與必有事焉同活潑潑地非眞無欲何以臻此公慨然謂諸友曰我輩朋友誰肯究心及此蔣道林示時習講義公曰後世學問不在性情上求終身勞苦不知所學何事比如作一詩只見性情不見詩是為好詩作一文字只見性情不見文字是為好文字若不是性情上學疲神瘁思終身無得安得悅樂又安得無愠人只有一道心天命流行不動纖毫聲臭是之為微纔動聲臭便雜以人矣然其中有多少不安處故曰危人要為惡只可言自欺良知本來無惡學者工夫不得伶俐直截只為一虞字作祟耳良知是非從違何嘗不明但不能一時決斷如自虞度曰此或無害於理否或可茍同於俗否或可欺人於不知否或可因循一時以圖遷改否只此一虞便是致吝之端昔者吾師之立教也揭誠意為大學之要指致知格物為誠意之功門弟子聞言之下皆得入門用力之地用功勤者究極此知之體使天則流行纖翳無作千感萬應而眞體常寂此誠意之極也故誠意之功自初學用之即得入手自聖人用之精詣無盡吾師既沒吾黨病學者善惡之機生滅不已乃於本體提揭過重聞者遂謂誠意不足以盡道必先有悟而意自不生格物非所以言功必先歸寂而物自化遂相與虛憶以求悟而不切乎民彞物則之常執體以求寂而無有乎圓神活潑之機希高凌節影響謬戾而吾師平易切實之旨壅而弗宣師云誠意之極止至善而已矣是止至善也者未嘗離誠意而得也言止則不必言寂而寂在其中言至善則不必言悟而悟在其中然皆必本於誠意焉何也蓋心無體心之上不可以言功也應感起物而好惡形焉於是乎有精察克治之功誠意之功極則體自寂而應自順初學以至成德徹始徹終無二功也是故不事誠意而求寂與悟是不入門而思見宗廟百官也知寂與悟而不示人以誠意之功是欲人見宗廟百官而閉之門也皆非融釋於道者也至純而無雜者性之本體也兢兢恐恐有事勿忘者復性之功也有事勿忘而不見眞體之活潑焉强制之勞也怳見本體而不加有事之功焉虛狂之見也故有事非功也性之不容自已也活潑非見也性之不加一物也心之本體純粹無雜至善也良知者至善之著察也良知即至善也心無體以知為體無知即無心也知無體以感應之是非為體無是非即無知也意也者以言乎其感應也物也者以言乎其感應之事也而知則主宰乎事物是非之則也意有動靜此知之體不因意之動靜有明暗也物有去來此知之體不因物之去來為有無也性體流行自然無息通晝夜之道而知也心之神明本無方體欲放則放欲止則止放可能也止亦可能也然皆非本體之自然也何也意見使之也君子之學必事於無欲無欲則不必言止而心不動毋求諸己放之心求諸心之未放焉爾已夫心之體性也性不可離又烏得而放也放之云者馳於物焉已爾論學書良知天理原非二義以心之靈虛昭察而言謂之知以心之文理條析而言謂之理靈虛昭察無事學慮自然而然故謂之良文理條析無事學慮自然而然故謂之天然曰靈虛昭察則所謂昭察者即文理條析之謂也靈虛昭察之中而條理不著固非所以為良知而靈虛昭察之中復求所謂條理則亦非所謂天理矣今曰良知不用天理則知為空知是疑以虛元空寂視良知而又似以襲取外索為天理矣恐非兩家立言之旨也上甘泉久菴謂吾黨於學未免落空初若未以為然細自磨勘始知自懼日來論本體處說得十分清脫及徵之行事疎略處甚多此便是學問落空處譬之草木生意在中發在枝榦上自是可見覆王龍溪人生與世情相感如魚遊於水隨處逼塞更無空隙處波蕩亦從自心起此心無所牽累雖日與人情事變相接眞如自在順應無滯更無波蕩可動所謂動亦定靜亦定也若此心不免畱戀物情雖日坐虛齋不露風線而百念自來熬煎無容逃避今之學者纔遇事來便苦攪擾便思靜處及到靜處胸中攪擾猶昔此正不思動與不動只在自心不在事上揀擇致知格物工夫只須於事上識取本心乃見心事非二内外兩忘非離却事物又有學問可言也答傅少崖吾心本與民物同體此是位育之根除却應酬更無本體失却本體便非應酬茍於應酬之中隨事隨地不失此體眼前大地何處非黄金若厭却應酬必欲去覔山中養成一個枯寂恐以黄金反混作頑銕矣覆龍溪龍溪之見伶俐直截泥工夫於生滅者聞其言自當省發但渠於見上覺有著處開口論說千轉百折不出已意便覺於人言尚有漏落耳執事之著多在過思過思則想像亦足以蔽道與季彭山親蹈生死眞境身世盡空獨畱一念熒魂耿耿中夜豁然若省乃知上天為我設此法象示我以本來眞性不容絲髪掛帶平時一種姑容因循之念常自以為不足害道由今觀之一塵可以矇目一指可以障天誠可懼也噫古人處動忍而獲增益吾不知增益者何物減削則已盡矣獄中寄龍溪夫鏡物也故斑垢駁雜得積於上而可以先加磨去之功吾心良知虛靈也虛靈非物也非物則斑垢駁雜停於吾心何所則磨之之功又於何所乎今所指吾心之斑垢駁雜者非氣拘物蔽而言乎既曰氣拘曰物蔽則吾心之斑垢駁雜由人情事物之感而後有也既由人情事物之感而後有而今之致知也則將於未渉人情事物之感之前而先加致之之功則夫所謂致之之功者又將何所施耶答聶雙江人之心體一也指名曰善可也曰至善無惡亦可也曰無善無惡亦可也曰善曰至善人皆信而無疑矣又為無善無惡之說者何也至善之體惡固非其所有善亦不得而有也至善之體虛靈也猶目之明耳之聰也虛靈之體不可先有乎善猶明之不可先有乎色聰之不可先有乎聲也目無一色故能盡萬物之色耳無一聲故能盡萬物之聲心無一善故能盡天下萬事之善今之論至善者乃索之於事事物物之中先求其所謂定理者以為應事宰物之則是虚靈之内先有乎善也虛靈之内先有乎善是耳未聽而先有乎聲目未視而先有乎色也塞其聰明之用而窒其虛靈之體非至善之謂矣今人乍見孺子入井皆有怵惕惻隱之心怵惕惻隱是謂善矣然未見孺子之前皆知講求之功預有此善以為之則耶抑虛靈觸發其機自不容已耶赤子將入井自聖人與塗人並而規之其所謂怵惕惻隱者聖人不能加而塗人未嘗減也但塗人擬議於乍見之後已洊入於納交要譽之私矣然則塗人之學聖人也果憂怵惕惻隱之不足耶抑去其蔽以還乍見之初心也虚靈之蔽不但邪思惡念雖至美之念先橫於中積而不化已落將迎意必之私而非時止時行之用矣故先師曰無善無惡者心之體是對後世格物窮理之學為先有乎善者立言也因時設法不得已之辭焉耳復楊斛山龍溪學日平實每於毁譽紛冗中益見奮惕弟向與意見不同雖承老師遺命相取為益終與入處異路未見能渾接一體歸來屢經多故不肖始能純信本心龍溪亦於事上肎自磨滌自此正相當能不出露頭面以道自任而毁譽之言亦從此入舊習未化時出時入容或有之然其大頭放倒如羣情所疑非眞信此心千古不二其誰與辨之與張浮峯格物之學實良知見在功夫先儒所謂過去未來徒放心耳見在功夫時行時止時黙時語念念精明毫釐不放此即行著習察實地格物之功也於此體當切實著衣喫飯即是盡心至命之功與陳兩湖先師曰無善無惡心之體雙江即謂良知本無善惡未發寂然之體也養此則物自格矣今隨其感物之際而後加格物之功是迷其體以索用濁其源以澄流功夫已落第二義論則善矣殊不知未發寂然之體未嘗離家國天下之感而别有一物在其中也即家國天下之感之中而未發寂然者在焉耳此格物為致知之實功通寂感體用而無間盡性之學也復周羅山人有未發之中而後有發而中節之和此先師之言為註中庸者說也註中庸者謂未發之中人皆有之至發時而後有不中節曰此未知未發之中也未發之中譬若鏡體之明豈有鏡體既明而又有照物不當者乎此言未為不確然實未嘗使學者先求未發之中而養之也未發之中竟從何處覔耶離己發而求未發必不可得久之則養成一種枯寂之病認虛景為實得擬知見為性眞誠可慨也故學者初入手時良知不能無間善惡念頭雜發難制或防之於未發之前或制之於臨發之際或悔改於既發之後皆實功也由是而入微雖聖人之知幾亦只此工夫復何吉陽覺即是善不覺即是利雞鳴而醒目即見物耳即聽物心思即思物無人不然但主宰不精怳忽因應若有若無故遇觸即動物過即畱雖已覺興猶為夢晝見性之人眞機明察一醒即覺少過不及覺早反亟明透之人無醒無覺天則自著故耳目聰明心思睿知於遇無觸於物無滯善利之辨此為未知學者分辨界頭良知既得又何擬議於意象之間乎與寧國諸友古人以無欲言微道心者無欲之心也研幾之功只一無欲而眞體自著更不於念上作有無之見也答念菴凡為愚夫愚婦立法者皆聖人之言也為聖人說道妙發性眞者皆聖人之言也答念菴師在越時同門有用功懇切而泥於舊見鬱而不化師時出一險語以激之如投水石於烈焰之中一時解化纖滓不畱此亦千古之大快也聽者於此等處多好傳誦而不究其發言之端故聖人立教只指揭學問大端使人自澄自悟不欲以峻言隱韻立偏勝之劑以快一時聽聞防其後之足以殺人也答念菴明儒學案卷十一
