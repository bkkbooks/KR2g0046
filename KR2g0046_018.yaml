body:
  text: 明儒學案卷十八餘姚黃宗羲撰江右相傳學案三文恭羅念菴先生洪先羅洪先字達夫號念菴吉水人父循山東按察副使先生自㓜端重年五嵗夢通衢市人擾擾大呼曰汝往來者皆在吾夢中耳覺以告母李宜人識者知非埃壒人也十一嵗讀古文慨然慕羅一峯之為人即有志於聖學嘉靖八年舉進士第一外舅太僕曾直喜曰幸吾壻建此大事先生曰丈夫事業更有許大在此等三年遞一人奚足為大事也授翰林修撰明年告歸丁父艱苫塊蔬食不入室者三年繼丁内艱居喪如前十八年召拜左春坊贊善踰年至京上常不御朝十二月先生與司諫唐順之校書趙時春請以來嵗元日皇太子御文華殿受百官賀上曰朕方疾遂欲儲貳臨朝是必君父不能起也皆黜為民三十七年嚴相嵩起唐順之為兵部主事次及先生先生以畢志林壑報之順之强之同出先生曰天下事為之非甲則乙某所欲為而未能者有公為之何必自我四十二年卒年六十一隆慶改元贈光祿少卿謚文恭先生之學始致力於踐履中歸攝於寂靜晚徹悟於仁體㓜聞陽明講學䖍臺心即向慕比傳習錄出讀之至忘寢食同里谷平李中傳玉齋楊珠之學先生師之得其根柢而聶雙江以歸寂之說號於同志唯先生獨心契之是時陽明門下之談學者皆曰知善知惡即是良知依此行之即是致知先生謂良知者至善之謂也吾心之善吾知之吾心之惡吾知之不可謂非知也善惡交雜豈有為主於中者乎中無所主而謂知本常明不可也知有未明依此行之而謂無乖戾於既發之後能順應於事物之來不可也故非經枯槁寂寞之後一切退聽天理炯然未易及此雙江所言真是霹靂手段許多英雄瞞昧被他一口道著如康莊大道更無可疑闢石蓮洞居之黙坐半榻間不出户者三年事能前知人或訝之答曰是偶然不足道王龍溪恐其專守枯靜不達當機順應之妙訪之於松原問曰近日行持比前何似先生曰往年尚多斷續近來無有雜念雜念漸少即感應處便自順適即如均賦一事從六年至今半年終日紛紛未嘗敢厭倦未嘗敢執著未嘗敢放縱未嘗敢張皇惟恐一人不得其所一切雜念不入亦不見動靜二境自謂此即是靜定工夫非紐定黙坐時是靜到動應時便無著靜處也龍溪嗟嘆而退先生於陽明之學始而慕之已見其門下承領本體太易亦遂疑之及至工夫純熟而陽明進學次第洞然無間天下學者亦遂因先生之言而後得陽明之真其嘵嘵以師說鼓動天下者反不與焉先生既定陽明年譜錢緒山曰子於師門不稱門生而稱後學者以師存日未得及門委贄也子謂古今門人之稱其義止於及門委贄乎子年十四時欲見師於贑父母不聽則及門者其素志也今學其學者三紀於茲矣非徒得其門所謂升堂入室者子且無歉焉於門人乎何有譜中改稱門人緒山龍溪證之也先生以濂溪無欲故靜之㫖為聖學的傳有言辭受取與為小事者先生謂此言最害事請告歸過儀真一病幾殆同年項甌東念其貧困有富人坐死行賄萬金待先生一言先生辭之而去己念富人罪不當死囑恤刑生之不令其知也先世田宅盡推以與庶弟别架數楹僅蔽風雨尋為水漂沒假寓田家撫院馬森以其故所郤餽先後數千金復致之立室先生不受其門下搆正學堂以居之將卒問疾者入室視如懸罄曰何至一貧如此先生曰貧固自好故於龍溪諸子會講近城市勞官府則痛切相䂓謂借開來之說以責後車傳食之報為賄賂公行廉耻道喪者助之瀾也先生靜坐之外經年出游求師問友不擇方内方外一節之長必虛心咨請如病者之待醫士大夫體貌規格黜棄殆盡獨往獨來累饑寒經跋涉重湖驚濤之險逆旅倅詈之加漠然無所芥蔕或疑其不絶二氏先生嘗閱楞嚴得返聞之㫖覺此身在太虛視聽若寄世外見者驚其神采先生自省曰誤入禪定矣其功遂輟登衡嶽絶頂遇僧楚石以外丹授之先生曰吾無所事此也黄陂山人方與時自負得息心訣謂學聖者亦須靜中怳見端倪始得先生與龍溪偕至黄陂習靜龍溪先返先生獨留夜坐工夫愈密自謂已入湥山更深處家書休遣雁來過蓋先生無處非學地無人非學侣同牀各夢豈二氏所能連染哉耿天臺謂先生為與時所欺憤悔疽發還家而夫人又殂由是益恨與時今觀其夜坐諸詩皆得之黄陂者一時之所證入固非與時所可窺見又何至以妻子一訣自動其心乎可謂不知先生者矣鄧定宇曰陽明必為聖學無疑然及門之士概多矛盾其私淑而有得者莫如念菴此定論也論學書心之本體至善也然無善之可執所謂善者自明白自周徧是知是非知非如此而已不學而能不慮而知順之而已惟於此上倚著為之便是欲便非本體明白亦昏周徧亦狹是非亦錯此非有大相懸隔只落安排與不安排耳孟子曰勿忘勿助助固欲速忘豈無所用其心哉必有所牽矣故耳目口鼻四肢之欲欲也有安排者亦欲也畢竟安排起於有已故欲只是一原夫子所謂閑邪者其謂是乎今之學者以本體未復必須博學以充之然後無蔽似周僃矣只恐捉摸想像牽已而從之豈虛中安止之道豈寂然不動感而遂通者乎譬之鑑然去塵則明自復未聞有定妍媸之形以補照之不及者也故以是非之靈明為把柄而不以所知之廣狹為是非但求不失生意如草木之區别不必於同或者以為得聖賢之正脈也奉李谷平古人所謂至者非今之所謂不間斷者也今之不間斷者欲常記憶此事常不遺忘而已若古人者如好好色如惡惡臭如四時錯行如日月代明是以知識推測想像模倣為間斷蓋與今所云者大有異矣全無伎倆始見真才所謂良知者至無而至有無容假借無事幇補無可等待自足焉者也來書謂無感而常樂此是良知本體即是戒懼即非放逸即非蔽塞不然便不應自知其樂若此矣應而未嘗動本體以其順應也不得於心而有思者亦本體也以其澄然運用而不容己者也從而憧憧者非本體也以其動於外物者也終夜以思而未嘗涉於人為安排未嘗雜以智識推測庸何傷乎但恐安排推測之不免故須從事於學耳學也者學其出於良知而無所動焉者也窮理者窮此者也自然條理故曰天理即所謂良知也安排推測非天理矣答羅岳霽真信得至善在我不假外求即時時刻刻物物種種見在不勞一毫安排布置所謂無邪原是不相粘著不勞絶遣所謂敬原自不二不雜齋莊中正既不費力支持即亦不見有歇脚時矣何為不能時時習乎答蕭仲敬千古聖賢工夫無二端只病痛不起即是本心本心自完不勞照管覓心失心求物理失物理守良知失良知知靜非靜知動非動一切􅍆下直任本心則色色種種平鋪見在但不起即無病原無作又何輟乎故曰道不遠人又曰道心天道流行豈容人力撐持幇補有尋求便屬知識已非所謂帝則矣離却意象即無内外忘内外本心得矣答陳豹谷以為良知之外尚有所謂義理者在是猶未免於幇補湊合之病其於自信不亦逺乎見聞不與獨任真誠矢死以終更無外想自非豪傑其孰能任此與林澉山良知有䂓矩而無様式有分曉而無意見有主宰而無執著有變化而無遷就有渾厚而無鶻突見好色自好聞惡臭自惡不思不勉發自中節天下達道不外是矣與夏太守來諭辭受取與雖闗行檢看來亦小此言最害事辭受取與元闗心術本無大小以此當天來事看即堯舜事業亦自浮雲過目若率吾真心而行即一介不取與亦是大道非小事業而大一介也此心無物可尚故也答戚南元學須靜中入手然亦未可偏向此中躱閃過凡難處與不欲之念皆須察問從何來若此間有承當不起便是畏火之金必是銅鉛錫鐵攙和不可囘互姑容任其暫時云爾也除此無下手誅責處平日却只是陪奉一種清閑自在終非有根之樹冒雪披風幹柯折矣與王有訓大抵工夫未下手即不知自己何病又事未對鏡即病亦未甚害事稍涉人事乃知為病又未知去病之方蓋方任巳便欲囘互有囘互則病乃是痛心處豈肎割去譬之浮躁起於快意有快意為之根則浮躁之標末自現欲去標末當去其根其根為吾之所囘互安能克哉此其所以難也答王西石千古病痛在入處防閑到既入後濯洗縱放終非根論周子無欲程子定性皆率指此置身千仞則坎蛙穴螺爭競豈特不足以當吾一視著脚泥淖得片瓦拳石皆性命視之此根論大抵象也到此識見既别却犯手入塲皆吾游刃老叟與羣兒調戯終不成憂其攪溷吾心但防閑入處非有髙睨宇宙狠斷俗情未可容易承當也答尹洞山此中更不論如何只血氣肎由心志稍定貼已是有頭緒不然是心逐氣走非氣從心定也與王有訓欲之有無獨知之地隨發隨覺顧未有主靜之功以察之耳誠察之固有不待乎外者而凡考古證今親師取友皆所以為寡欲之事不然今之博文者有矣其不救於私妄之恣肆者何歟故嘗以為欲希聖必自無欲始求無欲必自靜始答髙白坪某所嘗著力者以無欲為主辨欲之有無以當下此心微微覺處為主此覺處甚微非志切與氣定即不自見答李二守立行是孔門第一義今之言不覩不聞者亦是欲立行至精密處非有二義也凡事狀之萌有作有止而吾心之知無斷無續即事狀而應之不涉放肆可謂有依據矣安知不入安排理道與打㸃世情彌逢人意乎即使無是數者事已作何歸宿此不謂虛過日月者哉又況處事原屬此心心有時而不存即事亦有時而不謹所謹者在人之可見聞耳因見聞而後有著力此之謂為人非君子反求諸己之學也故戒慎於不覩不聞者乃全吾忠實之本然而不覩不聞即吾心之常知處自其常知不可以形求者謂之不覩自其常知不可以言顯者謂之不聞固非窈㝠之狀也吾心之知無時或息即所謂事狀之萌應亦無時不有若諸念皆冺炯然中存亦即吾之一事此處不令他意攙和即是必有事焉又何茫蕩之足慮哉答劉月川識仁篇却在識得仁體上提得極重下云與物同體則是已私分毫攙和不得已私不入方為識得仁體如此却只是誠敬守之中庸者是此仁體現在平實不容加損非調停其間而謂之中也急廹求之總成私意調停其間亦難依據惟有己私不入始於天命之性方能覿體蓋不入己私處處皆屬天然之則故也然此私意不入何緣直與分解何緣不少干涉何緣斷絶何緣冺忘既非意氣可能承當亦非言說便得通曉此是吾人生死路頭非别有巧法日漸月摩令彼消退可以幾及也答張浮峯欲根不斷常在世情上立脚未是脫離得盡如此根器縱十分斂實亦只是有此意思非歸根也與謝子貞來敎云良知非知覺之謂然舍知覺無良知良知即是主宰而主宰淵寂原無一物兄之精義盡在於此夫謂知覺即主宰主宰即又淵寂則是能淵寂亦即能主宰能主宰亦即自能知覺矣又何患於内外之二哉今之不能主宰者果知覺紛擾故耶亦執著淵寂耶其不淵寂者非以知覺紛擾故耶其果識淵寂者可復容執著耶自弟受病言之全在知覺則所以救其病者舍淵寂無消除法矣夫本體與工夫固當合一原頭與見在終難盡同弟平日持原頭本體之見解遂一任知覺之流行而於見在工夫之持行不識淵寂之歸宿是以終身轉換卒無所成兄謂弟落在著到管帶弟實有之在弟之意以為但恐未識淵寂耳若真識得愈加著到愈無執著愈加照管愈無掛帶既曰原無一物矣又何患執著之有無可忘而忘不待存而存此是入悟語然識得此處即屬平常不識得此處即是弄玩精魄夫無可忘而忘以其未嘗有存也不待存而存以其未嘗有忘也無存無忘此乃淵寂之極正莊子横心所念無非利害之境然彼則自不念利害始自有次第矣夫工夫與至極處未可竝論何也操存舍亡夫子固已言之非吾輩可以頃刻嘗試遂自謂已得也今之解良知者曰知無不良者也欲致良知即不可少有加於良知之外此其為說亦何嘗不為精義但不知幾微倐忽之際便落見解知果無不良矣有不良者果孰為之人品不齊工力不等未可盡以解縳語増他人之縱肆也乃知致良知之致字是先聖喫𦂳為人語致上見得分明即格物之義自具固不必紛紜於章句字面之脗合對證傳授言說之祖述發揮而動多口也來敎云良知之體本虛而萬物皆僃物是良知凝聚融結出來的可謂真實的當矣如此則良知愈致其凝聚融結愈僃良知愈虛知覺愈精此非合内外乎既合内外則凡能致虛者其必能格物而自不落内外見解兄之勤懇諄復者自可以相忘於無言矣答王龍溪靜中易收攝動處便不然此已是離本著境更無别故只是未有專心一意耳與王以珍白沙致虛之說乃千古獨見致知續啓體用不遺今或有誤認猖狂以為廣大又喜動作名為心體情欲縱恣意見横行後生小子敢為髙論蔑視宋儒妄自居擬竊慮貽禍斯世不小也與吳疎山來敎云學問大要在自識本心庶工夫有下落此言誠是也雖然本心果易識哉來敎云心無定體感無停機凡可以致思著力者感也而所以出思發知者不可得而指也謂心有感而無寂是執事之識本心也不肖驗之於心則謂心有定體寂然不動是也感無定機時動時靜是也心體惟其寂也故雖出思發知不可以見聞指然其凝聚純一淵然精湥者亦唯於著已近裡者能黙識之亦不容以言指也是謂天下之至誠動應惟其有時也故雖出思發知莫不為感然其或作或息或行或止或語或黙或視或暝萬有不齊而機難豫定固未始有常也是謂天下之至神惟至誠者乃可以語至神此中庸通篇意也來敎云欲於感前求寂是謂畫蛇添足欲於感中求寂是謂騎驢覔驢不肖驗之於心又皆有可言者自其後念之未生而吾寂然者未始不存謂之感前有寂可也自其今念之已行而吾寂然者未始不存謂之感中有寂可也感有時而變易而寂然者未始變易感有萬殊而寂然者惟一此中與和情與性所由以名也來敎云學至於研幾神矣易曰幾者動之㣲周子曰動而未形有無之間曰幾夫既曰動則不可以言靜聖人知幾故動無不善也不肖驗之於心又有大不然者當吾心之動機在倐忽有與無俱未形也斯時也若何致力以為善惡之辨乎且來敎云感無停機是又以心為動體不見所謂静矣夫感無停機機無停運頃刻之間前機方微後機將著牽連不斷微著相尋不為乍起乍滅矣乎是正所謂相左者也竊詳周易與周子之㫖亦與來敎稍異易贊知幾為神而以介石先之朱子曰介如石理素定也是素定者非所謂寂然者乎又曰惟幾也故能成天下之務而以惟㴱先之朱子曰極湥者至精也研幾者至變也是精㴱者非寂然者乎周子言幾必先以誠故其言曰誠無為幾善惡又曰寂然不動者誠也感而遂通者神也而後繼之以幾夫不疾而速不行而至者謂之神故曰應而妙不落有無者謂之機故曰微而幽夫妙與幽不可為也惟誠則精而明矣蓋言吾心之感似渉於有矣然雖顯而實微雖見而實隠又近於無以其有無不形故謂之幾幾善惡者言惟幾故能辨善惡猶云非幾即惡焉耳必常戒懼常能寂然而後不逐於動是乃所謂研幾也今之議者咸曰寂然矣無為矣又何戒懼之有將以工夫皆屬於動無所謂靜者不知無欲故靜周子立極之功也誠則無事果確無難周子思誠之功也背非見止非為為不止者周子立静之功也假使知幾之說如來敎所云是乃聖門第一關頭何止畧示其意於易之文而周子亦不諄諄以告人耶子思之傳中庸使其工夫如來敎所云則必曰戒慎乎其初可覩恐懼乎其初可聞何乃以不覩不聞為言如今之謎語乎惟其於不覩不聞而戒懼焉則是所持者至微至隠故凡念之動皆能入微而不至於有形凡思之用皆可通微而不至於憧憧如此乃謂之知幾如此乃可以語神亦謂之先幾之學此其把柄斷可識矣今以戒懼疑於屬動既失子思之本㫖又因戒懼而疑吾心無寂則并大易周子之㫖而滅之推原其故大抵誤認良知為祟耳今為良知之說者曰知是知非不可欺瞞者良知也常令此知炯炯不昧便是致吾心之良知雖然此言似矣而實有辨也夫孟子所言良知指不學不慮當之是知乃所以良也知者感也而所以為良者非感也傳習錄有曰無善無惡者理之靜有善有惡者氣之動不動於氣即無善無惡是謂至善夫至善者非良乎此陽明之本㫖也而今之言良知者一切以知覺簸弄終日精神隨知流轉無復有凝聚純一之時此豈所謂不失赤子之心者乎恐陽明公復出不能不矯前言而易之以他辭也洛村嘗問獨知時有念否公答以戒懼亦是念戒懼之念無時可息自朝至暮自少至老更無無念之時蓋指用工而言亦即所謂不失赤子之心非浮漫流轉之謂也今之學者誤相援引便指一切凡心俱謂是念實以遂其放縱恣肆之習執事所見雖髙然大要心屬感似與此輩微覺相𩔖自未聞良知之說以前諸公之學頗多得力自良知之說盛行今二十餘年矣後之得力較先進似或不勇此豈無故耶答陳明水果能收斂翕聚惟嬰兒依䕶自能孩笑自能飲食自能行走豈容一毫人力安排試於臨民時驗之稍停詳妥貼言動喜怒自是不差稍周章忽畧便有可悔從前為良知時時見在一句誤却欠却培養一段工夫培養原屬收斂翕聚甲辰夏因静坐十日怳怳見得又被龍溪諸君一句轉了總為自家用功不㴱内虛易搖也孟子言皆有怵惕惻隠之心由於乍見言平旦好惡與人相近由於夜氣所息未嘗言時時有是心也末後四端須擴而充之自然火然泉達可以保四海夜氣茍得其養無物不長所以須養者緣此心至易動故也未嘗言時時便可致用皆可保四海也擴充不在四端後却在常無内交要譽惡聲之心所謂以直養也養是常息此心常如夜之所息如是則時時可似乍見與平旦時此聖賢苦心語也陽明拈出良知上面添一致字便是擴養之意良知二字乃是發而中節之和其所以良者要非思為可及所謂不慮而知正提出本來頭面也今却盡以知覺發用處為良知至又易致字為依字則是只有發用無生聚矣木常發榮必速槁人常動用必速死天地猶有閉藏況於人乎是故必有未發之中方有發而中節之和必有擴然大公方有物來順應之感平日作文字只謾說過去更不知未發與擴然處何在如何用功誠鶻突半生也真擴養得便是集義自浩然不奪於外此非一朝一夕可得然一朝一夕亦便小小有驗但不是放乎四海譬之操舟舵不應手不免横撐直駕終是費力時時培此却是最密地也與尹道輿朱子以不覩不聞屬靜為未動念時以獨屬動為初動念時故動静交修兄以不覩不聞之時專屬念頭方動又比朱子失却一邊不知所謂達之面目發於政事猶為不覩不聞時耶否耶豈無念時遂無所謂戒慎恐懼耶豈聖賢皆時時動念耶答項甌東寂然者一矣無先後中外矣然對感而言寂其先也以發而言寂在中也思固聖功之本而周子以無思為言是所以為思誠也思而無思是謂研幾常令此心寂然無為便是戒懼其所不覩不聞言戒懼在本體上便覺隔越中庸以慎獨為要誠也神也幾也獨也一也慎獨皆舉之矣然須體周子分言之意常知幾即是致知即是存義到成熟處便是知止得所止則知至矣感無常寂有常寂其主也周之靜程之定皆是物也其曰静虚動直曰静定動定以時言也時有動静寂無分於動静境有内外寂無分於内外然世之言無内外無動静者多逐外而遺内喜動而厭静矣是以析言之夫體能發用用不離體所謂體用一源也今夫舟車譬則體也往來於水陸則其用也欲泥一源之語而惡學者之主寂是猶舍車舟而適江湖與康莊也烏乎可陽明先生良知之敎本之孟子乍見入井孩提愛敬平旦好惡三者以其皆有未發者存故謂之良朱子以為良者自然之謂是也然以其一端之發見而未能即復其本體故言怵惕矣必以擴充繼之言好惡矣必以長養繼之言愛敬矣必以達之天下繼之孟子之意可見矣先生得其意者也故亦不以良知為足而以致知為工試以三言思之其言充也將即怵惕之已發者充之乎將求之乍見之真乎無亦不動於納交要譽惡聲之私己乎其言養也將即好惡之已發者養之乎將求之平旦之氣乎無亦不梏於旦晝所為矣乎其言達也將即愛敬之已發者達之乎將不失孩提之心乎無亦不涉於思慮矯强矣乎終日之間不動於私不梏於為不涉於思慮矯强以是為致知之功則其意烏有不誠而亦烏用以立誠二字附益之也今也不然但取足於知而不原其所以良故失養其端而惟任其所以發遂以見存之知為事物之則而不察理欲之混淆以外交之物為知覺之體而不知物我之倒置豈先生之本㫖也未感之前寂未嘗增非因無念無知而後有寂也既感之後寂未嘗減非因有念有知而遂無寂也此虛靈不昩之體所謂至善善惡對待者不足以名之知者觸於感者也念者妙於應者也知與念有斷續而此寂無斷續所謂感有萬殊而寂者惟一是也答郭平川今之言良知者惡聞静之一言以為良知該動静合内外主於静焉偏矣此恐執言而未盡其意也夫良知該動静合内外其體統也吾之主静所以致之蓋言學也學必有所由而入未有入室而不由户者茍入矣雖謂良知本静亦可也雖謂致知為慎動亦可也吾不能復無極之真者孰為之乎蓋動而後有不善有欲而後有動動於欲而後有學學者學其未動焉者也學其未動而動斯善矣動無動矣答董蓉山周子所謂主静者乃無極以來真脈絡其自註云無欲故静是一切染不得一切動不得莊生所言渾沌者近之故能為立極種子非就識情中認得個幽間暇逸者便可替代為此物也指其立極處與天地合德則發育不窮與日月合明則照應不遺與四時合序則錯行不忒與鬼神合吉㐫則感應不爽修此而忘安排故謂之吉悖此而費勞攘故謂之㐫若識認幽閒暇逸以為主静便與野狐禪相似便是有欲一切享用玩弄安頓便宜厭忽縱弛隠忍狼狽之弊紛然潛入而不自覺即使孤介清潔自守一隅亦不免於偏聽獨任不足以倡率防檢以濟天下之務其與未知學者何異也答門人靠絲毫不得纔靠一言一念却是規矩外惟有識得規矩時時游息其中所謂終日對越在天也識規矩不定便有幇湊便易和換與王有訓二氏亦以静入至所語静却是逈異答李石麓當極静時怳然覺吾此心中虛無物㫄通無窮有如長空雲氣流行無有止極有如大海魚龍變化無有間隔無内外可指無動静可分上下四方往古來今渾成一片所謂無在而無不在吾之一身乃其發竅固非形質所能限也是故縱吾之目而天地不滿於吾視傾吾之耳而天地不出於吾聽冥吾之心而天地不迯於吾思古人往矣其精神所極即吾之精神未嘗往也否則聞其行事而能憬然憤然矣乎四海逺矣其疾痛相關即吾之疾痛未嘗遠也否則聞其患難而能惻然䀌然矣乎是故感於親而為親焉吾無分於親也有分於吾與親斯不親矣感於民而為仁焉吾無分於民也有分於吾與民斯不仁矣感於物而為愛焉吾無分於物也有分於吾與物斯不愛矣是乃得之於天者固然如是而後可以配天也故曰仁者渾然與物同體同體也者謂在我者亦即在物合吾與物而同為一體則前所謂虛寂而能貫通渾上下四方往古來今内外動静而一之者也若二氏者有見於已無見於物養一指而失其肩背比於自賊其身焉耳諸儒闢二氏矣猥𤨏於掃除防檢之勤而迷謬於體統該括之大安於近小而弗睹其全矜其智能而不適於用譬之一家不知承藉祖父之遺光復門祚而顧栖栖於一室身口是計其堂奥未窺積聚未復終無迯於樊遲細民之譏則亦何以服二氏之心哉與蔣道林此學日入密處紛紜轇轕中自得泰然不煩照應不煩照應一語雙老所極惡聞却是極用力全體不相汚染乃有此景如無為㓂之念縱百念縱横斷不須照應始無此念明道不須防檢不待窮索未嘗致纖毫之力意正如此以身在天地間負荷即一切俗情自難染汚寄尹道輿來書責弟不合良知外提出知止二字而以為良知無内外無動静無先後一以貫之除此更無事除此别無格物言語雖似條暢只不知緣何便無分毫出入操則存舍則亡非即良知而何終日談本體不說工夫纔拈工夫便指為外道恐陽明先生復生亦當攢眉也寄王龍溪來書吾心全體大用發見流行雖昏壅之極而自有昭明不冺之端此即陽明先生所謂良知今時學者指愚夫愚婦與聖人同處乃其相傳妙訣也曰忠如即以此為本來端倪乎是無容細微察識矣若謂此中别有本來端倪須察識而後稍見則所謂全體大用發見流行又何如哉且惻隠之端須是逢赤子入井見之平旦之氣須於好惡與人相近見之以此推端倪似未有舍感物而言端倪者如静坐則清明和適執事則精明安肅居家則和柔愉婉以此端倪而隨處得之不知與來書所謂拿此一物看守在此不令走作者又何以異察識既不可緩隨處又當理會不知所謂静息處玩其清明和適之體則日用自有依據孰先孰後為一為二乎此處更無歇後語更無訓釋語始是真能明諸心始是不落虛見答萬日忠静中隠然有物此即是心體不昩處此處常作主宰是一生不了雜念一切放下是干休干處得感動時變換是把捉太𦂳故有厭動之病一屬操持即入把捉此處正好調停求其至當未可畏其難操持幷動静皆作疑也合幷不來只是未久如服藥人藥力未至不須疑病淺㴱發與未發傳習錄云未發在已發之中而已發之中未嘗别有未發者在已發在未發之中而未發之中未嘗别有已發者存此兩句精細可破紛紜之論知寒覺煖聖人與人一也而知覺處有千頭萬緒不同未發所由辨也故陽明先生曰當知未發之中常人亦未能皆有蓋中庸未發在慎獨後言知學而後有未發之中謂其能知未發之體而存之也言先後固不得言是一是二亦不得目之明為體視為用視處别有明在否明與視何所斷際若逐外為用亦體非其體矣心神物也動物也攝之固難凝之尤難象山立大之論於凝聚處煞有地步以上俱答萬日忠内外兩忘乃千古入聖祕密語凡照應掃除皆屬内境安排酬應皆屬外境二境了不相干此心渾然中存非所謂止其所乎此非静極何以入悟答李石麓黙黙自修真見時刻有不彀手處時刻有不如人處時刻只在自心内尋究虛静根柢安頓不至出入即有好商量矣答王著久不肖三四年間曾以主静一言為談良知者告以為良知固出於稟受之自然而未嘗冺滅然欲得流行發見常如孩提之時必有致之之功非經枯槁寂寞之後一切退聽而天理炯然未易及此陽明之龍塲是也學者舍龍塲之懲創而苐談晚年之熟化譬之趨萬里者不能蹈險出幽而欲從容於九達之逵豈止躐等而已哉然聞之者惟恐失其師傳之語而不究竟其師之入手何在往往辨詰易生徒増慨惜寄謝髙泉良知二字乃陽明先生一生經驗而後得之使發於心者一與所知不應即非其本㫖矣當時遷就初學令易入不免指見在發用以為左劵至於自得固未可以草草謬承而因仍其說者𩔖借口實使人猖狂自恣則失之又遠寄張須野至寶不宜輕弄此丹家語也然於此件頗相𩔖千古聖賢只有收攝保聚法不肎輕弄以至於死故曰兢兢業業過了一生寄王龍溪執事只欲主張良知常發便於聖賢幾多凝聚處盡與掃除解脫夫心固常發亦常不發二者可倒一邊立說否至謂未發之中竟從何處覔則立言亦太易矣與錢緒山㫄午之中吾御之者轇轕紛紜而為事物所勝此即憧憧之思也從容閒雅而在事物之上此即寂然之漸也由憧憧而應之必或至於錯謬由寂然而應之必自盡其條理此即能寂與不能之驗由一日而百年可知也一日之間無動無静皆由從容閑雅進而至於澄然無事未嘗有厭事之念即此乃身心安著處安著於此不患明之不足於照矣漸入細微久而成熟即為自得明道不言乎必有事焉而勿正心勿忘勿助長謂未嘗致纖毫之力此其存之之道夫必有事者言乎心之常止於是勿忘助者言其常止之無所增損未嘗致纖毫之力者言乎從容閒雅又若未嘗有所事事如此而後可以積久成熟而入細微蓋為學之彀率也與徐大廵心感事而為物感之之中須委曲盡道乃是格物理固在心亦即在事事不外心理不外事無二致也近時執心即理一句學者多至率意任情而於仔細曲盡處畧不照管既非所以致知却與在格物一句正相反但後儒認理為格式見套以至支離若知事無内外心無内外理無内外即格式見套又皆在乎中非全格去舊物乃為精微也答劉汝周學有可以一言盡者有不可以一言盡者如收斂精神併歸一處常令凝聚能為萬物萬事主宰此可一言而盡亦可以一息測識而悟惟夫出入於酬應牽引於情思轉移於利害纒固於計算則微瞹萬變孔竅百出非堅心苦志持之嵗月萬死一生莫能幾及也與蕭雲臯劉獅泉素持元虛即今肎向裡著已收拾性命正是好消息寄聶雙江易言洗心非為有染著易言藏密非為有滲漏除却洗心藏密更無工夫十分發揮乃是十分緊固方是堯舜兢業過一生處答唐一菴無所存而自不忘一句說得太早此最是毒藥諸君一向用此為妙劑如何自求不得不見超身何也執之則生機拂一句甚是但容易為人開手且喫苦過甚無妨操則存舍則亡孔子亦且云云操豈可已乎愈操愈熟斷不成便放開手千古未有開手聖人懸崖撒手莊子有此言吾儒方妄以自解不知莊子所指何也今有人到懸崖上撒手者乎何獨在平時說撒手事惟有時時收斂務求不負此良知庶幾樸實頭不落陷阱耳與謝維世來諭知至誠正之外非别有格心意識之外非别有物天性之外非别有知格致誠正是一時事所謂不落言詮故能出此言也與友人龍溪之學久知其詳不俟今日然其謂工夫又却是無工夫可用故謂之以良知致良知如道家先天制後天之意其說實出陽明口授大抵本之佛氏翻傳燈諸書其㫖洞然直是與吾儒兢兢業業必有事一段絶不相䝉分明二人屬兩家風氣言陽明龍溪各為一家今比而同之是亂天下也持此應世安得不至蕩肆乎與聶雙江往年喜書象山小心翼翼昭事上帝上帝臨汝母貳爾心戰戰兢兢那有閒言時候一段龍溪在㫄輒欲更書他語心頗疑之每觀六經言學必先兢業戒懼乃知必有事焉自是孔門家法與謝髙泉來諭凡應酬未盡是良知本然條理故於精神足時太涉周旋似有所加到困憊後便生厭心似有所損此已說到良知本然條理不可加不可損處但須於尋常言動處識得此條理方時時有辨别又須於尋常中調習得熟方處處有工夫豈特遇人有厭心為有加損即閒中快活處亦皆有之故精神如常即應酬是格物精神當養即少事是格物此是一事不是兩事答曾月塘寜息處非可以人力為精明處亦不可以人力為不可以人力為而後工夫至密而可久與王塘南謂良知與物無對故謂之獨誠是也獨知之明良知固不冺矣卜度擬議果皆良知矣乎中庸言獨而註增獨知二字言良知者因喜附之或非子思意也來諭謂獨指天命之性言得之矣知幾其神幾者動之微也微者道心而謂有惡幾可乎故曰動而未形有無之間猶曰動而無動之云也而後人以念頭初動當之遠矣知此則幾前為二氏幾後為五伯而研幾者為動静不偏周子幾善惡之言言惟幾故别善惡能知幾非一念之善可能盡吉之先見蓋至善也常以至善為主是天命自主常能慎獨常依中庸常服膺此一善是謂先幾如是而有失有過其復而改方不甚逺若使兩物對待去彼就此豈所謂齋明豈所謂擇善固執者乎此宋儒傳述失宗云然象山先立乎大固不若是勞擾也與詹毅齋自私二字斷得二氏盡絶聖賢之道當生而生當死而死致命遂志殺身成仁寧作此等見識與凌羊山此學静中覺本體用事極難大約只於自心欺瞞不得處當提醒作主久久精明便有别白處若只將日用間應酬知解處便謂是心體此却作主不定有差自救不來何也只尋得差不得處始有見耳與周學諭大學絜矩原從知止說來却不是無所本能知止方定静安然後善慮善慮便能絜矩故中無所倚自然與物同體自是絜矩若只論絜矩不問此心若何即涉於陪奉媚世牽已從人矣與劉仁山儒釋之辨只吾儒言中與仁處便自不同堯舜之中孔門之仁言雖不同一則指無所倚一則指渾然與物同體無二物也中無所倚釋之無住若近之至於兢業允執茫不相似渾然同物與其覺海圓澄又大相逺不探其端緒舉言句之脗合以為歸失其宗矣中無所倚自然與物同體得此氣象守而弗失乃吾儒終日行持處延平於喜怒哀樂未發以前觀其氣象蓋使人反求者也良知二字一經指㸃便易摸索但不知與所謂無倚所謂同體處當下氣象若何故往往易至冒認非謂良知之外復有中與仁也止處該括動静總攝内外此止即萬物各得其所若見物方絜已屬支離止則無倚與物同體便自能絜今世與物酬應漠不相關固不足以與此有持萬物一體之說者則又牽已從之終日沉湎於世情依阿附㑹以為同體不知本體淪喪更無收攝安頓處纔拈静定字面即若傷我不知無一物方能物物吾心已化於物安能運物哉此處絲毫倒一邊不得以上俱與劉仁山兄嘗謂弟落意見此真實語凡見中有此用處不應總屬意見茍未逼真慈湖之無意亦意見也若有向往不妨其致力之勤到脫然處又當别論力未至而先為解脫不已過憂乎答王龍溪除此真心作用更無才力智巧答胡正甫莊子所謂外者不入内者不出吾儒知止地位正與相等即此不入不出處便是定即定處便是吾人心體本然便是性命所在守此一意不散漸進於純熟萬物無足以撓之入聖賢域中矣與王少叅執著乃用工生疎所致到純熟自當輕省不可便生厭心此處一有憎厭疑貳便是邪魔作祟絶不可放過也答劉可賢此心皎然無掩蔽時便與聖人不甚異於此不涉絲毫搖兀亦無改變亦無執著亦無忽畧此便是學只時時有􅍖䕶處不傷皎然處將容體自正言語自謹嗜慾自節善自行惡自止好名好貨各色自覺澹以此看書以此處友精神自聚不散渙矣答劉可賢終日紛紛不覺勞頓緣動神而後有勞神氣不動即動應與静中無有異境此中虛而無物故也自處與處人未動絲毫意便自無事稍涉動意未有不應者便是與物為敵與王養明即處事中便是學此間稍有作惡處便是過稍有執泥處便是過所謂養心也在此擴知也在此此處工夫愈密知覺愈精而不受變於物此之謂格物之學若自家執泥作惡尚不覺是謂不知痛癢便是幹極好事亦是有己之私到得此心不作惡執泥明鏡止水相似發又中節便是㢲以出之此間磨煉得去是謂時習與劉可賢虛實寂感内外原是一件言其無有不是故謂之實言其無少夾雜故謂之虛言其隨事能應故謂之感言其隨處無有故謂之寂以此自了故謂之内以此俱了故謂之外真無有分别者但謂虛寂本體常止不動却要善看不然說本體說止說不動便能作梗便不真虛寂矣答杜道升處處從小利害克治便是克己實事便是處生死成敗之根亦不論有事無事此處放過更無是處於克治知費力與濁亂此是生熟安勉分限不安分限將下手實際便欲竝成德時論此涉於比擬太過不知工夫純熟只在常明少昏漸漸求進到得成片段却與一念一事是非不同却是得先幾也答曾于野静中如何便計功效只管久久見得此心有逐物時有不逐物時却認不逐物時心為本日間動作皆依不逐物之心照應一逐物便當收回愈久漸漸成熟如此工夫不知用多少日子方有定貼處如何一兩日坐後就要他定貼動作不差豈有此理陽明先生教人依良知不是依眼前知解的良知是此心瞞不過處即所謂不逐物之心也静中識認他漸漸有可尋求耳答羅生來書未見有憤發改過之意只是欲人相信不得開口答王龍溪終日眼前俱是假人無一分真實意自我待之終日俱是真人無一分作偽意如此便是有進步寄劉少衡凡習心混得去皆緣日間太順適未有操持如舵工相似終日有舵便不至瞌睡到得習熟即身即舵無有兩件凡入學問真處決定有操持收束漸至其中未有受用見成者答歐陽文朝自覺得力只管做去微覺有病又須轉手此件工夫如引小兒隨時遷就執著不得與杜道升只是絲毫放過不得時時與物無對便是收斂功也與胡正甫孔門博文約禮之敎無非即人身心納之䂓矩固非為元遠也夫不誘之以規矩而為元遠之務是猶閉之門而談天衢不可得也與劉見川冬㳺記嘉靖己亥王鯉湖問慎獨之㫖但令善意必行惡意必阻如何王龍溪曰如此却是大不慎矣古人所言慎者正指微處不放過說正是汙染不上正是常得不欺如好好色惡惡臭始得若善惡二念交起此是做主不得縱去得已非全勝之道王道思曰念頭斷去不得止是一任他過便要如何斬除恐更多事此吾小歇脚法也此宗門放蕩之語後來羅近溪輩多習之以為解縳之秘法龍溪謂念菴曰汝學不脫知見未逼真若逼真來輪刀上陣措手不迭真心真意人人皆得皆知那得有許多遮瞞計較來問如何是真為性命龍溪曰􅍆得性命是為性命又問龍溪曰為性命不真總是􅍆世界不下如今說著為善不是真善却是要好心腸隨人口脗毁譽得失之關不破若是真打破人被惡名埋没一世更無出頭亦無分毫掛帶此便是真為性命真為性命時時刻刻只有這裡著到何暇陪奉他人如此方是造化把柄在我横斜曲直好醜髙低無往不可如今只是依阿世界非是自由自在因歎曰今世所謂得失不知指何為得失所謂毁譽不知毁譽個甚便說打破已是可歎矣惡名埋没一段亦是宗門語不管是非好醜顛倒做去以為見性究竟成一無忌憚小人耳若流俗惡名豈能埋没得人又何嘗出頭不得故舉世非之而不顧為流俗言也茍其決裂名敎真有惡名可以埋没者則已入於禽獸亦何性命之有王心齋論正已物正曰此是吾人歸宿處凡見人惡只是己未盡善已若盡善自當轉易以此見己一身不是小一正百正一了百了此之謂天下善此之謂通天下之故聖人以此修已安百姓而天下平又論仁之於父子曰瞽瞍未化舜是一様命瞽瞍既化舜是一様命可見性能易命龍溪書曰以世界論之是千百年習染以人身論之是半生倚靠見在種種行持㸃檢只在世情上尋得一件極好事業來做終是㸔人口眼若是超出世情漢子必須從渾沌裏立定根基將一種要好心腸洗滌乾浄枝葉愈枯靈根愈固從此生天生地生人生物方是大生故學問須識真性獨往獨來使真性常顯始能不落陪奉夏㳺記戊申王龍溪曰未發之中未易言須知未發却是何物謂之未發言不容發也發於目為視矣所以能視者不隨視而發發於耳為聽矣所以能聽者不隨聽而發此乃萬古流行不息之根未可以静時論也予問龍溪曰凡去私欲須於發根處破除始得私欲之起必有由來皆緣自己原有貪好原有計算此處漫過一時潔浄不過潛伏且恐隂為之培植矣錢緒山曰此得工夫零碎但依良知運用安事破除龍溪曰不然此搗巢搜賊之法勿謂盡無益也緒山之言與前冬遊記王道思所云同一法門龍溪之言曰先師提掇良知乃道心之微一念靈明無内外無寂感吾人不昧此一念靈明便是致知隨事隨物不昧此一念靈明便是格物良知是虛格物是實虛實相生天則乃見蓋良知原是無知而無不知原無一物方能𩔖萬物之情或以良知未盡妙義於良知上攙入無知意見便是異學或以良知不足以盡天下之變必加見聞知識補益而助發之便是俗學吾人致知工夫不得力苐一意見為害意見是良知之賊卜度成悟明體宛然便認以為良知若信得良知過時意即是良知之流行見即是良知之照察徹内徹外原無壅滯原無幇補所謂丹府一粒㸃銕成金若認意見以為實際本來靈覺生機封閉愈固不得出頭學術毫釐之辨不可不察也然質之陽明先生所言或未盡合先生嘗日良知者天命之性心之本體自然照明靈覺者也是謂良知即天性矣中庸言性所指在於不覩不聞蓋以君子之學惟於其所不覩不聞者而戒慎恐懼耳舍不覩不聞之外無所用其戒慎恐懼也夫不覩不聞可謂隠而未形微而未著矣然吾之發見於外者即此未形者之所為而未始有加吾之彰顯於外者即此未著者之所為而未始有加由是言之謂良知之體至虛可也謂其本虛而形實亦可也今曰良知是虛格物是實豈所謂不覩不聞有所待而後實乎先生又曰至善者心之本體動而後有不善而本體之知未嘗不知也是以良知為至善矣大學之言至善其功在於能止蓋以吾心之體固有至善而有知之後得止為難知而常止非天良之止其所孰能與於此故定静安慮者至善也能定能静能安能慮者止至善也能止而後至善盡為己有有諸已而後謂之有得先之以定静安者物之所由以格止之始也後之以慮者知之所以為至止之終也故謂致知以求其止可也謂物則生於定静亦可也今曰虛實相生天則乃見豈定静反由慮而相生乎先生又曰良知是未發之中又曰當知未發之中常人亦未能皆有豈非以良知之發為未冺之善端未發之中當因學而後致蓋必常静常定然後可謂之中則凡致知者亦必即其所未冺而益充其所未至然後可以為誠意固未嘗以一端之善為聖人之極則也今曰若信得良知過時意即是良知之流行見即是良知之照察云云夫利欲之盤固遏之猶恐弗止而欲從其知之所發以為心體以血氣之浮揚斂之猶恐弗定而欲任其意之所行以為工夫畏難茍安者取便於易從見小欲速者堅主於自信夫注念反觀孰無少覺因言發慮理亦昭然不息之真既未盡亡先入之言又有可據日滋日甚日移日逺將無有以存心為拘廹以改過為粘綴以取善為比擬以盡倫為矯飾者乎而其滅裂恣肆者又從而譸張簧皷之使天下之人遂至於蕩然而無歸則其陷溺之淺湥吾不知於俗學何如也先生又曰知者意之體物者意之用未嘗以物為知之體也而緒山乃曰知無體以人情事物之感應為體無人情事物之感應則無知矣夫人情事物感應之於知猶色之於視聲之於聽也謂視不離色固有視於無形者而曰色即為視之體無色則無視也可乎謂聽不離聲固有聽於無聲者而曰聲即為聽之體無聲則無聽也可乎夏㳺記甲寅龍溪因前記有所異同請面命予曰陽明先生苦心犯難提出良知為傳授口訣蓋合内外前後一齊包括稍有幇補稍有遺漏即失當時本㫖矣往年見談學者皆曰知善知惡即是良知依此行之即是致知予嘗從此用力竟無所入久而後悔之夫良知者言乎不學不慮自然之明覺蓋即至善之謂也吾心之善吾知之吾心之惡吾知之不可謂非知也善惡交雜豈有為主於中者乎中無所主而謂知本常明恐未可也知有未明依此行之而謂無乖戾於既發之後能順應於事物之來恐未可也故知善知惡之知隨出隨冺特一時之發見焉耳一時之發見未可盡指為本體則自然之明覺固當反求其根源蓋人生而静未有不善不善動之妄也主静以復之道斯凝而不流矣神發為知良知者靜而明也妄動以雜之幾始失而難復矣故必有收攝保聚之功以為充達長養之地而後定静安慮由此以出必於家國天下感無不正而未嘗為物所動乃可為之格物蓋處無勿當而後知無弗明此致知所以必在於格物物格而後為知至也故致知者致其静無而動有者也知茍致矣雖一念之微皆真實也茍為勿致隨出隨冺終不免於虛蕩而無歸是致與不致之間虛與實之辨也謂之曰良知是虛格物是實虛實相生天則乃見將無言之太㴱乎即格物以致其知矣收攝之功終始無間則吾心之流行照察自與初學意見萬萬不侔謂之曰意見是良知之賊誠是也既而曰若信得良知過時意即是良知之流行見即是良知之照察所謂丹府一粒㸃銕成金不已言之太易乎龍溪曰近日覺何如曰一二年來與前又别當時之為收攝保聚偏矣蓋識吾心之本然者猶未盡也以為寂在感先感由寂發夫謂感由寂發可也然不免於執寂有處謂寂在感先可也然不免於指感有時彼此既分動静為二此乃二氏之所湥非以為邊見者我堅信而固執之其流之弊必至重於為我疎於應物蓋久而後疑之夫心一而已自其不出位而言謂之寂位有常尊非守内之謂也自其常通微而言謂之感發微而通非逐外之謂也寂非守内故未可言處以其能感故也絶感之寂寂非真寂矣感非逐外故未可言時以其本寂故也離寂之感感非正感矣此乃同出而異名吾心之本然也寂者一感者不一是故有動有静有作有止人知動作之為感矣不知静與動止與作之異者境也而在吾心未嘗隨境異也隨境有異是離寂之感矣感而至於酬酢萬變不可勝窮而皆不外乎通微是乃所謂幾也故酬酢萬變而於寂者未嘗有礙非不礙也吾有所主故也茍無所主則亦馳逐而不返矣聲臭俱冺而於感者未嘗有息非不息也吾無所倚故也茍有所倚則亦膠固而不通矣此所謂收攝保聚之功君子知幾之學也學者自信於此灼然不移即謂之守寂可也謂之妙感亦可也即謂之主静可也謂之慎動亦可也此豈言說之可定哉是何也心也者至神者也以無物視之固冺然矣以有物視之固炯然矣欲盡斂之則亦塊然不知凝然不動無一物之可入也欲兩用之則亦忽在此倐然在彼能兼體而不遺也使於真寂端倪果能察識隨動隨静無有出入不與世界物事相對待不倚自己知見作主宰不著道理名目生證解不藉言語發揮添精神則收攝保聚之功自有準則明道云識得仁體以誠敬存之不須防檢窮索必有事而勿正心勿忘勿助長未嘗致纎毫之力此其存之之道固其準則也龍溪笑曰夏游記豈盡非是只三轉語處手勢太重便覺抑揚太過兄已見破到此弟復何言劉師泉謂夫人之生有性有命性妙於無為命雜於有質故必兼修而後可以為學蓋吾心主宰謂之性性無為者也故須首出庶物以立其體吾心流行謂之命命有質者也故須隨時運化以致其用常知不落念是吾立體之功常過不成念是吾致用之功也二者不可相雜蓋知常止而念常微也是說也吾為見在良知所誤極探而得之龍溪問見在良知與聖人同異師泉曰不同赤子之心孩提之知愚夫婦之知能如頑鑛未經煅煉不可名金其視無聲無臭自然之明覺何啻千里是何也為其純隂無真陽也復真陽者更須開天闢地鼎立乾坤乃能得之以見在良知為主決無入道之期矣龍溪曰謂見在良知便是聖人體段誠不可然指一隙之光以為決非照臨四表之光亦所不可譬之今日之日非本不光却為雲氣掩蔽以愚夫愚婦為純隂者何以異此予曰聖賢只是要人從見在尋源頭不曾别將一心換却此心師泉欲創業不享見在豈是懸空做得只時時收攝保聚使精神歸一便是但不可直任見在以為止足耳謂龍溪曰陽明先生之學其為聖學無疑矣惜也速亡未至究竟是門下之責也然為門下者有二有往來未密煅煉未久而許可太早者至於今或守師說以淑人或就已見以成學此非有負於先生乃先生負斯人也公等諸人其與往來甚密其受煅煉最久其得證問最明今年已過矣猶不能究竟此學以求先生之所未至却非先生負諸人乃是公等負先生矣緒山在陽明先生之門號稱篤實而能用其力者自余十六七年來凡六七見而緒山之學亦且數變其始也有見於為善去惡者以為致良知也已而曰未矣良知者無善無惡者也吾安得執以為有而為之而又去之後十年會於京師曰吾惡夫言之者之淆也無善而無惡者見也非良知也吾惟即吾所知以為善者而行之以為惡者而去之此吾可能為者也其不出於此者非吾所為亦非吾之所當聞也今年相見於青原則曰向吾之言猶二也非一也蓋先生嘗有言矣曰至善者心之本體動而後有不善也吾不能必其無不善吾無動焉而已彼所謂意者動也非是之謂動也吾所謂動動於動焉者也吾惟無動則在我者常一在我者常一則吾之力易易矣贈錢緒山王子之言曰始吾以致知為然也而不知有遺於物乃吾今而後知格物之為致知也始之言知亦曰格物云爾及而察之以為物生於知吾但知知而已而何有於物夫非知無物非物無知乃吾始之言知則猶廓廓爾而渾渾爾若有厭於芸芸爾者則猶未見物與知之為一也此一知也於物有格有不格則是吾之知亦有至有不至焉雖然王子後此又安知不以今之所言為未至也乎物之有未格也而求足於知焉有所不足是故為之可以己者即不得謂之精精不可已以此心之幾希易失而難窮故也贈王龍溪雙江先生繫詔獄經年而後釋方其繫也身不離接摺視不踰垣户塊然守其素以獨居久之諸子羣聖之言涉於目者不慮而得參之於身動而有信慨曰嗟乎不履斯境疑安得盡忘乎於是著錄曰困辨以明寂感之故歸質之友人友人或然或否或正以師傳曰陽明子所謂良知不𩔖往歲癸夘洪先與洛村黄君聞先生言必主於寂心亦疑之後四年丁未而先生逮送之境上含涕與訣先生曰嘻吾自勝之無苦君輩也其容翛然其氣夷然其心淵然而素自是乃益知先生遂為辨曰先生於師傳如何吾未之知請言吾所試昔者聞良知之學悅之以為是非之心人皆有之吾惟即所感以求其自然之則其亦庶乎有據矣已而察之執感以為心即不免於為感所役吾之心無時或息則於是非者亦將有時而淆也又嘗凝精而待之以虛無計其為感與否也吾之心暫息矣而是非之則似亦不可得而欺因自省曰昔之役者其逐於已發而今之息者其近於未發矣乎蓋自良知言之無分於發與未發也自知之所以能良者言之則固有未發者以主之於中而或至於不良乃其發而不知返也吾於暫息且有所試矣而況有為之主者耶夫至動莫如心聖人尤且危之茍無所主隨感而發譬之御馬銜勒去手求斯須馳驟之中度豈可得哉道心之言微性之言定無欲之言静致虛之言立本未發之言寂一也而何疑於先生先生聞之曰斯言知我哉錄有之良知者未發之中寂然大公之本體固吾師所傳也問之友人或然或否洪先曰吾學也困辨弗明弗可以措敘而梓之告於知言者困辨錄序余讀雙江聶君困辨錄始而灑然無所疑已而怳然有所會久而津津然不能舍於是附以己見梓之以傳而或者謂曰言何易也自陽明先生為良知之說天下議之為禪嘵嘵然至於今未已也夫良知合寂感内外而言之者也議者猶曰此遺物也厭事理之討論者也今而曰吾内守寂者也其感於外者皆非吾之所能與其不滋為可異歟夫分寂感者二其心者也分内外者析其形者也心譬則形之目者也目不能不發而為視視不能不發而為萬物離物以為視離視以為目其果有可指乎吾懼嘵嘵然於聶君者又未已也余應之曰言固未可齊也孔子不云乎曰吾道一以貫之當是時未能以其一者示之人也而曾子乃曰是忠恕也今之言與忠恕者同耶異耶彼以得之心者應之而世儒之言從而分曰孰為一之體孰為一之用而後忠恕者始明嗚呼使曾子若然其尚能聞言而唯乎夫聶君亦各以其得之心者為言固未暇為良知釋也子以心譬目有問於子曰寂感於目奚譬必曰視者感也物之不留者寂也無有分也鳴呼似矣而未盡也子謂目之所以能視而不容翳者何哉夫天地之化有生有息要之於穆者其本也良知之感有動有静要之致虛者其本也本不虛則知不能良知其發也其未發則良也事物者其應理者其則也應而不失其則惟致虛者能之故致虛者乃所以致知也知盡其天然之則於事事物物而理窮理窮則性盡命至而奚有於内外雖然知所先後而後近道此學之序也故無樂乎其專内也所以求當於外者非是則無以先也無樂乎其守寂也所以求神其感者非是則無以先也彼禪固賊道也而其内之寂者固皆離事物以為言彼視所謂理者何啻於其目之眚也而豈患其相入哉故言有相徇而非也者乃其無與當之謂也言有相反而是也者乃其喻所指之謂也子徒畏人之嘵嘵矣而獨不懼夫已之膠膠者乎今世言聰明才辯見聞强敏孰與聶君所謂表然才丈夫也其持世儒之學以見先生友之也非師之也而卒俛首以聽今又盡知其故兢兢焉自守一言以觸世之所諱其為逐聲與塊也夫且吾亦嘗聞而哂之以其為億也及逮而送之境無戚言憐色以亂其常蓋未幾而是錄作其曰困辨是遇困而益辨非辨於困者也而余為之言者亦若辨焉何哉蓋余困而後能知又信於未言故也困辨錄後序困辨錄者聶雙江公拘幽所書其下附語余往年手所箋也同年貴溪原山江君懋桓獲而讀之取其契於心者抄以自隨已而作令新寧將刻以授諸生問決於余余惟白沙主静之言出而人以禪諍至於陽明諍益甚以致良知之與主静無殊㫖也而人之言良知者乃復以主静諍其言曰良知者人人自能知覺本無分於動静獨以静言是病心也自夫指知覺為良知而以静病心於是總總然但知即百姓之日用以證聖人之精微而不知反小人之中庸以嚴君子之戒懼不獨二先生之學脈日荒即使禪者聞之亦且咄唶而失笑不亦遠乎夫言有攸當不知言無以學也良知猶言良心主静者求以致之收攝保聚自戒懼以入精微彼徒知覺焉者雜真妄而出之者也主静則不逐於妄學之功也何言乎其雜真妄也譬之於水良知源泉也知覺其流也流不能不雜於物故須静以澄汰之與出於源泉者其㫖不能以不殊此雙江公所為辨也雖然余始手箋是錄以為字字句句無一弗當於心自今觀之亦稍有辨矣公之言曰心主乎内應於外而後有外外其影也心果有内外乎又曰未發非體也於未發之時而見吾之寂體未發非時也寂無體不可見也見之謂仁見之謂知道之鮮也余懼見寂之非寂也是故自其發而不出位者言之謂之寂自其常寂而通微者言之謂之發蓋原其能戒懼而無思為非實有可指得以示之人也故收攝保聚可以言静而不可謂為寂然之體喜怒哀樂可以言時而不可謂無未發之中何也心無時亦無體執見而後有可指也易曰聖人立象以盡意繫辭以盡言言固不盡意也坤之震剝之復得之於言外以證吾之學焉可也必也時而静時而動截然内外如卦爻然果聖人意哉余不見公者四年不知今之進退復何如也江君早年亦嘗以禪諍學已而入象山得之静坐㫄探博證遂㴱有契於公新寧故新會地白沙之鄉也豈無傳其遺言者乎如有言主静而異於公者幸反覆之不有益於我必有益於人是良知也讀困辨錄抄序其與聶公友也聞其所語此心寂感之機歸寂之要十餘年來未嘗輕一諾焉一日忽自省曰公之言是也劉兩峯六十序致良知者致吾心之虛静而寂焉以出吾之是非非逐感應以求其是非使人擾擾外馳而無所於歸以為學也夫知其發也知而良則其未發所謂虛静而寂焉者也吾能虛静而寂雖言不及感亦可也雙江七十序善學者竭力為上解悟次之聽言為下蓋有密證殊資黙持妙契而不知反躬自求實際以至不副夙期者矣固未有歷涉諸難㴱入真詮而發之弗瑩必俟明師面臨私授而後信久遠也陽明先生年譜考訂序龍溪子曰良知者感觸神應愚夫婦與聖人一也奚以寂奚以收攝為予不答已而腹饑索食龍溪子曰是須寂否須收攝否予曰若是則安取於學饕餮與禮食固無辨乎他日龍溪子曰良知本寂無取乎歸寂歸寂者心槁矣良知本神應無取乎照應照應者義襲矣吾人不能神應不可持以病良知良知未嘗增損也予曰吾人常寂乎曰不能曰不能則收攝以歸寂於子何病吾人不能神應謂良知有蔽可乎曰然曰然則去蔽則良知明謂聖愚有辨奚不可求則得舍則失不有存亡乎養則長失則消不有增損乎擬而言議而動不有照應乎是故不可冺者理之常也是謂性不易定者氣之動也是謂欲不敢忘者志之凝命之主也是謂學任性而不知辨欲失之罔談學而不本真性失之鑿言性而不務力學失之蕩龍溪子曰如子之言固未足以病良知也良知辨白沙先生之學以自然為宗至其得要則隨動隨静終日照應而不離彼跋白沙詩濂溪曰誠則無事又曰誠無為終之以艮則曰艮非為也為不止矣夫自堯舜相傳精一之祕莫不由兢業以得之孔門格致戒慎其功若不一而足也今曰無事無為不已悖乎曰不然無欲者至近而遠至約而盡至易而甚難者也明道曰所欲不必沈溺只有所向便是欲夫有所向者欲也所以必向是者有以為之主也夫意之所向隨感易動日用動静何往非意於此辨别使意無所向自感自應則心體泰然他無干涉静虛動直其於用力不已切乎是無事者乃所謂必有事而無為者乃其至剛者也跋通書物者知之感也知者意之靈也知感於物而後有意意者心之動也心者身之主也身者天下國家之本也感而正曰格靈而虛曰致動以天曰誠居其所曰正中有主曰修無無物之知無無知之意無無意之心無無心之身無無身之家之國之天下靈而感之以正曰知止感而以正天下國家舉之矣故曰至善虛靈能感則意定動以天則心静中有主則安舉而措之天下國家則慮無不當大人之事畢矣大學解告子能信其心者也彼見心能主乎内外故其意曰心能知言者也凡言之來以心接之而已其有不得於言必其所不必知而不可因言以動乎心心能帥氣者也凡氣之用以心御之而已其有不得於心必其所不當發而不可役心以從乎氣不因言以動心則外無所入不役心以從氣則内無所牽外無所入者心離乎境也内無所牽者氣合乎心也惟其以離境為心故常主心之無事者以為正惟其以無事為正故不能順氣之生長者以有為常主於心之無事以為正故不免於内正其心不能順氣之生長以有為故不免於外助其長其與孟子之學真毫釐之辨耳告子以無所事為心之正故孟子曰我則必有事而不正心告子忘外一切作用皆自安頓是為助其生長故孟子曰我則勿忘而亦勿助其長孟子解落思想者不思即無落存守者不存即無欲得此理炯然隨用具足不由思得不由存來此中必有一竅生生夐然不𩔖言此學常存亦得言此學無存亦得常存者非執著無存者非放縱不存而存此非可以倖至也却從尋求中得由人識取以上别周少魯語此心倐忽不可執著却又凝定不染一物向人說得伸寫得出解得去謂之有才則可於學問絲毫無與也學問之道須於衆人塲中易鶻突者條理分明一絲不亂此非平日有涵養鎮静之功小大不疑安能及此以上别沈萬川語天降大任一節於此却有湥辨自心術中料理則為聖學自時態料理則為俗情二者雖相去懸絶然皆有收密慎密增益不能之效此正人鬼分胎不可不自察也孟子所言增益與改作者指其氣性未平情欲未盡與才力未充正求此心不移耳而世人往往折節於隕獲諧俗於圓熟以為増益在是不亦左乎書楊武東卷言其收斂謂之存養言其辨别謂之省察言其決擇謂之克治省察者言其明克治者言其決決則愈明而後存養之功純内不失已外不失人動亦定静亦定小大無敢慢始終條理可以希聖矣書王有訓扇白沙詩云千休千處得一念一生持於千休之中而持一念正出萬死於一生者也今言休而不提一念便涉茫蕩必不能休言念而未能千休便涉支離亦非真念茍不知念則亦無所謂能休者能念不期休而自休矣示門人初及第謁魏莊渠先生先生曰達夫有志必不以第為榮黙坐終日絶口不言利達事私心為之悚然承當此言煞不容易蓋不榮進取即忘名位忘名位即忘世界能忘世界始是千古真正英雄示胡正甫寂嘿不動者誠也言藏於無也感而遂通者神也言發於有也動而未形有無之間者幾也言有而未嘗有也三言皆狀心也常有而不使其雜於有是謂研幾真能不雜於有則常幽常微而感應之妙是知幾之神謂幾為一念之始者何足以知此能以天地萬物為體則我大不以天地萬物為累則我貴夫以天地萬物為體者與物為體本無體也於無體之中而大用流行發而未嘗發也静坐而清適執事而安肅處家而和婉皆謂之發而不可執以為體常寂常虛可卷可舒全體廓如以上皆示萬日忠知無不足之理則凡不盡分者皆吾安於肆欲而不竭才者也吾人日用之間戒懼稍縱即言動作止之微皆違天常而賊人道可不省歟示王有訓吾人當自立身放在天地間公共地步一毫私已著不得方是立志只為平日有慣習處軟熟滑瀏易於因仍今當一切斬然只是不容放過時時刻刻須此物出頭作主更無纖微舊習在身方是工夫方是立命日扎終日營營與外物交以我應之未始見其非我也久而見化於物故舍事無心舍物無身暫爾暝目傍徨無垠有如處於寂莫之鄉曠莽之野不與物對我乃卓然天地之間萬生萬死天地不為欣戚以其在天地未嘗有增未嘗有損也生死不增於我我何欣戚故聖人冥之麗吾形者是物非我擾吾思者是事非我釋吾累者是理非我斂吾散者是學非我置理學不講離事物不為我將何在知我在者古今不能限智愚不能别高之不為顯卑之不為汙故常泰然無懼以上皆寤語王敬所訪余石蓮洞中各請所得敬所曰吾有見於不息之真體天地之化生日月之運行不能外是體也而況於人乎吾觀於暮春萬物熙熙以繁以滋而莫知為之其殆庶幾乎明道得之名為識仁識仁者識此不息者也吾時而言吾時而嘿吾時而作止進退無所庸力也其有主之者乎余曰可聞者言也所從出此言者人不得而聞也豈惟人不得聞已亦不得而聞之非至静為之主乎然而必云歸静者何也今之言者必與言馳馳則離其主矣離其主則逐乎所引之物吾雖言矣而静何有所從出者存於其中受命如響如是而言如是而嘿語黙殊而吾未嘗有二主也從而推之作止進退常變晝夜吾未嘗有二主静矣斯可以言歸矣歸静言乎其功也而謂任心之流行以為功者吾嘗用其言而未之有得也敬所曰是即吾之所謂不息者而非以對待之静言之也說静貞明之體常為主宰雖流行不息而未嘗有所作為如石之介内外敵應兩不相與寂之至也贈周洞岩自來聖賢論學未嘗有不犯做手一言未有學而不由做者惟佛家則立躋聖位此龍溪極誤人處陽明公門下爭知字如敬師諱不容人談破吾儒不言息只不㬥氣息自在其中以一推行於事事物物不攙入些子知識便是由仁義行纔於事物上求之便是知識便是行仁義察識端倪以致夫擴充之功謂識本體後方好用功不是發處纔有工夫用也孔門之學敎人即實事求之俟其自得後世分内分外分心分事自宋以來便覺與孔門稍不𩔖以上讀雙江致知議畧雜念漸少即感應處便自順適松原誌晤妄意於此二十餘年矣亦嘗自矢以為吾之於世無所厚取自欺二字或者不至如人之甚而兩年以來稍加懲艾則見為吾之所安而不懼者正世之所謂太欺而所指以為可惡而可耻者皆吾之處心積慮隂托之命而恃以終身者也其使吾之安而不懼者乃先儒論說之餘而冒以自足以知解為智以意氣為能而處心積慮於可惡可耻之物則知解之所不及意氣之所不行覺其缺漏則䝉以一說欲其宛轉則加以衆證儒先論說愈多而吾之所安日密譬之方技俱通而痿痺不恤搔爬能談而痛癢未加甘心於服鴆而自以為神劑如此者不知日凡幾矣至聞長生久視之妙津津然同聲應之不謂其相遠也嗚呼以是為學雖日有聞時有習明師臨之良友輔之猶恐成其私也況於日之所聞時之所習出入於世俗之内而又無明師良友之益其能免於前病乎夫所安者在此則惟恐人或我窺所蒙者在彼則惟恐人不我與託命既堅固難於拔除用力已湥蓋巧於藏伏於是毁譽得失之際始不能不用其情此其觸機而動緣釁而起乃餘症標見所謂已病不治者也且以隨用隨足之體而寄寓於他人口吻之間以不加不損之真而貪竊於古人唾棄之穢至樂不尋而伺人之顏色以為欣戚大寶不惜而冀時之取予以為歉盈如失路人之志歸如喪家子之丏食流離奔逐至死不休孟子之所謂哀哉别蔡督學只在話頭上拈弄至於自性自命傷損不知當下動氣處自以為發强剛毅纒粘處自以為文理密察加意陪奉却謂恭敬明白依阿却謂寛仁如此之𩔖千言萬語莫能狀其情變總之以一言只是鶻突到了雖自稱為學而於自身邈不相干却又說精說一說感說應亦何益哉佛與吾儒之辨須是自身已有下落方可開口然此亦是閒話辨若明白亦於吾身何干老兄將此等作大事件以為講論不明將至誤世弟則以為伊川講明後又出幾個聖人濂溪未曽講明又何曾誤了舂陵夫子無生之說門面終是不同何須深論今縱談禪決未見有人削髮棄妻薄視生死抛却名位此數事乃吾儒詆毁佛氏大節目處既不相犯自可無憂老兄吾為此懼一言似可稍解矣吾輩一個性命千瘡百孔醫治不暇何得有許多為人說長道短耶弟願老兄將精一還堯舜感應還孔子良知還陽明無生還佛真將當下胸中粘帶設計斷除眼前紛紜設計平妥原來性命設計恢復益於我者取之而非徇其言也害於我者違之而非徒以言也如是尚何說之不同而懼之不早已乎答何善山尋常作工夫便欲講求得無弊此欲速之心磨礱方有光輝如今安得盡是只用分别善惡工夫安有許多牽絆為言語分疏既知培本便是扶疎之勢即為知止一向愁東愁西何故詩註未發之中思之位也存乎情發之中而不與情俱發者也俱發則出其位矣常止其位而思以通之故吾未嘗無作止語嘿往來進退是静為之主也非吾主乎静也主静堂記明儒學案卷十八
