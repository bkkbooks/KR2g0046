body:
  text: 明儒學案卷三十八餘姚黄宗羲撰甘泉學案二太僕吕巾石先生懐吕懐字汝德號巾石廣信永豐人嘉靖壬辰進士自庶吉士出為給事中復入春坊以南司業掌翰林院事遷南太僕寺少卿致仕先生受學於甘泉以為天理良知本同宗㫖學者工夫無有著落枉自説同説異就中指㸃出一通融樞要只在變化氣質故作心統圖説以河圖之理明之一六同宗二七同道三八為朋四九為友各居一方五十在中如輪之有心屋之有脊兼統四方人之心是五十也隂陽合德兼統四端命曰人極至於氣質由身而有不能無偏猶水火木金各以偏氣相勝偏氣勝則心不能統之矣皆因心同形異是生等差故學者求端於天不為氣質所局矣先生之論極為切實可以盡横渠之藴然尚有説夫氣之流行不能無過不及故人之所禀不能無偏氣質雖偏而中正者未嘗不在也猶天之寒暑雖過不及而盈虛消息卒歸於太和以此証氣質之善無待於變化理不能離氣以為理心不能離身以為心若氣質必待變化是心亦須變化也今曰心之本来無病由身之氣質而病則身與心判然為二物矣孟子言陷溺其心者為歲未聞氣質之陷溺其心也蓋横渠之失渾氣質於性先生之失離性於氣質總由看習不清楚耳先生所著有律吕古義厯考廟議諸書巾石論學語竊為天道流行命也與心俱生性也在天曰命在人曰性實一本耳前後五者皆性於已而命於天世之人但知以前五者為人性而不知節之以天理以後五者為天命而不知求之於人心故孟子謂聲色臭味安佚之欲與心俱生人之性也然有本之天理而不可易者君子固不謂由於人性恣然自肆而不思所以節之於理也仁義禮智天道之懿一理流行天之命也然有根於人心而不容偽者君子固不謂出於天命而不思所以性之於已也夫心即理理即心人心天理無非中者然性本人心而有不出於理者是形氣之私而非性之真命出天理而有不根於心者是拘蔽之妄而非命之正性命合一天人不閒知而行之此孟子之所以亞聖也答毛介川氣之存亡間不容髪一念之得則充塞天地一念苟失即墮落體膚是故孟子論養氣必以集義為事此氣流行生生不息是吾之本心也義與心俱何以待集蓋忘助間之耳忘助人也勿忘勿助則義集人欲冺而天理流行矣程子謂勿忘勿助與鳶飛魚躍意同正謂是也答曽廓齋此理此心流行天地黙而識之隨處充足烟花林鳥異態同情俛仰之間萬物一體不言而喻若只恁地操持恐不免只是義襲工夫到底得聖門所為難耳同上不覩不聞即吾心本来中正之體無生無弗生無存無弗存茍有絲毫人力便是意必固我而生存之理息矣故君子戒謹恐懼常令惺惺便是生存之法答戚南山天以生物為心生生不息命之所以流行而不已也聚散隐顯莫非仁體性之所以與心俱生也循是出入是實有不得已而然者道之無内外無終始也直立天地貫始終内外而一之者人之所以為仁也毫髪與道不相入便是不仁便自不貫便屬滅息是故君子盡心知性知天存心養性事天皆所為以道仁身俟此命之流行也答唐一菴天命之中無不包貫此吾心本體也此心同此理同其為包貫亦無弗同流行神理豈有豐嗇厚薄哉惟其流行而既形焉於是二氣分五行判交錯不齊而理之神有不能盡然者矣非其本體之神有豐嗇厚薄也蓋隂陽五行適得其初則中中則心存心存則本體洞然而無所障蔽知微知彰知柔知剛其神固不改也隂陽稍偏皆屬障蔽偏隂知柔偏陽知剛其障淺薄者易化深長者難化及其化也淺薄者可盡而深長者雖功深力至欲其本體清明瑩然如初畢竟不能譬如濁水昏溷之極雖澄清之乆畢竟不如泉流初出山下之體也謂繋於所禀神理之數不齊雖得理氣合而不分然不免墮於理氣混而無别之弊與蔣道林心統鄙説正為發明性善本於天理其言偏仁偏義氣質等語縁只事指㸃病根之所從来蓋性統於心本来無病由有身乃有氣質有氣質乃有病有病乃有修是故格致誠正所以修身戒懼慎獨所以修道身修道立則静虛動直天理得而至善存矣非以氣質為惡性與性善待並出也同上静坐工夫正要天機流行若是把定無念即此是念窒塞天機竟添一障且如平旦好惡與人相近與見孺子入井有怵惕惻隐之心盡屬動處何曾把定無念蓋一隂一陽謂道繼善成性乃是天則合下是個聖人之資禀天地至中至和之氣以生性道流行止於至善何動何静只為吾人禀氣不免有偏勝去處旦晝紛紛客氣浮動念慮相仍盡屬軀殻間有良心透露去處也自混過旋復埋沒故程子静坐之説正欲和靖於静中透露天機庶幾指㸃下手工夫方有著落其説實自孟子夜氣四端發揮出来雖然天德不可强見須涵泳從容不著一物優而游之厭而飫之恍然而悟悠然而得方是實見此則所謂莫見莫顯人所不知而已獨知之者只此意流行不塞便是王道吾軰但得此意常在不令埋沒即就日用感應正處識取亦得不必拘拘專任静坐間耳與楊朋石古今天下人才不相上下辟如倉公之笥藥食品𩔖與今天下之毉之笥不甚相逺也而其生人殺人之功頓殊察脉診病主方用藥有當有不當耳居今之時治天下之事茍使盡當天下之才挽囬之勢當必有可觀未可遂謂今天下盡無人也與歐陽南野不肖妄意聖學嘗從諸賢之教作大公順應工夫日用應酬胷中頗覺定静乆乆從容校勘雖有一二偶合去處然以揆之聖賢之道以為便只如此則盡未也因而不能自信反求其故又三十餘年始悟心同形異知愚賢不肖之所自生以氣質有蔽之心只持無念便作大公順應此其所以終身由之而不可以底於道也答周都峰昔人謂安土敦仁天下一人而已蓋種種病痛都從自家軀殻上生試從天下一人上理㑹東西南北到處即家進退窮通何往非我如此省却多少魔障答趙雪屏来諭性無氣質知有聞見氣質不能累性良知必籍聞見而後致愚不敢以為然夫聞見者形氣之所感發也形氣不偏合下盡如聖人隨感而應此雖紛華波蕩之中猶自無聲無臭上天之載於是乎存而何聞見之與有若或氣質偏勝則感應失中此其軀殻物而不化之氣暗著心體所以往往自謂聲臭俱寂而不知其閉目静坐猶自墮落聞見學問思辨兀兀窮年終日終身只逐聞見上奔責良知之致又將焉藉哉竊見古来聖賢求仁集義戒懼慎獨格致誠正千言萬語除却變化氣質更無别勾當也復黄損齋易言直内方外通書言静虛動直皆兼舉互言畢竟是有内有外有動有静欲一之不能若固儱侗不分以為一則言静不必言動言内不必言外言動與外不必又言静與内致一之功要有不在區區分上求同而有無隐顯通一無二乃必有道矣心也者隂陽五行之中也有無隐顯一以貫之理也孰非心者氣質偏駁則感應失中内外動静不得其理而一之道病是故君子隨分致力直之方之虛之直之理得心存氣變質化無内外無動静純一不二而學之能事畢矣然則存省之㫖亦何病於致一哉世之學者不責支離之病於氣質而求一於虛直直方之間廼責支離於内外動静必求合於併於分以致一此其所以言愈神而道愈逺功愈密而幾愈離也與黄滄溪方今吾輩學問不可謂盡無豪傑之才真切之士出於其間只為學術欠明往往一出門来便以現成聖人認在身上却不去實反之身心極深研幾以求自得是以自謂物来順應而不知已離大公之體自謂感而遂通而不知非復天下之故所以中庸卒章既言學者立心為已而必繼之以知逺之近知風之自知微之顯可與入德意可識矣答謝顯近與一學者詩云直須對境無差錯方是山中善讀書仲木究竟此學有年方今嘗自視對境何如大學曰如保赤子心誠求之雖不中不逺矣今之為政者其當官未必盡不如古人要之其清其慎其勤縁只是做官曷嘗有保赤子之心在此所以雖極力繃把支持而卒不免於敝也答沈仲木詩曰民之所好好之民之所惡惡之此之謂民之父母只今吾子但有好惡念頭須從父母心中流出方是實學答趙敏行竊嘗以奕喻之羲畫八卦是棋盤定局文王八卦又説出一個行路車是直行馬是日行象是田行之𩔖周易六十四卦如對局下棋又説出一個棋勢變處是如此時要如此行是如彼時又要是如彼行雜卦𫝊却是發明周易卦變只是一個吉凶消長進退存亡之道是故六十四卦者三十二卦闔闢之謂也有吉有凶有消有長有進而存有退而亡是故剛柔憂樂與求見雜起止盈衰之𩔖種種不同而其為一闔一闢一往一来無非道之變動夫子觀時察變其於易也思過半矣答詹孟仁太極之極即下文陽極生隂隂極生陽之極極處便是生處此隂陽統㑹之中所謂天地之心不能不静之間是也故言易有太極陽為隂根隂為陽根一理流行生生不息是則動静無端隂陽無始故言太極本無極也答葉徳和種種計較利害得失之私都向氣質上生德性用事百般病痛都消是故知者不惑仁者不憂勇者不懼直則直讓則讓只有面前一個道理曷嘗有個直之不可讓之不可道理在昔日太王避狄何曽生著一個讓之不可之心世守勿去何須多著一個直之不可之心讓之不可直之不可畢竟是計較利害得失之私氣質所生也同上古人無入不自得境界元不是一切丢放度外只求一快活便了其曰素位而行千緒萬端物各付物不知有多少條理在反身循理莫非天則流行之實活潑潑地有絲毫人力不得而與焉者此之謂自得這個境界若不由戒懼慎獨格致誠正上得来恁他説何活潑潑地若丢放得下便是强自排遣同上天理良知本同宗㫖誠得原因著脚則千溪萬徑皆可入國徒徇意見不惟二先生之説不能相通古人千門萬户安所適從今即使子良知天理之外更立一方亦得然無用如此故但就中指㸃出一通融樞要只在變化氣質學問不從這上著脚恁説格致説戒懼説求仁集義與夫致良知體認天理要之只是虛弄精神工夫都無著落同上繋辭曰一隂一陽之謂道繼之者善也成之者性也天則也天則流行隂陽未有偏勝闔闢往来本自生生不息形聚質成軀殻氣生隂陽交駁志以氣行而天道或幾於息矣以故一旦軀殻既敝積隂不化之氣不可反升於天依草附木為鬼為祟頓令此身飄流散落弗獲歸根復命與草木同朽腐而已矣天之生物使之一本父母全而生之子全而歸之繼善成性不以生存不以死亡生生化化通乎死生晝夜而知者歸根復命之謂也雖謂之不死可也釋氏説法度人宗㫖不過以藴空之説為根本聲音之道為作用不落鬼道為法門今所傳心經字母其本教也而其為末法又不過窺見世俗積惡任氣死則物而不化鬰隂愴悽㳺魂如夢直以鐃鼓聲音散之是驅之速於滅亡而已豈有所為聖賢安身立命之道哉予昔為太僕時直宿𨽻告以夜中有鬼投石𨽻舎終夜不息𨽻舎之西為亭池空地直繞衙後予視之見有空房一直幽隂閴寂蓋人跡所不臨之地予問此何房有老𨽻密告以故予曰噫嘻積隂聚而不散以聲音散之當止乃令直夜敲撃帮鈴呌噪其中旬日之間鬼不復投石予豈嘗修齋念佛效法超度邪聲音散之已焉耳答祝介卿道心惟㣲上天之載無聲無臭也聲臭皆屬氣質為輕躁為怠忽粗率浮動百孔千瘡皆從此發危莫甚焉是故精者不粗之名一者不二之名不粗不二更無聲臭可言氣質變化而天載存矣執中之道也答葉徳㣲予年十八九時切慕聖賢之學日渉蹊徑旋開旋塞一日讀延平語録教人觀喜怒哀樂未發氣象予竊嘗試之積日累月稍覺氣質漸次清明問學漸次得力是故喜怒哀樂未發豈真㝠然無覺之謂也茍真㝠然無覺則戒慎恐懼孰其尸之白沙曰戒慎恐懼閑邪存其誠而已是故莫見乎隠莫顯乎微誠之不可掩也曲能有誠推而致之形著動變誠斯立焉至誠之德著於四方悠逺博厚髙明而一本之道備矣是故不知反觀不可與語於閑存不知閑存不可與語於戒懼此吾儒存省思誠之學與異端枯寂藴空毫釐千里之辨其曰喜怒哀樂未發前氣象非可觀者幾何其不流而為虛無之續也李静齋榮奬序一友曰日用應事只從心之安處便是良知又一友曰予往於心之不安處求而得之東廓曰良知者心之真知也天然自有之中也良知發於心之所安固也非其所安之正而發也者非心之真也發於心之所安固也非其所以不安之正而發也者非心之真也皆病也氣質誘之也是故戒懼慎獨之慎從真學者只常常戒慎不離無分寂感一以貫之此其為致良知而已矣東廓先生文集序廣信婁一齋先生受業康齋之門歸與其徒論學饒陽永豐潘夏二先生遊焉潘德夫方正嚴毅終日終身出入凖䋲規矩夏東巖則性度春和涵養純粹人以明道方之懐嘗謁先生於家先生飲之其姪貞獻新釀秫酒請為令先生時方督學山東笑語懐曰某此去不能為新竒酒令但循古套行酒期於浹洽不亦可乎先生兩楹對語有天人一處須由敬内外忘時始是仁之句先生指謂懐曰某平生問學只此二語是用功最得力處東巖文集序聖人之道在心心之道在天地天地之道見於隂陽隂陽之道著於易河圖之數易數也而天地聖人之道存焉是故易有太極太極者天地之心隂陽所始實無始也隂陽所終實無終也一理動静兩儀肇分一二三四五水火木金土生焉六七八九十水火木金土成焉生者為動為陽為天成者為静為隂為地動陽之陽一二為太陽陽之隂三四為少隂静隂之隂六七為太隂隂之陽八九為少陽中分二儀横列四象一變一合八卦相盪天太陽之隂一水生象乾太陽之隂二火生象兑少隂之陽三木生象離少隂之隂四金生象震地太隂之隂六水成象坤太隂之陽七火成象艮少陽之隂八木成象坎少陽之陽九金成象㢲天卦四地卦四一六同宗位北水二七同道位南火三八為朋在東木四九為友居西金陽極於五隂極於十如輪之在心如屋之在脊合之有中分之無迹兼綂四方有極無極土之所以成始成終太極之象也方其天道流行動而生陽一二三四陽動斯極太極生隂造化萬物陽變為感應隨隂合洪纎髙下各肖形色六七八九四隂一氣地道終事隂極陽至天根動萌精純粹美是故心生形成萬物咸備少陽木之性仁太陽金之性義少隂火之性禮太隂水之性智信兼四德五性是具心統性情道根天地乾道為性坤道為精是故仁之端惻𨼆寛裕温柔有容少陽木之應也義之端羞惡發强剛毅有執太陽金之應也禮之端恭敬齋荘中正有敬少隂火之應也智之端是非文理密察有别太隂水之應也剛柔之中隂陽合德兼統四端命曰人極人極者心也是故知覺運動不足以盡心隂陽有統剛柔有中三極一本原始要終心之則也是故禽獸蠢𩔖有知覺亦有運動生同大原成襲偏氣隂塞陽拘識心私已草木之無知識偏塞之極也人亦物也動静變合周流復始隂剥陽生虛含萬理此其形合神存靈通知𩔖也然陽竒隂耦天清地濁陽以隂成天從地作游氣因依互有純駁純者聖駁者愚心同形異是生等差故木多偏仁金多偏義火多偏禮水多偏智陽多偏剛隂多偏柔多微者偏多甚者惡五性感動弗由於則人心妄天理塞此其所以去禽獸蠢𩔖不逺也是故善學者恒求其端於天正心正此修身修此擇善擇此固執執此理得心存氣質變化行此四德徹上徹下無餘欠無假借天人同歸死生晝夜孟子言盡心知性知天存心養性事天修身立命至矣哉心統圖識侍郎何吉陽先生遷何遷字益之號吉陽德安人嘉靖辛丒進士除戸部主事歴官至南刑部侍郎萬厯甲戍卒年七十四先生從學於甘泉京師靈濟之㑹乆虛先生入倡同志復之先生之學以知止為要止者此心感應之幾其明不假思而其則不可亂非止則退藏不密藏不密則真幾不生天則不見此與江右主静歸寂之㫖大略相同湛門多講研幾而先生以止為幾更無走作也其疏通陽明之學謂舎言行而别求一心外功力而專任本體皆非王門種子亦中流之一壺也張鹵疏先生撫江右不滿人望惜哉吉陽論學語自釋氏出儒者襲之相率以虛為知而卒無以體物弊亦乆矣近代致知格物之學復明學者𩔖知求諸應感之幾以順性命而成化育於是天聰明之藴庶幾為天下利而空寂窠臼若將摧而易之由孟軻氏以来未有臻斯㫖者蓋孔門遺意也此義既明誦説漸廣世之學者乃或不能究其微而髙明之士又益過之承接依稀之見自信當下侈然以為流行而反之天則往往疎漏粗浮將使明明徳於天下之學又復一晦而彼空寂者流反將以其所獨至者掩之此豈致知格物本㫖哉予嘗遡而求之道有本末學有先後大學教人以知止為先而後定静安慮由之知止而後能定静安慮者致知以格物也定静安慮而後能得者格物而後知至也是故知止之義雖髙明之士有不能舍之以徑趨者甚哉聖人為學者慮至深逺也止者此心應感之機其明不假思而其則不可亂善而無善所謂至善也有所不止焉思以亂之非其本體也是故聖人亟指之而欲以其知及之信其本無不止之體而究其有所不止之由即感應之間察流行之主使所謂不思而明有則而不可亂者卓然見於澄汰廓清之餘而立於齋莊凝聚之地是則知止之義蓋致知格物者所必先而聖人之所為亟指也由是而定静安慮其為消融長裕雖甚敦篤精密思以效與能之才而不可廢然非知止抑孰從而竭之蓋不知止則其思不一其思不一則其主不藏其主不藏則其幾不生其幾不生則其則不見如是而曰定静安慮皆誣而已學焉而不得其㫖其流未有不至於漫焉以自誣者夫以梏亡反覆之體侈然於感應之間而欲責其當下流行之幾以充致知格物之量是索照於塵鑑而計溝澮之必江河也惡可得哉彼髙明之士茍能反身而絜比之亦可自悟矣贈滄守胡子序陽明之學要於心悟而取撰於致知將以探言行所本闢夫滯見聞而習度數者之非而究其知出於自然亦以信其所不息而擴其所必燭彼舎言行而别求一心與夫外功力而任本體皆非其㫖也嗣後一傳百訛師心即聖不假學力内馳見於元漠而外逃失於躬行後生不察遂謂言行不必根究而聖人之學不足逹於用由是繼之以畔夫良知曰致蓋必舉其靈晰圓神出於自然者恍然澄定於廓清凝聚之餘而日見其叅立於前而後養以長裕漸以銷融使其精㣲中庸皆將畢於竭才以幾渾合如是則所謂心悟者非百倍其功不可入而至於長裕銷融固未嘗忘所有事也此豈無假於學哉龍岡摘稿序理一而分殊知先後者其庶乎知止始條理也立主宰以統流行非遺外也先立乎其大者爾定静安慮終條理也流行中精此主宰非離根也致其用焉爾儱侗似理一防檢似分殊逺矣哉然則奈何曰由知止焉精之而已矣知者行之主行者知之用良知良能其體一也致知格物其功夫亦一也學者能使其明覺之幾歸於精實則知行一矣虛見非知也襲義非行也二之故也二之者離其體之謂也故立本以利其用君子務焉成已即能成物非推也傳有之有諸已而後求人無諸已而後非人奈何曰道有本末學有先後始也盡其性而物體焉所以道之也既也察諸物而性盡焉所以齊之也齊而不道謂之無本覇術是已道而不齊謂之遺末二氏是已有始有卒聖學其幾矣乎周一已之善仁歟贊一世之化知歟天地萬物有根竅焉往古来今有宗統焉君子中天下定四海仁知之事也乃所性則不與焉些子頭柄全其為人之道而已故人也者天地之靈也萬物之命也往古之藏来今之凖也知此謂之知學信此謂之信道學必有見見不以黙是神識也非性之明覺也學必有造造不以深是襲取也非性之真養也學必有措措不以時是力矯也非性之動以天也性者上天之載無聲無臭見而無見是為真知造而無造是為實詣措而無措是為當幾故習以學者不離乎節槩名義勲庸藝文之間而不得夫節槩名義勲庸藝文之迹此於其質不已化而趨於中乎居仁由義窮居即大行也視逹道何損焉成器而動大行即窮居也視求志何加焉夫學性情而已矣不怨不尤孔子所以學天也不遷不貳顔子所以學聖也性天命也𢎞之存乎人不慮而知其誰命之故不信天則學無從不竭人則道不致知天焉盡矣人我立達天所為也性其仁乎然立逹不先近無可取譬能此乃謂求仁遺已急人非天所為爾故求仁莫先反身退藏於密神智出焉惟洗心得之乃見天則天則無本末然其主不藏則其幾不生退藏其至乎洗心要矣造詣涵養皆自見始忘見而修以身至之日虛日新不見其止造詣極矣涵養奚俟焉即見為守不可語悟以是為涵養末矣生之謂性原無對待克伐怨欲之心即惻隐羞惡之心只從不慮出来則為性從軀殻上起則為妄顔子不絶妄念只妙悟此性性性生生則雖習心未浄自無住脚處如此乃能立本經綸知化育也務絶念并本来生機一齊滅熄遂使天地之化都無從發生安得為仁明儒學案卷三十八
