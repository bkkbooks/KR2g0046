body:
  text: 明儒學案卷五十八餘姚黃宗羲撰東林學案今天下之言東林者以其黨禍與國運始終小人既資為口實以為亡國由於東林稱之為兩黨即有知之者亦言東林非不為君子然不無過激且倚附者之不純為君子也終是東漢黨錮中人物嗟乎此䆿語也東林講學者不過數人已耳其為講院亦不過一郡之內已耳昔緒山二溪鼓動流俗江浙南畿所在設教可謂之標榜矣東林無是也京師首善之會主之者為南臯少墟兩先生於東林初無與也乃言國本者謂之東林爭科場者謂之東林攻逆閹者謂之東林以至言奪情奸相討賊凡一議之正一人之不隨流俗者無不槩謂之東林若是乎東林標榜遍於域中延於數世東林何不幸而有是也東林何幸而有是也然則東林豈真有名目哉亦小人者加之名目而已矣論者以東林為淸議所宗禍之招也子言之君子之道辟則坊與淸議者天下之坊也夫子之議臧氏之竊位議季氏之旅泰山獨非淸議乎淸議熄而後有美新之上言媚閹之紅本故小人之惡淸議猶黃河之礙砥柱也熹宗之時龜鼎將移其以血肉撐拒沒虞淵而取墜日者東林也甲申之變攀龍髯而蓐螻蟻者屬之東林乎屬之攻東林者乎數十年來勇者燔妻子弱者埋土室忠義之盛度越前代猶是東林之流風餘韵也一堂師友吟風熱血洗滌乾坤無智之徒竊竊然從而議之可悲也夫端文顧涇陽先生憲成忠憲高景逸先生攀龍御史錢啓新先生一本文介孫淇澳先生慎行主事顧涇凡先生允成太常史玉池先生孟麟職方劉靜之先生永澄學正薛元臺先生敷教侍郎葉園適先生茂才孝亷許靜餘先生世卿耿庭懷先生橘光祿劉本儒先生元珍忠端黃白安先生尊素貢士吳覲華先生桂森宗伯吳霞舟先生鍾巒文選華鳳超先生允誠中書陳幾亭先生龍正東林學案一端文顧涇陽先生憲成顧憲成字叔時别號涇陽先生常之無錫人父學四子先生次三其季允成也先生年十嵗讀韓文諱辨遂宛轉以避父名遇不可避者輒鬱然不樂父謂之曰昔韓咸安王命子勿諱忠吾名學汝諱學是忘學也年十五六從張原洛讀書原洛授書不拘傳注直據其所自得者為說先生聽之輒有會講論語至問禘章先生曰惜哉人缺却一問夫子不知禘之說何以知知其說之於天下乎講孟子至養心莫善於寡欲先生曰寡欲莫善於養心原洛曰舉子業不足以竟子之學盍問道於方山薛先生乎方山見之大喜授以考亭淵源録曰洙泗以下姚江以上萃於是矣萬厯丙子舉鄉試第一庚辰登進士第授户部主事時江陵當國先生與南樂魏允中漳浦劉廷蘭風期相許時稱為三解元上書吳縣言時政得失無所隱避江陵謂吳縣曰聞有三元會皆貴門生公知之乎吳縣以不知對江陵病百官為之齊醮同官署先生名先生聞之馳往削去壬午轉吏部尋告歸丙戍除驗封司主事明年大計京朝官左都御史辛自修剛方為婁江所忌工部尚書何起鳴在拾遺中或惎之曰公何不訐辛與之同罷相君且德公矣起鳴如其惎給事並論辛何辛何果同罷先生上疏分别君子小人刺及執政謫桂陽州判官柳子厚蘇子瞻莊定山曾謫桂陽先生以前賢過化之地扁所居曰愧軒戊子移理處州明年丁憂辛卯補泉州尋擢考功司主事三王並封詔下先生率四司爭之疏九不可得止癸巳內計大宰孫淸簡考功郎趙忠毅盡斥小人朝署為之一淸政府大恚忠毅降調外任先生言臣與南星同事南星被罪臣獨何辭以免不報轉稽勳司適鄒忠介請去婁江言文書房傳㫖放去先生曰不然若放去果是相國宜成皇上之是該部宜成相國之是若放去為非相國不宜成皇上之非該部不宜成相國之非婁江語塞自嚴嵩以來內閣合六部之權而攬之吏部至王國光楊巍指使若奴婢陸五臺始正統均之體孫淸簡守而不變婁江於是欲用羅萬化為冢宰先生不可卒用陳恭介婁江謂先生曰近有怪事知之乎先生曰何也曰內閣所是外論必以為非內閣所非外論必以為是先生曰外間亦有怪事婁江曰何也曰外論所是內閣必以為非外論所非內閣必以為是相與笑而罷升文選司郎中當是時推用君子多不得志婁江一切歸過於上先生乘婁江假沐之間悉推君子之久訕者奏輒得可婁江無以難也會推閣員婁江復欲用羅萬化先生又不可與太宰各疏所知七人無不合者太宰大喜上之七人者多不為時論所喜而召舊輔王山陰尤婁江之所不便也遂削先生籍戊戍始會吳中同志於二泉甲辰東林書院成大會四方之士一依白鹿洞規其他聞風而起者毗陵有經正堂金沙有志矩堂荆溪有明道書院虞山有文學書院皆捧珠盤請先生之蒞焉先生論學與世為體嘗言官輦轂念頭不在君父上官封疆念頭不在百姓上至於水間林下三三兩兩相與講求性命切磨德義念頭不在世道上即有他美君子不齒也故會中亦多裁量人物訾議國政亦冀執政者聞而藥之也天下君子以淸議歸於東林廟堂亦有畏忌四明亂政附四明者多為君子所彈射四明度不能留遂計挈歸德同去以政授之朱山陰山陰懦且老不為衆所憚於是小人謀召婁江以中旨下之而于東阿李晉江葉福淸亦同日拜焉晉江獨在京師得先入婁江方引故事疏辭先生為文二篇號夢語寐語譏切之江西參政姜士昌以慶賀入遂疏錫爵再居相位惼愎忌刻摧抑人才不宜復用語連廷機大抵推先生旨也東阿以拜官之日卒不與政福清素無根柢於舊相特為東林所期許得入戊申詔起先生南京光祿少卿乞致仕時考選命下新資臺諫附和東林者十八九益相與咀嚼婁江山陰晉江不得在位其黨斥逐殆盡而福淸遂獨秉政海內皇皇以起廢一事望之福淸度不能請請亦不力也未幾而淮撫之爭起淮撫者李三才以豪傑自許一時君子所屬望為冢宰總憲者也小人畏之特甚遂出竒計攻之先生故友淮撫會富平復起為太宰富平前與沈嘉禾爭丁右武計事分為兩黨先生移書勸之欲令灑濯嘉禾引與同心則依附者自解且宜擁衛淮撫勿墮壬人計富平不省而好事者遂録其書傳天下東林由是漸為怨府辛亥內計富平斥崑宣黨魁七人小人唁唁而起儀部丁長儒抗言七人宜斥救者非是儀部又先生之門人也壬子五月先生卒年六十三先生卒後福淸亦罷相德淸用事臺諫右東林者並出他傍附者皆以為法謫向之罪申王沈朱者不復口及而東林獨為天下大忌諱矣天啓初諸正人稍稍復位鄒忠介請録遺賢贈太常寺卿逆奄之亂小人作東林㸃將録天鑒録同志録以導之凡海內君子不語有無干涉一切指為東林黨人以御史石三畏言削奪先生崇禎二年贈吏部右侍郎諡曰端文先生深慮近世學者樂趨便易冒認自然故於不思不勉當下即是皆令查其源頭果是性命上透得來否勘其關頭果是境界上打得過否而於陽明無善無惡一語辨難不遺餘力以為壞天下教法自斯言始按陽明先生教言無善無惡心之體有善有惡意之動知善知惡是良知為善去惡是格物其所謂無善無惡者無善念惡念耳非為性無善無惡也有善有惡之意以念為意也知善知惡非意動於善惡從而分别之為知好善惡惡天命自然炯然不昧者知也即性也陽明於此加一良字正言性善也為善去惡所謂有不善未嘗不知知之未嘗復行也良知是本體天之道也格物是工夫人之道也蓋上二句淺言之下二句深言之心意知物只是一事今錯會陽明之立論將謂心之無善無惡是性由是而發之為有善惡之意由是而有分别其善惡之知由是而有為善去惡之格物層層自內而之外使善惡相為對待無善無惡一語不能自别於告子矣陽明每言至善是心之本體又曰至善只是盡乎天理之極而無一毫人欲之私又曰良知即天理其言天理二字不一而足乃復以性無善無不善自墮其說乎且既以無善無惡為性體則知善知惡之知流為粗幾陽明何以又言良知是未發之中乎是故心無善念無惡念而不昧善惡之知未嘗不在此至善也錢啓新曰無善無惡之說近時為顧叔時顧季時馮仲好明白排決已不至蔓延為害當時之議陽明者以此為大節目豈知與陽明絶無干涉嗚呼天泉證道龍溪之纍陽明多矣小心齊劄記程子每見人靜坐便歎其善學羅豫章教李延平於靜中看喜怒哀樂氣象至朱子又曰只理會得道理明透自然是靜不可去討靜坐三言皆有至理須參合之始得識仁說曰仁者渾然與物同體只此一語已盡何以又云義禮智信皆仁也及觀世之號為識仁者往往務為圓融活潑以外媚流俗而內濟其私甚而蔑棄亷耻決裂繩墨閃爍回互誑己誑人曾不省義禮智信為何物猶偃然自命曰仁然後知程子之意逺矣無可無不可是孔子小心處性即理也言不得認氣質之性為性也心即理也言不得認血肉之心為心也皆喫緊為人語或問致良知之說何如曰今之談良知者盈天下猶似在離合之間也盍徴諸孟子之言孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也竊惟仁義為性愛敬為情知愛知敬為才良知二字蓋通性情才而言之者也乃主良知者既曰吾所謂知是體而非用駁良知者又曰彼所謂知是用而非體恐不免各墮邊見矣曰有言良知即仁義禮智之智又有言分别為知良知亦是分别孰當曰似也而未盡也夫良知一也在惻隱為仁在羞惡為義在辭讓為禮在分别為智非可定以何德名之也只因知字與智字通故認知為用者既專以分别屬之認知為體者又專以智屬之恐亦不免各墮邊見矣性體也情用也曰知曰能才也體用之間也是故性無為而才有為情有專屬而才無專屬惟有為則仁義禮智一切慿其發揮有似乎用所以說者謂之用也惟無專屬則惻隱羞惡辭讓是非一切歸其統率有似乎體所以說者謂之體也陽明先生揭致知特㸃出一個良字又曰性無不善故知無不良其言殊有斟酌性太極也知有良知所謂乾元也能曰良能所謂坤元也不慮言易也不學言簡也故天人一也更不分别自昔聖賢論性曰帝衷曰民彜曰物則曰誠曰中和總總只是一個善告子却曰性無善無不善便是要將這善字打破自昔聖賢論學有從本領上說者總總是個求於心有從作用上說者總總是個求於氣告子却曰不得於言勿求於心不得於心勿求於氣便是要將這求字打破善字打破本體只是一個空求字打破工夫也只是一個空故曰告子禪宗也許行何如曰其並耕也所以齊天下之人將高卑上下一切掃去其不二價也所以齊天下之物將精粗美惡一切掃去總總成就一個空與告子一般意思但告子深許行淺許行空却外面的告子空却裏面的告子仁內義外之說非謂人但當用力於仁而不必求合於義亦非因孟子之辨而稍有變也正發明杞柳杯棬之意耳何也食色性也原未有所謂仁義猶杞柳原未有所謂杯棬也仁內也非外也義外也非內也各滯方所物而不通是故仁義成而性虧猶杯棬成而杞柳虧也始終只是一說食色性也當下即是更有何事若遇食而甘之遇色而悅之便未免落在情境一邊謂之仁不謂之性矣若於食而辨其孰為可甘於色而辨其孰為可悅便未免落在理路一邊謂之義不謂之性矣故曰動意則乖擬心則差告子之㫖蓋如此訟卦義有君子之訟有小人之訟君子之訟主於自訟九五是也小人之訟主於訟人餘五爻是也勿謂今人不如古人自立而已勿謂人心不如我心自盡而已董仲舒曰仲尼之門五尺童子羞稱五伯此意最見得好三千七十其間品格之殊至於倍蓰只一段心事個個光明提著權謀術數便覺忸怩自然不肯齒及他非故擯而絶之也性太極也諸子百家非不各有所得而皆陷於一偏只緣認陰陽五行為家當丙戍余晤孟我疆我疆問曰唐仁卿伯元何如人也余曰君子也我疆曰何以排王文成之甚余曰朱子以象山為告子文成以朱子為楊墨皆甚辭也何但仁卿已而過仁卿述之仁卿曰固也足下不見世之談良知者乎如鬼如蜮還得為文成諱否余曰大學言致知文成恐人認識為知便走入支離去故就中間㸃出一良字孟子言良知文成恐人將這個知作光景玩弄便走入元虛去故就上面㸃出一致字其意最為精密至於如鬼如蜮正良知之賊也奈何歸罪於良知獨其揭無善無惡四字為性宗愚不能釋然耳仁卿曰善早聞足下之言向者從祀一疏尚合有商量也無聲無臭吾儒之所謂空也無善無惡二氏之所謂空也名似而實逺矣是故諱言空者以似廢真混言空者以似亂真人須是一個真是非之心人皆有之只以不真之故便有夾帶是非太明怕有通不去合不來的時節所以須要含糊少間又於是中求非非中求是久之且以是為非以非為是無所不至矣異教好言父母未生前又好言天地未生前不如中庸只說個喜怒哀樂之未發更為親切於此體貼未生前都在其中矣一日遊觀音寺見男女載道余謂季時曰即此可以辨儒佛凡諸所以為此者一片禍福心耳未見有為禍福而求諸吾聖人者也佛氏何嘗邀之使來吾聖人何嘗拒之使去佛氏何嘗專言禍福吾聖人何嘗諱言禍福就中體勘其間必有一段真精神逈然不同處季時曰此特愚夫愚婦之所為耳有識者必不然曰感至於愚夫愚婦而後其為感也真應至於愚夫愚婦而後其為應也真真之為言也純乎天而人不與焉者也研究到此一絲莫遁矣知謂識其事之當然覺謂悟其理之所以然朱子生平極不喜人說個悟字蓋有懲於禪門耳到這裡又未嘗諱言悟也心活佛也而道心人心辨焉道心有主人心無主有主而活其活也天下之至神也無主而活其活也天下之至險也或問魯齊草廬之出仕何如曰在魯齊則可在草廬則不可曰得非以魯齊生於其地而草廬故國人嘗舉進士歟曰固是亦尚有說考魯齊臨終謂其子曰我生平為虛名所纍不能辭官死後慎勿請諡但書許某之墓四字令子孫識其處足矣此分明表所仕之非得已又分明認所仕為非愧恨之意溢於言表絶不一毫文飾也乃草廬居之不疑以為固然矣故魯齊所自以為不可者乃吾之所謂可而草廬所自以為可者乃吾之所謂不可自其心論之也唐仁卿痛疾心學之說豫曰墨子言仁而賊仁仁無罪也楊子言義而賊義義無罪也世儒言心而賊心心無罪也仁卿曰楊墨之於仁義只在跡上模擬其得其失人皆見之而今一切托之於心無形無影何處究詰二者之流害孰大孰小吾安得不惡言心乎豫曰只提出性字作主這心便有管束孔子自言從心所欲不踰矩矩即性也季時曰性字大矩字嚴尤見聖人用意之密仁卿曰然佛法至釋伽一變蓋迦葉以上有人倫釋迦棄人倫矣至達摩再變釋迦之教圓達摩之教主頓矣至五宗三變黃梅以前猶有含蓄以後機鋒百出傾囊倒篋不留一錢看矣此雲門所以無可奈何而有一拳打殺喂却狗子之說也或曰何為爾爾由他門必竟呈出個伎倆來便不免落窠臼任是千般播弄會須有盡孔孟之言看生死甚輕以生死為輕則情纍不干為能全其所以生所以死以生死為重則惟規規焉軀殼之知生為徒生死為徒死佛氏之謂生死事大正不知其所以大也人身之生死有形者也人心之生死無形者也衆人見有形之生死不見無形之生死故常以有形者為主聖賢見無形之生死不見有形之生死故常以無形者為主邇來講識仁說者多失其意仁者渾然與物同體義禮智信皆仁也此全提也今也於渾然與物同體則悉意舉揚於義禮智信皆仁也則草草放過識得仁體以誠敬存之而已不須防檢不須窮索此全提也今也於不須防檢不須窮索則悉意舉揚於誠敬存之則草草放過若是者非半提而何既於義禮智信放過即所謂渾然與物同體者亦只窺見儱統意思而已既於誠敬存之放過即所謂不須防檢窮索者亦只窺見脫灑意思而已是并其半而失之也康齊日録有曰君子常常喫虧方做得覽之惕然有省於是思之曰夫子之道忠恕而已矣忠恕之道喫虧而已矣顔子之道不校而已矣不校之道喫虧而已矣孟子之道自反而已矣自反之道喫虧而已矣朱子之釋格物其義甚精語物則本諸帝降之衷民秉之彜夫子之所謂性與天道子思之所謂天命孟子之所謂仁義程子之所謂天然自有之中張子之所謂萬物一原語格則約之以四言或考之事為之著或察之念慮之微或求之文事之中或索之講論之際蓋謂內外精粗無非是物不容妄有揀擇於其間又謂人之入門各各不同須如此收得盡耳議者獨執一草一木亦不可不理會兩言病其支離則過矣惟危惟微惟精惟一是從念慮事為上格無稽之言勿聽勿詢之謀勿庸是就文事講論上格即聖人亦不能外是四者朱子所云固徹上徹下語也不學不慮所謂性也說者以為由孩提之不學而能便可到聖人之不勉而中由孩提之不慮而知便可到聖人之不思而得此猶就聖人孩提分上說若就性上看聖人之不勉而中恰到得孩提之不學而能聖人之不思而得恰到得孩提之不慮而知耳雖然猶二之也原來只是一個沒些子界限故曰大人者不失其赤子之心者也耳目口鼻四肢人見以為落在形骸塊然而不神今曰性也有命焉是推到人生以上不容說處以見性之來脈極其元逺如此不得丢却源頭認形骸為塊然之物也仁義禮智天道人見以為來自於穆窈然而不測今曰命也有性焉是直反到愚夫愚婦可與知與能處以見命之落脈極其切近如此不得丢却見在認於穆為窈然之物也書言人心惟危道心惟微直是八字打開太極圖說言無極之真二五之精妙合而凝即人心道心又不是截然兩物也孟子之論性命備發其旨性也有命焉蓋就人心拈出道心以為舍無極沒處尋二五也命也有性焉蓋就道心攝入人心以為舍二五沒處討無極也所謂妙合而凝蓋如此道者綱常倫理是也所謂天叙有典天秩有禮根乎人心之自然而不容或巳者也有如佛氏之說行則凡忠臣孝子皆為報夙生之恩而來凡亂臣賊子皆為報夙生之怨而來反諸人心之自然而不容或已處吾見了不相干也於是綱常倫理且茫焉無所繫屬而道窮矣法者黜陟豫奪是也所謂天命有德天討有罪發乎人心之當然而不容或爽者也有如佛氏之說行則凡君子而被戮辱皆其自作之孽而戮辱之者非為傷善凡小人而被顯榮皆其自貽之體而顯榮之者非為庇惡揆諸人心之當然而不容或爽處吾見了不相䝉也於是黜陟豫奪且貿然無所憑依而法窮矣周子主靜蓋從無極來是究竟事程子喜人靜坐則初下手事也然而靜坐最難心有所在則滯無所在則浮李延平所謂看喜怒哀樂未發氣象正當有在無在之間就裡得個入處循循不已久之氣漸平心漸定獨居如是遇事如是接人如是即喜怒哀樂紛然突交於前亦復如是總總一個未發氣象渾無內外寂感之别下手處便是究竟處矣程叔子曰聖人本天釋氏本心季時謂添一語衆人本形史際明曰宋之道學在節義之中今之道學在節義之外豫曰宋之道學在功名富貴之外今之道學在功名富貴之中在節義之外則其據彌巧在功名富貴之中則其就彌下無惑乎學之為世詬也或問佛氏大意曰三藏十二部五千四百八十卷一言以蔽之曰無善無惡試閲七佛偈便自可見曰永嘉澄道歌謂棄有而著無如舍溺而投火恐佛氏未必以無為宗也曰只此就無善無惡四字翻弄到底非有别義也棄有以有為惡也著無以無為善也是猶有善有惡也無亦不著有亦不棄則無善無惡矣自此以往節節推去掃之又掃直掃得沒些子剩都是這個意思有駁良知之說者曰分别為知良知亦是分别余曰分别非知能分别者知也認分别為知何啻千里曰知是心之發竅處此竅一發作善由之作不善由之如何靠得他作主余曰知善知惡是曰良知假令善惡雜出分别何在曰所求者即是靈明能求者復是何物如以靈明求靈明是二之也余曰即本體為工夫何能非所即工夫為本體何所非能果若云云孔之言操心也孰為操之孟子之言存心也孰為存之俱不可得而解矣曰傳習録中一段云蘇秦張儀也窺見良知妙用但用之於不善耳陽明言良知即天理若二子窺見妙用一切邪思枉念都無棲泊處如之何用之於不善乎揆諸知善知惡之說亦自不免矛盾也余曰陽明看得良知無善無惡故如此說良知何病如此說良知未能無病陽明應自有見恨無從就正耳按儀秦一段係記者之誤故劉先生將此刪去問孟子道性善更不說性如何樣善只道乃若其情則可以為善矣乃所謂善也可見性中原無處著個善即今反觀善在何處曰我且問即今反觀性在何處曰處處是性從何拈出曰如此我且不問性在何處但問性與善是一是二曰是一非二曰如此却說恁著不著羅近溪以顔山農為聖人楊復所以羅近溪為聖人李卓吾以何心隱為聖人何心隱輩坐在利欲膠漆盆中所以能鼓動人者緣他一種聰明亦自有不可到處耿司農擇家僮四人每人授二百金令其生殖內一人從心隱問計心隱授以六字曰一分買一分賣又益以四字曰頓買零賣其人用之起家至數萬試思兩言至平易至巧妙以此處天下事而迎刃而解假令其心術正固是有用才也喫緊只在識性識得時不思不勉是率性思勉是修道識不得時不思不勉是妄思勉是助總與自性無干謂之善定是不思不勉謂之不思不勉尚未必便是善伍容菴曰心既無善知安得良其言自相悖朱子云佛學至禪學大壞只此一語五宗俱應下拜羲謂至棒喝而禪學又大壞余弱冠時好言禪久之意頗厭而不言又久之恥而不言至於今乃畏而不言羅近溪於此最深及見其子讀大慧語録輒呵之即管東溟亦曰吾於子弟並未曾與語及此吾儒以理為性釋氏以覺為性語理則無不同自人而禽獸而草木而瓦石一也雖欲二之而不可得也語覺則自有不同矣是故瓦石未嘗無覺然而定異乎草木之覺草木未嘗無覺然而定異乎禽獸之覺禽獸未嘗無覺然而定異乎人之覺雖欲一之而不可得也今將以無不同者為性乎以有不同者為性乎史際明曰天下有君子有小人君子在位其不能容小人宜也至於並常人而亦不能容焉彼且退而附於小人而君子窮矣小人在位其不能容君子宜也至於並常人而亦不能容焉彼且進而附於君子而小人窮矣羲謂常人附於君子亦君子之窮也常人未必真能為君子則小人並疑君子為常人而得以藉口矣此東林君子往往為依附者所纍也玉池問念菴先生謂知善知惡之知隨發隨泯當於其未發求之何如曰陽明之於良知有專言之者無知無不知是也有偏言之者知善知惡是也陽明生平之所最喫緊只是良知二字安得遺未發而言只緣就大學提宗並舉心意知物自不得不以心為本體既以心為本體自不得不以無善無惡屬心既以無善無惡屬心自不得不以知善知惡屬良知參互觀之原自明白念菴恐人執用而忘體因特為拈出未發近日王塘南先生又恐人離用而求體因曰知善知惡乃徹上徹下語不須頭上安頭此於良知並有發明而於陽明全提之㫖似均之契悟未盡也近世喜言無善無惡就而即其㫖則曰所謂無善非真無善也只是不著於善耳豫竊以為經言無方無體是恐著了方體也言無聲無臭是恐著了聲臭也言不識不知是恐著了識知也何者吾之心原是超出方體聲臭識知之外也至於善即是心之本色說恁著不著如明是目之本色還說得個不著於明否聰是耳之本色還說得個不著於聰否又如孝子還可說莫著於孝否如忠臣還可說莫著於忠否昔陽明遭寧藩之變日夕念其親不置門人問曰得無著相陽明曰此相如何不著斯言足以破之矣管東溟曰凡說之不正而久流於世者必其投小人之私心而又可以附於君子之大道者也愚竊謂無善無惡四字當之何者見以為心之本體原是無善無惡也合一便成一個空見以為無善無惡只是心之不著於有也究竟且成一個混空則一切解脫無復掛礙高明者入而悅之於是將有如所云以仁義為桎梏以禮法為土苴以日用為緣塵以操持為把捉以隨事省察為逐境以訟悔遷改為輪回以下學上達為落階級以砥節礪行獨立不懼為意氣用事者矣混則一切含糊無復揀擇圓融者便而趨之於是將有如所云以任情為率性以隨俗襲非為中庸以閹然媚世為萬物一體以枉尋直尺為捨其身濟天下以委曲遷就為無可無不可以猖狂無忌為不好名以臨難茍安為聖人無死地以頑鈍無恥為不動心者矣由前之說何善非惡由後之說何惡非善是故欲就而詰之彼其所占之地步甚高上之可以附君子之大道欲置而不問彼其所握之機緘甚活下之可以投小人之私心即孔門復作亦奈之何哉問本朝之學惟白沙陽明為透悟陽明不及見白沙而與其高弟張東所湛甘泉相往復白沙靜中養出端倪陽明居夷處困悟出良知良知似即端倪何以他日又闢其勿忘勿助曰陽明目空千古直是不數白沙故生平並無一語及之至勿忘勿助之闢乃是平地生波白沙曷嘗丢却有事只言勿忘勿助非惟白沙從來亦無此等呆議論也語本體只是性善二字語工夫只是小心二字商語丁長孺曰聖賢無討便宜的學問學者若跳不出安飽二字猶妄意插腳道中此討便宜的學問也博文是開拓工夫約禮是收斂工夫乾坤一闔一闢也坎離一虛一實也震艮一動一靜也兌㢲一見一伏也皆可作博約注疏王龍溪問佛氏實相幻相之說於陽明陽明曰有心俱是實無心俱是幻無心俱是實有心俱是幻龍溪曰有心俱是實無心俱是幻是本體上說工夫無心俱是實有心俱是幻是工夫上說本體又陽明曰不睹不聞是本體戒慎恐懼是功夫又曰戒慎恐懼是本體不睹不聞是功夫豫曰凡說本體容易落在無一邊陽明所云無心俱是幻景逸所云不做功夫的本體也今曰戒慎恐懼是本體即不睹不聞原非是無所云有心俱是實此矣凡說工夫容易落在有一邊陽明所云有心俱是幻景逸所云不識本體的工夫也今曰不睹不聞是功夫即戒慎恐懼原非是有所云無心俱是實此矣喜怒哀樂之未發謂之中是所空者喜怒哀樂也非善也上天之載無聲無臭是所空者聲臭也非善也夫善者內之不落喜怒哀樂外之不落聲臭本至實亦本至空也又欲從而空之將無架屋上之屋叠牀下之牀也金玉瓦礫之喻殊覺不倫夫善者指吾性之所本有而名之也惡者指吾性之所本無而名之也金玉瓦礫就兩物較之誠若判然若就眼上看金玉瓦礫均之為惡也非善也以其均之為眼之所本無也取所本無喻所本有非其類矣孟子曰乃若其情則可以為善矣乃所謂善也蓋因用以顯體也愚作一轉語曰乃所謂性則無不善矣乃所以善也蓋因體以知用也或謂性體虛明湛寂善不得而名之以善名性淺之乎其視性矣竊意善者萬德之總名虛明湛寂皆善之别名也名曰清虛湛一則得名曰善則不得十與二五有以異乎將無淺之乎其視善也孟子不特道情善且道形善所謂形色天性是也情之虛明湛寂不待言形則不免重滯矣由孟子言之都是虛明湛寂的何者以肉眼觀通身皆肉以道眼觀通身皆道也象山每與人言爾目自明爾耳自聰亦是此意陽明之無善無惡與告子之無善無惡不同然費個轉語便不自然假如有人於此揭兼愛為仁宗而曰我之兼愛與墨氏之兼愛也不同揭為我為義宗而曰我之為我與楊氏不同也人還肯之否古之言性者出於一今之言性者出於二出於一統乎太極而為言也出於二雜乎陰陽五行而為言也書曰惟皇上帝降衷於下民詩曰天生蒸民有物有則皆就陰陽五行中拈出主宰所謂太極也以其渾然不偏曰衷以其確然不易曰則試於此體味可謂之無善無惡乎可謂之有善有惡乎可謂之能為善亦能為惡乎是故以四端言性猶云是用非體即以四德言性猶云是條件非統體其善還在可疑可信之間惟知帝衷物則之為性不言善而其為善也昭昭矣形有方所是極實的物事易於凝滯要其所以為形本之天命之散而成用也其亦何嘗不虛也耳順則有方所者悉歸融化實而能虛不局於有矣心無方所是極虛的物事易於走作乃其所以為心本之天命之聚而成體也其亦何嘗不實也從心所欲不踰矩則無方所者悉歸調伏虛而能實不蕩於無矣鄧定宇秋遊記有天也不做他地也不做他聖人也不做他龍溪極賞之新本刪去此三語是此老百尺竿頭進步惟恐發人之狂預為掃蕩也高景逸曰果是透性之人即言收攝不曾加得些子若未透性即言自然不免加了自然底意思况借自然易流懶散借收攝可討入頭故聖賢立教必通上下照古今若以今日禪家的話頭去駁孔子語語是病不知聖賢所以至今無病者正在此也陽明之良知至矣暨其末流上者益上下者益下則非陽明本㫖也江右先達如羅念菴於此每有救正王南塘於此每有調停便俱受不透性之譏矣心之所以為心非血肉之謂也應有個根柢處性是已舍性言心其究也必且墮在情識之內粗而不精天之所以為天非窈冥之謂也應有個著落處性是已舍性言天其究也必且求諸當人之外虛而不實論學書陽明先生曰求諸心而得雖其言之非出於孔子者亦不敢以為非也求諸心而不得雖其言之出於孔子者亦不敢以為是也此兩言者某竊疑之夫人之一心渾然天理其是天下之真是也其非天下之真非也然而能全之者幾何惟聖人而已矣自此以下或偏或駁遂乃各是其是各非其非欲一一而得其真吾見其難也故此兩言者其為聖人設乎則聖人之心雖千百載而上下冥合符契可以考不謬俟不惑無有求之而不得者其為學者設乎則學者之去聖人逺矣其求之或得或不得宜也於此正應沈潛玩味虛衷以俟更為質諸先覺考諸古訓退而益加培養洗心宥密俾其渾然者果無愧於聖人如是而猶不得然後徐斷其是非未晚也茍不能然而徒以兩言橫於胸中得則是不得則非其勢必至自專自用憑恃聰明輕侮先聖注腳六經無復忌憚不亦誤乎陽明嘗曰心即理也某何敢非之然而言何容易孔子七十從心不踰矩始可以言心即理七十以前尚不知如何也顔子其心三月不違仁始可以言心即理三月以後尚不知如何也若漫曰心即理也吾問其心之得不得而已此乃無星之稱無寸之尺其於輕重長短幾何不顛倒而失措哉與李見羅心在人欲上便是放在天理上便是收天理本內也因而象之曰在內人欲本外也因而象之曰在外非有方所可求知此則知把柁之所在矣今曰著意收也恐收即成礙任其走作腔子裏何物把柁似只在方所上揣摩而不於理欲關頭討個分曉將來恰成一弄精魂漢乃放心非求放心也復唐大光南昌有朱以功布衣行修言道慥慥君子也足與章本清布衣頡頑後先暇中可物色之與孟白以功有朱布衣集多所發明向嘗見之今失其本容當訪問佛學三藏十二部五千四百八十卷一言以蔽之曰無善無惡第辨四字於告子易辨四字於佛氏難以告子之見性粗佛氏之見性微也辨四字於佛氏易辨四字於陽明難在佛自立空宗在吾儒則陰壞實教也夫自古聖人教人為善去惡而已為善為其固有也去惡去其本無也本體如是工夫如是其致一而已矣陽明豈不教人為善去惡然既曰無善無惡而又曰為善去惡學者執其上一語不得不忽其下一語也何者心之體無善無惡則凡所謂善與惡皆非吾之所固有矣皆非吾之所固有則皆情識之用事矣皆情識之用事皆不免為本體之障矣將擇何者而為之未也心之體無善無惡則凡所謂善與惡皆非吾之所得有矣皆非吾之所得有則皆感遇之應迹矣皆感遇之應迹則皆不足為本體之障矣將擇何者而去之猶未也心之體無善無惡吾亦無善無惡已耳若擇何者而為之便未免有善在若擇何者而去之便未免有惡在若有善有惡便非所謂無善無惡矣陽明曰四無之說為上根人立教四有之說為中根以下人立教是陽明且以無善無惡掃却為善去惡矣既已掃之猶欲留之縱曰為善去惡之功自初學至聖人究竟無盡彼直見以為是權教非實教也其誰肯聽既已拈出一個虛寂又恐人養成一個虛寂縱重重教戒重重屬咐彼直見以為是為衆人說非為吾輩說也又誰肯聽夫何故欣上而厭下樂易而苦難人情大抵然也投之以所欣而復困之以所厭畀之以所樂而復攖之以所苦必不行矣故曰惟其執上一語雖欲不忽下一語而不可得至於忽下一語其上一語雖欲不弊而不可得也羅念菴曰終日談本體不說工夫才拈工夫便以為外道使陽明復生亦當攢眉王塘南曰心意之物皆無善無惡使學者以虛見為實悟必依憑此語如服鴆毒未有不殺人者海內有號為超悟而竟以破戒負不諱之名正以中此毒而然也且夫四無之說主本體言也陽明方曰是接上根人法而識者至等之鴆毒四有之說主工夫言也陽明第曰是接中根以下人法而昧者遂等之外道然則陽明再生目擊茲弊將有摧心扼腕不能一日安者何但攢眉已乎同上當下繹當下者即當時也此是各人日用間現現成成一條大路但要知有個源頭在何也吾性合下具足所以當下即是合下以本體言通攝見在過去未來最為圓滿當下以對境言論現在不論過去未來最為的切究而言之所謂本體原非於對境之外另有一物而所謂過去未來要亦不離於見在也特具足者委是人人具足而即是者尚未必一一皆是耳是故認得合下明白乃能識得當下認得當下明白乃能完得合下此須細細參求未可率爾也平居無事不見有喜不見可嗔不見可疑不見可駭行則行住則住坐則坐卧則卧即衆人與聖人何異至遇富貴鮮不為之充詘矣遇貧賤鮮不為之隕穫矣遇造次鮮不為之擾亂矣遇顛沛鮮不為之屈撓矣然則富貴一關也貧賤一關也造次一關也顛沛一關也到此直令人肝腑具呈手足盡露有非聲音笑貌所能勉强支吾者故就源頭上看必其無終日之間違仁然後能於富貴貧賤造次顛沛處之如一就關頭上看必其能於富貴貧賤造次顛沛處之如一然後算得無終日之間違仁耳豫謂平居無事一切行住坐卧常人亦與聖人同大概言之耳究其所以却又不同蓋此等處在聖人都從一團天理中流出是為真心在常人則所謂日用而不知者也是為習心指當下之習心混當下之真心不免毫釐而千里矣昔李襄敏講學諸友兢辨良知發一問曰堯舜孔子豈不同為萬世之師今有人過堯舜之廟而不下車者則心便安過孔子之廟而不下車者則心便不安就下車孔廟而言指曰良知則分明是個良知就不下車堯舜廟而觀則安於堯舜廟者固是個習心而不安於孔廟者亦祗是個習心耳良知何在衆皆茫然無對忠憲高景逸先生攀龍高攀龍字存之别號景逸常州之無錫人萬厯己丑進士尋丁嗣父憂服闋授行人時四川僉事張世則上疏謂程朱之學不能誠意壞宋一代之風俗進所著大學古本初意欲施行天下一改章句之舊先生上疏駁之寢其進書婁江再入輔政驅除異已六十餘人以趙用賢望重示意鄭材楊應宿訐其絶婚去之先生劾錫爵聲音笑貌之間雖示開誠布公之意而精神心術之微不勝作好作惡之私謫揭陽添注典史半載而歸遂與顧涇陽復東林書院講學其中每月三日逺近集者數百人以為紀綱世界全要是非明白小人聞而惡之廟堂之上行一正事發一正論俱目之為東林黨人天啓改元先生在林下已二十八年起為光祿寺丞升少卿署寺事孫宗伯明春秋之義劾舊輔方從哲先生會議持之益力轉太常大理晉太僕卿乞差還里甲子即家起刑部侍郎逆奄魏忠賢亂政先生謂同志曰今日之事未能用倒倉之法惟有上下和衷少殺其毒耳其論與先忠端公相合總憲缺先忠端公上速推憲臣慎簡名賢疏意在先生也升左都御史糾大貪御史崔呈秀依律遣戍亡何逆奄與魏廣微合謀借會推晉撫一事盡空朝署先生遂歸明年三朝要典成坐移宫一案削籍為民毁其東林書院丙寅又以東林邪黨逮先生及忠端公七人緹帥將至先生夜半書遺疏自沈止水三月十七也年六十有五疏云臣雖削奪舊係大臣大臣受辱則辱國故北向叩頭從屈平之遺則君恩未報結願來生崇禎初逆奄呈秀伏誅贈太子少保兵部尚書賜祭葬蔭子諡忠憲其自序為學之次第云吾年二十有五聞令公李元冲名復陽與顧涇陽先生講學始志於學以為聖人所以為聖人者必有做處未知其方看大學或問見朱子說入道之要莫如敬故專用力於肅恭收斂持心方寸間但覺氣鬱身拘大不自在及放下又散漫如故無可奈何久之忽思程子謂心要在腔子裏不知腔子何所指果在方寸間否耶覓注釋不得忽於小學中見其解曰腔子猶言身子耳大喜以為心不專在方寸渾身是心也頓自輕鬆快活適江右羅止菴名懋忠來講李見羅修身為本之學正合於余所持循者益大喜不疑是時只作知本工夫使身心相得言動無謬己丑第後益覺此意津津憂中讀禮讀易壬辰謁選平生恥心最重筮仕自盟曰吾於道未有所見但依吾獨知而行是非好惡無所為而發者天啓之矣驗之頗近於此略見本心妄自擔負期於見義必為冬至朝天宫習儀僧房靜坐自見本體忽思間邪存誠句覺得當下無邪渾然是誠更不須覓誠一時快然如脫纒縛癸巳以言事謫官頗不為念歸嘗世態便多動心甲午秋赴揭陽自省胸中理欲交戰殊不寧帖在武林與陸古樵名粹明吳子往名志逺談論數日一日古樵忽問曰本體何如余言下茫然雖答曰無聲無臭實出口耳非由真見將過江頭是夜明月如洗坐六和塔畔江山明媚知己勸酬為最適意時然余忽忽不樂如有所束勉自鼓興而神不偕來夜闌别去余便登舟猛省曰今日風景如彼而余之情景如此何也窮自根究乃知於道全有未見身心總無受用遂大發憤曰此行不徹此事此生真負此身矣明日於舟中厚設蓐席嚴立規程以半日靜坐半日讀書靜坐中不帖處只將程朱所示法門參求於凡誠敬主靜觀喜怒哀樂未發默坐澄心體認天理等一一行之立坐食息念念不舍夜不解衣倦極而睡睡覺復坐於前諸法反覆更互心氣清澄時便有塞乎天地氣象第不能常在路二月幸無人事而山水清美主僕相依寂寂靜靜晚間命酒數行停舟青山徘徊碧澗時坐磐石溪聲鳥韵茂樹修篁種種悅心而心不著境過汀州陸行至一旅舍舍有小樓前對山後臨澗登樓甚樂偶見明道先生曰百官萬務兵革百萬之衆飲水曲肱樂在其中萬變俱在人其實無一事猛省曰原來如此實無一事也一念纒綿斬然遂絶忽如百斤擔子頓爾落地又如電光一閃透體通明遂與大化融合無際更無天人內外之隔至此見六合皆心腔子是其區宇方寸亦其本位神而明之總無方所可言也平日深鄙學者張皇說悟此時只看作平常自知從此方好下工夫耳乙未春自揭陽歸取釋老二家參之釋典與聖人所爭毫髮其精微處吾儒具有之總不出無極二字弊病處先儒具言之總不出無理二字觀二氏而益知聖道之高若無聖人之道便無生民之類即二氏亦飲食衣被其中而不覺也戊戍作水居為靜坐讀書計然自丙申後數年喪本生父母徙居婚嫁嵗無寧息只於動中煉習但覺氣質難變甲辰顧涇陽先生始作東林精舍大得朋友講習之功徐而驗之終不可無端居靜定之力蓋各人病痛不同大聖賢必有大精神其主靜只在尋常日用中學者神短氣浮更須數十年靜力方得厚聚深培而最受病處在自無小學之教浸染世俗故俗根難拔必埋頭讀書使義理浹洽變易其俗腸俗骨澄神默坐使塵妄消散堅凝其正心正氣乃可耳余以最劣之質即有豁然之見而缺此一大段工夫其何濟焉所幸呈露面目以來才一提䇿便是原物丙午方實信孟子性善之㫖此性無古無今無聖無凡天地人只是一個惟最上根潔清無蔽便能信人其次全在學力稍隔一塵頓遙萬里孟子所以示瞑眩之藥也丁未方實信程子鳶飛魚躍與必有事焉之㫖謂之性者色色天然非由人力鳶飛魚躍誰則使之勿忘勿助猶為學者戒勉若真機流行瀰漫布濩亘古亘今間不容息於何而忘於何而助所以必有事者如植穀然根苖花實雖其自然變化而裁培灌溉全在勉强學問茍漫說自然都無一事即不成變化亦無自然矣辛亥方實信大學知本之㫖壬子方實信中庸之㫖此道絶非名言可形程子名之曰天理陽明名之曰良知總不若中庸二字為盡中者停停當當庸者平平常常有一毫走作便不停當有一毫造作便非平常本體如是工夫如是天地聖人不能究竟况於吾人豈有涯際勤物敦倫謹言敏行兢兢業業斃而後已云爾此先生甲寅以前之功如此其後涵養愈粹工夫愈密到頭學力自云心如太虛本無生死劉先生謂先生心與道一盡其道而生盡其道而死是謂無生無死非佛氏所謂無生死也先生之學一本程朱故以格物為要但程朱之格物以心主乎一身理散在萬物存心窮理相須並進先生謂才知反求諸身是真能格物者也頗與楊中立所說反身而誠則天下之物無不在我為相近是與程朱之㫖異矣先生又曰人心明即是天理窮至無妄處方是理深有助乎陽明致良知之說而謂談良知者致知不在格物故虛靈之用多為情識而非天則之自然去至善逺矣吾輩格物格至善也以善為宗不以知為宗也夫善豈有形象亦非有一善從而知之知之推極處即至善也致良知正是止至善安得謂其相逺總之致知格物無先後之可言格物者申明致之一字格物即在致之中未有能致而不謂之格物者先生謂有不格物之致知則其所致者何事故必以外窮事物之理為格物則可言陽明之致知不在於格物若如先生言人心明即是天理則陽明之致知即是格物明矣先生之格物本無可議特欲自别於陽明反覺多所扞格耳語有物必有則則者至善也窮至事物之理窮至於至善處也格物是隨事精察物格是一以貫之人心之靈莫不有知良知也因其已知而益窮之至乎其極致良知也才知反求諸身是真能格物者也格物愈博則歸本愈約明則誠也窮理者格物也知本者格物也窮理一本而萬殊知本萬殊而一本學者以知至為悟不悟不足以為學故格物為要無工夫則為私欲牽引於外有工夫則為意念束縳於中故須物格知至誠正乃可言也朱子曰致知格物只是一事格物以理言也致知以心言也由此觀之可見物之格即知之至而心與理一矣今人說著物便以為外物不知不窮其理物是外物物窮其理理即是心故魏莊渠曰物格則無物矣學有無窮工夫心之一字乃大總括心有無窮工夫敬之一字乃大總括心無一事之為敬無適自然有主不假安排不知敬之即心而欲以敬存心不識心亦不識敬無妄之謂誠無適之謂敬有適皆妄也主一之謂敬無適之謂一人心如何能無適故須窮理識其本體所以明道曰學者須先識仁識得仁體以誠敬存之而已故居敬窮理只是一事朱子立主敬三法伊川整齊嚴肅上蔡常惺惺和靖其心收斂不容一物言敬者總不出此然常惺惺其心收斂一著意便不是蓋此心神明難犯手勢惟整齊嚴肅有妙存焉未嘗不惺惺未嘗不收斂內外卓然絶不犯手也人心放他自由不得心中無絲髮事此為立本理不明故心不靜心不靜而别為法以寄其心者皆害心者也人心戰戰兢兢故坦坦蕩蕩何也以心中無事也試想臨深淵履薄冰此時心中還著得一事否故如臨如履所以形容戰戰兢兢必有事焉之象實則形容坦坦蕩蕩澄然無事之象也真知天自是形體隔不得觀天地則知身心天包地外而天之氣透於地中地之氣皆天之氣心天也身地也天依地地依天天地自相依倚心依身身依心身心自相依倚心即精神不外馳即內凝有意凝之反梏之矣朱子曰滿腔子是惻隱之心是就人身上指出此理充塞處最為親切蓋天地之心充塞於人身者為惻隱之心人心充塞天地者即天地之心人身一小腔子天地即大腔子也孟子心之官則思思則虛靈不昧之謂思是心之睿於心為用著事之思又是思之用也一念反求此反求之心即道心也更求道心轉無交涉須知動心最可恥心至貴也物至賤也奈何貴為賤役何以謂心本仁仁者生生之謂天只是一個生故仁即天也天在人身為心故本心為仁其不仁者心蔽於私非其本然也人身內外皆天也一呼一吸與天相灌輸其死也特脫其闔闢之樞紐而已天未嘗動也理靜者理明欲淨胸中廓然無事而靜也氣靜者定久氣澄心氣交合而靜也理明則氣自靜氣靜理亦明兩者交資互益以理氣本無二故默坐澄心體認天理為延平門下至教也若徒以氣而已動即失之何益哉默坐澄心體認天理謂默坐之時此心澄然無事乃所謂天理也要於此時默識此體云爾非默坐澄心又别有天理當體認也朱子曰必因其已發而遂明之省察之法也吾則曰必因其未發而遂明之體認之法也其體明其用益明矣龜山曰天理即所謂命知命只事事循天理而已言命者惟此語最盡其實無一事不要惹事窮理者天理也天然自有之理人之所以為性天之所以為命也在易則為中正聖人卦卦拈出示人此處有毫釐之差便不是性學人心明即是天理既得後須放開蓋性體廣大有得者自能放開不然還只是守不是得蓋非有意放開也道性善者以無聲無臭為善之體陽明以無善無惡為心之體一以善即性也一以善為意也故曰有善有惡者意之動佛氏亦曰不思善不思惡以善為善事以惡為惡事也以善為意以善為事者不可曰明善龜山門下相傳靜坐中觀喜怒哀樂未發前作何氣象是靜中見性之法要之觀者即是未發者也觀不是思思則發矣此為初學者引而至之之善誘也佛氏最忌分别是非如何紀綱得世界紀綱世界只是非兩字亘古亘今塞天塞地只是一生機流行所謂易也大易教人息息造命臣弒其君子弒其父其所由來者漸也既已來矣寧可逃乎辨之於蚤如地中無此種子秧從何來繼之者善是萬物資始成之者性是各正性命元特為善之長耳元而亨亨而利利而貞貞而復元繼之者皆此善也利貞者性情也成這物方有這性故至利貞始言性情伊川說游魂為變曰既是變則存者亡堅者腐更無物也此殆不然只說得形質耳游魂如何滅得但其變化不可測識也聖人即天地也不可以存亡言自古忠臣義士何曾亡滅避佛氏之說而謂賢愚善惡同歸於盡非所以教也况幽明之事昭昭於耳目者終不可掩乎張子曰大易不言有無言有無諸子之陋也天地間感應二者循環無端所云定數莫逃者皆應也君子盡道其間者皆感也應是受命之事感是造命之事聖人祈天永命皆造命也我由命造命由我造但知委順而不知順道非知命者也人想到死去一物無有萬念自然撇脫然不知悟到性上一物無有萬念自無繫纍也一日克巳復禮無我也佛氏曰懸崖撒手近儒亦曰􅍆皆似之而實非何者以非聖人所謂復禮也或曰真為性命人被惡名埋沒一世更無出頭亦無分毫掛帶此是欲率天下入於無忌憚其流之弊弒父與君無所不至政事本於人才舍人才而言政者必無政財用本於政事舍政事而言財者必無財有問錢緒山曰陽明先生擇才始終得其用何術而能然緒山曰吾師用人不專取其才而先信其心其心可托其才自為我用世人喜用人之才而不察其心其才止足以自利其身已矣故無成功愚謂此言是用才之訣也然人之心地不明如何察得人心術人不患無才識進則才進不患無量見大則量大皆得之於學也劄記心無出入所持者志也道無聲臭體道者言行而已人心才覺便在腔子裡不可著意有憤便有樂不知手之舞之足之蹈之平日無憤無樂只是悠然天然一念現前能為萬變主宰此先立乎其大者當下即是此默識要法也然安知其當下果何如朱子曰提醒處即是天理更别無天理此方是真當下易之本體只是一生字工夫只是一懼字窮至無妄處方是理說類靜坐之法喚醒此心卓然常明志無所適而已志無所適精神自然凝復不待安排勿著方所勿思效驗初入靜者不知攝持之法惟體貼聖賢切要之言自有入處靜至三日必臻妙境靜坐之法不用一毫安排只平平常常默然靜去此平常二字不可容易看過即性體也以其清淨不容一物故謂之平常畫前之易如此人生而靜以上如此喜怒哀樂未發如此乃天理之自然須在人各各自體貼出方是自得靜中妄念强除不得真體既顯妄念自息昏氣亦强除不得妄念既淨昏氣自清只體認本性原來本色還他湛然而已大抵著一毫意不得著一毫見不得才添一念便失本色由靜而動亦只平平常常湛然動去靜時與動時一色動時與靜時一色所以一色者只是一個平常也故曰無動無靜學者不過借靜坐中認此無動無靜之體云爾靜中得力方是動中真得力動中得力方是靜中真得力所謂敬者此也所謂仁者此也所謂誠者此也是復性之道也靜坐說前靜坐說觀之猶未備也夫靜坐之法入門者藉以涵養初學者藉以入門彼夫初入之心妄念膠結何從而見平常之體乎平常則散漫去矣故必收斂身心以主於一一即平常之體也主則有意存焉此意亦非著意蓋心中無事之謂一著意則非一也不著意而謂之意者但從衣冠瞻視間整齊嚴肅則心自一漸久漸熟平常矣故主一者學之成始成終者也靜坐說後凡人之所謂心者念耳人心日夜繫縛在念上故本體不現一切放下令心與念離便可見性放之念亦念也如何得心與念離放退雜念只是一念所謂主一也習之久自當一旦豁然示學者古人何故最重名節只為自家本色原來冰清玉潔著不得些子汙穢才些子汙穢自家便不安此不安之心正是原來本色所謂道也同上為善必須明善善者性也性者人生而靜是也人生而靜時胸中何曾有一物來其營營擾擾者皆有知識以後日添出來非其本然也即是添來今宜減去減之又減以至於減無可減方始是性方始是善何者人心湛然無一物時乃是仁義禮智也為善者乃是仁義禮智之事也為善說今人所謂天以為蒼蒼在上者云耳不知九天而上九地而下自吾之皮毛骨髓以及六合內外皆天也然則吾動一善念而天必知之動一不善念而天必知之而天又非屑屑焉知其善而報之善知其不善而報之不善也凡感應者如形影然一善感而善應隨之一不善感而不善應隨之自感自應也夫曰自感自應何以為之天何以為天必知之也曰自感自應所以為天也所以為其物不二也若曰有感之者又有應之者是二之矣惟不二所以不爽也知天說昔朱子初年以人自有生即有知識念念遷革初無頃刻停息所謂未發者乃寂然之本體一日之間即萬起萬滅未嘗不寂然也蓋以性為未發心為巳發未發者即在常發中更無未發時也後乃知人心有寂有感不可偏以巳發為心中者心之所以為體寂然不動者也性也和者心之所以為用感而遂通者情也故章句云喜怒哀樂情也其未發則性也二語指出性情如指掌矣王文成復以性體萬古常發萬古常不發以鍾為喻謂未扣時原是驚天動地已扣時原自寂天寞地此與朱子初年之說相似而實不同蓋朱子初年以人之情識逐念流轉而無未發之時文成則以心之生機流行不息而無未發之時文成之說微矣而非中庸之㫖也中庸所謂未發指喜怒哀樂言夫人豈有終日喜怒哀樂者蓋未發之時為多而喜怒哀樂可言未發不可言不發文成所謂發而不發者以中而言中者天命之性天命不已豈有未發之時蓋萬古流行而太極本然之妙萬古常寂也可言不發不可言未發中庸正指喜怒哀樂未發時為天命本體而天命本體則常發而不發者也情之發性之用也不可見性之體故見之於未發未發一語實聖門指示見性之訣靜坐觀未發氣象又程門指示初學者攝情歸性之訣而以為無未發時者失其義矣未發說聖人之學所以異於釋氏者只一性字聖人言性所以異於釋氏言性者只一理字理者天理也天理者天然自有之條理也故曰天叙天秩天命天討此處差不得針芒先聖後聖其揆一也明道見得天理精故曰傳燈録千七百人若有一人悟道者臨死須尋一尺布裹頭而死必不肯削髮闕服而終此與曾子易簀意同此理在拈花一脈之上非窮理到至極處不易言也心性說老氏氣也佛氏心也聖人之學乃所謂性學老氏之所謂心所謂性則氣而已佛氏之所謂性則心而已非氣心性有二其習異也性者天理也外此以為氣故氣為老氏之氣外此以為心故心為佛氏之心聖人氣則養其道義之氣心則存其仁義之心氣亦性心亦性也或者以二氏言虛無遂諱虛無非也虛之為實有之與無同義而異名至虛乃至實至無乃至有二氏之異非異於此也性形而上者也心與氣形而下者也老氏之氣極於不可名不可道佛氏之心極於不可思不可議皆形而上者也二氏之異又非異於道器也其端緒之異天理而已氣心性說伊川曰在物為理處物為義此二語關涉不小了此即聖人艮止心法胡廬山以為心即理也舍心而求諸物遺內而循外舍本而逐末也嗚呼天下豈有心外之物哉當其寂也心為在物之理義之藏於無朕也當其感也心為處物之義理之呈於各當也心為在物之理故萬象森羅心皆與物為體心為處物之義故一靈變化物皆與心為用體用一源不可得而二也物顯乎心心妙乎物妙物之心無物於心無物於心而後能物物故君子不從心以為理但循物而為義不從心為理者公也循物為義者順也故曰廓然大公物來順應故曰聖人之喜怒在物不在已八元當舉當舉之理在八元當舉而舉之義也四凶當罪當罪之理在四凶當罪而罪之義也此之謂因物付物此之謂艮背行庭內外兩忘澄然無事也彼徒知昭昭靈靈者為心而外天下之物是心為無矩之心以應天下之物師心自用而已與聖賢作用處天地懸隔理義說張子曰形而後有氣質之性天地間性有萬殊者形而已矣以人物言之人形直而靈獸形橫而蠢以人言之形清而靈形濁而蠢故史傳所載商臣伯石之類皆形也形異而氣亦異氣異而性亦異非性異也弗虛弗靈性弗著也夫子曰性相近也習染未深之時未始不可為善故曰相近然而質美者習於善易習於惡難質惡者習於惡易習於善難上智下愚則氣質美惡之極有必不肯習於善必不肯習於惡也故有形以後皆氣質之性也天地之性非學不復故曰學以變化氣質為主或疑天地之性氣質之性不可分性為二者非也論性於成形之後猶論水於淨垢器中道著性字只是此性道著水字只是此水豈有二耶或又疑性是性氣質是氣質不可混而一之者亦非也天地之道為物不二故性即是氣氣即成質惡人之性如垢器盛水清者已垢垢者亦水也明乎氣質之性而後知天下有自幼不善者氣質而非性也故曰氣質之性君子有弗性者焉氣質說凡了悟者皆乾也修持者皆坤也人從迷中忽覺其非此屬乾知一覺之後尊道而行此屬坤能皆乾坤之倪而非其體乍悟復迷乍作復止未足據也必至用力之久一旦豁然如大畜之上九畜極而通曰何天之衢乃如是乎心境都忘宇宙始闢方是乾知知之既真故守之必力細行克矜小物克謹視聽言動防如關津鎮如山嶽方是坤能譬之於穀乾者陽發生耳根苖花實皆坤也蓋乾知其始坤成其終無坤不成物也故學者了悟在片時修持在畢世若曰悟矣一切冒嫌疑毁藩籬曰吾道甚大奈何為此拘拘者則有生無成苖不秀秀不實惜哉乾坤說真放下乃真操存真操存乃真放下心存誠敬至於死生不動更有何物不放下耶若謂心存誠敬胸中有誠敬則拳拳服膺胸中有一善乎本體本無可拈聖人姑拈一善字工夫極有多方聖人為拈一敬字鄒顧請益辨大學致知在格物物格而后知至陽明曰所謂致知格物者致吾心之良知於事事物物也致吾心良知之天理於事事物物則事物各得其理矣事物各得其理格物也是格物在致知知而後格物也又曰物事也格正也但意念所在即要去其不正以全其正又曰格物者格其心之不正以歸於正是格物在正心誠意意誠心正而後格物也陽明辨凡人之學謂之曰務外遺內謂之曰玩物喪志者以其不反而求諸理也求諸理又豈有內外之可言哉在心之理在物之理一也天下無性外之物無心外之理猶之器受日光在彼在此日則一也不得析之而為二豈待合之而始一也同上論學書平昔自認以此心惺然常明者為道心惟知學者有之蚩蚩之氓無有也即其平旦幾希因物感觸倐明倐晦如金在礦但可謂之礦不可謂之金如水凝冰但可謂之冰不可謂之水而先生乃曰僮僕之服役中節者皆道心也初甚疑之已而體認忽覺平日所謂惺然常明之心乃是把捉之意而蚩蚩之民有如鳶飛魚躍出於任天之便者反有合於不識不知之帝則特彼日用不知耳然則無覺非也有意亦非也必以良心之自然者為真稍涉安排即非本色矣與許敬菴佛氏所謂善念中善事也與聖人言善絶不相干韓子曰彼以煦煦為仁孑孑為義其小之也固宜如佛氏所謂善其無之也亦宜答顧涇陽格物之功非一其要歸於知本知修身為本而本之天下無餘事矣蓋格來格去知得世間總無身外之理總無修外之工正其本萬事理更不向外著一念如此自然純乎天理而無一毫人欲之私豈不是止至善也程朱錯認此謂知本是闕文而謂格致别有傳遂令修身為本二節無歸著後世知得此謂知本是原文而謂格物只格本末又令格物致知之工無下手假令一無知識之人不使讀書講論如朱子四格法而專令格本末其有入乎同上諸老之中塘南可謂洞徹心境者矣然以愚見窺之尚有未究竟在何則聖人之學上下一貫故其表裏精粗無不兼到舉要而言循理而已循理便無事即無思無為之謂也今徒曰無思無為得手者自不至遺棄事物然已啓遺棄事物之弊矣如曰止於至善有何名相倚著之可言至矣極矣今必曰無善無惡又須下轉語曰無善無惡乃所以為至善也明者自可會通然而以之明心性者十之一以之滅行檢者十之九矣無思無為者即無善無惡之謂也未離知解則未離門户未離門户則未離倚著倚著易知而無倚著之倚著難知也故曰尚有未究竟在聖人之道至易至簡無可名言故曰豫欲無言惟其無可言故其可言者人倫日用之常而已所以愈淺而愈深愈卑而愈高愈顯而愈微然而如之何而可使人見本體也曰此在人之信而非可以無思無為無善無惡轉令人走向别處去也如易曰乾元亨利貞如言人仁義禮智之謂也停停當當本體如是而已信得及者别無一事日用常行人倫事物無令少有汙壞而已此所以為至易至簡也同上善即生生之易也有善而後有性學者不明善故不知性也夫善洋洋乎盈眸而是矣不明此則耳目心志一無著落處其所學者僞而已矣然其機竅在於心人心反復入身來故能向上尋去下學而上達也答馮少墟方寸即宇宙也世人漫視為方寸耳顧非窮究到名言不立之地為名言而已非存養於思慮未發之先為思慮而已名言思慮為憧憧之方寸而已答劉念臺理者心也窮之者亦心也但未窮之心不可為理未窮之理不可為心此處非窮參妙悟不可悟則物物有天然之則日用之間物還其則而已無與焉如是而已同上心一也黏於軀殼者為人心即為識發於義理者為道心即為覺非果有兩心然一轉則天地懸隔謂之覺矣猶以為形而下者乘於氣機也視聽持行皆物也其則乃性也佛氏以擎拳豎拂運水搬柴總是神通妙用蓋以縱橫豎直無非是性而毫釐之差則於則上辨之凡事稍不合則必有不安此見天然自有之中毫髮差池不得若觀佛氏於彜倫之際多所未安彼却不顧也同上敬者絶無之盡也有毫釐絲忽在便不是有敬字在亦不是同上存養此心純熟至精微純一之地則即心即性不必言合如其未也則如朱子曰虛靈知覺一而已矣而所以為知覺者不同不嫌於分剖也與錢啓新貨色二字落腳便成禽獸與揭陽先生自昔聖賢兢兢業業不敢縱口說一句大膽話今却不然天下人不敢說底話但是學問中人說以心性之虛見為名教罪人者多矣與管東溟某洗心待益但見本性本無常變變動他不得一切變幻皆銷歸於此候趙儕鶴師嘗妄意以為今日之學寧守先儒之說拘拘為尋行數墨而不敢談元說妙自陷於不知之妄作寧禀前哲之矩硜硜為鄉黨自好而不敢談圓說通自陷於無忌憚之中庸積之之久倘習心變革德性堅凝自當恍然知大道之果不離日用常行而步步蹈實地與對塔說相輪者逺矣答葉臺山學必須悟悟後方知痛癢耳知痛癢後直事事放過不得與羅匡湖戒懼慎獨不過一靈炯然不昧知是必行知非必去而已所以然者何也此件物事不著一毛惟是知是必行知非必去斬斬截截潔潔淨淨積習久之至於動念必正方是此件不然只是見得他光景不為我有試體行不慊心時還是此件否耶答耿庭懷不患本體不明只患工夫不密不患理一處不合惟患分殊處有差必做處十分酸澀得處方能十分通透復錢漸菴知危者便是道心同上人心一片太虛是廣運處此體一顯即顯無漸次可待徹此則為明心一㸃至善是真宰處此體愈窮愈微有層級可言徹此方為知性或曰至善是現成天則有何層級曰所謂層級就人見處言身到此處見到此處進一層又一層見到天然停停當當處方是天則此即窮理之謂也或曰虛到極處便見至善豈虛是虛善是善曰只看人入處何如從窮理入者即虛是理虛是知覺便是仁義禮智不從窮理入者即氣是虛仁義禮智只是虛靈知覺緣心性非一非二只在毫芒眇忽間故也同上某與李先生見羅稍異者以格物致知而知本以知本為物格知至耳至於主意則在知止工夫則在知本一也吾人日用何曾頃刻離著格物開眼便是開口便是動念便是善格物者時時知本善知本者時時格物格透一分則本地透一分止地透一分耳與徐匡嶽復元聖質也見在已是康齊等輩矣說者謂康齊不及白沙透悟蓋白沙於性地上窮研極究以臻一旦豁然康齊只是行誼潔修心境靜樂如享現成家當者然其日漸月摩私欲淨盡原與豁然者一般即敬軒亦不見作此樣工夫至其易簀之詩此心惟覺性天通原是此樣境界不可謂其不悟復元再肯進此一步大儒矣但恐其質妙行敦身心已定疊得去日用已灑落得去不信有此一步只有一試法須自知之有妄想否有倚靠否若有妄想即樂亦須假物如讀書亦假借也若有倚靠即敬亦是倚靠如以敬直內便不是直也論辛復元書辛全字復元家貧十七八才知讀即有志聖學三十不娶友人勸之始有室不赴試當事挽之廩於學宫崇禎時以薦舉入朝所著有樂天集養心録然其人胸中憒憒急欲自見劉先生曰辛復元儒而僞者也馬君謨禪而僞者也君謨衢州人林增志師之聖學全不靠靜但各人稟賦不同若精神短弱決要靜中培擁豐碩收拾來便是良知散漫去都成妄想答吳安節人生處順境好過却險處逆境難過却穩世味一些靠不著方見道味親切道味有些靠不著只是世味插和兩者推敲儘有進步若順境中一切混過矣同上接教言連日精神不暢此不可放過凡天理自然通暢和樂不通暢處皆私欲也當時刻喚醒不令放倒與吳子徴心體無有形體無有邊際無有內外無有出入停停當當直下直上不容絲毫人力但昏雜時略綽喚醒一醒即是本體昭然現前更不待認而後合待認而合則與道為二反成急迫躁擾矣靜中不可空持硬守必須涵泳聖賢之言使義理津津悅心方得天機流鬯此道既爾充塞形色即是天性但隨有所在一切整齊嚴肅許大乾坤樞紐在此總無餘事矣俱同上居平日取聖賢書循循而讀之內體諸身而合外應之事而順自不覺其篤信而深好之故自學庸語孟周程張朱諸書而外不敢泛有所讀確守師說亦不敢自立所見出而應世一秉其所信亦不敢有所委曲求濟於其間答史玉池為己之根未深怒於毁者必喜於譽却是平日所為好事不過欲人道得一個好於自己的性分都無干涉同上躬行君子聖人所謂未得者要形色純是天性聲為律身為度做到聖人亦無盡處所以為未得故不悟之修止是裝飾不修之悟止是見解二者皆聖人所謂文而已豈躬行之謂哉答蕭康侯某自甲午年赴謫所從萬山中磐石上露出本來面目修持十五年祗覺一毛尚在去年一化方知水窮山盡處耳雖然聖解一破立盡凡情萬疊難消古德牧之為牛某則奉之為君夫何為哉恭已正南面而已答瞿洞觀廊廟山林俱各有事在山林者一念不空即非真體有民社者一念不實亦非真空同上人生只有一個念頭最可畏全憑依他不得精察天理令這念頭只在兢業中行久之純熟此個念頭即是天理孔聖七十方到此地位吾輩何敢說大話也與丁子行足下契禪獨深而好觀程子遺書先入之言主張於內為力甚難倘於高明未合願姑舍之萬勿援釋合儒為孔門大罪孽今之陽崇儒而陰從釋借儒名以文釋行者大熾足下才高力强尤大可慮與其似是亂真則不若靜守禪宗答劉直州李先生獨揭止修之旨自頂至踵皆為實地頭無動無靜皆為實工夫其意微矣其功大矣善學者得之則凡聖賢之言皆見下落如五味之相濟而不相為病不善學者舉一廢百亦有不覺其相為抵牿者何也聖人之言寬而不迫雖至於千變萬化而道則一也李先生提綱挈領之教說近於執執則迫矣故某以為既得其大本則宜益涵泳聖賢之言而寬以居之斯為不失李先生之意也與羅止菴談良知者致知不在格物故虛靈之用多為情識而非天則之自然去至善逺矣吾輩格物格至善也以善為宗不以知為宗也故致知在格物一語而儒禪判矣答汪儀寰陽明先生於朱子格物若未嘗涉其藩者其致良知乃明明德也然而不本於格物遂認明德為無善無惡故明德一也由格物而入者其學實其明也即心即性不由格物而入者其學虛其明也是心非性心性豈有二哉則所從入者有毫釐之辨也答方本菴體即是用用即是體雖不容分然用寂是體體發是用亦不容混一觀而用寂矣所謂觀未發者如是若徒觀其氣象何啻千里人能知用寂之體只於此立本乃真復也與吳覲華寂即是易發即是爻同上此事凝之甚難散之甚易道豈有聚散乎正欲凝此無聚散者故本體本無散工夫只是凝與周季純學問只要一絲不掛其體方真體既真用自裕到真用工夫時即工夫一切放下方是工夫同上身心之事當汲汲求之不可丢在無事甲中一切求閒好靜總是無事生事與卞子靜學問在知性而已知性者明善也孟子道性善而言必稱堯舜者何也性無象善無象稱堯舜者象性善也若曰如是如是言上會者淺象上會者深此象在心得其正時識取心得其正心中無事時也與陳似水於穆之真絶無聲無臭安得有富貴貧賤夷狄患難是刀鋸鼎鑊之所不能及安得有死生但在日用煉習純是此件即真無死生耳與孫淇澳都下近傳姑蘇詞林作六君子弔忠文想如丈教正實其說矣此何異公子無忌約賔客入秦軍乎杜門謝客正是此時道理彼欲殺時豈杜門所能逃然即死是盡道而死非立巖牆而死也大抵現前道理極平常不可著一分怕死意思以害世教不可著一分不怕死意思以害世事想丈於極痛憤時未之思也與劉念臺雜著默而識之曰悟循而體之曰修修之則􅉓倫日用也悟之則神化性命也聖人所以下學而上達與天地同流如此而已矣今之為悟者或攝心而乍見心境之開明或專氣而乍得氣機之宣暢以是為悟遂欲舉吾聖人明善誠身之教一掃而無之決隄防以自恣滅是非而安心謂可以了生死嗚呼其不至於率禽獸食人而人相食不止矣近思録序聖人言道未嘗諱言無也曰上天之載無聲無臭無聲無臭者不可言言人倫庶物而已天生蒸民有物有則故典曰天序禮曰天秩命曰天命討曰天討是之謂天則聖人之學物還其則而我無與焉萬變在人實無一事無之極也是故言天下之至賾而不可惡也言天下之至動而不可亂也彼外善以為性故物曰外物窮事物之理曰徇外直欲一掃而無之不知心有未盡不可得而無也理有未窮心不可得而盡也今以私欲未淨之心遽遣之使無其勢必有所不能則不得不别為攝心之法外人倫庶物而用其心至於倫物之間知之不明處之不當居之不安將紛擾滋甚而欲其無也愈不可得矣是故以理為主順而因之而不有者吾之所謂無也以理為障逆而掃之而不有者彼之所謂無也許敬菴語要序陽明先生所謂善非性善之善也何也彼所謂有善有惡者意之動則是以善屬之意也其所謂善第曰善念云爾所謂無善第曰無念云爾吾以善為性彼以善為念也吾以善自人生而靜以上彼以善自吾性感動而後也故曰非吾所謂性善之善也吾所謂善元也萬物之所資始而􅓵生也烏得而無之故無善之說不足以亂性而足以亂教善一而已矣一之而一元萬之而萬行萬物不二者也天下無無念之心患其不一於善耳一於善即性也今不念於善而念於無無亦念也若曰患其著焉著於善著於無一著也著善則拘著無則蕩拘與蕩之患倍蓰無算故聖人之教必使人格物物格而善明則有善而無著今懼其著至夷善於惡而無之人遂將視善如惡而去之大亂之道也故曰是以亂教古之聖賢曰止善曰明善曰擇善曰積善蓋懇懇焉今以無之一字掃而空之非不教為善也既無之矣又使為之是無食而使食也方本菴性善繹序至日閉關關心關也其紛念為商旅其真宰為后商旅不行則內固后而省方則外馳闔乾坤之門而為關斯為闢乾坤之户而為盛德大業三百八十四畫一畫綰之㸃朱吟序諸賢之登斯堂也有不雍雍肅肅者乎此雍雍肅肅之時有喜乎有怒乎有哀樂乎抑有思慮乎無有也所謂未發也善之體也一反觀而明矣此反觀者何物也心也明德也性寂而靜心能觀之情發而動心能即之此心之所以統乎性性而明德之所以體用乎至善也格致之法也桐川會續記序姚江之弊始也掃聞見以明心耳究而任心而廢學於是乎詩書禮樂輕而士鮮實悟始也掃善惡以空念耳究且任空而廢行於是乎名節忠義輕而士鮮實修崇文會語序論語二十篇不言心第兩言之曰其心三月不違仁曰從心所欲不踰矩是則固有違仁踰矩之心矣自致良知之宗揭學者遂認知為性一切隨知流轉張皇恍忽其以恣情任欲亦附於作用變化之妙而迷復久矣尊聞録序耳目手足者形也視聽持行者色也聰明恭重者性也本來如是復還其如是之謂工夫也修而不悟者循末而迷本悟而不徹者認物以為則不知欲修者正須求之本體欲悟者正須求之工夫無本體無工夫無工夫無本體也馮少墟集序感應所以為鬼神非有鬼神以司感應聖人以天理如是一循其自然之理所以為義佛氏以因果如是懾人以果報之說所以為利感應篇序今人欽欽焉目明耳聰手恭足重心空空而無適於斯時也徹內外非天乎天非性乎性非善乎以其為人之本色無纎毫缺缺無纎毫汙染而謂之善也循是而動不違其則之為道故學莫難於見其本色見本色斯見性矣程子以學者須先識仁而謂不須防檢不須窮索夫學豈可廢防檢窮索欲人識防檢窮索之非本色辨其非本色者即知其本色知其本色則防檢窮索皆本色也曹真宇集序學欲其得之心而已無所得諸其心則物也者物也有所得諸其心則物也者知也物自為物故物不關於性物融為知則性不纍於物如此而已矣敦訓韵律序古之至人以變易成其不易以不易貞其變易夫人自少壯而老身體髮膚日遷日謝變易矣而心不易也夫人之心思營為萬起萬滅變易矣而性不易也吾萬起萬滅者注之於是而不二焉是為以變易成其不易久之而熟道義成性向之萬起萬滅者轉而為萬變萬化之妙是為以不易貞其變易夫人之夢也其遊魂能視能聽能言能動無質無體與有質有體者不異然遊魂為變變而不可知者以其昧而不靈至成性而遊魂始靈故大人通晝夜而知守其不易也王應峯壽序人之率然而動皆欲也惕然而慮皆理也欲動而慮止則得失之分而安危存亡治亂之機也慮得集序太極者理之極至處也其在人心湛然無欲即其體也先儒云心即太極此語須善會無欲之心乃真心真心斯太極矣若但見其無形無方無際而已是見也有所見便是妄書悟易篇凡人而可至於聖人者只在慎獨獨者本然之天明也人所不知而已所獨知也是即知其為是非即知其為非非由思而得非由慮而知即此是天即此是地即此是鬼神無我無人無今無古總是這個知得這個可畏即便是敬不欺瞞這個即便是誠一一依這本色即便是明書扇覺者心也敬者身也今人四體不端見君子而後肅焉端焉所以不安者非由見君子而然其性然也見君子而性斯顯耳故心覺而身敬者坤承乾也乾坤合德則形性渾融久而熟凡而聖矣同上陸古樵曰只要立大本一日有一日之力一月有一月之力務要靜有定力令我制事毋使事制我此下皆三時記潮陸粹明號古樵廣東新會人從陽蕭自麓學以主靜為宗余深喜其言聞其謂子徴曰靜後覺真氣從丹田隱隱而生余又懼其誤認主靜之㫖也明月臨江不能飲酒亦覺幽藴內攻不暢諸外篷窗隱坐深自克省知前功之不切手勢一轉李見羅書云果明宗果知本真有心意知物各止其所而格致誠正總付之無所事事的光景矣又曰格致誠正不過就其中缺漏處照管提撕使之常止常止則身常修心常正意常誠知常致而物自格矣余則以大學格致即中庸明善所以使學者辨志定業絶利一源分剖為巳為人之介精研義理是非之極透頂徹底窮穴搗巢要使此心光明洞達直截痛快無毫髮含糊疑似於隱微之地以為自欺之主夫然後為善而更無不為之意拒之於前不為惡而更無欲為之意引之於後意誠心正身修善之所以純粹而精止之所以敦厚而固也不然非不欲止欲修而氣稟物欲拘蔽萬端恐有不能實用其力者矣且修身為本聖訓昭然千古誰不知之只緣知誘物化不能反躬非欲能纍人知之不至也何以旦晝必無穿窬之念夜必無穿窬之夢知之切至也故學者辨義利是非之極必皆如無穿窬之心斯為知至此工夫喫緊沈著豈可平鋪放在說得都無氣力且條目次第雖非今日致明日誠然著個先後字亦有意義不宜如此儱侗此不過先儒舊說見羅則自謂孔曾的傳恐決不入也余觀文成之學蓋有所從得其初從鐵柱宫道士得養生之說又聞地藏洞異人言周濓溪程明道是儒家兩個好秀才及婁一齊與言格物之學求之不得其說乃因一草一木之說格及官舍之竹而致病旋即棄去則其格致之㫖未嘗求之而於先儒之言亦未嘗得其言之意也後歸陽明洞習靜導引自謂有前知之異其心已靜而明及謫龍場萬里孤遊深山夷境靜專澄默功倍尋常故胸中益灑灑而一旦恍然有悟是其舊學之益精非於致知之有悟也特以文成不甘自處於二氏必欲篡位於儒宗故據其所得拍合致知又粧上格物極費工力所以左籠右罩顛倒重復定眼一覷破綻百出也後人不得文成之金針而欲强繡其鴛鴦其亦誤矣蕭自麓臨别謂曰公當潛養數年不可發露先輩皆背地用一陳堅苦工夫故得成就耳余深然之或曰至善自性體宋儒如何認作極功余曰公自認作極功朱子未嘗如此說門人問曰至善是各造其極然後為至否朱子曰至善是自然的道理如此說不得又曰至善是些子恰好處天理人心之極致也公且看人心若純乎天理而無一毫人欲之私此何等境界還算不得性體否曰一草一木皆要格如何余曰公看上下文否聖賢之言隨人抑揚人欲專求性情故推而廣之曰性情固切草木皆有理不可不察人欲泛觀物理則又曰致知當知至善所在若徒欲泛觀物理恐如大軍之遊騎出太逺而無所歸也一進一退道理森然何嘗教人去格草木曰今日格一物明日格一物如何曰自是問者疑一物格則萬物皆通故云雖顔子亦未至此惟今日而格明日又格積習多然後有貫通處耳此於道理何疑豈曾限定公一日只格得一物耶許敬菴先生之學以無欲為主自是逈别世儒不必以大學論離合也當時濓溪無欲之學大學未經表章反覺潔淨今日人人自為大學執此病彼氣象局促耳講義自有知識以來起心動念俱是人欲聖人之學全用逆法只從矩不從心所欲也立者立於此不惑者不惑於此步步順矩故步步逆欲到五十而知天命方是順境故六十而耳順矣七十而心順矣不踰矩章人生有身必有所處不處約便處樂不仁之人約也處不得樂也處不得此身無一處可著落也約者收斂之義樂者發舒之義不仁者愈約愈局更無過活處愈樂愈放更無收煞處約樂章所謂一不是只說一個心是說這個心到至一處譬之於金當其在礦時只可謂之礦不可謂之金故未一之心只可謂之心惟精之心方可謂之一一貫章人果能見得天理精明方見得人欲細微一動於欲便礙於理如兩造然遂內自訟一訟則天理常伸人欲消屈而過不形於外矣故曰見性始能見過見過斯能復性見過章忠信是天生人的原來本色聖賢好學不過是還他本色若不學便逐日澆散非是把忠信做個基本忠信之外又有甚學問也十室之邑章人生何處有一毫不停當何處有一毫不圓滿自家做得不停當覺得不圓滿皆是有生以後添出來勾當添出來念頭原初本色何曾有此但一直照他本色終日欽欽不迷失了故物便到聖人地位也只如此人之生也直章中即吾之身心是也庸即吾之日用是也身心何以為中只潔潔淨淨廓然大公便是身心不是中能廓然無物即身心是中也日用何以謂之庸只平平常常物來順應便是日用不是庸能順事無情即日用是庸也到這裡一絲不掛是個極至處上面更無去處也中庸其至章仁是生生之理充塞天地人身通體都是何曾有去來有內外自人生而靜以後誘物為欲遂認欲為心迷不知反耳若一念反求此反求者即仁也别尋個仁即誤矣曰如此不幾認心為性乎何以言心不違仁曰心性不是兩個程子謂人心反復入身來自能尋向上去下學而上達也心是形而下者仁是形而上者達則即心即仁不達則心只是心看人自得何如仁逺章孔門心法極難看不是懸空守這一個心只隨時隨處隨事隨物各當其則蓋心不是别物就是大化流行與萬物為體的若事物上差失就是這個差失學者不知本領只去事物上求却離了本知是本領要守住這個心又礙了物皆謂之不仁學如不及章生生之謂易無刻不生則無刻不易無刻不易則無刻不逝但不可得而見可見者無如川流此是人的性體自有生以來此個真體變做憧憧妄念一般流行運用不舍晝夜遂沈迷不反學者但猛自反觀此憧憧者在何處了不可得妄不可得即是真也緣真變妄故轉妄即真如掌反覆朱子欲學者時時省察不使毫髮間斷不是教人將省察念頭接續不間斷此真體原自不舍晝夜人間斷他不得但有轉變耳時時省察不令轉變久之而熟乃為成德也川上章今人錯認敬字謂才說敬便著在敬上了此正不是敬凡人心下膠膠擾擾只緣不敬若敬便豁然無事了豈有敬而著個敬在胸中為障礙之理修已以敬章除却聖人全知一徹俱徹以下便分兩路一者在人倫庶物實知實踐去一者在靈明知覺默識默成去此兩者之分孟子於夫子微見朕兆陸子於朱子遂成異同本朝文清文成便是兩樣宇內之學百年前是前一路百年來是後一路兩者遞傳之後各有所弊知及之章人只有這一㸃明察是異於禽獸處明察者何也乃知覺運動中之天則仁義禮智中之靈竅然這個明察人人具足知誘物化以後都變作私智小慧在世情俗見中全不向人倫庶物上來所以不著不察然一轉頭私智小慧又都作真明真察這一轉亦惟人能之禽獸不能也人之所以異於禽獸章孟子拈出情字才字證性之善然人之為不善必竟從何而來為即才也非才之罪是誰之罪歟曰不思之罪也思非今人泛然思慮之思是反觀也吾輩試自反觀此中空空洞洞不見一物即性體也告子便認作無善無不善不知此乃仁義禮智也何者當無感時故見其無及感物而動便有惻隱四者出來所謂乃若其情則可以為善隨順他天然本色應付而去是可以為善者乃才也若不思則人是蠢然一物信著耳目口鼻四肢逐物而去仁義禮智之才皆為耳目口鼻四肢之用才非性之才矣然則為不善豈才之罪乃若其情章心之所同然不是輕易說得的只看口之於味必須易牙之味天下方同耳之於聲必須師曠之音天下方同目之於色必須子都之姣天下方同不然畢竟有然有不然者說不得同視同聽同美也心之理義何以見得天下同然須是悅心者方是即如今人說一句話處一件事到十分妥當的方人人同然稍有不到便不盡同所以理必曰窮理義必曰精義不到至處喚不得理義不足以悅心不足以同於天下富嵗子弟章天地間渾然一氣而已張子所謂虛空即氣是也此是至虛至靈有條有理的以其至虛至靈在人即為心以其有條有理在人即為性澄之則清便為理淆之則濁便為欲理是存諸於中欲是梏亡於外如何能澄之使清一是天道自然之養夜氣是也一是人道當然之養操存是也牛山之木章氣之精靈為心心之充塞為氣非有二也心正則氣清氣清則心正亦非有二也養氣工夫在持志持其志便不梏於物是終日常息也息者止息也萬念營營一齊止息胸中不著絲毫是之謂息今人以呼吸為息謬矣同上放如流放竄殛之放必有個安置所在或在聲色或在名利才知得放便在這裡放心章會語凡事行不去時節自然有疑有疑要思其所以行不去者即是格物人要於身心不自在處究竟一個著落所謂困心衡慮也若於此蹉過便是困而不學聖學正脈只以窮理為先不窮理便有破綻譬如一張棹子須要四隅皆見不然一隅有汙穢不知也又如一間屋一角不照即躲藏一賊不知也問靜中何以格物曰格物不是尋一個物來格但看身心安妥稍不安妥格其因甚不安妥是也問既安妥如何曰體認此安妥亦格物也學問先要知性性上不容一物無欲便是性無為其所不為是孟子道性善處性中原無物因其所本無故不為不欲若只在不為不欲上求吾人終日除不為不欲之時須有空缺此空缺時作何工夫問言性則故而已矣之故曰故者所謂原來頭也只看赤子他只是原來本色何嘗有許多造作心氣分别譬如日廣照者是氣凝聚者是心明便是性學者於理氣心性須要分析明白延平默坐澄心便明心氣體認天理便明理性問近覺坐行語默皆瞞不得自家曰此是得力處心靈到身上來了但時時默識而存之天只是天一落人身故喚做命命字即天字也易言利用出入民咸用之謂之神吾輩一語一默一作一息何等神妙凡民不知胡亂把這神都做壞了學者便須時時照管胸中無事則真氣充溢於中而諸邪不能入整菴云氣聚有聚之理氣散有散之理氣散氣聚而理在其中先生曰以本原論之理無聚散氣亦無聚散如人身為一物物便有壞只在萬殊上論本上如何有聚散氣與理只有形上形下之分更無聚散可言敬字只是一個正字伊川整齊嚴肅四字恰好形容得一個正字顯諸仁即是藏諸用譬如一株樹春風一動枝葉蔚然枝葉都是春發出是顯諸仁然春都在枝葉即藏諸用夫子言仁曰恭寬信敏惠可見仁都在事上離事無仁薛文清吕涇野語録中無甚透悟語後人或淺視之豈知其大正在此他自幼未嘗一毫有染只平平常常腳踏實地做去徹始徹終無一差錯既不迷何必言悟所謂悟者乃為迷者而言也氣節而不學問者有之未有學問而不氣節者若學問不氣節這一種人為世教之害不淺問康齊與白沙透悟處孰愈曰不如白沙透徹胡敬齊如何曰敬齊以敬成性者也陽明白沙學問如何曰不同陽明象山是孟子一脈陽明才大於象山象山心粗於孟子自古以來聖賢成就俱有一個脈絡濓溪明道與顔子一脈陽明象山與孟子一脈橫渠伊川朱子與曾子一脈白沙康節與曾㸃一脈敬齊康齊與尹和靖子夏一脈又問子貢何如曰陽明稍相似問告子是强持否曰他到是自然的問近於禪乎曰非也告子之學釋氏所呵者也謂之自然外道問整菴陽明俱是儒者何議論相反曰學問俱有一個脈絡宋之朱陸亦然陸子之學直截從本心入未免道理有疏略處朱子却確守定孔子家法只以文行忠信為教使人以漸而入然而朱子大能包得陸子陸子粗便包不得朱子陸子將太極圖通書及西銘俱不信便是他心粗處學問並無别法只依古聖賢成法做去體貼得上身來雖是聖賢之言行即我之言行矣曹月川看他文集不過是依了聖賢實落行去將古人言語略闡發幾句並無新竒異說他便成了大儒故學問不貴空談而貴實行也問劉誠意先曾出仕而後佐太祖何如曰焉有天生真主為天下掃除禍亂既抱大才而不輔之者乎誠意之差差在前此之輕出問王龍溪辭受不明必良知之學誤之也曰良知何嘗誤龍溪龍溪誤良知耳又問龍溪之差恐亦陽明教處未加謹嚴曰陽明未免有放鬆處一向不知象山陽明學問來歷前在舟中似窺見其一斑二先生學問俱是從致知入聖學須從格物入致知不在格物虛靈知覺雖妙不察於天理之精微矣知豈有二哉有不致之知也毫釐之差在此敬義原非二物假如外面正衣冠尊瞻視而心裡不敬久則便傾倚了假如內面主敬而威儀不整久則便放倒了所以聖人說敬義立而德不孤難久者只是德孤德孤者內外不相養身心不相攝也明儒學案卷五十八
