body:
  text: 明儒學案卷五十三餘姚黄宗羲撰諸儒學案下中丞李谷平先生中文敏霍渭厓先生韜考功薛西原先生惠文節舒梓溪先生芬徴君來瞿塘先生知徳副使顔冲宇先生鯨盧冠巖先生宁忠侍郎吕心吾先生坤忠節鹿乾岳先生善繼臺長曹真予先生于汴忠節吕豫石先生維祺給事郝楚望先生敬諌議吳朗公先生執御忠烈黄石齋先生道周忠節金伯玉先生鉉中丞金正希先生聲輔臣朱震青先生天麟徴君孫鍾元先生竒逄諸儒學案下一中丞李谷平先生中李中字子庸吉水人谷平其所居里名也正徳甲戌進士授刑部主事上疏諌武宗西僧出入禁内宦官用事謫通衢驛丞文成起兵誅濠使叅軍事擢廣東僉事轉廣西左叅議尋以副使提督其省學校丁内艱再任陞浙江右布政廣東按察使外艱起復轉右布政使不肯逢迎撫按降四川右叅政移浙江按察使以右僉都御史巡撫山東入謁闕里曲阜三氏學生舊無廩至先生始給之曰使東土人知天子敬學庶其興乎晉右副都御史總督南京糧儲嘉靖壬寅十一月卒官年六十五先生受學於楊玉齋之門玉齋名珠其學自傳註以遡濓洛能躬理道不茍榮勢貧老而無子横經授徒未嘗見戚容弟子出其門者以解釋考據為名家然自謂所學不在是也晚得先生與語喜曰吾學其有傳人乎吾本之明道一一其醇者也而吾未嘗輕語人驗其資皆不足多也聖人與人何異亦為之而已矣子勉之先生操行清苦入仕十餘年俸入不足以供朝夕嘗留門人飯貸米乏薪至㸑家具日暮矣竟不及飯而别故其所言皆是得力處以為學只有存養省察是存養内一件儒者之學理一而分殊分不患其不殊所難者理一耳若非功夫親切不敢如此道也夫理不患其不一所難者分殊耳此李延平之言也蓋延平以救儱侗之失而先生反之者欲其事事從源頭而出以救零星裝做之非兩家各有攸當非與先儒為翻案耳谷平日録古之學者只是誠實今之學者只是遷就存天理只是始學者論語其極則心即理理即心何以言存天理哉凡言存天理心尚與理為二復其見天地之心乎人得是心以為心人之心天地之心也但私則與天地不相似一去其私則我之心即天地之心聖人之為聖人全此心而已識得此心則真是天下之廣居非形容之言薛文清公言人與天地本無二理惟無私貫之此真見得又曰孟子曰夫仁亦在乎熟之而已蓋凡為善為學皆貴乎熟不獨仁也此語又差却聖人之學為仁而已為仁之外又何為學為善乎學必見得到一處方是真見下學而上達蓋下學者事上達者理理外無事事外無理學者要思得之人須是有遯世無悶不見是而無悶底心到此地位道在我矣學者須自考若有些子悶底意思在即是有我便與天地不相似人之目視耳聽手持足行氣自如此吾人之學只是約之於中正不大段費力到視明聴聰手恭足重即仁也先儒曰中人以下乃以命處義賢者求之有道得之有義不必言命是固然矣然命字亦不可輕者孔子曰道之將行也歟命也道之將廢也歟命也彌子曰孔子主我衞卿可得孔子亦曰有命孟子因臧倉之沮曰吾之不遇魯侯天也推而言之尭舜之禪湯武之征伐皆命也但不肆縱欲之心只是處貧賤安於貧賤處富貴安於富貴當生則生當死則死到安命處便是道義非有二也君子思不出其位安命也若待不得已然後言命非安命也或問復其見天地之心在人心如何看曰孟子所謂人皆有不忍人之心今人乍見孺子將入於井皆有怵惕惻隱之心便是復其見天地之心齊宣王謂吾甚慙於孟子便是復其見天地之心盗牛恐王彦方知便是復其見天地之心或問程子謂道無精粗言無高下是否曰然曰夫子謂中人以上可以語上中人以下不可以語上如何曰理外無事事外無理就如教此皂𨽻不可嚇人取錢不可過重打人此便是仁恕之理若教知學之人便只論仁恕之理語上語下要之無二理思慮紛擾是何勞擾必除去之才知天理真樂世人役役於富貴聲色之間怪他不得舍此無可樂果能閑邪則天理之樂在我其妙有難以語人孔子曰好仁者無以尚之近略見得伊川先生曰易之艮言止之義曰艮其止止其所也人多不能止蓋人萬物皆備遇事時各因其心之所重者更互而出纔見得這事重便有這事出若物各付物便自不出來此亦可見理一分殊莫非自然也知學之外無心焉有死灰槁木之理只是知覺常存乎正即是敬以直内工夫寂然不動只是渾然天理無纖毫私欲非謂無知覺也若無知覺如何曉得是天理無人欲不知心之貴者未必不樂於渉躐汗漫博學者亦是多欲天下之道公而已矣易曰艮其背不獲其身行其庭不見其人不獲其身無我也不見其人無人也如是則全體是道無他公而已若有一毫有我有人之意在即是私已便與道不相似聖學之功只是一個存養為本省察是存養内一件常時存此本心不失便是存養或有一念之動少有非僻省察之即與克去此本心依舊存而不失聖學之功存養為本思無邪者存養之全功也徃歳去何處起身時便有速到之心近時此念絶無作善獲福作惡獲禍此理自然如此要人自理㑹人之由大路泰然行將去何利如之若由曲徑穿林莽未有無所損傷此自可見若求之報應之説惑之甚矣其亦怠於善也夫其亦流於惡也夫天運而不已日徃則月來寒徃則暑來水流而不息物生而不窮此仁也聽言可以觀人小人當未遇之時見君子所為亦有尊重興起之意是尚無利禄之深迷而本心之明有不可揜者及稍得利禄之謀便志得意滿雖明知君子所為之是恐其不便於已必作為一種説話以寓沮抑之意寜欺已欺人不顧此之謂失其本心後世論學論人物者多無實見或有依阿説者只是慿藉古人先儒力爭頓悟之説以吾夫子我欲仁斯仁至之説証之恐亦是如此人得天地之心以為心此本心也放而不求則若失之一操之便存而不失要之不從外得此分明是頓悟但是無間斷為難所以君子之學自强不息聖人之學純亦不已薛文清謂孟子之後學不傳只是性不明此亦是想像之言周子曰動而正曰道其語道也明矣中亦曰動而正曰仁人處於天地之間其所行處皆權也小人流於遷就而權之用失之君子未免執滯而權之用未盡惟學聖人周旋中禮泛應曲當而權之用始盡晦翁謂象山常説宇宙但他説便只是這箇又不用裏面許多節拍却只守得過空蕩蕩底中以為道體本是空蕩蕩底某曰儒者之學理一而分殊分不患其不殊所難者理一耳各親其親各子其子常人皆可能也視天下為一家中國為一人非聖人不能也儒者之學所以明理一以希聖也故曰一日克已復禮天下歸仁焉孔子謂易有聖人之道四焉則易不可專指卜筮言明矣坤卦主利必以伊川利萬物則主於坤之説為千古不易之定論若曰陽主義陰主利是導人於利矣為人臣者懷利以事其君為人子者懷利以事其父為人弟者懷利以事其兄是何等時耶豈聖人開物成務之意也耶當以道觀易可也聖人之道理一而分殊分不患其不殊所難者理一耳孔子曰吾道一以貫之此明夫理一也子貢問有一言而可以終身行之者乎子曰其恕乎已所不欲勿施於人此教子貢推行乎理一也曾子曰夫子之道忠恕而已矣此明乎理一也大學曰是以君子有絜矩之道也此教平天下推行乎理一也宇宙只一理本公也人之有身則有自私之蔽聖人之教所以去天下後世自私之蔽也自私之蔽一去則廓然大公公則理一無間矣是故君子親親而仁民仁民而愛物陳北溪曰夫子之道其精微在易而所以語門人者皆日用常道未嘗及易也此語未有見於道日用常道之外又豈别有所謂易哉文公云尹彦明見伊川後半年間方得大學西銘㸔此意也好也有病蓋天下有許多書若半年間都不教他看一字幾時讀得天下許多書某以為天之生人人之有生只是一個明徳而已明徳即仁也聖人之學只是明此理以全之而已學者茍於大學西銘之㫖而有得焉則六經可不治而明矣文公之言或早年未定之見人胸中除去一切閒思量則天理自在多少快活自安命上便可到天下何思何慮學之得與不得亦易見此心灑然而勢利出脱了無所係此實得也雖曰講學而勢利纒繞瞻前顧後此無所得只是説話孔子曰朝聞道夕死可矣會得此意則必終日乾乾學惟為已而已何處著得絲髪為人之意哉袁爕曰人心與天地一本精思以得之兢業以守之則與天地相似可謂得象山之意矣此心平平時可以黙觀道理或曰理統於一心散於萬事此非真見論其極只是理無外為學要以心為本涵養須用敬所以養此心也進學在致知所以明此心也凡看經傳皆以明此為務觀一物處一事皆有以騐此心之所形則無徃而非養心之學矣心外無物物外無心心無内外也要人自理會范氏謂守約則足以盡博此語亦獨見也廣大寛平胸中常覺有此氣象是什麽快活尋常間只從容自在便是坦蕩蕩氣象學而不思則罔思而不學則殆於此可見理外無事事外無理萬古聖人之正學昭灼平實無有餘説惡念易去妄念難去人心無念之妄純乎道矣歴觀徃古來今天下有一定之命只是人自勞攘學者至約工夫只是常常提醒此心學者遇事一以天理處之不可少有顧忌而存恐懼之心一有恐懼之心非知命也吕東萊曰義理無窮才智有限非全放下終難湊泊放下政非易事也生生之謂仁存存之謂學本心却是天下之大本動皆從心中流出即為達道一不從本心所發便是私意非道也不見不聞只是虛虚者心之本實者心之質可見者也心也者虛而實君子之道費而隱四端在人本無増添孟子所謂擴充者只是無間斷耳聖人用功與學者一般但有生熟之異謂聖人不用功者非也蓋人之心猶舟之有柁心一不存則惡生柁一不持則舟覆聖人即老於行船者進退推移出於自然而柁亦未嘗離也學者即學行船者未免有把持著力之功非自然而然也一生熟之異即盡聖人學者用功之説今人乍見孺子將入於井皆有怵惕惻隱之心此便是善端發見處人人皆有但有間斷則若存若亡不為己有學者有此心須充之到淵深塞實方是有諸已譬如栽一小樹恐牛羊牧之大風揺之須從四圍作墻垣以防牛羊又時培土灌水以備風日則此樹漸大根漸深且實雖無垣墻牛羊風日且如之何如人善端發見欲使之常存必要去閑邪邪閑則天理自存存之之久便到淵深塞實處到此地位則本體已復實有諸已彼富貴貧賤生死禍福得䘮夷狄患難若無與於已豈能有以介吾意乎學者須如此用力方可閑邪非如何去閑只是心正則邪自閑了邪閑則誠存矣閑邪存誠是一件非有二也門人王龜年記大學格物致知誠意正心修身只説明明徳的明字中庸明善誠身擇善固執只説得誠之者的誠字元來誠則明明則誠非有二也故論學拘泥字不得會得時横來竪説只是此理人得天地之心為心仁也其用則義也孔子於易曰立人之道曰仁與義孟子曰仁人心也義仁路也終之以學問之道無他求其放心而已此求仁之説也體用一原顯微無間立其體則寂然不動渾然天理及其感而遂通天下之故則致用各異所謂義也聖賢之正脉其在是乎從心所欲不踰矩矩者方也大學絜矩亦是此義若此義便圓神只從此心所欲行出事去自是方了蓋此心固無方無體到外方有體門人羅洪先記間嘗讀明道行狀曰聞汝南周茂叔論道慨然有求道之志未知其要汎濫於諸家出入於老佛者幾十年反求諸六經而後得之晦翁解太極謂周子手是圖以授之此可謂要矣不知其所謂未知要者何事而又汎濫諸家出入老佛直待反求六經而後得之以為伊川尊明道之言乎伊川恐非茍言也宋史載明道與伊川入成都聞篐桶者説易兄弟渙然有所省後門人問易伊川曰易學在蜀至著易傳必曰斯義聞之成都隱者每讀至此嘆曰此聖賢至公至平之心無一毫自廣狹人之念此所以繼千秋之絶學也於篐桶者有一論尚欲表顯之况於其師乎此深可疑也南軒與晦翁書謂程先生與門人講論未嘗一言及太極圖晦翁謂此書詳於性命之原而畧於進為之目有不可驟而語者中思之門人固有不可驟而語者若伊川易傳之言以教萬世胡安定有言則引之篐桶者有言則引之何於周之圖素未嘗一語及之乎此深可疑也晦翁與象山論無極太極徃復争辨其書有曰周子灼見道體又曰此老真得千聖以來不傳之祕至序大學以二程接孟子之傳序中庸又曰程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非微程夫子則亦莫能因其語而得其心也信斯言也則二程之學似無與於周子矣此深可疑也夫宇宙間只有一箇理在易曰太極在大學曰明徳在中庸曰中一也論太極既以周子真得千聖以來不傳之秘而序大學中庸又以二程續千載不傳之緒此深可疑也復湛甘泉書佛氏曰定明道亦曰定佛氏曰惺惺上蔡亦曰惺惺何也忘已耳若灼然有以實見得吾心之體有在於此設以佛氏所嘗語反規規然而避之是反渉於較計偏倚之私而累其廣大光明之量其於斯道無我無物之體不無有害同上今之以學自命者人皆議其行事之謬謂平日講道學而行事如此其偽也愚以為不然平日講學只成一箇自私而自以為天理故其行事之謬者非偽也學術之差也荅羅達夫大學孔氏之訓明道先生兄弟表顯之以覺後學者也慈湖一切掃之如定靜安慮彼則曰此膏盲之病也如格物致知誠意正心彼則曰何其支也取人大中至正之心紛然而鑿之豈不為毒信斯言也則大學在所屏絶矣其可乎開口説毋意毋意是也然有取乎主忠信而以一為未離乎意此為毋意乎有意乎不可不察也聖功之要曰存曰思任意削去當時象山先生已見其微故戒之曰若茫然而無主泛然而無歸則將有顛頓狼狽之患信然矣其蔽之本指其於心不在焉則以為心如何曰在正舍之則亡則以為聖人未嘗貴操而賤舍此説若行是率天下貿貿焉莫知所之不至於槁本死灰不已也其為學術之害可勝言哉同上嘉靖甲午夏五日予卧病隨州報恩寺一日學子請問曰朱子之學何學也予曰聖人之學也曰何如朱子詩云元天幽且黙仲尼欲無言動植各生遂徳容自清温彼哉夸毗子呫囁徒啾喧但騁言辭好豈知神鑒昏曰予昧前訓坐此枝葉繁發憤永刋落竒功收一原曰神鑒曰一原朱子之學旨可知矣曰或疑其釋大學何如曰此學必論大頭腦處如明徳此大學大頭腦也朱子以虛靈釋明徳不可易也明之功則曰因其所發而遂明之以復其初此工夫至簡易也何疑之有曰或疑其格致求於外也何如曰此不得朱子之精也朱子曰本明之體得之於天終有不可得而昧者是以雖甚昏蔽之極而介然之頃一有覺焉則即此空隙之中而其本體已洞然矣當時有問介然之頃一有覺焉則其本體已洞然矣須是就這些覺處便致知充廣將去朱子曰然如擊石之火只是些子纔引著便可以燎原蓋介然之覺一日之間其發也無時無數只要人識認得操持充養將去此朱子之精孔門求仁之學也學者當黙而識之學子曰然遂記之朱學問荅嘉靖甲午秋七月予遊大洪山張子叔平從焉一日張子問學予曰求仁問仁曰主一曰孔子之學惟以仁為訓何也曰天地之一動一靜人心之一動一靜一本也仁也求仁之學萬古聖賢之正脉也曰仁之體何如曰仁道至大不可求之言語不可求之訓詁吾夫子在川上曰逝者如斯夫不舍晝夜此仁之體也蓋一動一靜天命之流行也惟其動静此所以不窮顔子之見卓爾孟子之謂必有事焉而勿正是皆有見於一動一靜之妙也非知道者孰能識之孟氏之後千有餘歳惟伊洛得聞之此道明之會也明道先生曰天地之間只有一箇感與應而已更有甚事又曰天地萬物之理無獨必有對皆自然而然非有安排也每中夜以思不知手之舞之足之蹈之此是天理二字自家體貼出來者也伊川先生曰有感必有應凡有動皆為感感則必有應所應復為感所感復有應所以不已也程夫子兄弟所謂感應亦有見於一動一靜之妙也一動一靜生生不已仁之體在我矣張子曰唯乃書以授之求仁問荅文敏霍渭厓先生韜霍韜字渭先始號兀厓後更渭厓廣之南海人目有重瞳始就小學即揭居處恭三字於壁力行之日誦數千言一二歳間諸經皆遍登正徳甲戌進士第告歸讀書西樵山中無仕進意嘉靖初起為兵部職方主事仍謝病歸山丙戍陞少詹事兼侍講學士丁亥進詹事戊子陞禮部右侍郎禮部尚書皆辭免庚寅丁母憂服闋起吏部侍郎丙申出為南京禮部尚書己亥改禮部尚書加太子少保掌詹事府事庚子十月卒於位年五十四贈太子太保諡文敏先生以議大禮與張桂俱為上所寵眷然張桂賦性傾險既獵取大位而仇視不同議之人先生舉動光明於不同議之人如豐熙楊慎徐文華唐樞陸粲皆極力薦舉其所論例動闗安危大計在吏部則銓政為之一清在禮部則南中體統肅然風俗為之一變為舉主不認門生居鄉不書治生直行其道不顧是非恩怨魏莊渠曰兀厓之亾於世道有大闗係非虛語也今以先生與張桂同𩔖並稱是先生為張桂所掩也獨是與邃菴桂洲相訐皆以意氣用事乏和衷之義所謂豪傑而不聖賢者也先生薦文成謂臣不如也而於文成之學不能契大意以知有聖人之知有下愚之知聖人之知則可致下愚之知則無所不至矣夫文成之所謂良知即人人所同賦之性也性之靈處即是知知之不息處即是性非因下愚而獨無也致者致此也先生之所謂知乃習染聞見之知也惡得良故聖人與下愚相去倍蓰無算如何致之哉此真千里之謬矣文敏粹言嚴威儼恪不懈則不言敬而敬在其中矣或問明道先生如何是道曰於君臣父子兄弟朋友夫婦上求此道學正路世之淫於老佛謂老佛上一截與吾儒同又謂佛賢聖只差毫釐此千古名教之罪人也人於食息之間放過多少初學刻勵工夫安得便自在快活亦須勉强持守習熟自别初學勿憂助長只憂忘了到有助長之病又自有藥學知為巳真味則知接人處事有一毫不盡其心者皆切已實病今人説操心只是懸空捕影思不出於私便是天理從天理上思便是窮理盡心知性再不消説主一不消説涵養但不可太急廹為心病説能存心而容貎詞氣不管乃自欺爾只中無主而静坐且認静坐作工夫便有許多病痛須知窮理即所以養心吾人有一息天理純全處亦天道流行也豈惟吾人鳶飛魚躍活潑潑地世有茍賤無恥之流多借忍耐之説以自蒙臭惡可憐也乃且曰道學如是丙申秋某與致齋甬川日集伺朝所致齋講陽明之學曰致良知曰知行合一與甬川異辨説棼拏莫相一也某曰聖人位育皆心性事謂良知非與聖非也然而有聖人之知有下愚之知率下愚之知認欲為理認利為義曰吾良知吾致吾良知是聖跖混故人心道心之辨貴精一也知行合一矯學者口耳敝敝也要之知行亦自有辨過矯反敝君子自立不求同於時姑俟後世耳惟日孜孜不敢少懈只求不得罪天理而已居處恭之目何如曰非禮勿視也非禮勿聽也非禮勿言也非禮勿動也四者居處恭之目也聖賢實學淺深高下一以貫之者也世儒不實用力以居處恭為粗淺不屑言以四勿為精深不敢言求所謂主敬之説求所謂格致之説求所謂戒慎之説惟費口耳全無實力今之人耳目口鼻猶夫古之人也聲音笑貎猶夫古之人也何獨於心而疑之尭舜所以聖純天理絶人欲而已矣學者希聖擴天理遏人欲而已矣擴天理遏人欲不在乎他覺悟之間而已矣公議所在係國家元氣係天下治亂未有天地一氣而已矣清而上覆天由生焉凝而下奠地由生焉一翕一闢氣化流行焉時其翕也秋冬生焉時其闢也春夏生焉譬諸人焉吹氣而寒唇所翕也呵氣而煖唇所闢也一氣而已矣謂陰陽有二氣亦謂吹呵有兩人也可乎陽生祀天陰生祀地則陰陽判矣陰陽判而氣化滯矣氣化滯而鬼神之機息矣君子之於學也太和元氣灌注一身斯其學之醇君子之於治也太和元氣灌注天下斯其治之極有袂交者其辭情道義交者其辭理其辭情者損其辭理者益天下一氣也舟車所至人力所通天地所覆載日月霜露所照墜高極無極深極無極太極無極一氣也然而有山谿之險内外之限焉何也地之形為之也人也者天地之心也所以贊天之能理地之紀完合宇宙於一氣者也仁也者人也合宇宙為一氣者也陽明之學一言蔽之曰致良知析曰格物曰知行合一均之致良知也然有聖哲之知焉有下愚之知焉聖哲之知致焉位育叅贊良知也下愚之知致焉飲食男女亦良知也今夫犬之㹞㹞狐之綏綏鶉之奔奔鴟之􅍆􅍆良知也下愚奚擇焉致下愚之知禽獸羞伍是故修道之教不可已也考功薛西原先生蕙薛蕙字君采號西原鳯陽亳州人正徳甲戍進士授刑部主事武廟南巡抗疏諌已調吏部大禮之議起先生撰為人後解為人後辨奏入下獄尋復官歴考功司郎中而罷嘉靖辛丑正月卒年五十三初好養生家言於是絶去文字收斂耳目澄慮黙照若干年而卒未之有得也久之乃悟曰此生死障耳不足學然因是讀老子及佛書得其虛靜慧寂之説不逆於心其與谷仰之書曰昨於七月二十六日夜欻爾頓悟往事於頓悟一事雖深信之亦未免有疑若一生不悟真是誤却一生今乃知古人不我欺也已而證之六經及濓洛諸説至於中庸喜怒哀樂未發之謂中曰是矣是矣自有二氏以來未有明目張膽謂與吾孔氏為一者亦未有由三氏之一而能通一乎死生者先生敢言之矣通一之矣由是以推先生所主未發之中與心有動靜之説獨有餘論焉何也此心之體本不可以名狀也古聖人於此皆難下詞不得已率藉其近似以為形容實不容有所著也孔子寂然不動良以所可言者不過若是而先生以未發指之似亦孔子之意而必曰中焉中焉中豈斯體中所有乎尭舜言中蓋合發未發而一之也今乃以一中屬之未發豈得謂之無著乎豈可謂之心體乎上古聖人以至於孔子未嘗言動靜也言動靜者自後儒始周子一言主靜而即自註曰無欲急急以自救也陽明先生曰心之本體無分動靜此以救後儒之誤不可為非也而先生又曰陽明言致良知大抵是就事物上説乃得末而遺本夫良知者孟子之言也孟子曰所以不慮而知者其良知乎夫不慮者一無所知之本體也不慮而知可專以為事物而非體乎宜乎以為人倫之外更有妙道孔氏門中難著此語約言太虛之中一理旁薄寜有二乎幽明人鬼未始不一上帝固曰天吾心亦天也鬼神固曰神吾心亦神也及世愈衰小人自智其愚妄意神道為茫昧故肆其惡而無忌憚謂天為弗知而吾心已知矣謂神為可欺而吾心已不可欺矣書曰天聰明自我民聰明民之聰明即天之聰明也不然億兆至衆天將竭聰明以伺之不亦勞乎寂然不動本一理耳感而遂通乃散為萬事雖散為萬事止是一理因物感之者不同故應之不同千變萬化皆是物也卜筮之感應理也理即神也非二物也感則以𩔖而應之未感則隱而不可見天人之道一也觀人心之同可以知天矣觀人心之感應可以知神矣吾心之理與宇宙之理非有二也知此者宇宙非大吾心非小由人自小故聖人示此引諸廣大之域其實此理非大非小若厭小欣大則又失之矣人心之神與天之神非有二也天之神盈乎天地吾心之神盈乎天地非滯於塊然之軀而已故人能格於天地者以此理本同一體充塞而無不在也若心專滯在形體何由格於天地乎亦非心徃至於天地心未嘗動也蓋天地之間心無不在論見聞之知則今有而昔無論知覺之本體則今非益而昔非損也見聞之知非徳性之知者以此夫能知者心也其所知者物交而知爾心無所不知物交之知必有窮也學者狥物以為知方自多其博也執知以為心方自是其智也何異窺蔀屋之容光而不覩日月之大明者乎寂感者心之理也惟聖人能盡其理寂多於感亦其理然也衆人亂於嗜欲故私感不息幾於無寂易曰憧憧徃來朋從爾思謂之爾思出於私巳非感應之正理也知止而後有定用心不一者未知止也未發之中即性善也發而有不善惑於物而遷其性耳知其性而不累於物則其情無有不善者然情之不善者其性善亦豈遂亡哉物徃而情息其本無不善者復自若也世儒因人之不善而謂性有不善是不知未發之性乃以情而言性也欲其不謬可得乎君子所寓在是所樂在是何寓而無樂是以不願乎其外也有願乎外由所寓之内無樂耳辟之居齊不樂思楚之樂其何與之有由如是也終身居可樂之位而其心戚戚焉此夫子所以與㸃也君子以誠身為貴實有於身謂之誠身夫天下之物可以實有於身者惟善為然由其為固有之實理故可以實有焉耳彼取諸外者夫豈可得而有之耶學非主於誠身雖博學多能卒非已有所謂不誠無物也涵養本原窮理在其中矣存久自明心學之要也學貴知約約必無所不通有不通者非約也寂然之時物物本不相礙及其感也惟物各付物而已不與焉誠如是也從容萬物之間夫何為哉今無事則不免將迎之病臨事則以已而必物膠膠擾擾患其多事而不思所以致是者皆私意之自累非事累之也靜中有物指主宰而言居敬則心中無物指私欲而言朱子曰心一也有指體而言者有指用而言者伊川此語與横渠心統性情相似愚謂程子之説蓋謂凡言心者有主性而言此則主體而言也有主情而言此則指用而言也主性而言此心字即是性主情而言此心字即是情非謂性情之外復有所謂心者而統乎性情也故謂性統動靜則可謂心統性情則不可性即太極也太極之上不當復有物五峰心妙性情之徳與横渠之失同朱子極稱此二語殆未然也言理者率以大言之而遺其小如是則理有不徧非大矣包大小而不遺此其所以為大也方士之言養生者徃徃穿鑿於性命之外不知養生之道不越乎養性世儒率言知性知天而斥小養生不知養其性者即同乎天道而不亡老子集解序昔程子謂司馬子微坐忘論為坐馳其言曰未有不能體道而能無思者故坐忘是為坐馳有忘之心乃思也曰程子之説誠善矣第其議子微者殆不然也夫無思者無妄也惟聖人者能明之非夫學者之事也凡學者必始於操心終於無妄漸習則可致欲速則不達雖大賢之資未有越操心而至無妄也天下之理本同末異所以異者由人之用心不一也二家之學皆以無私心為極茍無私心異安從出人生而靜是謂一體先聖後聖同復其初而已矣奚道宗儒學之辨乎今儒學即事以治心其蔽也流蕩而忘本道宗屏事以安心其蔽也固滯而不該於用非二宗之學本然也坐忘論序遺書靜也者在我常然之體動也者應物俄頃之跡今習動為終身之蔽而主靜無一日之功不知動為大畧顧曰主靜之䝉偏不亦過乎良知之學學者既以此為本宜必以靜與無欲為助不然恐徒為空言而終無實學矣蓋非靜以體認之則得之者淺必不能的見而不惑非無欲以存養之則害之者衆必不能固守而不變未發者以言乎心之靜也所謂性也發也者以言乎心之動也所謂情也古之聖人明乎性情之徳時止則止時行則行靜虛動植各臻其極所謂致中和也然此二者復以主靜為本蓋寂然不動者固有之體心之常也感而遂通者斯須之用心之變也非特心之體用之變宜先夫靜也事之感者其事本不多其時本有限未感之間皆退藏於宻之時也世之儒者皆知庶物人倫為至矣未知性與天道雖可以貫人物而庶物人倫不可盡性與天道也夫性與天道孔子所罕言若夫庶物人倫固諄諄言之矣茍曰吾未盡人倫遑及其他則可也若曰人倫之外更無妙道豈惟不知佛老亦不知孔子也夫所謂真如不滅者實有是事而世莫之求也子路問死程子以為切問是也若死而斷滅有何道理可説則夫子不當以知死為荅矣朱子躬行博學今人莫及至其晚年非不知生順死安也由未曾實透得此闗故理會叅同契平生於性命之學死生之説註解得盛水不漏晚節末路却索之於方士之術不亦惜乎或曰靜坐涵養未發得無入於空寂曰未發之體湛然常存何空寂之有攝心與無念只是有生熟頃久之不同其實一也蓋攝心之初便是欲無念但未免時有念起則復收攝之令歸於無念耳求放心即是敬心常存而不放常存此心而不使放逸者敬也然未能久而不息也此之謂思誠心常不放而不待存者敬之成也純亦不已者也此之謂誠敬屬人為誠則無為而天矣敬則自虚靜不可把虛靜喚做敬有無並是情見情見未生有無安在陽明言致良知大抵是就事物上説如此只是致良知之用却不曾先推窮良知本體是如何豈非得末而遺本大本茍未理會得末亦安得不差可謂陰陽即太極不可謂太極即陰陽一以貫之如陽明致良知之説只是理會得貫原不曽理會得一以其但言良知之用而未及良知之體也致虚極守靜篤歸根曰靜靜曰復命為道者且當篤信此言勿以動上求靜為是文節舒梓溪先生芬舒芬字國裳號梓溪江西進賢人正徳丁丑進士第一人授翰林修撰孝貞太皇太后崩上假視山陵之名將微行宣府先生上䟽謂諒闇之内當深居九重無復外出孝貞主入先生又言當從午門不當從長安門以春秋公薨書地不書地之法求之則孝貞有不得正終之疑矣已邜上欲南巡先生率同院諸公連名入諌上怒命跪門五日杖三十謫福建市舶副提舉嘉靖初復原官大禮議起先生執為人後者為之子不得顧私親三疏爭之不得乃偕同諌者哭於武廟上震怒杖如前明年母䘮歸丁亥三月卒年四十四萬厯中贈左諭徳諡文節先生以濓溪得斯道之正脉故於太極圖説為之繹義然視太極若為一物岐陰陽而二之所以有天之太極人之太極物之太極蓋不勝其支離矣於是將夫子之所謂習相逺者俱誤認作性以為韓子三品之論言性庶為近之是未窺濓溪之室者也先生曾請文成書拱把桐梓一章文成書至至於身而不知所以養之者顧先生而笑曰國裳讀書中過狀元來豈誠不知身之所以當養還須讀此乎周海門遂言庚辰先生見文成於南昌與論樂之元聲躍然起拜稱弟子按先生答周汝和書云陽明盛心欲稍進生高明之域固所率願第今為罪斥人而千里徃返無忌似忘悔懼在生雖滿朝聞之願而或累於陽明則不能不慮及也此是先生官市舶閩中書也先生以已邜入閩至次年九月以父憂始歸計庚辰卒歳在衰毁之中無見文成之理若九月以前則先生之書可據庚辰之見真為烏有逮至辛已秋文成歸越隨即居憂丁亥九月文成出山而先生已於三月不禄矣其非弟子可知仲尼之門考以四科囘賜之徒不稱官閥一狀元何足以重文成而必欲牽引之乎太極繹義濓溪考亭皆吾道正統而為天地之心者病儒者不知明體適用為聖賢之學故濓溪建圖發主靜之説而考亭於圖解亦便以隂陽動靜分體用蓋亦本乎主靜之説欲人求之未發之中以立太極之體耳試以吾儒體用論之正心誠意所以立極治國平天下所以致用王道之大一天徳之純也伊尹之事業本顔淵之學問也方其本體時亦必讀書窮理致知格物孜孜焉而有所事非一於黙坐靜齋也然自是靜底事及其致用時亦必篤恭莊莅論道經邦休休焉而無所事非一於鞅掌奔走也然自是動底事由是言體無不靜用無不動而陰靜為太極之體陽動為太極之用昭昭矣若不以太極言則動為陽之體靜為隂之體如論語知者動仁者靜註云動靜以體言是也若并以五行言則動為陽之用靜為陰之用如圖説陽變隂合而生水火木金土是也故曰動靜無端又曰體用一原學者不可不察夫太極不離乎隂陽五行之中則亦有質有氣之可接矣窮其本原所以妙二五而無不在者乃天道之至微而氣冺於質雖聲臭亦不可得而接也豈非性之本體哉人之生者曰理曰氣曰質曰數四者而已性之善惡出乎理神之清濁出乎氣才之優劣出乎質夀之短長出乎數四者同出於太極若未始有四也然相為乗除而推盪不齊人之生遂因以異是又未始無四也理出於無極理無不善氣動於陰陽則陽一氣而陰二氣也二氣以竒耦言此氣有正偏而理因之有全缺生之所受有不同也是何也以形相禪也故子之子不必肖父女之女不必肖母誠以陽同而陰不同也子必感於婦女必應於壻子感於婦則甥烏必其如舅孫烏必其如祖哉自太極而論人則人性宜無不善自乾男坤女而論太極則太極萬有不同又自物而論太極則與人太極又相逺矣是何也太極形而上者人物形而下者也人又人物又物所謂源逺而末益分其終烏得不稍異哉譬之嘉穀之為種也一歳而有粃粒焉再歳而色粟異焉三歳而形味或且異焉雖其中之美者固自若也執其粃粒白蕙赤粟告人曰是非此種也孰信之哉則知始同終異雖以造化之工其勢亦必至此况乎男女之形化信其理氣之自成者哉問水生木而水無所虧木生火而木隨以滅曰水之生木以氣氣則屈伸徃來之無窮故氣至而木榮氣返而木枯木之生火以體體則一定而不可損益故體盛而火亦盛體微而火亦微體燥則近於火性故其燄燃體潤則猶存水性故其燄鬱體存而火存體滅而火滅矣或曰水智也智者行其所無事木仁也仁者不自私已故能殺身以成天下之事或曰水假土以生木不自用而取諸人也木不假物而自用是以勞身焦思而至於斃也故孔子以木為近仁必示以好仁不好學其蔽也愚然則天下之善事豈一人之才所能辨哉知乎此則知所以主靜立極矣問儒者皆言火生土土生金曰土之體博厚無疆非火所能生今湖蕩之中或浮沙成洲平地之上或積壤成丘火何所用其力耶但火之精氣行於地中土因是而成金故金之明在内則金乃火之所生土之所成也孟子之言性善指仁義禮智而言者也仁義禮智烏有不善但以人之禀受言之則或全或缺或有此而無彼如仁者見之謂之仁知者見之謂之知之𩔖此韓子性有三品之説優於荀楊然自予言之雖謂性有萬品可也豈特三品而已哉以五行之生言之則金生於火也火性烮而金性剛木生於水也水性緩而木性柔此則一理之賦所謂性相近也然水之行也而向於下木止也而向於上火散也而向於無金遒也而向於有此則土之所為所謂氣禀之物也氣以理行故理之在天者若有知覺在人為此心之靈也聖人有教以覺庸愚謂之為天地立心為生民立命者以此人心最靈是心即太極也心之動便有善惡萬殊則太極之流行賦予於人者又安得而盡同耶天之太極主乎動聖人之太極主乎靜所謂動而生陽動極而靜靜而生陰靜極復動者蓋復者還其舊之謂也以見太極原只是動又謂陽變陰合又謂五氣布四時行曰變曰合曰布曰行皆是動故考亭之解曰太極之有動靜是天命之有流行也蓋亦有以識之矣易曰天行健詩曰維天之命於穆不已則是隂陽之運豈有一息之停哉雖曰動極而靜亦不過如程子所言翕聚耳子在川上曰逝者如斯夫不舍晝夜其旨深哉問小人悖之是庶民乎是學者乎曰是學者如孔子之所謂佞人孟子所謂鄉愿大學之閒居中庸之無忌憚皆是也若夫庶民盗賊之違理犯義則非其性之滋偽由於上之人不能立極使之無道而教之無素也書曰惟皇上帝降衷於下民若有恒性克綏厥猷惟后荀卿子曰天下有道盗賊其先變乎由是推之則知庶民之違禮盗賊之犯義特以極之不立耳非庶民盗賊之罪也徵君來瞿塘先生知徳來知徳字矣鮮號瞿塘川之梁山人十歳通舉子業舉嘉靖壬子鄉試以終養不上公車親殁廬墓六年遂無宦情至萬縣山中潜心三十年以求易象著錯綜圖一左一右曰錯六爻相反如乾坤是也一上一下曰綜反對如屯蒙是也以觀陰陽之變化著黑白圖以騐理欲之消長萬厯壬寅司馬王象乾中丞郭子章交薦除授翰林院待詔疏辭令以原銜致仕年八十卒先生之學與程子陽明有異同者二端謂格物之物乃物欲之物物格而後知至克已復禮為仁養心莫善於寡欲此三句話乃一句話也何也物也已也欲也皆我有之私也格也克也寡也皆除去有我之私也紫陽是説前一歩工夫陽明是説後一歩工夫謂明徳即五達道也自其共由於人謂之道自其實得於已謂之徳自其通於天下曰達自其昭於天下曰明非有二物也即敬止仁敬孝慈信之徳也言齊家孝弟慈之徳也言治國宜家人宜兄弟父子足法之徳也言平天下老老長長恤孤之徳也一部大學綰結於此二字不言道而言徳者有諸已而後求諸人也此正五帝三皇以徳服人之王道耳若以人之所得乎天而虛靈不昧為明徳則尚未見之施為以何事明明徳於天下哉愚按以物為欲或問中孔周翰已有是説但孔以為外物之誘先生以為有我之私雖稍不同然有我之私未有不從外誘者也夫格物為初下手工夫學者未識本體而先事於防欲猶無主人而逐賊也克巳之主腦在復禮寡欲之主腦在養心格物即識仁也即是主腦不可與克巳寡欲相例耳明徳為虛靈不昧無一象之可言而萬象森然此體不失而行之君臣父子兄弟夫婦朋友之間自無隔閡乃謂之達故謂五達道在明徳中則可謂明徳即五達道則體用倒置矣其論心學晦明天實囿之若是一陰一陽之道繼之者未必善矣嗚呼人自囿之而歸咎於天可乎又曰先生之學以本體上用不得工夫凡涵養未發持敬一切抹殺止於念之動處分别其善惡而為之去之其所謂格物者乃是克伐怨欲之不行所謂明明徳者乃事為之末務無不入於粗機將虛靈之本體讓於佛氏可謂懲咽而廢食終其為無頭之學問而已且陽明之學失傳其門人無不以知善知惡從已發處下手識者方欲挽歸未發先生未必有所蹈襲不知已流入其窠臼也數十載空山獨學無朋師心自智無乃可惜乎語録仁義禮智信之理一也自天命而言謂之性自率性而言謂之道自物則而言謂之理自無偏倚過不及而言謂之中自有諸已而言謂之徳自極至而言謂之太極譬如起屋相似性字自根基上説道字自道路上説理字自尺寸不可易上説中字自規矩上説得字自畜積上説極字自闗門一掃統括微妙上説凡處不要𦂳之人與不要𦂳之事不可狎侮忽畧通要謹慎細宻就是聖人不泄邇工夫吉凶悔吝都在此上面坐世間千條萬緒消不得我一箇理字千思萬想消不得我一箇數字千横萬逆消不得我一箇忍字朱子説未有天地之先畢竟先有此理説得不是有物方有理程子説在物為理説得是學聖工夫要下得手凡人見火而不入於火者知火之能焚也見水而不入於水者知水之能溺也見米飯而必食者知其能養人也學者學聖必見惡如見水火見善如見米麵飯如此則天理人欲判然分明若只講敬説識仁體説致良知恐止把做一塲話説終下不得手作聖之功不外於格物而格物必先於三大欲好色好貨好勇學者做工夫先遏三欲去行四勿即容易了不過時時覺照而已若被三欲牽纒出不得世隨人講性命之學千講萬講終是葛藤五性無聲無臭何處下手惟格形氣上物欲則五性自呈露矣程子説主一無適之謂敬謂此心不之東之西也殊不知此心之東之西者何也乃妄想心也即有所好樂忿􅓰等心也即格物之物也今既知格物工夫則此心自然不之東西不消下一敬字矣靜坐之時如心思道理此之謂靜亦動如禪家靜坐之時不敢開闗思道理謂之理障是靜而不能動也行事之時全在天理此之謂動亦靜如富貴利達之學是動而不能靜也程子不知格物是聖學頭腦工夫故於心之未發上用功不知儒釋之分正在於此徳者得也以五倫體之於身躬行心得也即下文言敬止仁敬孝慈信之徳也若依註中虛靈不昧明徳全在心上去了未見之施為乃何以明明徳於天下哉聖學在心之意念上用工夫禪學在心之未發上用工夫良知乃天理做不得工夫尭舜傳道説人心道心通就心之發動上説孔門説誠意者此也所以某説戒慎恐懼非存養以此堯舜原不説存養存養之説蓋因佛氏而起也何也道心乃與生俱生我之固有未動之時純是道心何必存養惟方動之始此人所不知而已獨知之時乃有人心所以當戒懼慎獨凡處不要𦂳之人與不要𦂳之事不可狎侮忽畧通要謹慎細宻吉凶悔吝通在此上生就是聖人不泄邇工夫人欲必從喜怒哀樂以發於視聽言動方成人欲未有窅㝠空寂而成人欲者天道之誠即太極之實理理無聲無臭何處見其誠以氣候論春生秋殺以動物論春來便獺祭魚雁北來秋來便豺祭獸寒蟬鳴以植物論春來便草木萌動秋來便草木黄落今年如是明年如是千萬年也如是若以一物論黍千年是黍不變而為稻稻千年是稻不變而為梁此便是天之誠副使顔冲宇先生鯨顔鯨字應雷號冲宇寜之慈谿人嘉靖丙辰進士授行人選為御史巡按河南華亭以伊庶人事囑之先生不動聲色卒定其亂海忠介下獄特疏救之沈青霞寃死㧞其子襄於太學出提學政先風化而後文藝在楚則忤江陵在中州則忤新鄭其守正如此鄒南臯曰予讀先生所論孔孟顔曾及原人原性諸語其學以求仁為宗以黙坐澄心為入門以踐履操修為見性而妙於慎獨極於黙識旣殫厥心矣而總於悟格物之㫖盡之世儒以一事一物為物而先生以通天下國家為物為格其力久故其悟深其悟深故其用周直從困衡中入而非以意識承當之者先師蕺山曰先生於學問頭腦已窺見大意故所至樹立磊落先生與許敬菴皆談格物之學敬菴有見於一物不容之體先生有見於萬物皆備之體蓋相反而相成者總之不落訓詁窠臼者也明儒學案卷五十三
