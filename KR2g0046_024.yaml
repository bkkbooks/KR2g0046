body:
  text: 明儒學案卷二十四餘姚黃宗羲撰江右相傳學案九中丞宋望之先生儀望宋儀望字望之吉之永豐人由進士知吳縣入為御史劾仇鸞擁兵居肘腋無人臣禮復劾分宜之黨胡宗憲阮鶚遷大理丞分宜中之出備兵霸州移福建大計歸以薦補四川僉事遷副使視福建學政升參政入為太僕大理卿巡撫南直𨽻僉都御史建表忠祠祀遜國忠臣表宋忠臣楊邦義墓卒年六十五先生從學於聶貞襄聞良知之㫖時方議從祀陽明而論不歸一因著或問以解時人之惑其論河東白沙亦未有如先生之親切者也陽明先生從祀或問或有問於豫曰古今學術自堯舜至於孔孟原是一個後之談學者何其紛紛也豫答之曰自古及今人同此心心同此理所謂理者非自外至也易繫曰天地之大德曰生人得天地生物之心以為心所為生理也此謂生理即謂之性故性字從心從生程子曰心如榖種又曰心生道也人之心只有此個生理故其真誠惻怛之意流行於君臣父子兄弟夫婦朋友以至萬事萬物之間親親疏疏厚厚薄薄自然各有條理不俟安排非由外鑠是所謂天命之性真實無妄者也自堯舜以來其聖君賢相名儒哲士相與講求而力行者亦只完得此心生理而已此學術之原也或曰人之心只有此個生理則學術亦無多說何至紛紛籍籍各立異論何也豫曰子何以為異也曰精一執中說者以為三聖人相與授受萬世心學之原至矣成湯文武周公以後又曰以禮制心以義制事曰緝熙敬止曰敬以直內義以方外孔門之學專務求仁孟子又專言集義曾子子思述孔子之意作大學中庸聖門體用一原之學發明殆盡至宋儒朱子乃本程子而疑大學古本缺釋格物致知於是發明其說不遺餘力說者謂孔子集羣聖之大成而朱子則集諸儒之大成其說已三百餘年至陽明先生始反其說初則言知行合一既則專言致良知以為朱子格物之說不免求理於物梏心於外此其說然歟否歟豫答之曰上古之時人含淳朴上下涵浸於斯道而不自知伏羲氏仰觀俯察始畫八卦以通神明之德以類萬物之情然當時未有文字學者無從論說至堯舜禹之大聖人更相授受學始大明其言曰人心惟危道心惟微惟精惟一允執厥中蓋此心本體純一不雜是謂道心即所謂中也若動之以人則為人心矣非中也微者言乎心之微妙也危則殆矣精者察乎此心之不一而一於道心也一者一乎此心之精而勿奪於人心也如此則能允執厥中天命可保矣此傳心之祖也以禮制心者言此心只有此個天理禮即天理之謂也故制心者惟不欺此心之天理則心之體全矣以義制事者言天下之事莫非吾心流行之用制事者惟順吾心之條理裁制而不以已私與焉則心之用行矣此體用合一之說也若謂禮屬心義屬事是心與事二矣孟子曰心之所同然者何也謂理也義也說者謂在物為理處物為義審如此說是理與義果為二物乎心外無理心外無義心外無物自我心之條理精察而言謂之理自吾心之泛應曲當而言謂之義其實一也緝熙敬止者言心夲體自光明緝熙則常存此光明也敬止者言此心無動無靜無內無外常一於天理而能止也文王緝熙光明使此心之本體常敬而得所止故曰純一不已文王之德之純此之謂也敬以直內者言心之體本直但能常主於敬則內常直矣義以方外者言心之神明自能裁制萬事萬物但能常依於義則外常方矣敬者義之主宰在內而言謂之敬義者敬之裁制在外而言謂之義惟其敬義致一內外無間則德日大而不習無不利矣故曰性之德也合內外之道也故時措之宜也嗟乎堯舜禹湯聖君也文王周公聖臣也古之君臣相與講究此學先後一揆其力量所到特有性反之不同耳若相傳學脈則千古一理萬聖一心不可得而異也時至春秋聖君賢相不作人心陷溺功利橫流孔子以匹夫生于其時力欲挽回之故與羣弟子相與講明正學惓惓焉惟以求仁為至夫仁人心也即心之生理也其言曰夫仁者已欲立而立人已欲達而達人解之者曰仁者以天地萬物為一體手足痿痺即為不仁此仁體之說也當時在門之徒如豫賜由求最稱髙等然或膠擾於事功出入於聞見孔子皆不許其為仁惟顔子請事竭才直悟本體故孔子贊易之後曰有不善未嘗不知知之未嘗復行顔氏之子殆庶幾焉此知行合一之功孔門求仁宗㫖孟子集義之說因告子以仁為內是以已性為有內也以義為外是以已性為有外也故孟子專言集義義者心之宜天理之公也言集義則此心天理充滿而仁體全矣大抵古人立言莫非因病立方隨機生悟如言敬義或止言敬言忠恕或止言恕孔子答顔子問仁專在復禮至答仲弓又言敬恕要之莫非所以求仁也至於大學之書乃孔門傳授心法析之則條目有八合之則工夫一敬蓋千古以來人心只有此個生理自其主宰而言謂之心自其發動而言謂之意自其靈覺而言謂之知自其著見而言謂之物故心主於身發於意統於知察於物即是一時原無等待即是一事原無彼此此大學本㫖也家國天下莫非格物也格物誠正莫非修身也其實一也朱子既以致知格物專為窮理而正心誠意工夫又條分縷析且謂窮理工夫與誠正工夫各有次第又為之說以補其傳其言曰人心之靈莫不有知天下之物莫不有理惟於理有未窮故其知有不盡又曰心雖主乎一身而實管乎天下之理理雖散在萬事而實不外乎吾之一心說者謂其一分一合之間不免析心與理而二之當時象山陸氏嘗與反覆辨論謂其求理於物梏心於外非知行合一之㫖兩家門人各持勝心遂以陸學主於尊德性而疑其近於禪寂朱學專於道問學而疑其涉於支離三百年間未有定論至我朝敬齊薛氏白沙陳氏起而知行合一之說稍稍復明我世宗皇帝始以陸氏從祀孔庭甚大惠也正德嘉靖間陽明先生起而與海內大夫學士講尋知行合一之㫖其後因悟大學中庸二書乃孔門傳心要法故論大學謂其本末兼該體用一致格物非先致知非後格致誠正非有兩功修齊平治非有兩事論中庸則謂中和原是一個不覩不聞即是本體戒慎恐懼即是工夫慎獨云者即所謂獨知也慎吾獨知則天德王道一以貫之固不可分養靜慎動為兩事也學者初聞其說莫不詫異既而反之吾心驗之躬行考之孔孟既又參之濓溪明道之說無不吻合蓋人心本體常虛常寂常感常應心外無理理即是心理外無事事即是理若謂致知格物為窮理工夫誠意正心又有一假工夫則是心體有許多等級日用工夫有許多次第堯舜孔孟先後相傳之學果如是乎至於致良知一語又是先生平日苦心懇到恍然特悟自謂得千古聖人不傳之祕然參互考訂又却是學庸中相傳緊語非是懸空杜撰自開一門户自生一意見而欲為是以立異也後來儒者不知精思反求徒取必在物為理之一語至析心與理而二之又謂生而知之者義理耳若夫禮樂名物古今事變亦必待學而知如此則禮樂名物古今事變與此心義理為兩物矣此陽明先生所以力為之辨而其學脈宗㫖與時之論者委若氷炭黑白此又不可强為之說也或曰陽明先生言知行合一其說詳矣其在六經亦有不甚同處不可不辨傅說之告高宗曰非知之艱行之惟艱是知在先行在後易繫曰乾以易知坤以簡能是知屬乾行屬坤中庸言未發已發亦屬先後生知學知安行利行亦有等級大學物有本末事有終始知所先後則近道矣凡如此說皆可例推今陽明先生却云知之真切篤實處即是行行之精察明覺處即是知如此是知行滚作一個更無已發未發先後次第與古先哲賢亦是有間又如程子以格物為窮理易繫亦言窮理盡性以至於命今陽明言格致誠正原是一事而極言格物窮理之說似為支離其說可得聞歟豫曰自天地生物以來惟人也得其秀而最靈所謂靈者即吾心之昭明靈覺炯然不昧者也人自孩提以來即能知愛知敬夫知愛知敬即良知也知愛而愛知敬而敬即良能也此謂不待慮而知不待學而能也極而至於參天二地經世宰物以至通古今達事變亦莫不是循吾良知充吾良能非外此知能而别有一路徑也故曰大人者不失其赤子之心也此知行合一之原也傅說所謂非知之艱行之惟艱者言人主一日之間萬幾叢集多少紛奪多少牽引非真能以天地萬物為心以敬天勤民為事則怠樂易生生機易喪非不知賢士大夫之當親邪侫寵幸之當逺而有不能親不能逺者欲奪之也故為人主者惟在親賢講學養成此心知而必行不為邪侫搖惑不為寵幸牽引乃為知而能行故曰知之非艱行之惟艱此傅說所以惓惓於高宗也乾以易知坤以簡能者天地之氣原是一個乾以一氣而知大始有始則終可知故曰易坤以一氣而作成物能成則始可見故曰簡若天地之氣各自為用則感應不通二氣錯雜造化或幾乎息矣人心之生理即乾坤之生理也率吾良知則無所不知故曰易則易知率吾良能則無所不能故曰簡則易從知者知乎此也能者能乎此也實一理也故曰易簡而天下之理得矣此又知行合一之㫖也中庸未發已發云者言人心本體常虛常寂常感常應未應不是先故體即是用已應不是後故用即是體後來儒者正是此處看得不透却去未發上做守寂工夫到應事時又去做慎動工夫却是自入支離窠臼明道云心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也周子恐人誤認中和作先後看故曰中也者和也中節也天下之逹道也孟子指親親敬長為達之天下即達道之說也親親敬長良知也達之天下良能也又何嘗有先後李延平令學者看喜怒哀樂未發以前氣象夫未發氣象即孟子夜氣之說若未發之中原無氣象可言譬之鏡然置之廣室大衆之中無所不照未嘗有動也收之一匣之內照固自在未嘗有寂也陽明先生政恐人於此處未透故其答門人曰未發之中即良知也無前後內外而渾然一體者也有事無事可以言動靜而良知無分於有事無事也寂然感通可以言動靜而良知無分於寂然感通也動靜者所遇之時心之本體固無分於動靜也理無動者也動即為欲循理則雖酬酢萬變而未嘗動也從欲則雖槁心一念而未嘗靜也有事而感通固可以言動然而寂然者未嘗有增也無事而寂然固可以言靜然而感通者未嘗有減也其言發明殆盡矣生知安行學知利行等語乃就人品學問力量上看譬之行路者或一日能百里能六七十里能三四十里其力量所到雖有不同然同此一路非外此路而别有所知也同此一行非外此行而别有所行也但就知而言則有生知學知困知不同就行而言則有安行利行勉行不同故曰及其知之與其成功一也又何嘗截然謂知與行為兩事哉大學本末始終先後等語極為分曉蓋此心本體即至善之謂至善者心之止處易曰艮其止止其所也學問工夫必先知吾至善所在看得分曉則生意流行曲暢旁通定靜安慮自然全備易所謂知至至之可與幾也知終終之可與存義也亦是此意先儒所謂知止為始能得為終言一致也從生天生地生人以來只是一個生理由本達末由根達枝亦只是此個生理先儒謂明德為本親民為末本即體也末即用也民者對已而言此身無無對之時亦無無用之體體常用也民常親也明德者心之體也親民者明德之用也如明明德以事父則孝之德明明明德以事君則忠之德明此本末之說一以貫之陽明先生辨之已詳若夫知所先後則近道矣二句其義最精夫率性之道徹天徹地徹古徹今原無先後聖人全體此心通乎晝夜察乎天地亦無先後可言吾人心體與聖人何嘗有異惟落氣質以後則清濁厚薄逈然不同氣禀既殊意見自分仁者見之謂之仁知者見之謂之知百姓則貿貿焉日用不知而君子之道鮮矣大學一書發明明德親民而止於至善所謂至善者即本然之良知而明德親民之極則也是良知也至虛至靈無古今無聖愚一也故意念所動有善有不善有過有不及而本體之知未嘗不知也吾人但當循吾本然之良知而察乎天理人欲之際使吾明德親民之學皆從真性流出真妄錯雜不至混淆知此而後可以近道道即率性之道也茍或不知真性一脈而或入於空虛或流於支離如二氏五伯其失於道也逺矣中庸所謂知逺之近知風之自知微之顯可以入德意正如此孔門作大學而歸結在於知所先後一語雖為學者入首而言然知之一字則千古以來學脈惟在於此此致良知之傳陽明先生所以喫緊言之故曰乃若致知則存於心悟致知焉盡矣若易言窮理盡性以至於命非所謂窮至事物之理之謂也理也性也命也一也明道云只窮理便盡性至命窮字非言考索即窮盡吾心天理之窮故窮仁之理則仁之性盡矣窮義之理則義之性盡矣性天之命也窮理盡性則至命也所謂知天地之化育也且格物窮理之說自程朱以至今日學者孰不尊而信之今朱子或問具在試取其說而論之如云大學之道先致知而後誠意夫心之所發為意意之所在為物今曰先致知而後誠意則所知者果何物耶物果在於意之外耶又曰惟其燭理之明乃能不待勉强而自樂循理夫不待勉强而自樂循理聖人之事也豈誠意工夫又在循理之後耶又云學莫先於正心誠意欲誠意正心必先致知格物凡有一物必有一理窮而至之所謂格也格物亦非一端如或讀書講明道義或論古今人物而别其是非或應接事物而處其當否皆窮理也又曰窮理者非必盡窮天下之理又非止窮得一理便到但積纍多後自當脫然有悟處如窮孝之理當求所以為孝者如何若一事上窮不得且别窮一事或先其易者或先其難者但得一道而入則可以類推而通又謂今日格一物窮一理久則自然浹洽貫通此伊川先生窮理格物之說也今試反之吾心考之堯舜精一之㫖與此同乎異乎夫人同此心心同此理理即天理也學者所以學乎此心也如讀書窮理講論古今豈是不由意念所發輒去讀書講明古今之理如事親從兄豈是不由意念所發輒去窮究事親從兄之理或應接事物而處其當否不知舍意念則何從應接何從處得當否又謂今日格一物明日窮一理則孔子所學工夫自志學至於不踰矩原是一個若必待盡窮事物之理而後加誠正工夫恐古人未有此一路學脈且人每日之間自雞鳴起來便將何理去窮何物去格又如一日事變萬狀今日從二十以後能取科第入仕途便要應接上下躬理民社一日之間豈暇去格物窮理方才加誠正一假工夫又豈是二十年以前便將理窮得盡物格得到便能做得好官幹得好事只如此便覺有未通處若陽明先生論大學古本則謂身心意知物一事也格致誠正修一工夫也何也身之主宰為心故修身在於正心心之發動為意故正心在於誠意意之所發有善有不善而此心靈明是是非非昭然不昧故誠意在於致知知之所在則謂之物物者其事也格正也至也格其不正以歸於正則致知矣故致知在於格物詩云天生蒸民有物有則孟子云萬物皆備於我夫大人之學以天地萬物為一體者也故言物則知有所察意有所用心有所主是不可以先後彼此分也大學一書直將夲體工夫一下說盡一失俱失一得俱得先生大學或問一篇發明殆盡而世之論者猶或疑信相半未肯一洗舊聞力求本心以至今議論紛然不一以愚測之彼但謂致良知工夫未免專求於內將古人讀書窮理禮樂名物古今事變都不講求此全非先生本㫖夫學有體有要不先於體要而欲從事於學謬矣譬之讀書窮理何嘗不是如我意在於讀書則講習討論莫非致知莫非格物吾意在於事親則溫凊定省服勞奉養莫非致知莫非格物故物格則知至知至則意誠意誠則心正心正則身修此孔門一以貫之之學也晦翁晚年定論亦悔其向來所著亦有未到且深以誤已誤人為罪其答門人諸書可考也至於伊川門人亦疑格物之說非程子定論具載大學或問中是其說在當時己未免異同之議非至今日始相抵牾也或曰知行合一之說則既聞教矣先生又專提出致良知三字以為千古不傳之祕何也豫答之曰此先生悟後語也大學既言格致誠正中庸又專言慎獨獨即所謂獨知也程子曰有天德便可語王道其要只在慎獨意蓋如此孔門之學專論求仁然當時學者各有從入惟顔子在孔門力求本心直悟全體故易之復曰有不善未嘗不知知之未嘗復行顔氏之子殆庶幾焉此致良知一語蓋孔門傳心要訣也何也良知者吾人是非之夲心也致其是非之心則善惡真妄如辨黑白希聖希天别無路徑孔子云道二仁與不仁而已出乎此則入乎彼大學所謂誠意中庸所謂慎獨皆不外此此致良知之學先生所以喫緊語人自以為學聖要訣意固如此吾輩當深思之或曰陽明之學既自聖門正脈不知即可語聖人否豫答之曰昔人有問程子云孟子是聖人否程子曰未敢便道他是聖人然學已到至處先生早嵗以詩文氣節自負既有志此學乃盡棄前業確然以聖人為必可至然猶未免沿襲於宋儒之理語浸淫於二氏之虛寂龍場之謫困心衡慮力求本心然後真見千古以來人心只有此個靈靈明明圓圓滿滿徹古今通晝夜無內外無動靜常虛常寂常感常應不出獨知真體故後來只提出致良知三字開悟學者竊謂先生所論學脈直與程子所謂已到至處非過也或曰子謂我朝理學薛陳王三公開之然其學脈果皆同歟豫答之曰三子者皆有志於聖人者也然薛學雖祖宋儒居敬窮理之說而躬行實踐動準古人故其居身立朝皆有法度但真性一脈尚涉測度若論其人品蓋司馬君實之流也白沙之學得於自悟日用工夫已見性體但其力量氣魄尚缺開拓蓋其學祖於濓溪而所造近於康節也若夫陽明之學從仁體處開發生機而良知一語直造無前其氣魄力量似孟子其斬截似陸象山其學問脈絡蓋直接濓溪明道也雖然今之論者語薛氏則合口同詞語陳王則議論未一信乎學術之難明也已或曰陽明之學吾子以為得孔門正脈是矣然在當時其訾而議者不少至於剿擒逆濠其功誠大矣然至今尚憎多口此何故也豫答之曰從古以來忌功妒成豈止今日江西之功先生不顧覆宗滅族為國家當此大事而論者猶不能無忌心范陽之變𤣥宗歎河北二十四郡無一忠義應者當時非顔魯公兄弟起則唐社稷危矣宸濠蓄謀積慮藉口內詔左右親信皆其心腹其後乘輿親征江彬諸人欲挾為變先生深機曲算內戢凶幸外防賊黨日夜如對徑敵蓋先生苦心費力不難於逆濠之擒而難於調護乘輿之輕出也其後逆濠伏誅乘輿還京此其功勞誰則知之當其時內閣􅔷先生歸功本兵遂扼其賞一時同事諸臣多加黜削即桂公生長江西猶橫異議近來好事之徒又生一種異論至於金帛子女議公此又不足置辨先生平日輕富貴一死生方其疏劾逆瑾備受箠楚間關流離幾陷不測彼其死生之不足動又何金玊子女之云乎哉甚矣人之好為異論而不反視於事理之有無也善乎刑書鄭公之言曰王公才高學邃兼資文武近時名卿鮮能及之特以講學故衆口交訾蓋公功名昭揭不可蓋覆惟學術邪正未易銓測以是指斥則讒說易行媚心稱快耳今人咸謂公異端如陸子靜之流嗟乎以異端視子靜則游夏純於顔曽思孟劣於雄况矣今公所論叙古本大學傳習録諸書具在學者虛心平氣反覆融玩久當見之嗟乎使鄭公而愚人也則可鄭公而非愚人也則豈非後世之定論哉或曰近聞該部止擬薛文清公從祀王陳二公姑俟再定何也豫答之曰當時任部事者不能素知此學又安能知先生孔子大聖也其在當時羣而議者奚啻叔孫武叔輩孟子英氣下視千古當時猶不免傳食之疑我明理學尚多有人如三公者則固傑然者也乃欲進薛而遲於王陳其於二公又何損益陸象山在當時皆議其為禪而我世宗朝又從而表章之愚謂二公之祀舉不足論所可惜者好議者之不樂我國家有此盛舉也徴君鄧潛谷先生元錫鄧元錫字汝極號潛谷江西南城人年十三從黃在川學喜觀經史人以為不利舉業在川曰譬之豢龍隨其所嗜豈必膏粱耶年十七即能行社倉法以惠其鄉人聞羅近溪講學從之遊繼往吉州謁諸老先生求明此學遂欲棄舉子業大母不許舉嘉靖乙卯鄉試志在養母不赴計偕就學於鄒東廓劉三五得其㫖要居家著述成五經繹函史數為當路薦舉萬厯壬辰授翰林待詔府縣敦趣就道明年辭墓將行以七月十四日卒於墓所年六十六時心宗盛行謂學唯無覺一覺無餘蘊九思九容四教六藝桎梏也先生謂九容不修是無身也九思不慎是無心也每日辰起令學者靜坐收攝放心至食時次第問當下心體語畢各因所至為覺悟之先生之辨儒釋自以為發先儒之所未發然不過謂本同而末異先儒言釋氏之學於敬以直內則有之矣義以方外則未之有也又曰禪學只到止處無用處又曰釋氏談道非不上下一貫觀其用處便作兩截先生之意不能出此但先儒言簡先生言繁耳鄧潛谷雜著近世心宗盛行說者無慮歸於禪乘公祖獨揭天命本能純粹至善為宗異於諸法空相以格物日可見之行以有物有則為不過物之㫖異於空諸所有此公祖深造獨得之㫖而元錫竊自附於見知者也今改而曰蕩清物欲竊以為物不可須臾離誠者物之終始內而意心身知外而家國天下無非物者各有其則九容九思三省四勿皆日用格物之實功誠致行之物欲自不得行乎其中此四科六藝五禮六樂之所以教也復許敬菴曲禮稱敖不可長欲不可縱敖欲即物不可長不可縱即物之則不長敖縱欲即不過乎物則去欲固格物中之一事同上心之著於物也神為之也心之神上炎而外明猶火狀得膏而明得薰而香得臭腐而羶故火無體著物以為體心無形著物以為形而其端莫大於好惡物感於外好惡形於內不能內反則其為好惡也作而平康之體微故聖門之學止於存誠精於研幾幾者神之精而明微而幽者也非逆以知來反以退藏未之或知也孔門之論性曰至善論幾曰動之微言好惡不作則無不康也無不平也神凝而定知止而藏又何感應之為纍矣夫浮由氣作妄緣見生者也氣之善者十之五見之善者十之三神為氣揚知隨見流譬諸觀火乎目熒熒而心化矣故神不浮則氣歸其宅見不執則知反其虛古人所以日兢兢於克己舍己擇中用中而不能自己也報萬思默古學平易簡實不離日用誠明二字實其樞紐近裏著已時時從獨覺處著察俾與古人洞無間隔寄王秦關書承諭學不分內外寂感渾然天則此極則語苐云默自檢㸃內多遷移雖吾丈檢身若不及之誠而以真性未晤真功未精為疑是猶惑於近學謂一悟皆真亦狃於故學為功深始得耶又云過此一關想有平康之路似猶懸臆竊意平康之體即所謂無內外寂感渾然天則迫在目前不可得離者而人心之危無時無鄉即在上聖猶之人也則心猶之人何能無遷移過則矣乎惟在上聖精一之功一息匪懈而所為學者又精之一之無一息離乎平康正直之體故內外寂感渾然一天才有流轉自知自克此古人所以死而後已者也一息懈者肆矣安肆日偷於平康之則逺矣則平康實際固非可一悟皆真平康本體又豈緣功深而得耶寄王秦關書昔東廓先生以先公墓表詣陽明公而䖍州夜雪渙然仁體以為世儒宗今我公以先公墓石詣敬菴公祖而苕溪暑雨淪浹深至當必有相視一笑者答張親屏書高公學南太學時二先生說盛行增城官南太宰稱湛氏學矣公往造業投刺見閽者擲筆抵掌歎蓋歆之也問焉指尺牘曰是赫蹄所請請書地直纍千金者也公曰亟反吾刺是於所謂天理何居乎不見而反王門高第弟子官郎署名王氏學有聲公造焉於彈碁時得其人慧而多機退歎曰郎多機而慧名良知弊安所極哉亦竟謝不復往於是就高陵吕先生於奉常邸學焉王稚川行狀常存戒慎恐懼則心體自明勿任意必固我則物宜自順問知曰先自知問仁曰先自愛問勇曰先自强而以毋自欺為致知如惡惡臭如好好色為格物尤吾所未發立本深矣二條同上餘姚之論信本心之知已過故增城以為空知增城以勿忘勿助之間即為天理故餘姚以為虛見然餘姚言致知未嘗遺問思辨行專之者過遂以為空知增城言勿忘勿助時天理自見語固未嘗不確也蓋權衡已審而世有求端於一悟謂即悟皆真有觀察即為外馳有循持即為行仁義則痛闢之以為蔽陷虛蕩妨教而病道論儒釋書辱諭又覆於儒釋異同之辨開示覺悟厚幸厚幸自釋氏之說興而辨之者嚴且千數百年於此矣則聖學不明之過也聖學之不明者由於不擇而不精彼其為道宏濶勝大其為言深精敏妙其為實日用平等其為虛交融遍徹其為心十方三界其為教宏濟普度漢拾其苴晉揚其瀾入唐來遂大發其窔奧世之為儒學者高未嘗扣其閫奧卑未嘗涉其藩籬其甚者又陽攻其名而隂攘其實宜拒之者堅而其為惑滋不可解也是故昌黎韓子推吾道於仁義而斥其教以為不耕不蠶不父不君有衛道功矣考亭朱子則謂以粗而角精以外而角內固無以大厭其心也至其卓然自信於精一不惑者代不數人而約之數端有以為主於經世主於出世而判之以公私者矣有以為吾儒萬理皆實釋氏萬理皆虛而判之以虛實者矣有以為釋氏本心吾儒本天而判之以本天本心者矣有以為妄意天性不知範圍天用以六根之微因緣天地而誣之以妄幻者矣有以為厭生死惡輪回而求所謂脫離棄人倫遺事物而求明其所謂心者矣是舉其精者內者以剖析摘示俾人不迷於所向而深於其道者亦卒未能以終厭其心也夫聖人之學惟至於盡性至命天下國家者皆吾性命之物修齊治平者皆吾盡性至命中之事也不求以經世而經世之業成焉以為主於經世則有意矣佛氏之學唯主於了性明心十方三世者皆其妙覺性中之物慈悲普度者皆其了性命中之事也無三界可出而出世之教行焉以為主於出世則誣矣吾儒理無不實而無方無體易實言之無聲無臭詩實言之則實者曷嘗不虛釋氏理無不虛而搬柴運水普見真如坐卧行住悉為平等則虛者曷嘗不實釋氏之所謂心指夫性命之理妙明真常生化自然圓融遍體者言之即所謂天之命也真異名耳而直斥以本心不無辭矣夫其為妙明真常之心也則天地之闔闢古今之往來皆變化出入於其間故以為如夢如幻如泡如影而其真而常者固其常住而不滅者也豈其執幻有之心以起滅天地執幻相之相以塵芥六合也乎其生死輪回之說則為世人執著於情識沉迷於嗜欲頃刻之中生東滅西變現出沒大可憐憫欲使其悟夫性命之本無生死無輪回者而拔濟之為迷人設也其棄人倫遺事物之迹則為世人執著於情識沉迷於嗜欲相攻相取膠不可解故羣其徒而聚之令其出家以深明夫無生之本而上報四恩下濟三塗如儒者之聚徒入山耳為未悟人設也至於枯寂守空排物逆機彼教中以為支辟見元見妙靈怪恍忽彼教中以為邪魔而儒者一舉而委之於佛彼方慈憫悲仰𢎞濟普度而吾徒斥之以自私自利彼方心佛中間泯然不立而吾徒斥之以是內非外即其一不究其二得其言不得其所以言彼有啞然笑耳又何能大厭其心乎乃其豪釐千里之辨則有端矣蓋道合三才而一之者也其體盡於隂陽而無體故謂之易其用盡於隂陽而無方故謂之神其燦然有理謂之理其粹然至善謂之性其沛然流行謂之命無聲無臭矣而體物不遺不見不聞矣而莫見莫顯是中庸之所以為體異教者欲以自異焉而不可得也聖人者知是道之盡於心是心若是其微也知此而精之之謂精守此而固之之謂一達此於五品五常百官萬務之交也之謂明倫之謂察物變動不拘周流六虛矣而未始無典常之可揆成文定象精義利用矣而未始有方體之可執故無聲無臭無方無體者道之體也聖人於此體未嘗一毫有所增是以能立天下之大本有物有則有典有禮道之用也聖人於此體未嘗一毫有所減是以能行天下之達道立大本行達道是以能盡天地人物之性而與之參易象其理詩書禮樂春秋致其用猶之天然上天之載無聲無臭而四時百物自行自生也故窮神知化而適足以開物成務廣大悉備而不遺於周旋曲折幾微神明而不出於彛常物則三至三無而不外於聲詩禮樂上智者克復於一日夕死於朝聞而未始無密修之功中下者終始於典學恆修於困勉而未始無貫通之漸同仁一視而篤近以舉逺泛愛兼容而尊賢以尚功夫是以範圍不過曲成不遺以故能建三極之大中釋氏之於此體其見甚親其悟甚超脫敏妙矣然見其無聲臭矣而舉其體物不遺者一之於無物見其無覩聞矣而舉其生化自然者一之於無生既無物矣而物之終不可得無者以非有非無而一之於幻妄既無生矣而生之不終可得盡者以為不盡而盡而一之於滅度明幻之為幻而十方三界億由旬劫者此無生之法界也明生之無生而胎卵濕化十二種生者此無生之心量也𢎞濟普渡者此之謂濟也平等日用者此之謂平也圓覺昭融此之為覺也雖其極則至於粟粒之藏真界乾屎撅之為真人噓氣舉手瞬目揚眉近於吾道之中庸而吾學之道中庸者終未嘗以庸其慮雖其授受至於拈花一笑棒喝交馳擬議俱泯心行路絶近於聖門之一唯而吾學之盡精微者終未嘗以嬰其心雖其行願至於信住回向層次階級近於聖門之積纍而聖門之詩書禮樂經緯萬古者終未嘗一或循其方雖其功德至於六度萬行普濟萬靈近於聖門之博愛而聖門之九經三重範圍曲成者終未嘗一以研諸慮益悟其無矣而欲以無者空諸所有悟其虛矣而欲以虛者空諸所實欲空諸有而有物有則有典有禮者不能不歸諸幻也欲空諸所實而明物察則惇典庸禮者不能不歸諸虛也故其道虛濶勝大而不能不外於倫理其言精深敏妙而不能開物以成務文中子曰其人聖人也其教西方之教也行於中國則泥誠使地殷中土人集靈聖神迹怪異理絶人區威證明顯事出天表信如其書之言然後其教可得而行也今居中國之地而欲行西方之教以之行已則髠髮緇衣斥妻屏子苦節而不堪矯異而難行也然且行之斯泥矣以之處物則久習於初學毁禁等於持戒衆生齊於一子普濟極於含靈必外於斯世而生而後其說可通也處斯世斯生而欲以其說通之斯泥也以之理財則施舍盛而耕桑本業之教荒以之用人則賢否混而舉錯命討之防失以之垂訓則好大不經語怪語神荒忽罔象之教作烏往而不泥哉今所居者中國堯舜禹湯文武之所立也所業者六經堯舜禹湯文武之所作周公仲尼之所述也所以處者人倫庶物堯舜禹湯文武周孔之所修而明也乃欲信從其教而揚詡之亦為誕且惑矣况吾之修身格致以研精而不離明體誠正以守一而不違行願懲忿窒欲以去損而非有所減遷善改過以致益而非有所增愛惡不與於已而何有增愛視聽一間而何有净染精義至於入神理障亡矣利用所以崇德事障絶矣孝弟通於神明禮樂通於神化則舉其精且至者不旁給他借而足又何必從其教之為快哉僕少而局方壯未聞道逹者病其小亷曠者誚其曲謹約者病其泛涉乃中心恆患其有惑志也其於釋宗何啻千里而欲抽關於眇微析異同於疑似祗見其不知量也然為是縷縷者念非執事無以一發其狂言徵君章本清先生潢章潢字本清南昌人幼而穎悟張本山出趨庭孔鯉曾從詩禮之傳句即對大學曾參獨得明親之㫖十三嵗見鄉人負債縲絏者惻然為之代償與萬思默同舉業已而同問學有問先生近日談經不似前日之煩者先生曰昔讀書如以物磨鏡磨久而鏡得明今讀書如以鏡照物鏡明而物自見搆洗堂於東湖聚徒講學聘主白鹿洞書院甲午廬陵㑹講有問學以何為宗曰學要明善誠身只與人為善便是宗又問善各不齊安能歸併一路曰繼善成性此是極歸一處明善明此也如主敬窮理致良知言各不同皆求明性善之功豈必專執一說然後為所宗耶又問㑹友如何得力曰將我只個身子公共放在大爐冶中煆煉其習氣銷鎔其勝心何等得力入青原山王塘南曰禪宗欲超生死何如曰孔子朝聞夕死周子原始反終大意終始皆無便是儒者超生死處鄒南臯曰今之學者不能超脫生死皆緣念上起念各有牽絆豈能如孔子之毋意必固我曰意必固我衆人之通患毋意必固我賢者之實功孔子則並此禁止而絶之矣御史吳安節疏薦少宰楊止菴奏授順天儒學訓導萬厯戊申年八十二卒所著圖書編百二十七卷先生論止修則近於李見羅論歸寂則近於聶雙江而其最諦當者無如辨氣質之非性離氣質又不可覔性則與蕺山先師之言若合符節矣章本清論學語象山言宇宙便是吾心吾心便是宇宙南北海有聖人出焉此甚喜吾心得同聖人而作聖之功亦易為力於是舉日用之功惟從心所欲既而覺師心之非也始悟孔子之從心所欲有矩在焉始悟象山所謂聖無不同者不徒曰心而曰理指盡心之聖人而言之也今吾未識真心何敢遽同乎往聖往聖諄諄教人辨危微存亡之機求明此理之同然者以自盡焉耳然而未易辨也心之廣大舉六合而無所不包虎豹豺狼莫非生意而慈悲普度雖摩頂放踵在所必為皆心之廣大也心之精微析萬殊而無所不入垢穢瓦礫莫非妙道而探索隱僻雖鈎懸鏤塵剖析虛空皆心之精微也心之神明千變萬化而無所不用縱橫翕張莫非圓機而與世推移雖神通妙解倐忽流轉皆心之靈變也天理人欲同行異情焦火凝冰變幻靡定雖曰觀諸孩提之愛敬人生之初其心本無不善觀之行道乞人不受呼蹴梏亡之後本心未泯不知此乃聖賢多方引誘或指㸃於未喪之前或指㸃於既喪之後克念罔念聖狂攸分無非欲人自識其真心以自存也不然人莫不為孩提也曾有漸長不為物引習移者乎乞人不受呼蹴曾有永保此心而勿喪者乎近之論心學者如之何競指衆人見在之心即與聖人同也孔子之皓皓不可尚者以濯暴之而後有此也乃遽以衆人見在之習心未嘗暴濯者强同之立躋聖位非吾所知也書曰惟皇上帝降衷於下民若有恆性是下民之恆性即上帝之降衷孟子謂形色天性也是氣質即天性也孔子有物有則即形色天性之謂性固合有無隱顯內外精粗而一之者也後儒乃謂有氣質之性夫人不能離氣質以有生性不能外氣質以别賦也謂氣即性性即氣渾然無别固不可謂氣之外有性性之外有氣不免裂性與氣而二之何怪其分天地之性氣質之性而自二其性哉天地化生游氣紛擾參差萬殊故人之所禀清濁厚薄亦因以異是不齊者氣質也非氣質之性也氣質有清濁厚薄强弱之不同性則一也能擴而充之氣質不能拘矣陽明子曰氣質猶器也性猶水也有得一缸者有得一桶者有得一甕者局於器也水不因器之拘而變其潤下之性人性豈因氣質之拘而變其本然之善哉是氣也質也性也分言之可也兼言之可也謂氣質天性可也謂氣質之性則非矣謂人當養性以變化其氣質可也謂變化氣質之性以存天地義理之性則非矣問止之云者歸寂之謂乎曰於穆之體運而不息天之止也宥密之衷應而無方人之止也寂而未嘗不感感而未嘗不寂顯密渾淪淵浩無際故易以動靜不失其時發明止之義也何可專以寂言耶曰以至善為歸宿果有方體可指歟曰人性本善至動而神至感而寂虛融恢廓本無內外顯微之間而一有方所非至善也雖至善乃天理之渾融不可名狀而性善隨人倫以散見不待安排隨其萬感萬應各當天則而一真凝然無聚散無隱顯自爾安所止也曰知一也既云知止又云知本何也曰知為此身之神靈身為此神之宅舍是良知具足於身中惟本諸身以求之則根苖著土自爾生意條達故止即此身之止於善本即此善之夲諸身止外無本本外無止一以貫之耳萬物皆備於我今之談者必曰萬物之理皆備我之性致知格物必曰致吾心之知窮在物之理不識聖賢著述何為吝一理字必待後人增之而後能明其說也易謂乾陽物坤隂物中庸不誠無物亦將加一理字而後明乎理一分殊言各有攸當也自物之本末言之天下國家身心意知物之分殊何如也自事之終始言之格致誠正修齊治平事之分殊何如也然合天下國家身心意知而統之為一物合格致誠正修齊治平統之為一事而事之先惟在格物事物之理一為何如也且大學之道探本窮源惟在格物而身為物本一是皆以修身為本聖賢垂訓何其詳切簡明一至此哉諒哉物一而已矣無而未嘗無有而未嘗有一實而萬殊萬分而一本故一言以盡天地之道曰其為物不二則其生物不測易曰乾知大始坤作成物又曰復以自知復小而辨於物合而觀之知果一乎否也物果一乎否也知之與物一乎否也真信其體之一則用自不容以不一皆不待辨而自明矣天命之於穆不已也人性之淵淵浩浩不覩不聞也欲從而形容之是欲描畫虛空而虛空何色象乎雖然虛空不可描畫矣而虛空萬物之有無不可以形容其近似乎彼由太虛有天之名則太虛即天也雷風雨雪亦莫非天也雷風之未動雨雪之未零寂然杳然一太虛而已矣時乎雷之震風之噓雨之潤雪之寒隂陽各以其時不其冲然太和矣乎自雷風雨雪之藏諸寂謂之為太虛也太虛本含乎太和之氣謂其本無此雷風雨雪不可也何也及其有也由太虛而出非自太虛之外來也自雷風雨雪之動以時謂之為太和也太和即寓於太虛之中謂其始有此雷風雨雪不可也何也方其無也未嘗不太和特不可以太和名也是太虛之中本自有太和者在而太和之外未嘗别有太虛者存太虛太和名有不同天則一而已矣太虛太和亦一而己矣可見喜怒哀樂一人性之雷風雨雪也喜怒哀樂之未發謂之中非人之太虛乎發皆中節非人之太和乎太虛之中眹兆莫窺而無一不包無一非天未發之中冲漠無眹而何一不備何一非性乎故未發非無也特不可以有言也雖由已之所獨知也然默而識之無形之可覩無聲之可聞亦廓然太虛而已矣及一有所感遇可喜而喜遇可怒而怒遇可哀而哀遇可樂而樂發雖在我而一無所與記曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也則是發非有也特不可以無言也盎然太和而已矣是發與未發皆自喜怒哀樂言雖謂未發即性之未發發即性之發焉亦可也若舍此而别求未發之體則惑矣言性之故如故我故人故物故事皆因其舊所有者言之也仁義禮智非由外鑠我也我固有之也是以故言性也而故者以利為本何也仁乃性之故也乍見入井之怵惕睨視之顙泚而惻隱即故之利也義乃性之故也乞人不受呼蹴妻妾相泣中庭而羞惡即故之利也孩提知能不待學慮乃其性之故莫不知愛敬其親長即其故之利也雖梏亡之後而夜氣之好惡相近亦莫非其故之利也惟其故之利所以又曰乃若其情則可以為善矣情善才亦善故之所以利也歟是利之云者自然而然不容一毫矯强作為於其間耳順性而動則利强性而動則不利而鑿矣雖然戕賊杞栁搏激乎水其為鑿易知也至於性無善無不善不有似於故之利乎彼以無為宗并情才知能悉以為流行發用而掃除之是其鑿也更甚夫不慮而知非無知也不學而能非無能也無欲其所不欲如無欲害人之類是也并欲立欲達而無之可乎無為其所不為如無為穿窬之類是也并見義而不為焉可乎行所無事特無事智巧以作為之云耳并必有事焉而無之可乎指㸃夲體仁即是心指㸃工夫義即是路一事合宜即此心之運用也一時合宜即此心之流行也然則事事合宜非即事事心在而為仁之體事不遺乎時時合宜非即時時心在而為仁之與時偕行乎道之得名謂共由之路也南之粵北之燕莫不各有蕩平坦夷之途而聖仁義之途皆實地也在賢智者可俯而就在愚不肖者可企而及愛親敬長日用不知而盡性至命聖人豈能舍此而他由哉此教之所以近道之所以一也若二氏既以虛寂認心性因以虛寂為妙道曰旁日月挾宇宙揮斥八極神氣不變曰光明寂照無所不通不動道場周遍法界直欲縱步太虛頓超三界如之何可同日語也嘗觀諸天時物皆在其包涵遍覆中也然萬物異類矣並育不相害四時異候矣並行不相背孰主張是易曰乾知大始乾以易知宜乎有知莫天若也然天命本於穆也天載無聲臭也天之知終莫之窺焉人獨異於天乎故知一也在耳為聰在目為明在心為思為睿智也聲未接於耳聰與聲俱寂也然聽五聲者聰也雖既竭耳力隨其音響悉聽容之不淆焉似乎聰有定在矣即此以反聽之聰則畢竟無可執也茍自以為聰執之以辨天下之聲則先以自塞其聰何以達四聰乎色未交於目明與色俱泯也然見五色者明也雖既竭目力隨其形貌悉詳覩之不紊焉似乎明之有定方矣即此以反觀之明則畢竟無可象也茍自以為明執之以察天下之色則先已自蔽其明何以明四目乎思慮未萌睿智與事物而俱斂矣然神通萬變者思之睿也雖竭心思隨其事物以酬酢之而盡入幾微似乎睿智有所定矣即此以自反焉睿則畢竟無可窺也若自以為睿執之以盡天下之變則先已自窒其思何以無思無不通乎天地萬物之理皆具此心人之所以為人亦惟學存此心而已心寂而感者也感有萬端而寂貞於一是心之所以為心又惟寂而已學針四條一曰大學明德親民止至善中庸經綸立本知化育此是聖人全學庶幾學有歸宿一曰虞庭危微精一孔子操存舍亡此是心學正傳庶幾學有入路一曰顔子欲罷不能曾子死而後己此是為學真機庶幾不廢半塗一曰明道每思彛倫間有多少不盡分處象山在人情物理事變上用工夫此是為學實地庶幾不惑異端僉憲馮慕岡先生應京馮應京字大可號慕岡旴𣅿人也萬厯壬辰進士授户部主事改兵部稅監陳奉播惡楚中朝議恐地方激變移先生僉事鎮武漢黃三郡先生下車約束邑令於學宫曰邑故無礦而每邑嵗輸金四千餘緡豈天降地出乎吾以三尺從事矣於是邑令以無礦移稅監稅監雖怒而無以難也即走鄖襄以避先生辛丑孟春三司宴稅監陳奉兵舉炮思泄怒於先生百姓聚而噪之奉黨鈎其聚者殺傷百餘人先生因疏奉不法九大罪奉亦疏阻撓國課惡語相加詔遂逮先生下鎮撫司獄三楚之民叩闕鳴寃哭聲震地上不為省先生在獄四年與同事司李何棟如華珏講學不輟甲辰始出卒於家先生師事鄒東臯其拘幽書草皆從憂患之際言其得力棟如字子極號天玉官至太僕寺卿亦講學於廣陵則先生之傳也明儒學案卷二十四
