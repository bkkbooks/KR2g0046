body:
  text: 明儒學案卷九餘姚黃宗羲撰白沙學案二通政張東所先生詡張詡字廷實號東所南海人白沙弟子成化甲辰進士第飬病歸六年不出部檄起之授戶部主事丁憂纍薦不起正德甲戍拜南通政司左參議又辭一謁孝陵而歸卒年六十白沙以廷實之學以自然為宗以忘已為大以無欲為至即心觀妙以揆聖人之用其觀於天地日月晦明山川流峙四時所以運行萬物所以化生無非在我之極而思握其樞機端其銜綏行乎日用事物之中以與之無窮觀此則先生之所得深矣白沙論道至精微處極似禪其所以異者在握其樞機端其銜綏而已禪則並此而無之也奈何論者不察同類並觀之乎文集儒有真偽故言有純駁六經四書以真聖賢而演至道所謂言之純莫有尚焉者矣繼此若濂洛諸書有純者有近純者亦皆足以羽翼乎經書而啓萬世之蒙世誠不可一日而缺也至於聖絶言湮著述家起類多春秋吳楚之君僭稱王者耳齊桓晉文假名義以濟其私者耳匪徒言之駁乎無足取也其蓁蕪大道晦蝕性天莫甚焉非蕩之以江海驅之以長風不可以入道也故我白沙先生起於東南倡道四十餘年多示人以無言之教所以救僭偽之弊而長養夫真風也其恆言曰孔子大聖人也而欲無言後儒弗及聖人遠矣而汲汲乎著述亦獨何哉雖然無言二字亦著述也有能超悟自得則於斯道思過半矣然則六經四書亦剩語耳矧其他乎而世方往往勸先生以著述為事而以缺著述為先生少之者蓋未之思耳今則詩集出焉而人輒以詩求之文集出焉而人輒以文求之自非具九方臯之目而能得神駿於雌黃牝牡之外者或寡矣詡誠懼夫後修者復溺於無言以為道也因托先生文集中語倣南軒先生傳道粹言例分為十類而散入之其間性命天道之微文章功業之著修為持治之方經綸幹運之機靡不燦然畢具輯成名曰白沙先生遺言纂要凡十卷庶觀者知先生雖尋常應酬文字中無非至道之所寓至於一動一靜一語一默無非至教蓋可觸類而長焉由是觀之先生雖以無言示教而卒未嘗無言是以言焉而言無不中有純而無駁其本真故也是可以佐聖經而補賢傳矣白沙遺言纂要序昔呂原明嘗稱正叔笑人專取有行不論知見又説世人喜説某人只是説得又云説得亦大難而以為二程學遠過衆人類此夫知之真則守之固不真而固冥行而已矣夢説而已矣吾恐其所謂介者非安排則執滯抑何以得乎無思無為之體執乎日往月來之機通乎陽舒隂慘之變化神之心而妙之手以圓成夫精微廣大之道也哉介石記豫少從先君宦遊臨川沿塘植柳偃仰披拂於朝煙暮雨之間千態萬狀可數十本塘之水微波巨浪隨風力強弱而變化可數十丈鶯燕之歌吟魚蝦之潛躍雲霞之出沒不可具狀則境與心礙既塊然莫知其樂之所以稍長讀昔人柳塘春水漫及楊柳風來面上吹之句則心與句得又茫然不知其妙之所寓近歲養疴之餘專靜久之理與心會不必境之在目情與神融不必詩之出口所謂至樂與至妙者皆不假外求而得矣柳塘記子思所謂至誠無息即逝者如斯夫不舍晝夜之意全體呈露妙用顯行惟孔子可以當之在學者則當終日乾乾也至於心無所住亦指其本體譬如大江東下沛然莫之能禦小小溪流便有停止才停止便是死水便生臭腐矣今以其本體人人皆具不以聖豐而愚嗇此孟子所以道性善而程子以為聖人可學而至也學者不可以不勉也范書格物真隂陽不住之説正孔子博文之意欲其博求不一之善以為守約之地也其意旨各有攸在復乾亨士之所守義利毫末之辨以至生死趨舍之大實在志定而守確堅之一字不可少也至於出處無常惟義所在若堅守不出之心以為恆斯孔子所謂果哉也其可乎復曹梧丹天旋地轉今浙閩為天地之中然則我百粵其鄒魯與是故星臨雪應天道章矣哲人降生人事應矣於焉繼孔子絶學以開萬世道統之傳此豈人力也哉若吾師白沙先生蓋其人也先生以道德顯天下天下人向慕之不敢名字焉共稱之曰白沙先生先生生而資稟絶人幼覽經書慨然有志於思齊間讀秦漢以來忠烈諸傳輒感激齎咨繼之以涕洟其向善蓋天性也壯從江右吳聘君康齋遊激厲奮起之功多矣未之有得也暨歸杜門獨掃一室日靜坐其中雖家人罕見其面如是者數年未之有得也於是迅掃夙習或浩歌長林或孤嘯絶島或弄艇投竿於溪涯海曲忘形骸捐耳目去心智久之然後有得焉於是自信自樂其為道也主靜而見大蓋濂洛之學也由斯致力遲遲至於二十餘年之久乃大悟廣大高明不離乎日用一真萬事本自圓成不假人力其為道也無動靜內外大小精粗蓋孔子之學也濂洛之學非與孔子異也中庸曰誠者天之道也誠之者人之道也誠者誠之其理無二而天人相去則遠矣由是以無思無為之心舒而為無意必固我之用有弗行行無弗獲有弗感感無弗應不言而信不怒而威故病亟垂絶不以目而能書不以心而能詩天章雲漢而諧金石胡為其然也蓋其學聖學也其功效絶倫也固宜或者以其不大用於世為可恨者是未知天也天生聖賢固命之以救人心也救人心非聖功莫能也聖功叵測其可以窮達限耶且治所以安生也生生而心死焉若弗生也吾於是乎知救人心之功大矣哉孟子曰禹稷顏回同道韓子曰孟子之功不在禹下此之謂也先生雖窮為匹夫道德之風響天下天下人心潛移默轉者衆矣譬如草木一雨而萌芽者皆是草木蓋不知也其有功於世豈下於抑洪水驅猛獸哉若此者天也非人力也白沙先生墓表諫議賀醫閭先生欽賀欽字克恭别號醫閭世為定海人以戎籍𨽻遼之義州衛少習舉子業輒鄙之曰為學止於是耶登成化丙戌進士第授戶科給事中因亢旱上章極諫謂此時遊樂是為樂憂復以言官曠職召災自劾尋即告病歸白沙在太學先生聞其為已端默之旨篤信不疑從而稟學遂淡然於富貴故天下議白沙率人於偽牽連而不仕則以先生為證搆小齋讀書其中隨事體驗未得其要潛心玩味杜門不出者十餘年乃見實理充塞無間化機顯行莫非道體事事物物各具本然實理吾人之學不必求之高遠在主敬以收放心勿忘勿助循其所謂本然者而已故推之家庭里閈間冠昏喪祭服食起居必求本然之理而力行之久久純熟心迹相應不期信於人而人自信有邊將詐誘殺為陳獲者見先生即吐實曰不忍欺也城中亂卒焚劫不入其坊先生往諭之衆即羅拜而泣曰吾父也遂解散其至誠感人如此正德庚午十二月卒年七十四先生之事白沙懸其像於書室出告返面而白沙謂先生篤信謹守人也别三十年其守如昨似猶未以凍解冰釋許之蓋先生之於白沙其如魯男子之學柳下惠與言行録門人於衢路失儀先生曰為學須躬行躬行須謹隱微小小禮儀尚守不得更説甚躬行於顯處尚如此則隱微可知矣門人有居喪而外父死或曰禮三年之喪不弔先生曰惡是何可已服其服而往哭之禮也言不易三年之服善惡雖小須辨别如睹黑白教諸女十二條曰安詳恭謹曰承祭祀以嚴曰奉舅姑以孝曰事丈夫以禮曰待娣姒以和曰教子女以正曰撫婢僕以恩曰接親戚以敬曰聽善言以喜曰戒邪妄以誠曰務紡織以勤曰用財物以儉有來學者言學些人事也好先生曰此言便不是矣人之所學唯在人事舍人事更何所學問靜極而動者聖人之復豈常人之心無有動靜乎曰常人雖當靜時亦不能靜此理無處不有無時不然人惟無私意間隔之則流行矣為學先要正趨向趨向正然後可以言學若趨向專在得失即是小人而已矣古之政事學問一貫事耳今人學自學政自政判而為二故所學徒誦説而已未嘗施之政事政事則私意小智而已未嘗本之學問也故欲政事之善須本之學問白沙後有書來謂其前時講學之言可盡焚之意有自不滿者聖人之法細密而不粗率如人賢否一見之便不言我已知其為人必須仔細試驗考察之今人一見便謂已得其實真俗語所謂假老郎也為學之要在乎主靜以為應事建功之本讀書須求大義不必纒繞於瑣碎傳注之間驕惰之心一生即自壞矣有一世之俗有一方之俗有一州一邑之俗有一鄉之俗有一家之俗為士者欲移易之固當自一家始今人見人有勉強把捉者便笑曰某人造作不誠實我嘗曰且得肯如此亦好了如本好色把持不好色如本好酒把持不飲酒此正矯揉之功如何不好若任情胡行只管好色飲酒乃曰吾性如此此等之人以為誠實不造作可乎世教不明言天理者不知用之人事言人事者不知本乎天理所以一則流於粗淺一則入於虛無有以私囑者先生正理喻之因謂門人曰渠以私意干我我却以正道勸之渠是拖人下水我却是救人上岸世風不善豪傑之士挺然特立與俗違拗方能去惡為善靜有資於動動有資於靜凡理皆如此如草木土石是靜物便皆自足不資於動物如鳥獸之類便須食草棲木矣故凡靜者多自給而動者多求取故人之寡欲者多本於安靜而躁動營營者必多貪求也人於富貴之關過不得者説甚道理今之讀書者只是不信故一無所得事之無害義者從俗可也今人以此壞了多少事天地間本一大中至正之道惟太過不及遂流於惡如喪葬之禮自有中制若墨氏之薄後世之侈皆流於惡者也故程子曰凡言善惡皆先善而後惡吏目鄒立齋先生智鄒智字汝愚號立齋四川合州人弱冠領解首成化丁未舉進士簡庶吉士孝宗登極王恕為吏部尚書先生與麻城李文祥壽州湯鼐以風期相許是冬值星變先生上言是皆大臣不職奄宦弄權所致請上修德用賢以消天變不報又明年鼐劾閣臣萬安劉吉尹直中官語以疏且留中鼐大言疏不出將併劾中官中官避匿尋有旨安直皆免先生與文祥鼐日夜歌呼以為君子進小人退則吉雖在不足忌也吉隂使門客徐鵬魏璋伺之會壽州知州劉概寓書於鼐言夢一叟牽牛入水公引之而上牛近國姓此國勢瀕危賴公復安之兆也鼐大喜出書示客璋遂劾鼐概及先生俱下詔獄先生供詞某等往來相會或論經筵不宜以寒暑輟講或論午朝不宜以一事兩事塞責或論紀綱廢弛或論風俗浮薄或論生民憔悴無賑濟之䇿或論邊境空虛無儲蓄之具議者欲處以死刑部侍郎彭韶不判案獲免謫廣東石城吏目至官即從白沙問學順德令吳廷舉於古樓村建亭居之扁曰謫仙其父來視責以不能祿養箠之泣受辛亥十月卒年二十六廷舉治其喪方伯劉大夏至邑不迎大夏賢之初王三原至京先生迎謂曰三代而下人臣不獲見君所以事事茍且公宜請對面陳時政之失上許更張然後受職又謂湯鼐曰祖宗盛時御史糾儀得面陳得失言下取旨近年遇事惟退而具本此君臣情分所由間隔也請修復故事今日第一著也二公善其言而不能用識者憾之奉白沙書克修書來問東溟幾萬里江門未盈尺妄以道沖而用之不盈之意答之未知先生之意果然耶不然則作者為郢書解者為燕説矣京師事智自知之但先生所處是陳太丘柳士師以上規模晚生小子腳根未定不敢援以為例耳然亦當善處之計不至露圭角也朱子答陳同父書云顏魯子以納甲推其命正得震之九四先生所推與之合耶果若此爻其於朱子何所當耶幸教讀石翁詩乾坤誰執仲尼權梗敢刪從己酉年大笠蔽天牛背穩不妨相過戊申前某録石翁詩止得己酉年所作御史陳時周先生茂烈陳茂烈字時周福之莆田人年十八即有志聖賢之學謂顏之克已曾之日省學之法也作省克録以自考登𢎞治丙辰進士第奉使廣東受業白沙之門白沙語以為學主靜退而與張東所論難作靜思録授吉安推官考績過淮寒無絮幕受凍幾殆入為監察御史袍服朴陋蹩􅍷一牝馬而自係風紀之重所過無不目而畏之以母老終養供母之外匡床敝席不辦一帷身自操作治畦汲水太守閔其勞遣二力助之閲三日往白守曰是使野人添事而溢口食也送之還日坐斗室體驗身心隨得隨録曰儒者有向上工夫詩文其土苴耳吏部以其清苦祿以晉江教諭不受又奏給月米上言臣家素貧寒食本儉薄故臣母自安於臣之家而臣亦得以自遣其貧非誠有及人之廉盡已之孝也古人行傭負米皆以為親臣之貧尚未至是而臣母鞠臣艱苦獨至臣雖勉心力未酬涓滴且八十有六來日無多臣欲自盡尚恐不及上煩官帑心竊未安奏上不允母卒亦卒年五十八白沙謂時周平生履歷之難與巳同而又過之求之古人如徐節孝者真百鍊金孝子也先生為諸生時韓洪洞問莆人物於林俊俊曰從吾從吾者彭韶字也又問曰時周洪洞曰以莆再指一書生耶俊曰與時周語沈疴頓去其為時所信如此長史林緝熙先生光林光字緝熙東莞人成化乙酉舉人己丑會試入京見白沙於神樂觀語大契從歸江門築室闕山往來問學者二十年白沙稱其所見甚是超脫甚是完全蓋是李大崖而外無有過之者嘗言所謂聞道者在自得耳讀盡天下書説盡天下理無自得入頭處終是間也甲辰復出會試中乙榜授平湖教諭歷兖州嚴州府學教授國子博士襄府左長史致仕年八十一卒初先生依白沙不欲仕晚以貧就平湖踰十年官滿來歸母氏無恙再如京師將求近地養親未及陳情遂轉兖州於是奏請改地冢宰不許未及一年而母氏卒白沙責其因升斗之祿以求便養無難處者特於語默進退斟酌早晚之宜不能自決遂貽此悔胸中不皎潔磊落也又言定山為窘所逼無如之何走去平湖商量幾日求活一齊誤了也然則平湖之出亦白沙之所不許况兖州乎其許之也太過故其責之也甚切耳記白沙語先生初築陽春臺日坐其中用功或過幾致心病後悟其非且曰戒愼與恐懼斯言未云偏後儒不省事差失毫釐間蓋驗其弊而發也曾論明道論學數語精要前儒謂其太廣難入嘆曰誰家繡出鴛鴦譜不把金針度與人先生教人其初必令靜坐以養其善端嘗曰人所以學者欲聞道也求之書籍而弗得則求之吾心可也惡纍於外哉此事定要覷破若覷不破雖日從事於學亦為人耳斯理識得為己者信之詩文末習著述等路頭一齊塞斷一齊掃去毋令半點芥蒂於胸中然後善端可養靜可能也始終一竟勿助勿忘氣象將日佳造詣將日深所謂至近而神百姓日用而不知者自此迸出面目來也州同陳秉常先生庸陳庸字秉常南海人舉成化甲午科遊白沙之門白沙示以自得之學謂我否子亦否我然子亦然然否茍由我於子何有焉先生深契之張東所因先生以見白沙有問東所何如白沙曰余知庸庸知詡年五十以荆門州同入仕蒞任五日不能屈曲即解官杜門不入城郭督學王𢎞欲見之不可得同門謝祐卒而貧先生葬之病革設白沙像焚香再拜而逝年八十六布衣李抱真先生孔修李孔修字子長號抱真子居廣州之高第街混迹闤闠張東所識之引入白沙門下先生常輸糧於縣縣令異其容止問姓名不答苐拱手令叱之曰何物小民乃與上官為禮復拱手如前令怒笞五下竟無言而出白沙詩驢背推敲去君知我是誰如何乂兩手剛被長官笞所由作也父沒庶母出嫁誣先生奪其産縣令鞫之先生操筆置對曰母言是也令疑焉徐得其情乃大禮敬詩字不蹈前人自為户牖白沙與之論詩謂其具眼嘗有詩曰月明海上開樽酒花影船頭落釣簑白沙曰後草年恐子長無此句性愛山水即見之圖畫人爭酬之平居管寧帽朱子深衣入夜不違二十年不入城兒童婦女皆稱曰子長先生間出門則遠近圜視以為竒物卒無子葬於西樵山西樵人祭社以先生配先生性不鑿相傳不慧之事世多附益之或問子長廢人有諸陳庸曰子長誠廢則顏子誠愚霍韜曰白沙抗節振世之志惟子長張詡謝祐不失謝天錫先生祐謝祐字天錫南海人白沙弟子築室葵山之下并日而食襪不掩脛名利之事纖毫不能入也嘗寄甘泉詩云生從何處來化從何處去化化與生生便是真元處卒後附祀於白沙按先生之詩未免竟是禪學與白沙有毫釐之差何時振先生廷矩何廷矩字時振番禺人為郡諸生及師白沙即棄舉子業學使胡榮挽之秋試必不可白沙詩云良友惠我書書中竟何如上言我所憂下述君所趨開緘讀三四亦足破煩汚丈夫立萬仞肯受尋尺拘不見柴桑人丐食能歡娛孟軻走四方從者數十車出處固有間誰能别賢愚鄙夫患得失較計於其初高天與深淵懸絶徒嗟吁運使史惺堂先生桂芳史桂芳字景實號惺堂豫之鄱陽人嘉靖癸丑進士起家歙縣令徵為南京刑部主事晉郎中出知延平府以憂歸再補汝寧遷兩浙鹽運使以歸先是嶺表鄧德昌白沙弟子也以其學授傳明應先生讀書鹿洞傅一見奇之曰子無苐豪舉為聖門有正學可勉也手書古格言以朂先生戄然嚮學之意自此始其後交於近溪天臺在歙又與錢同文為寮講於學者日力留都六載時談者以解悟相高先生取行其所知而止不輕信也其學以知耻為端以改過遷善為實以親師取友為佽助若夫抉隱造微則俟人之自得不數數然也天臺曰史惺堂苦行修持人也天臺以御史督學南畿先生過之卒然面質曰子將何先天臺曰方今為此官者優等多與賢書便稱良矣先生厲聲曰不圖子亦為此陋語也子不思如何正人心挽士習以稱此官耶拂衣而起天臺有年家子宜黜而留之先生曰此便是腳根站不定朝廷名器是爾作面皮物耶天臺行部值母諱日供帳過華先生過見之勃然辭去謂天臺曰富貴果能移人兄家風素朴舍中所見居然改觀矣其直諒如此天臺又曰平生得三益友皆良藥也胡廬山為正氣散羅近溪為越鞠丸史惺堂為排毒散先生在汝寧與諸生論學諸生或謁歸請益即輟案牘對之刺刺不休談畢珍重曰愼無辨髦吾言也激發屬吏言辭慷慨遂平令故有貪名聞之流涕翻然改行郡有孝女不嫁養父先生躬拜其廬民俗為之一變其守延平七日憂去而盡革從前無名之費若先生者不徒講之口耳矣明儒學案卷九
