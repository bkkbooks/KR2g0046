body:
  text: 明儒學案卷十四餘姚黃宗羲撰淅中相傳學案四布衣董蘿石先生澐附子榖董澐字復宗號蘿石晚號從吾道人海鹽人以能詩聞江湖間嘉靖甲申年六十八遊會稽聞陽明講學山中往聽之陽明與之話連日夜先生喟然歎曰吾見世之儒者支離瑣屑修飾邉幅為偶人之狀其下者貪叨爭奪於富貴利欲之場以為此豈真有所謂聖賢之學乎今聞夫子良知之説若大夢之得醒吾非至於夫子之門則虛此生已因何秦以求北面陽明不可謂豈有弟子之年過於師者乎先生再三而委質焉其平日詩社之友招之曰翁老矣何自苦先生笑曰吾今而後始得離於苦海耳吾從吾之好自號從吾丙戌嵗盡雨雪先生襆被而出家人止之不可與陽明守嵗於書舍至七十七而卒先生晚而始學卒能聞道其悟道器無兩費隱一致從佛氏空有而入然佛氏終沉於空此毫釐之異未知先生辨之否也董榖字碩甫嘉靖辛丑進士厯知安義漢陽二縣與大吏不合而歸少遊陽明之門陽明謂之曰汝習於舊説故於吾言不無抵牾不妨多問為汝解惑先生因筆其所聞者為碧里疑存然而多失陽明之意其言性無善惡陽明無善無惡心之體以之言心不以之言性也又言性之體虛而已萬有出焉故氣質之不美性實為之全體皆是性無性則併無氣質矣夫性既無善無惡賦於人則有善有惡將善惡皆無根柢與抑人生而靜以上是一性靜以後又是一性乎又言復性之功只要體會其影響俱無之意思而已信如斯言則莫不墮於恍忽想像所謂求見本體之失也學者讀先生之書以為盡出於陽明亦何怪疑陽明之為禪學乎董蘿石日省録凡事多著一分意思不得多著一分意思便涉於私矣澐嘗從先師往天柱峯一家樓閣髙明花竹清麗先生悅之異日曾以其地求售悔不成約既而幡然曰我愛則彼亦愛之有貪心而無恕心矣再四自克行過朱華嶺四五里始得淨盡先生言去欲之難如此今人只是説性故有異同之論若見性更無異同之可言求心録內不見已外不見人即是任理千病萬痛從妄想生故善學者常念此心在無物處知過即是良知改過即是致知恭默思道凡思道者則自然恭默非恭默以思道也若一時不在道則此心放逸而恭默之容無矣但要去邪念不必去思思皆吾心之變化也正如風雨露雷種種各别皆是太虛太虛非此則亦無體此雖可見然實無作為亦何從而見之也但有一毫厭人之心即謂之不敬稍有此心則人先厭我矣但依得良知禮法自在其中矣心無所希名之曰道見性是性橫逆之來自謗訕怒罵以至於不道之甚無非是我實受用得力處初不見其可憎所謂山河大地盡是黃金滿世間皆藥物也心無體也綱常倫理形質氣用與心為體舍萬象無太虛舍萬事無心矣分之則為物合之則為心見物便見心離物見心亦是見鬼此艮背行庭之義也費處即是隱不作體用看五星聚奎濂洛大儒斯出五星聚室陽明道行董碩甫碧里疑存震澤語録范元長曰此只是道體無窮先生曰道體有多少般在人如何見須是涵泳方有自得陳齊之有詩云間花落蕊競紅青誰信風光不暫停向此果能知逝者便須觸處盡相應蓋所謂道體即是仁也仁只是一團生生之意而其要本於慎獨慎獨而還其無聲無臭之天則萬物一體而純亦不已矣至此則潔淨精微而黏帶不生杳無朕兆而宛然可見聖人非見水乃自見其心也天下無性外之物而觸處相應雖遇磐石亦不舍晝夜矣豈必川哉事之所以前知者蓋前後時耳而理無前後萬古而上千世而下同一瞬耳惟因人之有念則念之所在遂隔生死而理之通逹無間者始昧矣故不起念便能前知下此一等則由數而得數與理通一無二但以數推則有所倚故不如至誠至誠之道如洪鐘未嘗有聲由扣乃有聲而其聲固未嘗無也故用則知不用則不知然既涉於知則未免係念故用便近於知不如不知之愈也胡太常秀夫因閲大成樂始悟金聲玉振非如注之所云也蓋樂按一聲八音並作齊起齊止不容斷續然必始編鐘而末編磬合八聲而成一聲故金石二音相去但有毫釐之間既要翕如又要純如又要曒如繹如又必自金以漸而至石所以為難條理云者既循序又和美且分明也蓋樂作一聲必主一字如大哉宣聖之類大字要如此條理哉字亦要如此條理字字相連如貫珠不許生澀而間斷謂之繹如若先擊鏄鐘後擊特磬何難之有况鏄鐘特磬古無是器而樂之器止乃是柷敔也主事陸原靜先生澄陸澄字原靜又字清伯湖之歸安人正德丁丑進士授刑部主事議大禮不合罷歸後悔前議之非上言臣以經術淺短雷同妄和質之臣師王守仁始有定論臣不敢自昧本心謹發露前愆以聽天誅詔復原官明倫大典成上見先生前疏惡其反覆遂斥不用先生以多病從事於養生文成語之以養德養身只是一事果能戒慎恐懼則神住氣住精住而長生久視之説亦在其中矣有議文成之學者先生條為六辨欲上奏文成聞而止之傳習録自曰仁發端其次即為先生所記朋友見之因此多有省悟蓋數條皆切問非先生莫肯如此吐露既吐露亦不能如此曲折詳盡也故陽明謂曰仁沒吾道亦孤致望原靜者不淺執父喪哀毁失明徐學謨以先生復官一疏不勝希用之念曲逢時好此亦責之太深矣大抵世儒之論過以天下為重而不返其本心之所安永嘉或問天下外物也父子天倫也瞽瞍殺人舜竊負而逃知有父而不知有天下也聖人復起不易斯言陽明所謂心即理也正在此等處見之世儒以理在天地萬物故牽挽前代以求凖則所以懸絶耳先生初錮於世論已而理明障落不敢終執前議也陽明知永嘉之為小人不當言責故不涉論為高先生已經論列知非改過使人皆仰豈不知嫌疑之當避哉亦自信其心而已尚書顧箬溪先生應祥顧應祥字惟賢號箬溪湖之長興人𢎞治乙丑進士授饒州府推官桃源洞寇亂掠樂平令以去先生單身叩賊壘出令賊亦解去入為錦衣衛經厯出僉廣東嶺東道事討平汀漳寇海寇郴桂寇半嵗間三捷宸濠亂定移江西副使分巡南昌撫循瘡痍招集流亡皆善後事宜厯苑馬寺卿山東右參政按察使右布政擢右副都御史巡撫雲南奔母喪不候代家居者十五年再起原任時方議征元江先生以那鑑孤豚困獸不可急會遷南兵部侍郎以去後至者出師布政徐波石死焉嘉靖庚戌升刑部尚書先生以例繁引之者得意為出入命郎官吳維嶽陸穩定為永例在曺中薦拔於鱗元美由是知名天下分宜在政府同年生不敢雁行先生以耆舊自處分宜不悅以原官出南京癸丑致仕又十二年卒年八十三先生好讀書九流百家皆識其首尾而尤精於算學今所傳測圓海鏡弧天算術授時厯撮要皆其所著也少受業於陽明陽明殁先生見傳習續録門人問答多有未當於心者作傳習録疑龍溪致知議略亦摘其可疑者辨之大抵謂良知者性之所發也日用之間念慮初發或善或惡或公或私豈不自知之知其不當為而猶為之者私欲之心重而恕已之心昏也茍能於一起之時察其為惡也則猛省而力去之去一惡念則生一善念矣念念去惡為善則意之所發心之所存皆天理是之謂知行合一知之非難而行之為難今曰聖人之學致良知而已矣人人皆聖人也吾心中自有一聖人自能孝自能弟而於念慮之微取舍之際則未之講任其意向而為之曰是吾之良知也知行合一者固如是乎先生之言以陽明知善知惡是良知為善去惡為格物為準的然陽明點出知善知惡原不從發處言苐明知善知惡為自然之本體故又曰良知為未發之中若向發時認取則善惡雜糅終是不能清楚即件件瞞不過照心亦是克伐怨欲不行也知之而後行之方為合一其視知行終判兩樣皆非師門之旨也侍郎黃致齋先生宗明黃宗明字誠甫號致齋寧波鄞縣人登正德甲戌進士第授南京兵部主事升員外郎諫上南巡請告歸除工部郎中不起嘉靖癸未補南刑部張孚敬議大禮在廷斥為姦邪先生獨曰繼統者三代通制繼嗣者王莽敝議今制公侯伯軍職承襲弟之繼兄姪之繼叔皆曰弟曰姪不曰子公侯伯如是天子何獨不然如其議上之出守吉安有能名轉福建鹽運使召修明倫大典丁母憂不行己丑升光祿寺卿輯光祿須知以進壬辰轉兵部右侍郎編修楊名言齋醮無驗徒開小人幸進之門上大怒戍名先生言名無罪出為福建參政明年冬召補禮部侍郎丙申十一月卒官先生受學於陽明陽明謂誠甫自當一日千里任重道逺吾非誠甫誰望耶則其屬意亦至矣與萬鹿園論學書學問思辨即是尊德性下手工夫非與篤行為兩段事如今人真有志於學便須實履其事中間行而未安思而未通者不得不用學問思辨之功學問懇切處是之謂篤行耳故必知行合一然後為真學學而真者知行必合一並進之説決無益於行亦非所以為知也故吾輩但於立志真偽處省察學問懈弛時鞕䇿即無不合不必區區於講説為也來諭以僕為格物者意未有非意而格物者分意與物為兩事僕未嘗有此見也蓋大學綱領雖有三而人已只一物初非有彼此也條目雖有八而工夫只一事初非有先後也天下國家身心意知物者其本體也格致誠正修齊治平者其工夫也吉凶悔吝生乎動動處乃善惡所萌獨知之地故惟誠意為實下手工夫意之本體無不知故格致即是誠意無事於聞見也意之所用無非物故致知在格物不落於虛無也此其大本大原聖人復起有所不能易者若曰格物便有格物致知便有致知不容以混言不惟分析支離破碎聖賢渾融之旨亦焉能有如此學問而能有得乎如曰孝曰弟曰慈乃父子兄弟所接之理其念動於父子兄弟為意孩提之愛親敬長為良知知之所向為物有物必有則不過其則之為格物不遏其知之為致知父必慈子必孝兄必友弟必恭之為誠意達之天下無不然之為仁義為性蓋人未聞道之先百姓日用而不知又何工夫之有一有求學之意即善善惡惡自能知之不待外求為善去惡亦在不自欺耳此所謂我欲仁斯仁至者何等簡易何等直截今顧欲外此而求之煩難獨何歟答林子仁書名春心齊弟子也接足下來諭謂此心之中無欲即靜遇事時不覺交戰便是得力所言甚善尚有不得不論者蓋無欲即靜與周子圖説內自注無欲故靜之説亦略相似其謂遇事時不覺交戰便是得力亦謂心中有主不為事物所勝云耳然嘗聞之程子曰為學不可不知用力處既學不可不知得力處周子曰養心莫善於寡欲寡之又寡以至於無正不在得力而在於知所以用力不在無欲而在寡欲耳學必寡欲而後無欲知用力而後知得力此其工夫漸次有不可躐而進者若執事所言恐不免失之太早僕之所謂主靜者正在寡欲正在求所以用力處亦不過求之於心體之於心驗之於心蓋心為事勝與物交戰皆欲為之纍僕之所謂主靜者正以尋欲所從生之根而拔去之如逐賊者必求賊所潛入之處而驅逐之也是故善學者莫善於求靜能求靜然後氣得休息而良知發見凡其思慮之煩雜私欲之隱藏自能覺察自能拔去是故無欲者本然之體也寡欲者學問之要也求靜者寡欲之方也戒懼者求靜之功也知用力而後得力處可得而言無欲真體常存常見矣中丞張浮峯先生元沖張元沖字叔謙號浮峯越之山陰人嘉靖戊戌進士授中書舍人改吏科給事中分宜入相先生言其心術不光不宜在天子左右又請罷遣中官織造遷工科都給事中諫世廟元修不視朝一時稱為敢諫出為江西參政廣東按察使江西左右布政使升右副都御使巡撫江西奉旨回籍又二年而卒年六十二先生登文成之門以戒懼為入門而一意求諸踐履文成嘗曰吾門不乏慧辨之士至於真切純篤無如叔謙先生嘗謂學者曰孔子之道一以貫之孟子之道萬物皆備良知之説如是而已又曰學先立志不學為聖人非志也聖人之學在戒懼謹獨不如是學非學也揭坐右曰惟有主則天地萬物自我而立必無私斯上下四旁咸得其平前後官江西闢正學書院與東廓念庵洛村楓潭聨講會以訂文成之學又建懷玉書院於廣信迎龍溪緒山主講席遂留緒山為文成年譜惟恐同門之士學之有出入也侍郎程松溪先生文德程文德字舜敷號松溪婺之永康人嘉靖己丑進士第二授翰林院編修同年楊名下詔獄方究主使而先生與之通書守者以聞上大怒誤逮御史陳九德先生自出承認入獄黜為信宜典史總督陶諧延主蒼梧書院移安福知縣升南京兵部主事轉禮部郎中丁艱起補兵部出為廣東副使未行轉南京國子祭酒擢都御史丁內艱起為禮部右侍郎移吏部左侍郎兼翰林院學士掌詹事府事上在齋宮侍臣所進青詞爭為媚悅獨先生寓意諷諫上不悅也會推南冡宰以先生辭疏為謗訕落職歸三十八年十一月卒年六十三萬厯間贈禮部尚書諡文恭先生初學於楓山其後卒業於陽明以真心為學之要雖所得淺深不可知然用功有實地也論學書來教謂木有根則枝葉花實不假外求人有志則本體不虧萬法具足雖聖人復起不能易也至謂擇善固執乃明覺之自然而與時偕行實大公順應之妙用亦未嘗不是但學問未真切者聞之未􅊵有遺落工夫之病蓋自然明覺則良知也擇善固執謂之致其良知則可也與時偕行固大公順應之妙用然非精義入神者未足以與此也天下事過則有害雨澤非不善也過多則潦其為害也與旱同今有意為善而任信自是者皆雨澤之潦者也故易曰尚於中行為善君子之常也而有意而自是則必淪於惡矣是好名之私纍之也此心不真辨説雖明畢竟何益自雞鳴而起以至嚮晦宴息無非真心則無非實功一話一言一步一趨皆受用處不然日談孔孟辨精毫釐終不免為務外為人之規爾大抵學問只是一真天之生人其理本真有不真者人雜之耳今只全真以反其初日用間視聽言動都如穿衣喫飯要飽要暖真心略無文飾但求其當才不是説影才不是弄精才不是聞見乃為解悟合一若信得此過即是致知即是慎獨即是求放心不然雖六經四書之言而非聖人之真心亦不免於説影弄精矣竊謂險夷順逆之來若寒暑晝夜之必然無足怪者已不當人必當之孰非已也是故君子之於憂患不問其致之而惟問其處之故曰無入而不自得茍微有介焉非自得也太常徐魯源先生用檢徐用檢字克賢號魯源婺之蘭溪人嘉靖壬戌進士除比部主事調兵部禮部至郎中出為山東副使左遷江西參議升陜西提學副使蘇松參政坐失囚降副使丁憂起補福建城福寧轉漕儲參政廣東按察使河南左布政遷南太僕寺卿復寺馬三分之一召入為太常寺卿兩載而回籍萬厯辛亥十一月卒年八十四先生師事錢緒山然其為學不以良知而以志學謂君子以復性為學則必求其所以為性而性囿於質難使純明故無事不學學焉又恐就其性之所近故無學不證諸孔氏又謂求之於心者所以求心之聖求之於聖者所以求聖之心蓋其時學者執心之精神謂之聖一語縱橫於氣質以為學先生以孔氏為的亦不得已之苦心也耿楚倥與先生談數日曰先生今之孟子也久之寓書曰願君執御無専執射天臺譯其意曰夫射必有的御所以載人也子輿氏願學孔其立之的乎孔子善調御狂簡行無轍迹故云執御吾仲氏欲門下損孟之髙為孔之大如斯而已楚倥信心之士其學與先生不合謂先生為孟子譏之也先生嘗問羅近溪曰學當從何入近溪諧之曰兄欲入道朝拜夕拜空中有人傳汝先生不悅後數年在江省糧署方治文移恍忽聞有唱者舜何人也豫何人也有為者亦若是先生大悟自是心地日瑩平生見解脫落在都門從趙大洲講學禮部司務李贄不肯赴會先生以手書金剛經示之曰此不死學問也若亦不講乎贄始折節向學嘗晨起候門先生出輒攝衣上馬去不接一語如是者再贄信向益堅語人曰徐公鉗錘如是此皆先生初學時事其後漸歸平實此等機鋒不復弄矣友聲編生人相與各有耳目心思則可以言語相通意氣感召若鬼神無形無聲言語意氣俱用不著惟是此心之齋明誠敬可以感通即此心之齋明誠敬可以通鬼神則於有生之類感之如運掌耳問存順歿寧寧與不寧何别哉曰余知聖人之下學上達俯仰無愧怍爾身有生死道有去來耶而又安能索之茫茫乎若曰寧與不寧靡有分别將錦衣肉食榮樂已足何取於茅茨土階蔬水曲肱也曰善不善者與化徂矣善惡不同徂有二耶曰辟之放言口舌之欲耳恣聲色耳目之欲耳一放一恣口舌耳目以為偷快此中揑扤也口舌耳目有成有壞此中揑扤可磨滅乎求之於心者所以求心之聖求之於聖者所以求聖之心人未能純其心故師心不免於偏雜聖人先得我心之同然故盡心必證之聖人至善者吾人本心之分量也原無欠缺不假安排心思之必至善猶目之必明耳之必聰日月之必照臨江河之必流行也人之精神自能用世自可出世作止語默日與天下相交接此所以用也而作止語默一率其本然之知能髙不參以意見而求異卑不入以貪欲而徇人終日廓然終身順應能之則為善而務遷之未能則為過而務改之久久成熟純乎率性之道所以用世而實出世也鄒瀘水云公以求仁為宗旨以學為實功以孔氏為正鵠而謂無事不學無學不證諸孔氏苐不知無所事之時何所為學而應務酬酢之煩又不遑一一證諸孔氏而學之躊躇倉皇反覺為適為固起念不化將何以正之曰君子以復性為學故必以學為修證而步趨孔子者亦非無所事事之時作何所學應務酬酢之際又一一證所學但惟日用尋常不分寂感務遜志時敏其間以會降衷之極久之將厥修乃來道積於厥躬蓋真際也子貢多學而識正坐一一以求證子夏之徒流而為莊周其學焉而就其性之所近未範圍於聖人故也髮膚骨骼知識運動是人所為生也而髮膚骨骼知識運動之表有所炯然而常存淵然而愈出廓然而無際者是人所以生也統言之曰道要言之曰仁以身任之曰志外此而富貴則為外物功名則屬影事蓋於毛髮骨骼知識運動者為相親而於炯然淵然廓然者無所與於毛髮骨骼知識運動相親者有盡者也可朽也於髮膚骨骼知識運動無所與者無盡者也不可朽也可朽者非三才之精而不可朽者實與天地合其德也蘭遊録語學無多岐只要還他本等如人之為人以有耳目聰明也聰是天聰明是天明於聰明之外更加損不得分毫髙者欲聽無聲之聲視無色之色然安能脫離聲色卑者或溺於淫聲邪色流蕩忘返皆失其本聰本明惟非禮勿視非禮勿聽是為合其本然乃見天則禮者天則也非人之所能為也如執定不信生死然則中庸何以言至誠無息將此理生人方有未生既化之後俱息耶抑髙明博厚悠久無疆之理異於天地耶吾道一以貫之若但理會念慮而不能流貫於容色詞氣畢竟是工夫滯塞之病學者多喜談存本體曰此體充塞宇宙如何在方寸中執得此須常學常思吾輩尋常間直須將千古聖人精神都來體會過堯舜是如何文周孔孟是如何以下儒者是如何此非較量人物正是要印正從違若只在一處摸索測度如何呌做學問思辨問先生既不非生死之説何不専主之而曰性曰學何也曰性率五常學求復性大公至正之道也如此而生如此而死何不該焉専言生死生寄死歸自私可矣淺深原無兩路即如父子君臣夫婦之倫合內合外之道此日用尋常何等淺近然此理不涉人為天則自在故謂之淵淵其淵於此得力方是下學上達悟者悟此密者密此有無之間原是本然執之反滯是謂知識之害囂囂言自得也必尊德樂義斯可以自得德義有何名象即吾輩此時行坐謙讓必要相安精神和適不滯是即所謂德義也德義已所自有也得已者得其心也造化生草木鳥獸都一定不可移易人則耳目口鼻生來只是一樣更不分别希聖希賢由人自願可見造化待人甚厚人可不思仰承天意耶問生死之説曰辟如朋友在此若不著實切磋别後便有餘憾存順沒寧亦復如是問何謂之天下之大本曰適從外來見街頭孩子被母痛笞孩子呌苦欲絶已而母去孩子牽母裾隨之而歸終不忍舍是非天下之大本乎問匹夫修道名不出於閭里何以使一世法則曰即如吾輩在舟中一事合道千萬世行者決不能出此範圍一言合道千萬世言者決不能舍此法度茍不如此其行必難寡悔其言必難寡尤此之謂世法世則學者不消説性體如是如是只當説盡性之功如何如禹治水何曽講水清水濁水寒水溫只是道之入於海耳若但説水如何縱令辨淄澠分三峽畢竟於治水之事分毫無與人之為小人豈其性哉其初亦起於乍弄機智漸習漸熟遂流於惡而不自知問學問安得無間斷先生曰學有變者有不變者如諸公在齋閣靜坐是一段光景此時會講是一段光景明旦趨朝又是一段光景朝罷入部寺治事又是一段光景此其變者也然能靜坐能會講能趨朝能治事却是不變者吾儕於此正須體會於其變者體會得徹則應用不滯於其不變者體會得徹則主宰常寧二者交參吾心體無間學問亦無間自無始概之人生百年如一息自萬有計之人於其中為一塵然此一息一塵在自己分上蓋其大無外其久無窮也學者於此可無周公之仰思大禹之惜陰耶孔門之求仁即堯舜之中大學之至善而中庸所謂未發之中也故専求性或涉於虛圓而生機不流専求心或涉於情欲而本體易淆惟仁者性之靈而心之真先天後天合為一致形上形下會為一原凝於沖漠無朕而生意盎然洋溢宇宙以此言性非枯寂斷滅之性也達於人倫庶物而真體湛然逈出塵纍以此言心非知覺運動之心也故孔子専言仁傳之無弊問大人不失其赤子之心曰自孩提至壯老其不同者才識之逺近經歷之生熟耳若其天然自有之心安所不同在孩提為不學不慮在大人為存神過化如干霄之木仍在萌蘖時生意原未曽改換此古學也古人從赤子所固有者學去故從微至著由誠而形自可欲至於大而化之總不失其固有之心後人從赤子所未有者學去故氣力日充見聞日廣知識日繁而固有之心愈久愈失其真不為庸人則為小人已矣與友人坐夜分先生曰群動既息天籟自鳴鳴非外也聽非內也天人一也一此不已也通乎晝夜之道而知此其庶幾乎吳康齋謂三綱五常天下元氣一身一家亦然無元氣則天下國家墮矣學者要知以綱常為重扶綱常所以扶元氣也即使舉世皆亂大丈夫能自任以綱常之重即一人赤手可扶元氣立志既真貴在發腳不差發腳一差終罔走路徒自罷苦終不能至問安得不差先生震聲曰切莫走閉眼路人性之虛而且靈者無如心與耳目目之所視不離世間色然其視之本明不染於色耳之所聽不離世間聲然其聽之本聰不雜於聲心之所思不離世間事然其思之本覺不溷於事學人誠能深心體究豁然見耳目心思之大原而達聰明睿知之天德則終日視不為色轉即出此色塵世界終日聽不為聲轉即出此聲塵世界終日思不為事轉即出此法塵世界雖曰戴天履地友人群物已超然天地民物之外如此出世豈不簡易未達此者縱􅍆身世走至非非想處亦是生死中人明儒學案卷十四
