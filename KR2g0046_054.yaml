body:
  text: 明儒學案卷五十四餘姚黃宗羲撰諸儒學案下二盧冠巖先生寧忠盧寧忠字獻甫號冠巖嶺南人也曽守東牟不詳其所至官先生受業於黃泰泉泰泉議王湛之學而先生以不得及陽明之門為憾於甘泉則書札往來求教不一也先生謂天地間有是氣則有性性為氣之官而綱維乎氣者是矣然不知此綱維者即氣之自為綱維因而名之曰性也若别有一物以為綱維則理氣二矣又以誠意之意是生理之初萌純粹至精即周子誠神幾之幾也其視意為有善有惡者加功密矣頗與子劉子之言意同然子劉子以意藴於心知藏於心意中最初之機則知善知惡之知是意為存主知為初萌先生之所謂意乃子劉子之所謂知也雖同在未發之中而其先後之序有不容紊亂者獻子講存夫物猶事也事在心不在外凡吾心所著之事即是物格者隨此心所著之事而格其善惡一定之理也夫事之在心是非善惡必有當然一定之則於是以吾心本然之明覺而是正之則何者為善而當為何者為惡而當去舉不能外吾心之聰明與吾身之踐履矣是能格物陽明子謂無善無惡者心之體有善有惡者意之發知善知惡者知之良為善去惡者物之格蓋學求知孰善孰惡必不能為善而去惡如所云是先為善去惡而後求知善惡大學當以誠正居先而格物在致知之後矣此所以起學者之疑也陽明之學主致良知故只格物便一了百當然此上智之事非可概中才以下也後學推演其義者則曰知良知也虛靈不昧天之性也致者充極其虛靈之本體不以一毫意欲自蔽而明德在我也物格者感而遂通天下之故而修齊治平一以貫之明明德於天下也是以致知為體格物為用致知在先格物反居後未免於大學條次不倫且既無一毫意欲之蔽而充極乎天命之性即無事矣又何勞誠意於好善惡惡也耶至以鏡譬之謂知如鏡之明致則磨鏡格則鏡之照物夫鏡必磨而後照今格以照之而後致以磨之是先用之照而後磨也大學曷不言致知而後格物耶性者天之命心者性之宅性只是天地之性無所謂氣質之性性無不善其為不善氣雜之也心只義理之心無所謂利欲之心心無不正其為不正習移之也天地間有是氣則有是性性為氣之官而綱維乎氣者氣或時得而拘之不可得而泯之氣有不美性固能轉移之也人之所不慮而知者是為良知知即性也良知之發無有不善或流為邪妄心亦無不自知之但習於利欲而不能反正耳而謂其本心之不正者否也常戒懼則心體自明務平恕則物宜自順問生之謂性曰此古語也非始於告子也此語説得最是蓋生即氣氣便寓性孟子道性善以生為氣而深闢之是氣之外又别有所謂理者不分理氣為二乎至宋儒又有天地之性氣質之性之説遂使性亦有二而萬物無復統體一太極矣夫理者氣之綱氣者理之迹氣即寓理古未有以理氣並言者易曰一隂一陽之謂道釋之曰隂陽迭運者氣也其理則所謂道理氣並言蓋昉諸此夫隂陽五行萬物氣也而各一其性理也在人則耳目手足氣也而聰明持行理也程子曰性即氣氣即性蓋懼人二之也性即太極氣只是氣不可復言有氣質之性説著個性即無不善其為不善氣有雜糅而性為所纍耳氣之付畀得其貴者為人得其賤者為物得其清而純者為賢為智得其濁而駁者為愚為不肖曷能齊一而性則未嘗不一也孟子始終不能服告子之心為其論未及此問中庸説天命之性又説未發之中即孟子言性善否曰民受天地之中以生故性無不善而偏者非性也易稱繼之者善成之者性繼而曰善則成其有不善乎若乃隂陽變合而氣之流布不無清濁純駁之異故物之遇之自有通蔽邪正之殊其在天日月星辰巳不無明暗其在地山川土石已不無柔剛而况於人乎况於物乎而其本然之性則未嘗不善也是故學問之道惟在變化氣質易其惡而致其中所謂未發之中非以日用應務者為已發而指夫退然休息未與事接時為未發也蓋事物未來念慮未動要之必有主宰於其內渾然全體至靈而至寂不測而不倚是以虛無不受感之即通雖紛華盛麗萬變起滅而其寂然之本體則無時不寂然焉所謂未發之中非是之謂乎於此而得養則物欲無所蔽而發皆中節大本逹道貫通流行此盛德之所以日新天命之所以不已也致良知之旨非始於陽明也朱子謂康炳道曰致得吾心本然之知豈復有所陷溺本然之知非良知乎心不為物欲所陷溺不可入聖乎但朱子止就一義説陽明認得十分端的故執此一説左來右去直窮到底纍千萬而不離道心者天然自有之義理而非出於人心之外也人心者天然自有之情才而道心之用所以顯行也寂感之際茫然不知體察則其流而為邪妄直易然耳所謂危也然雖蔽於物欲流於邪僻而其本然之良隨處發見能察識而操存之固甚微而甚安也天命之性無聲無臭不睹不聞不可得而言也故以仁義禮智明之而性之本體因之可見所謂因用以明體也陽明先生之致良知當先辨於知也夫知有知覺之知有意見之知有本然之知昧者均以為良知夫知覺之知人與物一也有真率無節制意見之知萌於念慮善惡幾焉惟本然之知出於性天之靈覺不待學習童而知愛親長而知敬兄感觸而應孺子入井而怵惕見呼蹴之食無禮義之萬鍾而辭讓此謂本然之良知所當致焉者也致吾愛與不忍之知即無一念一事之非仁而萬物育矣致吾敬與辭讓之知即無一念一事之非義而萬民正矣知行一中人以上事也知而行中人以下事也君子之道雖費而實隱以見求道者但當於隱求之正不必泛求於費使有逺人為道之過也隱者無聲無臭之謂即莫見乎隱之隱言道之本體也道之本體不睹不聞即之無朕而萬物萬事萬象隨在各足伐柯之逺無他二故也二則徒費瞻忽無益於求也乃若反而求之則吾心自有一箇天則不落格式不煩比度所謂一也心外無道道不逺人也人之為道而逺人是逺心以為之故失之逾逺也丘未能一焉謂未能以心之所以教人致一也求事父之理於其子求事君之理於其臣求朋友之理於其先施之友求在外者也執柯以伐柯者也是二之也乃若心也者天之所以與我其一念至誠惻隱之意常一乎子臣弟友之間即忠恕也以此事父則夔夔齋栗者在我不必求事之之則於舜也以此心事君則周之至德者在我不必求事之之則於文王也以此心施之友則惠及朋友者在我不必求先施之則於武公也所謂一也心之本體渾然中涵不落方體若虛而甚實似寂而甚神才放下便沉滅昏雜才提起便知覺靈明自非私欲蔽錮梏之反覆其真體固在也此處正要體認不知體認却無倚著便落想像遇事感應愈加昏雜然則何妨於炯炯而欲常止止也但既體認得真却要存養得密常令在中勿致放失庶幾全體呈露大用顯行耳其謂知覺常止常定不可落念者為意必固我之私也其謂感應常運常化不可成念者為好樂夏患之不得其正也語其本體謂之未發語其感通謂之發若此心之靈則非待有所感發而後有知也學者涵養須於靜中覺得有物動時却自無事乃不偏著悟非意見想像之謂此心生機也生機發動則有自然之明覺惟澄心凝慮生機潛通是自然有得自然有得然後無思而無不通問大學於誠意以下皆有傳獨格致之義闕焉何也曰物也知也意也一物也格也致也誠也一事也由心之感曰物由心之靈曰知由心之萌曰意非異也蓋心一也即其感通之物而格之以致吾本然之知就吾意所知之物而好惡之必無自欺之蔽是謂格物致知誠意耳聖門之學內求故三者為一後人之學外求故三者支焉以三者各自為義則其以為闕也固宜記曰人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉釋者以為心之知因物生意從知起無內外無先後其致一焉者也記之物至非大學所謂物乎記之知知非大學所謂知乎記之好惡非大學所謂意乎可好可惡物也識其可好可惡知也好之惡之意也今如人之心其卒然以可好之物感也則心之靈雖不與物謀而即知其可好矣何者心之好之之理與物之可好者遇也如此則所以好之者當盡其知而止也而好之不如好好色是謂不致好之知不致好之知是謂不格物之善矣今如人之心其卒然以可惡之物感也則心之靈雖不與物謀而即知其可惡矣何者心之惡之之理與物之可惡者遇也如此則所以惡之者當盡其知而止也而惡之不如惡惡臭是謂不致惡之知不致惡之知是謂不格物之惡矣故格物非他也格吾知之物也格吾意之物也致知非他也致吾物之知也致吾意之知也誠意非他也誠吾物之意也誠吾知之意也雖然要之在於此心欺否之間耳故曰所謂誠其意者毋自欺也無自欺則如好好色如惡惡臭此謂之自慊矣夫是之謂物格夫如是之謂知致夫如是之謂意誠孟子曰萬物皆備於我矣反身而誠樂莫大焉惟萬物之理備於吾心故德性之知周於萬物反身而誠則萬物之備於我者格而德性之知致矣此之謂自慊蓋言樂也然則如之何亦於獨知之地謹之而已蓋德性之知我自有之有感之頃我自知之於此不用其謹惡乎用其謹哉問意者云何曰天地之大德曰生心則其生之理也意則其生理之初萌也天性純粹中此為最先端倪絶無一毫夾雜少頃即有許多計較遷就之私矣少有計較遷就即純粹端倪便不能直遂矣故大學教人誠意只是要人實養得端倪在隨地生幹生枝吐華吐實無非此一生理貫徹耳故身心國家天下者非他也誠意之枝幹花實也天地雖閉塞而化未嘗息日月雖沉晦而明未嘗息江河雖隱伏而流未嘗息故人心不可以動靜言才説靜已是動喜怒哀樂率吾性曰道視聼言動行吾敬曰德飢欲食渴欲飲者人心也不以飲渴之害為心害者道心也欲生惡死者人心也欲惡有甚於生死而不為茍得者道心也侍郎呂心吾先生坤呂坤字叔簡號心吾河南寧陵人隆慶辛未進士授襄垣知縣調大同有人命坐抵王山隂家屏欲緩其獄不聽山隂入為吏部語人曰天下第一不受請托者無如大同令也特疏薦之升吏部主事轉至郎中出為山東參政歷山西按察使陜西布政使以右副都御史巡撫山西入協理院事升刑部右侍郎轉左每遇國家大議先生持正不為首鼠以是小人不悅先生嘗為閨範圖説行之坊間神宗頗喜小説院本及出像諸書內侍陳矩因以閨範進覽神宗隨賜皇貴妃鄭氏貴妃侈上之賜製序重刋頒之中外時國本未定舉朝方集矢於鄭氏而不悅先生者謂可藉手中以竒禍給事中戴士衡劾先生假托閨範圖説包藏禍心好事者又為憂危竑議言先生以此書私進貴妃貴妃答以寶鏹五十采幣四端易儲之謀不幸有其迹矣戚臣鄭承恩上疏辨寃戍士衡先生亦致仕不起家居四十年年八十三卒贈刑部尚書先生資質魯鈍少時讀書不能成誦乃一切棄之澄心體認久之了悟入目即不忘年十五讀性理書欣然有會作夜氣鈔擴良心詩一生孜孜講學多所自得大抵在思上做工夫心頭有一分檢點便有一分得處蓋從憂患中歷過故不敢任情如此呻吟語乾坤是毁底故開闢後必有混沌所以主宰乾坤是不毁底故混沌還成開闢主宰者何元氣是已元氣亘萬億嵗年終不磨滅是形化氣化之祖也天地先天之氣發泄處不過毫釐後天之氣擴充之必極分量其實分量極處原是毫釐中有底若毫釐中合下原無便一些增不去萬物之形色才情種種可驗也形氣道者天下古今公共之理人人都有分底道不自私聖人不私道而儒者每私之曰聖人之道言必循經事必稽古曰衛道嗟夫此千古之大防也誰敢決之然道無津涯非聖人之言所能限事有時勢非聖人之制所能盡後世茍有明者出發聖人所未發而默聖人欲言之心為聖人所未為而吻合聖人必為之事此固聖人之深幸而拘儒之所大駭也道體並下四段同或問中之道堯舜傳心必有至元至妙之理余嘆曰只就我兩人眼前説這飲酒不為限量不至過醉這就是飲食之中這説話不緘默不狂誕這就是説話之中這作揖跪拜不煩不疏不疾不徐這就是作揖跪拜之中就是一事的堯舜推之萬事皆然到那安行處便是十全的堯舜形神一息不相離道器一息不相無故道無精粗言精粗者妄也因指案上樽爼言其位置恰好處皆是天然自有的道理若説神化性命不在此却在何處若説這裏有神化性命這個工夫還欠缺否推之耕耘簸揚之夫炊爨烹調之婦莫不有神化性命之理都能到神化性命之極學者把神化性命看得太元把日用事物看得太粗只因不曽理會理會得橫竪推行撲頭蓋面腳踏身坐的都是神化性命無萬則一何處著落無一則萬誰為主張此二字一時離不得得一只在萬中走故有正一無邪萬有治一無亂萬有中一無偏萬有活一無死萬或問子之道何如曰飢食渴飲倦眠醒起冬爐夏扇喜歌悲哭如此而已矣曰如此之道其誰不能曰我有終身不能者在今人不如古人只是無學無識學識須從三代以上來才正大才中平今只將秦漢以來見識抵死與人爭是非已自可笑况將眼前聞見自已聰明翹然不肯下人尤可笑也問學段下十二同今人無事不茍且只於虛套搪塞竟不咀嚼真味不從學問中來縱有掀天揭地事業都是氣質作用氣象豈不炫赫可觀一入聖賢稱尺坐定不妥貼學問之要如何隨事用中而已學問二字原自外面得來蓋學問之理雖全於吾心而學問之事則皆古今名物人人而學事事而問攢零合整融化貫串然後此心與道方浹洽暢快若怠於考古恥於問人聰明自已出可憐可笑不知怎麼呌做學者無所為而為五字是聖學根源學者入門念頭就要在這上做今人説話第二三句便落在有所為上只為毁譽利害心脫不去開口便是如此人才不甚相逺只看好學不好學用心不用心耳以粗踈心看古人親切之語以煩躁心看古人靜深之語以浮泛心看古人元細之語以淺狹心看古人博洽之語字意未解句讀未真便加評隲真孟浪人也一門人向豫數四窮問無極太極及理氣同異性命精粗性善是否豫曰此等語豫亦能勦先儒之説及一已之謬見以相發明然非汝今日急務假若了悟性命洞逹天人也只於性理書上添了某氏曰一假言語講學門中多了一宗卷案後世窮理之人信彼駁此服此闢彼百世後汗牛充棟都是這樁話説不知於國家之存亡萬姓之生死身心之邪正見在得濟否我只有個粗法子汝只把存心制行處事接物齊家治國平天下大本小節都事事心下信得過了再講這話不遲曰理氣性命終不可談耶曰這便是理氣性命顯設處除了撒數沒總數人各有抵死不能變之偏質慣發不自由之熟病要在有痛恨之志密時檢之功總來不如沉潛涵養病根久自消磨然涵養中須防一件久久收斂衰歇之意多發強之意少視天下無一可為之事無一可思之惡德量日以寬洪志節日以摧折沒有這個便是聖賢涵養著了這個便是釋道涵養涵養不定的自初生至蓋棺時凡幾變即知識已到尚保不定畢竟作何種人所以學者要德性堅定到堅定時隨常變窮逹生死只一般即有難料理處亦能把持若平日不遇事時儘算好人一遇個小小題目便考出本態假遇著難者大者知成個甚麼人所以古人不可輕易笑恐我當此未便在渠上也涵養要九分省察只消一分若沒涵養就省察得也沒力量降伏那私欲平居時有心訒言還容易只是當喜怒愛憎時發當其可無一厭人語才見涵養天地萬物之理皆始於從容而卒於急促急促者盡氣也從容者初氣也事從容則有餘味人從容則有餘年心要有個著落不著落到好處便向不好處與慶陽李克菴通宵談非天德則王道因相謂曰即此便是不放心存心並下五假同心放不放要在邪正上説不在出入上説且如髙卧山林逰心廊廟身處衰世夢想唐虞逰子思親貞婦懷夫這個是放心否若不論邪正只較出入却是禪定之學一善念發未説到擴充且先執持住此萬善之囮也若隨來隨去更不操存此心如驛傳然終身無主人住矣只是心不放肆便無過差只是心不怠忽便無遺忘只一事不留心便有一事不得其理一物不留心便有一物不得其所一事不從心中出便是亂舉動一刻心不在腔子裏便是空軀殼慎言動於妻子僕𨽻之間檢身心於食息起居之際這個工夫便密了修身並下二假同此身要與世融液不見有萬物形迹六合界限此之謂化然中間却不糢糊自有各正的道理此之謂精天地人物原來只是一個身體一個心腸同了便是一家異了便是萬類而今看著風雲雷雨都是我胸中發出虎豹蛇蝎都是我身上分來那個是天地那個是萬物或問敬之道曰外面整齊嚴肅內面齋莊中正是靜時涵養的敬讀書則心在於讀治事則心在於所治是主一無適的敬出門如見大賓使民如承大祭是隨事小心的敬或曰若笑談歌咏宴息造次之時恐如是則矜持不泰然矣曰敬以端嚴為體以虛活為用以不離於正為主齋日衣冠而寢夢寐乎所祭者也不齋之寢則解衣脫冕矣未有無衣冕而持敬者也然而心不流於邪僻事不詭於道義則不害其為敬矣若專去端嚴上求敬則荷鋤負畚執轡御車鄙事賤役古聖賢皆為之矣豈皆日日手容恭足容重耶大端心與正依事與道合雖不拘拘於端嚴不害其為敬茍心逰千里逐百欲而此身却兀然端嚴在此這是敬否居敬同下段並懶散二字立身之賊也千德萬業日怠廢而無成千罪萬惡日橫恣而無制皆此二字為之靜中看天地萬物都無些子主靜下假同學者萬病只一個靜字治得定靜中境界與六合一般大裏面空空寂寂無一個事物才問他索時般般足樣樣有千紛百擾中此心不亂千撓百逆中此氣不動此之謂至靜喜來時一點檢怒來時一點檢怠惰時一點檢放肆時一點檢此是省察大條欵人到此多想不起顧不得一錯了便悔不及若養得定了便發而中節無用此矣省察同下假聖狂之分只在茍不茍兩字天下難降伏難管攝的古今人都做得來不為難事惟有降伏管攝自家難聖賢做工夫只在這裏克治天德之良知是千聖一心萬古一道坐斗室而通於六合的才落聞見便有偏倚駁雜世俗氣味矣是以聖賢將聞見來證心不以心徇聞見致知字到不擇筆處文到不修句處話到不檢口處事到不苦心處皆謂之自得者與天遇力行夫一言之發四面皆淵阱也喜言之則以為矯戚言之則以為懦謙言之則以為諂直言之則以為陵微言之則以為險明言之則以為浮無心犯諱則謂有心之機無為發端則疑有為之説簡而當事曲而當情精而當理確而當時一言而濟事一言而服人一言而明道是謂修辭之善者其要有二曰澄心曰定氣慎言並下五假同世人喜言無好人此孟浪語也今且不須擇人只於市井稠人中聚百人而各取其所長人必有一善集百人之善可以為賢人人必有一見集百人之見可以決大計恐我於百人中未必人人髙出之也而安可忽匹夫匹婦哉清議酷於律令清議之人酷於治獄之吏律令所寃賴清議以明之清議所寃萬古無反案矣是以君子不輕議人懼寃之也故此事得罪於天甚重對左右言四顧無愧色對朋友言臨别無戒語可謂光明矣胸中何纍之有在邪人前正論不問有心無心此是不磨之恨故位在則進退在我行法可也位不在而情意相關密諷可也若與我無干涉則箝口而已禮入門而問諱此亦當諱者天下事最不可先必而預道之已定矣臨時還有變更况未定者乎故寧有不知之名無貽失言之悔近世料度人意常向不好邉説去固是衰世人心無忠厚之意然士君子不可不自責若是素行孚人便是别念頭人亦向好邉料度何者所以自立者足信也反已並下三假同以患難時心居安樂以淵谷視康莊以疾病視強健以不測視無事則無往而不安穩常看得自家未必是他人未必非便有長進再看得他人皆有可取吾身只是過多便有長進胸中情景要看得春不是繁華夏不是發暢秋不是寥落冬不是枯稿方為我境有天欲有人欲吟風弄月傍花隨柳此天欲也天欲不可無無則寂人欲不可有有則穢天欲即好的人欲人欲即不好的天欲理欲並下二假同愈進修愈覺不長愈檢點愈覺有非何者不留意作人自家儘看得過只日日留意向上看得自家都是病痛那有一些好處初頭只見得人欲中過失久久又見得天理中過失到無天理過失則中行矣又有不自然不渾化著色喫力過失走出這個邉境才是聖人能立無過之地為善去惡便是趨吉避凶惑矣隂陽異端之説也祀非類之鬼禳自致之災祈難得之福泥無損益之時日宗趨避之邪術悲夫愚民之抵死而不悟也即悟之者亦狃於天下皆然而不敢異至有名公大人猶極信尚反經以正邪慝復誰望哉善惡下二假並同凡人之為不善其初皆不忍也其後忍不忍半其後忍之其後安之其後樂之至於樂為不善而後良心死矣精明也要十分只須藏在渾厚裏作用古人得禍精明人十居其九未有渾厚而得禍者今之人惟恐精明不至乃所以為愚也别録宋儒有功於孟子只是補出個氣質之性者多少口吻不動氣事事好每日點檢要見這願頭自德性上發出自氣質上發出自習識上發出自物欲上發出如此省察久久自識得本來面目孝子之於親也終日乾乾惟恐有一毫不快事到父母心頭無論貧富貴賤常變順逆只是以悅親為主蓋悅之一字乃事親第一傳心口訣明道受用處隂得之佛老康節受用處隂得之莊列然作用自是吾儒蓋能奴僕四氏而不為其所用者此語人不敢道深於佛老莊列者自默識得泰山喬嶽之身海濶天空之腹和風甘雨之色日照月臨之目旋乾轉坤之手磐石砥柱之足臨深履薄之心玉潔氷清之骨此男兒八景也忠節鹿乾嶽先生善繼鹿善繼字伯順號乾嶽北直定興人萬厯癸丑進士授户部主事遼左缺餉請帑疏皆不行會廣東解金花銀至先生與司農議劄納太倉轉發遼左而後上聞上怒降級調外任先生因移疾去金花銀者國初以備各邉之緩急俱解太倉其後改解內府宮中視為私錢矣光廟御極復官改兵部主事司馬王象乾行邉請用廢辨之以贓敗者耿職方不覆司馬又請旨命司官不得違阻先生寓書福清爭之無以奪也髙陽以閣臣督師先生轉員外郎中皆在幕府髙陽解兵柄先生亦罷歸家居四年崇禎初起為尚寶司卿升太常寺少卿未三載復請告九年七月先生城守定興城破死之贈大理寺卿諡忠節先生讀傳習録而覺此心之無隔礙也故人問其何所授受曰即謂得之於陽明可也先生與孫竒逢為友定交楊忠愍祠下皆慨然有殺身不悔之志嘗寄周忠介詩云寰中第二非吾事好向椒山句裏尋首善書院之會先生將入聞其相戒不言朝政不談􅕄掌曰離􅕄掌言學則學為無用之物聖賢為無用之人矣遂不往是故先生之學頗近東林諸子一無攙和夾雜其斯謂之狂狷歟論學語吾輩讀有字的書却要識沒字的理理豈在語言文字哉只就此日此時此事求一個此心過得去便是理也仁義忠孝名色萬干皆隨所在而強為指稱也奈何執指稱者求理乎指稱種種原為人覿面相違不得不隨在指點求以省悟而人復就指點處成執滯談元説妙較量一字之間何啻千里此理不是人做作的天生萬物而人得其生物者以為生四海一天萬里一天人心與天並大只就乍見孺子一端推之上下四方往古來今觸無不覺叩無不應俯仰宇宙都呼吸一氣之中故宇宙中物皆性中物宇宙內事皆分內事也大學之明德中庸之性論語之仁皆是物也乃合下生成本來面目也此理不是涉懸空的子臣弟友是他著落故學以為已也而説個已就在人上學以盡心也而説個心就在事上此知仁與莊禮不得分也修已與治人不得分也博文與約禮不得分也文章與性道不得分也不然日新顧諟成湯且為枯禪矣天地萬殊總是一本識得把柄才好下手而形與性分不得仁與人分不得忠恕一貫原非借言敦化川流豈容分指學須是莫知下學上逹分不得教何嘗有隱文章性道分不得看來為學只在當下學術事功亦分不得也從來文人概稱學者識得孔子之意誦詩則乍歌乍哭欲鼓欲舞詩亦是學讀史則其事若親其人若生史亦是學屬辭則行所當行止乎其所不得不止文亦是學總之天地萬物皆此生意生意在我法象俱靈吟風弄月從容自得孔顔樂處意在斯乎禮樂不是鐘鼓玉帛節文不是聲容制度全在日用間應事接物上討求應節其當然而然極其中的去處呌做禮其自然而然極其和的去處呌做樂兩個字又却是一個理未有不合禮而得成樂不合樂而得成禮者細體之自見臺長曹貞豫先生于汴曹于汴字自梁號貞豫平陽安邑人登進士第授淮安府推官擢給事中萬厯辛亥京察先生以吏科都給事中與太宰孫丕揚主其事是時崑宣傳四明之衣鉢收召黨與皆以不謹坐罷其黨金明時秦聚奎起而訐之先生與太宰皆去而朝中之朋黨遂興光宗立起太常少卿屢遷僉都御史吏部左侍郎其推少宰也先生倍馮恭定以上而點用先生蓋小人知君子難進易退一顛倒而兩賢俱不安其位矣崇禎初召為左都御史庚午致仕卒於家年七十七先生與馮應京為友以聖賢之學相砥礪講求兵農錢賦邉防水利之要其耳目大概見之日用編所言仁體則是西銘之注疏也木則不仁不木則仁即上蔡之以覺言仁也以覺言仁本是不差朱子却以為非謂知覺不可以求仁仁然後有知覺夫知覺猶喜怒哀樂也人心可指只此喜怒哀樂喜怒哀樂之不隨物而遷者便是仁體仁是後起之名如何有仁方有知覺耶且上蔡之言知覺覺其天地萬物同體之原也見得親切故又以痛癢言之朱子強坐以血氣之性血氣之性則自私自利矣恐非上蔡之所指也書夫道本無淺深無人弗足講學以明道士農工賈皆學道之人漁牧耕讀皆學道之事隆古無講學之名其人皆學故無名也國家以文學取士天下學校無慮千百章縫之士無慮萬億蓋令其日講所謂時習所謂孝弟所謂性命仁義而以淑其身待天下之用也乃人心不古遂有口耳活套掇拾粉飾以為出身之媒師以是教上以是取恬不為異非其質矣而於立身行政毫無干涉於是君子厭薄其所為而聚徒講道人遂以道學目之若以為另是一種豈不惑哉然講學之中亦或有言然而行不然而藉是以干貴人捷仕徑者而其名為道學也是有口耳活套之實而更美其名人誰甘之則羣起而相攻而講者益寡道益晦矣大抵所學出於實則必䦣然自修不論大節細行一一不肯放過雖力量不同未必盡無疵而不自文以誤人也所學出於名則有張大其門面而於其生平未純處亦曲為言説而謂其為道夫夷之隘不害其清惠之不恭不害其和然亦何必曰此隘此不恭正道之所在而陋孔子於下風乎羅近溪逢人問道透徹心體豈不可尚而濶略處亦誠其病乃學者得其濶略以為可便其私也而或多不羈誠有如止菴疏所謂賄賂干請任情執見等説是其坐女子於懷而亂之而猶侈然薄魯男子不為也而可乎但今因止菴之疏而遂禁其講是因噎廢食夫此學乃乾坤所由不毁何可一日廢也似更當推廣而俾千百學校億萬章縫無不講以及農工商賈無不講才是而其機則自上鼓之若得復辟召之典羅致四方道學倣程子學校之議布之天下以主道教於一切鄉學社學之衆漸次開發而申飭有位之士以興學明道為先圖其學則以躬行實踐為主隨其人之根基引之入道或直與天通或以人合天或真臻悟境或以修求悟夫天人合一修悟非二舍天而言人舍悟而言修則淺矣近時學者知皆及此然言天矣而人尚未盡言悟矣而修且未能世豈有能致中而不能致和能正心而不修身者哉則不可不戒也大抵果能合天則必益盡其人事果能真悟則必益盡其真修堯舜文王孔子何人也而兢兢業業望道未見徙義改過沒齒以之也再答李贊宇書仁人之用仁舉諸我以加諸彼乎曰非然也有彼我則有封域有封域則有急緩有急緩則有校量其卑者易入於納交聲譽之偽其髙者亦回而不直滓而不粹暫而不恆虧而不滿夫湛然而仁具油然而仁興奚暇校量哉昔先哲之談仁也曰仁心之德也而泥之者乃於心之內更求德為非德不足以見仁也者不知心焉知仁故曰仁人心也言心而不言德而泥之者乃於仁之內更求心焉非心不足以見仁也者不知人矣不知人焉知仁故曰仁者人也言人而不言心嘻至矣若理若氣若形若性若身若心貫通矣渾合矣天也地也萬有不齊之物也我也其生之所自一也鴻濛未闢之始有合而無分形象既判之後似分而實合故靈明各具天不獨豐人不獨嗇人不獨得物不獨闕其中通也一隂乍動一陽來復倐忽彌漫周於天地貫於萬物亦其中通也疾疴痛癢相連相關不但父母兄弟推之一切莫不皆然亦以其中通也而或者乃曰母齧子痛則常聞之焉有物痛而亦痛嗟乎母齧子痛世未必皆其人也然則父母非一體耶此其體之木也木則無不木也不木則無所木也入其室父母兄弟環向而處不知其䁥也出而逰闤闠之中遇其父母兄弟則䁥之之郡城焉遇其邑之人則䁥之之會城焉遇其郡之人則䁥之之都城焉遇其省之人則䁥之之海外異邦焉遇中國之人則䁥之之壙洋之水木石鹿豕之為叢遇似人者而䁥之矣方其未昵也木也及其既䁥也不木也且光風霽月何與於我而欣狂颶隂霾何與於我而慘水光山色何與於我而喜荒原頺壁何與於我而悽則風月水石固有通於我者我乃欣之慘之喜之悽之耳奈何日日周逰時一茂對人欣亦欣人慘亦慘以目為賞以目為惜語云我乃行之不得我心不自察耳察則不木不察則木顧華裔之界限人物之差等仁人未嘗無别此以别之者體之也華得其所裔亦得其所也盡人之理亦盡物之理也分殊者脈絡之分也理一者公溥之量也然征伐可廢乎刑誅可弛乎仁人未嘗不嚴此以嚴之者體之也仁與不仁辨之以心不辨之以迹除莠剔蠧以殺機為生織花鎩鶴以生機為殺故砭灼不廢於肌膚夏楚不靳於愛子虞廷四罪魯國肆眚周王一怒宋公不厄孰一體孰非一體必有分矣夫以天地萬物為體則體大以四體為體則體小以天地萬物之體為人則人大以四體之體為人則人小大體者能卷能放流衍於衆小體之中而衆小體不能隔也四體之木則知療之天地萬物之體之木則不知療弗思故也夫千萬世之上此天地也有萬物焉千萬世之下此天地也有萬物焉天道無窮地道無窮物生無窮吾心亦無窮往聖之絶學未輟於命而萬世之太平輒營於中仲尼之生千古不疚堯舜之心至今猶存即其體存也故曰會人物於一身通古今於一息區區補葺於百年之間君子以為猶木也故仁以為巳任古之成仁者如此仁體䇿曹門學則無我方為真我夫學隨事可盡隨時可盡隨地可盡隨分可盡外無待越內無容減當其現在不乏毫釐講學愈精則愈粗愈髙則愈卑故聖學為庸行如赤子而止遭人之唾罵斥辱皆我大得益處心之在人雖夢寢而未嘗斷息常動故也雖應酬而不可眹兆常靜故也晝遊雖樂不聞遇雪而悲春景而嬉豈至逢冬而惡何者安於時也時有順逆何異晝夜春冬而情逐景遷乃致愁苦亦惑矣惟知故止惟止故知然知則六合內外瑩瑩一片止在何處聖人能從心所欲故不踰矩世人大概違心耳如何存養此心曰識得此心方好存養如何識心曰心體時時呈露勿令聞見遮迷仁心之德也而泥之者乃於心之內更求德焉非德不足以見仁也者不知心焉知仁故曰仁人心也言心而不言德泥之者乃於人之內更求心焉非心不足以見仁也者不知人焉知仁故曰仁者人也言人而不言心鴻濛未闢之始有合而無分形象既判之後似分而實合入其室父母兄弟環向而處不知其䁥也出而遊闤闠之中遇其父母兄弟則䁥之之郡城焉遇其邑之人則昵之之會城焉遇其郡之人則昵之之都城焉遇其省之人則䁥之之海外異邦焉遇中國之人則䁥之之壙洋之水木石鹿豕之為叢遇似人者而䁥之矣且光風霽月何與於我而欣狂颶隂霾何與於我而慘水光山色何與於我而喜荒原頽壁何與於我而悽則風月水石固有通於我者我乃欣之慘之喜之悽之耳談風水者專言鬼蔭故欲安其枯骨至於祖父生前或置之不得其所豈其為蔭生祖父不及死祖父乎此大惑也忠節呂豫石先生維祺呂維祺字介孺號豫石河南新安人萬厯癸丑進士除兖州推官入為吏部主事光熹之際上疏請慎起居擇近侍防微杜漸與楊左相唱和也纍轉之郎中告歸崇禎初起尚寶卿再轉太常卿庚午升南京户部右侍郎兼右僉都御史總督糧儲時邉餉既借支而納户逋欠又多積弊難清上特敕侵欺者五品以下就便提問先生悉心籌畫解支有序乃曰昔人有言人至察則無徒第思國家多故君父焦勞為臣子者豈能自已升南京兵部尚書賊犯鳯陵南京大震先生尋以臺省拾遺落􅕄為民辛巳正月雒陽陷先生為賊所執道遇福王昂首謂王曰死生命也名義至重無自辱巳而賊害王酌其血雜鹿醢飲之曰此福祿酒也先生大罵死之贈太子少保諡忠節逆奄之時拆天下書院以學為諱先生與張抱初方講於芝泉書院幾中危禍在南都立豐芑大社歸又立伊雒社修復孟雲浦講會中州學者多從之嘗言一生精神結聚在孝經二十年潛玩躬行未嘗少怠曽子示門人曰吾知免夫非謂免於毁傷蓋戰兢之心死而後已也若先生者其見道未可知庶幾講學而不偽者歟與蘇抑堂天下萬世所以常存而不毁者只為此道常存此道之存人心之所以不死也使人心而死則天地之毁也久矣人人心不死而人人未能操存之便厭厭無生意所以持世之人力為擔任將一副精神盡用之於此道而卑者祗役役於富貴功名意見蹊徑其髙者又耽入於懸虛以為道更有在也不知此道至平至易見前即是轉疑即非即入世之中亦自有出世之法非必盡謝絶人世而後為學也世不難於出而難於入出而不入出而乃欲入此幻與偽之為也入而能出此吾儒學問之所以異於二氏也年兄云即今亦自可學誠哉即今亦自可學也弟有聨云人只此人不入聖便作狂中間難站腳學須就學昨既過今又待何日始回頭故曰才説姑待明日便不可也自古聖賢何人不由學問涵養而必曰生知云云則自棄甚矣只要認定一路一直硬肩做去日新不已即吾儕自有聖諦彼程邵諸先覺非人也乎哉彼何以與天地不朽而我輩空沒沒也思念及此有不愧汗浹趾者豈人哉然年兄之所以遲疑於其間者得無謂今天下講學者多偽也不則謂講學與不講者多分一畛域恐吾涉於一邉噫豈其然哉講學之偽誠有之然真者必於此出以其偽而廢真何異於因噎廢食且天下之貪官綦多也未聞以廢仕進也至於講學之家多分畛域亦自有説吾只見得吾身非此無以為人安身立命的的在此世自有世之講學吾自有吾之講學所謂天淵懸隔者也今天下禁講學而學會日盛學會雖盛而真實在此間做者甚少弟之修復孟先生會原自修復不沾帶世間一塵近日敝邑及鄰邑逺近之士覺彬彬興起今世風之壞也久而人心日不古矣以年凡之識力辨此最易如有意於此固無事遲疑孟子云奚有於是亦為之而已矣天下第一等事是何人做天下第一等人是從何事做起可惜終身憧憧擾擾虛度光隂到雨罷庭空風過花飛時究竟携得甚物去以此思之何重何輕何真何幻何去何從自有辨之者然而眼界不開由骨力不堅骨力不堅所以眼界愈不開以此思之學問下手處可味也而世往往目學問為偽為迂某謂世之學者豈無偽哉而真者固自真也以偽為非去其偽而可矣至於學問不足經世又何學之為以此思之學力事業非兩事也與友人書弟維祮問講學為人所非笑何以處之曰講學不為世俗非笑是為鄉願講學不到使非笑我者終心服我是為鄉人講學必别立崖岸欲自異於世俗是為隱怪講學不大倡其道於天下後世以承先啓後自任以為法可傳自勵是為半途之廢答問一條明儒學案卷五十四
