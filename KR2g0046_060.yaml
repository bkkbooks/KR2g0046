body:
  text: 明儒學案卷六十餘姚黃宗羲撰東林學案三主事顧涇凡先生允成顧允成字季時别號涇凡兄則涇陽先生也與涇陽同遊薛方山之門萬厯癸未舉禮部丙戍廷對指切時事以寵鄭貴妃任奄寺為言讀卷官大理何源曰此生作何語真堪鎖㮄矣御史房寰劾海忠介先生與諸壽賢彭遵古合疏數寰七罪奉㫖削籍久之起南康府教授丁憂服闋再起保定府教授歷國子監博士禮部主事詔皇太子與兩皇子並封為王先生又與嶽元聲張納陛上疏極諫責備婁東已而趙忠毅掌計盡黜政府之私人婁東欲去忠毅授意給事中劉道隆謂拾遺司屬不宜留用因而忠毅革籍太宰求去先生又與于孔兼賈岩薛敷教張納陛抗疏犯政府皆謫外任先生判光州是時政府大意在遏抑建言諸臣尤遏抑非臺省而建言者先生上書座師許國反覆當世但阿諛熟軟奔競交結之為務不知名節行檢之可貴聖怒可攖宰執難犯言路之人襲杜欽谷永附外戚而專攻上身之故智以是而禁人之言猶為言路不塞哉布衣翟從先為李見羅誦寃進唐曙臺禮經先生皆代為疏草惟恐其不成人之美也光州告假歸十有四年所積俸近千金巡撫檄致之先生不受丁未五月卒年五十四平生所深惡者鄉願道學謂此一種人占盡世間便宜直將弒父與君種子暗布人心學問須從狂狷起腳然後能從中行歇腳近日之好為中行而每每墮入鄉願窩臼者只因起腳時便要做歇腳事也鄒忠介晚年論學喜通融而輕節義先生規之曰夫假節義乃血氣也真節義即義理也血氣之怒不可有義理之怒不可無義理之節氣不可亢之而使驕亦不可抑之而使餒以義理而誤認為血氣則浩然之氣且無事養矣近世鄉願道學往往借此等議論以銷鑠吾人之真元而遂其同流合汙之志其言最高其言最逺一日喟然而嘆涇陽曰何嘆也曰吾嘆夫今之講學者恁是天分地陷他也不管只管講學耳涇陽曰然則所講何事曰在縉紳只明哲保身一句在布衣只傳食諸侯一句涇陽為之慨然涇陽嘗問先生工夫先生曰上不從元妙門討入路下不從方便門討出路涇陽曰須要認得自家先生曰妄意欲作天下第一等人性頗近狂然自反尚自硜硜窩臼情又近狷竊恐兩頭不著涇陽曰如此不為中行不可得矣先生曰撿㸃病痛只是一個粗字所以去中行彌逺涇陽曰此是好消息粗是真色狂狷原是粗中行中行只是細狂狷練粗入細細亦真矣先生曰粗之為害亦正不小猶幸自覺得今但密密磨洗更無他說涇陽曰尚有說在性近狷還是習性情近狂還是習情若論真性情兩者何有於此參取明白方認得自家既認得自家一切病痛都是村魔野祟不敢現形於白日之下矣先生遲疑者久之而後曰豁然矣譬如欲入京師水則具舟楫陸則備輿馬徑向前去無不到者其間倘有阻滯則須耐心料理若因此便生懊惱且以為舟楫輿馬之罪欲思退轉别尋方便豈不大誤涇陽曰如是如是先生嘗曰吾輩一發念一出言一舉事須要太極上著腳若只跟陰陽五行走便不濟事有疑其拘者語之曰大本大原見得透把得住自然四通八達誰能拘之若於此糊塗便要通融和會幾何不墮坑落塹喪失性命故先生見義必為皆從性命中流出沈繼山稱為義理中之鎮惡文章中之辟邪洵不虛也小辨齊劄記學者須在暗地裡牢守界限不可向的然處鋪張局面逆詐億不信五字入人膏肓所謂殺機也億逆得中自家的心腸亦與那人一般億逆得不中那人的心腸勝自己多矣人心惟危王少湖曰危之一字是常明燈一息不危即墮落矣朱子嘗曰孟子一生費盡心力只破得枉尺直尋四字今日講學家只成就枉尺直尋四字愚亦曰孟子一生費盡心力只破得無善無惡四字今日講學家只成就無善無惡四字三代而下只是鄉願一班人名利兼收便宜受用雖不犯乎弒君弒父而自為忒重實埋下弒父弒君種子無善無惡本病只是一個空字末病只是一個混字故始也見為無一之可有究也且無一不可有始也等善於惡究也且混惡於善其至善也乃其所以為至惡也離九三曰日昃之離不鼓缶而歌則大耋之嗟凶歌為樂生者也嗟為憂生者也言人情憂樂只在軀殼上起念不如此則如彼不知人生世間如日昃之離有幾多時即何為靠這裡尋個憂樂凶之道也自三代以後其為中國財用之蠧者莫甚於佛老莫甚於黃河一則以有用之金塗無用之像一則以有限之財填無限之壑此所謂殺機也發與未發就喜怒哀樂說道不可須臾離何言發未發也程子曰寂然不動感而遂通此言人分上事若論道則萬物皆具更不說感與未感最為的當炎祚之促小人促之也善類之殃小人殃之也紹聖之紛更小人紛更之也今不歸罪於小人而反歸罪於君子是君子既不得志於當時之私人而仍不得志於後世之公論為小人者不惟愚弄其一時仍並後世而愚之也審如其言則將曰比干激而亡商龍逢激而亡夏孔子一矯而春秋遂流為戰國孟子與蘇秦張儀分為三黨而戰國遂吞於吕秦其亦何辭矣以下論學書南皋最不喜人以氣節相目僕問其故似以節義為血氣也夫假節義乃血氣也真節義即理義也血氣之怒不可有理義之怒不可無理義之氣節不可亢之而使驕亦不可抑之而使餒以義理而誤認為血氣則浩然之氣且無事養矣近世鄉願道學往往借此等議論以消鑠吾人之真元而遂其同流合汙之志其言最高其害最逺心學之弊固莫甚於今日然以大學而論所謂如見肺肝者也何嘗欺得人來却是小人自欺其心耳此心蠧也非心學也若因此便諱言心學是輕以心學與小人也咸九四不言心而彖曰感人心則咸其心之義也艮六四不言心而象曰思不出其位則艮其心之義也其曰貞吉則道心之謂曰憧憧則人心之謂也艮其身亦猶大學之揭修身蓋心在其中矣何諱言心之有乃曰心意可匿身則難藏其不本正心誠意而本修身殆有精義不免穿鑿附會矣足下近言調攝血氣喜怒不著自有調理此知足下心得之深直透未發前氣象即六經且為注腳矣但恐此意習慣將來任心太過不無走作其害非細足下必曰聖賢之學心學也吾任吾心何走作之有不知道心可任也不可任也道心難明人心易惑弟近來只認得六經義理親切句句是開發我道心句句是喚醒我人心處學問不從此入斷非真學問經濟不從此出斷非真經濟與彭旦陽陽明提良知是虛而實見羅提修身是實而虛兩者是水中月鏡中花妙處可悟而不可言所謂會得時活潑潑地會不得只是弄精魂昔之為小人者口堯舜而身盜跖今之為小人者身盜跖而罵堯舜名根二字真學者痼疾然吾輩見得是處得做且做若每事將此個題目光光抹煞何處開得口轉得身也根原枝委總是一般大趨既正起處既真信目所視信口所哦頭頭是道不必太生分别平生左見怕言中字以為我輩學問須從狂狷起腳然後能從中行歇腳凡近世之好為中行而每每墮入鄉願窩臼者只因起腳時便要做歇腳事也太常史玉池先生孟麟史孟麟字際明號玉池常州宜興人萬厯癸未進士官至太常寺少卿三王並封㫖下先生作問答上奏乙卯張差之變請立皇太孫詔降五級調外任先生師事涇陽因一時之弊故好談工夫夫求識本體即是工夫無工夫而言本體只是想像卜度而已非真本體也即謂先生之言是談本體可也陽明言無善無惡心之體先生作性善說闢之夫無善無惡心之體原與性無善無不善之意不同性以理言理無不善安得云無心以氣言氣之動有善有不善而當其藏體於寂之時獨知湛然而已安得謂之有善有惡乎其時楊晉菴頗得其解移書先生謂錯會陽明之意是也獨怪陽明門下解之者曰無善無惡斯為至善亦竟以無善無惡屬之於性真索解而人不得矣史玉池論學今時講學主教者率以當下指㸃學人此是最親切語及叩其所以却說飢來喫飯困來眠都是自自然然的全不費工夫見學者用工夫便說本體原不如此却一味任其自然任情從欲去了是當下反是陷人的深坑不知本體工夫分不開的有本體自有工夫無工夫即無本體試看樊遲問仁是向夫子求本體夫子却教他做工夫曰居處恭執事敬與人忠凡是人於日月間那個離得居處執事與人境界故居處時便恭執事時便敬與人時便忠此本體即工夫學者求仁居處而恭仁就在居處執事而敬仁就在執事與人而忠仁就在與人此工夫即本體是仁與恭敬忠原是一體如何分得開此方是真當下方是真自然若飢食困眠禽獸都是這等的以此為當下却便同於禽獸這不是陷人的深坑且當下全要在關頭上得力今人當居常處順時也能恭敬自持也能推誠相與及到利害的關頭榮辱的關頭毁譽的關頭生死的關頭便都差了則平常恭敬忠都不是真工夫不用真工夫却沒有真本體故夫子指㸃不處不去的仁體却從富貴貧賤關頭孟子指㸃不受不屑的本心却從得生失死關頭故富貴不淫貧賤不移威武不屈造次顛沛必於是舍生取義殺身成仁都是關頭時的當下此時能不走作才是真工夫才是真本體才是真自然才是真當下往李卓吾講心學於白門全以當下自然指㸃後學說個個人都是見見成成的聖人聞有忠孝節義之人却云都是做出來的本體原無此忠孝節義學人喜其便利趨之若狂後至春明門外被人論了才去拿他便手忙腳亂却一刀自刎此是殺身成仁否此是舍生取義否自家且如此何况學人故當下本是學人下手工夫差認了却是陷人深坑不可不猛省也言心學者率以何思何慮為悟境蓋以孩提知能不學不慮聖人中得不思不勉一落思慮便非本體豈不是徹上語不知人心有見成的良知天下無見成聖人聖人中得原是孩提愛敬孩提知能到不得聖人中得故孩提知能譬如礦金聖人中得譬如精金這精金何嘗有分毫加於礦金之初那礦金要到那精金須用許多淘洗鍛錬工夫不然脫不得泥沙土石故不思不勉只說個見成聖人非所為聖人也問告子之勿求亦有根歟曰有外義故也夫義與氣一流而出求氣即集義也告子外視乎義夫且以義為障矣何求焉理氣合而為心孟子以義為心集義而氣自充氣充而心自慊則心以自慊而不動告子第以氣為心而離義以守氣則定氣所以定心心亦以能定而不動夫天地之塞吾其體天地之帥吾其性天下有性外之氣乎故浩然之氣即吾心之道義不可得而二之也吾身體充之氣即塞天地之氣亦不可得而二之也故行有不得之心告子不能異孟子焉天命之性也孟直以養之則不愧不怍之真即高明博厚之體而體充之氣浩然塞天地之氣矣告子逆而制之固不以蹶趨之氣動心亦不以道義之氣慊心則氣非塞天地之氣而體充之氣矣故告子守在氣者也孟子守在義者也孟子之於義根心而生是以心為主者也告子之於義緣物而見是以物為主者也義無內外緣物以為義則內外分為兩截義自義心自心始猶覺其遺用而得體究則並其體而忘之矣譬之水然孟子之心若清水之常流而告子之心則止水之能清耳始而澄之止水之清易而流水之清難至於後而流水之清者常清止水之清者臭敗矣釋氏不思善不思惡是汝本來面目則告子性無善外義之根宗也其曰心生心死心死心生死心之法則告子之勿求也其曰一超直入如來地超入之頓則告子之助長也問格物曰各人真實用功便見宋之道學在節義之中今之道學在節義之外天下有君子有小人君子在位其不能容小人宜也至於並常人而亦不能容焉彼且退而附於小人而君子窮矣小人在位其不能容君子宜也至於並常人而亦不能容焉彼且退而附於君子而小人窮矣古人以心為嚴師又以師心自用為大戒於此參得分明當有會處職方劉靜之先生永澄劉永澄字靜之揚州寶應人八嵗讀正氣歌衣帶贊即立文公位朝夕拜之年十九舉於鄉飲酒有妓不往登萬厯辛丑進士第授順天學教授北方稱為淮南夫子遷國子學正雷震郊壇先生上疏災異求直言自漢唐宋及祖宗未有改也往萬安劉吉惡人言災異鄒汝愚一疏炳烈千古今者一切報罷塞諤諤之門務容容之福傳之史册尚謂朝廷有人乎滿考將遷先生喟然嘆曰陽城為國子師斥諸生三年不省親者况身為國子師乎遂歸杜門讀書壬子起職方主事未上而卒年三十七先生與東林諸君子為性命之交高忠憲曰靜之官不過七品其志以為天下事莫非吾事若何而聖賢吾君若何而聖賢吾相若何而聖賢吾百司庶職年不及强仕而其志以為千古事莫非吾事生前吾者若何揚揭之生當吾者若何左右之生後吾者若何矜式之先師劉忠端曰靜之尚論千古得失嘗曰古人往矣豈知千載而下被靜之檢㸃破綻出來安知千載後又無檢㸃靜之者其刻厲自任如此大概先生天性過於學問故其疾惡之嚴真如以利刃齒腐朽也劉靜之緒言今有人焉矜矜於簞食豆羮之義木頭竹屑之能至於攖小人之忌觸當世之網而上關國是下關清議者則惟恐犯手撩鬚百不一發雖事任在躬亦不過調停兩家以為持平之體此其意何為哉得失之念重耳巧宦之法大率趨承當路不可稍失其意雖已之吏胥亦不肯稍失其意蓋知吏胥亦能操吾之短長也清夜自思此一種是何等心事豈可使人知物來順應順者順乎天理也非順乎人情也三代而上黑白自分是非自明故曰王道蕩蕩王道平平後世以是為非指醉為醒倒置已極君子欲救其弊不得不矯枉蓋以不平求平正深於平者也有一等自是的人動曰吾求信心不知所信者果本心乎抑習心乎假善之人事事可飾聖賢之迹只逢著忤時抗俗的事便不肯做不是畏禍便怕損名其心總是一團私意故耳謙謙自牧由由與偕在醜不爭臨財無茍此居鄉之利也耳習瑣尾之談目習徴逐之行以不分黑白為渾融以不悖時情為忠厚此居鄉之害也夫惡人不可為矣庸人又豈可為乎惡人不當交矣庸人又豈足交乎尋常之人慣苛責君子而寬貸小人非君子仇而小人昵也君子所圖者大則所遺者細世人只檢㸃細處故多疵耳小人所逆者理則所便者情世人只知較量情分故多恕耳愛人則加諸膝惡人則隕諸淵此譏刺語其實愛惡之道無如此大學如好好色如惡惡臭好好色之心何啻加膝乎惡惡臭之心何啻隕淵乎聖賢只在好惡前討分曉不在好惡時持兩端如慮好惡未必的當好不敢到十分好惡不敢到十分惡則子莫之中鄉願之善耳與君子交者君子也小人交者小人也君子可交小人亦可交者鄉人也鄉人之好君子也不甚其惡小人也亦不甚其用情在好惡之間故其立身也亦在君子小人之間天下君子少小人亦少而鄉人最多小人害在一身鄉人害在風俗李卓吾曰有利於己而欲時時囑托公事則稱引萬物一體之說有害於己而欲逺怨避嫌則稱引明哲保身之說使君相燭其奸不許囑託不許逺嫌避害又不許稱引則道學之情窮矣如愛己之心愛人先儒必歸之窮理正心如治己之心而治人先儒必以强於自治為本蓋未能窮理正心則吾之愛惡取舍未必得正而推己及物亦必不得其當然未能强於自治則是以不正之身為標的將使天下之人皆如吾之不正而淪胥以陷說心說性說元說妙總是口頭禪只把孟子集義二字較勘身心一日之內一事之間有多少不合義處有多少不慊於心處事事檢㸃不義之端漸漸難入而天理之本體漸漸歸復浩然之氣不充於天地之間者鮮矣學正薛元臺先生敷教薛敷教字以身號元臺常之武進人方山薛應旗之孫也年十五為諸生海忠介以忠義許之登萬厯己丑進士第南道御史王藩臣劾巡撫周繼不白掌憲耿廷向吳時來相繼論列先生言是欲為執政箝天下也言官風聞言事從古皆然若必關白長官設使談劾長官更須關白乎二三輔臣故峻諸司共繩庶采憲臣輒為逢迎自喪生平竊所不取疏奏當路大恚主考許國以貢舉非人自劾奉㫖回籍省過壬辰起鳯翔教授尋遷國子助教有詔並封三王上疏力爭又寓書責備婁江事遂得寢未幾趙忠毅佐孫清簡京察盡出當路之私人內閣張洪陽王元馭憤甚給事中劉道隆承風旨以爭拾遺鐫忠毅三秩先生復與于孔兼陳泰來賈巖顧允成張納陛合疏言考功無罪內閣益憤盡奪六君子官而先生得光州學正丁母憂遂不復出甲辰顧涇陽修復東林書院聚徒講學先生實左右之作真正銘以勉同志曰學尚乎真真則可久學尚乎正正則可守真而不正所見皆茍正而不真終非己有君親忠孝兄弟恭友提身以亷處衆以厚良朋切劘要於白首鄉里謗怨莫之出口毋謂冥冥內省滋疚毋謂瑣瑣細行匪偶讀書學道係所禀受精神有餘窮元極趣智識寡昧秉哲省咎殊途同歸勞逸難狃世我用兮不薄五斗世不我用徜徉五柳無貴無賤無榮無朽殞節逢時今生諒否必真必正夙所自剖寄語同心各慎厥後年五十九而卒先生持身孤峻筮仕以來未嘗受人一饋垢衣糲食處之泰然舍車而徒隨行一蒼頭而已執喪不飲酒食肉服闋遂不食肉故其言曰腳根站定眼界放開靜躁濃淡間正人鬼分胎處又曰道德功名文章氣節自介然無欲始又曰學茍不窺性靈任是皎皎不汙終歸一節但世風衰微不憂著節太竒而憂混同一色託天道無名以濟其私則中庸之說誣之也嘗有詩曰百年吾取與留作後人針其自待不薄如此賦性慈祥蠕動不忍傷害俗客傖父亦無厭色然疾惡甚嚴有毁其知交葉園適者先生從稠人中奮臂而起自後其人所在先生必避去終身不與一見也侍郎葉園適先生茂才葉茂才字參之號園適無錫人也萬厯己丑進士授刑部主事以便養改南京工部𣙜稅蕪關除雙港之禁商人德之歷吏禮二部郎尚寶司丞少卿南大理寺丞卧病居半壬子升南太僕寺少卿黨論方興抗疏以劾四明崑宣小人遂集矢於先生先生言臣戅直無黨何分彼此孤立寡援何心求勝內省不疚何慮夾攻雞肋一官何難勇退遂歸天啓初起用遷太僕寺卿甲子擢南京工部右侍郎履任三月先幾引去故免遭削奪崇禎辛未卒年七十二先生在東林會中於喁無間而晰理論事不厭相持終不肯作一違心語忠憲歿先生狀之其學之深微使讀者恍然有入頭處又喜為詩以寓時事云還宣侍講王昭素執易螭頭取象拈傷經筵之不舉也云三黨存亡宗社計片言曲直咎休占刺門户也云乾坤不毁只吾心哀毁書院也老屋布衣僩若寒畯於忠憲何愧焉孝亷許靜餘先生世卿許世卿字伯勳號靜餘常州人萬厯乙酉舉於鄉放㮄日與同志清談竟夕未嘗見其有喜色也揭安貧五戒曰詭收田糧干謁官府借女結婚多納僮僕向人乞覔省事五戒曰無故拜客輕赴酒席妄薦館賓替人稱貸濫與義會有强之者輒指其壁曰此吾之息壤也一日親串急贖金求援於先生先生鬻婢應之終不破干謁戒也守令罕見其面歐陽東鳯請修郡志先生曰歐公端人也為之一出東林之會高忠憲以前輩事之飲酒吟詩終日不倦門屏落然不容一俗客嘗曰和風未學油油惠清節寧希望望夷勑其子曰人何可不學但口不說欺心話身不做欺心事出無慚朋友入無慚妻子方可名學人耳疾革謂某逋未償某施未報某劵未還言畢而逝耿庭懷先生橘耿橘字庭懷北直河間人不詳其所至官知常熟時值東林講席方盛復虞山書院請涇陽主教太守李右諫御史左宗郢先後聚講於書院太守言大德小德俱在主宰處看天地間只有一個主宰元神渾淪大德也五官百體無一不在渾淪之內無一不有條理之殊小德也小德即渾淪之條理大德即條理之渾淪不可分析御史言從來為學無一定的方子但要各人自用得著的便是學問只在人自肯尋求求來求去必有入處須是自求得的方謂之自得自得的方受用得當時皆以為名言涇陽既去先生身自主之先生之學頗近近溪與東林微有不同其送方鳴秋謁周海門詩云孔宗曾派亦難窮未悟如何輳得同慎獨其嚴四個字長途萬里任君行人傳有道在東揚我意云何喜欲狂一葉扁舟二千里幾聲嚶鳥在垂楊亦一證也耿庭懷論學賢友不求所以生死之道而徒辨所以生死之由不於見在當生求了畢欲於死後再生尋究竟千言萬語只是落在一個輪回深坑裡不見有超出底意思千古只在今時迷了第決當下若云姑待是誣豪傑賢友謂人生頴異必其前生參悟之力結為慧根又輕看了那生萬物的他既會生萬物便不會生一箇頴異的人有一箇頴異的人便是前生參悟來者則自古及今只生了些愚癡鈍根而已是誣天地若謂自古及今只是這些愚智在天地旋轉則初生愚智時是誰來者况旋轉來智者必益智愚者亦漸智何乃今人不及古人逺甚是誣聖賢賢友又問死後光景作何狀死者必有一著落處為家余却問賢友見今光景作何狀目前著落豈無家如徒以耳目手足飲食男女喚作生時光景宜乎其復求死後之光景也况以生為客為寄而以死為歸為家則生不如死矣是誣生死蓋佛氏輪回之教原為超出生死而設再生之說乃其徒敗壞家風的說話何故信之深勿論儒道禪已荒矣答邵濓輪回生死問下二條同夫所謂漫天漫地亘古亘今者是何物天地古今尚在此內而此必欲附麗一物乎所謂神理綿綿與天地同久者亦必有神理之真體而曰附麗則獨往獨來者果安在也不隨生存果附麗於生乎不隨死亡猶有所附麗乎生而附麗於生是待生而存也死而必再生以求所附麗是隨死而亡也待死而存生已死矣隨死而亡焉能再生今之頭腹手足耳目鼻口塊然而具者是生耶生者活也喜笑瑳然啼哭愴然周旋運轉惺然而有覺者乃謂之生一旦喜泯啼銷運止覺滅雖頭腹手足耳目鼻口之仍在則謂之死故生死形也形生形死總謂之形而形豈道乎哉道也者形而上之物也形而上也者超乎生死之外之謂也生死是形不是道道非形即非生死既已非生死矣果且有生死乎哉既已無生死矣果且有附麗乎哉既已無附麗矣果不可朝聞而夕死乎哉生死了不相干朝夕於我何與味賢友所謂附麗云者似指今之頭腹手足耳目鼻口塊然之物所謂漫天漫地亘古亘今神理綿綿不隨生存死亡云者似指今之瑳然愴然惺然之物徇生而為生執有而為知何謂知生生之不知何謂知死生死之不知何謂知道正恐賢友所以發願再生者亦不在了此公案而在貪此形生也欲不貪生非知生不可欲知生非知道不可知道則知吾與賢友今日雖生而實有一箇未嘗生者在這裡這裡方喚做漫天漫地亘古亘今神理綿綿不隨生存死亡的真體也自其未發者而觀之行於喜怒哀樂之中而超於喜怒哀樂之外獨往獨來不可名狀强名曰中明道曰且喚做中是也自其發而中節也觀之混乎可喜可怒可哀可樂之場而合乎共喜共怒共哀共樂之心應用無滯如水通流故謂之和也中庸大段只是費隱顯微有無六字六字根柢只一性字費可見而隱不可見顯可見而微不可見有可見而無不可見隱微無未發也費顯有發而中節也隱即之費中而在微即之顯時而在無即之有者而在未發即之發而中節者而在體用一原也非隱孰為費非微孰為顯非無孰為有非未發而孰為發而中節一以貫之也費即是隱顯即是微有即是無發而中節即是未發下學上達也學者徒於喜怒哀樂上求和而不於喜怒哀樂上求中徇迹遺心矣不於有喜有怒有哀有樂時認未發之真體欲於無喜無怒無哀無樂時觀未發之氣象離形求神矣吾故曰喜怒哀樂情也中和性也費隱顯微有無一性也答中和問獨無色故覩不得無聲故聞不得睹不得聞不得却有一箇獨體在非謂不睹不聞之時是獨也獨體本自惺惺本自寂寂而却有不惺惺不寂寂之物欲獨體本自無起本自無滅而却有常起常滅之人心這裡所以用著戒慎恐懼四箇字能於惺惺寂寂中持此四箇字而後不惺惺不寂寂之物欲可滅能於無起無滅中持此四箇字而後常起常滅之人心可除此是有著落的工夫所謂本體上作工夫者是也答陽衡荀子曰養心莫善於誠周子曰荀子原不識誠既誠矣心安用養耶到得心不用養處方是誠答歸紹隆下學上達原是一理天地間無不下即無不上若以親親長長為下人人親其親長其長而天下平為上則不可天下平亦是下親親長長亦是上只在悟不悟之間下學可以言傳上達必由心悟二條同上這箇德性却莫於杳冥恍忽裡覓就是這箇禮而已中庸一書全於費處見隱求心所在不若求心所不在大學心不在焉此四字是㸃化學人的靈丹身有所憤􅓰四句是煆鍊學人的鼎鑊蓋四者實出於身而役乎心心何以有不在在乎四者之中為形骸所役而不自知爾如今日口受味目受色耳受聲鼻受臭四肢受安逸欣羡求取能盡無乎但有一絲心便不在不在者非不在腔子裡之謂也倒是這腔子裡成了一塊味色聲臭安逸美衣廣屋肥田佳園貴顯世路名高的閙場此心受役於閙場之內而不自知故曰不在也答童子徐嶙問心在何處自性是頭腦自性上起念是真念念上改過是真改過但要賢友認得自性而已一切言行無差無錯處皆性之用也而必有其體假若散而無體則亦蕩而無用矣認得此體自然認得此用念亦用也而於體為近從本體上發念從念上省改少有差錯即便轉來總是本體上工夫從本體發念即是本體從念上轉來即轉即是本體一念離了本體一念即成差錯一轉不到本體即千轉都無實益文過怙終遂成大錯皆起於轉之逺也此無他離了本體便屬形體一著形體便落惡道毫釐千里端在於此答葉文奎秋問喜怒哀樂未發氣象何如師反詰之對曰衆人之情憧憧擾擾安得未發意者養成之後乎師曰中即性也必待養成而後為中然則衆人無中遂無性乎秋以至善為對師曰喜怒哀樂終日離他不得豈爾終日間通無此中不自反求牽合附會益見支離秋被逼迫通身流汗忽聞蟬聲因省曰此聲之入吾何以受之而知為蟬也聲寂矣知何以不隨之而去也乃對曰意者吾身中目能視耳能聽鼻能嗅口能言其中有主之而不著於此者是謂中乎師首肯曰近之矣從此體驗亦得秋又曰意者君子而時中無時不有無方可執無處不滿見得此中則天地位萬物育天下歸仁直在眼前乎師舉手曰可矣可矣由此以進聖人不難學矣曰然則可以把持乎師曰爾不把持彼從何處去秋曰然則何以用功師曰離天地萬物不得日從此處用功而位育自在其中最要緊處在內省不疚無惡於志秋於是怡然順適判然氷解方鳴秋問答立教須名至善修學本自無為要知真性是我明明天命為誰不離喜怒哀樂超然獨抱圓規有耳誰能聽得有眼窅焉難窺本來巍巍堂堂古今一毫無虧動中漠然不動生生化化無遺謾道一切中節一切本無追隨但要自明自覺三德五道不回三德五道由一從君開眼伸眉但能此中不疚天地萬物皆歸朂方鳴秋光祿劉本孺先生元珍劉元珍字伯先别號本孺武進人萬厯乙未進士歷官禮部兵部郎乙已大計四明庇其私人盡復臺省之黜者察疏留中人心憤甚不敢發先生抗疏刺其奸削籍歸而四明亦罷庚申起光祿寺少卿時遼藩初沒贊畫劉國縉擁衆欲從登萊南濟先生謂國縉為寧逺義兒扶同賣國今又竄處內地意欲何為國縉遂以不振未幾卒官年五十一先生家居講學錢啓新為同善會表章節義優恤鰥寡以先生為主有言非林下人所宜者先生痌瘝一體如救頭目惡問其宜不宜也先生每以子路自任不使惡言入於東林講論稍涉附會輒正色斥之曰毋亂我宗旨聞謗講學者曰彼訾吾黨好名以為口實其實彼之不好名乃專為決裂名教地也疾小人不欲見茍其在側喉間輒如物梗必吐之而後已當東林為天下彈射先生謂高宗憲曰此吾輩入火時也無令其成色有減斯可矣明儒學案卷六十
