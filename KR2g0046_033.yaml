body:
  text: 明儒學案卷三十三餘姚黃宗羲撰泰州學案二文肅趙大洲先生貞吉趙貞吉字孟靜號大洲蜀之內江人生而神頴六歲誦書日盡數卷登嘉靖十一年進士第選庶吉士授編修因上惑方術疏請敷求真儒不報遷右春坊右中允管司業事二十九年京師戒嚴嫚書要貢集百官議闕下日中莫發一論者先生出班大言曰城下之盟春秋恥之華亭問何竒畫先生曰為今之計皇上出御正殿下詔引咎録周尚文之功以勵邉帥釋沈束之獄以開言路輕損軍之令重賞功之格飭文武百司為城守遣官宣諭諸將監督力戰其他無可為畫者上即升先生左春坊左諭德兼河南道監察御史給賞功銀五萬兩令其隨宜區處宣諭將士方廷議罷先生盛氣謁相嵩於西苑直中嵩辭不見先生怒叱門者㑹通政趙文華趨入顧謂先生曰公休矣天下事當徐議之先生愈怒罵曰汝權門犬何知天下事嵩聞大恨欲敗其事故不與督戰事權亦不與一護卒先生單騎出城僦民車致銀總兵仇鸞所歷諸營傳諭而返明日復命上怒謂功賞未見措置第為周尚文沈束懷怨詔錦衣衛逮杖謫廣西荔波縣典史量移徽州通判稍遷南京文選司主事進郎中升光祿寺少卿通政司參議右通政光祿寺卿户部右侍郎皆在南京四十年始入為户部右侍郎又以忤嵩罷隆慶改元起吏部侍郎兼翰林院學士掌詹事府事上幸學暫掌祭酒事出為南京禮部尚書召入兼翰林院學士協管詹事府事尋拜文淵閣大學士先生在閣與高文襄共事而議多不合其大者謂御兵分𨽻五府數變之後至嘉靖庚戌别立戎政㕔以十餘萬衆統於一人盡變祖制夫兵權貴於分練兵亦貴於分此古法也疏下廷臣議行而本兵霍冀不悅及給事中楊鎔論冀冀遂誣先生主使上終直先生而罷冀文襄以徐文貞草世廟遺詔改政改臣為讐君將欲加罪先生拂衣起曰若是則先帝大禮大獄諸案即宋之奷黨碑也文襄色變而止文襄以閣臣兼掌吏部事使先生兼掌都察院事文襄欲修怨廷中之異已者非時考察科道先生執筆文襄終不得志其爭給事中吳時來至於日中於是文襄使其客韓楫劾先生為庸橫先生言人臣庸則不能橫橫非庸臣之所能也臣兢兢唯拱言是聽僅以考察一事與之相左臣真庸臣也若拱者然後可謂之橫也已詔馳驛歸杜門著述擬作二通以括古今之書內篇曰經世通外篇曰出世通內篇又分二門曰史曰業史之為部四曰統曰傳曰制曰志業之為部四曰典曰行曰藝曰銜外篇亦分二門曰說曰宗說之為部三曰經曰律曰論宗之為部一曰單傳直指書雖未成而其緒可尋也萬厯四年三月十五日卒年六十九贈少保諡文肅先生之學李贄謂其得之徐波石按先生之論中也曰世儒解中者不偏不倚無過不及之名而不知言中為何物今夫置器於地平正端審然後曰此器不偏不倚度物之數長短適中然後曰此物無過不及今舍其器物未問其作何名狀而但稱曰不偏不倚無過不及則茫茫虛號何所指歸若以為物物有天然之則事事有當可之處夫天然之則在此物者不能以該於彼物當可之處在此事者不能以通於他事若以為道心為主而人心聽命則動靜云為之際自無過不及之差此又以中為學問之效寧有三聖心傳不指其體而僅言其效乎波石之論中也亦曰伊川有堂之中為中國之中為中若中可擬而明也易不當曰神無方而易無體矣故知先生有所授受也先生初不自諱其非禪學嘗與徐魯源相遇魯源言學問當有所取有所舍先生厲聲曰吾這裡無取無舍宛然宗門作用也其答友人云僕之為禪自弱冠以來敢欺人哉試觀僕之行事立身於名教有悖謬者乎則禪之不足以害人明矣僕蓋以身證之非世儒徒以口說諍論比也先生謂禪不足以害人者亦是有說朱子云佛學至禪學大壞蓋至於今禪學至棒喝而又大壞棒喝因付囑源流而又大壞就禪教中分之為兩曰如來禪曰祖師禪如來禪者先儒所謂語上而遺下彌近理而大亂真者是也祖師禪者縱橫捭闔純以機巧小慧牢籠出沒其間不啻逺理而失真矣今之為釋氏者中分天下之人非祖師禪勿貴遞相囑付聚羣不逞之徒教之以機械變詐皇皇求利其害寧止於橫水猛獸哉故吾見今之學禪而有得者求一朴實自好之士而無有假使達摩復來必當折棒噤口塗抹源流而後佛道可興先生之所謂不足以害人者亦從彌近理而大亂真者學之古來如大年東坡無垢了翁一輩皆出於此若其逺理而失真者則斷斷無一好人也先生嘗遊嵩高抱犢伏牛諸山德清蔡子木問道述七圖示之其一混元圖其二出庚圖其三浴魄圖其四伊字三㸃之圖其五字輪相之圖其六周子太極圖其七河圖謂一以攝六六以顯一一者真空也六者妙有也世間法與出世法皆備矣先生蓋見溈仰山圖相創立宗㫖與太極圖相似故扭合為一而不顧其理之然否也夫太極只一圈耳一圈之外不可更加一圈也仰山之圖相九十七一圓分主一事不得謂之混元矣是故形同而實異也出庚浴魄魏伯陽以月象附㑹納甲趙汝梅朱風林皆嘗駁之與太極益不合矣英雄欺人徒自欺耳大洲雜録曾子曰夫子之道忠恕而已矣不欺其心為忠能度人之心為恕夫不欺自心與能度他心者豈今之人盡不能者哉循是義也堂堂平平以入夫子之門是千載而夕昕也學術之歷古今譬之有國者三代以前如玉帛俱㑹之日通天下之物濟天下之用而不必以地限也孟荀以後如加關譏焉稍察阻矣至宋南北之儒殆遏糴曲防獨守溪域而不令相往來矣陳公甫嘗歎宋儒之大嚴夫物不通方則用窮學不通方則見陋且諸子如董揚以下蘇陸以上姑不論晦翁法程張矣而不信程張尊楊謝矣而力闢楊謝凡諸靈覺明悟通解妙達之論盡以委於禪目為異端而懼其一言之汚也顧自日看案上六經論孟及程氏文字於一切事物理㑹以為極致至太極無極隂陽仁義動靜神化之訓必破碎支離之為善稍涉易簡疏暢則動色不忍言恐墮異端矣夫謂靈覺明妙禪者所有而儒者所無非靈覺明妙則滯窒昏愚豈謂儒者必滯窒昏愚而後為正學耶天地萬物本吾一體也而吾何以知天地萬物之然哉天地非仁將恐折萬物非仁將恐歇吾心非仁吾身將恐蹶吾何以知吾身之然哉吾視非仁盲從目生吾聽非仁聾從耳騰吾言非仁口過瞢瞢吾動非仁身過殷殷嗚呼微翳眯睛則八方易位一念顛倒而人已成敵執迷為真賊以代子四竅塵投一妙覺死樂出於虛蒸則成菌既死之心不可復振蝸窟蚓穴去仁幾何鳶飛魚躍於仁何若古之有道去彼取此三才歸根一日克己吾何心知有道之然哉以其無己也故能成其已嗚呼吾有大已俯萬物而觀天地者也大己不浹小已揭揭小已既克大已潑潑古之善克者視於無形聽於無聲動無軌轍言非述稱四用反一一真流行無體無方禮嘉而亨少有意必固我作類妙用齊滯具為痿痺此為不仁而株橛小已是故無已為克真已為大至大為仁體無對待不見大小焉知內外性此曰聖復此曰賢小子至愚擇焉執焉昔者吾友從事於此敢告非狂為仁由己克已銘明儒學案卷三十三
