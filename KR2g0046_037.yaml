body:
  text: 明儒學案卷三十七餘姚黄宗羲撰甘泉學案王湛兩家各立宗㫖湛氏門人雖不及王氏之盛然當時學於湛者或卒業於王學於王者或卒業於湛亦猶朱陸之門下逓相出入也其後源逺流長王氏之外名湛氏學者至今不絶即未必仍其宗㫖而淵源不可沒也文簡湛甘泉先生若水太僕吕巾石先生懐侍郎何吉陽先生遷郡守洪覺山先生垣主政唐一菴先生樞侍郎蔡白山先生汝楠侍郎許敬菴先生孚逺恭定馮少墟先生從吾文選唐曙臺先生伯元端潔楊止菴先生時喬文定王順渠先生道甘泉學案一文簡湛甘泉先生若水湛若水字元明號甘泉廣東增城人從學於白沙不赴計偕後以母命入南雍祭酒章楓山試睟靣盎背論竒之登𢎞治乙丒進士第初楊文忠張東白在闈中得先生卷曰此非白沙之徒不能為也拆名果然選庶吉士擢編修時陽明在吏部講學先生與吕仲木和之乆之使南安册封國王正德丁亥奉母䘮歸廬墓三年卜西樵為講舎士子来學者先令習禮然後聽講興起者甚衆嘉靖初入朝陞侍讀尋陞南京祭酒禮部侍郎厯南京禮吏兵三部尚書致仕平生足跡所至必建書院以祀白沙從遊者殆徧天下年登九十猶為南嶽之遊將過江右鄒東廓戒其同志曰甘泉先生来吾輩當憲老而不乞言母輕有所論辨也庚申四月丁巳卒年九十五先生與陽明分主教事陽明宗㫖致良知先生宗㫖隨處體認天理學者遂以王湛之學各立門戸其間為之調停者謂天理即良知也體認即致也何異何同然先生論格物條陽明之説四不可陽明亦言隨處體認天理為求之於外是終不可强之使合也先生大意謂陽明訓格為正訓物為念頭格物是正念頭也茍不加學問思辨行之功則念頭之正否未可據夫陽明之正念頭致其知也非學問思辨行何以為致此不足為陽明格物之説病先生以為心體萬物而不遺陽明但指腔子裏以為心故有是内而非外之誚然天地萬物之理實不外於腔子裏故見心之廣大若以天地萬物之理即吾心之理求之天地萬物以為廣大則先生仍是舊説所拘也天理無處而心其處心無處而寂然未發者其處寂然不動感即在寂之中則體認者亦惟體認之於寂而已今曰隨處體認無乃體認於感其言終覺有病也湛甘泉心性圖説性者天地萬物一體者也渾然宇宙其氣同也心也者體天地萬物而不遺者也性也者心之生理也心性非二也譬之榖焉具生意而未發未發故渾然而不可見及其發也惻隐羞惡辭讓是非萌焉仁義禮智自此焉始分矣故謂之四端端也者始也良心發見之始也是故始之敬者戒懼慎獨以養其中也中立而和發焉萬事萬化自此焉逹而位育不外是矣故位育非有加也全而歸之者耳終之敬者即始之敬而不息焉者也曰何以小圈曰心無所不貫也何以大圈曰心無所不包也包與貫實非二也故心也者包乎天地萬物之外而貫夫天地萬物之中者也中外非二也天地無内外心亦無内外極言之耳矣故謂内為本心而外天地萬事以為心者小之為心也甚矣求放心篇孟子之言求放心吾疑之孰疑之曰以吾之心而疑之孰信哉信吾心而已耳吾常觀吾心於無物之先矣洞然而虚昭然而靈虚者心之所以生也靈者心之所以神也吾常觀吾心於有物之後矣窒然而塞憒然而昏塞者心之所以死也昏者心之所以物也其虛焉靈焉非由外来也其本體也其塞焉昏焉非由内往也欲蔽之也其本體固在也一朝而覺焉蔽者徹虛而靈者見矣日月蔽於雲非無日月也鑑蔽於塵非無明也人心蔽於物非無虛與靈也心體物而不遺無内外無終始無所放處亦無所放時其本體也信斯言也當其放於外何者在内當其放於前何者在後何者求之放者一心也求者又一心也以心求心所為憧憧往来朋從爾思秪益亂耳况能有存耶夫欲心之勿蔽莫若寡欲寡欲莫若主一甘泉論學書格物之義以物為心意之所著兄意只恐人舍心求之於外故有是説不肖則以為人心與天地萬物為體心體物而不遺認得心體廣大則物不能外矣故格物非在外也格之致之心又非在外也於物若以為心意之著見恐不免有外物之疾與陽明學無難易要在察見天理知天之所為如是涵養變化氣質以至光大爾非杜撰以相罔也於夫子川上之嘆子思鳶魚之説及易大人者天地合徳處見之若非一理同體何以云然故見此者謂之見易知此者謂之知道是皆發見於日用事物之間流行不息百姓日用不知要在學者察識之耳涵養此知識要在主敬無間動静也寄王純甫學者之病全在三截兩截不成片段静坐時自静坐讀書時又自讀書酬應時又自酬應如人身血氣不通安得長進元来只是敬上理會未透故未有得力處又或以内外為二而離之吾人切要只於執事敬用功自獨處以至讀書酬應無非此意一以貫之内外上下莫非此理更有何事吾儒開物成務之學異於佛老者此也答徐曰仁上下四方之宇古往今来之宙宇宙間只是一氣充塞流行與道為體何莫非有何空之云雖天地弊壊人物消盡而此氣此道亦未嘗亡則未嘗空也寄陽明古之論學未有以静為言者以静為言者皆禪也故孔門之教皆欲事上求仁動静著力何者静不可以致力纔致力即已非静矣故論語曰執事敬易曰敬以直内義以方外中庸戒慎恐懼慎獨皆動以致其力之方也何者静不可見茍求之静焉駸駸乎入於荒忽寂滅之中矣故善學者必令動静一於敬敬立而動静渾矣此合内外之道也答徐督學從事學問則心不外馳即所以求放心如子夏博學篤志切問近思仁在其中者非謂學問之外而别求心於虛無也答仲鶡心存則有主有主則物不入不入則血氣矜忿窒礙之病皆不為之害矣大抵至𦂳要處在執事敬一句若能於此得力如樹根著土則風雨雷霆莫非發生此心有主則書冊山水酬應皆吾致力涵養之地而血氣矜忿窒礙乆將自消融矣答陳惟浚涵養須用敬進學在致知如車兩輪夫車兩輪同一車也行則俱行豈容有二而謂有二者非知程學者也鄙見以為如人行路足目一時俱到涵養進學豈容有二自一念之微以至於事為講習之際涵養致知一時並在乃為善學也故程子曰學在知所有養所有朱元晦初見延平甚愛程子渾然同體之説延平語云要見理一處却不難只分殊處却難又是一塲鍜鍊也愚以為未知分殊則亦未知理一也未知理一亦未必知分殊也二者同體故也敬以直内義以方外所以體夫此也敬義無内外也皆心也而云内外者為直方言之耳皆同上執事敬最是切要徹上徹下一了百了致知涵養此其地也所謂致知涵養者察見天理而存之也非二事也答鄧瞻兄弟明道所言存乆自明何待窮索須知所存者何事乃有實地首言識得此意以誠敬存之知而存也又言存乆自明存而知也知行交進所知所存皆是一物其終又云體之而樂亦不患不能守大段要見得這頭腦親切存之自不費力耳答方西樵夫學不過知行知行不可離又不可混説命曰學於古訓乃有獲非知之艱行之惟艱中庸必先學問思辨而後篤行論語先博文而後約禮孟子知性而後養性始條理者知之事終條理者聖之事程子知所有而養所有先識仁而以誠敬存之若僕之愚見則於聖賢常格内尋下手庶有自得處故隨處體認天理而涵養之則知行並進矣答顧箬溪道無内外内外一道也心無動静動静一心也故知動静之皆心則内外一内外一又何往而非道合内外混動静則澄然無事而後能止故易曰艮其背不獲其身行其庭不見其人止之道也夫不獲其身必有獲也不見其人必有見也言有主也夫然後能止復王宜學夫所謂支離者二之之謂也非徒逐外而忘内謂之支離是内而非外者亦謂之支離過猶不及耳必體用一原顯微無間一以貫之乃可免此答陽明夫學以立志為先以知本為要不知本而能立志者未之有也立志而不知本者有之矣非真志也志立而知本焉其於聖學思過半矣夫學問思辨所以知本也知本則志立志立則心不放心不放則性可復性復則分定分定則於憂怒之来無所累於心性無累斯無事矣茍無其本乃憧憧乎放心之求是放者一心求之者又一心也則情熾而益鑿其性性鑿則憂怒之累無窮矣答鄭啓範格者至也即格於文祖有苖之格物者天理也即言有物舜明於庶物之物即道也格即造詣之義格物者即造道也知行並進學問思辨行皆所以造道也故讀書親師友酬應隨時隨處皆求體認天理而涵養之無非造道之功誠正修工夫皆於格物上用家國天下皆即此擴充無兩段工夫此即所謂止至善嘗謂止至善則明德親民皆了者此也如是方可講知至孟子深造以道即格物之謂也自得之即知至之謂也居安資深逢原即修齊治平之謂也答陽明夫至虛者心也非性之體也性無虛實説甚靈耀心具生理故謂之性性觸物而發故謂之情發而中正故謂之真情否則偽矣道也者中正之理也其情發於人倫日用不失其中正焉則道矣勿忘勿助其間則中正處也此正情復性之道也復鄭啓範謹獨格物其實一也格物者至其理也學問思辨行所以至之也是謂以身至之也所謂窮理者如是也近而心身逺而天下暫而一日乆而一世只是格物一事而已格物云者體認天理而存之也答陳宗亨所云主一是主一個中與主一是主天理之説相𩔖然主一便是無一物若主中天理則又多了中與天理即是二矣但主一則中與天理自在其中矣答鄧恪昭明德新民全在止至善上用功知止能得即是知行合一乃止至善之功古之欲明明德二節反復推到格物上意心身都来格物上用功上文知止定安即其功也家國天下皆在内元是一段工夫合外内之道更無七段八段格物者即至其理也意心身於家國天下隨處體認天理也所謂致者意心身至之也世以想像記誦為窮理者逺矣寄陳惟浚集者如虛集之集能主敬則衆善歸焉勿忘勿助敬之謂也故曰敬者德之聚也此即精一工夫若尋常所謂集者乃於事事上集無乃義襲耳此内外之辨也然能主敬則事事無不在矣今更無别法只於勿忘勿助之間調停為𦂳要耳答問集義本末只是一氣擴充此生意在心為明德在事為親民非謂静坐而明德及長然後應事以親民也一日之間開眼便是應事即親民自宋来儒者多分兩段以此多陷支離自少而長豈有不應事者應事而為枝葉皆是一氣擴充答陳康涯天地至虛而已虛則動静皆虚故能合一恐未可以至静言虛實同體也佛氏岐而二之已不識性且求去根塵非得真虛也世儒以佛氏為虛無烏足以及此格物即止至善也聖賢非有二事自意心身至家國天下無非隨處體認天理體認天理即格物也蓋自一念之微以至事為之著無非用力處也陽明格物之説以為正念頭既於後面正心之説為贅又况如佛老之學皆自以為正念頭矣因無學問思辨行之功隨處體認之實遂併與其所謂正者一齊錯了以上答王宜學陽明謂隨處體認天理是求於外若然則告子義外之説為是而孟子長之者義乎之説為非孔子執事敬之教為欺我矣程子所謂體用一元顯微無間格物是也更無内外蓋陽明與吾看心不同吾之所為心者體萬物而不遺者也故無内外陽明之所謂心者指腔子裏而為言者也故以吾之説為外答楊少黙以隨處體認為求之於外者非也心與事應然後天理見焉天理非在外也特因事之来隨感而應耳故事物之来體之者心也心得中正則天理矣人與天地萬物一體宇宙内即與人不是二物故宇宙内無一事一物合是人少得底云敬者心在於是而不放之謂此恐未盡程子云主一之謂敬主一者心中無有一物也故云一若有一物則二矣勿忘勿助之間乃是一今云心在於是而不放謂之勿忘則可矣恐不能不滯於此事則不能不助也可謂之敬乎程子曰格者至也物者理也至其理乃格物也故古本以修身説格物今云格物者事當於理之謂也不若云隨處體認天理之盡也體認兼知行也當於理是格物後事故曰物格而後知至云敬而後當於理敬是格物工夫也聖賢之學元無静存動察相對只是一段工夫凡所用功皆是動處蓋動以養其静静處不可著力才著力便是動矣至伊川乃有静坐之説又别開一個門靣故僕誌先師云孔孟之後若更一門蓋見此也勿忘勿助只是説一個敬字忘助皆非心之本體此是心學最精宻處不容一毫人力故先師又發出自然之説至矣来諭忘助二字乃分開看區區會程子之意只作一時一段看蓋勿忘勿助之間只是中正處也學者下手須要理㑹自然工夫不須疑其為聖人熟後事而姑為他求蓋聖學只此一個路頭更無别個路頭若尋别路終枉了一生也答聶文蔚明道看喜怒哀樂未發前作何氣象延平黙坐澄心體認天理象山在人情事變上用工夫三先生之言各有所為而發合而觀之合一用功乃盡也所謂隨處體認天理者隨未發已發隨動隨静蓋動静皆吾心之本體體用一原故也若謂静未發為本體而外已發而動以為言恐亦岐而二之也答孟津石翁名節道之藩籬者云藩籬耳非即道也若謂即道然則東漢之名節晨門荷蕢之髙尚皆為得道耶蓋無其本也答王順渠天理二字聖賢大頭腦處若能隨處體認真見得則日用間叅前倚衡無非此體在人涵養以有之於已耳上白沙先先答陽明王都憲論格物兩承手教格物之論足認至愛然僕終有疑者疑而不辨之則不可欲辨之亦不可不辨之則此學終不一而朋友見責王宜學則曰講求至當之歸先生責也方叔賢則亦曰非先生辨之其誰也辨之則稍以兄喜同而惡異是已而忽人是已而忽人則已自聖而人言逺矣而陽明豈其然乎乃不自外而僣辨之蓋兄之格物之説有不敢信者四自古聖賢之學皆以天理為頭腦以知行為工夫兄之訓格為正訓物為念頭之發則下文誠意之意即念頭之發也正心之正即格也於文義不亦重複矣乎其不可一也又於上文知止能得為無承於古本下節以修身説格致為無取其不可二也兄之格物訓云正念頭也則念頭之正否亦未可據如釋老之虛無則曰應無所住而生其心無諸相無根塵亦自以為正矣楊墨之時皆以為聖矣豈自以為不正而安之以其無學問之功而不知所謂正者乃邪而不自知也其所自謂聖乃流於禽獸也夷惠伊尹孟子亦以為聖矣而流於隘與不恭而異於孔子者以其無講學之功無始終條理之實無智巧之妙也則吾兄之訓徒正念頭其不可者三也論學之最始者則説命曰學於古訓乃有獲周書則曰學古入官舜命禹則曰惟精惟一顔子述孔子之教則曰博文約禮孔子告哀公則曰學問思辨篤行其歸於知行並進同條共貫者也若如兄之説徒正念頭則孔子止曰德之不修可矣而又曰學之不講何耶止曰黙而識之可矣而又曰學而不厭何耶又曰信而好古敏求者何耶子思止曰尊德性可矣而又曰道問學者何耶所講所學所好所求者何耶其不可者四也考之本章既如此稽之往聖又如彼吾兄確然自信而欲人以必從且為聖人復起不能易者豈兄之明有不及此蓋必有蔽之者耳若僕之鄙説似有可采者五訓格物為至其理始雖自得然稽之程子之書為先得同然一也考之章首止至善即此也上文知止能得為知行並進至理工夫二也考之古本下文以修身申格致為於學者極有力三也大學曰致知在格物程子則曰致知在所養養知在寡欲以涵養寡欲訓格物正合古本以修身申格物之㫖為無疑四也以格物兼知行其於自古聖訓學問思辨篤行也精一也博約也學古好古信古也修德講學也黙識學不厭也尊德性道問學也始終條理也知言養氣也千聖千賢之教為不謬五也五者可信而吾兄亦不省焉豈兄之明有不及此蓋必有蔽之者耳僕之所以訓格者至其理也至其理云者體認天理也體認天理云者兼知行合内外言之也天理無内外也陳世傑書報吾兄疑僕隨處體認天理之説為求於外若然不幾於義外之説乎求即無内外也吾之所謂隨處云者隨心隨意隨身隨家隨國隨天下蓋隨其所寂所感時耳一耳寂則廓然大公感則物来順應所寂所感不同而皆不離於吾心中正之本體本體即實體也天理也至善也物也而謂求之外可乎致知云者蓋知此實體也天理也至善也物也乃吾之良知良能也不假外求也但人為氣習所蔽故生而䝉長而不學則愚故學問思辨篤行諸訓所以破其愚去其蔽警發其良知良能者耳非有加也故無所用其絲毫人力也如人之夢寐人能喚之醒耳非有外與之惺也故格物則無事矣大學之事畢矣若徒守其心而無學問思辨篤行之功則恐無所警發雖似正實邪下則為老佛楊墨上則為夷惠伊尹是也何者昔曽參芸𤓰誤㫁其根父建大杖撃之死而復甦曽子以為無所逃於父為正矣孔子乃曰小杖受大杖逃乃天理矣一事出入之間天人判焉其不可講學乎詰之者則曰孔子又何所學心焉耳矣殊不知孔子至聖也天理之極致也仁熟義精也然必七十乃從心所欲不踰矩人不學則老死於愚耳矣若兄之聰明非人所及固不敢測然孔子亦嘗以學自力以不學自憂矣今吾兄望髙位崇其天下之士所望風而從者也故術不可不慎教不可不中正兄其圖之兄其圖之則斯道可興此學可明矣若兄今日之教僕非不知也僕乃嘗迷方之人也且僕獲交於兄十有七年矣受愛於兄亦可謂深矣嘗愧有懐而不盡吐將為老兄之罪人天下後世之歸咎乃不自揣其分傾倒言之若稍有可采乞一俯察若其謬妄宜擯斥之吾今可以黙矣謹啓語錄衝問舜之用中與囘之擇乎中庸莫亦是就自己心上斟酌調停融合人心天理否先生曰用中擇中庸與允執厥中皆在心上若外心性何處討中事至物来斟酌調停者誰耶事物又不曽帶得中来故自堯舜至孔顔皆自心學盤問日用切要工夫道通曰老先生之教惟立志煎銷習心體認天理之三言者最為切要然亦只是一事每令盤體而熟察之乆而未得其所以合一之義敢請明示先生曰此只是一事天理是一大頭腦千聖千賢共此頭腦終日終身只是此一大事更無别事立志者志乎此而已體認是工夫以求得乎此者煎銷習心以去其害此者心只是一個好心本来天理完完全全不待外求顧人立志與否耳孔子十五志於學即志乎此也此志一立三十四十五十六十七十直至不踰矩皆是此志變化貫通只是一志志如草木之根具生意也體認天理如培灌此根煎銷習心如去草以䕶此根貫通只是一事心問如何可以逹天德道通云只體認天理之功一内外兼動静徹終始一息不容少懈可以逹天德矣盤問何謂天德何謂王道道通謂君且理㑹慎獨工夫来敢問慎獨之與體認天理果若是同與先生曰體認天理與謹獨其功夫俱同獨者獨知之理若以為獨知之地則或有時而非中正矣故獨者天理也此理惟已自知之不但暗室屋漏日用酬應皆然慎者所以體認乎此而已若如是有得便是天德便即有王道體用一原也一友問何謂天理衝答曰能戒慎恐懼者天理也友云戒慎恐懼是工夫衝曰不有工夫如何得見天理故戒慎恐懼者工夫也能戒慎恐懼者天理之萌動也循此戒慎恐懼之心勿忘勿助而認之則天理見矣熟焉如堯之兢兢舜之業業文王之翼翼即無往而非天理也故雖謂戒慎恐懼為天理可也今或不實下戒慎不覩恐懼不聞之功而直欲窺見天理是之謂先獲後難無事而正即此便是私意遮蔽烏乎得見天理耶先生曰戒慎恐懼是工夫所不覩不聞是天理工夫所以體認此天理也無此功夫焉見天理舜臣謂正應事時操存此心在身上作主宰隨處體認吾心身天理真知覺得吾心身生生之理氣所以與天地宇宙生生之理氣脗合為一體者流動於腔子形見於四體被及於人物遇父子則此生生天理為親遇君臣則此生生天理為義遇師弟則此生生天理為敬遇兄弟則此生生天理為序遇夫婦則此生生天理為别遇朋友則此生生天理為信在處常則此生生天理為經在處變則此生生天理為權以至家國天下華彛四表莅官行法班朝治軍萬事萬物逺近巨細無往而非吾心身生生之理氣根本於中而發見於外名雖有異而只是一個生生理氣隨感隨應散殊見分焉耳而實非有二也即此便是義以方外之功即此便是物来順應之道而所以行天下之逹道者在是焉愚見如此未審是否先生曰如此推得好自隨處體認以下至實非有二也皆是可見未應時只一理及應事時纔萬殊中庸所謂溥博淵泉而時出之正為此後儒都不知不信若大公順應敬直義方皆合一道理宜通上章細玩之體用一原一友問察見天理恐言於初學難為下手衝答曰夫子之説科也中道而立能者從之天理二字是就人所元有者指出以為學者立的耳使人誠有志於此而日加體認之功便須有見若其不能見者不是志欠真切便是習心障蔽知是志欠真切只須責志知為習心障蔽亦只責志即習心便消而天理見矣先生曰天理二字人人固有非由外鑠不為堯存不為桀亡故人皆可以為堯舜途之人可以為禹者同有此耳故途之人之心即禹之心禹之心即堯舜之心總是一心更無二心蓋天地一而已矣記云人者天地之心也天地古今宇宙内只同此一個心豈有二乎初學之與聖人同此心同此一個天理雖欲强無之又不得有時見孺子入井見餓殍過宗廟到墟墓見君子與夫夜氣之息平旦之氣不知不覺萌動出来遏他又遏不得有時志不立習心蔽障又忽不見了此時莭蓋心不存故也心若存時自爾見前唐人詩亦有理到處終日覔不得有時還自来須要得其門所謂門者勿忘勿助之間便是中門也得此中門不患不見宗廟之美百官之富責志去習心是矣先須要求此中門一友患天理難見衝對曰須於心目之間求之天理有何影形只是這些虛靈意思平鋪著在不容你増得一毫減得他一毫輕一毫不得重一毫亦不得前一歩不得却一步亦不得須是自家理㑹先生曰看得儘好不増不減不輕不重不前不却便是中正心中正時天理自見難見者在於心上功夫未中正也但謂天理有何形影是矣又謂只是這些虛靈意思平鋪著在恐便有以心為天理之患以知覺為性之病不可不仔細察釋氏以心之知覺為性故云蠢動含靈莫非佛性而不知心之生理乃性也平鋪二字無病孚先問戒慎不覩恐懼不聞敬也所謂必有事焉者也勿忘勿助是調停平等之法敬之之方也譬之内丹焉不覩不聞其丹也戒慎恐懼以火養丹也勿忘勿助所謂文武火候然否先生曰此段看得極好須要知所謂其所不覩其所不聞者何物事此即道家所謂真種子也故其詩云鼎内若無真種子如將水火煮空鐺試看吾儒真種子安在尋得見時便好下文武火也勉之勉之衝嘗與仲木伯載言學因指雞母為喻云雞母抱卵時全體精神都只在這幾卵上到得精神用足後自化出許多雞雛来吾人於天地間萬事萬化都只根源此心精神之運用何如耳吕陸以為然一友云説雞母精神都在卵上恐猶為兩事也此又能補衝言所不逮者先生曰雞卵之譬一切用功正要如此接續許大文王只是緝熈敬止雞抱卵少間㫁則這卵便􅖁了然必這卵元有種子方可若無種的卵將来抱抱之雖勤亦􅖁了學者須識種子方不枉了工夫何謂種子即吾此心中這一㸃生理便是靈骨子也今人動不動只説涵養若不知此生理徒涵養個甚物釋氏為不識此種子故以理為障要空要滅又焉得變化人若不信聖可為請看無種子雞卵如何抱得成雛子皮毛骨血形體全具出殻来都是一團仁意可以人而不如鳥乎精神在卵内不在抱之者或人之言亦不可廢也明道先生言學者須先識仁衝問儒釋之辨先生曰子可謂切問矣孟子之學知言養氣首欲知詖淫邪遯之害心蓋此事苐一歩生死路頭也往年曽與一友辨此渠云天理二字不是校仙勘佛得来吾自此遂不復講吾意謂天理正要在此岐路上辨辨了便可泰然行去不至差毫釐而謬千里也儒者在察天理佛者反以天理為障聖人之學至大至公釋者之學至私至小大小公私足以辨之矣昨潘稽勲石武選亦嘗問此吾應之曰聖人以天地萬物為體即以身當天地萬物看何等廓然大公焉得一毫私意凡私皆從一身上起念聖人自無此以是無意必固我之私若佛者務去六根六塵根塵指耳目口鼻等為言然皆天之所以與我不能無者而務去之即已一身亦奈何不得不免有意必固我之私猶强謂之無我耳何等私小二子聞言即悟歎今日乃知如此先正未嘗言到或問學貴煎銷習心心之習也非固有也形而後有者也外鑠而中受之也如秦人之悍也楚人之詐也心之習於風氣者也處富而鄙吝與處約而好侈靡者心之習於居養者也故曰性相近也習相逺也煎銷也者煉金之名也金之精也有汚於鉛者有汚於銅者有汚於糞土之侵蝕者非鍊之不可去也故金必百鍊而後精心必百鍊而後明先生曰此説得之認得本體便知習心習心去而本體完全矣不是將本體来換了習心本體元自在一習心蔽之故若不見耳不然見赤子入井便如何發出来故煎銷習心便是體認天理功夫到見得天理時習心便退聽如煎銷鉛銅便是鍊金然必須就鑪錘乃得鍊之之功今之外事以求静者如置金於宻室不就鑪錘雖千萬年也只依舊是頑雜的金衝未發之中唯聖人可説得若是聖人而下都是致和底工夫然所謂和者不戾於中之謂乃是就情上體貼此中出来中立而和生也到得中常在時雖併謂之致中和亦可也然否先生曰道通所謂情上體貼此中出来一句與中立而和生皆是其餘未精致中和乃修道立教之功用道至中和極矣更又何致耶若以未發之中為聖人分上致和工夫為聖人而下學者分上則又欠明了所不睹不聞即未發之中也道之體也學者須先察識此體而戒慎恐懼以養之所謂養其中也中立而和生焉若謂自然而中則惟聖可能也若功夫則正是學者本源𦂳要處動以養其静道通徒見戒慎恐懼字以為致和耳或問認思慮寧静時為天理為無我為天地萬物一體為鳶飛魚躍為活潑潑地自以為灑然者因言遇動輙不同何也衝應之曰譬之行舟若這個舟風恬浪静時或將就行得若遇狂風迭浪便去不得也要去須得柁柄在手故學莫先於立主宰若無主宰便能胸中無他閒思雜想亦只討得個清虛一大氣象安得為天理安可便説鳶飛魚躍程明道先生嘗言鳶飛戾天魚躍於淵與必有事焉而勿正意同昔聰明如文公直到晚年纔認得明道此意未知道必有事焉是何事先生曰天理亦不難見亦不易見要須切已實用必有事焉而勿正功夫乃可真見都是鳶飛魚躍不然亦只是説也先生曰衝切謂初學之士還須令静坐息思慮漸教以立志體認天理煎銷習心及漸令事上磨鍊衝嘗厯厯以此接引人多見其益動静固宜合一用工但静中為力較易蓋人資質不同及其功用純雜亦異須是因才成就隨時㸃化不可拘執一方也然雖千方百計總是引歸天理上来此則不可易正猶母雞抱卵須是我底精神合併他底精神一例用方得如何先生曰静坐程門有此傳授伊川見人静坐便歎其善學然此不是常理日往月来一寒一暑都是自然常理流行豈分動静難易若不察見天理隨他入關入定三年九年與天理何干若見得天理則耕田鑿井百官萬物金革百萬之衆也只是自然天理流行孔門之教居處恭執事敬與人忠黄門毛式之云此是隨處體認天理甚看得好無事時不得不居處恭即是静坐也執事與人時如何只要静坐使此教大行則天下皆静坐如之何其可也明道終日端坐如泥塑人及其接人渾是一圑和氣何等自然昨日孚先以長至在邇作飯會席間因講復其見天地之心衝謂諸友云人心本自坦坦平平即所謂天地之心不待復而後見也聖人見人多迷而不復恐其滅絶天理不得已又就其復處指㸃出来欲令人便循著擴充將去也吾輩若能守得平坦之心常在即不消言復只怕無端又生出别念来耳故顔子克已只是不容他軀殻上起念諸友以為然如何先生曰冬至一陽初動所謂来復時也天地之心何時不在特於動物時見耳人心一念萌動即是初心無有不善如孟子乍見孺子將入於井便有怵惕惻隱之心乍見處亦是初心復時也人之良心何嘗不在特於初動時見耳若到納交要譽惡其聲時便不是本来初心了故孟子欲人就於初動處擴充涵養以保四海若識得此一㸃初心真心便是天理由此平平坦坦持養將去可也若夫不消言復一語恐未是初學者事雖顔子亦未知此道顔子猶不逺復毋髙論要力行實地有益耳潘稽勲講天理須在體認上求見舎體認何由得見天理也衝對曰然天理固亦常常發見但人心逐外去了便不見所以要體認纔體認便心存心存便見天理故曰不能反躬天理滅矣又曰復其見天地之心體認是反躬而復也天地之心即我之心生生不已更無一毫私意叅雜其間此便是無我便見於天地萬物共是一體何等廣大髙明認得只個意思常見在而乾乾不息以存之這纔是欛柄在手所謂其幾在我也到那時恰所謂開闔從方便乾坤在此間也宇宙内事千變萬化總根源於此其妙殆有不可言者然只是一個熟如何先生曰此節所問所答皆是然要用功實見得方有益中間云纔體認便心存心存便見天理不若心存得其中正時便見天理也如此體認工夫尤更直截其後云云待見天理後便見得親切也陳子才問先生嘗言見得天理方見得人欲如何衝謂纔體認便見得天理亦便見得人欲蓋體認是天理萌動人心得主宰時也有主宰便見人欲文王緝熈只體認不已便接續光明去便容不得一毫人欲此便是敬止從此到至善只一條直路因竊自歎曰明見得只一條路在前靣還只不肯走病果安在耶願賜鞭策先生曰文王緝熈敬止便是止至善便是體認天理工夫若見得時李延平所謂一毫私意亦退聽也豈不便見得人欲乎若人之酒醒便知是醉也若謂明見得這條路在前靣如何不肯走或是未曽上路也又何遲迴顧慮無乃見之未明或有病根如憂貧之𩔖在内為累故耶若欲見之明行之果須是把習心打破兩層三層乃可向往也一友語經哲曰須無事時敬以直内遇有事方能義以方外經哲曰恐分不得有事無事聖人心事内直則外自方學者恐義以方外事亦是做敬以直内工夫與修辭立誠亦是做忠信進德工夫纔見得心事合一也老先生隨處體認天理之訓盡此二句之意更見打透明白不知是否先生曰隨處體認天理兼此二句包了便是合内外之道敬以包乎義義以存乎敬分明不是兩事先儒未曽説破予一向合看如此見得遺書中謂釋氏敬以直内則有之義以方外則無有為决非程子語也吾子看到此難得一友問明道先生言天理二字却自家體貼出来今見朋友中開口便説天理某却疑先生教人要察見天理者亦是人自家體貼乎此耳非謂必欲人圖寫個天理與人看也如何衝對曰誠然誠然天理何嘗有定形只是個未發之中中亦何嘗有定體人但常以心求中正為主意隨時隨事體認斟酌調習此心常合於中正此便是隨處皆天理也酒誥所謂作稽中德亦是如此求也自求見也自見得也自得他人不能與其力便是見得亦不能圖寫與人看雖然説工夫處却不能瞞得人也未知是否先生曰天理只是自家體認説便不濟事然天理亦從何處説得可説者路頭耳若連路頭也不説便如何去體認其全不説者恐是未曽加體認工夫如未曽行上路的人更無疑問也所云心求中正便是天理良是然亦須逹得天理乃可中正而不逹天理者有之矣釋氏應所無住而生其心是也何曽逹得天理若愚問中庸尊德性道問學一章朱子以存心致知言之而未及力行者厥義維何幸夫子教之先生曰後世儒者認行字别了皆以施為班布者為行殊不知行在一念之間耳自一念之存存以至於事為之施布皆行也且事為施布豈非一念為之乎所謂存心即行也若愚問天理心之主也人欲心之賊也一心之微衆欲交攻日侵月蝕賊漸内據主反退聽旦晝所為時或發見殆一杯水於輿薪之火耳如弗勝何今欲反其故復其真主者主之賊者賊之如之何其用力也先生曰這個天理真主未嘗亡特為賊所蔽惑耳觀其時或發見可知矣體認天理則真主常在而賊自退聽不是外邊旋尋討主入室来又不是逐出賊使主可復也只頃刻一念正即主翁便惺便不為賊惑耳二者常相為消長問劉子曰民受天地之中以生性之所以立也子思曰中者天下之大本用之所以行也體用一源顯微無間學者從事於勿助勿忘之間而有得夫無聲無臭之㫖則日用應酬莫非此中發見流行之妙不啻執規矩以為方圓蓋曲當也然堯舜允執之中孟子無權之中似執事物上説故後世有求中於外者不知危精微一皆心上功夫而權之一字又人心斟酌運量之妙以中乎不中者則既已反其本矣舎此不講而徒於事物上每每尋個恰好底道理雖其行之無過不及而固已入於義外之説恐終亦不免於執一而已矣臆見如此未知何如先生曰聖人之學皆是心學所謂心者非偏指腔子裏方寸内與事為對者也無事而非心也堯舜允執厥中非獨以事言乃心事合一允執云者脗合於心與心為一非執之於外也所謂權者亦心也廉伯所云斟酌運量之本是也若能於事物上察見自然天理平時涵養由中而出即由仁義行之學何有不可若平時無存養功夫只到事来面前纔思尋討道理即是行仁義必信必果之學即是義外即是義襲而取之者也誠偽王伯之分正在於此敢問中庸不覩不聞與詩無聲無臭之㫖何以異天理本無形聲可以擬議但只恁地看恐墮於無若於無中想出一個不覩不聞景象則亦滯於有矣無即佛氏之所謂空有即其所謂相也二者皆非也然則不無而無不有而有其心之本體乎其在勿助勿忘之間乎近来見得如是幸夫子明以教我先生曰此事正要理㑹廉伯能以疑問知是善理㑹矣在人為不覩不聞在天為無聲無臭其實一也如舊説不覩不聞無聲無臭却墮於虛無而不自知矣然於不覩不聞而必曰其所是有實體也於無聲無臭而必曰上天之載是有實迹也何墮於無這個不覩不聞之實體程子所謂亦無有處有亦無無處無乃心之本體不落有無者也須於勿忘勿助之間見之要善體認吾於中庸測難已説破惟諸君於心得中正時識取本體自然見前何容想象奉謂孟子所謂持其志毋暴其氣者亦無本末之分不過欲人存中以應外制外以養中耳使知合觀並用之功也公孫丑疑而問者未逹乎此而已矣先生曰志氣不是兩物志即氣之精靈處志之所至氣亦至焉故持志即無暴氣都一齊管攝如志欲手持則持志欲足行則行豈不内外一致存中應外固是制外之心非由中乎不必分内外清問昨日坐中一友言夜睡不著老先生謂其未曽體認天理故睡不著清因舉蔡季通先睡心後睡眼文公以為古今未發之妙言之老先生不以為然者豈以其岐心目為二理耶先生曰吾意不以為然者非以岐心目為二理也只先著一個睡字便是安排事事亦復如是所謂體認天理者亦非想象想象亦便是安排心中無事天理自見無事便自睡得著何意何必毛式之日来功夫儘切身衝家居全得此友往来商確耳但渠銖較寸量念頭尚未肯放下多病精神不足可惜也願先生療以一言渠若見得完全却會守得牢固先生曰毛君素篤信吾學隨處體認天理此吾之中和湯也服得時即百病之邪自然立地退聽常常服之則百病不生而滿身氣體中和矣何待手勞脚攘銖較寸量乎此心天理譬之衡尺衡尺不動而銖銖寸寸自分自付而衡尺不與焉舜之所以無為而天下治者此也此劑中和湯自堯舜以来治病皆同天理人心不在事心兼乎事也朱鵬問道通云隨處體認天理即孔門博約一貫之義者然則博學於文約之以禮須合作一句看始明請示其的先生曰隨處體認天理與博約一貫同皆本於精一執中之傳博文約禮還是二句然則一段工夫一齊並用豈不是同一體認天理先生嘗言是非之心人皆有之此便是良知亦便是天理衝竊以為是非之心其在人也雖私欲亦䝉蔽他不得譬諸做强盗人若説是强盗他便知怒又如做官人要錢底渠亦怕人知覺及見人説某官何等清亷渠亦知敬而自愧可見他本心自是明白雖其貪利之心亦蔽他不得此正是他天理之心未嘗冺滅處學者能常常體察乎此依著自己是非之心知得眞切處存養擴充將去此便是致良知亦便是隨處體認天理也然而外人多言先生不欲學者之言良知者豈慮其體察未到將誤認於理欲之間遂以為真知也耶先生曰如此看得好吾於大學小人閒居章測難備言此意小人至為不善見君子即知掩不善又知著其善又知自愧怍人視已如見肺肝又如賊盗至為不道使其乍見孺子將入井即有怵惕惻隠之心豈不是良知良知二字自孟子發之豈不欲學者言之但學者徃徃徒以為言又言得别了皆説心知是非皆良知知得是便行到底知得非便去到底如此是致恐師心自用還須學問思辨篤行乃為善致老先生儒佛之辨明矣衝竊以為論佛氏曰當先根究其初心不合從軀殻起念且緩責其苦根塵絶倫理之辠盖由其舉足之差遂使其謬至此極也故衝每與朋儕言學須先探訊其志然後與論工夫若其志不正雖與講得極親切只是替他培壅得私已的心反幇助潤餙得他病痛後來縱欲敗度傷殘倫理或反有甚於佛者孔子於門人徃徃誘其言志孟子欲人察於善利之間者殆為是耳故自學教人皆宜先正其志何如先生曰佛氏初心軀殻起念即是苦根塵絶理倫之辠是同條共貫事然問辠者先須按其實迹贓證乃可誅之也今只誅其軀殻起念則彼又有無諸相之説必不肯服從事聖人之書者亦有縱欲敗度傷殘倫理然不可謂之儒聖人必不取之而佛者之教正欲人人絶滅倫理如水火之不相同子比而同之且抑揚之間詞氣過矣正志之説甚好衢問先生教人體認天理衢只於無事時常明諸心看認天理萬物一體之義至有事時只就此心上體會體會便應去求個是便了不識然否先生曰吾所謂天理者體認於心即心學也有事無事原是此心無事時萬物一體有事時物各付物皆是天理充塞流行其實無一事經哲向前領師尊教每令察見天理哲苦天理難見正坐失於空中摸索耳近就實地尋求始覺日用間一動一止一事一物無非這個道理分明有見但猶有一等意思牽滯未肯真實認他做主耳非難見也竊以人生天地間與禽獸異也人得天地之中耳中乃人之生理也即命根也即天理也不可頃刻間斷也若不察見則無所主宰日用動作忽入於過不及之地而不自知矣過與不及即邪惡之去禽獸無幾矣故千古聖賢授受只一個中不過全此天然生理耳學者講學不過講求此中求全此天然生理耳入中之門曰勿助勿㤀中法也以中正之法體中正之道成中正之教也體認天理即體認中也但字中虛天理字真切令人可尋求耳不知是否先生曰體認正要如此真切若不用勿忘勿助之規是無也經哲與一友論擴充之道經哲以擴充非待發見之後一端求充一端也只終日體認天理即此是敬敬即擴充之道非敬之外又有擴充功夫也所謂操存涵養體認擴充之只是一事如戒懼慎獨以養中中立而和自發無徃而非仁義禮智之發見矣孟子曰苟能充之足以保四海重在足字非必保四海而後為充也只是求復吾廣大髙明之本體耳不知是否先生曰今之所謂致良知者待知得這一是非便致將去此所謂待發見之後一端求充一端也只一隨處體認天理擴充到盡處即是保四海即是廣大髙明之本體津問鳶飛魚躍活潑潑地學者用功固不可不識得此體若一向為此意擔閣而不用參前倚衡的工夫終無實地受用須是見鳶飛魚躍的意思而用參前倚衡的工夫雖用參前倚衡的工夫而鳶飛魚躍之意自在非是一邊做參前倚衡的工夫一邊見鳶飛魚躍的意思乃是一併交下惟程明道謂必有事焉而勿正心勿㤀勿助長未嘗致纖毫人力最盡先生曰鳶飛魚躍與參前倚衡同一活潑潑地皆察見天理工夫識得此意而涵養之則日進日新何擔閣之云不可分為二也所舉明道必有事焉勿正勿㤀勿助長元無絲毫人力之説最好勿正勿㤀勿助中間未嘗致絲毫人力乃必有事焉之工夫的當處朱𫝊莭度二字最好當此時節所謂參前倚衡所謂鳶飛魚躍之體自見矣先生曰陽明謂勿㤀勿助之説為懸虛而不知此乃所有事之的也舍此則所有事無的當工夫而所事者非所事矣子嘉問程子曰勿助勿忘之間乃是正當處正當處即天理也故參前倚衡與所立卓爾皆見此而已必見此而後可以語道或以勿助勿忘之間乃虛見也須見天地萬物一體而後為實見審如是則天地萬物一體與天理異矣人惟不能調習此心使歸正當是以情流私勝常自扞格不能體天理萬物而一之若能於勿助勿㤀之間真有所見則物我同體在是矣或於此分虛實者獨何與故圖説曰性者天地萬物一體者也心也者體天地萬物而不遺舍勿助勿㤀之間何容力乎伏惟明示以决所疑先生曰惟求必有事焉而以勿助勿忘為虛陽明近有此説見於與聶文尉侍御之書而不知勿正勿㤀勿助乃所有事之工夫也求方圓者必於規矩舍規矩則無方圓舍勿㤀勿助則無所有事而天理滅矣下文無若宋人然非徒無益而又害之可見也不意此公聰明未知此要妙未見此光景不能無遺憾可惜可惜勿忘勿助之間與物同體之理見矣至虛至實須自得見子嘉問克已復禮一功也已克而禮自復禮復而後已可言克矣盖一心之中理欲不容並立也或者専言克已必已私克盡而後禮可復則程子生東滅西之語何謂乎若謂初學之士習心已乆不免已私之多故先言克已以覺之即先正所謂非全放下終難湊泊之謂也以此為講學始終之要恐非中正也殊不知言復禮則克已在其中言克已則復禮不外矣若得其要於勿助勿㤀之間雖言克已亦可也若不得其要不知所克者何物縱云克已亦不過把持而已焉能盡克而不生乎若謂顔子之功尚亦如此况其他乎盖顔子之姿生知之亞故已一克而即去不萌所謂不貳過是也非若後世一一而克之之謂也或以謂存天理無所捉摸不若克已之謂切是盖未得其功於勿助勿㤀之間者也若果能有見於勿助勿忘之間則已私又何容乎嘉以為既真有所見復於受病深者而克之則日漸月磨已不知而自克也嘉之所見或亦偏墮而不知伏惟詳示先生曰克已復禮固不是二事然所謂克已者非謂半上半下也去之盡乃謂之克也已私纔盡天禮立復若其不繼又復如初惟隨處體認天理最要𦂳能如是則克復在其中矣謂體認天理不如克已者盖未知此且克已惟以告顔子而不以告仲弓諸人盖非人人所能也今人只説克已耳又何曽克來若待到知是已私時其機已徃又安能克惟是祗悔耳子嘉問隠顯無間動静一功子所雅言也或者不求立其本體而専磨煉於事遂詆静坐者為非夫静坐而不求諸人事而後可以言偏矣若専用力於事而不求見本體則與静坐之弊均矣又何誚彼耶不知所謂磨煉者又何物耶况所謂隨處體認天理非専於事也體認也者知行並進之謂也識得此天理隨時隨處皆知行並進乎此天理也若曰隨事則偏於事而非中正矣毫釐千里之差所係不細伏惟垂教先生曰體認天理而云隨處則動静心事皆盡之矣若云隨事恐有逐外之病也孔子所謂居處恭乃無事静坐時體認也所謂執事敬與人忠乃有事動静一致時體認也體認之功貫通動静隐顯只是一段工夫問周子曰無極而太極太極動而生陽動極而静静而生隂静極復動一動一静互為其根分隂分陽兩儀立焉夫動静一也而為動而為陽静而生隂則動静各自為一物矣謂常體不易者為静妙用不息者為動則所謂静極復動動極復静者不可通矣夫所謂分隂分陽两儀立焉者其以天地之形體言之乎抑以其性情言之乎以其形體言之則天主動地主静動静分矣以其性情言之則所謂隂變陽合而生金木水火土者又何謂也願示先生曰觀天地間只是一氣只是一理豈常有動静隂陽二物相對盖一物而两名者也夫道一而已矣其一動一静分隂分陽者盖以其消長迭運言之以其消故謂之静謂之隂以其長故謂之動謂之陽亘古亘今宇宙内只此消長觀四時之運與人一身之氣可知何曽有两物來古今宇宙只是一理生生不息故曰動静無端隂陽無始見之者謂之見道問白沙先生有語云静坐乆之然後吾心之體隐顯呈露常若有物觀此則顔之卓爾孟之躍如盖皆真有所見而非徒為形容之辭矣但先生以静坐為言而今以隨處體認為教不知行者之到家果孰先而孰後乎明道先生曰天理二字是某體貼出來是其本心之體亦隐然呈露矣而十二年之後復有獵心之萌何也意者體貼出來之時方是尋得入頭去處譬如仙家之説雖是見得元關一竅更有許多火候温養工夫非止謂畧窺得這個景象便可以一了百了也如何如何先生曰虛見與實見不同静坐乆隠然見吾心之體者盖先生為初學言之其實何有動静之間心熟後雖終日酬酢萬變朝廷百官萬象金革百萬之衆造次顛沛而吾心之本體澄然無一物何徃而不呈露耶盖不待静坐而後見也顔子之瞻前忽後乃是窺見景象虛見也至於愽約之功既竭其才之後其卓爾者乃實見也隨處體認天理自初學以上皆然不分先後居處恭執事敬與人忠即隨處體認之功連静坐亦在内矣問無在無不在只此五字循而行之便有無窮難言之妙白沙先生所謂髙明之至無物不覆反求諸身不在於人欲也無不在者無不在於天理也郡竊謂此五字當渾全以㑹其意不當分析以求其義分析則支離矣既有學問思辨之功意不向别處走不必屑屑於天理人欲之分析也此𦂳關終身受用之地更願發揮歸於同志者共之先生曰此段看得好五字不可分看如勿助勿㤀四字一般皆説一時事當此時天理見矣常常如此恒乆不息所以存之也白沙先生所謂欛柄在手者如此此乃聖學千古要訣近乃聞不用勿助勿㤀之説將孰見之孰存之乎是無欛柄頭腦學者不可不知問神易無方體學者用無在無不在之功夫當内外動静渾然之兩㤀也盖工夫偏於静則在於静矣工夫偏於動則在於動矣工夫偏於内則在於内矣工夫偏於外則在於外矣非所謂無在無不在也非所謂無不體也非所謂活潑潑地也切料如此不知其果然否乎先生曰神易最可玩此當以意㑹不可以言盡也當知易是甚神又是甚皆是勿忘勿助無在無不在之間見之何内外動静之分會得時便活潑潑地問天地之心動而無動静而無静之妙貫晝夜寒暑古今而無不然也而此獨以亥子為然者必有説矣願聞所謂亥子中間者先生曰動静之間即所謂幾也顔子知幾正在此一著道通復問惟意必固我故不能貫通心事合一持養否先生曰惟不於心事合一持養心地不能灑然而物來順應則每事擬議啇量憧憧憒憒便是意必固我先生曰先師白沙先生與子題小圓圖屋詩有云至虛元受道又語予云虛實二字可徃來看虛中有實實中有虛子謂太虛中都是實理充塞流行只是虛實同原先生曰戊子嵗除召各部同志諸君飲於新泉共論大道飲畢言曰諸君知忠信為聖道之至乎學者徒大言誇人而無實徳無忠信故也故主忠信忠信所以進徳直上逹天徳以造至誠之道忠信之外無餘事矣既而語羅民止周克道程子京曰忠信者體認天理之功盡在是矣中心為忠心中故實是謂之信心之不實全是不中不正之心為之問如何中心曰勿㤀勿助之間則心中矣孟津問心之本體莫非天理學者終日終身用功只是要循著天理求復本體而已本體何分於動静乎明道云須看喜怒哀樂未發前作何氣象延平之教黙坐澄心體認天理象山誨學者曰須在人情事變上用功夫喜怒哀樂情也亦事也已發者也一則欲求諸已發一則欲看諸未發何與竊意三先生之教一也明道為學者未識得本體看未發之前氣象正欲體認本體也認得本體方好用功延平亦明道意也象山恐學者未識於實地用功即墮於空虛漭蕩便有岐心事為二之病人情事變乃日用有實地可㩀處即此實地以體認吾心本然之天理即人情事變無不是天理流行無不是未發前氣象矣若不從實地體認出來竊恐病痛未除猶與本體二也幸賜明教先生曰師云來問亦看得好三先生之言各有所為而發合而觀之合一用功乃盡也吾所謂體認者非分已發未發未分動静所謂隨處體認天理者隨已發未發隨動隨静盖動静皆吾心之本體體用一原故也如彼明鏡然其明瑩光照者其本體也其照物與不照物任物之來去而本體自若心之本體其於未發已發或動或静亦若是而已矣若謂静未發為本體而外已發而動以為言恐亦有岐而二之之弊也前軰多坐此弊偏内偏外皆支離而非合内外之道矣吾心性圖備言此意幸深體之先生曰主一主一個天理陽明常有此言殊不知無適之謂一若心主一個天理在内即是物即非一矣惟無一物乃是無適乃是主一這時節天理自見前矣觀此則動容貌整思慮未便是敬乃所以生敬也問由求亦要為邦曽㸃要灑然為樂其志夐不同者豈聖人以其事迹觀之顧有取於窮居樂善而不取於用世行志者耶但其間有大意存焉謂理之無在無不在也夫有㸃之樂奚必舍去國事適清閒之地浴沂詠歌而後樂之乎為邦亦是曽㸃合當為的使由求赤得㸃之意則何嫌於用世但三子見得一處㸃見得無處不是此理使㸃只認得彼處自樂亦猶夫三子之屑屑事為矣而謂之見大意乎孔子仕止乆速未嘗留意孟子大行不加窮居不損是何物也可因與窺與㸃之意矣請問是否先生曰曽㸃正為不曽見得無處不是此理意思故須求風浴詠歸始樂若見得則隨處體認天理流行則為邦為政何徃而非風浴之樂㸃雖樂優於三子然究竟言之過猶不及耳終是未能一貫若以此為堯舜氣象則又認錯堯舜了也問人心與天地萬物同一體是則然矣但學者用功只當於勿㤀勿助上著力則自然見此心虛明之本體而天地萬物自為一體耳故曰立則見其參於前也在輿則見其倚於衡也曰古人見道分明曰已見大意曰見其大皆指見此心本體言之爾若為學之始而遽云要見天地萬物為一體恐胸中添一天地萬物與所謂守一中字者不相逺矣是否先生曰吾意正如此勿忘勿助心之中正處這時節天理自見天地萬物一體之意自見若先要見是想像也王陽明遂每每欲矯勿㤀勿助之説惑甚矣問為學之始雖不可遽云要見天地萬物一體然為學之初亦不可不知天地萬物與吾一體盖不知此體則昧於頭腦矣故程子曰學者須先識仁體先生亦嘗教孚先曰鼎内若無真種子却教水火煮空鐺又曰須黙識一㸃生意此乃知而存也韋推官止見得程子所謂存乆自明以下意思乃存而知也竊疑如此未知是否先生曰固是大頭腦學者當務之急然始終也須於勿㤀勿助處見先生曰知崇而禮卑中行之士也行者中路也以上便可到聖人地位狂者有智崇而無禮卑狷者有禮卑而無智崇孔子思得狂狷盖欲因其一偏之善抑揚進退之狂狷交用則智崇禮卑天地合徳便是中行可踐迹而入聖人之室矣先生曰楊慈湖豈是聖賢之學乃真禪也盖學陸象山而又失之者也聞王陽明謂慈湖逺過於象山象山過髙矣又安可更過觀慈湖言人心精神是謂之聖是以知覺為道矣如佛者以運水搬柴無非佛性又蠢動含虛無非佛性然則以佛為聖可乎先生曰聰明聖知乃逹天徳故入道係乎聰明然聰明亦有大小逺近深淺故所見亦復如此曽記張東海謂定性書動亦定動亦是定有何了期王陽明近謂勿忘勿助終不成事夫動静皆定㤀助皆無則本體自然合道成聖而天徳王道備矣孔孟之後自明道之外誰能到此可知是本習經厯二君亦號聰明亦止如此故人之聰明亦有限量先生曰有以知覺之知為道是未知所知者何事孟子言予將以斯道覺斯民則所覺者道也儒釋之分正在此懐問體認天理最難天理只是吾心中正之體不屬有無不落方體纔欠一毫已便不是纔添一毫亦便不是須是義精仁熟此心洞然與之為體方是隨處體認天理或曰知勿㤀勿助之間則見之竊謂勿忘勿助固是中規然而其間間不容髪又不是箇有硬格尺可量定的只這工夫何縁便得正當先生曰觀此可見吾契曽實心尋求來所以發此語天理在心求則得之夫子曰我欲仁斯仁至矣但求之自有方勿㤀勿助是也千古惟有孟子發揮出來須不廢絲毫人力欠一毫已便不是纔添一毫亦不是此語最是只不㤀助時便添減不得天理自然見非有難易也何用硬格尺量耶孟子曰物皆然心為甚吾心中規何用權度明儒學案卷三十七
