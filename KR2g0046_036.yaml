body:
  text: 明儒學案卷三十六餘姚黃宗羲撰泰州學案五尚寶周海門先生汝登周汝登字繼元號海門嵊縣人萬厯丁丑進士授南工部主事厯兵吏二部郎官至南尚寶司卿先生從兄周夢秀聞道於龍溪先生因之遂知向學已見近溪七日無所啓偶問如何是擇善固執近溪曰擇了這善而固執之者也從此便有悟近溪嘗以法苑珠林示先生覽一二葉欲有言近溪止之令且看去先生竦然若鞭背故先生供近溪像節日必祭事之終身南都講會先生拈天泉證道一篇相發明許敬菴言無善無惡不可為宗作九諦以難之先生作九解以伸其說以為善且無惡更從何容無病不須疑病惡既無善不必再立頭上難以安頭本體著不得纎毫有著便凝滯而不化大㫖如是陽明言無善無惡心之體原與性無善無不善之意不同性以理言理無不善安得云無善心以氣言氣之動有善有不善而當其藏體於寂之時獨知湛然而已亦安得謂之有善有惡乎且陽明之必為是言者因後世格物窮理之學先有乎善者而立也乃先生建立宗㫖竟以性為無善無惡失却陽明之意而曰無善無惡斯為至善多費分疏增此轉轍善一也有有善之善有無善之善求直截而反支離矣先生九解只解得人為一邊善源於性是有根者也故雖戕賊之久而忽然發露惡生於染是無根者也故雖動勝之時而忽然銷隕若果無善是堯不必存桀亦可亡矣儒釋之判端在於此先生之無善無惡即釋氏之所謂空也後來顧涇陽馮少墟皆以無善無惡一言排摘陽明豈知與陽明絶無干與故學陽明者與議陽明者均失陽明立言之㫖可謂之繭絲牛毛乎先生教人貴於直下承當嘗忽然謂門人劉塙曰信得當下否塙曰信得先生曰然則汝是聖人否塙曰也是聖人先生喝之曰聖人便是聖人又多一也字其指㸃如此甚多皆宗門作用也證學録王調元述泰州唐先生主㑹每言學問只在求個下落如何是下落去處曰當下自身受用得著便是有下落止懸空說去便是無下落人到諸事沉溺時能回光一照此一照是起死回生之靈丹今人乍見孺子入井必然驚呼一聲足便疾行行到必然挽住此豈待為乎此豈知有善而行之者乎故有目擊時事危論昌言者就是只一呼拯民之溺八年於外者就是只疾行哀此㷀獨者就是只一挽此非不足彼非有餘此不安排彼不意必一而已矣今人看得目前小事業大忽却目前著意去做事業做得成時亦只是霸功小道此心一刻自得便是一刻聖賢一日自得便是一日聖賢常常如是便是終身聖賢洪舒民問認得心時聖賢與我一般但今人終身誦學到底只做得鄉人何也曰只是信不及耳汝且道今日滿堂問答詠歌一種平心實意與杏壇時有二乎曰無有二也曰如此則何有鄉人之疑曰只為他時便不能如是曰違則便覺依舊不違曰常常提起方可曰違則提起不違提個什麼問天根月窟曰汝身渾是太極念頭初萌才發此問便是月窟問處寂然念慮俱忘便是天根寂而萌萌而寂便是天根月窟之往來萬事萬化皆不外此處處皆真頭頭是道這便是三十六宫都是春熊念塘言世界缺陷吾人當隨分自足心方寬泰曰此心缺陷世界缺陷自然滿足世界滿足不干世界事一物各具一太極者非分而與之之謂如一室千燈一燈自有一燈之光彼此不相假借是為各具萬物統體一太極者非還而合之之謂如千燈雖異共此一燈之光彼此毫無間異是為統體問理氣如何分别曰理氣雖有二名總之一心心不識不知處便是理才動念慮起知識便是氣雖至塞乎天地之間皆不越一念曰心何便是理如視是心而視所當視有視之理當循聽是心而聽所當聽有聽之理當循心豈便是理乎曰此正學問窽要不可不明信如所言則是心外有理理外有心矣凡人視所不當視聽所不當聽聲色牽引得去皆知識纍之也知識忘而視聽聰明即心即理豈更有理為心所循耶曰理必有氣心之知識可無耶曰即理即氣所謂浩然之氣是也不識知之識知所謂赤子之心是也非槁木死灰之謂曰動處是氣靜處是理否曰靜與動對靜亦是氣曰人睡時有何知識曰無知識何能做夢曰不做夢時如何曰昏沉即是知識無著便是理問此事究竟如是曰心安穩處是究竟問學力只是起倒奈何曰但恐全不相干無有起倒可言今說有個起便自保任有倒便好扶植莫自諉自輕問亦偶有所見而終不能放下者何曰汝所見者是知識不是真體曰只此坐飲時如何是知識如何是真體曰汝且坐飲切莫較量便落知識但忘知識莫問真體個事從人妄度量那知家計本尋常祇將渴飲饑餐事說向君前笑一場寄鄒南臯論心半月剡江頭歸去翺翔興未休來往只應明月伴孤懸千古不曽收送淳之梧桐葉葉動髙風一放豪吟寥廓中萬叠雲山森滿目慿誰道取是秋空秋空水邊林畔老幽棲衣補遮寒飯療饑一種分明眼前事勞他古聖重提撕老吟良宵樽酒故人同小艇沿回島嶼空看月不勞人重指渾身都在月明中泛舟石潭九解南都舊有講學之㑹萬厯二十年前後名公畢集㑹講尤盛一日拈舉天泉證道一篇相與闡發而座上許敬菴公未之深肯明日公出九條目命曰九諦以示㑹中先生為九解復之天泉宗㫖益明具述於左云諦一云易言元者善之長也又言繼之者善成之者性書言德無常師主善為師大學首提三綱而歸於止至善夫子告哀公以不明乎善不誠乎身顔子得一善則拳拳服膺而弗失孟子七篇大㫖道性善而已性無善無不善則告子之說孟子深闢之聖學源流厯厯可考而知也今皆捨置不論而一以無善無惡為宗則經傳皆非維世範俗以為善去惡為隄防而盡性知天必無善無惡為究竟無善無惡即為善去惡而無跡而為善去惡悟無善無惡而始真教本相通不相悖語可相濟難相非此天泉證道之大較也今必以無善無惡為非然者見為無善豈慮入於惡乎不知善且無而惡更從何容無病不須疑病見為無惡豈疑少却善乎不知惡既無而善不必再立頭上難以安頭故一物難加者本來之體而兩頭不立者妙密之言是為厥中是為一貫是為至誠是為至善聖學如是而已經傳中言善字固多善惡對待之善至於發心性處善率不與惡對如中心安仁之仁不與忍對主靜立極之靜不與動對大學善上加一至字尤自可見蕩蕩難名為至治無得而稱為至德他若至仁至禮等皆因不可名言擬議而以至名之至善之善亦猶是耳夫惟善不可名言擬議未易識認故必明善乃可誠身若使對待之善有何難辨而必先明乃誠耶明道曰人生而靜以上不容說才說性時便已不是性也凡人說性只是說繼之者善也孟子言人性善是也悟此益可通於經傳之㫖矣解一諦二云宇宙之內中正者為善偏頗者為惡如氷炭黑白非可以私意增損其間故天地有貞觀日月有貞明星辰有常度嶽峙川流有常體人有真心物有正理家有孝子國有忠臣反是者為悖逆為妖怪為不祥故聖人教人以為善而去惡其治天下也必賞善而罰惡天之道亦福善而禍淫積善之家必有餘慶積不善之家必有餘殃自古及今未有能違者也而今曰無善無惡則人將安所趨舍者歟曰中正曰偏頗皆自我立名自我立見不干宇宙事以中正與偏頗對是兩頭語是增損法不可增損者絶名言無對待者也天地貞觀不可以貞觀為天地之善日月貞明不可以貞明為日月之善星辰有常度不可以常度為星辰之善嶽不以峙為善川不以流為善人有真心而莫不飲食者此心飲食豈以為善乎物有正理而鳶飛魚躍者此理飛躍豈以為善乎有不孝而後有孝子之名孝子無孝有不忠而後有忠臣之名忠臣無忠若有忠有孝便非忠非孝矣賞善罰惡皆是可使由之邊事慶殃之說猶禪家談宗㫖而因果之說實不相礙然以此論性宗則粗悟性宗則密趨舍二字真是學問大病所不可有也解二諦三云人心如太虛元無一物可著而實有所以為天下之大本者在故聖人名之曰中曰極曰善曰誠以至曰仁曰義曰禮曰智曰信皆此物也善也者正中純粹而無疵之名不雜氣質不落知見所謂人心之同然者也故聖賢欲其止之而今曰無善則將以何者為天下之大本其為物不二則其生物不測天地且不能無主而况於人乎說心如太虛說無一物可著說不雜氣質不落知見已是斯㫖矣而卒不放捨一善字則又不虛矣又著一物矣又雜氣質又落知見矣豈不悖乎太虛之心無一物可著者正是天下之大本而更曰實有所以為天下之大本者在而命之曰中則是中與太虛之心二也太虛之心與未發之中果可二乎如此言中則曰極曰善曰誠以至曰仁曰義曰禮曰智曰信等皆以為更有一物而不與太虛同體無惑乎無善無惡之㫖不相入以此言天地是為物不二失其至矣解三諦四云人性本善自蔽於氣質陷於物欲而後有不善然而本善者原未嘗泯滅故聖人多方誨迪使反其性之初而已袪蔽為明歸根為止心無邪為正意無僞為誠知不迷為致物不障為格此徹上徹下之語何等明白簡易而今曰心是無善無惡之心意是無善無惡之意知是無善無惡之知物是無善無惡之物則格致誠正工夫俱無可下手處矣豈大學之教專為中人以下者設而近世學者皆上智之資不待學而能者歟人性本善者至善也不明至善便成蔽陷反其性之初者不失赤子之心耳赤子之心無惡豈更有善耶可無疑於大人矣心意之物只是一個分别言之者方便語耳下手工夫只是明善明則誠而格致誠正之功更無法上中根人皆如是學舍是而言正誠格致頭腦一差則正亦是邪誠亦是僞致亦是迷格亦是障非明之明其蔽難開非止之止其根難拔豈大學之所以教乎解四諦五云古之聖賢秉持世教提撕人心全靠這些子秉彛之良在故曰民之所好好之民之所惡惡之斯民也三代之所以直道而行也惟有此秉彞之良不可殘滅故雖昏愚而可喻雖强暴而可馴移風易俗反薄還淳其操柄端在於此奈何以為無善無惡舉所謂秉彞者而抹殺之是說倡和流傳恐有病於世道非細無作好無作惡之心是秉彞之良是直道而行著善著惡便作好作惡非直矣喻昏愚馴强暴移風易俗須以善養人以善養人者無善之善也有其善者以善服人喻之馴之必不從如昏愚强暴何如風俗何至所謂世道計則請更詳論之蓋凡世上學問不立之人病在有惡而閉藏學問用力之人患在有善而執著閉惡者教人為善去惡使有所持循以免於過惟彼著善之人皆世所謂賢人君子者不知本自無善妄作善見捨彼取此拈一放一謂誠意而意實不能誠謂正心而心實不能正象山先生云惡能害心善亦能害心以其害心者而事心則亦何由誠何由正也夫害於其心則必及於政與事矣故用之成治效止歡虞而以之撥亂害有不可言者後世若黨錮之禍雖善人不免自激其波而新法之行即君子亦難盡辭其責其究至於禍國家殃生民而有不可勝痛者豈是少却善哉范滂之語其子曰我欲教汝為惡則惡不可為教汝為善則我未嘗為惡蓋至於臨刑追考覺無下落而天下方且恥不與黨效尤未休真學問不明而認善字之不徹其蔽乃一至此故程子曰東漢尚名節有雖殺身不悔者只為不知道嗟乎使諸人而知道則其所造就所康濟當更何如而秉世教者可徒任其所見而不喚醒之將如斯世斯民何哉是以文成於此指出無善無惡之體使之去縳解粘歸根識止不以善為善而以無善為善不以去惡為究竟而以無惡證本來夫然後可言誠正實功而收治平至效蓋以成就君子使盡為臯夔稷契之佐轉移世道使得躋黃虞三代之隆上有不動聲色之政而下有何有帝力之風者舍兹道其無由也孔子曰聽訟吾猶人也必也使無訟乎詳味夫子之言無訟者無善無惡之效也嗟乎文成兹㫖豈特不為世道之病而已乎解五諦六云登髙者不辭步履之難涉川者必假舟楫之利志道者必竭修為之力以孔子之聖自謂下學而上逹好古敏求忘食忘寢有終其身而不能已者焉其所謂克已復禮間邪存誠洗心藏密以至於懲忿窒欲改過遷善之訓昭昭洋洋不一而足也而今皆以為未足取法直欲頓悟無善之宗立躋聖神之地豈退之所謂務勝於夫子者邪在髙明醇謹之士著此一見猶恐其涉於疏略而不情而况天資魯鈍根器淺薄者隨聲附和則吾不知其可也文成何嘗不教人修為即無惡二字亦足竭力一生可嫌少乎既無惡而又無善修為無迹斯真修為也夫以子文之忠文子之清以至原憲克伐怨欲之不行豈非所謂竭力修為者而孔子皆不與其仁則其所以好古敏求忘食忘寢與夫克已復禮閉邪存誠洗心而藏密者亦自可思故知修為自有真也陽明使人學孔子之真學疏略不情之疑過矣解六諦七云書曰有其善喪厥善言善不可矜而有也先儒亦曰有意為善雖善亦粗言善不可有意而為也以善自足則不𢎞而天下之善種種固在有意為善則不純而吉人為善常惟日不足古人立言各有攸當豈得以此病彼而概目之曰無善然則善果無可為為善亦可已乎賢者之疑過矣有善喪善與有意為善雖善亦私之言正可證無善之㫖堯舜事業雖蟠天極地究之不過一㸃浮雲過太虛耳謂實有種種善在天下不可也吉人為善為此不有之善無意之善而已矣解七諦八云王文成先生致良知宗㫖元與聖門不異其集中有云性無不善故知無不良良知即是未發之中即是廓然大公寂然不動之本體但不能不昏蔽於物欲故須學以去其昏蔽又曰聖人之所以為聖人者以其心之純乎天理而無人欲之私也學聖人者期此心之純乎天理而無人欲則必去人欲而存天理又曰善念存時即是天理立志者常立此善念而已此其立論至為明析無善無惡心之體一語蓋指其未發廓然寂然者而言之而不深惟大學止至善之本㫖亦不覺其矛盾於平日之言至謂有善有惡意之動知善知惡是良知為善去惡是格物則指㸃下手工夫亦自平正切實而今以心意知物俱無善惡可言者竊恐其非文成之正傳也致良知之㫖與聖門不異則無善惡之㫖豈與致良知異耶不慮者為良有善則慮而不良矣無善無惡心之體一語既指未發廓然寂然處言之已發後豈有二耶未發而廓然寂然已發亦只是廓然寂然知未發已發不二則知心意知物難以分析而四無之說一一皆文成之祕密非文成之祕密吾之祕密也何疑之有於此不疑方能㑹通其立論宗㫖而得其宿歸工夫始不至於謬不然以人作天認欲為理背文成之㫖良多矣夫自生矛盾以病文成之矛盾不可也解八諦九云龍溪王子所著天泉橋㑹語以四無四有之說判為兩種法門當時緒山錢子已自不服易不云乎神而明之存乎其人默而成之不言而信存乎德行神明默成蓋不在言語授受之際而已顔子之終日如愚曾子之真積力久此其氣象可以想見而奈何以𤣥言妙語便謂可接上根之人其中根以下之人又别有一等說話故使之扞格而不通也且云汝中所見是傳心祕藏顔子明道所不敢言今已說破亦是天機該發世時豈容復祕嗟乎信斯言也文成發孔子之所未發而龍溪子在顔子明道之上矣其後四無之說龍溪子談不離口而聰明之士亦人人能言之然而聞道者竟不知為誰氏竊恐天泉會語畫蛇添足非以尊文成反以病文成吾儕未可以是為極則人有中人以上中人以下二等所以語之亦殊此兩種法門發自孔子非判自王子也均一言語而信則相接疑則扞格自信自疑非有能使之者蓋授受不在言語亦不離言語神明默成正存乎其人知所謂神而明默而成則知顔子之如愚曾子之真積自有入微之處而云想見氣象抑又逺矣聞道與否各宜責歸自己未可疑人兼以之疑教至謂顔子明道所不敢言等語自覺過髙然要之論學話頭未足深怪孟子未必過於顔閔而公孫丑問其所安絶無遜讓直曰姑舍是而學孔子曹交未足比於萬章輩而孟子教以堯舜不言等待而直言誦言行行是堯而已然則有志此事一時自信得及誠不妨立論之髙承當之大也若夫四無之說豈是鑿空自創究其淵源實千聖所相傳者太上之無懷易之何思何慮舜之無為禹之無事文王之不識不知孔子之無意無我無可無不可子思之不見不動無聲無臭孟子之不學不慮周子之無靜無動程子之無情無心盡皆此㫖無有二義天泉所證雖陽明氏且為祖述而况可以龍溪氏當之也耶雖然聖人立教俱是應病設方病盡方消初無實法言有非真言無亦不得已若惟言是泥則何言非礙而不肖又重以言或者更增蛇足之疑則不肖之罪也夫解九文簡陶石簣先生望齡陶望齡字周望號石簣㑹稽人也萬厯己丑進士第三人授翰林編修轉太子中允右諭德兼侍講妖書之役四明欲以之陷歸德江夏先生自南中主試至境造四明之第責以大義聲色俱厲又謂朱山隂曰魚肉正人負萬世惡名我寧紹將不得比於人數矣茍委之不救陶生願棄手板拜疏與之同死皆俯首無以應故沈郭之得免巽語者李九我唐抑所法語者則先生也已告歸踰年起國子祭酒以母病不出未幾卒諡文簡先生之學多得之海門而泛濫於方外以為明道陽明之於佛氏陽抑而隂扶蓋得其彌近理者而不究夫毫釐之辨也其時湛然澄密雲悟皆先生引而進之張皇其教遂使宗風盛於東浙其流之弊則重富貴而輕名節未必非先生之過也然先生於妖書之事犯顔持正全不似佛氏舉動可見禪學亦是清談無關邪正蓋其為學始基原從儒術後來雖談𤣥說妙及至行事仍舊用著本等心思如蘇子瞻張無垢皆然其於禪學皆淺也若是張天覺純以機鋒運用便無所不至矣石簣論學語妄意以隨順真心任諸緣之並作為行持觀萬法之自無為解脫自覺頗為省便知事理不二即易欲到背塵合覺常光現前不為心意識所使即不易伊川康節臨命時俱得力若以見解論恐當代諸公儘有髙過者而日逐貪嗔已不免縱任求生死得力不亦難乎古人見性空以修道今人見性空以長欲可嘆已與焦弱矦學求自知而已儒皆津筏邊事到則舍矣不肖雖愚昧然灼知倫物即性道不敢棄離亦不敢以此誤人願先生勿慮也與徐魯源堂皇之雜遝簿領之勤勞時時大用顯行但少有厭心忽心因觸而動恚心因煩而起躁心即是習氣萌生處即是學不得力處損之又損覺袪除稍易時即得力時也與余舜仲我朝别無一事可與唐宋人爭衡所可跨跱其上者惟此種學問出於儒紳中為尤竒偉耳與何越觀吾輩心火熠熠思量分别殆無間歇行而不及知知而不及禁非心體本來如是蓋緣此路行得太熟耳今以生奪熟以真奪妄非有純一不已之功何異杯水當輿薪之火哉然所謂工夫者非是起心造意力與之爭只是時時念念放下去放不得自然須有著到與弟我明百姓日用處即聖神地位處聖神地位處即學者入手處何者無思無為不容有二也與幼美正嘉以還其賢者往往以琴張曾晳之見談顔氏之學而人亦窺見行之不掩以求所謂不二者而未盡合於是言足以明矣而不信信矣而不免於疑諸君子者宜亦有責焉鄧文藻序道之不明於天下也事事而道道也事事則道妨事道道則事妨道不知事者道之事道者事之道道之外必無事事之外必無道不可二也是道也堯謂之中孔謂之仁至陽明先生揭之曰良知皆心而已中也仁也心之徽稱乎詔之以中而不識何謂中詔之以仁而不識何謂仁故先生不得已曰良知良知者心之圖繪也猶不識火而曰炎也不識水而曰濕也體用內外理事道器精粗微顯皆舉之矣勳賢祠記夫自私用智生民之通蔽也自私者存乎形纍用智者紛乎心害此未逹於良知之妙也混同萬有昭察天地靈然而獨運之謂知離聞泯覩超絶思慮寂然而萬應之謂良明乎知而形纍捐矣明乎良而心害遺矣陽明祠記今之談學者多以欣厭為戒然子以欣厭猶痛癢也平居無疾小小痛癢便非調適若麻木痿痺之人正患不知痛癢耳稍知則醫者相慶矣書扇太學劉冲倩先生塙劉塙字靜主號冲倩㑹稽人賦性任俠慨然有四方之志所至尋師問友以意氣相激發人爭歸附之時周海門許敬菴楊復所講學於南都先生與焉周楊學術同出近溪敬菴則有異同無善無惡之說許作九諦周作九解先生合兩家而刻之以求歸一而海門契先生特甚曰吾得冲倩而不孤矣受教兩年未稱弟子一日指㸃投機先生曰尚覺少此一拜海門即起立曰足下意真比時輩不同先生下拜海門曰吾期足下者逺不可答拜及先生歸海門授以六字曰萬金一諾珍重先生報以詩曰一笑相逢日何言可復論千金唯一諾珍重自師門先生雖瓣香海門而一時以理學名家者鄒南臯李儲山曹真子焦弱矦趙儕鶴孟連洙丁敬與無不參請識解亦日進海門主盟越中先生助之接引後進學海門之學者甚衆而以入室推先生然流俗疾之如讐亦以信心自得不加防檢其學有以致之也先生由諸生入太學七試場屋不售而卒葉水心曰使同甫晚不登進士第則世終以為狼疾人矣不能不致嘆於先生也證記與人露聲色即聲色矣聲色可以化導人乎臨事動意氣即意氣矣意氣可處分天下事乎何者為害求利是已何者為苦尋樂是已何者為怨結恩是已釋氏之火裏開蓮不過知得是火便名為蓮矣有身在火上而不猛力避之者乎其不猛力避者猶恐認火作土耳人只向有光景處認本體不知本體無光景也人只向有做作處認工夫不知工夫無做作也當下信得及更有何事聖賢說知說行止不過知此行此無剩技矣只因忒庸常忒平易轉令人信不及耳力足舉千鈞之鼎矣有物焉其小無內而轉窘於力之無可用明足察秋毫之末矣有物焉其大無外而轉束於明之無可入名節吾道之藩籬斯語大須味舍名節豈更有道只著名節不可耳世極深極險矣我只淺易世極竒極怪矣我只平常世極濃極艷矣我只淡泊世極﨑極曲矣我只率直允若兹不惟不失我而世且無奈我何問安身立命畢竟在何處曰一眼看去不見世間有非自家有是世間有得自家有失處安立之而已矣本來平易不著些子做手方可耐久揣事情中毛髮而不墮機智通人情浹骨髓而不落煦沫此為何物聖人之於世也宥之而已矣君子之於俗也耐之而已矣人當逆境時如犯弱症才一舉手便風寒乘虛而入保護之功最重大却最輕微言尤之媒也既已有言矣自僅可寡尤而不能無尤無尤其默乎行悔之根也既已有行矣自僅可寡悔而不能無悔無悔其靜乎說易諸家舊傳心别有門但看乾動處總只用純坤四大聚散生死之小者也一念離合生死之大者也忘其大而惜其小此之謂不知生死平平看來世間何人處不得何地去不得只因我自風波便惹動世間風波莫錯埋怨世間天下無不可化之人不向人分上求化也化我而已矣天下無不可處之事不向事情上求處也處我而已矣無暴其氣便是持志工夫若離氣而言持志未免捉揑虛空心到明時則境亦是心與人終日酬酢全要保得自己一段生意不然意思綢繆禮文隆腆而一語之出懷許多顧忌一語之入起許多猜疑皆殺機也明儒學案卷三十六
