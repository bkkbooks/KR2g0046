body:
  text: 明儒學案卷五十一餘姚黄宗羲撰諸儒學案中五文裕黄泰泉先生佐黄佐字才伯號泰泉廣之香山人正徳庚辰進士改庶吉士授編修出為江西提學僉事棄官歸養久之起右春坊右諭徳擢侍讀學士掌南京翰林院事卒贈禮部右侍郎諡文裕先生以博約為宗旨博學於文知其根而溉之者也約之以禮歸其根則千枝萬葉受澤而結實者也博而反約於心則視聽言動之中禮喜怒哀樂之中節彞倫經權之中道一以貫之而無遺矣蓋先生得力於讀書典禮樂律詞章無不該通故即以此為教是時陽明塞源拔本論方欲盡洗聞見之陋歸併源頭一路宜乎其不能相合也然陽明亦何嘗教人不讀書第先立乎其大則一切聞見之知皆徳性之知也先生尚拘牽於舊論耳羲㓜時喜博覽每舉楊用修集韓孟郁上桂謂余曰吾鄉黄才伯博物君子也子何不讀其集乎今為泰泉學案念亡友之言為之澘然論學書徳性之知本無不能也然夫子之教必致知而力行守約而施博於達道達徳一則曰未能一焉二則曰我無能焉未嘗言知而廢能也程子曰良能良知皆無所由乃出於天不繋於人又曰聖人本天釋氏本心蓋大學言致知繋於人之問學者也孟子言良知必兼良能本於天命之徳性者也惟宋吕希哲氏獨以致知為致良知而廢良能則是釋氏以心之覺悟為性矣圓覺經以事理為二障必除而空之則理不具於心心不見於事惟神識光明而已反身而誠似不如是復林見素書昨承教中和之説謂陽明傳習録云不可謂未發之中常人俱有之葢體用一源有是體即有是用今人用未能有發而皆中節之和則知其體亦未能得未發之中執事謂民受天地之中以生其性無有不善若無未發之中則人皆可為堯舜豈謬語哉蓋陽明之學本於心之知覺實由佛氏其曰只是一念良知徹首徹尾無始無終即是前念不滅後念不生此乃金剛經不生不滅入湼槃覺安知所謂中和也又曰無所住而生其心佛氏曾有是言未為非也又曰不思善不思惡時認本來面目即吾所謂良知又曰無善無惡者理之靜有善有惡者氣之動不動於氣即無善無惡是謂至善此又畔孟子性善之説矣既曰無善安得又曰是謂至善是自相矛盾也又曰吾自㓜篤志二氏自謂既有所得謂儒者為不足學其後居夷三載見得聖人之學若是其簡易廣大始自悔悟錯用三十年氣力大抵二氏之學其妙與聖人只有毫釐之間執事謂其與佛老汩没俱化未嘗悔悟但借良知以文飾之耳誠然誠然生謂中庸者作聖之樞要而精一執事之疏義也明乎此則佛老之説祗覺其高虛而無實避去不暇又何汩没之有哉夫堯舜始言中孔子始言中庸之為徳中不啻足矣而言庸何也蓋慮人以中難知難行而不知人皆可以為堯舜故又以庸言之蓋謂無過不及之中乃平常應用之理降衷秉彞人人所同也故子思述孔子之意以為此篇凡言及品節限制而操存於内者皆以坊人心之危也言及天地民物皆以廓道心之微也然道心之發恒與人心相參則察之不容以不精守之不容以不一必精而至一則中可用於民推之天下國家而天地位萬物育矣其用功以致中和也俗儒皆以戒懼為靜而存養慎獨為動而省察然章句或問惟言存養省察未嘗分言動靜也生愚以為此乃黙識天性而操存涵養之為學以此訓人以此修道立教無非中庸之為徳合内外之道即易所謂黙而成之不言而信存乎徳行性既存於心心自見於事聖神功化之極自有不疾而速不行而至者矣昨談及此猶未之詳也試更詳一得之愚可乎蓋首章戒慎不睹恐懼不聞與末章不動而敬不言而信正是相應聖學相傳洪範五事孔門四勿皆從此用功雖稠人廣坐之中從事於此惟恐少怠記所云哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也豈待感物而動哉故又曰人生而靜天之性也黙識天性之中庶乎情發而皆中節由此推極則中和致矣若待靜時存養則無有所謂不時不聞不動不言之時矣嘗當中夜不接物時驗之目睹隙光耳聞更漏或擁衣而動呼童而言未有無思無慮如槁木者故曰纔思即是已發惟内視返觀則性如皎日有過即知是謂明徳好惡本無一偏豈非未發之中乎若對客應酬亦然一有偏處即靜以待之則喜怒哀樂之發無不中節而和自中出矣涵養日久便是黙而成之篤恭而天下平不獨成已而已若嘵嘵講學各執一端則自相乖戾去中和逺矣與徐養齋書箋詁者聖經之翼也諸子者微言之遺也史牒者來今之準也雜文者蘊積之葉也世之談道者每謂心茍能明何必讀書吾夫子既斥仲由之佞矣又謂臯䕫稷契何書可讀然則三墳五典之書傳自上古者胡為誦法於刪述之前耶十三經註疏中多有可取者如鄭氏釋道不可離曰道猶道路也出入動作由之離之惡乎從也其言似麄而實切茍謂真儒不是康成而顓求明心見性則又入禪矣荀揚雖大醇小疵而不敢擬經其言亦有所見近世乃有取於文中子以為聖人復起不能易也謂之何哉執事曰二程謂老氏之言無可闢者惟釋氏之説衍蔓迷溺至深故宋儒多取道家言如周茂叔自無而有自有歸無乃李荃之隂符也張子厚清虛一大乃莊周之太虛也朱子之調息箴乃老𣆀之𤣥牝也矧又註參同契隂符經盛傳於世邪葢去聖日逺而内聖外王之學老莊頗合吾儒遂至此爾近日金剛圓覺及六祖壇談經為講道學者所宗陽儒隂釋自謂易簡不渉支離如降伏其心見自本性有大定力者謂之金剛統衆徳而大備爍羣昏而獨照者謂之圓覺不思善不思惡時識自本心見自本性則又壇經兼定力獨照之藴者也佐嘗取圓覺經觀之其圓攝所歸循性差别有三種焉一曰奢摩他謂寂静輕安於中顯現如鏡中像二曰三摩鉢提謂除去根塵幻化漸次増進如土長苗三曰禪那謂妙覺隨順寂滅不起浮想此三種靜觀隨學一事故有單修齊修前修後修之等有二十五輪是其支離反不如老氏之簡易矣與崔垣野書所示卓小仙事乃生所欲聞者大抵人者鬼神之㑹也人道盛則鬼道衰亦理也辯論之詳可以正人心息邪説矣向者項甌東來言曾會小仙述其形貎之詳與其作詩報人禍福竊疑其為物鬼耳暫時為人忽又化去如貴郡九鯉湖何仙亦其比也人心趨向務為崇飾則建祠祀之遂傳於世如葛洪神仙傳祖劉向列仙傳而附益之久則人不復信如九鯉湖祈夢所得吉凶多不可明者但人臆度或有偶合者周翠渠公昔守廣徳觀所紀祠山其謬妄亦可見矣周公作金縢自謂多材多藝能事鬼神葢隂陽二氣屈伸徃來於天地之間無非鬼神也而周公所謂鬼神即指三王以魂魄言詩曰三后在天又曰文王在上葢没為明神上與天合非但為人鬼而已也易彖傳文言亦同此義而豐彖尤明白曰日中則昃月盈則食天地盈虚與時消息而况於人乎况於鬼神乎盈虛消息乃造化之迹而鬼神則人之魂魄也合大傳祭義而觀之曰精氣為物游魂為變曰氣也者神之盛也魄也者鬼之盛也魂氣歸於天形魄歸於地而神合精氣為物旣没猶如生時若魄雖降而游魂不散則為變矣變則滯而不化出為妖怪如伯有為厲是已故子産曰人生始化曰魄旣生魄陽曰魂用物精多則魂魄强是以有精爽至於神明夫匹夫匹婦强死與殤者魂魄猶能憑依人以為淫厲况伯有乎僧道之為仙佛魄降魂游亦猶是也周公制禮大宗伯旣興神鬼示之禮矣末又曰凡以神仕者掌三辰之法以猶鬼神示之居辨其名物以冬日至致地示物鬼辰者日月星斗各至於辰躔次而畢見也猶者圖像也居者坐位也報天主日及四望其氣常伸故謂之天神而位於上禮月及四瀆山川顯以示人其氣二而小故謂之地示而位於下享五帝祖禰在隂陽之間故謂之人鬼名物則禮樂之器也天神人鬼以冬日至致之應陽氣也人鬼魂氣歸天昭明於上與天神為𩔖地示物鬼以夏日至致之應隂氣也物鬼則百物之精如山材川澤諸示在幽隂者是也豈非大合樂分而序之以降天神出地示格人鬼為成者與樂記曰大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地者此也小仙殆亦百物之精使貴邑人或祠之則與何仙𩔖矣老耼得長生久視之道百有餘歳朱子謂莊周明言老􅖫死則人鬼爾道家列為三清位於昊天上帝之上何哉據程子謂道家之説無可闢者以文王於昭於天例之雖位於天神地示之中可也生愚素不喜佛書如姚秦時五方十六國稱帝稱王迭興迭滅梵僧鳩摩羅什從而附會之其所譯法華經謂佛説法時來聽受者菩薩八萬人天子七萬二千人其餘天王鬼神之𩔖不可勝紀又文殊師利於海中宣説是經娑竭龍女忽現於前禮敬獻一寳珠受之即變成男子又觀世音普門品復有十數變現此則妄為夸大無從而猶其居又與道家異矣邇來學術分裂立門户尊徳性者厭棄聖經而喜誦佛書如曰佛氏之學亦有同於吾儒而不害其為異者又曰心隨法華轉非是轉法華謂之何哉謂之何哉生今與後進講學只博約二語而已讀書以明之聞見之知研究此理博文也反身以誠之徳性之知惇庸此理約禮也自媿淺薄未見有謹信者爾不能談禪以應變現奈何奈何與鄭抑齋書羅整菴云氣本一也而一動一靜一徃一來一闔一闢一升一降循環無已積微而著由著復微為四時之温涼寒暑為萬物之生長收藏為斯民之日用彞倫為人事之成敗得失千條萬緒紛紜膠轕而卒不可亂有莫知其所以然而然是即所謂理也初非别有一物依於氣而立附於氣以行也人物之生受氣之初其理惟一成形之後其分則殊因思孔子繋易言性與天道有統言天命率性之理如曰一隂一陽之謂道朱子釋之曰隂陽迭運者氣也其理則所謂道嘗曰天下未有無理之氣亦無無氣之理又曰人之所以為人其理則天地之理其氣則天地之氣理無迹不可見故於氣觀之旣以為一矣又曰未有天地之先畢竟是理有理便有氣流行發育萬物此言理在氣先也註中庸則曰天以隂陽五行化生萬物氣以成形而理亦賦焉則理又在氣後矣是判理氣而為二乃未定之論也然道之大原出於天既曰天積氣也又曰天者理而已矣理氣判而為二豈天兼之與抑理氣各有一天與易言太極生兩儀兩儀生四象土在其中則為五行自此化生萬物飛潛動植皆人以文字名之爾是則理由羲畫始也而文字生焉豈有理在天地之先而乗氣以行如人乗馬者哉由此辨之氣之有條不可紊者謂之理理之全體不可離者謂之道天生人物靈蠢不同實有主宰之者惟得天命之正而能存存無息則可以配命同天故詩書言天又言帝如曰勅天之命惟時惟幾勅敬而正之也無一時無一事而不敬慎以存養省察者即中庸所云也如曰惟皇上帝降衷於下民若有恒性不言天而言帝者有主宰於其間使靈而為人者其性異於蠢物與牛犬之性不同即孟子所言也説者謂心中之氣寓理而靈故曰心神然太虚中亦有氣靈如人心者則曰天神故紫微有星謂之帝人能學問涵養充實其徳而有光輝即天也已上下通徹無有間隔是故以性情謂之乾以妙用謂之神以形體謂之天以主宰謂之帝茍棄天焉天亦棄人矣書曰非天不中惟人在命此之謂也乃若形而上者謂之道則以爻象所形而言世儒一概論之誤矣與林北泉士元書試共分源論之孔子翼易言心性天道有自卦爻取象言者亦有自天人統言者如習坎有孚維心亨此所謂心乃剛中之象也聖人以此洗心退藏於密此所謂心乃聖人之心也乾之利貞曰性情復之見天地之心皆象焉耳矣一隂一陽之謂道繼之者善也成之者性也統言天人之理所謂隂陽乃二氣流行於天地之間者何與於取象哉其曰形而上者謂之道形而下者謂之器道與器對此則論卦爻陰陽而立是名也後儒概以統言者混論之則誤矣程子曰惟此語截得上下分明亦是象言也葢道非無形也無形則與器離而不合豈非窈冥昏黙之説乎夫卦爻隂陽之見於竒偶猶有生之𩔖肖形於天地者也凡物象可見者皆謂之形然形非道也自形以上卽謂之道矣葢其一隂一陽動而無動靜而無靜不離乎形而亦不雜乎形者也道非器也自形以下卽謂之器矣葢其囿於隂陽靜而無動動而無靜所象之物成形而滯於形者矣不分道器則混精麄於一矣不知上下則岐有無而二之矣故曰道亦器器亦道體用一源顯微無間今分源體要中發明偶亦相合與王分源任用書生惟安於命而無欲速葢成周以詩書造士以三物賓興自一年離經辨志迨九年大成而猶待强乃仕若此其久者何也欲其多識而貫之以一博文而約之以禮畜徳以潤身而後能從政以澤民故也三物者其明明徳於天下本始於格致者乎六徳之先知仁也六行之先孝友也六藝之先禮樂也知本也其本治而末從之矣是雖成而上下然理一分殊非聖言末由漸悟盍觀於植乎漑其根者博也歸其根者約也千莖萬穗自根而出食其實散其贏器其翳緡其絲麻日滋歳懋用足而施普矣不殖則將落而奚普之能施此生之所以安於命而無欲速者也與張䝉溪書孔子之教人博約而已矣博文而約之以禮即多學而貫之以一者也昔嘗談及尋樂朱子曰不用思量顔子惟是博文約禮後見理分明日用純熟不為欲撓自爾快樂以佐觀之論語言博約者凡三見葢從事經書質問師友反身而誠服膺勿失則此樂得諸心矣樂善不倦絶無私欲天爵在我不為人爵所困役天地萬物與吾同體更無窒礙隨時隨處無入而不自得然則寓形宇宙之内更有何樂可以代此哉莊誦執事餘冬序録終篇啓發滋多與向日京邸共談時樂無以異然則執事殆真得孔顔之樂者哉夫庖羲始造書契治官察民墳典興焉臯䕫稷契旣讀其書矣是即博文也得之於心則天之敘秩我者我得而惇庸之同寅協恭和衷如臯陶所云者而能有行焉是即約禮也今之道學未嘗讀書而索之空寂杳冥無由貫徹物理而徒曰致和則物旣弗格矣無由反身而誠則樂處於何而得哉善乎執事之論學也其曰孔子後斯道至宋儒復明而濓溪實唱之先生令彬時郡守李初平聞先生論學欲讀書先生曰公老無及矣請為公言之初平聽先生語二年卒有得此可見學必讀書然後為學問必聽受師友然後為問駕言浮談但曰學茍知本則六經皆我註脚則自索之覺悟正執事所謂野狐禪耳吕希哲解大學曰致知致良知也物格則知自至堯舜與人同者忽然自見又作詩癖元凱而俳相如以莊周所言顔子心齋為至嗟乎莊周不讀孔子魯論之書又安知心齋由於博而後得於約邪謝顯道見明道誦讀書史明道稱顯道能多識伊川見人靜坐以為知學葢聖賢修習必反觀内省若徒誦其言而忘味六經一糟粕耳又執事所謂口耳出入之間言語文字之末剪綵為春象龍救旱抑竟何益哉此周濓溪教二程尋樂之宗㫖也然世俗相傳謂先生太極圖説得諸潤州鶴林寺僧夀涯者其誣固不必辨但此圖與通書相為表裏先生葢讀書深造而自得非索之空寂杳冥者圖首曰無極而太極葢無聲無臭之中而實理存焉天地人物一以貫之道為太極心為太極其實理同也即書誠者聖人之本也其言動而生陽靜而生隂即書誠源誠復也其言聖人主靜立人極即書聖學一為要一者無欲無欲故靜也靜則至無之中至有存焉其渾然太極矣乎徴諸易與中庸則易無思也無為也寂然不動感而遂通天下之故乃太極生兩儀兩儀生四象之本也不言四象而言五行者河出圖洛出書聖人則之圖書皆以土生數五居中而四象成焉亦中正仁義之所由定也至聖之徳本得諸至誠之道葢如此至誠無息至聖有臨則天地合徳矣旣與天地合徳則與日月合明四時合序可知故言孔子立人極傳自堯舜文武及與上律下襲必譬諸四時日月焉天地之大徳曰生若或濬之而小徳分殊四時各一其氣日月各一其明萬物各一其性如所濬之川東則不入於西南則不入於北而徃過來續不舍晝夜故曰小徳川流萬物之所以並育者無極之真二五之精妙合而凝乾道成男坤道成女化生萬物也四時日月之所以並行者五氣順布四時行也孰綱維是孰主張是若有宰之而特不得其朕者矣故曰大徳敦化此則書五行隂陽隂陽太極也先生真積力久融會貫徹乃為圖又為之説自博而約雖書不盡言圖不盡意豈非聞孔子之道而知之者哉與何燕泉書指摘傳習録九條如曰心之體性也性即理也故有孝親忠君之心即有忠孝之理無忠孝之心即無忠孝之理矣理豈外於吾心邪晦菴謂人之所以為學者心與理而已心雖主乎一身而實管乎天下之理理雖散在萬事而實不外乎人之一心是其一分一合之間未免已啓學者心理為二之弊此後世所以有專求本心遂遺物理之患正由不知心即理耳此義外之説葢朱子旣謂理不外心正自本體言其格物傳即物而窮其理卽是我心即之也非義外也書曰以義制事語曰聞義不能徙以與聞皆自心言即孟子所謂理義之悦我心也理義不根於心又何悦哉然録中亦有嘉言如曰理無内外性無内外故學無内外講習討論未嘗非内也反觀内省未嘗遺外也夫謂學必資於外求是以己性為有外也是義外也用智者也謂反觀内省為求之於内是以己性為有内也是有我也自私者也是皆不知性之無内外也是發明中庸合内外之道也其辯人謂晦菴專以道問學為事然晦菴之言曰非存心無以致知曰居敬窮理曰君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離於須臾之頃也是其為言雖未盡瑩何嘗不以尊徳性為事而又烏在其為支離乎又恐學者之躐等或失之妄作使必先之以格致而無不明然後有自以實之於誠正而無所謬世之學者苦其難而無所入遂議其支離不知此乃學者之弊而當時晦菴之自為則亦豈至是乎此其最得者也又曰聖人述六經惟是存天理去人欲道問學時就此心去人欲存天理上講求至善如事親温凊必盡此心之孝惟恐有一毫人欲間雜此心若無人欲純是天理自然思量父母寒熱求盡温凊道理此亦其最得者也然亦有大弊與孔孟相反者如曰親民從舊本作親民孟子親親仁民之謂親之即仁之也此則弊流於兼愛而不自知矣如曰今人知當孝弟而不能孝弟此已被私欲隔斷非知行本體未有知而不行者知而不行只是未知此則是矣然講求旣明又焉肎為不孝不弟之人乎乃曰欲求明峻徳惟在致良知人喜其直截遂以知為行而無復存養省察之功資質高者又出妙論以助其空疎而不復談書以求經濟此則弊流於為我而不自知矣吾不知其於楊墨為何如也執事所指摘者謂陽明陷溺於佛氏三十年然後以致良知為學本不過一圓覺耳如曰目可得見耳可得聞口可得言心可得思者皆下學也目不可得見耳不可得聞口不可得言心不可得思者皆上達也此則佛氏不可思議之説也吾儒下學而上達惟一理耳豈可岐而二之哉旣以親親卽為仁民又以良知卽為良能至此則又不合而為一口給禦人陽儒隂釋誤人深矣答汪方塘思書講學之徒惟主覺悟而斥絶經書自附會大學致知之外不復聞見古今連宇宙字義亦所不識葢上下四方之宇徃古來今之宙乃性分内事必貫徹之方可謂物格而後知至羅念菴昔與唐趙各疏請東駕臨朝幾䧟大僇後得免歸亦主覺悟而不讀書之所致也今觀其集首荅蔣道林書不展卷三閲月而後覺此心中虚無物旁通無窮如長空雲氣流行大海魚龍變化豈非執靈明以為用者邪昔六祖聞師説法悟曰何期自性本自清浄何期自性本不生滅何期自性能生萬法楊慈湖傚之曰忽省此心之清明忽省此心之無始末忽省此心之無所不通可謂蹈襲舊套矣然旣曰無物又有魚龍而宇宙渾成一片此即野狐禪所謂圓陀陀光爍爍也其與舊日冬遊等記更無二致復何賓巖鏜書論説求仁者求全其本心之天理也得仁則本心之天理全矣中庸曰仁者人也孟子曰仁人心也猶園有桃焉桃之所以為桃者根榦枝葉華實生理皆藏於核而為仁亦猶人之所以為人者親親愛人及物生理皆具於心而為仁也核破於斲傷於蛀則生理不全天理為人欲所間則惻隱之心所以生生者亦無復全矣故桃必裁培去其害核者以全其仁亦猶人必存養克治然後天理渾然而無間也今匹夫匹婦斥人之不仁者必曰非人必曰汝何其無人心也與訓釋如出一口然則天理少有不全雖為君子而未仁亦明矣哉古之聖賢憂勤惕厲而後人心不死一息不仁斲之蛀之者至矣奚其生夫氣必充實而後桃仁成焉否則不空即朽人之自養仁或不仁亦何異哉其生也自萌芽至於結實秩然不紊雖大小參差不齊然其為桃則舉相似也此又可見理氣無二而性之相近也至於核合皮内而後為果猶心必有身以行仁而後為道故孟子又曰仁也者人也合而言之道也嘗觀於易惟乾復言仁葢復之初卽乾之元碩果不食則生矣復之所謂仁承乎剝也仁於五行為木而乾為木果在春為仁發生也在冬為榦歸根也生生不已終而復始其天地之心乎問學一息少懈則與天地不相似是乾道也故曰君子學以聚之問以辨之寛以居之仁以行之夫仁主於行子貢之問乃其極功然雖堯舜之聖其心猶有所不足於此何哉葢博施濟衆夫人之所不能也求在外者也已欲立達夫人之所能也求在我者也在我則心之徳愛之理焉耳非必人人而立之也已欲卓立此心即及於人亦欲其卓立而不忍其傾頽雖力不能周然扶植之心自不能已也非必人人而達之也已欲通達此心即及於人亦欲其通達而不忍其抑塞雖澤不能徧然利濟之心自不能已也立如為山卓然不移達如導水沛然莫禦試登高山而望逺海岡阜丘陵必聨其岫無大無小如聳如立必俱立之象也溝洫畎澮必入於川無小無大如躍如騖達必俱達之象也是故山之性立水之性達人之性仁觀此則堯舜性之之聖亦體仁於心而已矣學以入堯舜之道者行仁必自恕始能近取譬推其所欲以及於人則大學絜矩以平天下者不待博施自能濟衆豈非要道哉故孟子又曰强恕而行求仁莫近焉或問曰顔子之學體在為仁用在為邦用舍行藏之道俱矣然仁人心也其心三月不違仁無乃二之與曰人之所以為人者生理存焉耳心放而不知求則生理日絶其形雖在其心已死故心者函此生理者也仁者發此生理者也五穀之種播於田生生不已是麃是萒少有間焉疆場侵而生理遏矣詩曰播厥百穀實函斯活驛驛其達有厭其傑厭厭其苖緜緜其麃此之謂也仁根於天夫猶是也心一息少放則生理亦一息間歇而不相依矣仁本與心一而人自二之是故服膺勿失則相依之謂也心惟仁是依故不違仁農惟稼是依故不失稼放其心而不求亦猶舍其田而不芸也夫求仁説物理曷謂之天理也本於賦予禀受自然明覺莫之為而為者也如惻隱之心非納交要譽惡其聲而然是也物欲曷謂之人欲也不安於品節限制而鑿以私知非天之所以與我者也如子貢貨殖而必先言其不受命是也去其所本無而復其所固有則萬物皆備於我矣夫理雖可以觸𩔖而長而其出於天者物物各有當然不易之則自私用智則違天而自賊故詩曰不識不知順帝之則又曰不僣不賊鮮不為則周禮曰則以觀徳毁則為賊是也則者法也自貎言視聽而達諸人倫無非物也而莫不有法焉如恭從明聰以及親義序别信之𩔖是也推之盈天地間無一物而無理可法者違其理則非天之法矣易所謂天則正以其出於天當然不易者也孟子亦曰君子行法以俟命而已矣豈敢毁之而自賊哉將欲行之必自致知始致雖有推極之義而説文原訓則曰送詣也其文為久至觸𩔖而推極之久則天牖帝迪送詣而至性之本善吾所固有者明而通於心中矣是故格物所以明善也誠意所以誠身也身主於心心發於意意萌於知知起於物曰致知在格物不言先者知與意雖有先後其實非二事也知之不至則意不誠而無物記曰物至能知而後好惡形焉何者好善惡惡感於物理者也好妍惡媸好富惡貧感於物欲者也道不離物物不離事盈天地間物物各有一理存焉去欲求理豈以空談悟哉不曰理而曰物者踐其實耳鄭元曰格來也物猶事也程子因言物來知起象山曰格至也研磨考索以求其至朱子因言窮至事物之理温公曰扞格外物以物至為外非合内外之道黄潤玉曰格正也義取格其非心心正矣奚用誠意致知為哉是數説皆因記而億者也惟説文曰格木長貎從木各聲取義於木聲以諧之其訓精矣今夫五行之各一其性也水土金火滙萃鎔合皆可為一惟木不然挨接暫同終則必異理欲同行而異情正如桃李荆棘共陌連根始若相似及至條長之時形色别矣荆棘必剪猶惡之菑逮夫身者也桃李必培猶善之欲有諸已也培其根而達其枝則木各滋息而長矣修其本而達其末則物各觸𩔖而長矣是故耳目口體物也心為本而視聽食息其末也喜怒憂懼無節於内胡為物交物引之而去乎必使心能為身之本明於無物而後已父子兄弟物也自孝弟慈推之則身為本而絜矩其末也好惡胡為而偏乎必使身能為家國之本至誠動物而後已天下大矣始於格物先事者也理自理欲自欲則本根各異物既格矣至於天下平後得者也人人親其親長其長物各付物則枝葉亦各不同焉惟明也辨物之理欲而至善存惟誠也成物之始終而大道得孔子之誠身不過乎物孟子之萬物皆備反身而誠皆反本之謂也或曰禮樂刑政之道鳥獸草木之名莫非物也汎而格諸曰否否本則身厚則倫經不云乎其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也格物論道也者無有精麄大小逺邇微顯格天地濟民物日費而用之不可得而盡也正萬目以視之而莫知其所繇也故曰君子之道費而隱得之者葢或寡矣必也敬乎易以衣袽言戒履霜言慎目睹者也以洊雷言恐懼耳聞者也不睹而亦戒慎焉不聞而亦恐懼焉雖青天白日之下稠人廣坐之中其暗處細事必自知之及其微有迹也詩云無曰不顯莫予云覯韓嬰曰匹夫匹婦會於墻隂而明日有傳之者矣男女大欲不正則放辟邪侈將靡不為焉天命不能須臾存矣是故君子慎獨必造端乎夫婦正其源也朱子曰有天地後此氣常運有此身後此心常發要於常運中見太極常發中見本性豈非顧諟之功邪欲旣遏矣惟理是安日用常行念念精察則此心全體虚明洞徹天何言哉昭昭於此已發者徃未發者來逝者如斯澄渟於此充滿流動如川之不息天之不窮内外本末體用動靜洞然無一毫之間而鳶飛魚躍觸處朗然也存者存此而已養者養此而已必有事焉而勿正心勿忘勿助長也至此則從容中道浩然之氣其生於性矣乎及其成功也自其燦然時出者言則謂之聖聖則知命以盡性故曰如天如淵自其渾然真切者言則謂之仁仁則盡性以至命故曰其淵其天敬以達誠斯其至矣慎獨論孔孟之言性也一而已矣而以為有性氣之分者一之則不是也孔子曰性相近也衆人之性則近求由矣求由之性則近游夏矣游夏之性則近淵騫矣淵騫之性則近夫子矣性固相近也又曰習相逺也習於舜禹則為舜禹之徒矣習於盜蹠則為盜蹠之徒矣習固相逺也以瞽瞍伯鯀為父而有舜禹習乎善而不習乎其父以栁下惠為兄而有盜蹠習乎惡而不習乎其兄故曰上智與下愚不移人惟習於利欲旦晝之氣梏其性而亡之為放辟邪侈之事在罟擭陷穽之中曾莫之覺也嚮晦定息至於中夜而清明之體還焉良心復萌所謂繼之者善其在是矣誰無此心豈非相近乎哉孔孟之後周人世碩乃曰性有善有惡荀卿則為性惡其善者偽也則又甚於世碩矣其論性惡累數千百言至援引堯舜問荅之詞以為証其出於堯舜與否吾不得而知也曰妻子具而孝衰於親則是妻子未具之先嘗有孝矣曰爵禄榮而忠衰於君則是爵禄未榮之先嘗有忠矣由是言之則性固本善而無惡也性習説性命於天道之隱也道𢎞於人性之顯也聖人之道天命之流行一而已矣天何言哉吾無隱乎爾自鄉黨朝廷宗廟以至起居飲食經曲禮節其即發育峻極之分乎子思子論至誠無息而及天地山川生物無窮可謂聞道者矣是故夫子之文章鳶飛魚躍顯焉者也顯則聖人不得而隱之也夫子之言性與天道無聲無臭隱焉者也隱則聖人不得而顯之也子思之聞其猶子貢之聞乎朝聞道夕死可矣夫豈外性而有聞乎哉不睹不聞人之所不見隱也性也參贊化育察乎天地顯也道也故費隱以前言學則用在其中費隱以後言用則學在其中大舜文武周公文章功業豈在性與天道外哉徃外求道道外求天雖聞善言不為已有道聽而塗説徳之棄也吾能屏絶利欲一於理義自費而隱不須臾離則徳性完備隨在發見譬則持壺深汲水漸充滿滋漑取足在吾壺矣至徳之凝至道何以異此道之在天地也猶水之在海也口耳之徒亡得於心則亦五石之瓠泛泛焉者耳其何凝之有是故流水之瀾即在源中日月容光即在明中天地之徳川流即在敦化之中聖人之徳達道即在大本之中堯明即在欽中舜哲即在濬中故子周子曰中也者和也中節也天下之達道也天道與人理一分殊茍截本末而二之斯支離矣故子程子又曰冲漠無朕之中萬象森然已具已應不是先未應不是後凝道説理一而分殊統之在道者也夫子贊易始言窮理理不可見也於氣見之易曰一陰一陽之謂道朱子曰隂陽迭運者氣也其理則所謂道確哉言乎理即氣也氣之有條不可離者謂之理理之全體不可離者謂之道葢通天地亘古今無非一氣而已氣本一也而分陰分陽則一動一靜一徃一來一闔一闢一升一降循環無已積微而著由著復微為四時之温凉寒暑為萬物之生長收藏為斯民之日用彝倫為人事之成敗得失千條萬緒紛紜膠轕而卒不可亂有莫知其所以然而然是即所謂理也初非别有一物依於氣而立附於氣以行也或者因易有太極一言乃疑隂陽之變易𩔖有一物主宰乎其間者是不然夫易乃兩儀四象八卦之總名太極則衆理之總名也云易有太極明萬殊之原於一本也因而推其生生之序明一本之散為萬殊也斯固自然之機不宰之宰夫豈可以形迹求哉自心之所同然者窮之存乎人爾周子為圖以明易與川上之歎一貫之旨同條共貫葢理即氣也一氣渾淪名為太極二氣分判名為隂陽隂陽分老少四象非土不成又名為五氣皆自吾心名之所謂窮理也非謂未有天地之先畢竟是理而理在氣先亦非氣以成形理亦賦焉而理在氣後嘗近取諸身則耳目視聽有聰明之理自吾心名之也非聰明之理在未有耳目之先出於視聽之後也口體言貎之恭從以至萬理皆然此天地人物之各具者雖欲紊之吾心自能窮究惡得而紊諸説文原訓曰理治玉也治玉者旣琢而復磨之極其精研則玉之渾然者粲然可見得其理以修身而無欲則乾以易知坤以簡能皆在於我何則道之大原出於天而地順承之民受天地之中以生徳性之知本無不能也守之則徳可乆行之則業可大廓之則配天地未有難且繁者故曰易簡而天下之理得矣天下之理得而成位乎其中矣彼以覺悟為道者豈夫子窮理之㫖哉祇見其支離爾斯論也吾聞諸羅整菴氏而益明云原理天命流行不已而人物生生無窮可謂仁矣其本則藏諸用焉葢人自有生即有知覺事物交接念念遷革失其恒性則反中庸矣故君子必自未發之中而豫養之夫未發云者非燕居休息夙興夜寐絶無聞見之謂也日用常行事物在前凡感之而通觸之而覺聞見不及而有渾然全體應物不窮者在焉是乃天命流行生生不已之機也但喜怒哀樂之情則未動耳於此而戒懼以存其心常為動靜語黙之主則物至能知自敬身惇倫尊師取友以至酬酢萬變情雖迭用而發皆中節一日之間雖萬起萬滅而其大本未嘗不寂也是故寂而未嘗不感感則必顯諸仁仁始於親親自孝友睦婣之殺以至匪親義始於尊賢自賢徳忠良之等以至匪賢等殺章而為敘秩命討則經綸自立本出矣問學以明之是謂知天葢人心之虚靈知覺主乎理義而無一息之不察也非粲然者達渾然者於外乎感而未嘗不寂寂則復藏諸用用則徳性常為中節之本必也涵泳其良知知日至則義日精以川流栽培其良能禮日崇則仁日熟以敦化經曲合而為發育峻極則大本與化育一矣問學以誠之是謂事天葢此心之周流貫徹絶乎利欲而無一息之不仁也非渾然者函粲然者於中乎故堯舜禹臯陶所以必言天者大本即天也人自違之則亦恭敬之不篤焉耳嗟乎天命流行之禮何時不在吾身哉未發之前已發之際一念不善覺其非禮恭敬自持私意立消真積功深中和不難致矣是故恭敬則心主乎動靜語黙而自不放此知與禮相為用而後仁始成也仁之為道大矣其盡性至命之樞要乎中庸原道於天而析諸聖曰修身以道修道以仁道固天下之大經也誠能修之以成仁則性盡性盡則命斯至矣故又終之曰肫肫其仁淵淵其淵浩浩其天雖然仁固難能也人得之以為心則天地之大徳存焉但放其心而不知求爾求則得之欲盡理還藏而必顯人皆見之見諸其行也故夫子曰仁逺乎哉我欲仁斯仁至矣其贊易也惟乾復言仁葢復之初反對則剝之終也碩果不食乾元生意存焉顔淵博文學以聚之既能且多而又問於不能與寡則辨之至明矣有若無實若虚寛以居之犯而不校不遷怒不貳過則行之至健矣此所以不逺復而能不違仁與故曰有不善未嘗不知知之未嘗復行也知幾由已其惟獨乎慎獨則能敬以入誠誠無不敬乾健故也未誠者必敬而後誠坤順故也安焉之謂聖其學一一則誠勉焉之謂賢其學二主乎一則敬顔淵幾於安焉者乎大體具矣辟如碩果解其蔓藤而生意復其為仁也得乾道焉克已復禮猶之閑邪存誠也仲弓則下顔淵矣其勉焉者乎具體而微方培灌敏樹者也其為仁也得坤道焉主敬行恕猶之直内方外也合内外而一焉則亦誠也矣故曰坤道其順乎承天而時行司馬牛諸弟子各因其材而篤樊遲三問而所告三不同者隨日月至焉而發育以成其材何徃而非生生之道哉故曰聖人如天覆萬物原仁堯舜之世道徳事功見於典謨者無非學也雖不言學而其言皆知本此其所以為萬世法與自成湯言性後傅説始言學説命之告王也始之曰人求多聞時惟建事學於古訓乃有獲事不師古以克永世匪説攸聞葢求多聞式古訓則理日明茍無言語文字以為學則非吾之所謂學矣次之曰惟學遜志務時敏厥修乃來允懷於兹道積於厥躬葢遜其志敏於學則道日積茍不勉强學問以為道則非吾之所謂道矣終之曰惟斆學半念終始典於學厥徳修罔覺葢教學兼全終始克念則徳日修茍執圓明覺悟以為徳則非吾之所謂徳矣自有書契治百官察萬民以來不可一日廢也雖言語文字日繁仲尼刪述六經則已簡易矣是故古之王者取士為其多聞也為其賢也士之待聘者博學而不窮篤行而不倦聞識雖多而貫諸一心則道明徳立丕建事功而堯舜之治有不復者哉然好高欲速厭常喜新是已非人黨同伐異學者之通患也雖堯舜在上文章煥然而言由其心文見於行命徳亮工之外葢鮮見焉故驩兜黨共工之象恭也靖言庸違反以為功有苖效伯鯀之方命也昏迷侮慢自以為賢而况孔子春秋之時乎葢道家者流起自黄帝伊吕歴記成敗之道而書成於管仲惟守清虚持卑弱以用兵權孔門弟子葢有惑於異端違離道本而畔博約之教者雖子路之勇猶曰何必讀書然後為學故教人一則曰攻乎異端斯害也已二則曰君子博學於文約之以禮亦可以弗畔矣夫時則老子之學無欲無為自然而民化其要存乎致虚極守靜篤萬物並作吾以觀其復而守中􅍖盈所寳者三曰慈曰儉曰不敢為天下先以禮文為亂之首道之華則是執三皇之治以御季世也孔子嘗問禮而知其意夫道徳仁義既失則禮無本矣此所以從先進與及蕩者為之則欲絶去禮學兼棄仁義曰聖人不死大道不止剖斗折衡而民不爭莊周之言也豈老氏以正治國之意哉時至孟子楊朱墨翟興焉朱有言曰行善不以為名而名從之名不與利期而利歸之利不與爭期而爭及之故君子必慎為善其為我也有𩔖於不敢為天下先翟之言其節用非儒述晏嬰之毁孔子曰盛容修飾以蠱世絃歌鼓舞以聚徒當年不能究其禮積財不能瞻其樂其兼愛上同則有𩔖於慈儉者焉然未嘗一言及於老氏以為宗也司馬遷引墨譏儒崇黄老而薄六經謂經傳以千萬數博而寡要勞而少功殊不知吾儒之學自本貫末雖孔子之聖猶資聞見以次徳性之知而擴充之詩書執禮皆其雅言而欲卒以學易可謂念終始典於學者矣故曰多聞擇其善者而從之多見而識之知之次也觀於攝相事得邦家綏來動和之化則其所擴充者莫非道徳事功彼老氏焉能有為致此哉况六經藉孔子刪述要而不繁漢文帝旁求治之者田何伏生孟喜僅數人爾迄武帝時安得有千萬數哉是遷之誣也自是黄老大行於漢矣佛雖興於晉宋齊梁之間然六經猶未泯也自晚宋學茍知本則六經皆我註之言出禪學大昌其徒心狹而險行偽而矜言妄而誑氣㬥而餒則六經之道晦矣嗟乎傅説之言學之原也士之志於道積厥躬徳修罔覺者當何如曰學於古訓乃有獲此其斆學兼全終始克念當篤信而力行之不可一日廢者也後世學尚超異凡經傳皆以為古人糟粕一切屏之惟讀佛老書雖數千卷則未嘗厭故予詳説而贅為之辭原學明儒學案卷五十一
