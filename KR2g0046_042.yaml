body:
  text: 明儒學案卷四十二餘姚黃宗羲撰甘泉學案六文選唐曙臺先生伯元唐伯元字仁卿號曙臺廣之澄海人萬厯甲戌進士知萬年縣改泰和升南户部主事署郎中進石經大學謂得之安福舉人鄒德溥陽明從祀孔廟疏言不宜從祀六經無心學之説孔門無心學之教凡言心學者皆後儒之誤守仁言良知心學惑世誣民立於不禪不霸之間習為多疑多似之行後人效之不為狗成則從鬼化矣言官劾其詆毁先儒降海州判官移保定推官歷禮部主事尚寶司丞吏部員外文選郎中致仕卒年五十八先生學於吕巾石其言性一天也無不善心則有善不善至於身則去禽獸無幾矣性可順心不可順以其附乎身也身可反心不可反以其通乎性也故反身修德斯為學之要而其言性之善也又在不容説之際至於有生而後便是才説性之性不能無惡矣夫不容説之性語言道斷思維路絶何從而知其善也謂其善者亦不過稍欲别於荀子耳孟子之所謂性善皆在有生以後惻隱羞惡辭讓是非之心何一不可説乎以可説者謂不能無惡明已主張夫性惡矣以性為惡無怪乎其惡言心學也胡廬山作書辨之耿天臺謂唐君太和治行為天下第一即其發於政便可信其生於心者矣又何必欲識其心以出政耶慈湖之剖扇訟象山一語而悟本心然慈湖未悟之前其剖扇訟故未嘗别用一心也唐君以篤修為學不必強之使悟孟我疆問於顧涇陽曰唐仁卿何如人也曰君子也我疆曰君子而毁陽明乎曰朱子以象山為告子文成以朱子為楊墨皆甚辭也何但仁卿涇陽過先生述之先生曰足下不見世之談良知者乎如鬼如蜮還得為文成諱否涇陽曰大學言致知文成恐人認識為知便走入支離去故就中間點出一良字孟子言良知文成恐人將這個知作光景玩弄便走入玄虛去故就上面點出一致字其意最為精密至於如鬼如蜮正良知之賊也奈何歸罪於良知先生曰善假令早聞足下之言向者論從祀一疏尚合有商量也醉經堂集解性天命也惟聖人性其心而心其身小人不知天命之謂性也故性為心用心為身用劉子曰人受天地之中以生所謂命也孟子曰夭夀不二修身以俟之所以立命身心性命解道無體性無體仁無體誠無體總之以物為體外物無道無性不仁不誠此吾道與異端之辨道德仁誠解魯論記夫子之言至矣家語得其十之七荀子劉向大小戴十之五莊列十之三論語解論語記言嚴謹不敢增減一字惟編次頗雜其義易晦使編次皆如鄉黨一篇則論語可以無解同上已欲立而立人已欲逹而逹人已所不欲勿施於人孟子曰茍能充之足以保四海程子曰充擴得去天地變化草木蕃一貫解維天之命於穆不已天行也逝者如斯夫不舍晝夜聖人之心純亦不已也孟子曰有本者如是程子曰其要只在謹獨川上解用之則行有是以行見龍也舍之則藏有是以藏潛龍也用而無可行或所行非所用舍而無可藏或所藏非所舍謂其身行藏則可謂其道行藏則不可有是解春風沂水點之誠也吾斯未信開之誠也狂者志有餘而誠不足聖人欲進其不足而裁其有餘故一歎一悅進之也正所以裁之也惜乎點猶未悟後來解者又從為之詞聖人之言荒矣言點解仁者以物為體安得有已故曰克已仁者如射反求諸已而已矣故曰由已知由已然後能克己能克已然後能復禮夫學至於禮而止矣克己未足以盡仁猶無私未足以盡道知其解者宋儒惟明道一人克已由已解有道榖不足耻九百粟不可辭怨欲可以為難而不可以為仁聖人雖因憲而發實古今賢者之通患為其不在中庸也賢哉回也陋巷簞瓢為其志在擇乎中庸也問耻解仁者怨乎曰怨已仁者憂乎曰憂道然則如樂何曰怨已故不怨天不怨人在邦無怨在家無怨憂道故不憂貧不憂生以死生為晝夜視富貴如浮雲孔顔樂解修已以敬至於安人安百姓皆修已也易有太極至於生兩儀四象八卦皆易也謂敬在修已之中太極在易之中則可謂敬安百姓太極生兩儀則不可修已解大學中庸賈逵經緯之説是也而作書之意又若以易為經以詩書為緯蓋惟天地為大惟學則天故曰大學惟中乃大惟庸乃中故曰中庸易曰大哉乾元君子行此四德者又曰天行健君子以自強不息大學也乾之德莫盡於九二其曰龍德而正中者也庸言之信庸行之謹中庸也此其經也雜引詩書互發其緯也大學中庸解大學以規模言其緒不可紊中庸以造詣言其功不可略同上正已而不求於人之謂善正已而物正之謂至善孟子曰行有不得者皆反求諸已善也其身正而天下歸之至善也程子曰在止於至善反已守約是也則合而言之也至善解物有本末其本亂而末治者否矣自天子以至於庶人一是皆以修身為本家語曰察一物而貫乎多理一物而萬物不能亂以身本者也孟子曰天下國家之本在身格物解自知止而後有定至慮而後能得始條理也知至至之也在止於至善終條理也知終終之也知止能得則近道止至善則道在我知止止至善解君子時中庸擇中庸依中庸者也小人無忌憚索隱行怪者也賢者之過與不及均而賢者之害尤甚必至罟獲陷阱乃已時中解中庸其至矣乎是謂至善君子依乎中庸遁世不見知而不悔故止於至善中庸至善解必有事焉而勿正心之謂儒正心而無所事焉之謂釋易曰終日乾乾行事也程子曰鳶飛魚躍與必有事焉而勿正意同會得時活潑潑地不會得只是弄精神鳶飛魚躍解道者治人之道也以人治人雖執柯伐柯未足為擬子思之苦心亦至矣程子謂制行不以已而道猶未盡此之謂也道不逺人解惟天下至誠能盡其性堯舜性之也其次致曲湯武反之也易曰逆數禮曰曲禮逆而後順曲而後直聖人之教為中人設張子所謂善反之則天地之性存焉者也發而不中反求諸已此之謂致曲致曲解大哉聖人之道三千三百之謂也禮者性之德也道問學所以崇禮所以尊德性崇禮解凡一代皆有一代之大經堯舜授禪禹治水湯武放伐伊尹放太甲周公誅管蔡孔子作春秋子思述大學中庸孟子距楊墨韓昌黎程明道闢佛老其經綸一也大經解未發之中不可求必也格物乎曰知本曰知止曰明善曰致曲旨同而名異至於反身而誠然後立天下之大本大本解不覩不聞即人所不見獨也戒慎恐懼即不動而敬不言而信慎獨也小人間居為不善不慎獨也無聲無臭皆獨之善或以為􅐌道誤矣獨解於乎不顯不顯惟德詩人贊文王至德也始乎慎獨終乎慎獨學者當儀型文王也儒者既於不顯為兩解無怪乎以慎獨為漏言不顯解天與鬼神形而下者也故言天曰無聲無臭言鬼神曰不見不聞道形而上者也自無聲臭自莫見聞豈待􅐌乎必以無聲臭不見聞􅐌道謂聲臭見聞非道可乎為此解者欲附於不生不滅不垢不淨之旨不知反為所笑天鬼神解物有本末身其本也國家天下皆末也未有本亂而末治者物格者知修身為本而已非修身也知修身為本是謂知本是謂知止是謂知所先後是謂物格知至故務其本則意誠不然皆偽也守其本則心正不然悉邪也意誠心正即可以語修身乎未也心雖已正而身未易修故無私而不當理者有之克已而不復禮者有之知及仁守莊以蒞而動不以禮者有之定靜且安不慮則不得者有之故格物者近道而已即慮且得猶難至善故曰好學力行知耻則知所以修身又曰齋明盛服非禮不動所以修身蓋至於禮然後修身之能事畢矣雖然齊家治國平天下豈都無事莫知其子之惡是縱子莫知其苗之碩是貪財未有貪財縱子而能齊家者未有以暴帥人而興仁讓於國者未有嫉彥聖舉不肖蓄聚斂好惡拂人性而能平天下者故節節有次第節節有工夫然皆必是修身始欲修其身者必自格物始物格而身不修者有矣未有不格物而能修身者也格物者知本也修身者立本也知本智也立本仁也仁智合者勇也此合物與修身始終之條理也然則格物如何在家而家在國而國在天下而天下無巨細無精粗將有行將有為凡有行凡有為或行而不得或行而不通一一反已省已責已舍巳不敢一毫求人責人然後可以求人責人孟子曰萬物皆備於我矣又曰行有不得者皆反求諸已又曰仁者如射反求諸已而已矣是謂格物能知此義然後宇宙在手萬化生身格物修已解夫子述而不作弟子不敢著書夫子沒七十子喪去聖日逺漸生隱怪子思子憂其失傳始作大學中庸至孟軻氏而異端大起爭喙者多始作孟子二子皆不得已而著書吾道既明無書可著孟子解孟子一書首尾照應後先互發凡有注解添足畫蛇同上孟子闢楊墨一言而有餘闢告子屢言而不足告子之害甚於楊墨至後代始大告子解孟子論三王五伯諸侯大夫則五霸為二等論堯舜湯武五伯則五伯為三等性之上反次之假又次之假或成真惡知非有舉戰國諸侯而無之是孟子之所思也五伯解下同夫子論小人中庸擬於時中君子也孟子論五伯假之擬於性之反之之聖人也果如注解是擬人不於其倫矣伯者慕道而讓道於道無損異端賊道而當道誣民已甚故鄉願楊墨告子聖賢皆闢之不遺餘力獨於五伯雖小之不勝其大之雖斥之不勝其與之斥以正志與以明伐吾儒之道得王而大得伯而貴博學詳説與博文同將以説約與約禮異説約者要約之約求會通也約禮者約束之謂能不畔而已博學詳説則禮在其中約禮與人規矩説約在人解悟説約説好樂與百姓同好貨好色與百姓同即老吾老以及人之老幼吾幼以及人之幼皆不忍人之政也或謂孟子姑以引君乃自卑以求行其言乎外欲無理外情無性性理不明往往如此好貨好色解仁人心也本心也不可放也始焉不受呼蹴之食此之謂本心繼焉而受無禮義之萬鍾此之謂失其本心失其本心者放心也由不為而逹之於其所為此之謂由乎義路由乎義路者求放心也心學之説謂之求心則可謂之求放心則不可李延平曰仁人心也孟子不是以心名仁羅文莊曰延平之見卓矣二子可謂有功於孟子求放心解仁義忠信樂善不倦此天爵也既飽以德飽乎仁義所以不願人之膏粱文繡也立大也陸氏以立大為立心其流之禍於今為烈彼不仁不義假仁假義小仁小義孰非立心皆可以為大乎否立大解大行不加舜禹有天下而不與者也窮居不損顔子簞瓢不改其樂者也程子曰泰山髙矣泰山頂上已不屬泰山堯舜事業只是一點浮雲過目非程子不能及此近代陳氏始發其義楊朱二解胥失之矣大行不加解由仁義行仁者安仁堯舜性之也居仁由義知者利仁湯武反之也性之者不可見得見反之者可矣獨復者不可見得見頻復者可矣孟子曰有意而不至者有矣未有無意而能至者也善夫揚雄氏之記之也性反解太上忘實忘名其次篤實晦名其次力實生名生名者賢晦名者聖忘名者天夷齊讓國國與名而俱存燕噲讓國國與名而俱喪燕噲非好名者也若出於好名必擇其可讓者讓之不至有子之之亂固亦名教之所與矣好名之人能讓千乘之國貴名也好名解以性之欲為性不知天命之性是世俗之所謂性也以氣質已定之命為命不知受中以生之命是世俗所謂命也在世俗則可在君子則不可君子者反本窮原盡性至命者也故言性曰善言命曰天去此取彼不謂性命解惟天生民有欲欲不必無亦不能無為無欲之説者惑也聖人中焉賢者寡焉寡者擇其中之謂也至於中則一欲不棄一欲不留欲我當欲與人同欲是謂中和位育之道寡欲解經者學之具也學以明道而易具矣學以理性情化天下而詩具矣學以為帝者師為王者佐而書具矣學以修身齊家措之天下而禮具矣學以驗天應人明微維分而春秋具矣其理相通其義各别樂無經非失也有詩在也樂章存而器數猶可考也經解下並同經聖經也惟聖解聖惟經解經羲之畫文之彖周公爻辭孔子十翼是也惟賢知聖惟賢知經子思之大學中庸孟子之七篇程伯淳之語録凡所引是也解字者得少而失亦少解意者得不償失今之章句大全是也擬經者勞且僭而無益於發明太玄玄經是也誣經者淫妖怪誕侮聖逆天已易傳習録是也解經以傳不如解經以經合而解則明拆而解則晦故經有一事而前後互發者有一義而彼此互見者盡去其傳注而身體之口擬之不得則姑置之而從他處求之諷詠干周恍然觸類矣無聖人之志不可解經讀世俗之書不可解經韓子曰非三代兩漢之書不敢觀非聖人之志不敢存可為讀經之法兩漢近三代若董仲舒揚雄劉向鄭玄徐幹皆其傑然者其緒論往往可采也夫子有言行在孝經非世所傳之孝經也嘗考之儀禮凡禮有經有記有傳有義今按小戴內則前一段當為孝經曲禮雜儀當為記大戴本孝以下四篇與世所傳唐明皇御製序者當為傳義合之而後孝經可考孝經解下同內則自后王命冡宰至賜而後與之文字宏密精深與十翼相類既自别於儀禮又自别於六經所以為夫子之孝經六經惟易無恙漢唐千家傳注多有可考不得其解當一以經文為據易解下同解經之法以經不以傳宜合不宜拆凡經皆然而易尤甚今之讀易者未解繫辭先解爻彖未辨枝葉先認根苗是孔子誣周文而周文又誣伏羲氏也此拆之尤舛而自以其傳代經也易之彖辭彖傳爻辭爻傳不妨合為一卦惟大象當自為一傳文言又當自為一傳大象者學易用易也文言豈惟乾坤二卦有之上經八卦九爻下經八卦九爻散在繫辭者皆是也合之共為一傳不特文言為全書而上下繫亦自朗然易有文錯者如雲行雨施當在時乘六龍之下是也有文不錯而句讀錯者如後得主為主利是也有字不錯而反以為錯者蓋言順也當作慎是也天地日月寒暑晝夜水火男女乾坤之可見者也極而推之凡超形氣者皆乾凡涉形氣者皆坤凡善皆乾凡不善皆坤凡中皆乾凡過不及皆坤乾之亢與旡首處即坤坤之順且正處即乾易逆坤順乾之書是故逆數乾坤解易有用之用有不用之用乾元用九言河圖虛中大衍除一意同蓋一三五七九皆乾二四六八十皆坤乾不用一用九用九所以見一也一者天則也五以上始數皆乾六以下終數皆坤天一始水地六終之地二始火天七終之天三始木地八終之地四始金天九終之地五始土天十終之坤用六以大終也大者乾也乾之用處即坤坤之不用處即乾用九以竒偶數分乾坤用六以始終數分乾坤故謂之易九六解初即下不曰下而曰初舉初以見終也上即終不曰終而曰上舉上以見下也初以明本末上以别尊卑亦六九之義初上解乾元資始始我者生我者也坤元資生生我者殺我者也貪生為凡民甚則氓𨽻禽獸知始者為君子合德則聖且神始生解帝王之治本於道是也而道何本哉曰本於身可也曰本於中亦可也而解者曰心謂桀紂非心可乎帝王之道在執中而身之中以立本而身以表則故曰允執其中曰慎厥身修互見也以心為中心難中也以心為身民何則矣開卷之錯不可不慎書解下並同堯舜皆聖也堯會生知之全舜開學知之始故論道則稱堯舜論學則斷自舜而不及堯顔淵曰舜何人也豫何人也孟子曰舜人也我亦人也後有作者文王似堯孔子似舜顔曾思孟皆舜之徒也詩始二南樂淑女而歸百兩坤道也終雅頌純不顯而躋聖敬乾道也詩解下並同關睢秉彛好德休休一個臣也地道也臣道也妻道也德在此福亦在此所以為后妃之德所以為南風之始所以為中聲之寄君子得之解愠小人得之阜財人而不為二南故猶面墻豳風豳雅豳頌是周家一代元氣宇宙間萬古元氣貴者王忽者亡惟影響詩贊文王不顯與天載同贊其德也史稱西伯隂行善天下諸侯來朝稱其時也具於穆不已之德又當儉德避難之時所以愈不顯又所以愈丕顯與大舜玄德同古之學者學禮而已矣古之觀人者觀禮而已矣三千三百無一非仁故典曰天序禮曰天秩動作威儀之則曰天地之中禮解下並同恂栗威儀鳶飛魚躍儀禮中有記有傳有義大小戴記中有經次其序比其數禮之大略可以概睹詳具禮編春秋尊夏尊王尊天尊道扶天綱立地紀所以託天子之權行天子之事春秋解下並同春秋責已謹嚴待人平恕左傳中載冀缺劉子二段是三代以前聖人相傳格言失其姓氏如曲禮序首引毋不敬數語非臯契伊周之徒不能道也養心莫善於誠書之作德日休也聖人教人性非所先魯論之性與天道不可得聞也儒者非之正坐此誤諸子解下並同表章大學自韓退之始表章中庸自徐偉長始合大學中庸為子思經緯之書自賈逵始闢佛老尊孟氏千百年惟一韓子其功在吾道為漢唐儒者一人鄭康成朱元晦皆聖門遊夏之列而特起百代之後事難而功多鄭師馬青出於藍朱去程門未逺源流各别孟子之後一人非正叔不能至此然正叔所造竟讓其兄夫然後見獨知之難也張子厚醇正不減正叔而才次之然均之可以弗畔周邵則自為一家過則陸甚則楊吾不欲論之矣朱子能解正叔而間雜乎周邵其去明道則已逺不可不辨揚子雲美新論劉靜修渡江賦為千古不白之疑或曰遜言或曰偽作或曰以秦美新而甚之也渡江時不能違也要之違心焉耳矣詳其語氣大段二子固難語偽雖然凡售偽未有不假真者偽乎偽乎吾以二子之生平信之也國朝正儒莫如薛文清髙儒莫如陳白沙功儒莫如羅文莊使三子者不生考亭之後得遊明道之門俱未可量論學書伏讀抄中解格物有曰通天地萬物而我為主推此義也可以知本可以格物矣贈友人曰自求見本體之説興而忠信篤敬之功緩遂令正學名實混淆而弄精魂者藉為口實又曰今人好髙只不安分為斯言也雖賢聖復起不可易矣乃其要歸在明心體其語心體曰此心自善安得有欲而於程子善惡皆天理與惡亦不可不謂之性二言反疑其偽此混心與性而一之蓋近代好髙者之言而尊信心學之過也竊嘗讀大易至咸艮二卦而見聖人諱言心讀魯論至子貢贊夫子而見聖人罕言性命惟書有之人心惟危言心也既曰危安得盡善道心惟微言性也既曰微安得無惡故曰操則存舍則亡出入無時莫知其鄉則危之至也曰性相近也曰人之所以異於禽獸者幾希近且幾希則微之至性猶未易言善况心乎然此心性之説也而未及道也心性不可言道可言乎道與心性至孟子言始詳為告子也今之天下不獨一告子矣惜乎世無孟子也然不可不為足下一言之蓋聞之言學者惟道道隂陽而已矣言道者惟天天道隂陽而已矣陽主始隂主生陽多善隂多惡天且不違人猶有憾孰謂善惡非天理乎陽必一隂必二一則純二則雜氤氲蕩焉人物生焉孰謂惡不可謂性乎然則易言繼善孟子言性善者何也其本然也有始而後有生有一而後有二此書所謂維皇降衷程子所謂人生而靜以上不容説者也既始矣焉得不生有一矣焉得無二此書所謂惟天生民有欲程子所謂才説性便已不是性者也然則學何為為善也陽統隂隂助陽則內陽而外隂也故中故善隂敵陽陽陷隂則內隂而外陽也故偏故惡此書所貴精一執中程子譬之水有清濁而人當澄治者也然則惡在其能善也天地間一切覆載而必有以處之以人治人以華治夷以賢治不肖以大賢治小賢天於是為至教君子一身萬物咸備而必有以處之以已及人以親及踈以貴及賤以多及寡以先知覺後知以大知覺小知以有知覺無知人於是為法天此書所謂天生聰明時乂程子所謂天理中物有美惡但當察之不可流於一物者也是故惡亦性也是有生之性是才説性之性性之所必有也雖物而無異性必善也是天命之性是不容説之性性之所自來也雖人而難知故孟子曰聲色臭味安佚性也惡可謂無惡也有命焉君子不謂性也烏得不性善也性所同也君子所獨也學為君子謀不為衆人謀衆人待君子而盡性者也君子者天生之以盡人物之性參天地而立三才者也如何而可不知所自也是以不謂性也是以道性善也言性之精莫如孟子繼孟子者程子也吁亦微矣微故難言雖然性猶形而上者形而上者雖善猶微心則形而下矣形而下者敢概之以善乎性具於心而心不皆盡性性逹諸天而人不能全天天人合心性一必也大聖人乎故曰堯舜性之也其次致曲必反而復故曰湯武反之也復必自身始故又曰湯武身之也又曰不逺之復以修身也性之者不可得矣得見復焉可矣復焉者不可得矣得見頻復者可矣位祿夀昌孰不榮羡食色利名孰非斧斤斷之不能中焉不易適而好忘動而多悔倐忽晦明毫毛人鬼夫是之謂心明是之謂明其心體答孟吏部叔龍書元舊有心身性命解大約謂性一天也無不善心則有善不善至於身則去禽獸無幾矣故自性而心而身所以賢聖自身而心而性所以凡愚是故上智順性其次反身故曰堯舜性之也湯武身之也身之者反之也故又曰湯武反之也反身而誠所以復性夫學為中人而設非為上智而設也學修身而已矣然則心居性與身之間顧不可學歟曰性可順心不可順以其附乎身也身可反心不可反以其通乎性也性乾而身坤性陽而身隂性形上而身形下獨心居其間好則乾陽怒則坤隂忽然而見形上忽然而墮形下順之不可反之不可如之何可學也危哉心乎判吉凶别人鬼雖大聖猶必防乎其防而敢言心學乎心學者以心為學也以心為學是以心為性也心能其性而不能使心即性也是故求放心則是求心則非求心則非求於心則是我之所病乎心學者為其求心也知求心與求於心與求放心之辨則知心學矣夫心學者以心為學也彼其言曰學也者所以學此心也求也者所以求此心也心果待求必非與我同類心果可學則以禮制心以仁存心之言無乃為心障歟彼其原始於陸氏誤解仁人心也一語而陸氏之誤則從釋氏本心之誤也足下謂新學誤在知行合一諸解非也諸解之誤皆緣心學之誤會其全書則自見耳然則大學言正心孟子言存心何也曰此向所謂求放心也正心在誠意存心在養性此向所謂求於心也心之正不正存不存從何用力修之身行之事然後為實踐處而可以竭吾才者也嗚呼此子思格物必以修身為本孟子立命歸於修身以俟程子謂鳶飛魚躍與必有事焉而勿正心意同寥寥千載得聖人之傳者三子也答顧叔時季時昆仲叔時來教曰墨氏談仁而害仁仁無罪也楊氏談義而害義義無罪也新學談心而害心心無罪也此説似明不知誤正在此也仁義與隂陽合德雜之則兩傷然非仁義之罪也至於心焉得無罪人心惟危莫知其鄉此是舜孔名心斷案足下殆未之思耳附程子表章大學有功聖門固矣然格物解誤則是書雖存反增一障可省也亦可無也程子雖以窮理為解而其心不安是以其説屢變而往往有得之言外故雖可以觀其至而大義隱矣自我明髙皇帝諭侍臣謂大學要在修身而古本以修身釋格致然後直接數千載不傳之緒自是儒臣如蔡虛齋林次崖蔣道林羅文恭王布衣及先師吕先生往往能通其義然徒曰解之云爾其學教人之旨不存焉就中破的者無如布衣然不免為新學所陷觀其以心齋自號自命又烏在其以修身為本也總之張子厚所謂釋氏以心法起滅天地不免凝氷者無怪其相率而陷於新學也近讀孫淮海講章亦既明乎其解視諸家較備矣乃其緊要歸明心體是本其所本而非大學之本也是解一人而學又一人也嗟夫新學橫正傳息不肖之身又岌岌乎不敢當也當此之時乃有先生者不由師授不由注解默契遺旨先得所同既揭止修又標性善其於學問源流昭昭乎黑白分而新學不能混矣而元猶以為先生設科太廣門徒太盛自反自修之實尚寡立人逹人之意過多未免以憧憧感人猶難語知止而定也易以咸言感貴其無心以艮言止惟止諸身知止在身則身以內身以外皆無汲汲焉可也彼謂明明德在親民者以其昏昏使人昭昭既以末而為本謂成已成物並切者方藝已田遽藝人田又未免於本末雜施均之不知本焉耳矣世未有不知本而能誠其意者也天之未喪斯文也既賦先生以明學之獨智而今又置之於孑孑獨處之居納之於夭夀不二之地刋其華銼其鋭使之反初觀復深根固本殆夫子所謂尺蠖屈龍蛇蟄藏身安身將駸駸於德盛化神歟不然何其遇之窮至此也答李中丞見羅書大教謂格致誠正總是修身工夫有一無二是也但先生之意猶指格物謂凡物之物而鄙意則指為身與家國天下之物也雖凡物之物不出身與家國天下而大學所指則專以身對家國天下分本末而凡物不暇言也故曰物有本末又曰其本亂而末治者否矣格此之謂格物知此之謂知止先生所謂萬物皆備一物當幾者是已所謂知修身為本即知本即知止即知所先後是已而止修揭之説猶二也格致義中所謂物者又不覺其愈逺也蓋知知本之即知止而不知知本知止之即格物知至也羅布衣反已之説大與鄙見合而於先生有功獨其指物亦為舊説所纒不知本文明甚先生姑就其是者推之可得也嗟夫反已至矣孟子曰行有不得者皆反求諸已必如大舜號泣旻天負罪引慝而後可言夫反已者天必祐之况於人乎况於鬼神乎又答書維卿之且别也囑曰共致一柬足下其自名以友弟稱無不可曰我與若皆長也亦有説乎曰有長幼有序列在大倫今世不論少長稱人者槩兄自稱者槩弟此在泛交則可在吾黨則不可尋常口號或無妨隨俗載之書禮則非所為訓也敝鄉會友此風猶在惟少者得以自弟而長者不得也惟長者曰兄曰某字或曰某字兄即長至二十以上亦止於稱某字先生不及少也至於長者稱少曰某字曰足下或曰賢弟其自署以名或曰僕而已矣其往來柬上則無少長皆得稱友生維卿曰子言是也與顧叔時季時吾輩在家在鄉在國無往無分分之難盡久矣不求盡我分內而反求多於分外此會講之風所以盛於今日也夫分內之與分外誠偽判然矣舉世去此就彼者何不知本也未有不知本而能誠者未有不誠而能動者然則會講何益於人徒賊誠損已耳答原易禮有以多為貴者視聖尊賢敬老恤孤之類是也禮有以少為貴者津要逢迎酒席濫觴貨賂公行之類是也禮有舉之莫敢廢者或因土俗所宜如入鄉問俗是也禮有不近人情而實為禮之至者如舉國之人皆若狂而夫子以為一日之澤是也凡此處皆有天則不容以意而輕上下之故凡為上官者御其所屬有必跪有必揖有必拜有必留茶有必留飯皆禮所生也在賢者固當破格優之即庸衆者亦不宜有意裁之天下賢者少庸衆者多若待賢者出於例之外待庸衆者不及於例之內不惟庸衆者恚怒愧阻而賢者亦且懼不敢當恐養畜人材之方不如此矣故為國者必以禮學道者必愛人未有不愛人而能化人者未有不以禮而能愛人者書曰爾無忿疾於頑無求備於一夫少有忿疾求備之心則愛人之心充拓不去矣夫忿世之與憂世忿不能之與矜不能其用心廣狹規模大小何如也願兄之念之也與維卿書先是拜湖北名賢傳之賜時知門下獨契蔣先生道林也蔣先生與先師吕巾石先生并為湛門髙第又曾於羅文恭集即得見所解格物説而喜之及讀門下所為傳又其行誼純明如此則蔣先生在楚中學者當為國朝一人又以見湛門諸君子雖其風動不及姚江而篤行過之是亦可以觀二先生然元之置不復論者久矣夫學誠而已矣其分數不同而明亦因之孟氏而後明道誠且明矣伊川橫渠次之朱子又次之江門别傳蓋出濓溪堯夫之派然無愧於誠者也與其明不足也寧誠則薛文清胡敬齋羅文莊其修朱子之業而有功近代者乎自新學興而學始難言此元之所以有戒也答郭夢菊大參書物有本末而身其本也致知而不以修身為本此致知所以遺格物其去大學逺矣身在是而位亦在是凡思而出位者不素位而願外不正已而求人皆邪思也其以求止逺矣孟子曰行有不得者皆反求諸已又曰夭夀不二修身以俟之皆思不出位之説皆止之説也不獲其身不見其人未易言也能慮能得氣象故緩理會且自顧知止入定何如耳由反已而修身由修已而忘已則庶幾哉答錢侍御足下志逺而興髙識端而守介然默守此充其未至何患不及前賢而猶皇皇於會講一節何異走日中而避暑也子曰為仁由已孟子曰仁者如射李先生常憂學不傳元但憂無可傳者耳與徐客部懋和往元初至吉州時曾見廬陵鄉先生張公諱子𢎞者論吉州人物謂聞之故老叟兒童公論似求於貧中若三羅是已三羅者皆及第也而能貧此言庶幾近之後因登匡山有詩云王匡既仙去遺迹山之阿豈無一代雄千秋名如何貧人貧不死富者空金多吉州今代盛人物在三羅鄙意謂禮失而求諸野張先生之言或有據也乃彼時諸公見此詩多不滿姑以俟百世可也足下謂必於學中尋人殆未可草草吾道自有正氣世間自有真人足下平心而徐察之自見不當以區區一偏之言為左劵也足下喜釋釋自不妨儒各自成家正不必混而相借耳白沙有言儒與釋不同其無纍一也足下蓋有志於是矣而必尋人於講學不但無益於儒恐并其釋意而失之况此邦九邑講學大半就其講者士風如足下所云亦可槩覩復可使之轉令盛乎必以講學尋人與必以不講學尋人均之有意雖然世必有不講而學不言而信者雖未之見不敢誣天下盡無人也答汪吉州大抵一體與過化實未易言近世儒者動稱一體而侈慕過化此不可以欺人止欺已耳揚子雲有言君子思人况已乎小人欺已况人乎為今之學未有不欺已者其原生於以本體求道而陋聞見拙踐修耳李卓吾道人名震湖澤之上頗聞其旨主不欺志在救時可為獨造獨其人似過於方外寡淵默之思露剛狹之象未言化俗先礙保身門下當善成之幸勿益其僻也夫儒與釋不同而吾儒之中庸與釋家之平等一也不審道人亦有味其言否耶道人因焦太史與門下之雅謬意不肖乃不肖亦何敢無以報道人惟轉致為幸蓋因道人既以自省又恐其反與於今世談學之弊之甚則關係不細耳答劉方伯邇來士大夫工於速化之術一以彌縫世情諂上諛下為通才為逺器無論道理何如即本來稟受偏氣亦消磨殆盡猶然世共賢之而彼亦若自以為得計者士風至此可為太息夫理天而氣人然氣亦所以輔理自大賢以下氣不能無偏氣存而理猶有存者故理失而求之氣可也并其氣而喪之且侈然附於非禮之禮如世道何答余司理端潔楊止菴先生時喬楊時喬字宜遷號止菴廣信上饒人生時父夢至一夾室有像設揖之像設舉手答曰當以某月日降於公家如期而先生生他日過學宫見夾室一像甚類夢中則易主所遷之故像也登嘉靖乙丑進士第厯禮部主事員外尚寶司丞南尚寶司卿應天府丞右通政太僕寺卿南太常寺卿通政使萬厯癸卯升吏部右侍郎尋轉左署部事乙巳大計京朝官先生清執不徇姦相給事錢夢臯御史張似渠皆四明注意之私人察疏上四明以兩人之故并同察者特旨俱留用且切責部院先生纍疏求去已酉二月卒官贈尚書諡端潔先生學於吕巾石其大旨以天理為天下所公共虛靈知覺是一已所獨得故必推極其虛靈覺識之知以貫徹無間於天下公共之物斯為儒者之學若單守其虛靈知覺而不窮夫天下公共之理則入於佛氏窠臼矣其與羅整菴之言心性無以異也夫天之生人除虛靈知覺之外更無别物虛靈知覺之自然恰好處便是天理以其已所自有無待假借謂之獨得可也以其人所同具更無差别謂之公共可也乃一以為公共一以為獨得析之為二以待其拈合恐終不能拈合也自其心之主宰則為理一大德敦化也自其主宰流行於事物之間則為分殊小德川流也今以理在天地萬物者謂之理一將自心之主宰以其不離形氣謂之分殊無乃反言之乎佛氏唯視理在天地萬物故一切置之度外早知吾心即理則自不至為無星之稱無界之尺矣先生欲辨儒釋而視理與佛氏同徒以聞見訓詁與之爭勝豈可得乎陽明於虛靈知覺中辨出天理此正儒釋界限而以禪宗歸之不幾為佛氏所笑乎陽明固未嘗不窮理第其窮在源頭不向支流摸索耳至於斂目反觀血氣凝聚此是先生以意測之於陽明無與也文集聖門以盡性為教而辨性近習逺上智下愚不移之異其能盡者民受天地之中以生繼善成性理之一也其不能移者智愚上下之間氣質稟賦不齊形生知發善惡萬類分之殊也是故善反其殊以復乎初繫於習馴而習之則變變而不已則化氣質變化乃人欲消息久之無欲而一斯靜虛動直而天命之性全盡乃今之為道者祖真覺是性見解為病禪詮日析自謂至精至妙藉言致知而文以窮理窮此盡性盡此至命至此儱侗之説髙標之為聖學的傳而冒當乎精一一貫聞者喜其簡徑競相崇尚附和遂置氣質於不復論况能進而求所由變化之功哉諦其行卒任氣質而墮於智慧自便私意自執猶亢然真命曰道吕巾石類稿序大學明德新民止於至善其綱格物致知誠意正心修身齊家治國平天下其目繹言之物即中庸為物不二體物不遺之物天下公共之理人所同有者格者貫徹至極無間之謂惟其為公共同有故格之即格知為人虛靈覺識之知一已所獨得人人所同然者致者推究至極不遺之謂惟其一已獨得故致之即至故曰致知在格物在者明知物之一致格之功相貫亦一也惟其能推極其虛靈覺識之知至於貫徹無間於天下公共之物故曰物格而后知至而后者明心物之一格至之驗相因亦一也惟其知至乃知起於意而后誠意發於心而后正心主乎身而后修則在已者身處乎家者而后齊家近乎國者而后治國盡乎天下者而后平則在人者此為舉綱率目由已及人操約該博謂之一貫如物未格知未至乃其資性明敏踐履篤實凡日用所由恆在乎物之中未必知能及亦可謂與知自此以其所知意亦誠心亦正身亦修家亦齊國亦治天下亦平究竟其極如孟子伯夷聖之清桞下惠聖之和特不若時中之大成故曰道體則一人體道則二及其歸則一也近有絶不聞道祗得禪宗指人心血氣虛處為善靈處為知識合名善知識以善易良知識易知合名以孟子良知即不以虛靈中識覺推極貫徹乎物祗斂目反觀血氣凝聚靈處生照即識覺即見地即徹悟即知至虛中一無所有靈中知識一無所用凡生知學知默識聞知見知一無所為又見格物二語為大學首言不可置乃以格去物欲即物格全此虛靈即知至凡中庸為物不二生物不測體物不遺物之終始不誠無物皆不相蒙悉以外物名之不俟工夫階級謂萬物盡屏心知炯然既得一萬事畢意自誠心自正身自修家自齊國自治天下自平揆其實乃率意即誠任心即正從身即修家國天下由我操縱即齊治平即不齊治平亦不必問於虛靈中為物欲潛滋暗長恣肆妄行皆直任為道不必潛修禁止一禁止即遏抑遏抑即外求以此立門戶聚朋徒標之不過二語曰心知即道口講即學止矣大學定本古本石經三序易言窮理分析乎理之謂大學致心之知者在格萬物萬理本於一物一理者意相同故舉以為釋未嘗謂隨萬物而一一窮之今觀傳注未有此語新學惟取人心血氣中虛靈知覺者為立大為養端倪為體認天理黠者又取善知識之説合取大學致知孟子良知二語為言其功即反目攝神至心即知至亦即物格不必别言致言格乃以大學言格物不可背不得已或指為格欲為正事為至物格知物有本末之物或以明知意心身家國天下之物或以格不生不滅之物又以先王禮樂名物典章法度為非作聖之功增雜霸藩籬訓詁記誦聞見皆致格中事一切指以為名為博為侈靡而文致之支吾籠罩轉換籠統難以測識自來不師先王非孔子一見於秦再見於今太學日四體文集注序道原於天命之謂性性則與形俱形形而有上下形者氣質之謂上者道之謂一理是也以其不可見故謂之上惟上故難知下者器之謂日用萬殊是也即一理之所散者也以其可見故謂之下惟下故易由合上下言皆心之德故曰道亦器器亦道是故生知者氣質清粹天性湛然默識此道謂之上智中人以上氣質美者於性明可以語上以上使之即知之中人以下氣質次者於性蔽不可以語上以下使之即由之以上下言知者道由者器以道亦器器亦道言則知者固道由者亦道如由之中有學有困而學則蔽徹明開幾駸語上是即下學而上逹者惟終身由不學故不知民斯下之下之將所由者盡悖而去焉民斯愚之故曰惟上知與下愚不移至下愚而其初命於天者則在所謂不以聖豐不以愚嗇故曰性相近習相逺斯為孔門立教之法周衰世教微儒行壤逮漢武表章六經儒行以顯唐宋間嘗有嗣興顧崇信不純權術虛無雜用而虛無特著凡事佛老者為虛無事孔子者為儒若鼎立者然未始混淆強同亦首孔子次佛老未始凌駕獨宗師孔子者自稱吾儒宗佛老者自稱吾玄吾釋未始援假遮飾為名斯皆昭然易見者數十年來忽有為心學者於佛氏嘗即心而見其血氣凝定虛靈生慧洞徹無際者名之曰善知識自稱上乘遂據之為孔門所語上而篾視下學之教為外求又得孟子良知兩字偶同遂立為語柄以論學終日言之不外乎人各有知知本自良數言又以心即理而不交於事物專在於腔子之內一斂耳目聚精神於此即謂之致一涉於理交於事物謂屬於見聞而非本來之良即謂之不知致知者今以佛氏之説混淆強同又凌駕獨髙援假遮飾以為名其實非孔門所謂知非孔門所謂知則自謂有知而實不可語知也乃其立教亦欲人自謂有知不必窮經讀書問學假聞見以遮迷其良則是舉世皆上逹而無下學民皆可使知而無復有使由者是為陽宗孔子實與之悖而隂用佛老襲以權術實與之一矣且孔門未嘗以知為道以知為道惟佛氏觀孔子曰知之曰知道知德知止知天孟子曰知愛知敬凡言知即指心凡言道言德言止言天言愛敬即指理是故知者知此道道即理孟子曰覺後儒曰悟亦覺悟此道析言之知即大學之謂致知覺悟者豁然貫通即大學之謂物格合言之知覺悟乃明此道而相因之名其實一也故曰孔門未嘗以知為道乃佛氏即心而見其血氣凝定虛靈生慧洞徹無際者析言之虛靈之謂知生慧之謂覺洞徹無際之謂悟合言之知覺悟者乃斂耳目聚精神間所見腔子內一段瑩然光景之名其實亦一也觀其以是即理而不交於事物故曰以知為道惟佛氏孟子曰告子未嘗知義以其外之竊亦曰今之學者未嘗知道以其外之况孟子言良者自然之謂以其不待思慮而自然知愛敬仁義之道也佛氏言善者神通自在不可思議無上至妙之謂也今不以良為自然而以為神通又獨挈良知遺良能則外行夫知既與孔孟言良者異又外行則行亦異知行並異是别為一端則又不肯以别為一端自居而曰知行合一凡物惟二乃合今以本一者而曰合是欲一之而反二之也又諱言佛嘗闢乎佛闢之惟以其外人倫不耕食自私自利為言此在釋氏誠為外迹與其在人倫者小異而其所論道者大同今獨據其大同而獨闢其小異安可因其小而信其大哉即佛者聞之亦惟以其呵祖罵佛故智反不之校耳顧此猶前時為然今則不惟不諱不闢且直以佛氏之説為孔子之説又以佛在孔子之上倡言自恣棄行不顧其人在孔門必揮而斥之乃其傳聞者不察其真遂以為真聖學説者列而進之與先儒並令天下後世謂當世理學其人若此深可懼也孔子像碑心性者佛老皆言之先生首以思孟宋儒周程張邵所闡明詳發之其大旨以虛靈知覺之謂心者主於形而囿於形我所有也天命之性者太極一本萬物一原敬軒薛子謂天下公共之理汪子謂天也理也天下之公共者是也氣質之性者二氣五行剛柔萬殊汪子謂牿於形體乃有我之私者是也性具於心心生乎形形之謂氣質而亦謂之性者謂其有則俱有非二言之惟變化其有我之私至公而無我天性復初氣質不纍乃性曰天性而不復以氣質並言也此謂之儒宗佛自逹摩單傳直指人心見性成佛此即禪宗似儒非儒故闡之曰佛家從頭都不識則不識性所從出之天即謂之命曰只認知覺便做性則不識心所具之理即謂之性佛氏以心無理又無蔽不得不以理為障障一去而方寸中空空蕩蕩若無星之稱無界之尺事至不能揆不得不以事為障以理為障故不言窮理以事為障故不言敬事而惟此虛靈知覺在腔子內者炯然灑然無念無著其工夫則止觀空悟為一一悟便是即為了當自此隨意見所起不分真妄皆本來面目執為欛柄直堅而往操縱作用無不自由上天下地惟我獨貴矣先生以孔門下學而上逹為教人成法而曰涵養須用敬進學則在致知者申之曰主敬以立其本窮理以致其知本立而知益明知進而本益固自此辨明教立學者所得明也近嵗有嘗讀其書既因養生契禪恍見此心知覺之妙遂自稱悟揭之為良曰道在此不在行六經不在載籍妙道自已而發先聖先儒弗及傳注皆差因取精一博約一貫忠恕格致克復中和盡心知性知天諸訓一認為已所有欲以易天下見其惟傳注是從不詆之則已説不伸乃詆所闡教法為末務主敬為綴格物窮理為支離為義外為俗學鄙傳注為訓詁章句非讀書為逺人為道於是併經書原文各據胸臆立解不宗本旨其漸不至於背經棄傳絶篾聖言不止薛子曰程朱大有功於萬世又曰後人於朱子之書不能遍觀盡識或輒逞已見妄有疵議或𠞰拾成説寓以新名衒新竒而掠著述之功多見其不知量也朱晦翁碑來教以天命之性為虛靈不昧譬則日月之貞明氣質因依假借迷復不常譬則浮雲之聚散雲聚而日月昏雲散而日月炳於日月貞明之體未始有所損益者竊以天氣地質具而後生人固聖愚賢不肖所同稟特其中有清濁淳漓之異耳所貴學者澄濁求清去漓還淳乃所謂變化之功爾孟子形色天性惟聖人踐形厥旨深矣茍以氣質為浮雲則是謂其祗有濁漓而不謂其有清淳然則生知安行之聖學知利行之賢其有外於天地氣質而生而人性上有二物矣抑别有一種氣質而非吾之所謂氣質者又不然是天命自天命氣質自氣質而道之形上形下截然可分為二至於指天命之性為性靈不昧此近世諸儒同以為然似同於佛氏昭昭靈靈見上乘之説與聖門所指性與天道中庸以來性命皆殊塗異能非愚生所知與吕巾石今學者只以講便為學以學便為道以道便為心故曰心學今言格物者以心即知以知即物一斂視却聽便為心正心正便為知致知致便為物格物格便為道為學其詞儱侗不分空寂難辨遂使聖門曰心曰道曰學曰正心致知格物揑為一團其流之弊令人空寂枯稿祗成一個頑然之物謹覩來諭謂純會斯道者心以心體道斯善學矣又謂知非空知必有一事事即是物知中有物物見於知雖有知物二字之名實為一齊俱到之妙可謂辨析至精與舒繼峯文定王順渠先生道王道字純甫號順渠山東之武城人正德辛未進士選庶吉士山東盜起欲奉祖母避地江南疏改應天教授召為吏部主事厯考功文選郎中大學士方獻夫薦其學行淳正可任宫僚擢春坊左諭德引疾辭歸嘉靖十二年起南京祭酒明年回籍二十五年起南太常寺卿尋升南户部右侍郎改禮部掌國子監事又改吏部而卒贈禮部尚書諡文定先生所論理氣心性無不諦當又論人物之别皆不錮於先儒之成説其識見之髙明可知但以孟子執情為性不足以服諸子孟子指出惻隱羞惡辭讓是非是即性也舍情何從見性情與性不可離猶理氣之合一也情者一氣之流行也流行而必惻隱羞惡辭讓是非之善無殘忍刻薄之夾帶是性也故易曰利貞者性情也先生言情之善原從性之善而來但情之善可遷而性之善不可遷不知情之遷遷於外物耳當其無物之時而發之何嘗不仍是惻隱羞惡辭讓是非之心乎其不遷也明矣今必欲於四端之前求其不可知不容説者以為性無乃復錮於成説乎先生初學於陽明陽明以心學語之故先生從事心體逺有端緒其後因衆説之淆亂遂疑而不信所疑者大端有二謂致知之説局於方寸學問思辨之功一切棄却夫陽明之所以致知者由學問思辨以致之其萬死一生皆學問思辨也先生既知心體之大而以事心者為局心其亦自相矛盾乎謂良知是情之動於本然之體已落第二義夫陽明之所謂良知不曰未發之中乎以念頭起處辨其善惡者此在門弟子之失而以加之陽明不受也先生又從學甘泉其學亦非師門之旨今姑附於甘泉之下順渠先生文録或問道曰一隂一陽之謂道理氣之别何居曰奚别之有哉盈天地間本一氣而已矣方其混淪而未判也名之曰太極逮夫醖釀既久升降始分動而發用者謂之陽靜而收斂者謂之隂流行往來而不已即謂之道因道之脈胳分明而不紊也則謂之理數者名雖不同本一氣而已矣天道説理氣不雜不離之説非歟曰非也黑白相入曰雜彼已相判曰離二也氣之脈胳分明而不紊者曰理其為物不二也雜與離不可得而言矣同上人物之生孰形之曰氣為之形孰性之曰氣為之性曰氣為之性也理何居耶曰理即氣也而以為有二乎哉天地之氣一隂一陽而已隂陽之形而上者謂之道而人物受之以正其性隂陽之形而下者謂之器而人物分之以範其形道不離於器而性即具於形本一氣而已矣豈外此更有所謂理而與氣為偶者耶然則人物之别何如曰隂陽也者運而造化者也運則不齊不齊則通塞偏正生焉通而正者造人塞而偏者造物人性皆善而有知愚賢不肖之不同何也曰天地之氣絪緼停滀流行推蕩大而一世之否泰小而一嵗之災祥上而日月之薄蝕下而山川之崩竭皆生於運之不齊也况人於天地間以有涯之形囿有涯之氣而其資生資始之時或適感天地偏隂偏陽與夫隂陽之乖戾者則其既生之後通者有時而或塞正者有時而或偏偏有輕重塞有厚薄而知愚賢不肖之等分矣性説自南宋崇尚道學之後其學未嘗不行於上也而卒不能收善治之效未嘗不傳於下也而卒不見成命世之才由今觀之想望慶厯嘉祐之盛韓范富歐之風邈乎不可覩矣况等而上之乎道學性善之善不與惡對與惡對者情之善也孟子執情以為性故雖竭力道性善終不足以服諸子之口子由闢之是矣但欠源頭一句分明耳蓋情之善原從性之善而來但情之善可遷而性之善不可遷情之善有對而性之善無對今概以為無是無非是以惡為亦出於性矣殊欠分曉性善之説為仁之本是仁之本也孟子以事親從兄為仁義之實意正如此本者根也實亦根也孝弟為仁之本朱子論性千言萬語只是一意大抵謂人與物所稟之理一般但人之氣清能推而物之氣濁不能推耳敢以一言難之麟鳯龜龍謂之四靈其氣之清明視世之常人何如然常人於四端五典雖不能全而亦不至盡廢四物雖靈曷嘗見有倣佛於人者哉就此處觀之可見人與物之情合下不同矣故孟子闢告子以牛犬之性與人不同正與此處看得明白耳性學聖人所示學問思辨之功皆從發明此心以恢復其廣大髙明之本體所謂如切如磋也而世儒乃欲以此窮盡天下之理不知理者吾心之準則孟子所謂權度心為甚者此也心體茍明則權度精切而天下之長短輕重應之而有餘矣豈待求之於外哉為學所謂物者指外物而言即樂記感於物而動性之欲也所謂格者以扞禦為義主溫公之説格物孟子後千載無真儒宋儒有是言余每讀之戚然姑就漢一代言之董賈兼文學政事之科蕭曹丙魏皆有政事之才逺在季路冉有之上而丙又入德行而不優至於孔明則兼四科而有之矣黃叔度不言而化如愚之流輩也管幼安龍德而隱居於遼東一年成邑陳太丘荀令君郭有道徐孺子皆德行科人冉閔之次也其諸表表難以悉數三國人才尤盛至晉及唐代不乏人今一舉而空之曰無真儒嗚呼悠悠千載向誰晤語批林國輔講餘答問宋自慶厯以前英賢彚出當時治體風俗人才皆淳龎渾厚於時程朱未生也亦曷嘗如長夜直待程朱出而後明哉孟子曰聖人先得我心之同然者謂理也義也是義理皆在於心矣皆在於心而有二名體用之謂也今曰在物為理處物為義則是用由內出而體全在外具矣不知體既在外用何自出哉謂之義外之見也亦宜二條同上天理平鋪於人情物理之間舜之所以為聖不過明於庶物察於人倫而已所貴乎學問之功正要在日用應酬人物處觀其會通動中肯綮如庖丁解牛洞無凝滯然後為德少有扞格齟齬即是學力未至便當反已研求務要推勘到底使在我者無毫髮之不盡而後委外之通塞於所遇焉答魏莊渠陽明先生致知之説大略與孟子察識擴充四端之意相似而實不同孟子見得道理平實廣大如論愛牛便到制民常産論好色好勇好貨便到古公公劉文武之事句句都是事實所以其氣象寬裕意味深長陽明先生所見固存省之一法然便欲執此以盡蓋為學工夫大易所謂學問辨中庸所謂學問思辨論語所謂博文約禮好古敏求學詩學禮一切棄却而曰為學之道專求之心而已是幾於執一而廢百矣答朱守中若論道之本體天大無外心大亦無外天地之用皆我之用渾然一理何所分别吾心體會盡天下之理亦只是全復吾心之所固有而已故曰盡其心者知其性也知其性則知天矣知性知天却只在盡心焉得之則心體之大可想而知矣今乃欲以方寸之微念慮之動局而言之不幾於不知心乎不知心而能盡心不盡心而能知性知天而曰聖人之學吾未之信也同上和陽明咏良知若把良知當仲尼太清却被片雲迷良知止是情之動未動前頭尚屬疑獨知還是有知時莫認獨知即正知尋到無知無物處本來面目却為誰本來面目却為誰絶四宣尼定自知學子欲尋絶四處不先格物更何為孟子良知即四端乃情之發動處其以孩提言正赤子之心而程子以為已發而未逺於中者也陽明指此以為聖人之本體落第二義矣格扞格之義禦之於外也物物交物之物凡外物皆是也格物即孔子所謂克已孟子所謂寡欲周子所謂無欲也格物以致知猶刮垢以磨光也物格知至則垢盡而明見矣明儒學案卷四十二
