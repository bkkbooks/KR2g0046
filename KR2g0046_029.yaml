body:
  text: 明儒學案卷二十九餘姚黃宗羲撰北方相傳學案北方之為王氏學者獨少穆𤣥菴既無問答而王道字純甫者受業陽明之門陽明言其自以為是無求益之心其後趨向果異不必列之王門非二孟嗣響即有賢者亦不過跡象聞見之學而自得者鮮矣文簡穆𤣥菴先生孔暉教諭張𢎞山先生後覺尚寶孟我疆先生秋主事尤西川先生時熙文選孟雲浦先生化鯉侍郎楊晉菴先生東明郡守南瑞泉先生大吉北方相傳學案文簡穆𤣥菴先生孔暉穆孔暉字伯潜號𤣥菴山東堂邑人𢎞治乙丑進士由庶吉士除簡討為劉瑾所惡調南京禮部主事瑾敗復官歷司業侍講春坊庶子學士太常寺卿嘉靖己亥八月卒年六十一贈禮部右侍郎諡文簡陽明主試山東取先生為第一初習古文詞已而潜心理學其論學云古人窮理盡性以至於命今於性命之原習其讀而未始自得之也顧謂有見安知非汩慮於俗思耶又云鑑照妍􅑦而妍􅑦不著於鑑心應事物而事物不著於心自來自去隨應隨寂如鳥過空空體弗礙又云性中無分别想何佛何老臨卒時有到此方為了事人之偈蓋先生學陽明而流於禪未嘗經師門之煆煉故陽明集中未有問答乃黃泰泉遂謂雖陽明所取士未嘗宗其說而非薄宋儒既寃先生而陽明豈非薄宋儒者且寃陽明矣一言以為不知此之謂也教諭張𢎞山先生後覺張後覺字志仁號𢎞山山東荏平人仕終華陰教諭蚤歲受業於顔中溪徐波石深思力踐洞朗無礙猶以取友未廣南結會於香山西結會於丁塊北結會於大雲東結會於王遇齊魯間遂多學者近溪穎泉官東郡為先生兩建書院曰願學曰見太先生聞水西講席之盛就而證其所學萬歷戊寅七月卒年七十六其論學曰耳本天聰目本天明順帝之則何慮何營曰良即知知即是良良外無知知外無良曰人心不死無不動時動而無動是名主靜曰真知是忿忿自懲真知是欲欲自窒懲忿如沸釜抽薪窒欲如紅爐㸃雪推山填壑愈難愈遠尚寶孟我疆先生秋孟秋字子成號我疆山東茌平人隆慶辛未進士知昌黎縣歷大理評事職方郎中致仕起刑部主事尚寶寺丞少卿而卒年六十五先生少授毛詩至桑間濮上不肯竟讀聞邑人張宏山講學即往從之因尚書明目逹聰語灑然有悟鄒聚所周訥溪官其地相與印證所至惟發明良知改定明儒經翼去其駁雜者時唐仁卿不喜心學先生謂顧涇陽曰仁卿何如人也涇陽曰君子也先生曰彼排陽明惡得為君子涇陽曰朱子以象山為告子文成以朱子為楊墨皆甚辭也何但仁卿先生終不以為然許敬菴嘗訪先生盈丈之地瓦屋數椽其旁茅舍倍之敬菴謂此風味大江以南所未有也先生大指以心體本自澄徹有意克己便生翳障蓋真如的的一齊現前如如而妙自在必克復而後言仁則宣父何不以克伐仁原憲耶𢎞山謂良即是知知即是良良外無知知外無良師門之宗傳固如是也此即現成良知之說不煩造作動念即乖夫良知固未有不現成者而現成之體極是難認此明道所以先識仁也先生之論加於識仁之後則可若未識仁則克己之功誠不可已但克己即是識仁顔子有不善未嘗不知知之未嘗復行也仁體絲毫不清楚便是不善原憲之克伐怨欲有名件可指己是出柙之虎兕安可相提而論哉我疆論學語心無方無體凡耳目視聽一切應感皆心也指腔子內為言者是血肉之軀非靈瑩之天君矣天道曽有一刻不感時地道曾有一刻不應時人心曾有一刻無事時一刻無事是槁滅也故時時必有事亦時時未發未發云者發而無發之謂非可以有感無感論也自聖學不傳而性善之㫖日晦入聖無門人是其見雖盡力洗滌渣滓尚在以故終身盤桓只在改過間就其所造僅以小儒而止皆由克去人欲復還天理之說誤之也人欲無窮去一日生一日去一年生一年終身去欲終身多欲勞苦煩難何日是清淨寧一時耶來書云有病不得不服藥是也有人於此養其元氣保其四肢血氣和平雖有風寒暑濕不得乘間而入使不保元氣藥劑日來則精神日耗邪氣日侵因藥而發病者日相尋焉終身病夫而已豈善養身者乎又云必有主人方可逐賊此就多積者言耳若家無長物空空如也吾且高枕而卧盜賊自不吾擾又何用未來則防既來則逐乎此兩喻者乃志仁之說無欲之證也曾子之學一貫之學也此曾子作大學之宗㫖也故析而言之曰修身也正心也誠意也致知也格物也若名目之不同合而言之則一也何也自身之神明謂之心自心之發動謂之意自意之靈覺謂之知自知之感應謂之物心意知物總而言之一身也正者正其身之心也誠者誠其心之意也致者致其意之知也格者格其知之物也格致誠正總而言之修身也道無二致一時俱到學無二功一了百當一貫之道也道有本門路無多岐會道以心不泥文字間性原有本利原無根端本澄源則萬派千流一清徹底矣又何塵垢之染乎主事尤西川先生時熙尤時熙字季美號西川河南洛陽人舉嘉靖壬午鄉試歷元氏章丘學諭國子學正户部主事終養歸歸三十餘年萬歷庚辰九月卒年七十八先生因讀傳習録始信聖人可學而至然學無師終不能有成於是師事劉晴川晴川言事下獄先生時書所疑從獄中質之又從朱近齊周訥溪黃德良名驥考究陽明之言行雖尋常謦咳亦必籍記先生以道理於發見處始可見學者只於發動處用功故功夫即是本體不當求其起處濓溪之無極而太極亦是求其起處為談學之弊堯舜之執中只是存心明道之識仁猶云擇術以白沙靜中端倪為異學此與胡敬齊所言古人只言涵養言操存曷嘗言求見本體及晦翁惟應酬酢處特逹見本根工夫一也靜中養出端倪亦是方便法門所以觀喜怒哀樂未發以前氣象總是存養名目先生既掃養出端倪則不得不就察識端倪一路此是晦翁晚年自悔缺却平時涵養一節工夫者也安可據此以為學的先生言近談學者多說良知上還有一層為非此說固非然亦由當時學者以情識為良知失却陽明之㫖蓋言情識上還有一層耳若知良知為未發之中决不如此下語矣擬學小記經疑人情多在過動邊此過則彼不及格物只是節其過節其過則無馳逐始合天則故能止良知本體止乃見義理無窮行一程見一程非可以預期前定也故但言致良知天命者本然之真是之謂性無所使之無所受之前輩以不睹不聞為道體是不睹不聞為道而睹聞非道矣下文何以曰莫見乎隱莫顯乎微耶竊詳此兩句䝉上道字來則所睹所聞者道也戒慎不睹欲其常睹恐懼不聞欲其常聞只是常存此心之意獨字即道字慎字即常睹常聞道無隱見無顯微天地間只有此故曰獨莫非此故曰獨凡物對立則相形為有二也道一而已見即隱無有見乎隱顯即微無有顯乎微見顯隱微物相有然道一而已故謂之獨喜怒哀樂之未發謂之中既云未發豈惟無偏倚即不偏不倚亦無可見指其近似但可言其在中而已故中和之中亦只是裏許之義道理只是一個未發無形不可名狀多於下字影出之如人以魄載魂可指可明者魄也所以多重下一字忠心也忠無可指可指者信與恕事與行也皆就發用處說喜怒哀樂本體元是中和的莫非天也冬至祀天祀生物之天也夏至祭地祀成物之天也故曰郊社之禮所以祀上帝也莫非天也不言后土非省文視吾以觀吾由察吾安人欲無所匿矣以此待人更是逆詐億不信吾道一以貫之貫該貫也言吾道只是一若謂一以貫萬是以此貫彼是二也道一而已萬即一之萬也舜禹有天下而不與行所無事也執中之云猶言存心也堯之命契以教比屋之民猶之與舜禹諸臣都俞吁咈於廟堂者也無二道也後世學者遂以存心為常語而以執中為祕傳豈心外有法抑心有二法耶集義之集從佳從木說文鳥止木上曰集心之所宜曰義集義云者謂集在義上猶言即乎人心之安也君子之學樂則行之憂則違之即乎此心之安而已擴充是去障礙以復本體不是外面增益來春秋不立傳者凡春秋所書之事皆當時人所共知但傳說不同隱微之地為姦雄所欺耳夫子直筆姦雄之真蹟實情而破其曲說使天下曉然知是非所在而不可欺而姦雄之計有所不能行故亂臣賊子聞之而懼唐虞三代不知斷過多少事或善或惡可懲可勸若必事事為之立傳何止汗牛充棟聖人之意正不在此故曰堯舜事業如浮雲過太虛春秋之作何以異是是非既明亦隨過隨化聖人之心固太虛也道理只是一個諸子論學謂之求精則可謂别有一種道理則不可聖人之學較之諸子只是精一亦非别有一道也道理不當說起處若說起處從何處起便生意見一氣流行成功者退曰互根是二本也道理於發見處始可見學者於發動處用功未發動自無可見自無著力處天地萬物皆道之發見此道不論人物各各有分覺即為主則千變萬化皆由我出道無方體耳得之而為聲目遇之而成色學者各以聞見所及立論而道實非方體可拘也聖人言工夫不言道體工夫即道體也隨人分量所及自修自證若别求道體是意見也仁者以天地萬物為一體無我也以天地萬物為一體真我也分殊即理一學者泛應未能曲當未得理之一耳學術差處只為認方便為究竟衆人之蔽在利欲賢者之蔽在意見意見是利欲之細塵性分上缺真切只因心有所逐意有所便即是利昏惰亦是利意所便也不求自慊只在他人口頭上討個好字終不長進人雖至愚亦能自覺不是只不能改遂日流於汙下聖愚之機在此不在賦禀萬物津液與河海潮汐是一氣萬物精光與日月星辰是一象象即氣之象氣即象之氣非有二也潮汐隨日月皆一氣之動也不當分陰陽看學問是陶冶造化之功若在陰陽五行上立腳是隨物化也君子處盛衰之際獨有守禮安分是職分當為舍是而他求皆無益妄作也格訓通解陽明格物其說有二曰知者意之體物者意之用如意用於事親即事親為一物只要去其心之不正以求其本體之正故曰格者正也又曰致知在格物者致吾心之良知於事事物物也致吾心之良知於事事物物則事事物物皆得其理矣致吾心之良知者致知也事事物物皆得其理者物格也前說似專指一念後說則並舉事物若相戾者然性無內外而心外無物二說只一說也愚妄意格訓則物指好惡吾心自有天則學問由心心只有好惡耳頗本陽明前說近齊乃訓格為通專以通物情為指謂物我異形其可以相通而無間者情也頗本陽明後說然得其理必通其情而通其情乃得其理二說亦一說也但曰正曰則取裁於我曰通則物各付物取裁於我意見易生物各付物天則乃見且理若虛懸情為實地能通物情斯盡物理而曰正曰則曰至兼舉之矣好惡情也好惡所在則物也好之惡之事也學本性情通物我故於好惡所在用工而其要則在體悉物我好惡之情蓋物我一體人情不通吾心不安且如子不通父之情子心安乎子職盡乎是以必物格而後知乃至也則字雖曰天則然易流於意見通則物各付物意見自無所容蓋才著意見即為意見所蔽便於人情不通便非天則天則須通乃可驗故通字是工夫物字只指吾心好惡說是從天下國家根究到一念發端處雖師友之言亦只是培植灌溉我我亦不以此為家當質疑學問起頭便是落腳只有意無意之間耳即今見在工夫生死有以異乎豈别有一著必俟另說透也致知知止二義只爭毫釐以止為功則必謙虛抑畏其氣下以致為功則或自任自是其氣揚雖曰同遊於善而其歸遠也只在意念向背之間若知知止則致即止矣天理人情本非有二但天理無可捉摸須於人情驗之故不若只就人情為言雖愚夫愚婦亦可易曉究其極至聖人天地有不能盡也日用常行間檢㸃即心所安行之不必一一古格也其古格亦是當時即心之所安之糟粕耳道理在平易處不是古人聰明過後人是後人從聰明邊差了只此心真切則不中不遠此志興起時自覺不愧古人更無節次及怠惰即是世俗沿襲舊說非講說則不明若吾心要求是當則講說即是躬行非外講說另有躬行也若果洞然無疑則不言亦是講說倘未洞然而廢講說是鶻􅊳也道理只在日用常行間百姓日用但不知不自作主宰耳問如何入門曰只此發問便是入門心體把持不定亦是吾輩通患只要主意不移定要如此譬之行路雖有傾跌起倒但以必至為心則由我也本體無物何一何萬應酬是本體發用此處用工凡應酬面前只一事無兩事况萬乎聖人得一故曲當常人逐萬故紛錯起於自私用智做工夫的即是本體一向謂儒釋大同老師却說只爭毫釐愚意不爭毫釐也年來偶見無生要議談空甚劇忽悟云無情毫釐爭處在此茍知父母之生成此身甚難則所以愛其身者不容不至而義理不可勝用矣心地須常教舒暢歡悅若拘迫鬱惱必有私意隱伏人物自得處俱是遊如鳶飛戾天魚躍于淵是性之本體遊而非此却是放失私意憂惱不為樂事近談學者多說良知上還有一層此言自靜中端倪之說啓之夫良知無始終無內外安得更有上面一層此異學也陽明雖夙成其言以江西以後為定程子須先識仁之言猶云須先擇術云耳後人遂謂先須靜坐識見本體然後以誠敬存之若次第然失程子之意矣舍見在乍見皆有之幾而另去默坐以俟端倪此異學也改過之人不遮護欣然受規才有遮護便不著底蓍龜無言聖人闡之若非一體何以相契是故探賾者探吾心之賾索隱者索吾心之隱鈎吾心之深致吾心之遠審乎善惡之幾謹於念慮之微而已蓍龜知吉凶吉凶本善惡謂吉凶在彼善惡亦在彼乎趨吉避凶只為善去惡而已人情本然只是相親相愛如忠君孝親敬兄友弟刑家睦鄰恤孤賑窮是上愛下下愛上不得已而去惡只為保全善類莫非仁也若世人惡人全是勝心是亦不仁而已矣喪禮哭踊有數主於節哀為賢者設也人之忘哀必有分心處以致哀為推極非制禮之本意彼謂怒於甲者不移於乙固為粗淺而謂顔子之怒在物不在己者亦為無情謂春生秋成則可謂春生秋殺不可殺機自是戾氣非性中所宜有葬埋之禮起於其顙有泚則禍福之說疑其為無泚者設猶佛氏之怖令蓋權教也彼之怖令雖若近誣猶能懼人於善而此之權教茫無理據乃至陷人於惡解舜之深山野人者曰身與野人同心與野人異也噫使舜之心果與野人異也曷足以為舜也蓋野人之心質實舜心亦質實無以異也王雲野云陽明曾說譬如這一碗飯他人未曾喫白沙是曾喫來只是不曾喫了以下紀聞許函谷與陽明在同年中最厚别久再會函谷舉舊學相證陽明不言但微笑曰吾輩此時只說自家話還翻那舊本子作甚人嘗言聖人憂天下憂後世故生許多假意懸空料想無病呻吟君子思不出位只是照管眼下即天下後世一齊皆在凡有所相皆道之發見學者能修自己職分則萬物皆備於我無極太極只是此心此真道之起處不必求之深幽元遠也物各合其天則乃止不合天則心自不安不安不止只因逐物文選孟雲浦先生化鯉孟化鯉字叔龍號雲浦河南新安人由進士授南户部主事歷稽勳文選郎中萬歷二十年給事中張棟以國本外謫會兵科缺都給事中先生推棟補之上怒謫先生雜職西川既傳晴川之學先生因往師之凡所言發動處用功及集義即乎心之所安皆師說也在都下與孟我疆相砥礪聯舍而寓自公之暇輒徒步過從飲食起居無弗同者時人稱為二孟張陽和作二孟歌記之罷官家居中丞張仁軒餽之亦不受書問都絶宦其地者欲踪跡之而不得也論學書人者天地之心而人之心即浩然之氣浩然者感而遂通不學不慮真心之所溢而流也吾之心正則天地之心正吾之氣順則天地之氣順是故愛親敬長達之天下怵惕惻隱保乎四海愚不肖夫婦之與知與能察乎天地者以此君子居室言行之加民見遠動乎天地者以此其功在於必有事其幾在於集義集義者即乎心之所安不學不慮感而遂通者也時時即心所安是謂時時集義時時集義是謂時時有事時時有事是謂時時浩然時時浩然是謂時時為天地立心是謂時時塞天地緣天地間本如是其廣大亦本如是其易簡或者知氣塞天地而不求諸心而不本之集義心非真心氣非浩然欲希天地我塞難矣心之發動處用工夫只是照管不著還是心之不定要將講說亦只是口頭語又不能躬行意欲不用講說侍郎楊晉菴先生東明楊東明號晉菴河南虞城人萬歷庚辰進士授中書舍人歷禮科給事中掌吏垣降陜西照磨起太常少卿光祿寺卿通政使刑部侍郎乞休回籍天啓甲子卒年七十七先生所與問辨者鄒南臯馮少墟呂新吾孟我疆耿天臺張陽和楊復所諸人故能得陽明之肯綮家居凡有民間利病無不身任嘗曰身有顯晦道無窮達還覺窮則獨善其身之言有所未盡其學之要領在論氣質之外無性謂盈宇宙間只是渾淪元氣生天生地生人物萬殊都是此氣為之而此氣靈妙自有條理便謂之理夫惟理氣一也則得氣清者理自昭著得氣濁者理自昏暗蓋氣分陰陽中含五行不得不雜糅不得不偏勝此人性所以不皆善也然太極本體立二五根宗雖雜糅而本質自在縱偏勝而善根自存此人性所以無不善也先生此言可謂一洗理氣為二之謬矣而其間有未瑩者則以不皆善者之認為性也夫不皆善者是氣之雜糅而非氣之本然其本然者可指之為性其雜糅者不可以言性也天地之氣寒往暑來寒必於冬暑必於夏其本然也有時冬而暑夏而寒是為愆陽伏陰失其本然之理矣失其本然便不可名之為理也然天地不能無愆陽伏陰之寒暑而萬古此冬寒夏暑之常道則一定之理也人生之雜糅偏勝即愆陽伏陰也而人皆有不忍人之心所謂厥有恆性豈可以雜糅偏勝者當之雜糅偏勝不恆者也是故氣質之外無性氣質即性也苐氣質之本然是性失其本然者非性此毫釐之辨而孟子之言性善為不可易也陽明言無善無惡者心之體東林多以此為議論先生云陽明以之言心不以之言性也猶孔子之言無知無知豈有病乎此真得陽明之肯綮也晉菴論性臆言盈宇宙間只是一塊渾淪元氣生天生地生人物萬殊都是此氣為之而此氣靈妙自有條理便謂之理蓋氣猶水火而理則其寒熱之性氣猶薑桂而理則其辛辣之性渾是一物毫無分别所稱與生俱生與形俱形猶非至當歸一之論也夫惟理氣一也則得氣清者理自照著人之所以為聖為賢者此也非理隆於清氣之內也得氣濁者理自昏暗人之所以為愚不肖者此也非理殺於濁氣之內也此理氣斷非二物也正惟是稟氣以生也于是有氣質之性凡所稱人心惟危也人生有欲也幾善惡也惡亦是性也皆從氣邊言也蓋氣分陰陽中含五行不得不雜糅不得不偏勝此人性所以不皆善也然此氣即所以為理也故又命之曰義理之性凡所稱帝降之衷也民秉之彜也繼善成性也道心惟微也皆指理邊言也蓋太極本體立二五根宗雖雜糅而本質自在縱偏勝而善根自存此人性所以無不善也夫一邊言氣一邊言理氣與理豈分道而馳哉蓋氣者理之質也理者氣之靈也譬猶銅鏡生明有時言銅有時言明不得不兩稱之也然銅生乎明明本乎銅孰能分而為二哉人性之大較如此如曰專言理義之性則有善無惡專言氣質之性則有善有惡是人有二性矣非至當之論也氣質之性四字宋儒此論適得吾性之真體非但補前輩之所未發也蓋盈天地間皆氣質也即天地亦氣質也五行亦陰陽也陰陽亦太極也太極固亦氣也特未落於質耳然則何以為義理之性曰氣質者義理之體段義理者氣質之性情舉一而二者自備不必兼舉也然二者名雖並立而體有專主今謂義理之性出於氣質則可謂氣質之性出於義理則不可謂氣質之性與義理之性合併而來則不通之論也猶夫醋然謂酸出於醋則可謂醋出於酸則不可謂醋與酸合併而來則不通之論也且氣質可以性名也謂其能為義理氣質而不能為義理則亦塊然之物耳惡得以性稱之四字出於宋儒亦但謂補性之所未備而氣質外無性恐宋儒亦不得而知也王陽明先生云無善無惡者心之體史玉池作性善說闢之余乃遺玉池書曰某往亦有是疑近乃會得無善無惡之說蓋指心體而言非謂性中一無所有也夫人心寂然不動之時一念未起固無所謂惡亦何所謂善哉夫子曰吾有知乎哉無知也夫知且無矣何處覔善惡譬如鑒本至明而未臨於照有何妍􅑦故其原文曰無善無惡者心之體非言性之體也今謂其說與告子同將無錯會其㫖歟問孟子道性善是專言義理之性乎曰世儒都是此見解蓋曰專言義理則有善無惡兼言氣質則有善有惡是義理至善而氣質有不善也夫氣質二五之所凝成也五行一陰陽陰陽一太極則二五原非不善之物也何以生不善之氣質哉惟是既云二五則錯宗分布自有偏勝雜糅之病於是氣質有不純然善者矣雖不純然善而太極本體自在故見孺子入井而惻隱遇呼蹴之食而不屑氣質清純者固如此氣質薄濁者未必不如此此人性所以為皆善也孟子道性善就是道這個性從古聖賢論性就只此一個如曰厥有恆性繼善成性天命謂性皆是這個性孟子云動心忍性性也有命焉則又明指氣質為性蓋性為氣質所成而氣質外無性則安得外氣質以言性也自宋儒分為氣質義理兩途而性之義始晦豈惟不知人無二性而一物分為兩物於所謂義理氣質者亦何嘗窺其面目哉故識得氣質之性不必言義理可也蓋氣質即義理不必更言義理也識得氣質之性不必言氣質可也蓋氣質即義理不可專目為氣質也學者悟此則不惑於氣質義理兩說矣善字有二義本性之善乃為至善如眼之明鑑之明明即善也無一善而萬善之所從出也此外有意之感動而為善者如發善念行善事之類此善有感則生無感則無無乃適得至善之本體若有一善則為一善所障而失其湛空之體矣這善字正是眼中金屑鏡中美貌美則美矣其為障一也文成所云無善無惡者正指感動之善而言然不言性之體而言心之體者性主其靜心主其感故心可言有無而性不可言有無也令曰出入無時莫知其鄉惟性之謂與則說不去矣郡守南瑞泉先生大吉南大吉字元善號瑞泉陜之渭南人正德辛未進士授户部主事歷員外郎郎中出守紹興府致仕嘉靖辛丑卒年五十五先生幼頴敏絶倫稍長讀書為文即知求聖賢之學然有豪曠不拘小節及知紹興府文成方倡道東南四方負笈來學者至於寺觀不容先生故文成分房所取士也觀摩之久因悟人心自有聖賢奚必他求一日質於文成曰大吉臨政多過先生何無一言文成曰何過先生歷數其事文成曰吾言之矣先生曰無之文成曰然則何以知之曰良知自知之文成曰良知獨非我言乎先生笑謝而去居數日數過加密謂文成曰與其有過而悔不若先言之使其不至於過也文成曰人言不如自悔之真又笑謝而去居數日謂文成曰身過可免心過奈何文成曰昔鏡未開可以藏垢今鏡明矣一塵之落自難住腳此正入聖之機也勉之先生謝别而去闢稽山書院身親講習而文成之門人益進入覲以考察罷官先生治郡以循良重一時而執政者方惡文成之學因文成以及先生也先生致書文成惟以不得聞道為恨無一語及於得喪榮辱之間文成歎曰此非真有朝聞夕死之志者不能也家居搆湭西書院以教四方來學之士其示門人詩云昔我在英齡駕車詞賦場朝夕工步驟追踪班與揚中歲遇逹人授我大道方歸來三秦地墜緒何茫茫前訪周公跡後竊橫渠芳願言偕數子教學此相將明儒學案卷二十九
