body:
  text: 明儒學案卷十二餘姚黃宗羲撰浙中相傳學案二郎中王龍溪先生畿王畿字汝中號龍溪浙之山隂人弱冠鄉舉嘉靖癸未下第歸受業於文成丙戌試期不欲往文成曰吾非以一第為子榮也顧吾之學疑信者半子之京師可以發明耳先生乃行中㑹試時當國者不說學先生謂錢緒山曰此豈吾與子仕之時也皆不廷試而歸文成門人益進不能遍授多使之見先生與緒山先生和易宛轉門人日親文成征思田送至嚴灘而别明年文成卒於南安先生方赴廷試聞之奔喪至廣信斬衰以畢葬事而後心喪壬辰廷對授南京職方主事尋病歸起原官稍遷至武選郎中時相夏貴溪惡之三殿災吏科都給事中戚賢上疏言先生學有淵源可偹顧問貴溪草制僞學小人黨同妄薦謫賢外任先生亦再疏乞休豫告踰年當考察南考功薛方山與先生學術不同欲借先生以正學術遂填察典先生林下四十餘年無日不講學自兩都及吳楚閩越江浙皆有講舍莫不以先生為宗盟年八十猶周流不倦萬厯癸未六月七日卒年八十六天泉證道紀謂師門教法每提四句無善無惡心之體有善有惡意之動知善知惡是良知為善去惡是格物緒山以為定本不可移易先生謂之權法體用顯微只是一機心意知物只是一事若悟得心是無善無惡之心則意知物俱是無善無惡相與質之陽明陽明曰吾教法原有此兩種四無之說為上根人立教四有之說為中根以下人立教上根者即本體便是工夫頓悟之學也中根以下者須用為善去惡工夫以漸復其本體也自此印正而先生之論大抵歸於四無以正心為先天之學誠意為後天之學從心上立根無善無惡之心即是無善無惡之意是先天統後天從意上立根不免有善惡兩端之決擇而心亦不能無雜是後天復先天此先生論學大節目傳之海內而學者不能無疑以四有論之為善是心所固有故意知物之善從中而發惡從外而來若心體既無善惡則意知物之惡固妄也善亦妄也工夫既妄安得謂之復還本體斯言也於陽明平日之言無所考見獨先生言之耳然先生他日答吳悟齊云至善無惡者心之體也有善有惡者意之動也知善知惡者良知也為善去惡者格物也此其說已不能歸一矣以四無論之大學正心之功從誠意入手今曰從心上立根是可以無事乎意矣而意上立根者為中下人而設將大學有此兩樣工夫歟抑祗為中下人立教乎先生謂良知原是無中生有即是未發之中此知之前更無未發即是中節之和此知之後更無已發自能收斂不須更主於收斂自能發散不須更期於發散當下現成不假功夫修整而後得致良知原為未悟者設信得良知過時獨往獨來如珠之走盤不待拘管而自不過其則也以篤信謹守一切矜名飾行之事皆是犯手做作唐荆川謂先生篤於自信不為行迹之防包荒為大無淨穢之擇故世之議先生者不一而足夫良知既為知覺之流行不落方所不可典要一著功夫則未免有礙虛無之體是不得不近於禪流行即是主宰懸崕撒手茫無把柄以心息相依為權法是不得不近於老雖云真性流行自見天則而於儒者之矩矱未免有出入矣然先生親承陽明末命其微言往往而在象山之後不能無慈湖文成之後不能無龍溪以為學術之盛衰因之慈湖決象山之瀾而先生疏河導源於文成之學固多所發明也語録今人講學以神明為極精開口便說性說命以日用飲食聲色貨財為極粗人面前不肯出口不知講解得性命到入微處意見盤桓只是比擬卜度與本來生機了不相干終成俗學若能於日用貨色上料理時時以天則應之超脫淨盡乃見定力朋友有守一念靈明處認為戒懼功夫才涉言語應接所守功夫便覺散緩此是分了內外靈明無內外無方所戒懼亦無內外無方所識得本體原是變動不居雖終日變化云為莫非本體之周流矣以上冲元㑹紀聖人所以為聖精神命脈全體內用不求知於人故常常自見已過不自滿假日進於無疆鄉願惟以媚世為心全體精神盡從外面照管故自以為是而不可與入堯舜之道梅純甫問答致良知只是虛心應物使人人各得盡其情能剛能柔觸機而應迎刃而解如明鏡當空妍强自辨方是經綸手假才有些子才智伎倆與之相形自己光明反為所蔽維揚晤語有所不為不欲者良知也無為無欲者致知也復陽堂㑹語吾人一切世情嗜欲皆從意生心本至善動於意始有不善若能在先天心體上立根則意所動自無不善世情嗜欲自無所容致知功夫自然易簡省力若在後天動意上立根未免有世情嗜欲之雜致知功夫轉覺繁難顏子先天之學也原憲後天之學也古者教人只言藏修游息未嘗專說閉關靜坐若日日應感時時收攝精神和暢充周不動於欲便與靜坐一般若以見在感應不得力必待閉關靜坐養成無欲之體始為了手不惟蹉却見在功夫未免喜靜厭動與世間已無交涉如何復經得世乾元用九是和而不倡之義吾人之學切忌起爐作竈惟知和而不倡應機而動故曰乃見天則有凶有咎皆起於倡以上三山麗澤録良知宗說同門雖不敢有違然未免各以其性之所近擬議攙和有謂良知非覺照須本於歸寂而始得如鏡之照物明體寂然而妍􅑦自辨滯於照則明反眩矣有謂良知無見成由於修證而始全如金之在礦非武火煆鍊則金不可得而成也有謂良知是從已發立教非未發無知之本旨有謂良知本來無欲直心以動無不是道不待復加銷欲之功有謂學有主宰有流行主宰所以立性流行所以立命而以良知分體用有謂學貴循序求之有本末得之無內外而以致知别始終此皆論學同異之見不容以不辨者也寂者心之本體寂以照為用守其空知而遺照是乖其用也見入井孺子而惻隱見呼蹴之食而羞惡仁義之心本來完具感觸神應不學而能也若謂良知由修而後全撓其體也良知原是未發之中無知而無不知若良知之前復求未發即為沉空之見矣古人立教原為有欲設銷欲正所以復還無欲之體非有所加也主宰即流行之體流行即主宰之用體用一原不可得而分分則離矣所求即得之之因所得即求之之證始終一貫不可得而别别則支矣吾人服膺良知之訓幸相默證務求不失其宗庶為善學也已㳙流積至滄溟水拳石崇成太華岑先師謂象山之學得力處全在積纍須知㳙流即是滄海拳石即是泰山此是最上一機不由積纍而成者也擬峴臺㑹語立志不真故用功未免間斷須從本原上徹底理㑹種種嗜好種種貪著種種奇特技能種種凡心習態全體斬斷令乾乾淨淨從混沌中立根基始為本來生生真命脈此志既真功夫方有商量處斗山㑹語先師講學山中一人資性警敏先生漫然視之屢問而不答一人不顧非毁見惡於鄉黨先師與之語竟日忘倦某疑而問焉先師曰某也資雖警敏世情機心不肯放舍使不聞學猶有敗露悔改之時若又使之有聞見解愈多趨避愈巧覆藏愈密一切圓融智慮為惡不可復悛矣某也原是有力量之人一時狂心銷遏不下今既知悔移此力量為善何事不辨此待兩人所以異也休寧會約念菴謂世間無有見成良知非萬死功夫斷不能生以此較勘虛見附和之輩未為不可若必以見在良知與堯舜不同必待功夫修證而後可得則未免矯枉之過曾謂昭昭之天與廣大之天有差别否松原晤語夫一體之謂仁萬物皆備於我非意之也吾之目遇色自能辨青黃是萬物之色備於目也吾之耳遇聲自能辨清濁是萬物之聲備於耳也吾心之良知遇父自能知孝遇兄自能知弟遇君上自能知敬遇孺子入井自能知怵惕遇堂下之牛自然知觳觫推之為五常擴之為百行萬物之變不可勝窮無不有以應之是萬物之變備於吾之良知也夫目之能備五色耳之能備五聲良知之能備萬物之變以其虛也致虛則自無物欲之間吾之良知自與萬物相為流通而無所凝滯後之儒者不明一體之義不能自信其心反疑良知涉虛不足以備萬物先取古人孝弟愛敬五常百行之迹指為典要揣摩依倣執之以為應物之則而不復知有變動周流之義是疑目之不能辨五色而先塗之以丹艧耳之不能辨五聲而先聒之以宫羽豈惟失却視聽之用而且汩其聰明之體其不至聾且瞶者幾希宛陵㑹語天機無安排有寂有感即是安排千古學術只在一念之微上求三月不違不違此也日月至至此也一念之微只在愼獨人心只有是非是非不出好惡兩端忿與欲只好惡上略過些子其幾甚微懲忿窒欲復其是非之本心是合本體的功夫論功夫聖人亦須困勉方是小心緝熙論本體衆人亦是生知安行方是真機直達心之官則思出其位便是廢心職學者須信得位之所在始有用力處古人說凝命凝道真機透露即是凝若真心透露前有個凝的工夫便是沉空守寂先師自云吾居夷以前稱之者十九鴻臚以前稱之者十之五議者十之五鴻臚以後議之者十之九矣學愈真切則人愈見其有過前之稱者乃其包藏掩飾人故不得而見也致良知是從生機入手乃是見性之學不落禪定問閒思雜慮如何克去曰須是戒愼不覩恐懼不聞從真機上用功自無此病常念天下無非省多少忿戾父子兄弟不責善全得恩義行其中如此方是曲成之學一友用功恐助長落第二義答云真實用功落第二義亦不妨人心要虛惟虛集道常使胸中豁豁無些子積滯方是學張子太和篇尚未免認氣為道若以清虛一大為道則濁者實者散殊者獨非道乎問應物了即一返照何如曰當其應時真機之發即照何更索照日往月來月往日來自然往來不失常度便是存之之法水西㑹語樂是心之本體本是活潑本是脫灑本無罣礙繫縳堯舜文周之兢兢業業翼翼乾乾只是保任得此體不失此活潑脫灑之機非有加也答汪南明靜者心之本體濂溪主靜以無欲為要一者無欲也則靜虛動直主靜之靜實兼動靜之義動靜所遇之時也人心未免逐物以其有欲也無欲則雖萬感紛擾而未嘗動也從欲則雖一念枯寂而未嘗靜也答吳中淮良知是天然之靈竅時時從天機運轉變化云為自見天則不須防簡不須窮索何嘗照管得又何嘗不照管得豐城答問劉獅泉曰人之生有性有命吾心主宰謂之性性無為者也故須出頭吾心流行謂之命命有質者也故須運化常知不落念所以立體也常運不成念所以致用也二者不可相離必兼修而後可為學先生曰良知原是性命合一之宗即是主宰即是流行故致知功夫只有一處用若說要出頭運化要不落念不成念如此分疏即是二用二即支離到底不能歸一知者心之本體所謂是非之心人皆有之是非本明不須假借隨感而應莫非自然聖賢之學惟自信得及是是非非不從外來故自信而是斷然必行雖遁世不見是而無悶自信而非斷然必不行雖行一不義殺一不辜而得天下不為如此方是毋自欺方謂之王道何等易簡直截後世學者不能自信未免倚靠於外動於榮辱則以毁譽為是非惕於利害則以得失為是非攙和假借轉摺安排益見繁難到底只成就得霸者伎倆而聖賢易簡之學不復可見答林退齊耿楚侗曰陽明拈出良知二字固是千古學脈亦是時節因緣春秋之時功利習熾天下四分五裂人心大壞不復知有一體之義故孔子提出個仁字喚醒人心求仁便是孔氏學脈到孟子時楊墨之道塞天下人心戕賊不得不嚴為之防故孟子復提出義非義則仁無由達集義便是孟氏學脈晉梁而下佛老之教淫於中國禮法蕩然故濂溪欲追復古禮橫渠汲汲以禮為教執禮便是宋儒學脈禮非外飾人心之條理也流傳既久漸入支離心理分為兩事故陽明提出良知以覺天下使知物理不外於吾心致知便是今日學脈皆是因時立教先生曰良知是人身靈氣醫家以手足痿痺為不仁蓋言靈氣有所不貫也故知之充滿處即是仁知之斷制處即是義知之節文處即是禮說個仁字沿習既久一時未易覺晤說個良知一念自反當下便有歸著尤為簡易良知是造化之精靈吾人當以造化為學造者自無而顯於有化者自有而歸於無吾之精靈生天生地生萬物而天地萬物復歸於無無時不造無時不化未嘗有一息之停自元㑹運世以至於食息微渺莫不皆然如此則造化在吾手而吾致知之功自不容已矣良知本體原是無動無靜原是變動周流此便是學問頭腦若不見得良知本體只在動靜二境上揀擇取舍不是妄動便是著靜均之為不得所養以上東遊㑹語當下本體如空中鳥跡水中月影若有若無若沉若浮擬議即乖趨向轉背神機妙應當體本空從何處識他於此得個悟入方是無形象中真面目不著纖毫力中大著力處也近溪之學已得其大轉機亦圓自謂無所滯矣然尚未離見在雖云全體放下亦從見上承當過來到毁譽利害真境相逼尚未免有動他却將動處亦把作真性籠罩過去認做煩惱即菩提與吾儒盡精微時時緝熙功夫尚隔一塵良知一㸃虛明便是入聖之機時時保任此一㸃虛明不為旦晝梏亡便是致知蓋聖學原是無中生有顏子從裡面無處做出來子貢子張從外面有處做進去無者難尋有者易見故子貢子張一派學術流傳後世而顏子之學遂亡後之學者沿習多學多聞多見之說乃謂初須多學到後方能一貫初須多聞多見到後方能不藉聞見而知此相沿之弊也初學與聖人之學只有生熟不同前後更無兩路假如不忍觳觫怵惕入井不屑呼蹴真機神應人力不得而與豈待平時多學而始能充不忍一念便可以王天下充怵惕一念便可以保四海充不屑不受一念便不可勝用此可以窺孔孟宗傳之旨矣忿不止於憤怒凡嫉妒褊淺不能容物念中悻悻一些子放不過皆忿也欲不止於淫邪凡染溺敝纍念中轉轉貪戀不肯舍却皆欲也懲窒之功有難易有在事上用功者有在念上用功者有在心上用功者事上是遏於已然念上是制於將然心上是防於未然懲心忿窒心欲方是本原易簡功夫在意與事上遏制雖極力掃除終無廓清之期問伊川存中應外制外養中之學以為內外交養何如曰古人之學一頭一路只從一處養譬之種樹只養其根根得其養枝葉自然暢茂種種培壅灌溉條枝剔葉刪去繁冗皆只是養根之法若既養其根又從枝葉養將來便是二本支離之學晦菴以尊德性為存心以道問學為致知取證於涵養須用敬進學在致知之說以此為內外交養知是心之虛靈以主宰謂之心以虛靈謂之知原非二物舍心更有知舍存心更有致知之功皆伊川之說誤之也涵養工夫貴在精專接續如雞抱卵先正嘗有是言然必卵中原有一㸃真陽種子方抱得成若是無陽之卵抱之雖勤終成假卵學者須識得真種子方不枉費功夫明道云學者須先識仁吾人心中一㸃靈明便是真種子原是生生不息之機種子全在卵上全體精神只是保護得非能以其精神助益之也以上留都會紀耿楚侗曰一念之動無思無為機不容已是曰天根一念之了無聲無臭退藏於密是曰月窟乍見孺子入井怵惕惻隱之心動處即是天根歸原處即是月窟才攙和納交要譽惡聲意思便人根非天根鬼窟非月窟矣先生曰良知覺悟處謂之天根良知翕聚處謂之月窟一姤一復如環無端有問近溪守中之訣者羅子曰否否吾人自咽喉以下是為鬼窟天與吾此心神如此廣大如此高明塞兩間彌六合奈何拘囚於鬼窟中乎問調息之術如何羅子曰否否心和則氣和氣和則形和息安用調問何修而得心和羅子曰和妻子宜兄弟順父母心斯和矣先生曰守中原是聖學虞廷所謂道心之微精者精此一者一此是謂允執厥中情反於性謂之還丹學問只是理㑹性情吾人此身自頂至踵皆道體之所寓真我不離軀殼若謂咽喉以下是鬼窟是强生分别非至道之言也調息之術亦是古人立教權法從靜中收攝精神心息相依以漸而入亦補小學一假功夫息息歸根謂之丹母若只以心和氣和形和世儒常談儱統承當無入悟之機答楚侗禪此可見二溪學問不同近溪入於龍溪則兼乎老故有調息法良知者性之靈根所謂本體也知而曰致翕聚緝熙以完無欲之一所謂功夫也良知在人不學不慮爽然由於固有神感神應盎然出於天成本來真頭面固不待修證而後全若徒任作用為率性倚情識為通微不能隨時翕聚以為之主倐忽變化將至於蕩無所歸致知之功不如是之疏也書同心册良知二字是徹上徹下語良知知是知非良知無是無非知是知非即所謂規矩忘是非而得其巧即所謂悟也鄉黨自好與賢者所為分明是兩條路徑賢者自信本心是是非非一毫不從人轉換鄉黨自好即鄉願也不能自信未免以毁譽為是非始有違心之行徇俗之情虞廷觀人先論九德後及於事乃言曰載采采所以符德也善觀人者不在事功名義格套上惟於心術微處密窺而得之雲門問答良知不學不慮終日學只是復他不學之體終日慮只是復他不慮之體無工夫中真工夫非有所加也工夫只求日減不求日增減得盡便是聖人後世學術正是添的勾當所以終日勤勞更益其病果能一念惺惺冷然自善窮其用處了不可得此便是究竟話答徐存齊尹洞山舉陽明語莊渠心常動之說先生曰然莊渠為嶺南學憲時過贑先師問子才如何是本心莊渠云心是常靜的先師曰我道心是常動的莊渠遂拂衣而行末年子與荆川請教於莊渠莊渠首舉前語悔當時不及再問豫曰是雖有矯而然其實心體亦原如此天常運而不息心常活而不死動即活動之義非以時言因問心常靜之說莊渠曰聖學全在主靜前念已往後念未生見念空寂既不執持亦不茫昧靜中光景也又曰學有天根有天機天根所以立本天機所以研慮豫因問天根與邵子同否莊渠曰亦是此意豫謂邵子以一陽初動為天根天根即天機也天根天機不可並舉而言若如公分疏亦是靜存動察之遺意晤得時謂心是常靜亦可謂心是常動亦可謂之天根亦可謂之天機亦可心無動靜動靜所遇之時也南遊㑹紀問知行合一曰天下只有個知不行不足謂之知知行有本體有工夫如眼見得是知然已是見了即是行耳聞得是知然已是聞了即是行要之只此一個知已自盡了孟子說孩提之童無不知愛其親及其長無不知敬其兄止曰知而已知便能了更不消說能愛能敬本體原是合一先師因後儒分為兩事不得已說個合一知非見解之謂行非履蹈之謂只從一念上取證知之真切篤實即是行行之明覺精察即是知知行兩字皆指功夫而言亦原是合一的非故為立說以强人之信也人心虛明湛然其體原是活潑豈容執得定惟隨時練習變動周流或順或逆或縱或橫隨其所為還他活潑之體不為諸境所礙斯為之存以上華陽㑹語天生蒸民有物有則良知是天然之則物是倫物所感應之迹如有父子之物斯有慈孝之則有視聽之物斯有聰明之則感應迹上循其天則之自然而後物得其理是之謂格物非即以物為理也人生而靜天之性也物者因感而有意之所用為物意到動處易流於欲故須在應迹上用寡欲工夫寡之又寡以至於無是之謂格物非即以物為欲也物從意上意正則物正意邪則物邪認物為理則為太過訓物為欲則為不及皆非格物之原旨斗山會語鄧定宇曰良知渾然虛明無知而無不知知是知非者良知自然之用亦是權法執以是非為知失其本矣又曰學貴自信自立不是倚傍世界做得的天也不做他地也不做他聖人也不做他求自得而已先生曰向承教議知靜中所得甚深所見甚大然未免尚從見上轉換此件事不是說了便休須時時有用力處時時有過可改消除習氣抵於光明方是緝熙之學此學無小無大無內無外言語威儀所以凝道密窺吾兄感應行持尚涉做作有疏漏若是見性之人真性流行隨處平滿天機常活無有剩缺自無安排方為自信也定宇曰先生之意但欲此機常行而不住常活而不死思而不落想像動而不屬安排即此便是真種子而習氣所牽未免落在第二義龍南㑹語良知之主宰即所謂神良知之流行即所謂氣其機不出於一念之微易測吾儒之學與禪學俗學只在過與不及之間彼視世界為虛妄等生死為電泡自成自住自壞自空天自信天地自信地萬變輪迥回歸之太虛漠然不以動心佛氏之超脫也牢籠世界桎梏生死以身徇物悼往悲來戚戚然若無所容世俗之芥蒂也修慝省愆有懼心而無蹙容固不以數之成虧自委亦不以物之得喪自傷內見者大而外化者齊平懷坦坦不為境遷吾道之中行也心迹未嘗判迹有可疑畢竟其心尚有不能盡信處自信此生決無盜賊之心雖有褊心之人亦不以此疑我若自信功名富貴之心與決無盜賊之心一般則人之相信自將不言而喻矣自訟昔有人論學謂須希天一士人從旁謂曰諸公未須高論且須希士今以市井之心妄意希天何異凡夫自稱國王幾於無恥矣願且希士而後希天可馴至也一座聞之愓然諸儒所得不無淺深初學不可輕議且從他得力處效法修習以求其所未至如大學格物無內外中庸愼獨無動靜諸說關係大節目不得不與指破不得已也若大言無忌恣口指摘若執權衡以較輕重不惟長傲亦且損德見在一念無將迎無住著天機常活便是了當千百年事業更無剩缺千古聖學只從一念靈明識取當下保此一念靈明便是學以此觸發感通便是教隨事不昧此一念靈明謂之格物不欺此一念靈明謂之誠意一念廓然無有一毫固必之私謂之正心此是易簡直截根源水西别言良知靈明原是無物不照以其變化不可捉摸故亦易於隨物古人謂之凝道謂之凝命亦是苦心話頭吾人但知良知之靈明脫灑而倐忽存亡不知所以養或借二氏作話頭而不知於人情事變煆煉超脫即為養之之法所以不免於有二學若果信得良知及時只此知是本體只此知是功夫良知之外更無致法致良知之外更無養法良知原無一物自能應萬物之變有意有欲皆為有物皆為良知之障魯江别言𢎞正間京師倡為詞章之學李何擅其宗先師更相倡和既而棄去社中人相與惜之先師笑曰使學如韓栁不過為文人辭如李杜不過為詩人果有志於心性之學以顔閔為期非第一等德業乎就論立言亦須一一從圓明竅中流出蓋天蓋地始是大丈夫所為傍人門戶比量揣擬皆小技也曾舜徵别言思慮未起不與己起相對才有起時便為鬼神覷破非退藏密機日逐應感只默默理㑹當下一念凝然灑然無起無不起時時覿面相呈時時全體放下一切稱譏逆順不入於心直心以動自見天則萬履菴漫語問白沙與師門同異曰白沙是百原山中傳流亦是孔門别派得其環中以應無窮乃景象也緣世人精神撒潑向外馳求欲返其性情而無從入只得假靜中一假行持窺見本來面目以為安身立命根基所謂權法也若致知宗旨不論語默動靜從人情事變徹底鍊習以歸於元譬之真金為銅鉛所雜不遇烈火烹熬則不可得而精師門嘗有人悟三種教法從知解而得者謂之解悟未離言詮從靜中而得者謂之證悟猶有待於境從人事鍊習而得者忘言忘境觸處逢源愈搖蕩愈凝寂始為徹悟霓川别語從真性流行不涉安排處處平鋪方是天然真規矩脫入些子方圎之迹尚是典要挨排與變動周流之旨還隔幾重公案示丁惟寅人心一㸃靈機變動周流為道屢遷而常體不易譬之日月之明往來無停機而未嘗有所動也萬師默問見孺子入井怵惕惻隱則必狂奔盡氣運謀設法以拯救之分明已起思慮安得謂之未起曰若不轉念一切運謀設法皆是良知之妙用皆未嘗有所起所謂百慮而一致也才有一毫納交要譽惡聲之心即為轉念方是起了凡處至親骨肉之間輕重緩急自有天則一毫不容加減才著意處便是固必之私不是真性流行真性流行始見天則良知知是知非其實無是無非無者萬有之基冥權密運與天同遊若是非分别太過純白受傷非所以畜德也先師遺墨繼之者善是天命流行成之者性人生而靜已上不容說才有性之可名即已屬在氣非性之本然矣性是心之生理性善之端須從發上始見惻隱羞惡之心即是氣無氣則亦無性之可名矣性命合一說良知在人百姓之日用同於聖人之成能原不容人加損而後全乞人與行道之人怵惕羞惡之形乃天機之神應原無俟於收攝保聚而後有此聖學之脈也堯舜之生知安行其焦勞怨慕未嘗不加困勉之功但自然分數多故謂之生安愚夫愚婦其感觸神應亦是生安之本體但勉然分數多故謂之困勉致知難易解念有二義今心為念是為見在心所謂正念也二心為念是為將迎心所為邪念也正與邪本體之明未嘗不知所謂良知也念之所感謂之物物非外也心為見在之心則念為見在之念知為見在之知而物為見在之物見在則無將迎而一矣念堂說人之所以為人神與氣而已矣神為氣之主宰氣為神之流行神為性氣為命良知者神氣之奧性命之靈樞也良知致則神氣交而性命全其機不外於一念之微吳同泰說乍見孺子入井怵惕未嘗有三念之雜乃不動於欲之真心所為良知也與堯舜未嘗有異者也於此不用致知之功以時保此心徒認見成虛見而謂即與堯舜相對幾於自欺矣壽念菴論學書良知無分於已發未發所謂無前後內外而渾然一體者也才認定些子便有認定之病後儒分寂分感所爭亦只在毫釐間致知在格物格物正是致知實用力之地不可以分內外者也若謂功夫只是致知而格物無功夫其流之弊便至於絶物便是二氏之學徒知致知在格物而不悟格物正是致其未發之知其流之弊便至於逐物便是支離之學吾人一生學問只在改過須常立於無過之地方覺有過方是改過真功夫所謂復者復於無過者也良知真體時時發用流行便是無過便是格物過是妄生本無安頓處才求個安頓所在便是認著便落支離矣答聶雙江格物是致知下手實地格是天則良知所本有猶所謂天然格式也同上丈云今之論心者當以龍而不以鏡惟水亦然按水鏡之喻未為盡非無情之照因物顯象應而皆實過而不留自妍自醜自去自來水鏡無與焉蓋自然之所為未嘗有欲聖人無欲應世經綸裁制之道其中和性情本原機括不過如此而已著虛之見本非是學只此著便是欲已失其自然之用聖人未嘗有此也又云龍之為物以驚惕而主變化者也自然是主宰之無滯曷嘗以此為先哉坤道也非乾道也其意若以乾主警惕坤貴自然警惕時未可自然自然時無事警惕此是墮落兩邊見解大學當以自然為宗警惕者自然之用戒謹恐懼未嘗致纖毫之力有所恐懼便不得其正此正入門下手工夫自古體易者莫如文王小心翼翼昭事上帝乃是真自然不識不知順帝之則乃是真警惕乾坤二用純亦不已豈可以先後論哉慈湖不起意未為不是蓋人心惟有一意始能起經綸成德業意根於心心不離念心無欲則念自一一念萬年主宰明定無起作無遷改正是本心自然之用艮背行庭之旨終日變化酬酢而未嘗動也才有起作便涉二意便是有欲而妄動便為離根便非經綸裁制之道無意無必非慈湖所倡也惟其不知一念用力脫却主腦莽蕩無據自以為無意無必而不足以經綸裁制如今時之弊則誠有所不可耳答彭山龍鏡書吾人思慮自朝至暮未嘗有一息之停譬如日月自然往來亦未嘗有一息之停而實未嘗動也若思慮出於自然如日月之往來則雖終日思慮常感常寂不失貞明之體起而未嘗起也若謂有未發之時則日月有停輪非貞明之謂矣答萬履菴陽和謂豫曰學者談空說妙無當於日用不要於典常是之為詭口周孔而行商賈是之為僞懲詭與僞之過獨學自信冥行無聞是之為蔽行比一鄉智效一官自以為躬行是之為畫與潘水簾當萬欲騰沸之中若肯反諸一念良知其真是真非炯然未嘗不明只此便是天命不容滅息所在便是人心不容蔽昧所在此是千古入賢入聖真正路頭答茅治卿良知非知覺之謂然舍知覺無良知良知即是主宰而主宰淵寂原無一物吾人見在感應隨物流轉固是失却主宰若曰吾惟於此收斂握固便有樞可執認以為致知之實未免猶落內外二見才有執著終成管帶只此管帶便是放失之因且道孩提精神曾有著到也無鳶之飛魚之躍曾有管帶也無驪龍護珠終有珠在以手持物㑹有放時不捉執而自固乃忘於手者也惟無可忘而忘故不待存而存此可以自悟矣致知在格物言致知全在格物上猶云舍格物更無致知工夫也如雙江所教格物上無功夫則格物在於致知矣答念菴見在良知必待修證而後可與堯舜相對尚望兄一默體之蓋不信得當下具足到底不免有未瑩處欲懲學者不用功夫之病並其本體而疑之亦矯枉之過也同上未發之中是太虛本體隨處充滿無有內外發而中節處即是未發之中若有在中之中另為本體與已發相對則誠二本矣良知知是知非原是無是無非正發真是真非之義非以為從無是無非中來以標末視之使天下胥至於惛惛懂懂也譬諸日月之往來自然往來即是無往無來若謂有個無往無來之體則日月有停輪非往來生明之旨矣答耿楚侗近溪解離塵俗覺得澄湛安間不為好惡馳逐却將此體涵泳夷猶率為準則依據此非但認虛見為實際縱使實見亦只二乘沉空守寂之學才遇些子差别境界便經綸宰割不下與馮緯川真見本體之貞明則行持保任自不容己茍不得其不容自己之生機雖日從事於行持保任勉强操勵自信以為無過行而不著習而不察到底只成義襲之學答吳悟齊文公謂天下之物方圓輕重長短皆有定理必外之物格而後內之知至先師則謂事物之理皆不外於一念之良知規矩在我而天下方圓不可勝用無權度則無輕重長短之理矣文公分致知格物為先知誠意正心為後行故有遊騎無歸之慮必須敬以成始涵養本原始於身心有所關涉若知物生於意格物正是誠意功夫誠即是敬一了百了不待合之於敬而後為全經也同上我朝禮樂開端是白沙至先師而大明與顏冲宇良知即是獨知獨知即是天理獨知之體本是無聲無臭本是無所知識本是無所粘帶揀擇本是徹上徹下獨知便是本體愼獨便是功夫只此便是未發先天之學若謂良知只屬後天未能全體得力須見得先天方有張本却是頭上安頭斯亦惑矣萬欲紛紜之中反之一念獨知未嘗不明此便是天之明命不容磨滅所在故謂愼獨工夫影響揣摩不能掃蕩欲根則可謂獨知有欲則不可謂獨知即是天理則可謂獨知之中必用天理為若二物則不可答洪覺山獨知者非念動而後知也乃是先天靈竅不因念有不隨念遷不與萬物作對愼之云者非是强制之謂只是兢業保護此靈竅還他本來清淨而已答王鯉湖矯情鎮物似涉安排坦懷任意反覺真性流行與荆川意見攙入用事眼前自有許多好醜高低未平滿處若徹底只在良知上討生死譬之有源之水流而不息曲直方圓隨其所遇到處平滿乃是本性流行真實受用答談二華所謂必有事者獨處一室而此念常炯然日應萬變而此念常寂然間時能不閒忙時能不忙方是不為境所轉與趙麟陽吾人立於天地之間須令我去處人不可望人處我與周順之調息法息有四種相一風二喘三氣四息前三為不調相後一為調相坐時鼻息出入覺有聲是風相也息無聲而出入結滯不通是喘相也息雖無聲亦無結滯而出入不細是氣相也坐時無聲不結不粗出入綿綿若存若亡神資冲融情抱悅豫是息相也守風則散守喘則戾守氣則勞守息則密前為假息後為真息欲習靜坐以調息為入門使心有所寄神氣相守亦權法也調息與數息不同數為有意調為無意委心虛無不沉不亂息調則心定心定則息愈調真息往來呼吸之機自能奪天地之造化心息相依是謂息息歸根命之蒂也一念微明常惺常寂範圍三教之宗吾儒謂之燕息佛氏謂之反息老氏謂之踵息造化闔闢之𤣥機也以此徵學亦以此衛生了此便是徹上徹下之道明儒學案卷十二
