body:
  text: 明儒學案卷十五餘姚黃宗羲撰浙中相傳學案五都督萬鹿園先生表萬表字民望號鹿園寧波衛世襲指揮僉事年十七襲職讀書學古不失儒生本分冦守天敘勉以寧靜淡泊先生揭諸座右登正德庚辰武會試厯浙江把總署都指揮僉事督運浙江掌印都指揮南京大教場坐營漕運參將南京錦衣衛僉書廣西副總兵左軍都督漕運總兵南京中軍都督府僉書嘉靖丙辰正月卒年五十九先生功在漕運其大議有三一三路轉運以備不虞置倉衛輝府每年以十分之二撥中都運船兌鳳陽各府糧米由汴梁達武陽陸路七十里輸於衛輝由衛河以達於京松江通泰俱有沙船淮安有海船時常由海至山東轉貿宜以南京各總缺船衛分坐兌松江太倉糧米嵗運四五萬石達於天津以留海運舊路於是并漕河而為三一本折通融豐年米賤全運本色如遇災傷則量減折色凡本色至京率四石而致一石及其支給一石不過易銀三錢在外折色每石七錢若京師米貴則散本色米賤則散折色一石而當二石是寓常平之法於漕運之中一原立法初意天下運船萬艘每艘軍旗十餘人共計十萬餘人每年輳集京師茍其不廢操練不缺甲仗是京營之外嵗有勤王師十萬彈壓邊陲其他利弊纖悉萬全舉行而效之一時者人共竒之其大者卒莫之能行也倭冦之亂先生身親陷陳肩中流矢其所籌畫亦多掣肘故忠憤至死不忘先生之學多得之龍溪念菴緒山荆川而究竟於禪學其時東南講會甚盛先生不喜干與以為此輩未曽發心為道不過依傍門戶雖終日與之言徒費精神彼此何益譬礪石之齒頑鐵縱使少有漸磨自家所損亦多矣先生嘗言聖賢切要工夫莫先於格物蓋吾心本來具足格物者格吾心之物也為情欲意見所蔽本體始晦必掃蕩一切獨觀吾心格之又格愈研愈精本體之物始得呈露是為格物格物則知自致也龍溪謂古人格物之説是千聖經綸之實學良知之感應謂之物是從良知凝聚出來格物是致知實下手處不離倫物感應而證真修離格物則知無從而致矣吾儒與二氏毫釐不同正在於此其實先生之論格物最為諦當格之又格而後本體之物呈露即白沙之養出端倪也宋儒所謂未發氣象亦即是此龍溪之倫物感應又豈能舍此而别有工夫苐兩家之言物不同龍溪指物為實先生指物為虛凡天下之物攝於本體之初本體之物又何嘗離倫物哉然兩家皆精禪學先生所謂本體呈露者真空也龍溪離物無知者妙有也與宋儒白沙之論雖似而有差别學者又嘗有辨矣先生如京師大洲訪之郊外與之談禪議論蜂湧先生唯唯不答大洲大喜歸語人曰今日降却萬鹿園矣陸平泉聞而笑曰此是鹿園降却大洲何言大洲降却鹿園也戚南玄與先生遇戲曰鹿園名為旅禪實未得理是假和尚先生曰南玄名為宗儒實未見性是癡秀才相與大笑先生一點一語無非禪機如此鹿園語要聖學工夫只在格物所謂格物者格其心之物也凡不於自己心性心透徹得者皆不可以言格到得頓悟見性則徹底明盡不為一切情景所轉如鏡照物鏡無留物如鳥飛空空無鳥迹日用感應純乎誠一莫非性天流行無擬議無將迎融識歸真反情還性全體皆仁矣嘉靖庚寅先生及心齋東廓南野玉溪會講於金陵雞鳴寺先生出病懷詩相質其二曰三十始志學德立待何時往者既有悔寧當復怠茲由仕莫非學開心未信斯悅惡一何殊此旨嘗在思豈不貴格物窮至乃真知馳求外吾心癡狂竟何為微吾魯中叟萬世將誰師心齋和詩曰人生貴知學習之惟時時天命是人心萬古不易茲鳶魚昭上下聖聖本乎斯安焉率此性無為亦在思我師誨吾儕曰性即良知宋代有真儒通書或問之曷為天下善曰惟聖者師侍郎王敬所先生宗沐王宗沐字新甫號敬所台之臨海人嘉靖甲辰進士在比部時與王元美為詩社七子中之一也久厯藩臬及河運艱滯以先生為右副都御史查復祖宗舊法一時漕政修舉猶慮運道一線有不足恃之時講求海運先以遮洋三百艘試之而效其後為官所阻而罷萬厯三年轉工部侍郎尋改刑部先生師事歐陽南野少從二氏而入已知所謂良知者在天為不己之命在人為不息之體即孔門之仁也學以求其不息而已其辨儒釋之分謂佛氏専於內俗學馳於外聖人則合內外而一之此亦非究竟之論蓋儒釋同此不息之體釋氏但見其流行儒者獨見其真常爾先生之所謂不息者將無猶是釋氏之見乎論學書象山之學誠有未瑩者坐在切嗟涵養未能非其所指心體有病要之吾人所以貫三才參天地通古今為不息者止此一事一悟百通一了百當非復有纖毫可以加增粧綴者然琢磨非頓養盛具積有嚙鐵之志乃能有立今以好徑之心則取其直截以攻擊之心則指其未瑩而近來則又於象山所言上更加一味見成而聖人皆師心隨手拈來盡是矣與江少峯文集聖人之言心淵然無朕其涵也而有觸即動其應也佛氏語其涵者圓明微妙而祕之以為竒俗學即其應者粧綴繳繞而離之以為博要之不能無所近而亦卒不可入何者其不能無所近者緣於心而卒不可入者逺於體也聖人者不獨語其涵懼人之求於微而不獨語其應懼人之求於迹故哀與欽者心之體也見廟與墓而興者其應也體無所不具則無所不感無所不感則無所不應因其應而為之文於是乎有哭劈哀素之等俎豆璧帛之儀儀立而其心達而儀非心也此所以為聖人之學也佛氏則從其應而逆之以歸於無曰墓與廟哀與敬皆妄也而性則離於是者也俗學者非之曰此有也則從而煩其名數深其辨博而以為非是則無循也然不知泯感與應者既以元逺空寂為性而其溺於名數辨博者又詳其末而忘其所以然豫故曰禪與俗卒不可入者逺於體也聖人之言心詳於宋儒最後象山陸氏出盡去世之所謂繳繞者而直指吾人之應心曰見墟墓哀而宗廟欽者心也辨此心之真偽而聖學在是矣其於致力之功雖為稍徑而於感應之全則指之甚明而俗學以為是禪也其所未及者名數辨博也嗟乎象山指其應者使人求其涵也佛氏逆其應於無而象山指其迹於應以是為禪然則為聖人者其必在名數辨博乎以儀為心豫惡乎哀欽之無從也象山集序天命流行物與無妄在天為不己之命而在人為不息之體孔門之所謂仁者先生之所謂知也自程淳公之沒而聖人之學不傳沉酣傳注留心名物從其求於外者以為領略貫解而一實萬分主靜立極之義微矣夫天下莫大於心心無對者也博厚髙明配於天地而彌綸參贊際於六合雖堯舜之治與夫湯武之烈皆心之照也從事於心者愈斂而愈不足從事於言者愈贅而愈有餘不足者日益而有餘者日損聖愚上下之岐端在於是此先生所以冒忌負謗不息其身而爭之於幾絶之餘而當時之士亦遂投其本有皆能脫馽解縶翕然從先生於驟聞之日者也爭之不明而有言言之稍聚而為録今不據其録而求其所以為學也乃復事於言是不得已者反以誤後人而貽之爭耶且先生之得是亦不易矣先生顧其始亦嘗詞章而博物矣展轉抵觸多方討究粧綴於平時者辨藝華藻似復可恃至於變故當前流離生死無復出路旁視莫倚而向之有餘者茫然不可得力於是知不息之體炯然在中悟則實談則虛譬之孤舟顛沛於衝風駭浪之中帆櫓莫施碇纜無容然後視柁力之強弱以為存亡葉盡根呈水落石出而始強力不返矣故余嘗謂先生僅悟於百死一生之日然後能咽餘甘而臻實際取而用之已本不二而物亦莫能違事功文詞固其照中之隙光也先生之所以得者豈盡於是耶嗣後一傳百訛師心即聖為虛無漭蕩之論不可窮詰內以馳其元漠之見而外以逃其踐履之失於先生所道切近之處未嘗加功則於先生所指精微之地終非實見投之事則窒施之用則敗蓋先生得而言之言先生之心爾而今襲先生之語以求入即句句不爽猶之無當於心而況不能無失乎心不息則萬古如一日心不息則萬人如一人先生能用是倡之於幾絶吾人不能緣是承之於已明而方且較同異雌黃以為長此豫之所以謂先生始得之勤而今之不能無憂也夫從事於心敏而猶有不及則於言有所不暇從事於心精而後知所失則於言有所不敢默識深思承擔負荷此余與二三子今之所承先生之後者也刻傳習録序侍讀張陽和先生元忭張元忭字子藎别號陽和越之山陰人父天復行太僕卿幼讀朱子格致補傳曰無乃倒言之乎當云心之全體大用無不明而後物之表裏精粗無不到也嘉靖戊午舉於鄉隆慶戊辰太僕就逮於滇先生侍之以往太僕釋歸先生入京頌寃事解又歸慰太僕於家一嵗之中往來凡三萬餘里年踰三十而髮白種種其至性如此辛未登進士第一人授翰林修撰尋丁外艱萬厯己卯教習內書堂先生謂寺人在天子左右其賢不肖為國治亂所係因取中鑒録諄諄誨之江陵病舉朝奔走醮事先生以門生未嘗往也壬午皇嗣誕生齎詔至楚丁內艱丁亥升左春坊左諭德兼翰林侍讀明年三月卒官年五十一先生之學從龍溪得其緒論故篤信陽明龍溪談本體而諱言工夫識得本體便是工夫先生不信而謂本體本無可説凡可説者皆工夫也嘗闢龍溪欲渾儒釋而一之以良知二字為範圍三教之宗旨何其悖也故曰吾以不可學龍溪之可先生可謂善學者也第主意只在善有善幾惡有惡幾於此而慎察之以為良知善必真好惡必真惡格不正以歸於正為格物則其認良知都向發上陽明獨不曰良知是未發之之中乎察識善幾惡幾是照也非良知之本體也朱子答吕子約曰向來講論思索直以心為已發而所論致知格物以察識端倪為初下手處以故缺却平日涵養一段工夫此即先生之言良知也朱子易簀改誠意章句曰實其心之所發此即先生之言格物也先生談文成之學而究竟不出於朱子矣不二齋論學書動靜者時也無動無靜常翕而不張常聚而不散者心也夫心無動靜而存心之功未有不自靜中得之者初學之士未能於靜中得其把柄遽欲以憧憧擾擾之私而妄意於動靜合一之妙譬之駕無柁之舟以浮江漢犯波濤其不至覆且溺者鮮矣寄張洪陽吾兄謂摹擬古人之言行庶幾可進於忘物以此為下學而上達竊謂摹擬古人之言行一一而求其合所謂博而寡要勞而無功也曷若摹擬於吾一心之為易且簡乎萬事萬物皆起於心心無事而貫天下之事心無物而貫天下之物此一貫之旨也故不離於事物言行之間而窮理盡性以至於命下學上達無二事也若以摹擬為下學忘物為上達是二之矣答田文學人有知覺禽獸亦有知覺人之知覺命於理禽獸之知覺命於氣今但以知覺言良知而曰良知不分善惡不將混人性物性而無别耶夫所謂良者自然而然純粹至善者也參之以人為蔽之以私欲則可以言知而不得謂之良知矣謂良知有善無惡則可謂良知無善無惡則不可致知之功全在察其善惡之端方是實學今人於種種妄念俱認為良知則不分善惡之言誤之也以下寄馮緯川有不善未嘗不知良知也知之未嘗復行致良知也知行合一以成其德其顔子之學乎周子曰幾善惡善有善幾惡有惡幾於此而慎察之善必真好惡必真惡研幾之學也吾兄論幾則曰善惡是非未落對待而以念上用功為幾淺非第一義竊謂未然所謂獨者還是善念初動之時人不及知而已獨知之非無可對待之謂也無對待則不可以言幾矣人心之欲固以先事預防禁於未發為不犯手工夫然豈易言哉此心即是天理方其未動本無人欲才一萌動則有天理便有人欲此危微之訓堯舜所為惓惓也人心少有無念之時方其未萌著一防字即屬思善一邊是亦念矣克念作聖只在一念之間不分有事無事此念常存正是動靜合一之學恐無淺深先後之可言也幾一而已矣自聖人言則為神化之幾自吾人言則為善惡之幾其實非有二也作聖之功則必由粗以入精由可知以進於不可知而知幾之學畢矣意者心之所發心本無意也動而後敬言而後信此心之本體有時而息矣不動而敬敬以心也不言而信信以心也此心之中無非敬信未發已發純乎天理矣釋氏以心為稿木死灰而盡外聞見吾儒亦從而宗之是以吾心為有內也心無內外無隱顯無寂感不見不聞此心也獨見獨聞此心也共見共聞此心也目之視也可得而見也謂視非心也可乎耳之聽也可得而聞也謂聽非心也可乎天之髙也地之廣也鳶飛魚躍於其間禮儀三百威儀三千則孰非心也而謂其偏於空虛可乎楊復所談本體而諱言功夫以為識得本體便是功夫某謂本體本無可説凡可説者皆功夫也識得本體方可用功夫明道言識得本體以誠敬存之是也寄羅近溪仁之為物未易名狀故孔門罕言仁凡所言者皆求仁之功而已其曰仁者人也仁人心也此則直指仁體矣生生不已者天地之心也人之生以天地之心為心虛而靈寂而照常應而常靜謂其有物也而一物不容謂其無物也而萬物皆僃無物無我無古今無內外無始終謂之無生而實生謂之有生而實未嘗生渾然廓然凝然炯然仁之體儻若是乎以下寄查毅齋近世談學者但知良知本來具足本來圓通窺見影響便以為把柄在手而不復知有戒慎恐懼之功以嗜欲為天機以情識為智慧自以為寂然不動而妄動愈多自以為廓然無我而有我愈固名檢蕩然陽明之良知果若是乎一念之動其正與否人不及知而已獨知之即此是獨即此是良知於此格之即是慎獨即是致良知物與知無二體格與致無二功也但於意念之間時時省克自然欲盡理還來教以則訓格謂物物皆有定則一循其則而不違是為格物也知體無窮物則有定若然是將以知不足恃而取則於物矣是將舍吾心之天則又索之於外矣是將岐知與物而二之矣請就兄之言而反覆之知體無窮物之體亦無窮何也凡物之理千變萬化不可為典要若云有定不為子莫之執中乎物則有定知之則亦有定何也帝降之衷天然自有不爽毫髮若曰無窮則將舍規而為圓舍矩而為方乎與許敬菴兄嘗問相天下當用何術對曰無私兄曰無私不足以盡相之道必加意於知人知人有法必令人舉一人嚴連坐之法而後舉必得人人無遺舉天下可理矣弟曰固也獨不曰取人以身乎自古才相智相代不乏人往往徇私而敗故無私而後能知人辟之鑑常空衡常平妍媸輕重自不患其或爽且人舉一人之法自昔亦常行之而卒不能得人何也其人君子也則所舉必多君子雖舉百十人亦何不可其人小人也則所舉必多小人雖舉一人亦安可聽耶兄又嘗問聖學之要對曰在心兄曰心不足以盡天下之理必存心以察天下之理而後可以入聖弟曰萬物皆備於我非心外有理也孔孟之學但曰正心曰存心心正則理無不正心存則理無不存千古聖賢何曽於心外加得一毫答吕新吾立人達人畢竟是仁發用處仁自有體就如喜怒哀樂是心之發用處心自有體也答孟我疆近時之弊徒言良知而不言致徒言悟而不言修僕獨持議不但曰良知而必曰致良知不但曰理以頓悟而必曰事以漸修蓋謂救時之意答周海門心外無道言心而曰易偏易恣者即非心也道外無心言道而不本於心者即非道也夫惟析心與道而為二是故舍我喜怒哀樂本然之情性而求之於難窮之物理舍我事親敬長本然之知能而索之於無常之事變考之愈勤講之愈徹而以之應感酬酢漠然愈不相關此則學術之過也與毛文學竊疑世儒口口説悟乃其作用處殊是未悟者悟與修分兩途終未能解龍溪曰狂者志大而行不掩乃是直心而動無所掩飾無所窩藏時時有過可改此是入聖真路頭世人總説修持終有掩飾窩藏意思在此去聖學路徑何啻千里定宇曰所貴乎不掩藏者為其覺而能改也非謂其冥然不顧而執之以為是也秋遊記豫謂定宇曰昨所言天地都不做得無駭人之聽耶定宇笑曰畢竟天地也多動了一下豫曰子真出世之學非豫所及也然嘗謂此體真無而實有天不得不生地不得不成辟如木之有根而發為枝葉花實自不容已天地亦何心哉佛氏以大地山河為幻妄此自迷者言之耳茍自悟者觀之一切幻相皆是真知而況於天地乎定宇曰學在識真不假斷妄子言得之矣同上當思父母生我之時光光淨淨只有此性命一切身外物真如水上漚奈何拋我之本來而汲汲營營於身外暫生暫滅之浮漚乎志學録下皆同吾邑蕭靜菴曰日力有餘則當遍讀六經以窺聖賢之心事足力有餘别當縱遊五嶽以觀天地之形骸若夫蒔一花卉畜一竒玩雖力有餘弗為也有壁立萬仞之節概乃可以語光風霽月之襟懷善樹木者芟其枝葉則其本盛矣善為學者斂其英華則其神凝矣眼前一草一木皆欣欣向榮一禽一鳥皆嚶嚶自得滿腔子是惻隱之心以禍福得喪付之天以􅐌毁豫奪付之人以修身立德責之已豈不至易至簡乎顔子當仰鑽瞻忽時只是於本體上想像追尋終不可得後來得夫子之教却於博文約禮用功夫功夫既到而後本體卓爾如有可見始悟向者想像追尋之為非也日之長短有時矣然意有所營若促之而短事無所繫若引之而長心之無時如此身之所處有方矣然神之所至忽而九天意之所注忽而萬里心之無方如此教諭胡今山先生瀚胡瀚字川甫號今山餘姚人支湖鐸從子也自幼承家學動必以禮年十八從陽明先生遊論及致良知之學反覆終日則躍然起曰先生之教劈破愚蒙矣陽明授以傳習録博約説日歸而思之蓋有省支湖召而語之曰孺子知學乎學在心心以不欺為主瀚唯唯於是日從事於求心悟心無內外無動靜無寂感皆心也即性也其有內外動靜寂感之不一也皆心之不存焉故也作心針圖以自課就質於陽明陽明面進之先生益自信危言篤行純簡甚密陽明沒諸弟子紛紛互講良知之學其最盛者山陰王汝中泰州王汝止安福劉君亮永豐聶文蔚四家各有疏説駸駸立為門戶於是海內議者羣起先生曰先師標致良知三字於支離汩沒之後指點聖真真所謂滴骨血也吾黨慧者論證悟深者研歸寂達者樂髙曠精者窮主宰流行俱得其説之一偏且夫主宰既流行之主宰流行即主宰之流行君亮之分别太支汝中無善無惡之悟心若無善知安得良故言無善不如至善天泉證道其説不無附會汝止以自然為宗季明德又矯之以龍惕龍惕所以為自然也龍惕而不恰於自然則為拘束自然而不本於龍惕則為放曠良知本無寂感即感即寂即寂即感不可分别文蔚曰良知本寂感於物而後有知必自其寂者求之使寂而常定則感無不通似又偏向無處立腳矣宋儒學尚分别故勤注疏明儒學尚渾成故立宗旨然明儒厭訓詁支離而必標宗旨以為的其弊不減於訓詁道也者天下之公道學也者天下之公學也何必列標宗旨哉先生之學則以求心為宗所注心針圖列而為五曰心圖指本體也曰存曰死曰出入曰放心各有針而功以存心為主晚年造詣益深每提本朝儒者曰文清之行粹然師表求其卓然之見一貫之唯似隔曽顔一級文成明睿學幾上達若夫動不踰矩循循善誘猶非孔氏之家法白沙煞有曽點之趣而行徑稍涉於孤髙敬齋慎密似有子夏規模而道業未臻於光大孟子願學孔子而於顔閔猶曰姑舍吾於四先生亦云以恩貢就華亭訓導升崇明教諭歸家三十年築室今山著有今山集一百卷明儒學案卷十五
