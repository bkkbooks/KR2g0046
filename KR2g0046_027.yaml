body:
  text: 明儒學案卷二十七餘姚黃宗羲撰南中相傳學案三文貞徐存齊先生階徐階字子升號存齊松江華亭人生甫周歲女奴墮之眢井小吏之婦號而出之則絶矣後三日蘇五歲從父之任道墮括蒼嶺衣絓於樹得不死登嘉靖癸未進士第三人授翰林編修張羅峯欲去孔子王號變像設為木主爭之不得黜為延平推官移浙江提學僉事晉副使視學江西諸生文有顔苦孔之卓語先生加以橫筆生白此出揚子法言非杜撰也先生即離席向生揖曰僕少年登第未嘗學問謹謝教矣聞者服其虛懷召拜司經局洗馬兼侍講居憂除服起國子祭酒擢禮部侍郎改吏部久之以學士掌翰林院事進禮部尚書召入直無逸殿廬撰青詞京師戒嚴召對頗枝柱分宜口上多用其言分宜恨之中於上先生贊元恭謹上怒亦漸解加少保兼文淵閣大學士參預機務滿考進武英殿大學士兼吏部尚書加少傅上所居永夀宫災徙居玉熙殿隘甚分宜請幸南城南城者英宗失國時所居上不悅先生主建萬夀宫令其子璠閲視當於上意進少師分宜之勢頗絀亡何而敗進階建極殿自分宜敗後先生秉國成內以揣摩人主之隱外以收拾士大夫之心益有所發舒天下亦頗安之而與同官新鄭不相能世宗崩先生悉反其疵政而以末命行之四方感動為之泣下新鄭以為帝骨肉未寒臣子何忍倍之衆中面折之在朝皆不直新鄭新鄭遂罷穆宗初政舉動稍不當人心者先生皆為之杜漸宫奴不得伸其志皆不悅而江陵亦意忌先生以宫奴為內主而去先生先生去而新鄭復相修報復欲曲殺之使其門人蔡春臺國熙為蘇松副使批其室家三子皆在縲絏先生乃上書新鄭辭甚苦新鄭亦心動未幾新鄭罷三子皆復官天子使行人存問先生年八十矣明年卒贈太師諡文貞聶雙江初令華亭先生受業其門故得名王氏學及在政府為講會於靈濟宫使南野雙江松溪程文德分主之學徒雲集至千人其時癸丑甲寅為自來未有之盛丙辰以後諸公或殁或去講壇為之一空戊午何吉陽自南京來復推先生為主盟仍為靈濟之會然不能及前矣先生之去分宜誠有功於天下然純以機巧用事敬齊曰處事不用智計只循天理便是儒者氣象故無論先生田連阡陌鄉論雌黃即其立朝大節觀之絶無儒者氣象陷於霸術而不自知者也諸儒徒以其主張講學許之知道此是回護門面之見也存齊論學語親親仁民愛物是天理自然非聖人强為之差等只如人身雖無尺寸之膚不愛然却於頭目腹心重於手足皮毛爪齒漸漸輕遇有急却濡手足焦毛髮以衛腹心頭目故此是自然之理然又不可因此就說人原不愛手足毛髮故親親仁民愛物總言之又只是一個仁愛也人須自做得主起方不為物所奪今人富便驕貧便諂者只為自做主不起程子云既思即是己發故戒謹恐懼人都說是靜不知此乃是動處也知此則知所用力矣為學只在立志志一放倒百事都做不成且如夜坐讀書若志立得住自不要睡放倒下去便自睡著此非有兩人也志譬如樹根樹根既立才可加培溉百凡問學都是培溉底事若根不立即培溉無處施耳凡為善畏人非笑而止者只是為善之心未誠若誠自止不得且如世間貪財好色之徒不獨不畏非笑直至冒刑辟而為之此其故何哉只為於貪財好色上誠耳吾輩為善須有此樣心乃能日進也心不可放者不是要使頑然不動只看動處如何若動在天理雖思及四海慮周萬世只是存若動在人欲一舉念便是放也人之虛靈感應無方故心只是動物所以說聖人之心靜者乃形容其常虛常靈無私欲之擾耳非謂如槁木死灰也吾輩今日靜功正須於克己上著力世儒乃欲深居默坐自謂主靜乎今人見上官甚敬雖匍匐泥雨中不以為辱及事父兄却反有怠惰不甘之意利欲薰心故也人未飲酒時事事清楚到醉後事事昏忘及酒醒後照舊清楚乃知昏忘是酒清楚是心之本然人茍不以利欲迷其本心則於事斷無昏忘之患克己二字此醒酒方也知行只是一事知運於行之中知也者以主其行者也行也者以實其知者也近有以知配天屬地行配地屬質分而為二不知天之氣固行乎地之中凡地之久載而不陷發行而不窮者孰非氣之所為乎默識是主本講學是工夫今人親師友觀書册等是講學事然非於心上切實理會而泛然從事口耳必不能有得得亦不能不忘故孔子直指用工主本處言之非欲其兀然高坐以求冥契也道者器之主器者道之迹以人事言朝廷之上家庭之間許多禮文是器其尊尊親親之理是道以草木言許多枝葉花實是器其生生之理是道原不是兩物故只說形而上下不說在上在下也有言學只力行不必談說性命道德者譬如登萬仞之山必見山頭所在乃有進步處非可瞑目求前也除性命道德行個甚麼人只是一個心心只是一個理但對父則曰孝對君則曰忠其用殊耳故學先治心茍能治心則所謂忠孝時措而宜矣人言千蹊萬徑皆可以適國然謂之蹊徑則非正路矣由之而行入之愈遠迷之愈深或至於榛芥荆棘之間而漸入窮山空谷之內去國遠矣況能有至乎故學須辨路徑路徑既明縱行之不能至猶不失日日在康莊也大學潔矩只是一個仁心蓋仁則於人無不愛上下前後左右皆欲使不失所故能推己以及之所謂惟仁人能愛人能惡人先王有不忍人之心斯有不忍人之政者也學者須豫養此心始得中丞楊幼殷先生豫孫楊豫孫字幼殷華亭人嘉靖丁未進士授南考功主事轉禮部員外郎中出為福建監軍副使移督湖廣學政升河南參政入為太僕寺少卿改太常華亭當國引先生自輔凡海內人物國家典故悉咨而後行由是士大夫欲求知華亭者無不輻輳其門先生謝之不得力求出以右僉都御史巡撫湖廣卒官先生以知識即性習為善者固此知識習為不善者亦此知識故曰惡亦不可不謂之性又曰剛柔氣也即性也剛有善者焉有不善者焉柔有善者焉有不善者焉善不善習也其剛柔則性也竊以為氣即性也偏於剛偏於柔則是氣之過不及也其無過不及之處方是性所謂中也周子曰性者剛柔善惡中而已矣氣之流行不能無過不及而往而必返其中體未嘗不在如天之亢陽過矣然而必返於陰天之恆雨不及矣然而必返於晴向若一往不返成何造化乎人性雖偏於剛柔其偏剛之處未嘗忘柔其偏柔之處未嘗忘剛即是中體若以過不及之氣便謂之性則聖賢單言氣足矣何必又添一性字留之為疑惑之府乎古今言性不明總坐程子惡亦不可不謂之性一語由是將孟子性善置之在疑信之間而荀揚之說紛紛起廢矣西堂日記古詩云百年三萬日有能全受三萬日者幾人哉童兒戲豫暗撇十年稍丱便習章句以至學校之比較棘闈之奔走又明去了二三十年中間有能用力於仁者能幾時哉夫子自衛反魯子夏年二十九子游年二十八曾子最少皆已卓然為儒就今觀之彼何人哉此何人哉今人登第大概三四十歲人方有一二知向學者古之學者先學而仕故兩得之今之學者既仕方學故兩失之然就三十登仕者言之若勖勵朝聞夕死之志學到五六十歲亦必稍别於流俗奈何志之不立恁地悠悠耶人者天地之心天地者人之本人才反本便知乾父坤母之義知天便是仁仁便能孝未有仁而不孝者若止言孝則未必有仁也人之愛父母也以其為身之本也乾坤與父母初無二本故曰事天如事親知得一本則虞舜曾參原無天人之别訂頑正欲發此又被解得分析今人說孝曷嘗知有本來只是從幼見人親愛父母也去親愛父母豈有徹上徹下之道便做得成時祇到得薛包王祥更無進步所謂可使由之者也孔子曰思事親不可以不知人思知人不可以不知天說仁孝者莫辨於此古初生民大較與天相近堯非親桀非疏人之不能分天猶魚之不能離水也故動必本天言必稱天非以下合上之意中古聖人替以道字本欲易曉後人却只枉道上求便覺與天稍隔一塵沒世并道字不識支離殽雜日日戴皇天履后土不知天地在於何處所以人小而天大遂謂禮樂為顯鬼神為幽肝肺為內耳目為外几席為近燕貊為遠詩云文王陟降在帝左右是在何處人之一身即理也深愛己者須先識己識得在己何暇奉人今人為不善欲害人為穿窬非本心也以為不如是不足以取勝於鄉黨之間故為人而冒為之其為善者不忮不求亦非本心也以為不如是不足以酬士大夫之義故亦為人而强為之是善固為人而不善亦為人也孟子曰人役莊子曰諛人此輩是也率性之理有何光景有何聲采天下之至淡在焉今人只為世情束縳不能埋頭反己理會性分只是揀題選事供奉他人耳目竟與自家無干孔子曰君子求諸己小人求諸人性無善不善所謂人生而靜也程子曰人生而靜以上不容說性張子曰性未成則善惡溷是也其有善者是繼之者也所謂元者善之長無對者也性體空洞何嘗有孝弟來孝弟者善之有徵而易見者耳孩提之童無不知愛其親者知善也非知孝也有知則有善無知則無善也是習之初也由是而稍長而有妻子而慕父母是習於善以保其善也由是而慕少艾慕妻子以懟父母是習於不善以喪其善也其習為善者固此知識其習為不善者亦此知識知識即性也故曰惡亦不可不謂之性民可使由之順帝之則也不可使知之不識不知也民用智則不能由聖人以人治人用智則鑿矣夫人安之難起之易聖人不使知之安之也老子曰道非明民將以愚之是以知為明之也古之學者必有宗學無宗則無以一道德孔子既沒此時當立宗子夏子游子張欲事有若正此意也時年長莫如子貢學醇莫如曾子然子貢又獨居三年曾子年最少惟有若年亞子貢而學亦大醇故門人多宗焉使曾子稍能推之則宗立矣七十子之徒朝夕相依各陳孔子之業則微言豈易絶哉惟失此舉其後子夏居魏子張居陳子貢居齊漫無統一闕里散後諸賢再無麗澤之資西河之人疑子夏為夫子而荀況莊周吳起田子方之徒皆學於孔子而自為偏見惟其無以就正之耳漢時五經師𫝊最盛有數百年之宗彼經術耳且以有宗而傳我孔氏之道德再傳而失之者宗之散也余觀有若言行如魯論檀弓所載者最為近道其論夫子出類處比之宰我子貢以聞見品題者自别故家語有古道之目左傳有稷門之望其沒也魯悼公弔之魯論一書出其門人所記為萬世凖繩後世只為四科無名又被史記說得鄙陋而孝弟行仁之義記者之詞不逹其意遂與伊川象山有異同之說不得列於十哲今躋子張而絀有若於東廡反居原憲南容之下豈禮也哉必有能正之者周公不之魯次子世為周公於畿內共和是也周之周召世為三公猶魯之三桓世為卿也故曰季氏富於周公非謂文公旦也異哉公父文伯之母也文伯之喪其妻哭之哀母以為子之好內也而責之子之好內以訓其生則可也若夫沒而哭禮也蓋穆伯之喪穆姜以有禮稱然而皆枝葉也居夫之喪而往來於季康子之家嘵嘵辨論忘己之失而撓婦之得檀弓國語皆喜稱之豈草蟲卷耳之義相君孟姜之節為非禮乎且曰朝哭穆伯後哭文伯以為有不夜哭之禮夫寡婦不夜哭以男子之殯必於正寢夜行不便故輟以待旦非如漢人所謂避牀第之嫌也古者哀至則哭何朝暮之有枝葉如此本根之撥可窺矣鄉飲酒為賓興而舉雖曰鄉飲實王朝之禮也故其樂歌先王事後家事始歌四牡皇皇者華鹿鳴臣道也次南陔白華華黍子道也次間魚麗由庚嘉魚崇丘南山由儀自臣道而推之治國之事也次合關睢葛覃卷耳鵲巢采蘋采繁自子道而推之齊家之事也至於鄉射則州長所以演其鄉子弟而未及於王事止歌關睢以下而已蓋臣子之筮仕必有先公後私之心然後有事可做此聖人之意也江河亦土也得水以名未嘗有水水流相禪一瞬不居非江河之有也人見江河之多水而孰知非其有哉惟其不有是以能生負舟充查蕃魚長龍為世之需池沼者有其水者也故留之水性不遂而生道息故曰江河競注而不流生之謂性性即氣也言氣則不必言性伊川曰論性不論氣不僃是二性也剛柔氣也即性也剛有善者焉有不善者焉柔有善者焉有不善者焉皆性也試以不善者言之剛之惡必為强梁而不為陰忮柔之惡必為陰忮而不為强梁陰忮者習也其不能互為者以其根於性也使其人一旦幡然焉則剛者必為爽闓而不能為縝密柔者必為縝密而不能為爽闓是亦性矣故曰善惡皆天理也三代而上體統正論議明不惟君子有所用雖小人亦有用性非瓦礫雖小人亦有寸長可用上有主張之者則亦掩庇其醜以技奉上之欲今之星卜醫巫皆出羲農豈其自為之算五行嘗百草哉亦衆人之能也後世則不然不惟君子無以展布雖小人亦無以展布彼小人者雖無恁大見識就其所藴亦必平生之志欲有立於天下但秕政之朝蹊徑不一內以彌縫婦寺之間外以揣摩人主之隱精神心術竭盡於此以博其富貴榮寵之私幾時能展布宿心之一二人見李林甫在位十九年以為志無不行不知幾時行得一事蓋其精力機巧能使祿山懾服假使得用其才亦足以制范陽之命然其心方內蠱君欲外亢楊釗晝夜之力窮於蹊徑何嘗得少用其才嗚呼鼓舞作用之人才非聖人其孰能之人畜羊豕豺虎善惡至明矣其所謂善惡抑物之情耶人之情耶羊豕以其利於己也而愛之豺虎以其害於己也而憎之非天之生物果有所擇也天之賦物惟有生理騶虞之不殺豺虎之食人總是率性於人有何恩怨但鳥獸不可與同羣為人計者惟遠之而已周公驅猛獸程子放蠍皆不殺之此處須理會天之生人生物是生理也其為人為羊豕為豺虎是各正性命也豺虎而不吞噬則何以為生哉且人之畜羊豕也豈惟愛之亦噬之而已矣佛戒殺聖人不戒殺此處難著愛憎字或曰人之食鳥獸也亦大之噬小與余曰大豈能噬小鼠之食肉鳥之啄牛蠅蚋之食人豈盡噬小哉此理相循無端人不能泥泥則無易矣方長不折非止愛物只是養仁不獨賢者有此心也今人見折花捋蕊便自不忍及斬刈合抱就以為當然了無顧惜其不忍之心沒於見材之可用也有欲故也惟有欲便不能充明儒學案卷二十七
