body:
  text: 明儒學案卷五十二餘姚黃宗羲撰諸儒學案中六文定張甬川先生邦竒張邦竒字常甫號甬川浙之鄞人也𢎞治中舉進士高第改庶吉士授翰林檢討逆瑾竊政先生著張騫乘槎賦以瑾喻西域騫喻附瑾者乞便地以養親出為湖廣提學副使尋乞致仕嘉靖初起提學歷四川福建召還為春坊庶子國子祭酒南吏部右侍郎丁外艱終喪起吏部右侍郎轉左時太宰汪鋐與霍兀崖相訐先生以和衷解之不得因不欲居要地乃徙翰林學士掌院事又加太子賓客掌詹事府事升禮部尚書以母老上書乞骸骨弗允改南京吏部以便養又改南兵部而卒甲辰歲也年六十一贈太子太保諡文定陽明贈先生序云古之君子有所不知而後能知後之君子惟無所不知是以容有不知也則先生當日固泛濫於詞章之學者也後來知為己之功以涵養為事其受陽明之益多矣謂載道之文始於六畫大備於周程朱子之書莫非是道之生生而不已也由博文之學將遡流而求源舍周程朱子之書焉適哉今之為異論者直欲糟粕六經屏程朱諸子之說置而不用猶欲其通而窒之竅也所謂異論者指陽明而言也夫窮經者窮其理也世人之窮經守一先生之言未嘗㑹通之以理則所窮者一先生之言耳因陽明於一先生之言有所出入便謂其糟粕六經不亦寃乎此先生為時論所陷也語要凡物交於前有所溺之謂放無所溺而勿之省也滯其情於物焉之謂放無所滯尸居如也而不知其所如之謂放心放矣孰求之曰心求之心求之者非人有二心心有二用也夫心至明而至剛固足以自求自復而不假乎其他也求放心者非有所索而取之也察之而已矣非有所追而獲之也斂之而已矣於其然不自知者惕然自省之而已矣於是收斂於至密之地而兢畏以持之不使一毫外物得容乎其中是之謂一而不二孰非其至明至剛自求而自復哉易曰不逺復孔子以顔子當之曰有不善未嘗不知知之未嘗復行也明剛之至也故夫不精則不免於放不一則不免於放而莊周乃曰罔象可以得之夫罔象所以失之耳求放心說大學言心以無所忿喜憂懼謂之正中庸言性以喜怒哀樂未發謂之中此心法也心之發動者意也視聽飲食者身也正心之功非屬於意非屬於身者也事物未交恂栗而已凝然中居而萬誘不敢干也忿喜憂懼一無所有而吾心之本體翼如也易曰艮其背曰介于石曰寂然不動曰退藏于密皆心之義也後之儒者以靜歸佛以虛歸老譬則舉家珍而委之地也言及靜虛則以為疑於老佛而避之譬則舉家珍為人所竊欲復之而以為嫌於盜也瞬目而不敢一盻豈不悲乎吾何敢言知乎哉至神者天也至明者人也至微者心也吾皆未得而知之夫天之道明善天下而無視聰善天下而無聽是故天之道微顯而闡幽非微顯而闡幽也天於天下無顯無幽也有聲天聞之矣無聲天聞之矣有形天見之矣無形天見之矣其何顯微之間之有人之限於耳目者自其所不見聞而謂之幽天惡其若此也故從而闡之而微之斯其損益盈虛之理也何謂至明者人曰其以耳目見聞者愚人也達者之見聞則同乎天矣是故是非善惡愚者疑而達者覺矣覺者辨而疑者釋矣疑者釋而天下皆覺矣是故天下之事久而無不定何謂至微者心曰慮萌乎中非至精者弗察也弗察則不能知吾心不能知吾心則不能知人不能知人則不能以知天不知天則不知所以畏天不知人則不知所以畏人不知心則不知所以畏心心吾之心也而畏之猶未也况又不知所以畏吾何敢不知乎哉顔氏之子有不善未嘗不知其自知若是之明也唯孔子知之曰其心三月不違仁其知人若是之微也古之君子曷為其無不知若此知逺之近也知風之自也知微之顯也是知之始也及其至也質諸鬼神而無疑百世以俟聖人而不惑答陽明中庸一書子思反復推明許多道理只說得不知不愠四字觀其由尚絅之心推而至於無聲無臭可見矣而其要只在於時習而不已便可到純亦不已至誠無息事也宋儒苦仁之難識悉録論語所言仁者時誦而思之然或以公言仁或以愛言仁或以覺言仁雖各見其一隅亦足以互相發也孝弟為仁之本孝弟立而仁道自生蓋親親而仁民仁民而愛物一以貫之者也且以公言之父母兄弟之間或不免於形骸之隔甚則至於好貨財私妻子則至近且不能公而况能擴其民胞物與之心乎以愛言之父母兄弟之間或未能致其親親之情甚則至於一言不合怨懟生焉則至近且不能愛而况能以一身體天下之休戚乎以覺言之父母兄弟之間或未能盡其察識之心甚則至於私欲固蔽如槁木頑石疴癢疾痛漠然若不相關而况能於天下之怨愁呻吟之聲感之即應觸之即動乎是為仁之根不能立於至近之地其道何由而充大也物理自然人不得以一毫私智容乎其間易曰易簡中庸曰篤恭周子曰誠無為皆是此意象先云天下本無事庸人自擾之私智是也行者酬酢克中人心行將去更無違拂之謂然不可求之於人但當反之於已言行者君子立世之樞機也一言或不忠信便起人疑一行或不篤敬便起人慢疑我慢我怎生行得去蓋人之見信由我之自信也人之見敬由我之自敬也行有不得者皆當反求諸已而已矣人之心志得於天者本自精明本自純粹何有疚病但鄙詐之念一萌即乖戾之私戕其和粹之氣便有疚病既有疚病則必歉焉而不自安恧焉而畏人知便是有惡於志天地之間雨晹寒燠少乖於度則災沴見人之身榮衛脈理少失其平則疾疢作是故剛柔緩急或過而行必疚焉寬猛弛張稍愆而物必病篤夫是以有執中之允而後有協和之績故曰中也者和也中節也天下之達道也夫所謂達道者萬化不中不行萬物不中不生萬事不中不成禮不立則樂不興易之道可一言而盡也中焉止矣襄惠張淨峯先生嶽張嶽字維喬號淨峯福之惠安人正德丁丑進士授行人邸寓僧舍與陳琛林希元閉户讀書出則徒步走市中時稱泉州三狂武宗寢疾豹房上書請內閣九卿輪直嘗藥不報已諌南巡罰跪五日杖闕下謫官世宗即位復行人歷南武選員外祠祭主客郎中出為廣西提學僉事調江西尋謫廣東提舉先生為郎時上議禘祭推求所自出之帝中允廖道南議禘顓頊永嘉議禘德祖貴溪謂德祖在大祫已為始祖不宜又為始祖之所自出當設虛位南向而以太祖配享第未知虛位之書法宗伯李時以問先生先生請書皇初祖位議上而上從之永嘉因忌而出之外又坐以選貢非其人謫之轉守廉州時方有征交之議亷相隔一水先生言其六不可上遣毛伯溫視師先生以撫處之策語伯溫伯溫既用其言交人莫登庸亦信向先生事未畢而升浙江提學副使參政登庸將降問亷州太守安在於是以原官分守欽亷始受其降擢右僉都御史撫治鄖陽轉江西巡撫以副都御史督撫兩廣討封川賊平之加兵部右侍郎再征桞州破其巢又平連山賀縣諸賊召為兵部左侍郎升右都御史掌院事先生在邉不通相府一幣故不為分宜所喜湖廣苖亂初設總督以先生當之至則斬捕略盡宣慰冉元隂為苖主苖平懼誅乃嗾龍許保吳黑苖掠恩州行金嚴世蕃使罷先生華亭執不可止降兵部侍郎已而生擒龍許保而黑苖尚匿元所先生劾元發其通賄事世蕃益怒然而無以難也未幾黑苖就擒三省庶定先生亦卒復右都御史贈太子少保諡襄惠先生曾謁陽明於紹興與語多不契陽明謂公只為舊說纒繞非全放下終難湊泊先生終執先入之言往往攻擊良知其言學者只是一味篤實向裏用功此心之外更無他事是矣而又曰若只守個虛靈之識而理不明義不精必有誤氣質做性人欲做天理矣不知理義只在虛靈之內以虛靈為未足而别尋理義分明是義外也學問思辨行正是虛靈用處舍學問思辨行亦無以為虛靈矣論學書良知之言發於孟子而陽明先生述之謂孝弟之外無良知前無是言也殆雙江以其心所獨得者創言之於愚心不能無疑亦嘗面質雙江矣尚未盡也子思之言曰天命之謂性率性之謂道修道之謂教而又申之喜怒哀樂之未發謂之中發而皆中節謂之和夫以性道之廣矣大矣無不備也而指其親切下手處示人不越乎喜怒哀樂已發未發之間所謂戒懼者戒懼乎此而已所謂謹獨者謹獨乎此而已至孟子又發出四端之㫖而特舉夫赤子入井呼爾蹴爾睨視顙泚以驗良心之不容泯滅者亦可謂深切痛快無餘藴矣學者只依此本子做去自有無限工夫無限道理固不必别尋一二字以籠絡遮蓋之也明德新民之說往歲謁陽明先生於紹興如知行博約精一等語俱䝉開示反之愚心尚未釋然最後先生忽語曰古人只是一個學問至如明明德之功只在親民後人分為兩事亦失之爽然請問先生曰民字通乎上下而言欲明孝之德必親吾之父欲明忠之德必親吾之君欲明弟之德必親吾之長親民工夫做得透徹則已之德自明非親民之外别有一段明德工夫也嶽又起請曰如此則學者固有身不與物接時節如戒慎乎其所不覩恐懼乎其所不聞相在爾室尚不愧於屋漏又如禮記九容之類皆在吾身不可須臾離者不待親民而此功已先用矣先生謂明德功夫只在親民不能無疑先生曰是數節雖不待親民時已有此然其實所以為親民之本者在是嶽又請曰不知學者當其不睹不聞之必戒謹恐懼屋漏之必不愧於天手容之必恭足容之必重頭容之必直等事是著實見得自己分上道理合是如此工夫合當如此則所以反求諸身者極於幽顯微細而不敢有毫髮之曠闕焉是皆自明已德之事非為欲親民而先此以為之本也如其欲親民而先此以為之本則是一心兩用所以反身者必不誠切矣故事父而孝事君而忠事長而弟此皆自明已德之事也必至已孝矣忠矣弟矣而推之以教家國天下之為人子為人臣為人弟者莫不然矣然後為新民之事已德有一毫未明固不可推以新民茍新民工夫有毫髮未盡是亦自己分上自有缺缺故必皆止於至善而後謂之大學之道非謂明德工夫只在新民必如老先生之言則遺却未與民親時節一段工夫又須言所以為親民之本以補之但見﨑嶇費力聖賢平易教人之意恐不如是也先生再三諄誨曰此處切要尋思公只為舊說纒繞耳非全放下終難湊泊夫以陽明先生之高明特達天下所共信服者嶽之淺陋豈敢致疑於說顧以心之所不安者又次為書於名公而不明辨以求通焉則為蔽也滋甚矣與郭淺齊格物之說古人屢言之及陽明而益詳然鄙滯終不能釋然者蓋古人學問只就日用行事上實下功夫所謂物格者只事理交接念慮發動處便就辨别公私義利使纖悉曲折昭晰明白足以自信不疑然後意可得而誠心可得而正不然一念私見橫據於中縱使發得十分懇到如適越北轅愈騖愈逺自古許多好姿質志向甚正只為擇義不精以陷於過差而不自知者有矣如楊墨釋氏豈有邪心哉其流至於無父無君此其病根所在不可不深究也來教云格物者克去巳私以求復乎心之體也嶽為一部大學皆是欲人克去已私以求復乎心之體也但必先辨乎公私之所在然後有以克而復之此其節級相承脈絡相因吾學所謂近裏切實異於異教之張皇作用者只這些子且如讀書講明義理亦是吾心下元有此理知識一時未開須讀古人書以開之然必急其當讀沉潛反覆使其滋味浹洽不但理明即此就是存養之功與俗學之支離浮誕者全不同豈有使之舍切已工夫而終日勞於天文地理與夫名物度數以為知哉無是事也數年來朋友見教者甚多終是胸中舊根卒難掃除而私心習之既久又不忍遽除之也與聶雙江書下二條同今之論文章者必曰秦漢蓋以近時之軟熟餖飣為可厭也講讀者必曰自得亦以傳注之拘滯支離學之未必有得也夫真能以秦漢之文發其胸臆獨得之見洋洋乎通篇纍牘而於根本淵源之地未必實有得焉君子未敢以作者歸之也况所謂秦漢者乃不出晚末之尖新稍有異於今之軟熟者爾實亦無以異也暗鬱而不章煩復而無體奔走學者於譎誕險薄之域反不若淺近平易猶得全其未盡之巧之為愈也秦漢之文見於班馬氏所載多矣其深厚醇雅之氣明白正大之體曾有一言一事譎誕乎哉今之自託為秦漢者恐未必於班馬之書有得也有得於中則其發也必不掩矣乃欲厚自與而疑學者其亦可悲也夫自得之言出於孟子其意亦曰漸漬積纍自然有得爾夫豈必於排擯舊說直任胸臆所裁而謂之自得哉三代而下數聖人之經秦火之後人自為說至程朱始明矣雖其言或淺或深或詳或略然聖人遺意往往而在學者不讀之則已如其讀之也豈可不深造而致其詳詳讀古人之書而有得其淺深詳略之所存意有未安姑出已見為之說期於明是理以養心而已矣不在創意立說以駭人耳目也有是心而言又未或當其自蔽也甚矣嗚呼學之不講久矣文章議論古人講學不以為先也今也窮日力以從事於此猶不得其要領况其逺且大者乎此類得失本無足辨然場屋去取學者趨向繫焉新學小生心目謭薄一旦驟見此等議論必以為京師好尚皆如此其弊將至詭經叛聖大為心術之害有不可不深憂而豫防者故一伸其拳拳之喙出院習禮蓋將使學者知舉業之外有此一段本領工夫若於此信得及做得是日積月纍滋味深長外面許多淺俗見解自然漸覺輕小矣此學不講已久今聚八郡之士終日羣居若不就日用最親切處指示下手工夫使之有所持循據守以交相勸勉漸次有得而但務為渾淪籠統之語以詔之則恐聽者未悉吾意其材質高者未必實用其力先已啓其好高助長之心其下者又隨語生解借存養之目以為談說之資此其病痛面目證候雖與俗學不同而其根於心術隱微反有甚焉者不可不察也昔夫子之教以求仁為先仁即心也心即理也此心所存莫非天理默而成之而仁不可勝用矣此數言者以夫子之聖七十子之賢提耳而教之可以不終食而頓悟者而夫子則不然也顔淵問仁告之以克已復禮而其目在視聽言動仲弓問仁告之以出門如見大賓使民如承大祭已所不欲勿施於人樊遲問仁告之以居處恭執事敬與人忠司馬牛問仁告之以其言也訒而已顔子所問者仲弓不得而與聞也仲弓所問者樊遲不得而與聞也至樊遲所問者司馬牛又不得而與聞也聖門之教因人成就如此其曰視聽言動曰出門使民曰居處執事與人皆就日用最親切處指示人下手工夫故曰勿視勿聽勿言勿動曰恭曰敬曰忠曰訒真如漢廷之法較若畫一使人即此目下便有持循據守才質高者不得躐此而不及者亦可以企此以有為所謂非僻之心惰慢之氣自將日銷月化於冥冥之中而不自覺此所謂聖門之學也無他只是有此實事實功而已矣夫豈在别尋一個渾淪之體以為貫內外徹幽顯合天人使人愛慕玩弄而後謂之心學也哉且就講禮一節言之如士相見冠昏鄉射飲酒之禮之類不講之則已如欲學者之講之也則不但告之曰禮者理也理者性也性者心也心存則性存而禮在其中矣必使治其文也習其節也而又求之其義也則必據經傳質師友而反求於心然後有以得其節文意義之不可茍者而敬從之夫然後謂之善學顧其中間自始至終皆以實欲行禮之心主之為有異於剽竊徇外以欺人者爾易曰同歸而殊途百慮而一致此言理本自然人不可私意求之爾既曰殊途曰百慮不可謂全無分别也故心也性也天也一理也然至論心自是心性自是性天自是天如人之父子祖孫本同一氣豈可便以子為父而祖為孫哉昔之失之者既以辨析太精而離之使異今欲矯其失必欲紐揑附會而强之使同可謂均亡其羊矣不如且釋同異之論令學者且就日用切已實下功夫如讀書不必泛觀博覽先將學庸語孟端坐叠足澄心易氣字字句句反覆涵泳務使意思昭晰滋味泛溢反之吾心實有與之相契合處如習禮則冠射相見等用之有時口識其節文大義亦當必求其所謂不可須臾去身者如曲禮少儀玉藻中所記動容威儀之節逐條掇出相與講明而服行之坐時行時立時拜跪時獨處時至應事接物時提掇精神常常照管使其容色無時而不莊敬動作無事而不節守少有放肆失禮則朋友又得指其失而針規之如是雖於學問之淵源統紀未能深造然就此著實規矩安頓身心資質高者能自循此上達其下者亦有以養其端慤醇篤之性不至於道聽塗說揣度作用重為本體之害矣所喻物則云云此是文公教人下手窮理工夫十分親切處真能見得事事物物上各有義理精微不差則所謂人心道心氣質天性亦各有著落以為省察存養之端今之學者差處正是認物為理以人心為道心以氣質為天性生心發事縱橫作用而以良知二字飾之此所以人欲橫流其禍不減於洪水猛獸者此也若老釋外事物以求理其學雖差要於虛空中實有所見豈若今人之恫疑虛喝其高者入於奸雄以下殆類俳優此風不息不知將何止極也與黃泰泉為學之道以心地為本若真見所謂心者而存養之則其本體固自正然非體察精密義理明晰有以備天下之故於寂然不動之中而曰心得其正者未之有也近時不察乎此紐揑附會恫疑虛喝既不知有義理工夫之實而亦安識所謂心體也哉其團合知行混誠正於修齊治平而以心字籠罩之皆謾為大言者也嶽之疑此久矣朋友間一二有志者皆相率而入於此無可與開口者又恐徒為論辨而未必有益故於門下每傾心焉又思近時所以合知行於一者若曰必行之至然後為真知此語出於前輩自是無弊其曰知之真切處即是行此分明是以知為行其弊將使人張皇其虛空見解不復知有踐履凡精神之所運用機械之所橫發不論是非可否皆自謂本心天理而居之不疑其相唱和而為此者皆氣力足以濟邪說者也則亦何所不至哉此事自關世運不但講論之異同而已答張甬川草堂學則古之教者家有孰黨有庠術有序國有學其所以立教之法則內自一心以至身之動作威儀莫不各有其養焉聖賢教人之目多矣未有不先得於此而能進乎其餘者也後世家孰之法既壞父兄所以教子弟者不過責以記覽之富綴述之工以為足以應有司之求則亦已矣然學者材質不同亦有終身不得至者焉方且仡仡焉為之不厭若反其本而責之身心之間則其心固能思耳目口鼻四肢固能視聽而運動特因其思而使之存之因其視聽運動而約之使入規矩非有品節分限不可必至者學者顧乃為彼而不為此其亦無以是語之而弗思耶今故掇取孟子所論存養之功與夫動作威儀之則見於曲禮少儀諸篇尤近而易守者數條列於草堂北壁使諸弟子輩朝夕觀誦深體而服行之雖其規模條理不若古人廣大詳密然以存其良心伐其邪氣收斂端嚴培植深厚由是而讀書窮理以充拓其體應事接物以發揮諸用隨其材質分量之所及以進之亦不患於無其本矣不知務此徒以記問綴述為事雖使聖賢訓典充腹盈紙猶不得謂之善學而况今人無用之空言邪嗚呼小子念之斯古人切已之實學也由此而學之則為君子背此而學之雖有學焉猶不學也亦陷於小人而已矣汝不欲為君子則已如其欲為君子舍是吾無以教汝矣念之哉孟子仁人心也章牛山之木章鈞是人也章養心寡欲章右存養之要凡四條仁者此心之本體也心而無仁則非心矣故孟子以人心目之然心之所以放者旦晝之為有以害之也旦晝之害莫甚於耳目之欲先立乎其大者不為耳目之欲所奪則心於是乎得所養矣故曰養心莫善於寡欲大抵孟子發此數章示人語意既明白而痛快工夫亦直截而易簡而其言之先後互相發明有不假訓說而自解者學者誠反覆玩味而有得乎其言焉則所謂立其大者所謂操存所謂求放心皆有以實用其力非強為揣度把捉以冀此心之或存矣記曰毋不敬儼若思安定辭安民哉人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備君子姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義君子之容舒遲見所尊者齊遫足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德與得通謂立則磬折如人授物豫己巳受得之形也色容莊坐如尸立如齊燕居告溫溫燕居謂和居告謂教使凡行容惕惕凡行謂道路也惕惕疾直貌立容辨卑無讇頭頸必中山立時行盛氣顛實揚休玉色辨讀為貶貶卑謂磬折也顛讀為闐揚讀為陽休讀為煦心無愧怍則氣盛不餒而常闐滿塞實如陽之蒸煦乎物也玉色謂溫潤不變凡視上於面則傲下於帶則憂傾則姦傾邪視也坐視膝立視足應對言語視面立視前六尺而大之古之君子必佩玉右徴角左宫羽趨以采齊行以肆夏周還中規折還中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也右佩陰也左佩陽也徴角宫羽謂玉聲所中也門外謂之趨門內謂之行齊當為薺采薺路門外之樂節肆夏登堂之樂節周還反行也宜圜折還曲行也宜方揖之謂小俯見於前也揚之謂小仰見於後也帷薄之外不趨堂上不趨執玉不趨堂上接武堂下布武室中不翔並坐不橫肱行而張足曰趨行而拱立曰翔武跡也中人之迹尺二寸接武謂每移足半躡之布武各自成迹不相躡也毋側聽毋噭應毋淫視毋怠荒遊毋倨立毋跛坐毋箕寢毋伏斂髮無髢冠毋免勞毋袒暑毋褰裳凡人宜正立不得傾欹側聽人之語噭謂響聲髙急如噭之號呼也淫視謂流移邪盻也跛偏任也伏覆也髢髮也謂埀餘髮也免去也褰祛也以上皆言其不敬也將上堂聲必揚將入門問孰存將入户視必下户外有二屨言聞則入言不聞則不入入户奉扃視瞻毋回戶開亦開户闔亦闔有後入者闔而勿遂毋踐履毋踖席摳衣趨隅必慎唯諾聲必揚至不入皆不欲千人之私也扃閉户外之木當入戶之時必兩手向扃而奉之今入户雖不奉扃以手對户若奉扃然言恭敬也開闔不以後來變先勿遂示不拒人踐踏也踖躐也趨猶向也隅角也既不踖席當兩手提裳之前徐徐向席之下角而升將即席容毋怍兩手摳衣去齊尺衣毋撥足毋蹶先生書策琴瑟在前坐而遷之戒勿越虛坐盡後食坐盡前坐必安執爾顔長者不及毋儳言正爾容聽必恭毋勦說毋雷同必則古昔稱先生此謂弟子請問之法衣裾之撥足之搖動皆失客也坐亦跪也虛位非飲食也盡後謙也盡前恐汙席也儳儳先也勦者取人之說以為說雷者聞人之說而和之則者有所依據也侍坐於先生先生問焉終則對請業則起請益則起父召無諾先生召無諾唯而起侍坐於所尊敬毋餘席見同等不起燭至起食至起上客起燭不見跋尊客之前不叱狗讓食不唾侍坐於君子君子缺伸撰杖屨視日蚤莫侍坐者請出矣侍坐於君子君子問更端則起而對侍坐於君子若有告者曰少間願有復也則左右屛而待執虛如執盈入虛如有人此執事將敬之功禮不踰節不侵侮不好狎不窺密不旁狎不道舊故不戲色毋拔來毋報往毋瀆神毋循往毋測未至毋訾衣服成器毋身質言語密隱處也不窺密嫌聞人之私也旁泛及也泛與人狎不恭敬也報讀為赴疾之赴拔赴皆疾訾猶計度也容經曰周頤正視平肩正背臂如抱鼓足間二寸端面攝纓端服整足體不搖肘曰經立因以微磬曰共立目以磬折曰肅立因以埀佩曰卑立立容也坐以經立之容肘不差而足不趺視平衡曰經坐微俯視尊者之膝曰共坐仰首視不出尋常之內曰肅坐廢首低肘曰卑坐坐容也行以微磬之容臂不搖掉肩不下上身似不則從然而任行容也趨以微磬之容飄然翼然肩狀若㳅古流字足如射箭趨容也旋以微磬之容其始動也穆如驚倐其因復也旄如濯絲跘旋之容也跪以微磬之容揄右而下進左而起手有抑揚各尊其紀跪容也拜以折磬之容吉事上左凶事上右隨前以舉項衡以下寧速無遲背項之狀如屋之元拜容也拜而未起伏容也若夫立而跛坐而蹁體怠懈志驕傲䟃視數顧容色不比動靜不以度妄咳唾疾言嗟氣不順皆禁也右威儀動作之節凡十七條古人自起居飲食事親敬長以至應事接物莫不各有其法然隨事著見應用有時惟動作威儀之節之在人身有不可以須臾離者故學者內既知所存心矣又必致謹乎此使一身之動咸中節文則心體之存乎內者益以純固矣此內外交相養之法惟實用其力漸見功效者然後有以深信其必然非空言所能喻也雜言上下四方曰宇往來古今曰宙此二句於先天圓圖求之上下四方以對待之體言所謂乾坤定上下之位坎離列左右之門也往古來今以流行之用言自震至乾易中謂之數往往者往古之謂也自㢲至坤易中謂之知來來者來今之謂也然則古之言宇宙者其義如此故曰天地設位而易行乎其中乾坤毁無以見易宇宙之義深矣邵子曰先天之學心學也陰陽消長之理吾心寂感之機妙哉妙哉胸中須是光光靜靜流動圓轉無一毫私意障礙方與天地合一萬事萬理只要就心上體驗心之體固該動靜而靜其本體也至靜之中而動之理具焉所謂體用一源者也先儒每教人主靜靜中須一個主始得心才定便覺清明須是靜時多動時少雖動也而心未嘗不靜焉方是長進喜怒哀樂未發時最好體驗見得天下之大本真個在此便須莊敬持養然必格物窮理以充之然後心體愈明應事接物毫髮不差若只守個虛靈之識而理不明義不精必有誤氣質做性人欲做天理矣此聖賢之教格物致知所以在誠正之先而小學之教又在格致之先也虛靈知覺則心也性則心之理也學者須先識性然後可以言存心不然只認昭昭虛靈者為性而不知自然之理此所以陷於作用之非而不自覺也黃後峯書室對誠自不妄語始學從求放心來凡學莫先辨其誠僞之分所謂誠者無他只是一味篤實向裏用功此心之外更無他事功夫專一積久自然成熟與夫鹵莽作輟務外自欺者大有間矣一念到時鬼神皆通聖賢千言萬語無他只教人求其放心而已心才收斂便覺定靜清明然後讀書講明義理方有頓放處既知此而猶以格物窮理在誠意之先何也心不放便是誠意若此心已先馳騖飛揚不能自制而血氣乘之以動乍盈乍怯乍作乍止凡百所為卒皆無成其患有不可究言者已聖賢所以教使人不失其本心而已平居暇日當操存體驗使此心之體常清明定靜至於講學窮理皆所以培養此心講學之功讀書為要而所讀之書又必先經後史熟讀精思掃去世俗無用之文不使一字入於胸中然後意味深逺義理浹洽而得益固矣客慮不必純是人欲凡泛思皆客慮也天下之理有精粗本末之殊吾身之應事接物亦有緩急先後之序要擇其最切已者而精思之漸次積纍久後心體自明應接自無礙矣若舍近思逺舍卑思髙非惟不得其理適所以汩亂其心體之真而深有害又不若不思之為愈也見處貴透徹行處貴著實知崇禮卑是聖賢教人為學緊關在一敬字至程朱發明之可謂極其親切矣今考其言既曰主一無適又必曰只整齊嚴肅則心便一一則自無非僻之干曰只動容貌整思慮則自然生敬曰未有貌箕倨而心敬者曰嚴威儼恪非敬之道但致敬須從此人蓋心體難存易放初學功夫茫然未有下手處只就此威儀容貌心體發用最親切處矜持收斂令其節節入於規矩則此心自無毫髮頃刻得以走作間斷不期存而無不存矣近時學者動言本原頭腦而忘夫檢身密切之功至其所謂頭腦者往往錯認别有一物流行活動可以把持玩弄為貫通萬事之實體其於敬之一字蓋有視若徽纆桎梏不肯一用功者不知許多道理皆凝聚於此舍此而别求本原頭腦其不為精神作用而流入於狂譎也者幾希自古聖賢教人不過使之致謹於言語動靜事親從兄隆師親友之間養其恭敬惻怛之心以為田地根本而時將聖賢言語反覆詳讀切已體認使其行著習察不昧所向而已初未有簡徑捷法可以直下頓悟亦未嘗使人安於支離淺陋如俗學之無用也百物所需皆天理也只不可分一片心去那上頭計較人之一心所藴畜關係者何事而令此區區者役使不得少休哀哉凡事物未至而先立個心以預待之此便是逆詐鮮有不差者故心不可以無主尤不可以有私主天理自然何容私之有須是虛心以待事物之來敬便一一便虛有時心不如此而發言之際不覺如此者是此心不宰而氣反挾之以動也凡與人議動務要色和詞暢非臨時可勉强大抵養定者色自和理定者詞自暢義理雖是而誠意未著亦未能動人莊裕徐養齊先生問徐問字用中號養齊常之武進人𢎞治壬戍進士除廣平推官召為刑部主事歷車駕郎中出知登州調臨江二州多盜擒獲略盡築江堤七十二處以才略見稱積官至廣東布政司以右副都御史巡撫貴州平䝉銊之亂召用兵部侍郎謝病歸起南京禮部進户部尚書卒贈太子少保諡莊裕先生為舊論纒繞故於存養省察居敬窮理直內方外知行無不析之為二矣其讀書劄說第二册單闢陽明廣中黃才伯促而成之嗚呼其何損於陽明哉讀書劄記孟子茅塞之論深切學者病痛天理良心虛明自在坦然平道若大路然人心一動七情交雜遂棼如也充塞既久些子虛明透露不出與茅塞何異則所發動流行皆為形氣物欲所使真無别於禽獸矣極力芟夷開除荆棘以還大路學者宜自勉哉閒思妄想客感得以乘隙而入病在中養不固而門户濶踈斜徑滑習耳其原又在好善惡惡未能真切故坐悠悠養成此患而不自知也若欲去之其幾只要誠意誠意即慎獨慎獨即是敬端居無事時且不要留心世事遇不平有動於中則失了自家中和氣象此君子所以思不出其位也人為心害者不獨富貴飲食男女之欲凡山水書畫古今事蹟與夫將迎顧慮往來於懷未能遣去其為害一也大抵廣大寬裕盡置外境而休心自如方見本性草木有氣質而無知鳥獸有知而無覺覺乃聰明頴悟處知其當然之理幾微畢見者也故伊尹以先覺自任而孔子亦以先覺為賢可見若但知飲食男女富貴求遂其欲而不覺其當然則孟子所謂無是非之心非人也萬物形於有而生乎無成於實而本乎虛故制器者尚其象崇其虛所以制用也人之於物也耳遇之而成聲目遇之而成色雖聖賢猶夫人之耳目也其所默會心通窮神知化固不在於形聲也詩無聲無臭蓋言形而上之道天德至矣近世言大學格物義議論尤多或以格為正如孟子格君心之非之格正與非對下云一正君而國定彼以為正是也此於正物無意義或以為如云正是義正當也又於物字不照應或以為格者揆正之也格物知本也如孟子言權然後知輕重度然後知長短又如大學潔矩之義且謂朱注以格物而謂之窮理古未之聞也如此言意雖近而於本文義恐未盡會通終有支節窒礙處愚觀書􅐌堯敬德之光曰格於上下舜典言巡狩至於北嶽歸格於文祖又禹征有苖三旬逆命舜乃誕敷文德舞干羽於兩階七旬有苖格詩言魯矦允文允武昭假烈祖皆有誠意感通之義夫我格人人之格我皆以理通其實一也朱注謂窮至事物之理與易知至至之義同本亦無害但於感通之義稍殊故至後議日紛如也易曰寂然不動感而遂通天下之故彼固聖人之事而學未有不由是而得也原格字義本扞格有未通求通之義猶古治為亂以治亂而曰亂也蓋萬事萬物盈於宇宙而備於人原於天而具於吾之心惟於氣禀物欲或有偏蔽杆格故於明處無由可通只以吾心當然之理精思熟玩引伸觸類條暢旁通易所謂精義入神觀其會通是也如是則向之齟齬扞格於吾前者皆將渙然冰釋怡然理順活潑潑然而來種種皆化物物皆理萬物皆歸一太極也知豈有不致意豈有不誠者乎非禮勿言之訓程子之針確矣大抵中守義理自不至於妄言言行相顧自不敢為多言况有悖入興戎損氣之為害哉抑嘗驗之人有喜怒意向則其言易乘之而出故制情乃所以謹言也為學作事忌求近功一求近功則自畫氣阻淵源莫極楊墨告子之徒霸者之功業是也聖人無近功故至誠無息孔子不知老之將至若顔子未見其止孟子深造之以道是不求近功法則參前倚衡而勿忘勿助諸篇則又其步級也程子論易生之謂性人生而靜以上不容說蓋謂天命流行而生人物始有性人生而靜道理藴而未感故為天之性感於物而動為性之欲欲即喜怒哀樂之情也若以靜推而上之則為造化未形時只是一團氣涵理在故不可言性言性即墮形氣中非復性之本體矣孟子謂存心養性四字精密二事雖開說而義實相因性本天賦仁義禮智信純粹真實的道理而寓於心有感而情動隨物而遷心有存焉者寡矣心既不存則人欲日長天理日消故存心所以養性養性所以奉若乎天之所以與我之理即子思子所謂尊德性易所謂成性存存是也良心既存物不擾動大學之有定易之艮其背不獲其身也定而虛虛而明一真自如中庸之謂中大學之謂靜易敬以直內也由感而動出皆當理易動以天為無妄中庸之謂和也由是仁之於父子義之於君臣五常百行及於仁民愛物而萬物各得其所孔子所謂一以貫之也故存心養性工夫其效甚大性字訓義心生以人心具此生理而實不外乎氣也程子以為性出於天才出於氣然才亦根於性之理必於氣以發之故高辛子八元之才忠肅恭懿宣慈惠和蓋以德性用事是何等才也若專以氣用事則暗於理義為剛愎狠戾而非所謂禀受之才矣孟子所謂非天之降才爾殊言不能盡其才者也可見明道答橫渠定性書大意動靜皆定不留將迎不係內外此性所以恆定也次言無情者定之本順應者定之用既無情順應自不須除外誘除則增一套事易所謂至賾而不可惡也引易艮止為內定孟語不鑿為外定故兩忘無事靜而明通如聖人順應喜怒之當在於物而中無所繫也後言忘怒觀理乃學者求定工夫而用力之要莫切於此或謂人心本無靜氣化流行亦無靜時愚觀易繫辭曰夫乾其靜也專其動也直是以大生焉又曰寂然不動感而遂通天下之故蓋非靜無翕其動非動無闢其靜乾為至健而有動靜故曰人生而靜天之性也以為無靜非也人心存養不厚則德不聚出皆支離未能順理易以尺蠖之屈龍蛇之蟄皆自外而內退藏於密之事下言精義入神窮理入於微妙如中庸之盡精微乃為致用之本利用安身順而利往如易義以方外乃為崇德之資此正是內外交相養之道蘇季明問喜怒哀樂未發前求中程子曰不可求求即是思思即已發不可謂之中也又問吕學士言當求之於喜怒哀樂之前何如曰不可既有知覺却是動也怎生言靜後來羅豫章師龜山李延平師豫章皆以靜坐觀喜怒哀樂未發前氣象為何如而求所謂中者想其觀字亦如言聖人之能反觀非費思求索之謂必有默會自得處孟子言平旦好惡雖是動亦於本心未梏之際觀之學者於此二者交用其功則天理常存善端呈見日用動靜蓋有渾合自得而不自知矣易無妄心有天人兩端而已天理渾然處自有泛應端緒出來無思無為所謂道心也若感物而動為性之欲既言物涉便有計較安排雖善惡不同均為人心也道心動皆天理真實故為旡妄人心稍涉計較安排雖善亦妄矣察則决之之方敬則守之之法也程子謂艮其止止其所也人多不能止各因其心之所重者更互而出愚謂如人欲立功業便有功業事出來欲求名譽便有名譽事出來至於出處顯晦皆然心遂事亂也聖人不逐事故出處久速皆止其所矣何動之有世俗上下相接之間一套儀文皆所謂非禮之禮矣蓋其中無主只管從時徇俗又為利害誘奪不能自信隨氣盈歉遂以成習所以中間尋不出真實辭讓禮來程子謂人心不可二用用於一事則他事不能入者事為之主也若主於敬又焉有紛擾之患乎主一之謂敬無適之謂一且欲涵泳主一之義不一則二三矣至於不敢欺不敢慢尚不愧於屋漏皆敬之事矣主一無適之謂敬學者涵泳其義泥為專主故好事者從而議之若與六經所載敬義迥别蓋道心本純一不雜中無妄動則不岐雜於二三心要在腔子裏畏懼收斂則不逐逐於物欲故無妄動斯一矣有畏懼斯不妄適矣人所以易動而恆不得制其欲者只緣無有畏心能內尊天命之性而不敢放失外懼物欲之患而先意防間則敬自從此起矣敬則私欲退聽而天理之心常存是謂涵養涵養之義如程子所謂菜子中許多生意只須培壅澆灌方才得成所以成之者敬也故兢兢業業小心翼翼嚴恭寅畏克自抑畏瑟兮僴兮與戒慎恐懼同是一個意學者要以畏為主畏字有分別常人之畏只是畏事便差千里孔子答子張問行以言忠信行篤敬蓋忠敬本心上工夫而欲於言行上求之恐其僞為於外而不由夫心之實也如告顔子克已復禮為仁而其目乃在於視聽言動蓋心本無私恐為物欲牽引而蔽之也故須以志克制如戰而勝人欲負而退聽所以全夫中之理也意亦略同忠信篤敬則言行自出於本心學者知心上公私便知事上有義利張南軒許魯齊謂學莫先乎義利之辨比之程朱論學已是第二件工夫然於世態沈冥中要識此便能卓然有立朱子答張南軒書曰以天理觀之動之不能無靜猶靜之不能無動也靜之不能無養猶動之不可不察也但見得一動一靜互為其根敬義夾持不容間斷則雖下靜字無非此物至靜之中蓋有動之端焉是所以見天地之心者先王以至日閉關安靜以養乎此耳固非逺事絶物閉目兀坐而偏於靜之謂但未接物時便有敬以主乎其中則事至物來善端昭著而所以察之者益精明耳伊川於已發之際觀之正謂未發則有存養而已發則有可觀也此語甚精確而猶不安於靜觀未發之論愚恐終不能遺於反觀也孟子謂氣動志如蹶者趨者蓋顛越急趨在氣而欲速則亦由乎心又如人鬭狠是氣然忿懥則發於心驅僕鬭狠僕固為氣然其主翁為心若心操得其中則氣自平主得其理則僕不亂故曰志動氣者十九言其時常多氣動志者十一言其少也心具性先儒以為郛郭於人雖資環衛而終為二物惟穀種之譬為得之蓋其渾一之妙難以言語形容只得如此名狀欲人之易曉耳夫水本淡滴之五味而後和然其相投之分不可離也故孟子以為良心又曰良知良能正以其有性之德渾合得在孔子以不為周南召南為面墻蓋不務本原尋路頭而欲施之國家天下自是通透推行不去或謂知行只是一個工夫不可分作兩假事與易知至至之大學知止而後有定孔子知之不如好之意相背又曰敬即無事時義義即有事時敬兩句合說一件與敬以直內義以方外意相背大抵聖賢說道理有本原有作用理無二致而用工則有先後故其次序如此如四時之不可易若欲打滚一處或倒做了工夫恐於道難入也或謂居敬即是窮理就窮理專一處說便謂之居敬就居敬精密處說便謂之窮理是以中庸尊德性道問學頭緒混為一處又謂戒懼慎獨只是一個工夫無事時固是獨知有事時亦是獨知省察是有事時存養存養是無事時省察若意念未萌善惡之幾未兆原無有知須安靜以存養之何用省察及其感而幾動則宜省察以決之何用存養人心動靜隨處可以用工打混一處尤難得力也世學或謂心中不須用一個敬字且病宋儒程朱主敬及主一之說不知敬非别物只在尊德性常以心為天為君為嚴師翼若有臨而不敢怠放聖人純一無僞有自然之敬齊戒以神明其德所謂齊莊中正是也賢人嚴恭寅畏有固守之力操存涵養不敢放置所謂整齊嚴肅是也其用功則不妄動之謂誠弗岐二之謂一不偏倚之謂中止紛撓之謂靜無邪曲之謂直中有主之謂實去物欲之謂虛其實一也外則踐履執事使民常整思慮斯須不忘正衣冠尊瞻視非禮不動是也舍此則靈扃無主人心客氣交病於內耳目口鼻四肢富貴利達諸欲攻奪於外譬如所居藩籬不固中之所藏寇竊得與我共之我方在外奔走救急不暇雖有良知亦將為所昏塞而無所用其明矣考易詩書所稱曰敬直曰敬德曰聖敬曰敬止曰毋不敬曰修已以敬聖人以此洗心其言若出一口而謂盡非乎哉商書咸有一德云德無常師主善為師舜察邇言詩詢芻蕘孔子問禮問官是也善無常主協於克一又曰一哉王心舜之執中惟一孔子之一貫是也尹湯一德其傳尚矣程子以敬為主一一蓋天理渾具於良心不為物欲之雜可以統會萬殊而貞天下之動以歸於一而或謂主一之非至謂一心在好貨好色上亦可以為主一不知要誠意之功何用夫乃未之思乎答人書所諭靜專翕習之功真畜德養身之切務即老子所謂專氣致柔道流之所謂修養吾儒之所謂靜存同㫖異趨者也蓋吉凶悔吝生乎動而氣勝亦能動志志動氣交始有不得其理者故志定而氣順心一而神安樞紐開闔以役百體制羣動易所謂其靜也專其動也直天下之動貞夫一者也一者不二不雜敬之本也中年以來平居及多病中時亦見得此氣象但或為事勝不能守守而不能常耳執事親得其味後以見諭敢不祇領以無忘規切乎答黃才伯嘗與諸生論敬以直內義以方外易以發明坤道大段是聖賢見成工夫至於學者用功入道則當如大學次第規模所謂先正其心存養主敬之事也先誠其意省察克治之事也先致其知致知格物盡心窮理之事也若徒知有敬而不先之窮理則於天下萬事萬物不能灼知其所以然心之知識容有未盡而孔子所謂罔殆之蔽必將扞格於其間心之所發為公私邪正恐不能自别其誠與否而決幾於取舍之際又安知義之所在而使泛應各得其宜哉答毛式之書前日偶論及文王不識不知與易何思何慮義同蓋以天地間事物皆有定理一毫思慮著不得故引日月寒暑往來屈伸以見其自然人受賦於天具於心一樣自然實理停停當當稍著思慮便出安排翻覆橫生態度雜出如楩楠大木加以匠人雕琢繪畫之巧非吾性本智之罪也用私智之過也聖人渾成德性靜與天合動與天行何知識之有非惟不假知亦無所用其知矣易思慮即是知識字皆出人心而非動以天者也若夫意必固我門人得見聖人無此四字不知聖人無意則必固我三者自然不萌若常人有意則三者自然不斷愚謂無意二字足以盡之即文王之不識不知易之何思何慮亦豈易能乎哉先儒謂無口過易無身過難無身過易無心過難過即有意之私其害不小人心萌動客感物欲便來乘之沈冥固蔽些子虛明透露不出吾人茍知性分為吾物百年易過天理當還如老將麾兵三軍克敵力求蕩掃盡去或未盡而後來者逐漸去之去盡為大賢大半盡為君子全不去則為小人可不懼哉與吳亞父論學王氏之學本諸象山緒餘至今眩惑人聽雖有高才亦溺於此借如所稱致良知一句亦只是大學致知二字又上遺了格物工夫則所致者或流於老佛之空寂而於事物全不相干故其師友相承率多夸大浮漫而濶略於躬行之實力且號於人曰是能百世以俟聖人而不惑嗚呼其可以欺天下後世哉此意甚不難知尚有聰明堅持而不解者抑亦道心不明仁義否塞而世道汚隆之幾也生竊憂之而讀書劄記第二册前實闢其說蓋以廣中侍讀黃才伯促而成之其人持守端慤蓋士林不易得者答羅整菴大抵吾人所以少能自立者患在中養不定而處世實難中定則無難處矣故敬以直內則便義以方外內外照應如影隨形非有異也若根基不固則世間萬事一切利害皆能震撼搖奪其中顧吾無以處之如蘇氏所謂隙中之觀鬭者也答熊南沙别駕程朱論議本諸六經四書緒餘未敢謂其盡得先聖賢心術精微如出一口而路徑步驟亦自不差學者能㑹通於博約之中循途以進終無所失近學謂其凡近未足以動人也立為高濶汗漫之談以震眩人耳目天下聰明之士靡然聽之師友相承自謂前無古人矣不知內少忠信之基中虧踐履之實則所謂下梢頭無著落者也向與黃司成泰泉近得羅整菴先生書每念及此而執事又秉衡軸當世道學術之機轉運於上若於此而明示之以好惡天下士習有不翕然丕變者乎答熊太宰北原公諸生李大經先生經綸李經綸字大經建昌南豐人生而有文在手墳起如方印讀書好深湛之思以理學自負為諸生值鄉舉上書當道言當待士以禮無制士以苛法藉令峻制苛法盡革懷挾之弊而使志行之士如吳康齊陳布衣者睥睨其間避匿而不肯出無寧踈於防檢使志行士或由以進也當道得其言而韙之久之棄舉子業精心著述以詩三百篇非夫子之舊漢儒雜取逸詩以足其數故無益於天德王治之粹者削之作詩教考以禮有三曰儀曰曲曰官見諸動止食息日用倫常者謂之曲行之吉凶軍賓嘉者謂之儀朝廷之制度謂之官三禮考注昧於經曲制度之節混三為一今為之分别作禮經類編王湛二家之學盛行先生弗以為是作衛道録作大學稽中傳念時無知者聞羅整菴著困知記辨心性之異以闢王湛大喜上書以質所學整菴方自貴重懲兩家之聚生徒各立門户故少所容接而先生之辭又過侈遂沮抑之先生乃大失望走南都謁祭酒黃泰泉泰泉深契之而與之講樂律然亦未遑張其學術也其後東南中倭天下頗洶洶先生以為是司兵者不知兵也條時務七事詣撫按藩臬獻之竟不遇中暍卒於越道先生與王湛異者大㫖只在窮理二字然先生之所謂理者制度文為禮樂刑政皆是枝葉邊事而王湛之所謂禮則是根本根本不出一心由一心以措天地萬物則無所不貫由天地萬物以補湊此心乃是眼中之金屑也先生之誠意原以意非心之發也是主宰乎知覺之中者也頗與子劉子之言意相合第子劉子之所謂主宰者知覺中自有主宰先生謂主宰乎知覺之中者則又立意以為之仍是困知之餘論也辨學聖賢之學其主曰思誠其志可立也其道不可强也命齊而氣五性齊而質五盈虧相形而質之强弱生焉虛實相乘而氣之昏明異焉故學先之於窮理而後性可得而盡也如謂心之靜定虛靈即道謂身造物理為格物謂致吾良知正天下之事物為格物信心任情無庸積漸陰宗禪說以陷溺高明援儒入墨以蔑棄經典是天下之罪人不知先王之教盡人道而已矣意心身家國天下者物之名其誠正修齊治平者物之理物有本末者是物也窮理者窮是物之理也行主知資者學之本知漸行漸者學之法行熟知精知明行至者學之效是故意物也窮乎其所以誠之者而意之物格矣心物也窮乎其所以正之者而心之物格矣身物也窮乎其所以修之者而身之物格矣家國天下物也窮所以齊治平者而家國天下之物格矣物格而知至矣故聖人之立教也誠正修齊治平之外無餘學君子之致知也誠正修齊治平之外無餘格其禮盡於禮樂詩書其用通乎中才上下蓋上之而幽明今古靈蠢動植之神窮則上智之能而先王之所不貴下之而誠正修齊治平之事缺則下愚之陋而先王之所不齒逃焉去之為左道怪行以譸張民聽則先王之所必誅者也是天下之中學也今晦菴之論格物也似見條目知行之分而不見綱領知行之合也經文不言敬而敬之理備焉主一無適之謂敬其好惡之誠一者乎常惺惺法之謂敬其心之靜正者乎整齊嚴肅之敬其修身之始事乎以斂天人以攝動靜以篤倫理其修身之終事乎合之以敬是徒知主敬之先於致知而不知誠正修之即敬也然其主之以敬也立本者也其言窮理者致精者也謂非孔孟中學之正傳不可也乃若象山之學則不然謂求放心即可以擴充知識則信已不求中庸之病根也猶未以明善為非也再傳而為白沙則知一已矣守一已矣聖人之教事物之理不言明矣三傳而為陽明子甘泉子也則趨中而未盡者也陽明子曰知行合一者也推吾心之良知以正事物良知即明德正物即親民也是知致力於實用矣然信心而不求中甘泉子曰格物者至其理也知行並進隨處體認天理至之而已矣是知言明善矣知求中而不信心矣然不以至善為事理之極而謂為吾心中正之體人心未必皆中正也亦歸於信心而已矣蓋昔者聖人既竭目力焉制宫室以奠民居制冠裳以文人體制稼穡以養人腹制舟車以利人行制干支厯法以經天導川畫野以緯地範金合土斷木以利器嘗草木金石之劑以制醫而天下之人事備矣是聖人之事也傳是以教人者謂之師效是以覺其事謂之學其能傳能學也固人之良知也謂天下之人率其良知而可以自能其事則天下之妄言也聖人既竭耳力焉審清濁以辨五聲定高下以制十二律備八音以極旋宫之變而天下之和氣宣矣是聖人之能事也傳是以教人者謂之師效人以覺其事謂之學夫其能傳能學也又人之良知也謂天下之人率其良知而可以自能其事又天下之妄言也聖人既竭心思焉通乎天人之故而知曰命曰性至精而不可遁也曰道曰德至純而不可瑕也其設中於心也則定靜虛明以立性之體其執中於事也則盡已盡人盡物以達情之用是故通神明之德類萬物之情於是乎造為典謨為訓誥為禮樂文章以化成天下使天下後世之修身齊家治國平天下者皆由是取法焉若是者尤聖人之能事也傳是以教人者謂之師效是以覺其道謂之學夫其能傳能學也亦人之良知也謂天下之人率其良知不窮理而可以自能尤天下之妄言也夫人心之良孰不有知但所謂良知者不中而不全耳夷惠雖聖君子不由楊墨雖賢君子所惡謂其不中也仲子知亷而不知孝王祥知孝而不知忠謂其不全也今曰良知即聖也吾心之中正即天理也徒使人猖狂妄誕亂德迷心而已耳且夫六經之言學自說命始而言知行者亦自說命始傅說曰人求多聞時惟建事學於古訓乃有獲夫求多聞者於古訓而學之也以建事而有獲者得至善之理也則多聞在建事之先矣又曰知之非艱行之為艱言君子行之為貴而徒知不足以為行也知行雖有輕重而先後之分又明矣故大舜之言曰稽於衆舍已從人惟帝時克其戒禹曰無稽之言勿聽弗詢之謀勿庸夫堯舜禹天下之大聖也而必察衆必舍已必不可以弗稽弗詢者誠不敢信一已之聰明而壞天下之中正也夫然後道備全美允執厥中而可以為天下後世法今之言曰人心自有良知也聞見知之次也求理於萬物是義外也是蹈襲也則堯舜之稽詢傅說之多聞學古非歟大學稽中傳意非心之發也心之發則情也意從立從曰從心心立欲為之意而非為之意而必為之主宰乎知覺之中也寂者心之體而主忠以為之根知天之德即我之德而意專主乎天德立心以的之間邪以存之是寧靜之中而精神之有所注者也感者心之用則主信以為之幹知人之道即我之道而意專主乎人道定其向決其趨蓋攻取之中而精神之有所守者也無事而靈根植焉畫一無二而好色惡臭之幾明有事而美幹達焉致命遂志而好色惡臭之幾決故不知意為身心之幹則視之也輕不知幾為萬事之本則其功也略我圖聖功莫先誠意作誠意原誠意原心也者神明之舍心不可以專神而神則寓宅於心者也神貴靜靜則性全而仁義之體立神貴明明則思睿而仁義之用行曰寂曰明而心之本體正矣欲多則蕩動極則昏事物無形虛靜以養中可也而常情有無故之感事為之著安而和行可也而常情有物勝之動於是乎昏蕩生而寂明者失矣此固無主之心而心失其正者也若夫意存於天理而私妄難以絶其根意存乎天道而利害得以衝其志其為昏蕩一也邪妄絶矣而可為之事不免生心以繫事利害忘矣而欲為之事不免持心以必為非邪妄利害之私而終留喜怒之形聲亦不可得而寂明也然則寂明無纍者其惟聖人之心正乎方其靜也物之未感我之無情至虛獨覺而影響俱無也及其動也妍媸在物精凝在我至靈常止而好惡不作也其復而之靜也與化俱往賓去主存而又影響之俱無也是正心之義也或曰何思何慮聖人無故而不感忘食以思豈有故之感乎寂然不動聖人有心而無為不思則罔豈無為之心乎聖人之心所不纍者身之情所欲察者天之理無思無為者洗心以神德思睿作聖者精義以窮神纍情之心為意必意必則私私則動精義之心為性命性命則公公則平何動之有哉朱子曰靜而常覺動而常止此人心之妙明道曰所謂定者靜亦定動亦定無將迎無內外正心之謂也心與誠意與正相似而難辨也作正心原正心原君子之動也通萬物於一身則理一而仁存散一理於萬物則分殊而義盡是故恩者當親而美者可愛也下者當賤而惡者可惡也貴者當畏而尊者當敬也死者可哀而窮者可矜也橫者當敖而卑者可惰也以忿懥恐懼好樂憂患之情而行乎五事之中修其辭則有溫有厲有緩有速有語有默有豫有奪而謂之仁義之聲動其儀則有嚴有泰有張有弛有止有作有操有縱而謂之仁義之形八聲八形之用行乎五事之中有輕重長短兼施並用之妙不是之察有任情任氣而失之者矣故度乎輕重長短之則有本然之權度焉恩以為至者必義以裁之而後止義以為主者必仁以和之而後行是修身之義也易曰立人之道曰仁與義孟子曰充無欲害人之心而仁義不可勝用此之謂也故致知誠意正心特傳者見工夫之並用修身齊家治國繫傳者見功用之相因修身以上聖人之學猶可傳也齊家以下聖人之道不可行也學可傳故道明可冀道不行故善治無由舉而措之存乎人耳是故興孝興弟之心今之民猶古之民也潔矩公平之道古之法獨非今之法乎禮樂教化治之具也賢才治之幹也生養治之基也有凍餒之民治具無所措何以為基有憸壬之士治具不可張何以為幹臯陶曰在知人在安民嗚呼知人則哲而九德之旁求務莫先焉者也安民則惠而府事之修和用莫急焉者也傳大學者先之以仁讓孝敬終之以用人理財其㫖深乎修身原明儒學案卷五十二
