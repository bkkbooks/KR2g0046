body:
  text: 明儒學案卷三餘姚黃宗羲撰三原學案關學大概宗薛氏三原又其别派也其門多以氣節著風土之原而又加之學問者也端毅王石渠先生恕康僖王平川先生承裕光祿馬溪田先生理恭簡韓苑洛先生邦奇忠介楊斛山先生爵徴君王秦關先生之士三原學案端毅王石渠先生恕王恕字忠貫號介菴又號石渠陜之三原人正統戊辰進士選庶吉士先生志在經濟出為左評事遷左寺副擢知揚州府嵗飢不待報而發粟民免溝壑超拜江西布政使轉河南時以襄南地多險秦楚流民日出剽略於是特設治院以先生為副都御史領之纍平劉千斤石和尚寇亂榜諭流民各使復業母憂歸起復巡撫河南轉南京刑部左侍郎父憂歸服除起刑部左侍郎治漕河改南京户部復改左副都御史巡撫雲南而中人錢能橫甚使其麾下指揮郭景私通安南為姦利先生遣人道執景景迫投井死盡發能貪暴諸狀上遂撤能還安置南京進右都御史召掌留臺遷南京兵部尚書參贊守備尋以部銜兼左副都御史巡撫南畿興利除害三吳自設巡撫以來獨周忱與先生耳中人王敬挾其千户王臣以妖術取中旨收市圖籍珍玩張皇聲勢先生列其罪狀敬下錦衣獄臣論死二年而復還參贊錢能夤緣為守備與先生共事先生坦然不念前事能語人曰王公天人也吾惟敬事而已加太子少保林見素以劾妖僧繼曉下獄先生救之得出先生益發舒言天下事天子不能無望意因批落太子少保以尚書致仕孝宗即位召用為吏部尚書加太子太保上釋奠文廟先生請用太牢加幣從之先生重禮風義之士故一時後進在朝者如庶吉士鄒智御史湯鼐主事李文祥十餘人皆慷慨喜事以先生為宗主先生侍經筵見上困於酷暑請暫輟講鼐即言天子方向學奈何阻其進恕請非是先生惶恐待罪謂諸臣責臣是也然諸臣求治太急見朝廷待臣太重故責臣太深欲臣盡取朝事更張之如宋司馬光毋論臣不敢望光今亦豈熙豐時也上優詔答之已而鼐劾閣臣萬安劉吉尹直中官示以疏已留中鼐大言疏不出且併劾中官中官避匿亡何安直皆免鼐與文祥等日夜酣呼以為君子進小人退雖劉吉尚在不足忌也於是吉使門客徐鵬魏璋伺鼐鼐家夀州知州劉概與書嘗夢一叟牽牛入水公引之而上牛近國姓此國勢瀕危賴公復安之兆也鼐大喜出書示客璋以此劾之鼐概皆下詔獄都御史馬文升故為鼐所劾欲以妖言坐之先生力救事始得解凡中官幸人恩澤過當者先生輒為裁止雖上已許必固執也丘濬以禮部尚書故班先生下及直文淵閣先生自以前輩仍序尚書之次濬意弗善也每有論奏陰抑之且使其私人太醫院判劉文泰訐先生所刻傳文詳列不報之章為彰先帝之拒諫先生言臣傳所載皆足以昭先帝納諫之盛何名彰惡文泰無賴小人其逞此機巧深刻之辭非老於文學陰謀詭計者不能盍無追其主使之人乃下文泰錦衣獄則果丘濬所使也上以先生賣直沽名俾焚其傳草文泰出而先生黜矣遂乞骸骨歸又二歲濬卒文泰往弔其夫人叱之出曰汝搆王公於我相公憸人也何弔為聞者快之先生家居編集厯代名臣諫議録一百二十四卷又取經書傳注有所疑滯再三體認行不去者以已意推之名曰石渠意見意見者乃意度之見耳未敢自以為是也蓋年八十四而著意見八十六為拾遺八十八為補缺其耄而好學如此先生之學大抵推之事為之際以得其心安者故隨地可以自見至於大本之所在或未之及也九十歲天子遣行人存問又三年卒贈特進左柱國太師諡端毅石渠意見戒慎恐懼二節天理人欲相為消長有天理即無人欲有人欲即無天理如何前一假是天理之本然後一假是遏人欲於將萌中和節中和乃人性情之德雖有動靜之殊初非二物戒懼謹獨皆是不敢忽之意豈有彼此如何自戒懼而約之止能致中自謹獨而精之止能致和如何致中獨能位天地致和獨能育萬物恐非子思之意鬼神章鬼神之為德鬼神蓋言應祀之鬼神為德如生長萬物福善禍淫其盛無以加矣以其無形也故視之而弗見以其無聲也故聽之而弗聞體物而不可遺言鬼神以物為體而無物不有如門有門神竈有竈神木主為鬼神之所棲是也然其有感必應是以使人敬畏而致祭祀如在其上如在其左右而不敢忽也謂之如在言非實有也集注以發見昭著釋如在恐非是食無求飽章無求飽求安者志在敏事慎言也就有道而正者正其所言所行之是非是者行之非者改之蓋古之學者皆以言行為學也動容貌章斯猶須也是用力的字動容貌須要逺暴慢正顔色須要近信出辭氣須要逺鄙倍若以斯為自然未安興於詩章詩本性情有邪有正讀之可以興其好善惡惡之心故曰興於詩禮以謹節文曲禮經禮人能知之則敬慎威儀言動無失可以立於鄉立於朝故曰立於禮樂以和神人用之於郊廟則祖考來格用之於燕享則賓主情洽不特此也事無大小非和不成故曰成於樂顔淵喟然章髙堅前後言已無定見非聖道之有髙堅前後也集注謂顔子深知夫子之道無窮盡無方體而歎之也若然則止仁止敬止慈止孝止信非道歟毁譽章今斯之民即三代之民而三代之民直道而行不妄毁譽人何今之民毁譽之過情也或問井田之法今可行乎意見以為不可曰何也曰今之時人稠地狹人人授田百畝其可得乎曰何必百畝或五十畝或七十畝使彼此均一即井田之意曰户口年年有消長茍欲均之必須年年助勘分授經畫疆界若然則官民不勝其煩勞又且妨誤農業受田之人必曰此田今年屬我明年又不知屬何人由是人懷苟且之心怠於耕作糞壅田必瘠矣曰十年一分可乎曰十年一分止可均一年其後户口有消長則又不均矣盡心章人能竭盡其心思而窮究之則能知其性之理蓋性乃天之所命人之所受其理甚微非盡心而窮究之豈易知哉既知其性則知天理之流行而付於物者亦不外是矣與下文存其心養其性所以事天也文勢相同集注言知性乃能盡心不無顛倒春秋春秋者孔子因左丘明所作魯史而修之也何為以左氏為傳而以公羊榖梁並行謂之三傳乎今觀公榖傳不過發明孔子筆削褒貶之意未嘗外左氏所記之事而鑿空為之説此左氏不可為傳一也孔子言左丘明耻之丘亦耻之觀此則知左丘明生乎孔子之前而為孔子之所敬信者也不應生乎後者為之經而生乎前者為之傳以釋經也此左氏不可為傳二也中和天下之事處之得中則成不得中則不成故中為天下處事之大本天下之事行之以和則行不和則不行故和為天下行事之逹道道不逺人章己之能知能行人亦能之巳之不能人亦不能是己之道曷嘗逺於人哉人之行道不能推己度物而以人之難知難行之事治人則是不近人情而逺人以為道也誠者自成章誠實也人之心無不實乃能自成其身而道之在我者自無不行矣注以誠與道對言以人與物為二事非也物之終始之物猶事也人之誠實者作事自然有始有終不誠實者則雖有所為始勤終怠所以成不得事故曰不誠無物飢渴章人能不以飢渴貧賤動其心則大本立而過人逺矣其他小事末節雖不及人不為憂矣進德修業爻忠信謂存諸心者無不誠也修辭立其誠謂出諸口者亦無不誠也忠信非德也所以進德者忠信也修辭立誠非業也所以居業者修辭立其誠也知至至之知德之所至而進以至之故可與幾也知終終之知業之所終而修以終之故可以存義也以知行言之知至知終似知也至之終之似行也傳謂知至至之致知也知終終之力行也不能無疑斂時五福用敷錫厥庶民五福在人若無禮樂法度則強凌弱衆暴寡富吞貧放僻邪侈自陷於罪豈能安享五福惟人君建極有禮樂刑政是以天下之人不犯於有司得以安享五福則是人君收斂敷布以與之也無隱章夫子之適陳蔡楚衛諸國無行而不與二三子同行動靜云為衆所共見共聞曷嘗有所隱乎深則厲厲者嚴厲也水深可畏當止而不可涉也志至氣次志之所至之處氣即隨之而至如帥所至之處卒徒亦隨之而至也王者師節貢助徹是三代養民之法庠序學校是三代教民之法後來有王者起必來取三代教養之法以為法是三代教養之法為後來王者之師也言性章天下人之言性只説已然之迹便是性不知已然之迹有善有惡順理而善者為性之本不順理而惡者非性之本故曰故者以利為本孟子末章無有乎爾者是反説之辭猶言豈無有也孟子之意以為孔門弟子克肖者七十二人豈無有見而知之者既有見而知之者則今日豈無有聞而知之者觀於此言則孟子隱然以聞知自任也康僖王平川先生承裕王承裕字天宇號平川冢宰之季子也𢎞治癸丑進士授兵科給事中遷吏掌科逆瑾恨其逺己又疏進君子退小人益恨之罰粟輸邊以外艱去瑾誅起原官歷太僕少卿正卿南太常卿宸濠反發留都之為內應者嘉靖初遷户部右侍郎晉南户部尚書致仕林居十年戊戌五月卒年七十四諡康僖十四五時從莆田蕭某學蕭令侍立三日一無所授先生歸告端毅曰蕭先生待某如此豈以某為不足教耶端毅曰是即教也真汝師矣登第後侍端毅歸講學於𢎞道書院弟子至不能容冠婚喪祭必率禮而行三原士風民俗為之一變馮少墟以為先生之學皆本之家庭者也光祿馬溪田先生理馬理字伯循號溪田陜之三原人為孝廉時遊太學與呂涇野崔後渠交相切劘名震都下髙麗使人亦知慕之録其文以歸父母連喪不與會試者兩科安南貢使問禮部主事黃清曰關中馬理先生何尚未登仕籍其名重外夷如此登正德甲戍進士第時以大學衍義為問先生對曰大學之書乃堯舜禹湯文武之道也傳有克明峻德湯之盤銘堯舜帥天下以仁之語真氏所衍唐漢宋之事非大學本旨也真氏所衍止於齊家不知治國平天下皆本於慎獨工夫宋儒所造大率未精以此失問者之意故欲填首甲而降之授稽勳主事改文選與郎中不合引疾告歸者三年戊寅值武廟將南巡與黃伯固等伏闕極諫杖於廷未幾送嫡母還鄉乃設教於武安王祠藩臬為建嵯峨精舍以居生徒嫡母喪畢起員外郎議大禮復杖於廷尋轉考功郎中丙戍例當考察外官內閣冢宰各挾私忿欲去廣東河南陜西三省提學先生昌言曰魏校蕭鳴鳳唐龍今有數人物若欲去此三人請先去理由是獲免丁亥升南通政過河池驛見其丞貌類黃伯固問之乃其弟叔開也時伯固已死先生泫然泣下作詩贈之云六年復見先生面為過河池見叔開戊子引疾歸辛卯起光祿卿蒞事未幾又歸林下者十年癸卯復起南光祿至即引年致仕隱於商山書院又十年而卒嘉靖乙卯十二月也年八十二先生師事王康僖又得涇野後渠以為之友墨守主敬窮理之傳嘗謂見行可之仕唯孔子可以當之學聖人者當自量力故每出不一二年即歸歸必十數年而後起綽綽然於進退之間後渠稱其愛道甚於愛官真不虛也恭簡韓苑洛先生邦竒韓邦竒字汝節號苑洛陜之朝邑人正德戊辰進士授吏部考功主事轉員外郎辛未考察都御史袖私帙視之先生奪去曰考核公事有公籍在都御史為之遜謝調文選京師地震上疏論時政缺失謫平陽通判甲戍遷浙江按察僉事宸濠將謀反遣內豎飯僧於天竺寺聚者數千人先生防其不測立散遣之又以儀賓進貢假道衢州先生不可曰貢使自當沿江而下奚俟假道於是襲浙之計窮尋為鎮守中官誣奏逮繫奪官世宗即位起山東參議乞休甲申大同兵變起山西左參政分守大同先生單車入城人心始安巡撫蔡天祐至代州先生戎服謁之天祐驚曰公何為如此曰大同變後巡撫之威削甚今大同但知有某某降禮從事者使人知巡撫之不可輕也朝廷復遣胡瓚以總督出師時首惡業已正法而瓚再索不已先生止之不聼城中復變久之乃定先生亦致仕去戊子起四川提學副使改右春坊右庶子兼翰林修撰其秋王試順天以録序引用經語差誤左遷南太僕寺丞再疏歸尋起山東副使大理左少卿以左僉都御史巡撫宣府入佐院事又出巡撫山西再致仕甲辰薦起總理河道升刑部右侍郎改吏部丁未掌留堂進南京兵部尚書參贊機務歸七年乙卯地震而卒年七十七贈少保諡恭簡門人白璧曰先生天稟髙明學問精到明於數學胸次灑落大類堯夫而論道體乃獨取橫渠少負氣節既乃不欲為竒即一行涵養宏深持定堅定則又一薛敬軒也羲按先生著述其大者為志樂一書方其始刻之日九鶴飛舞於庭傳其術者為楊椒山手製十二律管吹之而其聲合今不可得其詳然聲氣之元在黃鐘之長短空圍而又不能無疑者先生依律呂新書注中算法黃鐘長九寸空圍九分積八百一十分用圓田術三分益一得一十二以開方法除之得三分四釐六毫強為實徑之數不盡二毫八絲四忽以徑求積自相乘得十一分九釐七毫一絲六忽加入開方不盡之數得一十二分以管長九十分乘之得一千八十分為方積之數四分取三為圓積八百一十分蓋蔡季通以管長九十為九十分故以面積九分乘管長得八百一十分其實用九無用十之理凡度長短之言十者皆分九為十以便算也今三吳程路尚以九計可知矣則黃鐘長九寸者八十一分以面積九分乘之黃鐘之積七百二十九分也忠介楊斛山先生爵楊爵字伯修號斛山陜之富平人幼貧苦挾册躬耕為兄所纍繫獄上書邑令辭意激烈令異之曰此竒士也出而加禮登嘉靖己丑進士第官行人考選御史母憂廬墓畢補原官辛丑上封事謂今日致危亂者五一則輔臣夏言習為欺罔翊國公郭勛為國巨蠧所當急去二則凍餒之民不憂恤而為方士修雷壇三則大小臣工弗覩朝儀宜慰其望四則名器濫及緇黃出入大內非制五則言事諸臣若楊最羅洪先等非死即斥所損國體不小疏入上大怒逮繫鎮撫司拷掠備至匣鎖晝夜血肉淋漓死者數矣而先生氣定故得再蘇主事周天佐御史浦鋐俱以救先生箠死獄中於是防守益嚴上日使人偵先生一言一動皆籍記偵者苦於不得言以情告先生使多為善言先生曰有意而言便是欺也部郎錢緒山劉晴川給事周訥溪先後以事下獄相與講學不輟緒山先釋先生願有以為别緒山曰靜中收攝精神勿使遊放則心體湛一髙明廣大可馴致矣作聖之功其在此乎先生敬識之與晴川訥溪讀書賦詩又如是者五年所著周易辨録中庸解若干卷乙巳八月上用箕神之言釋先生三人而三人者猶取道潞水舟中講學踰臨清而别會上造箕臺太宰熊浹驟諫上怒罷浹復逮三人時先生抵家甫十日聞命就道在獄又三年丁未十一月髙元殿災上恍忽聞火中有呼三人姓名者次日釋歸歸二年而卒己酉十月九日也年五十七隆慶初贈光祿寺少卿諡忠介初韓恭簡講學先生輩來往拜其門恭簡異其氣岸欲勿受已叩其學詫曰宿學老儒莫能過也吾幾失人矣剛大之氣百折不回人與椒山並稱謂之韓門二楊論學天命謂性天人一理也率性謂道動以天也修道謂教求合乎天也戒懼慎獨自修之功至於中與和也中和性命本然之則也能致之則動以天矣故其效至於天地位萬物育道不可須叟離可離非道是言當戒懼之意莫見乎隱莫顯乎微是言當謹獨之意應酬是有睹有聞不睹不聞是無所應酬之際也如出門使民是有所應酬則有睹有聞或問程子未出使民之時當何如曰此儼若思時也儼若思即是戒慎恐懼之意為功夫尚未説到極至處故又提慎獨二字使人雖在暗室屋漏之中一念發動之際凛然畏懼不可少怠不敢少息則天理常存私意不萌純一不已而合乎天矣中和心之本體也未發之中萬物皆備故為天下之大本已發之和大經大法所在而不可違故為天下之逹道怒與哀中節皆謂之和致中和止至善之云也天地之位我位之也萬物之育我育之也君子之中庸中庸人理之常也小人反中庸豈人理哉時中者默識其理而妙宰物之權也若非禮之禮非義之義豈時中之道哉小人則率意妄為而已天下之道至中庸而極理得其會同義至於入神非至明不能察其幾非至健不能致其決故民鮮能之矣董常問文中子聖人有憂乎言天下皆憂吾何獨不憂又謂樂天知命吾何憂何必如此説聖人固未易及然常人一念之發得其本心則與聖人之心無以異但聖人純亦不已衆人則或存或亡而已憂樂皆人情之常而本於性也豈聖人獨有樂而無憂乎若曰樂天知命吾何憂不成父母病聖人亦樂天知命而不憂乎豈人理也哉漫録夜初靜坐少檢點日間言行因司馬溫公論盡心行已之要自不妄言始夫不妄言所言必皆當理非心有定主豈能至此故輕躁鄙背及事務瑣屑無益身心而信口談論者皆妄言也因書以自戒作一好事必要向人稱述使人知之此心不定也不知所作好事乃吾分所當為雖事皆中理才能免於過惡耳豈可自以為美才以為美便是矜心禹之不矜不伐顔淵無伐善無施勞此聖賢切己之學也與人論事辭氣欠平乃客氣也所論之事雖當於理即此客氣之動便已流於惡矣可不戒哉書以自警豫久處獄中粗鄙忿戾略無貶損粗鄙忿戾乃剛惡也負以終身而不能變真可哀也因思橫渠貧賤憂戚玉汝於成乃惕然警省儼然愧耻今日患難安和非皇天玉我進修之地乎不知省愆思咎而有怨尤之心是背天也背天之罪可不畏哉豫繫此四十一月矣邏者日在側覘豫動作有甚厚豫㩦壺酌以伸問者後一人來甚橫逆豫卧於舊門板上障之以席其人皆扯毁之謂豫罪人不宜如此又往往發其厚豫者使人知之曰某日某皆潛獻某處者蓋令其得罪以見己薄之為是有蘇喬二人皆厚豫者乃忿忿不平揚罵曰是固無傷也豫非私交化外人雖得罪亦何憾豫與劉子煥吾周子順之同飯後因論人才各有所宜豫謂二公自度宜何責任劉子曰吾為孟公綽可周子曰今日府州外任勉強幾分豫曰滕薛大夫聖人固不許公綽在春秋時欲盡其職亦非易事觀於子産相鄭可見然則孟公綽亦不可輕看一人因狂病迷謬入朝立御座上捕下法司擬重辟獄成未決其母擊登聞鼓稱寃順之在吏科時直受鼓狀遇此事未為準理順之因問豫使公遇此事當何如處之豫曰當論其狂病誤犯不可加罪但罪守門者失於防禦則可矣劉子曰當封進鼓狀使朝廷知其以病迷下法司從末減可也順之曰此固皆是但如此為之必得罪以此小事得罪吾不欲也劉子謂論人無罪不當殺恐非小事豫曰此皆論利害未説到義理處若論義理則當為即為當止即止豈計得罪順之以為然好議論人長短亦學者之大病也若真有為己之心便惟日不足戒慎乎其所不睹恐懼乎其所不聞時時刻刻防檢不暇豈暇論人學所以成性而已人有寸長取為己有於其所短且置勿論輕肆辨折而無疑難涵蓄之心謂之喪德可也此豫之深患不能自克可愧可愧道心人心只以是與不是求之一念發動的不是則為人心道心極難體認擴充戒謹恐懼之功少有間斷則蔽錮泯滅而存焉者寡矣故曰惟微人心一動即在凶險路上行矣喪德滅身亡國敗家由於此故曰惟危所謂卿士有一於身家必喪邦君有一於身國必亡內作色荒外作禽荒酣酒嗜音峻宇雕墻有一於此未或不亡則人心之危真可畏哉易謂險以説困而不失其所亨其惟君子乎豫久處困難亦時以此自慰但罪惡深重為世道之損者甚大仰愧於天俯怍於人襟懷滯礙鬱抑不安之時常多心靜則能知幾方寸擾亂則安其危利其災禍幾昭著而不能察矣况於幾乎幾者動之微而吉凶之先見者也所謂先見亦察吾動之是與不是而已所動者是吉即萌於此矣所動者不是凶即萌於此矣意向少離於道則步履反戾差之毫釐謬以千里矣故學者以慎獨為貴豫稟賦粗鄙動輒乖謬夜間靜坐思此身過惡真不自堪真難自容可謂虛負此生矣年踰五十血氣漸衰老景將至始自知過則已晚矣可勝歎哉尚幸殘生未泯欲自克勵求免於惡終耳書以自警顔孟二大賢雖氣象不同而學則未始有異顔子之學在非禮勿視聽言動不違仁不遷怒不二過孟子之集義養氣擴充四端求放心存心養性以事天則亦顔子克已復禮之學也天下萬變真妄二字可以盡之偏蔽者妄也本體則真也學所以去偏蔽之妄全本體之真全則道本性性純乎天立人之道始無愧矣天地亘古亘今但有此一箇大道理則亘古亘今之聖賢不容更有兩樣學問也見獄中或有警擾呼左右問何事久而思之此動心也身居此地須要置生死於度外刀鋸臨之從容以受致命遂志可也此正是為學用功處因思劉元城鼾睡是何等胸懷可謂毅然大丈夫矣今日早起朗誦君子之所以異於人者一章即覺襟懷開灑心廣體胖有西銘與物同體之氣象此心易至昏惰須常以聖賢格言輔養之便日有進益士之處世須振拔特立把持得定方能有為見得義理必直前為之不為利害所怵不為流俗所惑可也如子思辭鼎肉孟子却齊王之召剛毅氣象今可想見真可為獨立不懼者若曰事姑委曲我心自别即自欺也始或以小善放過且不可為小惡放過且可為之日漸月磨墮落俗坑必至變剛為柔刻方為圓大善或亦不為大惡或亦為之因循茍且可賤可耻卒以惡終而不知矣此由辨之不早持之不固也書以自戒涇野呂先生過某府太守侍坐太守子讀書樓上聲徹於樓下太守令止之曰當微誦恐損傷既又促左右以時進食曰勿令飢又戒之曰當為掖之恐或蹉跌先生謂太守曰公之愛子可謂至矣願推此心以愛百姓可也遇順德府太守餞於門外餞所近府養濟院先生以饌食一卓令二吏送院中謂太守曰以公佳饌與無告者共之願公體我此心以惠恤鰥寡可也訥溪周子述以告豫豫為歎息者久之古人以離羣索居為深戒子貢問為仁孔子告以事其大夫之賢者友其士之仁者使志道君子常得與先生相親焉獲覩德容聞至論以自警省不患德之不修而政之不善也嗚呼仁人君子之言其利溥哉智者自以為不足愚者自以為有餘自以為不足則以虛受人進善其無窮矣自以為有餘必無孜孜求進之心以一善自滿而他善無可入之隙終亦必亡而已矣書之以自勵焉平生所為得失相半求欲寡過而不可得幽囚坑久靜中頗覺省悟始有向學之心然殘損餘息血氣漸減䇿勵不前虛生人世與草木同腐矣可愧哉早起散步圜階日升東隅晴空萬里鳶鳥交飛不覺襟懷開灑萬慮皆空因思曾晳沂水氣象亦是如此癸卯歲季冬十三日書古人立己甚嚴其責人甚恕今人立己甚恕其責人甚嚴孜孜為己不求人知方始是學夫子答顔淵為仁之功在非禮勿視聽言動居髙位有髙位的視聽言動居下位有下位的視聽言動處患難有患難的視聽言動臨死時有臨死的視聽言動道無不在豫與劉周二公倚圜墻北向坐一人解於北墻下相去甚近二公訝之曰何不少避豫曰此鄭瞽人旋於宋朝之意蓋謂我無所聞也因置一甎奠食碗置之未安之處此心不已必欲已安然後已將一個身心不會置之安穩之地如個無梢工之舟漂蕩於風波之上東風來則西去西風來則東去是何道理則是置此身心不如置此甎之敬慎也六月初八日夜初寢夢一男子長身少鬚鬚間白呼爵相拜曰豫王陽明也數談論未嘗自言其所學語未畢忽警寤豫矍然曰是何先聖先賢來此以教我乎或慷慨殺身於此地如劉忠愍之類者相與邂遘於夢寐乎明早當焚香拜謝之俄而屋脊墜一小甎塊於臥傍木板上聲震屋中守者驚起初九日早晨記初九日夜夢一廟中塑伏羲像所服甚古雜以洪荒草服一人講易十三卦制器尚象之義於廟問之乃程先生也聽有儒士二人豫入獄中四十一月夢關義勇武王與豫遇者三亦有無言時亦有數相語時連日天雨獄中木板皆濕豫體弱少食因思小兒在外父子五年不能相見衣食不能相顧時張道全伍天儔二生皆在外候豫與小兒同處數日消息未聞為之戚戚又思素患難行乎患難事至於此皆天命也當安受之陳少陽歐陽徹二公未嘗傳贄為臣以言語自任而殺其身况豫論思之職敢不盡臣子一日之心乎盡此心以求自慊則或死或生豈可逆料豫居此四年邏者候豫有言日必録豫頗聞之每見未嘗一言相答有以豫不言回報者必笞之有以其言作豫言以回報者又以不似笞之於是邏者窮矣多以情相告求豫言以免其笞且曰事關於忠義者願得數語豫應之曰吾奏章數千言字字是忠義句句是忠義乃以為非所當言而深罪之今若以忠義騰口舌於爾輩之前是吾羞也一邏者求豫有言情甚切至豫應之曰豫出於無心者公記去則豫心無愧若出於有心是故為巧語轉移天聽以茍免罪難也豫實羞為况一有此心是即機變之智巧舉平生而盡棄之天必誅絶使即死於此其人慘然曰公之心如此豫再不復求公言矣又一邏者告豫曰今日好言語上之矣問之乃太甲篇天作孽猶可違自作孽不可活又繼之曰我乃自作孽者故罪至於此豫應之曰吾為言官天下事皆所當言往時一疏上為朝廷下為蒼生宗廟社稷萬萬年深長之慮豈自作孽者其人默然晴川劉公升工部將之任冢宰羅整菴翁家居劉公辭行整菴贈之以詩既劉公下獄與豫誦之豫與緒山錢子皆依韻和之後人傳其詩於整菴處近一士夫來京整菴公語相告曰向日得詩和答以具但欠推敲未可寄去豫曰此非欠推敲也元老大臣家食十年未嘗以書簡通權貴乃以一詩交罪人可乎此老可以為法甲辰年六月十二日記癸卯年二月內馬主政拯以事下獄馬十九歲發解廣東二十舉進士任工部主政器度識見人未易及告豫曰聞近士夫言自古人主有本事者惟秦皇漢武兩君而已豫應之曰否自古人主有本事者惟堯舜文王而已堯在位百年萬邦時雍治極當亂之時而子丹朱又不肖堯乃尋一個舜將天下分付與他愈至於治舜在位五十年四方風動亦治極當亂之時其子商均亦不肖舜乃尋一個禹將天下分付與他亦愈至於治文王深仁厚澤延周家之基業至八百年堯舜文王以天自處氣運興衰不在於天而在我所謂通其變使民不倦神而化之使民宜之者也其本事何大哉秦皇剪除六國焚棄詩書掃滅先王之迹而惟任一己之私一夫作難而七廟隳身死人手為天下笑漢武承文景之富庶若委任賢俊取法先王則禮樂可興顧以多欲亂政窮兵黷武至於海內虛耗幾致顛覆非有昭宣繼之則漢之天下未可知也若二君之所為適足覆宗絶祀而已烏在其所謂有本事哉且使人主不法堯舜文王而法秦皇漢武是啓其殺伐之心而欲以亂天下也其所言謬妄亦甚矣馬出獄數月以病卒豫甚悼之間步垣中井上日色慘淡光景寂寥下視井水湛然清徹因思井泄不食為我心惻為之戚然大人以治安之時為危亂小人以危亂之時為治安皆此人也有大人之向慕有小人之向慕有大人之識度有小人之識度有大人之作用有小人之作用此天地生物之不齊教化之施固有要而以宇宙間事為己責者不可不慎也乙巳年九月五日燈下書論文文章以理為主以氣為輔所論純是一假義理是以理為主辭氣充盛渾厚不覺較弱是以氣為輔須胸中正大不以偏曲邪小之見亂其心又廣讀聖賢格言以充養之如此則舉筆造語皆是胸中流出其吐辭立論愈出愈新而無窮也如取之左右逢其源也其騰滙泄蓄流轉渾厚波瀾汪洋如決江河沛然莫之能禦也其光焰發揚照耀昭灼如日月中天深谷窮崖之幽花石草木之微靑者自靑白者自白仰之以生輝觸之而成色也徵君王秦關先生之士王之士字欲立號秦關陜之藍田人嘉靖戊午舉於鄉既而屏棄帖括潛心理學作養心圖定氣説書之座右閉關不出者九年蒿床糲食尚友千古以為藍田風俗之美由於呂氏今其鄉約具在乃為十二會赴會者百餘人灑掃應對冠婚喪祭一一潤澤其條件行之惟謹美俗復興又謂天下之學術不一非親證之不能得其大同於是赴都門講會與諸老先生相問難上闕里謁先師廟墓低回久之南行入江右見章本清鄧潛谷楊止菴浮浙水而下至吳興問許敬菴學者聞先生至亦多從之萬厯庚寅卒於家年六十三祭酒趙用賢疏薦詔授國子博士除目下而先生不及見矣明儒學案卷三
