body:
  text: 明儒學案卷五十七餘姚黃宗羲撰諸儒學案下五忠節金伯玉先生鉉金鉉字伯玉其先武進人後籍順天崇禎戊辰進士就揚州教職轉國子博士升工部主事奄人張彛憲總理户工二部欲以屬禮待司官先生纍疏爭之遂引疾歸彞憲奏彈落職讀書十二年甲申二月起補兵部主事巡視皇城賊陷大同先生請撤宣府監視中官恐於中掣肘不無僨事之虞專任撫臣賊騎未便窺宣也不報已而宣之迎賊者果中官杜勳也京城失守先生朝服拜母而哭曰職在皇城他非死所至御河投水而死年三十五母夫人章氏亦投井死初先生巡視每過御河輒流連不能去嘗歸以語弟至是而驗先生卒後家人簡其書籍壬午七月晦日讀邵子記其後曰甲申之春定我進退進雖遇時外而弗內退若苦衷遠而弗滯外止三時遠不卒嵗優哉遊哉庶沒吾世先生未必前知然真識所至自能冥契投水不足異也先生曽問學於蕺山先師某過其家門巷蕭然殘杯冷炙都中縉紳之士清修如先生者蓋僅見耳語録言動便要濟人利物靜中中正和平之意為之根不得自淪枯寂每事思退易三百八十四爻未聞有退凶者乾乾不已惟進德修業為然周子曰動而無動靜而無靜神也余謂戒懼於不暏聞靜而無靜也言行之謹信動而無動也然則戒慎恐懼也謹信也其皆神之所為乎其即所謂天理乎敬之至便是仁其心收斂不容一物即萬物皆備於是矣存養省察四字盡了聖學致知力行總在此四字中矣外此而他求不支離便懸逺湛然無一物時大用在中也宜存養而勿失萬物各得其所時全體在外也宜省察而不著所謂一以貫之者也事來我應皆分所當為此不可生厭棄心至於本無一事我心強要生出事來此便是憧憧往來有一毫徔軀殼起念雖參天贊地之事咸是已私不必功名色貨有一毫物我隔膜即知元知妙之胸亦錯認本體馴致害物傷人境遇艱苦時事物勞攘時正宜提出主宰令本體不為他物所勝此處工夫較之平常百倍矣不然平常工夫亦未到妥貼處一事不可放過一念不可放過一時不可放過勇猛精進處處見有善可遷有過可改方是主一工夫中丞金正希先生聲金聲字正希徽之休寧人崇禎戊辰進士改庶吉士己巳十一月京師戒嚴上焦勞失措先生新被知遇不忍坐視因言通州昌平為京師左右翼宜以重兵犄角天津漕糧湊集防禦尤急未敢為見將足任也草澤義士曰申甫朝士多知之屢薦未用願仗陛下威靈用申甫練敢戰之士以為批亢搗虛之舉疏入立召申甫授都指揮僉書副總兵以先生兼山東道御史監其軍申甫本遊僧嘗夜觀乾象語朝士云木星入太微垣帝座前患在踰旬未幾而兵動故先生信之申甫造戰車既倉卒取辦而所給軍士又多募自街兒丐户十一月丁卯以七千人戰於蘆溝橋來師繞出車後車不得轉全軍覆沒先生亦遂謝歸流賊震驚先生團練義勇以保鄉邦癸未春鳯督馬士英調黔兵𠞰冦肆掠新安先生率鄉勇盡殱之士英劾奏有旨逮問先生於道上疏言士英不能節制兵卒上直先生召復原官會母卒未上而國變福王升右僉都御史先生不出士英深忌之凡馬阮所仇之君子多避地焉國亡後先生城守如故及新安破執至白下刃之賦詩云九死靡他悲烈廟一師無濟負南陽讀者悲之南陽乃思文初封地也先生精於佛學以無心為至其除欲力行無非欲至於無心也充無心之所至則當先生所遇之境隨順萬事而無情皆可以無心了之而先生起爐作竈受事慷慨無乃所行非所學歟先生有言不問動靜期於循理此是儒家本領先生雜之佛學中穿透而出便不可為先生事業純是佛家種草耳然先生畢竟有蔥嶺習氣者其言逆境之來非我自招亦是天心仁愛之至未嘗不順之而順乃不過為無可奈何而安之若命作一注疏聖門之學但見一義字義當生自生義當死自死初不見有生死順逆也天命解譬之水焉性猶水也道猶江河也性之於道猶水之必就下而行地中為江河也言本天命猶歸大海也無以壅水而自行地非率性之道乎有以濬地而後逹水非修道之教乎功績為水而用力在治地教指為性而用力乃在修道天命也性也道也一而已矣不能必天下無不離道之人而能定天下有必不可離之道道有時而可離則性有時而可不率也性有時而可不率則天有時而不命也維天之命於穆不已天有時而不命則萬物或幾乎息矣然則中庸曷不曰性也者不可須臾不率也可不率非性也書曰天有顯道厥類惟彰天命之性人所不睹所不聞也立乎所暏所聞之地而逹於所不睹所不聞之天者則為道衡之乎此而後其離合之故可得而自見也其於天命順逆之故可得而自明也其言亦猶之曰天命也者不可須臾離也云爾董子曰道之大原出於天天不變道亦不變蓋為虛位非有實體也道之為言猶云萬物各得其所焉爾物有萬變而必隨時變易以咸若吾天命之性此即不變之道也水無分於東西以及萬方而必不能無分於上下其所謂下必至於海而後息物無分於剛柔隂陽仁義繇兩端以及萬變而必不能無分於道與非道其所謂道必至於天命而後已人可須臾離道是水亦可須臾而不行於地中也須臾離道是則須臾而自絶於天自隕厥命也而安得不戒慎恐懼此所不睹所不聞人以為隱微耳不知天下固莫有見於斯顯於斯者也惟此隱微為至顯至見也且自此隱微而外無復有見焉顯焉者也惟此隱微為獨顯獨見也如鏡現象全體一鏡離鏡體别無影象可得故君子慎之慎之何也人之於天命有若無覩焉者矣若無聞焉者矣進而求之戒慎焉其將覩所未覩恐懼焉其將聞所未聞而未也惟此一實餘二非真瞪目而視之無非是也傾耳而聞之無非是也無别覩也無别聞也有别覩焉有别聞焉即謂悖天而褻命也天無二日民無二王以此為慎其獨也易有太極是生兩儀兩儀生四象至於四而大變備矣寒熱燥濕物之情也春夏秋冬天之時也人具一天命之性而感於物有受有不受受之為好不受為惡故大學舉好惡繇是而析焉喜者好之初也樂者好之竟也怒者惡之初也哀者惡之竟也於是有四四性舉而性之大變亦備矣故中庸舉喜怒哀樂人之所以靈於萬物者以其喜怒哀樂之性能自主而自繇也其所不受物莫能強納其所受物莫能強奪也所喜所怒所哀所樂之事雖因乎物而能喜能怒能哀能樂之具實係乎我忽喜忽怒忽哀忽樂之態雖存乎人而應喜應怒應哀應樂之則實本乎天本乎天者惟其本無喜本無怒本無哀本無樂是故可以喜可以怒可以哀可以樂故其於未發也則謂之中而於其發而中節也則謂之和喜怒哀樂之用於天下也大之為生殺次之為豫奪又其下者為趨避蓋自天子以至庶人其大小不同無不皆有以用之也喜天下之所喜怒天下之所怒哀天下之所哀樂天下之所樂如此則其所喜樂必其有便於天下者也其所哀怒必具有害於天下者也而天地位矣萬物育矣形而上者謂之天形而下者謂之地故其神明之屬求其所自則舉而名之為天體質之屬原其所自則總而名之為地故夫可覩可聞者皆地之屬也其所不覩所不聞而為覩聞者則曰天也人之生也稱受命於天而不稱受命於地極德之至也稱上天之載而不并稱天地之覆載命無二受尊無二上也論量陽全而隂半易稱坤元統於乾元朱子曰天包乎地之外而氣常行乎地之中天不獨􅕄覆亦具兼載論分天尊地卑乾坤定矣惟乾道變化首出庶物至於坤厚雖德合無疆不過順承而已先則迷矣後則得主而利矣此謂定位故以地從天則治以天徔地則亂詮心古人云無一法可當情又云擬心為犯戒得味為破齋信知此事真容纎毫不得金屑雖貴落眼成翳才有一法當情須知此心全體已被障却故知諸法無論細大精粗究其極處無一而不為心害者也故事心者必須見心見心者亦初不必别求心見去其害心者而已才見有心便非心心盡處心體露故往往曰盡其心今學者每曰學道學無心無心境界豈是如今掩耳偷鈴死兜兜地百不思百不想百不知百不會而自以為無心耶會須此心實實盡却欲覔一心了不可得耳今人誰不曰我學無心我今百思想不起矣但一遇緣千種萬狀殊形異體紛紜而來莫知其所自豈能望古人之反欲覓一心而了不可得者耶心既以一無愛憎為盡矣為無心矣然則遇境逢緣一無鑑别而與為模稜與為浮沉夢夢以終其身乎曰是不然惟真無愛憎之人而後可以鑑别天下之法而用其愛憎雖終日熾然用其愛憎而實無所愛憎蓋惟無心而後可以為萬物立心惟無心而後可以見萬物之心故也見萬物之心而後可以為自見其心見萬物之心為見心但自見其心不可以為見心也故必至於不自見其心而後為見心故覔心了不可得至哉弗以易矣應須打疊教此心淨盡無往不利無處不得用只為此心不淨盡向來及今空過了許多好時光錯了許多好事件動靜者物也心不屬動靜雖不屬動靜而未嘗不動未嘗不靜役其心於藝藝而不知此心行所無事之常住也灰其心於寂寂而不知此心周旋萬變之如珠走盤也有曰精太用則竭氣太用則敝又有曰流水不蠧户樞不朽大抵心法無所不有於天下之物雖至粗至惡無不可以喻心者於天下之物雖至精至美無一可以盡喻此心者應事問曰愚今時學問大約只是讀書窮理靜坐居敬逼迫得心路稍覺開通神氣稍覺清明於此等時遇事當前平日所棘手疑難者爾時殊有歷歷楚楚清順恬適之意然事務之來與讀書靜坐之時相稱則所獲足供所用有如紛紜沓至又不支矣為之奈何或曰工夫無間於動靜陽明先生有言不問有事無事總是幹辦此一件事不可以靜坐讀書時作精神之獲入來應事作務時為精神之用出去若誠如陽明先生所云則於應事作務盡算得收拾整頓精神進入之時矣又何供應不支之足云請得更疏暢其説曰人情莫不違苦而就樂故樂則生矣樂之所在不問動靜期於循理雖日在嘈雜場中油油然也雖境有順逆事有難易而吾所以待之者順亦如是逆亦如是難亦如是易亦如是恬如貼如未嘗有變易也精神以樂且日生而更不支之是患與問曰順逆難易空談道理誠哉如所言矣請一驗之事乎先以順逆境言之所云逆境如恥辱在於幾微可以不顧進之唾罵惡聲入於吾耳可以不聼又進之而飢寒迫於肌膚又進之而箠杖及於體骨乂進之而刀鋸絶命人進之而鼎鑊糜沸令之必死而又不令即死當恁麼時此心能道一句順之則順乎否至於事之難易其最難者如大兵壓境萬賊臨城事在旦夕危於呼吸君父簡命誼不得辭當恁麼時又能道一句易之則易乎否或曰此處正所謂順之則順易之則易者也凡順逆境之來必有所自萬無無因而至者且如我行一事本無大過且是善行而即此一事遂以得禍此似無因殊不知我此事縱不相招我生平寧遽無一念一事足以相招者茍我生平有一事一念此我自知此一禍正適應此一事一念則此一禍正我此一事一念之藥石矣即我生平果潔淨之至無一事一念足以招此禍者則必我此一事或可謂善而實未必盡善或事善此中未必純善如精金一塊內尚微雜礦氣則此一禍者又適為我一爐精金之猛火矣故逆境之來庸俗人盡以為適然而智者莫不以為固然也且不但以為固然而實見其有所由然不但以為有所由然而實見其為天心仁愛之至所謂欲報之德昊天罔極者當恁麼時夫安得而不順以實順若乃事勢之難如大兵壓境萬賊臨城時若我平時曽膺此任則定思患預防為先事之計所不必言若壞於前人則必先外度其敵內度其國上度其君下度其身實據已見所及告人以今日所當為者而又實據已力所能告人以今日所必不可為者可以辭則推舉所知之賢能實勝巳者以濟國家之事不可辭而後以身當之其當事也不可以自用自用則孤不可以任人任人則危不問其見出於人見出於巳見出於智見出於愚而要其事情之確然有據可以信心而不疑者則斷而行之不俟終日疑則闕焉若其疑而不決而其事又不可以闕焉置之者則姑權於利害輕重大小之間以為行止焉其亦庶乎其不至於大失矣若其事有萬不可知則鞠躬盡瘁死而後已成敗利鈍非所逆睹古之君子嘗言之矣其極不過如前所云逆境之至至於絶命而止也天下事雖至重至大至深至遠其必以次第而見次第而成如持斧析薪爇火熟食循理則治燦然指掌輕若反手可行則行可止則止將此身交付造物大光明海中任他安置聼他成就不留絲毫牽枝蔓葉拖泥帶水夫又安得而不易乎問者曰孟子曰至大至剛以直養而無害則塞於天地之間害者逆之也難之也直養者順而易也非曰能之敬識其意願從事以終身焉後半假乃先生致命遂志之本輔臣朱震青先生天麟朱天麟字震青吳之崑山人崇禎戊辰進士其鄉試出先忠端之門授饒州府推官選為翰林院編修從亡司票擬罷官而卒先生專志讀書好深湛之思以僻書怪事子虛烏有詮易讀之汗漫恍惚而實以寓其胸中所得有蒙莊之風焉與人言蟬聨不自休未嘗一及世事明末士大夫之學道者類入宗門如黃端伯蔡懋德馬世竒金聲錢啓忠皆是也先生則出入儒釋之間諸公皆以忠義垂名天壤夫宗門無善無惡事理雙遣有無不著故萬事瓦裂惡名埋沒之夫一入其中逍遙而便無愧怍諸公之忠義總是血心未能融化宗風未許謂之知性後人見學佛之徒忠義出焉遂以此為佛學中所有儒者亦遂謂佛學無礙於忠孝不知此血性不可埋沒之處誠之不可掩吾儒真種子切勿因諸公而誤認也與金正希書盡心存心兩語尊旨劈提盡心一句撇倒存心下截弟瞿然疑之鄙見心只是一若處囂不雜居靜不枯作止垢淨有無斷常泯然消化者即西竺古先先涅不生槃不滅之妙心也在我夫子即意必固我四絶者是猶龍氏亦云真常應物常應常靜此不待擬議不假思惟如如不動一了百了所謂能盡其心者與大資性人一喝放下直見本來朝聞道夕死可矣凡夫肉團未遽能爾所以上士教之曰曉得起滅去處生死大事方決又轉一語曰果見得起滅的是誰滅亦由汝不滅亦由汝或即盡其心不必存其心之意與弟又以見得起滅的是誰仍是不起不滅者然一時偶識得而隨緣放曠恐錯認本來或逐處發憤尋求又虞非觀自在法門故鄙見亟欲以存心為渡筏乃尊旨又以著一存心便同存意譬之水上削波波何能平説得極切隱病然顧其存心何如若把一心去存屬意何辨即曰我存心在這裏執著還類放馳皆由未識其心耳所云其心者意生不順生意滅不隨滅一切聲塵感觸遞有去來此心初何去來祗緣結習之久染著意念聲塵汩汩興波波淫水動漸失妙明是以學者要當去來現在心不可得時認出元本真靈存存又存不在內外中間一毫無起滅來去先儒強名之曰湛然虛明氣象雖然隔境想及信口説到易耳試參十二時中稍得一刻平衡不失昏散而冷便失拘檢而燥所以存心比之養火溫溫得中良非易易若念起即除又存心中照了消磨緊著非一味向意根上扒平如以掌按波之謂也至於未發不爽其惺已發不遷其寂頭頭現成處處灑脫則又知性知天動靜不失其時本等頑鈍如弟雖遇上智伸拳樹拂不啻隔靴即一棒一䀶非關真痛故欲從存其心上勉強從事殊見為難若直揭盡心一句固是頂門一釙然謂事理二障種種難盡何以一識認其心便能了當且其心何以當下便識認得噫中庸不可能也門人金夢文識虔中偶言山川草木皆有明神若將我殼子罩他頭上依舊是人外邉色響投胸皮肉闌之不住內裏情思赴物門壁隔之不能凡夫內外尚合而况聖心痛癢即知知實不曽痛癢當念起時憬然無起於不起處亦不求滅其唯靜照有恆乎鬼神不瞰人之形專測人之意毋意則鬼神莫知隂陽能束我以氣難縛我於虛致虛則隂陽莫冶問身當天分地坼我在何處曰今天地完好時那便是汝每日事事相乘一事偶歇旋又無事討事做矣此際須要常省便不多事不失事才得事事見個性靈耳事到頭來􅍆將頭頂著做去反得自由我欲築室深山視草木開謝為春秋不問甲子或曰每年一本厯書何嘗擾汝徴君孫鍾元先生奇逢孫竒逢字啓泰號鍾元北直容城人舉鄉書初尚節俠左忠毅魏忠節周忠介之獄先後為之頓舍其子弟與鹿忠節之父舉幡擊鼓斂義士之錢以救之不足則使其弟啓美匹馬走塞外求援於髙陽逆奄之焰如火之燎原先生焦頭爛額赴之不顧也燕趙悲歌慷慨之風久湮人謂自先生而再見家有北海亭名稱其實焉其後一變而為理學卜居百泉山康節之遺址也其鄉人皆從而化之先生家貧遇有宴會先時蕭然一榻耳至期則倚卓瓶罍不戒而集北方之學者大概出於其門先生之所至雖不知其淺深使喪亂之餘猶知有講學一脈者要不可泯也所著大者有理學宗傳特表周元公程純公程正公張明公邵康節朱文公陸文安薛文清王文成羅文恭顧端文十一子為宗以嗣孟子之後諸儒别為考以次之可謂别出手眼者矣嵗癸丑作詩寄羲勉以蕺山薪傳讀而愧之時年九十矣又二年卒嵗寒集自渾朴散而象數之繁異同之見理氣之分種種互起爭長然皆不謬於聖人所謂小德之川流也有統宗會元之至人出焉一以貫之所謂大德之敦化也學者不能有此大見識切不可專執一偏之見正宜於古人議論不同處著眼理會如夷尹惠不同微箕比不同朱陸不同豈可相非正借有此異以證其同合知亷勇藝而文之以禮樂愈見冶鑄之手忠孝節義道中之一節一目文山以箕子自處便不亟亟求畢旦夕之命此身一日不死便是大宋一日不滅生貴乎順不以生自嫌死貴乎安不以死塞責處人之道心厚而氣和不獨待君子即待小人亦然問做人曰飢餓窮愁困不倒聲色貨利侵不倒死生患難考不倒而人之事畢矣問陽明無善無惡心之體曰陽明初亦言至善其所謂無善無惡者無善之可言亦猶之乎至善也非告子之所謂無善也人者天地之心也人失其為人而天地何以清寧故為天地立心為生民立命者聖賢之事也明王不作聖人已逺而堯舜孔子之心至今在此非人也天也問理與氣是一是二曰渾沌之初一氣而已其主宰處為理其運旋處為氣指為二不可渾為一不可問性也有命命也有性性命是一是二曰性也有命是就見在去尋頭不得認形骸為塊然之物命也有性是就源頭還他見在不得以於穆為窈然之精盡性立命不容混而為一亦不容截而為二或曰士不可小自待不惟不宜讓今人并不宜讓古人豫謂士不宜過自恃不惟宜讓古人并宜讓今人無一人不在其上則無一人不出其下矣無一人不在其下則無一人不出其上矣十年不能去一矜字此病不小問處事之道曰水到渠成不必急性天大事總平常事成缺在事不在心榮辱在心不在事五十守貧即是道一語罔敢失墜邇聞志是其命甚覺親切子曰匹夫不可奪志也蓋志不可奪便是造命立命處問道何在曰無物不有無時不然堯舜後雖無堯舜堯舜之心至今在孔子後雖無孔子孔子之心至今在亦見之於無物不有無時不然而已矣其消息總得之於天念菴云戒慎不覩恐懼不聞此孔門用工口訣也白沙云戒慎恐懼所以防存之而非以為害也白沙是對積學之人説念菴是對初學之人説徒飾於共見共聞之際而隱微未慊祗自欺之小人致謹於十目十手之嚴而局蹐太甚終非成德之君子二公各有對症之藥連日取文清靜坐觀心間中一樂八字作功課客曰心何用觀曰為其不在也客曰不在而何以觀曰一觀之而即在矣時時觀則時時在到得不待觀而無不在則無不樂非誠意君子未可語此人生在世逐日擾攘漫無自得尋其根源除怨天尤人别無甚事骨月之間多一分渾厚便多留一分天性是非正不必太明問士當今日道應如何曰不辱身問不辱曰薛文清有言劉靜修百世之師也明儒學案卷五十七
