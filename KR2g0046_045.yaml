body:
  text: 明儒學案卷四十五餘姚黃宗羲撰諸儒學案上三僉憲黃南山先生潤玉黃潤玉字孟清號南山浙之鄞縣人幼而端方不拾遺金郡守行鄉飲酒禮先生觀之歸而書之於册習禮者不能過也詔徙江南富民實北京其父當行先生年十三請代父往有司少之對曰父去日益老兒去日益長有司不能奪而從之至則築室城外賣菜以為生作勞之餘讀書不輟有富翁招之同寓先生謝不往或問之曰渠有一女當避嫌也尋舉京闈鄉試授江西訓導用薦召為交趾道御史出按湖廣劾藩臬郡縣之不職者至百有二十人風采凛然景泰初改廣西提學僉事時冦起軍興先生核軍中所掠子女歸者萬餘口副使李立故入死罪且數百人亦辨而出之南丹衛在萬山中歲苦瘴癘先生奏徙平原戍卒因之更生丁憂起復移湖廣與巡撫李實不合左遷含山知縣致仕成化丁酉五月卒年八十九先生之學以知行為兩輪嘗曰學聖人一分便是一分好人又曰明理務在讀書制行要當謹獨蓋守先儒之矩矱而不失者也其所友為李文毅時勉薛文清故操行亦相似海涵萬象録天只氣地只質天地之生萬物如人身生毛髮任其氣化自然也而人獨有心中一窩氣寓得理而靈故曰心神然太虛中亦有一團氣靈如人心者則曰天神汴為天下之中不如金陵江夏漕運之易集也道有體用體即理用即事人得是理於心曰德服是事於身曰行何謂德知仁聖義中和是也何謂行孝友睦姻任恤是也道無𤣥妙只在日用間著實循理行在天為理與天常存在人為性氣散則亡告子若曰生理之謂性便不起人爭端天地間只是生氣中有此生理在人亦然故名曰性而總謂之仁是仁即係天地生物之心又只是生生之理又曰氣質之性即告子生之謂也故張子曰君子弗性也有一人之命有一家之命有一國之命若長平坑卒一國之命也氣數也居處恭執事敬與人忠則心自不放心之量宇宙間事皆能推其理而知但天下形勢古今制度必須考視而知難意度也程張所謂心皆指其虛靈之氣而言氣本寓理為性理從氣發為情而心能主宰者亦氣也天地間生生不息為仁此天理流行也人心只天理流行便是仁私欲間斷便是不仁孔門所教所學皆於用處發明而體在其中蓋理是道之體事是道之用孝弟見於日用只從仁上發出來仁是孝弟之理孝弟是仁之用學者騖於髙逺不盡孝弟之事只是去探髙妙論心論性却全不識道教學者於自己體認性情發見處便能知道古者士農工商各一其業子孫世守而民志定今也農工商之貪黠者皆奔競仕途而謀吏胥出身往往恣其貪黠卒獲仕途以終其身所以濫溢銓曹汙蠧民社者多此途也為今之計莫若自民間俊秀取入庠校者三年大比約計藩臬郡縣司吏額分上中下取士之中式者上等命為藩臬閫司之吏中等為各郡吏下等為縣司吏三年考滿送禮部㑹試亦依上法取送在京衙門厯役三年都試出身則使儒法兼通寄之民社而去貪黠之風矣大學之道問學之宏規論語之言踐履之實理孟子七篇擴充之全功中庸一書感化之大義大學一書六經之名例也中庸一書六經之淵源也窮理者道之體斯明盡性者道之體斯行至命者道之原斯逹故邵子曰非道而何經書補注格物格字當訓合格之格凡物之要者莫切乎身心物之大者莫過乎家國天下人之所學莫非身心家國天下之事然事物莫不有理而萬物皆備於我則物理具於吾心學者以吾心之理格合事物之理是曰格物若訓為至則為物至而後知至不成文義也大學此說已在新建伯之前告曾子以道言一理貫萬事理即體事即用告子貢以學言一心貫萬理心者氣之靈理者心之德以下論語一日克已復禮以一日成功之大綱言四勿以日日用功之節目言譬之一好地方有冦生發日日要當克勝他及至一日盡克勝了而復却好地方則天下皆知其地方好了朱子補傳一旦豁然貫通即此一日義同天理寓於人曰性猶源泉入於川曰流然理無不善而人之氣禀有清濁泉無不潔而川之泥質有沙淤故人之始生氣之清濁未甚見及其長而習於善則清者愈清習於惡則濁者愈濁如川之始逹泥之澄渾未甚分及其逺也積於沙者則澄者愈澄泊於泥者則渾者愈渾矣故性近習逺浩氣是心窩中一㸃虛靈之氣所以具衆理而應萬事者人能事事合宜則心無愧怍而天理純全斯可識浩然之氣象也仰不愧於天俯不怍於人此浩氣塞於天地之間也義者人心之裁制氣之主也即所謂志帥也道者事理之當然氣之行也即所謂道路也以下孟子萬物皆備於我物理具於吾心也以吾心之理處物合宜即義也此之謂體用堯典以親九族即齊家也止謂本宗九世上至髙下至𤣥自三而五自五而九上殺下殺旁殺而人道竭矣豈有外姓謂之族乎故爾雅别外姻曰母黨妻黨書天生蒸民有物有則言天之生人有是事則有是理如視必明聽必聰色必溫貌必恭言必忠而有即必也民之秉彛好是懿德言人之有已行此常事故思此常理如視思明聽思聰色思溫貌思恭言思忠而好即思也蓋事者道之用理者道之體故孔子曰為此詩者其知道乎詩古者諸侯之别子之子孫嫡派如大宗其庶子為小宗若小宗絶不為立後惟大宗絶則以支子立後蓋大宗是尊者之統不可絶也今制大宗絶立後小宗絶不立後奈庶民不知朝廷之制凡庶子絶皆令過繼只是爭取財産爾儀禮下同古者吉服殺縫向外以便體後王致飾殺縫向內為吉服以外削外緝者為凶服苴束茅也所以代神置於神席几東祭時佐食取黍稷祝取觶祭於苴而祭畢棄之即老氏所云芻狗也今朱子家禮乃束茅置沙於饌食前酬酒似與古禮命祝祭酒意同周公祭泰山召公為尸今之神有土木偶及遺像皆古人立尸之遺意歟文毅羅一峯先生倫羅倫字彛正學者稱一峯先生吉之永豐人舉成化丙戍進士對䇿大廷引程正公語人主一日之間接賢士大夫之時多親宦官宫妾之時少執政欲節其下句先生不從奏名第一授翰林修撰會李文逹奪情先生詣其私第告以不可待之數日始上疏厯陳起復之非為君者當以先王之禮教其臣為臣者當據先王之禮事其君疏奏遂落職提舉泉州市舶司明年召還復修撰改南京尋以疾辭歸隱於金牛山注意經學周易多修傳注間補已意禮記彚集儒先之見而分章記禮則先生獨裁春秋則不取褒貶凡例之說以為春秋緣人以立法因時以措宜猶化工焉因物而賦物也以凡例求春秋者猶以畫筆摹化工其能肖乎戊戌九月二十四日卒年四十八正德十六年贈左諭德諡文毅先生剛介絶俗生平不作和同之語不為軟巽之行其論太剛則折則引蘇氏之言曰士患不能剛爾折不折天也太剛乎何尤為是言者鄙夫患失者也家貧日中不能舉火而對客談學不倦髙守贈以綈袍遇道殣輒解以瘞之嘗欲倣古置義田以贍族人吕令助之堂食之錢先生曰食以堂名退食於公之需也執事且不可取何所用與謝而弗受凍餒幾於死亡而一無足以動於中若先生庶幾可謂之無欲矣先生與白沙稱石交白沙超悟神知先生守宋人之途轍學非白沙之學也而皭然塵垢之外所見專而所守固耳章楓山稱先生方可謂之正君善俗如我輩只修政立事而已其推重如此要語子路論為國而其言不讓夫子哂之况直居其位而不讓乎登降作止飲食不辭焉人皆以為非也榮以爵而不辭焉人不以為非也非其小而不非其大何也治已必先治心心者舟之柁也欲正其舟而不正其柁可乎伯恭居喪授徒子靜極以為非今日使子靜在恐亦不敢以為非也居喪須避嫌疑不可自信而已古人之受汙者多以此人或以是汙之亦無路分說也進善無足處有足便小了臧否人物此是一件不好勾當稱善雖是美事然必見得透恐為僞人所罔所以為聖賢不必刪述定作如孔子折衷羣聖以垂憲萬世也不過求之吾心致敬於動靜語默衣服飲食五倫日用以至辭受取舍仕止久速無不合乎聖賢已行之成法而已君子視人猶已以義處己不以義處人非君子之道也流俗雖不美而天下未嘗無正人天下未嘗無正論此固人心之所以不死而天道之所以扶持斯世者也君子之學持靜之本以存其虛防動之流以守其一虛則內有主而不出一則外有防而不入則物不交於我矣物不交於我則我之所以為我者非人也天也或曰剛折而柔存此非知剛者也天不剛乎地不柔乎地有陷而天未嘗墜不剛者存而柔者墮乎山止也水流也山剛而水柔不剛者存而柔者去乎齒之折者剛之無本者也髮附於頭顱頭顱存而毛髮去者何也誠曷終乎土可入誠不可得而息也入土斯已矣誠曷不息也所謂生也守之以死死則終誠不可得而息也所見專則所守固與其以一善成名寧學聖人而未至文懿章楓山先生懋章懋字德懋金華蘭溪人成化丙戍㑹試第一選庶吉士授編修與同官黃仲昭莊昶諫上元煙火杖闕下謫知臨武厯南大理評事福建按察司僉事考績赴吏部乞休冢宰尹旻曰不罷軟不貪酷不老疾何名而退先生曰古人正色立朝某罷軟多矣古人一介不取視民如傷某貪酷多矣年雖未艾鬚髮早白亦可謂老疾矣遂致仕林居二十年弟子日進講學楓木菴中學者因曰楓山先生𢎞治中起為南京祭酒㑹父喪力辭廷議必欲其出添設司業虛位以待之終制就官六館之士人人自以為得師正德初致仕轉南京太常禮部侍郎皆不起嘉靖初以南京禮部尚書致仕是嵗辛巳除夕卒年八十六贈太子太保諡文懿其學確守宋儒本之自得非有傳授故表裏洞徹望之龎朴即之和厚聽其言開心見誠初若不甚深切久之燭照數計無不驗也以方之涑水雖功業不及其誠實則無間然矣金華自何王金許以後先生承風而接之其門人如黃傳張大輪陸震唐龍應璋董遵凌瀚程文德章極皆不失其傳云遺事諸子皆親農事邑令來見諸子輟耕跪迎先生官祭酒其子往省道逢巡檢笞之知而請罪先生笑曰吾子垢衣敝履宜爾不識又何罪焉太宰唐漁石出入徒步人以為言漁石曰楓山先師致政歸祇是步行自後朴菴極竹澗潘希曾兩侍郎俱守此禮吾安敢違耶楓山祖居渡瀆距城十五里當事至蘭溪者必出城訪之至則一飯雞黍數豆力不能辦多假借於族人其後遷居城中小樓二間卑甚先生宴坐其間每作文時繞行室中其冠往往觸梁墊角先生不知也先生田只二十畝而家人十口歲須米三十六石所入不足當其半則以麥屑充之宅後為天福山一日勾人者過其門其人奔入取道至山而去手力疑為先生家匿之先生即令其遍索不得手力亦從後門去先生與夫人略不動色每歲宴其門人二次清明冬至祭祀之餕也兩人共一席有不至者先生自專一席若門人續至專席已罄則夫人自出益之朴菴先生之姪也其質朴略相似先生聞其歸家尚有贏俸即為不樂朴菴亦有慙色語要人形天地之氣性天地之理須與天地之體同其廣大天地之用同其周流方可謂之人學者須大其心胸蓋心大則萬物皆通必有窮理工夫心才㑹大又須心小心小則萬物畢晰必有涵養工夫心才㑹小不至狂妄矣或勸以著述曰經自程朱後不必再注只遵聞行知於其門人語録芟繁去蕪可也桃符曰正要鬼神司屋漏何須荼壘衛門庭每講伯夷叔齊餓首陽之下民到於今稱之之語便自警拔格君心收人才固民心然後庶事可舉惟唐虞三代皆聖人致中和而參贊下此一泰一否為氣運所推蕩耳窮理自進退辭受之節分明不茍始居敬於專一上見功應璋問學先生曰勉齊真實心地刻苦工夫八字盡之矣原學人生而靜之謂性得乎性而無纍於欲焉之謂學學在於人而於性未嘗加不學在於人而於性未嘗損學有純正偏駁而於性未嘗雜性本不學而能者也而必假於學性之動於欲也學以求完夫性者也而顧戕夫性學之失其原也蓋人之性也即天之命也於穆不顯命之本體而四時五行萬化出焉至靜無感性之本體而四端五常百行具焉本體藏於寂妙用通於感運之於心為思慮發之於身為貌言視聽施之於家為父子昆弟措之於國與天下為君臣上下禮樂刑政以性為有內也何性非物也以性為有外也何物非性也得乎性之體則意可誠心可正身可修家可齊國治而天下平也據此之謂德履此之謂道學此之謂學勉之為賢安之為聖堯曰執中明其體之無所偏耳舜曰精一明其體之無所雜耳孔子曰仁子思曰誠孟子曰盡聖學相傳千古一􅎃一性盡而天下無餘事天下無餘學也佛老之教行於世久矣後之儒者非不倡言以排之而卒不能勝之者學之不明性之未盡也老氏以無名為天地之始無欲觀人心之妙無為為聖人之治而佛家者流則又生其心於無所住四大不有五蘊皆空其道以性為心之體吾惟修吾心煉吾性而已明吾心見吾性而已不必屑屑於其外也是以其學陷於自私自利之偏至以天地萬物為芻狗為幻化棄人倫遺物理不可以治天下國家焉今之學則又異於是矣心性之教不明而功利之私遂淪浹而不可解傳訓詁以為名誇記誦以為博侈辭章以為靡相矜以智相軋以勢相爭以利相髙以技能相取以聲譽身心性命竟不知為何物間有覺其謬妄卓然自奮欲以行能功實表見於世則又致飾於外無得於內莫不以為吾可以修身也可以齊家也可以治國平天下也又莫不以為吾不學佛老之夢幻人世遺棄倫理也然要其所為不過為假仁襲義之事終不足以勝其功利之心其去聖學也逺矣猶幸生於今之世毋使佛老見之也使佛老生今世而見吾人所為其不竊笑者幾希是求免於佛老之不我闢不可得也暇闢佛老乎哉所幸真性之在人心未嘗一息泯沒而聖學昭然如日中天敏求之精察之篤行之一切氣禀物欲俱不能纍必求真靜之體以立吾心之極懲忿懲此也窒欲窒此也改過改此也遷善遷此也不為佛老之虛無不為俗學之卑瑣斯為聖學也已若曰是性也吾有自然之體也不能戒懼謹獨以求必得而欲以虛悟入則意見之障終非自得縱使談說得盡亦與訓詁記誦詞章功利者等爾而何以為學也郎中莊定山先生昶莊昶字孔暘號定山江浦人也成化丙戍進士選庶吉士授翰林簡討與同官章楓山黃味軒諫鰲山杖闕下謫判桂陽改南京行人司副遭喪服闋不起垂二十年𢎞治甲寅特㫖起用先是瓊山丘濬疾先生不仕嘗曰率天下士夫背朝廷者昶也彼不讀祖訓乎蓋祖訓有不仕之刑也至是濬為大學士先生不得已入京長揖冢宰遂補原官明年升南京吏部郎中尋病遷延不愈又明年告歸丁巳考察尚書倪嶽以老疾中之士林為之駭然己未九月二十九日卒年六十三先生以無言自得為宗受用於浴沂之趣山峙川流之妙鳶飛魚躍之機略見源頭打成一片而於所謂文理密察者竟不加功蓋功未入細而受用太早慈湖之後流傳多是此種學問其時雖與白沙相合而白沙一本萬殊之間煞是仔細故白沙言定山人品甚髙恨不曾與我問學遂不深講不知其後問林緝熙何以告之其不甚契可知矣即如出處一節業已二十年不出乃為瓊山利害所怵不能自遂其志先生殊不喜孤峯峭壁之人自處於寬厚遲鈍不知此處却用得孤峯峭壁著也白沙云定山事可怪恐是久病昏了出處平生大分顧令兒女輩得専制其可否耶霍渭崖謂先生起時瓊山已薨是誣瓊山也按先生以甲寅七月出門九月入京朝見瓊在乙卯二月卒官安得謂起時已卒哉况是時徐宜興言定山亦是出色人瓊山語人我不識所謂定山也則其疾之至矣安得謂誣哉先生形容道理多見之詩白沙所謂百鍊不如莊定山是也唐人白樂天喜談禪其見之詩者以禪言禪無不可厭先生之談道多在風雲月露傍花隨桞之間而氣象曜如加於樂天一等錢牧齊反謂其多用道語入詩不知定山其自謂知白沙亦未必也語要聖人之道貴無言而不貴有言言則影響形迹而無言則真靜圓融若憤也而真見若冥也而真趣若虛寂也而真樂彼以天得而此以天與極其自得之真而出乎意象之外是以聖人不貴有言吾之此身受形父母既有此形則有此理使吾身有一理不盡吾於父母之形為徒受矣浙人余中之過溪雲以皇極經世之學授余讀其書至王天悅所謂推以某甲之年月必得某甲之時日而後富夀必先以某甲之年月而後貧賤以至水陸舟車之所産東西南北之所居精粗巨細之事無不皆然而至所謂福善禍淫略無一二余雖口唯其義而心實不敢以為學也聖賢之學惟以存心為本心存故一一故能通通則瑩然澄徹廣大光明而羣妄自然退聽言動一循乎禮好惡用舍各中乎節屈原長於騷董賈長於䇿揚雄韓愈長於文穆伯長李挺之邵堯夫長於數遷固永叔君實長於史皆諸儒也朱子以聖賢之學有功於性命道德至凡四書五經綱目以及天文地志律吕厯數之學又皆與張敬夫吕東萊蔡季通者講明訂正無一不至所謂集諸儒之大成也此豈濂溪二程子之大成哉六經莫大於易而易有隂陽也方其無言也易具於心渾然無為及其有言則孰為隂孰為陽而隂陽之授受皆傳之紙上而易始散矣易非散也紙上而易自散也四書莫精於中庸中庸言性道教也方其無言也中庸具於心噩然無名及其有名則孰為性孰為道孰為教而性道教授受者得之口耳而中庸始亂矣中庸非亂也口耳而中庸自亂也詩書禮樂春秋論孟莫不皆然心非靜則無所斂主乎靜者斂此心而不放也心非敬則無所持居乎敬者持此心而不亂也理非窮則無所考窮乎理者考此心而不失也往年白沙先生過余定山論及心學先生不以余言為謬亦不以余言為是而謂余曰此吾緝熙林光之在清湖者之所得也而子亦有是哉世之好事詆陳為禪者見夫無言之說謂無者無而無然無極而太極靜無而動有者吾儒亦不能無無也但吾之所謂無者未嘗不有而不滯於有禪之所謂無者未嘗有有而實滯於無禪與吾相似而實不同矣道無不在一大渾淪者散在萬物散在萬物者俱可打成一片而衆人則不知也楊墨之害甚於申韓佛老之害過於楊墨科舉之學其害甚於楊墨佛老為我兼愛虛無寂滅蓋足闢矣至於富貴利逹患得患失謀之終身而不知反者則又楊墨佛老之所無也屬聨比對㸃綴紛華某題立某新說某題立某程文皮膚口耳媚合有司五經四書擇題而出變風變雅學詩者不知喪弔哭祭學禮者不知崩薨葬卒學春秋者不知嗚呼此何學也富貴而已利逹而已覬覦剽竊而已朱子謂廬山周宜幹有言朝廷若要恢復中原須罷三十年科舉始得蓋已深惡之矣天地萬物總吾一體窗草不除皆吾生意元㑹運世皆我古今伏羲周孔顔曾思孟皆吾人物易書詩禮春秋皆吾六經帝力何有太平無象皆吾化育天之生聖賢將為世道計也或裁成以制其過或輔相以補其不足孔子之於六經朱子之於傳注喚醒聾瞶所以引其不及者至矣今世降風移學者執於見聞入耳出口至於沒溺而淪胥之者非制其過可乎侍郎張東白先生元禎張元禎字廷祥别號東白南昌人少為神童以閩多書父攜之入閩使縱觀焉登天順庚辰進士第入翰林為庶吉士故事教習唐詩晉字韓歐文而先生不好也日取濂洛關閩之書讀之授編修成化初疏請行三年喪又言治道本原在講學聽治用人厚俗與當國不合移病歸家居二十年益潛心理學𢎞治初召修憲宗實録進左贊善上疏勸行王道升南京侍講學士終養九年召修大明會典進翰林學士侍經筵上注甚特遷卑座以聽其講丁憂喪畢改太常卿掌詹事府以為治化根源莫切於太極圖說西銘定性書敬齊針宜將此書進講上因索觀之曰天生斯人以開朕也武宗即位進吏部右侍郎未及上而卒正德元年十二月晦也先生既得君嘗以前言往行非時封進不知者以為私言也孝宗宴駕為人指摘先生亦不辨先生卓然以斯道自任一禀前人成法其言是心也即天理也已先發陽明心即理也之蘊又言寂必有感而遂通者在不隨寂而泯感必有寂然不動者存不隨感而紛已先發陽明未發時驚天動地已發時寂天寞地之蘊則於此時言學心理為二動靜交致者别出一頭地矣語要斯道在天地不患踐之弗力所患知之弗真蕭宜翀蚤遊聘君之門友克貞公甫居仁諸子不飾廉隅於泥坐蛇行不詭冠服於吕縚象偑不縱浮談於太極此道自程朱後所寄不過語言文字循習既久只形諸文字而言語殊不之及形諸文字才能執筆即於性命之奧帝王之略極力描寫不以為異若言語間有及之聽者雖面相隆重退輒號笑之曰此道學又或公排擯之曰此僞學士風一至於是然實由言語者所談非所見所見非所履故也吾人致力於大本須灼見外教同中有大不同處此理在天地間如今造版籍糧册相似有總有撤徒知囫圇一大塊而不知辨析於毫釐略窺影響便爾呌噪不復致詳致謹反謂得人所未得之真樂鄙禮法為土苴嗤簡䇿為糟粕卒至顛瞀老死大抵實有此者氣象自别語言動靜何莫非此若不養得深厚皆是徒然此本不蹺蹊不差異不髙逺不粗率不放肆彼言動之蹺蹊差異或務為髙逺粗率放肆者則其人之能有此與否可知已天池所以相播相蕩相軋相磨晝夜不息者其心無他惟在生物而已雖其雷霆之震擊霜雪之凋殘亦所以破其頑而禁其盛非心乎殺之也人即天理所生之物也如花木之接水泉之續然實皆得是生物之心以為心者也茍非得是心則是身無以生矣是心也即天理也天理之在此心日用之間本無不流通但以既有此身則不能無耳目口鼻耳目口鼻既獨有諸由是誘之以聲色之紛華臭味之甘美得之不得而喜怒哀樂之發遂不能無私焉身既有私則此心或為之蔽而天理漸以泯矣寂必有感而遂通者在不隨寂而泯感必有寂然不動者存不隨感而紛布政陳克菴先生選陳選字士賢號克菴台之臨海人天順庚辰試禮部丘文莊得其文曰古君子也置第一及相見而貌不揚文莊曰吾聞荀卿云賢聖無相將無是乎授監察御史羅一峯論奪情被謫先生抗疏直之出按江西藩臬以素服入見先生曰非也人臣覲君服視其品秩於御史何居不事風裁而貪墨望風解綬已督學南畿一以德行為主試卷列諸生姓名不為彌封曰吾且不自信何以信於人邪每按部就止學宫諸生分房誦讀入夜燈火熒然先生以兩燭前導周行學舍課其勤惰士風為之一變成化初改中州提學幸奄汪直巡視郡國都御史以下咸匍匐趨拜先生獨長揖直怒曰爾何官敢爾先生曰提學愈怒曰提學寧大於都御史耶先生曰提學宗主斯文為士子表率不可與都御史比直既懾其氣岸又諸生集門外知不可犯改容謝曰先生無公務相關自後不必來先生徐步而出轉按察使歸奔母喪喪畢除廣東布政使肇慶大水先生上災傷狀不待報輒發粟賑之市舶奄韋眷橫甚番禺知縣髙瑶發其贓巨萬都御史宋旻不敢詰先生移文奬瑶眷深憾之番人貿貨詭稱貢使發其僞逐之外使將市狻猊入貢又上疏止之皆眷之所不利者也眷乃誣先生黨比屬官上怒遣刑部員外郎李行㑹巡按御史徐同愛共鞫兩人欲文致之謂吏張褧者先生所黜必恨先生使之為證褧曰死即死耳不敢以私恨陷正人也爰書入詔錦衣官逮問士民數萬人夾舟而哭至南昌疾作卒於石亭寺年五十八友人張元禎殮以疏絡或咎其薄元禎曰公平生清苦殮以時服公志也張褧乃上言臣本小吏以詿誤觸法為選罷黜實臣自取眷妄意臣必恨選以厚賄啖臣令扶同陷選臣雖胥徒安敢欺昧心術顛倒是非眷知臣不可利誘嗾行等逮臣於理彌日拷掠身無完膚臣甘罪籲天終無異口行等乃依傍眷語以欺天聽選剛不受辱旬日而殂君門萬里孰諒其寃臣以罪人擯斥田野百無所圖敢冒死鼎鑊者誠痛忠廉之士銜屈抑之寃長讒佞之奸為聖明之纍也奏入不報第以他事罷眷鎮守正德中追贈光祿寺卿諡恭愍先生嘗以易教授生徒晚而居官論易專主傳義一無異同以克已求仁為進修之要故自號克菴讀書不資為文辭手録格言為力行之助每上疏必屏居齊沐引使者於庭再拜而遣子劉子曰由張東白之事觀之非平日安貧守道之意徹乎表裏安能使朋友信之如是由張褧之事觀之非在官賞罰黜陟出乎至公安能使黜吏化之如是吾有以見先生存誠之學矣明儒學案卷四十五
