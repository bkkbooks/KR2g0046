body:
  text: 明儒學案卷六餘姚黃宗羲撰崇仁學案三恭簡魏莊渠先生校魏校字子才號莊渠崑山人𢎞治乙丑進士授南京刑部主事歷員外郎郎中不為守偹奄人劉琅屈召為兵部郎移疾歸嘉靖初起廣東提學副使丁憂補江西兵備改河南提學七年升太常寺少卿轉大理明年以太常寺卿掌祭酒事尋致仕先生私淑於胡敬齊其宗㫖為天根之學從人生而靜培養根基若是孩提知識後起則未免夾雜矣所謂天根即是主宰貫動靜而一之者也敬齊言心無主宰靜也不是工夫動也不是工夫此師門敬字訣也第敬齊工夫分動靜先生貫串總不離本末作兩段事則加密矣聶雙江歸寂之㫖發端於先生也先生言理自然無為豈有靈也氣形而下莫能自主宰心則虛靈而能主宰理也氣也心也岐而為三不知天地間祗有一氣其升降往來即理也人得之以為心亦氣也氣若不能自主宰何以春而必夏必秋必冬哉草木之榮枯寒暑之運行地理之剛柔象緯之順逆人物之生化夫孰使之哉皆氣之自為主宰也以其能主宰故名之曰理其間氣之有過不及亦是理之當然無過不及便不成氣矣氣既能主宰而靈則理亦有靈矣若先生之言氣之善惡無與於理理從而善之惡之理不特死物且閒物矣其在於人此虛靈者氣也虛靈中之主宰即理也善固理矣即過不及而為惡亦是欲動情勝此理未嘗不在其間故曰不為堯存不為桀亡以明氣之不能離於理也先生疑象山為禪其後始知為坦然大道則於師門之教又一轉矣先生提學廣東時過曹溪焚大鑒之衣椎碎其鉢曰無使惑後人也諡恭簡體仁說天地太和元氣氤氤氲氲盈滿宇內四時流行春意融融藹藹尤易體驗盎然吾人仁底氣象也人能體此意思則胸中和氣駸駸發生天地萬物血脈相貫充鬱之久及其應物渾乎一團和氣發見所謂麗日祥雲也冬氣閉藏極於嚴密故春生溫厚之氣充鬱薰蒸陰崖寒谷亦透學而弗主靜何以成吾仁涵養可以熟仁若天資和順不足於剛毅可更於義上用功否曰陽之收斂處便是陰仁之斷制處便是義靜中一念萌動才涉自私自利便覺戾氣發生自與和氣相反不能遏之於微戾氣一盛和氣便都消鑠盡了須重接續起來但覺才是物欲便與截斷斬其根芽此便是精義工夫也天之主宰曰帝人之主宰曰心敬只是吾心自做主宰處今之持敬者不免添一個心來治此心却是别尋主宰春氣融融萬物發生急迫何緣生物把捉太緊血氣亦自不得舒暢天理其能流行乎整齊嚴肅莫是先制於外否曰此正是由中而出吾心才欲檢束四體便自竦然矣外既不敢妄動內亦不敢妄思交養之道也木必有根然後千枝萬葉可從而立水必有源然後千流萬派其出無窮人須存得此心有個主宰則萬事可以次第而治古人藴蓄深厚故發越盛大今人容易漏泄於外何由厚積而逺施學者當深玩默成氣象渾厚則開文明澆薄則開巧僞學須涵養本原天地渾渾一大氣萬物分形其間實無二體譬若百果纍纍總是大樹生氣貫徹又如魚在水中內外皆水也人乃自以私意間隔豈復能與天地萬物合一乎持敬易間斷常如有上帝臨之可乎曰上帝何時而不鑒臨奚待想像也日月照臨如目斯覩風霆流行如息相詬今吾一呼一吸未嘗不與大化通也是故一念善上帝必知之一念不善上帝必知之天命有善無惡故善則順天惡則逆天畏天之至者嘗防未萌之惡小人無忌憚是弗以上帝為有靈也天地氣化初極渾厚開盛則文明久之漸以澆薄盛極則有衰也聖人生衰世常欲返朴還淳以回造化故大林放問禮之本質是從裏面漸發出來文是外面發得極盛聖人欲人常存得這些好意思在裏靣令深厚懇惻有餘若只務外面好看却是作僞也道體浩浩無窮人被氣質限住罕能覩其純全若只據已見持養將去終是狹隘孤單難得展拓須大著心胸廣求義理盡合天下聰明為我聰明庶幾規模濶大氣質不得而限量之理者氣之主宰理非别有一物在氣為主只就氣上該得如此處便是理之發用其所以該得如此則理之本體然也通宇宙全體渾是一理充塞流行隨氣發用在這裏便該得如此在那裏又該得如彼千變萬化不同人見用有許多遂疑體亦有許多不知只是一理所為隨在而異名耳本體更無餘二也純粹至善者理也氣有弗善理亦末如之何斯乃氣強而理弱乎曰否理該得如此而不能自如此其能如此皆氣為之也氣能如此而不能盡如此滯於有迹運復不齊故也夫理冲漠無聯無者不可分裂所以一也渾淪惟一一者不可二雜所以純也氣有形不可分愈分則愈雜美惡分若有萬不齊矣理氣合則一違則二春氣氤氲盎乎其和此天地之仁也秋氣晶明肅乎其清此天地之義也何處分别是理是氣春宜溫厚而弗溫厚秋宜嚴凝而弗嚴凝此非理該如此乃是氣過不及弗能如此孟子曰配義與道此是理該如此而氣能如此所謂合則一也孔子曰回也其心三月不違仁心而違仁判為兩物弗復合一所謂違則二也或問孝之根原莫是一體而分該得孝否曰此只是當然不容已處曰豈天命自然乎曰怎得便會自然如此天地生生只是一團好氣聚處便生人具此生理各有一團好意思在心父母吾身所由以生也故惻怛慈愛於此發得尤懇切其本在是也禮主敬讓其心聳然如有畏退然如弗勝然後儀文斯稱今之矜嚴好禮者但知自尊自重直行已意而已此乃客氣所使非復禮之本然矣思慮萬起萬滅如之何曰此是本體不純故發用多雜工夫只在主一但覺思慮不齊便截之使齊立得個主宰却於雜思慮中先除邪思慮以次除間思慮推勘到底直與斬絶不得放過久之本體純然是善便自一念不生生處皆善念矣聖賢冲然無欲學者當自不見可欲始一念動以人欲根勘何從而來照見衆欲性中元無俱從軀壳上起穢我靈臺衆欲不行天理自見天命有元亨利貞故人性有仁義禮智人性有仁義禮智故人情有惻隱羞惡辭讓是非純粹至善本來如是其有不善又從何來曰此只是出於氣質性本善然不能自善其發為善皆氣質之良知良能也氣質能為善而不能盡善性即太極氣質是陰陽五行所為氣運純駁不齊故氣稟合下便有清濁厚薄濁則遮蔽不通薄則承載不起便生出不善來性惟本善故除却氣質不善便純是善性惟不能自善故變化氣質以歸於善然後能充其良知良能也人性元善當其惡時善在何處曰善自常在不滅只因氣質反了這善便生出惡善之本體不得自如若能翻轉那惡依舊是善或曰人生而靜氣未用事其性渾然至善感於物而動氣得用事故其情有善有不善曰如是則體用二原矣性善情亦善靜時性被氣稟夾雜先藏了不善之根故動時情被物欲汚染不善之萌芽才發存養於靜默消其不善之根省察於動才覺不善之萌芽便與鋤治積集久之本體渾然是善發用處亦粹然無惡矣一理散為萬事常存此心則全體渾然在此而又隨事精察力行之則其用燦然各有著落虛靈主宰是之謂心其理氣之妙合與氣形而下莫能自主宰理自然無為豈有靈也氣之渣滓滯而為形其精英為神虛通靈爽能妙是理為主氣得其統攝理亦因是光明不蔽變化無方矣或窮孝之節目曰俱從根源處來只如昏定晨省人子晝常侍親而夜各就寢父母弗安置豈能自安既寢而興便思問候父母安否皆出於吾心至愛自不容已曰如是只須就根本上用功曰這却是分本末作兩假事天理合如此而吾不能如此正為私意蔽隔常培根源又就節目上窮究到根源處去其不如此者而求其當如此者則私意不得蔽隔天理常流通矣人各私其私天地間結成一大塊私意人君完養厥德盎然天地生物之心又求天下愷悌相與舉先王仁政行之悉破羣私合為天下大公天子當常以上帝之心為心興一善念上帝用休而慶祥集焉興一惡念上帝震怒而災沴生焉感應昭昭也昔人謂人君至尊故稱天以畏之却是舉一大者來嚇人君蓋未迪知帝命也人君當明乾坤易簡之理天下之賢才豈能人人而知之邪君惟論一相相簡大寮俾各自置其屬人得舉其所知而效之於上則無遺賢所謂乾以易知也天下之政豈能事事而親之耶君恭已於上委任於相相分任於百司而責其成功上好要而百事詳所謂坤以簡能也復余子積論性書竊觀尊兄前後論性不啻數十萬言然其大意不過謂性合理與氣而成固不可指氣為性亦不可專指理為性氣雖分散萬殊理常渾全同是一箇人物之性不同正由理氣合和為一做成許多般來在人在物固有偏全而人性亦自有善有惡若理則在物亦本無偏在人又豈有惡耶愚意謂尊兄論性之誤正坐理氣處見猶未真耳理在天地間本非别有一物只就氣中該得如此便是理人物之性又從何來即天地所賦之理亦非别有一物各就他分上合當恁地便是尊兄謂理常渾淪氣才有許多分别出來若如愚見則理氣元不相離理渾淪只是一個氣亦渾淪本只一個氣分出許多則理亦分出許多混沌之時理氣同是一個及至開闢一氣大分之則為陰陽小分之則為五行理隨氣具各各不同是故在陽則為健在陰則為順以至為四德為五常亦復如是二五錯綜又分而為萬物則此理有萬其殊矣理雖分别有許多究竟言之只是一個該得如此故曰理一而分殊嘗自其分殊者而觀之健不可以為順順亦不可以為健四德五常以至萬物之理各不能相通此理疑若滯於方所矣不知各在他分上都是該得如此大固無餘小亦無缺故能隨在具足隨處充滿更無空闕之處若合而不可分同而不復異則是渾淪一死局必也常混沌而後可耳天地者陰陽五行之全體也故許多道理靜則冲漠渾淪體悉完具動則流行發見用各不同人物之性皆出於天地何故人得其全物得其偏蓋天地之氣其渣滓為物偏而不備塞而不通健順五常之德不復能全但隨形氣所及而自為一理飛者于空潛者泳川蠢動自蠕草木何知亦各自為榮瘁不相假借陵奪而能若蜂蟻之君臣虎狼之父子騶虞之仁神羊之義乃其塞處有這一路子開故只具得這些子即此一些子亦便自理鳥之有鳳獸之有鱗鱗之有龍介之有龜皆天地間氣所出畢竟是渣滓中精英故終與人不相似也人稟二五精英之氣故能具得許多道理與天地同然惟聖人陰陽合德純粹至善其性無不全可以位天地育萬物自大賢以下精英中不能無渣滓這個性便被他蔽隔了各隨其所得渣滓之多寡以為等差而有智愚賢不肖之别畢竟性無不同但精英中帶了些渣滓故學以變化其氣質則渣滓渾化可以復性之本體矣古聖賢論性正是直指當人氣質內各具此理而言故伊川曰性即理也告子而下荀楊韓諸人皆錯認氣質為性翻騰出許多議論來轉加鶻突今謂性合理與氣而成則恐昧於形而上下之别夫子曰一陰一陽之謂道又曰易有太極皆在氣上直指此理而言正以理氣雖不相離然亦不曾相雜故又曰形而上者謂之道形而下者謂之器若性合理氣而成則是形而上下者可以相雜理在天地間元不曾與氣雜何獨在人上便與氣相雜更願於此加察然此亦非出於尊兄先儒謂有天地之性有氣質之性分作兩截說了故尊兄謂既是天地之性只當以理言不可遽謂之性氣質之理正是性之所以得名可見理與氣質合而成性也竊嘗考諸古聖賢論性有二其一以性與情對言此是性之本義直指此理而言或以性與命對言性與天道對言性與道對言其義一也古性情字皆從心從生言人生而具此理於心名之曰性其動則為情也此於六書屬會意正是性之所以得名其一以性與習對言者但取生字為義蓋曰天所生為性人所為曰習耳性從生故借生字為義程子所謂生之謂性止訓所稟受者也此與六書自屬假借六書之法假借一類甚多後儒不明訓釋六經多為所梗費了多少分疏六經言性始於成湯伊尹湯誥惟皇上帝降衷於下民若有恆性此正直指此理而言夫子易大傳曰乾道變化各正性命又曰繼之者善也成之者性也子貢謂夫子之言性與天道不可得而聞子思述之於中庸曰天命之謂性孟子道性善實出於此其曰乃若其情則可以為善矣乃所謂善也又發明出四端又謂君子所性仁義禮智根於心可謂擴前聖所未發忒煞分明矣伊尹習與性成論語曰性相近也習相逺也家語謂少成若天性習慣如自然可見這性字但取天生之義中庸論天命之謂性又曰自誠明謂之性自明誠謂之教孟子道性善又曰堯舜性之湯武反之皆與前性字不同雖不與習對說然皆以天道人道對言可見二性字元自不同也先儒只因性相近也一句費了多少言語分疏謂此性字是兼理與氣質來說不知人性上不可添一物才帶著氣質便不得謂之性矣荀子論性惡楊子論性善惡混韓子論性有三品衆言淆亂必折諸聖若謂夫子性相近一言正是論性之所以得名處則前數說皆不謬於聖人而孟子道性善却反為一偏之論矣孟子道性善只為見得分明故說得來直截但不曾說破性是何物故荀楊韓諸儒又有許多議論伊川一言以斷之曰性即理也則諸說皆不攻自破矣孟子道性善是擴前聖所未發明道何以又謂論性不論氣不備論氣不論性不明二之則不是蓋孟子只說人性之善却不曾說人有不善是被氣稟蔽了他其論下手處亦只是說存心養性擴充其四端不曾說變化氣質與克治底功夫故明道謂論性必須說破氣質蓋與孟子之言相發明也但明道又謂善固性也惡亦不可不謂之性人生而靜以上不容說才說性時便已不是性也此則未免失之太過矣噫人性本善何得有惡當其惡時善在何處此須著些精彩看上天之載無聲無臭其在吾人性之本體亦復如是性上添不得一物只為他是純粹至善底聖人氣稟淳厚清明略無些渣滓但渾是一團理莊生所謂人貌而天曾子所謂江漢以濯之秋陽以暴之皓皓乎不可尚已自大賢以下才被些氣稟與物欲夾雜便生出惡來惡乃氣稟物欲所為自與吾性無與故雖蔽固之湥依然有時發見但不能當下識取又被氣稟物欲汩沒了他不能使之光明不蔽耳人性惟善是真實一切諸惡盡成虛妄非吾性之固有若當惡念起時與他照勘窮來窮去便都成空矣天生吾人合下付這道理散見於日用事物而總具於吾心必先常常提省此心就逐事上一一窮究其理而力行之根本既立則中間節目雖多皆可次第而舉若不於心地上用功而徒欲泛然以觀萬物之理正恐茫無下手處此心不存一身已無箇主宰更探討甚道理縱使探討得來亦自無處可安頓故有童而習之皓首而無成者古人知行只是一事方其求知之始正欲以為力行之資及其既知則遂行之而不敢緩今讀聖賢書正宜反求諸身體貼道理去做孟子曰學問之道無他求其放心而已矣論學書存養省察工夫固學問根本亦須發大勇猛心方做得成就若全不曾發憤只欲平做將去可知是做不成也孔門唯顏子可當中行自曾子以至子思孟子氣質皆偏於剛然其所以傳聖人之道則皆得剛毅之力也文公謂世衰道微人欲橫流不是剛毅的人亦立腳不住今之士大夫得一階半級則以為喜失一階半級則以為憂譬如鳥在籠中縱令底下直飛至頂上許大世界終無出日伊川言中心斯須不和不樂則鄙詐之心入之矣此與敬以直內同理謂敬為和樂固不可然敬須和樂只是心中無事也人一日間喜怒哀樂不知發了多少其中節也常少不中節也常多雖無所喜怒哀樂時而喜怒哀樂之根已自先伏於其間歲莫一友過我見某凝塵滿室泊然處之歎曰吾所居必灑掃涓潔虛室以居塵囂不雜則與乾坤清氣相通齊前雜樹花木時觀萬物生意深夜獨坐或啓扉以漏月光至昧爽恆覺天地萬物清氣自逺而届此心與相流通更無窒礙今室中蕪穢不治弗以纍心賢於玩物逺矣但恐以神爽未必有助也某居家簡重不以事物經心友人曰人心須完密一事不可放過學而不事事則踈漏處必多應事時必缺陷了道理吾見清髙虛靜之士久之未有不墮落者一陰一陽之謂道今喜靜厭動正如有陰無陽不成化矣某聞言聳然人心通竅於舌是以能言多言之人此心奔迸外出未言舌常有動意故其蓄聚恆淺應用易踈但與其箝制於外不若收斂於中驗之放去收轉之間而心之存亡攸繫當自有著力處也天下之事若從憤世嫉邪起端未免偏於肅殺必也從太和中發出則四時之氣咸備而春生常為之主乃可合德造化也心乃我身主宰從天下至此已是盡頭處而心却發出兩路善惡岐焉誠意是管歸一路也善惡各有來路善是從心體明處發來惡便是從暗處發來致知是要推明破暗也心與物交若心做得主以我度物則暗者可通若舍已逐物物反做主明者可塞故工夫起頭只在先立乎其大者李獻吉晚而與某論學自悔見道不明曰昔吾汨於詞章今而厭矣靜中恍有見意味逈然不同則從而録之某曰録後意味何如獻吉默然良久驚而問曰吾實不自知才劄記後意味漸散不能如初何也某因與之極言天根之學須培養深沉切忌漏泄因問平生大病安在曰公才甚髙但虛志與驕氣此害道之甚者也獻吉曰天使吾早見二十年詎若是哉人之一心貫串千事百事若不立箇主宰則終日營營凡事都無統攝不知從何處用功又有兀坐以收放心事至不管是自隔絶道理如何貫串得來如愚見日用間不問有事無事常存此心有個主宰在此事來就此事上用功直截依著道理行莫要被私欲遮障纒繞如此才能貫串得過喜怒哀樂未發性本空也發而皆中節其應亦未嘗不空聖人體用一原也世人不無潛伏故有前塵妄動故有緣影是故不可無戒懼之心釋氏厭人欲之幻并與天性不可解於心者而欲滅之將乍見孺子入井怵惕真心與內交要譽惡其聲之妄心同謂塵影則與聖賢之學霄壤矣大丈夫凍死則凍死餓死則餓死方能堂堂立天地間若開口告人貧要人憐我以小惠詬沫我得無為賤丈夫乎人心元神昭昭靈靈收斂停畜因其真機引而伸之觸類而長之自有無窮之妙若專內遺外日用間分本末作兩假事如此仍是支離也近體大學頗窺聖學之樞機至易至簡說者自生煩難陽明蓋有激者也故翻禪學公案推佛而附於儒被他說得太快易聳動人今為其學者大抵髙擡此心不在本位而於義利大界限反多依違吾輩欲學聖人不求諸人生而靜祗就孩提有知識後說起又不察性之故與物欲則是以念念流轉者為主陳元誠疑吾近日學問見得佛老與聖人同大為吾懼元誠論靜云一念不生既不執持又不蒙昧三件犯著一件便不是知道無中邊而不知內為主則茫無下手處知內為主而不知道無中邊則隘故曰此心學之全功也天文左右前皆動也惟北辰不動人身背亦如之故曰天根之學本易艮背之㫖五峰之學不務涵養本原只要執發見一端便張皇作用故有急迫助長之病心之神明無乎在而無乎不在也無乎不在而有在也靜則氣母歸根動則神機發見故疑其在彼而不知實在於心雖有在也而無迹也人心立極雖有間斷處亦好接頭否則終日向學不免散而無統也近與一人論理氣因問之曰人當哀痛時滿體如割涕淚交流此惻隱之心也當羞愧時面為發赤汗流被體此羞惡之心也今且分别誰是理耶誰是氣耶其人唯唯曰未也哀痛羞愧固有發不中節時亦復涕汗流出豈亦理之為耶其人不能自解某曰理非别有一物只就氣該得如此便是理理本該得如此然却無為其能如此處皆氣為之也然氣運不齊有不能盡如此處理氣合一則理即是氣氣即是理吻乎不分孟子所謂配也氣與理違則判而二矣夫子所謂回也其心三月不違仁又謂人能𢎞道非道𢎞人皆此意也今試就吾心日用間體驗有時分明見得理該如此而吾不能如此打成兩片若謂氣即是理只好說善底一邊那惡一邊便說不去矣大成樂譜但以一聲協一字今譜古詩須有散聲方合天然之妙向見陳元誠歌古詩散聲多少皆出天然安排不得必須譜出來然後人可學耳象山天資甚髙論學甚正凡所指示坦然如由犬道而行但氣質尚粗煆鍊未粹不免好剛使氣過為抑揚之詞反使人疑昔議其近於禪學此某之陋也大抵人自未應事及乎應事以至事過總是此心又進一步自未起念時及乎起念以至念息亦猶是也善用功則貫串做一個否則間隔矣吾所謂立本是貫串動靜工夫研幾云者只就應事起念時更著精彩也道體浩浩無窮吾輩既為氣質拘住若欲止據已見持守固亦自好終恐規模窄狹枯燥孤單豈能展拓得去古人所以親師取友汲汲於講學者非故泛濫於外也止欲廣求天下義理而反之於身合天下之長以為一已之長集天下之善以為一已之善庶幾規模濶大氣質不得而限之侍郎余訒齊先生祐余祐字子積别號訒齊鄱陽人年十九往師胡敬齊敬齊以女妻之登𢎞治己未進士第授南京刑部主事忤逆瑾落職瑾誅起知福州晉山東副使兵備徐州以沒入中官貨逮詔獄謫南寧府同知稍遷韶州知府投劾去嘉靖改元起河南按察使調廣西兩遷至雲南左布政以太僕卿召轉吏部右侍郎未離滇而卒戊子歲也年六十四先生之學墨守敬齊在獄中著性書三卷其言程朱教人拳拳以誠敬為入門學者豈必多言惟去其念慮之不誠不敬者使心地光明篤實邪僻詭譎之意勿留其間不患不至於古人矣時文成朱子晚年定論初出以朱子到底歸於存養先生謂文公論心學凡三變如存齊記所言心之為物不可以形體求不可以聞見求惟存之之久則日用之間若有見焉此則少年學禪見得昭昭靈靈意思及見延平盡悟其失後會南軒始聞五峯之學以察識端倪為最初下手處未免闕却平時涵養一節工夫别南軒詩惟應酬酢處特逹見本根答叔京書尾謂南軒入處精切皆謂此也後來自悟其失改定已發未發之論然後體用不偏動靜交致其力工夫方得渾全此其終身定見也安得以其入門工夫謂之晚年哉愚按此辨正先生之得統於師門處居業録云古人只言涵養言操存曷嘗言求見本體是即文公少年之見也又云操存涵養是靜中工夫思索省察是動上工夫動靜二端時節界限甚明工夫所施各有所當不可混雜是即文公動靜交致其力方得渾全而以單提涵養者為不全也雖然動靜者時也吾心之體不著於時者也分工夫為兩節則靜不能該動動不能攝靜豈得為無弊哉其性書之作兼理氣論性深闢性即理也之言蓋分理是理氣是氣截然為二并朱子之意而失之有云氣嘗能輔理之美矣理豈不救氣之衰乎整菴非之曰不謂理氣交相為賜如此明儒學案卷六
