body:
  text: 明儒學案卷五十九餘姚黃宗羲撰東林學案二御史錢啓新先生一本錢一本字國端别號啓新常州武進人萬厯癸未進士授廬陵知縣入為福建道御史劾江西巡按祝大舟逮之貪風始衰又劾時相假明旨以塞言路請崇祀羅文毅羅文恭陳布衣曹學正已而巡按廣西皇太子册立改期上言自古人君未有以天下之本為戲如綸如綍乃展轉靡定如此者一人言及即曰此激擾也改遲一年屆期而又有一人言及又曰此激擾也復遲二三年必使天下無一人敢言庶得委曲遷延以全其眤愛之私曽不顧國本動搖周幽晉獻之禍可以立覩疏留中踰四月給事孟養浩亦以國本為言內批廷杖并削先生籍歸築經正堂以講學東林書院成與顧端文分主講席黨禍起小人以東林為正鵠端文謡無虛日而先生不為弋者所慕先生之將歿也豫營窀穸掘地得錢兆在庚戍賦詩曰庚戍年遙月易逢今年九月便相衝又曰月朔初逢庚戍令夬行應不再次且如期而逝蓋丁巳九月月建為庚戍也天啓二年壬戍贈太僕寺少卿豫祭一壇先生之學得之王塘南者居多懲一時學者喜談本體故以工夫為主一粒穀種人人所有不能凝聚到發育地位終是死粒人無有不才才無有不善但盡其才始能見得本體不可以石火電光便作家儅也此言深中學者之病至謂性固天生亦由人成故曰成之者性夫性為自然之生理人力絲毫不得而與故但有知性而無為性聖不能成愚不能虧以成虧論性失之矣先生深於易學所著有像象管見象鈔續鈔演九疇為四千六百八爻有辭有象占驗吉凶名範衍類儒學正脈名源編滙編録時政名邸鈔語録名黽記黽記聖門教人求仁無甚高逺只是要人不壞却心術狂狷是不壞心術者鄉願是全壞心術者稜角多全無渾涵氣象何以學為毋信俗耳庸目以是非時事臧否人物人分上是非好醜一切涵容不輕發露即高明廣大氣象朱子曰人之情偽固有不得不察然此意偏勝便覺自家心術亦染得不好也在聖人分上説無二而非一在凡人分上説無一而非二時時處處因二以求其一便是學的頭面性體不現總是血氣用事之夫聖人所謂無無聲臭耳非無天載也無思無為耳非無易也無伐無施耳非無善勞也操有破有載之心以立於世何時滚出太極圈來動而未形有無之間不是未形與形交界處亦不是有無過接處動之著為已形為念為慮動之微為未形為意為幾誠意研幾慎獨異名而一功必有事焉而勿正心心事無兩不於事外正心不於心外有事心事打成一片此所以為集義必有事焉而又正心必無事焉而唯正心皆襲皆取心者三才主宰之總名天地之心天地之主宰人心人之主宰只單以人言心一而不三通天地人以言心一而三三而一别無兩心謂人心道心八字打開謂道心為主人心聽命謂性是先天太極之理心兼後天妙氣性是合虛與氣心是合性與知覺俱要理會通透以三才言生理性也以三才言主宰心也一而不三無主心非其心矣一而不三不生性非其性矣君子所性仁義禮智根於心心性不合一都無根其心三月不違仁心與仁不合一都是違七十而從心所欲不踰矩心矩不合一都是踰君子以仁存心以禮存心仁則心存不仁則亡禮則心存無禮則亡若曰存之於心而不忘仁禮皆心中之磈礧物矣同此一息之時同此一息之氣有以之生有以之死有以之存有以之亡便見生死存亡只一氣恁地滚出不窮底又見物各一極斷然不相假借底聖學率性禪學除情些毫釐千里之辨聖賢教人下手樹藝五穀五穀熟而民人育異端教人下手芟柞荑稗謂了妄即真恐天下並無荑稗去就有五穀熟之理卦必三畫見得戴天履地者人非是以一人為人必聯合天地而後為人迦文丐首也坐談虛空誰為生養只得乞以乞率人亷恥喪盡是以凡涉足釋途者亷隅都無可觀不可以知為識亦不可以遍物之知為格物告子曰生之謂性全不消為故曰以人性為仁義猶以杞柳為杯棬此即禪宗無修證之説不知性固天生亦由人成故曰成之者性又曰成性存存世儒有專談本體而不説工夫者其誤原於告子萬物皆備我也體物不遺心也離物言我失我遺物認心失心單言致知亦是無頭學問須從格物起手不見頭腦之人儘饒有定靜工夫如池沼之水澄靜無汩豈不亦號為清泉然終不稱活水朱子於四書集注悔其誤己誤人不小又欲更定本義而未能後人以信守朱説為崇事朱子此徒以小人之心事朱子耳孟子説求放心求仁也不仁則心放仁則心存後學忘源失委以心為心而不以仁為心知所以求心而不知所以求仁即念念操存頃刻不違祗存得一個虛腔子耳豈所以為心哉本物於身之謂格性地有覺之謂學惟聖人然後可以踐形學不在踐履處求悉空談也如不長以天下國家為一物即此混然中處之身皆絶首截尾之朽株斷枝殘柯之末枿已安得謂之有本而能以自立寂然之先陰含陽意與知為一感物之後陽分陰意與知為二若是真意運行即意即知即運行即明照若是妄意錯雜意自意知自知意雖有妄知定不昧意屬陰知屬陽陽主得陰知主得意此欲誠其意所以必先致其知先須開闢得一個宇宙匡廓然後可望日月代明四時錯行於其中故不格物而求致知意誠者無之心意才暴戾便是於乾坤毁傷了一番便似於父母忤逆了一番即此便是莫大罪惡了全其生理之謂生戕其生理之為死人實有生死不得謂之無生死際天蟠地皆人道也特分幽明而謂之人與鬼神耳擊而火出見而惻生皆凡庸耳非所以論君子喜怒哀樂平常只從情上生來底即未喜未怒未哀未樂全是偏全是倚不得謂之中此處切須體究明白後生小子但有向上根器直須忘年下交以致誘掖奬與之意若要羅致門下便屬私心不足道也四端只是果芽若不充長立地成朽常人耳目汨於暏聞性體汩於情識如病瘧漢只為未發是病故發時皆病凡任情徇情之夫别無所謂未發之中以喜言如喜在功名眠裡夢裡皆功名如喜在富貴眠裡夢裡俱富貴即寂然泯然之中固不勝其偏於喜倚於喜安有所謂喜之未發乎喜怒哀樂之未發太虛之天體也學者殊未易有之於已不知性無心可盡不養性無心可存養得血氣極和極平終血氣也除是重新鑄造一過把陰陽五行俱抹煞光光要尋得太極出來天下無如此學問徒遏欲非所以存理長存理乃所以遏欲不從格上起程俱岐路也種樹尋根疏水尋源其格乎思慮未起鬼神莫窺與天下莫破同意有可破則有可窺而鬼神之所不佑已在此矣有涵養未發工夫立腳在太極上未發已發雖千路萬路只是一路故曰獨無涵養未發工夫立腳在二五上未發已發俱不是一路了未發陰陽雜揉已發善惡混淆已不得謂之獨矣又安所致其慎乎十二時中看自家一念從何處起即檢點不放過便見功力古人為宗廟以收魂氣死亡且然矧於生存一無所收則放逸奔潰釋收於空老收於虛與博奕類聖人本天天覆地載天施地生心之所也學以聚之收於學也故曰悠久無疆外面只管要裝點得好看便是的然而亡底路頭仁義禮智德性渾全孤仁偏廢皆屬氣質君子有弗性焉主宰心也道理性也主宰無非道理道理以為主宰言心更不消言性言性亦不必言心若但能為主宰而非其道理何可以為心此聖賢心性雙提言性必根心言心必合性之大旨人知由男女搆精而生不知由天地絪緼而生是以多以人為心而不克以天地為心所謂人心道心者人心以人為心也道心以天地為心也天人無二不學便都岐而二之開闢得一個天覆地載規模心量方現充拓得一個天施地生氣象性量方現程朱一脈相承在居敬窮理居敬本中庸之戒慎恐懼為始窮理本大學之格物致知為先識者坤藏之記性坤畫一知者乾君之靈性乾畫一人皆有識有知識以知為主如坤必以乾為主識從知坤從乾此即一之頭面識不從知坤不從乾此即不一之頭面異教轉識成智説無了坤但有了乾宇宙無此造化人亦自無此心體就一人言心都喚做人心就一人言性都喚做氣質之性以其只知有一已者為心為性而不知有天下之公共者為心為性也惟合宇宙言心方是道心合宇宙言性方是天地之性虛知都無用惟致乃實怠惰放肆心即人欲多端多岐戒慎恐懼心即天理只一路謂即慎為獨可所謂做得工夫是本體合得本體是工夫朱以功曰事事肯放過他人則德日洪時時不肯放過自己則學日密盈天地間皆化育流行人試自省化不化育不育但有不化直是頑礫有不育直是僵塊於此不知知於何致仁義禮智人所固有只不曾根之於心便不生色者心符故曰生色今人乍見惻生但是端不是根譬如五穀豈不是美種謂人無是種不得然同有是種不會種去只喚做死粒不喚做生粒株守這幾粒一人生育不來况推之天下國家後世小人動以黨字傾君子傾人國不過小人成羣而欲君子孤立耳或有名為君子好孤行其意而以無黨自命者其中小人之毒亦深仁人心即本體義人路即工夫故舍其路而不由便是放其心而不知求章本清曰世之求心者止欲守其默照之體存其圓虛之神好靜惡動而於日用間親疏厚薄是非可否一切失其宰制化裁之宜縱使恩怨平等而於親親仁民愛物混然無别謂之為仁可乎謂為心不放可乎可見由義正以居仁充類至義之盡即所以為仁之至也面孔上常要有血只看當下一念稍任耳目役聰明不從天命赫赫中流出便不是戒慎不覩恐懼不聞雖如此密修這一念發來稍浮不隱稍粗不微稍二三不一路亦無獨可慎而萬有之欛柄卒難湊手只要安頓這一個形軀之身在好處早已不是士的路口了故曰士而懷居不足以為士近有石經大學虞山瞿元立考辨至為精核其為偽造之書無疑而管登之掘強不服真所謂師不必賢於弟子禮生自仁如枝生自根若以禮為仁如以枝為根便與復義無交涉放其心謂失其仁義之良心也是個仁義之心即常遊於千里之外正謂之存不謂之放不然即常斂於徑寸之內正謂之放不謂之存硜硜然小人哉為庶民百姓等以分位言謂之小人如庶民百姓而信果硜硜然庶民百姓哉亦可以稱士若今之從政者寧不軒然以大人君子自命求小人之信果反無有不可以其分位而算之為士乍見怵惕呼蹴弗屑弗受此人人之真心非誠而何這點真心分分明明當怵惕自怵惕當羞惡自羞惡一毫暪昧他不得互混他不得非明而何自誠明謂之性謂此他無謂也就這分分明明一點真心擴充以滿其量何人不做至誠至聖自明誠謂之教謂此他無謂也有性無教有天無人如穀不苖如苖不秀如秀不實不是有一般天道又有一般人道有一般不勉而中不思而得從容中道之聖人又有一般擇善而固執之賢人如無人道之擇執其所中所得不過電光石火之消息天道且茫如而惟聖罔念亦狂矣孟子據才以論性人所為才既兼三才又靈萬物人無有不才才無有不善以體謂之才性以用謂之才情以各盡其才各成其才其全謂之才德才賢才品才能其偏亦謂之才質才氣才智才技才調並無有不可為善之才告子不知有所謂才故其論性或等之梗直之杞柳或比之無定之湍水或以謂不過食色而夷之物欲之中或并欲掃除仁義而空之天理之外但知生之為性而不知成之為性即同人道於犬牛而有所弗顧孟子辭而闢之與孔子繼善成性之旨一線不移宋儒小異或遂認才稟於氣又另認有一個氣質之性安知不隳必為堯舜之志此憂世君子不容不辨周子太極圖説於孔子易有太極之旨微差一線程張氣質之性之説於孟子性善之旨亦差一線韓子謂軻之死不得其傳亦千古眼也率從誠始修從明始自誠明人人本體之明故曰性自明誠人人工夫之誠故曰教愚可與知能行見在都有下手處及其至而聖人不知不能到底都無歇手處習性習慣成自然以習為性原非性也氣質之性一向使氣任質慣也誤認以為性原非性也孔子四十而不惑心理一孟子四十不動心心氣一志一則動氣氣一則動志不特氣一動志為動心志一動氣亦總是動心清明在躬志氣如神心氣工夫一體成天君泰然百體從令氣動即心動也生知之生字人人本體學知之學字人人工夫謂生自足而無待於學古來無如此聖人鋪天徹地橫來堅去無非天命散見流行即此是性别無性也孟子莫非命也順受其正譬如親造子命喜怒惟親而喜不忘怒不怨則子之順受其正君造臣命進退惟君而進以禮退以義則臣之順受其正天造人命順逆惟天生死惟天廢興修短惟天而修身以俟則人之順受其正天無妄命即氣數即義理無氣數之非義理中庸天命之謂性亦如此道之廢行皆命譬時之晝夜皆天要有行無廢是有晝而無夜也只晝裡也是這個天而處晝底道理不同於夜夜裡也是這個天而處夜底道理不同於晝晝應有為宵應有得日出宜作嚮晦宜息今或晝裡要做夜裡事夜裡要做晝裡事小人不知天命者便如此中庸其為物不二哀公問仁人不過乎物孝子不過乎物天地人物總為一物即物即理大學格物如此只是這個身子頓放得下是謂克巳提掇得起又謂由已太極性也兩儀質也形色天性聖人踐形性質合而為道也性質略有纖毫罅縫斯為之離子思發明率性修道兩項工夫一在耳目覩聞上較勘離與不離一在心術隱微上較勘離與不離到渾融合一而獨體露斯即情即性即吾身即天地萬物即中和即位育求在我者天不在心外求命不在身外求求在外者求天於心之外求命於身之外隱微二字朱子訓作幾字本易傳知幾孟子幾希來譬如一粒穀種人人所有只難得萌芽既萌芽又須萬分保護培養到苗而秀秀而實方有收成君子慎獨慎此性靈明也慎真誠也率以誠落脈修以明入門禪本殺機故多好為鬭口語儒者每染其毒而不自覺何哉文介孫淇澳先生慎行孫慎行字聞斯號淇澳常之武進人萬厯乙未進士第三人授翰林院編修四明挾妖書起大獄先生以國體爭之纍遷至禮部侍郎癸丑署部事時福王已下明春之國之旨然神宗故難有司莊田給四萬頃先生謂祖宗朝未有過千頃者且潞王為皇上之弟豈可使子加於其弟皇貴妃又求皇太后止福王行謂明年七十壽誕留此恭祝於是上傳改期路人皆知福王必不肯行但多為題目以塞言者之口先生謂福清曰此事不了某與公皆當􅍆一死福清曰何至是先生曰非死何足以塞責乃集九卿具公疏待命闕下者二旬先生聲泪俱迸達於大內福清亦封還內降神宗為之心動十二月二十二日從皇貴妃索所藏文書不肯出明日又索至酉刻皇貴妃不得已出之文書者神宗許立貴妃之子割臂而盟者也至是焚於神前二十八日遂降旨之國代藩廢長立少條奏改定庚戍科場之弊題覆湯賓尹南師仲罰處宋儒羅豫章李延平從祀孔廟釋楚宗高牆二十三人間宅二十二人皆先生署事所行也甲寅八月回籍小人中以京察天啓初召為禮部尚書先生入朝首論紅丸事劾姦相方從哲下九卿科道議議上奪從哲官而戍李可灼未幾告歸逆奄起大獄以三案為刑書挺擊以王侍郎為首移宫以楊忠烈左忠毅為首紅丸則以先生為首兩案皆逮死先生方戍寧夏烈皇立得不行崇禎改元用原官協理詹事府未上後八年有旨擇在籍堪任閣員者先生與劉山陰林寉胎同召至京而卒年七十一賜諡文介先生之學從宗門入手與天寧僧靜峯參究公案無不了然每從憂苦繁難之境心體忽現然先生不以是為得謂儒者之道不從悟入君子終日學問思辨行便是終日戒懼慎獨何得更有虛間求一漠然無心光景故舍學問思辨行而另求一段靜存動察工夫以養中和者未有不流於禪學者也其發先儒所未發者凡有數端世説天命者除理義外别有一種氣運之命雜糅不齊因是則有義理之性氣質之性又因是則有理義之心形氣之心三者異名而同病先生謂孟子曰天之高也星辰之逺也茍求其故千嵗之日至可坐而致也是天之氣運之行無不齊也而獨命人於氣運之際顧有不齊乎哉蓋一氣之流行往來必有過有不及故寒暑不能不錯雜治亂不能不循環以人世畔援歆羡之心當死生得喪之際無可奈何而歸之運命寧有可齊之理然天唯福善禍淫其所以福善禍淫全是一段至善一息如是終古如是不然則生理滅息矣此萬有不齊中一點真主宰先生之所謂齊也先生謂性善氣質亦善以牟麥喻之生意是性生意默默流行便是氣生意顯然成象便是質如何將一粒分作兩項曰性好氣質不好蓋氣稟實有不齊生而愚智清濁較然分途如何説得氣質皆善然極愚極濁之人未嘗不知愛親敬長此繼善之體不以愚濁而不存則氣質之非不善可知先生之所以為善也先生謂人心道心非有兩項心也人之為人者心心之為心者道人心之中只有這一些理義之道心非道心之外别有一種形氣之人心也蓋後人既有氣質之心遂以發於氣質者為形氣之心以為心之所具者止此知覺以理義實之而後謂之道心故須窮天地萬物之理不可純是已之心也若然則人生本來祗有知覺更無義理只有人心更無道心即不然亦是兩心夾雜而生也此先生之説長也三者之説天下浸淫久矣得先生而雲霧為之一開真有功於孟子者也陽明門下自雙江念菴以外總以未發之中認作已發之和謂工夫只在致和上却以語言道斷心行路絶上一層喚作未發之中此處大段著力不得只教人致和著力後自然黑窣撞著也先生乃謂從喜怒哀樂看方有未發夫人日用間豈必皆喜怒皆哀樂即發之時少未發之時多心體截得清楚工夫始有著落自來皆以仁義禮智為性惻隱羞惡辭讓是非為情李見羅道性編欲從已發推原未發不可執惻隱羞惡辭讓是非之心而昧性自謂提得頭腦不知有惻隱而始有仁之名有羞惡而始有義之名有辭讓而始有禮之名有是非而始有智之名離却惻隱羞惡辭讓是非則心行路絶亦無從覔性矣先生乃謂孟子欲人識心故將惻隱之心摘為仁之端非仁在中而惻隱之心反為端也如此則見羅之説不辨而知其非矣劉夫子曰近看孫淇澳書覺更嚴密謂自幼至老無一事不合於義方養得浩然之氣茍有不慊則餒矣是故東林之學涇陽導其源景逸始入細至先生而另闢一見解矣困思抄止即仁敬孝慈信是至善也豈唯道當止抑亦人不能不止處人不能舍倫之外别為人亦不能舍倫之外别為學日用人倫循循用力乃所謂實學故特稱止學者誰不識有人倫但覺人倫外尚復有道盡倫外尚復有學即不可謂知止即一出一入精神終不歸歇思致終不精詳擾擾茫茫如何有得止時三代以下道術不明久矣只節義一途尚在人倫內然已多不合道者至説道德即未免悠悠空曠若功利辭章更夢想不到人倫地位嗚呼何不於知止求之知止獨非獨處也對面同堂人見吾言而不見吾所以言人見吾行而不見吾所以行此真獨也且慎獨亦不以念初發論做盡萬般事業毫無務外為人夾雜便是獨的境界斂盡一世心思不致東馳西騖走作便是慎獨的精神自慊夫以天之浩蕩竟不知何處津涯何從湊泊直揭之斯昭昭而天可括且天道無窮而曰及其無窮豈真有積纍乎無窮皆斯昭昭也所謂為物不二者也夫吾之心不有昭昭存耶一念如是萬念如是一息如是終古如是蓋不盈寸而握天地之樞焉昭昭余嘗念之若思嗜欲未思而中若燔矣思詞章久之亦有忡忡動者倘思道理便此心肅然不搖亂若思道理到不思而得處轉自水止淵澄神清體泰終日終夜更不疲勞不知何以故且思到得來又不盡思的時節不必思的境路儘有靜坐之中夢寐之際遊覽之間立談之頃忽然心目開豁覺得率性之道本來元是平直自家苦向繁難搜索是亦不思而得一實證慎思人徒説戒慎恐懼是工夫不知即此便是真性丢却性别尋一性如何有知性時謂所不覩所不聞是天命我要戒慎恐懼他是天命與我身終粘連不上一生操修徒屬人為又如何有至於命時慎獨朱子云所以存天理之本然天理天命之性也即是戒慎恐懼君子戒慎恐懼便為存非是别有他物而將此存之也同上告子以生言性執已發而遺未發便是無頭學問且以天命言性正所謂凡聖同然理義悅心而形體不與焉言生則未免涉形體矣烏可謂性夫人之與禽獸異也以形體觀不啻相千萬矣而孟子特謂之幾希可見形體之異聖賢不謂之異也惟是理義之説惟人有之而禽獸不能所謂幾希者也今若以形體言性則犬牛人同有生便同有性正如以色言白之謂白只一白白羽白雪白玉亦同一白而所謂幾希者惡從見之説者謂生非形體特生機夫既有生機非無可指既有可指便非未發正白之謂白之説也然則生終不可言歟曰性未嘗不生也而實不可以生言也如天地之大德曰生德與性固有辨曰大生曰廣生皆天地之用用即已發不可偏執為性也且時行物生天地位萬物育聖賢亦何嘗不言生但從生言性雖性亦生從性言生雖生亦性雖性亦生必至混人性於犬牛雖生亦性方能别幾希於禽獸生説言性圖孟子性善可使為不善上圈即性相近下圈乃習相逺告子無分善善不兩者不存並性亦不立宋儒性即理才稟於氣清賢氣有清濁濁愚如此並衡便把真性來做兩件孟子説性善即習有不善不害其為性善後人既宗性善又將理義氣質並衡是明墮有性善有性不善與可以為善可以為不善之説矣且告子説無分雖不明指性體而性尚在後人將性參和作兩件即宗性善而性亡孟子謂形色天性也而後儒有謂氣質之性君子有弗性者焉夫氣質獨非天賦乎若天賦而可以弗性是天命之性可得而易也孟子謂為不善非才之罪也而後儒有謂論其才則有下愚之不移夫使才而果有下愚是有性不善與可以為不善之説是而孟子之言善非也孟子謂故者以利為本而荀子直謂逆而矯之而後可以為善此其非人人共知但荀子以為人盡不善若謂清賢濁愚亦此善彼不善者也荀子以為本來固不善若謂形而後有氣質之性亦初善中不善者也夫此既善則彼何以獨不善初既善則中何以忽不善明知善既是性則不善何以復繫之性然則二説又未免出入孟荀間者也荀子矯性為善最深最辨唐宋人雖未嘗明述而變化氣質之説頗陰類之氣質辨下三條同今若説富嵗凶嵗子弟降才有殊説肥磽雨露人事不齊而謂牟麥性不同人誰肯信至所謂氣質之性不過就形生後説若稟氣於天成形於地受變於俗正肥磽雨露人事類也此三者皆夫子所謂習耳今不知其為習而強繫之性又不敢明説性而特創氣質之性之説此吾所不知也如將一粒種看生意是性生意默默流行便是氣生意顯然成像便是質如何將一粒分作兩項曰性好氣質不好故所謂善反者只見吾性之為善而反之方是知性若欲去氣質之不善而復還夫理義之善則是人有二性也二之果可謂性否孟子諄諄性善為當時三説亂吾性也又諄諄才無不善恐後世氣質之説雜吾性也夫氣質既性生即不可變化與性一亦無待變化若有待變化則必有不善有不善則已自迷於性善其説可無論矣獨無善無不善今人尚宗述之而以出自告子又小變其説以為必超善不善乃為善嗚呼此亦非孟子所謂善也子曰人之生也直夫不待超而無不善此則孟子所謂善也易云繼之者善也成之者性也詩云天生蒸民有物有則民之秉彜好是懿德此則孟子所道性善也或疑既性善氣質又同是善下愚何以獨不移曰此自賊自暴自棄之過非氣質之過也然則生知學知困知又何不同曰此孔子所謂性相近者也相近便同是善中亦不可一律而齊然則性之反之可謂同乎曰孟子蓋以湯武合堯舜非以堯舜劣湯武也正所謂同是善中不可一律齊者也終不害為知之一譬如水有萬派流性終同山形萬狀止性終同故人人可為堯舜同故也或相倍蓰而無算不能盡其才此則異耳聖賢見其異而知其同諸説迷其同而執其異後儒既信其同又疑其異故其言性也多不合告子言性曰杞柳柳最易長曰湍水水最易動曰生之謂性生其活機曰食色性也食色其實用而合之無善無不善益不可指著使庸常者由之而日見吾心之感應其宜人情者此言使賢智者知之而默見吾性之流行其超人情者亦此言蓋以圓活教人自謂見性極真不知誤天下愈甚流俗既以濟其私迷不知檢防高明益以神其見蕩無所歸著嗚呼舍善無性舍明善無率性宋儒之直提此者吾得立本之説焉明儒之直提此者吾得良知之説焉告子下條同告子之兩不得勿求非真任之不得也其宗旨當在不得之先不使至於不得耳只是聖賢之道存心兢業當在預養惟恐一不得也及其不得則皇皇焉困心衡慮而亟為自反之圖夫其皇皇焉困心而衡慮者正告子之所謂動心而深弗欲者也不知唯動於不得而後不動於其無不得者真孟子則非義外並不曾説義內何則義原不專內也告子既墮外一邊我若專墮內一邊二者均屬偏見義外必有事而正此徒正事耳心慊則行事自能合義若止正事補東缺西得此失彼恐非集義之道且心不先慊縱外事雖正中可勿餒乎恐亦非浩然之路勿正中和尚可分説致中和之功必無兩用未發一致中和已發一致中和辟如天平有針為中兩頭輕重鈞為和當其取鈞非不時有斟酌到得針對來煞一時事且鈞而相對是已發時象如兩頭無物針元無不相對更是未發時象看到此孰致中孰致和何時是致中何時是致和君子只一戒懼不忘便中和默默在我便是致字無兩條心路致中和凡學問最怕拘板必有一種活動自得處方能上達天地間之理到處流行有可見有不可見有所言有所不能言不是以心時時體會有活動機括焉能日進日新故須時習若止認作服習重習專有人工絶無天趣即終身從事轉入拘板時習格字諸家訓釋頗異若以為格非心則侵誠且不先知如何辨得非心出若以為格式則侵正修且不先知却認何者是格式若以為感格則侵齊治平且不先知豈能念得我所以感格人人所以感格於我的道理故知格物是大學實功窮理是格物定論易曰君子窮理盡性窮理即窮吾性之理也陽明説致良知才是真窮理格物利善如何辨曰不為不欲此義之善也反是即利不為不欲又如何辨曰無為元吾所不為無欲元吾所不欲此所謂性善也吾人只有這一些可以自靠反求而即得義利孟子説人皆有不忍人之心欲人識心故將惻隱之心指為仁之端非仁在中而惻隱之心反為端也孟子又説仁義禮智根於心若仁中而惻隱之心反為端是應言心根於德不應言德根於心也若心根於德則百方求德心恐有不真之時唯德根於心則一味求於心自無不真之處故曰學問之道無他求其放心而已矣孟子一書專為性善説也然則仁義禮智可謂非性乎曰中庸言性之德也謂之德則可謂之即性則不可於文生心為性惟性善故心善心善故隨所發無不善而有四端端者倪也有端倪不可不窮分量故須擴充故曰盡其心者知其性也擴而充之便是盡心知仁義禮智之根於心便是知性若仁在中而惻隱之心反為端是應言反求不應言擴充也四端天理之流行即氣數元無二也故善降祥不善降殃正莫之為而為莫之致而至者也若小人不知天命則妄意為之而未必為妄意致之而未必至而不免行險以僥幸知命萬有不齊之內終有一定不移之天天無不賞善者也無不罰惡者也人無不好善惡惡者也故曰天命之謂性同上常人不知禍福只為見善不明至誠既明善辟如天下百工技藝茍一造其至即成敗得失分數便可以逆計無不審至誠盡民物窮古今貫幽明洞天地不過若民情日用之在目前最是了了又何不先知先覺辦道者至誠知之人人亦可以與知之者也非知人所不能知而以為異也人不共知便知到極頭終是有隔礙處同上與知之知即聖人之知能行之行即聖人之行特言愚不肖者見人人皆可以為聖也大約聖賢所謂知能從本根上論不從枝葉上論若以枝葉論而愚不肖有時窮矣唯以本根論而率性固未嘗不同也與知昔人言中第以為空洞無物而已頗涉元虛但言未發不及喜怒哀樂即所謂未發者亦屬影響至謂人無未發之時才思便屬已發以豫觀之殊不然夫人日用間豈必皆喜怒皆哀樂即發之時少未發之時多若今人物交私梏即發之時少未發而若發之時多矣然謂人無未發則終不可今無論日用間即終日默坐清明無一端之倚著有萬端之籌度亦便不可謂之發也但所謂未發者從喜怒哀樂看方有未發夫天地寥廓萬物衆多所以感通其間而妙鼓舞之神者惟喜怒哀樂如風雨露雷造化所以鼓萬物而成嵗慶賞刑威人主所以鼓萬民而成化也造化豈必皆風雨露雷之時人主亦豈必皆慶賞刑威之日故説有未發之中正見性之實存主處今若以為空洞無物而已是將以何者為未發又將以何者為中而天地萬物之感通其真脈不幾杳然無朕耶且所謂致中者又從何著力毋乃兀坐閉目以求元妙如世之學習靜者乃可耶夫唯君子知未發之非空虛方見性之實知人生未發之時多而所為慎獨立本者無時無處不可致力方見盡性之為實延平每教人靜坐觀中但入門一法非慎獨本旨也慎獨者居處應酬日用間無在非是子曰居處恭執事敬與人忠若靜坐觀中止是居處一義未發解古來未有實言性者中和是實言性處後人求之不得往往虛言性以為無可名獨禮記云人生而靜天之性也一句儒者多宗之周子作太極圖以為聖人主靜立人極至豫章延平每教人靜坐觀中看未發氣象豫用工久之覺得求未發之中是至誠立大本真學問要領然將一靜字替中字恐聖學與儒學便未免於此分别宋儒只為講一靜字恐偏著靜故云靜固靜也動亦靜也若費分疏幫補聖學説中便無偏靜氣象不必用動字幫補凡學問一有幫補則心思便有一半不滿處費了籌度躬行便有一半不穩處費了調停聖賢只率性而行便為道故云致中和不於中處調和亦不於和處還中徹始徹終要在慎獨性説平旦之氣夜氣二者皆就常人身上説聖賢便善養浩然之氣何止平旦與夜即日夜之所息亦就常人説君子便自強不息且平旦之氣與夜氣尚有辨平旦是人已覺之時自家做得一半主了至夜氣乃沈沈熟睡之時自家做不得主全是靠天的故有平旦之氣尚是清明一邊人至無平旦之氣方才説夜氣可見人縱自絶而天尚未嘗深絶之也若夜氣足以存猶不失為可與為善的可見氣善是才善處氣説所不睹所不聞者終日睹聞未嘗睹聞終身睹聞無可睹聞此是心體未是獨也唯君子戒慎恐懼一於是所絶無他馳一敬為主百邪不生一念常操萬用畢集真覺有隱有微時時保聚有莫見有莫顯種種包涵繼善成性之所正富有日新之所乃名為君子慎獨不睹不聞有千萬其心思而不失為獨有孤寂其念慮而不名為獨是在戒慎不戒慎之間不問其應酬與靜居也蓋人一心之隱見微顯便是萬事之隱見微顯並從所不睹所不聞中流注獨也若不識戒慎恐懼真脈者則何知有隱有見有微有顯萬事萬物都無歸著我心亦總無歸著已矣莫見中和之名可分中和之實不可分也即致中和之功更無可分也總歸之一戒懼慎獨惟戒懼則不睹不聞之所而天地為昭萬物同體隱見微顯之獨為主持者明明矣此中和所為致也夫君子之喜以天下怒以天下哀以天下樂以天下豈虛為見而已哉吾中心當其默覺其然而覺民之無不共此同然者是之為大本達道是之謂慎獨中和仰之彌高蓋言天也鑽之彌堅蓋言地也瞻之在前忽焉在後蓋言四方也求之於天地四方而不得則所為握天地四方之極者何中也此所謂擇乎中庸不睹不聞之所之為戒懼也得一善博文約禮也常人多以無形無象索中顔子并以有形有象觀中故於高堅前後中指出文禮回之為人失諸正鵠反求諸其身此以道為懸而身趨之如不及者也的然而日亡此以已為懸而欲人趨之如不及者也天命之中有常即吾率性之正鵠庸德庸言素位昭然分寸不可踰越君子戒慎恐懼不敢妄發彼行險之小人蓋妄發而自命秋毫之中者也正鵠戒慎恐懼齋也不睹不聞而洞隱見微顯之幾明也齋明者一而無他雜者也齋明中庸工夫只學問思辨行用力首戒慎恐懼慎獨只要操此一心時時用力時時操心原非空虛無實如世説戒懼是靜而不動慎獨是未動而將動遂若學問思辨行外另有一段靜存動察工夫方養得中和出不知是何時節又不知是何境界只緣看未發與發都在心上以為有漠然無心時方是未發一覺纖毫有心便是發曾不於喜怒哀樂上指著實不知人生決未有漠然無心之時而却有未喜怒未哀樂之時如正當學問時可喜怒可哀樂者未交而吾之情未動便可謂之發否是則未發時多發時少君子戒懼慎獨惟恐學問少有差遲便於心體大有缺失決是未發而兢業時多發而兢業於中節不中節時少如此看君子終日學問思辨行便是終日戒懼慎獨何得更有虛間求一漠然無心光景夫中和為大本達道並稱天下正欲以天下為一身不欲外一身於天下也博學洗心者戒慎恐懼也心本純一愈戒懼則愈無疵者也退藏者所不暏不聞也心本內斂愈戒慎則愈不放者也如神今人説天命者多以義理氣數並言夫首言天命而繼以率性修道謂理義也俟命受命疑兼氣數乃俟必居易受必大德成德謂理義也維天之命於穆不已疑理義氣數渾言而曰文王之德之純純亦不已則亦專言理義而未嘗兼氣數也夫所謂不已者何也理義立而古今旦暮相推相蕩其間而莫之壅閼者氣也理義行而高下長短日乘日除其間而莫之淆混者數也故曰至誠無息謂理義之純而無息而氣數為之用也君子為善稟授如是受成亦必如是是謂戒慎恐懼而不然者初以雜糅誣性而理義不能主持繼以參錯誣命而氣數得為推諉真所謂不知命無以為君子也於穆不已人何嘗不望新知但不識吾故引水不導其源則必塞植木不沃其根則必蹶培造化生機祗有一溫暢人心生理祗有一知溫故乾動坤靜而易言乾之靜專動直坤之靜翕動闢動靜合言者何説者以為北辰居所是天之靜豫以為主宰之靜非運行之靜也中庸曰不思而得不勉而中是運行之靜所以合主宰之靜也説者以為逝者如斯不舍晝夜是地之動豫以為運行之動非主宰之動也中庸曰地道敏樹是運行之動所以合主宰之動也天地之德不分動靜君子戒慎恐懼原未嘗分動靜天地不睹不聞隱也隱而有見見而有微微而有顯乃心路中遞相次第萬物未生為隱初出為見端倪為微盛大為顯實不睹聞為骨子故總謂之獨君子慎獨如物栽根時生意潛藏後來包畜無窮景象暗然文鈔傳云國將興聽於民國將亡聽於神則是恃鬼神之道反不覺廢人之道唯盡人之道便可合鬼神之道人之道廢鬼神未有應者也人之道盡鬼神未有不應者也其有為處即鬼神之為其才能處實鬼神牖之才能在在事事各有檢防各有靈嚮鬼神論易云利貞者性情也又云各正性命夫性其命者所以合天性其情者所以坊人其本則所謂剛健中正純粹精也而世説天命者若除理義外别有一種氣運之命雜糅不齊者然因是則有理義之性氣質之性又因是則有理義之心形氣之心三者異名而同病總之不過為為不善者作推解説夫世之為善者少而不為善者多則是天之生善人也少而生不善人也多人之得性情之善於天也少而得性情之不善於天也多誣天誣人莫此為甚以是有變化氣質之説夫氣質善而人順之使善是以人合天何極易簡若氣質本有不善而人欲變化之使善是以人勝天何極艱難且使天而可勝即荀子矯性為善其言不異而世非之何哉孟子曰天之高也星辰之逺也茍求其故千嵗之日至可坐而致也是天之氣運之行無不齊也而獨命人於氣運之際顧有不齊乎哉中庸曰文王之所以為文也純亦不已夫使天果不齊是純獨文王之所有而舉世性情之所無也又非獨世性情之所無而亦天命之所本無也將所謂純粹精者何在乎命説心盡則心正心正則道明若祗論道之明不明不論心之盡不盡而旁皇出入間毋乃反鏡索照論楊墨學問思辨行時時用力一而有宰密而不疏是所以為戒懼慎獨所以為居敬決無抱一空虛無著之心為常惺事仁屬愛愛即煦煦姑息之見未免乘焉而溺一切妻妾宫室得我之私心為之惑亂其所以自愛適所以自戕賊何况愛人孟子故將舍生取義決斷關頭而求放心之一脈始清讀語録夫吾之喜以天下喜怒以天下怒哀樂以天下哀樂直與天地同流萬物同趣者此真性也即未發時常薰然盎然有一段懇至不容已處中也所謂天下之大本也即肫肫淵淵浩浩在至誠功用之極固然而凡民稟賦之初亦未有不然者也即今人陷溺之後亦未有不可還其固然者也同上伊川論性謂惡亦性中所有其害不淺論莊明儒學案卷五十九
