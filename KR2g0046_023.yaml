body:
  text: 眀儒學案卷二十三餘姚黃宗羲撰江右相傳學案八忠介鄒南臯先生元標鄒元標字爾瞻别號南臯豫章吉水人萬歷丁丑進士其年十月江陵奪情先生言伏讀聖諭朕學尚未成志尚未定先生欲去墮其前功夫帝王以仁義為學繼學為志居正道之功利則學非其學忘親不孝則志非其志皇上而學之志之其流害有不可勝言者亦幸而皇上之學未成志未定猶可得儒者而救其未然也懷疏入長安門值吳趙艾沈以論奪情受杖先生視其杖畢出疏以授寺人寺人不肯接曰汝豈不怕死得無妄所論乎先生曰此告假本也始收之有旨杖八十戍貴州都勻衛江陵敗擢吏科給事中上陳五事培君德親臣工肅憲紀崇儒術飭撫臣又劾禮部尚書徐學謨南京户部尚書張士佩罷之學謨者首輔申時行之兒女姻也既非時行所堪而是時黨論方興謂趙定宇吳復菴號召一等浮薄輕進好言喜事之人與公卿大臣為難大臣與言官相論訐不已先生尤其所忌故因災異封事降南京刑部照磨乙酉三月録建言諸臣以為南京兵部主事轉吏部歷吏刑二部員外刑部郎中罷官家居建仁文書院聚徒講學光宗起為大理卿天啓初升刑部右侍郎轉左都御史建首善書院與副都御史馮恭定講學羣小憚先生嚴毅恐明年大計不利黨人兵科朱童蒙言憲臣議開講學之壇國家恐啓門戶之漸宜安心本分以東林為戒工科郭興治言當此干戈倥偬之際即禮樂潤色性命精微無裨短長先生言先正云本分之外不加毫末人生聞道始知本分內事不聞道則所謂本分者未知果是本分當否也天下治亂係於人心人心邪正係於學術法度風俗刑清罰省進賢退不肖舍明學則其道無由湛湛晴空鳶自飛魚自躍天自髙地自下無一物不備亦無一事可少琳宫㑹館開目如林唄語新聲拂耳如雷豈獨礙此嘐嘐則古昔談先王之壇坫耶臣弱冠從諸長者遊一登講堂此心戚戚既講計偕獨處深山者三年嗣入夜郎兀坐深箐者六年浮沉南北棲遲田畝又三十餘年賴有此學死生患難未嘗隕志若只以臣等講學惟宜放棄斥逐之日以此澆其磊塊消其抑鬱無聊之氣則如切如磋道學之語端為濟窮救苦良方非盡性至命妙理亦視斯道大輕視諸林下臣太淺矣人生墮地髙者自訓詁帖括外别無功課自青紫榮名外别無意趣惡聞講學也實繁有徒蓋不知不聞道即位極人臣勛勒旗常了不得本分事生是虛生死是虛死朽骨青山黃鳥數聲不知天與昭昭者飄泊何所此臣所以束髮至老不敢退墮自甘者也前二十年東林諸臣有文有行九原已往惟是在昔朝貴自岐意見一唱衆和幾付清流懲前覆轍不在臣等有旨慰留給事郭允原言侍郎陳大道請恤張居正元標不悅修舊怨也先生言當居正之敗維時露章者何止數百其間不無望風匿影之徒臣有疏云昔稱伊吕今異類唾之矣昔稱恩師今仇敵視之矣當時臣無隻字發其隱豈至今四十餘年與朽骨為仇乎虛名浮譽空中鳥影世不以大人長者休休有容之度教臣望臣如村樵里媪睚眦必報之流則未與臣習也郭興治又言元標無是非之心先生言興治蓋為馮三元𫝊言發也三元初起官見臣臣語之曰往事再勿提起渠曰是非却要說明臣曰今之邊事家具一錐鑿越講是非越不明白不如忘言為愈蓋熊廷弼所少者惟一死廷弼死法不能獨無但皇上初登寶位才二年所如尚書如侍郎中丞如藩臬撫鎮諸臣纍纍藳街血腥燕市成何景象老成守法議獄緩死之意非過也是非從惻隱中流出是為真心之是非即方從哲滿朝以鴆毒為言臣謂姑待千秋者亦是非不必太分明之一證也再疏乞歸始允未幾卒逆奄追削為民奪誥命烈皇御極贈太子太保諡忠介先生自序為學曰年少氣盛時妄從光影中窺瞷自以為覺矣不知意氣用事去道何啻霄壤又七年再調刑部雖略有所入而流於狂路賴文潔鄧公來南提醒不敢放浪閲三年入計歸山十餘年失之繆悠又十餘年過於調停不無以神識為家舍視先覺尚遠淨几眀窗水落根見始知覺者學之有見也如人在夢既醒覺亦不必言矣學而實有之已亦不必言覺矣先生之學以識心體為入手以行恕於人倫事物之間與愚夫愚婦同體為工夫以不起意空空為極致離達道無所謂大本離和無所謂中故先生於禪學亦所不諱求見本體即是佛氏之本來面目也其所謂恕亦非孔門之恕乃佛氏之事事無礙也佛氏之作用是性則離達道無大本之謂矣然先生即摧剛為柔融嚴毅方正之氣而與世推移其一規一矩必合當然之天則而介然有所不可者仍是儒家本色不從佛氏來也會語以情識與人混者情識散時如湯沃雪以性真為世遊者性天融後如漆因膠以下皆龍華密證五倫是真性命詞氣是真涵養交接是真心髓家庭是真政事父母就是天地赤子就是聖賢奴僕就是朋友寢室就是明堂平旦可見唐虞村市可觀三代愚民可行古禮貧窮可認真心疲癃皆我同胞四海皆我族類魚鳥皆我天機要荒皆我種姓問為之不厭曰知爾之厭則知夫子之不厭矣今世從形跡上學所以厭聖人從天地生機處學生機自生生不已安得厭善處身者必善處世不善處世賊身者也善處世者必嚴修身不嚴修身媚世者也學者有志於道須要鐵石心腸人生百年轉盻耳貴乎自立後生不信學有三病一曰耽閣舉業不知學問明如以萬金商做賣菜傭二曰講學人多迂濶無才不知真才從講學中出性根靈透遇大事如湛盧刈薪三曰講學人多假不知真從假中出彼既假矣我棄其真是因噎廢食也問儒佛同異曰且理㑹儒家極致處佛家同異不用我告汝不然隨人口下說同說異何益問如何得分明曰要胸中分明愈不分明須知昏昏亦是分明不可任清明一邊昭昭是天冥冥是天馬上最好用功不可放過若待到家休息便是馳逐老成持重與持位保祿相似收斂定靜與躲間避事相似謙和遜順與柔媚諧俗相似中間間不容髮非研幾者鮮不自害害人說清者便不清言躬行者未必躬行言知性命便未知性命終日說一便是不一終日說合便是不合但有心求求不著便著人只說要收斂須自有個頭腦終日說話終日幹事是真收斂不然終日兀坐絶人逃世究竟忙迫橫逆之來愚者以為遭辱智者以為拜賜毁言之集不肖以為罪府賢者以為福地小人相處矜已者以為荆棘取人者以為砥礪目無青白則目明耳無邪正則耳聰心無愛憎則心正置身天地間平平鋪鋪不見崖異方是為已之學學者好說嚴毅方正豫思與造物者遊春風習習猶恐物之與我拂也茍未有嚴毅方正之實而徒襲其跡徒是與人隔絶未知學人却要知學既知學人却要不知有學未修行人却要修行既修行人却要不知有修豫見世之稍學修者嘵嘵自别於人其病與不知學修者有甚差别豫别無有力處覺得本分二字親切做本分人說本分話行本分事本分外不得加減毫末識得本分更有何事道無揀擇學無精粗下學便是上達非是下學了才上達若下學後上達是作兩層事了學問原是家常茶飯濃釅不得有一毫濃釅與學爭遠孟我疆問如何是道心人心曰不由人力純乎自然者道心也由思勉而得者人心也以下燕臺會記我疆問孔子云正目而視之不可得而見也傾耳而聽之不可得而聞也故曰視於無形聽於無聲子思發之為不覩不聞陽明又云若覩聞於一理即不覩不聞也其言不同如此曰孔子懼人看得太粗指應處與人看陽明恐人看得甚細指顯處與人看其實合內外之道也識仁即是格物龍華會記以下同問識仁曰夫子論仁無過仁者人也一語當日我看仁做個幽深𤣥遠是竒特的東西如今看來我輩在一堂之上即是仁再無虧缺切莫錯過問夫子只言仁之用何以不言仁之體曰今人體用做兩件看如何明得余近來知體即用用即體離用無體離情無性離顯無微離已發無未發非豫言也孟子曰惻隱之心人皆有之至是非之心智也體會自見問生機時有開發奈不接續何曰無斷續者體也有斷續者見也曰功將何處曰識得病處即是藥識得斷處就是續一堂之上有問即答茶到即接此處還添得否此理不須湊泊不須幫帖問其心三月不違仁仁與心何所分别曰公適走上來問豈有帶了一個心又帶了一個仁來公且退以下元潭㑹記恕者如心之謂人只是要如已之心不思如人之心如已如人均齊方正更說甚一貫有言不能安人如何算得修已曰我二十年前熱中亦欲安人今安不得且歸來我與公且論修已修已之方在思不出其位在素位而行公且素位老實以行誼表於鄉便是安人不然你欲安人别人安了你塘南先生問佛法只是一死生動人故學佛者在於生死曰人只是意在作祟有意則有生死無意則無生死歐陽明卿問曰釋氏不可以治天下國家曰子何見其不可以治天下國家曰樣樣都拋了曰此處難言有飯在此儒㑹喫釋亦㑹喫既能喫飯總之皆可以治天下國家子謂釋樣樣拋了故不可儒者樣樣不拋又何獨不能治天下國家鐵佛會記私慮不了私欲不斷畢竟是未曽靜未有入處心迷則天理為人欲心悟則人欲為天理問天下歸仁曰子無得看歸仁是竒特事胸中只芝麻大外面有天大子齊中有諸友與諸友相處無一毫間隔即是歸仁與妻子僮僕無一毫間隔便是歸仁若舍見在境界說天下歸仁越遠越不著身大僕㑹記有因持志入者如識仁則氣自定有由養氣入者如氣定則神自凝又有由交養入者如白沙詩云時時心氣要調停心氣功夫一體成莫道求心不求氣須教心氣兩和平此是先輩用過苦功語青原㑹記問誠意之功須先其意之所未動而誠之若待善惡既動而後致力則已晚矣果若此則慎獨之功從何下手曰國君好仁天下無敵無敵真慎獨也人所不知己所獨知多流入識神去先其意之所未動而誠之愚謂既云未動誠將何下手莫若易誠而識之即識仁之謂未發前觀何氣象意思善惡既動而後致力則己晚此為老學者言初學者既發後肯致力亦佳問仁會録人心本自樂自將私欲縳私欲一萌時良知還自覺一覺便消除此心依舊樂樂便然後學學便然後樂問生死曰子死乎曰未死曰何未死曰胸中耳目聰明色色如赤子時曰子知生矣知生則知死不必問我問知天命曰日間問子以時義子必曰知問子以家宅鄉里事子必曰知此知之所在即命即隂陽五行之數亦天命說到知徹地少一件不得名世不係名位每一代必有司此道之柄者即名世也求放心者使人心之可求也心要放者使人知無心之可守也卑者認著形色一邊髙者認著天性一邊誰知形色即是天性天性不外形色即仁者人也宗㫖豫歸山十五年只信得感應二字問復卦曰有人於此所為不善開心告語之渠泫然泣下即刻來復矣問居德則忌曰即如今講學先生不自知與愚夫愚婦同體只要居德所以取忌有學可循是曰洗心無心可洗是曰藏密除知無獨除自知無慎獨真正入手時時覷不覩不聞是甚物識得此物真戒慎不必言矣問年四十而見惡焉其終也已不知四十以後尚可為善否曰八十尚可況四十乎此俱從軀殼上起念問邇日學者始學先要個存守是未擇中庸而先服膺未明善而先固執證之博學審問之說無當也曰學貴存守但存守之方不一故問辨以擇之蓋學而後有問學即存守也不學何問之有如行者遇岐路即問問了又行原非二事若謂不待存守而先擇則先未出門而空談路徑也鷺洲㑹記止原無處所止無可止則知止矣仁文㑹記問心如何為盡曰盡者水窮山盡之謂人心原是太虛若有個心則不能盡矣萬古學脈人人所公共的漁樵耕牧均是覺世之人即童子之一斟酒處俱是學之所在若曰我是道而人非道則喪天地之元氣也新安王文軫戴仲曰丁酉南都參訪祝師認心不真無可撈摸坐間日影正照祝師指曰爾認此日影為真日不知彼隂暗處也是真日因此有省曰爾道認心不真無可撈摸不知無可撈摸處便是真心問吾人學問不勾手者正以有所把捉有好工夫做故也有把捉時便有不把捉時有好工夫時便有不好工夫時曰此可與透身貼體做工夫者商量若是此學茫茫蕩蕩且與說把捉做工夫不妨問不孝有五章曰看來個個犯此豫輩不莊敬嚴肅即是惰其四肢豫四十以後出入不經我母之手非貨財私妻子乎飲食起居任從自便非從耳目之欲乎不受人言即是鬭狠體貼在身時時是不孝天地萬物皆生於無而歸於無一切蠢動含靈之物來不知其所自去不知其所往故其體本空我輩學問切不可向形器上布置一時妍好終屬枯落雖然空非斷滅之謂也浮雲而作蒼狗白衣皆空中之變幻所必有者吾惟信其空空之體而不為變幻所轉是以天地在手萬化生身今有一種議論只是享用現在才說克治防簡便去紐揑造作日用穿衣喫飯即同聖人妙用我竊以為不然夫聖凡之别也豈止千里仁者渾然與物同體如何證得學問只是不起意便是一體便是渾然所以乍見非有為而為也講義人若真仁直心而言為德言根心而發為生色不然强排道理遮飾有德皆巧言也危冠危服一面笑容皆令色也彼方自負道統自認涵養不知去仁何啻千山萬水到不如鄉里朴實老農老圃可與之入道巧言令色仁之於父子義之於君臣禮之於賔主智之於賢者聖人之於天道非性之故物乎溫故近世學者以知是知非為良知夫是非熾然且從流於情識而不自覺惡在其為良知誨汝知之仕學一道隱顯一心孝友即是政事若曰居位别有有政事托辭以答或人則視政事孝弟為兩事矣子奚不為政學道之士在世途極是不便向道不篤的易生退轉若真信千古而得一知者猶比肩也何孤立之有不能自立東挨西靠口嘴上討得個好字眼前容易過誤却平生事業矣德不孤伯夷是清伊尹是任柳下惠是和還有個器在汝器也學不見體動輒落顯微二邊文章性天學者若不從大光明藏磨勘露出精彩羣居終日雖說若何為心若何為性若何為孔門之旨若何為宋儒之㫖是言不及義也終日依倚名節之跡倣佛義理之事是好行小慧也羣居終日吾輩在此一堂講學所親就者大人不虛心受益却是狎大人所講究者聖言不虛心體貼却是侮聖言記得少年時在青原一友將四書諸論互相比擬一先正答曰總只是非禮之言畏天命鄉願一副精神只在媚世東也好西也好全在毁譽是非之中聖人精神不顧東不顧西惟安我心之本然超出毁譽是非利害之外鄉願德本明也人只爭一個覺耳須知人人具有至善只是不止一止而至善在是曰何以止無意必固我是已學不知止漫言修身如農夫運石為糞力愈勤而愈遠矣大學學者一向說明德說親民說止至善說格物千言萬語旁引曲譬那個是宋儒說那個是明儒說縱說得伶俐與自家身心無干一到知止則水盡山窮無復可言說如此方謂之致知方謂之格物此謂知本知止離已發求未發即孔子復生不能子且觀中節之和即知未發之中離和無中離達道無大本中和何以謂之索隱今講學者外倫理日用說心性入牛毛者是已何以謂之行怪今服堯服冠伊川冠之類索隱行怪一字即吾道一以貫之之一聖人說道理零碎了恐人從零碎處尋道理說天德也說到一來說王道也說到一來正如地之行龍到緊關處一束精神便不散亂所以行之者一善與人同不是將善去同人亦不是將人善來同我人人本有個個圓成魚遊於水鳥翔於淵無一物能間之也善與人同赤子之心真心也見著父母一團親愛見著兄弟一團歡欣何曾費些擬議思慮何曾費些商量大人只是不失這個真心便是聖學不明愁赤子之心空虛把聞見填實厭赤子之心真率把禮文遮飾儒者以為希聖要務不知議論日繁去真心日遠無怪乎大人不多見也象山云縱不識一字終是還他堂堂大人赤子之心文集從心所欲不踰矩世儒謂從者縱也縱其心無之非是此近世流弊竊謂矩方也從心所欲同也圓不離方欲不離矩心神物也豈能使之不動要知動亦不動耳寂感體用原未有不合一欲求合一便生分别去合一之㫖愈遠吾輩動輒以天下國家自任貧子說金其誰信之古人云了得吾身方能了得天地萬物吾身未了縱了得天地萬物亦只是五霸路上人物自今以往直當徹髓做去有一毫病痛必自照自磨如拔眼前之釘時時刻刻始無愧心吾輩無論出處各各有事肯沉埋仕途便沉埋不肯沉埋即在十八重幽暗中亦自驤首青霄世豈有錮得人人自無志耳夫道以為有上天之載無聲無臭未嘗有也以為無出王游衍莫非帝則未嘗無也有無不可以定論者道之妙也知道者言有亦可言無亦可不知道者言無著空言有滯跡道心為主者世情日淡世情日淡而後能以宰世不為世所推移識情為主者世情日濃世情日濃且不能善其身又安能善天下敬者主一無適之謂夫所謂一者必有所指莊嚴以為敬者涉於安排存想以為敬者流於意識不安排而莊不意識而存此非透所謂一者不能一者無一處不到而不可以方所求無一息不運而不可以斷續言知一則知敬知敬則知聖學矣舜為法天下自天下起念可傳後世自後世起念如今又只在自家一身一家起念較是非毁譽限在一鄉則結果亦在一鄉給諫羅匡湖先生大紘羅大紘字公廓號匡湖吉之安福人萬厯丙戌進士辛卯九月吳門為首輔新安山隂具揭請立太子列吳門姓氏於首上怒甚吳門言不與聞特以閣中故事列名耳時先生以禮科給事中守科得本上疏糾之遂謫歸先生學於徐魯源林下與南臯講學南臯謂先生敏而善入衆人所却步躇蹰四顧者先生提刀直入衆人經數年始入者先生先闖其奧然觀其所得破除默照以為一念既滯五官俱墮於江右先正之脈又一轉矣野史言吳門沒其子求南臯立傳南臯為之作傳先生大怒欲具揭告海內南臯囑申氏弗刻乃止按吳門墓表見刻南臯存真集野史之非可勿辨矣匡湖㑹語心非專在內俯仰今古無非是心性非專是心耳目口鼻無非是性故知心量之無外則存心者不必專收於內知性體之無二則盡性者不必苦求於心一念迷即為放而心非自內出也一念覺即為收而心非自外來也當其視心即在目心量如是眼量亦如是迷則皆迷悟則皆悟不必舍視而别求心也當其聽心即在耳心量如是耳量如是迷則皆迷悟則皆悟不必舍聽而别求心也語默動靜周旋屈伸一切與心相印元氣充周於天地靈光遍照於宇宙必拘守一塊肉乃為存心哉既曰氣質即不是性既云性便不墮氣質不識天命之性只管在氣質上修治所以變化不得性之身之是千古兩派學脈一則視聽言動不離乎性一則視聽言動不離乎身堯舜惟精惟一允執厥中所謂成性存存道義之門此性之之學也湯武以義制事以禮制心以敬勝怠以義勝欲所謂修身道立履準蹈繩此身之之學也堯舜固是自然即當其憂嗟咨歎兢業勞苦亦從性之來湯武固是勉然即當其動罔不臧身安用利亦從身之發故學者初入門時劈空從性命上參求竟是性之之學起手從身心上操存終竟是身之之學問夫子言仁何不直指仁體而必曰復禮何也曰乾之元亨利貞即我性之仁義禮智元者善之長也亨者嘉之會也蓋乾元資始統天蕩蕩難名至於亨當巽離之交雲行雨施品物流行枝葉花蕊蒼翠丹緑雜然並陳所謂萬物皆相見也即此相見者而資始統天之元灼然宇宙悟此而復禮歸仁不待贅辭矣故繫傳曰顯諸仁仁之渾然全體難於思求而其條理則有可覺悟故復禮即歸仁仁一而已矣在目為視在耳為聽發於聲為言運於身為動此仁之條理所為禮也舍禮之外無仁舍視聽言動之外無禮故一日之間能於視聽言動忽然覺悟而仁之全體呈露矣問何以見天下歸仁曰人但看得仁大看得視聽言動小不知仁體隨在具足即視而仁之體全在視即聽而仁之體全在聽言動亦然姑以視明之今人在室見一室在堂見一堂在野見四境仰視而見髙天之無窮俯視而見大地之無盡見親則愛見長則敬見幼則慈見入井之孺子則惻隱見釁鐘之牛則不忍孰非與吾之視為一體者即此一覺而天下歸仁不待轉盻矣五官之貌言視聽思也五倫之親義序别信也人皆生而具之日而用之所謂故也時時從之體認從此體認從此覺悟事親知人可以知天聰明聖智達乎天德是為溫故而知新蘭舟雜述劉調父記習俗移人非求友不能變一家有一家氣習非友一鄉之善士必不能超一家之習推之一國天下皆然至於友天下盡矣然一朝又有一朝之氣習非尚友千古不可以脫一世之習此孟子所以超脫於戰國風習之外也吾輩無論友千古友四方此身自房中出到㕔上便覺超然自㕔上出到門外又覺超然孔子去魯不以女樂而以燔肉其一假肫肫之仁淵深而不淺露容畜而不迫隘不倚於意見不倚於名節全是天德用事人則不免於有所倚矣安土敦乎仁故能愛人各有所處之地所謂土也惟不安其所處之地則一室之內不勝異意我既嫌人人亦嫌我如之何能安乎仁而相親愛乎若安土者見處處皆好人人皆好是以能無不愛無不愛是謂敦厚以居仁仁本與萬物同體只為人自生分别所以小了古人天下一家中國一人非意之也其心量原自如此今處中國只爭個江西江西又爭個吉安吉安又爭個安福安福又爭個某鄉某鄉又爭個某里某里又爭個某姓某姓又爭個某房某房又爭個某祖父位下某祖父位下又只爭我一人終生營營不出一身一家之內此豈不是自小乎故善學者愈充之則愈大不善學者愈分之則愈小明儒學案卷二十三
