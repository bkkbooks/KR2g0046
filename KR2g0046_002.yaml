body:
  text: 明儒學案卷二餘姚黃宗羲撰河東學案二文簡吕涇野先生柟吕柟字仲木號涇野陜之髙陵人正德戊辰舉進士第一授翰林修撰逆瑾以鄉人致賀却之瑾不説已請上還宫中御經筵親政事益不為瑾所容遂引去瑾敗起原官上疏勸學危言以動之乾清宫災應詔言六事一逐日臨朝二還處宫寢三躬親大祀四日朝兩宫五遣去義子番僧邊軍六徹回鎮守中官皆武宗之荒政不聽復引去世廟即位起原官甲申以修省自劾語涉大禮下詔獄降解州判官不以遷客自解攝守事興利除害若嗜欲移宗人府經歷升南考功郎中尚寶司卿南太常寺少卿入為國子監祭酒轉南禮部右侍郎公卿謁孝陵衣緋先生曰望墓生哀不宜吉服遂易素上將視顯陵纍疏諫止霍文敏與夏貴溪有隙文敏為南宗伯數短貴溪於先生先生曰大臣和衷宜規不宜謗也文敏疑其黨貴溪已而先生入賀貴溪亦暴文敏之短先生曰霍君性少偏固天下才公為相當為天下惜才貴溪亦疑其黨文敏會奉先殿災九卿自陳貴溪遂準先生致仕壬寅七月朔卒年六十四賜諡文簡先生師事薛思庵所至講學未第時即與崔仲鳬講於寶卭寺正德末家居築東郭别墅以會四方學者别墅不能容又築東林書屋鎮守廖奄張甚其使者過高陵必誡之曰呂公在汝不得作過也在解州建解梁書院選民間俊秀歌詩習禮九載南都與湛甘泉鄒東郭共主講席東南學者盡出其門嘗道上黨隱士仇欄遮道問學有梓人張提聞先生講自悟其非曾妄取人物追還主者先生因為詩云豈有仁人能過化雄山村裏似堯時朝鮮國聞先生名奏請其文為式國中先生之學以格物為窮理及先知而後行皆是儒生所習聞而先生所謂窮理不是泛常不切於身只在語默作止處驗之所謂知者即從聞見之知以通德性之知但事事不放過耳大概工夫下手明白無從躲閃也先生議良知以為聖人教人每因人變化未嘗規規於一方也今不論其資稟造詣刻數字以必人之從不亦偏乎夫因人變化者言從人之工夫也良知是言本體本體無人不同豈得而變化耶非惟不知陽明并不知聖人矣呂涇野先生語録問長江之上大海之濵風波之險可畏也至於風恬浪息漁人出沒其間鷗鳥飛鳴其中若相狎而玩者何也水忘機也漁人鷗鳥亦忘機也若乃吾人之宅心宜若平且易焉已矣而反有不可測者則其為風波之險莫大焉此莊生所謂險於山川者也是故機心忘而後可以進德矣曰只看如何平易平易一差恐靡然矣問靜時體認天理易動時體認天理難故君子存靜之體認者以達乎動之泛應者則靜亦定動亦定其為成德孰禦焉曰動時體認天理猶有持循處靜却甚難能於靜則於動沛然矣光祖曰物之遇雨或生或長其效甚速人遇教而不興者何也先生曰只是中心未實如五穀之種或蠧或浥難乎其為苖矣問交友居家處世不能皆得善人甚難處先生曰此須有憐憫之心方好能憐憫便會區處如妻妾之愚兄弟之不肖不可謂他不是也此仁知合一之道問今之講學多有不同者如何曰不同乃所以講學既同矣又安用講耶故用人以治天下不可皆求同求同則讒諂面諛之人至矣道通曰果然治天下只看所重輕問身甚弱若有作盜賊的量力改而為聖人方易先生曰作聖人不是用這等力量見得善處肯行便是力量溺於流俗物欲者乃弱也先生聞學者往來權貴門下乃曰人但伺候權幸之門便是喪其所守是以教人自甘貧做工夫立定腳根自不移問患交接人先生曰須要寬綽些不可拘拘守秀才規矩見大人君子進退升降然諾語默皆學先生曰陳白沙徵到京吏部尚書問曰貴省官如何曰與天下省官同請對坐即坐無辭此儘朴實有所養羅一峯訪康齋見起御聘牌坊乃謂其子云不必有此牌坊不見康齋而退此羅公髙處康齋孔門之原憲也而又有此乎先生曰昔者聞有一僉事求見王戅菴公云西來一件為黃河二件為華山三件為見先生王公云若做官不好縱見此三者亦不濟事這般高不受人諂大器問動靜不失其時曰正是仕止久速各當其可汝今且只於語默作止處驗也黃惟因問白沙在山中十年作何事先生曰用功不必山林市朝也做得昔終南僧用功三十年儘禪定也有僧曰汝習靜久矣同去長安柳街一行及到見了妖麗之物粉白黛緑心遂動了一旦廢了前三十年工夫可見亦要於繁華波蕩中學故於動處用功佛家謂之消磨吾儒謂之克治應德問觀喜怒哀樂未發之前氣象如何觀先生曰只是虛靜之時觀字屬知屬動只是心上覺得然其前只好做戒愼恐懼工夫就可觀也南昌裘汝中問聞見之知非德性之知先生曰大舜聞一善言見一善行沛然莫之能禦豈不是聞見豈不是德性然則張子何以言不梏於見聞曰吾之知本是良的然被私欲迷蔽了必賴見聞開拓師友夾持而後可雖生知如伏羲亦必仰觀俯察汝中曰多聞擇其善而從之多見而識之乃是知之次也是以聖人將德性之知不肯自居止謙為第二等工夫曰聖人且做第二等工夫吾輩工夫只做第二等的也罷殊不知德性與聞見相通原無許多等第也許象先問樂在其中與不改其樂樂字有淺深否先生曰汝不要管他淺深今日只求自已一個樂耳大器曰然求之有道乎先生曰各人揀自己所纍處一切盡除去則自然心廣體胖然所謂纍處者不必皆是聲色貨利粗惡的只於寫字做詩凡嗜好一邊皆是程子曰書札於儒者事最近然一向好著亦自喪志可見有一名公曰近日對某講學者惟少某人耳先生笑曰程子説韓持國曰公當求人倒教人來求公邪若為這道講須下人去講不然有道者他肯來尋公講邪又曰某尸位未嘗建得事業先生曰不然賢人君子在位不必拘拘如何是建功創業但一言一動皆根道理在位則僚屬取法在下則軍民畏服又使天下之人知某處有某公在卒然有急可恃有何不可其人曰若是不可不慎矣有一相當國其弟過陜西與對山曰某回京與家兄説薦舉起用對山笑曰某豈是在某人手裏取功名的人先生曰此亦可謂慷慨之士或曰但欠中道耳曰士但有此氣象亦是脫俗怎能勾便中庸也先生見林穎氣象從容指謂大器曰人動靜從容言語安詳不惟天理合當如此且起觀者敬愛就是學問也學者不可無此氣象但須要先有諸中矣時耀問收放心在何處先生曰須於放的處去收則不逺而復矣先生謂諸生曰我欲仁斯仁至矣今講學甚髙逺某與諸生相約從下學做起要隨處見道理事父母這道理待兄弟妻子這道理待奴僕這道理可以質鬼神可以對日月可以開來學皆自切實處做來大器曰夫仁亦在乎熟之而已矣曰然問為學曰只要正已孔子曰上不怨天下不尤人知我者其天乎若求人知路頭就狹了天從那處去尋只在得人得人就是得天書曰天視自我民視天聽自我民聽學者未省曰本之一心驗之一身施之宗族推之鄉黨然後達之政事無往不可凡事要仁有餘而義不足則人無不得者詔問講良知者如何先生曰聖人教人每因人變化如顔淵問仁夫子告以克已復禮仲弓則告以敬恕樊遲則告以居處恭執事敬與人忠蓋隨人之資質學力所到而進之未嘗規規於一方也世之儒者誨人往往不論其資稟造詣刻數字以必人之從不亦偏乎問致良知先生曰陽明本孟子良知之説提掇教人非不警切但孟子便兼良能言之且人之知行自有先后必先知而後行不可一偏傅説曰非知之艱聖賢亦未嘗即以知為行也縱使周子教人曰靜曰誠程子教人曰敬張子以禮教人諸賢之言非不善也但亦各執其一端且如言靜則人性偏於靜者須别求一個道理曰誠曰敬固學之要但未至於誠敬尤當有入手處如夫子魯論之首便只曰學而時習言學則皆在其中矣論格物致知世之儒者辨論莫太高逺乎先生謂若事事物物皆要窮盡何時可了故謂只一坐立之間便可格物何也蓋坐時須要格坐之理如尸是也立時須要格立之理如齋是也凡類此者皆是如是則知可致而意可誠矣又曰先就身心所到事物所至者格久便自熟或以格為度量亦是先生謂諸生曰學者只隱顯窮通始終不變方好今之人對顯明廣衆之前一人焉間居獨處之時又一人焉對富貴又一人焉貧賤又一人眼底交遊所不變者惟何粹夫乎詔因辭謝久菴公與講論陽明之學公謂朱子之道學豈後學所敢輕議但試舉一二言之其性質亦是太褊昔唐仲友為台州太守陳同父同知台州二人各競才能甚不相協時仲友為其母與弟婦同居官舍晦翁為浙東提舉出按台州陳同父遂誣仲友以帷薄不修之事晦翁未察遂劾仲友王淮為之奏辨晦翁又劾王淮後仲友亦以帷薄不修之事誣論晦翁互相訐奏豈不是太褊乎詔聞此言歸而問於先生先生曰訐奏事信有之但仲友雖負才名終是小人安得以此誣毁朱子是非毁譽初豈足憑久之便是明白朱先生劾仲友事見台寓録仲友誣朱先生事見仲友文集可知其是私也同父此時尚未及第未嘗同知台州晦翁仲友相訐未嘗以帷薄相誣此段無一實者先生曰今世學者開口便説一貫不知所謂一貫者是行上説是言上説學到一貫地位多少工夫今又只説明心謂可以照得天下之事宇宙內事固與吾心相通使不一一理會於心何由致知所謂不理會而知者即所謂明心見性也非禪而何黃惟用曰學者不可將第一等事讓别人做先生曰才説道不可將第一等事讓與别人做不免自私這元是自家合做的又曰學到自家合做處則别人做第一等事雖拜而讓之可也學者到怠惰放肆總是不仁仁則自是不息詩人於周公從步履上看便見得周公之聖故曰赤舄几几凡人內不足者或有讒謗之言步履必至錯亂不能安詳如謝安折屐豈能強制得住故古人只求諸已在已者定外邊許大得失禍福皆不足動我是故烈風雷雨弗迷先生曰豫癸未在會試場見一舉子對道學䇿欲將今之宗陸辨朱者誅其人焚其書甚有合於問目且經書論表俱可同事者欲取之豫則謂之曰觀此人於今日迎合主司他日出仕必知迎合權勢乃棄而不取因語門人曰凡論前輩須求至當亦宜存厚不可率意妄語問危微精一如何曰心一也有人道之别者就其發處言之耳危微皆是不好的字面何謂危此心發在形氣上便蕩情鑿性喪身亡家無所不至故曰危何謂微徒守此義理之心不能擴充不發於四支不見於事業但隱然於念慮之間未甚顯明故曰微惟精是察二者之不使混雜惟一是形氣之所用也皆從道而出合為一片本泰問夜氣曰有夜氣有旦氣有晝氣晝氣之後有夜氣夜氣之後為旦氣旦氣不梏於晝氣則充長矣孟子此言氣字即有性字在蓋性字何處尋只在氣上求但有本體與役於氣之别耳非謂性自性氣自氣也彼惻隱是性發出來的情也能惻隱便是氣做出來使無是氣則無是惻隱矣先儒喻氣猶舟也性猶人也氣載乎性猶舟之載乎人則分性氣為二矣試看人於今何性不從氣發出來永年問配義與道先生曰言此氣是搭合著道義説不然則見富貴也動見貧賤也動而餒矣問近讀大禹謨得甚意思且不要説堯舜是一個至聖的帝王我是一個書生學他不得只這不虐無告不廢困窮日用甚切如今人地步稍高者遇一人地步稍低者便不禮他雖有善亦不取他即是虐無告廢困窮臯陶説九德皆就氣質行事上説至商周始有禮義性命之名宋人却專言性命謂之道學指行事為粗迹不知何也何廷仁言陽明子以良知教人於學者甚有益先生曰此是渾淪的説話若聖人教人則不如是人之資質有髙下工夫有生熟學問有淺深不可概以此語之是以聖人教人或因人病處説或因人不足處説或因人學術有偏處説未嘗執定一言至於立成法詔後世則曰格物致知博學於文約之以禮蓋渾淪之言可以立法不可因人而施或問朱子以誠意正心告君如何曰雖是正道亦未盡善人君生長深宮一下手就教他做這樣工夫他如何做得我言如何能入得須是或從他偏處一説或從他明處一説或從他好處一説然後以此告之則其言可入若一次聘來也執定此言二次三次聘來也執定此言如何教此言能入得告君須要有一個活法如孟子不拒人君之好色好貨便是問愼獨工夫曰此只在於心上做如心有偏處如好欲處如好勝處但凡念慮不在天理處人不能知而已所獨知此處當要知謹自省即便克去若從此漸漸積纍至於極處自能勃然上進雖博厚髙明皆是此積問存心之説曰人於凡事皆當存一個心如事父母兄長不待言矣雖處卑幼則存處卑幼之心處朋友則存處朋友之心至於外邊處主人亦當存處主人之心以至奴僕亦要存一點心處之皆不可忽略只如此便可下學上達易之理只是變易以生物故君子變易以生民東郭子曰聖人教人只是一個行如博學之審問之愼思之明辨之皆是行也篤行之者行此數者不已是也就如篤恭而天下平之篤先生曰這却不是聖人言學字有専以知言者有兼知行言者如學而時習之之學字則兼言之若博學之對篤行之而言分明只是知如何是行如好學近乎知力行近乎仁亦如是此篤恭之篤如云到博厚而無一毫人欲之私之類若篤行之篤即篤志努力之類如何相比得夫博學分明是格物致知的工夫如何是行東郭子曰大抵聖人言一學字則皆是行不是知知及之仁不能守之及之亦是行如日月至焉至字便是一般守之是守其及之者常不失也如孔門子路之徒是知及之者如顔子三月不違則是仁能守之者先生曰知及之分明只是知仁守之才是行如何將知及亦為行乎豫之所未曉也東郭子曰程子謂大學乃孔氏之遺書謂之遺書正謂其言相似也然聖人未嘗言之若以格物為窮理則與聖言不相似何以謂之遺書先生曰謂之遺書者指理而言非謂其言相似也且曰聖人未嘗言之甚害事某也愚只將格物作窮理先從知止致知起夫知止致知首言之而曰未嘗言之何也東郭子曰我初與陽明先生講格物致知亦不肯信後來自家將論孟學庸之言各相比擬過來然後方信陽明之言先生曰君初不信陽明後將聖人之言比擬過方信此却喚做甚麼莫不是窮理否東郭子笑而不對先生曰汝輩做工夫須要有把柄然後才把捉得住不然鮮不倒了的故扠手不定便撒擺立腳不定便那移先生曰學者必是有定守然後不好的事不能來就我易曰鼎有實我仇有疾不我能即吉若我無實則這不好的事皆可以來即我也邦儒問近日朋友講及大學每欲貫誠意於格物之前蓋謂以誠意去格物自無有不得其理者如何先生曰格致誠正雖是一時一串的工夫其間自有這須節次且如佛子寂滅老子清靜切切然惟恐做那仙佛不成其意可謂誠矣然大差至於如此正為無格致之功故也但格致之時固不可不著實去做格致之後誠意一段工夫亦是不可缺也呂潛問欲根在心何法可以一時拔得去先生曰這也難説一時要拔去得須要積久工夫才得就且聖如孔子猶且十五志學必至三十方能立前此不免小出入時有之學者今日且於一言一行差處心中即便檢制不可復使這等如或他日又有一言一行差處心中即又便如是檢制此等處人皆不知已獨知之檢制不復萌便是愼獨工夫積久熟後動靜自與理俱而人欲不覺自消欲以一時一念的工夫望病根盡去却難也李樂初見先生問聖學工夫如何下手先生曰亦只在下學做去先生因問汝平日做甚工夫來和仲默然良久不應先生曰看來聖學工夫只在無隱上亦可做得學者但於巳身有是不是處就説出來無所隱匿使吾心事常如青天白日才好不然久之積下種子便陷於有心了故司馬溫公謂平生無不可對人説得的言語就是到建諸天地不悖質之鬼神無疑也都從這裏起先生曰鄒東郭云聖賢教人只在行上如中庸首言天命之性率性之道便繼之以戒愼不睹恐懼不聞並不説知上去豫謂亦須知得何者是人欲不然戒愼恐懼個甚麼蓋知皆為行不知則不能行也康恕問戒愼恐懼是靜存愼獨是動察否先生曰只是一個工夫靜所以主動動所以合靜不睹不聞靜矣而戒愼恐懼便惺惺此便屬動了如大易間邪存其誠一般邪間則誠便存故存養省察工夫只是一個更分不得章詔問格物先生曰這個物正如孟子云萬物皆僃於我物字一般非是泛然不切於身的故凡身之所到事之所接念慮之所起皆是物皆是要格的蓋無一處非物其功無一時可止息得的聶靳曰某夜睡來有所想像念頭便覺萌動此處亦有物可格否先生曰怎麼無物可格君子無終食之間違仁造次必於是顛沛必於是亦皆是格物章詔因曰先生格物之説切要是大有功於聖門先生曰也難如此説但這等説來覺明白些且汝輩好去下手做工夫矣先生曰聖賢每每説性命來諸生看還是一個是兩個章詔曰自天賦與為命自人稟受為性先生曰此正是易一隂一陽之謂道一般子思説自天命便謂之性還只是一個朱子謂氣以成形而理亦賦還未盡善天與人以隂陽五行之氣理便在裏面了説個亦字不得陳德文因問夫子説性相近處是兼氣質説否先生曰説兼亦不是却是兩個了夫子此語與子思元是一般夫子説性元來是善的本相近但後來加著習染便逺了子思説性元是從命上來的須臾離了便不是但子思是恐人不識性的來歷故原之於初夫子因人墮於習染了故究之於後語意有正反之不同耳詔問修道之教如何先生曰修是修為的意思戒懼愼獨便是修道之功教即是明誠謂之教一般聖人為法於天下學者取法於聖人皆是橫渠不云糟粕煨燼無非教也他把這極粗處都看做天地教人的意思此理殊可觀問戒懼愼獨分作存天理遏人欲兩件看恐還不是先生曰此只是一個工夫如易間邪則誠自存但獨處却廣著不但未與事物接應時是獨雖是應事接物時也有獨處人怎麼便知惟是自家知得這裏工夫却要上緊做今日諸生聚講一般我説得有不合處心下有未安或只是隱忍過去朋友中有説得不是處或亦是隱忍過去這等也不是愼獨先生語意猶未畢何堅遽問喜怒哀樂前氣象如何先生曰只此便不是愼獨了我才説未曾了未審汝解得否若我就口答應亦只是空説此等處須是要打點過未嘗不是愼獨的工夫堅由是澄思久之先生始曰若説喜怒哀樂前個氣象便不是須是先用過戒懼的工夫然後見得喜怒哀樂未發之中若平日不曾用過工夫來怎麼便見得這中的氣象問孟子説個仁義禮智子思但言喜怒哀樂謂何先生曰人之喜怒哀樂即是天之二氣五行亦只是從天命之性上來的但仁義禮智隱於無形而喜怒哀樂顯於有象且切緊好下手做工夫耳學者誠能養得此中了即當喜時體察這喜心不使或流怒時體察這怒心不使或暴哀樂亦然則工夫無一毫滲漏而發無不中節仁義禮智亦自在是矣叔節又問顔子到得發皆中節地位否先生曰觀他怒便不遷樂便不改却是做過工夫來的詔云近日多人事恐或廢學先生曰這便可就在人事上學今人把事做事學做學分做兩樣看了須是即事即學即學即事方見心事合一體用一原的道理因問汝於人事上亦能發得出來否詔曰來見的亦未免有些俗人先生曰遇著俗人便即事即物把俗言語譬曉得他來亦未嘗不可如舜在深山河濵皆俗人也詔顧語象先曰吾輩今日安得有這樣度量先生語學者曰近日做甚工夫來曰只是做得個矜持的工夫於道却未有得處先生曰矜持亦未嘗不好這便是君子終日乾乾夕惕若戒愼不睹恐懼不聞的工夫但恐這個心未免或有時間歇耳曰然有間歇的心只是忘了先生曰還是不知如知得身上寒必定要討一件衣穿知得腹中飢必定要討一盂飯喫使知得這道如飢寒之於衣食一般不道就罷了恁地看來學問思辨的工夫須是要在戒愼恐懼之前方能别白的天理便做將去是人欲即便斬斷然後能不間歇了故某常説聖門知字工夫是第一件要緊的雖欲不先不可得矣吳佑問人心下多是好名如何先生曰好名亦不妨但不知你心下好甚麼名來若心下思稷只是個養民的名契只是個教民的名怎麼便能千萬世不泯把這個名之所以然上求則得之未嘗不善若只是空空慕個名不肯下手去做却連名也無了何廷仁來見問宣之在京一年亦可謂有志者先生曰宣之甘得貧受得苦七月間其僕病且危宣之獨處一室躬執㸑自勞筋骨未嘗見其有愠色可以為難矣廷仁對曰孔明淵明非無才也而草廬田園之苦顔子非無才也而簞瓢陋巷之窮看來君子之學惟重乎內而已先生曰然古人做工夫亦從飲食衣服上做起故顔子之不改其樂孔明淵明之所以獨處皆其志有所在食無求飽居無求安者耳某常云季氏八佾舞於庭三家以雍徹犯分不顧都只是恥惡衣惡食一念上起此處最要見得則能守得惟時問先生嘗論尹彥明朱元晦不同者何先生曰得聖門之正傳者尹子而已其行慤而直其言簡而易若朱子大抵嚴毅處多至於諫君則不離格致誠正人或問之則曰平生所學惟此四字如此等説話人皆望而畏之何以見信於上耶因論後世諫議多不見信於人君者亦未免峻厲起之也顧問朱子與二程何如先生曰明道為人盎然陽春之可掬故雖安石輩亦聞其言而歎服至於正叔則啓人偽學之議未必無嚴厲之過耳頃之歎曰凡與人言貴春溫而賤秋殺春溫多則人見之而必敬愛之而必親故其言也感人易而入人深不求其信自無不信也秋殺多則人聞之而必畏畏之而必惡畏惡生則言之入人也難將欲取信而反不信也先生曰父母生身最難須將聖人言行一一體貼在身上將此身换做一個聖賢的肢骸方是孝順故今置身於禮樂規矩之中者是不負父母生身之意也問格物之格有説是格式之格謂致吾之良知在格物格字不要替他添出窮究字樣來如何先生曰格物之義自伏羲以來未之有改也仰觀天文俯察地理逺求諸物近取諸身其觀察求取即是窮極之義格式之格恐不是孔子立言之意楷問求仁之要在放心上求否先生曰放心各人分上都不同或放心於貨利或放心於飲食或放心於衣服或放心於宮室或放心於勢位其放有不同人各隨其放處收斂之便是為仁先生曰諸君求仁須要見得天地萬物皆與我同一氣一草一木不得其所此心亦不安始得須看伊尹謂一夫不獲若已推而內之溝中是甚麼樣心王言曰此氣象亦難今人於父母兄弟間或能盡得若見外人如何得有是心曰只是此心用不熟工夫只在積纍如今在旅次處得主人停當惟恐傷了主人接朋友務盡恭敬唯恐傷了朋友處家不消説隨事皆存此心數年後自覺得有天地萬物為一體氣象先生曰人能反已則四通八達皆坦途也若常以責人為心則舉足皆荆棘也問無事時心清有事時心却不清曰此是心作主不定故厭事也如事不得已亦要理會教汝輩學禮猶隄防之於水若無禮以隄防其身則滿腔一團私意縱橫四出矣問堯舜氣象曰求這氣象不在髙逺便就汝一言一動處求之則滿目皆此氣象矣子貢言夫子之聖又多能也則以多能為聖之外夫子乃謂君子多乎哉不多也言不是多皆性分中事則多能又不在聖之外矣斯可見灑掃應對精義入神無二也問修辭立誠曰如所説的言語見得都是實理所當行不為勢所撓不為物所纍斷然言之就是立誠處如行不得的言之即是偽也諸生有言及氣運如何外邊人事如何者曰此都是怨天尤人的心術但自家修為成得個片段若見用則百姓受些福假使不用與鄉黨朋友論些學術化得幾人都是事業正所謂暢於四肢發於事業也何必有官做然後有事業司務呂愧軒先生潛呂潛字時見號愧軒陜之涇陽人師事呂涇野一言一動咸以為法舉嘉靖丙午鄉書卒業成均時朝紳有講會先生於其間稱眉目焉母病革欲識其婦面命之娶先生娶而不婚三年喪畢然後就室父應祥禮科都給事中既卒而封事不存先生走闕下録其原稿請銘於馬文莊與郭蒙泉講學谷口洞中從學者甚衆涇野之傳海內推之薦授國子監學正舉行涇野祭酒時學約調工部司務萬厯戊寅卒年六十二張石谷先生節張節字介夫號石谷涇陽人初從湛甘泉遊繼受學於涇野涇野贈詩稱其守道不回嘗語學者先儒云默坐澄心體認天理又云靜中養出端倪吾輩須理會得此方知一貫真境不爾縱事事求合於道終難湊泊不成片段矣萬厯壬午年八十卒李正立先生挺李挺字正立咸寧人正嘉間諸生從涇野學孤直不隨時俯仰嘗自誦云生須肩大事還用讀春秋往馬溪田所講學死於盜人皆惜之郡守郭蒙泉先生郛郭郛字惟藩號蒙泉涇陽人嘉靖戊午舉於鄉選獲嘉教諭轉國子助教升户部主事出守馬湖年八十八先生與呂愧軒同學愧軒之父其師也辛酉計偕因呂師會葬遂不行有古師弟之風其學以持敬為主自少至老一步不敢褻越嘗有詩云學道全憑敬作針須臾離敬道難尋常從獨木橋邊過惟願無忘此際心又云近名終喪已無欲自通神識逺乾坤濶心空意見新閉門只靜坐自是出風塵舉人楊天遊先生應詔楊應詔號天遊閩之建安人嘉靖辛卯舉於鄉卒業南雍時甘泉涇野諸公皆講學先生獨契涇野出其門下歸作道宗堂於華陽山中祀濂溪以及涇野動止必焚香稟命當世講學者無不與往復而於心齋龍溪為陽明之學者皆有微疵先生之學以寡欲正心為主本不愧天為歸的一切清虛玄逺之言皆所不喜然其言多自誇大而雌黃過甚亦非有道氣象如工夫即本體此言本自無弊乃謂本體光明猶鏡也工夫刮磨此鏡者也若工夫即本體謂刮磨之物即鏡可乎此言似是而非夫鏡也刮磨之物也二物也故不可以刮磨之物即鏡若工夫本體同是一心非有二物如欲岐而二之則是有二心矣其説之不通也楊天遊集聖人之所以能全其本體者不過能無欲耳吾人不能如聖人之無欲只當自寡欲入欲不獨聲色貨利窠臼而已凡一種便安欣羡自私自利心皆是欲將此斬斷方為寡欲則漸可進於無欲聖人亦豈逃人絶世始稱無欲哉聖人所欲在天理上用事有欲與無欲同雖其有涉於向慕有涉於承當所欲處無一非天理天機之流行矣吾人之學不在求事物之侵擾我不侵擾我只在處事物道理能盡不能盡是故居處時則不免有居處事之侵擾然吾只在恭上做工夫即其侵擾亦天機之流行矣執事不免有執事之侵擾與人不免有與人之侵擾吾只在敬上忠上做工夫即其侵擾亦無非天機之流行矣從古聖賢處世處常處變其誰不自侵擾中來若惡其侵擾而生厭怠便非學也朱陸之所可辨所可議者其言也朱陸之不可辨不可議者其人也道之存於人不貴於言久矣茍不以人論學而以言論學不以人求朱陸而以言語求朱陸則今之紛紛無怪其然今之學者出處無朱陸三揖一辭之耿拔取豫無朱陸裂石斷金之果決義利不分聲色不辨無朱陸青天白日之光明而所為黯闒垢濁自以為心傳乎孔孟而胸次則鬼魅跖尤蠅營狗苟入儀秦申商之姦槖而反呶呶於朱陸之短長可悲也夫平生矻矻苦力於學固以收放心為事也然思索義理有未會心處或至忘寢忘食當食當寢亦不知所食何物所寢何地此皆過用其心而不覺至於詩文尤甚吾之心已放於詩之思索上去矣生平負性氣每觸時艱不覺感歎不樂對友朋呶呶大言此皆出於一時感憤意氣之私吾之心已放於世變意氣上去矣今之學者不能實意以積義為事乃欲懸空去做一個勿忘勿助不能實意致中和戒懼乎不覩不聞乃欲懸空去看一個未發氣象不能實意學孔顔之學乃欲懸空去尋孔顔之樂處外面求討個滋味快樂來受用何異却行而求前者乎兹所謂舛也聖人之心如明鏡止水故此心本體光明猶鏡也工夫磨刮此鏡者也謂工夫即本體謂磨刮之物即鏡可乎鏡光明不能不為塵垢所慁人心光明不能不為物欲所雜謂克治物欲還吾心之光明則可謂克治工夫即吾心之本體則不可謂刮磨塵垢還吾鏡之光明則可謂磨刮工夫即吾鏡之本體則不可何也工夫有積纍之漸本體無積纍之漸工夫有純駁偏全不同本體無偏全無純駁也龍溪曰學者只要悟余謂不解辨吾道禪説是非不算作真悟龍溪曰學者只要個真種子方得余謂不能透得聲色貨利兩關不算作真種子今世學者病於不能學顔子之學而先欲學曾點之狂自其入門下手處便差不解克已復禮便欲天下歸仁不解事親從兄便欲手舞足蹈不解造端夫婦便欲説鳶飛魚躍不解衣錦尚絅便欲無聲無臭不解下學上達便自謂知我者其天認一番輕率放逸為天機取其宴安磐樂者為真趣豈不舛哉故余嘗謂學者惟在日用平實倫紀處根求不在玄虛誇大門户處尋討惟在動心忍性苦楚中著力不在擺脫矜肆灑落處鋪張靜坐者或流於禪定操存者或誤於調息主敬者或妄以為惺惺格物窮理者或自溺於圓覺存心養性者或陷於即心見性明儒學案卷二
