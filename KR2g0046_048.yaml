body:
  text: 明儒學案卷四十八餘姚黃宗羲撰諸儒學案中二文莊汪石潭先生俊汪俊字折之號石潭弋陽人也𢎞治癸未進士選庶吉士授翰林編修正德初忤逆瑾調南工部員外即瑾誅復還翰林歷侍讀學士嘉靖初晉吏禮二部侍郎禮部尚書兼國史副總裁大禮議起先生力主宋儒之議上為遷延者二年先生終不變於是上怒甚罷其官久之卒隆慶改元贈太子少保諡文莊先生之學程朱為的然以陽動隂靜流行而不息者為心而其不易之常體則性也性雖空無一物而萬化皆從此出故性體也心用也渾然不可分析以造化言之天髙地下萬物散殊無處非氣之充塞也天不得不髙地不得不下物之本乎天者親上本乎地者親下亘萬古而不易即是理也亦渾然不可分析也乃朱子謂性是心所具之理若是乎心為車也性為車所載之物也岐心性而二之猶之岐理氣而二之也非程子之旨也先生之不茍同如此先生既知聖人之學不失其本心便是復性則陽明之以心即理若合符契矣而謂陽明學不從窮事物之理守吾此心未有能中於理者無乃自背其説乎楊止菴言先生發明道體可謂獨見以陽明言性不分理氣著説非之陽明過弋陽寄四絶以示絶交按陽明所寄二絶非四絶也序云僕兹行無所樂樂與二公一會耳得見間齋固已如見石潭矣留不盡之興與後期豈謂樂不可極耶見説新居止隔山肩輿曉出暮堪還知公久已藩籬散何事深林尚閉關乘興相尋涉萬山扁舟亦復及門還莫將身病為心病可是無關却有關此正朋友相愛之情見之於辭以是為絶交則又何説濯舊孟子道性善論者猶紛紛也至宋程張闡明之而孟子之説始白於天下程子曰性即理也天下之理原其所自未有不善張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉夫所謂性即理也者必先有見於性之為體而後理可言也猶曰天即道也亦必有見於天之為體而後可言其為道也二子之論蓋皆即氣而指其本體未涉於有者為言其曰在天為命在人為性在義為理主於身為心其實一也發於思慮則有善有不善思慮則涉於有矣又曰人生而靜以上不容説才説性時便已不是性可説則涉於有矣又有二氣五行剛柔萬殊聖人所由惟一理人只要復其初其初則性也朱子宗二子立説似有未同者性説下四條同陽伸隂屈發而為春夏動也陽屈隂伸斂而為秋冬靜也此天地之化運行而不已也若天地之心則所以主乎是者不可以動靜言邵子曰動靜之間於復言之於姤亦言之蓋謂於此可見非以復姤為天地之心也曰天心無改移曰太極不動性也其指微矣知此則程門所論未發之中及所謂一日之間萬起萬滅而其心自若皆在是矣好惡情也情有所自出於性也好善惡惡人之性也即理也義也心之所同然也好惡未形而其理已具故曰性即理也孟子論性曰我固有之非由外鑠我也而又曰求則得之性待求而後得耶有其誠則有其神無其誠則無其神洋洋如在神何嘗無無之者人耳有理有氣氣形而理性朱子之説也程張之論蓋不如此道即性也若道外尋性性外尋道便不是性即理也此程子之説也朱子論性自謂宗程張立説似非程張本旨二氣五行剛柔萬殊所謂形而後有氣質之性也聖人所由惟一理人只要復其初所謂善反之則天地之性存焉者也至誠盡其性聖人事也盡人物之性不過因其氣質而裁成輔相之耳曰其性曰人之性曰物之性未可以一律言也目能視耳能聼口能言心能思皆氣也而心為之主性則心之體有不涉於氣者程子曰性即理也張子曰性立乎氣之外然實不外於心也世人以聞見為心但知囿於形氣者耳聖人盡性不以聞見梏其心乃無外之天心也朱子分理氣兩言之曰得氣以成形得理以為性恐非程張本旨程子有言以體會為非心故有心小性大之説不可將心滯在知識上求又曰在天為命在人為性在義為理主於身為心其實一也發於思慮則有善有不善程子蓋以心性合言之若張子心能盡性性不知檢其心蓋分言之學者究二説而能通之則可以言性矣心性説下五條同心性一物也不可分分而言之則性乾道也心坤道也凡從心而出者皆性之德也臣之所行皆君之令也妻之所生皆夫之子也然非以天地君臣夫妻對立而言也即地之道而天在其中即臣之道而君在其中即妻之道而夫在其中即心之道而性在其中矣故曰一物不可分分而言之可也虛靈應物者心也其所以為心者即性也性者心之實心者性之地也聖人之心仁義而已矣由仁義所散為萬事皆道也仁義之心乃其性也得於天者也在天為命在人為性主於身為心其實一也性可以意會而不可以象求故曰性即理也若心則涉於有象而可言矣程子有言自性之有形者謂之心自性之能動者謂之情其旨微矣心有動靜一語一默一寐一寤動而陽靜而隂若流行之用而本體則性也無聲無臭寂然不動無語默寐寤之間者也程子論中庸有謂凡言心者皆指已發而言蓋謂此也既又自以為未當曰心一也有指體而言者自注云寂然不動是也有指用而言者自注云感而遂通天下之故是也惟觀其所見如何耳蓋合心性而一言之與前説初不相戾也正蒙性者感之體感者性之神以感言心與程子一説朱子謂寂然者感之體感通者寂之用其言是已而繼之人心之妙其動靜亦如此恐非程張之旨心豈有出入亦以操舍而言也程子蓋為心無形體操存舍亡猶言用行舍藏云耳存亡猶隱顯也此正孟子善論心處言世人識心不識孟子蓋謂此也又曰放心是心本善而流於不善也言放心不足以言心非心之本體也他録有曰心則無出入矣逐物者是欲合而究之則程子示人明且切之意彰矣或曰子謂心無形體乃其本體則是所謂無體之體亦可得而見乎程子有言學者莫若先理會敬能敬則知此矣朱子云性即心之所具之理也知性則物格之謂於學者亦自有實地可據然性之為義則隱矣好惡情也好善而惡惡性也好之惡之者心也物至知之好惡形焉心之動而應乎外也事物未至好惡未形心之靜而專於內也若性者則其不易之常體不可以動靜內外言矣心性情説形而上為道形而下為器須著如此説器亦道道亦器但得道在不繫今與後已與人此程子之説也蓋謂天髙地下萬物散殊凡有迹可指者皆器也即道也天不得不髙地不得不下物之本乎天者則親上本乎地者則親下亘萬古而不易理定故也器有成毁而道則常在以人事言之文武之政布在方䇿皆器也即道也政有舉息而道則常在程子又曰一隂一陽之謂道隂陽亦形而下者而曰道者惟此語截得上下最分明元來只此是道要在人默而識之道器説下二條同運於無形之謂道形而下者不足以明之散殊可象為氣清通而不可象為神此張子之説也蓋謂太虛者氣之本體為性為神是謂形而上者其聚而為物天地法象皆神化之糟粕是謂形而下者與程子之説異朱子宗程子立説曰天地之間有理有氣理形而上者氣形而下者也人之生得理以為性得氣以成形其推於人事以事為形而下之器事之理乃道也事不合理則是有器而無道蓋岐而二之又非程子之説矣程子曰視聼思慮動作皆天也所謂器亦道也但要識真妄妄則不誠無物何器之云程子言凡事有本末不可以本末為兩假事本道也末器也即道也朱子解之曰非謂末即是本但學其末而本便在此竊以為是乃程子之本旨也心體也事用也心外無事事外無心心迹未嘗判此程子一原之旨也皆善事也或主於立名或主於為利無是二者而或但出於一時之意氣其用雖是而其體非也若主於義曰此吾之所當為也則體用合矣滯於用而不知飬其所自出之原俗學也外於用以求真體之所在異學也無是二者之蔽則得之矣一原説原始以未生之前言反終以既死之後言終者復其始者也始未嘗有則終亦無有始未嘗無則終亦無無以為未嘗有者未嘗有我也復其始則無我矣以為未嘗無者其所以為我者未嘗無也安得隨死而亡乎易説下二條同靜變而為動動變而為靜兩也易也道也時動而動初未嘗有動也時靜而靜初未嘗有靜也動靜合一存夫神神一而已兩可言也一不可言也故曰易所以立道窮神則無易矣知事即理則無事矣外不見物也知理即心則無心矣內不見已也外物不接內欲不萌如是而止乃得止之道止於理而已今學者喜言正心而不言誠意喜言致知而不言格物汨於異學故耳誠意所以正心格物所以致知內外一理此乃大學之道也大學説人之為學一心而已蓋心主乎一身而其體之虛靈足以管乎天下之理理散在萬事而其用之微妙實不外乎一人之心故學貴於知要求諸一心而已學之道奈何主敬以立其本窮理以進其知本立而知益明知進而本益固而心之體用全矣他日語門人曰主敬所以存此心格物所以明此心乃定論也刪朱子或問道散於天下而具於人之一心所謂性也性非他天命是矣所謂天命隂陽五行化生萬物天命之流行也五殊二實其本則一維天之命於穆不已天之所以為天也所謂在天為命也受生於天因各得是以為性所為在人為性也循性而出散為萬事皆道也修道以立法於天下則教也道形於日用無物不有無時不然所謂不可離也而其實體在我一性而已是故君子之體道也不求道於事而嚴諸一心戒慎恐懼乎其所不覩不聞所以存天理之本然無動靜之間者也不睹不聞隱且微矣而至著存焉沖漠無聯萬象森然已具此體道之君子所以必慎其獨也蓋重言之非二事也喜怒哀樂情也四者形而天下之事具發而中節則道也和所以狀情之德道就事而言四者未發則性也謂之中中所以狀性之德道之體也道不出於一中而實性之德故曰大本君子嚴諸一心而性得所飬則大本立矣本立道行所謂致中和也程子曰致如致却太平之致蓋中和不可以力取其要在慎獨而已天地於此乎位萬物於此乎育此聖人之能事學者之極功而豈外於一心之妙用乎中庸説下七條同或曰子亦求異於朱子乎曰非敢為異也將求同於程子耳中和之説程門論説甚詳似皆未領其旨定性書言聖人之喜以物之當喜聖人之怒以物之當怒聖人之喜怒不繫於心而繫於物蓋自其不繫於心而言則未發之中自其因物喜怒而言則已發之和不可析為二處也若以動靜之時分體用而以靜存為致中動察為致和非程子之本旨矣豈以其近於佛氏止觀空覺為一之論遂寧過於分析乎程子云吾儒與釋氏句句合事事同然而不同其謂此歟喜怒哀樂未發謂之中中也者天下之大本也指心之本體而言大學言正心曰有所忿懥恐懼好樂憂患則不得其正一物存焉則纍其空明之本體矣名其無倚曰中名其無妄曰誠名其無私曰仁一物也是謂天命之謂性發而中節謂之和和也者天下之達道也指心之流行而言是謂率性之謂道忠恕一以貫之忠者無妄恕者所以行乎忠也忠者體恕者用大本逹道也此程子之本旨也常人有欲順其欲則喜逆其欲則怒失其欲則哀得其欲則樂其所以為心者非喜則怒非哀則樂情而已聖人無欲渾然一性何喜何怒何哀何樂故曰只喜怒哀樂未發便是中也由是言之聖人之心未發之中也赤子之心發而未逺於中也衆人之心則皆已發者也然則聖人無發乎曰發而中節物各付物是皆未發者之所形而其未發者固自若也故曰言和則中在其中言中則含喜怒哀樂在其中矣中以無過不及為義過非道不及非道道者中而已以事言則各有中以道言則一中以蔽之矣中者大本言道之體也安得謂有二義乎如言心正則百事皆正若中有二義心亦可有二義乎或曰朱子論中和其書成卷子復有二論乎曰竊求諸程子而有疑焉蓋程門指此為傳授心法故其門人論説最詳龜山之南也羅仲素李延平實世守之至朱子始自立説以未發已發分屬動靜之時學者但當因其時而各致其力非復程子之説矣周子圖説之主靜自注無欲故靜通書曰一者無欲無欲則靜虛動直則是主靜之靜乃所謂一者而非陽動隂靜之靜也伊洛源流疑出於此若張子之天德邵子之天心皆指是為説也君子之道費而隱費用之廣也隱體之微也夫婦之所能知能行聖人之所不能知不能行語大語小在上在下萬有不齊可謂費矣語其體則一而已道是也不可得而見也以聖人言之動為道言為法行為則三千三百萬有不齊可謂費矣語其體則一而已心是也不可得而見也鳶飛魚躍上下察也明隱之不可掩也猶贊鬼神之德曰微之顯云耳中庸始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於密即其旨也君子喻於義義其心也小人喻於利利其心也方其未形於事初未有義利之可言而其為體固已判矣義心天下之公本於性者也天也利心一人之私生於形者也人也故君子從天不從人論語説下條同下學以所行言上逹以所見言非二事也下學而不能上逹由之而不知者也窮理則盡性至命下學而上逹也必有事焉以持志言勿正者猶言有事而未嘗有事云耳勿忘即是有事勿助即是勿正故程子以鳶飛魚躍言之孟子説仁者何人之本心是也求即其本心之安是為仁也然則求仁之方但默以守吾此心可乎曰非也視聼言動出門使民居處執事與人以至事賢友仁學問思辨皆為仁之地也近世右象山而左朱子曰吾心學也好異者靡然趨之惑世誣民其罪大矣仁説道一本而萬殊夫子之一貫是矣以學言之則必有事於萬殊而後一者可幾也曾子之隨事力行子貢之多學而識皆親受業於夫子之門者也顏子之博文約禮而後如有所立易之知崇禮卑而後成性存存皆一説也程子論學曰涵飬須用敬進學則在致知朱子申明之曰主敬以立其本窮理以致其知本立而知益明知進而本益固可謂盡矣陸氏之學蓋略有見於道體遂欲單刀直入以徑造夫所謂一者又自以為至簡至易立躋聖域故世之好異者靡然趨之而不知其相率而陷於異端之説也張子曰儒者窮理故率性可以謂之道釋氏不知窮理而自謂之性故其説不可推而行程子有言自物格而充之然後可以至聖人不知物格而先欲意誠心正者未有能中於理者據此可以斷陸氏之學學説下六條同氣質之性生於形者也心為形役故惟氣質用事天地之性言性之本然初不外於一心也生乎形而不役於形超然獨立物我並照則本性見矣學者知求復性而不知即心以求則未嘗讀孟子者也性即理也窮理則盡性至命以格物窮理為外為末而非之者則未嘗讀程子也聖人之心道也言者心之聲行者心之迹六經之為教皆出於聖人之心故曰心道也常人之心去道逺矣於是乎有學必窮理讀書廣聞見而後理可明必克已治心強恕而後性可復學而至於成性而後聖人之心可言也今始學者知習靜以入德亦一門徑而遂曰道在是不假外求則妄説也道者事物當然之理所謂在物為理也而其實體在我何事何物不出此心所謂處物為義也故曰中理在事義在心聞樂而樂食旨而甘居處而安人之情也理也其居喪也聞樂不樂食旨不甘居處不安亦人之情也理也故君子之學求不失其本心而已自誠明謂之性誠則無不明矣中庸論性而曰慎獨曰篤恭所以存誠也自明誠謂之教未至於誠者必由明而後至大學論學而首曰格物致知所以求明也程子論天論仁諸説即中庸首章之旨論窮理論進學諸説即大學首章之旨皆本乎一心而為言也儒釋皆從心地上做工夫故有相似處所謂以心役物不以物役心以理自勝不為事物所侵亂夫豈不同本末一貫心迹合一儒者之公而大也釋氏離本末判心迹求以自私自利而已動而陽靜而隂相循於無窮者是皆太極流行之用而其體初未嘗動也體用説通宇宙一氣也氣之實隂陽是已自其未成形者而言絪縕揉錯相兼相制欲一之而不能虛也自其成形者而言天地法象萬物形色剛柔男女粲然有分實也實者虛之所為形亦氣也是皆可名之象耳又自其本而言未嘗有體曰太虛虛而妙應曰神神而有常曰天曰性一物也有天則有道神天德化天道一於氣而已自其存主而言曰德自其流行而言曰道知變化之道者其知神之所為乎正蒙説下三條同耳目口體氣之聚而成形者也視聼言動氣之虛而為用者也曰隂曰陽可分屬也而皆統於一心則不可分矣氣之神也合一不測之謂也由此而通於性與天道君子之上逹也由此而梏於聞見溺於物欲小人之下逹也客感客形與無感無欲惟盡性者一之有無虛實通為一物者性也即程子道亦器器亦道之説知晝夜隂陽則能一性命隂陽晝夜屈伸相感於無窮所謂天所不能自己者謂命而感之體即性也故曰一性命聖人之至誠無息誠其性不息其命也鬼神常不死誠而已故曰誠不可掩此之謂知性命則知聖人知鬼神厯家以日月星辰為天體其度數有可紀者皆以地而言耳地有形質則有四極天之大也莫禦而其與地相為依附而旋轉者則猶可量也是故象見乎上體必應乎下若形影然讀程語儒者言性釋氏亦言性彼但認為已有所謂本以利心得來故學者亦以利心向之性者萬物之一源非有我之得私也惟大人為能盡其性蓋闢佛老而為言也雜説下二條同朱子之後學者知以理言性不墮於釋氏之虛空矣而未能識性之為體則立言者之過也禪學直截心地上用功却緣何用心粗彼蓋自以為道由我立命由我出其涉於迹者可勿深較程子不判心迹朱子不向用時勤猛省更於何處味真腴此儒釋異處學者要須識此詩心非目不見目自見之體須知瞑目前明明有先視以下論性治心如治目刮去膜與翳目淨視能傳心清性無際胸中欲無事須是必有事敬則心自虛乃照無物地無物是何地萬化從此出程門費講論此之謂未發天理在何處本心原不昧乃知堯舜心千年至今在萬法總歸一一復何所歸太極本無極天心無改移文中子意釋氏談實際省心亦省事聖人亦何心萬事一天理以下述程語釋言理是障此錯認理字理即是吾心無生亦無死管窺亦見天只是不廣大盡心而知天乃是天無外靜中須有物莫若理會敬能敬則知此此是天命性戒懼一生心即此是慎獨物欲遏將萌乃是敬未足間邪則固一主一不須間敬則自無已天理本完全主一謂之敬一者之謂誠一則無二三何復言欲萌此理最為約但恐不持久既能體而樂不患不能守心懈則有防敬則無間斷存久體自明天理一以貫只要立個心心即是天理此上有商量應不出敬字此心即性天京師是長安當下便認取須知未發前言止不言定須是止於事和則中在焉此理默而識坐井而觀天所見終不大試出井欄行却入井欄坐堯舜幾千年其心至今在道是堯舜心何嘗見道壞萬象無所隱向明乃天理如顧影壁間區區一物耳邵子之旨湛一氣之本感生方有象愛惡出太虛未勝則本喪張子之旨性是無物地存心即飬性何者是存心不出誠與敬以下漫述道心心是道惟微道之體人心乃私欲已涉形與氣文敏崔後渠先生銑崔銑字子鍾一字仲鳬號後渠河南安陽人弱冠舉鄉試入太學與四方名士馬理吕柟寇天敘輩相期許登𢎞治乙丑進士第改庶吉士授編修逆瑾竊政朝士見者多屈膝先生與何塘長揖而已瑾怒其輕薄張綵曰此人有虛名未可驟加之罪終出為南京稽勳主事瑾誅召還翰林時西涯以文藝籠絡天下先生以為非宰相所急上書規之侍講經筵每以親君子逺小人磨切武宗指錢寧廖鵬而言也小人皆欲甘心之晉侍讀遂告歸嘉靖改元起原官尋擢南京祭酒大禮議起上疏勤聖學辨忠邪以回天變上以為刺己也勒令致仕家居十六年以皇太子立選宫僚起少詹事兼侍讀學士轉南禮部右侍郎入賀聖節過家疾作而卒辛丑嵗也年六十四贈禮部尚書諡文敏先生之學以程朱為的然於程子之言心學者則又刪之以為涉於髙虛是門人之附會無乃固歟至其言理氣無縫合處先生自有真得不隨朱子腳下轉是也其詆陽明不遺餘力稱之為霸儒孫鍾元曰文敏議象山陽明為禪學為異説夫二人者且不必論其學術荆門之政有體有用寧藩之事拚九死而安社稷吾未見異端既出世而又肯任事者也此以其外而言也先生以知能心之用也愛敬性之實也本諸天故曰良今取以證其異説刪良能而不挈非霸儒歟此是以心為知覺以性為理不可以知覺即是理之成説頗與先生氣即理之論自相反耳先生既言本諸天故曰良孟子謂知能為良則知能本諸天者即是以愛敬之理決不僅以此知覺本諸天也陽明單提良知而不及愛敬其非懸空之知覺明矣孟子上節知能並舉下言無不知愛其親也無不知敬其兄也能字皆歸併知內蓋知是性也能是才也言性則才自在其中矣士翼造化流行四時者氣乎春當溫秋當涼者理乎理乃氣之條假雖紛紜而不可亂者溫涼以時聖人也冬過寒則春行其餘冽夏過炎則秋冒其餘熾氣偏理亦滯中人之性也春必溫秋必涼性善之譬也故學修而性可返若夫酷烈載沉七年固旱其下愚哉非用湯之精誠弗回自求心習靜之論興竊見孔經之在世猶襄獻之王周漢也方伯連帥雖曰同奬王室然别出教令自立社稷矣夫心即事也事即道也事合於道則心存矣事戾於道則心放矣故動之不能亡靜猶靜之不能亡動各值其遇而已矣靜而亡事勿生妄念勿從墮容動而酬用勿昧本心勿殉外欲動而殉欲難以求靜靜而雜念胡以制動今求靜曰真空真識失之偏矣問伊川曰性即理也然乎曰然性者仁義而已曾謂仁義非理乎仁義有不善歟問孔子何謂相近也曰别其所賦之等也問性何以有等曰氣也然則氣即理乎曰然何以明之今夫孩提知愛其親仁也知敬其長義也即其喜笑慕念謂之愛即其恭敬推遜謂之敬是非氣乎發於外即其在於中者也理者氣之條善者氣之德豈伊二物哉問氣有原乎曰有之易曰易有太極詩曰有物有則夫極者易之翕則者物之能故曰純粹精也舍是而談理氣支矣夫陽有知而隂無知是故質受神以為運魄資魂以為識陽有去而隂常居是故炎火熄而灰存花色落而朽貯人生為陽志則宰而氣則從氣為陽中之隂人死為隂氣則升而魄則止氣為隂中之陽朱子謂氣有聚散理無聚散竊所未詳蓋造化之原理常聚而氣亦聚人物之生氣若散而理亦散氣既散矣理安所附是故天地寒暑也人物禾稼也暑來禾生寒來禾死盡矣明年又蕃其鮮者故曰日新之謂盛德天命之謂性故物之理即吾心之理也外之物格則內之致知見天下之物各有則而不可易即此則以應之故時措之宜矣曰窮理則隱而難求曰格物則顯而可據格物者修治其目人倫其先也若泛乎其務則荒而靡即故博非顏子之文則約非不叛之道亡氣外之形亡神外之氣亡理外之神亡命外之理亡心外之命亡帝外之心心者具萬理而出命也問古之祭天地山川不屋謂棟宇不能囿其形也乃以人之飲食薦之夫豈知神之所嗜乎曰祭也者致其敬與禮也故以人道之所重者奉之盡其報本之誠已耳若神之所嗜夫惡知之豺之祭獸獺之祭魚亦就其性之所能也夫覺心之放即求也知我之病即藥也矜已之是即非也妬人之長即短也性之所寓曰心心之所具曰性性者理也心乃發用斯理者孟子以四端驗之夫自修身而齊家而治國平天下斯謂盡心盡性也精一道心者用之執中也中者道心之極也宋人以異端附會之曰道即心也則人非心歟問性即理也有氣乎否曰氣也惟其為理斯謂之性猶夫純潔而溫者不謂之石而謂之玉也理之訓有條也古用以言一事至宋儒而言道體也程子云聖人本天釋氏本心蓋天言其理也心兼乎血氣也釋氏以精靈知覺為主故迷則皆妄悟則皆真故曰心聖人以仁義禮智為主故經綸大經裁成大化與物同體故曰天心性固不離亦非雜知能心之用也愛親敬長性也好利惡害心之覺也生可舍死可取性也譬之物焉生生氣也榖之甘杏之酸桂之辣性也心靈而性活也心移而性宰也孟子曰仁人心也乃言所主也非用為訓也心性之辨一言而決之矣陽剛也生也隂柔也成也皆氣也即其理也仁陽也愛也義隂也敬也皆氣也即其理也古人曰隂陽曰仁義一而已後人和合孔孟之言性乃立理氣之名學者勿泥其詞而析其源不可廢理而存氣也常人無中小人無靜朱子論宋祧主取諸商周夫湯文興自諸候契稷始封之君也宗之固當布衣而有天下如宋太祖除亂救民創業垂統宜正東向之位為百代之祖自宣宗而上悉以親盡而祧天子崩臣子稱天以誄之其祭也奉天以配之若曰先世積德而致則大賢之後多湮何乃棄赫赫之功而求冥冥之報若曰子孫不當自擇其先則自一世二世以至百世皆不遷可也顔子之學克已復禮治怒改過莊周謂之黜聰明墮肢體蓋肆為躗言以譏孔氏之致知謹禮也宋劉彥沖諸人祖述為文則顏子乃孔門之逹摩矣曾點言志朱子許其天理流行夫遇一事必有一則處之當而熟則聖人矣一以貫之也豈有物見目前而可玩哉水之流鳶之飛魚之躍皆實體也猶父之慈子之孝皆天命之性人不率之愧於物矣豈若黃華般若為禪機哉不格物而曰致知者妄也不履事而曰存心者偷也夫人不食而謂飽即空而見華非實也乃病也觀諸造化靜多於動雖陽氣畢逹萬有並作本末固凝也可以知德矣觀諸造化動而無息是故絶澗石壁草蘚之生冬冽地拆薺麥之青可以知仁矣大學一篇皆明明德而已仁者與物同體遺一物塗一民非仁也故新民即明明德中庸不指仁義為性而曰喜怒哀樂蓋二者旨微而難言四者常發而易見夫仁義之訓至宋而明今即田父市人而語之曰汝喜汝怒性也皆曉然而領四者即仁義之用考孟子之四端則參得之矣戒懼以體驗此中使勿有所係而偏大學所謂正心慎獨以警省此和使勿有所逐而流大學所謂修身靜立動之本動逹靜之具交飬互發非二事也其世治者其論公於衆其世興者其論公於朝其世哀者其論公於野上下不公其世不可為已故黨錮息而漢亡朋黨盡而宋亂夫公論弗可一日而廢也關雎咏淑女以配君子間關思德音以括其上蓋幽王昏亂法家拂士斥矣所信惟婦言故詩人冀其改德以親賢女爾心存則鑒物之理氣和則識仁之象不言常而言變異端皆然申韓之法皆防人之欺疑人之叛夫將置秉􅉓於何地耶松窗寤言夫正物之謂格至理之謂物今之異言也則心當何正而至善有别名乎孟子曰良知良能知能心之用也愛敬性之實也本諸天故曰良今取以證其異刪良能而不挈非霸儒歟學者改過追索其動念之故而除之斯不萌於再孟子曰學問之道求其放心而已矣條目不具奚以求心故曰居處恭執事敬與人忠出門如見大賓使民如承大祭其存心之方乎夫心火屬也火麗物而後有形心宰物而後有造異端之言異焉曰靜則心定而理自見無待乎學矣是猶舍耒耜而言耕也問程子有遺書矣子述程志也何居曰伐偽存真也髙虛者異端則然學者附之斯惑人之向使二夫子之道淆其遊謝之罪歟鮑氏而下無譏焉是故夫子之道仁也敬其業也明儒學案卷四十八
