body:
  text: 明儒學案卷二十六餘姚黃宗羲撰南中相傳學案二襄文唐荆川先生順之唐順之字應德號荆川武進人也嘉靖乙丑會試第一授武選主事丁內艱起補稽勳調考功以校對實録改翰林編修不欲與羅峯為緣告歸羅峯恨之用吏部原職致仕皇太子立選宫僚起為春坊司諫上常不御朝先生與念菴浚谷請於元日皇太子出文華殿百官朝見上大怒奪職為民東南倭亂先生痛憤時艱指畫方略於當事當事以知兵薦之起南部車駕主事未上改北部職方員外先生至京即升本司郎中查勘邊務繼而視師浙直以為禦島裔當在海外鯨背機宜豈可懸斷華屋之下身泛大洋以習海路敗賊於崇明沙升太僕寺少卿右通政未上擢僉都御史巡撫淮揚先生方勦三沙賊江北告急乃以三沙付總兵盧鏜而擊賊於江北敗賊姚家蕩又敗廟灣幾不能軍先生復向三沙賊遁至江北先生急督兵過江蹙之賊漸平會淮揚大祲賑飢民數十萬行部至泰州卒於舟中庚申四月一日也年五十四先生晚年之出由於分宜故人多議之先生固嘗謀之念菴念菴謂向嘗𨽻名仕籍此身已非已有當軍旅不得辭難之日與徵士處士論進止是私此身也兄之學力安在於是遂決龜山應蔡京之召龜山徵士處士也論者尚且原之况於先生乎初喜空同詩文篇篇成誦下筆即刻畫之王道思見而歎曰文章自有正法眼藏奈何襲其皮毛哉自此幡然取道歐曾得史遷之神理久之從廣大胸中隨地湧出無意為文而文自至較之道思尚是有意欲為好文者也其著述之大者為五編儒編左編右編文編稗編是也先生之學得之龍溪者為多故言於龍溪只少一拜以天機為宗以無欲為工夫謂此心天機活物自寂自感不容人力吾惟順此天機而已障天機者莫如欲欲根洗淨機不握而自運矣成湯周公坐以待旦高宗恭默三年孔子不食不寢不知肉味凡求之枯寂之中如是艱苦者雖聖人亦自覺此心未能純是天機流行不得不如此著力也先生之辨儒釋言儒者於喜怒哀樂之發未嘗不欲其順而逹之其順而逹之也至於天地萬物皆吾喜怒哀樂之所融貫佛者於喜怒哀樂之發未嘗不欲其逆而銷之其逆而銷之也至於天地萬物淡然無一喜怒哀樂之交故儒佛分途只在天機之順逆耳夫所謂天機者即心體之流行不息者是也佛氏無所住而生其心何嘗不順逆與流行正是相反既已流行則不逆可知佛氏以喜怒哀樂天地萬物皆是空中起滅不礙吾流行何所用銷但佛氏之流行一往不返有一本而無萬殊懷山襄陵之水也儒者之流行盈科而行脈絡分明一本而萬殊先河後海之水也其順固未嘗不同也或言三千威儀八萬細行靡不具足佛氏未嘗不萬殊然佛氏心體事為每分兩截禪律殊門不相和會威儀細行與本體了不相干不可以此比而同之也崇禎初諡襄文荆川論學語近來談學謂認得本體一超直入不假階級竊恐雖中人以上有所不能竟成一番議論一番識見而已天理愈窮則愈見其精微之難致人欲愈克則愈見其植根之甚深彼其易之者或皆未嘗實下手用力與用力未嘗懇切者也與張士宜古之所謂儒者豈盡律以苦身縳體如尸如齋言貌如土木人不得搖動而後可謂之學也哉天機盡是圓活性地儘是灑落顧人情樂率易而苦拘束然人知恣睢者之為率易矣而不知見天機者之尤為率易也人知任情佚宕之為無拘束矣而不知造性地者之尤為無拘束也與陳兩湖小心兩字誠是學者對病靈藥細細照察細細洗滌使一些私見習氣不留下種子在心裏便是小心矣小心非矜持把捉之謂也若以為矜持把捉則便與鳶飛魚躍意思相妨矣江左諸人任情恣肆不顧名檢謂之灑脫聖賢胸中一物不礙亦是灑脫在辨之而已兄以為灑脫與小心相妨耶惟小心而後能洞見天理流行之實惟洞見天理流行之實而後能灑脫非二致也與蔡子木近來痛苦心切死中求活將四十年前伎倆頭頭放舍四十年前見解種種抹殺於清明中稍見得些影子原是徹天徹地靈明渾成的東西生時一物帶不來此物却原自帶來死時一物帶不去此物却要完全還他去然以為有物則何覩何聞以為無物則參前倚衡瞻前忽後非胸中不持世間一物則不能見得此物非心心念念晝夜不舍如養珠抱卵下數十年無滲漏的工夫則不能收攝此物完養此物自古宇宙間豪傑經多少人而聞道者絶歎其難也與王道思嘗驗得此心天機活物其寂與感自寂自感不容人力吾與之寂與之感只是順此天機而已不障此天機而已障天機者莫如欲若使欲根洗盡則機不握而自運所以為感也所以為寂也天機即天命也天命者天之所使也立命在人人只立此天之所命者而已白沙色色信他本來一語最是形容天機好處若欲求寂便不寂矣若有意於感非真感矣出入無時莫知其向此真心也非妄心之謂也出入本無時欲有其時則強把捉矣其向本無知欲知其向則強猜度矣無時即此心之時無向即此心之向無定體者即此心定體也答雙江中庸所謂無聲無臭實自戒謹不覩恐懼不聞中得之本體不落聲臭工夫不落聞見然其辨只在有欲無欲之間欲根銷盡便是戒謹恐懼雖終日酬酢云為莫非神明妙用而未嘗涉於聲臭也欲根絲忽不盡便不是戒謹恐懼雖使棲心虛寂亦是未離乎聲臭也答張甬川白沙靜中養出端倪此語須是活看蓋世人病痛多緣隨波逐浪迷失真源故發此耳若識得無欲為靜則真源波浪本來無二正不必厭此而求彼也兄云山中無靜味而欲閉關獨卧以待心志之定即此便有欣羡畔援在矣請且無求靜味只於無靜味中尋討母必閉關只於開門應酬時尋討至於紛紜轇轕往來不窮之中試觀此心如何其應酬轇轕與閉關獨卧時還有二見否若有二見還是我自為障礙否其障礙還是欲根不斷否兄更於此著力一番有得有疑不惜見教也答呂沃州近會一二方外人見其用心甚專用工最苦慨然有歎於吾道之衰蓋禪家必欲作佛不坐化超脫則無功道人必欲成仙不留形住世則無功兩者皆假不得惟聖賢與人同而與人異故為其道者皆可假托溷帳自誤誤人竊意當時聖賢用心專而用工苦者豈獨百倍方外人之修鍊而已必有啞子喫苦瓜與你説不得者而世人乃欲安坐而得之以其世間功名富貴之習心而高談性命之學不亦遠乎與念菴當時篡弒之人必有自見己之為是而見君父之甚不是處又必有邪説以階之如所謂邪説作而弒君弒父之禍起者春秋特與辨别題目正其為弒如州吁弒完一句即曲直便自了然曲直了然即是非便自分曉亂臣賊子其初為氣所使昧了是非迷了本來君父秉彛之心是以其時惡力甚徑有人一與指點是非中其骨髓則不覺回心一回心後便自動彈不得蓋其真心如此所謂懼也舊説以為亂臣賊子懼於見書而知懼則所懼者既是有所為而非真心且其所懼能及於好名之人而不及於勃然不顧名義之人以為春秋書其名脅持恐動人而使之懼此又只説得董狐南史之作用而非所以語於聖人撥轉人心之妙用也答姪孫慈湖之學以無意為宗竊以學者能自悟本心則意念往來如雲物相蕩於太虛不惟不足為太虛之障而其往來相蕩乃即太虛之本體也何病於意而欲掃除之茍未悟本心則其無意者乃即所以為意也心本活物在人默自體認處何如不然則得力處即受病處矣答南野世間伎倆世間好事不可捱在胸中學之滲漏多正兜攬多耳昔人所以絶利一原不如是則不足以收斂精神而凝聚此道也答胡青崖近來學者病痛本不刻苦搜剔洗空欲障以元妙之語文夾帶之心直如空花竟成自誤要之與禪家鬭機鋒相似使豪傑之士又成一番塗塞此風在處有之而號為學者多處則此風尤甚惟默然無説坐斷言語意見路頭使學者有窮而反本處庶幾挽歸真實力行一路乃是一貼急救良方答張士宜儒者於喜怒哀樂之發未嘗不欲其順而逹之其順而達之也至於天地萬物皆吾喜怒哀樂之所融貫而後一原無間者可識也佛者於喜怒哀樂之發未嘗不欲其逆而銷之其逆而銷之也至於天地萬物泊然無一喜怒哀樂之交而後一原無間者可識也其機常生於逆故其所謂旋聞反見與其不住聲色香觸乃在於聞見聲色香觸之外其機常主於順故其所謂不覩不聞與其無聲無臭者乃即在於覩聞聲臭之中是以雖其求之於內者窮深極微幾與吾聖人不異而其天機之順與逆有必不可得而強同者中庸輯略序乾坤之心不可見而見之於復學者默識其動而存之可矣是以聖人於乾則曰其動也直於坤則曰敬以直內乾坤一於直也動本直也內本直也非直之而後直也蓋其醖釀流行無斷無續乃吾心天機自然之妙而非人力之可為其所謂默識而存之者則亦順其天機自然之妙而不容纖毫人力參乎其間也學者往往欲以自私用智求之故有欲息思慮以求此心之靜者矣而不知思慮即心也有欲絶去外物之誘而專求諸內者矣而不知離物無心有患此心之無著而每存一中字以著之者矣不知心本無著中本無體也若此者彼亦自以為求之於心者詳矣而不知其弊乃至於别以一心操此一心心心相捽是以欲求寧靜而愈見紛擾也明道語略序太常唐凝菴先生鶴徵唐鶴徵字元卿號凝菴荆川之子也隆慶辛未進士選禮部主事與江陵不合中以浮躁江陵敗起歷工部郎遷尚寶司丞升光祿寺少卿又升太常寺少卿歸起南京太常與司馬孫月峯定妖人劉天緒之變謝病歸萬歷己未年八十二卒先生始尚意氣繼之以園林絲竹而後泊然歸之道術其道術自九流百氏天文地理稗官野史無不究極而繼乃歸之莊生逍遙齊物又繼乃歸之湖南之求仁濓溪之尋樂而後恍然悟乾元所為生天地生人物生一生萬生生不已之理真太和奧窔也物欲不排而自調世情不除而自盡聰明才伎之昭灼旁蹊曲徑之奔馳不收攝而瑩然無有矣語其甥孫文介曰人到生死不亂方是得手居常當歸併精神一路毋令漏泄先生言心性之辨今古紛然不明其所自來故有謂義理之性氣質之性有謂義理之心血氣之心皆非也性不過是此氣之極有條理處舍氣之外安得有性心不過五臟之心舍五臟之外安得有心心之妙處在方寸之虛則性之所宅也此數言者從來言心性者所不及也乃先生又曰知天地之間只有一氣則知乾元之生生皆是此氣乾元之條理雖無不清人之受氣於乾元猶其取水於海也海水有鹹有淡或取其一勺未必鹹淡之兼取未必鹹淡之適中也間有取其鹹淡之交而適中則盡得乾元之條理而為聖為賢無疑也固謂之性或取其鹹或取其淡則剛柔強弱昏明萬有不同矣皆不可不謂之性也則此言尚有未瑩蓋此氣雖有條理而其往來屈伸不能無過不及聖賢得其中氣常人所受或得其過或得其不及以至萬有不齊先生既言性是氣之極有條理處過與不及便非條理矣故人受此過不及之氣但可謂之氣質不可謂之性若以之為性則只言氣是性足矣不必言氣之極有條理處是性也無乃自墮其説乎然則常人有氣質而無性乎蓋氣之往來屈伸雖有過不及而終歸於條理者則是氣中之主宰故雨暘寒燠恆者暫而時者常也惟此氣中一點主宰不可埋沒所以常人皆有不忍人之心而其權歸之學矣桃溪劄記鶴徵避暑於桃溪偶校先君子所纂諸儒語要寄吳侍御叔行入梓時有觸發處隨時記之以請於同志幸有以正之也乾元所生三子曰天曰人曰地人何以先於地也地坤道也承天時行不得先天也故後則得主先則迷矣人却可先可後者故曰御天故曰先天而天弗違後天而奉天時世人皆謂天能生人不知生人者却是統天之乾元耳人生於乾元天地亦生於乾元故並稱之曰三才中庸首言天命之謂性後又言思知人不可以不知天何也人與天並生於乾元乾元每生一物必以全體付之天得一箇乾元人也得一箇乾元其所得於乾元絶無大小厚薄之差殊中庸後面言詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不己天與文王毫髮不差特在天名之曰不己在文名之曰純耳非其本來之同文王之純安能同天之不己哉然惟天則萬古不變而人不皆文也人不皆文且以為天非人之所可及矣故告之曰在天為命在人則謂之性其實一也故曰天命之謂性欲知人之性非知天之命不能知性之大也故曰思知人不可以不知天示人以盡性之則也太甲曰顧諟天之明命時時看此樣子也孟子亦曰知其性則知天矣斯所謂窮理盡性以至於命也盈天地間一氣而已生生不己皆此也乾元也太極也太和也皆氣之别名也自其分隂分陽千變萬化條理精詳卒不可亂故謂之理非氣外别有理也自其條理之不可亂若有宰之者故謂之帝生之為天則謂之命以乾坤之所由不毁言也生之為人則謂之性以吾心含此生機言也天率是命而運則謂之天道人率是性而行則謂之人道借道路之道以名之也人以為斯理斯道斯性斯命極天下之至靈非氣之所能為不知舍氣則無有此靈矣試觀人死而氣散尚有靈否心性之辨今古紛然不明其所自來故有謂義理之性氣質之性有謂義理之心血氣之心皆非也性不過是此氣之極有條理處舍氣之外安得有性心不過五臟之心舍五臟之外安得有心心之妙處在方寸之虛則性之所宅也觀製字之義則知之矣心中之生則性也蓋完完全全是一個乾坤托體於此故此方寸之虛實與太虛同體故凡太虛之所包涵吾心無不備焉是心之靈即性也詩書言心不言性言性不言心非偏也舉心而性在其中舉性而心在其中矣蓋舍心則性無所於宅舍性則心安得而靈哉孟子曰盡其心者知其性也始兼舉而言之實謂知得性中所藏之性而盡之乃所以盡心也非知性則心又何所盡耶其不可分言益明矣試觀人病痰迷心竅則神不守舍亦一驗也知天地之間只有一氣則知乾元之生生皆是此氣知乾元之生生皆此氣而後可言性矣乾元之條理雖無不清人之受氣於乾元猶其取水於海也海水有鹹有淡或取其一勺未必鹹淡之兼取未必鹹淡之適中也間有取其鹹淡之交而適中則盡得乾元之條理而為聖為賢無疑也固謂之性或取其鹹或取其淡則剛柔強弱昏明萬有不同矣皆不可不謂之性也凡可以學而矯之者其氣皆未甚偏至於下愚不移斯偏之極矣全以其困而終不能學也孔子謂之相近亦自中人言之耳上智下愚不與也然要之下愚而下則為禽獸為草木乾元生生之機則無不在也他不能同好生惡死之心同也蓋以乾元之氣無非生也乾之彖曰各正性命九五之文言曰本乎天者親上本乎地者親下此則所謂各正矣然則雖聖人在上所過者化所存者神亦豈能使禽獸草木之靈同於人亦豈能使下愚之同於上智哉則己不害其為各正矣世儒爭言萬物一體盡人性盡物性參贊化育不明其所以然終是人自人物自物天地自天地我自我勉強湊合豈能由中而無間須知我之性全體是乾元生天生地生人生物無不是這性人物之性有一毫不盡天地之化育有一毫參贊不來即是吾性之纖毫欠缺哉則知盡人物贊化育之不容己矣人見中庸遞言盡己性盡人性盡物性贊化育參天地似是盡己性外别有盡人物之性而盡人物之性外仍有參贊之功不知盡人物之性乃所以自盡其性而盡人物之性即所以參贊化育蓋緣吾人除却生人生物别無己性天地除却生人生物别無化育故至誠盡得人物之性方是自盡其性即是贊化育矣何謂盡人性盡物性俾各不失其生機而已故曰各正性命保合太和乃利貞聖人於盡人物之性以自盡其性未嘗時刻放過然子貢説起博施濟衆聖人却又推開了曰堯舜其猶病諸蓋聖人能必得己所可盡處而不能必得時位之不可必博施濟衆非有加於欲立欲達之外也必須得時得位乃可為之合下只有一個立人達人之心而已惟易標出一個乾元來統天見天之生生有個本來其餘經書只説到天地之化育而已蓋自有天地而乾元不可見矣然學者不見乾元總是無頭學問孔子舍贊易之外教人更不從乾元説起故子貢曰夫子之言性與天道不可得而聞也及諸門弟子猶不能解直欲無言孔子總是善誘説來只是孔子的與學者絶無用處故孟子曰君子深造之以道欲其自得之也其教也曰勞之來之匡之直之輔之翼之皆所以使之自得耳為學為教舍自得别無入路欲自得舍悟别無得路孔子之無言乃所以深言之也晦菴先生謂以悟為則乃釋氏之法而吾儒所無有不知其用字不同耳伊尹之先覺後覺則覺即悟也聖門之生知學知困知則知即悟也即後儒之所謂察識亦悟也豈可以用字不同而論其有無哉聖人到保合太和全是一個乾元矣蓋天下之物和則生乖戾則不生此無疑也乾元之生生亦只此一團太和之氣而已人人有此太和之氣特以乖戾失之中庸曰發而皆中節謂之和孟子曰其平旦之氣好惡與人相近也者幾希然則中節即是和與人同即是中節大學曰民之所好好之民之所惡惡之此之謂民之父母此所謂與人同所謂中節也然則求復其太和之氣豈在遠哉亦自其與人相近者察之而已自古聖人論學唯曰心曰性曰命並未有言氣者至孟子始有養氣之説真見得盈天地只有一氣其所謂理所謂性所謂神總之是此氣之最清處清便虛便明便靈便覺只是養得氣清虛明靈覺種種皆具矣然所謂養者又非如養生家之養也以直養之而已必有事焉所謂養也正忘助皆暴也害也勿正心勿忘勿助長所謂直也然非可漫然得養也須要識得然後養得其識法則平旦之氣是也蓋氣原載此虛明靈覺而來養之所以使氣與虛明靈覺仍舊混然為一不失其本來而已盈天地間只有此氣則吾之氣即天地萬物之氣也吾之性即天地之命萬物之性也所以天地自天地我自我物自物者我自以乖戾塞其流通之機耳以直養則未發即是中已發即是和吾之氣吾之性仍與天地萬物為一矣故曰塞乎天地之間故曰保合太和吾之氣吾之性至與天地萬物為一此所謂純亦不己尚何仙佛之足言仁生機也己者形骸即耳目口鼻四肢也禮則物之則也中庸曰仁者人也孟子曰仁也者人也則人之形骸耳目口鼻四肢何莫非此生機而生我者即是生天生地生人生物者也何以不相流通必待於克己復禮也人惟形骸耳目口鼻四肢之失其則斯有所間隔非特人我天地不相流通雖其一身生機亦不貫徹矣故曰罔之生也幸而免茍能非禮勿視目得其則矣非禮勿聽耳得其則矣非禮勿言口得其則矣非禮勿動四肢得其則矣各得其則則吾一身無往非生機之所貫徹其有不與天地萬物相流通者乎生機與天地萬物相流通則天地萬物皆吾之所生生者矣故曰天下歸仁中庸曰凡有血氣者莫不尊親則歸仁之驗也致知致曲之致即孟子所謂擴而充之矣然必知皆擴而充之不知則所擴充者是何物故致知在得止之後致曲在明善之後皆先有所知而後致也知即明德也此知豈曰人所本無哉情識用事而真知晦矣即有真知發見於其間無由識矣故曰行矣而不著習矣而不察終身由之而不知其道者衆也非悟非自得何由知哉然徒曰致良知而未識所謂良知者何狀幾何不認賊作子也東萊氏曰致知格物修身之本也知者良知也則陽明先生之致良知前人既言之矣特格物之説真如聚訟萬世不決何歟亦未深求之經文耳論格物之相左無如晦菴陽明二先生然其論明德之本明卒不可以異也私欲之蔽而失其明故大人思以明其明亦不可以異也則格物者明明德之首務亦明明德之實功也陽明以心意知為物而格之則心意知不可謂物也晦菴謂事事物物而格之則是昧其德性之真知而求之聞見之知也涑水有格去物欲之説不知物非欲也近世泰州謂物物有本末之物則但知身為本天下國家為末之説皆可謂之格物皆可謂之明明德乎必不然矣詩云天生蒸民有物有則孟子曰物交物則引之而已則凡言物必有五官矣則即格也格字之義以格式之訓為正格式非則而何要知物失其則則物物皆明德之蔽物得其則則物物皆明德之用既灼見其所謂明德而欲致之以全其明非物物得則何以致之孔子告顔子之為仁曰非禮勿視非禮勿聽非禮勿言非禮勿動格物之功也視聽言動悉無非禮則五官各就其明矣明德當何弗明哉此所謂物格而知至也中庸或生而知之以下六之字皆指性也生而知安而行是率性之謂道也學而知困而知求知此性而率之也舍率性之外别無道舍知性之外别無學學知困知者較之生知只是多費一倍工夫於未知之先耳及既知之後與生知各各具足矣故曰及其知之一也世謂生知不待學故朱夫子於凡聖人好古敏求好學發憤皆以為謙己誨人非也知而弗行猶勿知也即曰安行在聖人自視未嘗不曰望道未見未嘗不曰學如不及即舜之聞一善言見一善行沛然若決江河莫之能禦亦學也蓋行處即是學處特視利與勉強者能出於自然耳不可謂非學也遵道而行即是君子深造之以道不至於自得即所謂半塗而廢也然自得亦難言矣深造以道可以力為自得不可以力為也即有明師亦惟為勞來匡直輔翼以使之而已不能必之也有言下即得者有俟之數年而得者有終身不得者有無心於感觸而得者有有心於參求而得者有有心無心俱不得者及其得之也師不能必其時必其事已亦不能必其時必其事也學者須是辦必得之志則無不得者矣盈天地之間只有一氣惟橫渠先生知之故其言曰太和所謂道又曰知虛空即氣則有無隱顯神化性命通一無二顧聚散出入形不形能推本所從來則深於易者也宋人惟以聖人之好學為謙己誨人遂謂生知無學後來宗門更生出一種議論謂一悟便一了百當從此使人未少有見輒以自足儒為狂儒禪為狂禪不知自凡民視之可使由不可使知行似易而知難自聖人視之則知猶易而行之未有能盡者也故曰堯舜其猶病諸蓋斯道之大雖極於無外而中則甚密無纖毫滲漏倘有滲漏則是有虛而不滿之處不足以為大矣故中庸曰優優大哉言其充足之為大也非學之密其功與之俱無滲漏何以完吾之大乎聖人之勉焉日有孳孳死而後已過此以往未之或知皆此意也學其有止息乎此子貢請息而孔子告之以死也孟子既曰持其志又曰無暴其氣似掃性宗之學既曰勿忘又曰弗助長似掃命宗之學孟子時佛法未入中國已豫為塞其竇矣至於勿助長人皆謂即是義襲然孟子之自解曰助之長者揠苖者也揠苖者斷其根者夫義襲誠有害然何至斷根憬然悟憣然改則根本自在矣獨以為揠苖為喻者自老氏御氣之説以至元門之煉氣皆是也蓋惟是則將氣矯揉造作盡失本來雖有人與説破直養之道念頭到處依然走過熟路矣奚復能直養哉此所以為斷根也管登之嘗分别學有透得乾元者有只透得坤元者此千古儒者所不能道語亦千古儒者所不可不知語透得坤元只見得盡人物之性是人當為之事猶似替人了事惟透得乾元才知盡人物之性是人不容不為之事直見了自己事少時讀孟子告齊宣好貨好色之説以為聖賢教人點鐵成金手段及今思之乃知是單刀直入不著絲毫處與孔子欲立欲達只換得一個名目蓋舉得個與百姓同之一念便是民之所好好之矣學莫嚴於似是之辨故中庸聖經之下首别君子小人之中庸孟子七篇之將終極稱鄉願之亂德則夫孔子誅少正卯之行僻而堅等語猶是可非可刺未足為似也直至非之無非刺之無刺則其似處真有不可以言語名狀分别者焉得不惑世誣民也故孔子於老子謂之曰猶孟子於鄉願謂之曰似皆春秋一字之斧鉞也然真實自為之人反之吾心自有炯然不可昧者古稱異端者非於吾性之外别有所謂異也端即吾之四端耳蓋吾之四端非可分而為道者也其出本於一源其道實相為用見之未審執其一曰吾性如是吾道在是矣則非惟其三者缺焉而莫知即其所見之一亦非吾之所謂一矣焉得不謂之異乎楊氏之始豈不自以為仁卒至無父而賊仁莫大焉惟其不知吾之四端不可分而為道也至於無忌憚之小人則與君子均窺其全矣惟窺其全則以吾性如是吾道在是無復顧忌天地惟吾所上下民物惟吾所顛倒而不得以拘曲之見繩之卒之與君子分背而馳遂有君子小人之别正由不知莫見莫顯之後有慎獨之功也曾子曰詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子此聖學之真血脈也大學取於正心孟子曰勿正心何也正謂養氣則已正其源矣大學曰欲正其心者必誠其意意非自誠也如好好色如惡惡臭誠之也是正心者好惡之正也孟子曰平旦之氣其好惡與人相近也者幾希與人相近則好惡幾於正矣氣得其養則無時非平旦之氣無時非好惡之正矣尚何有正心之功也此所謂正其源也茍氣之失養而徒欲正心則以心操心反茲勞擾心安可得而正哉余訓慎獨之獨為不與萬法為侶至尊無對非世儒所能獨知之地或曰人所不知己所獨知之説亦不可廢余因反復思惟乃知終不然也傳者引曾子十目十手之云則既喫緊破此見矣小人正謂念之初發人不及知可為掩飾故間居為不善見君子而掩之不知其念發時已是十目十手之所指視君子己見其肺肝矣藉令一念之發好善不如好好色惡惡不如惡惡臭則十目十手亦己指視即欲挽回必不可得且既欲挽回則視之小人之著善相去幾何反之此心亦不必慊故所稱獨者必是萬感未至一靈炯然在大學即明德之明在中庸正喜怒哀樂未發之中也於此加慎乃可意無不誠發無不中節耳於此而不慎念之發如弩箭既已離弦其中不中之機安得復由乎我也一切喜怒哀樂俱是此生機作用除却喜怒哀樂别無見生機處一切喜怒哀樂正是我位天地育萬物的本子故曰大本大學以好惡貫孝弟慈故以所惡於上毋以使下等語證之中庸以喜怒哀樂貫子臣弟友故以己所不欲勿施於人為證中庸一書統論性體大無不包其實際處全是細無不滿所以成其大大無不包天命之謂性思知人不可以不知天是也既已知得時工夫却在細無不滿處做故云君子之道費而隱自夫婦之與知與能以至天地聖人之所不知不能莫非性體之所貫徹故凡逹德逹道九經三重以至草木禽獸與夫天地鬼神至繁至賾莫非吾性體中一毫滲漏不得者蓋凡為乾元之所資始則莫非吾性之所兼該其大非是空大實實填滿無有纖微空隙方是真大故既曰洋洋乎發育萬物峻極於天又曰優優大哉禮儀三百威儀三千觀優優蓋充足而且有餘其大斯無一毫虧欠耳不然少有虧欠處便是大體不全矣始知學人見地尚有到處行願真難得滿聖賢一生兢兢業業履薄臨深皆只為此彼謂一悟便一了百當真聖門中第一罪業也孔子語學曰約禮曰復禮禮是何物即易所謂天則書所言物則也蓋禮之所由名正謂事事物物皆有一個恰好至當處秩然有序而不可亂處所謂則也恰好至當之處便是天理人心之至天理人心之至處安得不約復此安得非仁善解博文約禮之説無如孟子其言曰博學而詳説之將以反説約也添却詳説二字便有歸約之路矣何者説之不詳則一物自有一物一事自有一事判然各不相通惟詳究其至當恰好處寧復有二乎哉世謂博即是約理無後先恐未究竟中庸內省不疚無惡於志正是獨處正是未發故曰人所不見若省之念發時則十目所視矣安得尚言不見也知微之微正是莫顯乎微之微猶非獨體蓋惟其知微之不可掩故於微之先求無惡耳孟子言必有事焉而勿正心勿忘勿助長也明道先生謂即是鳶飛魚躍氣象又云會得活潑潑地會不得只是弄精魄白沙先生云舞雩三三兩兩正在勿忘勿助之間曾點些兒活計被孟子一口打併出來千古以為直道上乘妙語細繹之猶在活潑瀟灑赤地潔潔淨淨窠臼未是孟子血脈乾元體段也平旦之氣一念未起何以好惡與人相近正所以指明獨體也惟是一念未著好惡明德之明炯然暫露乃是大學知體中庸性體能好能惡能哀樂能喜怒之本於此得正所以好惡與人近人身之氣未嘗不與天通只為人之喜怒哀樂不能中節則乖戾而不和遂與太和之氣有間隔果如孟子所謂直養於本分上不加一分不減一分則一身之氣即元始生生之氣萬物且由我而各正保合天地且由我而參贊矣氣至於此死生猶晝夜一闔一闢而已明儒學案卷二十六
