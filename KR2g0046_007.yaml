body:
  text: 明儒學案卷七餘姚黃宗羲撰崇仁學案太僕夏東岩先生尚朴夏尚朴字敦夫號東岩永豐人從學婁一齊登正德辛未進士歷部屬守惠州山東提學道至南太僕少卿逆瑾擅政遂歸王文成贈詩有含瑟春風之句先生答曰孔門沂水春風景不出虞廷敬畏情先生傳主敬之學謂才提起便是天理才放下便是人欲魏莊渠歎為至言然而訾象山之學以收斂精神為主吾儒收斂精神要照管許多道理不是徒收斂也信然則總然提起亦未必便是天理無乃自背其說乎蓋先生認心與理為二謂心所以窮理不足以盡理陽明㸃出心即理也一言何怪不視為河漢乎夏東岩文集卓然竪起此心便有天旋地轉氣象學者涵養此心須如魚之游泳於水始得才提起便是天理才放下便是人欲君子之心纎惡不容如人眼中著不得一些塵埃學者須收斂精神譬如一爐火聚則光焰四出才撥開便昏黑了尋常讀與㸃一章只說胸次脫灑是堯舜氣象近讀二典三謨方知兢兢業業是堯舜氣象嘗以此語雙門詹困夫困夫云此言甚善先兄復齊有詩云便如曾㸃象堯舜怕有餘風入老莊乃知先輩聰明亦嘗看到此朱子云顔子之樂平淡曾㸃之樂勞攘近觀擊壤集堯夫之樂比之曾㸃尤勞攘程子云敬則自然和樂和樂只是心中無事方是孔顏樂處道理是個甜的物事朱子訓蒙詩云行處心安思處得餘甘嘗溢齒牙中非譬喻也不問此心靜與不靜只問此心敬與不敬敬則心自靜矣譬如桶篐才放下便分散了白沙云斯理也宋儒言之備矣吾嘗惡其太嚴也此與東坡要與伊川打破敬字意思一般蓋東坡學佛而白沙之學進禪故云爾然嘗觀之程子云會得底活潑潑地不會得底只是弄精神又曰與其是內而非外不若內外之兩忘兩忘則澄然無事矣又曰必有事焉而勿正心勿忘未嘗致纖毫之力此其存之之道也朱子云才覺得間斷便已接續了曷嘗過於嚴乎至於發用處天理人欲間不容髮省察克治不容少緩看二典三謨君臣互相戒敕視三代為尤嚴其亦可惡乎李延平云人於旦晝之間不至梏亡則夜氣愈清夜氣清則平旦未與物接之時湛然虛明氣象自可見矣此是喜怒哀樂未發氣象吾儒之學靜中須有物譬如果核雖未萌芽然其中自有一㸃生意釋老所謂靜特虛無寂滅而已如枯木死灰安有物乎敬則不是裝㸃外事乃是吾心之當然有不容不然者尋常驗之敬則心便安才放下則此心便不安矣所謂敬者只如俗說常打起精采是也理與氣合是浩然之氣才與理違是客氣義由中出猶快刀利斧劈將去使事事合宜是集義若務矯飾狥外即是義襲襲猶襲裘之襲聖人定之以中正仁義而主靜立人極焉自注云無欲故靜蓋中正仁義是理主靜是心惟其心無欲而靜則此理自然動靜周流不息矣觀通書無欲則靜虛動直可見矣主靜之靜不與動時對乃大學定靜之靜集注云靜謂心不妄動是也為學固要靜存動察使此心未能無欲雖欲存養省察無下手處直須使此心淡然無欲則靜自然虛動自然直何煩人力之為耶程子云識得此理以誠敬存之不須防檢不須窮索心懈則有防心茍不懈何防之有理有未明故須窮索存久自明安得窮索與通書之言相表裡天地以生物為心人能以濟人利物為心則與天地之心相契宜其受福於天也故曰永言配命自求多福朱子語類解敦厚以崇禮云人有敦厚而不崇禮者亦有禮文周密而不敦厚者故敦厚又要崇禮此解勝集注由是推之此一節當一句自為一義不必分屬存心致知蓋有尊德性而而不道問學者亦有道問學而不尊德性者故尊德性又要道問學如柳下惠可謂致廣大矣而精微或未盡伯夷可謂極髙明矣稽之中庸或未合又集注以尊德性為存心以極道體之大道問學為致知以極道體之細恐亦未然竊謂二者皆有大小如涵養本原是大謹於一言一行處是小窮究道理大本大原處是大一草一木亦必窮究是小嘗以此質之魏子才子才以為然仁是心之德如桃仁杏仁一般若有分毫私裡面便壞了如何得生意發逹於外巧言令色不必十分裝飾但有一毫取悅於人意思即是巧令知此而謹之即是為仁之方故曰知巧言令色之非仁則知仁矣人不知而有一毫不平之意即是渣滓未渾化如何為成德一齊嘗有詩云為學要人知做甚養之須厚積須多君子一心如止水不教些子動微波學者須先識此理譬之五榖不知其種得不誤認稊稗為五榖耶雖極力培壅止成稊稗耳近世儒者有用盡平生之力卒流入異學而不自知者正坐未識其理耳象山之學以收斂精神為主曰精神一霍便散了楊慈湖論學只是心之精神為之性一句此其所以近禪朱子云收斂得精神在此方看得道理盡看道理不盡只是不專一如此說方無病吾儒曰喚醒釋氏亦曰喚醒但吾儒喚醒此心要照管許多道理釋氏則喚醒在精一執中就事上說尋常遇事有不恰處羣疑並興既欲如此又欲如彼當是時也盡把私意閣著了不知那個是人心那個是道心故必精以察之使二者界限分明又須一以守之使不為私欲所奪如此便是允執厥中蓋過與不及皆是人心惟道心方是中堯之學以欽為主以執中為用此萬古心學之源也舜告禹曰惟精惟一允執厥中又曰欽哉慎乃有位敬修其可願曰欽曰中曰敬皆本於堯而發之且精一執中之外又欲考古稽衆視堯加詳焉蓋必如此然後道理浹洽庶幾中可得以執矣近世論學直欲取足吾心之良知而謂誦習講說為支離率意徑行指凡發於粗心浮氣者皆為良知之本然其說蔓延已為天下害揆厥所由蓋由白沙之說倡之耳執中從事上說故以為用謬甚夫道若大路然豈難知哉數語令人有下手處蓋日用間事親如此事長如此言如此行如此待人接物如此各各有個路數真如大路然只是人遇事時胡亂打過了若每事肯入思慮則心中自有一個當然之則何事外求故曰子歸而求之有餘師假使曹交在門教之不過如此集注乃謂教之孝弟不容受業於門未然此假又與取足於吾心之良知者同何其言之出入耶所謂求放心者非是以心捉心之謂蓋此心發於義理者即是真心便當推行若發不以正與雖正發不以時及泛泛思慮方是放心要就那放時即提轉來便無事伊川曰心本善流而為惡乃放也此語視諸儒為最精才流便是惡人之思慮多是觸類而生無有寧息時節所謂朋從爾思也朋類也試就思處思量如何思到此逆推上去便自見得禪家謂之葛藤所以要長存長覺才覺得便斷了近來諸公議論太髙稽其所就多不滿人意如楓山先生為人只一味純誠比之他人省了多少氣力已是風動海內乃知忠信驕泰得失之言為有味若貪富貴厭貧賤未論得與不得即此貪之厭之之心已自與仁離了如何做得下面存養細密工夫所以以無欲為要心要有所用日用間都安在義理上即是心存豈俟終日瞑目趺坐漠然無所用心然後為存耶嘗疑腔子不是神明之舍猶世俗所謂眶當之眶指理而言謂此心要常在理中稍與理違則出眶當外矣然如此說則滿腔子是惻隱之心便說不去不若照舊說為善蓋心猶户樞户樞稍出臼外便推移不動此心若出軀殼之外不在神明之舍則凡應事接物無所主矣耳之聰止於數百步外目之眀止於數十里外惟心之思則入於無間雖千萬里之外與數千萬年之上一舉念即在於此即此是神象山之學雖主於尊德性然亦未嘗不道問學但其所以尊德性道問學與聖賢不同程子論仁謂識得此理以誠敬存之而已又謂識得仁體實有諸已只要義理栽培蓋言識存所行之先必先識其理然後有下手處象山謂能收斂精神在此當惻隱自惻隱當羞惡自羞惡更無待於擴充仁義禮智本體自廣大原不待於擴充所謂擴充者蓋言接續之使不息耳此與告子不知性之為理而以所謂氣者當之雖能堅持力制至於不動心之速適足為心害也朱子曰以天下之理處天下之事以聖賢之心觀聖賢之書象山所引諸書多是驅率聖賢之言以就已意多非聖賢立言之意如謂顔子為人最有精神用力最難仲弓精神不及顔子然用力却易其與程子所謂質美者明得盡渣滓便渾化其次惟莊敬以持養之及其至則一也不同豈直文義之差而已哉豫昔有志於學而不知操心之要未免過於把捉常覺有一物梗在胸臆雖欲忘之而不可得在南監時一日過東華門墻下有賣古書者豫偶檢得四家語內有黃蘖對裴休云當下即是動念則非佇立之頃遂覺胸中如有石頭磕然而下無復纍墜乃知禪學誠有動人處於後看程子書說得下手十分明白痛快但在人能領略耳故曰吾道自足何事旁求聖賢之訓明白懇切無不欲人通曉白沙之詩好為隱奧之語至其論學處藏形匿影不可致詰而甘泉之注曲為回互類若商度隱語然又多非白沙之意詩自漢魏以來至唐宋諸大家皆有典則至白沙自出機軸好為跌宕新竒之語使人不可追逐蓋本之莊定山定山本之劉靜修規模意氣絶相類詩學為之大變獨古選和陶諸作近之周子云一為要一者無欲也無欲則靜虛動直又云寡之又寡寡之而至於無則誠立明通與克已復禮意同今不提起此心做主就視聽言動上下工夫漸漸求造寡欲虛靜之地直欲瞑目趺坐置此心於無物之處則私根何由以去本體何由以虛乎程子云坐忘却是坐馳朱子云要閒越不間要靜越不靜又云如讀書以求義理應事接物以求當理即所求者便是吾心何事塊然獨坐而後為存耶非洞見心體之妙安能及此先師一齊家居以正風俗為已任凡鄰里搬戲迎神及划船之類必加曉諭禁戒每每以此得罪於人有所不恤世人只知有利語及仁義必將譏笑以為迂濶殊不知利中只有害惟仁義則不求利自無不利譬之甜的物事喫過則酸苦的物事喫過方甜如人家長尚利惹得一家莫不尚利由是父子兄弟交相攘奪相劘相刃必至傾覆而後已若家長尚義惹得一家莫不尚義由是父慈其子子孝其父兄友其弟弟恭其兄莫說到門祚如何只據眼前家庭之間已自有一假春和景象何利如之湛然虛明者心之本體本無存亡出入之可言其有存亡出入者特在操持敬肆之間耳好問好察而必用其中誦詩讀書而必論其世則合天下古今之聰明以為聰明其知大矣近時諸公論學乃欲取足吾心之良知而議程朱格物博文之論為支離其何以開聖人之知見擴吾心良知良能之本然此乃入門款於此既差是猶欲其入而閉之門也讀白沙與東白論學詩古人棄糟粕糟粕非真傳愚謂六經載道之文聖賢傳授心法在焉而謂糟粕非真傳何耶渺哉一勺水積纍成大川亦有非積纍源泉自涓涓天下之事未有不由積纍而成者孔子志學以至從心孟子善信以至聖神朱子曰豫學蓋由銖纍寸積得之又云豫六十一嵗方理會得若去年死也枉了今謂不由積纍而成得非釋氏所謂一超直入如來地耶至無有至動至近至神焉發用兹不窮緘藏極淵泉中庸云喜怒哀樂之未發至天下之達道也道之體用不過如此可謂明白今乃說𤣥說妙反滋學者之疑從何處下手耶我能握其機何必窺陳編學患不用心用心滋牽纒本虛形乃實立本貴自然戒慎與恐懼斯語未云偏後而不省事差失毫釐間司馬溫公吕與叔張天祺輩患思慮紛擾皆無如之何誠如公論至於程朱寧有此病程子云與其是內而非外不若內外之兩忘兩忘則澄然無事矣又云必有事焉而勿正心勿忘勿助長未嘗致纎毫之力此其存之之道也朱子云才覺得間斷便已接續了此皆任其天然了無一毫將迎安排之病心學之妙至此無餘藴矣戒慎恐懼敬也敬有甚形影只是此心存主處才提起心便安才放下心便無安頓處是乃人心之當然有不容不然者若不知此而以裝㸃外事矜持太過為敬則為此心之病矣故曰以為無益而舍之者不藝苗者也助之長者揠苗者也非徒無益而又害之寄語了心人素琴本無絃此是無聲無臭處中庸從天命說起都說盡了方說到此所以程子云下學而上逹乃學之要今論學不說下學之功遽及上達之妙宜其流入異學而不自知也此詩清新華妙見者爭誦之而不知其有悖於道豫不得以不辨章楓山謂豫曰白沙應聘來京師豫在大理往候而問學焉白沙云我無以教人但令學者看與㸃一章豫云以此教人善矣但朱子謂專理會與㸃意思恐入於禪白沙云彼一時也此一時也朱子時人多流於異學故以此救之今人溺於利祿之學深矣必知此意然後有進步處耳豫聞其言恍若有悟浴沂亭記性書之作兼理氣論性深闢性即理也之言重恐得罪於程朱得罪於敬齊不敢不以復也人得天地之氣以成形氣之精爽以為心心之為物虛靈洞徹有理存焉是之謂性性字從心從生乃心之生理也故朱子謂靈底是心實底是性性是理心是盛貯該載敷施發用底渾然在中雖是一理然各有界分不是儱侗之物故隨感而應各有條理程子謂冲漠無朕萬象森然已具未應不是先已應不是後者此也孟子言人性本善而所以不善者由人心陷溺於物欲而然缺却氣質一邊也故啓荀楊韓子紛紛之論至程張朱子方發明一個氣質出來此理無餘藴矣蓋言人性是理本無不善而所以有善有不善者氣質之偏耳非專由陷溺而然也其曰天地之性者直就氣稟中指出自然之理而言孟子之言是也氣稟之性乃是合理與氣而言荀楊韓子之言是也程朱之言明白洞達既不足服執事之心則子才純甫之言宜其不見取於執事也又況區區之言哉然嘗思之天下無性外之物而性無不在日用之間種種發見莫非此性之用今且莫問性是理是氣是理與氣兼但就發處認得是理即行不是理處即止務求克去氣質之偏物欲之蔽俟他日功深力到豁然有見處然後看是理耶是氣耶是理與氣兼耶當不待辨而自明矣答余子積書此道廣大精微不可以急迫之心求之須是認得路頭端的而從容涵泳於其間漸有湊泊處耳復魏子才人心本虛靈靜處難思議及其有思時却屬動邊事賢如司馬公徹夜苦不寐殷勤念一中與念佛何異不知此上頭著不得一字勿忘勿助間妙在心獨契澄徹似波停融液如春至莫作禪樣看即此是夜氣諦觀日用間道理平鋪是坦如大路然各各有界至不必費安排只要去私意泛泛思慮萌覺得無根蒂將心去覓心便覺添纍墜討論要精詳淘汰極純粹如此用工夫庶幾體用備君歸在旦夕不得長相聚試誦口頭禪君宜體會去劉士鳯夜苦不寐豫恐其把捉太過賦此贈之近世論學者徒見先正如溫公及呂與叔張天祺皆無奈此心何偶於禪門得些活頭悟得此心有不待操而自存的道理遂謂至𤣥至妙千了萬當以此為道則禪家所謂當下即是動念則非所謂放四大莫把捉寂寞性中隨飲啄所謂汝暫息心善惡都莫思量皆足以為道殊不知不難於一本而難於萬殊日用之間千頭萬緒用各不同茍非涵養此心而剔刮道理出來使之洞然無疑則擬議之間忽已墮於過與不及而不自知矣其何以得大中至正之矩哉學者於此正須痛下工夫主敬窮理交修並進而積之以嵗月之久庶幾漸有湊泊處耳不然决入異教無疑也與趙元默論學元默白沙門人花者華也氣之精華也天地之氣日循根幹而升到枝頭去不得了氣之精華遂結為菩蕾久則包畜不住忽然迸開光明燦爛如此人能涵泳義理澆灌此心優悠厭飫而有得焉則其發之言論措之行事自有不容已者所謂和順積中英華發外是也中庸云誠則形形則著著則明又云故至誠無息不息則久久則徴如此者不見而章不動而變無為而成觀此尤信程子云物我一理才明彼即曉此此合內外之道也或謂一草一木不必窮究恐未之深思耳要識靜中須有物却從動處反而觀湛然一氣虛明地安得工夫入語言廣文潘玉齊先生潤潘潤字德夫號玉齊信之永豐人師事婁一齊一齊嚴毅英邁慨然以師道自任嘗謂先生曰致禮以治躬外貌斯須不莊不敬而慢易之心入之矣致樂以治心中心斯須不和不樂而鄙詐之心入之矣此禮樂之本身心之學也先生謹佩其教終日終身出入凖繩規矩李空同督學江右以人才為問諸生僉舉先生空同致禮欲見之時先生居憂以衰服拜於門外終不肯見空同歎其知禮焚香靜坐時以所得者發為吟咏終成都教諭明儒學案卷七
