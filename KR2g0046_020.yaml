body:
  text: 明儒學案卷二十餘姚黄宗羲撰江右相傳學案五太常王塘南先生時槐王時槐字子植號塘南吉之安福人嘉靖丁未進士除南兵部主司歴員外禮部郎中出為彰南僉事改川南道陞尚寳司少卿歴太僕光禄隆慶辛未出為陜西參政乞致仕萬厯辛夘起貴州參政尋陞南鴻臚卿太常卿皆不赴致仕乙巳十月八日卒年八十四先生弱冠師同邑劉兩峰刻意為學仕而求質於四方之言學者未之或怠終不敢自以為得五十罷官屛絶外務反躬宻體如是三年有見於空寂之體又十年漸悟生生真機無有停息不從念慮起滅學從収斂而入方能入微以透性為宗硏㡬為要陽明沒後致良知一語學者不深究其㫖多以情識承當見諸行事殊不得力雙江念菴舉未發以救其弊中流一壺王學賴以不墜先生謂知者先天之發竅也謂之發竅則已屬後天矣雖屬後天而形氣不足以干之故知之一字内不倚於空寂外不墮於形氣此孔門之所謂中也言良知者未有如此諦當先生嘗究心禪學故於彌近理而亂真之處剖判得出夏樸齋問無善無惡心之體於義云何先生曰是也曰與性善之㫖同乎曰無善乃至善亦無弗同也樸齋不以為然先生亦不然樸齋後先生看大乗止觀謂性空如鏡姸來姸見媸來媸見因省曰然則性亦空寂隨物善惡乎此說大害道乃知孟子性善之說終是穩當向使性中本無仁義則惻隠羞惡從何處說來吾人應事處人如此則安不如此則不安此非善而何由此推之不但無善無惡之說即所謂性中只有個性而已何嘗有仁義來此說亦不穩又言佛家欲直悟未有天地之先言語道斷心行處滅此正邪說淫辭彼蓋不知盈宇宙間一氣也即使天地混沌人物消盡只一空虛亦屬氣耳此至真之氣本無終始不可以先後天言故曰一隂一陽之謂道若謂别有先天在形氣之外不知此理安頓何處蓋佛氏以氣為幻不得不以理為妄世儒分理氣為二而求理於氣之先遂墮佛氏障中非先生豈能辨其毫釐耶髙忠憲曰塘南之學八十年磨勘至此可謂洞徹心境者矣論學書所諭去念守心念不可去心不可守真念本無念也何去之有真心本無相也何守之有惟寂而常照即是本體即是工夫原無許多岐路費講說也答王永卿知者先天之發竅也謂之發竅則已屬後天矣雖屬後天而形氣不足以干之故知之一字内不倚於空寂外不墮於形氣此孔門之所謂中也末世學者往往以墮於形氣之靈識為知此聖學之所以晦也答朱易菴靜中欲根起滅不斷者是志之不立也凡人志有所專則雜念自息如人好聲色者當其冶艶奪心之時豈復有他念乎如人畏死亡者當其刀鋸逼體之時豈復有他念乎學無分於動靜者也特以初學之士紛擾日久本心真機盡汩沒䝉蔽於塵埃中是以先覺立敎欲人於初下手處暫省外事稍息塵緣於静坐中黙識自心真面目久之邪障徹而靈光露靜固如是動亦如是到此時終日應事接物周旋於人情事變中而不捨與靜坐一體無二此定靜之所以先於能慮也豈謂終身滅倫絶物塊然枯坐徒守頑空冷静以為究竟哉答周守甫吾輩學不加進正為不識真宰是以雖曰為學然未免依傍道理只在世俗眼目上做得個無大破綻之人而止耳答鄒穎泉所舉佛家以黙照為非而謂廣額屠兒立地成佛等語此皆近世交朋自不肎痛下苦功真修實證乞人殘羮剰汁以自活者也彼禪家語蓋亦有為而發彼見有等專内趨寂死其心而不知活者不得已發此言以救弊耳今以紛紛擾擾嗜慾之心全不用功却不許其靜坐即欲以現在嗜慾之心立地成佛且稱塵勞為如來種以文飾之此等毒藥陷人於死學無多說若真有志者但自覺此中勞攘不得不靜坐以體察之便須靜坐或自覺人倫事物上欠實修不得不於動中著力便須事上鍊習此處原無定方答賀𢎞任所云居敬窮理二者不可廢一要之居敬二字盡之矣自其居敬之精明了悟處而言即謂之窮理非有二事也縱使考索古今討論經史亦是居敬中之一條件耳敬無所不該敬外更無餘事也認得居敬窮理只是一件則工夫更無歇手若認作二事便有換手便有斷續非致一之道也答郭以濟弟昔年自探本窮源起手誠不無執戀枯寂然執之之極真機自生所謂與萬物同體者亦自盎然出之有不容己者非學有轉換殆如臘盡陽回不自知其然也兄之學本從與物同體入手此中最宜精硏若未能入微則亦不無儱侗漫過隨情流轉之病與蕭兌嵎此心湛然至虛廓然無物是心之本體原如是也常能如是即謂之敬陽明所謂合得本體是工夫也若以心起敬則心是一物敬又是一物反似於心體上添此一項贅疣是有所恐懼而不得其正非敬也答郭以濟所諭欲根盤結理原於性是有根者也欲生於染是無根者也惟理有根故雖戕賊之久而竟不可冺惟欲無根故雖習染之㴱而竟不能滅性也使欲果有根則是欲亦原於天性人力豈能克去之哉答錢啓新吾輩無一刻無習氣但以覺性為主時時照察之則習氣之面目亦無一刻不自見得既能時時刻刻見得習氣則必不為習氣所奪蓋凡可覩聞者皆習氣也情欲意見又習氣之麄者也學貴能疑但㸃㸃滴滴只在心體上用力則其疑亦只在一處疑一處疑者疑之極必自豁然矣若只泛然測度道理則其疑未免離根離根之疑愈疑而愈增多岐之惑矣舍發而别求未發恐無是理既曰戒慎曰慎非發而何但今人將發字看得麄了故以澄然無念時為未發不知澄然無念正是發也未發之中固是性然天下無性外之物則視聽言動百行萬事皆性矣皆中矣若謂中只是性性無過不及則此性反為枯寂之物只可謂之偏不可謂之中也如佛老自謂悟性而遺棄倫理正是不知性澄然無念是謂一念非無念也乃念之至隠至微者也此正所謂生生之真幾所謂動之微㡬之先見者也此幾更無一息之停正所謂發也若至於念頭斷續轉換不一則又是發之標本矣譬之澄潭之水也非不流也乃流之至平至細者也若至於急灘迅波則又是流之奔放者矣然則所謂未發者安在此尤難言矣澄潭之水固發也山下源泉亦發也水之性乃未發也離水而求水性曰支即水以為性曰混以水與性為二物曰岐惟時時冥念硏精入微固道之所存也皆仝上事之體强名曰心心之用强名曰事其實只是一件無内外彼此之分也故未有有心而無事者未有有事而無心者故曰必有事焉又曰萬物皆僃於我故充塞宇宙皆心也皆事也物也吾心之大包羅天地貫徹古今故但言盡心則天地萬物皆舉之矣學者誤認區區之心渺焉在胸膈之内而紛紛之事雜焉在形骸之外故逐外專内兩不相入終不足以入道矣答郭墨池一隂一陽自其著者而言之則寂感理欲皆是也自其微者而言之則一息之呼吸一念之起伏以至於浮塵野馬之眇忽皆是也豈截然為奇為偶真若兩物之相為對待者哉識得此理則知一隂一陽即所謂其為物不貳也舍隂陽之外而世之欲超隂陽離奇偶以求性者其舛誤可知矣答錢啓新生幾者天地萬物之所從出不屬有無不分體用此幾以前更無未發此幾以後更無已發若謂生幾以前更有無生之本體便落二見陽明曰大學之要誠意而已矣格物致知者誠意之功也知者意之體非意之外有知也物者意之用非意之外有物也但舉意之一字則寂感體用悉具矣意非念慮起滅之謂也是生幾之動而未形有無之間也獨即意之入微非有二也意本生生惟造化之機不克則不能生故學貴從收斂入收斂即為慎獨此凝道之樞要也孟子言不學不慮乃指孩提愛敬而言今人以孩提愛敬便屬後天而擴充四端皆為下乘只欲人直悟未有天地之先言語道斷心行處滅乃為不學不慮之體此正邪說淫辭彼蓋不知盈宇宙間一氣也即使天地混沌人物消盡只一空虛亦屬氣耳此至真之氣本無終始不可以先後天言故曰一隂一陽之謂道若謂别有先天在形氣之外不知此理安頓何處通乎此則知洒掃應對便是形而上者與賀汝定宇宙萬古不息只此生生之理無體用可分無聲臭可即亦非可以强探力索而得之故後學往往到此無可捉摸處便謂此理只是空寂原無生幾而以念頭動轉為生機謂是第二義遂使體用為二空有頓分本末不貫而孔門求仁真脈遂不明於天下矣仝上來諭識得生幾自然火然泉逹安用人為但鄙意真識生幾者則必兢兢業業所謂不足不敢不勉有餘不敢盡方為實學今人亦有自謂能識生幾者往往玩弄光景以為了悟則涉於無忌憚矣答王夢峯禪家之學與孔門正脈絶不相侔今人謂孔釋之見性本同但其作用始異非也心跡猶形影影分曲直則形之欹正可知孔門真見盈天地間只一生生之理是之謂性學者黙識而敬存之則親親仁民愛物自不容己何也此性原是生生由本之末萬古生生孰能遏之故明物察倫非强為也以盡性也釋氏以空寂為性以生生為幻妄則自其萌芽處便已斬斷安得不棄君親離事物哉故釋氏之異於孔子正以其原初見性便入偏枯惟其本原處所見毫釐有差是以至於作用大相背馳遂成千里之謬也寄汝定此心之生理本無聲臭而非枯槁實為天地萬物所從出之原所謂性也生理之呈露脈脈不息亦本無聲臭所謂意也凡有聲臭可覩聞皆形氣也形氣云者非血肉麄質之謂凡一切光景閃爍變換不常滯礙不化者皆可覩聞即形氣也形氣無時無之不可著亦不可厭也不著不厭亦無能不著不厭之體若外不著不厭而内更有能不著不厭之體則此體亦屬聲臭亦為形氣矣於此有契則終日無分動靜皆真性用事不隨境轉而習氣自銷亦不見有真性之可執不言收斂自得其本然之真收斂矣同上善由性生惡自外染程子所謂善固性惡亦不可不謂之性者猶言清固水濁亦不可不謂之水耳然水之本性豈有濁乎其流之濁乃染於外物耳答郭墨池夫本心常生者也自其生生而言即謂之事故心無一刻不生即無一刻無事事即本心故視聽言動子臣弟友辭受取予皆心也洒掃應對便是形而上者學者終日乾乾只是黙識此心之生理而已時時黙識内不落空外不逐物一了百了無有零碎本領之分也答周時卿心之官則思中常惺惺即思也思即窮理之謂也此思乃極㴱硏幾之思是謂近思是謂不出位非馳神外索之思答曾肖伯此理至大而至約惟虛而生三字盡之其虛也包六合以無外而無虛之相也其生也徹萬古以不息而無生之迹只此謂之本心時時刻刻還他本來即謂之學與歐克敬太虛之中萬古一息綿綿不絶原無應感與不應感之分識得此理雖瞑目獨坐亦應感也時時應感即時時是動也常動即常靜也一切有相即是無相山河大地草木叢林皆無相也真性本無杳冥時時呈露即有相也相與無相了不可得言思路絶强名之曰本心同上有謂靜中不可著操字則孔子所謂操則存者果妄語乎彼蓋不知操者非以此操彼之謂也此心兢兢業業即是心之本體即是操也惟操即是本體純一不雜即是靜也非以蕩然無所用心為靜也何思何慮言思慮一出於正所謂心之官則思思睿而作聖非妄想雜念之思慮也豈可以不操冒認為何思何慮乎答曾得卿白手起家勿在他人脚跟下湊泊答郭以濟性之一字本不容言無可致力知覺意念總是性之呈露皆命也性者先天之理知屬發竅是先天之子後天之母也此知在體用之間若知前求體則著空知後求用則逐物知前更無未發知後更無已發合下一齊俱了更無二功故曰獨獨者無對也無對則一故曰不貳意者知之黙運非與之對立而為二也是故性不假修只可云悟命則性之呈露不無習氣隠伏其中此則有可修矣修命者盡性之功答蕭勿菴性命雖云不二而亦不容混稱蓋自其真常不變之理而言曰性自其黙運不息之機而言曰命一而二二而一者也中庸天命之謂性正恐人於命外求性則離體用而二之故特發此一言若執此語遂謂性命果無分辨則言性便剰一命字言命便剰一性字而盡性至命等語皆贅矣故曰性命雖不二而亦不容混稱也盡性者完我本來真常不變之體至命者極我純一不息之用而造化在我神變無方此神聖之極致也答鄒子尹知生知死者非謂硬作主張固守靈識以俟去路不迷之謂也蓋直透真性本非生死乃為真解脫耳答王養卿學不知止則意必不能誠何謂知止蓋意心身家國天下總為一物也而有本末焉何謂本意之所從出者是也意之所從出者性也是至善也知止於至善之性則意心身家國天下一以貫之矣是謂物格而后知至何謂格格者通徹之謂也答楊晉山時習者時時知至善為本而止之約情以復性云耳大學止至善即中庸慎獨之功無二事也舍此更有何學答王敬所朱子格物之說本於程子程子以窮至物理為格物性即理也性無内外理無内外即我之知識念慮與天地日月山河草木鳥獸皆物也皆理也天下無性外之物無理外之物故窮此理至於物物皆一理之貫徹則充塞宇宙綿亘古今總之一理而已矣此之謂窮理盡性之學與陽明致良知之㫖又何異乎蓋自此理之昭明而言謂之良知良知非情識之謂即程門所謂理也性也良知通徹於天地萬物不可以内外言也通乎此則朱子之格物非逐外而陽明致良知非專内明矣但朱子之說欲人究徹彌宇宙亘古今之一理在初學遽難下手敎以姑從讀書而入即事察理以漸而融㑹之後學不悟遂不免尋枝摘葉零碎支離則是徒逐物而不達理其失程朱之本㫖逺矣陽明以學為求諸心而救正之大有功於後學而後學復以心為在内物為在外且謂理只在心不在物殊不知心無内外物無内外徒執内而遺外又失陽明之本㫖也意不可以動靜言也動靜者念也非意也意者生生之密機有性則常生而為意有意則漸著而為念未有性而不意者性而不意則為頑空亦未有意而不念者意而不念則為滯機答楊晉山虞廷曰中孔門曰獨舂陵曰幾程門主一白沙端倪㑹稽良知總無二理雖立言似别皆直指本心真面目不沈空不滯有此是千古正學寄錢啓新易曰乾知大始此知即天之明命是謂性體非以此知彼之謂也易曰坤作成物此作即明命之流行是謂性之用非造作强為之謂也故知者體行者用善學者常完此大始之知即所謂明得盡便與天地同體故即知便是行即體便是用是之謂知行一體用一也夫以此知彼揣摩測度則謂之空知若乾知大始之知即是本性即是實事不可以空知言也以此想彼如射覆然則謂之懸想若黙而識之即是自性自識覿體無二不可以懸想言也答龔修黙靜中涵養勿思前慮後但澄然若忘常如游於洪濛未判之初此樂當自得之則真機躍如其進自不能已矣答劉心蘧性本不二探奇逐物總屬二見若未免見有妙性超於物外猶為法塵影事學者果能透到水窮山盡最上之上更無去處然後有信當下小心翼翼動不踰矩便為究竟耳寄劉公霽釋氏所以與吾儒異者以其最初志願在於出世即與吾儒之志在明明德於天下者分塗轍矣故悟性之說似同而最初向往之志願實異最初之志願既異則悟處因之不同悟處不同則用自别答唐凝菴聖學失傳自紫陽以後為學者往往守定一個天理在方寸之間以為功夫於聖門無聲無臭之㫖不相契故陽明特揭無善無惡正恐落一善字便覺涉於形象提出心體令人知本心善亦著不得也苐宗其說者致有流弊不若無聲無臭字義直截穏當答吳安本性真覺原無靈明一㸃之相此性遍滿十方貫徹古今蓋覺本無覺孔子之無知文王之不識不知乃真知也若有一㸃靈明不化即是識神放下識神則渾然先天境界非思議所及也答鄒子予文者禮之散殊如視聽言動子臣弟友一切應酬皆是也以其散殊故曰博禮者文之根底如孔子言所以行之者一是也以其至一故曰約學者時時修實行謂之博文事事協天則謂之約禮即事是禮而非滯迹即禮是事而非落空此博約合一之學也答周宗濂性本不容言若强而言之則虞廷曰道心惟微孔子曰未發之中曰所以行之者一曰形而上曰不覩聞周子曰無極程子曰人生而静以上所謂密也無思為也總之一性之别名也學者真能透悟此性則横說𥪡說只是此理一切文字語言俱屬描畫不必執泥若執言之不一而遂疑性有多名則如不識其人而執其姓氏名諱别號以辯同異則愈遠矣性之體本廣大高明性之用自精微中庸若復疑只以透性為宗恐落空流於佛老而以尋枝逐節為實學以為如此乃可自别於二氏不知二氏之異處到透性後自能辨之今未透性而强以猜想立說終是隔靴爬癢有何干涉反使自己真性不明到頭只做得個講說道理過了一生安得謂之聞道也答龔修黙性體本寂萬古不變然非頑空故密運而常生惟幾萌知發不學以反其本則情馳而性蔽矣故曰反身而誠樂莫大焉答唐凝菴心體本寂念者心之用也真識心體則時時常寂非假人力其體本如是也此本常寂雖欲擾之而不可得念之應感自然中節而心體之寂自若也心體之寂萬古不變此正所謂未發之中舍此則學不歸根未免逐末將涉於憧憧往來於道遠矣答陸仰峯大抵佛家主於出世故一悟便了更不言慎獨吾儒主於經世學問正在人倫事物中實修故喫𦂳於慎獨但獨處一慎則人倫事物無不中節矣何也以獨是先天之子後天之母出無入有之樞機莫要於此也若只云見性不言慎獨恐後學畧見性體而非真悟者便謂性中無人倫事物一切離有而趨無則體用分而事理判甚至行簡不修反云與性無干其害有不可勝言者也善學者亦非一途有徹悟本性而慎獨即在其中者有精硏慎獨而悟性即在其中者總之於此理洞然真透既非截然執為二見亦非混然儱侗無别此在自得者黙契而已答郭存甫語錄性不容言知者性之靈也知非察識照了分别之謂也是性之虛圓瑩徹清通浄妙不落有無能為天地萬物之根彌六合亘萬古而炳然獨存者也性不可得而分合增減知亦不可得而分合増減也而聖凡與禽獸草木異者惟在明與蔽耳是故學莫大於致知以下皆三益軒會語識察照了分明者意與形之靈也亦性之末流也性靈之真知非動作計慮以知故無生滅意與形之靈必動作計慮以緣外境則有生滅性靈之真知無欲意與形之靈則有欲矣今人以識察照了分别為性靈之真知是以奴為主也道心體也故無改易人心用也故有去來孔子所謂操存舍亡出入無時莫知其郷亦是指人心而言若道心為萬古天地人物之根豈有存亡出入之可言問情識思慮可去乎曰悟心體者則情識思慮皆其運行之用何可去也且此心廓然充塞宇宙只此一心更無餘事亦不見有情識思慮之可言如水常流而無波如日常照而無翳性情體用皆為剰語千聖語學皆指中道不落二邊如言中言仁言知言獨言誠是也若言寂則必言感而後全言無則必言有而後僃以其涉於偏也心廓然如太虛無有邊際日用云為酬酢萬事皆太虛變化也非以内心而應外事也若誤認以内心應外事則心事相對成敵而牽引梏亡之害乗之矣性本無欲惟不悟自性而貪外境斯為欲矣善學者㴱達自性無欲之體本無一物如太虚然浮雲往來太虛固不受也所謂明得盡渣滓便渾化是矣問四時行百物生莫非動也而曰有不動者豈其不與四時偕行不隨百物以生乎曰非然也所謂不動者非塊然一物出於四時百物之外也能行四時而不可以寒暑代謝言能生百物而不可以榮瘁枯落言故曰不動也問知一也今謂心體之知與情識之知不同何也曰心體之知譬則石中之火也擊而出之為焚燎則為情識矣心體之知譬則銅中之明也磨而出之為鑑照則為情識矣致知者致其心體之知非情識之謂也心體之知非作意而覺以為知亦非頑空而無知也是謂天德之良知致者極也還其本然而無虧欠之謂情識即意也意安從生從本心虛明中生也故誠意在致知知者意之體也若又以情識為知則誠意竟為無體之學而聖門盡性之脈絶也問陽明以知善知惡為良知此與情識何别曰善惡為情識知者天聰明也不隨善惡之念而遷轉者也問致知焉盡矣何必格物曰知無體不可執也物者知之顯達也舍物則何以達此知之用如窒水之流非所以盡水之性也故致知必在格物陽明以意之所在為物此義最精蓋一念未萌則萬境俱寂念之所涉境則隨生且如念不注於目前則雖泰山覿面而不覩念茍注於世外則雖蓬壺遙隔而成象矣故意之所在為物此物非内非外是本心之影也盈天地間皆物也何以格之惟以意之所在為物則格物之功非逐物亦非離物也至博而至約矣意在於空鏡則空鏡亦物也知此則知格物之功無間於動静太極者性也先天也動而生陽以下即屬氣後天也性能生氣而性非在氣外然不悟性則無以融化形氣之渣滓故必悟先天以修後天是以謂聖學朱子以知覺運動為形而下之氣仁義禮智為形而上之理以此闢佛氏既未可為定論羅整菴遂援此以闢良知之說不知所謂良知者正指仁義禮智之知而非知覺運動之知是性靈而非情識也故良知即是天理原無二也見其大則心泰必真悟此心之彌六合而無邊際貫萬古而無終始然後謂之見大也既見大且無生死之可言又何順逆窮通之足介意乎斷續可以言念不可以言意生機可以言意不可以言心虛明可以言心不可以言性至於性則不容言矣人自有生以來一向逐外今欲其不著於境不著於念不著於生生之根而直透其性彼將茫然無所倚靠大以落空為懼也不知此無倚靠處乃是萬古穏坐之道塲大安樂之郷也致良知一語惜陽明發此於晚年未及與學者㴱究其㫖先生没後學者大率以情識為良知是以見諸行事殊不得力羅念菴乃舉未發以究其弊然似未免於頭上安頭夫所謂良知者即本心不慮之真明原自寂然不屬分别者也此外豈更有未發耶問知行之辨曰本心之真明即知也本心之真明貫徹於念慮事為無少昏蔽即行也知者體行者用非可離為二也問情識既非良知而孟子所言孩提之愛敬見入井之怵惕平旦之好惡嘑蹴之不受不屑皆指情上言之何也曰性不容言姑即情以騐性猶如即煙以驗火即苗以驗種後學不達此㫖遂認定愛敬怵惕好惡等以為真性在是則未免執情而障性矣學者以任情為率性以媚世為與物同體以破戒為不好名以不事檢束為孔顔樂地以虛見為超悟以無所用耻為不動心以放其心而不求為未嘗致纖毫之力者多矣可歎哉淪於陰則漸滯於形質矣反於陽則漸近於超化矣真陽出現則積陰自消此變化氣質之道也吾心廓然之體曰乾生生之用曰神夫乾靜專動直吾心之知體寂然一也故曰靜專知發而為照有直達而無委曲故曰動直夫坤靜翕動闢吾心之意根凝然定也故曰靜翕意發為念則開張而成變化故曰動闢知包羅宇宙以統體言故曰大意裁成萬務以應用言故曰廣問知發為照則屬意矣然則乾之動直即屬坤矣曰不然知之照無分别者也意則有分别者也安得以照為意告子但知本性無善惡無修證一切任其自然而已纔涉修為便目為意外而拒之落在偏空一邊孟子洞悟中道原無内外其與告子言皆就用上一邊幇補說以救告子之所不足問事上磨鍊如何曰當知所磨錬者何物若只要世情上行得通融周匝則去道遠矣無欲即未發之謂發便是欲傳習續錄言心無體以人情事物之感應為體此語未善夫事者心之影也心固無聲臭而事則心之變化豈有實體也如水與波然謂水無體以波為體其可乎為此語者蓋欲破執心之失而不知復起執事之病未發之中性也有謂必收斂凝聚以歸未發之體者恐未然夫未發之性不容擬議不容湊泊可以黙會而不可以强執者也在情識則可收斂可凝聚若本性無可措手何以施收斂凝聚之功收斂凝聚以為未發恐未免執見為障其去未發也益逺問硏幾之說曰周子謂動而未形有無之間為幾蓋本心常生常寂不可以有無言强而名之曰幾幾者微也言其無聲臭而非斷滅也今人以念頭初起為幾未免落第二義非聖門之所謂幾矣問有謂性無可致力惟於念上操存事上修飭則性自在曰悟性矣而操存於念修飭於事可矣性之未悟而徒念與事之致力所謂可以為難矣仁則吾不知也陽明之學悟性以御氣者也白沙之學養氣以契性者也此二先生所從入之辨後儒誤以情識為心體於情識上安排布置欲求其安定純浄而竟不能也假使能之亦不過守一意見執一光景强作主張以為有所得矣而終非此心本色到底不能廓徹疑猜而朗然大醒也復言至日閉關夫一陽潛萌於至靜之中吾心真幾本來如是不分時刻皆至也瑞華剰語未發之性以為有乎則非色相以為無乎則非頑空不墮有無二邊故直名之曰中以下潛思劄記大學言知止蓋未發之性萬古常止也常止則能生天地萬物故止為天地萬物之本故大學以知止知本釋格致之義乾用九見羣龍無首坤用六利永貞蓋乾元者性也首出庶物者也然首不可見若見有首則非矣故曰天德不可為首也坤者乾之用也坤必從乾貞者收斂歸根以從乎乾也故曰利永貞氣者性之用也性無生滅故常一氣有屈伸故常二然氣在性中雖有屈伸亦不可以生滅言故盡性則至命矣學者㴱達此則無疑於生死之說性無為者也性之用為神神密密常生謂之意意者一也以其靈謂之識以其動謂之念意識念名三而實一總謂之神也神貴凝收斂歸根以凝神也神凝之極於穆不已而一於性則潛見飛躍無方無迹是謂聖不可知致知主悟誠意主修能知止則悟於性也徹矣能慎獨則修於意也微矣學未徹性者則内執心外執境兩俱礙矣於性徹者心境雙忘廓然無際乾元為天地萬物之資始故曰首出能潛見惕躍飛亢而不涉於迹莫測其變化云為之所以然故曰旡首若有首可覩則亦一物而已安能時乗六龍乎或謂性無可致力必也攝用以歸體乎余謂是固有然者矣是中庸所謂其次致曲程子所謂其次則莊敬持養之說也若中庸所謂盡性程子所謂明得盡渣滓便渾化者則又當别論孟子謂此天之所與我者先立乎其大者則小者不能奪夫曰天與我則乾元之性我固有之學者真志密詣久之能黙契而㴱信實見其大本在我原是具足不假外求則一切瞬息作止日可見之行由原泉而盈科放海即所以致力處也非别以性為一物執從把持而後謂之致力也性之生而後有氣有形則直悟其性足矣何必後天之修乎曰非然也夫徹古今彌宇宙皆後天也先天無體舍後天亦無所謂先天矣故必修於後天正所以完先天之性也以下病筆性無為而後天有修然則性為兀然無用之物乎曰非然也性無體而天地萬物由之以生通乎此則謂一塵一毛皆先天可也一切皆性性之外豈更有天地萬物哉性貴悟而後天貴修然則二者當竝致其力乎曰非然也是分性相判有無岐隠顯自作二見非知道者也善學者自生身立命之初逆遡於天地一氣之始窮之至於無可措心處庶其有悟矣則信一切皆性戒慎於一瞬一息以極於經綸事業皆盡性之實學也故全修是性全性是修豈有二者竝致力之說所謂修者非念念而隄防之事事而安排之之謂也蓋性本寂然充塞宇宙渾然至善者也性之用為神神動而不知返於是乎有惡矣善學者息息歸寂以還我至善之本性是之謂真修或曰性本寂也故一悟便了若曰歸寂是以此合彼終為二之曰非然也夫性生萬物則物物皆性物物歸寂即是自性自寂何二之有昔人有背觸皆非之說蓋謂遺一切而執性者是觸也如臣子之觸犯君父也狥一切而遺性者是背也如臣子之叛棄君父也念念歸根謂之格物念念外馳謂之逐物宇宙此生理以其萬古不息謂之命以其為天地人性所從出謂之性以其不可以有無言謂之中以其純粹精至極而不可名狀謂之至善以其無對謂之獨以其不二謂之一以其天則自然非假人力謂之天理以其生生謂之易以其為天地人物之胚胎如果核之含生謂之仁以下仰慈膚見異學喜談父母未生前以為言思路絶殊不知萬古此生理充塞宇宙徹乎表裏始終豈離一切别有未生前可容駐脚若云即於一切中要悟未生前乃為見性亦未免落空有二見非致一不二之學也天地之生無不貫故草木鳥獸一塵一毛莫不受氣而呈形聖人之生理無不貫故人倫庶物一瞬一息莫不中節而盡分是以聖門敎人大閑不踰細行必謹非矯飾也實以全吾生理是盡性之極功也故曰洒掃應對便是形而上者生理浩乎無窮不可以方所求不可以端倪執不可以邊際窺彼以一念初萌為生理殊未然聖學主於求仁而仁體最難識若未能識仁只從孝弟實事上懇惻以盡其分當其真切孝弟時此心油然藹然不能自己則仁體即此可黙會矣中庸言至誠無息純亦不已肫肫其仁淵淵其淵浩浩其天孟子言直養無害塞乎天地之間到此境界安有生死之可言天無生死可言非斷滅之謂也不斷滅非精魂留住之謂也亦非泛論此理常存而於人無與之謂也惟㴱造者自知之屈伸徃來之理僃於易屈伸往來非兩物以其能屈伸往來者本一也一而能屈伸往來故謂之易能屈伸往來而不息易之所為不毁也是謂生生之易知易則知生死之說由真修而悟者實際也由見解而悟者影響也此誠偽之辨也以下靜攝寤言性廓然無際生幾者性之呈露處也性無可致力善學者惟硏幾硏幾者非於念頭萌動辨别邪正之謂也此幾生而無生至微至密非有非無惟綿綿若存退藏於密庶其近之矣問人之死也形既朽滅神亦飄散故舜蹠同歸於必朽所僅存者惟留善惡之名於後世耳予曰不然又問君子之修身力學義當然也非為生死而為也倘為生死而為善則是有所為而為矣予亦曰不然夫學以全生全歸為準的既云全歸安得謂與形而俱朽乎全歸者天地合德日月合明至誠之所以悠久而無疆也孰謂舜跖之同朽乎以全歸為學安得謂有為而為乎曰天地合德日月合明悠久無疆特言其理耳豈真有精神靈爽長存而不冺乎是反為沉滯不化之物矣予曰理果有乎有即沈滯矣理果無乎無即斷滅矣沈滯則非德非明非至誠也斷滅則無合無悠久也此等見解一切透過乃可以語知生之學朝聞臆說自本性之中涵生理曰仁自本性之中涵靈通曰知此仁知皆無聲臭故曰性之德也若惻隱是非乃仁知之端倪發用於外者是情也所謂性之用也後儒以愛言仁以照言知遂執此以為學是徒認情之流行而不達性之藴奥矣以下仁知說孔門以求仁為宗而姚江特揭致知蓋當其時皆以博聞廣見求知於外為學故先生以其根於性而本良者救之觀其言曰良知即是未發之中既云未發之中仁知豈有二哉今末學往往以分别照了為良知固昩其本矣或謂只將一念之愛擴而充之至於無不愛便是仁不必㴱探性體之仁此與執知善知惡為良知而不㴱探性體之知者無異噫性學之晦久矣未發之中仁知渾成不可覩聞本無愛之可言而能發之為無不愛本無照之可言而能發之為無不照故曰溥博淵泉而時出之古人有所謂不朽者夫身外之物固必朽文章勲業名譽皆必朽也精氣體魄靈識亦必朽也然則不朽者何事非㴱於道者孰能知之唐曙台索書寂然不動者誠感而遂通者神動而未形有無之間者幾此是描寫本心最親切處夫心一也寂其體感其用幾者體用不二之端倪也當知幾前無别體幾後無别用只幾之一字盡之希聖者終日乾乾惟研幾為要矣程子曰識得此理以誠敬存之格物致知者識得此體也誠意者以誠敬存之也格物存乎悟誠意存乎修大學之要盡於此矣以下石經大學畧義問大學但言至善未嘗指其為性但言獨未嘗描寫其為動而未形但言慎未嘗極示其為潛藏收斂今何所徵而知其然乎曰吾徵於中庸而知其然矣中庸首揭天命之性而謂未發為天下之大本篇中言明善擇善正指性之至善為本之說也其言獨曰不覩聞隠微而即曰莫見莫顯正所謂動而未形有無之間其描寫獨之面目可謂親切矣既言戒慎恐懼而末章詳言尚絅闇然由微自以入德潛伏於人所不見敬信於不動不言篤恭於不顯不大於聲色之末而歸極於無聲臭之至正潛藏收斂研幾入微之㫖也大學舉其畧中庸示其詳也賈逵謂大學為經中庸為緯皆出於子思之筆其信然哉問性本自止非假人力而後止也學惟一悟便了何必慎獨曰性先天也獨幾一萌便屬後天後天不能無習氣之隠伏習氣不盡終為性之障故必慎之至於習氣銷盡而後為悟之實際故真修乃所以成其悟亦非二事也性貴悟而已無可措心處纔一拈動即屬染汚矣獨為性之用藏用則形氣不用事以復其初所謂陰必從陽坤必東北喪朋而後有慶後天而奉天時也明儒學案卷二十
