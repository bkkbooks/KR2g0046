body:
  text: 明儒學案卷二十五餘姚黃宗羲撰南中相傳學案南中之名王氏學者陽明在時王心齋黃五嶽朱得之戚南元周道通馮南江其著也陽明殁後緒山龍溪所在講學於是涇縣有水西會寧國有同善會江隂有君山會貴池有光嶽會太平有九龍會廣德有復初會江北有南譙精舍新安有程氏世廟會泰州復有心齋講堂幾乎比户可封矣而又東廓南野善山先後官留都興起者甚衆略載其論學於後其無語録可考見者附此戚賢字秀夫號南元江北之全椒人嘉靖丙戌進士仕至刑科都給事中以薦龍溪失貴溪旨謫官致仕陽明在滁州南元以諸生旅見未知信向其後為歸安令讀諭學諸書始契於心遂通書受學為會於安定書院語學者千聖之學不外於心惟梏於意見蔽於嗜欲始有所失一念自反即得本心在京師會中有談二氏者即正色阻之龍溪偶舉黃葉止兒啼公案南元勃然曰君是吾黨宗盟一言假借便為害不淺龍溪為之愧謝南元談學不離良知而意氣激昂足以發之馮恩字子仁號南江華亭人嘉靖丙戌進士陽明征思田南江以行人使其軍因束修為弟子擢為南道御史劾都御史汪鋐大學士張孚敬下詔獄會審鋐執筆南江立而庭辨論死其後減戍赦歸貢安國字元略號受軒宣州人師南野龍溪主水西同善之會緒山與之書曰昔人言鴛鴦繡出從君看莫把金針度與人吾黨金針是前人所傳實未繡得鴛鴦即嘵嘵然空持金針欲以度人人不見鴛鴦而見金針非徒使之不信併願繡鴛鴦之心亦阻之矣後官山東州守講學於志學書院查鐸字子警號毅齋涇縣人嘉靖乙丑進士為刑科給事中不悅於新鄭外轉至廣西副使學於龍溪緒山謂良知簡易直截其他宗旨無出於是不執於見即曰虛不染於欲即曰寂不纍於物即曰樂無有無無始終無階級俯焉日有孳孳終其身而已沈寵字思畏號古林宣城人登嘉靖丁酉鄉書官至廣西參議師事受軒受軒學於南野龍溪而返謂古林曰王門之學在南畿盍往從之於是古林又師南野龍溪在閩建養正書院在蘄黃建崇正書院近溪立開元之會於宣州古林與梅宛溪主其席疾革有問其胸次如何曰已無物矣宛溪名守德字純甫官至雲南左參政其守紹興時重修陽明講堂以龍溪主之式祕圖楊珂之閭非俗吏也蕭彥號念渠户部侍郎諡定肅涇縣人師事緒山蕭良幹字以寧號拙齋仕至陜西布政使師緒山龍溪水西講會之盛蕭氏之力也戚衮字補之號竹坡宣城人項城知縣初及東廓南野之門已受業龍溪龍溪語之曰所謂志者以其不可奪也至於意氣則有時而衰良知者不學不慮自然之明覺無欲之體也吾人不能純於無欲故有致知之功學也者復其不學之體也慮也者復其不慮之體也故學雖博而守則約慮雖百而致則一非有假於外也若見聞測識之知從門而入非良知之本然矣吾人謹於步趨循守方圓謂之典要致知之學變通周流惟變所適蓋規矩在我而方圓自不可勝用此實毫釐之辨也竹坡往來出入就正於師友者凡七八年於是始知意氣不可以為志聞識不可以為知格式不可以為守志益定業益精其及人益廣也張棨字士儀號本靜涇縣人五歲口授諸書即能了了夜聞雞聲呼其母曰小學云事父母雞初鳴咸盥潄今雞鳴矣何不起母笑曰汝才讀書便曉其義耶曰便當為之豈徒曉焉而已南野為司成因往從之纍年不歸繼從東廓緒山龍溪歸而聚徒講學以收斂精神為切要以對景磨瑩為實功以萬物一體為志願意氣眉睫之間能轉移人心章時鸞號孟泉青陽人河南副使學於東廓程大賓字汝見號心泉歙人貴州參政受學緒山緒山謂之曰古人學問不離七情中用而病痛亦多由七情中作程默字子木休寧人廣州府同知負笈千里從學陽明疾革指六經謂其子曰當從此中尋我莫視為陳言也鄭燭字景明歙人河間府判及東廓之門人見其衣冠質朴以為率真者曰率真未易言先須識真耳姚汝循字敘卿號鳳麓南京人嘉靖丙辰進士官終嘉定知州近溪嘗論明德之學鳳麓舉日説云德猶鑑也匪翳弗昏匪磨弗明近溪笑曰明德無體非喻所及且公一人耳為鑑為翳復為磨者可乎聞之遂有省浸浸悟入有妄子以陽明為詬病鳳麓曰何病曰惡其良知之説也曰世以聖人為天授不可學久矣自良知之説出乃知人人固有之即庸夫小童皆可反求以入道此萬世功也子曷病殷邁字時訓號秋溟留守衛人歷官禮部侍郎與何善山遊與聞緒言所著有懲忿窒欲編薑寶字廷善丹陽人歷官南禮部尚書受業荆川之門孝亷黃五嶽先生省曾長史周靜菴先生衝明經朱近齋先生得之太常周訥溪先生怡學憲薛方山先生應旗副使薛畏齋先生甲副使查毅齋先生鐸襄文唐荆川先生順之太常唐凝菴先生鶴徵文貞徐存齋先生階中丞楊幼殷先生豫孫南中相傳學案一孝亷黃五嶽先生省曾黃省曾字勉之號五嶽蘇州人也少好古文解通爾雅為王濟之楊君謙所知喬白巖參贊南都聘纂遊山記李空同就醫京口先生問疾空同以全集授之嘉靖辛卯以春秋魁鄉榜母老遂罷南宫陽明講道於越先生執贄為弟子時四方從學者衆每晨班坐次第請疑問至即答無不圓中先生一日徹領汗浹重襟謂門人咸隆頌陟聖而不知公方厪理過恆視坎途門人擬滯度迹而不知公隨新酬應了無定景作會稽問道録十卷東廓南野心齋龍溪皆相視而莫逆也陽明以先生筆雄見朗欲以王氏論語屬之出山不果未幾母死先生亦卒錢牧齋抵轢空同謂先生傾心北學識者哂之先生雖與空同上下其論然文體竟自成一家固未嘗承流接響也豈可謂之傾心哉傳習後録有先生所記數十條當是採之問道録中往往失陽明之意然無如儀秦一條云蘇秦張儀之智也是聖人之資後世事業文章許多豪傑名家只是學得儀秦故智儀秦學術善揣摸人情無一些不中人肯綮故其説不能窮儀秦亦是窺見得良知妙用處但用之於不善耳夫良知為未發之中本體澄然而無人偽之雜其妙用亦是感應之自然皆天機也儀秦打入情識窠臼一往不返純以人偽為事無論用之於不善即用之於善亦是襲取於外生機稿滅非良知也安得謂其末異而本同哉以情識為良知其失陽明之旨甚矣長史周靜菴先生衝周衝字道通號靜菴常之宜興人正德庚午鄉舉授萬安訓導知應城縣以耳疾改邵武教授升唐府紀善進長史而卒年四十七陽明講道於虞先生往受業繼又從於甘泉謂湛師之體認天理即王師之致良知也與蔣道林集師説為新泉問辨録暇則行鄉射投壺禮士皆斂袵推讓吕涇野鄒東廓咸稱其有淳雅氣象當時王湛二家門人弟子未免互相短長先生獨疏通其旨故先生死而甘泉歎曰道通真心體受以求實益其異於死守門户以相訾而不悟者遠矣周靜菴論學語存心為為學之要知恥為入道之機學以成身而已其要只在慎獨博約知行皆慎獨工夫內事目也凡學須先有知識然後力行以至之則幾矣講學須腳踏實地敬義夾持此為已規模大略夫君子之學終日終身只此一事蓋理不外乎一中即吾中正之心是已無事時戒慎照管吾中正之心而常存有事時亦只戒慎凡事循吾中正之心而不雜是謂敬義夾持心外無理理外無事學者知不可須臾離又何患腳踏不實乎日用工夫不是立志然須朋友講習則此意才精健濶大才有生意若三五日不得朋友相講便覺微弱遇事便會困亦時會忘今於無朋友相講之時還只靜坐或看書或行動凡寓目措身悉取以培養此志頗覺意思和適然終不如講學時生意更多也上蔡嘗問天下何思何慮伊川云有此理只是發得太早在學者工夫固是必有事焉而勿忘然亦須識得何思何慮底氣象若不識得這氣象便有正與助長之病若認得何思何慮而忘必有事焉工夫恐有墜於無也須是不滯於有不墜於無方得學者才曉得做工夫便要識認得聖人氣象蓋認得聖人氣象把做凖的乃就實地做工夫去才不會差事上磨鍊一日之內不管有事無事只一意培養本原若遇事來感或自己有感心上既有覺安可謂無事但因事凝心一會大段覺得事理當如此只如無事處之盡吾心而已正學不明已久不須枉費心力為朱陸爭是非若其人果能立志決意要如此學已自大段明白了朱陸雖不辨彼自能覺得明經朱近齋得之朱得之字本思號近齋直𨽻靖江人貢為江西新城丞邑人稱之從學於陽明所著有參元三語其學頗近於老氏蓋學焉而得其性之所近者也其語尤西川云格物之見雖多自得未免尚為聞見所梏雖脫聞見於童習尚滯聞見於聞學之後此篤信先師之故也不若盡滌舊聞空洞其中聽其有融而覺如此得者尤為真實子夏篤信聖人曾子反求諸已途徑堂室萬世昭然即此可以覩其自得矣語録董蘿石平生好善惡惡甚嚴自舉以問陽明老師曰好字原是好字惡字原是惡字董於言下躍然董實夫問心即理心外無理不能無疑陽明老師曰道無形體萬象皆是形體道無顯晦人所見有顯晦以形體言天地一物也以顯晦言人心其機也所謂心即理者以其充塞氤氲謂之氣以其脈絡分明謂之理以其流行賦畀謂之命以其稟受一定謂之性以其物無不由謂之道以其妙用不測謂之神以其凝聚謂之精以其主宰謂之心以其無妄謂之誠以其無所倚著謂之中以其無物可加謂之極以其屈伸消息往來謂之易其實則一而已今夫茫茫堪輿蒼然隤然其氣之最粗者歟稍精則為日月星宿風雨山川又稍精則為雷電鬼怪草木花花又精而為鳥獸魚龜昆蟲之屬至精而為人至靈至明而為心故無萬象則無天地無吾心則無萬象矣故萬象者吾心之所為也天地者萬象之所為也天地萬象吾心之糟粕也要其極致乃見天地無心而人為之心心失其正則吾亦萬象而已心得其正乃謂之人此所以為天地立心為生民立命惟在於吾心此可見心外無理心外無物所謂心者非今一團血肉之具也乃指其至靈至明能作能知此所謂良知也然本無聲無臭無方無體此所謂道心惟微也此大人之學所以與天地萬物一體也一物有外便是吾心未盡處不足謂之學問喜怒哀樂陽明老師曰樂者心之本體也得所樂則喜反所樂則怒失所樂則哀不喜不怒不哀時此真樂也楊文澄問意有善惡誠之將何稽陽明老師曰無善無惡者心也有善有惡者意也知善知惡者良知也為善去惡者格物也曰意固有善惡乎曰意者心之發本自有善而無惡惟動乎私欲而後有惡也惟良知自知之故學問之要曰致良知或問客氣陽明老師曰客與主對讓盡所對之賓而安心居於卑末又能盡心盡力供養諸賓賓有失錯又能包容此主氣也惟恐人加於吾之上惟恐人怠慢我此是客氣人生不可不講者學也不可暫留者光陰也不能暫留甚為可惜學不講自失為人之機誠為可耻自甘無耻自不知惜老至而悔不可哀乎孔子曰學如不及猶恐失之朝聞道夕死可矣旨哉或問三教同異陽明老師曰道大無外若曰各道其道是小其道矣心學純明之時天下同風各求自盡就如此廳事元是統成一間其後子孫分居便有中有旁又傳漸設藩籬猶能往來相助再久來漸有相較相爭甚而至於相敵其初只是一家去其藩籬仍舊是一家三教之分亦只似此其初各以資質相近處學成片段再傳至四五則失其本之同而從之者亦各以資質之近者而往是以遂不相通名利所在至於相爭相敵亦其勢然也故曰仁者見之謂之仁知者見之謂之知才有所見便有所偏天地萬物之機生生不息者只是翕聚翕聚不已故有發散發散是其不得已且如嬰兒在母腹中其混沌皮內有兩乳端生近兒口是兒在胎中翕而成者也故出胎便能吸乳人之養生只是降意火意火降得不已漸有餘溢自然上升只管降只管自然升非是一升一降相對也降便是水升便是火參同契真人潛深淵浮遊守規中此其指也或問金丹曰金者至堅至利之象丹者赤也言吾赤子之心也煉者喜怒哀樂發動處是火也喜怒哀樂之發是有物牽引重重輕輕冷冷熱熱煆煉得此心端然在此不出不入則赤子之心不失久久純熟此便是丹成也故曰貧賤憂戚玉汝於成動心忍性增益不能此便是出世此是飛升沖舉之實謂其利者百凡應處迎之而解萬古不變萬物不離大人之心常如嬰兒知識不逐純氣不散則所以延年者在是所以作聖者在是故曰專氣致柔如嬰兒清明在躬志氣如神嗜欲將至有開必先所以知幾者在是所以知天者在是太虛浮雲過化也乾乾不息於誠存神也存神則過化矣所過不化不存神也存神而過化所以與天地同流此身之外一絲一縷皆粧綴故緊隨身不可須臾離者貧賤也或得或失者富貴也於其不可離者必求離之於其不可保者必欲得之此所以終身役役卒歸於惡也三代教人年未五十者不得衣帛未七十者不得食肉是天下莫非素縞也今自嬰兒時便厚味華衣豈知古人愛養生命之道佛法戒殺其徒不腥不錦意正如此若得天下知此風味便省許多貨財便有許多豐裕息貪息爭無限好處雍熙之風指日可見惜乎欲動情勝而不能從也往古聖人立言埀訓宗旨不同只是因時立教精明此性耳堯舜曰中湯文曰敬蓋以中有糊塗之景將生兩可之病故以敬為宗提省人使之常惺惺也敬則易流於有意故孔子曰仁仁易無斷故孟子曰仁義仁義流而為假仁襲義故周子曰誠誠之景乃本體無思無為者也人不易明將流於訐直故程子復以敬為宗敬漸流於孤陋故朱子以致知補之致知漸流於支離故先師明聞見與良知特揭良知為宗千古聖學之要天地鬼神之機良知二字盡之矣混沌開闢之説亦是懸度只就一日晝夜昏明之間便可見戌亥時果人消物盡乎但自古至今生氣漸促其醇氣之耗智巧之深終非古比或問事物有大小應之不能無取舍此正是功利之心千駟萬鍾之取豫一念也衆人在事上見故有小大聖人却只在發念處見故不論事物之大小一念不安即不忍為人無善可為只不可為惡有心為善善亦惡也尤西川紀聞近齋説陽明始教人存天理去人欲他日謂門人曰何謂天理門人請問曰心之良知是也他日又曰何謂良知門人請問曰是非之心是也近齋言陽明云諸友皆數千里外來人皆謂我有益於朋友我自覺我取朋友之益為多又云我全得朋友講聚所以此中日覺精明若一二日無朋友志氣便覺自滿便覺怠墮之習復生近齋説陽明逢人便與講學門人疑之歎曰我如今譬如一個食館相似有客過此喫與不喫都讓他一讓當有喫者近齋説陽明在南都時有私怨陽明者誣奏極其醜詆始見頗怒旋自省曰此不得放過掩卷自反俟其心平氣和再展看又怒又掩卷自反久之真如飄風浮靄略無芥蒂自後雖有大毁謗大利害皆不為動嘗告學者曰君子之學務求在已而已毁譽榮辱之來非惟不以動其心且資之以為切磋砥礪之地故君子無入而不自得正以無入而非學也近齋説陽明不自用善用人人有一分才也用了再不錯故所向成功近齋曰昔侍先師一友自言覺工夫不濟無奈人欲間斷天理何師曰若如汝言工夫儘好了如何説不濟我只怕你是天理間斷人欲耳其友茫然近齋解格物之格與陽明大指不殊而字説稍異豫問曾就正否近齋歎曰此終天之恨也近齋曰精粗一理精上用功他日舉似則曰本無精粗近齋曰三年前悟知止為徹底為聖功之凖近六月中病卧忽覺前輩言過不及與中皆是汗漫之言必須知分之所在然後可以考其過不及與中之所在為其分之所當為中也無為也不當為而為者便是過便是有為至於當為而不為便是不及便是有為恭節周訥溪先生怡周怡字順之號訥溪宣州太平人嘉靖戊戌進士授順德推官入為吏科給事中上疏劾相嵩且言陛下日事禱祀而四方水旱愈甚杖闕下繫錦衣衛獄歷三年上用箕神之言釋先生與斛山劉晴川三人未彌月上為箕神造臺太宰熊浹極言不可上怒罷浹而復逮三人獄中又歷兩年內殿災上於火光中恍忽聞神語令釋三人者於是得釋家居十九年穆宗登極起太常少卿所上封事刺及內侍出為山東僉事轉南京司業復入為太常隆慶三年十月卒於家年六十四蚤歲師事東廓龍溪於傳習録身體而力行之海內凡名王氏學者不遠千里求其印證不喜為無實之談所謂節義而至於道者也尤西川紀聞訥溪説陽明一日早起看天欲有事即自覺曰人方望雨我乃欲天晴耶其自省如此訥溪説東廓講學京師一士人誚之曰今之講學者皆服堯之服誦堯之言行桀之行者也東廓曰如子所言固亦有之然未聞服桀之服誦桀之言而行堯之行者也如欲得行堯之行者須於服堯之服誦堯之言者求之且不服堯之服不誦堯之言又惡在其行堯之行也士人愧服訥溪謂司訓邵西林曰子憤士之不率教乎譬諸津濟遊人喧渡則長年三老艤舟受直擇可而載若野岸舟橫客行不顧則招招舟子豈容自己凡教倦即是學厭西川問學曰信心思不出位是不過其則西川有所疑億曰莫猜度士有改行者西川謂初念未真曰不然惟聖罔念作狂君子小人何常之有當此世界若無二三子未免孤立無徒囚對周子被罪下獄手有梏足有鐐坐卧有匣日有數人監之喟然曰余今而始知檢也手有梏則恭足有鐐則重臥坐有匣則不敢以妄動監之衆則不敢以妄言行有鐐則疾徐有節余今而始知檢也提學薛方山先生應旗薛應旗號方山武進人嘉靖乙未進士知慈溪縣轉南考功升浙江提學副使其鑒識甚精試慈溪得向程卷曰今科元也及試餘姚得諸大圭卷謂向程曰子非元矣有大圭在已果如其言先生為考功時置龍溪於察典論者以為逢迎貴溪其實龍溪言行不掩先生蓋借龍溪以正學術也先生嘗及南野之門而一時諸儒不許其名王氏學者以此節也然東林之學顧導源於此豈可沒哉薛方山紀述古之學者知即為行事即為學今之學者離行言知外事言學一念不敢自恕斯可謂之修一語不敢茍徇斯可謂之直一介不敢自汙斯可謂之亷氣者所以運乎天地萬物者也有清則有濁有厚則有薄窮則變變則通故一治一亂皆非一日之積也聖人制命賢者安焉不肖者逆焉萬物皆僃於我不可以物為非我也然而有我則私矣萬物皆具於心不可以心為無物也然而有物則滯矣陰陽之氣凝者為石流者為水凝者無變信也流者無滯智也孔惡其硜窒也孟非其激逆也信立而通則不窒矣智運而正則不逆矣畫者象也值其畫者變也潛龍勿用者辭也用其辭者占也斯義不明附會無不至矣時之汙隆民之休戚其幾安在哉在乎士風之直與佞耳改過則長善矣甘貧則足用矣治世之教也上主之故德一而俗同季世之教也下主之故德二三而俗異義協則禮皆可以經世不必出於先王理逹則言皆可以喻物不必授之故典薛文清之佐大理王振引之也當時若辭而不往豈不愈於抗而得禍乎此崔後渠夢中所得之言古諸侯多天子繼别之支子故不得犯天子以祭始祖大夫多諸侯繼禰之支子故不得犯諸侯以祭先祖漢唐以來則無是矣禮以義起報宜從厚今是大夫之家廟雖推以祭始祖亦可也古者諫無官以天下之公議寄之天下之人使天下之人言之此其為盛也副使薛畏齋先生甲薛甲字應登號畏齋江陰人也嘉靖乙丑進士授兵科給事中劾方士邵元節降湖廣布政司照磨歷寧波通判保定同知四川贑州僉事副使以忤相嵩拾遺免先生篤信象山陽明之學其言格物即所以致知慎獨即所以存養成物即所以成己無暴即所以持志與夫一在精中貫在一中約在博中恕在忠中皆合一之旨此學之所以易簡也先生曰古今學術至於陽明漸爾昭融天不假年不能使此公縷析條分以破訓詁之惑用是學者雖略知領悟而入之無從區區不自量妄意欲補其缺會集所聞總成一書名曰心學淵源冀傳之來世以俟知者羲按陽明之格物謂致吾心良知之天理於事事物物則事事物物皆得其理意在於事親則致吾良知於事親之物去其事親之不正者以歸於正事親之物格而後事親之知至先生之格物以感物為格不能感物是知之不致陽明以正訓格先生以感訓格均為有病何不以他經證之意以知為體知以物為體毋自欺良知也好惡物也好惡至於自慊則致之至於物矣不忍堂下之牛良知也舉斯心而加諸彼則致之至於物矣蓋至於物則此知才非石火電光所謂逹之天下也此正致之之法與擴充同一義耳格當訓之為至與神之格思同二先生言正言感反覺多此一轉所致者既是良知又何患乎不正不感乎薛畏齋文集陸子之學在先立其大朱子之學在居敬窮理學者茍能存先立其大之心而務朱子之功則所謂居敬者居之心也所謂窮理者窮之心也則朱陸合一矣論道者須精且詳精則理透詳則意完如惟精惟一之語更建中建極一貫性善數聖賢發明而理始徹豈非精耶又本之以六經輔之以四子而意始完然則精與詳信乎不可缺一也若孟氏以後歷千年而有象山有陽明可為精矣而享年不永不獲有所著述以示後人雖欲詳不可得也至於朱子字字而議句句而論可謂詳矣然改易大學而以格物為窮物之理集義為事事求合於義則與義襲而取者何以異耶循此而求之雖欲精亦不可得也致知格物之説夫子傳之曾子曾子傳之子思而有明善誠身之論所謂明善即致知也所謂誠身即誠意也雖不言感物然獲上治民悅親信友乃其驗處即格物也至子思傳之孟子則述師傳而備言之而曰至誠而不動者未之有也則格物之為感物彰彰明矣夫不能感物者必其知有未致致有未盡也故孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬反之者致之也此之謂致知在格物釋氏之説欲使人離垢明心其意未嘗不善也然不知心即是理理不離事而過用其意至欲遠離事物以求心則其勢必至於反性情滅人倫為一切襲取之法認其所謂漠然無情者為心至於中庸精微之妙茫無所知而誤以幻天地絶人道者為事知者所宜原其意以通之而約其過甚者以歸於中亦歸斯受之之意也或問存心致知有分乎曰致知乃所以存心也副使查毅齋先生鐸查鐸字子警號毅齋寧國之涇縣人嘉靖乙丑進士授德安府推官入為刑科給事中為新鄭所不喜參議山西劾歸復起分守河東有妖似獮言人禍福熒惑一方先生下教逐之妖輒遁去轉廣西副使致政歸先生受業於龍溪緒山墨守致良知宗旨故陽明之言格物謂致吾心良知之天理於事事物物則事事物物皆得其理先生言格物者順其帝則之流行不使一毫私意間雜於中茍無私意物不待格而自無不格其義一也然意有未盡蓋良知即是乾知物即是坤作成物之物天之生意乃其知也此生意遍滿兩間然不著土則空無所寄亦如野馬絪縕旋吹旋散故必乾坤合德然後能四時行百物生所以曰坤作成物人稟大始之氣此良知也茍不凝之於物只在想像恍忽之中但謂之弄精魂而已此致知之必在格物而後能有諸於己也先生亦言乾知即良知之真體坤作即良知之實用然良知必從格物而後成體彼石火電光豈可執以為體乎查毅齋先生集學問須要歸根與天地相似天地之化雖流行不息然其凝寂者未嘗不在故天之斗柄地之潮汐四時之節候萬物之榮悴分毫不差試於定盤針驗之不論和風麗日迅雷烈風之時子午之向未嘗少差此可見天地之寂體此體人人俱足雖酬酢萬變而其寂然者常存所謂主靜立人極也無窮事業皆從這些子中流出此學所以須從混沌立根也人心之體只是寂感陽也剛也仁也皆感之體也陰也柔也義也皆寂之體也此機原從混沌中來無前無後無內無外無精無粗能悟此意則即寂感存即感寂存功夫本體當下俱是吾人一身不是塊然一物通身莫非靈氣自身之所主謂之心自心之所發謂之意自意之明覺謂之知自知之感應謂之物其實總是一身分疏指出或謂天下事變無窮良知安能盡知必加考索講求始得不知良知乃吾真心之所發也真心所在當考索者自會考索當講求者自會講求皆所不廢若當考索而不考索當講求而不講求便非良知格物者循其良知之發擴充之以極其至內之念慮覺識外之視聼言動皆循其良知之天理而不使有一毫之虧蔽也物無方體知無方體格致之功亦無方體物無窮盡知無窮盡格致之功亦無窮盡日就月將自有不容已者良知與知識不同良知是天命之性至善者也知識是良知之用有善有惡者也如石中有火擊石火出神觸神應一毫人力不得與焉即乍見孺子入井皆有怵惕惻隱之心是也知識則火從石中出後延燒燎原此二者之辨也文成在時親往其門者先生曰只一知字尚無下落至於致字且休説起此致字即孟子擴而充之充字此充字不是充之於天下乃由一偏而充之於全體須一偏之動處深造究竟廓然全體火然泉達皆指此幾之不息處問情識與良知既别陽明先生以知善知惡是良知此與情識何别曰善惡為情識知者天聰明也不隨善惡之念而遷轉也情識者未必不從知來既離其根則善惡自混其去知也遠矣學者有守一念之明以為功者此常惺惺法也靜時得力動即茫蕩為其有內外之分也不知此靈原無內外原無動靜乃吾人之真體即道心之微也既見此體則天地萬物自不為礙惟此一靈獨往獨來一切感物惟以此靈應之色色俱是現在全無倚傍良知一念之微從無聲無臭中出見此中色色俱有帝則不待安排不俟學慮格物者順其帝則之流行不使一毫私意間雜於中茍無私意物不待格而自無不格戒懼原是本體覺悟而不戒懼則所悟者猶是虛見戒懼而非覺悟則戒懼者猶是強制吾人本來真體原無分於寂感惟真體在我則無感時雖寂然不動自是心意盎然即寂而感在也有感時雖應務紛紜自是條理安妥即感而寂在也若只是寂感上調停則有事時易落於俗無事時易落於空矣乾知即良知之真體坤作即良知之實用龍德不可為首如寒暑往來循環無端將以寒為首乎暑為首乎故三統迭建子丑寅皆可為首正見其無首處本義言陽剛不可為物先非也天命之性能生萬有不與萬有作對故謂之獨即此心之靈是也此心之靈天理人欲毫忽莫掩又謂之獨知只是此靈作主不忘有事之謂知慎獨即是良知時時不忘有事不為氣習所蔽即是致良知太極生隂陽太極即在隂陽之中隂陽生五行陰陽即在五行之中五行生萬物五行即在萬物之中不是别有一物懸虛在於某處則吾心之良知可知矣吾人日用應感雖千變萬化此心之明體不為情遷不為境易此虛寂之體原不出應感之中雙江念菴提出歸寂之説性體本寂又何事歸未免頭上安頭矣易謂極深研幾不是幾前更有深處只是吾人從發後認幾為氣習所隔見得幾淺故須極深深只是銷去習氣則真體自露靈機自顯今人認幾從發後看又從念頭初動處看皆非慎獨真脈大學知止此止字即易所謂止其所也止豈有定所至善即吾人天命之性此知字非言語可接非思索可得是自心自證此心從天命來原是止的雖千變萬化吾之性體終不能遷動但吾人自作知見自作憧擾失却至善本體始不得止若時時刻刻從良知作主久之始信性體原是不動夫神周流六虛變動不居萬神一神也惟得形而附其實虛化神神化氣氣化形則形亦神之所生也世人不知此心原是神明不測種種從形上起念故神反為形役不得靈透惟認得此神時時委順於神不以有我撓其間則神自靈透不昧自圓動不拘其出之自我者為神功及之天地人物處為神化皆神之所為非我也譬之石中有火擊石火出人但見擊出之火不知火原蘊於石中擊出之火有起滅石中之火無起滅若是擊出之火猶是真體間不容髮今人多從延燒燎原處認火雖亦是火離根遠矣故元神識神雖是一個但有體用之别耳蒙諭凡有習氣皆是意見未忘誠是但意見固不可有至於默識本來時時保任則不可無此體從無始以來不與諸有作對雖不離日用應感實與應感無與此中原無格式何所依倣原無好醜何所揀擇即有習氣亦從此而銷雖知尚屬意見舍此無可用力但不令住於所見而已吾人日用應感莫非天則但精神消散每多忽慢然其存其散此心之靈未嘗不覺貴在因其所覺而凝聚之此心之覺處即謂之復才覺即知凝聚不至流散即謂之姤人心之靈皎如白日天理人欲毫不容掩雖為氣習所蔽才一反求即得本心如浮雲翳日貞明之體終不可易此知體也在致知而已致知者自念慮之微以至事為之著無非此知之貫徹即謂之格物吾人患在分心與事為二見若視心是事視事是心凡事之委曲調停正是心之盡處稍分二見即起厭煩心矣人之言慎獨者多自善惡既分之後善求必為惡求必去功夫已晚得力稍難須自善惡未分之前虛體上保任此體原不離應感自有炯然不昧處此即所謂良知也仙家所謂結胎豈真有形亦只精神凝聚即謂之聖胎功夫全在未發之中上用性原是於穆吾心之主宰亦是常靜無一念之起性原是不已吾心之流行亦是常應無一息之間此心空空洞洞原不著事然此意綿綿密密常若有事如此久久習熟舊染氣習漸忘真性漸露自然獨見本來靣目自天子以至於庶人各各有天地各各有萬物即如庶人以一家為天地以一家之人為萬物若庶人性情不中不和喜怒哀樂發得過當即一家天翻地覆人皆不安此即是不位育推而一邑至天下又可知矣易謂數往者順知來者逆易逆數也此即周子主靜之意吾人日用只知順去不知逆返故多離根若良知作得主宰時時用不離體此用逆之學即主靜意也明儒學案卷二十五
