body:
  text: 明儒學案卷四十九餘姚黃宗羲撰諸儒學案中三文定何柏齊先生塘何塘字粹夫號柏齊懷慶武涉人生而端重不事嬉戲人以為呆七嵗時入郡城見彌勒像抗言請去之人皆大駭及為諸生慨然慕許文正薛文清之為人索其遺書讀之登𢎞治壬戌進士第改庶吉士歷編修修撰逆瑾召諸翰林各贈川扇翰林入見而跪先生獨長揖瑾怒扇不及之翰林謝扇復跪先生從旁曰嘻何跪而又跪也瑾大怒詰其姓名先生前對曰修撰何塘知不為瑾所容纍疏謝病致仕歸瑾誅復職無何以經筵觸忌諱謫同知開州量移同知東昌府又歸嘉靖初起山西提學副使丁憂改浙江進南京太常少卿本寺正卿歷工户禮三部侍即謝病升右都御史掌留堂不就家居十餘年癸卯九月卒年七十贈禮部尚書諡文定先生以儒者之學當務之為急細而言語威儀大而禮樂刑政此物之當格而不可後者也學問思辨一旦卓有定見則物格而知至矣由是而發之以誠主之以正然而身不修家不齊未之有也至究其本原為性命形於著述為文章固非二道特其緩急先後各有次第不可紊耳今曰理出於心心存則萬理備吾道一貫聖人之極致也奚事外求吾恐其修齊治平之道反有所略則所學非所用所用非所學於古人之道不免差矣先生此論為陽明而發也蓋力主在心為知覺在物為理之說固無足怪獨是以本原性命非當務之急若無與乎修齊之事者則與清談何異修齊之事無乃專靠言語威儀禮樂刑政歟真可謂本末倒置矣先生與王浚川許函谷辨論隂陽數千言為浚川所破者不一其大指之差在以神為無以形為有有無豈能相合則神形已離為二神形既二又豈待人死而後無知哉儒學管見或問儒者之學曰五經四書之所載皆儒者之道也於此而學之則儒者之學也問其要曰莫要於大學請問其㫖曰人之有生莫不有身焉亦莫不有家焉仕而在位則又有國與天下之責焉修齊治平莫不有道此則道之實體也具此道於心神性情之間明德也行此道於家國天下之際新民也明德為體而實見於新民之用新民為用而實本於明德之體蓋內外合一者也而莫不各有至善之所當止焉然斯道也非知之於先則不能行之於後故有知止能得之訓焉此大學之要指也請問其詳曰人之生也莫不有心以為此身之主忿􅓰恐懼好樂憂患皆心之用也情也其未發則性也方其未發也必廓然大公無所偏倚心之本體方得其正一有偏倚則不正矣此善惡之根也或曰朱子謂心之未發如鑑空衡平無正不正之可言必其既發則正不正始有可見故章句謂用之所行或不能不失其正今乃謂未發之時心已不正何也曰心之正不正雖見於既發之後實根於未發之前如鑑之不明衡之不平雖未照物懸物而其體固已不正矣至於用之所行或不能不失其正則修身章內親愛五者之偏正指此而言所謂己發而為情者也若謂正心傳內不得其正即指已發則修身𫝊內五者之偏又何指耶朱子章句蓋一時之誤也其以正心次誠意之後何也曰意不誠者明知善之當行而不能行明知惡之當惡而不能去蓋自欺之小人也又何暇論其心之正不正哉其或誠於好善而惡惡矣而氣禀識見之偏心有未正則接人處事之際往往隨其所偏而發不復加察則雖誠於好善惡惡不免有時而失理誠意之後繼以正心蓋欲其涵飬省察使其心未發之時無少偏倚感物而動之際又加察焉使情之所發用之所行無一不中乎理此則儒者之極功焉然五者之情各行於接人處事之際接家人國人天下人無不然也而所接莫先於家人故於修身齊家𫝊內發之非謂接他人不然也格物致知云者格修齊治平之道而真知孰善孰惡也誠意云者行修齊治平之道誠行其善而去其惡者也至於天下之治亂天命之得失則善惡之效而萬世之勸戒也此儒學體用之大全也學與政非二道也學以政為大天下之政總於六部以大學之𫝊考之乎天下之用人吏兵之政也理財户工之政也治國興仁讓之善則禮之政也禁貪戾之惡則刑之政也吏兵之用人能同天下之好惡而不徇一己之偏户工之理財能節用愛人而不為聚斂之計禮刑能興善而禁惡則謂之賢公卿有司可也本之以大學之道而行之以國家之法為政之道思過半矣此儒者之正學也或者舍而不由徒從事於記誦詞章者既不足道而所謂道學者又多用心於性與天道之間及存心飬性之說名雖可觀實則無補其可嘆者多矣語録有問一貫約禮之說者曰儒者未得游夏之十一而議論即過顏曾以聖賢心法為初學口耳此道聼塗說之最可惡者門人請梓文集曰聖賢之道昭在六籍如日星後學愧不能知而行之自宋以來儒者之論正苦太多此吾之所深懼也有言先生銖視軒冕塵視金玉者曰此後世儒者輕世傲物之論也金玉自是金玉如何塵視得軒冕自是軒冕如何銖視得此何異老莊芻狗飄瓦曰如是孔子何以謂富貴如浮雲曰浮雲在不義不在富貴也隂陽管見隂陽之論豫幼聞其名而未知其實反覆乎周程張邵之書出入乎佛老醫卜之說者將二十年至三十八嵗玩伏羲卦象而驗之以造化之道乃若有得惜諸佛之論皆失其真也欲著述以明之以其非日用所急且恐啓爭端也藏之中心蓋十五年於今矣間與一二知己談之而杏東郭先生屬豫筆之成書因略書數條告之王浚川許函谷復有所疑且豫著述之本㫖亦未明也乃補書三條於內嗚呼性命之難言也尚矣一己之見安敢必他人之皆我從哉引伸觸類正誤紏失蓋有侍乎世之君子焉嘉靖五年九月朔日敘造化之道一隂一陽而已矣陽動隂靜陽明隂晦陽有知隂無知隂有形陽無形陽無體以隂為體隂無用待陽而用二者相合則物生相離則物死微哉微哉通於其說則鬼神之幽人物之著與夫天文地理醫卜方技仙佛之蘊一以貫之而無遺矣一章天為陽地為隂火為陽水為隂天陽之陽也故神而無形地隂之隂也故形而不神火陽之隂也故可見然後無形也水隂之陽也故能化然終無知也天變而為風地變而為山火變而為雷水變而為澤雨雪霜露皆澤之類也觀八卦之象則可知矣二章火陽也其盛在天水隂也其盛在地蓋各從其類也何以明之日為火之精月為水之精日近則為溫為暑火偏盛也日逺則為凉為寒水偏盛也四時之變於是乎生矣地雖有火而不能為溫暑天雖有水而不能為寒凉故曰其盛各有在也三章或曰水隂也流而不息安在其為靜乎曰流非水之本然也水體凝而性靜者也其融火化之也其流天運之也天火無形實為隂樞而人不能見也故謂水為動誤矣何以明之水氣為寒寒甚則水非有待於外也水自遂其性耳然則水之為靜也昭昭矣四章或曰天有定形故日月星宿之麗於天者萬古不易今謂天無形殆未可乎曰此不難知也既天有定形日月五星又何以有盈縮之異乎若謂日月五星雖麗於天而不為天所拘故有盈縮之異不知上何所繫下何所承乃萬古而不墜乎蓋天陽氣也動而不息其行至健日月五星皆運於天者也天行有常故日月星宿萬古不易其有盈縮則以象有大小天運之有難易也譬之浮物於水小者順流而去故疾中者少遲大者愈遲其𫝑則然也如此則謂天有定形者其惑可解謂天左旋日月五星右轉者其說不攻而自破矣五章或曰天地水火恐未足以盡造化之蘊不如以隂陽統之豫竊以為隂陽者虛名也天地水火者實體也二而一者也謂天地水火未足以盡造化之蘊此特未之察耳蓋人知水之為水而不知寒凉潤澤皆水也人知火之為火而不知溫熱光明皆火也天宰之以神地載之以形水火二者交會變化於其間萬物由是而生由是而死造化之能事畢矣自此之外豈復有餘蘊乎六章或曰乾靜專而動直坤靜翕而動闢易大傳也今謂天專為動地專為靜何居曰易大傳之文為乾坤交不交而言也乾有時而不交坤故謂之靜然其本體之動者自若也坤有時而受乾之交故謂之動然其本體之靜者亦自若也觀天地則可知矣夫何疑乎七章或曰易大傳謂立天之道曰隂與陽立地之道曰柔與剛今謂天為陽地為隂不亦異乎曰乾陽物也其象為天坤隂物也其象為地兹非易道之彰彰者乎曰言若是之不同何也曰各有指也火陽也雖附於天而未嘗不行於地水隂也雖附於地而未嘗不行於天水火者天地之二用也故天有隂陽地有柔剛默識而旁通之則並行而不悖矣八章或曰周子之太極何如曰非吾之所知也其說謂太極動而生陽動極而靜靜而生隂靜極復動自今觀之則天陽之動者也果何時動極而靜乎地隂之靜者也果何時靜極而動乎天不能生地水不能生火無愚智皆知之乃謂隂陽相生不亦誤乎蓋天地水火雖渾然而不可離實燦然而不可亂先儒但見其不相離而未察其不可亂也故立論混而無别愚竊以為隂之與陽謂之相依則可謂之相生則不可九章或曰何謂太極曰一隂一陽之謂道道太極也周子之論何如曰似矣而實非也五行一隂陽隂陽一太極則固謂太極不外乎隂陽而隂陽不外乎五行矣自今論之水水也火火也金木水火土之交變也土地也天安在乎有地而無天謂之造化之全可乎或曰天太極也故朱子以上天之載釋太極以天道流行釋隂陽豈可謂之有地而無天乎曰易有太極是生兩儀兩儀生四象四象生八卦八卦之中有乾有坤則天地皆太極之分體明矣以天為太極之全體而地為天之分體豈不誤甚矣哉太極圖為性理之首而其失有如此者故不可不辨十章或曰張子之正䝉何如曰太虛即氣太虛不能不聚而為萬物萬物不能不散而為太虛聚則離明得施而有形可見散則離明不得施而無形不可見不可因其可見始謂之有因其不可見遂謂之無故謂聖人不言有無言有無為諸子之陋此其書之大指也殊不知造化之道陽為神隂為形形聚則可見散則不可見神無聚散之迹故終不可見今夫人之知覺運動皆神之所為也是豈有形而可見乎觀人則造化之妙可知矣張子之論蓋以意見窺測而未至者也十一章或曰邵子之經世何如曰元會運世之分無所依據先儒已有議其失者今不贅論天以日月星辰變而為暑寒晝夜地以水火土石化而為雨風露雷此其書之大指也自今觀之暑寒晝夜皆主於日月星辰何有焉風為天所變雷為火所變雨露皆水所變其理甚明少思則得之矣火為風石為雷土為露豈不牽强之甚哉且其取象乾不為天而為日離不為日而為星坤反為水坎反為土與伏羲之易象大異乃自謂其學出於伏羲之先天圖吾不知其說也十二章或曰子自謂所論皆出於伏羲之易其詳何如曰太極生兩儀兩儀生四象四象生八卦此伏羲易象之本也乾離皆生於陽故謂天火為陽坤坎皆生於隂故謂地水為隂乾變其初九為初六則為㢲故謂風為天之變蓋天下交於隂也坤變其六三為九三則為艮故謂山為地之變蓋地上交於陽也離變其九三為六三則為震蓋火為隂伏則奮擊而為雷故謂雷為火之變坎變其初六為初九則為兌水與陽交則相和而為澤故謂澤為水之變坤艮離震相比從其類也乾兌坎㢲相逺無乃以乾為陽可下行於地之分坎為隂之陽亦能上入於天之分故兩儀其位耶若以兑為㢲以㢲為兑則隂陽之分尤為明順然非後學所敢斷也姑發此意以俟再來之伏羲正焉十三章陰陽管見後語造化之妙先聖已有論者見於易象及禮祭義春秋左傳諸篇可考也但所言簡略耳蓋以其理微妙難明恐學者知未及此驟而語之反滋其惑故等閒不論所謂子不語神子罕言命夫子之言性與天道不可得而聞是也但近世儒者不察先聖之指未明造化之妙輒以見立論其說傳於天下後世學者習於耳目之聞見遂以為理實止此而不知其謬也豫惜其失故著管見以救之而爭辨紛然而起蓋為先入之言所梏耳豫不得已乃著管見後語以發之學者熟玩而細察焉可也嘉靖甲午冬至後二日序造化之道合言之則為太極分言之則為陰陽謂之兩儀陰陽又分之則為太隂太陽少隂少陽謂之四象四象又分之則為天地水火風雷山澤之象謂之八卦天地水火常在故為體雷風山澤或有或無故謂之變此皆在造化之中而未生物也其既合則物生矣一章隂形陽神合則生人所謂精氣為物也離則人死所謂游魂為變也方其生也形神為一未易察也及其死也神則去矣而去者初無形可見形雖尚在然已無所知矣陽有知而無形隂有形而無知豈不昭然而易察哉二章天動而無形風亦動而無形天不息風有時而息下交於隂為隂所滯也髙山之顛風猛蓋去隂稍逺不大為所滯也雲霄之上風愈猛蓋將純乎天也然則天變而為風也明矣春夏日近火氣盛則雷乃發秋冬日逺火氣微則雷乃收雷有電火光也雷所擊有燒痕火所燎也然則火變而為雷也明矣若地水之變則有形易見不待論也周易謂停水為澤管見則以水之化而散者為澤蓋停水與流水無異而水之化為雨雪霜露者於八卦遂無所歸且澤有散義先聖亦有雨澤之說故不從周易所取之象蓋於造化之道不合雖文王之象亦不敢從也三章世儒論天道之隂陽多指四時之變而言而四時之變隂陽消長實指水火而言而天之本體則運行水火在四時之外無消長也地道之柔剛則以形論地水相結為火所煆者則剛而火氣行於地者人不敢犯亦謂之剛至於地水本體至靜而無為則謂之柔此所謂地有柔剛亦自水火而來也四章周子所謂太極指神而言神無所不統故謂太極神無形故謂無極而太極朱子所注亦得其意但不言神而言理故讀者未即悟朱注上天之載蓋指神而言也殊不知太極乃隂陽合而未分者也隂形陽神皆在其中及分為隂陽則陽為天火依舊為神隂為地水依舊為形若太極本體止有神而無形則分後地水之形何從而來哉由此化生人物其心性之神則皆天火之神所為也其血肉之形則皆地水之形所為也此理先聖屢有言者但學者忽而不察耳蓋有形易見而無形難見固無怪其然也五章橫渠論氣聚則離明得施而有形可見氣散則離明不得施而無形故不可見夫地之上虛空處皆天也此儒者之所共言亦橫渠之所知也盈虛空處皆天氣可謂聚矣是果有形而可見乎天變為風風之猛者排山倒海亦可謂氣聚矣謂之離明得施有形可見得乎故曰神與聚散之迹張子窺測而未至也六章老子謂有生於無周子謂無極太極而生隂陽五行張子謂太虛無形而生天地糟粕所見大略相同但老子周子猶謂神生形無生有至張子則直謂虛無形止為氣之聚散不復知有神形之分此則又不同也學者詳之可也七章浚川謂鬼神無知覺靈應凡經訓禍福祭享之類皆謂止是聖人以神道設教實無此理此大誤也人血肉之軀爾其知覺感應孰為之哉蓋人心之神也心之神何自而來哉蓋出於造化之神也人有形聲可驗則謂之有神無形聲可驗則謂之無神矣八章隂陽管見辨易有太極是生兩儀兩儀者隂陽也太極者隂陽合一而未分者也隂有陽無隂形陽神固皆在其中矣故分為兩儀則亦不過分其本有者若謂太虛清通之氣為太極則不知地水之隂自何而來也柏齊謂神為陽形為隂又謂陽無形隂有形矣今却云分為兩儀亦不過分其本有者既稱無形將何以分止分隂形是無陽矣謂分兩儀豈不自相矛盾使愚終年思之而不得其說望將隂陽有無分離之實再為教之柏齊又謂以太虛清通之氣為太極不知地水之隂自何而來嗟乎此柏齊以氣為獨陽之誤也不思元氣之中萬有俱備以其氣本言之有蒸有濕蒸者能運動為陽為火濕者常潤靜為隂為水無濕則蒸靡附無蒸則濕不化始雖清微鬱則妙合而凝神乃生焉故曰隂陽不測之謂神是氣者形之種而形者氣之化一虛一實皆氣也神者形氣之妙用性之不得已者也三者一貫之道也今執事以神為陽以形為隂皆出自釋氏仙佛之論誤矣夫神必藉形氣而有者無形氣則神滅矣縱有之亦乘夫未散之氣而顯者如火光之必附於物而後見無物則火尚何在乎仲尼之門論隂陽必以氣論神必不離隂陽執事以神為陽以形為隂愚以為異端之見矣道體兼有無隂為形陽為神神而無形者其本體蓋未嘗相混也釋老謂自無而有誠非矣浚川此論出於橫渠要其歸則與老氏無而生有者無異也釋氏則實以有無並論與老氏不同此不可不知也所未精者論真性與運動之性為二及以風火為形耳隂陽管見中略具此意有志於道者詳之可也浚川所見出於橫渠其文亦相似柏齊言道體兼有無亦自神無形有來此不須再辨愚謂道體本有本實以元氣而言也元氣之上無物故曰太極言推究於至極不可得而知故論道體必以元氣為始故曰有虛即有氣虛不離氣氣不離虛無所始無所終之妙也氣為造化之宗樞安得不謂之有執事曰釋老謂自無而有誠非矣又謂余論出於橫渠要其歸則與老氏合橫渠之論與愚見同否且未暇辨但老氏之所謂虛其㫖本虛無也非愚以元氣為道之本體者此不可以同論也望再思之日陽精蓋火之精也星雖火餘然亦有其體矣隂止受火光以為光者如水與水精之類也猶月之小者也風雷雖皆屬陽然風屬天之陽雷屬火之陽亦不可混至於雲則屬隂水今獨不可謂之陽也隂陽即元氣其體之始本自相渾不可離析故所生化之物有隂有陽亦不能相離但氣有偏盛遂為物主耳星隕皆火能焚物故為星為陽餘柏齊謂雲為獨隂矣愚則謂隂乘陽耳其有象可見者隂也自地如縷而出能運動飛揚者乃陽也謂水為純隂矣愚則為隂挾陽耳其有質而就下者隂也其得日光而散為氣者則陽也但隂盛於陽故屬隂類矣天陽為氣地隂為形男女牡牝皆隂陽之合也特以氣類分屬隂陽耳少男有陽而無隂少女有隂而無陽也寒暑晝夜管見有論至於呼吸則陽氣之行不能直遂蓋為隂所滯而相戰耳此屈伸之道也凡屬氣者皆陽凡屬形者皆隂此數語甚真然謂之氣則猶有象不如以神字易之蓋神即氣之靈尤妙也愚嘗驗經星河漢位次景象終古不移謂天有定體氣則虛浮虛浮則動蕩動蕩則有錯亂安能終古如是自來儒者謂天為輕清之氣恐未然且包天地外果爾輕清之氣何以乘載地水氣必上浮安能左右旋轉漢郤萌曰天體確然在上此真至論智者可以思矣柏齊惑於釋氏地水火風之說遂謂風為天類以附成天地水火之論其實不然先儒謂風為天體旋轉蕩激而然亦或可通今云風即天類誤矣男女牝牡專以體質言氣為陽而形為隂男女牝牡皆然也即愚所謂隂陽有偏盛即盛者恆主之也柏齊謂男女牝牡皆隂陽相合是也又謂少男有陽而無隂少女有隂而無陽豈不自相背馳寒暑晝夜以氣言蓋謂屈伸往來之異非專隂專陽之說愚於董子陽月隂月辨之詳矣呼吸者氣機之不容已者呼則氣出出則中虛虛則受氣故氣入吸則氣入入則中滿滿則溢氣故氣出此乃天然之妙非人力可以强而為之者柏齊謂陽為隂滯而相戰恐無是景象當再體驗之何如柏齊又謂愚之所言凡屬氣者皆陽凡屬形者皆隂以下數語甚真此愚推究隂陽之極言之雖葱蒼之象亦隂飛動之象亦陽蓋謂二氣相待有離其一不得者况神者生之靈皆氣所固有者也無氣則神何從而生柏齊欲以神字代氣恐非精當之見土即地也四時無不在故配四季木溫為火熱之漸金凉為水寒之漸故配四時特生之序不然耳五行家之說自是一端不必與之辨也火旺於夏水旺於冬亦是正理今人但知水流而不息遂謂河凍川氷為水之休囚而不知氷凍為水之本體流動為天火之化也誤矣柏齊曰土即地四時無不在愚謂金木水火無氣則已有則四時日月皆在何止四季之月今土配四季金木水火配四時其餘無配時月五行之氣不知各相退避乎即為消滅乎突然而來抑候次於何所乎此假象配合穿鑿無理甚較然者世儒惑於邪妄而不能辨豈不可哀柏齊又曰五行家之說自是一端不必與辨愚謂學孔子者當推明其道以息邪說庶天下後世崇正論行正道而不至陷於異端可也何可謂自是一端不必與辨然則造化真實之理聖人雅正之道因而䝉蔽晦蝕是誰之咎其謂水旺於冬猶為痼疾夫夏秋之時膚寸雲靄大雨時行萬流湧溢百川灌河海潮為之嘯逆不於此時而論水旺乃於水泉閉涸之時而强配以為旺豈不大謬又謂今人但知水流而不息遂謂河凍川氷為水之休囚而不知氷凍為水之本體流動為天火之化嗟乎此尤不通之說夫水之始化也氷乎水乎使始於氷雖謂氷為水之本體固無不可矣然果始於氷乎水乎此有識者之所能辨也夫水之始氣化也陽火在內故有氣能動氷雪者雨水之變非始化之體也安可謂之本裂膚墮指而江海不氷謂流動為天火之化得乎哉人之神與造化之神一也故能相動師巫之類不可謂無浚川舊論天地無知鬼神無靈無師巫之術今天地鬼神之說變矣而師巫猶謂之無如舊也何哉此三事一理也特未思耳神能御氣氣能御形造化人物無異但有大小之分耳造化神氣大故所能為者亦大人物神氣小故所能為者亦小其機則無異也州縣小吏亦能竊人主之權以行事此師巫之比也行禱則求於造化之神也設位請客客有至不至設主求神神有應不應然客有形人見之神無形人不能見也以目不能見遂謂之無淺矣此木主土偶之比也蒸水為雲灑水為雨搖扇起風放炮起雷皆人之所為也皆人之所共知也此雖形用主之者亦神氣也師巫則專用神氣而不假於形者也通此則邪術之有無可知矣浚川論人道甚好特天道未透耳蓋其自處太髙謂人皆不及已故謂己見不可易耳吾幼時所見與浚川大同後乃知其非吾料浚川亦當有時而自知其非也慎言此條乃為師巫能致風雲雷雨而言故曰雨暘風霆天地之德化而師巫之鬼不能致耳或能致者偶遇之也至於邪術亦未嘗謂世間無此但有之者亦是得人物之氣實而成非虛無杳冥無所慿藉而能之也如採生折割如滌目幻視等類與師巫之虛無杳冥能致風雨不同皆藉人物之實氣柏齊又謂造化之神氣大故所能為者亦大人物神氣小故所能為者亦小其機則無異矣愚則謂天所能為者人不能為人所能為者天亦不能為之師巫若能呼風喚雨何不如世俗所謂吹氣成雲噀唾成雨握手成雷拂䄂成風頃刻之間靈異交至又何必築壇敕將祭禱旬朔以待其自來豈非誑惑耶俗士乃為信之悲哉柏齊又謂州縣小吏亦能竊人主之權以為師巫能竊天神之權愚以謂過矣小吏人主皆人也所竊皆人事也故可能師巫人也風雨天也天之神化師巫安能之投鐡於淵龍起而雨此乃正術亦非冥祈不可同也又謂設主請客有至不至如師巫求神有應不應此皆為師巫出脫之計請客不至或有他故求神不應神亦有他故邪此可以發笑又謂蒸水為雲灑水為雨搖扇起風放炮起雷為人神氣所為不知此等雲雨風雷真邪假邪若非天道之真不過物象之似耳與師巫以人求天有何相類且師巫專用神氣而不假之以形不知是何神靈聼師巫之所使抑師巫之精神耶此類說夢愚不得而知之其謂愚論人道甚好特天道未透蓋自處太髙謂人皆不及已故執已見不可易又謂向時所見與浚川大同後乃知其非吾料浚川亦當有時自知其非此數言教愚多矣但謂自處太髙謂人不及已此則失愚之心也夫得其實理則信不得其理此心扞格不契何以相信使芻蕘之言會於愚心即躍然領受况大賢乎謂人不及已執所見而不易此以人為髙下而不據理之是非者之為也愚豈如是乎柏齊又云神能御氣氣能御形以神自外來不從形氣而冇遂謂天地太虛之中無非鬼神能聼人役使亦能為人禍福愚則謂神必待形氣而有如母能生子子能為母主耳至於天地之間二氣交感百靈雜出風霆流行山川冥漠氣之變化何物不有欲氣而為神恐不可得縱如神仙尸解亦人之神乘氣而去矣安能脫然神自神而氣自氣乎由是言之兩間神鬼百靈顯著但恐不能為人役使亦不能為人禍福耳亦有類之者人死而氣未散乃慿物以祟人及夫罔兩罔象山魈水之怪來遊人間皆非所謂神也此終古不易之論望智者再思之何如讀禍福祭祀之論意猶為鬼神無知覺作為此大惑也人血肉之軀耳其有知覺作為誰主之哉蓋人心之神也人心之神何從而來哉蓋得於造化之神也故人有知覺作為鬼神亦有知覺作為謂鬼神無知覺作為異於人者梏於耳目聞見之驗而不通之以理儒之淺者也程張不免有此失先聖論鬼神者多矣乃一切不信而信淺儒之說何也豈梏於耳目聞見之迹而不能通之以理者乎易曰積善之家必有餘慶積不善之家必有餘殃語曰禍福無門惟人所召故知人之為善為惡乃得福得禍之本其不順應者幸不幸耳故取程子答唐棣之論乃為訓世之正今柏齊以禍福必曰於鬼神主之則夫善者乃得禍不善者乃得福鬼神亦謬惡不仁矣有是乎且夫天地之間何虛非氣何氣不化何化非神安可謂無靈又安可謂無知但亦窅冥恍惚非必在在可求人人得而攝之何也人物巨細亦夥矣攝人必攝物强食弱智戕愚衆暴寡物殘人人殺物皆非天道之常性命之正世人之物相戕相殺無處無之而鬼神之力不能報其寃是鬼神亦昧劣而不義矣何足以為靈異故愚直以仲尼敬鬼神而逺之以為主論而祭祀之道以為設教非謂其無知無覺而不神也大抵造化鬼神之跡皆性之不得已而然者非出於有意也非以之為人也其本體自如是耳於此而不知皆淺儒誣妄惑於世俗之見而不能逹乎至理者矣此又何足與辨先聖作易見造化之妙有有形無形之兩體故畫竒耦以象之謂之兩儀見無形之氣又有火之可見者有形之形又有水之可化為氣者故於竒之上又分竒耦耦之上亦分竒耦謂之四象是畫易之次第即造化之實也乃謂其局而謬誤矣易有太極是生兩儀兩儀生四象四象生八卦此聖人推論畫易之原非論天地造化本然之妙用也函谷當時往往凖易以論造化愚嘗辭而病之柏齊前謂太極為隂陽未分兩儀謂隂陽已分似也今生於四象又謂聖人見無形之氣又有火之可見有形之形又有水之可化為氣者故於竒之上又分竒耦耦之上亦分竒耦謂之四象嗟乎此論為蛇添足又豈自然而然之道哉先儒謂四象為隂陽剛柔四少乃本易中之所有者後人猶議其無據今乃突然以形氣水火名之於易戾矣形氣易卦未嘗具論水火卦有坎離此而名之豈不相犯求諸要歸大抵柏齊欲以易卦之象附會於造化故不覺其牽合穿鑿至此耳嗟乎易自邵朱以來如先天後天河圖五行任意附入者已多及求諸六十四卦何曾具此後學自少至老讀其遺文迷而不省又為衍其餘說日膠月固而不可解使四聖之易雜以異端之說悲哉天地未生蓋混沌未分之時也所謂太極也天神地形雖曰未分實則並存而未嘗缺一也太虛之氣天也神也以形論之則無也地則形也非太虛之氣也以形論之則有也分為天地與未分之時無異也謂儒者之道無無無空者非也神與形合則物生所謂精氣為物也神去形離則物死所謂游魂為變也神在人心性是也無形也形在人血肉是也無知也方其生也形神混合未易辨也及其死也神則去矣去者固無形也形雖尚在固已無知而不神矣此理之易見者也乃謂儒道無無無空何也此說出於橫渠不足為據蓋橫渠見道亦未真也老氏謂萬物生於有有生於無誤矣橫渠力辨其失及自為說則謂太虛無形氣之本體其聚其散變化之客形耳客形有也生於無形此與老氏有生於無者何異是無異同浴而譏祼裎也釋氏猶知形神有無之分過於橫渠特未精耳太虛太極隂陽有無之義已具於前不復再論但源頭所見各異故其說遂不相入耳愚以元氣未分之前形氣神冲然皆具且以天有定體安得不謂之有不謂之實柏齊以天為神為風皆不可見安得不謂之無不謂之空今以其實言之天果有體邪果止於清氣邪逺不可見故無所取證耳若謂天地水火本然之體皆自太虛種子而出道體豈不實乎豈不有乎柏齊謂儒道有無有空不過以天為神遂因而誤之如此且夫天包地外二氣洞徹萬有莫不藉之以生藉之以神藉之以性反其形壞氣散而神性乃滅豈非生於本有乎柏齊以愚之論出於橫渠與老氏萬物生於有有生於無不異不惟不知愚及老氏亦不知矣老氏謂萬物生於有謂形氣相禪者有生於無謂形氣之始本無也愚則以為萬有皆具於元氣之始故曰儒之道本實本有無無也無空也柏齊乃取釋氏猶知形神有無之分愚以為柏齊酷嗜仙佛受病之源矣五行生成之數誠妄矣有水火而後有土之說則亦未也天地水火造化本體皆非有所待而後生也木金則生於水火土相交之後正䝉一假論此甚好但中間各有天機存焉天神無形人不能見故論者皆遺之此可笑也浚川所見髙過於函谷函谷所見多無一定細觀之自見今不暇與辨也嘉靖甲午十月晦日書於柏齊私居柏齊謂天地水火造化本體皆非有所待而後生愚則以為四者皆自元氣變化出來未嘗無所侍者也天者氣化之總物包羅萬有而神者也天體成則氣化屬之天矣故日月之精交相變化而水火生矣觀夫燧取火於日方諸取水於月可測矣土者水之浮滓得火而結凝者觀海中浮沫久而為石可測矣金石草木水火土之化也雖有精粗先後之殊皆出自元氣之種謂地與天與水火一時並生均為造化本體愚竊以為非然矣老氏謂有生於無周子謂無極而太極太極生二五橫渠謂太虛無形生天地糟粕所見大略相同但老氏周子猶謂神生形無生有橫渠則謂虛與形止由氣之聚散無神形有無之分又不同也豫竊謂論道體者易象為至老子周子次之橫渠為下蓋以其不知神形之分也神形之分魂升而魄降也古今儒者孰不知之今謂老子周子知之橫渠不知豈不寃哉大抵老氏周子不以氣為主誠以為無矣與柏齊以神為無同義與橫渠氣之為物散入無形適得吾體大相懸絶夫同道相賢殊軌異趨柏齊又安能以橫渠為然嗟乎以造化本體為空為無此古今之大迷雖後儒扶正濓溪無極之㫖曰無聲無臭實造化之樞紐品彚之根抵亦不明言何物主之豈非談虛說空乎但形神之分能知隂陽果不相離則升而上者氣之精也降而下者氣之跡也精則為神為生為明靈跡則為形為死為糟粕神之氣終散歸於太虛不滅息也形之氣亦化歸於太虛為腐臭也則造化本體安得不謂之有安得不謂之實老釋之所謂有無有空者可以不攻而自破世儒謂理能生氣者可以三思而自得矣望柏齊以意逆志除去葛藤舊見當自契合地上虛空處皆天天氣可謂聚矣是豈有形而可見乎天變為風風之猛者排山倒海氣之聚益顯矣謂之離明得施有形可見得乎故曰陽為神無聚散之迹終不可見而張子之論未至也豫初著管見多引而不發蓋望同志深思而自得之也忽而不察者皆是矣因復引而伸之然不能盡言也其餘則尚有望於世之君子焉甲午冬至前三日書地上虛空謂之皆氣則可謂之皆天則不可天自有體觀星象河漢確然不移可以測知且天運於外無一息停虛空之氣未嘗隨轉謂地上皆天恐非至論矣風之猛者排山倒海謂氣之動則可謂氣之聚則不可夫氣之動由力排之也力之排由激致之也激之所自天機運之也此可以論風矣謂天運成風則可謂天即風則不可氣雖無形可見却是實有之物口可以吸而入手可以搖而得非虛寂空冥無所索取者世儒類以氣體為無誤矣愚謂學者必識氣本然後可以論造化不然頭惱既差難與論其餘矣隂陽不測之謂神地有何不測而謂之神邪若謂地之靈變此是天之藏於地者耳非地之本體也柏齊曰隂陽不測之謂神地有何不測而謂之神愚則以為後坤發育羣品載生山川藴靈雷雨交作謂地不神恐不可得又曰地有靈變此天藏於地者非地本體若然則地特一大死物矣可乎愚則以為萬物各有禀受各正性命其氣雖出於天其神即為已有地有地之神人有人之神物有物之神謂地不神則人物之氣亦天之氣謂人物不能自神可乎此當再論張子謂太虛無形氣之本體其聚其散變化之客形形生於無形此與老子有生於無之說何異其實造化之妙有者始終有無者始終無不可混也嗚呼世儒惑於耳目之習熟久矣又何可以獨得之意强之哉後世有楊子者自相信矣愚嘗謂天地水火萬物皆從元氣而化蓋由元氣本體具有此種故能化出天地水火萬物如氣中有蒸而能動者即陽即火有濕而能靜者即隂即水道體安得不謂之有且非濕則蒸無附非蒸則濕不化二者相須而有欲離之不可得者但變化所得有偏盛者嘗主之其實隂陽未嘗相離也其在萬物之生亦未嘗有隂而無陽有陽而無隂也觀水火隂陽未嘗相離可知矣故愚謂天地水火萬物皆生於有無無也無空也其無而空者即橫渠之所謂客形耳非元氣本體之妙也今柏齊謂神為無形為有且云有者始終有無者始終無所見從頭差異如此安得强而同之柏齊又云後世有楊子雲自能相信愚亦以為俟諸後聖必能辨之明儒學案卷四十九
